<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SCORECERY – NBA Draft Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#fdf8ee;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#c0392b;--red2:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none;touch-action:manipulation}

/* ── TOPBAR ── */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;overflow:hidden;text-align:center}
.app-name{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:7px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;display:block}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--text);box-shadow:2px 2px 0 var(--border)}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold-bg);color:var(--gold-dark)}
.btn-red{background:var(--red-bg);color:var(--red2)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-blue{background:var(--blue-bg);color:var(--blue)}
.scorecery-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:inherit;color:#ffffff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111111;text-shadow:1px 1px 0 #111111,2px 2px 0 #111111,3px 3px 0 #111111,5px 5px 0 #4c1d95,7px 7px 0 #2e1158,8px 8px 0 #1a0a33;paint-order:stroke fill}

/* ── PAGE TABS ── */
.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 12px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;flex:1;text-align:center}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── USER SELECT ── */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:150px;box-shadow:3px 3px 0 var(--border)}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}
.user-btn-sub{font-size:8px;font-weight:700;color:var(--muted);margin-top:3px}

/* ── LOCK NOTE ── */
.lock-note{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--red-bg);border-bottom:2px solid var(--border);font-size:10px;font-weight:800;color:var(--red2);flex-shrink:0}

/* ── SUBMIT BAR ── */
.submit-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px;border-top:2px solid var(--border);background:#ffffff;z-index:40}
.submit-btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:900;border:2px solid var(--border);cursor:pointer;background:var(--gold);color:var(--text);font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.submit-btn:active{transform:translate(3px,3px);box-shadow:none}
.submit-btn:disabled{background:var(--border2);color:var(--dim);box-shadow:none;cursor:default}
.picks-progress{font-size:9px;font-weight:700;color:var(--muted);text-align:center;margin-top:5px}

/* Board slot — two-column pill layout */
.board-slot{background:transparent;border:none;border-radius:0;padding:3px 0;margin-bottom:5px;display:flex;align-items:stretch;gap:6px;cursor:pointer;transition:opacity .15s}
.board-slot.dragging{opacity:.35;pointer-events:none}
.board-slot.drag-over .slot-cols{outline:2px dashed var(--blue);border-radius:10px;outline-offset:1px}
.board-slot:active .slot-col{opacity:.8;transform:translate(2px,2px)}
.board-slot.is-reach .slot-col-right{background:#ede9fe;border-color:var(--purple)}
.board-slot.is-modified .slot-col-right{background:var(--blue-bg);border-color:var(--blue)}
.board-slot.has-result .slot-col-right{border-color:var(--green)}
.drag-handle{width:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:.3;touch-action:none;cursor:grab;padding:0 2px}
.drag-handle:active{opacity:.7;cursor:grabbing}
/* two column pill area */
.slot-cols{flex:1;min-width:0;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.slot-col{border-radius:10px;padding:9px 11px;min-width:0;min-height:72px;display:flex;flex-direction:column;justify-content:space-between;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border)}
.slot-col-right{background:#ffffff;border-color:var(--border)}
.slot-col-name{font-size:12px;font-weight:900;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.slot-col-sub{font-size:8px;font-weight:700;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-col-badges{display:flex;align-items:center;gap:3px;margin-top:6px;flex-wrap:wrap}
.slot-right{text-align:right;flex-shrink:0;min-width:42px;display:flex;flex-direction:column;justify-content:center}
.slot-actual{font-size:14px;font-weight:900;line-height:1;color:var(--text)}
.slot-actual-label{font-size:7px;font-weight:700;color:var(--muted)}
.slot-pts{font-size:9px;font-weight:900;margin-top:1px}
.pts-exact{color:var(--gold-dark)}
.pts-close{color:var(--green)}
.pts-near{color:var(--blue)}
.pts-far{color:var(--muted)}
/* pos + need badges (used in cols and swap sheet) */
.pr-pos{min-width:30px;height:22px;padding:0 3px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;flex-shrink:0;border:1px solid var(--border2)}
.pos-c{background:var(--gold-bg);border-color:var(--gold-dark);color:var(--gold-dark)}
.pos-lw{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.pos-rw{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.pos-d{background:var(--red-bg);border-color:var(--red2);color:var(--red2)}
.pos-g{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}
.pos-f{background:#fff5e8;border-color:#d97706;color:#b45309}
.need-badge{font-size:7px;font-weight:900;padding:1px 5px;border-radius:4px;border:1px solid;white-space:nowrap}
.need-c{background:var(--gold-bg);color:var(--gold-dark);border-color:var(--gold-dark)}
.need-lw{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.need-rw{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.need-d{background:var(--red-bg);color:var(--red2);border-color:var(--red2)}
.need-g{background:var(--purple-bg);color:var(--purple);border-color:var(--purple)}
.reach-tag{font-size:7px;font-weight:900;background:var(--purple);color:#fff;border-radius:4px;padding:1px 4px}
/* ── DRAFT BOARD TOOLBAR ── */
.board-wrap{padding:10px 12px 100px}
.board-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.board-toolbar-left{font-size:9px;font-weight:700;color:var(--muted)}
.bench-open-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;background:#ffffff;border:2px solid var(--border);font-size:9px;font-weight:800;color:var(--text);box-shadow:2px 2px 0 var(--border);cursor:pointer}
.bench-open-btn:active{transform:translate(2px,2px);box-shadow:none}
.bench-badge{background:var(--blue);color:#fff;border-radius:10px;padding:1px 6px;font-size:8px;font-weight:900}
.swap-sheet{position:fixed;bottom:0;left:0;right:0;background:#ffffff;border-top:3px solid var(--border);z-index:100;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);max-height:82vh;display:flex;flex-direction:column;border-radius:16px 16px 0 0;box-shadow:0 -4px 0 var(--border)}
.swap-sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:5px;background:var(--border2);border-radius:3px;margin:12px auto 0;display:block;flex-shrink:0}
.swap-header{padding:10px 14px 8px;border-bottom:2px solid var(--border2);flex-shrink:0}
.swap-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.swap-title{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--text)}
.swap-close{font-size:18px;font-weight:900;color:var(--muted);background:none;border:none;cursor:pointer;line-height:1;padding:0}
.swap-current{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--gold-bg);border:2px solid var(--border);border-radius:8px}
.swap-current-label{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--gold-dark);margin-right:2px}
.swap-current-name{font-size:12px;font-weight:900;color:var(--text);flex:1}
.swap-remove-btn{font-size:9px;font-weight:800;padding:4px 8px;border-radius:6px;background:var(--red-bg);color:var(--red2);border:1px solid var(--red2);cursor:pointer}
.swap-search-wrap{padding:8px 14px;border-bottom:1px solid var(--border2);flex-shrink:0}
.swap-search{width:100%;padding:7px 32px 7px 10px;border:2px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);box-sizing:border-box}
.swap-search:focus{outline:none;border-color:var(--blue)}
.swap-list{overflow-y:auto;flex:1}
.swap-section-head{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:8px 14px 4px;background:var(--cream);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:2}
.swap-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border2);cursor:pointer}
.swap-row:active{background:var(--cream)}
.swap-row.on-board{background:var(--blue-bg)}
.swap-row.on-board .swap-row-action{color:var(--blue);font-size:8px;font-weight:800}
.swap-rank{width:22px;font-size:9px;font-weight:900;color:var(--dim);text-align:right;flex-shrink:0}
.swap-row-info{flex:1;min-width:0}
.swap-row-name{font-size:12px;font-weight:900;color:var(--text)}
.swap-row-meta{font-size:8px;font-weight:700;color:var(--muted);margin-top:1px}
.swap-row-action{font-size:9px;font-weight:800;color:var(--green);flex-shrink:0}

/* ── LEADERBOARD ── */
.lb-wrap{padding:14px 12px 80px}
.lb-card{background:#ffffff;border:2px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:4px 4px 0 var(--border)}
.lb-head{padding:10px 14px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:center}
.lb-title{font-size:13px;font-weight:900;color:var(--text)}
.lb-sub{font-size:9px;font-weight:800;color:var(--muted)}
.lb-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border2);flex-wrap:wrap}
.lb-row:last-child{border-bottom:none}
.lb-row.me{background:var(--gold-bg)}
.lb-rank{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;border:2px solid var(--border2)}
.lb-rank.r1{background:var(--gold-bg);border-color:var(--border);color:var(--gold-dark)}
.lb-rank.r2{background:#f5f5f5;border-color:var(--border2);color:var(--muted)}
.lb-rank.r3{background:#fff5e8;border-color:var(--border2);color:#b45309}
.lb-rank.rn{background:#ffffff;border-color:var(--border2);color:var(--dim)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:900;color:var(--text)}
.lb-detail{font-size:9px;font-weight:700;color:var(--muted);margin-top:2px}
.lb-right{text-align:right;flex-shrink:0}
.lb-score{font-size:20px;font-weight:900;color:var(--text);line-height:1}
.lb-score-label{font-size:8px;font-weight:800;color:var(--muted)}
.score-breakdown{width:100%;margin-top:8px;padding:0 2px 4px}
.breakdown-head{display:grid;grid-template-columns:1fr 46px 46px 36px;gap:6px;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:0 0 6px;border-bottom:1px solid var(--border2)}
.breakdown-row{display:grid;grid-template-columns:1fr 46px 46px 36px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2)}
.breakdown-row:last-child{border-bottom:none}
.br-name{font-size:10px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.br-cell{font-size:10px;font-weight:700;color:var(--muted);text-align:center}
.br-pts{font-size:10px;font-weight:900;text-align:right}

/* ── ADMIN ── */
.adm-wrap{padding:14px 12px 80px}
.adm-card{background:#ffffff;border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:4px 4px 0 var(--border)}
.adm-title{font-size:12px;font-weight:900;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border2)}
.adm-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2)}
.adm-row:last-child{border-bottom:none}
.adm-name{font-size:11px;font-weight:800;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-inp{width:64px;padding:5px 8px;font-size:12px;font-weight:800;border:2px solid var(--border);border-radius:7px;background:var(--cream);color:var(--text);font-family:'Nunito',sans-serif;text-align:center}
.score-inp:focus{border-color:var(--blue);outline:none}

/* ── SCORING LEGEND ── */
.scoring-legend{background:var(--cream);border-bottom:2px solid var(--border2);padding:8px 14px}
.legend-title{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.legend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:800;color:var(--text)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── OVERLAY ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99;display:none}
.sheet-overlay.visible{display:block}

/* ── MISC ── */
.fade-up{animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted);font-size:13px;font-weight:800">Loading&#8230;</div></div>
<div id="sheet-overlay" class="sheet-overlay" onclick="closeSwapSheet();closeTbSheet();closeTbPickSheet()"></div>

<!-- Swap sheet -->
<div id="swap-sheet" class="swap-sheet">
  <span class="sheet-handle"></span>
  <div class="swap-header">
    <div class="swap-header-top">
      <div class="swap-title" id="swap-sheet-title">Swap Pick</div>
      <button class="swap-close" onclick="closeSwapSheet()">&#10005;</button>
    </div>
    <div class="swap-current" id="swap-current-row"></div>
  </div>
  <div class="swap-search-wrap">
    <div style="position:relative;display:flex;align-items:center">
      <input class="swap-search" id="swap-search" placeholder="Search by name, school, position…" autocomplete="off" oninput="renderSwapList();document.getElementById('swap-search-clear').style.display=this.value?'flex':'none'">

    </div>
  </div>
  <div class="swap-list" id="swap-list"></div>
</div>

<div id="toast"></div>

// ── HELPERS ────────────────────────────────────────────
function ukey(n){ return String(n||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"_").replace(/[&'.]/g,""); }
function x(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function pkey(p){ return ukey(p.name); }
function prospectByKey(k){ return ALL_PROSPECTS.find(function(p){ return pkey(p)===k; })||null; }
function consensusRank(k){ var i=ALL_PROSPECTS.findIndex(function(p){ return pkey(p)===k; }); return i>=0?i+1:null; }

function posClass(pos){
  if(!pos) return "pos-f";
  switch((pos||"").toUpperCase()){
    case "PG": return "pos-c";   // gold
    case "SG": return "pos-rw";  // blue
    case "SF": return "pos-lw";  // green
    case "PF": return "pos-d";   // red
    case "C":  return "pos-g";   // purple
    default:   return "pos-f";
  }
}

function needClass(pos){
  switch((pos||"").toUpperCase()){
    case "PG": return "need-c";
    case "SG": return "need-rw";
    case "SF": return "need-lw";
    case "PF": return "need-d";
    case "C":  return "need-g";
    default:   return "need-d";
  }
}

function scoreGuess(guess, actual){
  var diff=Math.abs(Number(guess)-Number(actual));
  for(var i=0;i<SCORING.length;i++){
    if(diff<=SCORING[i].maxDiff) return {pts:SCORING[i].pts,diff:diff,label:SCORING[i].label,cls:SCORING[i].cls};
  }
  return {pts:0,diff:diff,label:"Miss",cls:"pts-far"};
}

// Build guesses map from board: { prospectKey: pickNumber }
function boardToGuesses(b){
  var g={};
  for(var i=0;i<b.length;i++){ if(b[i]) g[b[i]]=i+1; }
  return g;
}

function calcTotal(guesses){
  var total=0, hasResult=false;
  ALL_PROSPECTS.forEach(function(p){
    var actual=ST.results[pkey(p)], guess=guesses?guesses[pkey(p)]:null;
    if(actual&&guess){ hasResult=true; var s=scoreGuess(guess,actual); if(s) total+=s.pts; }
  });
  return hasResult?total:null;
}

function countGuesses(guesses){
  if(!guesses) return 0;
  var n=0;
  ALL_PROSPECTS.forEach(function(p){ if(guesses[pkey(p)]) n++; });
  return n;
}

function savedGuesses(){
  if(!ST.user) return null;
  var s=ST.picks[ukey(ST.user)];
  return (s&&s.guesses)?s.guesses:null;
}

// Initialize board from saved guesses, or default to consensus
function initBoard(){
  var saved=savedGuesses();
  if(saved && Object.keys(saved).filter(function(k){ return k.indexOf('__')<0; }).length>0){
    // Rebuild board array from saved guesses (ignore __tb1/__tb2 keys)
    var b=new Array(30).fill(null);
    Object.keys(saved).forEach(function(pk){
      if(pk.indexOf('__')===0) return; // skip tiebreaker keys
      var slot=Number(saved[pk])-1;
      if(slot>=0&&slot<30) b[slot]=pk;
    });
    // Fill any empty slots from consensus
    var used={};
    b.forEach(function(k){ if(k) used[k]=true; });
    var benchFill=CONSENSUS_BOARD.filter(function(p){ return !used[pkey(p)]; }).map(pkey);
    var fi=0;
    for(var i=0;i<30;i++){
      if(!b[i]&&fi<benchFill.length){ b[i]=benchFill[fi++]; }
    }
    board=b;
  } else {
    board=CONSENSUS_BOARD.map(pkey);
  }
  boardDirty=false;
  // Load tiebreakers from saved data, or pre-fill with picks 31/32 consensus
  tiebreakers=[
    (saved&&saved.__tb1) ? {key:saved.__tb1.key, pick:saved.__tb1.pick} : {key:pkey({name:"Sergio de Larrea"}), pick:31},
    (saved&&saved.__tb2) ? {key:saved.__tb2.key, pick:saved.__tb2.pick} : {key:pkey({name:"Zuby Ejiofor"}),     pick:32}
  ];
}

// Push current board state onto undo stack
function pushHistory(){
  boardHistory.push(board.slice());
  if(boardHistory.length > 20) boardHistory.shift();
}

function resetBoard(){
  if(!confirm("Reset board to consensus order?")) return;
  pushHistory();
  board = CONSENSUS_BOARD.map(pkey);
  boardDirty = true;
  draw();
  saveBoard();
  toast("Board reset to consensus");
}

function undoBoard(){
  if(!boardHistory.length){ toast("Nothing to undo"); return; }
  board = boardHistory.pop();
  boardDirty = true;
  draw();
  saveBoard();
  toast("Undone");
}

// Keys currently on the board
function boardKeys(){ return board.filter(Boolean); }

// Keys on the bench (all 60 minus board)
function benchKeys(){
  var bk={}; boardKeys().forEach(function(k){ bk[k]=true; });
  return ALL_PROSPECTS.filter(function(p){ return !bk[pkey(p)]; }).map(pkey);
}

// Is this key a reach (not in consensus top 32)?
function isReach(k){ return ALL_PROSPECTS.findIndex(function(p){ return pkey(p)===k; })>=32; }

// Is this board different from consensus?
function isModified(slotIdx){
  var consensusKey=pkey(CONSENSUS_BOARD[slotIdx]);
  return board[slotIdx] && board[slotIdx]!==consensusKey;
}

function renderLeaderboard(){
  var entries=[];
  PARTS.forEach(function(name){
    var uk=ukey(name), s=ST.picks[uk], guesses=s?(s.guesses||{}):{};
    entries.push({name:name,uk:uk,guesses:guesses,total:calcTotal(guesses),n:Object.keys(guesses).length});
  });
  var hasResults=Object.keys(ST.results).length>0;
  if(hasResults) entries.sort(function(a,b){
    if(a.total===null&&b.total===null) return 0;
    if(a.total===null) return 1; if(b.total===null) return -1;
    return b.total-a.total;
  });

  var h='<div class="lb-wrap fade-up"><div class="lb-card">';
  h+='<div class="lb-head"><span class="lb-title">&#128202; Leaderboard</span><span class="lb-sub">'+entries.filter(function(e){return e.n>0;}).length+' entries &middot; '+(hasResults?"Results in":"Awaiting draft")+'</span></div>';
  if(!entries.length) h+='<div style="padding:40px 20px;text-align:center;color:var(--dim);font-size:12px;font-weight:800">No participants yet</div>';

  entries.forEach(function(e,i){
    var rn=i+1, rankCls=rn===1?"r1":rn===2?"r2":rn===3?"r3":"rn";
    var isMe=ST.user&&ukey(ST.user)===e.uk;
    var isExpanded=ST.expandedLb===e.uk;
    h+='<div class="lb-row'+(isMe?" me":"")+'" data-lb="'+e.uk+'" style="cursor:'+(e.n>0&&hasResults?"pointer":"default")+'">';
    h+='<div class="lb-rank '+rankCls+'">'+(hasResults?rn:"&#8211;")+'</div>';
    h+='<div class="lb-info"><div class="lb-name">'+x(e.name)+'</div><div class="lb-detail">'+(e.n>0?e.n+" picks on board":"No picks yet")+'</div></div>';
    h+='<div class="lb-right">';
    if(e.total!==null){ h+='<div class="lb-score">'+e.total+'</div><div class="lb-score-label">pts</div>'; }
    else { h+='<div class="lb-score" style="color:var(--dim)">&#8211;</div><div class="lb-score-label">'+(e.n>0?"no results":"no picks")+'</div>'; }
    h+='</div>';
    if(isExpanded&&e.n>0&&hasResults){
      h+='<div class="score-breakdown">';
      h+='<div class="breakdown-head"><span>Prospect</span><span style="text-align:center">Guess</span><span style="text-align:center">Actual</span><span style="text-align:right">Pts</span></div>';
      ALL_PROSPECTS.forEach(function(p){
        var pk=pkey(p), guess=e.guesses[pk], actual=ST.results[pk];
        if(!guess&&!actual) return;
        var sc=(guess&&actual)?scoreGuess(guess,actual):null;
        h+='<div class="breakdown-row"><div class="br-name">'+x(p.name)+'</div><div class="br-cell">'+(guess?"#"+guess:"&#8211;")+'</div><div class="br-cell">'+(actual?"#"+actual:"&#8211;")+'</div><div class="br-pts '+(sc?sc.cls:'')+'">'+(sc?"+"+sc.pts:"&#8211;")+'</div></div>';
      });

// ── SWAP SHEET ─────────────────────────────────────────
function openSwapSheet(slotIdx){
  if(ST.locked){ toast("&#128274; Picks are locked"); return; }
  swapSlot=slotIdx;
  var curKey=board[slotIdx]||null;
  var curP=curKey?prospectByKey(curKey):null;

  document.getElementById("swap-sheet-title").textContent="Pick #"+(slotIdx+1);
  var draftTeam=DRAFT_ORDER[slotIdx]||null;
  var titleEl=document.getElementById("swap-sheet-title");
  if(draftTeam){
    var needsHtml=draftTeam.needs.map(function(n){ return '<span class="need-badge '+needClass(n)+'">'+n+'</span>'; }).join(" ");
    titleEl.innerHTML='Pick #'+(slotIdx+1)+' &mdash; '+x(draftTeam.abbr)+' &nbsp;'+needsHtml;
  } else {
    titleEl.textContent="Pick #"+(slotIdx+1);
  }
  var cur=document.getElementById("swap-current-row");
  if(curP){
    cur.innerHTML='<span class="swap-current-label">Current:</span><span class="swap-current-name">'+x(curP.name)+'</span><button class="swap-remove-btn" id="b-swap-remove">Remove</button>';
  } else {
    cur.innerHTML='<span class="swap-current-label">Current:</span><span class="swap-current-name" style="color:var(--dim)">Empty</span>';
  }

  var si=document.getElementById("swap-search"); if(si) si.value="";
  var sc=document.getElementById("swap-search-clear"); if(sc) sc.style.display="none";
  renderSwapList();
  document.getElementById("swap-sheet").classList.add("open");
  document.getElementById("sheet-overlay").classList.add("visible");
  setTimeout(function(){ var si=document.getElementById("swap-search"); if(si) si.focus(); },300);
}

function closeSwapSheet(){
  document.getElementById("swap-sheet").classList.remove("open");
  document.getElementById("sheet-overlay").classList.remove("visible");
  swapSlot=null;
}

function renderSwapList(){
  var si=document.getElementById("swap-search");
  var q=(si?si.value:"").trim().toLowerCase();
  var el=document.getElementById("swap-list"); if(!el) return;

  var onBoard={}; board.forEach(function(k,i){ if(k) onBoard[k]=i; });
  var curKey=swapSlot!==null?board[swapSlot]:null;

  // Build full list — all 60, sorted by consensus rank
  var filtered=ALL_PROSPECTS.filter(function(p){
    if(!q) return true;
    var haystack=(p.name+' '+p.pos+' '+(p.school||'')).toLowerCase();
    return haystack.indexOf(q)>=0;
  });

  if(!filtered.length){ el.innerHTML='<div style="padding:30px 20px;text-align:center;color:var(--dim);font-size:11px;font-weight:700">No prospects match</div>'; return; }

  var html="";
  var shownBoardHead=false, shownBenchHead=false;

  filtered.forEach(function(p){
    var pk=pkey(p), cr=ALL_PROSPECTS.indexOf(p)+1;
    var onBd=onBoard.hasOwnProperty(pk);
    var isCurrent=pk===curKey;
    var inBench=cr>32;

    if(!inBench&&!shownBoardHead&&!q){ html+='<div class="swap-section-head">&#127942; Consensus Top 32</div>'; shownBoardHead=true; }
    if(inBench&&!shownBenchHead&&!q){ html+='<div class="swap-section-head">&#128203; Extended Pool</div>'; shownBenchHead=true; }

    var rowCls="swap-row"+(onBd?" on-board":"");
    var action=isCurrent?"&#10003; Current":onBd?"On board (swap)":"+ Select";
    var rankTags="";
    if(p.espn) rankTags+='<span style="font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;background:#cc0000;color:#fff">ESPN '+p.espn+'</span> ';
    if(p.yahoo) rankTags+='<span style="font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;background:#7c3aed;color:#fff">YHO '+p.yahoo+'</span>';
    if(p.tank) rankTags+='<span style="font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;background:#d56e00;color:#fff">TNK '+p.tank+'</span>';
    html+='<div class="'+rowCls+'" data-swap-key="'+pk+'">';
    html+='<div class="swap-rank">'+(cr<=30?cr:"")+'</div>';
    html+='<div class="pr-pos '+posClass(p.pos)+'">'+x(p.pos)+'</div>';
    html+='<div class="swap-row-info"><div class="swap-row-name">'+x(p.name)+'</div><div class="swap-row-meta">'+x(p.school)+(rankTags?' &middot; '+rankTags:'')+'</div></div>';
    html+='<div class="swap-row-action">'+action+'</div>';
    html+='</div>';
  });

  el.innerHTML=html;

  // Bind swap row clicks
  var rows=el.querySelectorAll("[data-swap-key]");
  for(var i=0;i<rows.length;i++) rows[i].addEventListener("click", function(){
    doSwap(this.getAttribute("data-swap-key"));
  });

  // Remove button
  var rb=document.getElementById("b-swap-remove");
  if(rb) rb.addEventListener("click", function(e){ e.stopPropagation(); doRemove(); });
}

function doSwap(incomingKey){
  if(swapSlot===null) return;
  pushHistory();
  var onBoard={}; board.forEach(function(k,i){ if(k) onBoard[k]=i; });

  if(onBoard.hasOwnProperty(incomingKey)){
    // Already on board — swap the two slots
    var otherSlot=onBoard[incomingKey];
    var tmp=board[swapSlot];
    board[swapSlot]=board[otherSlot];
    board[otherSlot]=tmp;
  } else {
    // Not on board — place into this slot, displaced prospect goes to bench automatically
    board[swapSlot]=incomingKey;
    // (displaced key just falls off board into the bench — no explicit action needed)
  }
  boardDirty=true;
  closeSwapSheet();
  draw();
  saveBoard();
}

function doRemove(){
  if(swapSlot===null) return;
  pushHistory();
  // Auto-fill with first bench prospect not already on board
  var onBoard={}; board.forEach(function(k){ if(k) onBoard[k]=true; });
  var fill=ALL_PROSPECTS.find(function(p){ return !onBoard[pkey(p)]&&pkey(p)!==board[swapSlot]; });
  board[swapSlot]=fill?pkey(fill):null;
  boardDirty=true;
  closeSwapSheet();
  draw();
  saveBoard();
  toast("Auto-filled from bench");
}

// ── SAVE BOARD ─────────────────────────────────────────
function saveBoard(){
  if(!ST.user||ST.locked) return;
  var guesses=boardToGuesses(board);
  if(tiebreakers[0]) guesses.__tb1={key:tiebreakers[0].key, pick:tiebreakers[0].pick};
  if(tiebreakers[1]) guesses.__tb2={key:tiebreakers[1].key, pick:tiebreakers[1].pick};
  var uk=ukey(ST.user);
  var obj={name:ST.user, guesses:guesses, ts:Date.now()};
  if(DB){ DB.ref(BASE+"/picks/"+uk).set(obj, function(err){
    if(err){ toast("Error saving"); return; }
    ST.picks[uk]=obj;
    boardDirty=false;
    toast("&#10003; Board saved!");
    draw();
  }); } else toast("No database connection");
}

function toggleLock(){
  ST.locked=!ST.locked;
  if(DB) DB.ref(BASE+"/meta/locked").set(ST.locked);
  draw(); toast(ST.locked?"&#128274; Picks locked":"&#128275; Picks unlocked");
}

function saveResults(){
  var inputs=document.querySelectorAll(".score-inp[data-result-key]"), updates={};
  for(var i=0;i<inputs.length;i++){
    var inp=inputs[i], val=inp.value.trim(), pk=inp.getAttribute("data-result-key");
    if(val&&!isNaN(val)&&Number(val)>0){ updates[pk]=Number(val); ST.results[pk]=Number(val); }
    else delete ST.results[pk];
  }
  if(DB) DB.ref(BASE+"/results").set(Object.keys(updates).length?updates:null, function(){
    toast("&#10003; Results saved");
    writeAllPoolResults();
    draw();
  });
  else { toast("No DB"); draw(); }
}

// ── POOL RESULT WRITER ─────────────────────────────────
function writeAllPoolResults(){
  if(!DB||!GROUP_ID) return;
  var results=ST.results;
  if(Object.keys(results).length < 18) return; // wait for most results

  var ranked=[];
  PARTS.forEach(function(name){
    var uk=ukey(name), s=ST.picks[uk], guesses=s?s.guesses||{}:{};
    var total=0, exactPicks=0, hasResult=false;
    ALL_PROSPECTS.forEach(function(p){
      var actual=results[pkey(p)], guess=guesses[pkey(p)];
      if(actual&&guess){
        hasResult=true;
        var sc=scoreGuess(guess,actual);
        if(sc){ total+=sc.pts; if(sc.diff===0) exactPicks++; }
      }
    });
    if(hasResult) ranked.push({name:name,uk:uk,total:total,exactPicks:exactPicks});
  });
  ranked.sort(function(a,b){ return b.total-a.total; });
  if(!ranked.length) return;

  var firstScore=ranked[0].total, secondScore=ranked[1]?ranked[1].total:null;
  var admin=(PARTS&&PARTS[0])||"";
  var adminEntry=ranked.find(function(r){ return r.name===admin; });
  var adminRank=adminEntry?ranked.indexOf(adminEntry)+1:0;

  ranked.forEach(function(e,i){
    var myRank=i+1, margin=(myRank===1&&secondScore!==null)?firstScore-secondScore:null;
    DB.ref("users/"+e.uk+"/stats/poolResults/"+POOL_ID+"_"+GROUP_ID.replace(/[^a-z0-9_]/gi,"")).set({
      poolId:POOL_ID, poolName:"NBA Draft Pool", poolSport:"Basketball",
      groupId:GROUP_ID, groupName:GROUP_ID, year:2026, ts:Date.now(),
      myRank:myRank, totalPlayers:ranked.length, myScore:e.total,
      margin:margin, isGolf:false, hasSalary:false, isDraft:true,
      exactPicks:e.exactPicks, admin:admin, adminRank:adminRank,
      capRemaining:null, allVAL:false, allCut:false,
      pickCount:30, picksUnderPar:null, correctPct:null
    });
  });
  if(ranked[0]) DB.ref("users/"+ranked[0].uk+"/trophies/"+POOL_ID+"_"+GROUP_ID.replace(/[^a-z0-9_]/gi,"")).set({
    poolId:POOL_ID, poolName:"NBA Draft Pool", poolIcon:"\uD83C\uDFC0",
    finish:1, pts:ranked[0].total, groupName:GROUP_ID, year:2026, ts:Date.now()
  });
}

// ── LISTENERS ──────────────────────────────────────────
function attachListeners(){
  var els, i, el;

  els=document.querySelectorAll(".ptab[data-page]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ ST.page=this.getAttribute("data-page"); draw(); });

  els=document.querySelectorAll("[data-user]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ ST.user=this.getAttribute("data-user"); initBoard(); draw(); });

  el=document.getElementById("b-switch"); if(el) el.addEventListener("click",function(){ ST.user=null; ST.page="picks"; draw(); });
  el=document.getElementById("b-admin");  if(el) el.addEventListener("click",function(){ if(ST.admin){ ST.admin=false; if(ST.page==="results") ST.page="picks"; draw(); } else showAdminPrompt(); });
  el=document.getElementById("b-submit"); if(el) el.addEventListener("click",saveBoard);
  el=document.getElementById("b-bench");  if(el) el.addEventListener("click", openBenchMode);
  el=document.getElementById("b-undo");   if(el) el.addEventListener("click", undoBoard);
  el=document.getElementById("b-reset");  if(el) el.addEventListener("click", resetBoard);
  el=document.getElementById("b-lock");   if(el) el.addEventListener("click",toggleLock);
  el=document.getElementById("b-save-results"); if(el) el.addEventListener("click",saveResults);

  els=document.querySelectorAll("[data-lb]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ var uk=this.getAttribute("data-lb"); ST.expandedLb=ST.expandedLb===uk?null:uk; draw(); });

  // Board slot taps — skip if the tap originated on the drag handle
  els=document.querySelectorAll(".board-slot[data-slot]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(e){
    if(ST.locked) return;
    if(e.target && e.target.closest && e.target.closest("[data-drag-handle]")) return;
    openSwapSheet(Number(this.getAttribute("data-slot")));
  });

  // Tiebreaker taps
  els=document.querySelectorAll("[data-tb]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    if(ST.locked) return;
    openTiebreakerSheet(Number(this.getAttribute("data-tb")));
  });

  // Init drag-to-reorder
  initDrag();
}

// Open bench mode: open swap sheet so user can browse extended pool
function openBenchMode(){
  // Find first empty slot, fall back to slot 0
  var slot=0;
  for(var i=0;i<board.length;i++){ if(!board[i]){ slot=i; break; } }
  openSwapSheet(slot);
  // Pre-clear search so the extended section is visible
  var si=document.getElementById("swap-search");
  if(si){ si.value="reach "; renderSwapList(); si.value=""; renderSwapList(); }
}

// ── DRAG AND DROP ──────────────────────────────────────
var drag = {
  active: false,
  fromSlot: null,
  ghost: null,
  startY: 0,
  lastOverSlot: null,
  moved: false,
  scrollRaf: null
};

var SCROLL_ZONE = 80;   // px from top/bottom edge to trigger scroll
var SCROLL_SPEED = 10;  // px per frame

function initDrag(){
  var handles = document.querySelectorAll("[data-drag-handle]");
  for(var i=0;i<handles.length;i++){
    handles[i].addEventListener("touchstart", onDragStart, {passive:false});
    handles[i].addEventListener("mousedown",  onDragStart);
  }
}

function onDragStart(e){
  if(ST.locked) return;
  var handle = e.currentTarget;
  var slot = Number(handle.getAttribute("data-drag-handle"));
  var row = handle.parentElement;
  if(!row) return;

  e.preventDefault();
  drag.active      = true;
  drag.fromSlot    = slot;
  drag.lastOverSlot = slot;
  drag.startY      = (e.touches ? e.touches[0].clientY : e.clientY);
  drag.moved       = false;

  // Ghost — styled to match the right (player) pill
  var p = board[slot] ? prospectByKey(board[slot]) : null;
  var ghost = document.createElement("div");
  ghost.style.cssText = [
    "position:fixed",
    "left:50%",
    "transform:translateX(-50%) translateY(-50%)",
    "z-index:200",
    "opacity:0",
    "pointer-events:none",
    "transition:opacity .12s",
    "background:#ffffff",
    "border:2px solid #111111",
    "border-radius:10px",
    "box-shadow:3px 3px 0 #111111,0 8px 24px rgba(0,0,0,.22)",
    "padding:9px 14px",
    "min-width:160px",
    "max-width:240px",
    "font-family:'Nunito',sans-serif"
  ].join(";");
  if(p){
    var posCls = posClass(p.pos);
    var posColor = posCls==="pos-c"?"#b89a00":posCls==="pos-lw"?"#5dba4a":posCls==="pos-rw"?"#5590e8":posCls==="pos-d"?"#e85555":posCls==="pos-g"?"#9955e8":"#b45309";
    var posBg   = posCls==="pos-c"?"#fffbe8":posCls==="pos-lw"?"#edfae8":posCls==="pos-rw"?"#e8f0ff":posCls==="pos-d"?"#ffe8e8":posCls==="pos-g"?"#f5e8ff":"#fff5e8";
    ghost.innerHTML =
      '<div style="font-size:12px;font-weight:900;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+x(p.name)+'</div>'+
      '<div style="font-size:8px;font-weight:700;color:#777;margin-top:2px;white-space:nowrap">'+x(p.school)+'</div>'+
      '<div style="margin-top:6px;display:flex;align-items:center;gap:4px">'+
        '<span style="font-size:8px;font-weight:900;padding:1px 5px;border-radius:5px;border:1px solid '+posColor+';background:'+posBg+';color:'+posColor+'">'+x(p.pos)+'</span>'+
        (p.espn?'<span style="font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;background:#cc0000;color:#fff">ESPN '+p.espn+'</span> ':'')+
        (p.yahoo?'<span style="font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;background:#7c3aed;color:#fff">YHO '+p.yahoo+'</span>':'')+
        (p.tank?'<span style="font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;background:#d56e00;color:#fff">TNK '+p.tank+'</span>':'')+
      '</div>';
  } else {
    ghost.innerHTML = '<div style="font-size:12px;font-weight:900;color:#111">Pick #'+(slot+1)+'</div>';
  }
  document.body.appendChild(ghost);
  drag.ghost = ghost;

  row.classList.add("dragging");

  document.addEventListener("touchmove",  onDragMove, {passive:false});
  document.addEventListener("touchend",   onDragEnd);
  document.addEventListener("mousemove",  onDragMove);
  document.addEventListener("mouseup",    onDragEnd);
}

function onDragMove(e){
  if(!drag.active) return;
  e.preventDefault();
  var clientY = e.touches ? e.touches[0].clientY : e.clientY;

  // Show ghost on first movement
  if(!drag.moved && Math.abs(clientY - drag.startY) > 6){
    drag.moved = true;
    if(drag.ghost) drag.ghost.style.opacity = "1";
  }
  if(drag.ghost) drag.ghost.style.top = clientY + "px";

  // Edge auto-scroll
  cancelAnimationFrame(drag.scrollRaf);
  var vh = window.innerHeight;
  if(clientY < SCROLL_ZONE){
    var speed = SCROLL_SPEED * (1 - clientY / SCROLL_ZONE);
    drag.scrollRaf = requestAnimationFrame(function scroll(){
      if(!drag.active) return;
      window.scrollBy(0, -speed);
      drag.scrollRaf = requestAnimationFrame(scroll);
    });
  } else if(clientY > vh - SCROLL_ZONE){
    var speed2 = SCROLL_SPEED * ((clientY - (vh - SCROLL_ZONE)) / SCROLL_ZONE);
    drag.scrollRaf = requestAnimationFrame(function scroll2(){
      if(!drag.active) return;
      window.scrollBy(0, speed2);
      drag.scrollRaf = requestAnimationFrame(scroll2);
    });
  }

  // Find which slot we're over
  var rows = document.querySelectorAll(".board-slot[data-slot]");
  var overSlot = null;
  for(var i=0;i<rows.length;i++){
    var r = rows[i];
    var rect = r.getBoundingClientRect();
    if(clientY >= rect.top && clientY <= rect.bottom){
      overSlot = Number(r.getAttribute("data-slot"));
      break;
    }
  }

  // Update drag-over highlight
  if(overSlot !== null && overSlot !== drag.lastOverSlot){
    if(drag.lastOverSlot !== null){
      var prev = document.querySelector(".board-slot[data-slot='"+drag.lastOverSlot+"']");
      if(prev) prev.classList.remove("drag-over");
    }
    var cur = document.querySelector(".board-slot[data-slot='"+overSlot+"']");
    if(cur) cur.classList.add("drag-over");
    drag.lastOverSlot = overSlot;
  }
}

function onDragEnd(e){
  if(!drag.active) return;
  drag.active = false;
  cancelAnimationFrame(drag.scrollRaf);

  document.removeEventListener("touchmove",  onDragMove);
  document.removeEventListener("touchend",   onDragEnd);
  document.removeEventListener("mousemove",  onDragMove);
  document.removeEventListener("mouseup",    onDragEnd);

  // Remove ghost
  if(drag.ghost){ drag.ghost.remove(); drag.ghost = null; }

  // Remove visual states
  var rows = document.querySelectorAll(".board-slot");
  for(var i=0;i<rows.length;i++){
    rows[i].classList.remove("dragging","drag-over");
  }

  var from = drag.fromSlot;
  var to   = drag.lastOverSlot;

  if(to !== null && to !== from && to >= 0 && to < board.length){
    pushHistory();
    // Reorder: move item from `from` to `to`, shifting others
    var moved = board.splice(from, 1)[0];
    board.splice(to, 0, moved);
    boardDirty = true;
    draw();
    saveBoard();
    toast("Moved to pick #"+(to+1));
  }

  drag.fromSlot    = null;
  drag.lastOverSlot = null;
}

// ── TIEBREAKER ─────────────────────────────────────────
var activeTb = null;      // 0 or 1
var tbPickNum = null;
var tbPickingKey = null;  // prospect key selected in tb sheet

function openTiebreakerSheet(idx){
  activeTb = idx;
  var tbData = tiebreakers[idx];
  document.getElementById("tb-sheet-title").textContent = "Tiebreaker "+(idx===0?"A":"B");
  var cur = document.getElementById("tb-current-row");
  if(tbData){
    var p=prospectByKey(tbData.key);
    cur.innerHTML='<span class="swap-current-label">Current:</span><span class="swap-current-name">'+(p?x(p.name):"?")+'</span><button class="swap-remove-btn" id="tb-remove-btn">Remove</button>';
  } else {
    cur.innerHTML='<span class="swap-current-label">Pick a prospect</span>';
  }
  var si=document.getElementById("tb-search"); if(si) si.value="";
  renderTbList();
  document.getElementById("tb-sheet").classList.add("open");
  document.getElementById("sheet-overlay").classList.add("visible");
  // Bind remove
  var rb=document.getElementById("tb-remove-btn");
  if(rb) rb.addEventListener("click",function(e){ e.stopPropagation(); tiebreakers[activeTb]=null; closeTbSheet(); draw(); toast("Tiebreaker cleared"); });
}

function closeTbSheet(){
  document.getElementById("tb-sheet").classList.remove("open");
  document.getElementById("sheet-overlay").classList.remove("visible");
  activeTb=null;
}

function renderTbList(){
  var si=document.getElementById("tb-search");
  var q=(si?si.value:"").trim().toLowerCase();
  var el=document.getElementById("tb-list"); if(!el) return;
  // Show all 60 prospects (they can pick anyone including bench)
  var filtered=ALL_PROSPECTS.filter(function(p){
    if(!q) return true;
    return p.name.toLowerCase().indexOf(q)>=0||p.pos.toLowerCase().indexOf(q)>=0||p.school.toLowerCase().indexOf(q)>=0;
  });
  var html="";
  filtered.forEach(function(p){
    var pk=pkey(p), cr=ALL_PROSPECTS.indexOf(p)+1;
    var isCurrent=tiebreakers[activeTb]&&tiebreakers[activeTb].key===pk;
    html+='<div class="swap-row" data-tb-key="'+pk+'">';
    html+='<div class="swap-rank">'+(cr<=30?cr:"")+'</div>';
    html+='<div class="pr-pos '+posClass(p.pos)+'">'+x(p.pos)+'</div>';
    var rankTags="";
    if(p.espn) rankTags+='<span style="font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;background:#cc0000;color:#fff">ESPN '+p.espn+'</span> ';
    if(p.yahoo) rankTags+='<span style="font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;background:#7c3aed;color:#fff">YHO '+p.yahoo+'</span>';
    if(p.tank) rankTags+='<span style="font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;background:#d56e00;color:#fff">TNK '+p.tank+'</span>';
    html+='<div class="swap-row-info"><div class="swap-row-name">'+x(p.name)+'</div><div class="swap-row-meta">'+x(p.school)+(rankTags?' &middot; '+rankTags:'')+'</div></div>';
    html+='<div class="swap-row-action">'+(isCurrent?"&#10003; Current":"+ Select")+'</div>';
    html+='</div>';
  });
  el.innerHTML=html;
  var rows=el.querySelectorAll("[data-tb-key]");
  for(var i=0;i<rows.length;i++) rows[i].addEventListener("click",function(){
    tbPickingKey=this.getAttribute("data-tb-key");
    closeTbSheet();
    openTbPickSheet(tbPickingKey);
  });
}

function openTbPickSheet(pk){
  var p=prospectByKey(pk); if(!p) return;
  var existing=tiebreakers[activeTb!==null?activeTb:0];
  tbPickNum=(existing&&existing.key===pk)?existing.pick:null;
  document.getElementById("tb-pick-title").textContent="Tiebreaker "+(activeTb===0?"A":"B")+" — Guess their pick";
  document.getElementById("tb-pick-info").innerHTML='<div class="sp-name">'+x(p.name)+'</div><div class="sp-meta">'+x(p.pos)+' &middot; '+x(p.school)+'</div>';
  updateTbPickDisplay();
  document.getElementById("tb-pick-sheet").classList.add("open");
  document.getElementById("sheet-overlay").classList.add("visible");
}

function closeTbPickSheet(){
  document.getElementById("tb-pick-sheet").classList.remove("open");
  document.getElementById("sheet-overlay").classList.remove("visible");
  tbPickingKey=null;
}

function updateTbPickDisplay(){
  var d=document.getElementById("tb-pick-display"), btn=document.getElementById("tb-pick-save");
  if(tbPickNum){ d.textContent="#"+tbPickNum; d.classList.remove("unset"); btn.disabled=false; }
  else { d.innerHTML="&#8211;"; d.classList.add("unset"); btn.disabled=true; }
}

function stepTbPick(dir){
  var cur=tbPickNum||0;
  if(!tbPickNum&&dir>0) cur=0;
  if(!tbPickNum&&dir<0) cur=61;
  tbPickNum=Math.max(1,Math.min(60,cur+dir));
  updateTbPickDisplay();
}

function saveTbPick(){
  if(!tbPickingKey||!tbPickNum) return;
  var idx=activeTb!==null?activeTb:0;
  tiebreakers[idx]={key:tbPickingKey, pick:tbPickNum};
  closeTbPickSheet();
  // Tiebreakers persist when user hits Save Board — no separate write needed
  boardDirty=true;
  draw();
  saveBoard();
  toast("Tiebreaker set &#10003;");
}

// ── FIREBASE LOAD ──────────────────────────────────────
function loadData(){
  if(!DB){ draw(); return; }
  function loadGroup(){
    if(!GROUP_ID){ loadPool(); return; }
    DB.ref("groups/"+GROUP_ID).once("value",function(sn){
      var g=sn.val()||{};
      if(g.adminPw) GROUP_ADMIN_PW=g.adminPw;
      if(g.players&&g.players.length) PARTS=g.players;
      loadPool();
    }, function(){ loadPool(); });
  }
  function loadPool(){
    DB.ref("globalSettings/masterPw").on("value",function(sn){ if(sn.val()) MASTER_PW=sn.val(); });
    DB.ref(BASE+"/meta/locked").on("value",function(sn){ ST.locked=!!sn.val(); draw(); });
    DB.ref(BASE+"/picks").on("value",function(sn){
      ST.picks=sn.val()||{};
      if(ST.user) initBoard();
      draw();
    });
    DB.ref(BASE+"/results").on("value",function(sn){ ST.results=sn.val()||{}; draw(); });
    if(URL_USER&&PARTS.indexOf(URL_USER)>=0){ ST.user=URL_USER; initBoard(); }
    draw();
  }
  loadGroup();
}
loadData();
</script>

  </div>
  <div class="swap-search-wrap">
    <div style="position:relative;display:flex;align-items:center">
      <input class="swap-search" id="tb-search" placeholder="Search by name, school, position…" autocomplete="off" oninput="renderTbList();document.getElementById('tb-search-clear').style.display=this.value?'flex':'none'">
      <button id="tb-search-clear" onclick="document.getElementById('tb-search').value='';renderTbList();this.style.display='none'" style="display:none;position:absolute;right:8px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;font-weight:900;padding:0 4px;line-height:1">&#10005;</button>
    </div>
  </div>
  <div class="swap-list" id="tb-list"></div>
</div>

<div id="tb-pick-sheet" class="swap-sheet">

  <div class="sheet-title" id="tb-pick-title">Guess the Pick</div>
  <div id="tb-pick-info" class="sheet-prospect"></div>

  <div class="sheet-actions">

  </div>
</div>
