<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – World Cup Game Picks</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#f8f5f0;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee;--shadow:#111111
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,a{font-family:'Nunito',sans-serif;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button{border:none;outline:none}
a{color:inherit;text-decoration:none}

/* TOPBAR */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.header-center{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0;overflow:hidden}
.header-logo{font-size:16px;line-height:1.1}
.header-sub{font-size:7px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.tag{background:var(--gold-bg);border:2px solid var(--border);border-radius:20px;padding:4px 10px;font-size:9px;color:var(--text);font-weight:800;box-shadow:3px 3px 0 var(--border)}
.btn{border-radius:8px;padding:5px 12px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border);transition:transform .1s,box-shadow .1s;font-family:'Nunito',sans-serif}
.btn:active{transform:translate(3px,3px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold);color:var(--text)}

/* PAGE TABS */
.page-bar{background:#ffffff;border-bottom:3px solid var(--border);display:flex;padding:0;overflow-x:auto}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:10px 6px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:4px solid transparent;background:none;white-space:nowrap;flex:1;text-align:center;font-family:'Nunito',sans-serif}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* SCORECERY logo */
.scorecery-logo{
  font-family:'Nunito',sans-serif;
  font-weight:900;
  font-size:inherit;
  color:#ffffff;
  text-transform:uppercase;
  letter-spacing:.05em;
  -webkit-text-stroke:3px #111111;
  text-shadow:
    1px 1px 0 #111111,
    2px 2px 0 #111111,
    3px 3px 0 #111111,
    5px 5px 0 #1a4fd6,
    7px 7px 0 #0a2088,
    8px 8px 0 #060e44;
  paint-order:stroke fill;
}

/* GAME PICKS */
.gp-record{display:flex;align-items:center;justify-content:center;gap:14px;padding:12px;background:var(--cream);border-bottom:2px solid var(--border2)}
.gp-record .gp-rec-num{font-size:20px;font-weight:900}
.gp-record .gp-rec-lbl{font-size:8px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.gp-card{background:var(--card);border:2px solid var(--border);border-radius:10px;margin:10px 12px;padding:10px;box-shadow:3px 3px 0 var(--border)}
.gp-date{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;text-align:center}
.gp-bug{display:flex;align-items:center}
.gp-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;text-align:center}
.gp-flag{font-size:24px}
.gp-code{font-size:12px;font-weight:900;color:var(--text);letter-spacing:.03em}
.gp-score{font-size:14px;font-weight:900;color:var(--text)}
.gp-center{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 10px;min-width:50px}
.gp-time{font-size:12px;font-weight:900;color:var(--text);white-space:nowrap}
.gp-vs{font-size:9px;font-weight:700;color:var(--muted)}
.gp-status{font-size:8px;font-weight:800;text-align:center;margin-top:6px;color:var(--green)}
.gp-picks{display:flex;gap:6px;margin-top:8px}
.gp-pick-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border:2px solid var(--border2);border-radius:9px;cursor:pointer;background:#ffffff;text-align:center}
.gp-pick-btn:active{transform:translate(2px,2px)}
.gp-pick-btn .gp-pick-lbl{font-size:9px;font-weight:800;color:var(--text)}
.gp-pick-btn.picked{border-color:var(--blue);background:var(--blue-bg);box-shadow:2px 2px 0 var(--border)}
.gp-pick-btn.win{border-color:var(--green);background:var(--green-bg)}
.gp-pick-btn.loss{border-color:var(--red);background:var(--red-bg);opacity:.7}
.gp-pick-btn.locked-np{cursor:default;opacity:.5}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border:2px solid var(--border);border-radius:10px;margin:8px 12px;box-shadow:3px 3px 0 var(--border)}
.lb-row.me{border-color:var(--blue);background:var(--blue-bg)}
.lb-rank{font-size:13px;font-weight:900;color:var(--muted);width:22px;text-align:center;flex-shrink:0}
.lb-name{flex:1;font-size:12px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px;min-width:0}
.lb-name span.nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-stat{font-size:11px;font-weight:900;text-align:center;width:48px;flex-shrink:0}
.lb-stat .lbl{display:block;font-size:7px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.lb-head{display:flex;align-items:center;gap:10px;padding:6px 14px;font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.lb-head .lb-rank{width:22px}
.lb-head .lb-stat{width:48px;text-align:center}

/* NAME ENTRY */
.entry-wrap{padding:40px 20px;text-align:center}
.entry-wrap input{width:100%;max-width:280px;padding:10px 14px;border:2px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;box-shadow:3px 3px 0 var(--border);margin-top:14px}
.entry-wrap button{margin-top:14px;padding:10px 24px;border-radius:9px;border:2px solid var(--border);background:var(--gold);color:var(--text);font-weight:800;font-size:12px;box-shadow:3px 3px 0 var(--border)}
.entry-wrap button:active{transform:translate(3px,3px);box-shadow:none}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#ffffff;padding:10px 18px;border-radius:10px;font-size:11px;font-weight:800;opacity:0;transition:opacity .25s,transform .25s;z-index:200;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>
<script>
// =====================================================
// SCORECERY — World Cup Game Picks (Public Pool)
// Standalone, group-independent. Reads the shared game
// schedule/scores from wc2026/games (populated by the
// admin in worldcup.html) and lets ANY visitor make
// straight-up 3-way picks. Public leaderboard tracks
// everyone's record. Just for fun.
// =====================================================
var URL_USER=(function(){var m=location.search.match(/[?&]user=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
function x(s){var t=String(s||"");t=t.replace(/&/g,"&amp;");t=t.replace(/</g,"&lt;");t=t.replace(/>/g,"&gt;");t=t.replace(/'/g,"&#39;");return t;}
var _tt;function toast(m){var el=document.getElementById("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove("show");},2500);}
function ukey(n){return (n||"").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,"");}

var DB=null;
try{
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks",appId:"1:965978379243:web:35f9db9a664f9170e27fae"});
  DB=firebase.database();
}catch(e){}

// ── OFFICIAL 2026 WORLD CUP TEAMS (for flags/codes) ────────
var GROUPS={
  A:{id:"A",teams:[{n:"Mexico",       flag:"🇲🇽",code:"MEX",r:15},
                   {n:"South Africa", flag:"🇿🇦",code:"RSA",r:60},
                   {n:"South Korea",  flag:"🇰🇷",code:"KOR",r:25},
                   {n:"Czechia",      flag:"🇨🇿",code:"CZE",r:41}]},
  B:{id:"B",teams:[{n:"Canada",       flag:"🇨🇦",code:"CAN",r:30},
                   {n:"Bosnia & Herz.",flag:"🇧🇦",code:"BIH",r:65},
                   {n:"Qatar",        flag:"🇶🇦",code:"QAT",r:55},
                   {n:"Switzerland",  flag:"🇨🇭",code:"SUI",r:19}]},
  C:{id:"C",teams:[{n:"Brazil",       flag:"🇧🇷",code:"BRA",r:6},
                   {n:"Morocco",      flag:"🇲🇦",code:"MAR",r:8},
                   {n:"Haiti",        flag:"🇭🇹",code:"HAI",r:83},
                   {n:"Scotland",     flag:"🏴",code:"SCO",r:43}]},
  D:{id:"D",teams:[{n:"USA",          flag:"🇺🇸",code:"USA",r:16},
                   {n:"Paraguay",     flag:"🇵🇾",code:"PAR",r:40},
                   {n:"Australia",    flag:"🇦🇺",code:"AUS",r:27},
                   {n:"Türkiye",      flag:"🇹🇷",code:"TUR",r:22}]},
  E:{id:"E",teams:[{n:"Germany",      flag:"🇩🇪",code:"GER",r:10},
                   {n:"Curaçao",      flag:"🇨🇼",code:"CUW",r:82},
                   {n:"Ivory Coast",  flag:"🇨🇮",code:"CIV",r:34},
                   {n:"Ecuador",      flag:"🇪🇨",code:"ECU",r:23}]},
  F:{id:"F",teams:[{n:"Netherlands",  flag:"🇳🇱",code:"NED",r:7},
                   {n:"Japan",        flag:"🇯🇵",code:"JPN",r:18},
                   {n:"Sweden",       flag:"🇸🇪",code:"SWE",r:38},
                   {n:"Tunisia",      flag:"🇹🇳",code:"TUN",r:44}]},
  G:{id:"G",teams:[{n:"Belgium",      flag:"🇧🇪",code:"BEL",r:9},
                   {n:"Egypt",        flag:"🇪🇬",code:"EGY",r:29},
                   {n:"Iran",         flag:"🇮🇷",code:"IRN",r:21},
                   {n:"New Zealand",  flag:"🇳🇿",code:"NZL",r:85}]},
  H:{id:"H",teams:[{n:"Spain",        flag:"🇪🇸",code:"ESP",r:2},
                   {n:"Cape Verde",   flag:"🇨🇻",code:"CPV",r:69},
                   {n:"Saudi Arabia", flag:"🇸🇦",code:"KSA",r:61},
                   {n:"Uruguay",      flag:"🇺🇾",code:"URU",r:17}]},
  I:{id:"I",teams:[{n:"France",       flag:"🇫🇷",code:"FRA",r:1},
                   {n:"Senegal",      flag:"🇸🇳",code:"SEN",r:14},
                   {n:"Iraq",         flag:"🇮🇶",code:"IRQ",r:57},
                   {n:"Norway",       flag:"🇳🇴",code:"NOR",r:31}]},
  J:{id:"J",teams:[{n:"Argentina",    flag:"🇦🇷",code:"ARG",r:3},
                   {n:"Algeria",      flag:"🇩🇿",code:"ALG",r:28},
                   {n:"Austria",      flag:"🇦🇹",code:"AUT",r:24},
                   {n:"Jordan",       flag:"🇯🇴",code:"JOR",r:63}]},
  K:{id:"K",teams:[{n:"Portugal",     flag:"🇵🇹",code:"POR",r:5},
                   {n:"DR Congo",     flag:"🇨🇩",code:"COD",r:46},
                   {n:"Uzbekistan",   flag:"🇺🇿",code:"UZB",r:50},
                   {n:"Colombia",     flag:"🇨🇴",code:"COL",r:13}]},
  L:{id:"L",teams:[{n:"England",      flag:"🏴",code:"ENG",r:4},
                   {n:"Croatia",      flag:"🇭🇷",code:"CRO",r:11},
                   {n:"Ghana",        flag:"🇬🇭",code:"GHA",r:74},
                   {n:"Panama",       flag:"🇵🇦",code:"PAN",r:33}]}
};
var GROUP_IDS=["A","B","C","D","E","F","G","H","I","J","K","L"];
var ALL_TEAMS=(function(){
  var arr=[];
  GROUP_IDS.forEach(function(gid){GROUPS[gid].teams.forEach(function(t){arr.push(t);});});
  return arr;
})();
var TEAM_ALIASES={
  "united states":"USA","usa":"USA","us":"USA",
  "turkey":"Türkiye",
  "cote d'ivoire":"Ivory Coast","côte d'ivoire":"Ivory Coast",
  "czech republic":"Czechia",
  "korea republic":"South Korea","republic of korea":"South Korea",
  "cabo verde":"Cape Verde",
  "bosnia and herzegovina":"Bosnia & Herz.",
  "congo dr":"DR Congo","democratic republic of the congo":"DR Congo"
};
function _teamWords(s){
  return (s||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim().split(/\s+/).filter(function(w){return w.length>1;});
}
function teamNameMatch(a,b){
  if(!a||!b)return false;
  if(a===b)return true;
  var wa=_teamWords(a),wb=_teamWords(b);
  if(!wa.length||!wb.length)return false;
  var shorter=wa.length<=wb.length?wa:wb;
  var longer=wa.length<=wb.length?wb:wa;
  return shorter.every(function(sw){
    return longer.some(function(lw){return lw.indexOf(sw)>=0||sw.indexOf(lw)>=0;});
  });
}
function findTeam(name){
  if(!name)return null;
  var exact=ALL_TEAMS.find(function(t){return t.n===name;});
  if(exact)return exact;
  var alias=TEAM_ALIASES[name.toLowerCase().trim()];
  if(alias){
    var aliased=ALL_TEAMS.find(function(t){return t.n===alias;});
    if(aliased)return aliased;
  }
  return ALL_TEAMS.find(function(t){return teamNameMatch(name,t.n);})||null;
}
function findTeamCode(name){var t=findTeam(name);return t?t.code:(name||"").slice(0,3).toUpperCase();}

// ── State ────────────────────────────────────────────────
var ST={
  page:"picks",
  user:URL_USER||(function(){try{return localStorage.getItem("pp_user");}catch(e){return null;}})(),
  emoji:(function(){try{return localStorage.getItem("pp_emoji")||"🎯";}catch(e){return "🎯";}})(),
  games:{},
  picks:{},      // my picks: {gameId: "home"|"away"|"draw"}
  allPicks:{},   // everyone's picks: {ukey: {gameId: pick}}
  players:{}     // {ukey: {name, emoji}}
};

// ── Game outcome / record helpers ──────────────────────────
function isGameLocked(g){
  if(!g)return true;
  if(g.status&&g.status!=="pre")return true;
  if(g.date&&new Date(g.date)<=new Date())return true;
  return false;
}
function gameOutcome(g){
  if(!g||g.status!=="post"||g.homeScore==null||g.awayScore==null)return null;
  return g.winner||null;
}
function calcRecordFromPicks(picks){
  var w=0,l=0,pending=0;
  for(var gid in ST.games){
    var g=ST.games[gid];
    var pick=picks[gid];
    if(!pick)continue;
    var outcome=gameOutcome(g);
    if(outcome===null){pending++;continue;}
    if(pick===outcome)w++;
    else l++;
  }
  return {w:w,l:l,pending:pending};
}

// ── Save pick ────────────────────────────────────────────
function saveGamePick(gameId,side){
  if(!ST.user||!DB)return;
  var uk=ukey(ST.user);
  if(!ST.picks)ST.picks={};
  ST.picks[gameId]=side;
  DB.ref("wc2026/publicGamePicks/"+uk+"/"+gameId).set(side);
  draw();
}
function registerPlayer(){
  if(!ST.user||!DB)return;
  var uk=ukey(ST.user);
  DB.ref("wc2026/publicGamePickPlayers/"+uk).set({name:ST.user,emoji:ST.emoji||"🎯"});
}

// ── Render ───────────────────────────────────────────────
function draw(){
  var h='';
  h+='<div class="topbar">';
  h+='<a href="index.html" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;font-size:18px;font-weight:900;flex-shrink:0;text-decoration:none;color:var(--text);background:#ffffff;border:2px solid var(--border);border-radius:8px;box-shadow:2px 2px 0 var(--border)">&#8592;</a>';
  h+='<div class="header-center">';
  h+='<div class="header-logo"><span class="scorecery-logo">SCORECERY</span></div>';
  h+='<div class="header-sub">World Cup Game Picks</div>';
  h+='</div>';
  if(ST.user){
    h+='<span class="tag" style="font-size:9px;padding:3px 8px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(ST.emoji||"")+' '+x(ST.user)+'</span>';
  } else {
    h+='<div style="width:34px"></div>';
  }
  h+='</div>';

  if(!ST.user){
    h+=renderNameEntry();
    document.getElementById("root").innerHTML=h;
    bindNameEntry();
    return;
  }

  // Tabs
  var tabs=[{id:"picks",lbl:"My Picks"},{id:"leaderboard",lbl:"Leaderboard"}];
  h+='<div class="page-bar">';
  tabs.forEach(function(t){h+='<button class="ptab'+(ST.page===t.id?" active":"")+'" data-page="'+t.id+'">'+t.lbl+'</button>';});
  h+='</div>';

  if(ST.page==="leaderboard")h+=renderLeaderboard();
  else h+=renderMyPicks();

  document.getElementById("root").innerHTML=h;
  bind();
}

function renderNameEntry(){
  var h='<div class="entry-wrap">';
  h+='<div style="font-size:30px;margin-bottom:6px">🎮⚽</div>';
  h+='<div style="font-size:14px;font-weight:900;color:var(--text)">World Cup Game Picks</div>';
  h+='<div style="font-size:10px;color:var(--muted);margin-top:6px;line-height:1.7;max-width:280px;margin-left:auto;margin-right:auto">Pick the outcome of every World Cup match — home win, draw, or away win. Open to everyone. Just for fun!</div>';
  h+='<input id="name-entry" placeholder="Enter your name" autocomplete="off">';
  h+='<br><button id="name-entry-btn">Let&#39;s Go</button>';
  h+='</div>';
  return h;
}
function bindNameEntry(){
  var inp=document.getElementById("name-entry");
  var btn=document.getElementById("name-entry-btn");
  function submit(){
    var v=(inp.value||"").trim();
    if(!v){inp.focus();return;}
    ST.user=v;
    try{localStorage.setItem("pp_user",v);}catch(e){}
    registerPlayer();
    if(DB){
      var uk=ukey(ST.user);
      // Try to pick up an existing emoji from the global users registry
      DB.ref("users/"+uk+"/emoji").once("value",function(sn){
        if(sn.val()){ST.emoji=sn.val();try{localStorage.setItem("pp_emoji",ST.emoji);}catch(e){}}
        registerPlayer();
        draw();
      },function(){draw();});
    } else {
      draw();
    }
  }
  if(btn)btn.addEventListener("click",submit);
  if(inp)inp.addEventListener("keydown",function(e){if(e.key==="Enter")submit();});
}

function renderMyPicks(){
  var h='';
  h+='<div style="text-align:center;padding:10px 12px 4px;font-size:9px;color:var(--muted);line-height:1.6">🎮 Predict each match: home win, draw, or away win. Open to everyone — just for fun!</div>';

  var rec=calcRecordFromPicks(ST.picks);
  h+='<div class="gp-record">';
  h+='<div style="text-align:center"><div class="gp-rec-num" style="color:var(--green)">'+rec.w+'</div><div class="gp-rec-lbl">Wins</div></div>';
  h+='<div style="text-align:center"><div class="gp-rec-num" style="color:var(--red)">'+rec.l+'</div><div class="gp-rec-lbl">Losses</div></div>';
  h+='<div style="text-align:center"><div class="gp-rec-num" style="color:var(--gold-dark)">'+rec.pending+'</div><div class="gp-rec-lbl">Pending</div></div>';
  h+='</div>';

  var games=ST.games||{};
  var gids=Object.keys(games);
  if(!gids.length){
    h+='<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:11px;line-height:1.8">No games loaded yet.<br><span style="font-size:9px;color:var(--dim)">Check back once the schedule is posted.</span></div>';
    return h;
  }
  gids.sort(function(a,b){return new Date(games[a].date)-new Date(games[b].date);});

  var myPicks=ST.picks||{};

  gids.forEach(function(gid){
    var g=games[gid];
    var locked=isGameLocked(g);
    var pick=myPicks[gid];
    var outcome=gameOutcome(g);
    var dateLbl='',timeLbl='';
    if(g.date){
      var d=new Date(g.date);
      dateLbl=d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
      timeLbl=d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
    }
    h+='<div class="gp-card">';
    if(dateLbl)h+='<div class="gp-date">'+x(dateLbl)+'</div>';

    h+='<div class="gp-bug">';
    h+='<div class="gp-team"><div class="gp-flag">'+g.homeFlag+'</div><div class="gp-code">'+x(findTeamCode(g.home))+'</div>';
    if(g.status&&g.status!=="pre")h+='<div class="gp-score">'+(g.homeScore!=null?g.homeScore:0)+'</div>';
    h+='</div>';
    h+='<div class="gp-center">';
    if(timeLbl)h+='<div class="gp-time">'+x(timeLbl)+'</div>';
    h+='<div class="gp-vs">VS</div>';
    h+='</div>';
    h+='<div class="gp-team"><div class="gp-flag">'+g.awayFlag+'</div><div class="gp-code">'+x(findTeamCode(g.away))+'</div>';
    if(g.status&&g.status!=="pre")h+='<div class="gp-score">'+(g.awayScore!=null?g.awayScore:0)+'</div>';
    h+='</div>';
    h+='</div>';

    h+='<div class="gp-picks">';
    [["home",findTeamCode(g.home)+" Win"],["draw","Draw"],["away",findTeamCode(g.away)+" Win"]].forEach(function(opt){
      var key=opt[0],label=opt[1];
      var cls="gp-pick-btn";
      if(pick===key)cls+=" picked";
      if(outcome){
        if(outcome===key)cls+=" win";
        else if(pick===key)cls+=" loss";
      }
      if(locked)cls+=" locked-np";
      h+='<div class="'+cls+'" '+(!locked?'data-gp-pick="'+x(gid)+'" data-gp-side="'+key+'"':'')+'>';
      h+='<div class="gp-pick-lbl">'+x(label)+'</div>';
      if(pick===key){
        if(outcome===null)h+='<div style="font-size:8px;font-weight:800;color:var(--blue)">YOUR PICK</div>';
        else if(pick===outcome)h+='<div style="font-size:8px;font-weight:800;color:var(--green)">&#10003; CORRECT</div>';
        else h+='<div style="font-size:8px;font-weight:800;color:var(--red)">&#10007; WRONG</div>';
      }
      h+='</div>';
    });
    h+='</div>';

    if(outcome){
      if(outcome==="draw")h+='<div class="gp-status" style="color:var(--muted)">Final — Draw</div>';
      else h+='<div class="gp-status">Final — '+x(findTeamCode(outcome==="home"?g.home:g.away))+' win</div>';
    } else if(locked){
      h+='<div class="gp-status" style="color:var(--gold-dark)">🔒 In progress / kicked off</div>';
    } else if(!pick){
      h+='<div class="gp-status" style="color:var(--muted);font-weight:700">Tap a pick above</div>';
    }
    h+='</div>';
  });

  return h;
}

function renderLeaderboard(){
  var h='';
  h+='<div style="text-align:center;padding:10px 12px 4px;font-size:9px;color:var(--muted);line-height:1.6">🌍 Public leaderboard — everyone&#39;s World Cup Game Picks record. For fun only.</div>';

  var players=ST.players||{};
  var myUk=ukey(ST.user||"");
  var rows=[];
  // Make sure the current user shows up even before their first pick syncs
  if(myUk&&!players[myUk])players[myUk]={name:ST.user,emoji:ST.emoji};

  for(var uk in players){
    var picks=(ST.allPicks||{})[uk]||{};
    var rec=calcRecordFromPicks(picks);
    rows.push({uk:uk,name:players[uk].name||uk,emoji:players[uk].emoji||"🎯",w:rec.w,l:rec.l,pending:rec.pending});
  }
  if(!rows.length){
    h+='<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:11px;line-height:1.8">No one has made picks yet.<br><span style="font-size:9px;color:var(--dim)">Be the first!</span></div>';
    return h;
  }
  rows.sort(function(a,b){
    if(b.w!==a.w)return b.w-a.w;
    if(a.l!==b.l)return a.l-b.l;
    return a.name.localeCompare(b.name);
  });

  h+='<div class="lb-head"><div class="lb-rank">#</div><div class="lb-name">Player</div><div class="lb-stat">W</div><div class="lb-stat">L</div><div class="lb-stat">Pend</div></div>';
  rows.forEach(function(r,i){
    var isMe=r.uk===myUk;
    h+='<div class="lb-row'+(isMe?" me":"")+'">';
    h+='<div class="lb-rank">'+(i+1)+'</div>';
    h+='<div class="lb-name"><span>'+r.emoji+'</span><span class="nm">'+x(r.name)+(isMe?' (you)':'')+'</span></div>';
    h+='<div class="lb-stat" style="color:var(--green)">'+r.w+'</div>';
    h+='<div class="lb-stat" style="color:var(--red)">'+r.l+'</div>';
    h+='<div class="lb-stat" style="color:var(--gold-dark)">'+r.pending+'</div>';
    h+='</div>';
  });

  return h;
}

function bind(){
  var els=document.querySelectorAll(".ptab");
  for(var i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    ST.page=this.getAttribute("data-page");
    draw();
  });
  els=document.querySelectorAll("[data-gp-pick]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var gid=this.getAttribute("data-gp-pick");
    var side=this.getAttribute("data-gp-side");
    saveGamePick(gid,side);
    var lbl=side==="draw"?"Draw":findTeamCode(ST.games[gid][side]);
    toast("\u2605 "+lbl);
  });
}

// ── Load data ────────────────────────────────────────────
function loadData(){
  if(!DB){draw();return;}
  DB.ref("wc2026/games").on("value",function(sn){ST.games=sn.val()||{};draw();});
  DB.ref("wc2026/publicGamePickPlayers").on("value",function(sn){ST.players=sn.val()||{};draw();});
  DB.ref("wc2026/publicGamePicks").on("value",function(sn){
    ST.allPicks=sn.val()||{};
    if(ST.user){
      var uk=ukey(ST.user);
      ST.picks=ST.allPicks[uk]||{};
    }
    draw();
  });
  if(ST.user)registerPlayer();
}

draw();
loadData();
</script>

</html>
