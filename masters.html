<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="color-scheme" content="dark"/>

<link rel="icon" type="image/png" href="/poolplay-icon.png">

<title>PoolPlay - 2026 Masters</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<style>
/* ─── Reset & base ─── */
*{box-sizing:border-box;margin:0;padding:0}
/* Masters accent colours used inline in JS-generated HTML */
:root{
  --masters-green:#1a5c35;
  --masters-green-bright:#10b981;
  --masters-gold:#c9a84c;
  --masters-gold-light:#fbbf24;
}
body{background:#07090f;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none}

/* ─── Topbar ─── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,9,15,.92);border-bottom:1px solid #1e2a3a;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.app-name{font-family:‘Bebas Neue’,cursive;font-size:22px;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-sub{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.topbar-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag{background:#1e2a3a;border:1px solid #2d3f52;border-radius:20px;padding:3px 10px;font-size:10px;color:#94a3b8}
.tag.locked{border-color:rgba(201,168,76,.4);color:#fbbf24;background:rgba(201,168,76,.08)}
.btn{border-radius:6px;padding:5px 11px;font-size:10px;font-weight:600;border:1px solid;transition:opacity .15s}
.btn:active{opacity:.65}
.btn-ghost{background:#0d1117;border-color:#1e2a3a;color:#64748b}
.btn-green{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.btn-red{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#fca5a5}
.btn-gold{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.35);color:#fbbf24}
.btn-purple{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}

/* ─── Page tabs ─── */
.page-bar{background:#0d1117;border-bottom:1px solid #1e2a3a;display:flex;padding:0 10px;gap:2px}
.ptab{padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#475569;border-bottom:2px solid transparent;background:none;transition:color .15s}
.ptab.active{color:#a5b4fc;border-bottom-color:#6366f1}

/* ─── User select ─── */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:44px 20px;gap:18px}
.user-screen h2{font-size:11px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:14px 26px;border-radius:10px;background:#0d1117;border:1px solid #1e2a3a;font-size:15px;font-weight:700;color:#e2e8f0;text-align:left;min-width:140px}
.user-btn:active{border-color:#6366f1;background:rgba(99,102,241,.08)}
.user-btn.locked-state{border-color:rgba(16,185,129,.4);color:#6ee7b7}
.user-btn-sub{font-size:9px;color:#475569;font-weight:400;margin-top:3px}

/* ─── Lock bar ─── */
.lock-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid #1e2a3a;flex-wrap:wrap;background:#090d14}
.lock-chips{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.chip{padding:2px 8px;border-radius:20px;font-size:9px;border:1px solid}
.chip.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.chip.pend{background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.18);color:#475569}
.lock-info{font-size:10px;color:#475569}

/* ─── Tier system ─── */
.tier-section{padding:12px 14px 4px;position:relative;z-index:1}
.tier-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px 12px;border-radius:8px;border:1px solid #1e2a3a;background:#0d1117}
.tier-badge{font-family:inherit;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;border:1px solid;flex-shrink:0}
.tier-meta{flex:1;min-width:0}
.tier-label{font-size:12px;font-weight:600;color:#e2e8f0}
.tier-pts{font-size:9px;color:#475569;margin-top:1px}
.tier-progress{font-size:9px;color:#475569;text-align:right;flex-shrink:0}
.tier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:6px;margin-bottom:6px}

/* ─── Player cards ─── */
.pcard{background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;padding:9px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s,background .12s;-webkit-tap-highlight-color:transparent;position:relative}
.pcard:hover{border-color:rgba(201,168,76,.3)}
.pcard.picked{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.5)}
.pcard.correct{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.5)}
.pcard.wrong{background:rgba(224,80,80,.08);border-color:rgba(224,80,80,.35);opacity:.65}
.pcard.result-set{border-color:rgba(34,197,94,.3)}
.flag-col{font-size:15px;flex-shrink:0;width:22px;text-align:center}
.pcard-info{flex:1;min-width:0}
.pcard-name{font-size:11px;font-weight:600;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcard-meta{font-size:8px;color:#475569;margin-top:1px}
.pcard-odds{font-size:9px;color:#c9a84c;font-weight:600;flex-shrink:0}
.pcard-icon{font-size:11px;flex-shrink:0;width:14px;text-align:center}
.picked-crown{position:absolute;top:4px;right:5px;font-size:8px;color:#c9a84c}

/* ─── Your picks summary bar ─── */
.picks-summary{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid #1e2a3a;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#090d14}
.picks-summary::-webkit-scrollbar{display:none}
.pscard{flex-shrink:0;background:#0d1117;border:1px solid #1e2a3a;border-radius:7px;padding:5px 10px;font-size:9px;text-align:center;min-width:90px}
.pscard.filled{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.07)}
.pscard.correct{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.07)}
.pscard.wrong{border-color:rgba(224,80,80,.3);background:rgba(224,80,80,.05);opacity:.7}
.pscard-tier{font-size:8px;color:#475569;margin-bottom:3px}
.pscard-name{font-size:10px;font-weight:600;color:#fbbf24;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pscard-pts{font-size:9px;color:#10b981;font-weight:700}

/* ─── Score banner ─── */
.score-banner{display:flex;gap:8px;padding:7px 14px;border-bottom:1px solid #1e2a3a;overflow-x:auto;-webkit-overflow-scrolling:touch;align-items:center}
.score-banner::-webkit-scrollbar{display:none}
.sb-item{background:#0d1117;border:1px solid #1e2a3a;border-radius:6px;padding:4px 10px;font-size:9px;white-space:nowrap;text-align:center;flex-shrink:0}
.sb-item .sl{color:#475569;font-size:8px}
.sb-item .sv{color:#e2e8f0;font-weight:700;font-size:13px}
.sb-item.total{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.07)}
.sb-item.total .sv{color:#fbbf24}

/* ─── Leaderboard ─── */
.lb-wrap{padding:14px}
.lb-note{font-size:9px;color:#475569;margin-bottom:14px;line-height:1.8;background:#0d1117;border:1px solid #1e2a3a;border-radius:7px;padding:8px 12px}
.lb-row{background:#0d1117;border:1px solid #1e2a3a;border-radius:9px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center;transition:border-color .2s}
.lb-row.first{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.03)}
.lb-row.second{border-color:rgba(148,163,184,.2)}
.lb-row.third{border-color:rgba(205,127,50,.2)}
.lb-medal{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:6px}
.lb-name{font-size:14px;font-weight:700}
.lb-pts{font-size:11px;color:#475569;flex-shrink:0}
.lb-pts b{color:#f1f5f9;font-weight:700}
.lb-pts small{font-size:9px;color:#334155}
.progress{background:#0f1923;border-radius:3px;height:4px;position:relative;overflow:hidden;margin-bottom:4px}
.progress-max{position:absolute;left:0;top:0;height:100%;background:rgba(99,102,241,.1)}
.progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;transition:width .6s;background:linear-gradient(90deg,#4f46e5,#818cf8)}
.lb-picks-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.lb-pick-chip{font-size:8px;padding:1px 6px;border-radius:10px;border:1px solid #1e2a3a;color:#334155}
.lb-pick-chip.correct{color:#10b981;border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.05)}
.lb-pick-chip.wrong{color:#fca5a5;border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04);text-decoration:line-through;opacity:.7}
.lb-pick-chip.pending{color:#fbbf24;border-color:rgba(251,191,36,.2);background:rgba(251,191,36,.04)}
.lb-rank-change{font-size:9px;margin-left:4px}
.lb-rank-change.up{color:#10b981}
.lb-rank-change.down{color:#ef4444}
.can-win{background:#0d1117;border:1px solid #1e3a22;border-radius:8px;padding:10px 14px;margin-bottom:14px}
.can-win-title{font-size:9px;color:#10b981;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.can-win-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-top:1px solid #0f1923;font-size:11px}
.can-win-row:first-of-type{border-top:none}
.can-win-name{color:#94a3b8}
.can-win-gap{font-size:9px;color:#10b981}
.can-win-gap.behind{color:#ef4444}

/* ─── Results admin ─── */
.results-wrap{padding:14px;position:relative;z-index:1}
.rnd-header{font-size:9px;color:#c9a84c;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;margin-top:14px;padding-bottom:5px;border-bottom:1px solid #1e2a3a}
.rnd-header:first-child{margin-top:0}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px;margin-bottom:6px}
.result-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;padding:9px 10px;display:flex;align-items:center;gap:8px}
.result-name{flex:1;font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-score{font-size:11px;font-weight:700;color:#10b981;flex-shrink:0;min-width:36px;text-align:right}
.result-input{width:64px;background:#07090f;border:1px solid #1e2a3a;border-radius:5px;padding:4px 7px;color:#e2e8f0;font-size:12px;font-family:inherit;text-align:center}
.result-input:focus{outline:none;border-color:#c9a84c}
.result-set-btn{padding:3px 9px;border-radius:5px;font-size:9px;border:1px solid rgba(201,168,76,.35);background:rgba(201,168,76,.08);color:#fbbf24;cursor:pointer}
.result-set-btn:hover{background:rgba(201,168,76,.15)}
.result-winner-btn{padding:3px 9px;border-radius:5px;font-size:9px;border:1px solid rgba(34,197,94,.35);background:rgba(34,197,94,.08);color:#10b981;cursor:pointer}

/* ─── Players page ─── */
.players-wrap{padding:14px}
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.player-row{background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px}
.player-info .pn{font-size:12px;font-weight:600}
.player-info .pm{font-size:8px;color:#475569;margin-top:2px}
.player-odds-badge{margin-left:auto;font-size:9px;font-weight:700;color:#fbbf24;flex-shrink:0}
.tier-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rnd-header{font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;margin-top:14px;padding-bottom:5px;border-bottom:1px solid #1e2a3a}
.rnd-header:first-child{margin-top:0}

/* ─── Toast ─── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:#0d1117;border:1px solid rgba(99,102,241,.4);color:#a5b4fc;border-radius:8px;padding:8px 18px;font-size:11px;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Confetti ─── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:900;display:none}

/* ─── Modals ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px 14px 0 0;width:100%;max-width:480px;padding:20px 16px 32px;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#1e2a3a;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.modal-sub{font-size:10px;color:#475569;margin-bottom:16px}
.modal-close-btn{width:100%;padding:11px;border-radius:8px;background:#1e2a3a;border:none;color:#94a3b8;font-size:13px;font-family:inherit;cursor:pointer;margin-top:8px}

/* Admin result modal */
.admin-player-modal .modal-sheet{border-color:#fbbf24}
.score-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.score-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid #1e2a3a;background:#07090f;color:#e2e8f0;cursor:pointer;transition:all .12s;font-family:inherit}
.score-btn.sel{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.1);color:#fbbf24}
.manual-score-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.manual-score-input{flex:1;background:#07090f;border:1px solid #1e2a3a;border-radius:8px;padding:9px 12px;color:#f1f5f9;font-size:16px;font-family:inherit;text-align:center}
.manual-score-input:focus{outline:none;border-color:#fbbf24}
.save-btn{padding:11px;border-radius:8px;background:#fbbf24;border:none;color:#07090f;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.save-btn:hover{opacity:.85}
.winner-btn{width:100%;padding:12px;border-radius:8px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.4);color:#6ee7b7;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:8px}

/* ─── Misc ─── */
.augusta-divider{text-align:center;padding:10px 0 0;color:#334155;font-size:11px;letter-spacing:.15em}

@keyframes trophy{0%{transform:scale(1) rotate(0)}25%{transform:scale(1.4) rotate(-15deg)}50%{transform:scale(1.4) rotate(15deg)}75%{transform:scale(1.2) rotate(-8deg)}100%{transform:scale(1) rotate(0)}}
.trophy-anim{display:inline-block;animation:trophy .8s ease both}

/* ─── Responsive tweaks ─── */
@media(max-width:400px){
.tier-grid{grid-template-columns:1fr 1fr}
.players-grid{grid-template-columns:1fr}
}
</style>

</head>

function fieldByTier(tid){ return FIELD.filter(function(p){ return p.tier===tid; }); }

// ─── Scoring ───────────────────────────────────────────────
// A pick scores if: player finished in results AND
//   tier1/t2 picks = finished top-20 (pos <= 20)
//   tier3 picks = top-30
//   tier4 picks = top-40 or made cut (pos <= 40)
//   tier5 = just participates / beats cut (pos <= 50)
// OR player is tournament winner (always correct for any tier)
function pickScores(tierId, playerId){
  var res = ST.results[playerId];
  if (!res) return false;
  if (res.winner) return true;
  if (!res.pos) return false;
  var pos = parseInt(res.pos);
  if (isNaN(pos)) return false;
  if (tierId==="t1") return pos <= 20;
  if (tierId==="t2") return pos <= 25;
  if (tierId==="t3") return pos <= 35;
  if (tierId==="t4") return pos <= 45;
  if (tierId==="t5") return pos <= 55; // made the cut
  return false;
}

function playerScore(p){
  var pp = ST.picks[p] || {};
  var s = 0;
  TIERS.forEach(function(tier){
    var pid = pp[tier.id];
    if (pid && pickScores(tier.id, pid)) s += tier.pts;
  });
  return s;
}
function playerMax(p){
  var pp = ST.picks[p] || {};
  var s = 0;
  TIERS.forEach(function(tier){
    var pid = pp[tier.id];
    var res = pid ? ST.results[pid] : null;
    if (!pid || !res || pickScores(tier.id, pid)) s += tier.pts;
  });
  return s;
}
function grandMax(){
  return TIERS.reduce(function(a,t){ return a+t.pts; }, 0);
}
function totalPicks(u){
  var pp = ST.picks[u] || {};
  return Object.keys(pp).length;
}

// ─── Boot ──────────────────────────────────────────────────
function boot(){
  if (!DB){ draw(); return; }
  function step1(){
    if (!GROUP_ID){ step2(); return; }
    DB.ref("groups/"+GROUP_ID).once("value", function(sn){
      var g=sn.val();
      if (g&&g.players&&g.players.length) PARTS=g.players;
      if (g&&g.adminPw) GROUP_ADMIN_PW=g.adminPw;
      step2();
    }, function(){ step2(); });
  }
  function step2(){
    var done=0, total=PARTS.length;
    if (!total){ step3(); return; }
    PARTS.forEach(function(p){
      DB.ref("users/"+ukey(p)+"/emoji").once("value",
        function(sn){ if(sn.val()) _EM[p]=sn.val(); done++; if(done===total) step3(); },
        function(){ done++; if(done===total) step3(); });
    });
  }
  function step3(){
    DB.ref(BASE+"/picks").on("value", function(sn){ ST.picks=sn.val()||{}; draw(); });
    DB.ref(BASE+"/locked").on("value", function(sn){ ST.locked=sn.val()||{}; draw(); });
    DB.ref(BASE+"/results").on("value", function(sn){
      var old={};
      PARTS.forEach(function(p){ old[p]=playerScore(p); });
      ST.results=sn.val()||{};
      var sorted=PARTS.slice().sort(function(a,b){ return playerScore(b)-playerScore(a); });
      var nr={}; sorted.forEach(function(p,i){ nr[p]=i+1; });
      ST.prevRanks=nr;
      draw();
    });
  }
  step1();
}

function launchConfetti(){
  if(_confettiRunning) return; _confettiRunning=true;
  var cv=document.getElementById("confetti-canvas"); cv.style.display="block"; cv.width=window.innerWidth; cv.height=window.innerHeight;
  var ctx=cv.getContext("2d"), pieces=[], cols=["#c9a84c","#1a5c35","#f0d080","#22c55e","#ffffff","#6aabf7","#a78bfa"];
  for(var i=0;i<140;i++) pieces.push({x:Math.random()*cv.width,y:-10-Math.random()*200,w:6+Math.random()*7,h:8+Math.random()*9,color:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*4,vy:2+Math.random()*4,angle:Math.random()*Math.PI*2,va:(Math.random()-.5)*.2});
  var frames=0;
  function tick(){ ctx.clearRect(0,0,cv.width,cv.height); var alive=false; for(var i=0;i<pieces.length;i++){ var p=pieces[i]; p.x+=p.vx; p.y+=p.vy; p.angle+=p.va; p.vy+=.08; if(p.y<cv.height+20) alive=true; ctx.save(); ctx.translate(p.x+p.w/2,p.y+p.h/2); ctx.rotate(p.angle); ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,1-(frames/200)); ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore(); } frames++; if(alive&&frames<220) requestAnimationFrame(tick); else{ cv.style.display="none"; ctx.clearRect(0,0,cv.width,cv.height); _confettiRunning=false; } }
  requestAnimationFrame(tick);
}

    if (locked && anyResults()) {
      h += '<div style="padding:12px 14px 20px">';
      h += '<div style="font-size:9px;color:#10b981;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">All picks locked — full comparison</div>';
      h += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="display:flex;gap:12px;min-width:max-content;padding-bottom:8px">';
      PARTS.forEach(function(p){
        var pp = ST.picks[p] || {};
        h += '<div style="flex-shrink:0;width:160px">';
        h += '<div style="font-size:10px;color:'+(p===ST.user?"#fbbf24":"#475569")+';font-weight:600;margin-bottom:7px">'+pem(p)+x(p)+(p===ST.user?" (you)":"")+'</div>';
        TIERS.forEach(function(tier){
          var pid = pp[tier.id];
          var pl = pid ? playerById(pid) : null;
          var correct = pid && pickScores(tier.id, pid);
          var res = pid ? ST.results[pid] : {};
          var wrong = res && res.pos && !correct;
          h += '<div style="background:'+(correct?"rgba(34,197,94,.1)":wrong?"rgba(224,80,80,.08)":"#0d1117")+';border:1px solid '+(correct?"rgba(34,197,94,.3)":wrong?"rgba(224,80,80,.25)":"#1e2a3a")+';border-radius:6px;padding:5px 8px;margin-bottom:4px;font-size:10px">';
          h += '<div style="font-size:8px;color:'+tier.color+';margin-bottom:2px">'+tier.label.split("–")[0].trim()+'</div>';
          if (pl) h += (pl.flag?pl.flag+" ":"")+x(pl.name)+(correct?" ✓"+(res.winner?" 🏆":""):wrong?" ✗":"");
          else h += '<span style="color:#475569">No pick</span>';
          h += '</div>';
        });
        h += '</div>';
      });
      h += '</div></div></div>';
    }
  }

  // ── LEADERBOARD page ──
  if (ST.page==="leaderboard") {
    var rows = PARTS.map(function(p){ return { name:p, score:playerScore(p), max:playerMax(p) }; }).sort(function(a,b){ return b.score-a.score||b.max-a.max; });
    var newLeader = rows[0]?rows[0].name:null;
    var showTrophy = anyResults()&&newLeader&&newLeader!==_prevLeader&&_prevLeader!==null;
    if (anyResults()&&newLeader) _prevLeader=newLeader;

    h += '<div class="lb-wrap">';
    h += '<div class="lb-note">';
    TIERS.forEach(function(t,i){
      h += t.label.split("–")[0].trim()+' = '+t.pts+'pts'+(i<TIERS.length-1?" &nbsp;|&nbsp; ":"");
    });
    h += '<br>Grand max = '+GMAX+' pts · Pick 1 per tier · Scoring cutoffs vary by tier</div>';

    if (anyResults()&&rows.length&&rows[0].score>0) {
      h += '<div class="can-win"><div class="can-win-title">💡 Who Can Still Win</div>';
      var leader = rows[0];
      rows.forEach(function(row){
        h += '<div class="can-win-row"><span class="can-win-name">'+pem(row.name)+x(row.name)+'</span>';
        if (row===leader) h += '<span class="can-win-gap">🏆 Leading ('+row.score+'pts)</span>';
        else if (row.max>=leader.score) h += '<span class="can-win-gap">Max +'+(row.max-leader.score)+' from leader</span>';
        else h += '<span class="can-win-gap behind">Eliminated 😔</span>';
        h += '</div>';
      });
      h += '</div>';
    }

    var medals=["🥇","🥈","🥉"];
    rows.forEach(function(row,i){
      var spct=GMAX>0?Math.round(row.score/GMAX*100):0, mpct=GMAX>0?Math.round(row.max/GMAX*100):0;
      var prevRank=ST.prevRanks[row.name], rankChange="";
      if(prevRank&&anyResults()){ if(prevRank>i+1) rankChange='<span class="lb-rank-change up">▲</span>'; else if(prevRank<i+1) rankChange='<span class="lb-rank-change down">▼</span>'; }
      var rowCls="lb-row"+(i===0?" first":i===1?" second":i===2?" third":"");
      var medalHtml=(i===0&&showTrophy)?'<span class="trophy-anim">🥇</span>':(medals[i]||("#"+(i+1)));
      h += '<div class="'+rowCls+'"><div class="lb-medal">'+medalHtml+'</div><div class="lb-body">';
      h += '<div class="lb-top"><span class="lb-name">'+pem(row.name)+x(row.name)+rankChange+'</span>';
      h += '<span class="lb-pts"><b>'+row.score+'</b> / '+GMAX+'<small> max '+row.max+'</small></span></div>';
      h += '<div class="progress"><div class="progress-max" style="width:'+mpct+'%"></div><div class="progress-fill" style="width:'+spct+'%"></div></div>';
      // pick chips
      h += '<div class="lb-picks-row">';
      var pp = ST.picks[row.name] || {};
      TIERS.forEach(function(tier){
        var pid = pp[tier.id];
        var pl = pid ? playerById(pid) : null;
        var correct = pid && pickScores(tier.id, pid);
        var res = pid ? (ST.results[pid]||{}) : {};
        var wrong = res.pos && !correct;
        if (pl) {
          var chipCls = correct?"correct":wrong?"wrong":"pending";
          h += '<span class="lb-pick-chip '+chipCls+'">'+tier.label.split("–")[0].trim()+': '+x(pl.name.split(" ").pop())+(correct?" ✓":wrong?" ✗":"")+'</span>';
        } else {
          h += '<span class="lb-pick-chip">'+tier.label.split("–")[0].trim()+': —</span>';
        }
      });
      h += '</div></div></div>';
    });

    if (showTrophy) setTimeout(function(){ _prevLeader=newLeader; draw(); }, 2000);
    h += '</div>';
    if (anyResults()&&rows[0]&&rows[0].score>0) setTimeout(launchConfetti, 300);
  }

  // ── PLAYERS / FIELD page ──
  if (ST.page==="players") {
    h += '<div class="players-wrap">';
    h += '<div style="font-size:9px;color:#475569;margin-bottom:14px;line-height:1.7">Full 2026 Masters field sorted by tier & OWGR. Click any player to see who picked them.</div>';
    TIERS.forEach(function(tier){
      var players = fieldByTier(tier.id);
      h += '<div class="rnd-header" style="color:'+tier.color+'">'+tier.label+'</div>';
      h += '<div class="players-grid">';
      players.forEach(function(pl){
        var res = ST.results[pl.id] || {};
        var pickers = PARTS.filter(function(p){ return (ST.picks[p]||{})[tier.id]===pl.id; });
        h += '<div class="player-row" data-field-pid="'+pl.id+'">';
        h += '<div class="tier-dot" style="background:'+tier.color+'"></div>';
        h += '<div style="font-size:16px;width:22px;text-align:center;flex-shrink:0">'+pl.flag+'</div>';
        h += '<div class="player-info" style="flex:1;min-width:0"><div class="pn">'+x(pl.name)+'</div>';
        h += '<div class="pm">OWGR #'+(pl.owgr<900?pl.owgr:"?")+' · '+pl.odds;
        if (res.score) h += ' · <b style="color:'+(res.score.startsWith("-")?"#10b981":"#ef4444")+'">'+res.score+'</b>';
        if (res.pos) h += ' · '+(res.winner?"🏆":"T"+res.pos);
        h += '</div>';
        if (pickers.length) h += '<div style="font-size:8px;color:#fbbf24;margin-top:2px">Picked by: '+pickers.map(x).join(", ")+'</div>';
        h += '</div>';
        h += '<div class="player-odds-badge">'+pl.odds+'</div>';
        h += '</div>';
      });
      h += '</div>';
    });
    h += '</div>';
  }

  document.getElementById("root").innerHTML = h;
  bind();
  if (ST.user && ST.locked[ST.user] && allLocked() && anyResults() && !_confettiRunning && ST.page==="leaderboard") setTimeout(launchConfetti, 400);
}

// ─── Bind ──────────────────────────────────────────────────
function bind(){
  var els, i, el;
  els=document.querySelectorAll(".ptab"); for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ ST.page=this.getAttribute("data-page"); draw(); });
  els=document.querySelectorAll(".user-btn"); for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ ST.user=this.getAttribute("data-user"); draw(); });
  el=document.getElementById("b-switch"); if(el) el.addEventListener("click",function(){ ST.user=null; draw(); });
  el=document.getElementById("b-admin"); if(el) el.addEventListener("click",function(){
    if(ST.admin){ ST.admin=false; draw(); return; }
    var pw=prompt("Admin password:"); if(pw===null) return;
    var GROUP_ADMIN_PW_local = GROUP_ADMIN_PW;
    if(pw===MASTER_PW||(GROUP_ADMIN_PW_local&&pw===GROUP_ADMIN_PW_local)){ ST.admin=true; draw(); } else toast("Wrong password");
  });
  el=document.getElementById("b-reset"); if(el) el.addEventListener("click",doReset);
  el=document.getElementById("b-lock"); if(el) el.addEventListener("click",function(){ if(confirm("Lock picks for "+ST.user+"? Can't change after.")){ doLock(ST.user); toast("Picks locked! 🔒"); draw(); } });
  el=document.getElementById("b-unlock"); if(el) el.addEventListener("click",function(){ if(confirm("Unlock your picks?")){ doUnlock(ST.user); toast("Picks unlocked"); draw(); } });

  // Player card clicks (picks or admin)
  els=document.querySelectorAll("[data-pid]"); for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var pid=this.getAttribute("data-pid"), isAdm=this.getAttribute("data-adm")==="1";
    if (!pid) return;
    if (isAdm){ openAdminModal(pid); return; }
    if (!ST.user||ST.locked[ST.user]) return;
    var pl=playerById(pid); if(!pl) return;
    // Toggle: if already picked this in tier, deselect
    var cur=(ST.picks[ST.user]||{})[pl.tier];
    savePick(ST.user, pl.tier, cur===pid?null:pid);
    toast((cur===pid?"Removed: ":"Picked: ")+pl.name);
  });

  // Admin modal binds
  el=document.getElementById("adm-save-score"); if(el) el.addEventListener("click",function(){
    if(!_admPlayer) return;
    var v=document.getElementById("adm-manual").value.trim();
    if(!v){ toast("Enter a score"); return; }
    saveResult(_admPlayer.id, Object.assign({},ST.results[_admPlayer.id]||{},{score:v}));
    refreshAdminModal(_admPlayer.id);
    toast("Score: "+v);
  });
  el=document.getElementById("adm-set-winner"); if(el) el.addEventListener("click",function(){
    if(!_admPlayer) return;
    saveResult(_admPlayer.id, Object.assign({},ST.results[_admPlayer.id]||{},{pos:1,winner:true}));
    toast("🏆 "+_admPlayer.name+" set as winner!");
    closeAdminModal();
    setTimeout(launchConfetti,300);
  });
  el=document.getElementById("adm-clear"); if(el) el.addEventListener("click",function(){
    if(!_admPlayer) return; clearResult(_admPlayer.id); closeAdminModal(); toast("Result cleared");
  });
  el=document.getElementById("adm-close"); if(el) el.addEventListener("click",closeAdminModal);
  el=document.getElementById("admin-modal"); if(el) el.addEventListener("click",function(e){ if(e.target===this) closeAdminModal(); });
}

boot();
</script>

</body>
</html>
