<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – 2026 World Cup</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#f8f5f0;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee;--shadow:#111111
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,a{font-family:'Nunito',sans-serif;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button{border:none;outline:none}
a{color:inherit;text-decoration:none}

/* TOPBAR */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px}
.app-name{font-size:16px;font-weight:900;color:var(--text);letter-spacing:-.02em;line-height:1.1}
.app-sub{font-size:8px;color:var(--muted);margin-top:0px;line-height:1.1}
.topbar-right{display:flex;gap:6px;align-items:center;flex-shrink:0}

.header-center{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0;overflow:hidden}
.header-logo{font-size:16px;line-height:1.1}
.header-sub{font-size:7px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.tag{background:var(--gold-bg);border:2px solid var(--border);border-radius:20px;padding:4px 10px;font-size:9px;color:var(--text);font-weight:800;box-shadow:3px 3px 0 var(--border)}
.tag.locked{background:var(--red-bg);border-color:var(--border);color:var(--red)}
.btn{border-radius:8px;padding:5px 12px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border);transition:transform .1s,box-shadow .1s;font-family:'Nunito',sans-serif}
.btn:active{transform:translate(3px,3px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold);color:var(--text)}
.btn-red{background:var(--red-bg);color:var(--red)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-purple{background:var(--purple-bg);color:var(--purple)}

/* PAGE TABS */
.page-bar{background:#ffffff;border-bottom:3px solid var(--border);display:flex;padding:0;overflow-x:auto}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:10px 6px;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:4px solid transparent;background:none;white-space:nowrap;flex:1;text-align:center;font-family:'Nunito',sans-serif}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* GROUP TAB BAR */
.group-bar{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;border-bottom:3px solid var(--border);background:var(--cream)}
.gtab{flex-shrink:0;padding:5px 0;font-size:9px;font-weight:800;border:2px solid var(--border);background:#ffffff;color:var(--muted);width:calc((100% - 44px)/6);text-align:center;border-radius:8px;font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.gtab:active{transform:translate(3px,3px);box-shadow:none}
.gtab.active{background:var(--gold);color:var(--text)}
.gtab.done{background:var(--green-bg);border-color:var(--border);color:var(--green)}

/* ANIMATIONS */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideLeft{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeSlideRight{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{0%{transform:scale(.88);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes shimmerGold{0%{box-shadow:4px 4px 0 var(--border)}40%{box-shadow:0 0 0 6px rgba(232,200,64,.5),4px 4px 0 var(--border)}100%{box-shadow:4px 4px 0 var(--border)}}
@keyframes flashGreen{0%{background:rgba(93,186,74,.2)}100%{background:transparent}}
@keyframes cardFlipIn{0%{transform:perspective(600px) rotateY(-90deg);opacity:0}60%{transform:perspective(600px) rotateY(6deg)}100%{transform:perspective(600px) rotateY(0);opacity:1}}
@keyframes ballRoll{0%{transform:translateX(-60px) rotate(0deg);opacity:0}20%{opacity:1}100%{transform:translateX(110vw) rotate(720deg);opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes eyeSlideIn{0%{transform:translateX(40px) scale(.7);opacity:0}60%{transform:translateX(-6px) scale(1.1)}80%{transform:translateX(3px) scale(.97)}100%{transform:translateX(0) scale(1);opacity:1}}
@keyframes eyePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.page-slide-left{animation:fadeSlideLeft .2s ease both}
.page-slide-right{animation:fadeSlideRight .2s ease both}
.anim-card{animation:fadeSlideUp .22s ease both}
.anim-card:nth-child(1){animation-delay:.02s}.anim-card:nth-child(2){animation-delay:.07s}.anim-card:nth-child(3){animation-delay:.12s}.anim-card:nth-child(4){animation-delay:.17s}
.bk-team.pick-flash{animation:popIn .25s cubic-bezier(.34,1.56,.64,1) both}
.drag-item.ranked-1-flash{animation:shimmerGold .5s ease both}
.wc-team.wc-flip{animation:cardFlipIn .28s ease both}
.di-live-flash{animation:flashGreen .8s ease both}
#ball-roll{position:fixed;bottom:24px;left:0;font-size:32px;z-index:998;pointer-events:none;display:none;animation:ballRoll 1.4s cubic-bezier(.4,0,.6,1) forwards}
.viewer-badge{animation:eyeSlideIn .32s cubic-bezier(.34,1.56,.64,1) both}
.viewer-badge-eyes{display:inline-block;animation:eyePulse .6s ease .3s both}
.lb-player-card{animation:fadeSlideUp .25s ease both}
.lb-player-card:nth-child(1){animation-delay:.04s}.lb-player-card:nth-child(2){animation-delay:.1s}.lb-player-card:nth-child(3){animation-delay:.16s}.lb-player-card:nth-child(4){animation-delay:.22s}.lb-player-card:nth-child(5){animation-delay:.28s}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:12px;padding:8px 18px;font-size:10px;font-weight:800;z-index:9998;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:5px 5px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:900;display:none}

/* COUNTDOWN */
.countdown-bar{display:flex;align-items:center;justify-content:center;gap:0;padding:10px 14px;background:var(--gold-bg);border-bottom:3px solid var(--border)}
.cd-unit{text-align:center;min-width:48px}
.cd-num{font-size:22px;font-weight:900;color:var(--text);line-height:1;display:block;transition:transform .15s}
.cd-lbl{font-size:7px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:block;margin-top:2px}
.cd-sep{font-size:22px;font-weight:900;color:var(--dim);line-height:1;padding:0 2px;margin-bottom:12px;align-self:flex-start;margin-top:2px}

/* USER SELECT */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:36px 20px;gap:16px}
.user-screen h2{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:800}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 20px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:13px;font-weight:800;color:var(--text);text-align:left;min-width:130px;box-shadow:5px 5px 0 var(--border)}
.user-btn:active{transform:translate(5px,5px);box-shadow:none}
.user-btn-sub{font-size:8px;color:var(--muted);font-weight:700;margin-top:4px}

/* LOCK BAR */
.lock-bar{display:flex;align-items:center;gap:7px;padding:6px 12px;border-bottom:2px solid var(--border2);flex-wrap:wrap;background:var(--cream)}
.lock-info{font-size:9px;color:var(--muted);font-weight:800}
.lock-chips{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.lchip{padding:2px 8px;border-radius:20px;font-size:8px;font-weight:800;border:2px solid var(--border);cursor:pointer;box-shadow:3px 3px 0 var(--border);font-family:'Nunito',sans-serif}
.lchip:active{transform:translate(3px,3px);box-shadow:none}
.lchip.done{background:var(--green-bg);color:var(--green)}
.lchip.pend{background:#ffffff;color:var(--muted)}
.lchip.viewing{background:var(--gold);color:var(--text)}

/* SCORE BANNER */
.score-banner{display:flex;gap:6px;padding:8px 12px;border-bottom:2px solid var(--border2);overflow-x:auto;align-items:center;background:var(--cream)}
.score-banner::-webkit-scrollbar{display:none}
.sb-item{background:#ffffff;border:2px solid var(--border);border-radius:10px;padding:5px 12px;font-size:8px;white-space:nowrap;text-align:center;flex-shrink:0;box-shadow:3px 3px 0 var(--border)}
.sb-item .sl{color:var(--muted);font-size:7px;font-weight:800;text-transform:uppercase}
.sb-item .sv{color:var(--text);font-weight:900;font-size:14px;display:block;margin-top:1px}
.sb-item.total{background:var(--gold-bg);border-color:var(--border)}
.sb-item.total .sv{color:var(--text)}

/* DRAG LIST */
.drag-list{position:relative;padding:8px 0 2px}
.drag-item{display:flex;align-items:center;gap:9px;padding:10px 12px;background:#ffffff;position:relative;user-select:none;-webkit-user-select:none;border:2px solid var(--border);border-radius:10px;margin:0 10px 6px;box-shadow:4px 4px 0 var(--border)}
.drag-item.drag-active{opacity:.4}
.drag-item.drop-target{border-color:var(--gold)!important;background:var(--gold-bg);box-shadow:4px 4px 0 var(--border)}
.drag-item.result-1{background:var(--green-bg);border-color:var(--green)!important}
.drag-item.result-2{background:var(--blue-bg);border-color:var(--blue)!important}
.drag-item.result-3{background:var(--gold-bg);border-color:var(--gold)!important}
.drag-item.result-4{opacity:.35}
.di-pos{font-size:10px;font-weight:900;width:20px;text-align:center;flex-shrink:0;color:var(--dim)}
.di-pos.p1{color:var(--green)}.di-pos.p2{color:var(--blue)}.di-pos.p3{color:var(--gold-dark)}
.di-flag{font-size:18px;width:24px;text-align:center;flex-shrink:0;pointer-events:none}
.di-name{font-size:12px;font-weight:800;color:var(--text);flex:1;pointer-events:none}
.di-conf{font-size:8px;font-weight:700;color:var(--dim);flex-shrink:0;pointer-events:none}
.di-badge{font-size:8px;padding:2px 6px;border-radius:6px;flex-shrink:0;pointer-events:none;border:2px solid var(--border);font-weight:800;margin-left:3px}
.di-badge.adv{background:var(--green-bg);color:var(--green)}
.di-badge.wc{background:var(--gold-bg);color:var(--gold-dark)}
.di-badge.elim{background:var(--red-bg);color:var(--red);opacity:.7}
.di-pts{font-size:9px;font-weight:800;color:var(--green);flex-shrink:0;pointer-events:none}
.di-handle{color:var(--dim);font-size:16px;padding:0 2px;flex-shrink:0;cursor:grab;touch-action:none}

/* ZONE HEADERS */
.zone-header{padding:4px 12px;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:5px}
.zone-header.z-qual{background:var(--green-bg);color:var(--green);border-bottom:2px solid var(--border2)}
.zone-header.z-wc{background:var(--gold-bg);color:var(--gold-dark);border-bottom:2px solid var(--border2)}
.zone-header.z-elim{background:var(--red-bg);color:var(--red);border-bottom:2px solid var(--border2)}
.drag-item.zone-qual{border-color:var(--green)!important}
.drag-item.zone-wc{border-color:var(--gold)!important}
.drag-item.zone-wc-qualified{border-color:var(--green)!important;background:rgba(34,197,94,.06)!important}
.drag-item.zone-wc-missed{border-color:var(--red)!important;background:rgba(239,68,68,.04)!important}
.di-badge.wc-qualified{background:var(--green-bg);color:var(--green)}
.di-badge.wc-missed{background:var(--red-bg);color:var(--red);opacity:.8}

/* DRAG GHOST */
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.95;border-radius:12px;box-shadow:4px 4px 0 var(--border);background:#ffffff;border:2px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:9px;left:0;top:0;min-width:200px}

/* GROUP CARD */
.group-wrap{padding:10px 12px;max-width:480px;margin:0 auto}
.group-card{background:#ffffff;border:3px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:6px 6px 0 var(--border)}
.group-card-head{padding:12px 14px;background:var(--cream);border-bottom:3px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.group-card-title{font-size:15px;font-weight:900;display:flex;align-items:center;gap:8px;color:var(--text);letter-spacing:-.02em}
.group-nav{font-size:13px;font-weight:900;color:var(--text);padding:5px 10px;border-radius:8px;border:2px solid var(--border);background:#ffffff;cursor:pointer;touch-action:manipulation;line-height:1;box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif}
.group-nav:active{transform:translate(2px,2px);box-shadow:none}
.group-card-sub{font-size:8px;font-weight:700;color:var(--muted)}

/* WILD CARDS */
.wc-wrap{padding:10px 12px;max-width:480px;margin:0 auto}
.wc-hdr{font-size:14px;font-weight:900;margin-bottom:3px;color:var(--text)}
.wc-sub{font-size:9px;font-weight:700;color:var(--muted);margin-bottom:10px;line-height:1.8}
.wc-count-bar{font-size:9px;font-weight:800;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.wc-count-num{font-size:16px;font-weight:900;color:var(--text)}
.wc-team{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#ffffff;border:2px solid var(--border);cursor:pointer;margin-bottom:5px;box-shadow:4px 4px 0 var(--border);transition:transform .1s,box-shadow .1s}
.wc-team:active{transform:translate(4px,4px);box-shadow:none}
.wc-team.selected{background:var(--gold-bg);border-color:var(--border)}
.wc-team.selected .wc-name{color:var(--gold-dark);font-weight:900}
.wc-team.correct{background:var(--green-bg);border-color:var(--green);border-width:3px}
.wc-team.correct .wc-name{color:var(--green);font-weight:900}
.wc-team.promoted{background:var(--blue-bg);border-color:var(--blue);border-width:3px}
.wc-team.promoted .wc-name{color:var(--blue);font-weight:900}
.wc-team.wrong{background:var(--red-bg);border-color:var(--red);border-width:3px;opacity:.7}
.wc-team.wrong .wc-name{color:var(--red);font-weight:900;text-decoration:line-through}
.wc-team.full{opacity:.25;pointer-events:none}
.wc-team.missed{background:#fff8f0;border-color:#e8a800;border-width:3px}
.wc-team.missed .wc-name{color:#b87800;font-weight:900}
.wc-flag{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.wc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wc-name{font-size:12px;font-weight:800;color:var(--text);flex:1}
.wc-group{font-size:8px;font-weight:700;color:var(--dim);flex-shrink:0}
.wc-icon{font-size:12px;width:16px;text-align:center;flex-shrink:0;color:var(--green)}

/* LEADERBOARD */
.lb-wrap{padding:10px 12px}
.lb-note{font-size:9px;font-weight:700;color:var(--muted);margin-bottom:10px;background:var(--cream);border:2px solid var(--border2);border-radius:10px;padding:8px 12px}
.lb-row{background:#ffffff;border:2px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:center;box-shadow:5px 5px 0 var(--border)}
.lb-row.first{background:var(--gold-bg)}
.lb-row.second{background:#fafafa}
.lb-row.third{background:#fff8f0}
.lb-medal{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;gap:6px}
.lb-name{font-size:14px;font-weight:900;letter-spacing:-.01em}
.lb-pts{font-size:10px;font-weight:700;color:var(--muted)}.lb-pts b{color:var(--text)}
.lb-poss{font-size:8px;font-weight:700;color:var(--dim)}
.progress{background:var(--border2);border-radius:4px;height:5px;position:relative;overflow:hidden;margin-bottom:4px}
.progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;background:var(--blue);transition:width .5s ease}
.progress-poss{position:absolute;top:0;height:100%;border-radius:4px;background:rgba(85,144,232,.25)}

/* BRACKET */
.bracket-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 0 16px}
.bracket-outer::-webkit-scrollbar{height:4px}
.bracket-outer::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.bracket-stage{display:flex;gap:0;min-width:max-content;align-items:center;padding:0 12px}
.bracket-col{display:flex;flex-direction:column;justify-content:space-around;flex-shrink:0}
.bracket-col-label{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:center;padding:0 6px 6px}
.bk-match{background:#ffffff;border:2px solid var(--border);border-radius:10px;overflow:hidden;width:114px;flex-shrink:0;position:relative;box-shadow:4px 4px 0 var(--border)}
.bk-match.projected{border-color:var(--border);opacity:.9}
.bk-team{display:flex;align-items:center;gap:5px;padding:7px 8px;min-height:32px;transition:background .1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.bk-team:not(:last-child){border-bottom:2px solid var(--border2)}
.bk-team.pickable{cursor:pointer}
.bk-team.pickable:active{background:var(--cream)}
.bk-team.winner{background:var(--green-bg)}.bk-team.winner .bk-name{color:var(--green);font-weight:900}
.bk-team.loser{opacity:.35}
.bk-team.mypick:not(.winner){background:var(--gold-bg)}.bk-team.mypick:not(.winner) .bk-name{color:var(--gold-dark);font-weight:900}
.bk-team.tbd .bk-name{color:var(--dim);font-weight:700}
.bk-flag{font-size:15px;width:20px;text-align:center;flex-shrink:0;line-height:1}
.bk-name{font-size:9px;font-weight:800;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk-icon{font-size:10px;width:12px;text-align:center;flex-shrink:0;color:var(--green)}
.bk-connectors{display:flex;flex-direction:column;justify-content:space-around;flex-shrink:0;position:relative}
.bk-line-group{display:flex;flex-direction:column;align-items:center;justify-content:center}
.bk-line-h{width:12px;height:2px;background:var(--border2)}
.bk-line-v{width:2px;background:var(--border2)}
.bk-champion{text-align:center;padding:14px 8px}
.bk-champ-trophy{font-size:32px;margin-bottom:6px}
.bk-champ-name{font-size:13px;font-weight:900;color:var(--text)}
.bk-champ-label{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.bk-notice{padding:8px 12px;font-size:9px;font-weight:700;line-height:1.6;border-bottom:2px solid var(--border2)}
.bk-notice.preview{background:var(--gold-bg);color:var(--gold-dark)}
.bk-notice.live{background:var(--green-bg);color:var(--green)}
.bk-match.bk-locked .bk-team{pointer-events:none;cursor:default}
.bk-match.bk-locked .bk-team.mypick{opacity:.5}
.phase-banner{padding:8px 12px;font-size:9px;font-weight:700;line-height:1.6;border-bottom:2px solid var(--border2);background:var(--red-bg);color:var(--red)}
.phase-banner.locked{background:var(--red-bg);color:var(--red)}

/* ADMIN */
.adm-wrap{padding:10px 12px}
.adm-sec-label{font-size:9px;font-weight:900;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;margin-top:16px;padding-bottom:5px;border-bottom:2px solid var(--border2)}
.adm-sec-label:first-child{margin-top:0}
.adm-phase-btn{width:100%;padding:11px;border-radius:10px;font-size:12px;font-weight:800;border:2px solid var(--border);font-family:'Nunito',sans-serif;cursor:pointer;margin-bottom:6px;box-shadow:5px 5px 0 var(--border)}

function x(s){var t=String(s||"");t=t.replace(/&/g,"&amp;");t=t.replace(/</g,"&lt;");t=t.replace(/>/g,"&gt;");t=t.replace(/'/g,"&#39;");return t;}

function isLocked(stage){
  if(!ST.user)return false;
  // Bracket picks are only blocked by the stage toggle — not by individual/group lock
  if(stage==="bracket")return false;
  if(isPlayerLocked(ST.user))return true;
  return ST.results.phase==="knockout";
}
function stageOpenForPicks(stage){
  // Groups/wildcards are auto-open until kickoff
  if(stage==="groups"){
    if(new Date() < WC_KICKOFF) return true;
  }
  // After kickoff (or for bracket), use admin-controlled flag
  return !!ST.stageOpen[stage];
}
function activeViewer(){return ST.viewUser||ST.user||null;}

// ── Pick helpers ──────────────────────────────────────────
function getGroupRanking(user,gid){
  var uk=ukey(user);
  var s=ST.picks[uk]&&ST.picks[uk].groups&&ST.picks[uk].groups[gid];
  if(s&&s.length===4)return s;
  return GROUPS[gid].teams.map(function(t){return t.n;});
}
function getResultRanking(gid){return (ST.results.groups&&ST.results.groups[gid])||null;}
function getUserWildcards(user){var uk=ukey(user);return (ST.picks[uk]&&ST.picks[uk].wildcards)||[];}
function getResultWildcards(){return ST.results.wildcards||[];}
function groupPicksDone(user,gid){
  var uk=ukey(user);
  // If stage is globally locked or user is individually locked, all groups are done
  if(ST.locked[uk]) return true;
  if(!stageOpenForPicks("groups")&&new Date()>=WC_KICKOFF) return true;
  return !!(ST.picks[uk]&&ST.picks[uk].groups&&ST.picks[uk].groups[gid]);
}
// True if this player is locked, either individually or because the
// group stage has been globally closed once the tournament started.
function isPlayerLocked(user){
  var uk=ukey(user);
  if(ST.locked[uk]) return true;
  if(!stageOpenForPicks("groups")&&new Date()>=WC_KICKOFF) return true;
  return false;
}

// ── Scoring ───────────────────────────────────────────────
// Robust team-name matching: handles "Bosnia-Herzegovina" vs "Bosnia & Herz.",
// "DR Congo" vs "Congo DR", etc. Compares whole words (ignoring punctuation/case),
// allowing abbreviated words (e.g. "herz" matches "herzegovina").
function _teamWords(s){
  return (s||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim().split(/\s+/).filter(function(w){return w.length>1;});
}
function teamNameMatch(a,b){
  if(!a||!b)return false;
  if(a===b)return true;
  var wa=_teamWords(a),wb=_teamWords(b);
  if(!wa.length||!wb.length)return false;
  var shorter=wa.length<=wb.length?wa:wb;
  var longer=wa.length<=wb.length?wb:wa;
  return shorter.every(function(sw){
    return longer.some(function(lw){return lw.indexOf(sw)>=0||sw.indexOf(lw)>=0;});
  });
}

// ── Game Picks (for fun — does not affect pool score) ──────
// Flat list of all 48 teams across all groups, for matching ESPN names to flags etc.
var ALL_TEAMS=(function(){
  var arr=[];
  GROUP_IDS.forEach(function(gid){GROUPS[gid].teams.forEach(function(t){arr.push(t);});});
  return arr;
})();
// ESPN sometimes uses different official names than ours — map those here.
var TEAM_ALIASES={
  "united states":"USA",
  "united states of america":"USA",
  "usa":"USA",
  "us":"USA",
  "usmnt":"USA",
  "turkey":"Türkiye",
  "turkiye":"Türkiye",
  "ivory coast":"Ivory Coast",
  "cote d'ivoire":"Ivory Coast",
  "côte d'ivoire":"Ivory Coast",
  "czech republic":"Czechia",
  "czechia":"Czechia",
  "korea republic":"South Korea",
  "republic of korea":"South Korea",
  "south korea":"South Korea",
  "cabo verde":"Cape Verde",
  "cape verde":"Cape Verde",
  "bosnia and herzegovina":"Bosnia & Herz.",
  "bosnia & herzegovina":"Bosnia & Herz.",
  "bosnia-herzegovina":"Bosnia & Herz.",
  "bosnia":"Bosnia & Herz.",
  "bih":"Bosnia & Herz.",
  "congo dr":"DR Congo",
  "dr congo":"DR Congo",
  "democratic republic of the congo":"DR Congo",
  "dr. congo":"DR Congo",
  "new zealand":"New Zealand",
  "nz":"New Zealand",
  "iran":"IR Iran",
  "islamic republic of iran":"IR Iran",
  "trinidad and tobago":"Trinidad & Tobago"
};
function findTeam(name){
  if(!name)return null;
  var exact=ALL_TEAMS.find(function(t){return t.n===name;});
  if(exact)return exact;
  var alias=TEAM_ALIASES[name.toLowerCase().trim()];
  if(alias){
    var aliased=ALL_TEAMS.find(function(t){return t.n===alias;});
    if(aliased)return aliased;
  }
  return ALL_TEAMS.find(function(t){return teamNameMatch(name,t.n);})||null;
}
function findTeamFlag(name){var t=findTeam(name);return t?t.flag:"🏳️";}
function findTeamName(name){var t=findTeam(name);return t?t.n:name;}
function findTeamCode(name){var t=findTeam(name);return t?t.code:(name||"").slice(0,3).toUpperCase();}

// Returns the effective group ranking for scoring purposes:
// official admin-set result if present, else pseudo-live result (once all 4 teams have played >=1 game)
function getEffectiveGroupResult(gid){
  var off=(ST.results.groups||{})[gid];
  if(off&&off.length)return off;
  var live=(ST.liveGroupResults||{})[gid];
  if(live&&live.length)return live;
  return null;
}
// A group is "settled" (counts against max-possible) only once it's officially
// finalized by the admin, OR every team in the group has played all 3 group games.
function isGroupSettled(gid){
  var off=(ST.results.groups||{})[gid];
  if(off&&off.length)return true;
  return !!(ST.liveGroupFinal&&ST.liveGroupFinal[gid]);
}

// ── SCORING SYSTEM ───────────────────────────────────────
// Group stage (per group):
//   +1 per top-2 pick that actually qualified (1st, 2nd, or wild card) — max 2
//   +2 bonus for picking the exact group winner in position 1
//   +2 bonus for perfect group order (1st, 2nd, 3rd all correct)
// Wild cards tab:
//   +1 per wild card pick that actually qualified as a wild card
// Bracket: per ROUND_PTS

function calcGroupPoints(user, gid){
  var rr=getEffectiveGroupResult(gid);
  if(!rr||!rr.length) return {total:0, detail:[]};
  var ur=getGroupRanking(user,gid);
  var rwc=getResultWildcards();
  var pts=0, detail=[];

  // Who the PLAYER predicted would qualify from this group
  var groupTeams=GROUPS[gid].teams.map(function(t){return t.n;});
  var pickedToQualify=[ur[0],ur[1]].filter(Boolean).map(function(n){ return findTeamName(n)||n; });
  getUserWildcards(user).forEach(function(t){
    var tn=findTeamName(t)||t;
    if(groupTeams.indexOf(tn)>=0 && pickedToQualify.indexOf(tn)<0)
      pickedToQualify.push(tn);
  });

  // Who ACTUALLY qualified from this group
  var actuallyQualified=[rr[0],rr[1]].filter(Boolean).map(function(n){ return findTeamName(n)||n; });
  rwc.forEach(function(t){
    var tn=findTeamName(t)||t;
    if(groupTeams.indexOf(tn)>=0 && actuallyQualified.indexOf(tn)<0)
      actuallyQualified.push(tn);
  });

  // +1 for every team in both lists (Teams stat)
  pickedToQualify.forEach(function(t){
    if(actuallyQualified.indexOf(t)>=0){
      pts+=1;
      detail.push(t+" ✓ +1");
    }
  });

  var rr0=findTeamName(rr[0])||rr[0];
  var rr1=findTeamName(rr[1])||rr[1];
  var rr2=rr[2]?(findTeamName(rr[2])||rr[2]):null;
  var ur0=findTeamName(ur[0])||ur[0];
  var ur1=findTeamName(ur[1])||ur[1];
  var ur2=ur[2]?(findTeamName(ur[2])||ur[2]):null;

  // +2 bonus for picking the exact group winner in position 1 (1st Place stat)
  if(ur0 && ur0===rr0){ pts+=2; detail.push("Winner bonus +2"); }

  // +2 perfect group order (Perfect stat)
  if(ur0&&ur1&&ur2 && ur0===rr0&&ur1===rr1&&ur2===rr2){
    pts+=2; detail.push("Perfect group +2");
  }

  return {total:pts, detail:detail};
}

function calcScore(user){
  var rwc=getResultWildcards();
  var winners=0, perfect=0, teams=0;

  GROUP_IDS.forEach(function(gid){
    var rr=getEffectiveGroupResult(gid); if(!rr||!rr.length) return;
    var ur=getGroupRanking(user,gid);
    var groupTeams=GROUPS[gid].teams.map(function(t){return t.n;});

    // Teams: top-2 picks that actually qualified (top-2 or WC)
    var top2Picked=[ur[0],ur[1]].filter(Boolean).map(function(n){return findTeamName(n)||n;});
    var actuallyQualifiedDirect=[rr[0],rr[1]].filter(Boolean).map(function(n){return findTeamName(n)||n;});
    var actuallyQualifiedWC=[];
    rwc.forEach(function(t){
      var tn=findTeamName(t)||t;
      if(groupTeams.indexOf(tn)>=0) actuallyQualifiedWC.push(tn);
    });
    var actuallyQualified=actuallyQualifiedDirect.concat(actuallyQualifiedWC);

    // Top-2 picks score if team qualified any way (direct or WC)
    top2Picked.forEach(function(t){ if(actuallyQualified.indexOf(t)>=0) teams++; });

    // Wildcard picks only score if team actually qualified AS a wildcard (not top-2)
    getUserWildcards(user).forEach(function(t){
      var tn=findTeamName(t)||t;
      if(groupTeams.indexOf(tn)>=0 && top2Picked.indexOf(tn)<0 && actuallyQualified.indexOf(tn)>=0) teams++;
    });

    // Winner bonus
    var ur0=findTeamName(ur[0])||ur[0];
    var rr0=findTeamName(rr[0])||rr[0];
    if(ur0&&ur0===rr0) winners++;

    // Perfect group
    var ur1=findTeamName(ur[1])||ur[1], ur2=ur[2]?(findTeamName(ur[2])||ur[2]):null;
    var rr1=findTeamName(rr[1])||rr[1], rr2=rr[2]?(findTeamName(rr[2])||rr[2]):null;
    if(ur0&&ur1&&ur2&&ur0===rr0&&ur1===rr1&&ur2===rr2) perfect++;
  });

  var groupTotal = (winners*2) + (perfect*2) + teams;

  // Bracket points
  var bracketTotal=0;
  var bres=ST.results.bracketResults||{};
  var bpicks=(ST.picks[ukey(user)]||{}).bracket||{};
  Object.keys(ROUND_PTS).forEach(function(round){
    var res=bres[round]||[];
    var picks=bpicks[round]||[];
    picks.forEach(function(t){ if(res.indexOf(t)>=0) bracketTotal+=ROUND_PTS[round]; });
  });

  return groupTotal + bracketTotal;
}

function calcPhase1MaxPossible(user){
  // Max per group: 3 teams qualify × +1 = 3, winner bonus +2, perfect +2 = 7 per group
  // But practically: 2 top-2 picks + 1 wc pick max = 3 teams × 12 groups = 36
  // + 12 winner bonuses × 2 = 24
  // + 12 perfect × 2 = 24
  // Total = 84... but realistically cap at sensible max
  // Simple: 12 × (3 + 2 + 2) = 84
  return 84;
}
function calcMaxPossible(user){
  var total=calcScore(user);
  GROUP_IDS.forEach(function(gid){if(!isGroupSettled(gid))total+=(PTS.qualifier*2)+PTS.groupWinner+PTS.perfectGroup;});
  var rwc=getResultWildcards(),uwc=getUserWildcards(user);
  if(!rwc.length&&uwc.length)total+=uwc.length*PTS.wildcard;
  return total;
}


// Phase 1 = group stage + wild cards
function calcPhase1Score(user){
  var rwc=getResultWildcards();
  var total=0;
  GROUP_IDS.forEach(function(gid){
    var rr=getEffectiveGroupResult(gid); if(!rr||!rr.length) return;
    var ur=getGroupRanking(user,gid);
    var groupTeams=GROUPS[gid].teams.map(function(t){return t.n;});

    var actuallyQualifiedDirect=[rr[0],rr[1]].filter(Boolean).map(function(n){return findTeamName(n)||n;});
    var actuallyQualifiedWC=[];
    rwc.forEach(function(t){
      var tn=findTeamName(t)||t;
      if(groupTeams.indexOf(tn)>=0) actuallyQualifiedWC.push(tn);
    });
    var actuallyQualified=actuallyQualifiedDirect.concat(actuallyQualifiedWC);
    top2Picked.forEach(function(t){ if(actuallyQualified.indexOf(t)>=0) total+=PTS.qualifier; });

function calcPhase1MaxPossible(user){

// Phase 2 = knockout bracket
function calcPhase2Score(user){
  var total=0;
  var official=ST.results.bracket||{};
  ROUNDS.forEach(function(rnd){
    var sz=ROUND_SIZES[rnd];
    for(var mi=0;mi<sz;mi++){
      var off=official[rnd]&&official[rnd][mi];
      if(!off)continue;
      var userBr=(ST.picks[ukey(user)]&&ST.picks[ukey(user)].bracket)||{};
      var pick=userBr[rnd]&&userBr[rnd][mi];
      if(pick===off)total+=ROUND_PTS[rnd];
    }
  });
  return total;
}
function calcPhase2MaxPossible(user){
  var isKnockout=ST.results.phase==="knockout";
  // Before knockout starts, show full theoretical bracket max
  if(!isKnockout){
    var fullMax=0;
    ROUNDS.forEach(function(rnd){fullMax+=ROUND_SIZES[rnd]*ROUND_PTS[rnd];});
    return fullMax; // 16*3 + 8*6 + 4*9 + 2*12 + 1*15 = 48+48+36+24+15 = 171
  }
  // During knockout — earned + remaining live picks
  var total=calcPhase2Score(user);
  var official=ST.results.bracket||{};
  var userBr=(ST.picks[ukey(user)]&&ST.picks[ukey(user)].bracket)||{};
  ROUNDS.forEach(function(rnd){
    var sz=ROUND_SIZES[rnd];
    for(var mi=0;mi<sz;mi++){
      var off=official[rnd]&&official[rnd][mi];
      if(off)continue;
      var pick=userBr[rnd]&&userBr[rnd][mi];
      if(pick)total+=ROUND_PTS[rnd];
    }
  });
  return total;
}

// ── BRACKET STATE ─────────────────────────────────────────
// Stored in ST.picks[user].bracket = { r32: {0..15: teamName}, r16: {0..7}, qf: {0..3}, sf: {0..1}, final: {0: teamName} }
// Official results in ST.results.bracket = same structure (admin sets)
var ROUNDS=["r32","r16","qf","sf","final"];
var ROUND_SIZES={r32:16,r16:8,qf:4,sf:2,final:1};
var ROUND_LABELS={r32:"Round of 32",r16:"Round of 16",qf:"Quarter-Finals",sf:"Semi-Finals",final:"Final"};
var ROUND_PTS={r32:3,r16:6,qf:9,sf:12,final:15};

// 2026 R32: correct FIFA bracket structure
// 12 group winners face 8 wild cards (3rd place) and 4 runners-up
// 12 runners-up face each other (6 pairs) and 4 winners
// Each of A1-L1 and A2-L2 appears EXACTLY ONCE
// Wild card pairings determined after group stage via FIFA Annex C
// Fixed pairings (runners-up vs runners-up, no same-group rematches):
var R32_SRCS=[
  // Group winners vs wild cards (8 matches - WC slots TBD after group stage)
  {a:{g:"A",p:0},b:{wc:true,idx:0}},  // A1 vs 3rd place WC
  {a:{g:"B",p:0},b:{wc:true,idx:1}},  // B1 vs 3rd place WC
  {a:{g:"C",p:0},b:{wc:true,idx:2}},  // C1 vs 3rd place WC
  {a:{g:"D",p:0},b:{wc:true,idx:3}},  // D1 vs 3rd place WC
  {a:{g:"E",p:0},b:{wc:true,idx:4}},  // E1 vs 3rd place WC
  {a:{g:"F",p:0},b:{wc:true,idx:5}},  // F1 vs 3rd place WC
  {a:{g:"G",p:0},b:{wc:true,idx:6}},  // G1 vs 3rd place WC
  {a:{g:"H",p:0},b:{wc:true,idx:7}},  // H1 vs 3rd place WC
  // Runners-up vs runners-up (8 matches, no same-group clashes)
  {a:{g:"I",p:0},b:{g:"A",p:1}},  // I1 vs A2
  {a:{g:"J",p:0},b:{g:"B",p:1}},  // J1 vs B2
  {a:{g:"K",p:0},b:{g:"C",p:1}},  // K1 vs C2
  {a:{g:"L",p:0},b:{g:"D",p:1}},  // L1 vs D2
  {a:{g:"E",p:1},b:{g:"I",p:1}},  // E2 vs I2 (runners-up pairing)
  {a:{g:"F",p:1},b:{g:"J",p:1}},  // F2 vs J2
  {a:{g:"G",p:1},b:{g:"K",p:1}},  // G2 vs K2
  {a:{g:"H",p:1},b:{g:"L",p:1}},  // H2 vs L2
];

function getTeamFlag(name){
  if(!name)return "";
  for(var gid in GROUPS){var t=GROUPS[gid].teams.find(function(t){return t.n===name;});if(t)return t.flag;}
  return "";
}

// Get a team in a bracket slot for a given user (picks or official)
function getBracketSlot(user,round,idx){
  var br=user?(ST.picks[ukey(user)]&&ST.picks[ukey(user)].bracket)||{}:{};
  var official=ST.results.bracket||{};
  // Official result takes priority
  if(official[round]&&official[round][idx]!=null) return official[round][idx];
  // User's pick
  if(br[round]&&br[round][idx]!=null) return br[round][idx];
  return null;
}

// Get the two teams feeding into a slot in a given round
function getFeedTeams(user,round,idx){
  var prevRound=ROUNDS[ROUNDS.indexOf(round)-1];
  if(!prevRound) return [null,null];
  // idx*2 and idx*2+1 from previous round
  return [getBracketSlot(user,prevRound,idx*2), getBracketSlot(user,prevRound,idx*2+1)];
}

// Get R32 source teams (from group predictions or official results)
function getR32Teams(user,idx){
  // If ESPN has provided official bracket matchups, use them for R32 (may include TBD placeholders)
  var official=ST.results&&ST.results.bracketMatchups&&ST.results.bracketMatchups.r32&&ST.results.bracketMatchups.r32[idx];
  if(official&&(official.a||official.b))return [official.a||null,official.b||null];

  var src=R32_SRCS[idx];
  function resolve(s){
    if(s.wc){
      // Wild card slot: use official wild cards if set, else user's wild card tab picks
      var rwc=getResultWildcards(),uwc=user?getUserWildcards(user):[];
      return (rwc.length?rwc:uwc)[s.idx]||null;
    }
    // Direct qualifier slot (1st or 2nd place)
    // Use official results if available
    var rr=getResultRanking(s.g);
    if(rr&&rr[s.p]) return rr[s.p];
    // Preview: only use user's pick if they predicted that team in that qualifying position
    if(user){
      var ur=getGroupRanking(user,s.g);
      return ur[s.p]||null;
    }
    return null;
  }
  return [resolve(src.a),resolve(src.b)];
}

function saveBracketPick(round,idx,team){
  if(!ST.user||!DB) return;
  // Block picks if bracket stage not open or locked
  if(!stageOpenForPicks("bracket")||isLocked("bracket")) return;
  var uk=ukey(ST.user);
  if(!ST.picks[uk]) ST.picks[uk]={};
  if(!ST.picks[uk].bracket) ST.picks[uk].bracket={};
  if(!ST.picks[uk].bracket[round]) ST.picks[uk].bracket[round]={};
  ST.picks[uk].bracket[round][idx]=team;
  // Invalidate downstream picks if team changed
  var ri=ROUNDS.indexOf(round);
  for(var r=ri+1;r<ROUNDS.length;r++){
    var nextRound=ROUNDS[r];
    var nextIdx=Math.floor(idx/Math.pow(2,r-ri));
    var cur=ST.picks[uk].bracket[nextRound]&&ST.picks[uk].bracket[nextRound][nextIdx];
    if(cur&&cur!==team){
      // Only clear if the current downstream pick is the team being replaced
    }
  }
  _saveScroll();draw();_restoreScroll();
  DB.ref(BASE+"/picks/"+uk+"/bracket/"+round+"/"+idx).set(team);
}

function syncScoresToGroup(){
  if(!GROUP_ID||!PARTS||!DB)return;
  var groupPath='groups/'+GROUP_ID+'/data/wc/scores';
  var rwc=getResultWildcards();
  PARTS.forEach(function(player){
    var winners1st=GROUP_IDS.filter(function(gid){var rr=getEffectiveGroupResult(gid);if(!rr||!rr.length)return false;return getGroupRanking(player,gid)[0]===rr[0];}).length;
    var perfectGroups=GROUP_IDS.filter(function(gid){var rr=getEffectiveGroupResult(gid);if(!rr||!rr.length)return false;var ur=getGroupRanking(player,gid);return ur[0]&&ur[1]&&ur[2]&&ur[0]===rr[0]&&ur[1]===rr[1]&&ur[2]===rr[2];}).length;
    var teamsCorrect=0;GROUP_IDS.forEach(function(gid){var rr=getEffectiveGroupResult(gid);if(!rr||!rr.length)return;var ur=getGroupRanking(player,gid);var groupTeams=GROUPS[gid].teams.map(function(t){return t.n;});var top2=([ur[0],ur[1]].filter(Boolean).map(function(n){return findTeamName(n)||n;}));var aqDirect=([rr[0],rr[1]].filter(Boolean).map(function(n){return findTeamName(n)||n;}));var aqWC=[];rwc.forEach(function(t){var tn=findTeamName(t)||t;if(groupTeams.indexOf(tn)>=0)aqWC.push(tn);});var aq=aqDirect.concat(aqWC);top2.forEach(function(t){if(aq.indexOf(t)>=0)teamsCorrect++;});getUserWildcards(player).forEach(function(t){var tn=findTeamName(t)||t;if(groupTeams.indexOf(tn)>=0&&top2.indexOf(tn)<0&&aq.indexOf(tn)>=0)teamsCorrect++;});});
    var p2sc=calcPhase2Score(player);
    var score=(winners1st*PTS.groupWinner)+(perfectGroups*PTS.perfectGroup)+teamsCorrect+p2sc;
    DB.ref(groupPath+'/'+ukey(player)).set(score);
  });
}

function applyLiveStandingsToScores(groups){
  // Apply ESPN parsed groups to ST.liveGroupResults — pseudo-live scoring.
  // groups = [{name:"Group A", rows:[{name:"Mexico",p:1,...},...]}]
  // A group's live ranking only takes effect once EVERY team in the group
  // has played at least 1 game. Once every team has played all 3 group
  // games, the group is marked "final" — this is the point at which the
  // group stage's "max possible" score is reduced to reflect this group.
  if(!groups||!groups.length)return;
  var changed=false;
  var changedGids=[];
  if(!ST.liveGroupResults)ST.liveGroupResults={};
  if(!ST.liveGroupFinal)ST.liveGroupFinal={};
  groups.forEach(function(group){
    // Extract group letter e.g. "Group A" -> "A"
    var gid=(group.name||"").replace(/^group\s*/i,"").trim().toUpperCase();
    if(!GROUPS[gid])return;
    if(!group.rows||group.rows.length!==4)return;
    // Require every team to have played at least 1 game
    var minPlayed=Math.min.apply(null,group.rows.map(function(r){return r.p||0;}));
    if(minPlayed<1)return;
    // Match ESPN team names to our team names
    var ranking=group.rows.map(function(row){
      var matched=null;
      GROUPS[gid].teams.forEach(function(t){
        if(teamNameMatch(row.name,t.n))matched=t.n;
      });
      return matched||row.name;
    }).filter(Boolean);
    if(ranking.length!==4)return;
    var gidChanged=false;
    if(JSON.stringify(ST.liveGroupResults[gid])!==JSON.stringify(ranking)){
      ST.liveGroupResults[gid]=ranking;
      changed=true;gidChanged=true;
    }
    // Once every team has played all 3 group-stage games, the group is final.
    var isFinal=minPlayed>=3;
    if(!!ST.liveGroupFinal[gid]!==isFinal){
      ST.liveGroupFinal[gid]=isFinal;
      changed=true;gidChanged=true;
    }
    if(gidChanged)changedGids.push(gid);
  });
  // Persist any changed groups to Firebase so they survive page reloads
  if(changedGids.length&&DB){
    changedGids.forEach(function(gid){
      DB.ref(RESULTS_BASE+"/liveGroupResults/"+gid).set(ST.liveGroupResults[gid]||null);
      DB.ref(RESULTS_BASE+"/liveGroupFinal/"+gid).set(!!ST.liveGroupFinal[gid]);
    });
  }
  return changed;
}

// ── FOTMOB PARSER ─────────────────────────────────────────
// FotMob leagueId 77 = FIFA World Cup
var FOTMOB_WC_ID = 77;

function parseFotMobGroups(data){
  // FotMob returns: data.response[] → each has .tables[0].tableRows[]
  var groups=[];
  try{
    var resp=(data.response||data.standings||[]);
    // Sometimes wrapped in a single object with .tables
    if(!Array.isArray(resp)&&data.tables) resp=data.tables;
    if(!Array.isArray(resp)&&data.response) resp=data.response;
    resp.forEach(function(section){
      // Each section is a group; name like "Group A"
      var tables=section.tables||[section];
      tables.forEach(function(table){
        var rawName=(table.leagueName||table.name||section.leagueName||section.name||"");
        var gname=rawName.replace(/^group\s*/i,"").trim().toUpperCase();
        if(!gname||gname.length!==1) return;
        var rows=[];
        (table.tableRows||table.rows||[]).forEach(function(row){
          var tname=row.name||row.shortName||"";
          // Match to our team names
          var matched=null;
          if(GROUPS[gname]){
            GROUPS[gname].teams.forEach(function(t){
              var en=tname.toLowerCase(), on=t.n.toLowerCase();
              if(en===on||en.indexOf(on)>=0||on.indexOf(en)>=0) matched=t.n;
            });
          }
          rows.push({
            name: findTeamName(tname),
            p:parseInt(row.played||0),
            w:parseInt(row.wins||0),
            d:parseInt(row.draws||0),
            l:parseInt(row.losses||0),
            gf:parseInt((row.scoresStr||"0:0").split(":")[0])||0,
            ga:parseInt((row.scoresStr||"0:0").split(":")[1])||0,
            gd:parseInt(row.goalConDiff||0),
            pts:parseInt(row.pts||row.points||0)
          });
        });
        if(rows.length===4){
          rows.sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
          groups.push({name:"Group "+gname, rows:rows, gname:gname});
        }
      });
    });
  }catch(e){ console.warn("FotMob parse error",e); }
  return groups;
}

function fetchFotMob(cb){
  fetch("https://www.fotmob.com/api/leaguetable?leagueId="+FOTMOB_WC_ID,{
    headers:{"Referer":"https://www.fotmob.com","x-mas":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"}
  })
  .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(function(data){ cb(null, data); })
  .catch(function(err){ cb(err, null); });
}

function fetchESPNStandings(cb){
  fetch("https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings")
  .then(function(r){return r.json();})
  .then(function(data){ cb(null, data); })
  .catch(function(err){ cb(err, null); });
}

function fetchStandingsWithFallback(onGroups, onError){
  fetchFotMob(function(err, data){
    if(!err && data){
      var groups=parseFotMobGroups(data);
      if(groups.length>0){ onGroups(groups,"FotMob"); return; }
    }
    // Fallback to ESPN
    fetchESPNStandings(function(err2, data2){
      if(err2||!data2){ onError(err2||new Error("Both failed")); return; }
      var groups=parseESPNGroups(data2);
      onGroups(groups,"ESPN");
    });
  });
}

function parseESPNGroups(data){
  var groups=[];
  try{
    if(data&&data.children&&data.children.length){
      data.children.forEach(function(group){
        var name=group.name||group.abbreviation||"";
        var gname=name.replace(/^group\s*/i,"").trim().toUpperCase();
        var entries=(group.standings&&group.standings.entries)||[];
        var rows=[];
        entries.forEach(function(e){
          var team=e.team||{};
          var tname=team.displayName||team.name||"";
          var stats={};
          (e.stats||[]).forEach(function(s){stats[s.name||s.abbreviation]=parseFloat(s.value||0);});
          var matched=null;
          if(GROUPS[gname]){
            GROUPS[gname].teams.forEach(function(t){
              var en=tname.toLowerCase(),on=t.n.toLowerCase();
              if(en===on||en.indexOf(on)>=0||on.indexOf(en)>=0)matched=t.n;
            });
          }
          rows.push({
            name: findTeamName(tname),
            p:parseInt(stats.gamesPlayed||stats.GP||0),
            w:parseInt(stats.wins||stats.W||0),
            d:parseInt(stats.ties||stats.D||0),
            l:parseInt(stats.losses||stats.L||0),
            gf:parseInt(stats.pointsFor||stats.GF||0),
            ga:parseInt(stats.pointsAgainst||stats.GA||0),
            gd:parseInt(stats.pointDifferential||stats.GD||0),
            pts:parseInt(stats.points||stats.PTS||0)
          });
        });
        if(rows.length){
          rows.sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
          groups.push({name:name,gname:gname,rows:rows});
        }
      });
    }
  }catch(e){}
  return groups;
}

function fetchResults(){
  if(_resLoading)return;
  _resLoading=true;
  fetchStandingsWithFallback(
    function(groups, source){
      _resLoading=false; _resLastFetch=Date.now();
      _resData={_parsed:groups, _source:source};
      if(ST.page==="results") renderResultsInto();
    },
    function(){
      _resLoading=false;
      var el=document.getElementById("results-wrap");
      if(el)el.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:11px;line-height:2">Could not load live standings.<br><button style="margin-top:10px;padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);font-family:inherit;font-size:9px;cursor:pointer" onclick="fetchResults()">&#8635; Retry</button></div>';
    }
  );
}

function renderResultsInto(){
  var el=document.getElementById("results-wrap");
  if(!el)return;
  var data=_resData;

  // Use pre-parsed groups if available (from fetchStandingsWithFallback)
  var groups=[];
  var source="";
  if(data&&data._parsed){
    groups=data._parsed;
    source=data._source||"";
  } else if(data){
    // Legacy ESPN raw format
    groups=parseESPNGroups(data);
    source="ESPN";
  }

  // Apply live standings to scores for groups with at least 1 game played per team
  if(applyLiveStandingsToScores(groups)){
    syncScoresToGroup();
    if(ST.page==="leaderboard")draw();
  }

  var ago=_resLastFetch?Math.round((Date.now()-_resLastFetch)/1000):0;

function fetchBracketFromESPN(cb){
  // ESPN scoreboard for World Cup knockout dates
  var url="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260626-20260719&limit=100";
  fetch(url).then(function(r){return r.json();}).then(function(data){
    var events=(data&&data.events)||[];
    // Round name mapping: ESPN type.abbreviation / name → our round keys
    var roundMap={
      "R32":"r32","Round of 32":"r32","32":"r32",
      "R16":"r16","Round of 16":"r16","16":"r16",
      "QF":"qf","Quarterfinal":"qf","Quarter-Final":"qf","8":"qf",
      "SF":"sf","Semifinal":"sf","Semi-Final":"sf","4":"sf",
      "F":"final","Final":"final","1":"final","3rd":"3rd","Third":"3rd"
    };
    // Normalize team name to our GROUPS team names
    function normTeam(name){
      if(!name)return null;
      var nl=name.toLowerCase().trim();
      for(var gid in GROUPS){
        var found=GROUPS[gid].teams.find(function(t){
          var tn=t.n.toLowerCase();
          return tn===nl||nl.indexOf(tn)>=0||tn.indexOf(nl)>=0;
        });
        if(found)return found.n;
      }
      return name;
    }
    // Collect all knockout matches (completed or not) grouped by round
    var byRound={};
    events.forEach(function(ev){
      var comp=(ev.competitions&&ev.competitions[0])||{};
      var typeAbbr=(comp.type&&comp.type.abbreviation)||"";
      var typeName=(comp.type&&comp.type.text)||(ev.status&&ev.status.type&&ev.status.type.description)||"";
      var rndKey=null;
      for(var k in roundMap){
        if(typeAbbr===k||typeName===k||typeName.indexOf(k)>=0){rndKey=roundMap[k];break;}
      }
      if(!rndKey||rndKey==="3rd")return;
      var competitors=comp.competitors||[];
        // Resolve each competitor — may be a real team or a TBD placeholder (e.g. "3RD A/B/C/D/F", "1I")
      function resolveCompetitor(c){
        var raw=(c&&c.team&&(c.team.displayName||c.team.name))||"";
        if(!raw)return null;
        var normed=normTeam(raw);
        // If normTeam found a real team, use it; otherwise keep the raw placeholder
        return normed||raw;
      }
      var teamA=resolveCompetitor(competitors[0]);
      var teamB=resolveCompetitor(competitors[1]);
      // Only skip if both sides are completely unknown
      if(!teamA&&!teamB)return;
      var completed=!!(comp.status&&comp.status.type&&comp.status.type.completed);
      var winner=null;
      if(completed){
        var w=competitors.find(function(c){return c.winner;});
        if(w)winner=normTeam((w.team&&(w.team.displayName||w.team.name))||"");
      }
      var matchDate=new Date(ev.date||0).getTime();
      if(!byRound[rndKey])byRound[rndKey]=[];
      byRound[rndKey].push({teamA:teamA,teamB:teamB,winner:winner,date:matchDate,completed:completed});
    });

    // Sort each round by date → slot index order
    var results={};   // winners: results[rnd][idx] = winnerName
    var matchups={};  // all pairings: matchups[rnd][idx] = {a,b}
    for(var rnd in byRound){
      byRound[rnd].sort(function(a,b){return a.date-b.date;});
      results[rnd]={};
      matchups[rnd]={};
      byRound[rnd].forEach(function(m,i){
        if(m.teamA)matchups[rnd][i]={a:m.teamA,b:m.teamB||null};
        if(m.completed&&m.winner)results[rnd][i]=m.winner;
      });
    }
    cb(results,matchups,null);
  }).catch(function(err){cb(null,null,err);});
}

function initGroupSwipe(){
  var card=document.getElementById("group-swipe-target");
  if(!card) return;
  var sx=0,sy=0,moved=false;
  card.addEventListener("touchstart",function(e){
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
    moved=false;
  },{passive:true});
  card.addEventListener("touchmove",function(e){
    moved=true;
  },{passive:true});
  card.addEventListener("touchend",function(e){
    if(!moved) return;
    var dx=e.changedTouches[0].clientX-sx;
    var dy=e.changedTouches[0].clientY-sy;
    // Only trigger if horizontal swipe is dominant and long enough
    if(Math.abs(dx)<40||Math.abs(dx)<Math.abs(dy)*1.5) return;
    var gIdx=GROUP_IDS.indexOf(ST.group);
    if(dx<0&&gIdx<GROUP_IDS.length-1){
      ST.group=GROUP_IDS[gIdx+1];draw();
    } else if(dx>0&&gIdx>0){
      ST.group=GROUP_IDS[gIdx-1];draw();
    }
  },{passive:true});
}
// Works on both desktop (mouse) and mobile (touch)
function initAllDragLists(){
  // Find all drag lists and init
  var lists=document.querySelectorAll(".drag-list");
  for(var i=0;i<lists.length;i++) initDragList(lists[i]);
}

function initDragList(list){
  var gid=list.getAttribute("data-gid");
  var isAdmin=list.getAttribute("data-admin")==="1";
  var items=list.querySelectorAll(".drag-item");
  var ghost=null;
  var dragSrc=null;
  var overItem=null;
  var startY=0,startX=0,itemH=0;

  function getNames(){
    var ns=[];
    list.querySelectorAll(".drag-item").forEach(function(el){ns.push(el.getAttribute("data-name"));});
    return ns;
  }
  function doSwap(){
    if(!dragSrc||!overItem||dragSrc===overItem) return;
    var names=getNames();
    var fi=names.indexOf(dragSrc.getAttribute("data-name"));
    var ti=names.indexOf(overItem.getAttribute("data-name"));
    if(fi<0||ti<0||fi===ti) return;
    names.splice(fi,1);
    names.splice(ti,0,dragSrc.getAttribute("data-name"));
    _dragState=null;
    if(isAdmin) saveAdminRanking(gid,names);
    else saveGroupRanking(gid,names);
    toast("&#9998; Group "+gid+" updated");
    // Gold shimmer if dragged to 1st place
    if(ti===0){setTimeout(function(){var first=list.querySelector(".drag-item");if(first)flashClass(first,"ranked-1-flash",600);},50);}
  }
  function clearOver(){
    list.querySelectorAll(".drop-target").forEach(function(el){el.classList.remove("drop-target");});
    overItem=null;
  }
  function findItemAt(y){
    var found=null;
    list.querySelectorAll(".drag-item").forEach(function(el){
      var r=el.getBoundingClientRect();
      if(y>=r.top&&y<=r.bottom) found=el;
    });
    return found;
  }
  function removeGhost(){
    if(ghost&&ghost.parentNode){ghost.parentNode.removeChild(ghost);ghost=null;}
  }

  // Touch events — only on the handle
  items.forEach(function(item){
    var handle=item.querySelector(".di-handle");
    if(!handle) return;

    handle.addEventListener("touchstart",function(e){
      e.preventDefault();
      dragSrc=item;
      item.classList.add("drag-active");
      startY=e.touches[0].clientY;
      startX=e.touches[0].clientX;
      itemH=item.offsetHeight;
      // Create ghost
      ghost=document.createElement("div");
      ghost.className="drag-ghost";
      ghost.innerHTML=item.innerHTML;
      ghost.style.width=item.offsetWidth+"px";
      ghost.style.top=(item.getBoundingClientRect().top)+"px";
      ghost.style.left=(item.getBoundingClientRect().left)+"px";
      document.body.appendChild(ghost);
    },{passive:false});

    handle.addEventListener("touchmove",function(e){
      if(!dragSrc) return;
      e.preventDefault();
      var ty=e.touches[0].clientY;
      var tx=e.touches[0].clientX;
      // Move ghost
      if(ghost){
        ghost.style.top=(ty-itemH/2)+"px";
        ghost.style.left=(tx-60)+"px";
      }
      // Find drop target
      clearOver();
      var target=findItemAt(ty);
      if(target&&target!==dragSrc){
        target.classList.add("drop-target");
        overItem=target;
      }
    },{passive:false});

    handle.addEventListener("touchend",function(e){
      if(!dragSrc) return;
      e.preventDefault();
      removeGhost();
      item.classList.remove("drag-active");
      doSwap();
      clearOver();
      dragSrc=null;overItem=null;
    },{passive:false});

    handle.addEventListener("touchcancel",function(){
      removeGhost();
      item.classList.remove("drag-active");
      clearOver();
      dragSrc=null;overItem=null;
    });

    // Mouse events for desktop
    handle.addEventListener("mousedown",function(e){
      e.preventDefault();
      dragSrc=item;
      item.classList.add("drag-active");
      itemH=item.offsetHeight;
      ghost=document.createElement("div");
      ghost.className="drag-ghost";
      ghost.innerHTML=item.innerHTML;
      ghost.style.width=item.offsetWidth+"px";
      ghost.style.top=(e.clientY-itemH/2)+"px";
      ghost.style.left=(e.clientX-60)+"px";
      document.body.appendChild(ghost);
      function onMove(ev){
        ghost.style.top=(ev.clientY-itemH/2)+"px";
        ghost.style.left=(ev.clientX-60)+"px";
        clearOver();
        var target=findItemAt(ev.clientY);
        if(target&&target!==dragSrc){target.classList.add("drop-target");overItem=target;}
      }
      function onUp(){
        removeGhost();
        item.classList.remove("drag-active");
        doSwap();clearOver();
        dragSrc=null;overItem=null;
        document.removeEventListener("mousemove",onMove);
        document.removeEventListener("mouseup",onUp);
      }
      document.addEventListener("mousemove",onMove);
      document.addEventListener("mouseup",onUp);
    });
  });
}

      },{passive:false});

      item.addEventListener("touchcancel",function(){
        removeAdmGhost();
        if(dragged) dragged.style.opacity="";
        getAdmItems().forEach(function(el){ el.style.outline=""; });

      item.addEventListener("dragover",function(e){ e.preventDefault(); e.dataTransfer.dropEffect="move"; });
      item.addEventListener("drop",function(e){
        e.preventDefault();
        doAdmDrop(this);
      });
    });
  })();
  // WC toggle buttons
  document.querySelectorAll(".adm-wc-toggle").forEach(function(btn){
    btn.addEventListener("click",function(e){
      e.stopPropagation();
      var name=this.getAttribute("data-name");
      var gid=ST._adminGroupEdit; if(!gid) return;
      if(!ST._adminGroupWC) ST._adminGroupWC={};
      if(!ST._adminGroupWC[gid]) ST._adminGroupWC[gid]=[];
      var idx=ST._adminGroupWC[gid].indexOf(name);
      if(idx>=0) ST._adminGroupWC[gid].splice(idx,1);
      else ST._adminGroupWC[gid].push(name);
      draw();
    });
  });

  el=document.getElementById("adm-save-group-result"); if(el) el.addEventListener("click",function(){
    var gid=this.getAttribute("data-gid"); if(!gid||!DB) return;
    var order=(ST._adminGroupOrder&&ST._adminGroupOrder[gid]||[]).map(function(n){ return findTeamName(n)||n; });
    if(!order||order.length<2){toast("Set order first");return;}
    var statusEl=document.getElementById("adm-group-save-status");
    if(statusEl) statusEl.textContent="Saving…";
    var wcs=(ST._adminGroupWC&&ST._adminGroupWC[gid])||[];
    // Save group ranking
    DB.ref(RESULTS_BASE+"/results/groups/"+gid).set(order, function(err){
      if(err){ if(statusEl) statusEl.textContent="Error: "+err.message; return; }
      if(!ST.results.groups) ST.results.groups={};
      ST.results.groups[gid]=order;
      // Merge wild cards into global wild cards list
      if(wcs.length){
        DB.ref(RESULTS_BASE+"/results/wildcards").once("value",function(sn){
          var existing=sn.val()||[];
          var merged=existing.slice();
          wcs.forEach(function(t){ if(merged.indexOf(t)<0) merged.push(t); });
          DB.ref(RESULTS_BASE+"/results/wildcards").set(merged,function(){
            if(!ST.results.wildcards) ST.results.wildcards=[];
            merged.forEach(function(t){ if(ST.results.wildcards.indexOf(t)<0) ST.results.wildcards.push(t); });
            if(statusEl){ statusEl.style.color="var(--wc-green)"; statusEl.textContent="✓ Group "+gid+" + "+wcs.length+" WC saved!"; }
            toast("✓ Group "+gid+" saved"+(wcs.length?" + "+wcs.length+" WC":""));
            draw();
          });
        });
      } else {
        if(statusEl){ statusEl.style.color="var(--wc-green)"; statusEl.textContent="✓ Group "+gid+" saved!"; }
        toast("✓ Group "+gid+" saved");
        draw();
      }
    });
  });

  el=document.getElementById("adm-close");if(el)el.addEventListener("click",function(){if(!confirm("Close group stage?"))return;setPhase("knockout");toast("Group stage closed");});
  el=document.getElementById("adm-reopen");if(el)el.addEventListener("click",function(){if(!confirm("Reopen group stage?"))return;setPhase("groups");toast("Reopened");});
  el=document.getElementById("adm-unlock-all");if(el)el.addEventListener("click",function(){
    if(!confirm("Unlock all players?"))return;
    PARTS.forEach(function(p){
      var uk=ukey(p);
      ST.locked[uk]=null;
      if(DB)DB.ref(BASE+"/locked/"+uk).remove();
    });
    toast("&#128275; All players unlocked");
    draw();
  });
  els=document.querySelectorAll("[data-wc]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var name=this.getAttribute("data-wc");if(!name||!ST.user||isLocked())return;
    var wc=getUserWildcards(ST.user);var sel=wc.indexOf(name)>=0;
    if(!sel&&wc.length>=WILD_CARD_COUNT){toast("Already picked 8");return;}
    // Flip animation on the card element
    var el2=this;el2.classList.add("wc-flip");
    saveWildcard(name,!sel);toast(sel?"Removed":"&#9733; "+name);
  });
  els=document.querySelectorAll("[data-adm-wc]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var name=this.getAttribute("data-adm-wc");
    var wc=getResultWildcards().slice();var idx=wc.indexOf(name);
    if(idx>=0)wc.splice(idx,1);
    else{if(wc.length>=8){toast("Already 8 set");return;}wc.push(name);}
    saveAdminWildcards(wc);
    if(idx<0)rollBall(); // ball rolls when a new wild card qualifier is set
    toast(idx>=0?"Removed":"&#9989; "+name);
  });
  el=document.getElementById("adm-wc-clear");if(el)el.addEventListener("click",function(){
    if(!confirm("Clear all 8 wild card qualifiers?"))return;
    saveAdminWildcards([]);toast("Wild cards cleared");
  });

  els=document.querySelectorAll("[data-adm-stage-toggle]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var stage=this.getAttribute("data-adm-stage-toggle");
    var opening=!(ST.stageOpen&&ST.stageOpen[stage]);
    if(!confirm((opening?"Open":"Close")+" "+stage+" picks?"))return;
    toggleStageOpen(stage);
    if(opening&&stage==="bracket"){
      PARTS.forEach(function(p){var uk=ukey(p);ST.locked[uk]=null;if(DB)DB.ref(BASE+"/locked/"+uk).remove();});
      toast("\uD83D\uDD13 Bracket OPEN — all players unlocked");
    } else {
      toast((opening?"\uD83D\uDD13 Picks OPEN: ":"\uD83D\uDD12 Picks CLOSED: ")+stage);
    }
  });
  el=document.getElementById("adm-fetch-live");if(el)el.addEventListener("click",function(){
    var statusEl=document.getElementById("adm-live-status");
    if(statusEl)statusEl.textContent="Fetching standings...";
    fetchStandingsWithFallback(
      function(groups, source){
        var pushed={};
        groups.forEach(function(g){
          var gname=g.gname;
          if(!gname||!GROUPS[gname]) return;
          var ranking=g.rows.map(function(r){return findTeamName(r.name)||r.name;}).filter(Boolean);
          if(ranking.length===4) pushed[gname]=ranking;
        });
        if(Object.keys(pushed).length){
          pushLiveGroupsToResults(pushed);
          if(statusEl)statusEl.innerHTML='<span style="color:var(--wc-green)">✓ Pushed '+Object.keys(pushed).length+' groups via '+source+'</span>';
          toast("📡 Live standings pushed ("+source+")");
        } else {
          if(statusEl)statusEl.innerHTML='<span style="color:#ff7070">No standings data yet</span>';
          toast("No data available yet");
        }
      },
      function(err){
        if(statusEl)statusEl.innerHTML='<span style="color:#ff7070">Fetch failed — check connection</span>';
        toast("Fetch failed");
      }
    );
  });
  el=document.getElementById("adm-save-r32");if(el)el.addEventListener("click",function(){
    var matchups={};
    for(var mi=0;mi<16;mi++){
      var a=document.getElementById("bk-a-"+mi),b=document.getElementById("bk-b-"+mi);
      var va=a?a.value:"",vb=b?b.value:"";
      if(va||vb)matchups[mi]={a:va||null,b:vb||null};
    }
    if(!ST.results)ST.results={};
    if(!ST.results.bracketMatchups)ST.results.bracketMatchups={};
    ST.results.bracketMatchups.r32=matchups;
    if(DB)DB.ref(RESULTS_BASE+"/results/bracketMatchups/r32").set(matchups,function(){
      toast("✓ R32 matchups saved");
      draw();
    });
    else{toast("✓ R32 matchups saved (local)");draw();}
  });
  el=document.getElementById("adm-fetch-bracket");if(el)el.addEventListener("click",function(){
    var statusEl=document.getElementById("adm-bracket-status");
    if(statusEl)statusEl.textContent="Fetching bracket results from ESPN...";
    fetchBracketFromESPN(function(results,matchups,err){
      if(err){
        if(statusEl)statusEl.innerHTML='<span style="color:#ff7070">Fetch failed: '+err.message+'</span>';
        toast("Fetch failed");
        return;
      }
      var totalMatchups=0;
      for(var rnd in matchups)totalMatchups+=Object.keys(matchups[rnd]).length;
      var totalWinners=0;
      for(var rnd in results)totalWinners+=Object.keys(results[rnd]).length;
      if(!totalMatchups&&!totalWinners){
        if(statusEl)statusEl.innerHTML='<span style="color:#ff7070">No knockout matches found yet</span>';
        toast("No bracket data yet");
        return;
      }
      // Save matchups (official bracket pairings) to Firebase
      if(Object.keys(matchups).length){
        if(!ST.results.bracketMatchups)ST.results.bracketMatchups={};
        for(var rnd in matchups){
          ST.results.bracketMatchups[rnd]=matchups[rnd];
          if(DB)DB.ref(RESULTS_BASE+"/results/bracketMatchups/"+rnd).set(matchups[rnd]);
        }
      }
      // Save winners
      if(!ST.results.bracket)ST.results.bracket={};
      for(var rnd in results){
        if(!ST.results.bracket[rnd])ST.results.bracket[rnd]={};
        for(var idx in results[rnd])ST.results.bracket[rnd][idx]=results[rnd][idx];
        if(DB)DB.ref(RESULTS_BASE+"/results/bracket/"+rnd).update(results[rnd]);
      }
      var roundNames={r32:"R32",r16:"R16",qf:"QF",sf:"SF",final:"Final"};
      var parts=[];
      if(totalMatchups)parts.push(totalMatchups+" matchups");
      if(totalWinners)parts.push(totalWinners+" winners");
      if(statusEl)statusEl.innerHTML='<span style="color:var(--purple)">✓ Pushed: '+parts.join(", ")+'</span>';
      toast("🏆 Bracket updated");
      draw();
    });
  });
  el=document.getElementById("adm-fetch-games");if(el)el.addEventListener("click",function(){
    var statusEl=document.getElementById("adm-games-status");
    if(statusEl)statusEl.textContent="Fetching schedule from ESPN...";
    fetchGamesFromESPN(function(games,err){
      if(err){
        if(statusEl)statusEl.innerHTML='<span style="color:#ff7070">Fetch failed: '+err.message+'</span>';
        toast("Fetch failed");
        return;
      }
      var count=Object.keys(games||{}).length;
      if(!count){
        if(statusEl)statusEl.innerHTML='<span style="color:#ff7070">No games found</span>';
        toast("No games found");
        return;
      }
      if(DB)DB.ref(RESULTS_BASE+"/games").update(games);
      if(statusEl)statusEl.innerHTML='<span style="color:var(--wc-green)">✓ Loaded '+count+' games</span>';
      toast("🗓️ Game schedule updated");
    });
  });
}

loadData();

// Pull-to-refresh for results tab
(function(){
  var _ptrStartY=0,_ptrActive=false;
  document.addEventListener("touchstart",function(e){
    _ptrStartY=e.touches[0].clientY;
    _ptrActive=(window.scrollY===0&&ST.page==="results");
  },{passive:true});
  document.addEventListener("touchend",function(e){
    if(!_ptrActive)return;
    var dy=e.changedTouches[0].clientY-_ptrStartY;
    if(dy>60) fetchResults();
    _ptrActive=false;
  },{passive:true});
})();

</script>
</body>
</html>
