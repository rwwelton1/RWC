<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PoolPlay – 2026 World Cup</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090f;--card:#0d1117;--card2:#090d14;--border:#1e2a3a;--border2:#0f1923;--text:#e2e8f0;--muted:#475569;--dim:#334155;--red2:#ef4444;--gold:#fbbf24;--green:#10b981}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:13px;min-height:100vh}
button,a{font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button{border:none;outline:none}
a{color:inherit;text-decoration:none}

.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 10px;display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:50}
.topbar-center{flex:1;min-width:0}
.app-name{font-size:14px;font-weight:700}
.app-sub{font-size:7px;color:var(--muted)}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--card2);border:1px solid #2d3f52;border-radius:20px;padding:3px 9px;font-size:9px;color:#94a3b8}
.tag.locked{border-color:rgba(251,191,36,.4);color:var(--gold)}
.btn{border-radius:6px;padding:4px 10px;font-size:9px;font-weight:600;border:1px solid}
.btn-ghost{background:var(--card);border-color:var(--border);color:#64748b}
.btn-gold{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.35);color:var(--gold)}
.btn-red{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#fca5a5}

.page-bar{background:var(--card);border-bottom:1px solid var(--border);display:flex;padding:0 8px;overflow-x:auto}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:7px 11px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:2px solid transparent;background:none;white-space:nowrap}
.ptab.active{color:#fca5a5;border-bottom-color:var(--red2)}

.group-bar{display:flex;gap:4px;padding:7px 10px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--card2)}
.group-bar::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;padding:4px 10px;border-radius:6px;font-size:9px;font-weight:700;border:1px solid var(--border);background:var(--card);color:var(--muted)}
.gtab.active{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.08);color:var(--gold)}
.gtab.done{border-color:rgba(16,185,129,.3);color:#6ee7b7;background:rgba(16,185,129,.05)}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--card);border:1px solid rgba(239,68,68,.4);color:#fca5a5;border-radius:8px;padding:7px 16px;font-size:10px;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:900;display:none}

.user-screen{display:flex;flex-direction:column;align-items:center;padding:44px 20px;gap:18px}
.user-screen h2{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:9px;background:var(--card);border:1px solid var(--border);font-size:14px;font-weight:700;color:var(--text);text-align:left;min-width:130px}
.user-btn-sub{font-size:8px;color:var(--muted);font-weight:400;margin-top:3px}

.lock-bar{display:flex;align-items:center;gap:7px;padding:5px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--card2)}
.lock-info{font-size:9px;color:var(--muted)}
.lock-chips{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.lchip{padding:1px 7px;border-radius:20px;font-size:8px;border:1px solid;cursor:pointer}
.lchip.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.lchip.pend{background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.18);color:var(--muted)}
.lchip.viewing{border-color:rgba(99,102,241,.5);color:#a5b4fc;background:rgba(99,102,241,.1)}

.score-banner{display:flex;gap:6px;padding:5px 12px;border-bottom:1px solid var(--border);overflow-x:auto;align-items:center}
.score-banner::-webkit-scrollbar{display:none}
.sb-item{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:8px;white-space:nowrap;text-align:center;flex-shrink:0}
.sb-item .sl{color:var(--muted);font-size:7px}
.sb-item .sv{color:var(--text);font-weight:700;font-size:12px}
.sb-item.total{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)}
.sb-item.total .sv{color:var(--gold)}

/* ── DRAG LIST ── */
.drag-list{position:relative}
.drag-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--card);transition:background .1s;position:relative;user-select:none;-webkit-user-select:none}
.drag-item:not(:last-child){border-bottom:1px solid var(--border2)}
.drag-item.drag-active{opacity:.4;background:rgba(251,191,36,.04)}
.drag-item.drop-target{border-top:2px solid var(--gold);background:rgba(251,191,36,.06)}
.drag-item.result-1{background:rgba(16,185,129,.07)}
.drag-item.result-2{background:rgba(96,165,250,.05)}
.drag-item.result-3{background:rgba(251,191,36,.04)}
.drag-item.result-4{opacity:.32}
.drag-item.correct-pick .di-name{color:#6ee7b7}
.di-pos{font-size:9px;font-weight:800;width:20px;text-align:center;flex-shrink:0;color:var(--dim)}
.di-pos.p1{color:#6ee7b7}.di-pos.p2{color:#93c5fd}.di-pos.p3{color:var(--gold)}
.di-flag{font-size:17px;width:24px;text-align:center;flex-shrink:0;pointer-events:none}
.di-name{font-size:11px;font-weight:600;color:var(--text);flex:1;pointer-events:none}
.di-conf{font-size:7px;color:var(--dim);flex-shrink:0;pointer-events:none}
.di-badge{font-size:7px;padding:1px 5px;border-radius:8px;flex-shrink:0;pointer-events:none}
.di-badge.adv{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.di-badge.wc{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:var(--gold)}
.di-badge.elim{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.18);color:#fca5a5;opacity:.7}
.di-pts{font-size:8px;color:#6ee7b7;flex-shrink:0;pointer-events:none}
.di-handle{color:var(--dim);font-size:14px;padding:0 2px;flex-shrink:0;cursor:grab;touch-action:none}
.rank-divider{padding:2px 12px;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-top:1px solid var(--border);pointer-events:none}
.rank-divider.qual{color:#6ee7b7;border-color:rgba(16,185,129,.15)}
.rank-divider.wc{color:var(--gold);border-color:rgba(251,191,36,.12)}
.rank-divider.elim{color:#ef4444;border-color:rgba(239,68,68,.1)}
/* Ghost element that follows finger */
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.85;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6);background:var(--card);border:1px solid var(--gold);padding:9px 12px;display:flex;align-items:center;gap:9px;left:0;top:0;min-width:200px;}

/* ── GROUP CARD ── */
.group-wrap{padding:10px 12px;max-width:480px;margin:0 auto}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.group-card-head{padding:8px 12px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.group-card-title{font-size:11px;font-weight:700}
.group-card-sub{font-size:8px;color:var(--muted)}

/* ── WILD CARDS ── */
.wc-wrap{padding:10px 12px;max-width:480px;margin:0 auto}
.wc-hdr{font-size:11px;font-weight:700;margin-bottom:3px}
.wc-sub{font-size:8px;color:var(--muted);margin-bottom:10px;line-height:1.7}
.wc-count-bar{font-size:9px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.wc-count-num{font-size:14px;font-weight:800;color:var(--gold)}
.wc-team{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:var(--card);border:1px solid var(--border);cursor:pointer;margin-bottom:4px;transition:all .1s}
.wc-team.selected{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.4)}
.wc-team.selected .wc-name{color:var(--gold)}
.wc-team.correct{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3)}
.wc-team.correct .wc-name{color:#6ee7b7}
.wc-team.wrong{opacity:.38;text-decoration:line-through}
.wc-team.full{opacity:.35;pointer-events:none}
.wc-flag{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.wc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wc-name{font-size:11px;font-weight:600;color:var(--text);flex:1}
.wc-group{font-size:8px;color:var(--dim);flex-shrink:0}
.wc-icon{font-size:10px;width:14px;text-align:center;flex-shrink:0}

/* ── LEADERBOARD ── */
.lb-wrap{padding:12px}
.lb-note{font-size:8px;color:var(--muted);margin-bottom:12px;line-height:1.8;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 10px}
.lb-row{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:7px;display:flex;gap:9px;align-items:center}
.lb-row.first{border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.025)}
.lb-row.second{border-color:rgba(148,163,184,.2)}
.lb-row.third{border-color:rgba(205,127,50,.2)}
.lb-medal{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;gap:6px}
.lb-name{font-size:13px;font-weight:700}
.lb-pts{font-size:10px;color:var(--muted)}
.lb-pts b{color:#f1f5f9;font-weight:700}
.lb-poss{font-size:8px;color:var(--dim)}
.progress{background:#0f1923;border-radius:3px;height:3px;position:relative;overflow:hidden;margin-bottom:4px}
.progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;background:linear-gradient(90deg,#c0392b,#ef4444);transition:width .6s}
.progress-poss{position:absolute;top:0;height:100%;border-radius:3px;background:rgba(251,191,36,.3)}

/* ── ADMIN ── */
.adm-wrap{padding:10px}
.adm-sec-label{font-size:8px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;margin-top:14px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.adm-sec-label:first-child{margin-top:0}
.adm-phase-btn{width:100%;padding:10px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid;font-family:inherit;cursor:pointer;margin-bottom:6px}
.adm-open{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.adm-close{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.4);color:#fca5a5}
.adm-group-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.adm-group-head{padding:6px 12px;background:var(--card2);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--muted)}
.adm-wc-team{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:var(--card);border:1px solid var(--border);cursor:pointer;margin-bottom:4px}
.adm-wc-team.sel{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3)}

.phase-banner{padding:7px 12px;font-size:9px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border)}
.phase-banner.open{background:rgba(16,185,129,.05);color:#6ee7b7;border-color:rgba(16,185,129,.15)}
.phase-banner.locked{background:rgba(239,68,68,.05);color:#fca5a5;border-color:rgba(239,68,68,.15)}
</style>
</head>
<body>

<script>
// =====================================================
// 2026 FIFA WORLD CUP — GROUP STAGE POOL
// =====================================================
var GROUP_ID=(function(){var m=location.search.match(/[?&]group=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var URL_USER=(function(){var m=location.search.match(/[?&]user=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var GROUP_ADMIN_PW=null;
var BASE=GROUP_ID?"groups/"+GROUP_ID+"/data/wc2026":"wc2026";
var RESULTS_BASE="wc2026";
var MASTER_PW="Sloop";

// ── OFFICIAL 2026 WORLD CUP GROUPS ────────────────────────
// Source: UEFA.com / ESPN confirmed complete draw (all 48 teams)
var GROUPS={
  A:{id:"A",teams:[{n:"Mexico",       flag:"🇲🇽",conf:"CONCACAF",color:"#006847"},
                   {n:"South Africa", flag:"🇿🇦",conf:"CAF",     color:"#007a4d"},
                   {n:"South Korea",  flag:"🇰🇷",conf:"AFC",     color:"#cd2e3a"},
                   {n:"Czechia",      flag:"🇨🇿",conf:"UEFA",    color:"#d7141a"}]},
  B:{id:"B",teams:[{n:"Canada",       flag:"🇨🇦",conf:"CONCACAF",color:"#ff0000"},
                   {n:"Bosnia & Herz.",flag:"🇧🇦",conf:"UEFA",  color:"#002395"},
                   {n:"Qatar",        flag:"🇶🇦",conf:"AFC",     color:"#8d1b3d"},
                   {n:"Switzerland",  flag:"🇨🇭",conf:"UEFA",    color:"#ff0000"}]},
  C:{id:"C",teams:[{n:"Brazil",       flag:"🇧🇷",conf:"CONMEBOL",color:"#009c3b"},
                   {n:"Morocco",      flag:"🇲🇦",conf:"CAF",     color:"#c1272d"},
                   {n:"Haiti",        flag:"🇭🇹",conf:"CONCACAF",color:"#003f87"},
                   {n:"Scotland",     flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",conf:"UEFA",  color:"#003f87"}]},
  D:{id:"D",teams:[{n:"USA",          flag:"🇺🇸",conf:"CONCACAF",color:"#002868"},
                   {n:"Paraguay",     flag:"🇵🇾",conf:"CONMEBOL",color:"#d52b1e"},
                   {n:"Australia",    flag:"🇦🇺",conf:"OFC",     color:"#00843d"},
                   {n:"Türkiye",      flag:"🇹🇷",conf:"UEFA",    color:"#e30a17"}]},
  E:{id:"E",teams:[{n:"Germany",      flag:"🇩🇪",conf:"UEFA",    color:"#000000"},
                   {n:"Curaçao",      flag:"🇨🇼",conf:"CONCACAF",color:"#003087"},
                   {n:"Ivory Coast",  flag:"🇨🇮",conf:"CAF",     color:"#f77f00"},
                   {n:"Ecuador",      flag:"🇪🇨",conf:"CONMEBOL",color:"#ffd100"}]},
  F:{id:"F",teams:[{n:"Netherlands",  flag:"🇳🇱",conf:"UEFA",    color:"#ff6600"},
                   {n:"Japan",        flag:"🇯🇵",conf:"AFC",     color:"#bc002d"},
                   {n:"Sweden",       flag:"🇸🇪",conf:"UEFA",    color:"#006aa7"},
                   {n:"Tunisia",      flag:"🇹🇳",conf:"CAF",     color:"#e70013"}]},
  G:{id:"G",teams:[{n:"Belgium",      flag:"🇧🇪",conf:"UEFA",    color:"#000000"},
                   {n:"Egypt",        flag:"🇪🇬",conf:"CAF",     color:"#ce1126"},
                   {n:"Iran",         flag:"🇮🇷",conf:"AFC",     color:"#239f40"},
                   {n:"New Zealand",  flag:"🇳🇿",conf:"OFC",     color:"#00247d"}]},
  H:{id:"H",teams:[{n:"Spain",        flag:"🇪🇸",conf:"UEFA",    color:"#aa151b"},
                   {n:"Cape Verde",   flag:"🇨🇻",conf:"CAF",     color:"#003893"},
                   {n:"Saudi Arabia", flag:"🇸🇦",conf:"AFC",     color:"#006c35"},
                   {n:"Uruguay",      flag:"🇺🇾",conf:"CONMEBOL",color:"#5aaaa8"}]},
  I:{id:"I",teams:[{n:"France",       flag:"🇫🇷",conf:"UEFA",    color:"#002395"},
                   {n:"Senegal",      flag:"🇸🇳",conf:"CAF",     color:"#00853f"},
                   {n:"Iraq",         flag:"🇮🇶",conf:"AFC",     color:"#ce1126"},
                   {n:"Norway",       flag:"🇳🇴",conf:"UEFA",    color:"#ef2b2d"}]},
  J:{id:"J",teams:[{n:"Argentina",    flag:"🇦🇷",conf:"CONMEBOL",color:"#74acdf"},
                   {n:"Algeria",      flag:"🇩🇿",conf:"CAF",     color:"#006233"},
                   {n:"Austria",      flag:"🇦🇹",conf:"UEFA",    color:"#ed2939"},
                   {n:"Jordan",       flag:"🇯🇴",conf:"AFC",     color:"#007a3d"}]},
  K:{id:"K",teams:[{n:"Portugal",     flag:"🇵🇹",conf:"UEFA",    color:"#006600"},
                   {n:"DR Congo",     flag:"🇨🇩",conf:"CAF",     color:"#007fff"},
                   {n:"Uzbekistan",   flag:"🇺🇿",conf:"AFC",     color:"#1eb53a"},
                   {n:"Colombia",     flag:"🇨🇴",conf:"CONMEBOL",color:"#fcd116"}]},
  L:{id:"L",teams:[{n:"England",      flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",conf:"UEFA",  color:"#012169"},
                   {n:"Croatia",      flag:"🇭🇷",conf:"UEFA",    color:"#ff0000"},
                   {n:"Ghana",        flag:"🇬🇭",conf:"CAF",     color:"#006b3f"},
                   {n:"Panama",       flag:"🇵🇦",conf:"CONCACAF",color:"#da121a"}]}
};

var GROUP_IDS=["A","B","C","D","E","F","G","H","I","J","K","L"];
var PTS={groupWinner:3,qualifier:1,wildcard:1};
var WILD_CARD_COUNT=8;
var PARTS=["Player1","Player2","Player3","Player4"];
var _EM={};
var DB=null;
var ST={page:"groups",group:"A",user:URL_USER||null,viewUser:null,admin:false,picks:{},results:{},locked:{}};
var _dragState=null; // active drag state

try{
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks",appId:"1:965978379243:web:35f9db9a664f9170e27fae"});
  DB=firebase.database();
}catch(e){}

function x(s){var t=String(s||"");t=t.replace(/&/g,"&amp;");t=t.replace(/</g,"&lt;");t=t.replace(/>/g,"&gt;");t=t.replace(/'/g,"&#39;");return t;}
var _tt;function toast(m){var el=document.getElementById("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove("show");},2500);}
function ukey(n){return n.toLowerCase().replace(/[^a-z0-9]/g,"_");}
function pem(n){return _EM[n]?"<span style='margin-right:3px'>"+_EM[n]+"</span>":"";}
function isLocked(){return !!(ST.user&&(ST.locked[ukey(ST.user)]||(ST.results.phase==="knockout")));}
function activeViewer(){return ST.viewUser||ST.user||null;}

// ── Pick helpers ──────────────────────────────────────────
function getGroupRanking(user,gid){
  var uk=ukey(user);
  var s=ST.picks[uk]&&ST.picks[uk].groups&&ST.picks[uk].groups[gid];
  if(s&&s.length===4)return s;
  return GROUPS[gid].teams.map(function(t){return t.n;});
}
function getResultRanking(gid){return (ST.results.groups&&ST.results.groups[gid])||null;}
function getUserWildcards(user){var uk=ukey(user);return (ST.picks[uk]&&ST.picks[uk].wildcards)||[];}
function getResultWildcards(){return ST.results.wildcards||[];}
function groupPicksDone(user,gid){
  var uk=ukey(user);return !!(ST.picks[uk]&&ST.picks[uk].groups&&ST.picks[uk].groups[gid]);
}

// ── Scoring ───────────────────────────────────────────────
function calcScore(user){
  var total=0,res=ST.results.groups||{};
  GROUP_IDS.forEach(function(gid){
    var rr=res[gid];if(!rr||!rr.length)return;
    var ur=getGroupRanking(user,gid);
    if(ur[0]===rr[0])total+=PTS.groupWinner;
    if(ur[1]===rr[1])total+=PTS.qualifier;
  });
  var rwc=getResultWildcards(),uwc=getUserWildcards(user);
  if(rwc.length&&uwc.length)uwc.forEach(function(t){if(rwc.indexOf(t)>=0)total+=PTS.wildcard;});
  return total;
}
function calcMaxPossible(user){
  var total=calcScore(user),res=ST.results.groups||{};
  GROUP_IDS.forEach(function(gid){var rr=res[gid];if(!rr||!rr.length)total+=PTS.groupWinner+PTS.qualifier;});
  var rwc=getResultWildcards(),uwc=getUserWildcards(user);
  if(!rwc.length&&uwc.length)total+=uwc.length*PTS.wildcard;
  return total;
}

// ── Firebase ──────────────────────────────────────────────
var _savedScroll=null;
function _restoreScroll(){
  if(!_savedScroll)return;
  var sy=_savedScroll.sy;_savedScroll=null;
  requestAnimationFrame(function(){window.scrollTo(0,sy);requestAnimationFrame(function(){window.scrollTo(0,sy);});});
}
function _saveScroll(){_savedScroll={sy:window.pageYOffset||0};}

function saveGroupRanking(gid,ranking){
  if(!ST.user||!DB)return;
  var uk=ukey(ST.user);
  if(!ST.picks[uk])ST.picks[uk]={};
  if(!ST.picks[uk].groups)ST.picks[uk].groups={};
  ST.picks[uk].groups[gid]=ranking;
  _saveScroll();draw();_restoreScroll();
  DB.ref(BASE+"/picks/"+uk+"/groups/"+gid).set(ranking);
}
function saveWildcard(name,sel){
  if(!ST.user||!DB)return;
  var uk=ukey(ST.user);
  if(!ST.picks[uk])ST.picks[uk]={};
  var wc=getUserWildcards(ST.user).slice();
  if(sel){if(wc.indexOf(name)<0)wc.push(name);}
  else wc=wc.filter(function(t){return t!==name;});
  ST.picks[uk].wildcards=wc;
  _saveScroll();draw();_restoreScroll();
  DB.ref(BASE+"/picks/"+uk+"/wildcards").set(wc);
}
function saveAdminRanking(gid,ranking){
  if(!DB)return;
  if(!ST.results.groups)ST.results.groups={};
  ST.results.groups[gid]=ranking;
  _saveScroll();draw();_restoreScroll();
  DB.ref(RESULTS_BASE+"/results/groups/"+gid).set(ranking);
}
function saveAdminWildcards(wc){
  if(!DB)return;ST.results.wildcards=wc;
  _saveScroll();draw();_restoreScroll();
  DB.ref(RESULTS_BASE+"/results/wildcards").set(wc);
}
function setPhase(phase){
  if(!DB)return;ST.results.phase=phase;
  DB.ref(RESULTS_BASE+"/results/phase").set(phase);draw();
}
function loadData(){
  if(!DB){draw();return;}
  function s1(){if(!GROUP_ID){s2();return;}DB.ref("groups/"+GROUP_ID).once("value",function(sn){var g=sn.val()||{};if(g&&g.players&&g.players.length)PARTS=g.players;if(g&&g.adminPw)GROUP_ADMIN_PW=g.adminPw;s2();},function(){s2();});}
  function s2(){var done=0,total=PARTS.length;if(!total){s3();return;}PARTS.forEach(function(p){DB.ref("users/"+ukey(p)+"/emoji").once("value",function(sn){if(sn.val())_EM[p]=sn.val();done++;if(done===total)s3();},function(){done++;if(done===total)s3();});});}
  function s3(){
    DB.ref("globalSettings/masterPw").on("value",function(sn){if(sn.val())MASTER_PW=sn.val();});
    DB.ref(BASE+"/picks").on("value",function(sn){ST.picks=sn.val()||{};draw();_restoreScroll();});
    DB.ref(BASE+"/locked").on("value",function(sn){ST.locked=sn.val()||{};draw();_restoreScroll();});
    DB.ref(RESULTS_BASE+"/results").on("value",function(sn){ST.results=sn.val()||{};draw();_restoreScroll();});
  }
  s1();
}

var _cr=false;
function launchConfetti(){if(_cr)return;_cr=true;var cv=document.getElementById("confetti-canvas");cv.style.display="block";cv.width=window.innerWidth;cv.height=window.innerHeight;var ctx=cv.getContext("2d"),pp=[],cols=["#c0392b","#ef4444","#e8b84b","#fbbf24","#fff","#10b981","#60a5fa"];for(var i=0;i<120;i++)pp.push({x:Math.random()*cv.width,y:-10-Math.random()*200,w:6+Math.random()*7,h:8+Math.random()*9,color:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*4,vy:2+Math.random()*4,angle:Math.random()*Math.PI*2,va:(Math.random()-.5)*.2});var fr=0;function tick(){ctx.clearRect(0,0,cv.width,cv.height);var alive=false;for(var i=0;i<pp.length;i++){var p=pp[i];p.x+=p.vx;p.y+=p.vy;p.angle+=p.va;p.vy+=.08;if(p.y<cv.height+20)alive=true;ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.angle);ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-(fr/200));ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();}fr++;if(alive&&fr<220)requestAnimationFrame(tick);else{cv.style.display="none";_cr=false;}}requestAnimationFrame(tick);}

// ── RENDER ────────────────────────────────────────────────
function buildDragList(ranking, gid, rr, viewer, canDrag, isAdmin){
  var h='<div class="drag-list" id="'+(isAdmin?"adm-dl-":"dl-")+gid+'" data-gid="'+x(gid)+'" data-admin="'+(isAdmin?1:0)+'">';
  ranking.forEach(function(name,idx){
    var t=GROUPS[gid].teams.find(function(t){return t.n===name;});
    if(!t)return;
    var rPos=rr?rr.indexOf(name):-1;
    var resCls=rPos===0?" result-1":rPos===1?" result-2":rPos===2?" result-3":rPos===3?" result-4":"";
    var ptsStr="";
    if(rr&&viewer&&!isAdmin){
      var ur=getGroupRanking(viewer,gid);
      if(rPos===0&&ur[0]===name) ptsStr='+3';
      else if(rPos===1&&ur[1]===name) ptsStr='+1';
    }
    var badge="";
    if(rr&&rPos>=0){
      if(rPos===0) badge='<span class="di-badge adv">Winner</span>';
      else if(rPos===1) badge='<span class="di-badge adv">2nd</span>';
      else if(rPos===2) badge='<span class="di-badge wc">3rd</span>';
      else badge='<span class="di-badge elim">Elim</span>';
    }
    var posCls=idx===0?"p1":idx===1?"p2":idx===2?"p3":"";
    var posLabel=isAdmin?(idx+1)+".":["1st","2nd","3rd","4th"][idx];
    h+='<div class="drag-item'+resCls+'" data-name="'+x(name)+'" data-idx="'+idx+'">';
    h+='<div class="di-pos '+posCls+'">'+posLabel+'</div>';
    h+='<div class="di-flag">'+t.flag+'</div>';
    h+='<div class="di-name">'+x(name)+'</div>';
    if(!isAdmin)h+='<div class="di-conf">'+t.conf+'</div>';
    h+=badge;
    if(ptsStr)h+='<div class="di-pts">'+ptsStr+'</div>';
    if(canDrag)h+='<div class="di-handle">⋮⋮</div>';
    h+='</div>';
    if(!isAdmin){
      if(idx===1)h+='<div class="rank-divider qual">▲ Qualify directly</div>';
      if(idx===2)h+='<div class="rank-divider wc">⚽ Wild card pool</div>';
      if(idx===3)h+='<div class="rank-divider elim">✕ Eliminated</div>';
    }
  });
  h+='</div>';
  return h;
}

function renderLB(){

  var h='<div class="lb-wrap"><div class="lb-note">Group winner 3pts · 2nd place qualifier 1pt · Wild card qualifier 1pt</div>';
  sorted.forEach(function(p,i){
    var sc=calcScore(p),poss=calcMaxPossible(p),rem=poss-sc;
    var cls="lb-row"+(i===0?" first":i===1?" second":i===2?" third":"");
    var ep=Math.round((sc/maxP)*100),pp=Math.min(Math.round((rem/maxP)*100),100-ep);

    h+='<div class="progress"><div class="progress-fill" style="width:'+ep+'%"></div>';
    if(rem>0)h+='<div class="progress-poss" style="left:'+ep+'%;width:'+pp+'%"></div>';
    h+='</div>';

// ── DRAG ENGINE ───────────────────────────────────────────
// Works on both desktop (mouse) and mobile (touch)
function initAllDragLists(){
  // Find all drag lists and init
  var lists=document.querySelectorAll(".drag-list");
  for(var i=0;i<lists.length;i++) initDragList(lists[i]);
}

function initDragList(list){
  var gid=list.getAttribute("data-gid");
  var isAdmin=list.getAttribute("data-admin")==="1";
  var items=list.querySelectorAll(".drag-item");
  var ghost=null;
  var dragSrc=null;
  var overItem=null;
  var startY=0,startX=0,itemH=0;

  function getNames(){
    var ns=[];
    list.querySelectorAll(".drag-item").forEach(function(el){ns.push(el.getAttribute("data-name"));});
    return ns;
  }
  function doSwap(){
    if(!dragSrc||!overItem||dragSrc===overItem) return;
    var names=getNames();
    var fi=names.indexOf(dragSrc.getAttribute("data-name"));
    var ti=names.indexOf(overItem.getAttribute("data-name"));
    if(fi<0||ti<0||fi===ti) return;
    names.splice(fi,1);
    names.splice(ti,0,dragSrc.getAttribute("data-name"));
    _dragState=null;
    if(isAdmin) saveAdminRanking(gid,names);
    else saveGroupRanking(gid,names);
    toast("&#9998; Group "+gid+" updated");
  }
  function clearOver(){
    list.querySelectorAll(".drop-target").forEach(function(el){el.classList.remove("drop-target");});
    overItem=null;
  }
  function findItemAt(y){
    var found=null;
    list.querySelectorAll(".drag-item").forEach(function(el){
      var r=el.getBoundingClientRect();
      if(y>=r.top&&y<=r.bottom) found=el;
    });
    return found;
  }
  function removeGhost(){
    if(ghost&&ghost.parentNode){ghost.parentNode.removeChild(ghost);ghost=null;}
  }

  // Touch events — only on the handle
  items.forEach(function(item){
    var handle=item.querySelector(".di-handle");
    if(!handle) return;

    handle.addEventListener("touchstart",function(e){
      e.preventDefault();
      dragSrc=item;
      item.classList.add("drag-active");
      startY=e.touches[0].clientY;
      startX=e.touches[0].clientX;
      itemH=item.offsetHeight;
      // Create ghost
      ghost=document.createElement("div");
      ghost.className="drag-ghost";
      ghost.innerHTML=item.innerHTML;
      ghost.style.width=item.offsetWidth+"px";
      ghost.style.top=(item.getBoundingClientRect().top)+"px";
      ghost.style.left=(item.getBoundingClientRect().left)+"px";
      document.body.appendChild(ghost);
    },{passive:false});

    handle.addEventListener("touchmove",function(e){
      if(!dragSrc) return;
      e.preventDefault();
      var ty=e.touches[0].clientY;
      var tx=e.touches[0].clientX;
      // Move ghost
      if(ghost){
        ghost.style.top=(ty-itemH/2)+"px";
        ghost.style.left=(tx-60)+"px";
      }
      // Find drop target
      clearOver();
      var target=findItemAt(ty);
      if(target&&target!==dragSrc){
        target.classList.add("drop-target");
        overItem=target;
      }
    },{passive:false});

    handle.addEventListener("touchend",function(e){
      if(!dragSrc) return;
      e.preventDefault();
      removeGhost();
      item.classList.remove("drag-active");
      doSwap();
      clearOver();
      dragSrc=null;overItem=null;
    },{passive:false});

    handle.addEventListener("touchcancel",function(){
      removeGhost();
      item.classList.remove("drag-active");
      clearOver();
      dragSrc=null;overItem=null;
    });

    // Mouse events for desktop
    handle.addEventListener("mousedown",function(e){
      e.preventDefault();
      dragSrc=item;
      item.classList.add("drag-active");
      itemH=item.offsetHeight;
      ghost=document.createElement("div");
      ghost.className="drag-ghost";
      ghost.innerHTML=item.innerHTML;
      ghost.style.width=item.offsetWidth+"px";
      ghost.style.top=(e.clientY-itemH/2)+"px";
      ghost.style.left=(e.clientX-60)+"px";
      document.body.appendChild(ghost);
      function onMove(ev){
        ghost.style.top=(ev.clientY-itemH/2)+"px";
        ghost.style.left=(ev.clientX-60)+"px";
        clearOver();
        var target=findItemAt(ev.clientY);
        if(target&&target!==dragSrc){target.classList.add("drop-target");overItem=target;}
      }
      function onUp(){
        removeGhost();
        item.classList.remove("drag-active");
        doSwap();clearOver();
        dragSrc=null;overItem=null;
        document.removeEventListener("mousemove",onMove);
        document.removeEventListener("mouseup",onUp);
      }
      document.addEventListener("mousemove",onMove);
      document.addEventListener("mouseup",onUp);
    });
  });
}

function bind(){
  var els,i,el;
  els=document.querySelectorAll(".ptab");for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){ST.page=this.getAttribute("data-page");draw();});
  els=document.querySelectorAll(".gtab");for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){ST.group=this.getAttribute("data-gtab");draw();});
  els=document.querySelectorAll(".user-btn");for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){ST.user=this.getAttribute("data-user");ST.viewUser=null;draw();});
  els=document.querySelectorAll(".lchip[data-view]");for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){var p=this.getAttribute("data-view");ST.viewUser=(ST.user===p)?null:p;_saveScroll();draw();_restoreScroll();});
  el=document.getElementById("b-viewself");if(el)el.addEventListener("click",function(){ST.viewUser=null;draw();});
  el=document.getElementById("b-admin");if(el)el.addEventListener("click",function(){
    if(ST.admin){ST.admin=false;if(ST.page==="admin")ST.page="groups";draw();return;}
    var pw=prompt("Admin password:");if(pw===null)return;
    if(pw===MASTER_PW||(GROUP_ADMIN_PW&&pw===GROUP_ADMIN_PW)){ST.admin=true;ST.page="admin";draw();}else toast("Wrong password");
  });
  el=document.getElementById("b-reset-top");if(el)el.addEventListener("click",function(){if(!confirm("Reset ALL data?"))return;if(DB){DB.ref(BASE).remove();DB.ref(RESULTS_BASE+"/results").remove();}toast("Reset");});
  el=document.getElementById("adm-reset");if(el)el.addEventListener("click",function(){if(!confirm("Reset ALL data?"))return;if(DB){DB.ref(BASE).remove();DB.ref(RESULTS_BASE+"/results").remove();}toast("Reset");});
  el=document.getElementById("b-lock");if(el)el.addEventListener("click",function(){if(!ST.user||!DB)return;if(!confirm("Lock your picks?"))return;DB.ref(BASE+"/locked/"+ukey(ST.user)).set(true);toast("&#128274; Locked!");launchConfetti();});
  el=document.getElementById("go-wc");if(el)el.addEventListener("click",function(){ST.page="wildcard";draw();});
  el=document.getElementById("adm-close");if(el)el.addEventListener("click",function(){if(!confirm("Close group stage?"))return;setPhase("knockout");toast("Group stage closed");});
  el=document.getElementById("adm-reopen");if(el)el.addEventListener("click",function(){if(!confirm("Reopen group stage?"))return;setPhase("groups");toast("Reopened");});
  els=document.querySelectorAll("[data-wc]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var name=this.getAttribute("data-wc");if(!name||!ST.user||isLocked())return;
    var wc=getUserWildcards(ST.user);var sel=wc.indexOf(name)>=0;
    if(!sel&&wc.length>=WILD_CARD_COUNT){toast("Already picked 8");return;}
    saveWildcard(name,!sel);toast(sel?"Removed":"&#9733; "+name);
  });
  els=document.querySelectorAll("[data-adm-wc]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var name=this.getAttribute("data-adm-wc");
    var wc=getResultWildcards().slice();var idx=wc.indexOf(name);
    if(idx>=0)wc.splice(idx,1);
    else{if(wc.length>=8){toast("Already 8 set");return;}wc.push(name);}
    saveAdminWildcards(wc);toast(idx>=0?"Removed":"&#9989; "+name);
  });
}

loadData();
</script>
