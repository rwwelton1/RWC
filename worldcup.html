<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PoolPlay – 2026 World Cup</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08101e;--card:#0d1829;--card2:#0a1220;--border:#1a2d4a;--border2:#0f1e30;--text:#f0f4ff;--muted:#7090b0;--dim:#3a5270;
  --wc-blue:#1952d9;--wc-pink:#e83e8c;--wc-teal:#00c4b4;--wc-coral:#ff6b4a;--wc-purple:#9b59ff;--wc-gold:#f5c518;--wc-green:#2ec95c;--wc-red:#e61d25
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:13px;min-height:100vh}
button,a{font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button{border:none;outline:none}
a{color:inherit;text-decoration:none}

/* TOPBAR — vivid blue with gold star accent */
.topbar{background:linear-gradient(90deg,#0e2fa8,#1952d9,#0e2fa8);border-bottom:3px solid var(--wc-gold);padding:8px 10px;display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:50}
.topbar-center{flex:1;min-width:0}
.app-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:.03em}
.app-sub{font-size:7px;color:rgba(255,255,255,.55)}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:rgba(245,197,24,.15);border:1px solid rgba(245,197,24,.4);border-radius:20px;padding:3px 9px;font-size:9px;color:var(--wc-gold);font-weight:700}
.tag.locked{border-color:var(--wc-gold);color:var(--wc-gold);background:rgba(245,197,24,.2)}
.btn{border-radius:6px;padding:4px 10px;font-size:9px;font-weight:600;border:1px solid}
.btn-ghost{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.6)}
.btn-gold{background:rgba(245,197,24,.12);border-color:rgba(245,197,24,.4);color:var(--wc-gold)}
.btn-red{background:rgba(230,29,37,.12);border-color:rgba(230,29,37,.4);color:#ff6b6b}

/* PAGE TABS — blue bar with gold active */
.page-bar{background:linear-gradient(90deg,#0a2090,#1248c8,#0a2090);border-bottom:1px solid rgba(245,197,24,.25);display:flex;padding:0 4px}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:6px 7px;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:rgba(255,255,255,.45);border-bottom:2px solid transparent;background:none;white-space:nowrap;flex:1;text-align:center}
.ptab.active{color:var(--wc-gold);border-bottom-color:var(--wc-gold)}

/* GROUP TAB BAR */
.group-bar{display:flex;flex-wrap:wrap;gap:4px;padding:7px 10px;border-bottom:1px solid rgba(245,197,24,.2);background:linear-gradient(90deg,#0a2090,#1248c8,#0a2090)}
.gtab{flex-shrink:0;padding:5px 0;border-radius:6px;font-size:9px;font-weight:700;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);width:calc((100% - 44px)/6);text-align:center}
.gtab.active{border-color:var(--wc-gold);background:rgba(245,197,24,.18);color:var(--wc-gold)}
.gtab.done{border-color:rgba(46,201,92,.5);color:var(--wc-green);background:rgba(46,201,92,.12)}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#0d1829;border:1px solid rgba(245,197,24,.5);color:var(--wc-gold);border-radius:8px;padding:7px 16px;font-size:10px;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:900;display:none}

/* USER SELECT */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:44px 20px;gap:18px}
.user-screen h2{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:9px;background:var(--card);border:1px solid var(--border);font-size:14px;font-weight:700;color:var(--text);text-align:left;min-width:130px}
.user-btn-sub{font-size:8px;color:var(--muted);font-weight:400;margin-top:3px}

/* LOCK BAR */
.lock-bar{display:flex;align-items:center;gap:7px;padding:5px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--card2)}
.lock-info{font-size:9px;color:var(--muted)}
.lock-chips{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.lchip{padding:1px 7px;border-radius:20px;font-size:8px;border:1px solid;cursor:pointer}
.lchip.done{background:rgba(46,201,92,.1);border-color:rgba(46,201,92,.4);color:var(--wc-green)}
.lchip.pend{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:var(--muted)}
.lchip.viewing{border-color:rgba(245,197,24,.5);color:var(--wc-gold);background:rgba(245,197,24,.1)}

/* SCORE BANNER */
.score-banner{display:flex;gap:6px;padding:5px 12px;border-bottom:1px solid var(--border);overflow-x:auto;align-items:center;background:var(--card2)}
.score-banner::-webkit-scrollbar{display:none}
.sb-item{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:8px;white-space:nowrap;text-align:center;flex-shrink:0}
.sb-item .sl{color:var(--muted);font-size:7px}
.sb-item .sv{color:var(--text);font-weight:700;font-size:12px}
.sb-item.total{border-color:rgba(245,197,24,.4);background:rgba(245,197,24,.08)}
.sb-item.total .sv{color:var(--wc-gold)}

/* DRAG LIST */
.drag-list{position:relative}
.drag-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--card);transition:background .1s;position:relative;user-select:none;-webkit-user-select:none}
.drag-item:not(:last-child){border-bottom:1px solid var(--border2)}
.drag-item.drag-active{opacity:.4}
.drag-item.drop-target{border-top:2px solid var(--wc-gold);background:rgba(245,197,24,.06)}
.drag-item.result-1{background:rgba(46,201,92,.07)}
.drag-item.result-2{background:rgba(25,82,217,.08)}
.drag-item.result-3{background:rgba(245,197,24,.05)}
.drag-item.result-4{opacity:.3}
.di-pos{font-size:9px;font-weight:800;width:20px;text-align:center;flex-shrink:0;color:var(--dim)}
.di-pos.p1{color:var(--wc-green)}.di-pos.p2{color:#6a9be8}.di-pos.p3{color:var(--wc-gold)}
.di-flag{font-size:17px;width:24px;text-align:center;flex-shrink:0;pointer-events:none}
.di-name{font-size:11px;font-weight:600;color:var(--text);flex:1;pointer-events:none}
.di-conf{font-size:7px;color:var(--dim);flex-shrink:0;pointer-events:none}
.di-badge{font-size:7px;padding:1px 5px;border-radius:8px;flex-shrink:0;pointer-events:none}
.di-badge.adv{background:rgba(46,201,92,.12);border:1px solid rgba(46,201,92,.35);color:var(--wc-green)}
.di-badge.wc{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);color:var(--wc-gold)}
.di-badge.elim{background:rgba(230,29,37,.07);border:1px solid rgba(230,29,37,.2);color:#ff6b6b;opacity:.7}
.di-pts{font-size:8px;color:var(--wc-green);flex-shrink:0;pointer-events:none}
.di-handle{color:var(--dim);font-size:14px;padding:0 2px;flex-shrink:0;cursor:grab;touch-action:none}

/* ZONE HEADERS — vibrant multicolor */
.zone-header{padding:3px 12px;font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:5px}
.zone-header.z-qual{background:rgba(46,201,92,.09);color:var(--wc-green);border-bottom:1px solid rgba(46,201,92,.18)}
.zone-header.z-wc{background:rgba(245,197,24,.07);color:var(--wc-gold);border-bottom:1px solid rgba(245,197,24,.15)}
.zone-header.z-elim{background:rgba(230,29,37,.05);color:#ff7070;border-bottom:1px solid rgba(230,29,37,.12)}
/* Left border zone colors */
.drag-item.zone-qual{border-left:3px solid var(--wc-green)!important}
.drag-item.zone-wc{border-left:3px solid var(--wc-gold)!important}
.drag-item.zone-elim{border-left:3px solid var(--wc-red)!important;opacity:.45}

/* DRAG GHOST */
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.92;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.7);background:var(--card);border:1px solid var(--wc-gold);padding:9px 12px;display:flex;align-items:center;gap:9px;left:0;top:0;min-width:200px;}

/* GROUP CARD — vivid blue gradient header with gold stars */
.group-wrap{padding:10px 12px;max-width:480px;margin:0 auto}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;position:relative;box-shadow:0 2px 20px rgba(25,82,217,.15)}
.group-card-head{padding:11px 14px;background:linear-gradient(135deg,#0e2fa8 0%,#1952d9 40%,#2060e8 70%,#0e2fa8 100%);border-bottom:2px solid var(--wc-gold);display:flex;align-items:center;justify-content:space-between}
.group-card-title{font-size:13px;font-weight:900;display:flex;align-items:center;gap:8px;color:#fff;letter-spacing:.05em;text-shadow:0 1px 6px rgba(0,0,0,.3);z-index:1}
.group-nav{font-size:12px;color:var(--wc-gold);padding:3px 9px;border-radius:5px;border:1px solid rgba(245,197,24,.4);background:rgba(0,0,0,.3);cursor:pointer;touch-action:manipulation;line-height:1;z-index:1;font-weight:700}
.group-nav:active{opacity:.6}
.group-card-sub{font-size:8px;color:rgba(255,255,255,.45);z-index:1}

/* WILD CARDS */
.wc-wrap{padding:10px 12px;max-width:480px;margin:0 auto}
.wc-hdr{font-size:11px;font-weight:700;margin-bottom:3px}
.wc-sub{font-size:8px;color:var(--muted);margin-bottom:10px;line-height:1.7}
.wc-count-bar{font-size:9px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.wc-count-num{font-size:14px;font-weight:800;color:var(--wc-gold)}
.wc-team{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:var(--card);border:1px solid var(--border);cursor:pointer;margin-bottom:4px;transition:all .1s}
.wc-team.selected{background:rgba(245,197,24,.08);border-color:rgba(245,197,24,.5);box-shadow:0 0 8px rgba(245,197,24,.1)}
.wc-team.selected .wc-name{color:var(--wc-gold)}
.wc-team.correct{background:rgba(46,201,92,.09);border-color:rgba(46,201,92,.4)}
.wc-team.correct .wc-name{color:var(--wc-green)}
.wc-team.wrong{opacity:.35;text-decoration:line-through}
.wc-team.full{opacity:.3;pointer-events:none}
.wc-flag{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.wc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wc-name{font-size:11px;font-weight:600;color:var(--text);flex:1}
.wc-group{font-size:8px;color:var(--dim);flex-shrink:0}
.wc-icon{font-size:10px;width:14px;text-align:center;flex-shrink:0}

/* LEADERBOARD */
.lb-wrap{padding:12px}
.lb-note{font-size:8px;color:var(--muted);margin-bottom:12px;line-height:1.8;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 10px}
.lb-row{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:7px;display:flex;gap:9px;align-items:center}
.lb-row.first{border-color:rgba(245,197,24,.4);background:rgba(245,197,24,.03)}
.lb-row.second{border-color:rgba(148,163,184,.2)}
.lb-row.third{border-color:rgba(205,127,50,.2)}
.lb-medal{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;gap:6px}
.lb-name{font-size:13px;font-weight:700}
.lb-pts{font-size:10px;color:var(--muted)}
.lb-pts b{color:#f1f5f9;font-weight:700}
.lb-poss{font-size:8px;color:var(--dim)}
.progress{background:#0a1020;border-radius:3px;height:4px;position:relative;overflow:hidden;margin-bottom:4px}
.progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--wc-blue),var(--wc-pink));transition:width .6s}
.progress-poss{position:absolute;top:0;height:100%;border-radius:3px;background:rgba(245,197,24,.35)}

/* BRACKET — FotMob style */
.bracket-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 0 16px}
.bracket-outer::-webkit-scrollbar{height:3px}
.bracket-outer::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.bracket-stage{display:flex;gap:0;min-width:max-content;align-items:center;padding:0 12px}
.bracket-col{display:flex;flex-direction:column;justify-content:space-around;flex-shrink:0}
.bracket-col-label{font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);text-align:center;padding:0 6px 6px}
/* Match card */
.bk-match{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;width:110px;flex-shrink:0;position:relative}
.bk-match.pickable{cursor:pointer}
.bk-match.projected{border-color:rgba(245,197,24,.25)}
.bk-team{display:flex;align-items:center;gap:5px;padding:6px 8px;min-height:30px;transition:background .1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.bk-team:not(:last-child){border-bottom:1px solid var(--border2)}
.bk-team.pickable:active{background:rgba(255,255,255,.04)}
.bk-team.winner{background:rgba(46,201,92,.09)}
.bk-team.winner .bk-name{color:var(--wc-green);font-weight:800}
.bk-team.loser{opacity:.38}
.bk-team.mypick:not(.winner){background:rgba(245,197,24,.07)}
.bk-team.mypick:not(.winner) .bk-name{color:var(--wc-gold)}
.bk-team.tbd .bk-name{color:var(--dim);font-style:italic;font-weight:400}
.bk-flag{font-size:15px;width:20px;text-align:center;flex-shrink:0;line-height:1}
.bk-name{font-size:9px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk-icon{font-size:9px;width:12px;text-align:center;flex-shrink:0;color:var(--wc-green)}
/* Connector lines */
.bk-connectors{display:flex;flex-direction:column;justify-content:space-around;flex-shrink:0;position:relative}
.bk-line-group{display:flex;flex-direction:column;align-items:center;justify-content:center}
.bk-line-h{width:14px;height:1px;background:var(--border)}
.bk-line-v{width:1px;background:var(--border)}
/* Champion */
.bk-champion{text-align:center;padding:12px 8px}
.bk-champ-trophy{font-size:28px;margin-bottom:4px}
.bk-champ-name{font-size:11px;font-weight:800;color:var(--wc-gold)}
.bk-champ-label{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
/* Phase notice */
.bk-notice{padding:7px 12px;font-size:8px;line-height:1.6;border-bottom:1px solid var(--border)}
.bk-notice.preview{background:rgba(245,197,24,.06);color:var(--wc-gold);border-color:rgba(245,197,24,.15)}
.bk-notice.live{background:rgba(46,201,92,.06);color:var(--wc-green);border-color:rgba(46,201,92,.2)}

/* ADMIN */
.adm-wrap{padding:10px}
.adm-sec-label{font-size:8px;color:var(--wc-gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;margin-top:14px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.adm-sec-label:first-child{margin-top:0}
.adm-phase-btn{width:100%;padding:10px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid;font-family:inherit;cursor:pointer;margin-bottom:6px}
.adm-open{background:rgba(46,201,92,.1);border-color:rgba(46,201,92,.4);color:var(--wc-green)}
.adm-close{background:rgba(230,29,37,.1);border-color:rgba(230,29,37,.4);color:#ff7070}
.adm-group-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.adm-group-head{padding:6px 12px;background:var(--card2);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--muted)}
.adm-wc-team{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:var(--card);border:1px solid var(--border);cursor:pointer;margin-bottom:4px}
.adm-wc-team.sel{background:rgba(46,201,92,.08);border-color:rgba(46,201,92,.35)}

.phase-banner{padding:7px 12px;font-size:9px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border)}
.phase-banner.open{background:rgba(46,201,92,.06);color:var(--wc-green);border-color:rgba(46,201,92,.18)}
.phase-banner.locked{background:rgba(230,29,37,.06);color:#ff7070;border-color:rgba(230,29,37,.15)}
</style>
</head>

<canvas id="confetti-canvas"></canvas>
<div id="root"></div>
<div id="toast"></div>
<script>
// =====================================================

                   {n:"Iran",         flag:"🇮🇷",conf:"AFC",     color:"#239f40",r:21},

function calcScore(user){
  var total=0,res=ST.results.groups||{};
  GROUP_IDS.forEach(function(gid){
    var rr=res[gid];if(!rr||!rr.length)return;
    var ur=getGroupRanking(user,gid);
    if(ur[0]===rr[0])total+=PTS.groupWinner;
    if(ur[1]===rr[1])total+=PTS.qualifier;
  });
  var rwc=getResultWildcards(),uwc=getUserWildcards(user);
  if(rwc.length&&uwc.length)uwc.forEach(function(t){if(rwc.indexOf(t)>=0)total+=PTS.wildcard;});
  return total;
}
function calcMaxPossible(user){
  var total=calcScore(user),res=ST.results.groups||{};
  GROUP_IDS.forEach(function(gid){var rr=res[gid];if(!rr||!rr.length)total+=PTS.groupWinner+PTS.qualifier;});
  var rwc=getResultWildcards(),uwc=getUserWildcards(user);
  if(!rwc.length&&uwc.length)total+=uwc.length*PTS.wildcard;
  return total;
}

function buildDragList(ranking, gid, rr, viewer, canDrag, isAdmin){

    // Insert zone header before 3rd and 4th rows

      if(idx===2) h+='<div class="zone-header z-wc">⚽ Wild card pool &nbsp;<span style="font-weight:400;opacity:.7">may qualify as 3rd</span></div>';

    // Zone class for left border color

    var ptsStr="";
    if(rr&&viewer&&!isAdmin){

      if(rPos===0&&ur[0]===name) ptsStr='+3';
      else if(rPos===1&&ur[1]===name) ptsStr='+1';
    }
    var badge="";

      if(rPos===0) badge='<span class="di-badge adv">Winner</span>';
      else if(rPos===1) badge='<span class="di-badge adv">2nd</span>';
      else if(rPos===2) badge='<span class="di-badge wc">3rd</span>';
      else badge='<span class="di-badge elim">Elim</span>';

    h+='<div class="drag-item'+resCls+zoneCls+'" data-name="'+x(name)+'" data-idx="'+idx+'">';

  {a:{g:"H",p:0},b:{wc:true,idx:7}},  // H1 vs 3rd place WC
  // Runners-up vs runners-up (8 matches, no same-group clashes)
  {a:{g:"I",p:0},b:{g:"A",p:1}},  // I1 vs A2
  {a:{g:"J",p:0},b:{g:"B",p:1}},  // J1 vs B2
  {a:{g:"K",p:0},b:{g:"C",p:1}},  // K1 vs C2
  {a:{g:"L",p:0},b:{g:"D",p:1}},  // L1 vs D2
  {a:{g:"E",p:1},b:{g:"I",p:1}},  // E2 vs I2 (runners-up pairing)
  {a:{g:"F",p:1},b:{g:"J",p:1}},  // F2 vs J2
  {a:{g:"G",p:1},b:{g:"K",p:1}},  // G2 vs K2
  {a:{g:"H",p:1},b:{g:"L",p:1}},  // H2 vs L2
];

function getTeamFlag(name){
  if(!name)return "";
  for(var gid in GROUPS){var t=GROUPS[gid].teams.find(function(t){return t.n===name;});if(t)return t.flag;}
  return "";
}

// Get a team in a bracket slot for a given user (picks or official)
function getBracketSlot(user,round,idx){
  var br=user?(ST.picks[ukey(user)]&&ST.picks[ukey(user)].bracket)||{}:{};
  var official=ST.results.bracket||{};
  // Official result takes priority
  if(official[round]&&official[round][idx]!=null) return official[round][idx];
  // User's pick
  if(br[round]&&br[round][idx]!=null) return br[round][idx];
  return null;
}

// Get the two teams feeding into a slot in a given round
function getFeedTeams(user,round,idx){
  var prevRound=ROUNDS[ROUNDS.indexOf(round)-1];
  if(!prevRound) return [null,null];
  // idx*2 and idx*2+1 from previous round
  return [getBracketSlot(user,prevRound,idx*2), getBracketSlot(user,prevRound,idx*2+1)];
}

// Get R32 source teams (from group predictions or official results)
function getR32Teams(user,idx){
  var src=R32_SRCS[idx];
  function resolve(s){
    if(s.wc){
      var rwc=getResultWildcards(),uwc=user?getUserWildcards(user):[];
      return (rwc.length?rwc:uwc)[s.idx]||null;
    }
    var rr=getResultRanking(s.g);
    if(rr&&rr[s.p]) return rr[s.p];
    return user?getGroupRanking(user,s.g)[s.p]||null:null;
  }
  return [resolve(src.a),resolve(src.b)];
}

function saveBracketPick(round,idx,team){
  if(!ST.user||!DB) return;
  var uk=ukey(ST.user);
  if(!ST.picks[uk]) ST.picks[uk]={};
  if(!ST.picks[uk].bracket) ST.picks[uk].bracket={};
  if(!ST.picks[uk].bracket[round]) ST.picks[uk].bracket[round]={};
  ST.picks[uk].bracket[round][idx]=team;
  // Invalidate downstream picks if team changed
  var ri=ROUNDS.indexOf(round);
  for(var r=ri+1;r<ROUNDS.length;r++){
    var nextRound=ROUNDS[r];
    var nextIdx=Math.floor(idx/Math.pow(2,r-ri));
    var cur=ST.picks[uk].bracket[nextRound]&&ST.picks[uk].bracket[nextRound][nextIdx];
    if(cur&&cur!==team){
      // Only clear if the current downstream pick is the team being replaced
    }
  }
  _saveScroll();draw();_restoreScroll();
  DB.ref(BASE+"/picks/"+uk+"/bracket/"+round+"/"+idx).set(team);
}

function renderBracket(){
  var viewer=activeViewer();
  var isOfficial=(ST.results.phase==="knockout");
  var canPick=!!(ST.user&&!isLocked()&&viewer===ST.user&&isOfficial&&stageOpenForPicks("bracket"));
  var h='';

  if(isOfficial){
    if(stageOpenForPicks("bracket")){
      h+='<div class="bk-notice live">&#10003; Knockout phase is live — tap a team to pick them to advance</div>';
    } else {
      h+='<div class="bk-notice preview" style="border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.05)">&#128274; Knockout picks not open yet — wait for admin to unlock</div>';
    }
  } else {
    h+='<div class="bk-notice preview">&#9889; Preview based on your group predictions — tap a team to make knockout picks</div>';
  }

  h+='<div class="bracket-outer"><div class="bracket-stage">';

  // ── R32 column (16 matches, shown as 8 per sub-column) ──
  // Due to mobile width constraints, show R32 as a single scrollable column then connect
  // Layout: R32 | lines | R16 | lines | QF | lines | SF | lines | F | champion

  var COL_W=110, LINE_W=20;

  // Build all round data for viewer
  var rounds_data={};
  for(var ri=0;ri<ROUNDS.length;ri++){
    var rnd=ROUNDS[ri];
    var sz=ROUND_SIZES[rnd];
    rounds_data[rnd]=[];
    for(var mi=0;mi<sz;mi++){
      var ta=null,tb=null;
      if(rnd==="r32"){
        var pair=getR32Teams(viewer,mi);
        ta=pair[0];tb=pair[1];
      } else {
        var feed=getFeedTeams(viewer,rnd,mi);
        ta=feed[0];tb=feed[1];
      }
      rounds_data[rnd].push({ta:ta,tb:tb,pick:getBracketSlot(viewer,rnd,mi),idx:mi});
    }
  }

  // Render each round as a column
  ROUNDS.forEach(function(rnd,ri){
    var sz=ROUND_SIZES[rnd];
    var matches=rounds_data[rnd];
    var pts=ROUND_PTS[rnd];

    // Column label
    h+='<div class="bracket-col" style="width:'+COL_W+'px">';
    h+='<div class="bracket-col-label">'+ROUND_LABELS[rnd]+'<br><span style="color:var(--wc-gold)">'+pts+'pt</span></div>';

    // Spacing: matches spaced evenly
    // Each match takes up (total_height / sz) vertical space
    // We use flex with gap to space them
    var gapPx=ri===0?4:ri===1?40:ri===2?100:ri===3?200:0;

    h+='<div style="display:flex;flex-direction:column;gap:'+gapPx+'px">';
    matches.forEach(function(m){
      var winner=m.pick;
      var official=ST.results.bracket&&ST.results.bracket[rnd]&&ST.results.bracket[rnd][m.idx];
      if(official) winner=official;

      h+='<div class="bk-match'+(winner?"":" projected")+'">';

      // Team A
      var aIsWin=winner&&winner===m.ta, aIsLose=winner&&winner!==m.ta&&m.ta;
      var aIsMy=!official&&m.pick&&m.pick===m.ta;
      var aCanPick=!!(m.ta&&m.tb&&!winner);
      var aCls="bk-team"+(m.ta?"":" tbd")+(aIsWin?" winner":aIsLose?" loser":aIsMy?" mypick":"")+(aCanPick?" pickable":"");
      h+='<div class="'+aCls+'"'+(aCanPick?' data-bkpick data-bkrnd="'+rnd+'" data-bkidx="'+m.idx+'" data-bkteam="'+x(m.ta||"")+'"':'')+'>'+
        (m.ta?'<div class="bk-flag">'+getTeamFlag(m.ta)+'</div>':'<div style="width:20px"></div>')+
        '<div class="bk-name">'+(m.ta?x(m.ta):'TBD')+'</div>'+
        '<div class="bk-icon">'+(aIsWin?'✓':aIsMy?'★':'')+'</div>'+
        '</div>';

      // Team B
      var bIsWin=winner&&winner===m.tb, bIsLose=winner&&winner!==m.tb&&m.tb;
      var bIsMy=!official&&m.pick&&m.pick===m.tb;
      var bCanPick=!!(m.ta&&m.tb&&!winner);
      var bCls="bk-team"+(m.tb?"":" tbd")+(bIsWin?" winner":bIsLose?" loser":bIsMy?" mypick":"")+(bCanPick?" pickable":"");
      h+='<div class="'+bCls+'"'+(bCanPick?' data-bkpick data-bkrnd="'+rnd+'" data-bkidx="'+m.idx+'" data-bkteam="'+x(m.tb||"")+'"':'')+'>'+
        (m.tb?'<div class="bk-flag">'+getTeamFlag(m.tb)+'</div>':'<div style="width:20px"></div>')+
        '<div class="bk-name">'+(m.tb?x(m.tb):'TBD')+'</div>'+
        '<div class="bk-icon">'+(bIsWin?'✓':bIsMy?'★':'')+'</div>'+
        '</div>';

      h+='</div>';
    });
    h+='</div></div>';

    // Connector lines between rounds
    if(ri<ROUNDS.length-1){
      h+='<div style="width:'+LINE_W+'px;display:flex;flex-direction:column;justify-content:space-around;flex-shrink:0">';
      // Draw connecting lines — pairs of matches merge into one
      var nextSz=ROUND_SIZES[ROUNDS[ri+1]];
      for(var ni=0;ni<nextSz;ni++){
        h+='<div style="display:flex;flex-direction:column;align-items:flex-start;justify-content:center;flex:1">';
        h+='<div style="width:'+LINE_W+'px;height:1px;background:var(--border)"></div>';
        h+='</div>';
      }
      h+='</div>';
    }
  });

  // Champion
  var finalist=getBracketSlot(viewer,"final",0);
  var officialChamp=ST.results.bracket&&ST.results.bracket["final"]&&ST.results.bracket["final"][0];
  var champ=officialChamp||finalist;
  h+='<div style="flex-shrink:0;padding:0 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:80px">';
  h+='<div style="font-size:26px;margin-bottom:4px">&#127942;</div>';
  if(champ){
    h+='<div style="font-size:16px">'+getTeamFlag(champ)+'</div>';
    h+='<div style="font-size:9px;font-weight:800;color:var(--wc-gold);text-align:center;margin-top:2px">'+x(champ)+'</div>';
    h+='<div style="font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px">Champion</div>';
  } else {
    h+='<div style="font-size:9px;color:var(--dim);text-align:center">TBD</div>';
  }
  h+='</div>';

  h+='</div></div>'; // end stage + outer

  // Missing groups notice
  if(!isOfficial&&viewer){
    var missing=GROUP_IDS.filter(function(gid){return !groupPicksDone(viewer,gid);});
    if(missing.length) h+='<div style="font-size:8px;color:var(--muted);padding:6px 12px">Rank groups '+missing.join(", ")+" to complete R32 preview</div>";
  }

  return h;
}

// ── LIVE RESULTS TABLE ───────────────────────────────────
var _resTimer=null,_resData=null,_resLoading=false,_resLastFetch=0;

function fetchResults(){
  if(_resLoading)return;
  _resLoading=true;
  // Try ESPN standings endpoint
  fetch("https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings")
    .then(function(r){return r.json();})
    .then(function(data){
      _resLoading=false;_resLastFetch=Date.now();_resData=data;
      if(ST.page==="results")renderResultsInto();
    })
    .catch(function(){
      // Fallback: try scoreboard to derive standings
      _resLoading=false;
      var el=document.getElementById("results-wrap");
      if(el)el.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:11px;line-height:2">Could not load live standings.<br><span style="font-size:9px;color:var(--dim)">Data will be available once the tournament starts Jun 11</span><br><button style="margin-top:10px;padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);font-family:inherit;font-size:9px;cursor:pointer" onclick="fetchResults()">&#8635; Retry</button></div>';
    });
}

function renderResultsInto(){
  var el=document.getElementById("results-wrap");
  if(!el)return;
  var data=_resData;

  // Try to parse ESPN standings format
  var groups=[];
  try{
    // ESPN v2 standings returns children[] with group tables
    if(data&&data.children&&data.children.length){
      data.children.forEach(function(group){
        var name=group.name||group.abbreviation||"";
        var entries=(group.standings&&group.standings.entries)||[];
        var rows=[];
        entries.forEach(function(e){
          var team=e.team||{};
          var tname=team.displayName||team.name||"";
          var stats={};
          (e.stats||[]).forEach(function(s){stats[s.name||s.abbreviation]=s.value||s.displayValue||0;});
          rows.push({
            name:tname,
            abbr:team.abbreviation||tname.substring(0,3),
            p:parseInt(stats.gamesPlayed||stats.GP||0),
            w:parseInt(stats.wins||stats.W||0),
            d:parseInt(stats.ties||stats.D||0),
            l:parseInt(stats.losses||stats.L||0),
            gf:parseInt(stats.pointsFor||stats.GF||0),
            ga:parseInt(stats.pointsAgainst||stats.GA||0),
            gd:parseInt(stats.pointDifferential||stats.GD||0),
            pts:parseInt(stats.points||stats.PTS||0)
          });
        });
        if(rows.length) groups.push({name:name,rows:rows});
      });
    }
  }catch(e){}

  var ago=_resLastFetch?Math.round((Date.now()-_resLastFetch)/1000):0;

  if(!groups.length){
    el.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:11px;line-height:2">No standings data yet.<br><span style="font-size:9px;color:var(--dim)">Check back once matches begin on Jun 11, 2026</span><br><button style="margin-top:10px;padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);font-family:inherit;font-size:9px;cursor:pointer" onclick="fetchResults()">&#8635; Retry</button></div>';
    return;
  }

  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  h+='<div style="font-size:9px;font-weight:700;color:var(--text)">Group Standings</div>';
  h+='<div style="display:flex;align-items:center;gap:8px">';
  h+='<span style="font-size:7px;color:var(--dim)">Updated '+ago+'s ago</span>';
  h+='<button style="padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--muted);font-family:inherit;font-size:8px;cursor:pointer" onclick="fetchResults()">&#8635;</button>';
  h+='</div></div>';

  groups.forEach(function(group){
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px">';
    // Header
    h+='<div style="padding:7px 12px;background:linear-gradient(90deg,#0e2fa8,#1248c8);border-bottom:1px solid rgba(245,197,24,.25);display:flex;align-items:center;justify-content:space-between">';
    h+='<div style="font-size:10px;font-weight:800;color:#fff">'+x(group.name)+'</div>';
    h+='<div style="display:flex;gap:12px;font-size:7px;font-weight:700;color:rgba(255,255,255,.5)">';
    h+='<span style="width:14px;text-align:center">P</span><span style="width:14px;text-align:center">W</span><span style="width:14px;text-align:center">D</span><span style="width:14px;text-align:center">L</span><span style="width:22px;text-align:center">GD</span><span style="width:22px;text-align:center;color:var(--wc-gold)">PTS</span>';
    h+='</div></div>';
    // Rows
    group.rows.forEach(function(row,i){
      var isQual=i<2;
      var isWC=i===2;
      var bgStyle=i===0?"rgba(46,201,92,.06)":i===1?"rgba(25,82,217,.05)":i===2?"rgba(245,197,24,.04)":"";
      var borderLeft=isQual?"3px solid "+(i===0?"var(--wc-green)":"rgba(25,82,217,.6)"):isWC?"3px solid rgba(245,197,24,.5)":"3px solid transparent";
      h+='<div style="display:flex;align-items:center;padding:7px 10px 7px 9px;border-left:'+borderLeft+';background:'+bgStyle+';'+(i<group.rows.length-1?"border-bottom:1px solid var(--border2);":"")+'">';
      h+='<div style="font-size:9px;font-weight:700;color:var(--dim);width:16px;flex-shrink:0">'+(i+1)+'</div>';
      // Find flag from GROUPS
      var flag="";
      for(var gid in GROUPS){var tm=GROUPS[gid].teams.find(function(t){return t.n===row.name||t.n===row.abbr;});if(tm){flag=tm.flag;break;}}
      h+='<div style="font-size:14px;width:22px;text-align:center;flex-shrink:0">'+flag+'</div>';
      h+='<div style="font-size:10px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px">'+x(row.name)+'</div>';
      h+='<div style="display:flex;gap:12px;font-size:9px;flex-shrink:0">';
      h+='<span style="width:14px;text-align:center;color:var(--muted)">'+row.p+'</span>';
      h+='<span style="width:14px;text-align:center;color:var(--muted)">'+row.w+'</span>';
      h+='<span style="width:14px;text-align:center;color:var(--muted)">'+row.d+'</span>';
      h+='<span style="width:14px;text-align:center;color:var(--muted)">'+row.l+'</span>';
      h+='<span style="width:22px;text-align:center;color:var(--muted)">'+(row.gd>0?"+":"")+row.gd+'</span>';
      h+='<span style="width:22px;text-align:center;font-weight:800;color:var(--wc-gold)">'+row.pts+'</span>';
      h+='</div></div>';
    });
    // Legend
    h+='<div style="display:flex;gap:12px;padding:4px 10px;background:rgba(0,0,0,.15);font-size:7px;color:var(--dim)">';
    h+='<span style="color:var(--wc-green)">&#9646; Qualify</span>';
    h+='<span style="color:rgba(245,197,24,.7)">&#9646; Wild card</span>';
    h+='</div></div>';
  });

  h+='<div style="text-align:center;font-size:7px;color:var(--dim);padding:4px 0 8px">via ESPN &middot; auto-refreshes every 60s</div>';
  el.innerHTML=h;
}

  h+='<button id="adm-fetch-live" style="width:100%;padding:10px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid rgba(46,201,92,.4);background:rgba(46,201,92,.1);color:var(--wc-green);font-family:inherit;cursor:pointer">📡 Fetch &amp; Push Live Standings</button>';
  h+='<div id="adm-live-status" style="margin-top:8px;font-size:9px;color:var(--muted);min-height:14px"></div>';
  h+='</div>';

  if(phase==="groups"){h+='<button class="adm-phase-btn adm-close" id="adm-close">&#128274; Close Group Stage → Open Knockout</button>';}
  else{h+='<div style="font-size:9px;color:var(--wc-green);padding:6px 0">&#10003; Knockout phase active</div><button class="adm-phase-btn adm-open" id="adm-reopen" style="margin-top:6px">Reopen Group Stage</button>';}
  h+='<div class="adm-sec-label">Official Wild Card Qualifiers</div>';
  var rWC=getResultWildcards(),pool=[];
  GROUP_IDS.forEach(function(gid){var rr=getResultRanking(gid);if(!rr||!rr[2])return;var name=rr[2];var t=GROUPS[gid].teams.find(function(t){return t.n===name;});if(t)pool.push({group:gid,team:t,name:name});});
  if(!pool.length){h+='<div style="font-size:9px;color:#3a5270;padding:8px 0">Set group results first</div>';}
  else{
    h+='<div style="font-size:8px;color:#6b8ab0;margin-bottom:8px">'+rWC.length+'/8 selected</div>';
    pool.forEach(function(e){
      var sel=rWC.indexOf(e.name)>=0,full=!sel&&rWC.length>=8;
      h+='<div class="adm-wc-team'+(sel?" sel":"")+'"'+(full?' style="opacity:.3;pointer-events:none"':'')+' data-adm-wc="'+x(e.name)+'">'+
        '<div class="wc-flag">'+e.team.flag+'</div>'+
        '<div class="wc-name">'+x(e.name)+'</div>'+
        '<div style="margin-left:auto;font-size:10px;color:var(--wc-green)">'+(sel?"✓":"")+'</div></div>';
    });

  h+='<div class="adm-sec-label">Group Results (drag ⋮⋮ to rank)</div>';
  GROUP_IDS.forEach(function(gid){

    h+='<div class="adm-group-card"><div class="adm-group-head">Group '+gid+(getResultRanking(gid)?' ✓':'')+'</div>';

  h+='<div class="adm-sec-label">Reset</div><button class="adm-phase-btn adm-close" id="adm-reset">&#8635; Reset All Data</button>';

  h+='<div class="topbar">';
  h+='<a href="index.html" style="display:flex;align-items:center;gap:3px;color:#6b8ab0;font-size:9px;font-weight:600;padding:4px 8px;border:1px solid #1a3055;border-radius:6px;white-space:nowrap;flex-shrink:0">&#8592; Hub</a>';
  h+='<div class="topbar-center"><div class="app-name">PoolPlay</div><div class="app-sub">2026 FIFA World Cup &middot; USA · Canada · Mexico</div></div>';
  h+='<div class="topbar-right">';
  if(ST.user)h+='<span class="tag'+(locked?" locked":"")+'">'+pem(ST.user)+x(ST.user)+(locked?"&nbsp;&#128274;":"")+'</span>';
  h+='<button class="btn '+(ST.admin?"btn-gold":"btn-ghost")+'" id="b-admin">'+(ST.admin?"&#9889;":"&#9881;")+'</button>';
  if(ST.admin)h+='<button class="btn btn-red" id="b-reset-top">&#8635;</button>';
  h+='</div></div>';
  var tabs=[{id:"groups",lbl:"Groups"},{id:"wildcard",lbl:"Wild Cards"},{id:"bracket",lbl:"Bracket"},{id:"results",lbl:"Results"},{id:"leaderboard",lbl:"Standings"},{id:"rules",lbl:"Rules"}];
  if(ST.admin)tabs.push({id:"admin",lbl:"Admin"});
  h+='<div class="page-bar">';
  tabs.forEach(function(t){h+='<button class="ptab'+(ST.page===t.id?" active":"")+'" data-page="'+t.id+'">'+t.lbl+'</button>';});
  h+='</div>';
  if(!ST.user&&!ST.admin&&ST.page!=="leaderboard"){
    h+='<div class="user-screen"><h2>Who are you?</h2><div class="user-grid">';
    PARTS.forEach(function(p){h+='<button class="user-btn" data-user="'+x(p)+'"><div>'+pem(p)+x(p)+'</div><div class="user-btn-sub">'+(ST.locked[ukey(p)]?"&#128274; Locked":"Click to pick")+'</div></button>';});
    h+='</div></div>';
    document.getElementById("root").innerHTML=h;bind();return;
  }
  if(viewer&&Object.keys(ST.results||{}).length>0){
    var sc=calcScore(viewer),poss=calcMaxPossible(viewer);
    h+='<div class="score-banner"><div class="sb-item total"><div class="sl">Score</div><div class="sv">'+sc+'</div></div><div class="sb-item"><div class="sl">Max possible</div><div class="sv">'+poss+'</div></div></div>';
  }
  if(ST.user&&(ST.page==="groups"||ST.page==="wildcard")){
    h+='<div class="lock-bar"><div class="lock-info">'+(locked?"&#128274; Locked":"&#9998; Making picks")+'</div>';
    h+='<div class="lock-chips">';
    PARTS.forEach(function(p){var isV=viewer===p;h+='<div class="lchip '+(isV?"viewing":ST.locked[ukey(p)]?"done":"pend")+'" data-view="'+x(p)+'">'+x(p)+'</div>';});
    h+='</div>';
    if(viewer!==ST.user)h+='<button class="btn btn-ghost" id="b-viewself" style="font-size:9px">My Picks</button>';
    if(!locked&&viewer===ST.user){
      var done=GROUP_IDS.filter(function(g){return groupPicksDone(ST.user,g);}).length;
      if(done===12)h+='<button class="btn btn-gold" id="b-lock" style="margin-left:4px">&#128274; Lock</button>';
    }
    h+='</div>';
  }
  if(ST.page==="groups")h+=renderGroups();
  else if(ST.page==="wildcard")h+=renderWildCards();
  else if(ST.page==="bracket")h+=renderBracket();
  else if(ST.page==="results")h+='<div id="results-wrap" style="min-height:60vh;padding:10px 12px"><div style="text-align:center;padding:30px;color:var(--muted)">Loading results...</div></div>';
  else if(ST.page==="leaderboard")h+=renderLB();
  else if(ST.page==="rules")h+=renderRules();
  else if(ST.page==="admin"&&ST.admin)h+=renderAdmin();
  document.getElementById("root").innerHTML=h;
  bind();
  initAllDragLists();
  initGroupSwipe();
  if(ST.page==="results"){if(_resData)renderResultsInto();else startResultsRefresh();}
  else stopResultsRefresh();
}

function initGroupSwipe(){
  var card=document.getElementById("group-swipe-target");
  if(!card) return;
  var sx=0,sy=0,moved=false;
  card.addEventListener("touchstart",function(e){
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
    moved=false;
  },{passive:true});
  card.addEventListener("touchmove",function(e){
    moved=true;
  },{passive:true});
  card.addEventListener("touchend",function(e){
    if(!moved) return;
    var dx=e.changedTouches[0].clientX-sx;
    var dy=e.changedTouches[0].clientY-sy;
    // Only trigger if horizontal swipe is dominant and long enough
    if(Math.abs(dx)<40||Math.abs(dx)<Math.abs(dy)*1.5) return;
    var gIdx=GROUP_IDS.indexOf(ST.group);
    if(dx<0&&gIdx<GROUP_IDS.length-1){
      ST.group=GROUP_IDS[gIdx+1];draw();
    } else if(dx>0&&gIdx>0){
      ST.group=GROUP_IDS[gIdx-1];draw();
    }
  },{passive:true});
}
// Works on both desktop (mouse) and mobile (touch)
function initAllDragLists(){
  // Find all drag lists and init
  var lists=document.querySelectorAll(".drag-list");
  for(var i=0;i<lists.length;i++) initDragList(lists[i]);
}

function initDragList(list){
  var gid=list.getAttribute("data-gid");
  var isAdmin=list.getAttribute("data-admin")==="1";
  var items=list.querySelectorAll(".drag-item");
  var ghost=null;
  var dragSrc=null;
  var overItem=null;
  var startY=0,startX=0,itemH=0;

  function getNames(){
    var ns=[];
    list.querySelectorAll(".drag-item").forEach(function(el){ns.push(el.getAttribute("data-name"));});
    return ns;
  }
  function doSwap(){
    if(!dragSrc||!overItem||dragSrc===overItem) return;
    var names=getNames();
    var fi=names.indexOf(dragSrc.getAttribute("data-name"));
    var ti=names.indexOf(overItem.getAttribute("data-name"));
    if(fi<0||ti<0||fi===ti) return;
    names.splice(fi,1);
    names.splice(ti,0,dragSrc.getAttribute("data-name"));
    _dragState=null;
    if(isAdmin) saveAdminRanking(gid,names);
    else saveGroupRanking(gid,names);
    toast("&#9998; Group "+gid+" updated");
  }
  function clearOver(){
    list.querySelectorAll(".drop-target").forEach(function(el){el.classList.remove("drop-target");});
    overItem=null;
  }
  function findItemAt(y){
    var found=null;
    list.querySelectorAll(".drag-item").forEach(function(el){
      var r=el.getBoundingClientRect();
      if(y>=r.top&&y<=r.bottom) found=el;
    });
    return found;
  }
  function removeGhost(){
    if(ghost&&ghost.parentNode){ghost.parentNode.removeChild(ghost);ghost=null;}
  }

  // Touch events — only on the handle
  items.forEach(function(item){
    var handle=item.querySelector(".di-handle");
    if(!handle) return;

    handle.addEventListener("touchstart",function(e){
      e.preventDefault();
      dragSrc=item;
      item.classList.add("drag-active");
      startY=e.touches[0].clientY;
      startX=e.touches[0].clientX;
      itemH=item.offsetHeight;
      // Create ghost
      ghost=document.createElement("div");
      ghost.className="drag-ghost";
      ghost.innerHTML=item.innerHTML;
      ghost.style.width=item.offsetWidth+"px";
      ghost.style.top=(item.getBoundingClientRect().top)+"px";
      ghost.style.left=(item.getBoundingClientRect().left)+"px";
      document.body.appendChild(ghost);
    },{passive:false});

    handle.addEventListener("touchmove",function(e){
      if(!dragSrc) return;
      e.preventDefault();
      var ty=e.touches[0].clientY;
      var tx=e.touches[0].clientX;
      // Move ghost
      if(ghost){
        ghost.style.top=(ty-itemH/2)+"px";
        ghost.style.left=(tx-60)+"px";
      }
      // Find drop target
      clearOver();
      var target=findItemAt(ty);
      if(target&&target!==dragSrc){
        target.classList.add("drop-target");
        overItem=target;
      }
    },{passive:false});

    handle.addEventListener("touchend",function(e){
      if(!dragSrc) return;
      e.preventDefault();
      removeGhost();
      item.classList.remove("drag-active");
      doSwap();
      clearOver();
      dragSrc=null;overItem=null;
    },{passive:false});

    handle.addEventListener("touchcancel",function(){
      removeGhost();
      item.classList.remove("drag-active");
      clearOver();
      dragSrc=null;overItem=null;
    });

    // Mouse events for desktop
    handle.addEventListener("mousedown",function(e){
      e.preventDefault();
      dragSrc=item;
      item.classList.add("drag-active");
      itemH=item.offsetHeight;
      ghost=document.createElement("div");
      ghost.className="drag-ghost";
      ghost.innerHTML=item.innerHTML;
      ghost.style.width=item.offsetWidth+"px";
      ghost.style.top=(e.clientY-itemH/2)+"px";
      ghost.style.left=(e.clientX-60)+"px";
      document.body.appendChild(ghost);
      function onMove(ev){
        ghost.style.top=(ev.clientY-itemH/2)+"px";
        ghost.style.left=(ev.clientX-60)+"px";
        clearOver();
        var target=findItemAt(ev.clientY);
        if(target&&target!==dragSrc){target.classList.add("drop-target");overItem=target;}
      }
      function onUp(){
        removeGhost();
        item.classList.remove("drag-active");
        doSwap();clearOver();
        dragSrc=null;overItem=null;
        document.removeEventListener("mousemove",onMove);
        document.removeEventListener("mouseup",onUp);
      }
      document.addEventListener("mousemove",onMove);
      document.addEventListener("mouseup",onUp);
    });
  });
}

function bind(){
  var els,i,el;
  els=document.querySelectorAll("[data-bkpick]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    if(!ST.user||isLocked())return;
    var rnd=this.getAttribute("data-bkrnd");
    var idx=parseInt(this.getAttribute("data-bkidx"));
    var team=this.getAttribute("data-bkteam");
    if(!team||!rnd)return;
    saveBracketPick(rnd,idx,team);
    toast("\u2605 "+team);
  });
  els=document.querySelectorAll(".ptab");for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){ST.page=this.getAttribute("data-page");draw();});
  els=document.querySelectorAll(".gtab");for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){ST.group=this.getAttribute("data-gtab");draw();});
  els=document.querySelectorAll(".user-btn");for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){ST.user=this.getAttribute("data-user");ST.viewUser=null;draw();});
  els=document.querySelectorAll(".lchip[data-view]");for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){var p=this.getAttribute("data-view");ST.viewUser=(ST.user===p)?null:p;_saveScroll();draw();_restoreScroll();});
  el=document.getElementById("b-viewself");if(el)el.addEventListener("click",function(){ST.viewUser=null;draw();});
  el=document.getElementById("b-admin");if(el)el.addEventListener("click",function(){
    if(ST.admin){ST.admin=false;if(ST.page==="admin")ST.page="groups";draw();return;}
    var pw=prompt("Admin password:");if(pw===null)return;
    if(pw===MASTER_PW||(GROUP_ADMIN_PW&&pw===GROUP_ADMIN_PW)){ST.admin=true;ST.page="admin";draw();}else toast("Wrong password");
  });
  el=document.getElementById("b-reset-top");if(el)el.addEventListener("click",function(){if(!confirm("Reset ALL data?"))return;if(DB){DB.ref(BASE).remove();DB.ref(RESULTS_BASE+"/results").remove();}toast("Reset");});
  el=document.getElementById("adm-reset");if(el)el.addEventListener("click",function(){if(!confirm("Reset ALL data?"))return;if(DB){DB.ref(BASE).remove();DB.ref(RESULTS_BASE+"/results").remove();}toast("Reset");});
  el=document.getElementById("b-lock");if(el)el.addEventListener("click",function(){if(!ST.user||!DB)return;if(!confirm("Lock your picks?"))return;DB.ref(BASE+"/locked/"+ukey(ST.user)).set(true);toast("&#128274; Locked!");launchConfetti();});
  el=document.getElementById("go-wc");if(el)el.addEventListener("click",function(){ST.page="wildcard";draw();});
  el=document.getElementById("adm-close");if(el)el.addEventListener("click",function(){if(!confirm("Close group stage?"))return;setPhase("knockout");toast("Group stage closed");});
  el=document.getElementById("adm-reopen");if(el)el.addEventListener("click",function(){if(!confirm("Reopen group stage?"))return;setPhase("groups");toast("Reopened");});
  els=document.querySelectorAll("[data-wc]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var name=this.getAttribute("data-wc");if(!name||!ST.user||isLocked())return;
    var wc=getUserWildcards(ST.user);var sel=wc.indexOf(name)>=0;
    if(!sel&&wc.length>=WILD_CARD_COUNT){toast("Already picked 8");return;}
    saveWildcard(name,!sel);toast(sel?"Removed":"&#9733; "+name);
  });
  els=document.querySelectorAll("[data-adm-wc]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var name=this.getAttribute("data-adm-wc");
    var wc=getResultWildcards().slice();var idx=wc.indexOf(name);
    if(idx>=0)wc.splice(idx,1);
    else{if(wc.length>=8){toast("Already 8 set");return;}wc.push(name);}
    saveAdminWildcards(wc);toast(idx>=0?"Removed":"&#9989; "+name);
  });
  els=document.querySelectorAll("[data-adm-stage-toggle]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    var stage=this.getAttribute("data-adm-stage-toggle");
    var opening=!(ST.stageOpen&&ST.stageOpen[stage]);
    if(!confirm((opening?"Open":"Close")+" "+stage+" picks?"))return;
    toggleStageOpen(stage);
    toast((opening?"🔓 Picks OPEN: ":"🔒 Picks CLOSED: ")+stage);
  });
  el=document.getElementById("adm-fetch-live");if(el)el.addEventListener("click",function(){
    var statusEl=document.getElementById("adm-live-status");
    if(statusEl)statusEl.textContent="Fetching from ESPN...";
    fetch("https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings")
      .then(function(r){return r.json();})
      .then(function(data){
        var pushed={};
        if(data&&data.children&&data.children.length){
          data.children.forEach(function(group){
            // Match ESPN group name to our group ID (e.g. "Group A" → "A")
            var gname=(group.name||group.abbreviation||"").replace(/^group\s*/i,"").trim().toUpperCase();
            if(!gname||!GROUPS[gname])return;
            var entries=(group.standings&&group.standings.entries)||[];
            // Sort by points desc, then GD desc
            var rows=[];
            entries.forEach(function(e){
              var stats={};(e.stats||[]).forEach(function(s){stats[s.name||s.abbreviation]=parseFloat(s.value||0);});
              var tname=(e.team&&(e.team.displayName||e.team.name))||"";
              // Try to map ESPN name back to our team name
              var matched=null;
              GROUPS[gname].teams.forEach(function(t){
                var ename=tname.toLowerCase(),oname=t.n.toLowerCase();
                if(ename===oname||ename.indexOf(oname)>=0||oname.indexOf(ename)>=0)matched=t.n;
              });
              rows.push({name:matched||tname,pts:stats.points||stats.PTS||0,gd:stats.pointDifferential||stats.GD||0,gf:stats.pointsFor||stats.GF||0});
            });
            rows.sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
            var ranking=rows.map(function(r){return r.name;}).filter(Boolean);
            if(ranking.length===4)pushed[gname]=ranking;
          });
        }
        if(Object.keys(pushed).length){
          pushLiveGroupsToResults(pushed);
          if(statusEl)statusEl.innerHTML='<span style="color:var(--wc-green)">✓ Pushed '+Object.keys(pushed).length+' groups</span>';
          toast("📡 Live standings pushed");
        } else {
          if(statusEl)statusEl.innerHTML='<span style="color:#ff7070">No standings data yet</span>';
          toast("No data available yet");
        }
      })
      .catch(function(err){
        if(statusEl)statusEl.innerHTML='<span style="color:#ff7070">Fetch failed: '+err.message+'</span>';
        toast("Fetch failed");
      });
  });
}
