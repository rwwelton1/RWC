<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="dark"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RWC Picks League</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:40px 40px}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(99,102,241,.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,9,15,.92);border-bottom:1px solid #1e2a3a;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-top:-2px}
.admin-btn{padding:5px 14px;border-radius:6px;font-size:10px;font-weight:600;background:transparent;border:1px solid #2d3f52;color:#475569;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.admin-btn.active{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.4);color:#fbbf24}
.main{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:24px 16px 60px}
.section-label{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#1e2a3a}
.standings-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;overflow:hidden;margin-bottom:28px}
.standings-head{padding:14px 16px;border-bottom:1px solid #1e2a3a}
.standings-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.standings-sub{font-size:9px;color:#475569}
.player-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid rgba(30,42,58,.6)}
.player-row:last-child{border-bottom:none}
.player-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rank-1{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.rank-2{background:rgba(148,163,184,.1);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}
.rank-3{background:rgba(205,127,50,.1);color:#cd7f32;border:1px solid rgba(205,127,50,.2)}
.rank-other{background:#07090f;color:#475569;border:1px solid #1e2a3a}
.player-name{flex:1;font-size:13px;font-weight:600}
.finish-dots{display:flex;gap:3px}
.fdot{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.fdot-1{background:rgba(251,191,36,.2);color:#fbbf24}
.fdot-2{background:rgba(148,163,184,.15);color:#94a3b8}
.fdot-3{background:rgba(205,127,50,.15);color:#cd7f32}
.fdot-x{background:#1e2a3a;color:#334155}
.player-pts{font-size:16px;font-weight:700;color:#fff;min-width:28px;text-align:right}
.player-pts-label{font-size:8px;color:#475569;text-align:right}
.pools-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.pool-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;overflow:hidden;transition:border-color .2s,transform .15s;cursor:default}
.pool-card.clickable{cursor:pointer}
.pool-card.clickable:active{transform:scale(.99)}
.pool-card.clickable:hover{border-color:#2d3f52}
.pool-card.dimmed{opacity:.55}
.pool-card-inner{display:flex;align-items:center;gap:14px;padding:14px 16px}
.pool-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pool-info{flex:1;min-width:0}
.pool-name{font-size:14px;font-weight:700;margin-bottom:2px}
.pool-meta{font-size:10px;color:#475569}
.pool-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.status-pill{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.pill-open{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.pill-locked{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.pill-soon{background:rgba(71,85,105,.1);border:1px solid #1e2a3a;color:#475569}
.pill-complete{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.pool-arrow{color:#334155;font-size:16px;line-height:1}
.pool-winner{border-top:1px solid #1e2a3a;padding:7px 16px;display:flex;align-items:center;gap:10px}
.podium{display:flex;gap:8px}
.podium-item{font-size:9px;color:#475569}
.podium-item b{font-weight:700}
.podium-item.p1 b{color:#fbbf24}
.podium-item.p2 b{color:#94a3b8}
.podium-item.p3 b{color:#cd7f32}
.admin-panel{background:#0d1117;border:1px solid rgba(251,191,36,.25);border-radius:12px;padding:16px;margin-bottom:20px;display:none}
.admin-panel.visible{display:block}
.admin-panel-title{font-size:9px;color:#fbbf24;letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px}
.pool-controls{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.pool-control-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#07090f;border-radius:8px;border:1px solid #1e2a3a}
.pcr-name{flex:1;font-size:11px;font-weight:600}
.pcr-btns{display:flex;gap:4px;flex-wrap:wrap}
.pcr-btn{padding:3px 8px;border-radius:5px;font-size:9px;font-weight:600;border:1px solid #1e2a3a;background:transparent;color:#475569;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.pcr-btn.sel-open{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.pcr-btn.sel-locked{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}
.pcr-btn.sel-soon{background:rgba(71,85,105,.15);border-color:#2d3f52;color:#64748b}
.pcr-btn.sel-complete{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#a5b4fc}
.results-title{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.result-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.result-pool-name{font-size:10px;color:#475569;width:90px;flex-shrink:0}
.result-selects{display:flex;gap:4px;flex:1}
.result-select{flex:1;background:#07090f;border:1px solid #1e2a3a;border-radius:6px;color:#e2e8f0;font-size:10px;font-family:'DM Sans',sans-serif;padding:5px 4px;outline:none}
.save-results-btn{width:100%;margin-top:10px;padding:9px;border-radius:7px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fbbf24;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:#0d1117;border:1px solid rgba(99,102,241,.4);color:#a5b4fc;border-radius:8px;padding:8px 18px;font-size:11px;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="topbar">
  <div>
    <div class="logo">RWC Picks League</div>
    <div class="logo-sub">2025&#8211;26 Season</div>
  </div>
  <button class="admin-btn" id="admin-btn">Admin</button>
</div>
<div class="main">
  <div class="admin-panel" id="admin-panel">
    <div class="admin-panel-title">&#9889; Admin Controls</div>
    <div class="pool-controls" id="pool-controls"></div>
    <div class="results-title">Set Results (1st / 2nd / 3rd)</div>
    <div id="results-rows"></div>
    <button class="save-results-btn" id="save-results-btn">Save Results &amp; Recalculate Standings</button>
  </div>
  <div class="section-label">Season Standings</div>
  <div class="standings-card">
    <div class="standings-head">
      <div class="standings-title">Overall Leaderboard</div>
      <div class="standings-sub">4 pts &middot; 1st &nbsp;|&nbsp; 2 pts &middot; 2nd &nbsp;|&nbsp; 1 pt &middot; 3rd</div>
    </div>
    <div id="standings-body"></div>
  </div>
  <div class="section-label">Competitions</div>
  <div class="pools-grid" id="pools-grid"></div>
</div>
<div id="toast"></div>
<script>
var PLAYERS=["Welton","Trom","Hoff","Watson"];
var POOLS=[
  {id:"rwc",    name:"Conference Tourney Picks",icon:"B-ball", bg:"linear-gradient(135deg,#1d428a,#6366f1)",url:"rwc-bracket-challenge.html",desc:"ACC / Big Ten / Big 12 / SEC / Big East"},
  {id:"masters",name:"Masters Pool",            icon:"Golf",   bg:"linear-gradient(135deg,#065f46,#10b981)",url:"masters.html",               desc:"Augusta National - April 10-13"},
  {id:"wc",     name:"2026 World Cup",          icon:"⚽",    bg:"linear-gradient(135deg,#064e3b,#10b981)",url:"wc2026.html",              desc:"48 Teams · Jun 11–Jul 19 · USA/Mexico/Canada"},
  {id:"cws",    name:"College World Series",    icon:"CWS",    bg:"linear-gradient(135deg,#7c2d12,#ef4444)",url:"cws.html",                   desc:"TD Ameritrade Park - June"},
  {id:"nhl",    name:"Stanley Cup Playoffs",    icon:"NHL",    bg:"linear-gradient(135deg,#0c1445,#3b82f6)",url:"nhl.html",                   desc:"NHL Playoff Bracket - April-June"},
  {id:"cfb",    name:"College Football Pickem", icon:"CFB",    bg:"linear-gradient(135deg,#4c1d95,#a78bfa)",url:"cfb.html",                   desc:"10-Game Spread Picks - Weekly"}
];
var ICONS={"B-ball":"&#127936;","Golf":"&#9971;","Soccer":"&#9917;","CWS":"&#9918;","NHL":"&#127944;","CFB":"&#127944;"};
var IS_ADMIN=false;
var DATA={statuses:{},results:{}};
(function(){
  try{var s=localStorage.getItem("rwc_league");if(s){var d=JSON.parse(s);DATA.statuses=d.statuses||{};DATA.results=d.results||{};}}catch(e){}
})();
function saveLocal(){try{localStorage.setItem("rwc_league",JSON.stringify(DATA));}catch(e){}}
function getStatus(pid){return DATA.statuses[pid]||(pid==="rwc"?"open":"coming-soon");}
function calcStandings(){
  var scores={},finishes={};
  PLAYERS.forEach(function(p){scores[p]=0;finishes[p]={};});
  POOLS.forEach(function(pool){
    var r=DATA.results[pool.id];if(!r)return;
    if(r.first&&scores[r.first]!==undefined){scores[r.first]+=4;finishes[r.first][pool.id]=1;}
    if(r.second&&scores[r.second]!==undefined){scores[r.second]+=2;finishes[r.second][pool.id]=2;}
    if(r.third&&scores[r.third]!==undefined){scores[r.third]+=1;finishes[r.third][pool.id]=3;}
  });
  return PLAYERS.slice().sort(function(a,b){return scores[b]-scores[a];}).map(function(p){return{name:p,pts:scores[p],finishes:finishes[p]};});
}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2200);}
function x(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function draw(){drawStandings();drawPools();if(IS_ADMIN)drawAdmin();}
function drawStandings(){
  var standings=calcStandings();
  var rc=["rank-1","rank-2","rank-3","rank-other"];
  var h="";
  standings.forEach(function(p,i){
    h+='<div class="player-row">';
    h+='<div class="player-rank '+rc[Math.min(i,3)]+'">'+(i+1)+'</div>';
    h+='<div class="player-name">'+x(p.name)+'</div>';
    h+='<div class="finish-dots">';
    POOLS.forEach(function(pool){
      var f=p.finishes[pool.id];
      if(f===1)      h+='<div class="fdot fdot-1" title="'+x(pool.name)+': 1st">1</div>';
      else if(f===2) h+='<div class="fdot fdot-2" title="'+x(pool.name)+': 2nd">2</div>';
      else if(f===3) h+='<div class="fdot fdot-3" title="'+x(pool.name)+': 3rd">3</div>';
      else if(DATA.results[pool.id]) h+='<div class="fdot fdot-x">-</div>';
    });
    h+='</div>';
    h+='<div><div class="player-pts">'+p.pts+'</div><div class="player-pts-label">pts</div></div>';
    h+='</div>';
  });
  document.getElementById("standings-body").innerHTML=h;
}
function iconHTML(pool){
  var map={
    "rwc":"&#127952;",
    "masters":"&#9971;",
    "wc":"&#9917;",
    "cws":"&#9918;",
    "nhl":"&#127944;",
    "cfb":"&#127944;"
  };
  return map[pool.id]||pool.icon;
}
function drawPools(){
  var h="";
  POOLS.forEach(function(pool){
    var status=getStatus(pool.id);
    var clickable=(status==="open"||status==="locked");
    var dimmed=(status==="coming-soon");
    var result=DATA.results[pool.id];
    h+='<div class="pool-card'+(clickable?" clickable":"")+(dimmed?" dimmed":"")+'"';
    if(clickable)h+=' onclick="window.location.href=\''+pool.url+'\'"';
    h+='>';
    h+='<div class="pool-card-inner">';
    h+='<div class="pool-icon" style="background:'+pool.bg+'">'+iconHTML(pool)+'</div>';
    h+='<div class="pool-info"><div class="pool-name">'+x(pool.name)+'</div><div class="pool-meta">'+x(pool.desc)+'</div></div>';
    h+='<div class="pool-right">';
    if(status==="open")         h+='<span class="status-pill pill-open">Open</span>';
    else if(status==="locked")  h+='<span class="status-pill pill-locked">Locked</span>';
    else if(status==="complete")h+='<span class="status-pill pill-complete">Final</span>';
    else                        h+='<span class="status-pill pill-soon">Coming Soon</span>';
    if(clickable)h+='<span class="pool-arrow">&#8250;</span>';
    h+='</div></div>';
    if(result&&(result.first||result.second||result.third)){
      h+='<div class="pool-winner"><div class="podium">';
      if(result.first)  h+='<div class="podium-item p1">1st <b>'+x(result.first)+'</b></div>';
      if(result.second) h+='<div class="podium-item p2">2nd <b>'+x(result.second)+'</b></div>';
      if(result.third)  h+='<div class="podium-item p3">3rd <b>'+x(result.third)+'</b></div>';
      h+='</div></div>';
    }
    h+='</div>';
  });
  document.getElementById("pools-grid").innerHTML=h;
}
function drawAdmin(){
  document.getElementById("admin-panel").classList.add("visible");
  var ch="";
  POOLS.forEach(function(pool){
    var s=getStatus(pool.id);
    ch+='<div class="pool-control-row">';
    ch+='<div class="pcr-name">'+iconHTML(pool)+' '+x(pool.name)+'</div>';
    ch+='<div class="pcr-btns">';
    [["open","Open"],["locked","Locked"],["coming-soon","Soon"],["complete","Final"]].forEach(function(pair){
      var cls="";
      if(s===pair[0]){
        if(pair[0]==="open")cls="sel-open";
        else if(pair[0]==="locked")cls="sel-locked";
        else if(pair[0]==="coming-soon")cls="sel-soon";
        else cls="sel-complete";
      }
      ch+='<button class="pcr-btn '+cls+'" onclick="setStatus(\''+pool.id+'\',\''+pair[0]+'\')">'+pair[1]+'</button>';
    });
    ch+='</div></div>';
  });
  document.getElementById("pool-controls").innerHTML=ch;
  var none='<option value="">--</option>';
  var opts=PLAYERS.map(function(p){return'<option value="'+x(p)+'">'+x(p)+'</option>';}).join("");
  var rh="";
  POOLS.forEach(function(pool){
    var r=DATA.results[pool.id]||{};
    rh+='<div class="result-row">';
    rh+='<div class="result-pool-name">'+iconHTML(pool)+' '+x(pool.name.split(" ")[0])+'</div>';
    rh+='<div class="result-selects">';
    ["first","second","third"].forEach(function(place){
      rh+='<select class="result-select" id="res-'+pool.id+'-'+place+'">'+none+opts+'</select>';
    });
    rh+='</div></div>';
  });
  document.getElementById("results-rows").innerHTML=rh;
  POOLS.forEach(function(pool){
    var r=DATA.results[pool.id]||{};
    ["first","second","third"].forEach(function(place){
      var el=document.getElementById("res-"+pool.id+"-"+place);
      if(el&&r[place])el.value=r[place];
    });
  });
}
function setStatus(poolId,status){DATA.statuses[poolId]=status;saveLocal();draw();toast("Status updated");}
function saveResults(){
  POOLS.forEach(function(pool){
    var r={};
    ["first","second","third"].forEach(function(place){
      var el=document.getElementById("res-"+pool.id+"-"+place);
      if(el&&el.value)r[place]=el.value;
    });
    if(Object.keys(r).length>0)DATA.results[pool.id]=r;
    else delete DATA.results[pool.id];
  });
  saveLocal();draw();toast("Results saved");
}
document.getElementById("admin-btn").addEventListener("click",function(){
  if(IS_ADMIN){
    IS_ADMIN=false;this.classList.remove("active");this.textContent="Admin";
    document.getElementById("admin-panel").classList.remove("visible");return;
  }
  var pw=prompt("Admin password:");
  if(pw===null)return;
  if(pw==="Sloop"){IS_ADMIN=true;this.classList.add("active");this.textContent="Admin (on)";draw();}
  else toast("Wrong password");
});
document.getElementById("save-results-btn").addEventListener("click",saveResults);
draw();
</script>
</body>
</html>
