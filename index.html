<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="dark"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RWC Picks League</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
–bg:#07090f;
–surface:#0d1117;
–border:#1e2a3a;
–border2:#2d3f52;
–text:#e2e8f0;
–muted:#475569;
–dim:#334155;
–gold:#fbbf24;
–green:#10b981;
–purple:#6366f1;
–red:#ef4444;
–blue:#3b82f6;
}

body{
background:var(–bg);
color:var(–text);
font-family:‘DM Sans’,sans-serif;
font-size:14px;
min-height:100vh;
overflow-x:hidden;
}

/* ── BACKGROUND ── */
.bg-grid{
position:fixed;inset:0;z-index:0;pointer-events:none;
background-image:
linear-gradient(rgba(99,102,241,.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(99,102,241,.04) 1px, transparent 1px);
background-size:40px 40px;
}
.bg-glow{
position:fixed;top:-200px;left:50%;transform:translateX(-50%);
width:800px;height:500px;
background:radial-gradient(ellipse, rgba(99,102,241,.08) 0%, transparent 70%);
pointer-events:none;z-index:0;
}

/* ── TOPBAR ── */
.topbar{
position:sticky;top:0;z-index:50;
background:rgba(7,9,15,.9);
border-bottom:1px solid var(–border);
backdrop-filter:blur(12px);
padding:14px 20px;
display:flex;justify-content:space-between;align-items:center;
}
.logo{
font-family:‘Bebas Neue’,sans-serif;
font-size:22px;letter-spacing:.1em;
background:linear-gradient(135deg,#fff 40%,var(–gold));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-sub{font-size:9px;color:var(–muted);letter-spacing:.15em;text-transform:uppercase;margin-top:-2px;-webkit-text-fill-color:var(–muted)}
.admin-btn{
padding:5px 14px;border-radius:6px;font-size:10px;font-weight:600;
background:transparent;border:1px solid var(–border2);color:var(–muted);
font-family:‘DM Sans’,sans-serif;cursor:pointer;transition:all .2s;
}
.admin-btn:hover{border-color:var(–gold);color:var(–gold);}
.admin-btn.active{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.4);color:var(–gold);}

/* ── MAIN ── */
.main{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:24px 16px 60px;}

/* ── SEASON STANDINGS ── */
.section-label{
font-size:9px;color:var(–muted);letter-spacing:.15em;text-transform:uppercase;
margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:’’;flex:1;height:1px;background:var(–border);}

.standings-card{
background:var(–surface);border:1px solid var(–border);
border-radius:12px;overflow:hidden;margin-bottom:28px;
}
.standings-head{
padding:14px 16px;border-bottom:1px solid var(–border);
display:flex;justify-content:space-between;align-items:center;
}
.standings-title{font-size:13px;font-weight:700;color:#fff;}
.standings-sub{font-size:9px;color:var(–muted);}
.pts-key{display:flex;gap:12px;}
.pts-key-item{font-size:8px;color:var(–muted);text-align:center;}
.pts-key-item b{display:block;font-size:11px;color:var(–text);}

.player-row{
display:flex;align-items:center;gap:12px;
padding:11px 16px;border-bottom:1px solid rgba(30,42,58,.6);
transition:background .15s;
}
.player-row:last-child{border-bottom:none;}
.player-rank{
width:22px;height:22px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:10px;font-weight:700;flex-shrink:0;
}
.rank-1{background:rgba(251,191,36,.15);color:var(–gold);border:1px solid rgba(251,191,36,.3);}
.rank-2{background:rgba(148,163,184,.1);color:#94a3b8;border:1px solid rgba(148,163,184,.2);}
.rank-3{background:rgba(205,127,50,.1);color:#cd7f32;border:1px solid rgba(205,127,50,.2);}
.rank-other{background:var(–bg);color:var(–muted);border:1px solid var(–border);}
.player-name{flex:1;font-size:13px;font-weight:600;}
.player-badges{display:flex;gap:4px;align-items:center;}
.pool-badge{
width:18px;height:18px;border-radius:4px;
display:flex;align-items:center;justify-content:center;
font-size:7px;font-weight:700;color:#fff;
position:relative;cursor:default;
}
.pool-badge[title]{cursor:help;}
.player-pts{
font-size:16px;font-weight:700;color:#fff;min-width:28px;text-align:right;
}
.player-pts-label{font-size:8px;color:var(–muted);text-align:right;}
.finish-dots{display:flex;gap:3px;}
.fdot{
width:16px;height:16px;border-radius:3px;
display:flex;align-items:center;justify-content:center;
font-size:8px;font-weight:700;
}
.fdot-1{background:rgba(251,191,36,.2);color:var(–gold);}
.fdot-2{background:rgba(148,163,184,.15);color:#94a3b8;}
.fdot-3{background:rgba(205,127,50,.15);color:#cd7f32;}
.fdot-x{background:var(–border);color:var(–dim);}

/* ── POOL CARDS ── */
.pools-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}

.pool-card{
background:var(–surface);border:1px solid var(–border);
border-radius:12px;overflow:hidden;
transition:border-color .2s, transform .15s;
text-decoration:none;color:inherit;display:block;
}
.pool-card:active{transform:scale(.99);}
.pool-card.open{cursor:pointer;}
.pool-card.open:hover{border-color:var(–border2);}
.pool-card.locked{opacity:.8;}
.pool-card.coming-soon{opacity:.55;}

.pool-card-inner{display:flex;align-items:center;gap:14px;padding:14px 16px;}

.pool-icon{
width:44px;height:44px;border-radius:10px;
display:flex;align-items:center;justify-content:center;
font-size:22px;flex-shrink:0;
}
.pool-info{flex:1;min-width:0;}
.pool-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.pool-meta{font-size:10px;color:var(–muted);}
.pool-status{
display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;
}
.status-pill{
padding:3px 9px;border-radius:20px;font-size:9px;font-weight:600;
letter-spacing:.04em;text-transform:uppercase;
}
.pill-open{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;}
.pill-locked{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.pill-soon{background:rgba(71,85,105,.1);border:1px solid var(–border);color:var(–muted);}
.pill-complete{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;}
.pool-arrow{color:var(–dim);font-size:14px;}

/* Winner strip */
.pool-winner{
border-top:1px solid var(–border);
padding:7px 16px;
display:flex;align-items:center;gap:8px;
font-size:10px;
}
.winner-label{color:var(–muted);}
.winner-name{font-weight:700;color:var(–gold);}
.podium{display:flex;gap:6px;}
.podium-item{font-size:9px;color:var(–muted);}
.podium-item b{font-weight:700;}
.podium-item.p1 b{color:var(–gold);}
.podium-item.p2 b{color:#94a3b8;}
.podium-item.p3 b{color:#cd7f32;}

/* Admin panel */
.admin-panel{
background:var(–surface);border:1px solid rgba(251,191,36,.25);
border-radius:12px;padding:16px;margin-bottom:20px;
display:none;
}
.admin-panel.visible{display:block;}
.admin-panel-title{
font-size:9px;color:var(–gold);letter-spacing:.15em;text-transform:uppercase;
margin-bottom:14px;display:flex;align-items:center;gap:6px;
}
.pool-controls{display:flex;flex-direction:column;gap:8px;}
.pool-control-row{
display:flex;align-items:center;gap:10px;
padding:8px 10px;background:var(–bg);border-radius:8px;border:1px solid var(–border);
}
.pcr-name{flex:1;font-size:11px;font-weight:600;}
.pcr-btns{display:flex;gap:4px;}
.pcr-btn{
padding:3px 8px;border-radius:5px;font-size:9px;font-weight:600;
border:1px solid var(–border);background:transparent;color:var(–muted);
font-family:‘DM Sans’,sans-serif;cursor:pointer;transition:all .15s;
}
.pcr-btn.active-open{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:#6ee7b7;}
.pcr-btn.active-locked{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5;}
.pcr-btn.active-soon{background:rgba(71,85,105,.15);border-color:var(–border2);color:var(–muted);}

/* Results entry in admin */
.results-section{margin-top:14px;}
.results-title{font-size:9px;color:var(–muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.result-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.result-pool-name{font-size:10px;color:var(–muted);width:100px;flex-shrink:0;}
.result-selects{display:flex;gap:4px;flex:1;}
.result-select{
flex:1;background:var(–bg);border:1px solid var(–border);border-radius:6px;
color:var(–text);font-size:10px;font-family:‘DM Sans’,sans-serif;
padding:5px 8px;outline:none;
}
.result-select:focus{border-color:var(–purple);}
.save-results-btn{
width:100%;margin-top:10px;padding:9px;border-radius:7px;
background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);
color:var(–gold);font-size:11px;font-weight:600;
font-family:‘DM Sans’,sans-serif;cursor:pointer;
}

/* Toast */
#toast{
position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);
background:var(–surface);border:1px solid rgba(99,102,241,.4);color:#a5b4fc;
border-radius:8px;padding:8px 18px;font-size:11px;z-index:999;
opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;
box-shadow:0 8px 32px rgba(0,0,0,.5);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.pool-card,.standings-card{animation:fadeUp .3s ease both;}
.pool-card:nth-child(1){animation-delay:.05s;}
.pool-card:nth-child(2){animation-delay:.1s;}
.pool-card:nth-child(3){animation-delay:.15s;}
.pool-card:nth-child(4){animation-delay:.2s;}
.pool-card:nth-child(5){animation-delay:.25s;}
</style>

</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="topbar">
  <div>
    <div class="logo">RWC Picks League</div>
    <div class="logo-sub">2025–26 Season</div>
  </div>
  <button class="admin-btn" id="admin-btn">Admin</button>
</div>

<div class="main">

  <!-- Admin Panel -->

  <div class="admin-panel" id="admin-panel">
    <div class="admin-panel-title">⚡ Admin Controls</div>
    <div class="pool-controls" id="pool-controls"></div>
    <div class="results-section">
      <div class="results-title">Set Pool Results (1st / 2nd / 3rd)</div>
      <div id="results-rows"></div>
      <button class="save-results-btn" id="save-results-btn">Save Results & Recalculate Standings</button>
    </div>
  </div>

  <!-- Season Standings -->

  <div class="section-label">Season Standings</div>
  <div class="standings-card">
    <div class="standings-head">
      <div>
        <div class="standings-title">Overall Leaderboard</div>
        <div class="standings-sub">4 pts · 1st &nbsp;|&nbsp; 2 pts · 2nd &nbsp;|&nbsp; 1 pt · 3rd</div>
      </div>
    </div>
    <div id="standings-body"></div>
  </div>

  <!-- Pools -->

  <div class="section-label">Competitions</div>
  <div class="pools-grid" id="pools-grid"></div>

</div>

<div id="toast"></div>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var PLAYERS = ["Welton","Trom","Hoff","Watson"];

var POOLS = [
  {
    id:"rwc",
    name:"Conference Tourney Picks",
    icon:"🏀",
    iconBg:"linear-gradient(135deg,#1d428a,#6366f1)",
    url:"rwc-bracket-challenge.html",
    desc:"ACC · Big Ten · Big 12 · SEC · Big East"
  },
  {
    id:"masters",
    name:"Masters Pool",
    icon:"⛳",
    iconBg:"linear-gradient(135deg,#065f46,#10b981)",
    url:"masters.html",
    desc:"Augusta National · April 10–13"
  },
  {
    id:"cws",
    name:"College World Series",
    icon:"⚾",
    iconBg:"linear-gradient(135deg,#7c2d12,#ef4444)",
    url:"cws.html",
    desc:"TD Ameritrade Park · June"
  },
  {
    id:"wc",
    name:"FIFA World Cup 2026",
    icon:"🌍",
    iconBg:"linear-gradient(135deg,#004494,#c8102e)",
    url:"worldcup.html",
    desc:"48 Teams · 12 Groups · Jun 11 – Jul 19"
  },
  {
    id:"nhl",
    name:"Stanley Cup Playoffs",
    icon:"🏒",
    iconBg:"linear-gradient(135deg,#0c1445,#3b82f6)",
    url:"nhl.html",
    desc:"NHL Playoff Bracket · April–June"
  },
  {
    id:"cfb",
    name:"College Football Pickem",
    icon:"🏈",
    iconBg:"linear-gradient(135deg,#7c3aed,#a78bfa)",
    url:"cfb.html",
    desc:"10-Game Spread Picks · Weekly"
  }
];

// Pool status: "open" | "locked" | "coming-soon" | "complete"
var DATA = {
  statuses:{},   // poolId -> status
  results:{},    // poolId -> {first,second,third}
};
var IS_ADMIN = false;
var DB = null;

// ── FIREBASE ──────────────────────────────────────────────────────────────────
try {
  firebase.initializeApp({
    apiKey:"AIzaSyExample-replace-with-real-key",
    authDomain:"rwcpicks.firebaseapp.com",
    databaseURL:"https://rwcpicks-default-rtdb.firebaseio.com",
    projectId:"rwcpicks"
  });
  DB = firebase.database();
  DB.ref("league").on("value", function(sn){
    var val = sn.val() || {};
    DATA.statuses = val.statuses || {};
    DATA.results  = val.results  || {};
    draw();
  });
} catch(e) {
  // No Firebase — use localStorage fallback
  try {
    var saved = JSON.parse(localStorage.getItem('rwc_league')||'{}');
    DATA.statuses = saved.statuses||{};
    DATA.results  = saved.results||{};
  } catch(e2){}
  draw();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getStatus(pid){ return DATA.statuses[pid] || (pid==='rwc'?'open':'coming-soon'); }

function calcStandings(){
  var scores = {};
  var finishes = {};
  PLAYERS.forEach(function(p){ scores[p]=0; finishes[p]={}; });
  POOLS.forEach(function(pool){
    var r = DATA.results[pool.id];
    if(!r) return;
    if(r.first  && scores[r.first]  !== undefined){ scores[r.first]  += 4; finishes[r.first][pool.id]  = 1; }
    if(r.second && scores[r.second] !== undefined){ scores[r.second] += 2; finishes[r.second][pool.id] = 2; }
    if(r.third  && scores[r.third]  !== undefined){ scores[r.third]  += 1; finishes[r.third][pool.id]  = 3; }
  });
  var ranked = PLAYERS.slice().sort(function(a,b){ return scores[b]-scores[a]; });
  return ranked.map(function(p){ return {name:p, pts:scores[p], finishes:finishes[p]}; });
}

function statusPill(status){
  if(status==='open')        return '<span class="status-pill pill-open">Open</span>';
  if(status==='locked')      return '<span class="status-pill pill-locked">Locked</span>';
  if(status==='complete')    return '<span class="status-pill pill-complete">Final</span>';
  return '<span class="status-pill pill-soon">Coming Soon</span>';
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

function saveData(){
  if(DB){
    DB.ref("league").set(DATA);
  } else {
    try{ localStorage.setItem('rwc_league', JSON.stringify(DATA)); }catch(e){}
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw(){
  drawStandings();
  drawPools();
  if(IS_ADMIN) drawAdminPanel();
}

function drawStandings(){
  var standings = calcStandings();
  var medals = ['🥇','🥈','🥉'];
  var rankClasses = ['rank-1','rank-2','rank-3','rank-other'];
  var h = '';
  standings.forEach(function(p, i){
    var rankClass = rankClasses[Math.min(i,3)];
    h += '<div class="player-row">';
    h += '<div class="player-rank '+rankClass+'">'+(i+1)+'</div>';
    h += '<div class="player-name">'+p.name+'</div>';
    // finish dots per pool
    h += '<div class="finish-dots">';
    POOLS.forEach(function(pool){
      var f = p.finishes[pool.id];
      if(f===1) h += '<div class="fdot fdot-1" title="'+pool.name+': 1st">1</div>';
      else if(f===2) h += '<div class="fdot fdot-2" title="'+pool.name+': 2nd">2</div>';
      else if(f===3) h += '<div class="fdot fdot-3" title="'+pool.name+': 3rd">3</div>';
      else if(DATA.results[pool.id]) h += '<div class="fdot fdot-x" title="'+pool.name+'">—</div>';
    });
    h += '</div>';
    h += '<div><div class="player-pts">'+p.pts+'</div><div class="player-pts-label">pts</div></div>';
    h += '</div>';
  });
  document.getElementById('standings-body').innerHTML = h;
}

function drawPools(){
  var h = '';
  POOLS.forEach(function(pool){
    var status = getStatus(pool.id);
    var isClickable = (status==='open'||status==='locked');
    var result = DATA.results[pool.id];

    h += '<div class="pool-card '+(isClickable?'open':status===''?'':'coming-soon')+'" ';
    if(isClickable) h += 'onclick="goPool(\''+pool.url+'\')"';
    h += '>';
    h += '<div class="pool-card-inner">';
    h += '<div class="pool-icon" style="background:'+pool.iconBg+'">'+pool.icon+'</div>';
    h += '<div class="pool-info"><div class="pool-name">'+pool.name+'</div>';
    h += '<div class="pool-meta">'+pool.desc+'</div></div>';
    h += '<div class="pool-status">'+statusPill(status);
    if(isClickable) h += '<span class="pool-arrow">›</span>';
    h += '</div></div>';

    // Winner strip if results set
    if(result && (result.first||result.second||result.third)){
      h += '<div class="pool-winner">';
      h += '<div class="podium">';
      if(result.first)  h += '<div class="podium-item p1">🥇 <b>'+result.first+'</b></div>';
      if(result.second) h += '<div class="podium-item p2">🥈 <b>'+result.second+'</b></div>';
      if(result.third)  h += '<div class="podium-item p3">🥉 <b>'+result.third+'</b></div>';
      h += '</div></div>';
    }

    h += '</div>';
  });
  document.getElementById('pools-grid').innerHTML = h;
}

function drawAdminPanel(){
  var panel = document.getElementById('admin-panel');
  panel.classList.add('visible');

  // Pool status controls
  var ch = '';
  POOLS.forEach(function(pool){
    var status = getStatus(pool.id);
    ch += '<div class="pool-control-row">';
    ch += '<div class="pcr-name">'+pool.icon+' '+pool.name+'</div>';
    ch += '<div class="pcr-btns">';
    ['open','locked','coming-soon','complete'].forEach(function(s){
      var label = s==='coming-soon'?'Soon':s.charAt(0).toUpperCase()+s.slice(1);
      var activeClass = status===s?('active-'+(s==='coming-soon'?'soon':s==='complete'?'soon':s)):'';
      ch += '<button class="pcr-btn '+activeClass+'" onclick="setStatus(\''+pool.id+'\',\''+s+'\')">'+label+'</button>';
    });
    ch += '</div></div>';
  });
  document.getElementById('pool-controls').innerHTML = ch;

  // Results selects
  var rh = '';
  var none = '<option value="">—</option>';
  var opts = PLAYERS.map(function(p){return'<option value="'+p+'">'+p+'</option>';}).join('');
  POOLS.forEach(function(pool){
    var r = DATA.results[pool.id]||{};
    rh += '<div class="result-row">';
    rh += '<div class="result-pool-name">'+pool.icon+' '+pool.name.split(' ')[0]+'</div>';
    rh += '<div class="result-selects">';
    ['first','second','third'].forEach(function(place){
      rh += '<select class="result-select" id="res-'+pool.id+'-'+place+'">';
      rh += none + opts;
      rh += '</select>';
    });
    rh += '</div></div>';
  });
  document.getElementById('results-rows').innerHTML = rh;

  // Set current values
  POOLS.forEach(function(pool){
    var r = DATA.results[pool.id]||{};
    ['first','second','third'].forEach(function(place){
      var el = document.getElementById('res-'+pool.id+'-'+place);
      if(el && r[place]) el.value = r[place];
    });
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function goPool(url){ window.location.href = url; }

function setStatus(poolId, status){
  DATA.statuses[poolId] = status;
  saveData();
  draw();
  toast('Status updated');
}

function saveResults(){
  POOLS.forEach(function(pool){
    var r = {};
    ['first','second','third'].forEach(function(place){
      var el = document.getElementById('res-'+pool.id+'-'+place);
      if(el && el.value) r[place] = el.value;
    });
    if(Object.keys(r).length > 0) DATA.results[pool.id] = r;
    else delete DATA.results[pool.id];
  });
  saveData();
  draw();
  toast('Results saved ✓');
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
document.getElementById('admin-btn').addEventListener('click', function(){
  if(IS_ADMIN){
    IS_ADMIN = false;
    this.classList.remove('active');
    this.textContent = 'Admin';
    document.getElementById('admin-panel').classList.remove('visible');
    return;
  }
  var pw = prompt('Admin password:');
  if(pw === 'Sloop'){
    IS_ADMIN = true;
    this.classList.add('active');
    this.textContent = '⚡ Admin';
    drawAdminPanel();
  } else if(pw !== null){
    toast('Wrong password');
  }
});

document.getElementById('save-results-btn').addEventListener('click', saveResults);
</script>

</body>
</html>
