<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none}

/* NAV */
.topbar{background:#0d1117;border-bottom:1px solid #1e2a3a;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.app-name{font-size:16px;font-weight:700;color:#e2e8f0}
.app-sub{font-size:10px;color:#475569;margin-top:1px}
.topbar-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag{background:#1e2a3a;border:1px solid #2d3f52;border-radius:20px;padding:3px 10px;font-size:10px;color:#94a3b8}
.tag.gold{border-color:#7c5a0a;color:#fbbf24;background:#1a1200}
.tag.green{border-color:#064e3b;color:#6ee7b7;background:#021f18}

/* CONF TABS */
.conf-bar{display:flex;overflow-x:auto;background:#0d1117;border-bottom:1px solid #1e2a3a;-webkit-overflow-scrolling:touch}
.conf-bar::-webkit-scrollbar{display:none}
.ctab{padding:10px 14px;font-size:11px;font-weight:600;color:#475569;border-bottom:2px solid transparent;white-space:nowrap;background:none;transition:color .15s}
.ctab.active{color:#a5b4fc;border-bottom-color:#6366f1}
.cdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* PAGE TABS */
.page-bar{display:flex;background:#0d1117;border-bottom:1px solid #1e2a3a;padding:0 12px}
.ptab{padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#475569;border-bottom:2px solid transparent;background:none;transition:color .15s}
.ptab.active{color:#a5b4fc;border-bottom-color:#6366f1}

/* BUTTONS */
.btn{border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;border:1px solid;transition:opacity .15s}
.btn:active{opacity:.7}
.btn-ghost{background:#0d1117;border-color:#1e2a3a;color:#64748b}
.btn-purple{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.btn-green{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.btn-red{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#fca5a5}
.btn-gold{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.35);color:#fbbf24}

/* USER SELECT */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:20px}
.user-screen h2{font-size:12px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:16px 28px;border-radius:10px;background:#0d1117;border:1px solid #1e2a3a;font-size:15px;font-weight:700;color:#e2e8f0;text-align:left;transition:border-color .15s}
.user-btn:active{border-color:#6366f1}
.user-btn.locked{border-color:rgba(16,185,129,.4);color:#6ee7b7}
.user-btn-sub{font-size:10px;color:#475569;font-weight:400;margin-top:3px}

/* LOCK BAR */
.lock-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid #1e2a3a;flex-wrap:wrap;background:#090d14}
.lock-chips{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.chip{padding:2px 8px;border-radius:20px;font-size:9px;border:1px solid}
.chip.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.chip.pend{background:rgba(99,102,241,.06);border-color:rgba(99,102,241,.2);color:#475569}
.lock-info{font-size:10px;color:#475569}

/* ROUND FILTER */
.round-bar{display:flex;gap:5px;padding:8px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.round-bar::-webkit-scrollbar{display:none}
.rbtn{padding:3px 10px;border-radius:20px;font-size:10px;border:1px solid;white-space:nowrap;background:none}
.rbtn.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.rbtn.inactive{border-color:#1e2a3a;color:#475569}

/* BRACKET */
.bracket-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 20px}
.bracket-row{display:flex;gap:14px;min-width:max-content}
.round-col{flex-shrink:0}
.round-label{font-size:9px;color:#6366f1;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.round-date{font-size:8px;color:#334155;margin-bottom:8px}
.games-stack{display:flex;flex-direction:column;gap:8px}

/* GAME CARD */
.gc{background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;overflow:hidden;width:170px}
.gc-head{padding:3px 8px;font-size:8px;color:#475569;border-bottom:1px solid #1e2a3a}
.gc-row{display:flex;align-items:center;gap:6px;padding:7px 8px;border-bottom:1px solid #0f1923;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent}
.gc-row:last-child{border-bottom:none}
.gc-row.no-click{cursor:default}
.gc-row.picked{background:rgba(99,102,241,.18)}
.gc-row.correct{background:rgba(16,185,129,.18)}
.gc-row.wrong{background:rgba(239,68,68,.14)}
.gc-row.actual{background:rgba(16,185,129,.06)}
.seed{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
.team-name{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#64748b}
.team-name.picked{color:#f1f5f9;font-weight:600}
.team-name.tbd{color:#1e2a3a;font-style:italic}
.gc-icon{font-size:10px;flex-shrink:0}

/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 14px 14px}
.leg{display:flex;align-items:center;gap:4px;font-size:8px;color:#475569}
.leg-sw{width:10px;height:7px;border-radius:2px}

/* LEADERBOARD */
.lb-wrap{padding:14px}
.lb-note{font-size:9px;color:#475569;margin-bottom:14px;line-height:1.8}
.lb-row{background:#0d1117;border:1px solid #1e2a3a;border-radius:9px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center}
.lb-row.first{border-color:rgba(251,191,36,.25)}
.lb-medal{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.lb-body{flex:1}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.lb-name{font-size:14px;font-weight:700}
.lb-pts{font-size:11px;color:#475569}
.lb-pts b{color:#f1f5f9;font-weight:700}
.lb-pts small{font-size:9px;color:#334155}
.progress{background:#0f1923;border-radius:3px;height:4px;position:relative;overflow:hidden}
.progress-max{position:absolute;left:0;top:0;height:100%;background:rgba(99,102,241,.1)}
.progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px}

/* BREAKDOWN TABLE */
.breakdown{margin-top:20px}
.breakdown-title{font-size:9px;color:#6366f1;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.breakdown table{width:100%;border-collapse:collapse;font-size:10px}
.breakdown th{color:#475569;padding:3px 6px;text-align:center;font-weight:500}
.breakdown th:first-child{text-align:left}
.breakdown td{padding:5px 6px;border-top:1px solid #0f1923;text-align:center}
.breakdown td:first-child{text-align:left;color:#475569}
.breakdown .tot{color:#f1f5f9;font-weight:700}

/* TEAMS */
.teams-wrap{padding:14px}
.teams-note{font-size:9px;color:#475569;margin-bottom:4px}
.teams-bye{font-size:8px;color:#1e3a5f;margin-bottom:10px}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.team-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:7px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.team-badge{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.team-info .tn{font-size:11px;font-weight:600}
.team-info .tr{font-size:8px;color:#475569}
.team-info .tb{font-size:8px;margin-top:1px}

/* REVEAL */
.reveal-wrap{border-top:1px solid #1e2a3a;padding:14px}
.reveal-title{font-size:10px;color:#10b981;margin-bottom:12px}
.reveal-grid{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
.reveal-grid::-webkit-scrollbar{display:none}
.reveal-col{flex-shrink:0}
.reveal-name{font-size:10px;color:#475569;margin-bottom:6px}
.reveal-name.me{color:#a5b4fc}
.reveal-col .gc{margin-bottom:6px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#0d1117;border:1px solid rgba(99,102,241,.4);color:#a5b4fc;border-radius:8px;padding:8px 16px;font-size:11px;z-index:999;opacity:0;transition:all .18s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

      {s:7,n:"Providence",r:"9-10",c:"#2d2926"},{s:8,n:"Georgetown",r:"7-12",c:"#041e42"},
      {s:9,n:"Marquette",r:"7-12",c:"#002366"},{s:10,n:"Butler",r:"6-13",c:"#13294b"},
      {s:11,n:"Xavier",r:"5-14",c:"#9e1b32"}],
    games:[
      {id:"be_r1g1",rd:0,lbl:"Wed 4pm",ts:8,bs:9},{id:"be_r1g2",rd:0,lbl:"Wed 6:30pm",ts:7,bs:10},
      {id:"be_r1g3",rd:0,lbl:"Wed 9pm",ts:6,bs:11},{id:"be_qf1",rd:1,lbl:"Thu 12pm",ts:1,bf:"be_r1g1"},
      {id:"be_qf2",rd:1,lbl:"Thu 2:30pm",ts:4,bf:"be_r1g2"},{id:"be_qf3",rd:1,lbl:"Thu 7pm",ts:2,bf:"be_r1g3"},
      {id:"be_qf4",rd:1,lbl:"Thu 9:30pm",ts:3,bs:5},{id:"be_sf1",rd:2,lbl:"Fri 5:30pm",tf:"be_qf1",bf:"be_qf2"},
      {id:"be_sf2",rd:2,lbl:"Fri 8pm",tf:"be_qf3",bf:"be_qf4"},{id:"be_f",rd:3,lbl:"Sat 6:30pm",tf:"be_sf1",bf:"be_sf2"}]}
};

var CORD = ["acc","b10","b12","sec","be"];
var PARTS = ["Welton","Trom","Hoff","Watson"];
var PTS = [1,1,4,8,16];

// ─── STATE ───────────────────────────────────────────────────────────────────
var ST = {
  user: null,
  conf: "acc",
  page: "bracket",
  vrd:  null,
  admin: false,
  picks: {},
  locked: {},
  results: {}
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function tBySeed(conf,s){ for(var i=0;i<conf.teams.length;i++) if(conf.teams[i].s===s) return conf.teams[i]; return null; }
function tByName(conf,n){ for(var i=0;i<conf.teams.length;i++) if(conf.teams[i].n===n) return conf.teams[i]; return null; }
function x(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function slot(conf, picks, gid, top){
  var g=null; for(var i=0;i<conf.games.length;i++) if(conf.games[i].id===gid){g=conf.games[i];break;}
  if(!g) return "TBD";
  if(top){ if(g.ts){var t=tBySeed(conf,g.ts);return t?t.n:"TBD";} if(g.tf) return picks[g.tf]||"?"; }
  else   { if(g.bs){var t2=tBySeed(conf,g.bs);return t2?t2.n:"TBD";} if(g.bf) return picks[g.bf]||"?"; }
  return "TBD";
}

function pts(rd){ return PTS[rd]||1; }

function confScore(conf, pp, res){
  var s=0;
  for(var i=0;i<conf.games.length;i++){
    var g=conf.games[i];
    if(res[g.id] && pp[g.id]===res[g.id]) s+=pts(g.rd);
  }
  return s;
}
function confMax(conf, pp, res){
  var s=0;
  for(var i=0;i<conf.games.length;i++){
    var g=conf.games[i];
    if(!res[g.id] || pp[g.id]===res[g.id]) s+=pts(g.rd);
  }
  return s;
}
function totalMax(){
  var s=0;
  for(var ci=0;ci<CORD.length;ci++){
    var c=C[CORD[ci]];
    for(var i=0;i<c.games.length;i++) s+=pts(c.games[i].rd);
  }
  return s;
}
function playerScore(p){
  var pp=ST.picks[p]||{};
  var s=0;
  for(var ci=0;ci<CORD.length;ci++) s+=confScore(C[CORD[ci]], pp[CORD[ci]]||{}, ST.results[CORD[ci]]||{});
  return s;
}
function playerMax(p){
  var pp=ST.picks[p]||{};
  var s=0;
  for(var ci=0;ci<CORD.length;ci++) s+=confMax(C[CORD[ci]], pp[CORD[ci]]||{}, ST.results[CORD[ci]]||{});
  return s;
}
function allLocked(){ return PARTS.every(function(p){return ST.locked[p];}); }

// ─── FIREBASE ────────────────────────────────────────────────────────────────
var DB = null;

function loadFirebase(){
  var s1=document.createElement("script");
  s1.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js";
  s1.onload=function(){
    var s2=document.createElement("script");
    s2.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js";
    s2.onload=function(){
      try{
        firebase.initializeApp({
          apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",
          authDomain:"rwc-picks.firebaseapp.com",
          databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",
          projectId:"rwc-picks",
          appId:"1:965978379243:web:35f9db9a664f9170e27fae"
        });
        DB = firebase.database();
        DB.ref("rwc2026/picks").on("value",function(sn){ST.picks=sn.val()||{};draw();});
        DB.ref("rwc2026/locked").on("value",function(sn){ST.locked=sn.val()||{};draw();});
        DB.ref("rwc2026/results").on("value",function(sn){ST.results=sn.val()||{};draw();});
      }catch(e){ console.error("Firebase error",e); }
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

function savePick(u,cid,gid,winner){
  if(!DB) return;
  var cur=((ST.picks[u]||{})[cid]||{});
  var next={};
  for(var k in cur) next[k]=cur[k];
  next[gid]=winner;
  DB.ref("rwc2026/picks/"+u+"/"+cid).set(next);
}
function saveResult(cid,gid,winner){ if(DB) DB.ref("rwc2026/results/"+cid+"/"+gid).set(winner); }
function doLock(u){ if(DB) DB.ref("rwc2026/locked/"+u).set(true); }
function doUnlock(u){ if(DB) DB.ref("rwc2026/locked/"+u).set(false); }
function doReset(){
  if(!DB) return;
  if(!confirm("Delete ALL data? Cannot be undone.")) return;
  if(!confirm("Really delete everything?")) return;
  DB.ref("rwc2026").set(null);
  ST.picks={}; ST.locked={}; ST.results={};
  toast("All data reset");
  draw();
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
var _tt;
function toast(m){
  var el=document.getElementById("toast");
  el.textContent=m; el.classList.add("show");
  clearTimeout(_tt); _tt=setTimeout(function(){el.classList.remove("show");},2200);
}

// ─── CARD HTML ───────────────────────────────────────────────────────────────
function cardHTML(conf, gid, pm, isAdmin){
  var g=null; for(var i=0;i<conf.games.length;i++) if(conf.games[i].id===gid){g=conf.games[i];break;}
  if(!g) return "";
  var res = ST.results[conf.id]||{};
  var topN = slot(conf,pm,gid,true);
  var botN = slot(conf,pm,gid,false);
  var picked = pm[gid];
  var actual = res[gid];

  function rowH(name){
    var isV = name && name!=="TBD" && name!=="?";
    var isPk = picked===name;
    var isOk = actual && isPk && actual===name;
    var isBd = actual && isPk && actual!==name;
    var isAct = actual===name && !isPk;
    var t = isV ? tByName(conf,name) : null;
    var canClick = isV && (isAdmin || (ST.user && !ST.locked[ST.user]));
    var cls = "gc-row";
    if(!canClick) cls+=" no-click";
    if(isPk) cls += isOk?" correct":isBd?" wrong":" picked";
    else if(isAct && !isAdmin) cls+=" actual";
    var badge = '<div class="seed" style="background:'+(t?t.c:"#1a2535")+';">'+(t?t.s:"")+'</div>';
    var nm = '<div class="team-name'+(isPk?" picked":"")+(!isV?" tbd":"")+'">'+(isV?x(name):(name==="?"?"TBD":"TBD"))+'</div>';
    var icon = isOk?'<span class="gc-icon" style="color:#10b981">&#10003;</span>':isBd?'<span class="gc-icon" style="color:#ef4444">&#10007;</span>':"";
    var da = canClick ? ' data-cid="'+conf.id+'" data-gid="'+x(gid)+'" data-name="'+x(name)+'" data-adm="'+(isAdmin?1:0)+'"' : "";
    return '<div class="'+cls+'"'+da+'>'+badge+nm+icon+'</div>';
  }

  return '<div class="gc"><div class="gc-head">'+x(g.lbl)+' &middot; '+pts(g.rd)+'pt</div>'+rowH(topN)+rowH(botN)+'</div>';
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function draw(){
  var conf = C[ST.conf];
  var cRes = ST.results[ST.conf]||{};
  var myPicks = ST.user ? ((ST.picks[ST.user]||{})[ST.conf]||{}) : {};
  var isLocked = ST.user && ST.locked[ST.user];
  var locked = allLocked();
  var GMAX = totalMax();

  var h = "";

  // ── topbar
  h += '<div class="topbar">';
  h += '<div><div class="app-name">RWC Picks 2026</div><div class="app-sub">'+x(conf.venue)+" &middot; "+x(conf.dates)+"</div></div>";
  h += '<div class="topbar-right">';
  if(ST.user) h += '<span class="tag'+(isLocked?" green":"")+'">'+x(ST.user)+(isLocked?" &#128274;":"")+'</span><button class="btn btn-ghost" id="b-switch">Switch</button>';
  h += '<button class="btn '+(ST.admin?"btn-gold":"btn-ghost")+'" id="b-admin">'+(ST.admin?"Admin ON":"Admin")+'</button>';
  if(ST.admin) h += '<button class="btn btn-red" id="b-reset">Reset</button>';
  h += '</div></div>';

  // ── conf tabs
  h += '<div class="conf-bar">';
  for(var ci=0;ci<CORD.length;ci++){
    var cc=C[CORD[ci]];
    h += '<button class="ctab'+(ST.conf===CORD[ci]?" active":"")+'" data-conf="'+CORD[ci]+'">';
    h += '<span class="cdot" style="background:'+cc.dot+'"></span>'+cc.label+'</button>';
  }
  h += '</div>';

  // ── page tabs
  h += '<div class="page-bar">';
  ["bracket","leaderboard","teams"].forEach(function(p){
    h += '<button class="ptab'+(ST.page===p?" active":"")+'" data-page="'+p+'">'+p+'</button>';
  });
  h += '</div>';

  // ── USER SELECT (bracket only)
  if(!ST.user && !ST.admin && ST.page==="bracket"){
    h += '<div class="user-screen"><h2>Who are you?</h2><div class="user-grid">';
    PARTS.forEach(function(p){
      var lk = ST.locked[p];
      var tot = CORD.reduce(function(a,cid){return a+Object.keys(((ST.picks[p]||{})[cid]||{})).length;},0);
      h += '<button class="user-btn'+(lk?" locked":"")+'" data-user="'+p+'">';
      h += '<div>'+p+'</div><div class="user-btn-sub">'+(lk?"&#128274; Locked in":tot+" picks made")+'</div></button>';
    });
    h += '</div></div>';
    document.getElementById("root").innerHTML = h;
    bind(); return;
  }

  // ── BRACKET
  if(ST.page==="bracket"){
    // lock bar
    h += '<div class="lock-bar">';
    if(!ST.admin && ST.user){
      var totPk=CORD.reduce(function(a,cid){return a+Object.keys(((ST.picks[ST.user]||{})[cid]||{})).length;},0);
      var totGm=CORD.reduce(function(a,cid){return a+C[cid].games.length;},0);
      if(!isLocked){
        h += '<span class="lock-info">'+totPk+"/"+totGm+" picks</span>";
        h += '<button class="btn btn-green" id="b-lock">Lock My Picks</button>';
      } else {
        h += '<span class="lock-info" style="color:#6ee7b7">Picks locked &#128274;</span>';
        h += '<button class="btn btn-ghost" id="b-unlock" style="font-size:9px">Unlock</button>';
      }
    }
    if(ST.admin) h += '<span class="lock-info" style="color:#fbbf24">Admin: tap teams to enter results</span>';
    h += '<div class="lock-chips">';
    PARTS.forEach(function(p){ h += '<span class="chip '+(ST.locked[p]?"done":"pend")+'">'+p+" "+(ST.locked[p]?"&#128274;":"&#8987;")+'</span>'; });
    h += '</div></div>';

    // round filter
    var rds=[];
    conf.games.forEach(function(g){if(rds.indexOf(g.rd)<0) rds.push(g.rd);});
    h += '<div class="round-bar"><button class="rbtn '+(ST.vrd===null?"active":"inactive")+'" data-rd="-1">All</button>';
    rds.forEach(function(r){
      h += '<button class="rbtn '+(ST.vrd===r?"active":"inactive")+'" data-rd="'+r+'">'+conf.rounds[r]+'</button>';
    });
    h += '</div>';

    // bracket
    var pm = ST.admin ? cRes : myPicks;
    var vis = ST.vrd===null ? rds : rds.filter(function(r){return r===ST.vrd;});
    h += '<div class="bracket-scroll"><div class="bracket-row">';
    vis.forEach(function(r){
      h += '<div class="round-col"><div class="round-label">'+conf.rounds[r]+'</div><div class="round-date">'+conf.rdates[r]+'</div><div class="games-stack">';
      conf.games.forEach(function(g){ if(g.rd===r) h+=cardHTML(conf,g.id,pm,ST.admin); });
      h += '</div></div>';
    });
    h += '</div></div>';

    // legend
    h += '<div class="legend">';
    [{bg:"rgba(99,102,241,.18)",l:"Your pick"},{bg:"rgba(16,185,129,.18)",l:"Correct"},{bg:"rgba(239,68,68,.14)",l:"Wrong"},{bg:"rgba(16,185,129,.06)",l:"Actual winner"}]
      .forEach(function(leg){ h += '<div class="leg"><div class="leg-sw" style="background:'+leg.bg+'"></div>'+leg.l+'</div>'; });
    h += '</div>';

    // reveal when all locked
    if(locked && !ST.admin){
      h += '<div class="reveal-wrap"><div class="reveal-title">All picks locked &mdash; '+x(conf.label)+' comparison</div>';
      h += '<div class="reveal-grid">';
      PARTS.forEach(function(p){
        var pp = ((ST.picks[p]||{})[ST.conf]||{});
        h += '<div class="reveal-col"><div class="reveal-name'+(p===ST.user?" me":"")+'">'+p+(p===ST.user?" (you)":"")+'</div>';
        vis.forEach(function(r){ conf.games.forEach(function(g){ if(g.rd===r) h+=cardHTML(conf,g.id,pp,false); }); });
        h += '</div>';
      });
      h += '</div></div>';
    }
  }

  // ── LEADERBOARD
  if(ST.page==="leaderboard"){
    h += '<div class="lb-wrap">';
    h += '<div class="lb-note">R1 &amp; R2 = 1pt &nbsp;|&nbsp; QF = 4pts &nbsp;|&nbsp; SF = 8pts &nbsp;|&nbsp; Championship = 16pts<br>Grand max = '+GMAX+' pts</div>';

    var rows = PARTS.map(function(p){
      return {name:p, score:playerScore(p), max:playerMax(p),
        cs:CORD.map(function(cid){return confScore(C[cid],(ST.picks[p]||{})[cid]||{},(ST.results[cid]||{}));})};
    }).sort(function(a,b){return b.score-a.score||b.max-a.max;});

    var medals=["&#129351;","&#129352;","&#129353;"];
    rows.forEach(function(row,i){
      var spct = GMAX>0 ? Math.round(row.score/GMAX*100) : 0;
      var mpct = GMAX>0 ? Math.round(row.max/GMAX*100) : 0;
      var grad = i===0?"linear-gradient(90deg,#d97706,#fbbf24)":"linear-gradient(90deg,#4f46e5,#818cf8)";
      h += '<div class="lb-row'+(i===0?" first":"")+'">';
      h += '<div class="lb-medal">'+(medals[i]||("#"+(i+1)))+'</div>';
      h += '<div class="lb-body">';
      h += '<div class="lb-top"><span class="lb-name">'+row.name+'</span>';
      h += '<span class="lb-pts"><b>'+row.score+'</b> / '+GMAX+' pts<small> max '+row.max+'</small></span></div>';
      h += '<div class="progress"><div class="progress-max" style="width:'+mpct+'%"></div>';
      h += '<div class="progress-fill" style="width:'+spct+'%;background:'+grad+'"></div></div>';
      h += '</div></div>';
    });

    // breakdown table
    h += '<div class="breakdown"><div class="breakdown-title">By Conference</div><table>';
    h += '<thead><tr><th>Player</th>';
    CORD.forEach(function(cid){ h+='<th>'+C[cid].label+'</th>'; });
    h += '<th>Total</th></tr></thead><tbody>';
    rows.forEach(function(row){
      h += '<tr><td>'+row.name+'</td>';
      row.cs.forEach(function(s){ h+='<td style="color:'+(s>0?"#10b981":"#334155")+'">'+(s||"-")+'</td>'; });
      h += '<td class="tot">'+row.score+'</td></tr>';
    });
    h += '</tbody></table></div></div>';
  }

  // ── TEAMS
  if(ST.page==="teams"){
    var bn = conf.id==="be"?"Seeds 1-5: bye | 6-11: play R1":conf.id==="acc"?"Seeds 1-4: double-bye | 5-9: bye | 10-15: play R1":"Seeds 1-4: double-bye | 5-8: bye | 9+: play R1";
    h += '<div class="teams-wrap">';
    h += '<div class="teams-note">'+x(conf.label)+' &mdash; '+x(conf.venue)+' &mdash; '+x(conf.dates)+'</div>';
    h += '<div class="teams-bye">'+bn+'</div>';
    h += '<div class="teams-grid">';
    conf.teams.forEach(function(t){
      var bl = conf.id==="be"?(t.s<=5?"Bye":"Plays R1"):conf.id==="acc"?(t.s<=4?"Double Bye":t.s<=9?"Bye":"Plays R1"):(t.s<=4?"Double Bye":t.s<=8?"Bye":"Plays R1");
      var bc = bl==="Double Bye"?"#10b981":bl==="Bye"?"#6366f1":"#334155";
      h += '<div class="team-card">';
      h += '<div class="team-badge" style="background:'+t.c+'">'+t.s+'</div>';
      h += '<div class="team-info"><div class="tn">'+x(t.n)+'</div><div class="tr">'+t.r+' conf</div><div class="tb" style="color:'+bc+'">'+bl+'</div></div>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  document.getElementById("root").innerHTML = h;
  bind();
}

// ─── BIND EVENTS ─────────────────────────────────────────────────────────────
function bind(){
  // conf tabs
  var ctabs = document.querySelectorAll(".ctab");
  for(var i=0;i<ctabs.length;i++){
    ctabs[i].addEventListener("click", function(){
      ST.conf=this.getAttribute("data-conf"); ST.vrd=null; draw();
    });
  }
  // page tabs
  var ptabs = document.querySelectorAll(".ptab");
  for(var i=0;i<ptabs.length;i++){
    ptabs[i].addEventListener("click", function(){
      ST.page=this.getAttribute("data-page"); draw();
    });
  }
  // user select
  var ubtns = document.querySelectorAll(".user-btn");
  for(var i=0;i<ubtns.length;i++){
    ubtns[i].addEventListener("click", function(){
      ST.user=this.getAttribute("data-user"); draw();
    });
  }
  // switch
  var sw=document.getElementById("b-switch");
  if(sw) sw.addEventListener("click", function(){ ST.user=null; draw(); });
  // admin
  var adm=document.getElementById("b-admin");
  if(adm) adm.addEventListener("click", function(){ ST.admin=!ST.admin; draw(); });
  // reset
  var rst=document.getElementById("b-reset");
  if(rst) rst.addEventListener("click", doReset);
  // lock
  var lk=document.getElementById("b-lock");
  if(lk) lk.addEventListener("click", function(){
    if(confirm("Lock all your picks, "+ST.user+"? Can't change after.")){
      doLock(ST.user); toast("Picks locked!");
    }
  });
  // unlock
  var ulk=document.getElementById("b-unlock");
  if(ulk) ulk.addEventListener("click", function(){
    if(confirm("Unlock your picks?")){ doUnlock(ST.user); toast("Picks unlocked"); }
  });
  // round filter
  var rbtns = document.querySelectorAll(".rbtn");
  for(var i=0;i<rbtns.length;i++){
    rbtns[i].addEventListener("click", function(){
      var r=parseInt(this.getAttribute("data-rd"));
      ST.vrd = r===-1 ? null : r; draw();
    });
  }
  // game row clicks
  var rows = document.querySelectorAll(".gc-row[data-gid]");
  for(var i=0;i<rows.length;i++){
    rows[i].addEventListener("click", function(){
      var cid=this.getAttribute("data-cid");
      var gid=this.getAttribute("data-gid");
      var name=this.getAttribute("data-name");
      var isAdm=this.getAttribute("data-adm")==="1";
      if(!cid||!gid||!name) return;
      if(isAdm){ saveResult(cid,gid,name); toast("Result: "+name); }
      else if(ST.user&&!ST.locked[ST.user]){ savePick(ST.user,cid,gid,name); toast(ST.user+": "+name); }
    });
  }
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
draw();
loadFirebase();
</script>
