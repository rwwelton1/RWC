<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RWC Picks 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}

/* TOPBAR */
.topbar{background:#0d1117;border-bottom:1px solid #1e2a3a;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50}
.app-name{font-size:16px;font-weight:700}
.app-sub{font-size:9px;color:#475569;margin-top:1px}
.topbar-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag{background:#1e2a3a;border:1px solid #2d3f52;border-radius:20px;padding:3px 10px;font-size:10px;color:#94a3b8}
.tag.green{border-color:#065f46;color:#6ee7b7;background:#022c20}
.tag.gold{border-color:#7c5a0a;color:#fbbf24;background:#1a1200}

/* STICKY NAV CONTAINER */
.sticky-nav{position:sticky;top:52px;z-index:40;background:#0d1117}

/* CONF TABS */
.conf-bar{display:flex;overflow-x:auto;border-bottom:1px solid #1e2a3a;-webkit-overflow-scrolling:touch;touch-action:pan-x}
.conf-bar::-webkit-scrollbar{display:none}
.ctab{padding:9px 13px;font-size:11px;font-weight:600;color:#475569;border-bottom:2px solid transparent;white-space:nowrap;background:none;transition:color .15s;position:relative}
.ctab.active{color:#a5b4fc;border-bottom-color:#6366f1}
.cdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.cprog{font-size:8px;color:#334155;margin-left:4px}
.ctab.active .cprog{color:#6366f1}

/* PAGE TABS */
.page-bar{display:flex;padding:0 10px;border-bottom:1px solid #1e2a3a}
.ptab{padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#475569;border-bottom:2px solid transparent;background:none;transition:color .15s}
.ptab.active{color:#a5b4fc;border-bottom-color:#6366f1}

/* BUTTONS */
.btn{border-radius:6px;padding:5px 11px;font-size:10px;font-weight:600;border:1px solid;transition:opacity .15s}
.btn:active{opacity:.65}
.btn-ghost{background:#0d1117;border-color:#1e2a3a;color:#64748b}
.btn-green{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.btn-red{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#fca5a5}
.btn-gold{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.35);color:#fbbf24}
.btn-purple{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}

/* CONF SCORE BAR */
.conf-score-bar{display:flex;gap:8px;padding:7px 14px;border-bottom:1px solid #1e2a3a;overflow-x:auto;-webkit-overflow-scrolling:touch}
.conf-score-bar::-webkit-scrollbar{display:none}
.cscore{background:#0d1117;border:1px solid #1e2a3a;border-radius:6px;padding:4px 10px;font-size:9px;white-space:nowrap;text-align:center;flex-shrink:0}
.cscore .csl{color:#475569;font-size:8px}
.cscore .csv{color:#f1f5f9;font-weight:700;font-size:12px}
.cscore.active-conf{border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.08)}

/* USER SELECT */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:44px 20px;gap:18px}
.user-screen h2{font-size:11px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:14px 26px;border-radius:10px;background:#0d1117;border:1px solid #1e2a3a;font-size:15px;font-weight:700;color:#e2e8f0;text-align:left;min-width:140px}
.user-btn:active{border-color:#6366f1;background:rgba(99,102,241,.08)}
.user-btn.locked{border-color:rgba(16,185,129,.4);color:#6ee7b7}
.user-btn-sub{font-size:9px;color:#475569;font-weight:400;margin-top:3px}

/* LOCK BAR */
.lock-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid #1e2a3a;flex-wrap:wrap;background:#090d14}
.lock-chips{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.chip{padding:2px 8px;border-radius:20px;font-size:9px;border:1px solid}
.chip.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.chip.pend{background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.18);color:#475569}
.lock-info{font-size:10px;color:#475569}

/* ROUND FILTER */
.round-bar{display:flex;gap:5px;padding:7px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.round-bar::-webkit-scrollbar{display:none}
.rbtn{padding:3px 10px;border-radius:20px;font-size:9px;border:1px solid;white-space:nowrap;background:none;transition:all .12s}
.rbtn.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.rbtn.inactive{border-color:#1e2a3a;color:#475569}

/* BRACKET */
.bracket-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 20px}
.bracket-row{display:flex;gap:14px;min-width:max-content}
.round-col{flex-shrink:0}
.round-label{font-size:9px;color:#6366f1;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.round-date{font-size:8px;color:#334155;margin-bottom:8px}
.games-stack{display:flex;flex-direction:column;gap:8px}

/* GAME CARD */
.gc{background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;overflow:hidden;width:170px;transition:border-color .15s}
.gc-head{padding:3px 8px;font-size:8px;color:#475569;border-bottom:1px solid #1e2a3a;display:flex;justify-content:space-between}
.gc-pts-badge{color:#334155;font-size:8px}
.gc-pts-badge.earned{color:#10b981;font-weight:700}
.gc-row{display:flex;align-items:center;gap:6px;padding:7px 8px;border-bottom:1px solid #0f1923;transition:background .1s;-webkit-tap-highlight-color:transparent}
.gc-row:last-child{border-bottom:none}
.gc-row.clickable{cursor:pointer}
.gc-row.picked{background:rgba(99,102,241,.18)}
.gc-row.correct{background:rgba(16,185,129,.18)}
.gc-row.wrong{background:rgba(239,68,68,.14)}
.gc-row.actual{background:rgba(16,185,129,.06)}
.seed{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
.team-name{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#64748b}
.team-name.bold{color:#f1f5f9;font-weight:600}
.team-name.dim{color:#1e3a5f;font-style:italic}
.gc-icon{font-size:10px;flex-shrink:0}

/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:6px 14px 14px}
.leg{display:flex;align-items:center;gap:4px;font-size:8px;color:#475569}
.leg-sw{width:10px;height:7px;border-radius:2px}

/* REVEAL */
.reveal-wrap{border-top:1px solid #1e2a3a;padding:14px}
.reveal-title{font-size:10px;color:#10b981;margin-bottom:12px}
.reveal-grid{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
.reveal-grid::-webkit-scrollbar{display:none}
.reveal-col{flex-shrink:0}
.reveal-name{font-size:10px;color:#475569;margin-bottom:6px;font-weight:600}
.reveal-name.me{color:#a5b4fc}
.reveal-col .gc{margin-bottom:6px}

/* LEADERBOARD */
.lb-wrap{padding:14px}
.lb-note{font-size:9px;color:#475569;margin-bottom:14px;line-height:1.8;background:#0d1117;border:1px solid #1e2a3a;border-radius:7px;padding:8px 12px}
.lb-row{background:#0d1117;border:1px solid #1e2a3a;border-radius:9px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center;transition:border-color .2s}
.lb-row.first{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.03)}
.lb-row.second{border-color:rgba(148,163,184,.2)}
.lb-row.third{border-color:rgba(205,127,50,.2)}
.lb-medal{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:6px}
.lb-name{font-size:14px;font-weight:700}
.lb-rank-change{font-size:9px;margin-left:4px}
.lb-rank-change.up{color:#10b981}
.lb-rank-change.down{color:#ef4444}
.lb-pts{font-size:11px;color:#475569;flex-shrink:0}
.lb-pts b{color:#f1f5f9;font-weight:700}
.lb-pts small{font-size:9px;color:#334155}
.lb-sub{font-size:9px;color:#475569;margin-bottom:5px}
.lb-sub .alive{color:#10b981}
.lb-sub .elim{color:#ef4444}
.progress{background:#0f1923;border-radius:3px;height:4px;position:relative;overflow:hidden;margin-bottom:4px}
.progress-max{position:absolute;left:0;top:0;height:100%;background:rgba(99,102,241,.1)}
.progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;transition:width .6s}
.lb-conf-scores{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.lb-cs{font-size:8px;padding:1px 6px;border-radius:10px;border:1px solid #1e2a3a;color:#334155}
.lb-cs.has-pts{color:#10b981;border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.05)}

/* WHO CAN WIN */
.can-win{background:#0d1117;border:1px solid #1e3a2a;border-radius:8px;padding:10px 14px;margin-bottom:14px}
.can-win-title{font-size:9px;color:#10b981;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.can-win-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-top:1px solid #0f1923;font-size:11px}
.can-win-row:first-of-type{border-top:none}
.can-win-name{color:#94a3b8}
.can-win-gap{font-size:9px;color:#10b981}
.can-win-gap.behind{color:#ef4444}

/* BREAKDOWN TABLE */
.breakdown{margin-top:18px}
.breakdown-title{font-size:9px;color:#6366f1;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.breakdown table{width:100%;border-collapse:collapse;font-size:10px}
.breakdown th{color:#475569;padding:3px 6px;text-align:center;font-weight:500}
.breakdown th:first-child{text-align:left}
.breakdown td{padding:5px 6px;border-top:1px solid #0f1923;text-align:center}
.breakdown td:first-child{text-align:left;color:#64748b}
.breakdown .tot{color:#f1f5f9;font-weight:700}

/* TEAMS */
.teams-wrap{padding:14px}
.teams-note{font-size:9px;color:#475569;margin-bottom:3px}
.teams-bye{font-size:8px;color:#334155;margin-bottom:10px}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.team-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:7px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.team-badge{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.team-info .tn{font-size:11px;font-weight:600}
.team-info .tr{font-size:8px;color:#475569}
.team-info .tb{font-size:8px;margin-top:1px}

/* ADMIN QUICK ENTRY */
.quick-entry{background:#0d1117;border:1px solid rgba(251,191,36,.25);border-radius:8px;margin:10px 14px;padding:12px 14px}
.qe-title{font-size:9px;color:#fbbf24;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.qe-games{display:flex;flex-direction:column;gap:6px}
.qe-game{display:flex;align-items:center;gap:8px;font-size:11px}
.qe-game-lbl{color:#475569;font-size:9px;width:80px;flex-shrink:0}
.qe-btns{display:flex;gap:4px;flex-wrap:wrap}
.qe-btn{padding:3px 8px;border-radius:5px;font-size:10px;border:1px solid #1e2a3a;background:#0d1117;color:#64748b;transition:all .12s}
.qe-btn.set{border-color:rgba(16,185,129,.4);color:#6ee7b7;background:rgba(16,185,129,.08)}
.qe-btn:active{opacity:.7}

/* SETTINGS PANEL */
.settings-wrap{padding:14px}
.settings-section{background:#0d1117;border:1px solid #1e2a3a;border-radius:9px;margin-bottom:14px;overflow:hidden}
.settings-hdr{padding:10px 14px;border-bottom:1px solid #1e2a3a;display:flex;justify-content:space-between;align-items:center}
.settings-hdr-title{font-size:10px;font-weight:700;color:#a5b4fc;letter-spacing:.08em;text-transform:uppercase}
.settings-body{padding:12px 14px}
.player-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #0f1923}
.player-row:last-child{border-bottom:none}
.player-name{flex:1;font-size:12px;font-weight:600}
.player-locked-badge{font-size:8px;color:#6ee7b7;padding:1px 6px;border:1px solid rgba(16,185,129,.3);border-radius:10px}
.add-player-row{display:flex;gap:6px;margin-top:10px}
.add-player-row input{flex:1;background:#07090f;border:1px solid #1e2a3a;border-radius:6px;padding:6px 10px;font-size:12px;color:#e2e8f0;font-family:inherit;outline:none}
.add-player-row input:focus{border-color:rgba(99,102,241,.5)}
.team-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #0f1923}
.team-row:last-child{border-bottom:none}
.team-seed-input{width:36px;background:#07090f;border:1px solid #1e2a3a;border-radius:4px;padding:4px 6px;font-size:11px;color:#e2e8f0;font-family:inherit;text-align:center;outline:none}
.team-name-input{flex:1;background:#07090f;border:1px solid #1e2a3a;border-radius:4px;padding:4px 8px;font-size:11px;color:#e2e8f0;font-family:inherit;outline:none}
.team-rec-input{width:54px;background:#07090f;border:1px solid #1e2a3a;border-radius:4px;padding:4px 6px;font-size:10px;color:#475569;font-family:inherit;outline:none}
.team-seed-input:focus,.team-name-input:focus,.team-rec-input:focus{border-color:rgba(99,102,241,.4)}
.settings-conf-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.scftab{padding:3px 10px;border-radius:20px;font-size:9px;border:1px solid;background:none;transition:all .12s}
.scftab.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.scftab.inactive{border-color:#1e2a3a;color:#475569}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#0d1117;border:1px solid rgba(99,102,241,.4);color:#a5b4fc;border-radius:8px;padding:8px 16px;font-size:11px;z-index:999;opacity:0;transition:all .18s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CONFETTI CANVAS */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:998;display:none}

/* TROPHY ANIMATION */
@keyframes trophyPop{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
.trophy-anim{display:inline-block;animation:trophyPop .5s ease forwards}

/* SLIDE TRANSITION */
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-content{animation:slideIn .18s ease}
</style>

</head>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function tBySeed(conf,s){for(var i=0;i<conf.teams.length;i++)if(conf.teams[i].s===s)return conf.teams[i];return null;}
function tByName(conf,n){for(var i=0;i<conf.teams.length;i++)if(conf.teams[i].n===n)return conf.teams[i];return null;}
function x(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function slot(conf,picks,gid,top){
  var g=null;for(var i=0;i<conf.games.length;i++)if(conf.games[i].id===gid){g=conf.games[i];break;}
  if(!g)return"TBD";
  if(top){if(g.ts){var t=tBySeed(conf,g.ts);return t?t.n:"TBD";}if(g.tf)return picks[g.tf]||"?";}
  else{if(g.bs){var t2=tBySeed(conf,g.bs);return t2?t2.n:"TBD";}if(g.bf)return picks[g.bf]||"?";}
  return"TBD";
}
function pts(rd){return PTS[rd]||1;}
function confScore(conf,pp,res){var s=0;for(var i=0;i<conf.games.length;i++){var g=conf.games[i];if(res[g.id]&&pp[g.id]===res[g.id])s+=pts(g.rd);}return s;}
function confMax(conf,pp,res){var s=0;for(var i=0;i<conf.games.length;i++){var g=conf.games[i];if(!res[g.id]||pp[g.id]===res[g.id])s+=pts(g.rd);}return s;}
function confPicks(cid,user){return Object.keys(((ST.picks[user]||{})[cid]||{})).length;}
function totalGameCount(){var s=0;for(var ci=0;ci<CORD.length;ci++)s+=C[CORD[ci]].games.length;return s;}
function confGameCount(cid){return C[cid].games.length;}
function grandMax(){var s=0;for(var ci=0;ci<CORD.length;ci++){var c=C[CORD[ci]];for(var i=0;i<c.games.length;i++)s+=pts(c.games[i].rd);}return s;}
function playerScore(p){var pp=ST.picks[p]||{};var s=0;for(var ci=0;ci<CORD.length;ci++)s+=confScore(C[CORD[ci]],pp[CORD[ci]]||{},ST.results[CORD[ci]]||{});return s;}
function playerMax(p){var pp=ST.picks[p]||{};var s=0;for(var ci=0;ci<CORD.length;ci++)s+=confMax(C[CORD[ci]],pp[CORD[ci]]||{},ST.results[CORD[ci]]||{});return s;}
function allLocked(){return PARTS.every(function(p){return ST.locked[p];});}
function anyResults(){for(var ci=0;ci<CORD.length;ci++){if(Object.keys(ST.results[CORD[ci]]||{}).length>0)return true;}return false;}

        DB.ref("rwc2026/results").on("value",function(sn){
          var oldRanks={};
          PARTS.forEach(function(p){oldRanks[p]=playerScore(p);});
          ST.results=sn.val()||{};
          var newRanks={};
          var sorted=PARTS.slice().sort(function(a,b){return playerScore(b)-playerScore(a);});

// ─── CONFETTI ────────────────────────────────────────────────────────────────
var _confettiRunning=false;
function launchConfetti(){
  if(_confettiRunning)return;
  _confettiRunning=true;
  var canvas=document.getElementById("confetti-canvas");
  canvas.style.display="block";
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  var ctx=canvas.getContext("2d");
  var pieces=[];
  var colors=["#6366f1","#10b981","#fbbf24","#f87171","#a5b4fc","#6ee7b7","#fcd34d"];
  for(var i=0;i<120;i++){
    pieces.push({x:Math.random()*canvas.width,y:-10-Math.random()*200,w:6+Math.random()*6,h:8+Math.random()*8,
      color:colors[Math.floor(Math.random()*colors.length)],
      vx:(Math.random()-0.5)*4,vy:2+Math.random()*4,
      angle:Math.random()*Math.PI*2,va:(Math.random()-0.5)*0.2});
  }
  var frames=0;
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var alive=false;
    for(var i=0;i<pieces.length;i++){
      var p=pieces[i];
      p.x+=p.vx;p.y+=p.vy;p.angle+=p.va;p.vy+=0.08;
      if(p.y<canvas.height+20)alive=true;
      ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.angle);
      ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-(frames/180));
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    }
    frames++;
    if(alive&&frames<200)requestAnimationFrame(tick);
    else{canvas.style.display="none";ctx.clearRect(0,0,canvas.width,canvas.height);_confettiRunning=false;}
  }
  requestAnimationFrame(tick);
}

// ─── CARD HTML ───────────────────────────────────────────────────────────────
function cardHTML(conf,gid,pm,isAdmin){
  var g=null;for(var i=0;i<conf.games.length;i++)if(conf.games[i].id===gid){g=conf.games[i];break;}
  if(!g)return"";
  var res=ST.results[conf.id]||{};
  var topN=slot(conf,pm,gid,true);
  var botN=slot(conf,pm,gid,false);
  var picked=pm[gid];
  var actual=res[gid];
  var earned=actual&&picked===actual;
  var ptsBadgeCls=earned?"gc-pts-badge earned":"gc-pts-badge";
  var ptsLabel=(earned?"+":"")+pts(g.rd)+"pt";

  function rowH(name){
    var isV=name&&name!=="TBD"&&name!=="?";
    var isPk=picked===name;
    var isOk=actual&&isPk&&actual===name;
    var isBd=actual&&isPk&&actual!==name;
    var isAct=actual===name&&!isPk;
    var t=isV?tByName(conf,name):null;
    var canClick=isV&&(isAdmin||(ST.user&&!ST.locked[ST.user]));
    var cls="gc-row"+(canClick?" clickable":"");
    if(isPk)cls+=isOk?" correct":isBd?" wrong":" picked";
    else if(isAct&&!isAdmin)cls+=" actual";
    var badge='<div class="seed" style="background:'+(t?t.c:"#1a2535")+';">'+(t?t.s:"")+'</div>';
    var nm='<div class="team-name'+(isPk?" bold":"")+(!isV?" dim":"")+'">'+(isV?x(name):"TBD")+'</div>';
    var icon=isOk?'<span class="gc-icon" style="color:#10b981">&#10003;</span>':isBd?'<span class="gc-icon" style="color:#ef4444">&#10007;</span>':"";
    var da=canClick?' data-cid="'+conf.id+'" data-gid="'+x(gid)+'" data-name="'+x(name)+'" data-adm="'+(isAdmin?1:0)+'"':"";
    return'<div class="'+cls+'"'+da+'>'+badge+nm+icon+'</div>';
  }
  return'<div class="gc"><div class="gc-head"><span>'+x(g.lbl)+'</span><span class="'+ptsBadgeCls+'">'+ptsLabel+'</span></div>'+rowH(topN)+rowH(botN)+'</div>';
}

      var total=totalGameCount();
      h+='<button class="user-btn'+(lk?" locked":"")+'" data-user="'+p+'">';
      h+='<div>'+p+'</div><div class="user-btn-sub">'+(lk?"&#128274; Locked in":tot+"/"+total+" picks made")+'</div></button>';
    });
    h+='</div></div>';
    document.getElementById("root").innerHTML=h;bind();return;
  }

  // ── BRACKET
  if(ST.page==="bracket"){
    // per-conf score bar
    if(ST.user&&anyResults()){
      h+='<div class="conf-score-bar">';
      var confTotal=0;
      CORD.forEach(function(cid){
        var pp=(ST.picks[ST.user]||{})[cid]||{};
        var sc=confScore(C[cid],pp,ST.results[cid]||{});
        confTotal+=sc;
        h+='<div class="cscore'+(cid===ST.conf?" active-conf":"")+'"><div class="csl">'+C[cid].label+'</div><div class="csv">'+sc+'pt</div></div>';
      });
      h+='<div class="cscore" style="border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.06)"><div class="csl">Total</div><div class="csv" style="color:#a5b4fc">'+confTotal+'pt</div></div>';
      h+='</div>';
    }

    // lock bar
    h+='<div class="lock-bar">';
    if(!ST.admin&&ST.user){
      var totPk=CORD.reduce(function(a,cid){return a+confPicks(cid,ST.user);},0);
      var totGm=totalGameCount();
      if(!isLocked){
        h+='<span class="lock-info">'+totPk+"/"+totGm+" picks</span>";
        h+='<button class="btn btn-green" id="b-lock">Lock My Picks</button>';
      }else{
        h+='<span class="lock-info" style="color:#6ee7b7">Picks locked &#128274;</span>';
        h+='<button class="btn btn-ghost" id="b-unlock" style="font-size:9px">Unlock</button>';
      }
    }
    if(ST.admin)h+='<span class="lock-info" style="color:#fbbf24">&#9889; Tap teams to enter results</span>';
    h+='<div class="lock-chips">';
    PARTS.forEach(function(p){h+='<span class="chip '+(ST.locked[p]?"done":"pend")+'">'+p+" "+(ST.locked[p]?"&#128274;":"&#8987;")+'</span>';});
    h+='</div></div>';

    // admin quick-entry
    if(ST.admin){
      var rds=[];
      conf.games.forEach(function(g){if(rds.indexOf(g.rd)<0)rds.push(g.rd);});
      var latestRd=rds[rds.length-1];
      // find first round with unset results
      var qeRd=null;
      for(var ri=0;ri<rds.length;ri++){
        var hasUnset=false;
        for(var gi=0;gi<conf.games.length;gi++){
          if(conf.games[gi].rd===rds[ri]&&!cRes[conf.games[gi].id]){hasUnset=true;break;}
        }
        if(hasUnset){qeRd=rds[ri];break;}
      }
      if(qeRd!==null){
        h+='<div class="quick-entry">';
        h+='<div class="qe-title"><span>Quick Entry: '+conf.rounds[qeRd]+'</span><span style="font-size:9px;color:#475569">'+conf.label+'</span></div>';
        h+='<div class="qe-games">';
        conf.games.forEach(function(g){
          if(g.rd!==qeRd)return;
          var topN=slot(conf,cRes,g.id,true);
          var botN=slot(conf,cRes,g.id,false);
          var setResult=cRes[g.id];
          if(topN==="?"||botN==="?")return;
          h+='<div class="qe-game">';
          h+='<div class="qe-game-lbl">'+x(g.lbl)+'</div>';
          h+='<div class="qe-btns">';
          if(topN!=="TBD")h+='<button class="qe-btn'+(setResult===topN?" set":"")+'" data-qe-cid="'+conf.id+'" data-qe-gid="'+x(g.id)+'" data-qe-name="'+x(topN)+'">'+x(topN)+'</button>';
          if(botN!=="TBD")h+='<button class="qe-btn'+(setResult===botN?" set":"")+'" data-qe-cid="'+conf.id+'" data-qe-gid="'+x(g.id)+'" data-qe-name="'+x(botN)+'">'+x(botN)+'</button>';
          if(setResult)h+='<button class="qe-btn" style="color:#ef4444;border-color:rgba(239,68,68,.3)" data-qe-clear-cid="'+conf.id+'" data-qe-clear-gid="'+x(g.id)+'">&#10005;</button>';
          h+='</div></div>';
        });
        h+='</div></div>';
      }
    }

    // round filter
    var rds2=[];
    conf.games.forEach(function(g){if(rds2.indexOf(g.rd)<0)rds2.push(g.rd);});
    h+='<div class="round-bar"><button class="rbtn '+(ST.vrd===null?"active":"inactive")+'" data-rd="-1">All</button>';
    rds2.forEach(function(r){
      var rdone=Object.keys(ST.results[ST.conf]||{}).filter(function(gid){return conf.games.some(function(g){return g.id===gid&&g.rd===r;});}).length;
      var rtotal=conf.games.filter(function(g){return g.rd===r;}).length;
      var rdoneLabel=rdone>0?" ("+rdone+"/"+rtotal+")":"";
      h+='<button class="rbtn '+(ST.vrd===r?"active":"inactive")+'" data-rd="'+r+'">'+conf.rounds[r]+rdoneLabel+'</button>';
    });
    h+='</div>';

    // bracket
    var pm=ST.admin?cRes:myPicks;
    var vis=ST.vrd===null?rds2:rds2.filter(function(r){return r===ST.vrd;});
    h+='<div class="bracket-scroll page-content"><div class="bracket-row">';
    vis.forEach(function(r){
      h+='<div class="round-col"><div class="round-label">'+conf.rounds[r]+'</div><div class="round-date">'+conf.rdates[r]+'</div><div class="games-stack">';
      conf.games.forEach(function(g){if(g.rd===r)h+=cardHTML(conf,g.id,pm,ST.admin);});
      h+='</div></div>';
    });
    h+='</div></div>';

    h+='<div class="legend">';
    [{bg:"rgba(99,102,241,.18)",l:"Your pick"},{bg:"rgba(16,185,129,.18)",l:"Correct"},{bg:"rgba(239,68,68,.14)",l:"Wrong"},{bg:"rgba(16,185,129,.06)",l:"Actual winner"}]
      .forEach(function(leg){h+='<div class="leg"><div class="leg-sw" style="background:'+leg.bg+'"></div>'+leg.l+'</div>';});
    h+='</div>';

    if(locked&&!ST.admin){
      h+='<div class="reveal-wrap page-content"><div class="reveal-title">All picks locked &mdash; '+x(conf.label)+' comparison</div>';
      h+='<div class="reveal-grid">';
      PARTS.forEach(function(p){
        var pp=((ST.picks[p]||{})[ST.conf]||{});
        h+='<div class="reveal-col"><div class="reveal-name'+(p===ST.user?" me":"")+'">'+p+(p===ST.user?" (you)":"")+'</div>';
        vis.forEach(function(r){conf.games.forEach(function(g){if(g.rd===r)h+=cardHTML(conf,g.id,pp,false);});});
        h+='</div>';
      });
      h+='</div></div>';
    }
  }

  // ── LEADERBOARD
  if(ST.page==="leaderboard"){
    h+='<div class="lb-wrap page-content">';
    h+='<div class="lb-note">R1 &amp; R2 = 1pt each &nbsp;|&nbsp; QF = 4pts &nbsp;|&nbsp; SF = 8pts &nbsp;|&nbsp; Championship = 16pts<br>Grand max = '+GMAX+' pts</div>';

    var rows=PARTS.map(function(p){
      return{name:p,score:playerScore(p),max:playerMax(p),
        cs:CORD.map(function(cid){return confScore(C[cid],(ST.picks[p]||{})[cid]||{},(ST.results[cid]||{}));})};
    }).sort(function(a,b){return b.score-a.score||b.max-a.max;});

    // detect new leader for trophy animation
    var newLeader=rows[0].name;
    var showTrophy=anyResults()&&newLeader!==_prevLeader&&_prevLeader!==null;
    if(anyResults())_prevLeader=newLeader;

    // who can still win
    if(anyResults()&&rows[0].score>0){
      h+='<div class="can-win"><div class="can-win-title">&#128161; Who Can Still Win</div>';
      var leader=rows[0];
      rows.forEach(function(row){
        var gap=row.max-leader.score;
        var canWin=row.max>=leader.score;
        h+='<div class="can-win-row"><span class="can-win-name">'+row.name+'</span>';
        if(row===leader){h+='<span class="can-win-gap">&#127942; Leading ('+row.score+'pts)</span>';}
        else if(canWin){h+='<span class="can-win-gap">Max +'+gap+' from leader</span>';}
        else{h+='<span class="can-win-gap behind">Eliminated &#128532;</span>';}
        h+='</div>';
      });
      h+='</div>';
    }

    var medals=["&#129351;","&#129352;","&#129353;"];
    rows.forEach(function(row,i){
      var spct=GMAX>0?Math.round(row.score/GMAX*100):0;
      var mpct=GMAX>0?Math.round(row.max/GMAX*100):0;
      var grad=i===0?"linear-gradient(90deg,#d97706,#fbbf24)":"linear-gradient(90deg,#4f46e5,#818cf8)";
      var prevRank=ST.prevRanks[row.name];
      var rankChange="";
      if(prevRank&&anyResults()){
        if(prevRank>i+1)rankChange='<span class="lb-rank-change up">&#9650;</span>';
        else if(prevRank<i+1)rankChange='<span class="lb-rank-change down">&#9660;</span>';
      }
      var rowCls="lb-row"+(i===0?" first":i===1?" second":i===2?" third":"");
      var medalHtml=(i===0&&showTrophy)?'<span class="trophy-anim">'+medals[0]+'</span>':medals[i]||("#"+(i+1));
      h+='<div class="'+rowCls+'">';
      h+='<div class="lb-medal">'+medalHtml+'</div>';
      h+='<div class="lb-body">';
      h+='<div class="lb-top"><span class="lb-name">'+row.name+rankChange+'</span>';
      h+='<span class="lb-pts"><b>'+row.score+'</b> / '+GMAX+' pts<small> max '+row.max+'</small></span></div>';
      h+='<div class="progress"><div class="progress-max" style="width:'+mpct+'%"></div>';
      h+='<div class="progress-fill" style="width:'+spct+'%;background:'+grad+'"></div></div>';
      // conf scores inline
      h+='<div class="lb-conf-scores">';
      CORD.forEach(function(cid,ci){
        var s=row.cs[ci];
        h+='<span class="lb-cs'+(s>0?" has-pts":"")+'">'+C[cid].label+' '+s+'</span>';
      });
      h+='</div>';
      h+='</div></div>';
    });

    // breakdown table
    h+='<div class="breakdown"><div class="breakdown-title">Conference Breakdown</div><table>';
    h+='<thead><tr><th>Player</th>';
    CORD.forEach(function(cid){h+='<th>'+C[cid].label+'</th>';});
    h+='<th>Total</th></tr></thead><tbody>';
    rows.forEach(function(row){
      h+='<tr><td>'+row.name+'</td>';
      row.cs.forEach(function(s){h+='<td style="color:'+(s>0?"#10b981":"#334155")+'">'+(s||"-")+'</td>';});
      h+='<td class="tot">'+row.score+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
  }

  // ── TEAMS
  if(ST.page==="teams"){
    var bn=conf.id==="be"?"Seeds 1-5: bye | 6-11: play R1":conf.id==="acc"?"Seeds 1-4: double-bye | 5-9: bye | 10-15: play R1":"Seeds 1-4: double-bye | 5-8: bye | 9+: play R1";
    h+='<div class="teams-wrap page-content">';
    h+='<div class="teams-note">'+x(conf.label)+' &mdash; '+x(conf.venue)+' &mdash; '+x(conf.dates)+'</div>';
    h+='<div class="teams-bye">'+bn+'</div>';
    h+='<div class="teams-grid">';
    conf.teams.forEach(function(t){
      var bl=conf.id==="be"?(t.s<=5?"Bye":"Plays R1"):conf.id==="acc"?(t.s<=4?"Double Bye":t.s<=9?"Bye":"Plays R1"):(t.s<=4?"Double Bye":t.s<=8?"Bye":"Plays R1");
      var bc=bl==="Double Bye"?"#10b981":bl==="Bye"?"#6366f1":"#334155";
      h+='<div class="team-card"><div class="team-badge" style="background:'+t.c+'">'+t.s+'</div>';
      h+='<div class="team-info"><div class="tn">'+x(t.n)+'</div><div class="tr">'+t.r+' conf</div><div class="tb" style="color:'+bc+'">'+bl+'</div></div></div>';
    });
    h+='</div></div>';
  }

  // settings page
  if(ST.page==="settings"&&ST.admin){
    h+=drawSettings();
  }

  document.getElementById("root").innerHTML=h;
  bind();

  // fire confetti when all locked
  if(ST.user&&ST.locked[ST.user]&&allLocked()&&ST.page==="bracket"&&!_confettiRunning){
    setTimeout(launchConfetti,300);
  }
  // trophy animation triggers a redraw to clear it after showing
  if(showTrophy){setTimeout(function(){_prevLeader=newLeader;draw();},2000);}
}

// ─── SETTINGS PAGE ───────────────────────────────────────────────────────────
function drawSettings(){
  var h="";
  h+='<div class="settings-wrap page-content">';

  // ── PLAYERS
  h+='<div class="settings-section">';
  h+='<div class="settings-hdr"><span class="settings-hdr-title">&#128100; Players</span>';
  h+='<button class="btn btn-ghost" style="font-size:9px" id="s-reset-players">Reset to Default</button></div>';
  h+='<div class="settings-body">';
  PARTS.forEach(function(p){
    var lk=ST.locked[p];
    h+='<div class="player-row">';
    h+='<span class="player-name">'+x(p)+'</span>';
    if(lk)h+='<span class="player-locked-badge">&#128274; Locked</span>';
    if(!lk)h+='<button class="btn btn-red" style="font-size:9px;padding:3px 8px" data-remove-player="'+x(p)+'">Remove</button>';
    h+='</div>';
  });
  h+='<div class="add-player-row"><input type="text" id="new-player-input" placeholder="Add player name..." maxlength="24"/>';
  h+='<button class="btn btn-green" id="s-add-player">Add</button></div>';
  h+='</div></div>';

  // ── TEAM SEEDINGS
  h+='<div class="settings-section">';
  h+='<div class="settings-hdr"><span class="settings-hdr-title">&#127944; Team Seedings</span>';
  h+='<button class="btn btn-ghost" style="font-size:9px" id="s-reset-teams">Reset '+C[ST.sconf].label+'</button></div>';
  h+='<div class="settings-body">';

  // conf selector for teams
  h+='<div class="settings-conf-tabs">';
  CORD.forEach(function(cid){
    h+='<button class="scftab '+(ST.sconf===cid?"active":"inactive")+'" data-sconf="'+cid+'">'+C[cid].label+'</button>';
  });
  h+='</div>';

  // team rows for selected conf
  var sconf=C[ST.sconf];
  var sorted=sconf.teams.slice().sort(function(a,b){return a.s-b.s;});
  h+='<div style="display:grid;grid-template-columns:auto 1fr auto;gap:4px 6px;align-items:center;font-size:9px;color:#475569;padding-bottom:4px;margin-bottom:4px;border-bottom:1px solid #1e2a3a">';
  h+='<span>Seed</span><span>Team Name</span><span>Record</span></div>';
  sorted.forEach(function(t){
    h+='<div class="team-row">';
    h+='<input class="team-seed-input" type="number" min="1" max="20" value="'+t.s+'" data-team-cid="'+ST.sconf+'" data-team-orig="'+x(t.n)+'" data-team-field="s"/>';
    h+='<input class="team-name-input" type="text" value="'+x(t.n)+'" data-team-cid="'+ST.sconf+'" data-team-orig="'+x(t.n)+'" data-team-field="n" maxlength="20"/>';
    h+='<input class="team-rec-input" type="text" value="'+x(t.r)+'" data-team-cid="'+ST.sconf+'" data-team-orig="'+x(t.n)+'" data-team-field="r" maxlength="8" placeholder="0-0"/>';
    h+='</div>';
  });
  h+='<div style="margin-top:10px;display:flex;gap:6px">';
  h+='<button class="btn btn-purple" id="s-save-teams" style="flex:1">Save '+C[ST.sconf].label+' Seedings</button></div>';
  h+='</div></div>';

  h+='</div>'; // settings-wrap
  return h;
}

// ─── BIND ────────────────────────────────────────────────────────────────────
var _prevLockedState=false;
function bind(){
  var els,i;

  // conf tabs
  els=document.querySelectorAll(".ctab");
  for(i=0;i<els.length;i++){els[i].addEventListener("click",function(){ST.conf=this.getAttribute("data-conf");ST.vrd=null;draw();});}

  // page tabs
  els=document.querySelectorAll(".ptab");
  for(i=0;i<els.length;i++){els[i].addEventListener("click",function(){ST.page=this.getAttribute("data-page");draw();});}

  // user btns
  els=document.querySelectorAll(".user-btn");
  for(i=0;i<els.length;i++){els[i].addEventListener("click",function(){ST.user=this.getAttribute("data-user");draw();});}

  var el;
  el=document.getElementById("b-switch");if(el)el.addEventListener("click",function(){ST.user=null;draw();});
  el=document.getElementById("b-admin");
  if(el)el.addEventListener("click",function(){
    if(ST.admin){ST.admin=false;draw();return;}
    var pw=prompt("Enter admin password:");
    if(pw===null)return;
    if(pw==="Sloop"){ST.admin=true;draw();}
    else{toast("Wrong password");}
  });
  el=document.getElementById("b-reset");if(el)el.addEventListener("click",doReset);
  el=document.getElementById("b-lock");
  if(el)el.addEventListener("click",function(){
    if(confirm("Lock all your picks for "+ST.user+"? Can't change after.")){
      doLock(ST.user);toast("Picks locked! \uD83D\uDD12");
    }
  });
  el=document.getElementById("b-unlock");
  if(el)el.addEventListener("click",function(){if(confirm("Unlock your picks?")){doUnlock(ST.user);toast("Picks unlocked");}});

  // round filter
  els=document.querySelectorAll(".rbtn");
  for(i=0;i<els.length;i++){els[i].addEventListener("click",function(){var r=parseInt(this.getAttribute("data-rd"));ST.vrd=r===-1?null:r;draw();});}

  // game rows
  els=document.querySelectorAll(".gc-row.clickable");
  for(i=0;i<els.length;i++){
    els[i].addEventListener("click",function(){
      var cid=this.getAttribute("data-cid"),gid=this.getAttribute("data-gid"),name=this.getAttribute("data-name"),isAdm=this.getAttribute("data-adm")==="1";
      if(!cid||!gid||!name)return;
      if(isAdm){saveResult(cid,gid,name);toast("Result: "+name);}
      else if(ST.user&&!ST.locked[ST.user]){savePick(ST.user,cid,gid,name);toast(ST.user+": "+name);}
    });
  }

  // quick entry buttons
  els=document.querySelectorAll("[data-qe-gid]");
  for(i=0;i<els.length;i++){
    els[i].addEventListener("click",function(){
      var cid=this.getAttribute("data-qe-cid"),gid=this.getAttribute("data-qe-gid"),name=this.getAttribute("data-qe-name");
      saveResult(cid,gid,name);toast("Result set: "+name);
    });
  }
  els=document.querySelectorAll("[data-qe-clear-gid]");
  for(i=0;i<els.length;i++){
    els[i].addEventListener("click",function(){
      var cid=this.getAttribute("data-qe-clear-cid"),gid=this.getAttribute("data-qe-clear-gid");
      clearResult(cid,gid);toast("Result cleared");
    });
  }

  // settings: conf tabs
  els=document.querySelectorAll(".scftab");
  for(i=0;i<els.length;i++){els[i].addEventListener("click",function(){ST.sconf=this.getAttribute("data-sconf");draw();});}

  // settings: reset players
  el=document.getElementById("s-reset-players");
  if(el)el.addEventListener("click",function(){if(confirm("Reset players to Welton, Trom, Hoff, Watson?")){resetPlayers();}});

  // settings: add player
  el=document.getElementById("s-add-player");
  if(el)el.addEventListener("click",function(){
    var inp=document.getElementById("new-player-input");
    var name=inp?inp.value.trim():"";
    if(!name){toast("Enter a name first");return;}
    if(PARTS.indexOf(name)>=0){toast("Player already exists");return;}
    var newList=PARTS.slice();newList.push(name);
    savePlayers(newList);toast("Added "+name);
  });

  // settings: remove player
  els=document.querySelectorAll("[data-remove-player]");
  for(i=0;i<els.length;i++){
    els[i].addEventListener("click",function(){
      var name=this.getAttribute("data-remove-player");
      if(!confirm("Remove "+name+"? Their picks stay in Firebase but they won't appear in the app.")){return;}
      var newList=PARTS.filter(function(p){return p!==name;});
      savePlayers(newList);toast("Removed "+name);
    });
  }

  // settings: reset teams
  el=document.getElementById("s-reset-teams");
  if(el)el.addEventListener("click",function(){
    if(confirm("Reset "+C[ST.sconf].label+" seedings to defaults?")){resetTeams(ST.sconf);}
  });

  // settings: save teams
  el=document.getElementById("s-save-teams");
  if(el)el.addEventListener("click",function(){
    // read all inputs and build updated team array
    var cid=ST.sconf;
    var conf=C[cid];
    var updated=conf.teams.map(function(t){return{s:t.s,n:t.n,r:t.r,c:t.c};});
    // gather seed inputs
    var seedInputs=document.querySelectorAll(".team-seed-input[data-team-cid='"+cid+"']");
    var nameInputs=document.querySelectorAll(".team-name-input[data-team-cid='"+cid+"']");
    var recInputs=document.querySelectorAll(".team-rec-input[data-team-cid='"+cid+"']");
    for(var j=0;j<seedInputs.length;j++){
      var origName=seedInputs[j].getAttribute("data-team-orig");
      var newSeed=parseInt(seedInputs[j].value)||0;
      var newName=nameInputs[j]?nameInputs[j].value.trim():"";
      var newRec=recInputs[j]?recInputs[j].value.trim():"";
      for(var k=0;k<updated.length;k++){
        if(updated[k].n===origName){
          if(newSeed>0)updated[k].s=newSeed;
          if(newName)updated[k].n=newName;
          if(newRec)updated[k].r=newRec;
          break;
        }
      }
    }
    // sort by seed
    updated.sort(function(a,b){return a.s-b.s;});
    saveTeams(cid,updated);
    toast(C[cid].label+" seedings saved!");
  });
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
draw();
loadFirebase();

</script>
