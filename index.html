<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="dark"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
button,input,select{font-family:'DM Sans',sans-serif}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:40px 40px}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(99,102,241,.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,9,15,.92);border-bottom:1px solid #1e2a3a;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-top:-2px}
.topbar-right{display:flex;gap:6px;align-items:center}
.btn{border-radius:6px;padding:6px 13px;font-size:11px;font-weight:600;border:1px solid;cursor:pointer;transition:all .15s}
.btn:active{opacity:.7}
.btn-ghost{background:transparent;border-color:#2d3f52;color:#64748b}
.btn-ghost:hover{border-color:#475569;color:#94a3b8}
.btn-primary{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.btn-gold{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.35);color:#fbbf24}
.btn-green{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.btn-red{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}
.btn-sm{padding:4px 9px;font-size:10px}
.main{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:28px 16px 60px}
/* AUTH */
.auth-wrap{display:flex;flex-direction:column;align-items:center;padding:48px 20px 20px;gap:0;text-align:center}
.auth-logo{font-family:'Bebas Neue',cursive;font-size:52px;letter-spacing:.08em;background:linear-gradient(135deg,#fff 30%,#fbbf24 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px}
.auth-sub{font-size:11px;color:#475569;letter-spacing:.12em;text-transform:uppercase;margin-bottom:32px}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;width:100%;max-width:340px;background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;padding:3px}
.auth-tab{flex:1;padding:7px;border-radius:6px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;background:none;color:#475569}
.auth-tab.active{background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.3)}
.auth-card{width:100%;max-width:340px}
.auth-field{margin-bottom:12px;text-align:left}
.auth-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}
.auth-input{width:100%;background:#07090f;border:1px solid #1e2a3a;border-radius:7px;padding:10px 12px;color:#e2e8f0;font-size:14px;outline:none;transition:border-color .15s}
.auth-input:focus{border-color:rgba(99,102,241,.5)}
.auth-input::placeholder{color:#334155}
.auth-btn{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:4px;transition:all .2s;background:rgba(99,102,241,.2);border:1px solid rgba(99,102,241,.4);color:#a5b4fc}
.auth-btn:active{transform:scale(.98)}
.auth-err{font-size:10px;color:#fca5a5;min-height:16px;margin-bottom:8px;text-align:center}
/* LANDING */
.landing{display:flex;flex-direction:column;align-items:center;padding:36px 20px 16px;gap:6px;text-align:center}
.landing-logo{font-family:'Bebas Neue',cursive;font-size:48px;letter-spacing:.08em;background:linear-gradient(135deg,#fff 30%,#fbbf24 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px}
.landing-sub{font-size:12px;color:#475569;letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px}
.landing-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.landing-btn{padding:14px;border-radius:10px;font-size:14px;font-weight:700;border:1px solid;cursor:pointer;transition:all .2s;text-align:center}
.landing-btn:active{transform:scale(.98)}
.landing-btn-primary{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.landing-btn-secondary{background:#0d1117;border-color:#1e2a3a;color:#64748b}
.landing-divider{font-size:9px;color:#334155;letter-spacing:.1em;text-transform:uppercase;margin:4px 0}
/* CARD / FORM */
.card{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px}
.card-sub{font-size:10px;color:#475569;margin-bottom:18px}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}
.form-input{width:100%;background:#07090f;border:1px solid #1e2a3a;border-radius:7px;padding:9px 12px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:rgba(99,102,241,.5)}
.form-input::placeholder{color:#334155}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.players-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
.player-entry{display:flex;gap:6px;align-items:center}
.player-entry .form-input{flex:1}
.remove-player{width:28px;height:28px;border-radius:6px;background:transparent;border:1px solid #1e2a3a;color:#475569;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.remove-player:hover{border-color:#ef4444;color:#fca5a5}
.add-player-btn{font-size:10px;color:#6366f1;background:none;border:none;cursor:pointer;padding:2px 0;display:inline-flex;align-items:center;gap:4px}
.error-msg{font-size:10px;color:#fca5a5;min-height:16px;margin-top:5px}
/* POOLS TOGGLE */
.pools-toggle{display:flex;flex-direction:column;gap:6px}
.pool-toggle-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#07090f;border-radius:8px;border:1px solid #1e2a3a;cursor:pointer;transition:border-color .15s}
.pool-toggle-row.active{border-color:rgba(99,102,241,.35);background:rgba(99,102,241,.05)}
.pool-toggle-icon{font-size:16px;width:28px;text-align:center}
.pool-toggle-name{flex:1;font-size:12px;font-weight:600}
.pool-toggle-check{width:18px;height:18px;border-radius:4px;border:1px solid #2d3f52;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.pool-toggle-row.active .pool-toggle-check{background:#6366f1;border-color:#6366f1;color:#fff}
/* GROUP CODE */
.group-code{font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:.2em;color:#fbbf24;text-align:center;padding:14px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:10px;margin:12px 0}
/* HUB */
.section-label{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#1e2a3a}
.standings-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;overflow:hidden;margin-bottom:24px}
.standings-head{padding:12px 16px;border-bottom:1px solid #1e2a3a;display:flex;justify-content:space-between;align-items:center}
.standings-title{font-size:13px;font-weight:700;color:#fff}
.standings-sub{font-size:9px;color:#475569}
.player-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(30,42,58,.5)}
.player-row:last-child{border-bottom:none}
.player-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rank-1{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.rank-2{background:rgba(148,163,184,.1);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}
.rank-3{background:rgba(205,127,50,.1);color:#cd7f32;border:1px solid rgba(205,127,50,.2)}
.rank-other{background:#07090f;color:#475569;border:1px solid #1e2a3a}
.player-name{flex:1;font-size:13px;font-weight:600}
.finish-dots{display:flex;gap:3px}
.fdot{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.fdot-1{background:rgba(251,191,36,.2);color:#fbbf24}
.fdot-2{background:rgba(148,163,184,.15);color:#94a3b8}
.fdot-3{background:rgba(205,127,50,.15);color:#cd7f32}
.fdot-x{background:#1e2a3a;color:#334155}
.player-pts{font-size:16px;font-weight:700;color:#fff;min-width:28px;text-align:right}
.player-pts-label{font-size:8px;color:#475569;text-align:right}
.pools-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.pool-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;overflow:hidden;transition:border-color .2s,transform .15s;cursor:default}
.pool-card.clickable{cursor:pointer}
.pool-card.clickable:active{transform:scale(.99)}
.pool-card.clickable:hover{border-color:#2d3f52}
.pool-card.dimmed{opacity:.5}
.pool-card-inner{display:flex;align-items:center;gap:14px;padding:13px 16px}
.pool-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pool-info{flex:1;min-width:0}
.pool-name{font-size:13px;font-weight:700;margin-bottom:2px}
.pool-meta{font-size:10px;color:#475569}
.pool-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.status-pill{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.pill-open{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.pill-locked{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.pill-soon{background:rgba(71,85,105,.1);border:1px solid #1e2a3a;color:#475569}
.pill-complete{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.pool-arrow{color:#334155;font-size:16px;line-height:1}
.pool-winner{border-top:1px solid #1e2a3a;padding:7px 16px;display:flex;align-items:center;gap:10px}
.podium{display:flex;gap:8px}
.podium-item{font-size:9px;color:#475569}
.podium-item.p1 b{color:#fbbf24}
.podium-item.p2 b{color:#94a3b8}
.podium-item.p3 b{color:#cd7f32}
/* ADMIN PANEL */
.admin-panel{background:#0d1117;border:1px solid rgba(251,191,36,.25);border-radius:12px;padding:16px;margin-bottom:20px}
.admin-panel-title{font-size:9px;color:#fbbf24;letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.pool-controls{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.pool-control-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#07090f;border-radius:8px;border:1px solid #1e2a3a}
.pcr-name{flex:1;font-size:11px;font-weight:600}
.pcr-btns{display:flex;gap:3px;flex-wrap:wrap}
.pcr-btn{padding:3px 7px;border-radius:5px;font-size:9px;font-weight:600;border:1px solid #1e2a3a;background:transparent;color:#475569;cursor:pointer;transition:all .15s}
.pcr-btn.sel-open{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.pcr-btn.sel-locked{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}
.pcr-btn.sel-soon{background:rgba(71,85,105,.15);border-color:#2d3f52;color:#64748b}
.pcr-btn.sel-complete{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#a5b4fc}
.results-title{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.result-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.result-pool-name{font-size:10px;color:#475569;width:80px;flex-shrink:0}
.result-selects{display:flex;gap:4px;flex:1}
.result-select{flex:1;background:#07090f;border:1px solid #1e2a3a;border-radius:6px;color:#e2e8f0;font-size:10px;padding:5px 4px;outline:none}
.save-results-btn{width:100%;margin-top:8px;padding:9px;border-radius:7px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fbbf24;font-size:11px;font-weight:600;cursor:pointer}
/* GROUP INFO BAR */
.group-bar{padding:8px 16px;border-bottom:1px solid #1e2a3a;display:flex;align-items:center;gap:8px;background:#090d14;flex-wrap:wrap}
.group-bar-name{font-size:12px;font-weight:700;color:#f1f5f9;flex:1}
.group-bar-code{font-size:9px;color:#475569;font-family:'Bebas Neue',cursive;letter-spacing:.15em}
/* GROUP SEARCH */
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;padding:9px 12px 9px 34px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .15s}
.search-input:focus{border-color:rgba(99,102,241,.4)}
.search-input::placeholder{color:#334155}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#334155;font-size:13px;pointer-events:none}
.groups-table{width:100%;border-collapse:collapse;font-size:11px}
.groups-table th{padding:6px 10px;text-align:left;color:#475569;font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #1e2a3a}
.groups-table td{padding:8px 10px;border-bottom:1px solid rgba(30,42,58,.4);color:#94a3b8;vertical-align:middle}
.groups-table tr:last-child td{border-bottom:none}
.groups-table tr.clickable-row{cursor:pointer;transition:background .1s}
.groups-table tr.clickable-row:hover td{background:rgba(99,102,241,.05)}
.group-name-cell{color:#f1f5f9;font-weight:600}
.group-code-cell{font-family:'Bebas Neue',cursive;letter-spacing:.12em;color:#fbbf24;font-size:12px}
.join-link{padding:3px 8px;border-radius:5px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);color:#a5b4fc;font-size:9px;font-weight:600;cursor:pointer;white-space:nowrap}
.no-results{text-align:center;color:#334155;padding:20px;font-size:11px}
/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:#0d1117;border:1px solid rgba(99,102,241,.4);color:#a5b4fc;border-radius:8px;padding:8px 18px;font-size:11px;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease both}
/* PROFILE */
.profile-hero{display:flex;flex-direction:column;align-items:center;padding:36px 20px 28px;gap:0;text-align:center}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:rgba(99,102,241,.1);border:2px solid rgba(99,102,241,.3);display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:14px;cursor:pointer;position:relative;transition:border-color .2s}
.profile-avatar:hover{border-color:rgba(99,102,241,.6)}
.profile-avatar-edit{position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;border-radius:50%;background:#1e2a3a;border:1px solid #334155;font-size:10px;pointer-events:none;display:flex;align-items:center;justify-content:center}
.profile-username{font-size:22px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.profile-since{font-size:10px;color:#334155;letter-spacing:.08em;margin-bottom:24px}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.pstat{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;padding:14px 10px;text-align:center}
.pstat-val{font-size:24px;font-weight:700;color:#f1f5f9;line-height:1;margin-bottom:4px}
.pstat-val.gold{color:#fbbf24}
.pstat-label{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.08em}
.group-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .15s;display:flex;align-items:center;gap:14px}
.group-card:hover{border-color:#2d3f52;transform:translateY(-1px)}
.group-card:active{transform:scale(.99)}
.group-card-icon{font-size:22px;width:44px;height:44px;border-radius:10px;background:#07090f;border:1px solid #1e2a3a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.group-card-info{flex:1;min-width:0}
.group-card-name{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:5px}
.group-card-pools{display:flex;gap:5px;flex-wrap:wrap}
.gpp{font-size:9px;padding:2px 7px;border-radius:20px;border:1px solid;white-space:nowrap}
.gpp-open{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.gpp-locked{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.25);color:#fca5a5}
.gpp-soon{background:#07090f;border-color:#1e2a3a;color:#334155}
.gpp-complete{background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.25);color:#818cf8}
.group-card-arrow{color:#334155;font-size:18px;flex-shrink:0}
#emoji-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:flex-end;justify-content:center}
#emoji-modal.open{display:flex}
.emoji-sheet{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px 14px 0 0;width:100%;max-width:480px;padding:20px 16px 44px}
.emoji-handle{width:36px;height:4px;background:#1e2a3a;border-radius:2px;margin:0 auto 14px}
.emoji-title{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:14px;text-align:center}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-height:280px;overflow-y:auto}
.emoji-opt{width:46px;height:46px;border-radius:8px;font-size:24px;background:#07090f;border:1px solid #1e2a3a;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .12s}
.emoji-opt:hover,.emoji-opt:active{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.08)}

/* TIER BAR */
.tier-bar{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;padding:14px 16px;margin-bottom:24px}
.tier-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tier-label{font-size:13px;font-weight:700}
.tier-pts-label{font-size:10px;color:#475569}
.tier-track{position:relative;height:8px;background:#07090f;border-radius:4px;margin-bottom:8px;overflow:visible}
.tier-fill{height:100%;border-radius:4px;transition:width .6s ease}
.tier-ticks{display:flex;justify-content:space-between;margin-top:4px}
.tier-tick{font-size:8px;color:#334155;text-align:center}
.tier-tick.done{color:#64748b}
/* INVITE MODAL */
#invite-modal{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:400;display:none;align-items:flex-end;justify-content:center}
#invite-modal.open{display:flex}
.invite-sheet{background:#0d1117;border:1px solid #1e2a3a;border-top:1px solid #2d3f52;border-radius:14px 14px 0 0;width:100%;max-width:480px;padding:20px 16px 44px}

<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div id="root"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── POOL LIBRARY ─────────────────────────────────────────────────────────────
var POOL_LIBRARY = [
  {id:"rwc",    name:"Conference Tourney Picks", icon:"&#127936;", bg:"linear-gradient(135deg,#1d428a,#6366f1)", url:"rwc-bracket-challenge.html", desc:"Power 5 Conference Tourneys", dates:"Mar 10-15"},
  {id:"masters",name:"Masters Pool",             icon:"&#9971;",   bg:"linear-gradient(135deg,#065f46,#10b981)", url:"masters.html",               desc:"Augusta National",            dates:"Apr 10-13"},
  {id:"wc",     name:"2026 World Cup",           icon:"&#9917;",   bg:"linear-gradient(135deg,#7c3aed,#c026d3)", url:"worldcup.html",               desc:"48 Teams · USA/Mexico/Canada",dates:"Jun 11-Jul 19"},
  {id:"cws",    name:"College World Series",     icon:"&#9918;",   bg:"linear-gradient(135deg,#7c2d12,#ef4444)", url:"cws.html",                    desc:"TD Ameritrade Park",          dates:"Jun 13-24"},
  {id:"nhl",    name:"Stanley Cup Playoffs",     icon:"&#127954;", bg:"linear-gradient(135deg,#0c1445,#3b82f6)", url:"nhl.html",                    desc:"NHL Playoff Bracket",         dates:"Apr-Jun 2026"},
  {id:"cfb",    name:"College Football Pickem",  icon:"&#127944;", bg:"linear-gradient(135deg,#4c1d95,#a78bfa)", url:"cfb.html",                    desc:"10-Game Spread Picks",        dates:"Fall 2026"}
];

var MASTER_PW = "Sloop";

// ── STATE ────────────────────────────────────────────────────────────────────
var SC = {
  screen: "auth",       // "auth" | "profile" | "landing" | "join" | "create" | "created" | "hub" | "admin"
  authTab: "login",     // "login" | "signup"
  currentUser: null,    // { username, groups:[], emoji }
  group: null,
  isAdmin: false,
  isMaster: false,
  groupAdmin: false,
  showGroupSettings: false,
  globalStatuses: {},
  createForm: { name:"", adminPw:"", pools:[] },
  joinCode: "",
  error: ""
};

var DB = null;
try {
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks",appId:"1:965978379243:web:35f9db9a664f9170e27fae"});
  DB = firebase.database();
} catch(e) {}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function x(s){ var t=String(s||""); t=t.replace(/&/g,"&amp;"); t=t.replace(/</g,"&lt;"); t=t.replace(/>/g,"&gt;"); t=t.replace(/'/g,"&#39;"); return t; }
function toast(msg){ var t=document.getElementById("toast"); t.innerHTML=msg; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},2400); }
function randCode() {
  var chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  var s="";
  for(var i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function poolById(id){ for(var i=0;i<POOL_LIBRARY.length;i++) if(POOL_LIBRARY[i].id===id) return POOL_LIBRARY[i]; return null; }
function groupPools(g){ return (g.pools||[]).map(function(id){ return poolById(id); }).filter(Boolean); }

// ── SESSION STORAGE ───────────────────────────────────────────────────────────
function saveSession(username){
  try{ localStorage.setItem("pp_user", username); }catch(e){}
}
function loadSession(){
  try{ return localStorage.getItem("pp_user"); }catch(e){ return null; }
}
function clearSession(){
  try{ localStorage.removeItem("pp_user"); localStorage.removeItem("pp_last_group"); }catch(e){}
}
function saveLastGroup(groupId){
  try{ localStorage.setItem("pp_last_group", groupId); }catch(e){}
}
function loadLastGroup(){
  try{ return localStorage.getItem("pp_last_group"); }catch(e){ return null; }
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function authSignup(username, password, cb) {
  if(!username || username.length < 2) { cb("Username must be at least 2 characters"); return; }
  if(!password || password.length < 4) { cb("Password must be at least 4 characters"); return; }
  var key = username.toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(key !== username.toLowerCase()) { cb("Username can only contain letters, numbers and underscores"); return; }
  if(!DB) { cb("No database connection"); return; }
  DB.ref("users/"+key).once("value", function(sn){
    if(sn.val()) { cb("Username already taken — choose another"); return; }
    DB.ref("users/"+key).set({ username: username, password: password, groups: [], emoji: "🎯" }, function(err){
      if(err) cb("Failed to create account — check connection");
      else cb(null, { username: username, groups: [], emoji: "🎯" });
    });
  });
}

function authLogin(username, password, cb) {
  if(!username || !password) { cb("Enter your username and password"); return; }
  var key = username.toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(!DB) { cb("No database connection"); return; }
  DB.ref("users/"+key).once("value", function(sn){
    var u = sn.val();
    if(!u) { cb("Username not found"); return; }
    if(u.password !== password) { cb("Wrong password"); return; }
    cb(null, { username: u.username, groups: u.groups || [], emoji: u.emoji || "🎯" });
  });
}

function addGroupToUser(username, groupId) {
  var key = username.toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(!DB) return;
  DB.ref("users/"+key+"/groups").once("value", function(sn){
    var groups = sn.val() || [];
    if(groups.indexOf(groupId) < 0) {
      groups.push(groupId);
      DB.ref("users/"+key+"/groups").set(groups);
      if(SC.currentUser) SC.currentUser.groups = groups;
    }
  });
}

// ── FIREBASE GROUP OPS ────────────────────────────────────────────────────────
function createGroup(name, adminPw, pools, cb) {
  var id = randCode();
  var group = {
    id: id,
    name: name,
    adminPw: adminPw,
    players: SC.currentUser ? [SC.currentUser.username] : [],
    pools: pools,
    data: { statuses:{}, results:{} }
  };
  if(DB) {
    DB.ref("groups/"+id).set(group, function(err){
      if(err) cb(null, "Failed to save. Check connection.");
      else cb(group, null);
    });
  } else {
    cb(null, "No database connection.");
  }
}

function loadGroup(code, cb) {
  var id = code.trim().toUpperCase();
  if(DB) {
    DB.ref("groups/"+id).once("value", function(sn){
      var val = sn.val();
      if(val) cb(val, null);
      else cb(null, "Group code not found. Check and try again.");
    });
  } else {
    cb(null, "No database connection.");
  }
}

function subscribeGroup(id) {
  if(!DB) return;
  DB.ref("groups/"+id+"/data").on("value", function(sn){
    if(SC.group && SC.group.id===id) {
      SC.group.data = sn.val() || {statuses:{},results:{}};
      if(SC.screen==="hub") draw();
    }
  });
}

function subscribeGroupPlayers(id) {
  if(!DB) return;
  DB.ref("groups/"+id+"/players").on("value", function(sn){
    if(SC.group && SC.group.id===id) {
      SC.group.players = sn.val() || [];
      if(SC.screen==="hub") draw();
    }
  });
}

function saveGroupData() {
  if(!SC.group || !DB) return;
  DB.ref("groups/"+SC.group.id+"/data").set(SC.group.data);
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function draw() {
  var s = SC.screen;
  if(s==="auth")    renderAuth();
  else if(s==="profile") renderProfile();
  else if(s==="landing") renderLanding();
  else if(s==="join")    renderJoin();
  else if(s==="create")  renderCreate();
  else if(s==="created") renderCreated();
  else if(s==="hub")     renderHub();
  else if(s==="admin")   renderAdmin();
}

// ── TOPBAR ────────────────────────────────────────────────────────────────────
function topbar(showBack) {
  var h = '<div class="topbar">';
  if(showBack) h += '<button class="btn btn-ghost btn-sm" id="btn-back" style="margin-right:4px">&#8592;</button>';
  h += '<div style="cursor:pointer" id="btn-logo"><div class="logo">PoolPlay</div></div>';
  h += '<div class="topbar-right">';
  if(SC.currentUser) {
    var em = SC.currentUser.emoji || '&#127919;';
    h += '<button class="btn btn-ghost btn-sm" id="btn-profile" style="gap:5px;display:flex;align-items:center">'+em+' '+x(SC.currentUser.username)+'</button>';
    h += '<button class="btn btn-ghost btn-sm" id="btn-logout">Log out</button>';
  }
  if(SC.isMaster && SC.screen!=="admin") {
    h += '<button class="btn btn-gold btn-sm" id="btn-topbar-admin">&#9889; Admin</button>';
  } else if(!SC.isMaster) {
    h += '<button class="btn btn-ghost btn-sm" id="btn-topbar-admin-login" style="font-size:9px;color:#475569">&#9889;</button>';
  }
  h += '</div></div>';
  return h;
}

function render(h) {
  document.getElementById("root").innerHTML = h;
  var bb = document.getElementById("btn-back");
  if(bb) bb.addEventListener("click", function(){
    if(SC.screen==="join"||SC.screen==="create"){ SC.screen="profile"; SC.error=""; draw(); }
    else if(SC.screen==="created"){ SC.screen="hub"; subscribeGroup(SC.group.id); draw(); }
    else if(SC.screen==="landing"){ SC.screen="profile"; draw(); }
  });
  var plogo = document.getElementById("btn-logo");
  if(plogo) plogo.addEventListener("click", function(){ if(SC.currentUser){ SC.group=null; SC.isAdmin=false; SC.isMaster=false; SC.groupAdmin=false; SC.screen="profile"; draw(); } });
  var profbtn = document.getElementById("btn-profile");
  if(profbtn) profbtn.addEventListener("click", function(){ SC.group=null; SC.isAdmin=false; SC.isMaster=false; SC.groupAdmin=false; SC.screen="profile"; draw(); });
  var lo = document.getElementById("btn-logout");
  if(lo) lo.addEventListener("click", function(){
    clearSession();
    SC.currentUser = null; SC.group = null; SC.isAdmin = false;
    SC.isMaster = false; SC.groupAdmin = false; SC.screen = "auth";
    draw();
  });
  var tlogin = document.getElementById("btn-topbar-admin-login");
  if(tlogin) tlogin.addEventListener("click", function(){
    var pw = prompt("Admin password:");
    if(!pw) return;
    if(pw===MASTER_PW){ SC.isMaster=true; SC.isAdmin=true; SC.screen="admin"; draw(); toast("Master access granted"); }
    else toast("Wrong password");
  });
  var tadmin = document.getElementById("btn-topbar-admin");
  if(tadmin) tadmin.addEventListener("click", function(){ SC.screen="admin"; draw(); });
}

// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function renderAuth() {
  var isLogin = SC.authTab === "login";
  var h = '<div class="topbar"><div><div class="logo">PoolPlay</div></div><div class="topbar-right"><button class="btn btn-ghost btn-sm" id="btn-topbar-admin-login" style="font-size:9px;color:#475569">&#9889;</button></div></div>';
  h += '<div class="main fade-up">';
  h += '<div class="auth-wrap">';
  h += '<div class="auth-logo">PoolPlay</div>';
  h += '<div class="auth-sub">2026 Season</div>';
  h += '<div class="auth-tabs">';
  h += '<button class="auth-tab'+(isLogin?" active":"")+'" id="tab-login">Log In</button>';
  h += '<button class="auth-tab'+(!isLogin?" active":"")+'" id="tab-signup">Sign Up</button>';
  h += '</div>';
  h += '<div class="auth-card">';
  h += '<div class="auth-field"><label class="auth-label">Username</label>';
  h += '<input class="auth-input" id="auth-username" type="text" placeholder="your username" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false"></div>';
  h += '<div class="auth-field"><label class="auth-label">Password</label>';
  h += '<input class="auth-input" id="auth-password" type="password" placeholder="your password" autocomplete="'+(isLogin?"current-password":"new-password")+'"></div>';
  h += '<div class="auth-err" id="auth-err"></div>';
  h += '<button class="auth-btn" id="auth-submit">'+(isLogin?"Log In":"Create Account")+'</button>';
  h += '</div></div></div>';

  document.getElementById("root").innerHTML = h;

  var tlogin = document.getElementById("btn-topbar-admin-login");
  if(tlogin) tlogin.addEventListener("click", function(){
    var pw = prompt("Admin password:");
    if(!pw) return;
    if(pw===MASTER_PW){ SC.isMaster=true; SC.isAdmin=true; SC.screen="admin"; draw(); toast("Master access granted"); }
    else toast("Wrong password");
  });

  document.getElementById("tab-login").addEventListener("click", function(){ SC.authTab="login"; draw(); });
  document.getElementById("tab-signup").addEventListener("click", function(){ SC.authTab="signup"; draw(); });

  var unameEl = document.getElementById("auth-username");
  var pwEl = document.getElementById("auth-password");
  var errEl = document.getElementById("auth-err");
  var submitBtn = document.getElementById("auth-submit");

  function doSubmit() {
    var uname = unameEl.value.trim();
    var pw = pwEl.value;
    errEl.textContent = "";
    submitBtn.disabled = true;
    submitBtn.textContent = "Please wait...";
    if(isLogin) {
      authLogin(uname, pw, function(err, user){
        submitBtn.disabled = false;
        submitBtn.textContent = "Log In";
        if(err){ errEl.textContent = err; return; }
        SC.currentUser = user;
        saveSession(user.username);
        SC.screen = "profile";
        draw();
      });
    } else {
      authSignup(uname, pw, function(err, user){
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
        if(err){ errEl.textContent = err; return; }
        SC.currentUser = user;
        saveSession(user.username);
        SC.screen = "profile";
        toast("Welcome to PoolPlay, "+user.username+"!");
        draw();
      });
    }
  }

  submitBtn.addEventListener("click", doSubmit);
  pwEl.addEventListener("keydown", function(e){ if(e.key==="Enter") doSubmit(); });
  unameEl.focus();
}

// ── PROFILE SCREEN ────────────────────────────────────────────────────────────
var EMOJI_OPTIONS = ["🎯","⚡","🔥","🏆","🎲","🦁","🐺","🦊","🐻","🦅","🦋","🌊","🍀","🌙","⭐","🎸","🎮","🏄","🧠","🤠","👑","💎","🚀","🌈","🎪","🎭","🐉","🦄","🍕","🎲","🦈","🏹","⚔️","🎺","🌵","🍺","🏔️","🦋","🎳","🧊","🎨","🎬","🌸","🧨","💥"];

function userKey(uname){ return (uname||"").toLowerCase().replace(/[^a-z0-9_]/g,""); }

function saveUserEmoji(emoji) {
  if(!SC.currentUser || !DB) return;
  SC.currentUser.emoji = emoji;
  DB.ref("users/"+userKey(SC.currentUser.username)+"/emoji").set(emoji);
}

// ── TIER SYSTEM ──────────────────────────────────────────────────────────────
var TIERS = [
  {name:"Bronze",   pts:1,  color:"#cd7f32", gradient:"linear-gradient(90deg,#7c4a1e,#cd7f32)", icon:"🥉"},
  {name:"Silver",   pts:3,  color:"#94a3b8", gradient:"linear-gradient(90deg,#475569,#94a3b8)", icon:"🥈"},
  {name:"Gold",     pts:5,  color:"#fbbf24", gradient:"linear-gradient(90deg,#b45309,#fbbf24)", icon:"🥇"},
  {name:"Platinum", pts:10, color:"#67e8f9", gradient:"linear-gradient(90deg,#0e7490,#67e8f9)", icon:"💎"},
  {name:"Diamond",  pts:20, color:"#a5b4fc", gradient:"linear-gradient(90deg,#4f46e5,#c4b5fd)", icon:"👑"}
];
function getTier(pts) {
  var tier = null;
  for(var i=0;i<TIERS.length;i++) { if(pts >= TIERS[i].pts) tier = TIERS[i]; }
  return tier || {name:"Unranked", pts:0, color:"#334155", gradient:"linear-gradient(90deg,#1e2a3a,#334155)", icon:"🎮"};
}
function getNextTier(pts) {
  for(var i=0;i<TIERS.length;i++) { if(pts < TIERS[i].pts) return TIERS[i]; }
  return null; // already max
}
function renderTierBar(pts) {
  var cur = getTier(pts);
  var next = getNextTier(pts);
  var h = '<div class="tier-bar">';
  h += '<div class="tier-header">';
  h += '<span class="tier-label" style="color:'+cur.color+'">'+cur.icon+' '+cur.name+'</span>';
  if(next) h += '<span class="tier-pts-label">'+pts+' / '+next.pts+' pts to '+next.name+'</span>';
  else     h += '<span class="tier-pts-label" style="color:#fbbf24">'+pts+' pts — Max Tier!</span>';
  h += '</div>';
  // Track
  var pct = 0;
  if(next) {
    var prev = cur.pts || 0;
    pct = Math.min(100, Math.round((pts - prev) / (next.pts - prev) * 100));
  } else { pct = 100; }
  h += '<div class="tier-track">';
  h += '<div class="tier-fill" style="width:'+pct+'%;background:'+cur.gradient+'"></div>';
  h += '</div>';
  // Tick marks
  h += '<div class="tier-ticks">';
  TIERS.forEach(function(t){
    var done = pts >= t.pts;
    h += '<div class="tier-tick'+(done?" done":"")+'">'+t.icon+'<br>'+t.pts+'</div>';
  });
  h += '</div></div>';
  return h;
}

function renderProfile() {
  var u = SC.currentUser;
  if(!u) { SC.screen="auth"; draw(); return; }
  var em = u.emoji || "🍺";
  var myGroupIds = u.groups || [];

  var h = topbar(false);
  h += '<div class="main fade-up">';

  // Hero
  h += '<div class="profile-hero">';
  h += '<div class="profile-avatar" id="btn-edit-emoji">';
  h += em;
  h += '<div class="profile-avatar-edit">✏️</div>';
  h += '</div>';
  h += '<div class="profile-username">'+x(u.username)+'</div>';
  h += '<div class="profile-since">PoolPlay 2026</div>';
  h += '</div>';

  // Stats

    doAllGroupSearch("");

  function renderGroupCards(groups, container) {
    if(!groups.length) {
      container.innerHTML = '<div style="text-align:center;color:#334155;padding:24px;font-size:11px">No groups found.</div>';
      return;
    }
    var statuses = SC.globalStatuses || {};
    var gh = "";
    groups.forEach(function(g){
      var pools = groupPools(g);
      var pillsHtml = "";
      pools.forEach(function(pool){
        var st = statuses[pool.id] || "coming-soon";

        else if(st === "complete") pillsHtml += '<span class="gpp gpp-complete">'+pool.icon+' Final</span>';
      });
      if(!pillsHtml) pillsHtml = '<span style="font-size:9px;color:#334155">No active competitions</span>';
      var iconEmoji = "&#127942;";
      for(var i=0;i<pools.length;i++){
        var st2 = statuses[pools[i].id]||"coming-soon";
        if(st2==="open"||st2==="locked"){ iconEmoji = pools[i].icon; break; }
      }
      gh += '<div class="group-card" data-gid="'+x(g.id)+'">';
      gh += '<div class="group-card-icon">'+iconEmoji+'</div>';
      gh += '<div class="group-card-info">';
      gh += '<div class="group-card-name">'+x(g.name||"Unnamed")+'</div>';
      gh += '<div class="group-card-pools">'+pillsHtml+'</div>';
      gh += '</div>';
      gh += '<div class="group-card-arrow">&#8250;</div>';
      gh += '</div>';
    });
    container.innerHTML = gh;
    container.querySelectorAll(".group-card").forEach(function(el){
      el.addEventListener("click", function(){ joinGroupSilent(this.getAttribute("data-gid")); });
    });
  }

  // Load groups from Firebase
  if(myGroupIds.length > 0 && DB) {
    var promises = myGroupIds.map(function(gid){
      return DB.ref("groups/"+gid).once("value").then(function(sn){ return sn.val(); });
    });
    Promise.all(promises).then(function(groups){
      groups = groups.filter(Boolean);
      _allGroupsCache = groups;
      var container = document.getElementById("profile-groups");
      if(!container) return;

      // Compute stats + pts for tier
      var entered = 0, wins = 0, totalPts = 0;
      groups.forEach(function(g){
        var pools = groupPools(g);
        var results = (g.data || {}).results || {};
        pools.forEach(function(pool){
          var r = results[pool.id];
          if(r && (r.first || r.second || r.third) && (g.players||[]).indexOf(u.username) >= 0) {
            entered++;
            if(r.first === u.username)       { wins++; totalPts += 4; }
            else if(r.second === u.username) { totalPts += 2; }
            else if(r.third === u.username)  { totalPts += 1; }
          }
        });
      });

      var se = document.getElementById("pstat-entered");
      var sw = document.getElementById("pstat-wins");
      var sp = document.getElementById("pstat-pts");
      if(se) se.textContent = entered;
      if(sw) sw.textContent = wins;
      if(sp) sp.textContent = totalPts;

      // Render tier bar
      var tierEl = document.getElementById("profile-tier");
      if(tierEl) tierEl.innerHTML = renderTierBar(totalPts);

      renderGroupCards(groups, container);
    });
  } else {
    // No groups — still render tier at 0
    var tierEl = document.getElementById("profile-tier");
    if(tierEl) tierEl.innerHTML = renderTierBar(0);
  }
}

// Join a group the user is already a member of — no password needed
function joinGroupSilent(groupId) {
  if(!DB) return;
  DB.ref("groups/"+groupId).once("value", function(sn){
    var group = sn.val();
    if(!group) { toast("Group not found"); return; }
    SC.group = group;
    SC.group.data = group.data || {statuses:{},results:{}};
    SC.isAdmin = false; SC.isMaster = false;
    SC.groupAdmin = false; SC.showGroupSettings = false;
    SC.screen = "hub";
    saveLastGroup(group.id);
    subscribeGroup(group.id);
    subscribeGroupPlayers(group.id);
    draw();
  });
}

function openInviteModal() {
  var g = SC.group;
  if(!g) return;
  var msg = "Hey! Join my PoolPlay group for the 2026 season 🏆\n\n"
    + "Group: " + g.name + "\n"
    + "Code: " + g.id + "\n"
    + "Password: " + (g.adminPw || "ask me") + "\n\n"
    + "Sign up & join at:\nhttps://pool-play.vercel.app";

  var preview = document.getElementById("invite-msg-preview");
  if(preview) preview.textContent = msg;

  document.getElementById("invite-modal").classList.add("open");

  document.getElementById("invite-sms-btn").onclick = function() {
    // Try native Web Share API first (best on mobile)
    if(navigator.share) {
      navigator.share({ title: "Join my PoolPlay group", text: msg })
        .catch(function(){});
    } else {
      // Fallback: open SMS with pre-filled body
      var encoded = encodeURIComponent(msg);
      window.open("sms:?&body=" + encoded, "_blank");
    }
  };

  document.getElementById("invite-copy-btn").onclick = function() {
    if(navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(msg).then(function(){
        toast("Invite copied to clipboard ✓");
        closeInviteModal();
      });
    } else {
      // Fallback for older browsers
      var ta = document.createElement("textarea");
      ta.value = msg; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand("copy"); toast("Invite copied ✓"); } catch(e){ toast("Copy failed — copy manually"); }
      document.body.removeChild(ta);
      closeInviteModal();
    }
  };

  document.getElementById("invite-cancel-btn").onclick = closeInviteModal;
  document.getElementById("invite-modal").onclick = function(e){ if(e.target===this) closeInviteModal(); };
}
function closeInviteModal() {
  document.getElementById("invite-modal").classList.remove("open");
}

function joinGroup(code) {
  if(!code||code.length<4) { SC.error="Please enter a valid code."; draw(); return; }
  loadGroup(code, function(group, err){
    if(err) { SC.error=err; draw(); return; }

    // If user is already in this group's players list, skip password
    var alreadyMember = SC.currentUser && (group.players||[]).indexOf(SC.currentUser.username) >= 0;

    if(!alreadyMember) {
      var pw = prompt("Password for \""+group.name+"\":");
      if(pw===null) return;
      if(pw!==group.adminPw && pw!==MASTER_PW) {
        SC.error="Wrong password."; draw(); toast("Wrong password"); return;
      }
      // Add user to group's players list
      if(SC.currentUser && pw !== MASTER_PW) {
        var newPlayers = (group.players||[]).slice();
        if(newPlayers.indexOf(SC.currentUser.username) < 0) {
          newPlayers.push(SC.currentUser.username);
          group.players = newPlayers;
          if(DB) DB.ref("groups/"+group.id+"/players").set(newPlayers);
        }
        addGroupToUser(SC.currentUser.username, group.id);
      }
      SC.isAdmin = false;
      SC.isMaster = (pw===MASTER_PW);
      if(pw===MASTER_PW) SC.isAdmin = true;
    } else {
      SC.isAdmin = false; SC.isMaster = false;
    }

    SC.group = group;
    SC.group.data = group.data || {statuses:{},results:{}};
    SC.groupAdmin = false; SC.showGroupSettings = false;
    SC.screen = "hub";
    SC.error = "";
    saveLastGroup(group.id);
    subscribeGroup(group.id);
    subscribeGroupPlayers(group.id);
    draw();
  });
}

// ── EMOJI CACHE ──────────────────────────────────────────────────────────────
var _emojiCache = {}; // username -> emoji
function loadPlayerEmojis(players, cb) {
  var needed = players.filter(function(p){ return !_emojiCache[p]; });
  if(needed.length === 0){ cb(); return; }
  var done = 0;
  needed.forEach(function(p){
    var k = p.toLowerCase().replace(/[^a-z0-9_]/g,"");
    DB.ref("users/"+k+"/emoji").once("value", function(sn){
      _emojiCache[p] = sn.val() || "🎯";
      done++;
      if(done === needed.length) cb();
    });
  });
}
function playerEmoji(username){ return _emojiCache[username] || "🎯"; }

// ── USER MANAGEMENT ───────────────────────────────────────────────────────────
function loadAdminUsers(q) {
  var list = document.getElementById("admin-users-list");
  if(!list) return;
  if(!DB){ list.innerHTML='<div style="color:#334155;font-size:11px;text-align:center;padding:16px">Firebase unavailable</div>'; return; }
  DB.ref("users").once("value", function(sn){
    var all = sn.val()||{};
    var users = Object.values(all).filter(Boolean);
    if(q) users = users.filter(function(u){ return (u.username||"").toLowerCase().indexOf(q.toLowerCase())>=0; });
    users.sort(function(a,b){ return (a.username||"").localeCompare(b.username||""); });
    if(!users.length){ list.innerHTML='<div style="color:#334155;font-size:11px;text-align:center;padding:12px">No users found.</div>'; return; }
    var h='<table style="width:100%;border-collapse:collapse;font-size:11px">';
    h+='<thead><tr>';
    h+='<th style="text-align:left;color:#475569;padding:4px 6px;font-weight:500;font-size:9px;text-transform:uppercase;letter-spacing:.06em">User</th>';
    h+='<th style="text-align:left;color:#475569;padding:4px 6px;font-weight:500;font-size:9px;text-transform:uppercase;letter-spacing:.06em">Groups</th>';
    h+='<th style="text-align:left;color:#475569;padding:4px 6px;font-weight:500;font-size:9px;text-transform:uppercase;letter-spacing:.06em">Password</th>';
    h+='<th></th>';
    h+='</tr></thead><tbody>';
    users.forEach(function(u){
      var em = u.emoji||"🍺";
      var grpCount = (u.groups||[]).length;
      h+='<tr style="border-top:1px solid #0f1923">';
      h+='<td style="padding:7px 6px;color:#f1f5f9;font-weight:600">'+em+' '+x(u.username||"")+'</td>';
      h+='<td style="padding:7px 6px;color:#475569">'+grpCount+' group'+(grpCount!==1?"s":"")+'</td>';
      h+='<td style="padding:7px 6px;color:#334155;font-family:monospace;font-size:10px">'+x(u.password||"")+'</td>';
      h+='<td style="padding:7px 6px;text-align:right"><button class="btn btn-red btn-sm" style="font-size:9px" data-del-user="'+x(u.username||"")+'">Delete</button></td>';
      h+='</tr>';
    });
    h+='</tbody></table>';
    list.innerHTML=h;
    list.querySelectorAll("[data-del-user]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var uname = this.getAttribute("data-del-user");
        if(!confirm("Permanently delete user \""+uname+"\"? This cannot be undone.")) return;
        deleteUser(uname);
      });
    });
  });
}

function deleteUser(username) {
  if(!DB) return;
  var key = userKey(username);
  // Remove from Firebase users node
  DB.ref("users/"+key).remove(function(err){
    if(err){ toast("Delete failed"); return; }
    // Also remove from any groups they're in
    DB.ref("groups").once("value", function(sn){
      var groups = sn.val()||{};
      var updates = {};
      Object.values(groups).forEach(function(g){
        var players = (g.players||[]).filter(function(p){ return p!==username; });
        if(players.length !== (g.players||[]).length){
          updates["groups/"+g.id+"/players"] = players;
        }
      });
      if(Object.keys(updates).length>0){
        DB.ref().update(updates, function(){ toast("User \""+username+"\" deleted ✓"); loadAdminUsers((document.getElementById("user-search")||{}).value||""); });
      } else {
        toast("User \""+username+"\" deleted ✓");
        loadAdminUsers((document.getElementById("user-search")||{}).value||"");
      }
    });
  });
}

function saveAdminResults() {
  var newResults = {};
  POOL_LIBRARY.forEach(function(pool){
    var r={};
    ["first","second","third"].forEach(function(place){
      var el=document.getElementById("admin-res-"+pool.id+"-"+place);
      if(el&&el.value) r[place]=el.value;
    });
    if(Object.keys(r).length>0) newResults[pool.id]=r;
  });
  if(DB) DB.ref("globalSettings/results").set(newResults, function(){ toast("Results saved &#10003;"); });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setStatus(poolId, status) {
  SC.globalStatuses[poolId] = status;
  if(DB) DB.ref("globalSettings/statuses/"+poolId).set(status, function(){ toast("Status updated &#10003;"); });
  draw();
}

function saveResults() {
  if(!SC.group) return;
  var pools = groupPools(SC.group);
  if(!SC.group.data) SC.group.data={statuses:{},results:{}};
  if(!SC.group.data.results) SC.group.data.results={};
  var newResults = {};
  pools.forEach(function(pool){
    var r={};
    ["first","second","third"].forEach(function(place){
      var el=document.getElementById("res-"+pool.id+"-"+place);
      if(el&&el.value) r[place]=el.value;
    });
    if(Object.keys(r).length>0) newResults[pool.id]=r;
  });
  pools.forEach(function(pool){
    if(newResults[pool.id]) SC.group.data.results[pool.id]=newResults[pool.id];
    else delete SC.group.data.results[pool.id];
  });
  saveGroupData();
  draw();
  toast("Results saved &#10003;");
}

function saveGroupSettings() {
  if(!SC.group || !SC.isAdmin || SC.isMaster) return;
  if(SC.group.pools.length===0){ toast("Select at least one competition"); return; }
  if(DB) {
    DB.ref("groups/"+SC.group.id+"/pools").set(SC.group.pools, function(){ toast("Settings saved &#10003;"); });
  }
  SC.showGroupSettings = false;
  draw();
}

function calcStandings(g, data) {
  var scores={}, finishes={};
  var players = g.players||[];
  players.forEach(function(p){ scores[p]=0; finishes[p]={}; });
  var pools = groupPools(g);
  pools.forEach(function(pool){
    var r=(data.results||{})[pool.id]; if(!r) return;
    if(r.first&&scores[r.first]!==undefined){scores[r.first]+=4;finishes[r.first][pool.id]=1;}
    if(r.second&&scores[r.second]!==undefined){scores[r.second]+=2;finishes[r.second][pool.id]=2;}
    if(r.third&&scores[r.third]!==undefined){scores[r.third]+=1;finishes[r.third][pool.id]=3;}
  });
  return players.slice().sort(function(a,b){return scores[b]-scores[a];})
    .map(function(p){return{name:p,pts:scores[p],finishes:finishes[p]};});
}

function deleteGroup(groupId) {
  if(!DB) return;
  DB.ref("groups/"+groupId).remove(function(err){
    if(err){ toast("Delete failed"); return; }
    _groupsCache = null;
    SC.group=null; SC.isAdmin=false; SC.isMaster=false; SC.groupAdmin=false; SC.showGroupSettings=false; SC.screen="landing";
    try{ localStorage.removeItem("pp_last_group"); }catch(e){}
    draw(); toast("Group deleted");
  });
}

// ── GROUP SEARCH ──────────────────────────────────────────────────────────────
var _groupsCache = null, _groupsCacheTime = 0;

function loadAllGroups(cb) {
  var now = Date.now();
  if(_groupsCache && now - _groupsCacheTime < 15000) { cb(_groupsCache); return; }
  if(DB) {
    DB.ref("groups").once("value", function(sn){
      var val = sn.val()||{};
      _groupsCache = Object.values(val);
      _groupsCacheTime = Date.now();
      cb(_groupsCache);
    });
  } else cb([]);
}

function renderGroupsTableTo(tbodyId, groups, query) {
  var tbody = document.getElementById(tbodyId);
  if(!tbody) return;
  var q = (query||"").toLowerCase().trim();
  var filtered = groups.filter(function(g){
    if(!q) return true;
    return (g.name||"").toLowerCase().indexOf(q)>=0 || (g.id||"").toLowerCase().indexOf(q)>=0;
  });
  if(filtered.length===0){
    tbody.innerHTML = '<tr><td colspan="4" class="no-results">'+(q?"No groups match your search":"No groups yet — be the first!")+'</td></tr>';
    return;
  }
  var h = "";
  filtered.forEach(function(g){
    var playerList = (g.players||[]).slice(0,3).join(", ")+(g.players&&g.players.length>3?" +":"");
    h += '<tr class="clickable-row" data-gid="'+x(g.id)+'">';
    h += '<td class="group-name-cell">'+x(g.name||"Unnamed")+'</td>';
    h += '<td class="group-code-cell">'+x(g.id)+'</td>';
    h += '<td>'+x(playerList)+'</td>';
    h += '<td><span class="join-link">Join &#8250;</span></td></tr>';
  });
  tbody.innerHTML = h;
  tbody.querySelectorAll("tr.clickable-row").forEach(function(el){
    el.addEventListener("click", function(){ joinGroup(this.getAttribute("data-gid")); });
  });
}

function renderGroupsTable(groups, query) { renderGroupsTableTo("groups-tbody", groups, query); }

// ── GLOBAL STATUSES ───────────────────────────────────────────────────────────
function subscribeGlobalStatuses() {
  if(!DB) return;
  DB.ref("globalSettings/statuses").on("value", function(sn){
    SC.globalStatuses = sn.val() || {};
    if(SC.screen==="hub"||SC.screen==="landing") draw();
  });
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
(function(){
  if(DB) subscribeGlobalStatuses();

  // Check for saved session
  var savedUser = loadSession();
  if(!savedUser) { draw(); return; }

  // Re-load user from Firebase
  var key = savedUser.toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(DB) {
    DB.ref("users/"+key).once("value", function(sn){
      var u = sn.val();
      if(u) {
        SC.currentUser = { username: u.username, groups: u.groups||[], emoji: u.emoji||"🎯" };
        var last = loadLastGroup();
        if(last) {
          loadGroup(last, function(group, err){
            if(group){
              SC.group = group;
              SC.group.data = group.data || {statuses:{},results:{}};
              SC.screen = "hub";
              subscribeGroup(group.id);
              subscribeGroupPlayers(group.id);
            } else {
              SC.screen = "landing";
            }
            draw();
          });
        } else {
          SC.screen = "landing";
          draw();
        }
      } else {
        // User record gone — clear session
        clearSession();
        draw();
      }
    });
  } else {
    draw();
  }
})();
</script>

<script>
var _copy = { poolId:null, poolName:null, targetGroup:null, sourceUser:null };

function openCopyModal(poolId, poolName) {
  _copy = { poolId:poolId, poolName:poolName, targetGroup:null, sourceUser:null };
  document.getElementById("copy-sub").textContent = 'Copy "'+poolName+'" picks · '+(SC.group?SC.group.name:'');
  setCopyStep(1);
  document.getElementById("copy-modal").classList.add("open");
  var list = document.getElementById("copy-group-list");
  list.innerHTML = '<div style="color:#334155;font-size:11px;text-align:center;padding:16px">Loading...</div>';
  if(!DB){ list.innerHTML='<div style="color:#ef4444;font-size:11px;text-align:center;padding:16px">Firebase unavailable</div>'; return; }
  DB.ref("groups").once("value", function(sn){
    var all = sn.val()||{};
    var eligible = Object.values(all).filter(function(g){
      return (g.pools||[]).indexOf(poolId)>=0 && g.id!==(SC.group?SC.group.id:null);
    });
    if(eligible.length===0){ list.innerHTML='<div style="color:#475569;font-size:11px;text-align:center;padding:16px">No other groups have this competition open.</div>'; return; }
    list.innerHTML="";
    eligible.forEach(function(g){
      var row=document.createElement("div"); row.className="copy-group-row";
      var players=(g.players||[]).slice(0,3).join(", ")+(g.players&&g.players.length>3?" +":"");
      row.innerHTML='<div style="flex:1"><div class="cg-name">'+x(g.name||"Unnamed")+'</div><div class="cg-players">'+x(players)+'</div></div><div class="cg-code">'+x(g.id)+'</div><span style="color:#475569;font-size:14px;margin-left:6px">&#8250;</span>';
      row.addEventListener("click",function(){
        _copy.targetGroup=g;
        document.getElementById("copy-target-label").textContent=g.name||g.id;
        document.getElementById("copy-pw-input").value="";
        document.getElementById("copy-pw-err").textContent="";
        setCopyStep(2);
        setTimeout(function(){var el=document.getElementById("copy-pw-input");if(el)el.focus();},100);
      });
      list.appendChild(row);
    });
  });
}

function setCopyStep(n){[1,2,3,4].forEach(function(i){var el=document.getElementById("copy-step-"+i);if(el)el.classList.toggle("active",i===n);});}
function closeCopyModal(){document.getElementById("copy-modal").classList.remove("open");_copy={poolId:null,poolName:null,targetGroup:null,sourceUser:null};}

function confirmCopyPassword(){
  if(!_copy.targetGroup)return;
  var pw=document.getElementById("copy-pw-input").value;
  var errEl=document.getElementById("copy-pw-err");
  if(!pw){errEl.textContent="Please enter the group password";return;}
  if(pw!==_copy.targetGroup.adminPw&&pw!==MASTER_PW){errEl.textContent="Wrong password — try again";return;}
  errEl.textContent="";
  var srcGrid=document.getElementById("copy-src-grid"); srcGrid.innerHTML="";
  var srcPlayers=SC.group?(SC.group.players||[]):[];
  if(srcPlayers.length===0){toast("No players in source group");closeCopyModal();return;}
  srcPlayers.forEach(function(player){
    var btn=document.createElement("button"); btn.className="copy-user-btn"; btn.textContent=player;
    btn.addEventListener("click",function(){
      _copy.sourceUser=player;
      var dstGrid=document.getElementById("copy-dst-grid"); dstGrid.innerHTML="";
      document.getElementById("copy-target-label-2").textContent=_copy.targetGroup.name||_copy.targetGroup.id;
      document.getElementById("copy-src-label").textContent=player;
      (_copy.targetGroup.players||[]).forEach(function(tp){
        var tbtn=document.createElement("button"); tbtn.className="copy-user-btn"; tbtn.textContent=tp;
        tbtn.addEventListener("click",function(){executeCopy(tp);});
        dstGrid.appendChild(tbtn);
      });
      setCopyStep(4);
    });
    srcGrid.appendChild(btn);
  });
  setCopyStep(3);
}

function executeCopy(targetUser){
  if(!_copy.targetGroup||!_copy.poolId||!_copy.sourceUser||!SC.group||!DB)return;
  var sourceBase="groups/"+SC.group.id+"/data/"+_copy.poolId;
  var destBase="groups/"+_copy.targetGroup.id+"/data/"+_copy.poolId;
  DB.ref(sourceBase+"/picks/"+_copy.sourceUser).once("value",function(sn){
    var picks=sn.val();
    if(!picks||Object.keys(picks).length===0){toast(_copy.sourceUser+" has no picks to copy");closeCopyModal();return;}
    DB.ref(destBase+"/picks/"+targetUser).set(picks,function(err){
      if(err)toast("Copy failed");
      else{toast(_copy.sourceUser+"\u2192"+targetUser+" copied \u2713");closeCopyModal();}
    });
  });
}

(function(){
  document.getElementById("copy-modal").addEventListener("click",function(e){if(e.target===this)closeCopyModal();});
  ["copy-cancel","copy-cancel-2","copy-cancel-3","copy-cancel-4"].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener("click",closeCopyModal);});
  document.getElementById("copy-back-2").addEventListener("click",function(){setCopyStep(1);});
  document.getElementById("copy-back-3").addEventListener("click",function(){setCopyStep(2);});
  document.getElementById("copy-back-4").addEventListener("click",function(){setCopyStep(3);});
  document.getElementById("copy-pw-confirm").addEventListener("click",confirmCopyPassword);
  document.getElementById("copy-pw-input").addEventListener("keydown",function(e){if(e.key==="Enter")confirmCopyPassword();});
})();
</script>
