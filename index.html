<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<title>SCORECERY</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#f8f5f0;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee;--shadow:#111111
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button,input,select{font-family:'Nunito',sans-serif}
.topbar{position:sticky;top:0;z-index:50;background:#ffffff;border-bottom:3px solid var(--border);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px;box-shadow:0 3px 0 var(--border);overflow:hidden}
.logo{font-size:17px;font-weight:900;color:var(--text);letter-spacing:-.02em;flex-shrink:0;white-space:nowrap}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:-1px;font-weight:700}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.btn-topbar-login{font-size:9px;font-weight:800;padding:4px 10px;border-radius:8px;border:2px solid var(--border);background:#ffffff;color:var(--text);cursor:pointer;box-shadow:2px 2px 0 var(--border);white-space:nowrap}
.btn-topbar-login:active{transform:translate(2px,2px);box-shadow:none}
.btn-topbar-signup{font-size:9px;font-weight:800;padding:4px 10px;border-radius:8px;border:2px solid var(--border);background:var(--gold);color:var(--text);cursor:pointer;box-shadow:2px 2px 0 var(--border);white-space:nowrap}
.btn-topbar-signup:active{transform:translate(2px,2px);box-shadow:none}
.btn{border-radius:8px;padding:6px 14px;font-size:11px;font-weight:800;border:2px solid var(--border);cursor:pointer;box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-primary{background:var(--blue-bg);color:var(--blue)}
.btn-gold{background:var(--gold);color:var(--text)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-red{background:var(--red-bg);color:var(--red)}
.btn-purple{background:var(--purple-bg);color:var(--purple)}
.btn-sm{padding:0 9px;font-size:10px;height:26px;line-height:26px;display:inline-flex;align-items:center;justify-content:center}
.main{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:20px 14px 60px}
/* AUTH */
.auth-wrap{display:flex;flex-direction:column;align-items:center;padding:40px 20px 20px;gap:0;text-align:center}
.auth-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-modal-box{background:#ffffff;border:3px solid var(--border);border-radius:16px;width:100%;max-width:360px;padding:24px 20px;position:relative;box-shadow:5px 5px 0 var(--border)}
.auth-modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0;font-weight:800}
.auth-logo{font-size:48px;font-weight:900;color:var(--text);letter-spacing:-.02em;line-height:1;margin-bottom:4px}
.auth-logo span{color:var(--gold-dark)}
.auth-sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px;font-weight:700}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;width:100%;max-width:340px;background:var(--cream);border:2px solid var(--border);border-radius:10px;padding:3px;box-shadow:3px 3px 0 var(--border)}
.auth-tab{flex:1;padding:7px;border-radius:7px;font-size:12px;font-weight:800;border:none;cursor:pointer;background:none;color:var(--muted)}
.auth-tab.active{background:var(--gold);color:var(--text);border:2px solid var(--border);box-shadow:2px 2px 0 var(--border)}
.auth-card{width:100%;max-width:340px}
.auth-field{margin-bottom:12px;text-align:left}
.auth-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block;font-weight:800}
.auth-input{width:100%;background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-weight:700;outline:none;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.auth-input:focus{border-color:var(--blue);box-shadow:2px 2px 0 var(--blue)}
.auth-input::placeholder{color:var(--dim)}
.auth-btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:800;border:2px solid var(--border);cursor:pointer;margin-top:4px;background:var(--gold);color:var(--text);font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.auth-btn:active{transform:translate(3px,3px);box-shadow:none}
.auth-err{font-size:10px;color:var(--red);min-height:16px;margin-bottom:8px;text-align:center;font-weight:700}
/* LANDING */
.landing{display:flex;flex-direction:column;align-items:center;padding:36px 20px 16px;gap:6px;text-align:center}
.landing-logo{font-size:48px;font-weight:900;color:var(--text);letter-spacing:-.02em;line-height:1;margin-bottom:4px}
.landing-logo span{color:var(--gold-dark)}
.landing-sub{font-size:12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px;font-weight:700}
.landing-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.landing-btn{padding:14px;border-radius:10px;font-size:14px;font-weight:800;border:2px solid var(--border);cursor:pointer;text-align:center;font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.landing-btn:active{transform:translate(3px,3px);box-shadow:none}
.landing-btn-primary{background:var(--gold);color:var(--text)}
.landing-btn-secondary{background:#ffffff;color:var(--text)}
.landing-divider{font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin:4px 0;font-weight:800}
/* CARD / FORM */
.card{background:#ffffff;border:2px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:4px 4px 0 var(--border)}
.card-title{font-size:14px;font-weight:900;color:var(--text);margin-bottom:4px}
.card-sub{font-size:10px;color:var(--muted);margin-bottom:16px;font-weight:700}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block;font-weight:800}
.form-input{width:100%;background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-weight:700;outline:none;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.form-input:focus{border-color:var(--blue);box-shadow:2px 2px 0 var(--blue)}
.form-input::placeholder{color:var(--dim)}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.players-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
.player-entry{display:flex;gap:6px;align-items:center}
.player-entry .form-input{flex:1}
.remove-player{width:28px;height:28px;border-radius:6px;background:#ffffff;border:2px solid var(--border);color:var(--muted);font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 var(--border)}
.remove-player:active{transform:translate(2px,2px);box-shadow:none}
.add-player-btn{font-size:11px;font-weight:800;color:var(--blue);background:none;border:none;cursor:pointer;padding:2px 0;display:inline-flex;align-items:center;gap:4px}
.error-msg{font-size:10px;color:var(--red);min-height:16px;margin-top:5px;font-weight:700}
/* POOLS TOGGLE */
.pools-toggle{display:flex;flex-direction:column;gap:6px}
.pool-toggle-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--cream);border-radius:10px;border:2px solid var(--border2);cursor:pointer;box-shadow:2px 2px 0 var(--border2)}
.pool-toggle-row.active{border-color:var(--border);background:var(--gold-bg);box-shadow:2px 2px 0 var(--border)}
.pool-toggle-icon{font-size:16px;width:28px;text-align:center}
.pool-toggle-name{flex:1;font-size:12px;font-weight:800}
.pool-toggle-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.pool-toggle-row.active .pool-toggle-check{background:var(--border);border-color:var(--border);color:#fff}
/* SECTION LABEL */
.section-label{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;margin-top:20px}
.section-label:first-child{margin-top:0}
/* ADMIN PANEL */
.admin-panel{background:#ffffff;border:2px solid var(--border);border-radius:12px;padding:14px;box-shadow:4px 4px 0 var(--border)}
.admin-panel-title{font-size:13px;font-weight:900;color:var(--text);margin-bottom:10px}
.pool-controls{display:flex;flex-direction:column;gap:10px}
.pool-control-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.pcr-name{font-size:12px;font-weight:800;color:var(--text);flex:1;min-width:120px}
.pcr-btns{display:flex;gap:5px;flex-wrap:wrap}
.pcr-btn{font-size:10px;font-weight:800;padding:5px 10px;border-radius:8px;border:2px solid var(--border2);background:var(--cream);color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.pcr-btn:active{transform:translate(1px,1px)}
.pcr-btn.sel-open{background:var(--green-bg);color:var(--green);border-color:var(--border);box-shadow:2px 2px 0 var(--border)}
.pcr-btn.sel-locked{background:var(--red-bg);color:var(--red);border-color:var(--border);box-shadow:2px 2px 0 var(--border)}
.pcr-btn.sel-soon{background:var(--card2);color:var(--text);border-color:var(--border);box-shadow:2px 2px 0 var(--border)}
.pcr-btn.sel-complete{background:var(--blue-bg);color:var(--blue);border-color:var(--border);box-shadow:2px 2px 0 var(--border)}
.result-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border2)}
.result-row:last-child{border-bottom:none}
.result-pool-name{font-size:12px;font-weight:800;color:var(--text);width:78px;flex-shrink:0}
.result-selects{display:flex;gap:6px;flex:1;min-width:0}
.result-select{flex:1;min-width:0;background:var(--cream);border:2px solid var(--border2);border-radius:8px;padding:7px 6px;color:var(--text);font-size:11px;font-weight:700;outline:none;font-family:'Nunito',sans-serif}
.result-select:focus{border-color:var(--blue)}
.save-results-btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:800;border:2px solid var(--border);cursor:pointer;background:var(--gold);color:var(--text);font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border);transition:transform .1s,box-shadow .1s}
.save-results-btn:active{transform:translate(3px,3px);box-shadow:none}
/* STANDINGS */
.standings-card{background:#ffffff;border:2px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:4px 4px 0 var(--border)}
.standings-head{padding:10px 14px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:center}
.standings-title{font-size:13px;font-weight:900;color:var(--text)}
.standings-sub{font-size:9px;font-weight:800;color:var(--muted)}
.player-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border2)}
.player-row:last-child{border-bottom:none}
.player-rank{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;border:2px solid var(--border2)}
.rank-1{background:var(--gold-bg);border-color:var(--border);color:var(--gold-dark)}
.rank-2{background:#f5f5f5;border-color:var(--border2);color:var(--muted)}
.rank-3{background:#fff5e8;border-color:var(--border2);color:#b45309}
.rank-other{background:#ffffff;border-color:var(--border2);color:var(--dim)}
.player-name{font-size:12px;font-weight:800;flex:1}
.player-pts{font-size:14px;font-weight:900;color:var(--text)}
.player-pts-label{font-size:8px;font-weight:800;color:var(--muted)}
.finish-dots{display:flex;gap:3px;margin-right:6px}
.fdot{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;border:2px solid var(--border)}
.fdot-1{background:var(--gold-bg);color:var(--gold-dark)}
.fdot-2{background:#f5f5f5;color:var(--muted)}
.fdot-3{background:#fff5e8;color:#b45309}
.fdot-x{background:var(--cream);color:var(--dim)}
/* HUB */
.hub-wrap{padding:0}
.hub-pool-card{background:#ffffff;border:2px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:4px 4px 0 var(--border)}
.hub-pool-head{display:flex;align-items:flex-start;gap:12px;padding:14px 14px 10px}
.hub-pool-icon{width:44px;height:44px;border-radius:10px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--cream);box-shadow:2px 2px 0 var(--border)}
.hub-pool-info{flex:1;min-width:0}
.hub-pool-name{font-size:15px;font-weight:900;color:var(--text)}
.hub-pool-sub{font-size:9px;color:var(--muted);font-weight:700;margin-top:2px}
.hub-pool-status{display:flex;gap:6px;align-items:center;padding:0 14px 10px}
.hub-pill{font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border)}
.hub-pill-open{background:var(--green-bg);color:var(--green)}
.hub-pill-locked{background:var(--red-bg);color:var(--red)}
.hub-pill-soon{background:var(--cream);color:var(--muted)}
.hub-pool-lb{padding:0 14px 12px}
.hub-pool-lb-row{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid var(--border2)}
.hub-pool-lb-row:last-child{border-bottom:none}
.hub-pool-lb-rank{font-size:11px;font-weight:900;width:16px;color:var(--muted)}
.hub-pool-lb-name{font-size:12px;font-weight:800;color:var(--text);flex:1}
.hub-pool-lb-pts{font-size:11px;font-weight:900;color:var(--blue)}
/* GROUPS TABLE */
.groups-table{width:100%;border-collapse:collapse}
.groups-table th{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:8px 12px;border-bottom:2px solid var(--border2);text-align:left;background:var(--cream)}
.groups-table td{padding:10px 12px;font-size:12px;font-weight:700;border-bottom:1px solid var(--border2);color:var(--text)}
.groups-table tr:last-child td{border-bottom:none}
.groups-table tr:active td{background:var(--cream)}
.group-name-cell{font-weight:900}
.join-link{font-size:10px;font-weight:800;padding:4px 10px;background:var(--gold-bg);border:2px solid var(--border);border-radius:8px;color:var(--text);box-shadow:2px 2px 0 var(--border);white-space:nowrap;cursor:pointer;display:inline-block;margin:2px 0}
.join-link:active{transform:translate(2px,2px);box-shadow:none}
/* SEARCH */
.search-wrap{display:flex;align-items:center;gap:8px;background:#ffffff;border:2px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:8px;box-shadow:3px 3px 0 var(--border)}
.search-icon{font-size:14px;color:var(--muted)}
.search-input{flex:1;border:none;background:none;color:var(--text);font-size:13px;font-weight:700;outline:none;font-family:'Nunito',sans-serif}
.search-input::placeholder{color:var(--dim)}
/* PROFILE */
.home-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-top:4px}
.home-greeting{font-size:20px;font-weight:900;color:var(--text)}
.home-greeting span{color:var(--gold-dark)}
.home-avatar{width:42px;height:42px;border-radius:10px;background:var(--cream);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0;box-shadow:2px 2px 0 var(--border)}
.home-avatar:active{transform:translate(2px,2px);box-shadow:none}
.pstat{background:#ffffff;border:2px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;box-shadow:4px 4px 0 var(--border)}
.pstat-val{font-size:28px;font-weight:900;color:var(--text);line-height:1;margin-bottom:3px}
.pstat-val.gold{color:var(--gold-dark)}
.pstat-val.blue{color:var(--blue)}
.pstat-val.green{color:var(--green)}
.pstat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:800}
.pstat.pstat-blue{background:var(--blue-bg);border-color:var(--border)}
.pstat.pstat-gold{background:var(--gold-bg);border-color:var(--border)}
.pstat.pstat-green{background:var(--green-bg);border-color:var(--border)}
/* GCARD */
.gcard{background:#ffffff;border:2px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;cursor:pointer;box-shadow:4px 4px 0 var(--border)}
.gcard:active{transform:translate(4px,4px);box-shadow:none}
.gcard-head{display:flex;align-items:flex-start;gap:10px;padding:12px 14px 10px}
.gcard-icon{width:34px;height:34px;border-radius:8px;background:var(--cream);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:2px 2px 0 var(--border)}
.gcard-name{font-size:15px;font-weight:900;color:var(--text);flex:1}
.gcard-arrow{font-size:18px;color:var(--dim);font-weight:900}
.gcard-pills{display:flex;gap:4px;flex-wrap:wrap;padding:0 14px 8px}
.gcard-divider{height:2px;background:var(--border2);margin:0 14px}
.gcard-standings{padding:8px 14px 12px}
.gcard-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.gcard-rank{width:18px;font-size:10px;font-weight:900;color:var(--muted);text-align:center;flex-shrink:0}
.gcard-rank.r1{color:var(--gold-dark)}.gcard-rank.r2{color:var(--muted)}.gcard-rank.r3{color:#b45309}
.gcard-player{font-size:12px;font-weight:700;color:var(--muted);flex:1}
.gcard-player.me{color:var(--blue);font-weight:900}
.gcard-pts{font-size:11px;font-weight:900;color:var(--dim)}
.gcard-pts.me{color:var(--blue)}
.gcard-you{font-size:8px;font-weight:800;color:var(--text);background:var(--gold);border:2px solid var(--border);border-radius:4px;padding:1px 5px;flex-shrink:0}
.home-empty{background:#ffffff;border:2px dashed var(--border2);border-radius:14px;padding:32px 20px;text-align:center;margin-bottom:12px}
.home-empty-icon{font-size:36px;margin-bottom:10px}
.home-empty-txt{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px}
/* POOL CARD IN HUB */
.pool-card{background:#ffffff;border:2px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;cursor:pointer;box-shadow:4px 4px 0 var(--border)}
.pool-card:active{transform:translate(4px,4px);box-shadow:none}
.pool-card-head{display:flex;align-items:center;gap:12px;padding:14px}
.pool-card-icon{width:44px;height:44px;border-radius:10px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--cream);box-shadow:2px 2px 0 var(--border)}
.pool-card-info{flex:1;min-width:0}
.pool-card-name{font-size:15px;font-weight:900;color:var(--text)}
.pool-card-sub{font-size:9px;color:var(--muted);font-weight:700}
.pool-card-status{font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border)}
.pool-status-open{background:var(--green-bg);color:var(--green)}
.pool-status-locked{background:var(--red-bg);color:var(--red)}
.pool-status-soon{background:var(--cream);color:var(--muted)}
/* MEMBERS */
.member-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border2);background:#ffffff}
.member-row:last-child{border-bottom:none}
.member-emoji{font-size:20px;width:32px;text-align:center;flex-shrink:0}

  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;background:var(--bg)">

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script>
// ── POOL LIBRARY ─────────────────────────────────────────────────────────────
var POOL_LIBRARY = [
  {id:"rwc",    name:"Conference Tourney Picks", icon:"&#127936;", bg:"linear-gradient(135deg,#1d428a,#6366f1)", url:"rwc-bracket-challenge.html", desc:"Power 5 Conference Tourneys", dates:"Mar 10-15"},
  {id:"masters",name:"Masters Pool",             icon:"&#9971;",   bg:"linear-gradient(135deg,#065f46,#10b981)", url:"masters.html",               desc:"Augusta National",            dates:"Apr 10-13"},
  {id:"wc",     name:"2026 World Cup",           icon:"&#9917;",   bg:"linear-gradient(135deg,#7c3aed,#c026d3)", url:"worldcup.html",               desc:"48 Teams · USA/Mexico/Canada",dates:"Jun 11-Jul 19"},
  {id:"cws",    name:"College World Series",     icon:"&#9918;",   bg:"linear-gradient(135deg,#7c2d12,#ef4444)", url:"cws.html",                    desc:"TD Ameritrade Park",          dates:"Jun 13-24"},
  {id:"nhl",    name:"Stanley Cup Playoffs",     icon:"&#127954;", bg:"linear-gradient(135deg,#0c1445,#3b82f6)", url:"nhl.html",                    desc:"NHL Playoff Bracket",         dates:"Apr-Jun 2026"},
  {id:"cfb",    name:"CFB Confidence Pool",      icon:"&#127944;", bg:"linear-gradient(135deg,#4c1d95,#a78bfa)", url:"cfbpool.html",                desc:"10-Game Spread Picks",        dates:"Fall 2026"}
];

var MASTER_PW = "Sloop";

// ── STATE ────────────────────────────────────────────────────────────────────
var SC = {
  screen: "home",       // "auth" | "profile" | "join" | "created" | "hub" | "admin"
  authTab: "login",     // "login" | "signup"
  currentUser: null,    // { username, groups:[], emoji }
  group: null,
  isAdmin: false,
  isMaster: false,
  groupAdmin: false,
  showGroupSettings: false,
  globalStatuses: {},
  createForm: { name:"", adminPw:"", pools:[] },
  joinCode: "",
  error: ""
};

var DB = null;
try {
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks",appId:"1:965978379243:web:35f9db9a664f9170e27fae"});
  DB = firebase.database();
} catch(e) {}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function x(s){ var t=String(s||""); t=t.replace(/&/g,"&amp;"); t=t.replace(/</g,"&lt;"); t=t.replace(/>/g,"&gt;"); t=t.replace(/'/g,"&#39;"); return t; }
function toast(msg){ var t=document.getElementById("toast"); t.innerHTML=msg; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},2400); }
function randCode() {
  var chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  var s="";
  for(var i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function poolById(id){ for(var i=0;i<POOL_LIBRARY.length;i++) if(POOL_LIBRARY[i].id===id) return POOL_LIBRARY[i]; return null; }
function groupPools(g){ return (g.pools||[]).map(function(id){ return poolById(id); }).filter(Boolean); }

// ── SESSION STORAGE ───────────────────────────────────────────────────────────
function saveSession(username, emoji){
  try{ localStorage.setItem("pp_user", username); }catch(e){}
  try{ if(emoji) localStorage.setItem("pp_emoji", emoji); }catch(e){}
}
function loadSession(){
  try{ return localStorage.getItem("pp_user"); }catch(e){ return null; }
}
function clearSession(){
  try{ localStorage.removeItem("pp_user"); localStorage.removeItem("pp_last_group"); localStorage.removeItem("pp_guest"); }catch(e){}
}
function saveLastGroup(groupId){
  try{ localStorage.setItem("pp_last_group", groupId); }catch(e){}
}
function loadLastGroup(){
  try{ return localStorage.getItem("pp_last_group"); }catch(e){ return null; }
}
function isFirstVisitToday(){
  try{
    var d = new Date();
    var today = d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
    var last = localStorage.getItem("pp_last_visit");
    localStorage.setItem("pp_last_visit", today);
    return last !== today;
  }catch(e){ return false; }
}
function generateGuestName(){
  var num = Math.floor(1000 + Math.random() * 9000);
  return "Guest" + num;
}
function isGuest(){
  if(SC.currentUser && SC.currentUser.isGuest) return true;
  try{ return localStorage.getItem("pp_guest")==="1"; }catch(e){ return false; }
}
function saveGuest(name){
  try{
    localStorage.setItem("pp_user", name);
    localStorage.setItem("pp_guest", "1");
    localStorage.setItem("pp_guest_name", name);
    localStorage.setItem("pp_emoji", "🎯");
  }catch(e){}
}
function createGuestSession(){
  var newGuest = generateGuestName();
  SC.currentUser = { username: newGuest, groups: [], emoji: "🎯", isGuest: true };
  try { localStorage.setItem("pp_guest","1"); } catch(e) {}
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function authSignup(username, cb) {
  if(!username || username.length < 2) { cb("Username must be at least 2 characters"); return; }
  var newKey = username.toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(newKey !== username.toLowerCase()) { cb("Username can only contain letters, numbers and underscores"); return; }
  if(!DB) { cb("No database connection"); return; }
  DB.ref("users/"+newKey).once("value", function(sn){
    var existing = sn.val();
    var currentKey = SC.currentUser ? userKey(SC.currentUser.username) : null;
    if(existing && newKey !== currentKey) { cb("Username already taken — choose another"); return; }
    if(!SC.currentUser){ cb("No current session"); return; }
    var oldKey = userKey(SC.currentUser.username);
    DB.ref("users/"+oldKey).once("value", function(oldSn){
      var oldData = oldSn.val()||{};
      var newData = { username: username, groups: oldData.groups||[], emoji: oldData.emoji||"🎯" };
      if(oldData.googleUid) newData.googleUid = oldData.googleUid;
      DB.ref("users/"+newKey).set(newData, function(err){
        if(err){ cb("Failed to save — check connection"); return; }
        if(oldKey !== newKey) DB.ref("users/"+oldKey).remove();
        if(oldData.googleUid) DB.ref("googleUsers/"+oldData.googleUid).set(username);
        var namesToMatch = [SC.currentUser.username, oldKey].filter(function(v,i,a){ return v && a.indexOf(v)===i; });
        DB.ref("groups").once("value", function(gsn){
          var groups = gsn.val()||{};
          var updates = {};
          Object.values(groups).forEach(function(g){
            if(!g||!g.players) return;
            var idx = -1;
            for(var i=0;i<namesToMatch.length;i++){ idx=g.players.indexOf(namesToMatch[i]); if(idx>=0) break; }
            if(idx>=0){ var np=g.players.slice(); np[idx]=username; updates["groups/"+g.id+"/players"]=np; }
          });
          var finish = function(){
            try{ localStorage.removeItem("pp_guest"); }catch(e){}
            cb(null, { username: username, groups: newData.groups, emoji: newData.emoji });
          };
          if(Object.keys(updates).length>0) DB.ref().update(updates, finish); else finish();
        });
      });
    });
  });
}

function authLogin(username, cb) {
  if(!username) { cb("Enter your username"); return; }
  var key = username.toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(!DB) { cb("No database connection"); return; }
  DB.ref("users/"+key).once("value", function(sn){
    var u = sn.val();
    if(!u) { cb("Username not found"); return; }
    cb(null, { username: u.username, groups: u.groups || [], emoji: u.emoji || "🎯" });
  });
}

// ── PICK DATA MIGRATION ON RENAME ───────────────────────────────────────────────
// Pool pages key picks/locks by a normalized version of the player's name.
// cfb/cws/wc use "pukey" (spaces -> underscores); rwc uses the raw display name.
function pukey(n){ return String(n||"").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,""); }
var POOL_DATA_KEY = { cfb:"cfbpool", cws:"cws2026", wc:"wc2026", rwc:"rwc" };

// ── CWS SCORING TABLE ────────────────────────────────────────────────────────
// cws.html never syncs computed "scores" to the group — it only writes /picks
// and /results under groups/{id}/data/cws2026. To show CWS standings on the
// hub we replicate cws.html's GAME_PTS table here and compute scores from the
// raw picks+results data ourselves.
var CWS_GAME_PTS = {
  r_la:2, r_wvu:2, sr1:4,
  r_atl:2, r_law:2, sr2:4,
  r_ath:2, r_stk:2, sr3:4,
  r_aub:2, r_lin:2, sr4:4,
  r_chh:2, r_cst:2, sr5:4,
  r_aus:2, r_eug:2, sr6:4,
  r_tus:2, r_tal:2, sr7:4,
  r_gvl:2, r_hat:2, sr8:4,
  pod_b1:8, pod_b2:8,
  champ:15
};
var CWS_GRAND_MAX = Object.keys(CWS_GAME_PTS).reduce(function(sum,k){ return sum + CWS_GAME_PTS[k]; }, 0);
function calcCwsScore(picksForUser, results){
  picksForUser = picksForUser || {}; results = results || {};
  var total = 0;
  Object.keys(CWS_GAME_PTS).forEach(function(gid){
    var pick = picksForUser[gid], res = results[gid];
    if(pick && res && pick===res) total += CWS_GAME_PTS[gid];
  });
  return total;
}

// ── LIVE POOL SCORE (in-progress, pre-placement) ─────────────────────────────
// Returns a player's current live score for a pool, or null if they have no
// picks / there's no live data yet. Used to surface in-progress standings on
// the hub leaderboard before an admin records final 1st/2nd/3rd placements.
function getLivePoolScore(poolId, player, data) {
  data = data || {};
  if(poolId === "cws") {
    var cwsData = data[POOL_DATA_KEY.cws] || {};
    var userPicks = (cwsData.picks||{})[pukey(player)] || {};
    if(Object.keys(userPicks).length === 0) return null;
    return calcCwsScore(userPicks, cwsData.results||{});
  }
  if(poolId === "wc" || poolId === "rwc") {
    var scores = (data[poolId]||{}).scores || {};
    if(scores[player] !== undefined) return scores[player];
    var pk = pukey(player);
    if(scores[pk] !== undefined) return scores[pk];
    return null;
  }
  return null;
}


function moveNode(oldPath, newPath){
  if(!DB || oldPath===newPath) return;
  DB.ref(oldPath).once("value", function(sn){
    var val = sn.val();
    if(val===null || val===undefined) return;
    DB.ref(newPath).set(val);
    DB.ref(oldPath).remove();
  });
}

function migrateRenamedUserPicks(oldUsername, newUsername, groupIds) {
  if(!DB || oldUsername===newUsername) return;
  var oldUk = pukey(oldUsername), newUk = pukey(newUsername);
  (groupIds||[]).forEach(function(gid){
    DB.ref("groups/"+gid).once("value", function(sn){
      var g = sn.val(); if(!g) return;
      groupPools(g).forEach(function(pool){
        var dataKey = POOL_DATA_KEY[pool.id];
        if(!dataKey) return;
        var base = "groups/"+gid+"/data/"+dataKey;
        if(pool.id==="rwc") {
          moveNode(base+"/picks/"+oldUsername, base+"/picks/"+newUsername);
          moveNode(base+"/locked/"+oldUsername, base+"/locked/"+newUsername);
          moveNode(base+"/scores/"+oldUsername, base+"/scores/"+newUsername);
          moveNode(base+"/maxScores/"+oldUsername, base+"/maxScores/"+newUsername);
        } else if(pool.id==="cfb") {
          if(oldUk===newUk) return;
          DB.ref(base+"/meta/weekIds").once("value", function(wsn){
            (wsn.val()||[]).forEach(function(weekId){
              moveNode(base+"/picks/"+weekId+"/"+oldUk, base+"/picks/"+weekId+"/"+newUk);
            });
          });
        } else {
          if(oldUk===newUk) return;
          moveNode(base+"/picks/"+oldUk, base+"/picks/"+newUk);
          moveNode(base+"/locked/"+oldUk, base+"/locked/"+newUk);
        }
      });
    });
  });
}

// ── GOOGLE AUTH ────────────────────────────────────────────────────────────────
function signInWithGoogle(cb) {
  if(!window.firebase || !firebase.auth) { cb("Google sign-in unavailable"); return; }
  if(!DB) { cb("No database connection"); return; }
  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).then(function(result){
    var fbUser = result.user;
    var uid = fbUser.uid;
    DB.ref("googleUsers/"+uid).once("value", function(sn){
      var existingUsername = sn.val();
      if(existingUsername) { authLogin(existingUsername, cb); return; }
      // First time signing in with this Google account — create a Scorecery username
      var base = ((fbUser.displayName||fbUser.email||"player").split("@")[0]||"player")
        .toLowerCase().replace(/[^a-z0-9_]/g,"") || "player";
      (function tryUsername(n){
        var candidate = base + (n>0?n:"");
        var key = userKey(candidate);
        DB.ref("users/"+key).once("value", function(usn){
          if(usn.val()) { tryUsername(n+1); return; }
          var newData = { username: candidate, groups: [], emoji: "🎯", googleUid: uid };
          DB.ref("users/"+key).set(newData, function(err){
            if(err){ cb("Failed to save — check connection"); return; }
            DB.ref("googleUsers/"+uid).set(candidate);
            cb(null, { username: candidate, groups: [], emoji: "🎯" });
          });
        });
      })(0);
    });
  }).catch(function(err){
    cb((err&&err.message)?err.message:"Google sign-in failed");
  });
}

function addGroupToUser(username, groupId) {
  var key = username.toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(!DB) return;
  DB.ref("users/"+key+"/groups").once("value", function(sn){
    var groups = sn.val() || [];
    if(groups.indexOf(groupId) < 0) {
      groups.push(groupId);
      DB.ref("users/"+key+"/groups").set(groups);
      if(SC.currentUser) SC.currentUser.groups = groups;
    }
  });
}

// ── GUEST MIGRATION ──────────────────────────────────────────────────────────
function migrateGuestToUser(guestName, newUsername, cb) {
  if(!DB || !guestName) { cb(); return; }
  var guestKey = guestName.toLowerCase().replace(/[^a-z0-9_]/g,"");
  // Load all groups and find ones where guest is a player
  DB.ref("groups").once("value", function(sn) {
    var groups = sn.val() || {};
    var migrations = [];
    Object.keys(groups).forEach(function(gid) {
      var g = groups[gid];
      var players = g.players || [];
      var idx = players.indexOf(guestName);
      if(idx >= 0) migrations.push({ gid: gid, players: players, idx: idx });
    });
    if(migrations.length === 0) { cb(); return; }
    var done = 0;
    migrations.forEach(function(m) {
      // Replace guest name with new username in group players
      var newPlayers = m.players.slice();
      newPlayers[m.idx] = newUsername;
      DB.ref("groups/"+m.gid+"/players").set(newPlayers, function() {
        // Add group to new user account
        addGroupToUser(newUsername, m.gid);
        done++;
        if(done === migrations.length) cb();
      });
    });
  });
}

function createGroup(name, adminPw, pools, isPublic, cb) {

    players: SC.currentUser ? [SC.currentUser.username] : [],

}

      submitBtn.disabled = true;
      submitBtn.textContent = "Please wait...";
      authLogin(uname, function(err, user){
        submitBtn.disabled = false;
        submitBtn.textContent = "Log In";
        if(err){ errEl.textContent = err; return; }
        onAuthSuccess(user);
      });
    }
    submitBtn.addEventListener("click", doSubmit);
    unameEl.addEventListener("keydown", function(e){ if(e.key==="Enter") doSubmit(); });
    unameEl.focus();
  }
}

        var st = statuses[pool.id] || "coming-soon";

        else if(st==="locked")   stackedPills += '<div style="font-size:9px;color:#fca5a5;white-space:nowrap">'+pool.icon+' Live</div>';
        else if(st==="coming-soon") stackedPills += '<div style="font-size:9px;color:#334155;white-space:nowrap">'+pool.icon+' Soon</div>';
        else if(recentlyComplete) stackedPills += '<div style="font-size:9px;color:#818cf8;white-space:nowrap">'+pool.icon+' Final</div>';
      });

          gh += '<div style="display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--border2);background:'+(isMe?'var(--blue-bg)':'transparent')+'">';
          gh += '<div style="font-size:13px;width:22px;text-align:center;flex-shrink:0">'+(medals2[i]||'<span style="font-size:10px;font-weight:900;color:var(--dim)">'+(i+1)+'</span>')+'</div>';
          gh += '<div style="font-size:12px;font-weight:'+(isMe?'900':'800')+';color:'+(isMe?'var(--blue)':'var(--text)')+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+x(p.name)+'</div>';
          if(isMe) gh += '<div style="font-size:8px;font-weight:800;background:var(--gold);border:2px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--text);flex-shrink:0">YOU</div>';

          gh += '</div>';
        });

        gh += '<div style="padding:8px 14px 2px;font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">Members</div>';

          gh += '<div style="display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--border2);background:'+(isMe?'var(--blue-bg)':'transparent')+'">';

          gh += '<div style="font-size:9px;font-weight:700;color:var(--muted)">No picks yet</div>';
          gh += '</div>';
        });
        if((g.players||[]).length > 6) {
          gh += '<div style="padding:6px 14px 8px;font-size:9px;font-weight:700;color:var(--muted)">+'+((g.players||[]).length-6)+' more members</div>';
        }
      }
      gh += '</div>';

      gh += '</div>'; // end gcard
    });
    container.innerHTML = gh;
    container.querySelectorAll(".gcard").forEach(function(el){
      el.addEventListener("click", function(){
        var poolUrl = this.getAttribute("data-pool-url");
        if(poolUrl) { window.location.href = poolUrl; }
        else { joinGroupSilent(this.getAttribute("data-gid")); }

  }

  // Load groups from Firebase
  if(myGroupIds.length > 0 && DB) {
    var promises = myGroupIds.map(function(gid){
      return DB.ref("groups/"+gid).once("value").then(function(sn){ return sn.val(); });
    });
    Promise.all(promises).then(function(groups){
      groups = groups.filter(Boolean);
      _allGroupsCache = groups;
      var container = document.getElementById("profile-groups");
      if(!container) return;

      // Compute stats — use globalSettings/results for placement pts
      var entered = 0, wins = 0, placementPts = 0;

      if(DB) {
        DB.ref("globalSettings/results").once("value", function(globalSnap){
          var globalResults = globalSnap.val() || {};
          groups.forEach(function(g){
            var pools = groupPools(g);
            pools.forEach(function(pool){
              var r = globalResults[pool.id];
              if(r && (r.first || r.second || r.third) && (g.players||[]).indexOf(u.username) >= 0) {
                entered++;
                if(r.first === u.username)       { wins++; placementPts += 40000; }
                else if(r.second === u.username) { placementPts += 20000; }
                else if(r.third === u.username)  { placementPts += 10000; }
              }
            });
          });
          var totalPts = placementPts;
          var se = document.getElementById("pstat-entered");
          var sw = document.getElementById("pstat-wins");
          renderGroupCards(groups, container);
        });
      } else {
        renderGroupCards(groups, container);
      }
    });
  }
}

// Join a group the user is already a member of — no password needed
function joinGroupSilent(groupId) {
  if(!DB) return;
  if(isGuest()) { showGuestPrompt(); return; }
  DB.ref("groups/"+groupId).once("value", function(sn){
    var group = sn.val();
    if(!group) { toast("Group not found"); return; }
    SC.group = group;
    SC.group.data = group.data || {statuses:{},results:{}};
    SC.isAdmin = false; SC.isMaster = false;
    SC.groupAdmin = false; SC.showGroupSettings = false;
    checkGroupAdmin(group);
    SC.screen = "hub";
    saveLastGroup(group.id);
    subscribeGroup(group.id);
    subscribeGroupPlayers(group.id);
    draw();
  });
}


// ── INVITE MODAL ──────────────────────────────────────────────────────────────
function openInviteModal() {
  var g = SC.group;
  if(!g) return;
  var msg = "Hey! Join my Scorecery group 🏆\n\n"
    + "Group: " + g.name + "\n"
    + "Password: " + (g.adminPw || "ask me") + "\n\n"
    + "Search for the group name after signing up at:\nhttps://scorecery.net";

  var preview = document.getElementById("invite-msg-preview");
  if(preview) preview.textContent = msg;

  document.getElementById("invite-modal").classList.add("open");

  document.getElementById("invite-sms-btn").onclick = function() {
    // Try native Web Share API first (best on mobile)
    if(navigator.share) {
      navigator.share({ title: "Join my Scorecery group", text: msg })
        .catch(function(){});
    } else {
      // Fallback: open SMS with pre-filled body
      var encoded = encodeURIComponent(msg);
      window.open("sms:?&body=" + encoded, "_blank");
    }
  };

  document.getElementById("invite-copy-btn").onclick = function() {
    if(navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(msg).then(function(){
        toast("Invite copied to clipboard ✓");
        closeInviteModal();
      });
    } else {
      // Fallback for older browsers
      var ta = document.createElement("textarea");
      ta.value = msg; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand("copy"); toast("Invite copied ✓"); } catch(e){ toast("Copy failed — copy manually"); }
      document.body.removeChild(ta);
      closeInviteModal();
    }
  };

  document.getElementById("invite-cancel-btn").onclick = closeInviteModal;
  document.getElementById("invite-modal").onclick = function(e){ if(e.target===this) closeInviteModal(); };
}
function closeInviteModal() {
  document.getElementById("invite-modal").classList.remove("open");
}

function joinGroup(code) {
  if(!code||code.length<4) { SC.error="Please enter a valid group name."; draw(); return; }
  if(isGuest()) { showGuestPrompt(); return; }
  loadGroup(code, function(group, err){
    if(err) { SC.error=err; draw(); return; }

    var alreadyMember = SC.currentUser && (group.players||[]).indexOf(SC.currentUser.username) >= 0;

    function enterGroup() {
      // Add to players if new
      if(!alreadyMember && SC.currentUser) {
        var newPlayers = (group.players||[]).slice();
        if(newPlayers.indexOf(SC.currentUser.username) < 0) {
          newPlayers.push(SC.currentUser.username);
          group.players = newPlayers;
          if(DB) DB.ref("groups/"+group.id+"/players").set(newPlayers);
        }
        addGroupToUser(SC.currentUser.username, group.id);
      }
      SC.isAdmin = false; SC.isMaster = false;
      SC.group = group;
      SC.group.data = group.data || {statuses:{},results:{}};
      SC.groupAdmin = false; SC.showGroupSettings = false;
      if(!SC.isMaster) checkGroupAdmin(group);
      saveLastGroup(group.id);
      subscribeGroup(group.id);
      subscribeGroupPlayers(group.id);

      // Navigate directly to the active pool if one exists
      var activePools = (group.pools||[]).map(function(pid){ return POOLS.find(function(p){return p.id===pid;}); }).filter(Boolean);
      var username = SC.currentUser ? SC.currentUser.username : "";
      var activePool = activePools.find(function(p){ return (group.statuses||{})[p.id]==="open"||(group.statuses||{})[p.id]==="live"; });
      if(activePool && username) {
        window.location.href = activePool.url+"?group="+encodeURIComponent(group.id)+"&user="+encodeURIComponent(username);
      } else {
        SC.screen = "hub";
        SC.error = "";
        draw();
      }
    }

    if(alreadyMember) {
      enterGroup();
    } else {
      // Show inline password screen
      SC.joinTarget = { group: group, onSuccess: enterGroup };
      SC.screen = "join-pw";
      SC.error = "";
      draw();
    }
  });
}

var _emojiCache = {}; // username -> emoji
function loadPlayerEmojis(players, cb) {
  var needed = players.filter(function(p){ return !_emojiCache[p]; });
  if(needed.length === 0){ cb(); return; }
  var done = 0;
  needed.forEach(function(p){
    var k = p.toLowerCase().replace(/[^a-z0-9_]/g,"");
    DB.ref("users/"+k+"/emoji").once("value", function(sn){
      _emojiCache[p] = sn.val() || "🎯";
      done++;
      if(done === needed.length) cb();
    });
  });
}
function playerEmoji(username){ return _emojiCache[username] || "🎯"; }

// ── USER MANAGEMENT ───────────────────────────────────────────────────────────
function renderGroupAdminMembers(group, container) {
  var players = group.players || [];
  if(!players.length){ container.innerHTML='<div style="color:#334155;font-size:11px;text-align:center;padding:8px">No members in this group</div>'; return; }
  var h = '';
  players.forEach(function(player){
    var isCreator = player === group.createdBy;
    var hasAdmin = (group.adminUsers||[]).indexOf(player) >= 0 || isCreator;
    h += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #0f1923">';
    h += '<div style="flex:1;font-size:12px;color:#e2e8f0">🎯 '+x(player)+(isCreator?' <span style="font-size:9px;color:#fbbf24">creator</span>':'')+'</div>';
    if(hasAdmin){
      h += '<button data-ga-revoke="'+x(player)+'" data-ga-gid="'+x(group.id)+'" style="font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid rgba(251,191,36,.5);background:rgba(251,191,36,.18);color:#fbbf24;cursor:pointer;font-family:inherit;font-weight:700">⚡ Admin</button>';
    } else {
      h += '<button data-ga-grant="'+x(player)+'" data-ga-gid="'+x(group.id)+'" style="font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid rgba(251,191,36,.3);background:transparent;color:#fbbf24;cursor:pointer;font-family:inherit;font-weight:700">⚡</button>';
    }
    h += '</div>';
  });
  container.innerHTML = h;

  container.querySelectorAll("[data-ga-grant]").forEach(function(btn){
    btn.addEventListener("click", function(){
      var player = this.getAttribute("data-ga-grant");
      var gid = this.getAttribute("data-ga-gid");
      if(!DB) return;
      DB.ref("groups/"+gid+"/adminUsers").once("value", function(sn){
        var adminUsers = (sn.val()||[]).slice();
        if(adminUsers.indexOf(player)<0) adminUsers.push(player);
        DB.ref("groups/"+gid+"/adminUsers").set(adminUsers, function(err){
          if(err){ toast("Error"); return; }
          group.adminUsers = adminUsers;
          toast(player+" is now admin of "+group.name+" ✓");
          renderGroupAdminMembers(group, container);
        });
      });
    });
  });

  container.querySelectorAll("[data-ga-revoke]").forEach(function(btn){
    btn.addEventListener("click", function(){
      var player = this.getAttribute("data-ga-revoke");
      var gid = this.getAttribute("data-ga-gid");
      if(player===group.createdBy){ toast("Can't revoke the group creator"); return; }
      if(!confirm("Revoke admin for "+player+" in "+group.name+"?")) return;
      if(!DB) return;
      DB.ref("groups/"+gid+"/adminUsers").once("value", function(sn){
        var adminUsers = (sn.val()||[]).filter(function(u){ return u!==player; });
        DB.ref("groups/"+gid+"/adminUsers").set(adminUsers, function(err){
          if(err){ toast("Error"); return; }
          group.adminUsers = adminUsers;
          toast(player+" admin access revoked");
          renderGroupAdminMembers(group, container);
        });
      });
    });
  });
}

function loadAdminGuests(q) {
  var list = document.getElementById("admin-guests-list");
  if(!list) return;
  if(!DB){ list.innerHTML='<div style="color:#334155;font-size:11px;text-align:center;padding:16px">Firebase unavailable</div>'; return; }

  DB.ref("users").once("value", function(usnap){
    var realUsers = {};
    Object.keys(usnap.val()||{}).forEach(function(k){ realUsers[k]=true; });

    // guestMap: name -> { groups: [groupIds or "root"], hasPicks: bool }
    var guestMap = {};

    function addGuest(name, location, hasPicks) {
      if(!name) return;
      var key = userKey(name);
      if(realUsers[key]) return; // registered user, skip
      if(!guestMap[name]) guestMap[name] = { groups:[], hasPicks:false };
      if(guestMap[name].groups.indexOf(location) < 0) guestMap[name].groups.push(location);
      if(hasPicks) guestMap[name].hasPicks = true;
    }

    function renderGuests() {
      var guests = Object.keys(guestMap);
      // Apply search filter
      if(q) guests = guests.filter(function(g){ return g.toLowerCase().indexOf(q.toLowerCase()) >= 0; });
      if(!guests.length){
        list.innerHTML='<div style="color:#334155;font-size:11px;text-align:center;padding:12px">'+(q?'No guests match your search.':'No guests found.')+'</div>';
        return;
      }
      guests.sort();
      var h='<table style="width:100%;border-collapse:collapse;font-size:11px">';
      h+='<thead><tr>';
      h+='<th style="text-align:left;color:#475569;padding:4px 6px;font-weight:500;font-size:9px;text-transform:uppercase;letter-spacing:.06em">Guest</th>';
      h+='<th style="text-align:left;color:#475569;padding:4px 6px;font-weight:500;font-size:9px;text-transform:uppercase;letter-spacing:.06em">Groups</th>';
      h+='<th style="text-align:left;color:#475569;padding:4px 6px;font-weight:500;font-size:9px;text-transform:uppercase;letter-spacing:.06em">Picks</th>';
      h+='<th></th>';
      h+='</tr></thead><tbody>';
      guests.forEach(function(gname){
        var info = guestMap[gname];
        var hasRoot = info.groups.indexOf("root") >= 0;
        var groupCount = info.groups.filter(function(g){ return g !== "root"; }).length;
        var grpLabel = hasRoot
          ? (groupCount ? '<span style="color:#fbbf24">No group</span>, '+groupCount+' group'+(groupCount!==1?'s':'') : '<span style="color:#fbbf24">No group</span>')
          : groupCount+' group'+(groupCount!==1?'s':'');
        h+='<tr style="border-top:1px solid #0f1923">';
        h+='<td style="padding:7px 6px;color:#f1f5f9;font-weight:600">🎯 '+x(gname)+'</td>';
        h+='<td style="padding:7px 6px;color:#475569">'+grpLabel+'</td>';
        h+='<td style="padding:7px 6px">'+(info.hasPicks?'<span style="color:#6ee7b7;font-size:10px">✓ Yes</span>':'<span style="color:#334155;font-size:10px">—</span>')+'</td>';
        h+='<td style="padding:7px 6px;text-align:right"><button class="btn btn-red btn-sm" style="font-size:9px" data-del-guest="'+x(gname)+'">Delete</button></td>';
        h+='</tr>';
      });
      h+='</tbody></table>';
      list.innerHTML=h;
      list.querySelectorAll("[data-del-guest]").forEach(function(btn){
        btn.addEventListener("click", function(){
          var gname = this.getAttribute("data-del-guest");
          if(!confirm('Remove guest "'+gname+'" from all groups and delete their picks? This cannot be undone.')) return;
          var groupIds = guestMap[gname].groups.filter(function(g){ return g !== "root"; });
          var hasRoot = guestMap[gname].groups.indexOf("root") >= 0;
          deleteGuest(gname, groupIds, hasRoot);
        });
      });
    }

    var pending = 2;
    function done() { pending--; if(pending===0) renderGuests(); }

    // 1. Scan root rwc2026/picks (ungrouped guests)
    DB.ref("rwc2026/picks").once("value", function(psn){
      Object.keys(psn.val()||{}).forEach(function(pname){
        addGuest(pname, "root", true);
      });
      done();
    });

    // 2. Scan all groups — players array + picks data
    DB.ref("groups").once("value", function(gsnap){
      Object.values(gsnap.val()||{}).forEach(function(g){
        // Players array
        (g.players||[]).forEach(function(p){ addGuest(p, g.id, false); });
        // Picks data for all pools
        var data = g.data || {};
        Object.keys(data).forEach(function(poolId){
          Object.keys((data[poolId]||{}).picks||{}).forEach(function(pname){
            addGuest(pname, g.id, true);
          });
        });
      });
      done();
    });
  });
}

function deleteGuest(guestName, groupIds, hasRoot) {
  if(!DB) return;
  var updates = {};
  var tasks = groupIds.length + (hasRoot ? 1 : 0);
  if(tasks===0){ toast("Guest removed ✓"); loadAdminGuests(); return; }

  function finish() {
    tasks--;
    if(tasks===0){
      DB.ref().update(updates, function(err){
        if(err){ toast("Delete failed"); return; }
        toast('Guest "'+guestName+'" removed ✓');
        loadAdminGuests();
      });
    }
  }

  // Remove from root rwc2026/picks
  if(hasRoot){
    updates["rwc2026/picks/"+guestName] = null;
    finish();
  }

  // Remove from each group's players array
  groupIds.forEach(function(gid){
    DB.ref("groups/"+gid+"/players").once("value", function(sn){
      var players = (sn.val()||[]).filter(function(p){ return p!==guestName; });
      updates["groups/"+gid+"/players"] = players;
      finish();
    });
  });
}

function loadAdminUsers(q) {
  var list = document.getElementById("admin-users-list");
  if(!list) return;
  if(!DB){ list.innerHTML='<div style="color:#334155;font-size:11px;text-align:center;padding:16px">Firebase unavailable</div>'; return; }
  // Load both users node AND all group players to catch orphans
  DB.ref("users").once("value", function(sn){
    var all = sn.val()||{};
    var users = [];
    var knownKeys = {};
    Object.keys(all).forEach(function(k){
      var u = all[k];
      if(!u) return;
      u._key = k;
      knownKeys[k] = true;
      // Also index by username key
      if(u.username) knownKeys[userKey(u.username)] = true;
      users.push(u);
    });
    // Scan all groups for players not in users node
    DB.ref("groups").once("value", function(gsn){
      var groups = gsn.val()||{};
      Object.values(groups).forEach(function(g){
        (g.players||[]).forEach(function(pname){
          var pkey = userKey(pname);
          if(!knownKeys[pkey] && pname) {
            knownKeys[pkey] = true;

function deleteUser(username) {
  if(!DB) return;
  var key = userKey(username);
  // Remove from Firebase users node
  DB.ref("users/"+key).remove(function(err){
    if(err){ toast("Delete failed"); return; }
    // Also remove from any groups they're in
    DB.ref("groups").once("value", function(sn){
      var groups = sn.val()||{};
      var updates = {};
      Object.values(groups).forEach(function(g){
        var players = (g.players||[]).filter(function(p){ return p!==username; });
        if(players.length !== (g.players||[]).length){
          updates["groups/"+g.id+"/players"] = players;
        }
      });
      if(Object.keys(updates).length>0){
        DB.ref().update(updates, function(){ toast("User \""+username+"\" deleted ✓"); loadAdminUsers((document.getElementById("user-search")||{}).value||""); });
      } else {
        toast("User \""+username+"\" deleted ✓");
        loadAdminUsers((document.getElementById("user-search")||{}).value||"");
      }
    });
  });
}

function renameUser(oldName, fbKey, newName) {
  if(!DB) return;
  var newKey = userKey(newName);
  if(!newKey){ toast("Invalid username"); return; }
  // Read old user data then write under new key
  DB.ref("users/"+fbKey).once("value", function(sn){
    var userData = sn.val()||{};
    userData.username = newName;
    // Write new key
    DB.ref("users/"+newKey).set(userData, function(err){
      if(err){ toast("Rename failed"); return; }
      // Delete old key if different
      if(fbKey !== newKey) DB.ref("users/"+fbKey).remove();
      // Update group player lists — try matching oldName, fbKey, and userKey(oldName)
      var namesToMatch = [oldName, fbKey, userKey(oldName)].filter(function(v,i,a){ return v && a.indexOf(v)===i; });
      DB.ref("groups").once("value", function(gsn){
        var groups = gsn.val()||{};
        var updates = {};
        Object.values(groups).forEach(function(g){
          if(!g || !g.players) return;
          // Find first matching player entry
          var idx = -1;
          for(var ni=0; ni<namesToMatch.length; ni++){
            idx = g.players.indexOf(namesToMatch[ni]);
            if(idx >= 0) break;
          }
          if(idx >= 0){
            var newPlayers = g.players.slice();
            newPlayers[idx] = newName;
            updates["groups/"+g.id+"/players"] = newPlayers;
          }
          // Update adminUsers if present
          if(g.adminUsers){
            var ai = -1;
            for(var ni2=0; ni2<namesToMatch.length; ni2++){
              ai = g.adminUsers.indexOf(namesToMatch[ni2]);
              if(ai >= 0) break;
            }
            if(ai >= 0){
              var newAdmins = g.adminUsers.slice();
              newAdmins[ai] = newName;
              updates["groups/"+g.id+"/adminUsers"] = newAdmins;
            }
          }
        });
        var finish = function(){ toast("Renamed to \"" + newName + "\" ✓"); loadAdminUsers((document.getElementById("user-search")||{}).value||""); };
        if(Object.keys(updates).length > 0){
          DB.ref().update(updates, finish);
        } else { finish(); }
      });
    });
  });
}

function mergeGuestIntoUser(guestName, guestFbKey, targetUsername) {
  if(!DB) return;
  var targetKey = userKey(targetUsername);
  if(!targetKey){ toast("Invalid username"); return; }
  var namesToMatch = [guestName, guestFbKey, userKey(guestName)].filter(function(v,i,a){ return v && a.indexOf(v)===i; });

  // Load both users and all groups
  DB.ref("users/"+targetKey).once("value", function(tSnap){
    var targetData = tSnap.val();
    if(!targetData){ toast("User \""+targetUsername+"\" not found"); return; }

    DB.ref("users/"+guestFbKey).once("value", function(gSnap){
      var guestData = gSnap.val()||{};

      DB.ref("groups").once("value", function(gsn){
        var groups = gsn.val()||{};
        var updates = {};

        // Merge guest's groups into target's groups list
        var targetGroups = (targetData.groups||[]).slice();
        var guestGroups = guestData.groups||[];
        guestGroups.forEach(function(gid){
          if(targetGroups.indexOf(gid) < 0) targetGroups.push(gid);
        });
        updates["users/"+targetKey+"/groups"] = targetGroups;

        // In every group, replace guest name with target username in players + adminUsers
        Object.values(groups).forEach(function(g){
          if(!g || !g.players) return;
          var idx = -1;
          for(var ni=0; ni<namesToMatch.length; ni++){
            idx = g.players.indexOf(namesToMatch[ni]);
            if(idx >= 0) break;
          }
          if(idx >= 0){
            var newPlayers = g.players.slice();
            // Only replace if target not already in group
            if(newPlayers.indexOf(targetUsername) < 0){
              newPlayers[idx] = targetUsername;
            } else {
              // Target already in group — just remove guest entry
              newPlayers.splice(idx, 1);
            }
            updates["groups/"+g.id+"/players"] = newPlayers;
          }
          // adminUsers
          if(g.adminUsers){
            var ai = -1;
            for(var ni2=0; ni2<namesToMatch.length; ni2++){
              ai = g.adminUsers.indexOf(namesToMatch[ni2]);
              if(ai >= 0) break;
            }
            if(ai >= 0 && g.adminUsers.indexOf(targetUsername) < 0){
              var newAdmins = g.adminUsers.slice();
              newAdmins[ai] = targetUsername;
              updates["groups/"+g.id+"/adminUsers"] = newAdmins;
            }
          }
          // Transfer picks/scores under group data — rename guest key to target key
          if(g.data) {
            (g.pools||[]).forEach(function(pid){
              var poolData = (g.data[pid]||{});
              namesToMatch.forEach(function(nm){
                if(poolData.picks && poolData.picks[nm] !== undefined && !poolData.picks[targetUsername]){
                  updates["groups/"+g.id+"/data/"+pid+"/picks/"+targetUsername] = poolData.picks[nm];
                  updates["groups/"+g.id+"/data/"+pid+"/picks/"+nm] = null;
                }
                if(poolData.scores && poolData.scores[nm] !== undefined && !poolData.scores[targetUsername]){
                  updates["groups/"+g.id+"/data/"+pid+"/scores/"+targetUsername] = poolData.scores[nm];
                  updates["groups/"+g.id+"/data/"+pid+"/scores/"+nm] = null;
                }
              });
            });
          }
        });

        // Delete guest Firebase user entry
        updates["users/"+guestFbKey] = null;

        DB.ref().update(updates, function(err){
          if(err){ toast("Merge failed: "+err.message); return; }
          toast("Merged \""+guestName+"\" into \""+targetUsername+"\" ✓");
          loadAdminUsers((document.getElementById("user-search")||{}).value||"");
        });
      });
    });
  });
}

function calcStandings(g, data) {
  var scores={}, finishes={};
  var players = g.players||[];
  players.forEach(function(p){ scores[p]=0; finishes[p]={}; });
  var pools = groupPools(g);
  pools.forEach(function(pool){
    var r=(data.results||{})[pool.id];
    if(r && (r.first||r.second||r.third)) {
      if(r.first&&scores[r.first]!==undefined){scores[r.first]+=4;finishes[r.first][pool.id]=1;}
      if(r.second&&scores[r.second]!==undefined){scores[r.second]+=2;finishes[r.second][pool.id]=2;}
      if(r.third&&scores[r.third]!==undefined){scores[r.third]+=1;finishes[r.third][pool.id]=3;}
    } else {
      // No final placement recorded yet — show each player's live in-progress
      // score for this pool so the leaderboard reflects current play.
      players.forEach(function(p){
        var live = getLivePoolScore(pool.id, p, data);
        if(live !== null && scores[p]!==undefined) scores[p] += live;
      });
    }
  });
  return players.slice().sort(function(a,b){return scores[b]-scores[a];})
    .map(function(p){return{name:p,pts:scores[p],finishes:finishes[p]};});
}

    _groupsCache = null;
    if(SC.group && SC.group.id===groupId){
      SC.group=null; SC.groupAdmin=false; SC.showGroupSettings=false;
      try{ localStorage.removeItem("pp_last_group"); }catch(e){}
    }
    toast("Group deleted");
    if(cb) cb();
  });
}

// ── ALL GROUPS (Admin Panel) ───────────────────────────────────────────────────
function loadAdminGroupsList(query) {
  var container = document.getElementById("admin-groups-list");

    var q = (query||"").toLowerCase();
    var filtered = groups.filter(function(g){ return !q || (g.name||"").toLowerCase().indexOf(q)>=0 || (g.id||"").toLowerCase().indexOf(q)>=0; });
    filtered.sort(function(a,b){ return (a.name||"").localeCompare(b.name||""); });
    if(!filtered.length){ container.innerHTML='<div style="color:#334155;font-size:11px;text-align:center;padding:16px">No groups found</div>'; return; }
    var h='';
    filtered.forEach(function(g){
      var pools = groupPools(g);
      var poolIcons = pools.map(function(p){return p.icon;}).join(" ") || "—";
      h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #0f1923">';
      h += '<div style="flex:1;min-width:0">';
      h += '<div style="font-size:12px;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+x(g.name||g.id)+'</div>';
      h += '<div style="font-size:9px;color:#475569;margin-top:2px">'+poolIcons+' &middot; '+((g.players||[]).length)+' player'+((g.players||[]).length!==1?'s':'')+' &middot; '+x(g.id)+'</div>';
      h += '</div>';
      h += '<button data-admin-del-gid="'+x(g.id)+'" data-admin-del-name="'+x(g.name||g.id)+'" class="btn btn-red btn-sm" style="font-size:9px;padding:0 9px;height:24px;line-height:24px;flex-shrink:0">Delete</button>';
      h += '</div>';
    });

    container.querySelectorAll("[data-admin-del-gid]").forEach(function(btn){
      btn.addEventListener("click", function(){

        if(!confirm('Delete group "'+name+'"? This removes all its picks and results permanently.')) return;
        adminDeleteGroup(gid, function(){ loadAdminGroupsList((document.getElementById("admin-group-search")||{}).value||""); });
      });
    });
  });
}

// ── GROUP SEARCH ──────────────────────────────────────────────────────────────
var _groupsCache = null, _groupsCacheTime = 0;

function loadAllGroups(cb) {
  var now = Date.now();
  if(_groupsCache && now - _groupsCacheTime < 15000) { cb(_groupsCache); return; }
  if(DB) {
    DB.ref("groups").once("value", function(sn){
      var val = sn.val()||{};
      _groupsCache = Object.values(val);
      _groupsCacheTime = Date.now();
      cb(_groupsCache);
    });
  } else cb([]);
}

function renderGroupsTableTo(tbodyId, groups, query) {
  var tbody = document.getElementById(tbodyId);
  if(!tbody) return;
  var q = (query||"").toLowerCase().trim();
  var myName = SC.currentUser ? SC.currentUser.username : null;
  var myGroupIds = (SC.currentUser && SC.currentUser.groups) || [];
  var guest = isGuest();
  var filtered = groups.filter(function(g){
    var alreadyJoined = (myName && (g.players||[]).indexOf(myName) >= 0) || myGroupIds.indexOf(g.id) >= 0;
    if(!guest && alreadyJoined) return false;
    var hasOpenPool = (g.pools||[]).some(function(pid){ return ((SC.globalStatuses||{})[pid]||"coming-soon") === "open"; });
    if(!hasOpenPool && !g.public) return false;
    if(!q) return true;
    return (g.name||"").toLowerCase().indexOf(q)>=0;
  });
  if(filtered.length===0){
    var emptyMsg;
    if(q) emptyMsg = "No groups match your search";
    else emptyMsg = groups.length>0 ? "No open groups to join right now" : "No groups yet — be the first!";
    tbody.innerHTML = '<tr><td colspan="4" class="no-results">'+emptyMsg+'</td></tr>';
    return;
  }
  var h = "";
  filtered.forEach(function(g){
    var playerCount = (g.players||[]).length;
    // Competition column — same as hub
    var openPool = null;
    (g.pools||[]).forEach(function(pid){
      var status = (SC.globalStatuses||{})[pid]||"coming-soon";
      if(status==="open" && !openPool) openPool = pid;
    });
    var compHtml = '<span style="color:#334155;font-size:10px">—</span>';
    if(openPool) {
      var poolDef = null;
      for(var _pi=0;_pi<POOL_LIBRARY.length;_pi++){ if(POOL_LIBRARY[_pi].id===openPool){ poolDef=POOL_LIBRARY[_pi]; break; } }
      var scores = ((g.data||{})[openPool]||{}).scores || {};
      var ranked = (g.players||[]).slice().sort(function(a,b){ return (scores[b]||0)-(scores[a]||0); });
      var myRank = myName ? ranked.indexOf(myName)+1 : 0;
      var icon = poolDef ? poolDef.icon : "🏆";
      compHtml = '<span style="font-size:10px;color:#94a3b8">'+icon+' <span style="color:#6ee7b7">Open</span>'+(myRank>0?' · #'+myRank+' of '+playerCount:'')+'</span>';
    }
    // For guests: an Open pool prompts sign-up (handled by joinGroup), otherwise
    // fall back to the read-only public leaderboard view.
    // For guests: a public group always gets a "View" leaderboard link.
    // An Open pool additionally gets a "Join" link, which prompts sign-up for guests.
    var actionsHtml;
    if(guest) {
      actionsHtml = "";
      if(g.public) actionsHtml += '<span class="join-link" data-action="view">View &#8250;</span>';
      if(openPool) actionsHtml += (actionsHtml?'<br>':'') + '<span class="join-link" data-action="join">Join &#8250;</span>';
    } else {
      actionsHtml = '<span class="join-link" data-action="join">Join &#8250;</span>';
    }
    h += '<tr data-gid="'+x(g.id)+'">';
    h += '<td class="group-name-cell">'+x(g.name||"Unnamed")+'</td>';
    h += '<td style="color:#64748b;font-size:11px">'+playerCount+'</td>';
    h += '<td>'+compHtml+'</td>';
    h += '<td style="text-align:right">'+actionsHtml+'</td></tr>';
  });
  tbody.innerHTML = h;
  tbody.querySelectorAll(".join-link").forEach(function(el){
    el.addEventListener("click", function(){
      var gid = this.closest("tr").getAttribute("data-gid");
      var action = this.getAttribute("data-action");
      if(action==="view") viewPublicLeaderboard(gid); else joinGroup(gid);
    });
  });
}

function renderGroupsTable(groups, query) { renderGroupsTableTo("groups-tbody", groups, query); }

// ── GLOBAL STATUSES ───────────────────────────────────────────────────────────
function subscribeGlobalStatuses() {
  if(!DB) return;
  DB.ref("globalSettings/statuses").on("value", function(sn){
    SC.globalStatuses = sn.val() || {};
    if(SC.screen==="hub"||SC.screen==="profile") draw();
  });
  DB.ref("globalSettings/completedAt").once("value", function(sn){
    SC.completedAt = sn.val() || {};
  });
  // Load master password from Firebase (falls back to hardcoded if not set)
  DB.ref("globalSettings/masterPw").on("value", function(sn){
    var fw = sn.val();
    if(fw) MASTER_PW = fw;
  });
}

// ── GUEST CLEANUP ─────────────────────────────────────────────────────────────
function purgeInactiveGuests() {
  if(!DB) return;
  var cutoff = Date.now() - (30 * 24 * 60 * 60 * 1000); // 30 days ago
  DB.ref("users").once("value", function(sn){
    var all = sn.val() || {};
    Object.keys(all).forEach(function(k){
      var u = all[k];
      if(!u || u.password) return; // skip registered users
      var lastActive = u.lastActive || u.createdAt || 0;
      if(lastActive < cutoff) {
        // Remove from all groups first
        var uname = u.username || k;
        DB.ref("groups").once("value", function(gsn){
          var groups = gsn.val() || {};
          var updates = {};
          Object.values(groups).forEach(function(g){
            if(!g || !g.players) return;
            var filtered = g.players.filter(function(p){ return p !== uname; });
            if(filtered.length !== g.players.length) updates["groups/"+g.id+"/players"] = filtered;
          });
          if(Object.keys(updates).length) DB.ref().update(updates);
        });
        DB.ref("users/"+k).remove();
      }
    });
  });
}

// Delete groups whose competitions have all been marked "complete" for 7+ days.
function purgeOldCompletedGroups() {
  if(!DB) return;
  var cutoff = Date.now() - (7 * 24 * 60 * 60 * 1000); // 7 days ago
  DB.ref("globalSettings/statuses").once("value", function(statusSn){
    var statuses = statusSn.val() || {};
    DB.ref("globalSettings/completedAt").once("value", function(caSn){
      var completedAt = caSn.val() || {};
      DB.ref("groups").once("value", function(gsn){
        var groups = gsn.val() || {};
        Object.keys(groups).forEach(function(gid){
          var g = groups[gid];
          if(!g || !g.pools || !g.pools.length) return;
          var allDoneOver7Days = g.pools.every(function(pid){
            return statuses[pid]==="complete" && completedAt[pid] && completedAt[pid] < cutoff;
          });
          if(allDoneOver7Days) DB.ref("groups/"+gid).remove();
        });
      });
    });
  });
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
(function(){
  if(DB) subscribeGlobalStatuses();

  var savedUser = loadSession();
  var _cachedEmoji = (function(){ try{ return localStorage.getItem("pp_emoji")||"🎯"; }catch(e){ return "🎯"; } })();

  if(savedUser) {
    // Returning user — load from Firebase
    SC.currentUser = { username: savedUser, groups: [], emoji: _cachedEmoji };
    SC.screen = "profile";
    document.getElementById("root").innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:80vh"><div style="font-size:13px;color:#334155">Loading...</div></div>';
    var key = savedUser.toLowerCase().replace(/[^a-z0-9_]/g,"");
    if(DB) {
      DB.ref("users/"+key).once("value", function(sn){
        var u = sn.val();
        if(u && u.password) {
          SC.currentUser = { username: u.username, groups: u.groups||[], emoji: u.emoji||"🎯" };
        } else {
          // Either no record, or a legacy persisted guest account — guests
          // are view-only and shouldn't be remembered across visits.
          clearSession();
          createGuestSession();
          SC.screen = "home";
        }
        draw();
      });
    } else { draw(); }
    // Run cleanup tasks once per session (1% chance to avoid running every load)
    if(DB && Math.random() < 0.01) { purgeInactiveGuests(); purgeOldCompletedGroups(); }
  } else {
    // New visitor — auto-create a Guest#### account in Firebase
    createGuestSession();
    SC.screen = "home";
    draw();
  }
})();
</script>

<script>
var _copy = { poolId:null, poolName:null, targetGroup:null, sourceUser:null };

function openCopyModal(poolId, poolName) {
  _copy = { poolId:poolId, poolName:poolName, targetGroup:null, sourceUser:null };
  document.getElementById("copy-sub").textContent = 'Copy "'+poolName+'" picks · '+(SC.group?SC.group.name:'');
  setCopyStep(1);
  document.getElementById("copy-modal").classList.add("open");
  var list = document.getElementById("copy-group-list");
  list.innerHTML = '<div style="color:#334155;font-size:11px;text-align:center;padding:16px">Loading...</div>';
  if(!DB){ list.innerHTML='<div style="color:#ef4444;font-size:11px;text-align:center;padding:16px">Firebase unavailable</div>'; return; }
  DB.ref("groups").once("value", function(sn){
    var all = sn.val()||{};
    var eligible = Object.values(all).filter(function(g){
      return (g.pools||[]).indexOf(poolId)>=0 && g.id!==(SC.group?SC.group.id:null);
    });
    if(eligible.length===0){ list.innerHTML='<div style="color:#475569;font-size:11px;text-align:center;padding:16px">No other groups have this competition open.</div>'; return; }
    list.innerHTML="";
    eligible.forEach(function(g){
      var row=document.createElement("div"); row.className="copy-group-row";
      var players=(g.players||[]).slice(0,3).join(", ")+(g.players&&g.players.length>3?" +":"");
      row.innerHTML='<div style="flex:1"><div class="cg-name">'+x(g.name||"Unnamed")+'</div><div class="cg-players">'+x(players)+'</div></div><span style="color:#475569;font-size:14px;margin-left:6px">&#8250;</span>';
      row.addEventListener("click",function(){
        _copy.targetGroup=g;
        document.getElementById("copy-target-label").textContent=g.name||g.id;
        document.getElementById("copy-pw-input").value="";
        document.getElementById("copy-pw-err").textContent="";
        setCopyStep(2);
        setTimeout(function(){var el=document.getElementById("copy-pw-input");if(el)el.focus();},100);
      });
      list.appendChild(row);
    });
  });
}

function setCopyStep(n){[1,2,3,4].forEach(function(i){var el=document.getElementById("copy-step-"+i);if(el)el.classList.toggle("active",i===n);});}
function closeCopyModal(){document.getElementById("copy-modal").classList.remove("open");_copy={poolId:null,poolName:null,targetGroup:null,sourceUser:null};}

function confirmCopyPassword(){
  if(!_copy.targetGroup)return;
  var pw=document.getElementById("copy-pw-input").value;
  var errEl=document.getElementById("copy-pw-err");
  if(!pw){errEl.textContent="Please enter the group password";return;}
  if(pw!==(_copy.targetGroup.groupAdminPw||"password")&&pw!==MASTER_PW){errEl.textContent="Wrong password — try again";return;}
  errEl.textContent="";
  var srcGrid=document.getElementById("copy-src-grid"); srcGrid.innerHTML="";
  var srcPlayers=SC.group?(SC.group.players||[]):[];
  if(srcPlayers.length===0){toast("No players in source group");closeCopyModal();return;}
  srcPlayers.forEach(function(player){
    var btn=document.createElement("button"); btn.className="copy-user-btn"; btn.textContent=player;
    btn.addEventListener("click",function(){
      _copy.sourceUser=player;
      var dstGrid=document.getElementById("copy-dst-grid"); dstGrid.innerHTML="";
      document.getElementById("copy-target-label-2").textContent=_copy.targetGroup.name||_copy.targetGroup.id;
      document.getElementById("copy-src-label").textContent=player;
      (_copy.targetGroup.players||[]).forEach(function(tp){
        var tbtn=document.createElement("button"); tbtn.className="copy-user-btn"; tbtn.textContent=tp;
        tbtn.addEventListener("click",function(){executeCopy(tp);});
        dstGrid.appendChild(tbtn);
      });
      setCopyStep(4);
    });
    srcGrid.appendChild(btn);
  });
  setCopyStep(3);
}

function executeCopy(targetUser){
  if(!_copy.targetGroup||!_copy.poolId||!_copy.sourceUser||!SC.group||!DB)return;
  var sourceBase="groups/"+SC.group.id+"/data/"+_copy.poolId;
  var destBase="groups/"+_copy.targetGroup.id+"/data/"+_copy.poolId;
  DB.ref(sourceBase+"/picks/"+_copy.sourceUser).once("value",function(sn){
    var picks=sn.val();
    if(!picks||Object.keys(picks).length===0){toast(_copy.sourceUser+" has no picks to copy");closeCopyModal();return;}
    DB.ref(destBase+"/picks/"+targetUser).set(picks,function(err){
      if(err)toast("Copy failed");
      else{toast(_copy.sourceUser+"\u2192"+targetUser+" copied \u2713");closeCopyModal();}
    });
  });
}

(function(){
  document.getElementById("copy-modal").addEventListener("click",function(e){if(e.target===this)closeCopyModal();});
  ["copy-cancel","copy-cancel-2","copy-cancel-3","copy-cancel-4"].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener("click",closeCopyModal);});
  document.getElementById("copy-back-2").addEventListener("click",function(){setCopyStep(1);});
  document.getElementById("copy-back-3").addEventListener("click",function(){setCopyStep(2);});
  document.getElementById("copy-back-4").addEventListener("click",function(){setCopyStep(3);});
  document.getElementById("copy-pw-confirm").addEventListener("click",confirmCopyPassword);
  document.getElementById("copy-pw-input").addEventListener("keydown",function(e){if(e.key==="Enter")confirmCopyPassword();});
})();
</script>
