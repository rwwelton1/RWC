<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="dark"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
button,input,select{font-family:'DM Sans',sans-serif}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:40px 40px}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(99,102,241,.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,9,15,.92);border-bottom:1px solid #1e2a3a;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-top:-2px}
.topbar-right{display:flex;gap:6px;align-items:center}
.btn{border-radius:6px;padding:6px 13px;font-size:11px;font-weight:600;border:1px solid;cursor:pointer;transition:all .15s}
.btn:active{opacity:.7}
.btn-ghost{background:transparent;border-color:#2d3f52;color:#64748b}
.btn-ghost:hover{border-color:#475569;color:#94a3b8}
.btn-primary{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.btn-gold{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.35);color:#fbbf24}
.btn-green{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.btn-red{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}
.btn-sm{padding:4px 9px;font-size:10px}
.main{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:28px 16px 60px}
/* LANDING */
.landing{display:flex;flex-direction:column;align-items:center;padding:48px 20px 20px;gap:6px;text-align:center}
.landing-logo{font-family:'Bebas Neue',cursive;font-size:48px;letter-spacing:.08em;background:linear-gradient(135deg,#fff 30%,#fbbf24 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px}
.landing-sub{font-size:12px;color:#475569;letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px}
.landing-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.landing-btn{padding:14px;border-radius:10px;font-size:14px;font-weight:700;border:1px solid;cursor:pointer;transition:all .2s;text-align:center}
.landing-btn:active{transform:scale(.98)}
.landing-btn-primary{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.landing-btn-secondary{background:#0d1117;border-color:#1e2a3a;color:#64748b}
.landing-divider{font-size:9px;color:#334155;letter-spacing:.1em;text-transform:uppercase;margin:4px 0}
/* CARD / FORM */
.card{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px}
.card-sub{font-size:10px;color:#475569;margin-bottom:18px}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}
.form-input{width:100%;background:#07090f;border:1px solid #1e2a3a;border-radius:7px;padding:9px 12px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:rgba(99,102,241,.5)}
.form-input::placeholder{color:#334155}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.players-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
.player-entry{display:flex;gap:6px;align-items:center}
.player-entry .form-input{flex:1}
.remove-player{width:28px;height:28px;border-radius:6px;background:transparent;border:1px solid #1e2a3a;color:#475569;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.remove-player:hover{border-color:#ef4444;color:#fca5a5}
.add-player-btn{font-size:10px;color:#6366f1;background:none;border:none;cursor:pointer;padding:2px 0;display:inline-flex;align-items:center;gap:4px}
/* POOLS TOGGLE */
.pools-toggle{display:flex;flex-direction:column;gap:6px}
.pool-toggle-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#07090f;border-radius:8px;border:1px solid #1e2a3a;cursor:pointer;transition:border-color .15s}
.pool-toggle-row.active{border-color:rgba(99,102,241,.35);background:rgba(99,102,241,.05)}
.pool-toggle-icon{font-size:16px;width:28px;text-align:center}
.pool-toggle-name{flex:1;font-size:12px;font-weight:600}
.pool-toggle-check{width:18px;height:18px;border-radius:4px;border:1px solid #2d3f52;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.pool-toggle-row.active .pool-toggle-check{background:#6366f1;border-color:#6366f1;color:#fff}
/* GROUP CODE */
.group-code{font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:.2em;color:#fbbf24;text-align:center;padding:14px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:10px;margin:12px 0}
/* HUB */
.section-label{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#1e2a3a}
.standings-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;overflow:hidden;margin-bottom:24px}
.standings-head{padding:12px 16px;border-bottom:1px solid #1e2a3a;display:flex;justify-content:space-between;align-items:center}
.standings-title{font-size:13px;font-weight:700;color:#fff}
.standings-sub{font-size:9px;color:#475569}
.player-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(30,42,58,.5)}
.player-row:last-child{border-bottom:none}
.player-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rank-1{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.rank-2{background:rgba(148,163,184,.1);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}
.rank-3{background:rgba(205,127,50,.1);color:#cd7f32;border:1px solid rgba(205,127,50,.2)}
.rank-other{background:#07090f;color:#475569;border:1px solid #1e2a3a}
.player-name{flex:1;font-size:13px;font-weight:600}
.finish-dots{display:flex;gap:3px}
.fdot{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.fdot-1{background:rgba(251,191,36,.2);color:#fbbf24}
.fdot-2{background:rgba(148,163,184,.15);color:#94a3b8}
.fdot-3{background:rgba(205,127,50,.15);color:#cd7f32}
.fdot-x{background:#1e2a3a;color:#334155}
.player-pts{font-size:16px;font-weight:700;color:#fff;min-width:28px;text-align:right}
.player-pts-label{font-size:8px;color:#475569;text-align:right}
.pools-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.pool-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;overflow:hidden;transition:border-color .2s,transform .15s;cursor:default}
.pool-card.clickable{cursor:pointer}
.pool-card.clickable:active{transform:scale(.99)}
.pool-card.clickable:hover{border-color:#2d3f52}
.pool-card.dimmed{opacity:.5}
.pool-card-inner{display:flex;align-items:center;gap:14px;padding:13px 16px}
.pool-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pool-info{flex:1;min-width:0}
.pool-name{font-size:13px;font-weight:700;margin-bottom:2px}
.pool-meta{font-size:10px;color:#475569}
.pool-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.status-pill{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.pill-open{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.pill-locked{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.pill-soon{background:rgba(71,85,105,.1);border:1px solid #1e2a3a;color:#475569}
.pill-complete{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.pool-arrow{color:#334155;font-size:16px;line-height:1}
.pool-winner{border-top:1px solid #1e2a3a;padding:7px 16px;display:flex;align-items:center;gap:10px}
.podium{display:flex;gap:8px}
.podium-item{font-size:9px;color:#475569}
.podium-item b{font-weight:700}
.podium-item.p1 b{color:#fbbf24}
.podium-item.p2 b{color:#94a3b8}
.podium-item.p3 b{color:#cd7f32}
/* ADMIN PANEL */
.admin-panel{background:#0d1117;border:1px solid rgba(251,191,36,.25);border-radius:12px;padding:16px;margin-bottom:20px}
.admin-panel-title{font-size:9px;color:#fbbf24;letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.pool-controls{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.pool-control-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#07090f;border-radius:8px;border:1px solid #1e2a3a}
.pcr-name{flex:1;font-size:11px;font-weight:600}
.pcr-btns{display:flex;gap:3px;flex-wrap:wrap}
.pcr-btn{padding:3px 7px;border-radius:5px;font-size:9px;font-weight:600;border:1px solid #1e2a3a;background:transparent;color:#475569;cursor:pointer;transition:all .15s}
.pcr-btn.sel-open{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.pcr-btn.sel-locked{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}
.pcr-btn.sel-soon{background:rgba(71,85,105,.15);border-color:#2d3f52;color:#64748b}
.pcr-btn.sel-complete{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#a5b4fc}
.results-title{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.result-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.result-pool-name{font-size:10px;color:#475569;width:80px;flex-shrink:0}
.result-selects{display:flex;gap:4px;flex:1}
.result-select{flex:1;background:#07090f;border:1px solid #1e2a3a;border-radius:6px;color:#e2e8f0;font-size:10px;padding:5px 4px;outline:none}
.save-results-btn{width:100%;margin-top:8px;padding:9px;border-radius:7px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fbbf24;font-size:11px;font-weight:600;cursor:pointer}
/* GROUP INFO BAR */
.group-bar{padding:8px 16px;border-bottom:1px solid #1e2a3a;display:flex;align-items:center;gap:8px;background:#090d14;flex-wrap:wrap}
.group-bar-name{font-size:12px;font-weight:700;color:#f1f5f9;flex:1}
.group-bar-code{font-size:9px;color:#475569;font-family:'Bebas Neue',cursive;letter-spacing:.15em}
/* GROUP SEARCH */
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;padding:9px 12px 9px 34px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .15s}
.search-input:focus{border-color:rgba(99,102,241,.4)}
.search-input::placeholder{color:#334155}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#334155;font-size:13px;pointer-events:none}
.groups-table{width:100%;border-collapse:collapse;font-size:11px}
.groups-table th{padding:6px 10px;text-align:left;color:#475569;font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #1e2a3a}
.groups-table td{padding:8px 10px;border-bottom:1px solid rgba(30,42,58,.4);color:#94a3b8;vertical-align:middle}
.groups-table tr:last-child td{border-bottom:none}
.groups-table tr.clickable-row{cursor:pointer;transition:background .1s}
.groups-table tr.clickable-row:hover td{background:rgba(99,102,241,.05)}
.group-name-cell{color:#f1f5f9;font-weight:600}
.group-code-cell{font-family:'Bebas Neue',cursive;letter-spacing:.12em;color:#fbbf24;font-size:12px}
.join-link{padding:3px 8px;border-radius:5px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);color:#a5b4fc;font-size:9px;font-weight:600;cursor:pointer;white-space:nowrap}
.no-results{text-align:center;color:#334155;padding:20px;font-size:11px}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:#0d1117;border:1px solid rgba(99,102,241,.4);color:#a5b4fc;border-radius:8px;padding:8px 18px;font-size:11px;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease both}
</style>

</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div id="root"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── POOL LIBRARY ─────────────────────────────────────────────────────────────
var POOL_LIBRARY = [
  {id:"rwc",    name:"Conference Tourney Picks", icon:"&#127936;", bg:"linear-gradient(135deg,#1d428a,#6366f1)", url:"rwc-bracket-challenge.html", desc:"Power 5 Conference Tourneys", dates:"Mar 10-15"},
  {id:"masters",name:"Masters Pool",             icon:"&#9971;",   bg:"linear-gradient(135deg,#065f46,#10b981)", url:"masters.html",               desc:"Augusta National",            dates:"Apr 10-13"},
  {id:"wc",     name:"2026 World Cup",           icon:"&#9917;",   bg:"linear-gradient(135deg,#7c3aed,#c026d3)", url:"worldcup.html",               desc:"48 Teams · USA/Mexico/Canada",dates:"Jun 11-Jul 19"},
  {id:"cws",    name:"College World Series",     icon:"&#9918;",   bg:"linear-gradient(135deg,#7c2d12,#ef4444)", url:"cws.html",                    desc:"TD Ameritrade Park",          dates:"Jun 13-24"},
  {id:"nhl",    name:"Stanley Cup Playoffs",     icon:"&#127954;", bg:"linear-gradient(135deg,#0c1445,#3b82f6)", url:"nhl.html",                    desc:"NHL Playoff Bracket",         dates:"Apr-Jun 2026"},
  {id:"cfb",    name:"College Football Pickem",  icon:"&#127944;", bg:"linear-gradient(135deg,#4c1d95,#a78bfa)", url:"cfb.html",                    desc:"10-Game Spread Picks",        dates:"Fall 2026"}
];

var MASTER_PW = "Sloop";

// ── STATE ────────────────────────────────────────────────────────────────────
// screen: "landing" | "join" | "create" | "created" | "hub"
var SC = {
  screen: "landing",
  group: null,      // { id, name, players, pools, adminPw, data:{statuses,results} }
  isAdmin: false,
  isMaster: false,
  groupAdmin: false,  // group-level admin (players/pools only), separate from isAdmin panel open state
  showGroupSettings: false, // whether group settings panel is expanded
  createForm: { name:"", adminPw:"", players:["","","",""], pools:[] },
  joinCode: "",
  error: ""
};

var DB = null;
try {
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks",appId:"1:965978379243:web:35f9db9a664f9170e27fae"});
  DB = firebase.database();
} catch(e) {}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function x(s){ var t=String(s||""); t=t.replace(/&/g,"&amp;"); t=t.replace(/</g,"&lt;"); t=t.replace(/>/g,"&gt;"); t=t.replace(/'/g,"&#39;"); return t; }
function toast(msg){ var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},2400); }
function randCode() {
  var chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  var s="";
  for(var i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function poolById(id){ for(var i=0;i<POOL_LIBRARY.length;i++) if(POOL_LIBRARY[i].id===id) return POOL_LIBRARY[i]; return null; }
function groupPools(g){ return (g.pools||[]).map(function(id){ return poolById(id); }).filter(Boolean); }

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
function saveLocal(groupId){
  try{ localStorage.setItem("rwc_last_group", groupId); }catch(e){}
}
function loadLastGroup(){
  try{ return localStorage.getItem("rwc_last_group"); }catch(e){ return null; }
}

// ── FIREBASE GROUP OPS ────────────────────────────────────────────────────────
function createGroup(name, adminPw, players, poolIds, cb) {
  var id = randCode();
  var group = {
    id: id,
    name: name,
    adminPw: adminPw,
    players: players.filter(function(p){ return p.trim(); }),
    pools: poolIds,
    data: { statuses:{}, results:{} }
  };
  if(DB) {
    DB.ref("groups/"+id).set(group, function(err){
      if(err) cb(null, "Failed to save. Check connection.");
      else cb(group, null);
    });
  } else {
    // localStorage fallback
    try{
      var all = JSON.parse(localStorage.getItem("rwc_groups")||"{}");
      all[id] = group;
      localStorage.setItem("rwc_groups", JSON.stringify(all));
      cb(group, null);
    } catch(e){ cb(null, "Failed to save locally."); }
  }
}

function loadGroup(code, cb) {
  var id = code.trim().toUpperCase();
  if(DB) {
    DB.ref("groups/"+id).once("value", function(sn){
      var val = sn.val();
      if(val) cb(val, null);
      else cb(null, "Group code not found. Check and try again.");
    });
  } else {
    try{
      var all = JSON.parse(localStorage.getItem("rwc_groups")||"{}");
      if(all[id]) cb(all[id], null);
      else cb(null, "Group code not found.");
    } catch(e){ cb(null,"Error loading group."); }
  }
}

function subscribeGroup(id) {
  if(!DB) return;
  DB.ref("groups/"+id+"/data").on("value", function(sn){
    if(SC.group && SC.group.id===id) {
      SC.group.data = sn.val() || {statuses:{},results:{}};
      if(SC.screen==="hub") draw();
    }
  });
}

function saveGroupData() {
  if(!SC.group) return;
  if(DB) {
    DB.ref("groups/"+SC.group.id+"/data").set(SC.group.data);
  } else {
    try{
      var all = JSON.parse(localStorage.getItem("rwc_groups")||"{}");
      if(all[SC.group.id]) { all[SC.group.id].data=SC.group.data; localStorage.setItem("rwc_groups",JSON.stringify(all)); }
    } catch(e){}
  }
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function draw() {
  var s = SC.screen;
  if(s==="landing") renderLanding();
  else if(s==="join") renderJoin();
  else if(s==="create") renderCreate();
  else if(s==="created") renderCreated();
  else if(s==="hub") renderHub();
}

// LANDING
function renderLanding() {
  var last = loadLastGroup();
  var h = topbar(false);
  h += '<div class="main fade-up">';
  h += '<div class="landing">';
  h += '<div class="landing-logo">PoolPlay</div>';
  h += '<div class="landing-sub">2026 Season</div>';
  h += '</div>';

  // Quick action row
  h += '<div style="display:flex;gap:8px;margin-bottom:20px">';
  h += '<button class="landing-btn landing-btn-primary" id="btn-create" style="flex:1;padding:11px;font-size:13px">+ Create a Group</button>';
  h += '</div>';

  // Inline join by code
  h += '<div class="card" style="padding:14px;margin-bottom:20px">';
  h += '<div class="form-group" style="margin-bottom:8px"><label class="form-label">Join with a code</label>';
  h += '<div style="display:flex;gap:8px">';
  h += '<input class="form-input" id="join-code-inline" maxlength="6" placeholder="e.g. RWC2X4" style="font-family:\'Bebas Neue\',cursive;font-size:18px;letter-spacing:.2em;text-transform:uppercase;flex:1" autocomplete="off">';

function doInlineJoin() {
  var inp = document.getElementById("join-code-inline");
  var errEl = document.getElementById("join-error-inline");
  var code = (inp ? inp.value : "").trim();
  if(!code || code.length < 4) { if(errEl) errEl.textContent="Enter a valid code"; return; }
  if(errEl) errEl.textContent="";
  joinGroup(code);
}

  h += '</div></div>';

  inp.focus();

  inp.addEventListener("keydown", function(e){ if(e.key==="Enter") joinGroup(SC.joinCode); });

function joinGroup(code) {
  if(!code||code.length<4) { SC.error="Please enter a valid code."; draw(); return; }
  loadGroup(code, function(group, err){
    if(err) { SC.error=err; draw(); return; }
    // Require password to join
    var pw = prompt("Password for \""+group.name+"\":");
    if(pw===null) return; // cancelled
    if(pw!==group.adminPw && pw!==MASTER_PW) {
      SC.error="Wrong password.";
      draw();
      toast("Wrong password");
      return;
    }
    SC.group = group;
    SC.group.data = group.data || {statuses:{},results:{}};
    SC.isAdmin = false; SC.isMaster = (pw===MASTER_PW);
    if(pw===MASTER_PW){ SC.isAdmin=true; }
    SC.groupAdmin = false; SC.showGroupSettings = false;
    SC.screen = "hub";
    SC.error = "";
    saveLocal(group.id);
    subscribeGroup(group.id);
    draw();
  });
}

function submitCreate() {
  var f = SC.createForm;
  f.name = document.getElementById("f-name").value.trim();
  f.adminPw = document.getElementById("f-pw").value.trim();
  document.querySelectorAll("#players-list input").forEach(function(inp){ f.players[parseInt(inp.getAttribute("data-pi"))]=inp.value; });
  if(!f.name){ SC.error="Group name is required."; draw(); return; }
  if(!f.adminPw||f.adminPw.length<3){ SC.error="Admin password must be at least 3 characters."; draw(); return; }
  var validPlayers = f.players.filter(function(p){ return p.trim(); });
  if(validPlayers.length<2){ SC.error="Add at least 2 players."; draw(); return; }
  if(f.pools.length===0){ SC.error="Select at least one competition."; draw(); return; }
  SC.error="";
  document.getElementById("btn-create-go").textContent="Creating...";
  document.getElementById("btn-create-go").disabled=true;
  createGroup(f.name, f.adminPw, validPlayers, f.pools, function(group, err){
    if(err){ SC.error=err; draw(); return; }
    SC.group = group;
    SC.isAdmin = true;
    SC.screen = "created";
    draw();
  });
}

// ── DELETE GROUP ──────────────────────────────────────────────────────────────
function deleteGroup(groupId) {
  if(DB) {
    DB.ref("groups/"+groupId).remove(function(err){
      if(err) { toast("Delete failed — check connection"); return; }
      _groupsCache = null; // bust cache
      SC.group=null; SC.isAdmin=false; SC.isMaster=false; SC.groupAdmin=false; SC.showGroupSettings=false; SC.screen="landing";
      try{ localStorage.removeItem("rwc_last_group"); }catch(e){}
      draw();
      toast("Group deleted");
    });
  } else {
    try{
      var all=JSON.parse(localStorage.getItem("rwc_groups")||"{}");
      delete all[groupId];
      localStorage.setItem("rwc_groups",JSON.stringify(all));
    }catch(e){}
    _groupsCache = null;
    SC.group=null; SC.isAdmin=false; SC.isMaster=false; SC.screen="landing";
    try{ localStorage.removeItem("rwc_last_group"); }catch(e){}
    draw();
    toast("Group deleted");
  }
}

// ── GROUP SEARCH ──────────────────────────────────────────────────────────────
var _groupsCache = null;
var _groupsCacheTime = 0;

function loadAllGroups(cb) {
  var now = Date.now();
  if(_groupsCache && now - _groupsCacheTime < 15000) { cb(_groupsCache); return; }
  if(DB) {
    DB.ref("groups").once("value", function(sn){
      var val = sn.val()||{};
      _groupsCache = Object.values(val);
      _groupsCacheTime = Date.now();
      cb(_groupsCache);
    });
  } else {
    try{
      var all = JSON.parse(localStorage.getItem("rwc_groups")||"{}");
      _groupsCache = Object.values(all);
      _groupsCacheTime = Date.now();
      cb(_groupsCache);
    } catch(e){ cb([]); }
  }
}

function renderGroupsTableTo(tbodyId, groups, query) {
  var tbody = document.getElementById(tbodyId);
  if(!tbody) return;
  var q = (query||"").toLowerCase().trim();
  var filtered = groups.filter(function(g){
    if(!q) return true;
    return (g.name||"").toLowerCase().indexOf(q)>=0 || (g.id||"").toLowerCase().indexOf(q)>=0;
  });
  if(filtered.length===0){
    tbody.innerHTML = '<tr><td colspan="4" class="no-results">'+(q?"No groups match your search":"No groups yet — be the first to create one!")+'</td></tr>';
    return;
  }
  var h = "";
  filtered.forEach(function(g){
    var playerList = (g.players||[]).slice(0,3).join(", ")+(g.players&&g.players.length>3?" +":"");
    h += '<tr class="clickable-row" data-gid="'+x(g.id)+'">';
    h += '<td class="group-name-cell">'+x(g.name||"Unnamed")+'</td>';
    h += '<td class="group-code-cell">'+x(g.id)+'</td>';
    h += '<td>'+x(playerList)+'</td>';
    h += '<td><span class="join-link">Join &#8250;</span></td>';
    h += '</tr>';
  });
  tbody.innerHTML = h;
  tbody.querySelectorAll("tr.clickable-row").forEach(function(el){
    el.addEventListener("click", function(){ joinGroup(this.getAttribute("data-gid")); });
  });
}

function renderGroupsTable(groups, query) {
  renderGroupsTableTo("groups-tbody", groups, query);
}

// ── TOPBAR ────────────────────────────────────────────────────────────────────
function topbar(showBack) {
  var h = '<div class="topbar">';
  if(showBack) h += '<button class="btn btn-ghost btn-sm" id="btn-back" style="margin-right:4px">&#8592;</button>';
  h += '<div><div class="logo">PoolPlay</div></div>';
  h += '<div class="topbar-right"></div></div>';
  return h;
}

function render(h) {
  document.getElementById("root").innerHTML = h;
  var bb = document.getElementById("btn-back");
  if(bb) bb.addEventListener("click", function(){
    if(SC.screen==="join"||SC.screen==="create"){ SC.screen="landing"; SC.error=""; draw(); }
    else if(SC.screen==="created"){ SC.screen="hub"; subscribeGroup(SC.group.id); draw(); }
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setStatus(poolId, status) {
  if(!SC.group) return;
  if(!SC.group.data) SC.group.data={statuses:{},results:{}};
  if(!SC.group.data.statuses) SC.group.data.statuses={};
  SC.group.data.statuses[poolId]=status;

  if(SC.isMaster && DB) {
    // Push status to every group that has this pool
    DB.ref("groups").once("value", function(sn){
      var all = sn.val()||{};
      var updates = {};
      Object.keys(all).forEach(function(gid){
        var g = all[gid];
        if((g.pools||[]).indexOf(poolId)>=0) {
          updates["groups/"+gid+"/data/statuses/"+poolId] = status;
        }
      });
      if(Object.keys(updates).length>0) DB.ref().update(updates);
    });
    draw();
    toast("Status pushed to all groups");
  } else {
    saveGroupData();
    draw();
    toast("Status updated");
  }
}

function saveResults() {
  if(!SC.group) return;
  var pools = groupPools(SC.group);
  if(!SC.group.data) SC.group.data={statuses:{},results:{}};
  if(!SC.group.data.results) SC.group.data.results={};

  // Build the results object from the form
  var newResults = {};
  pools.forEach(function(pool){
    var r={};
    ["first","second","third"].forEach(function(place){
      var el=document.getElementById("res-"+pool.id+"-"+place);
      if(el&&el.value) r[place]=el.value;
    });
    if(Object.keys(r).length>0) newResults[pool.id]=r;
  });

  if(SC.isMaster && DB) {
    // Master (Sloop): push results to every group that has these pools
    DB.ref("groups").once("value", function(sn){
      var all = sn.val()||{};
      var updates = {};
      Object.keys(all).forEach(function(gid){
        var g = all[gid];
        pools.forEach(function(pool){
          if((g.pools||[]).indexOf(pool.id)>=0) {
            if(newResults[pool.id]) updates["groups/"+gid+"/data/results/"+pool.id] = newResults[pool.id];
          }
        });
      });
      if(Object.keys(updates).length>0) {
        DB.ref().update(updates, function(){
          toast("Results pushed to all groups &#10003;");
        });
      } else {
        toast("No groups to update");
      }
    });
    // Also update local group immediately
    SC.group.data.results = Object.assign(SC.group.data.results, newResults);
    draw();
  } else {
    // Regular admin: save to this group only
    pools.forEach(function(pool){
      if(newResults[pool.id]) SC.group.data.results[pool.id]=newResults[pool.id];
      else delete SC.group.data.results[pool.id];
    });
    saveGroupData();
    draw();
    toast("Results saved &#10003;");
  }
}

function saveGroupSettings() {
  if(!SC.group || !SC.isAdmin || SC.isMaster) return;
  document.querySelectorAll("[data-epi]").forEach(function(inp){
    SC.group.players[parseInt(inp.getAttribute("data-epi"))] = inp.value;
  });
  var validPlayers = SC.group.players.filter(function(p){ return p.trim(); });
  if(SC.group.pools.length===0){ toast("Select at least one competition"); return; }
  SC.group.players = validPlayers;
  if(DB) {
    DB.ref("groups/"+SC.group.id).update({
      players: SC.group.players,
      pools: SC.group.pools
    }, function(){ toast("Group settings saved &#10003;"); });
  } else {
    try{
      var all=JSON.parse(localStorage.getItem("rwc_groups")||"{}");
      if(all[SC.group.id]){ all[SC.group.id].players=SC.group.players; all[SC.group.id].pools=SC.group.pools; localStorage.setItem("rwc_groups",JSON.stringify(all)); }
    }catch(e){}
    toast("Group settings saved &#10003;");
  }
  SC.isAdmin = false;
  SC.showGroupSettings = false;
  draw();
}

function calcStandings(g, data) {
  var scores={}, finishes={};
  var players = g.players||[];
  players.forEach(function(p){ scores[p]=0; finishes[p]={}; });
  var pools = groupPools(g);
  pools.forEach(function(pool){
    var r=(data.results||{})[pool.id]; if(!r) return;
    if(r.first&&scores[r.first]!==undefined){scores[r.first]+=4;finishes[r.first][pool.id]=1;}
    if(r.second&&scores[r.second]!==undefined){scores[r.second]+=2;finishes[r.second][pool.id]=2;}
    if(r.third&&scores[r.third]!==undefined){scores[r.third]+=1;finishes[r.third][pool.id]=3;}
  });
  return players.slice().sort(function(a,b){return scores[b]-scores[a];})
    .map(function(p){return{name:p,pts:scores[p],finishes:finishes[p]};});
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
// Auto-rejoin last group if code stored
(function(){
  var last = loadLastGroup();
  if(last) {
    loadGroup(last, function(group, err){
      if(group){ SC.group=group; SC.group.data=group.data||{statuses:{},results:{}}; SC.screen="hub"; subscribeGroup(group.id); }
      draw();
    });
  } else {
    draw();
  }
})();
</script>
