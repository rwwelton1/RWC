<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
</head>
<body style="background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif">
<div id="root">Loading...</div>
<script>
function showHome() {
  var saved = null;
  try { var v = localStorage.getItem("pp_test"); saved = v ? JSON.parse(v) : null; } catch(e) {}
  document.getElementById("root").innerHTML = '<h1 style="color:#fff;padding:40px">Loaded! localStorage: ' + (saved ? "has data" : "empty or blocked") + '</h1>';
}
showHome();
</script>
</body>
</html>
