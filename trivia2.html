function getEasternDateKey() {
  // Get current date in US Eastern time (handles EST/EDT automatically)
  var now = new Date();
  var eastern = new Date(now.toLocaleString("en-US", {timeZone:"America/New_York"}));
  return eastern.getFullYear() + "_" + (eastern.getMonth()+1) + "_" + eastern.getDate();
}
function getEasternDayIndex() {

  var eastern = new Date(now.toLocaleString("en-US", {timeZone:"America/New_York"}));
  // Day 0 = Mar 8 2026 (launch day)
  var launch = new Date(2026, 2, 8); // months are 0-indexed
  var diff = Math.floor((eastern - launch) / (1000*60*60*24));
  return ((diff % 29) + 29) % 29; // cycle through 29 days
}

function scheduleMidnightRefresh() {

var now = new Date();

var nextMidnight = new Date(eastern);
nextMidnight.setHours(24, 0, 0, 0); // next midnight Eastern
var msUntilMidnight = nextMidnight - eastern;
setTimeout(function() {
// Only reload if user is on the home screen (not mid-quiz)
var root = document.getElementById(“root”);
if(root && root.querySelector(”.hero”)) {
showHome();

scheduleMidnightRefresh(); // reschedule for the following day

function pointsFor(d) { if(d===“Easy”) return 100; if(d===“Medium”) return 200; if(d===“Hard”) return 300; if(d===“Expert”) return 400; return 100; }
function dstyle(d) { if(d===“Easy”)return”background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7”; if(d===“Medium”)return”background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.3);color:#fbbf24”; if(d===“Hard”)return”background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);color:#fca5a5”; return”background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.4);color:#c4b5fd”; }
function topbar(back) {
return ‘<div class="topbar"><div><div class="logo">POOLPLAY</div><div class="logo-sub">Daily Trivia</div></div>’+(back?’<button class="btn-back" id="bbk">← Home</button>’:’<a href="index.html" class="tag">← Profile</a>’)+’</div>’;
}
function showHome() {
setScore(0);
setPoints(0);
setResults([]);
var *et = new Date(new Date().toLocaleString(“en-US”,{timeZone:“America/New_York”}));
var ds = *et.toLocaleDateString(“en-US”,{weekday:“long”,month:“long”,day:“numeric”});
// Check if already played today (Eastern time key)
var tKey = “pp_trivia*” + getEasternDateKey();
var todayData = null;
try { var tv = localStorage.getItem(tKey); if(tv) todayData = JSON.parse(tv); } catch(e) {}
var o = topbar(false);
o += ‘<div class="wrap">’;
o += ‘<div class="hero"><div class="hero-eyebrow">Daily Sports Trivia</div><div class="hero-title">TRIVIA</div><div class="hero-date">’+ds+’</div>’;
if(todayData && todayData.r) {
var todayScore = todayData.r.filter(function(v){return v;}).length;
var Q2 = getQ();
function diffBlock2(q, correct) {
if(!correct) return “⬜”;
var d = q ? q.d : “”;
if(d===“Easy”)   return “🟩”;
if(d===“Medium”) return “🟨”;
if(d===“Hard”)   return “🟥”;
if(d===“Expert”) return “🟪”;
return “🟩”;
}
var row1=””, row2=””;
for(var i=0;i<5;i++)  row1 += diffBlock2(Q2[i], todayData.r[i]);
for(var i=5;i<10;i++) row2 += diffBlock2(Q2[i], todayData.r[i]);
var todayPts = todayData.pts || 0;
o += ‘<div class="res-score" style="font-size:40px;margin:8px 0">’+todayScore+’/10</div>’;
o += ‘<div style="font-size:13px;font-weight:700;color:#fbbf24;letter-spacing:.05em;margin-bottom:4px">’+todayPts+’ pts</div>’;
o += ‘<div style="font-size:18px;letter-spacing:3px;margin-bottom:8px">’+row1+’</div>’;
o += ‘<div style="font-size:18px;letter-spacing:3px;margin-bottom:16px">’+row2+’</div>’;
o += ‘<div style="font-size:12px;color:#475569;margin-top:8px;letter-spacing:.05em">Come back tomorrow for a new quiz 😊</div>’;
} else {
o += ‘<button class="hero-btn" id="bst">Start Quiz</button>’;
}
o += ‘</div>’;
o += ‘<div class="diff-row"><div class="pill" style="color:#6ee7b7;border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07)">Easy</div><div class="pill" style="color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)">Medium</div><div class="pill" style="color:#fca5a5;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)">Hard</div><div class="pill" style="color:#c4b5fd;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.08)">Expert</div></div>’;
o += ‘<p style="font-size:11px;color:#334155;text-align:center">10 questions · escalating difficulty · NFL · NBA · MLB · NHL</p>’;
o += ‘</div>’;
document.getElementById(“root”).innerHTML = o;
var bst = document.getElementById(“bst”); if(bst) bst.onclick = function(){ showQ(0); };
scheduleMidnightRefresh();
}
function showQ(idx) {
var Q = getQ();
var q = Q[idx];
var o = topbar(true);
o += ‘<div class="wrap">’;
o += ‘<div class="prog-hdr"><span class="prog-lbl">Q’+(idx+1)+’ of ‘+Q.length+’</span><span class="prog-pts">’+getPoints()+’ pts</span></div>’;
o += ‘<div class="pbar"><div class="pfill" style="width:'+Math.round(idx/Q.length*100)+'%"></div></div>’;
o += ‘<div class="diff-badge" style="'+dstyle(q.d)+'">’+q.d+’ · ‘+pointsFor(q.d)+’ pts</div>’;
o += ‘<div class="card"><div class="qtext">’+q.q+’</div>’;
o += ‘<button id="c0" class="choice">’+q.c[0]+’</button>’;
o += ‘<button id="c1" class="choice">’+q.c[1]+’</button>’;
o += ‘<button id="c2" class="choice">’+q.c[2]+’</button>’;
o += ‘<button id="c3" class="choice">’+q.c[3]+’</button>’;
o += ‘</div></div>’;
document.getElementById(“root”).innerHTML = o;
document.getElementById(“bbk”).onclick = showHome;
document.getElementById(“c0”).onclick = function(){ showResult(idx,0); };
document.getElementById(“c1”).onclick = function(){ showResult(idx,1); };
document.getElementById(“c2”).onclick = function(){ showResult(idx,2); };
document.getElementById(“c3”).onclick = function(){ showResult(idx,3); };
}
function showResult(idx, chosen) {
var Q = getQ();
var q = Q[idx];
var correct = chosen === q.a;
var score = getScore() + (correct ? 1 : 0);
var pts = getPoints() + (correct ? pointsFor(q.d) : 0);
setScore(score);
setPoints(pts);
var results = getResults();
results.push(correct);
setResults(results);
var next = idx + 1;
var nextLabel = next < Q.length ? “Next →” : “See Results”;
var o = topbar(false);
o += ‘<div class="wrap">’;
o += ‘<div class="prog-hdr"><span class="prog-lbl">Q’+(idx+1)+’ of ‘+Q.length+’</span><span class="prog-pts">’+pts+’ pts</span></div>’;
o += ‘<div class="pbar"><div class="pfill" style="width:'+Math.round(next/Q.length*100)+'%"></div></div>’;
o += ‘<div class="diff-badge" style="'+dstyle(q.d)+'">’+q.d+’ · ‘+(correct?”+”+pointsFor(q.d)+” pts”:“0 pts”)+’</div>’;
o += ‘<div class="card"><div class="qtext">’+q.q+’</div>’;
o += ‘<div class="fb-card '+(correct?'fb-ok':'fb-no')+'">’+(correct?’✅ Correct!’:’❌ Wrong — ‘+q.c[q.a])+’<div class="fb-fact">’+q.f+’</div></div>’;
o += ‘<button class="btn-next" id="bnxt">’+nextLabel+’</button>’;
o += ‘</div></div>’;
document.getElementById(“root”).innerHTML = o;
document.getElementById(“bnxt”).onclick = function(){ if(next < Q.length){ showQ(next); } else { showDone(); } };
}
function showDone() {
var score = getScore();
var results = getResults();
var username = getUser();
var emoji = getEmoji();
// Persist to localStorage so profile can show score history
try {
var tKey = “pp_trivia*” + getEasternDateKey();
var totalPts = getPoints();
localStorage.setItem(tKey, JSON.stringify({ s: score, r: results, u: username, ts: Date.now(), pts: totalPts }));
} catch(e) {}
var Q = getQ();
function diffBlock(q, correct) {
if(!correct) return “⬜”;
var d = q ? q.d : “”;
if(d===“Easy”)   return “🟩”;
if(d===“Medium”) return “🟨”;
if(d===“Hard”)   return “🟥”;
if(d===“Expert”) return “🟪”;
return “🟩”;
}
var row1 = “”;
var row2 = “”;
for(var i=0;i<5;i++)  row1 += diffBlock(Q[i], results[i]);
for(var i=5;i<10;i++) row2 += diffBlock(Q[i], results[i]);
var d = new Date();
var ds = d.toLocaleDateString(“en-US”,{month:“long”,day:“numeric”,year:“numeric”});
var shareMsg = “PoolPlay Trivia 🏆\n”+ds+”\n”+score+”/10\n\n”+row1+”\n”+row2+”\n\nhttps://pool-play.vercel.app/trivia2.html”;
var o = topbar(false);
o += ‘<div class="wrap">’;
o += ‘<div class="res-card">’;
o += ‘<div class="res-avatar">’+emoji+’</div>’;
o += ‘<div class="res-name">’+username+’</div>’;
o += ‘<div class="res-date">’+ds+’</div>’;
o += ‘<div class="res-score">’+score+’/10</div>’;
o += ‘<div style="font-size:13px;font-weight:700;color:#fbbf24;letter-spacing:.05em;margin-bottom:4px">’+getPoints()+’ pts</div>’;
o += ‘<div class="res-grid">’+row1+’</div>’;
o += ‘<div class="res-grid">’+row2+’</div>’;
o += ‘<a href="https://pool-play.vercel.app/trivia2.html" style="display:block;font-size:11px;color:#6366f1;margin-bottom:16px;text-decoration:underline">pool-play.vercel.app/trivia2.html</a>’;
o += ‘<button class="btn-share" id="bsh">Share Results</button>’;
o += ‘<button class="btn-hub" id="bhub">Back to Hub</button>’;
o += ‘</div></div>’;
document.getElementById(“root”).innerHTML = o;
document.getElementById(“bsh”).onclick = function(){ window.open(“sms:?&body=”+encodeURIComponent(shareMsg),”_blank”); };
document.getElementById(“bhub”).onclick = function(){ window.location.href=“index.html”; };
}
showHome();
</script>

</body>
</html>
