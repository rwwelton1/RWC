<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
</head>
<body style="background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif">
<div id="root">Loading...</div>
<script>
function getQ() {
  return [
    {q:"How many points is a touchdown worth?",c:["3","6","7","2"],a:1,f:"A touchdown is worth 6 points."},
    {q:"Which NBA team has won the most championships?",c:["Lakers","Bulls","Celtics","Warriors"],a:2,f:"The Boston Celtics have won 17 championships."}
  ];
}
function showHome() {
  document.getElementById("root").innerHTML = '<h1 style="color:#fff;padding:40px">Trivia Home</h1><button id="bst" style="margin:20px;padding:14px 32px;background:#6366f1;color:#fff;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none">Start Quiz</button>';
  document.getElementById("bst").onclick = function(){ showQ(0); };
}
function showQ(idx) {
  var Q = getQ();
  var q = Q[idx];
  document.getElementById("root").innerHTML = '<div style="padding:20px"><p style="color:#475569;font-size:11px;margin-bottom:12px">Q'+(idx+1)+' of '+Q.length+'</p><h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px">'+q.q+'</h2><button id="c0" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[0]+'</button><button id="c1" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[1]+'</button><button id="c2" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[2]+'</button><button id="c3" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[3]+'</button></div>';
  document.getElementById("c0").onclick = function(){ showResult(idx, 0); };
  document.getElementById("c1").onclick = function(){ showResult(idx, 1); };
  document.getElementById("c2").onclick = function(){ showResult(idx, 2); };
  document.getElementById("c3").onclick = function(){ showResult(idx, 3); };
}
function showResult(idx, chosen) {
  var Q = getQ();
  var q = Q[idx];
  var correct = chosen === q.a;
  var next = idx + 1;
  var nextBtn = next < Q.length ? '<button id="bnxt" style="width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;font-family:inherit;cursor:pointer">Next</button>' : '<button id="bnxt" style="width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;font-family:inherit;cursor:pointer">See Results</button>';
  document.getElementById("root").innerHTML = '<div style="padding:20px"><p style="color:#475569;font-size:11px;margin-bottom:12px">Q'+(idx+1)+' of '+Q.length+'</p><h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px">'+q.q+'</h2><p style="color:'+(correct?'#6ee7b7':'#fca5a5')+';margin-bottom:20px;font-weight:600">'+(correct?'Correct! ':'Wrong! ')+q.f+'</p>'+nextBtn+'</div>';
  document.getElementById("bnxt").onclick = function(){ if(next < Q.length){ showQ(next); } else { showDone(); } };
}
function showDone() {
  document.getElementById("root").innerHTML = '<div style="padding:40px;text-align:center"><h1 style="color:#fff;font-size:48px;margin-bottom:10px">Done!</h1><button id="bhome" style="margin-top:20px;padding:14px 32px;background:#6366f1;color:#fff;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none">Play Again</button></div>';
  document.getElementById("bhome").onclick = showHome;
}
showHome();
</script>
</body>
</html>
