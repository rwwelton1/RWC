<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
</head>
<body style="background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif">
<div id="root">Loading...</div>
<script>
function getQ() {
  return [
    {q:"How many points is a touchdown worth in the NFL?",c:["3","6","7","2"],a:1,f:"A touchdown is worth 6 points. The extra point or 2-point conversion comes after."},
    {q:"Which NBA team has won the most championships?",c:["Lakers","Bulls","Celtics","Warriors"],a:2,f:"The Boston Celtics have won 17 NBA championships."},
    {q:"How many strikes to strike out in baseball?",c:["2","3","4","1"],a:1,f:"Three strikes and you are out."},
    {q:"Which country has won the most FIFA World Cups?",c:["Germany","Argentina","Italy","Brazil"],a:3,f:"Brazil has won 5 World Cups: 1958, 1962, 1970, 1994, and 2002."},
    {q:"How long is a marathon in miles?",c:["24.2","25.5","26.2","27.1"],a:2,f:"A marathon is exactly 26.2 miles, set at the 1908 London Olympics."},
    {q:"What year did Michael Jordan win his first NBA championship?",c:["1989","1990","1991","1992"],a:2,f:"Jordan won his first ring in 1991 with the Chicago Bulls."},
    {q:"Which NFL QB has thrown the most career touchdown passes?",c:["Peyton Manning","Tom Brady","Brett Favre","Drew Brees"],a:1,f:"Tom Brady retired with 649 career TD passes, the all-time record."},
    {q:"Who holds the NHL record for most career goals?",c:["Mario Lemieux","Gordie Howe","Jaromir Jagr","Wayne Gretzky"],a:3,f:"Wayne Gretzky scored 894 career goals."},
    {q:"What year did Tiger Woods win his first Masters?",c:["1995","1996","1997","1998"],a:2,f:"Tiger Woods won the 1997 Masters at age 21 by a record 12 strokes."},
    {q:"Most points by one player in a single NBA game?",c:["81","92","100","63"],a:2,f:"Wilt Chamberlain scored 100 points on March 2, 1962."}
  ];
}
function getScore() {
  try { var v = sessionStorage.getItem("tScore"); return v ? parseInt(v) : 0; } catch(e) { return 0; }
}
function setScore(n) {
  try { sessionStorage.setItem("tScore", n); } catch(e) {}
}
function getResults() {
  try { var v = sessionStorage.getItem("tResults"); return v ? JSON.parse(v) : []; } catch(e) { return []; }
}
function setResults(r) {
  try { sessionStorage.setItem("tResults", JSON.stringify(r)); } catch(e) {}
}
function showHome() {
  setScore(0);
  setResults([]);
  document.getElementById("root").innerHTML = '<h1 style="color:#fff;padding:40px">Trivia Home</h1><button id="bst" style="margin:20px;padding:14px 32px;background:#6366f1;color:#fff;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none">Start Quiz</button>';
  document.getElementById("bst").onclick = function(){ showQ(0); };
}
function showQ(idx) {
  var Q = getQ();
  var q = Q[idx];
  document.getElementById("root").innerHTML = '<div style="padding:20px"><p style="color:#475569;font-size:11px;margin-bottom:12px">Q'+(idx+1)+' of '+Q.length+'</p><h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px">'+q.q+'</h2><button id="c0" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[0]+'</button><button id="c1" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[1]+'</button><button id="c2" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[2]+'</button><button id="c3" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[3]+'</button></div>';
  document.getElementById("c0").onclick = function(){ showResult(idx, 0); };
  document.getElementById("c1").onclick = function(){ showResult(idx, 1); };
  document.getElementById("c2").onclick = function(){ showResult(idx, 2); };
  document.getElementById("c3").onclick = function(){ showResult(idx, 3); };
}
function showResult(idx, chosen) {
  var Q = getQ();
  var q = Q[idx];
  var correct = chosen === q.a;
  var score = getScore() + (correct ? 1 : 0);
  setScore(score);
  var results = getResults();
  results.push(correct);
  setResults(results);
  var next = idx + 1;
  var nextLabel = next < Q.length ? "Next" : "See Results";
  document.getElementById("root").innerHTML = '<div style="padding:20px"><p style="color:#475569;font-size:11px;margin-bottom:12px">Q'+(idx+1)+' of '+Q.length+'</p><h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px">'+q.q+'</h2><p style="color:'+(correct?'#6ee7b7':'#fca5a5')+';margin-bottom:20px;font-weight:600">'+(correct?'Correct! ':'Wrong! ')+q.f+'</p><button id="bnxt" style="width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;font-family:inherit;cursor:pointer">'+nextLabel+'</button></div>';
  document.getElementById("bnxt").onclick = function(){ if(next < Q.length){ showQ(next); } else { showDone(); } };
}
function showDone() {
  var score = getScore();
  var results = getResults();
  var bugs = "";
  for(var i=0; i<results.length; i++){ bugs += results[i] ? "✅" : "❌"; }
  var d = new Date();
  var ds = d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
  var shareMsg = "PoolPlay Trivia (" + ds + ")\n" + bugs + " " + score + "/10\npool-play.vercel.app/trivia2.html";
  document.getElementById("root").innerHTML = '<div style="padding:40px;text-align:center"><h1 style="color:#fff;font-size:48px;margin-bottom:6px">'+score+'/10</h1><p style="color:#475569;margin-bottom:16px;font-size:20px">'+bugs+'</p><button id="bsms" style="display:block;width:100%;max-width:300px;margin:0 auto 12px;padding:14px;border-radius:12px;font-size:14px;font-weight:700;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;font-family:inherit;cursor:pointer">📱 Text a Friend</button><button id="bhome" style="display:block;width:100%;max-width:300px;margin:0 auto;padding:14px;border-radius:12px;font-size:14px;font-weight:700;background:#6366f1;color:#fff;border:none;font-family:inherit;cursor:pointer">Back to Hub</button></div>';
  document.getElementById("bsms").onclick = function(){ window.open("sms:?&body="+encodeURIComponent(shareMsg), "_blank"); };
  document.getElementById("bhome").onclick = function(){ window.location.href = "index.html"; };
}
showHome();
</script>
</body>
</html>
