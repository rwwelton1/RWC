<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
</head>
<body style="background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif">
<div id="root">Loading...</div>
<script>
function showHome() {
  document.getElementById("root").innerHTML = '<h1 style="color:#fff;padding:40px">Trivia Home</h1><button id="bst" style="margin:20px;padding:14px 32px;background:#6366f1;color:#fff;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none">Start Quiz</button>';
  document.getElementById("bst").onclick = showQ1;
}
function showQ1() {
  document.getElementById("root").innerHTML = '<div style="padding:20px"><p style="color:#475569;font-size:11px;margin-bottom:12px">Q1 of 2</p><h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px">How many points is a touchdown worth?</h2><button id="c0" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">3</button><button id="c1" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">6</button><button id="c2" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">7</button><button id="c3" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">2</button></div>';
  document.getElementById("c0").onclick = function(){ showQ1Result(false); };
  document.getElementById("c1").onclick = function(){ showQ1Result(true); };
  document.getElementById("c2").onclick = function(){ showQ1Result(false); };
  document.getElementById("c3").onclick = function(){ showQ1Result(false); };
}
function showQ1Result(correct) {
  document.getElementById("root").innerHTML = '<div style="padding:20px"><p style="color:#475569;font-size:11px;margin-bottom:12px">Q1 of 2</p><h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px">How many points is a touchdown worth?</h2><p style="color:'+(correct?"#6ee7b7":"#fca5a5")+';margin-bottom:20px">'+(correct?"Correct! A touchdown is worth 6 points.":"Wrong! A touchdown is worth 6 points.")+'</p><button id="bnxt" style="width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;font-family:inherit;cursor:pointer">Next</button></div>';
  document.getElementById("bnxt").onclick = showQ2;
}
function showQ2() {
  document.getElementById("root").innerHTML = '<div style="padding:20px"><p style="color:#475569;font-size:11px;margin-bottom:12px">Q2 of 2</p><h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px">Which NBA team has won the most championships?</h2><button id="c0" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">Lakers</button><button id="c1" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">Bulls</button><button id="c2" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">Celtics</button><button id="c3" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">Warriors</button></div>';
  document.getElementById("c0").onclick = function(){ showDone(false); };
  document.getElementById("c1").onclick = function(){ showDone(false); };
  document.getElementById("c2").onclick = function(){ showDone(true); };
  document.getElementById("c3").onclick = function(){ showDone(false); };
}
function showDone(correct) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;text-align:center"><h1 style="color:#fff;font-size:48px;margin-bottom:10px">Done!</h1><p style="color:'+(correct?"#6ee7b7":"#fca5a5")+'">'+(correct?"Correct!":"Wrong! It was the Celtics.")+'</p></div>';
}
showHome();
</script>
</body>
</html>
