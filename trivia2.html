<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
</head>
<body style="background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif">
<div id="root">Loading...</div>
<script>
function showHome() {
  document.getElementById("root").innerHTML = '<h1 style="color:#fff;padding:40px">Trivia Home</h1><button id="bst" style="margin:20px;padding:14px 32px;background:#6366f1;color:#fff;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none">Start Quiz</button>';
  document.getElementById("bst").onclick = startQuiz;
}
function startQuiz() {
  document.getElementById("root").innerHTML = '<div style="padding:20px"><h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px">How many points is a touchdown worth?</h2><button id="c0" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">3</button><button id="c1" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">6</button><button id="c2" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">7</button><button id="c3" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">2</button></div>';
  document.getElementById("c0").onclick = function(){ alert("Wrong! It is 6"); };
  document.getElementById("c1").onclick = function(){ alert("Correct!"); };
  document.getElementById("c2").onclick = function(){ alert("Wrong! It is 6"); };
  document.getElementById("c3").onclick = function(){ alert("Wrong! It is 6"); };
}
showHome();
</script>
</body>
</html>
