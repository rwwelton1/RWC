<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="dark"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
button,input{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none;background:none}
a{text-decoration:none;color:inherit}
.topbar{background:#0d1117;border-bottom:1px solid #1e2a3a;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-top:-2px}
.tag{background:#1e2a3a;border:1px solid #2d3f52;border-radius:20px;padding:3px 10px;font-size:10px;color:#94a3b8}
.btn-back{border:1px solid #2d3f52;border-radius:6px;color:#64748b;padding:6px 12px;font-size:11px;font-weight:600}
.wrap{max-width:500px;margin:0 auto;padding:16px 14px 60px}
.hero{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(168,85,247,.07));border:1px solid rgba(99,102,241,.28);border-radius:14px;padding:28px 20px 24px;text-align:center;margin-bottom:14px}
.hero-eyebrow{font-size:9px;color:#818cf8;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.hero-title{font-family:'Bebas Neue',cursive;font-size:52px;letter-spacing:.08em;background:linear-gradient(135deg,#fff 30%,#fbbf24 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px}
.hero-date{font-size:11px;color:#475569;margin-bottom:20px}
.hero-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:700;padding:13px 44px;border-radius:11px;border:none;font-family:'DM Sans',sans-serif}
.diff-row{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
.pill{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid}
.card{background:#0d1117;border:1px solid #1a2535;border-radius:12px;padding:16px;margin-bottom:10px}
.prog-hdr{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-lbl{font-size:10px;color:#475569}
.prog-pts{font-size:11px;font-weight:700;color:#a5b4fc}
.pbar{height:3px;background:#0f1923;border-radius:2px;margin-bottom:12px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.diff-badge{display:inline-flex;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid;margin-bottom:10px}
.qtext{font-size:16px;font-weight:700;color:#f1f5f9;line-height:1.45;margin-bottom:16px}
.choice{border:1px solid #1a2535;border-radius:10px;padding:12px 15px;font-size:13px;font-weight:500;color:#94a3b8;display:block;width:100%;text-align:left;background:#0d1117;margin-bottom:8px}
.fb-card{border-radius:10px;padding:12px 14px;font-size:12px;font-weight:600;margin-bottom:12px;line-height:1.5}
.fb-ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
.fb-no{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.fb-fact{font-size:11px;color:#475569;font-weight:400;margin-top:3px}
.btn-next{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.res-card{background:#0d1117;border:1px solid rgba(99,102,241,.22);border-radius:16px;padding:24px 20px;text-align:center;margin-bottom:10px}
.res-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 8px}
.res-name{font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.res-date{font-size:11px;color:#475569;margin-bottom:16px}
.res-score{font-family:'Bebas Neue',cursive;font-size:64px;letter-spacing:.05em;color:#fff;line-height:1;margin-bottom:16px}
.res-grid{font-size:28px;letter-spacing:3px;line-height:1.9;margin-bottom:16px}
.btn-share{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;margin-bottom:8px}
.btn-hub{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:#6366f1;color:#fff;border:none}
</style>
</head>
<body>
<div id="root">Loading...</div>
<script>
function getQ() {
  return [
    {q:"Which NHL team has won the most Stanley Cup championships?",c:["Toronto Maple Leafs","Detroit Red Wings","Boston Bruins","Montreal Canadiens"],a:3,d:"Easy",p:100,f:"The Montreal Canadiens have won 24 Stanley Cups, far more than any other franchise in NHL history."},
    {q:"How many points is a touchdown worth in the NFL?",c:["5","6","7","8"],a:1,d:"Easy",p:100,f:"A touchdown is worth 6 points. Teams then attempt a 1-point extra point kick or a 2-point conversion, making the most common score after a TD either 7 or 8 points."},
    {q:"Which MLB team has the most World Series titles?",c:["Boston Red Sox","Los Angeles Dodgers","San Francisco Giants","New York Yankees"],a:3,d:"Easy",p:100,f:"The New York Yankees have won 27 World Series titles, nearly double the next closest franchise. Their dynasty runs from 1923 through 2009."},
    {q:"Which NBA player won the most regular season MVP awards?",c:["LeBron James","Bill Russell","Michael Jordan","Kareem Abdul-Jabbar"],a:3,d:"Medium",p:200,f:"Kareem Abdul-Jabbar won 6 regular season MVP awards (1971-72, 1973-74, 1975-76, 1976-77, 1979-80, 1985-86), one more than Michael Jordan and Bill Russell who each won 5."},
    {q:"Who holds the NCAAF record for most career rushing yards?",c:["Tony Dorsett","Ricky Williams","Ron Dayne","Charles White"],a:1,d:"Medium",p:200,f:"Ricky Williams rushed for 6,279 yards at Texas from 1995-1998, winning the 1998 Heisman Trophy along the way. His record stood for over two decades."},
    {q:"Which NHL goalie holds the record for most career wins?",c:["Patrick Roy","Martin Brodeur","Roberto Luongo","Henrik Lundqvist"],a:1,d:"Medium",p:200,f:"Martin Brodeur won 691 games in his NHL career with the New Jersey Devils and St. Louis Blues, a record that shattered Patrick Roy's previous mark of 551."},
    {q:"Who scored 100 points in a single NBA game?",c:["Elgin Baylor","Michael Jordan","Wilt Chamberlain","Jerry West"],a:2,d:"Medium",p:200,f:"Wilt Chamberlain scored 100 points for the Philadelphia Warriors against the New York Knicks on March 2, 1962 — a record that has never been seriously threatened."},
    {q:"Which QB has thrown the most touchdown passes in a single NFL season?",c:["Tom Brady","Peyton Manning","Patrick Mahomes","Drew Brees"],a:1,d:"Hard",p:300,f:"Peyton Manning threw 55 touchdown passes in 2013 with the Denver Broncos, breaking Tom Brady's record of 50 set in 2007. Patrick Mahomes tied Brady's mark in 2022."},
    {q:"Who is the only player to win the Heisman Trophy and the Super Bowl MVP in the same year?",c:["Marcus Allen","Bo Jackson","Tim Brown","No one has done it"],a:3,d:"Hard",p:300,f:"No player has ever won both the Heisman Trophy and Super Bowl MVP in the same year — the Heisman is a college award given in December and the Super Bowl is played in February, so the timelines have never aligned for the same player."},
    {q:"Which MLB pitcher struck out 20 batters in a single 9-inning game — twice?",c:["Nolan Ryan","Randy Johnson","Pedro Martinez","Roger Clemens"],a:3,d:"Expert",p:400,f:"Roger Clemens struck out 20 batters on April 29, 1986 against the Mariners, then did it again on September 18, 1996 against the Tigers — the only pitcher ever to reach 20 strikeouts in a 9-inning game more than once."}
  ];
}
function getUser() {
  try { return localStorage.getItem("pp_user") || "Player"; } catch(e) { return "Player"; }
}
function getEmoji() {
  try { return localStorage.getItem("pp_emoji") || "🎯"; } catch(e) { return "🎯"; }
}
function getScore() { try { var v=sessionStorage.getItem("tScore"); return v?parseInt(v):0; } catch(e) { return 0; } }
function setScore(n) { try { sessionStorage.setItem("tScore",n); } catch(e) {} }
function getPoints() { try { var v=sessionStorage.getItem("tPoints"); return v?parseInt(v):0; } catch(e) { return 0; } }
function setPoints(n) { try { sessionStorage.setItem("tPoints",n); } catch(e) {} }
function getResults() { try { var v=sessionStorage.getItem("tResults"); return v?JSON.parse(v):[]; } catch(e) { return []; } }
function setResults(r) { try { sessionStorage.setItem("tResults",JSON.stringify(r)); } catch(e) {} }
function pointsFor(d) { if(d==="Easy") return 100; if(d==="Medium") return 200; if(d==="Hard") return 300; if(d==="Expert") return 400; return 100; }
function dstyle(d) { if(d==="Easy")return"background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7"; if(d==="Medium")return"background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.3);color:#fbbf24"; if(d==="Hard")return"background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);color:#fca5a5"; return"background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.4);color:#c4b5fd"; }
function topbar(back) {
  return '<div class="topbar"><div><div class="logo">POOLPLAY</div><div class="logo-sub">Daily Trivia</div></div>'+(back?'<button class="btn-back" id="bbk">&#8592; Home</button>':'<a href="index.html" class="tag">&#8592; Profile</a>')+'</div>';
}
function showHome() {
  setScore(0);
  setPoints(0);
  setResults([]);
  var d = new Date();
  var ds = d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  // Check if already played today
  var tKey = "pp_trivia_" + d.getFullYear() + "_" + (d.getMonth()+1) + "_" + d.getDate();
  var todayData = null;
  try { var tv = localStorage.getItem(tKey); if(tv) todayData = JSON.parse(tv); } catch(e) {}
  var o = topbar(false);
  o += '<div class="wrap">';
  o += '<div class="hero"><div class="hero-eyebrow">Daily Sports Trivia</div><div class="hero-title">TRIVIA</div><div class="hero-date">'+ds+'</div>';
  if(todayData && todayData.r) {
    var todayScore = todayData.r.filter(function(v){return v;}).length;
    var Q2 = getQ();
    function diffBlock2(q, correct) {
      if(!correct) return "⬜";
      var d = q ? q.d : "";
      if(d==="Easy")   return "🟩";
      if(d==="Medium") return "🟨";
      if(d==="Hard")   return "🟥";
      if(d==="Expert") return "🟪";
      return "🟩";
    }
    var row1="", row2="";
    for(var i=0;i<5;i++)  row1 += diffBlock2(Q2[i], todayData.r[i]);
    for(var i=5;i<10;i++) row2 += diffBlock2(Q2[i], todayData.r[i]);
    var todayPts = todayData.pts || 0;
    o += '<div class="res-score" style="font-size:40px;margin:8px 0">'+todayScore+'/10</div>';
    o += '<div style="font-size:13px;font-weight:700;color:#fbbf24;letter-spacing:.05em;margin-bottom:4px">'+todayPts+' pts</div>';
    o += '<div style="font-size:18px;letter-spacing:3px;margin-bottom:8px">'+row1+'</div>';
    o += '<div style="font-size:18px;letter-spacing:3px;margin-bottom:16px">'+row2+'</div>';
    o += '<div style="font-size:12px;color:#475569;margin-top:8px;letter-spacing:.05em">Come back tomorrow for a new quiz &#128522;</div>';
  } else {
    o += '<button class="hero-btn" id="bst">Start Quiz</button>';
  }
  o += '</div>';
  o += '<div class="diff-row"><div class="pill" style="color:#6ee7b7;border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07)">Easy</div><div class="pill" style="color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)">Medium</div><div class="pill" style="color:#fca5a5;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)">Hard</div><div class="pill" style="color:#c4b5fd;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.08)">Expert</div></div>';
  o += '<p style="font-size:11px;color:#334155;text-align:center">10 questions &middot; escalating difficulty &middot; NFL &middot; NBA &middot; MLB &middot; NHL</p>';
  o += '</div>';
  document.getElementById("root").innerHTML = o;
  var bst = document.getElementById("bst"); if(bst) bst.onclick = function(){ showQ(0); };
}
function showQ(idx) {
  var Q = getQ();
  var q = Q[idx];
  var o = topbar(true);
  o += '<div class="wrap">';
  o += '<div class="prog-hdr"><span class="prog-lbl">Q'+(idx+1)+' of '+Q.length+'</span><span class="prog-pts">'+getPoints()+' pts</span></div>';
  o += '<div class="pbar"><div class="pfill" style="width:'+Math.round(idx/Q.length*100)+'%"></div></div>';
  o += '<div class="diff-badge" style="'+dstyle(q.d)+'">'+q.d+' &middot; '+pointsFor(q.d)+' pts</div>';
  o += '<div class="card"><div class="qtext">'+q.q+'</div>';
  o += '<button id="c0" class="choice">'+q.c[0]+'</button>';
  o += '<button id="c1" class="choice">'+q.c[1]+'</button>';
  o += '<button id="c2" class="choice">'+q.c[2]+'</button>';
  o += '<button id="c3" class="choice">'+q.c[3]+'</button>';
  o += '</div></div>';
  document.getElementById("root").innerHTML = o;
  document.getElementById("bbk").onclick = showHome;
  document.getElementById("c0").onclick = function(){ showResult(idx,0); };
  document.getElementById("c1").onclick = function(){ showResult(idx,1); };
  document.getElementById("c2").onclick = function(){ showResult(idx,2); };
  document.getElementById("c3").onclick = function(){ showResult(idx,3); };
}
function showResult(idx, chosen) {
  var Q = getQ();
  var q = Q[idx];
  var correct = chosen === q.a;
  var score = getScore() + (correct ? 1 : 0);
  var pts = getPoints() + (correct ? pointsFor(q.d) : 0);
  setScore(score);
  setPoints(pts);
  var results = getResults();
  results.push(correct);
  setResults(results);
  var next = idx + 1;
  var nextLabel = next < Q.length ? "Next &#8594;" : "See Results";
  var o = topbar(false);
  o += '<div class="wrap">';
  o += '<div class="prog-hdr"><span class="prog-lbl">Q'+(idx+1)+' of '+Q.length+'</span><span class="prog-pts">'+pts+' pts</span></div>';
  o += '<div class="pbar"><div class="pfill" style="width:'+Math.round(next/Q.length*100)+'%"></div></div>';
  o += '<div class="diff-badge" style="'+dstyle(q.d)+'">'+q.d+' &middot; '+(correct?"+"+pointsFor(q.d)+" pts":"0 pts")+'</div>';
  o += '<div class="card"><div class="qtext">'+q.q+'</div>';
  o += '<div class="fb-card '+(correct?'fb-ok':'fb-no')+'">'+(correct?'&#9989; Correct!':'&#10060; Wrong &mdash; '+q.c[q.a])+'<div class="fb-fact">'+q.f+'</div></div>';
  o += '<button class="btn-next" id="bnxt">'+nextLabel+'</button>';
  o += '</div></div>';
  document.getElementById("root").innerHTML = o;
  document.getElementById("bnxt").onclick = function(){ if(next < Q.length){ showQ(next); } else { showDone(); } };
}
function showDone() {
  var score = getScore();
  var results = getResults();
  var username = getUser();
  var emoji = getEmoji();
  // Persist to localStorage so profile can show score history
  try {
    var d0 = new Date();
    var tKey = "pp_trivia_" + d0.getFullYear() + "_" + (d0.getMonth()+1) + "_" + d0.getDate();
    var totalPts = getPoints();
    localStorage.setItem(tKey, JSON.stringify({ s: score, r: results, u: username, ts: Date.now(), pts: totalPts }));
  } catch(e) {}
  var Q = getQ();
  function diffBlock(q, correct) {
    if(!correct) return "⬜";
    var d = q ? q.d : "";
    if(d==="Easy")   return "🟩";
    if(d==="Medium") return "🟨";
    if(d==="Hard")   return "🟥";
    if(d==="Expert") return "🟪";
    return "🟩";
  }
  var row1 = "";
  var row2 = "";
  for(var i=0;i<5;i++)  row1 += diffBlock(Q[i], results[i]);
  for(var i=5;i<10;i++) row2 += diffBlock(Q[i], results[i]);
  var d = new Date();
  var ds = d.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  var shareMsg = "PoolPlay Trivia 🏆\n"+ds+"\n"+score+"/10\n\n"+row1+"\n"+row2+"\n\nhttps://pool-play.vercel.app/trivia2.html";
  var o = topbar(false);
  o += '<div class="wrap">';
  o += '<div class="res-card">';
  o += '<div class="res-avatar">'+emoji+'</div>';
  o += '<div class="res-name">'+username+'</div>';
  o += '<div class="res-date">'+ds+'</div>';
  o += '<div class="res-score">'+score+'/10</div>';
  o += '<div style="font-size:13px;font-weight:700;color:#fbbf24;letter-spacing:.05em;margin-bottom:4px">'+getPoints()+' pts</div>';
  o += '<div class="res-grid">'+row1+'</div>';
  o += '<div class="res-grid">'+row2+'</div>';
  o += '<a href="https://pool-play.vercel.app/trivia2.html" style="display:block;font-size:11px;color:#6366f1;margin-bottom:16px;text-decoration:underline">pool-play.vercel.app/trivia2.html</a>';
  o += '<button class="btn-share" id="bsh">Share Results</button>';
  o += '<button class="btn-hub" id="bhub">Back to Hub</button>';
  o += '</div></div>';
  document.getElementById("root").innerHTML = o;
  document.getElementById("bsh").onclick = function(){ window.open("sms:?&body="+encodeURIComponent(shareMsg),"_blank"); };
  document.getElementById("bhub").onclick = function(){ window.location.href="index.html"; };
}
showHome();
</script>
</body>
</html>
