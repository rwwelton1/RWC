<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
</head>
<body style="background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif">
<div id="root">Loading...</div>
<script>
function showHome() {
  var Q = [
    {q:"How many points is a touchdown worth?", c:["3","6","7","2"], a:1},
    {q:"Which NBA team has won the most championships?", c:["Lakers","Bulls","Celtics","Warriors"], a:2}
  ];
  document.getElementById("root").innerHTML = '<h1 style="color:#fff;padding:40px">Trivia Home</h1><button id="bst" style="margin:20px;padding:14px 32px;background:#6366f1;color:#fff;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none">Start Quiz</button>';
  document.getElementById("bst").onclick = function() {
    var q = Q[0];
    document.getElementById("root").innerHTML = '<div style="padding:20px"><h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px">'+q.q+'</h2><button id="c0" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[0]+'</button><button id="c1" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[1]+'</button><button id="c2" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[2]+'</button><button id="c3" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[3]+'</button></div>';
    document.getElementById("c0").onclick = function(){ alert(0===q.a?"Correct!":"Wrong! "+q.c[q.a]); };
    document.getElementById("c1").onclick = function(){ alert(1===q.a?"Correct!":"Wrong! "+q.c[q.a]); };
    document.getElementById("c2").onclick = function(){ alert(2===q.a?"Correct!":"Wrong! "+q.c[q.a]); };
    document.getElementById("c3").onclick = function(){ alert(3===q.a?"Correct!":"Wrong! "+q.c[q.a]); };
  };
}
showHome();
</script>
</body>
</html>
