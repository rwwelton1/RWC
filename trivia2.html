<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
</head>
<body style="background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif">
<div id="root">Loading...</div>
<script>
var Q = [
  {q:"How many points is a touchdown worth in the NFL?", c:["3","6","7","2"], a:1},
  {q:"Which NBA team has won the most championships?", c:["Lakers","Bulls","Celtics","Warriors"], a:2}
];
var cur = 0;

function showQ() {
var q = Q[cur];
var html = ‘<div style="padding:20px">’;
html += ‘<p style="color:#475569;font-size:11px;margin-bottom:12px">Q’+(cur+1)+’ of ‘+Q.length+’</p>’;
html += ‘<h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px;line-height:1.4">’+q.q+’</h2>’;
for (var i = 0; i < q.c.length; i++) {
html += ‘<button id="ch'+i+'" style="display:block;width:100%;margin-bottom:10px;padding:12px 15px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit">’+q.c[i]+’</button>’;
}
html += ‘</div>’;
document.getElementById(“root”).innerHTML = html;
for (var j = 0; j < q.c.length; j++) {
(function(idx) {
document.getElementById(“ch”+idx).onclick = function() {
var correct = idx === Q[cur].a;
document.getElementById(“ch”+idx).style.borderColor = correct ? “rgba(16,185,129,.6)” : “rgba(239,68,68,.5)”;
document.getElementById(“ch”+idx).style.color = correct ? “#6ee7b7” : “#fca5a5”;
if (!correct) {
document.getElementById(“ch”+Q[cur].a).style.borderColor = “rgba(16,185,129,.6)”;
document.getElementById(“ch”+Q[cur].a).style.color = “#6ee7b7”;
}
setTimeout(function() {
if (cur < Q.length - 1) { cur++; showQ(); }
else { document.getElementById(“root”).innerHTML = ‘<h1 style="color:#fff;padding:40px">Done!</h1>’; }
}, 1000);
};
})(j);
}
}

showQ();
</script>

</body>
</html>
