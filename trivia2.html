<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
a{text-decoration:none;color:inherit}
.topbar{background:#0d1117;border-bottom:1px solid #1e2a3a;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.logo{font-size:17px;font-weight:900;color:#fff}.logo b{color:#fbbf24}
.sub{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.back{border:1px solid #2d3f52;border-radius:6px;color:#64748b;padding:6px 12px;font-size:11px;font-weight:600}
.wrap{max-width:500px;margin:0 auto;padding:20px 16px 60px}
.hero{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(168,85,247,.07));border:1px solid rgba(99,102,241,.28);border-radius:16px;padding:28px 20px 24px;text-align:center;margin-bottom:16px}
.hero-tag{font-size:9px;color:#818cf8;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.hero-title{font-size:40px;font-weight:900;color:#fff;margin-bottom:4px}
.hero-date{font-size:12px;color:#475569;margin-bottom:20px}
.start-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:700;padding:14px 48px;border-radius:12px}
.done-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:16px}
.done-label{font-size:11px;font-weight:700;color:#6ee7b7;margin-bottom:8px}
.done-bugs{font-size:22px;letter-spacing:3px;margin-bottom:6px;line-height:1.6}
.done-score{font-size:12px;color:#64748b;margin-bottom:12px}
.text-btn{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;font-size:12px;font-weight:700;padding:9px 24px;border-radius:8px}
.diff-row{display:flex;gap:6px;margin-bottom:14px;justify-content:center}
.pill{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid}
.prog-hdr{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-lbl{font-size:10px;color:#475569}
.prog-pts{font-size:11px;font-weight:700;color:#a5b4fc}
.pbar{height:4px;background:#0f1923;border-radius:2px;margin-bottom:14px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.dots{display:flex;gap:4px;justify-content:center;margin-bottom:18px}
.dot{width:11px;height:11px;border-radius:50%;background:#1a2535}
.badge{display:inline-flex;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid;margin-bottom:10px}
.qcard{background:#0d1117;border:1px solid #1a2535;border-radius:14px;padding:18px;margin-bottom:14px}
.qtext{font-size:16px;font-weight:700;color:#f1f5f9;line-height:1.45}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.choice{border:1px solid #1a2535;border-radius:10px;padding:12px 15px;font-size:13px;font-weight:500;color:#94a3b8;display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#0d1117}
.correct{border-color:rgba(16,185,129,.6);background:rgba(16,185,129,.07);color:#6ee7b7}
.wrong{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.05);color:#fca5a5}
.dim{opacity:.2}
.cltr{width:22px;height:22px;flex-shrink:0;border-radius:5px;background:#07090f;border:1px solid #1a2535;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#334155}
.fb{border-radius:10px;padding:11px 13px;font-size:12px;font-weight:600;display:flex;align-items:flex-start;gap:9px;margin-bottom:12px;line-height:1.4}
.fb-ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
.fb-no{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.18);color:#fca5a5}
.fb-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.fb-fact{font-size:10px;color:#475569;font-weight:400;margin-top:3px;line-height:1.5}
.nxt{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.res-wrap{text-align:center;padding:8px 0 20px}
.res-trophy{font-size:64px;display:block;margin-bottom:10px}
.res-score{font-size:64px;font-weight:900;color:#fff;line-height:1;margin-bottom:2px}
.res-sub{font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.res-msg{font-size:13px;color:#64748b;margin-bottom:20px}
.scard{background:#0d1117;border:1px solid rgba(99,102,241,.22);border-radius:14px;padding:18px;margin-bottom:10px}
.scard-ttl{font-size:9px;color:#6366f1;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-weight:700}
.scard-bugs{font-size:22px;letter-spacing:3px;margin-bottom:6px;line-height:1.6}
.scard-sc{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:14px}
.scard-btns{display:flex;gap:8px}
.sms-btn{flex:1;padding:12px;border-radius:9px;font-size:13px;font-weight:700;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.copy-btn{flex:1;padding:12px;border-radius:9px;font-size:13px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.bkdn{background:#0d1117;border:1px solid #1a2535;border-radius:12px;overflow:hidden;margin-bottom:10px}
.brow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #07090f}
.brow:last-child{border-bottom:none}
.bnum{font-size:9px;color:#334155;font-weight:700;width:16px;flex-shrink:0;text-align:center}
.bq{font-size:11px;color:#64748b;flex:1;line-height:1.3}
.bic{font-size:14px;flex-shrink:0}
.home-btn{width:100%;padding:12px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid #1e2a3a;color:#475569;margin-top:6px}
</style>
</head>
<body>
<div id="root">Loading...</div>
<script>
function showHome() {
  var Q=[
    {q:"How many points is a touchdown worth in the NFL?",c:["3","6","7","2"],a:1,d:"Easy",f:"A touchdown is worth 6 points. The extra point or 2-point conversion comes after."},
    {q:"Which NBA team has won the most championships?",c:["Lakers","Bulls","Celtics","Warriors"],a:2,d:"Easy",f:"The Boston Celtics have won 17 NBA championships, the most in league history."},
    {q:"How many strikes does it take to strike out in baseball?",c:["2","3","4","1"],a:1,d:"Easy",f:"Three strikes and you are out."},
    {q:"Which country has won the most FIFA World Cups?",c:["Germany","Argentina","Italy","Brazil"],a:3,d:"Medium",f:"Brazil has won 5 World Cups: 1958, 1962, 1970, 1994, and 2002."},
    {q:"How long is a marathon in miles?",c:["24.2","25.5","26.2","27.1"],a:2,d:"Medium",f:"A marathon is exactly 26.2 miles, set at the 1908 London Olympics."},
    {q:"What year did Michael Jordan win his first NBA championship?",c:["1989","1990","1991","1992"],a:2,d:"Medium",f:"Jordan won his first ring in 1991 with the Chicago Bulls."},
    {q:"Which NFL QB has thrown the most career touchdown passes?",c:["Peyton Manning","Tom Brady","Brett Favre","Drew Brees"],a:1,d:"Hard",f:"Tom Brady retired with 649 career TD passes, the all-time record."},
    {q:"Who holds the NHL record for most career goals?",c:["Mario Lemieux","Gordie Howe","Jaromir Jagr","Wayne Gretzky"],a:3,d:"Hard",f:"Wayne Gretzky scored 894 career goals."},
    {q:"What year did Tiger Woods win his first Masters?",c:["1995","1996","1997","1998"],a:2,d:"Hard",f:"Tiger Woods won the 1997 Masters at age 21 by a record 12 strokes."},
    {q:"Most points by one player in a single NBA game?",c:["81","92","100","63"],a:2,d:"Expert",f:"Wilt Chamberlain scored 100 points on March 2, 1962."}
  ];
  var state = {cur:0, answered:false, score:0, history:[]};

function bugs(r){var s=””;for(var i=0;i<r.length;i++)s+=r[i]?”\u2705”:”\u274C”;return s;}
function scoreMsg(n){if(n>=9)return”Legendary”;if(n>=7)return”Great game”;if(n>=5)return”Not bad”;if(n>=3)return”Keep practicing”;return”Rough one”;}
function trophy(n){if(n>=9)return”\uD83C\uDFC6”;if(n>=7)return”\uD83E\uDD47”;if(n>=5)return”\uD83E\uDD48”;return”\uD83E\uDD49”;}
function skey(){var d=new Date();return “pp_trivia_”+d.getFullYear()+”*”+(d.getMonth()+1)+”*”+d.getDate();}
function saveResult(r){try{localStorage.setItem(skey(),JSON.stringify({r:r}));}catch(e){}}
function loadResult(){try{var v=localStorage.getItem(skey());return v?JSON.parse(v):null;}catch(e){return null;}}
function shareText(r){var c=r.filter(function(v){return v;}).length,d=new Date(),ds=d.toLocaleDateString(“en-US”,{month:“short”,day:“numeric”});return “PoolPlay Trivia (”+ds+”)\n”+bugs(r)+” “+c+”/10\npool-play.vercel.app/trivia2.html”;}
function doSMS(r){window.open(“sms:?&body=”+encodeURIComponent(shareText(r)),”_blank”);}
function doCopy(r){var t=shareText(r);if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){var b=document.getElementById(“bcpy”);if(b){var o=b.textContent;b.textContent=“Copied!”;setTimeout(function(){b.textContent=o;},2000);}});}else{prompt(“Copy:”,t);}}
function dstyle(d){if(d===“Easy”)return”background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7”;if(d===“Medium”)return”background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.3);color:#fbbf24”;if(d===“Hard”)return”background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);color:#fca5a5”;return”background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.4);color:#c4b5fd”;}

function renderHome() {
var sv = loadResult();
var d = new Date(), ds = d.toLocaleDateString(“en-US”,{weekday:“long”,month:“long”,day:“numeric”});
var o = ‘<div class="topbar"><div><div class="logo">POOL<b>PLAY</b></div><div class="sub">Daily Trivia</div></div><a href="index.html" class="back">\u2190 Profile</a></div>’;
o += ‘<div class="wrap"><div class="hero"><div class="hero-tag">Daily Sports Trivia</div><div class="hero-title">TRIVIA</div><div class="hero-date">’+ds+’</div>’;
if(sv){var c=sv.r.filter(function(v){return v;}).length;o+=’<div class="done-box"><div class="done-label">\u2705 Completed today</div><div class="done-bugs">’+bugs(sv.r)+’</div><div class="done-score">’+c+’/10 \u2014 ‘+scoreMsg(c)+’</div><button class="text-btn" id="bsh">\uD83D\uDCF1 Text a Friend</button></div>’;}
else{o+=’<button class="start-btn" id="bst">Start Quiz</button>’;}
o += ‘</div><div class="diff-row"><div class="pill" style="color:#6ee7b7;border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07)">Easy</div><div class="pill" style="color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)">Medium</div><div class="pill" style="color:#fca5a5;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)">Hard</div><div class="pill" style="color:#c4b5fd;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.08)">Expert</div></div>’;
o += ‘<div style="font-size:11px;color:#334155;text-align:center">10 questions \u00b7 escalating difficulty \u00b7 NFL \u00b7 NBA \u00b7 MLB \u00b7 NHL</div></div>’;
document.getElementById(“root”).innerHTML = o;
var bst=document.getElementById(“bst”); if(bst) bst.onclick=startQuiz;
var bsh=document.getElementById(“bsh”); if(bsh&&sv) bsh.onclick=function(){doSMS(sv.r);};
}

function startQuiz() {
state.cur=0; state.answered=false; state.score=0; state.history=[];
renderQ();
}

function renderQ() {
var q=Q[state.cur], tot=Q.length, L=[“A”,“B”,“C”,“D”];
var o = ‘<div class="topbar"><div><div class="logo">POOL<b>PLAY</b></div><div class="sub">Daily Trivia</div></div><button class="back" id="bback">\u2190 Home</button></div>’;
o += ‘<div class="wrap">’;
o += ‘<div class="prog-hdr"><span class="prog-lbl">Q’+(state.cur+1)+’ of ‘+tot+’</span><span class="prog-pts">’+state.score+’ pts</span></div>’;
o += ‘<div class="pbar"><div class="pfill" style="width:'+Math.round(state.cur/tot*100)+'%"></div></div>’;
o += ‘<div class="dots">’;
for(var i=0;i<tot;i++){var bg=i<state.history.length?(state.history[i].c?”#10b981”:”#ef4444”):”#1a2535”;o+=’<div class="dot" style="background:'+bg+'"></div>’;}
o += ‘</div>’;
o += ‘<div class="badge" style="'+dstyle(q.d)+'">’+q.d+’</div>’;
o += ‘<div class="qcard"><div class="qtext">’+q.q+’</div></div>’;
o += ‘<div class="choices">’;
for(var ci=0;ci<q.c.length;ci++){
var cls=“choice”;
if(state.answered){if(ci===q.a)cls+=” correct”;else if(state.history[state.history.length-1].chosen===ci)cls+=” wrong”;else cls+=” dim”;}
o+=’<button class="'+cls+'" id="ch'+ci+'"><div class="cltr">’+L[ci]+’</div>’+q.c[ci]+’</button>’;
}
o += ‘</div>’;
if(state.answered){
var last=state.history[state.history.length-1];
o+=’<div class=“fb ‘+(last.c?“fb-ok”:“fb-no”)+’”><div class="fb-icon">’+(last.c?”\u2705”:”\u274C”)+’</div><div><strong>’+(last.c?“Correct!”:“Wrong \u2014 “+q.c[q.a])+’</strong><div class="fb-fact">’+q.f+’</div></div></div>’;
}
o += ‘<button id=“bnxt” class=“nxt” style=”’+(state.answered?””:“display:none”)+’”>’+(state.cur===tot-1?“See Results”:“Next \u2192”)+’</button>’;
o += ‘</div>’;
document.getElementById(“root”).innerHTML = o;
document.getElementById(“bback”).onclick = renderHome;
if(!state.answered){
for(var bi=0;bi<q.c.length;bi++){
(function(idx){
var btn=document.getElementById(“ch”+idx);
if(btn) btn.onclick=function(){
if(state.answered) return;
var ok=(idx===Q[state.cur].a);
if(ok) state.score+=10;
state.history.push({c:ok,chosen:idx});
state.answered=true;
renderQ();
};
})(bi);
}
}
var bnxt=document.getElementById(“bnxt”);
if(bnxt) bnxt.onclick=function(){
if(state.cur<Q.length-1){state.cur++;state.answered=false;renderQ();}
else{saveResult(state.history.map(function(h){return h.c;}));renderResults();}
};
}

function renderResults() {
var r=state.history.map(function(h){return h.c;}), c=r.filter(function(v){return v;}).length;
var o = ‘<div class="topbar"><div><div class="logo">POOL<b>PLAY</b></div><div class="sub">Daily Trivia</div></div><a href="index.html" class="back">\u2190 Profile</a></div>’;
o += ‘<div class="wrap"><div class="res-wrap"><span class="res-trophy">’+trophy(c)+’</span><div class="res-score">’+c+’/10</div><div class="res-sub">Daily Trivia</div><div class="res-msg">’+scoreMsg(c)+’</div></div>’;
o += ‘<div class="scard"><div class="scard-ttl">Share Your Score</div><div class="scard-bugs">’+bugs(r)+’</div><div class="scard-sc">’+c+’/10 correct</div><div class="scard-btns"><button class="sms-btn" id="bsms">\uD83D\uDCF1 Text a Friend</button><button class="copy-btn" id="bcpy">Copy</button></div></div>’;
o += ‘<div class="bkdn">’;
for(var i=0;i<Q.length;i++){var ok=state.history[i]&&state.history[i].c;o+=’<div class="brow"><div class="bnum">’+(i+1)+’</div><div class="bq">’+Q[i].q+’</div><div class="bic">’+(ok?”\u2705”:”\u274C”)+’</div></div>’;}
o += ‘</div><button class="home-btn" id="bhome">Back to Home</button></div>’;
document.getElementById(“root”).innerHTML = o;
document.getElementById(“bsms”).onclick=function(){doSMS(r);};
document.getElementById(“bcpy”).onclick=function(){doCopy(r);};
document.getElementById(“bhome”).onclick=renderHome;
}

renderHome();
}
showHome();
</script>

</body>
</html>
