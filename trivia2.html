<body style="background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif">
<div id="root">Loading...</div>
<script>
function showHome() {
  try {
    var Q=[
      {q:"How many points is a touchdown worth in the NFL?",c:["3","6","7","2"],a:1,d:"Easy",f:"A touchdown is worth 6 points."},
      {q:"Which NBA team has won the most championships?",c:["Lakers","Bulls","Celtics","Warriors"],a:2,d:"Easy",f:"The Boston Celtics have won 17 NBA championships."}
    ];
    var state = {cur:0, answered:false, score:0, history:[]};

```
function renderHome() {
  document.getElementById("root").innerHTML = '<h1 style="color:#fff;padding:40px">Trivia Home</h1><button id="bst" style="margin:20px;padding:14px 32px;background:#6366f1;color:#fff;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none">Start Quiz</button>';
  document.getElementById("bst").onclick = startQuiz;
}

function startQuiz() {
  state.cur=0; state.answered=false; state.score=0; state.history=[];
  renderQ();
}

function renderQ() {
  var q=Q[state.cur];
  var o = '<div style="padding:20px"><p style="color:#475569;font-size:11px;margin-bottom:12px">Q'+(state.cur+1)+' of '+Q.length+'</p>';
  o += '<h2 style="color:#f1f5f9;font-size:16px;margin-bottom:20px;line-height:1.4">'+q.q+'</h2>';
  for(var i=0;i<q.c.length;i++){
    o+='<button id="ch'+i+'" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px;font-family:inherit;cursor:pointer">'+q.c[i]+'</button>';
  }
  if(state.answered){
    var last=state.history[state.history.length-1];
    o+='<p style="margin-top:10px;color:'+(last.c?"#6ee7b7":"#fca5a5")+'">'+(last.c?"Correct! ":"Wrong! ")+q.f+'</p>';
    o+='<button id="bnxt" style="margin-top:14px;width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;font-family:inherit;cursor:pointer">'+(state.cur===Q.length-1?"See Results":"Next")+'</button>';
  }
  o+='</div>';
  document.getElementById("root").innerHTML = o;
  if(!state.answered){
    for(var bi=0;bi<q.c.length;bi++){
      (function(idx){
        var btn=document.getElementById("ch"+idx);
        if(btn) btn.onclick=function(){
          if(state.answered) return;
          var ok=(idx===Q[state.cur].a);
          if(ok) state.score+=10;
          state.history.push({c:ok,chosen:idx});
          state.answered=true;
          renderQ();
        };
      })(bi);
    }
  } else {
    var bnxt=document.getElementById("bnxt");
    if(bnxt) bnxt.onclick=function(){
      if(state.cur<Q.length-1){state.cur++;state.answered=false;renderQ();}
      else{document.getElementById("root").innerHTML='<h1 style="color:#fff;padding:40px">Score: '+state.score+'</h1><button onclick="showHome()" style="margin:20px;padding:14px 32px;background:#6366f1;color:#fff;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none">Play Again</button>';}
    };
  }
}

renderHome();
