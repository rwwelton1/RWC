<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="dark"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
a{text-decoration:none;color:inherit}
.topbar{background:#0d1117;border-bottom:1px solid #1e2a3a;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50}
.app-name{font-size:16px;font-weight:700}
.app-sub{font-size:9px;color:#475569;margin-top:1px}
.topbar-right{display:flex;gap:6px;align-items:center}
.tag{background:#1e2a3a;border:1px solid #2d3f52;border-radius:20px;padding:3px 10px;font-size:10px;color:#94a3b8}
.wrap{max-width:500px;margin:0 auto;padding:16px 14px 60px}
.btn-back{border:1px solid #2d3f52;border-radius:6px;color:#64748b;padding:6px 12px;font-size:11px;font-weight:600}
.hero{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(168,85,247,.07));border:1px solid rgba(99,102,241,.28);border-radius:14px;padding:28px 20px 24px;text-align:center;margin-bottom:14px}
.hero-eyebrow{font-size:9px;color:#818cf8;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.hero-title{font-size:38px;font-weight:900;color:#fff;margin-bottom:4px}
.hero-date{font-size:11px;color:#475569;margin-bottom:20px}
.hero-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:700;padding:13px 44px;border-radius:11px;border:none}
.diff-row{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
.pill{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid}
.card{background:#0d1117;border:1px solid #1a2535;border-radius:12px;padding:16px;margin-bottom:10px}
.prog-hdr{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-lbl{font-size:10px;color:#475569}
.prog-pts{font-size:11px;font-weight:700;color:#a5b4fc}
.pbar{height:3px;background:#0f1923;border-radius:2px;margin-bottom:12px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.diff-badge{display:inline-flex;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid;margin-bottom:10px}
.qtext{font-size:16px;font-weight:700;color:#f1f5f9;line-height:1.45;margin-bottom:16px}
.choice{border:1px solid #1a2535;border-radius:10px;padding:12px 15px;font-size:13px;font-weight:500;color:#94a3b8;display:block;width:100%;text-align:left;background:#0d1117;margin-bottom:8px}
.fb-card{border-radius:10px;padding:12px 14px;font-size:12px;font-weight:600;margin-bottom:12px;line-height:1.5}
.fb-ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
.fb-no{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.fb-fact{font-size:11px;color:#475569;font-weight:400;margin-top:3px}
.btn-next{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.res-score{font-size:56px;font-weight:900;color:#fff;text-align:center;margin-bottom:4px}
.res-date{font-size:11px;color:#475569;text-align:center;margin-bottom:20px}
.share-card{background:#0d1117;border:1px solid rgba(99,102,241,.22);border-radius:14px;padding:20px;text-align:center;margin-bottom:10px}
.share-grid{font-size:26px;letter-spacing:3px;margin-bottom:6px;line-height:1.8}
.share-score{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:16px}
.btn-sms{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;margin-bottom:8px}
.btn-hub{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:#6366f1;color:#fff;border:none}
</style>
</head>
<body>
<div id="root">Loading...</div>
<script>
function getQ() {
  return [
    {q:"How many points is a touchdown worth in the NFL?",c:["3","6","7","2"],a:1,d:"Easy",f:"A touchdown is worth 6 points. The extra point or 2-point conversion comes after."},
    {q:"Which NBA team has won the most championships?",c:["Lakers","Bulls","Celtics","Warriors"],a:2,d:"Easy",f:"The Boston Celtics have won 17 NBA championships."},
    {q:"How many strikes to strike out in baseball?",c:["2","3","4","1"],a:1,d:"Easy",f:"Three strikes and you are out."},
    {q:"Which country has won the most FIFA World Cups?",c:["Germany","Argentina","Italy","Brazil"],a:3,d:"Medium",f:"Brazil has won 5 World Cups: 1958, 1962, 1970, 1994, and 2002."},
    {q:"How long is a marathon in miles?",c:["24.2","25.5","26.2","27.1"],a:2,d:"Medium",f:"A marathon is exactly 26.2 miles, set at the 1908 London Olympics."},
    {q:"What year did Michael Jordan win his first NBA championship?",c:["1989","1990","1991","1992"],a:2,d:"Medium",f:"Jordan won his first ring in 1991 with the Chicago Bulls."},
    {q:"Which NFL QB has thrown the most career touchdown passes?",c:["Peyton Manning","Tom Brady","Brett Favre","Drew Brees"],a:1,d:"Hard",f:"Tom Brady retired with 649 career TD passes, the all-time record."},
    {q:"Who holds the NHL record for most career goals?",c:["Mario Lemieux","Gordie Howe","Jaromir Jagr","Wayne Gretzky"],a:3,d:"Hard",f:"Wayne Gretzky scored 894 career goals."},
    {q:"What year did Tiger Woods win his first Masters?",c:["1995","1996","1997","1998"],a:2,d:"Hard",f:"Tiger Woods won the 1997 Masters at age 21 by a record 12 strokes."},
    {q:"Most points by one player in a single NBA game?",c:["81","92","100","63"],a:2,d:"Expert",f:"Wilt Chamberlain scored 100 points on March 2, 1962."}
  ];
}
function getScore(){try{var v=sessionStorage.getItem("tScore");return v?parseInt(v):0;}catch(e){return 0;}}
function setScore(n){try{sessionStorage.setItem("tScore",n);}catch(e){}}
function getResults(){try{var v=sessionStorage.getItem("tResults");return v?JSON.parse(v):[];}catch(e){return [];}}
function setResults(r){try{sessionStorage.setItem("tResults",JSON.stringify(r));}catch(e){}}
function dstyle(d){if(d==="Easy")return"background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7";if(d==="Medium")return"background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.3);color:#fbbf24";if(d==="Hard")return"background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);color:#fca5a5";return"background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.4);color:#c4b5fd";}
function topbar(back) {
  return '<div class="topbar"><div><div class="app-name">POOL<span style="color:#fbbf24">PLAY</span></div><div class="app-sub">DAILY TRIVIA</div></div><div class="topbar-right">'+(back?'<button class="btn-back" id="bbk">&#8592; Home</button>':'<a href="index.html" class="tag">&#8592; Profile</a>')+'</div></div>';
}
function showHome() {
  setScore(0);
  setResults([]);
  var d = new Date();
  var ds = d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  var o = topbar(false);
  o += '<div class="wrap">';
  o += '<div class="hero"><div class="hero-eyebrow">Daily Sports Trivia</div><div class="hero-title">TRIVIA</div><div class="hero-date">'+ds+'</div><button class="hero-btn" id="bst">Start Quiz</button></div>';
  o += '<div class="diff-row"><div class="pill" style="color:#6ee7b7;border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07)">Easy</div><div class="pill" style="color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)">Medium</div><div class="pill" style="color:#fca5a5;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)">Hard</div><div class="pill" style="color:#c4b5fd;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.08)">Expert</div></div>';
  o += '<p style="font-size:11px;color:#334155;text-align:center">10 questions &middot; escalating difficulty &middot; NFL &middot; NBA &middot; MLB &middot; NHL</p>';
  o += '</div>';
  document.getElementById("root").innerHTML = o;
  document.getElementById("bst").onclick = function(){ showQ(0); };
}
function showQ(idx) {
  var Q = getQ();
  var q = Q[idx];
  var pct = Math.round(idx/Q.length*100);
  var o = topbar(true);
  o += '<div class="wrap">';
  o += '<div class="prog-hdr"><span class="prog-lbl">Q'+(idx+1)+' of '+Q.length+'</span><span class="prog-pts">'+getScore()+' correct</span></div>';
  o += '<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>';
  o += '<div class="diff-badge" style="'+dstyle(q.d)+'">'+q.d+'</div>';
  o += '<div class="card"><div class="qtext">'+q.q+'</div>';
  o += '<button id="c0" class="choice">'+q.c[0]+'</button>';
  o += '<button id="c1" class="choice">'+q.c[1]+'</button>';
  o += '<button id="c2" class="choice">'+q.c[2]+'</button>';
  o += '<button id="c3" class="choice">'+q.c[3]+'</button>';
  o += '</div></div>';
  document.getElementById("root").innerHTML = o;
  document.getElementById("bbk").onclick = showHome;
  document.getElementById("c0").onclick = function(){ showResult(idx, 0); };
  document.getElementById("c1").onclick = function(){ showResult(idx, 1); };
  document.getElementById("c2").onclick = function(){ showResult(idx, 2); };
  document.getElementById("c3").onclick = function(){ showResult(idx, 3); };
}
function showResult(idx, chosen) {
  var Q = getQ();
  var q = Q[idx];
  var correct = chosen === q.a;
  var score = getScore() + (correct ? 1 : 0);
  setScore(score);
  var results = getResults();
  results.push(correct);
  setResults(results);
  var next = idx + 1;
  var nextLabel = next < Q.length ? "Next &#8594;" : "See Results";
  var o = topbar(false);
  o += '<div class="wrap">';
  o += '<div class="prog-hdr"><span class="prog-lbl">Q'+(idx+1)+' of '+Q.length+'</span><span class="prog-pts">'+score+' correct</span></div>';
  o += '<div class="pbar"><div class="pfill" style="width:'+Math.round(next/Q.length*100)+'%"></div></div>';
  o += '<div class="diff-badge" style="'+dstyle(q.d)+'">'+q.d+'</div>';
  o += '<div class="card"><div class="qtext">'+q.q+'</div>';
  o += '<div class="fb-card '+(correct?'fb-ok':'fb-no')+'">'+(correct?'&#9989; Correct!':'&#10060; Wrong &mdash; '+q.c[q.a])+'<div class="fb-fact">'+q.f+'</div></div>';
  o += '<button class="btn-next" id="bnxt">'+nextLabel+'</button>';
  o += '</div></div>';
  document.getElementById("root").innerHTML = o;
  document.getElementById("bnxt").onclick = function(){ if(next < Q.length){ showQ(next); } else { showDone(); } };
}
function showDone() {
  var score = getScore();
  var results = getResults();
  var row1 = "";
  var row2 = "";
  for(var i=0;i<5;i++){ row1 += results[i] ? "&#129001;" : "&#11036;"; }
  for(var i=5;i<10;i++){ row2 += results[i] ? "&#129001;" : "&#11036;"; }
  var d = new Date();
  var ds = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  var shareMsg = "PoolPlay Trivia 🏆\n"+ds+"\n"+score+"/10\n\n";
  var r = getResults();
  for(var i=0;i<5;i++){ shareMsg += r[i] ? "🟩" : "⬜"; }
  shareMsg += "\n";
  for(var i=5;i<10;i++){ shareMsg += r[i] ? "🟩" : "⬜"; }
  shareMsg += "\n\npool-play.vercel.app/trivia2.html";
  var o = topbar(false);
  o += '<div class="wrap">';
  o += '<div class="res-score">'+score+'/10</div>';
  o += '<div class="res-date">'+ds+'</div>';
  o += '<div class="share-card">';
  o += '<div style="font-size:9px;color:#6366f1;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:12px">Your Score</div>';
  o += '<div class="share-grid">'+row1+'</div>';
  o += '<div class="share-grid">'+row2+'</div>';
  o += '<div class="share-score">'+score+' / 10 correct</div>';
  o += '<button class="btn-sms" id="bsms">&#128241; Text a Friend</button>';
  o += '<button class="btn-hub" id="bhub">Back to Hub</button>';
  o += '</div></div>';
  document.getElementById("root").innerHTML = o;
  document.getElementById("bsms").onclick = function(){ window.open("sms:?&body="+encodeURIComponent(shareMsg),"_blank"); };
  document.getElementById("bhub").onclick = function(){ window.location.href="index.html"; };
}
showHome();
</script>
</body>
</html>
