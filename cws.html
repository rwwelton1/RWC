<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – 2026 MCWS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#fdf8ee;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#c0392b;--red2:#e85555;--red-bg:#ffe8e8;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;outline:none;touch-action:manipulation}
a{color:inherit;text-decoration:none;touch-action:manipulation}

/* ── TOPBAR ── */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;overflow:hidden}
.app-name{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:7px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;display:block}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--text);box-shadow:2px 2px 0 var(--border)}
.tag.locked{background:var(--gold-bg);border-color:var(--border);color:var(--gold-dark)}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold-bg);color:var(--gold-dark)}
.btn-red{background:var(--red-bg);color:var(--red2)}
.btn-green{background:var(--green-bg);color:var(--green)}

/* ── PAGE TABS ── */
.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;gap:0;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 12px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* ── TOAST / CONFETTI ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:900;display:none}

/* ── USER SELECT ── */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px;overflow-y:auto;flex:1}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:130px;box-shadow:3px 3px 0 var(--border)}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}
.user-btn.locked-state{background:var(--green-bg);border-color:var(--border);color:var(--green)}
.user-btn-sub{font-size:8px;font-weight:700;color:var(--muted);margin-top:3px}

/* ── LOCK BAR ── */
.lock-bar{display:flex;align-items:center;gap:7px;padding:6px 12px;border-bottom:2px solid var(--border2);flex-wrap:wrap;background:var(--cream);flex-shrink:0}
.lock-info{font-size:9px;font-weight:700;color:var(--muted)}
.lock-chips{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.lchip{padding:2px 8px;border-radius:20px;font-size:8px;font-weight:800;border:2px solid var(--border);box-shadow:1px 1px 0 var(--border);font-family:'Nunito',sans-serif}
.lchip.done{background:var(--green-bg);color:var(--green)}
.lchip.pend{background:#ffffff;color:var(--muted)}

/* ── SCORE BANNER ── */
.score-banner{display:flex;gap:6px;padding:6px 12px;border-bottom:2px solid var(--border2);overflow-x:auto;align-items:center;flex-shrink:0;background:var(--cream)}
.score-banner::-webkit-scrollbar{display:none}
.sb-item{background:#ffffff;border:2px solid var(--border);border-radius:8px;padding:4px 10px;font-size:8px;white-space:nowrap;text-align:center;flex-shrink:0;box-shadow:2px 2px 0 var(--border)}
.sb-item .sl{color:var(--muted);font-size:7px;font-weight:800;text-transform:uppercase}
.sb-item .sv{color:var(--text);font-weight:900;font-size:13px}
.sb-item.total{background:var(--gold-bg)}
.sb-item.total .sv{color:var(--gold-dark)}

/* ── BRACKET ── */
.bracket-canvas{overflow:auto;position:relative;min-height:0}
.bracket-scroll{width:100%;display:flex;align-items:flex-start;overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.bracket-scroll::-webkit-scrollbar{height:4px}
.bracket-scroll::-webkit-scrollbar-track{background:transparent}
.bracket-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.bcol{flex-shrink:0;display:flex;flex-direction:column;padding:8px 6px}
.bcol-reg{width:240px}
.bcol-sr{width:220px}
.bcol-cws{width:220px}
.bcol-champ{width:200px}
.bcol-header{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:2px 4px 6px;border-bottom:2px solid var(--border2);margin-bottom:8px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.bcol-header .pts-hint{font-size:7px;font-weight:700;color:var(--dim);text-transform:none;letter-spacing:0}
.bcol-divider{flex-shrink:0;width:2px;background:var(--border2);margin:8px 0;align-self:stretch}

/* ── GAME CARD ── */
.gc{background:#ffffff;border:2px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px;flex-shrink:0;box-shadow:3px 3px 0 var(--border)}
.gc-head{padding:4px 8px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:center;gap:4px}
.gc-label{font-size:7px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.gc-pts{font-size:7px;font-weight:900;color:var(--gold-dark)}
.gc-pts.earned{color:var(--green)}

/* Team slot */
.ts{padding:7px 8px;display:flex;align-items:center;gap:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:32px}
.ts:not(:last-child){border-bottom:1px solid var(--border2)}
.ts:active{background:var(--cream)}
.ts.winner{background:var(--green-bg)}
.ts.winner .ts-name{color:var(--green);font-weight:900}
.ts.loser{opacity:.35}
.ts.wrong-pick{background:var(--red-bg);opacity:1}
.ts.mypick:not(.winner):not(.wrong-pick){background:var(--gold-bg)}
.ts.mypick:not(.winner):not(.wrong-pick) .ts-name{color:var(--gold-dark);font-weight:900}
.ts-seed{font-size:8px;font-weight:800;color:var(--dim);width:12px;text-align:center;flex-shrink:0}
.ts-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1px solid var(--border2)}
.ts-name{font-size:10px;font-weight:800;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.ts-rec{font-size:7px;font-weight:700;color:var(--dim);flex-shrink:0}
.ts-icon{font-size:9px;flex-shrink:0;width:12px;text-align:center}
.ts-tbd{padding:6px 8px;font-size:9px;font-weight:700;color:var(--dim);font-style:italic;min-height:32px;display:flex;align-items:center}
.ts.projected{opacity:.75;border-left:3px solid var(--gold)}

/* Connectors */
.pair-connector{width:12px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;align-self:stretch;position:relative}
.pair-connector::after{content:"›";color:var(--dim);font-size:12px;position:absolute;top:50%;transform:translateY(-50%);font-weight:900}
.group-sep{font-size:7px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;padding:8px 4px 4px;color:var(--muted);flex-shrink:0;border-top:2px solid var(--border2);margin-top:6px}
.group-sep:first-child{border-top:none;margin-top:0}
.pod-label{font-size:7px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;padding:0 4px 4px;flex-shrink:0}
.pod-label.b1{color:var(--blue)}
.pod-label.b2{color:#f97316}

/* Champion card */
.champ-card{background:#ffffff;border:3px solid var(--border);border-radius:12px;padding:14px;margin:0 4px;flex-shrink:0;box-shadow:5px 5px 0 var(--border)}
.champ-card-label{font-size:7px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--gold-dark);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--border2)}
.champ-winner-display{text-align:center;padding:10px 0 6px}

/* Progress */
.bracket-progress{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border2);pointer-events:none}
.bracket-progress-fill{height:100%;background:linear-gradient(90deg,var(--red2),var(--gold));transition:width .3s}
.scroll-hint{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.9);border:2px solid var(--border);border-radius:20px;padding:6px 10px;font-size:11px;font-weight:800;color:var(--muted);pointer-events:none;transition:opacity .3s;z-index:10}

/* ── LIVE SCOREBOARD ── */
.scores-wrap{padding:10px;min-height:60vh}
.scores-date-header{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:4px 2px 8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.scores-refresh{font-size:8px;font-weight:800;cursor:pointer;padding:3px 10px;border:2px solid var(--border);border-radius:8px;background:#ffffff;color:var(--text);font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.scores-refresh:active{transform:translate(2px,2px);box-shadow:none}
.scores-section-label{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:10px 2px 5px;border-top:2px solid var(--border2);margin-top:4px}
.scores-section-label:first-child{border-top:none;margin-top:0;padding-top:0}
.scores-strip{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;margin-bottom:2px}
.scores-strip::-webkit-scrollbar{height:3px}
.scores-strip::-webkit-scrollbar-track{background:transparent}
.scores-strip::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.score-card{flex-shrink:0;background:#ffffff;border:2px solid var(--border);border-radius:10px;overflow:hidden;width:154px;box-shadow:3px 3px 0 var(--border)}
.score-card.live{border-color:var(--red2)}
.score-card.final{opacity:.75}
.sc-head{padding:4px 8px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:center;gap:4px}
.sc-status{font-size:7px;font-weight:900;text-transform:uppercase;letter-spacing:.05em}
.sc-status.live{color:var(--red2);animation:sc-pulse 1.4s ease-in-out infinite}
.sc-status.final{color:var(--blue)}
.sc-status.pre{color:var(--dim)}
@keyframes sc-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sc-detail{font-size:7px;font-weight:700;color:var(--dim);text-align:right;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-team{display:flex;align-items:center;gap:5px;padding:6px 8px;min-height:30px}
.sc-team:not(:last-child){border-bottom:1px solid var(--border2)}
.sc-team.winner .sc-name{color:var(--text);font-weight:900}
.sc-team.loser{opacity:.48}
.sc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--muted);border:1px solid var(--border2)}
.sc-name{font-size:10px;font-weight:800;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.sc-rec{font-size:7px;font-weight:700;color:var(--dim);flex-shrink:0}
.sc-score{font-size:14px;font-weight:900;color:var(--text);flex-shrink:0;min-width:20px;text-align:right;line-height:1}
.sc-score.pre{font-size:9px;font-weight:700;color:var(--dim)}
.sc-bases{font-size:8px;flex-shrink:0;width:16px;text-align:center;color:var(--dim)}
.scores-empty{text-align:center;padding:40px 16px;color:var(--dim);font-size:11px;font-weight:700;line-height:2}
.scores-loading{text-align:center;padding:40px 16px;color:var(--dim);font-size:11px;font-weight:700}

/* ── LEADERBOARD ── */
.lb-wrap{padding:12px;min-height:60vh}
.lb-note{font-size:8px;font-weight:700;color:var(--muted);margin-bottom:12px;line-height:1.8;background:var(--cream);border:2px solid var(--border2);border-radius:8px;padding:7px 10px}
.lb-row{background:#ffffff;border:2px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;gap:9px;align-items:center;box-shadow:4px 4px 0 var(--border)}
.lb-row.first{background:var(--gold-bg)}
.lb-row.second{background:#fafafa}
.lb-row.third{background:#fff8f0}
.lb-medal{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;gap:5px}
.lb-name{font-size:13px;font-weight:900}
.lb-pts{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.lb-pts b{color:var(--text);font-weight:900}
.progress{background:var(--border2);border-radius:3px;height:5px;position:relative;overflow:hidden;margin-bottom:4px;border:1px solid var(--border2)}
.progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;transition:width .6s;background:var(--red2)}
.lb-chips{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.lpc{font-size:7px;font-weight:800;padding:2px 6px;border-radius:8px;border:2px solid var(--border2);color:var(--dim)}
.lpc.correct{color:var(--green);border-color:var(--green);background:var(--green-bg)}
.lpc.wrong{color:var(--red2);border-color:var(--red2);background:var(--red-bg);text-decoration:line-through;opacity:.7}
.lpc.pending{color:var(--gold-dark);border-color:var(--gold);background:var(--gold-bg)}

/* ── ADMIN ── */
.adm-wrap{padding:10px;min-height:60vh}
.adm-sec-label{font-size:8px;font-weight:900;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;margin-top:14px;padding-bottom:4px;border-bottom:2px solid var(--border2)}
.adm-sec-label:first-child{margin-top:0}
.adm-game{background:#ffffff;border:2px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;box-shadow:3px 3px 0 var(--border)}
.adm-game-title{font-size:9px;font-weight:800;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.adm-btns{display:flex;gap:5px;flex-wrap:wrap}
.adm-btn{padding:5px 12px;border-radius:8px;font-size:9px;font-weight:800;border:2px solid var(--border);background:#ffffff;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.adm-btn:active{transform:translate(2px,2px);box-shadow:none}
.adm-btn.sel{background:var(--green-bg);border-color:var(--border);color:var(--green)}
.adm-btn.tbd{opacity:.3;cursor:default}
.adm-btn.clr{background:var(--red-bg);color:var(--red2)}

/* ── SCORECERY logo ── */
.scorecery-logo{
  font-family:'Nunito',sans-serif;
  font-weight:900;
  font-size:inherit;
  color:#ffffff;
  text-transform:uppercase;
  letter-spacing:.05em;
  -webkit-text-stroke:3px #111111;
  text-shadow:
    1px 1px 0 #111111,
    2px 2px 0 #111111,
    3px 3px 0 #111111,
    5px 5px 0 #1a4fd6,
    7px 7px 0 #0a2088,
    8px 8px 0 #060e44;
  paint-order:stroke fill;
}
</style>
</head>

<canvas id="confetti-canvas"></canvas>

<div id="toast"></div>

// =====================================================
// 2026 MEN'S COLLEGE WORLD SERIES – SEAMLESS BRACKET
// Charles Schwab Field Omaha · June 12–22

var GROUP_ID=(function(){var m=location.search.match(/[?&]group=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var URL_USER=(function(){var m=location.search.match(/[?&]user=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var PUBLIC_VIEW=(function(){ return /[?&]public=1/.test(location.search); })();
var GROUP_ADMIN_PW=null;
var BASE=GROUP_ID?"groups/"+GROUP_ID+"/data/cws2026":"cws2026";
var MASTER_PW="Sloop"; // default, overwritten by Firebase on load

var COLORS={
  "UCLA":"#2d68c4","Georgia Tech":"#b3a369","Georgia":"#ba0c2f","Auburn":"#0c2340",

  "Oklahoma":"#841617","The Citadel":"#b3a369","Boston College":"#8b0000","Liberty":"#002868",
  "LIU":"#002366","UCF":"#ba9b37","NC State":"#cc0000","Milwaukee":"#0c3b6e",
  "Tennessee":"#ff8200","East Carolina":"#592a8a","VCU":"#ffd700",
  "UC Santa Barbara":"#003660","Tarleton St.":"#582c83","Holy Cross":"#602d8d",
  "Oklahoma St.":"#ff6600","USC Upstate":"#046a38","Alabama St.":"#333",
  "Miami":"#005030","Troy":"#cc0000","Rider":"#8b0000",
  "Virginia":"#232d4b","Jax State":"#cc0000","Little Rock":"#0b2a4a",
  "Coastal Carolina":"#007073","NIU":"#cc0000","St. John's":"#9e1b32",
  "Oregon St.":"#dc4405","Washington St.":"#981e32","Yale":"#00356b",
  "USC":"#990000","Texas State":"#501214","Lamar":"#e02b20",
  "Ole Miss":"#ce1126","Arizona State":"#8c1d40","South Dakota State":"#0033a0",
  "Cincinnati":"#e00122","Louisiana":"#c8102e","Lipscomb":"#002d6d",
  "Arkansas":"#9d2235","Missouri St.":"#5f0a28","Northeastern":"#cc0000",
  "Wake Forest":"#9e7e38","Kentucky":"#0033a0","Binghamton":"#006a4e"
};
function tc(n){return COLORS[n]||"#475569";}

// ── 16 REGIONALS (8 pairs → 8 super regional matchups) ─────────────────────
// Pairs: (national seed order) #1LA vs #16WVU, #2ATL vs #15LAW, etc.
var REG_PAIRS = [
  // each pair: two regionals that feed into one super regional
  {
    sr_id:"sr1", sr_pts:4,
    left:  {id:"r_la",  label:"Los Angeles",    teams:[{n:"UCLA",s:1,r:"51-6"},{n:"Virginia Tech",s:2,r:"30-24"},{n:"Cal Poly",s:3,r:"36-22"},{n:"Saint Mary's",s:4,r:"34-25"}]},
    right: {id:"r_wvu", label:"Morgantown",      teams:[{n:"West Virginia",s:1,r:"39-14"},{n:"Wake Forest",s:2,r:"38-19"},{n:"Kentucky",s:3,r:"31-21"},{n:"Binghamton",s:4,r:"31-20"}]}
  },

function launchConfetti(){

  var cv=document.getElementById("confetti-canvas");cv.style.display="block";cv.width=window.innerWidth;cv.height=window.innerHeight;
  var ctx=cv.getContext("2d"),pp=[],cols=["#c0392b","#ef4444","#e8b84b","#fbbf24","#fff","#10b981","#6aabf7"];
  for(var i=0;i<140;i++)pp.push({x:Math.random()*cv.width,y:-10-Math.random()*200,w:6+Math.random()*7,h:8+Math.random()*9,color:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*4,vy:2+Math.random()*4,angle:Math.random()*Math.PI*2,va:(Math.random()-.5)*.2});
  var fr=0;
  function tick(){ctx.clearRect(0,0,cv.width,cv.height);var alive=false;for(var i=0;i<pp.length;i++){var p=pp[i];p.x+=p.vx;p.y+=p.vy;p.angle+=p.va;p.vy+=.08;if(p.y<cv.height+20)alive=true;ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.angle);ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-(fr/200));ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();}fr++;if(alive&&fr<220)requestAnimationFrame(tick);else{cv.style.display="none";ctx.clearRect(0,0,cv.width,cv.height);_cr=false;}}
  requestAnimationFrame(tick);
}

var _scTimer=null, _scData=null, _scLoading=false, _scLastFetch=0;

function espnColor(name, colorStr){
  if(colorStr&&colorStr.length===6&&colorStr!=="000000") return "#"+colorStr;
  return tc(name)||"#475569";
}

function fetchScoreboard(){
  if(_scLoading) return;
  _scLoading=true;
  var d=new Date();
  var ds=d.getFullYear()+""+("0"+(d.getMonth()+1)).slice(-2)+""+("0"+d.getDate()).slice(-2);
  fetch("https://site.api.espn.com/apis/site/v2/sports/baseball/college-baseball/scoreboard?dates="+ds+"&limit=200")
    .then(function(r){return r.json();})
    .then(function(data){
      _scLoading=false; _scLastFetch=Date.now(); _scData=data;
      if(ST.page==="scores") renderScoresInto();
    })
    .catch(function(){
      _scLoading=false;
      var el=document.getElementById("scores-wrap");
      if(el) el.innerHTML='<div class="scores-empty">⚾<br>Could not load scores.<br><br><button class="scores-refresh" onclick="fetchScoreboard()">↻ Retry</button></div>';
    });
}

function renderScoresInto(){
  var el=document.getElementById("scores-wrap");
  if(!el) return;
  if(!_scData||!_scData.events||!_scData.events.length){
    el.innerHTML='<div class="scores-empty">⚾<br>No games found for today.<br><span style="font-size:9px;color:var(--dim)">Check back when the tournament is live (Jun 12–22)</span></div>';
    return;
  }

  var events=_scData.events;
  var live=[],pre=[],done=[];
  events.forEach(function(ev){
    var comp=(ev.competitions||[])[0]; if(!comp) return;
    var state=(comp.status&&comp.status.type&&comp.status.type.state)||"pre";
    if(state==="in") live.push(ev);
    else if(state==="post") done.push(ev);
    else pre.push(ev);
  });

  var d=new Date();
  var dateLabel=d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});

  function card(ev){
    var comp=(ev.competitions||[])[0]; if(!comp) return "";
    var status=comp.status||{};
    var state=(status.type&&status.type.state)||"pre";
    var detail=(status.type&&status.type.shortDetail)||"";
    var isLive=state==="in", isFinal=state==="post";

    var comps=comp.competitors||[];
    var away=comps.find(function(c){return c.homeAway==="away";})||comps[0]||{};
    var home=comps.find(function(c){return c.homeAway==="home";})||comps[1]||{};

    function tname(c){return(c.team&&(c.team.shortDisplayName||c.team.displayName))||"?";}
    function tcolor(c){return espnColor(tname(c),(c.team&&c.team.color)||"");}

    var aName=tname(away), hName=tname(home);
    var aScore=away.score!=null?String(away.score):"";
    var hScore=home.score!=null?String(home.score):"";
    var aNum=parseInt(aScore)||0, hNum=parseInt(hScore)||0;

    var aWin=isFinal&&aNum>hNum, hWin=isFinal&&hNum>aNum;
    var aLead=isLive&&aNum>hNum, hLead=isLive&&hNum>aNum;

    function teamRow(name, color, score, wins, leads, tied){
      var cls="sc-team";
      if((wins||leads)) cls+=" winner";
      else if(isFinal&&!wins) cls+=" loser";
      else if(isLive&&!leads&&!tied&&score!="") cls+=" loser";
      return '<div class="'+cls+'">'+
        '<div class="sc-dot" style="background:'+color+'"></div>'+
        '<div class="sc-name">'+x(name)+'</div>'+
        '<div class="sc-score'+(state==="pre"?" pre":"")+'">'+x(state==="pre"?"":score)+'</div>'+
        '</div>';
    }

    var tied=isLive&&aNum===hNum&&aScore!="";
    return '<div class="score-card'+(isLive?" live":isFinal?" final":"")+'">'+
      '<div class="sc-head">'+
        '<span class="sc-status '+(isLive?"live":isFinal?"final":"pre")+'">'+(isLive?"● LIVE":isFinal?"Final":"Upcoming")+'</span>'+
        '<span class="sc-detail">'+x(isLive?detail:isFinal?"":detail)+'</span>'+
      '</div>'+
      teamRow(aName,tcolor(away),aScore,aWin,aLead,tied)+
      teamRow(hName,tcolor(home),hScore,hWin,hLead,tied)+
      '</div>';
  }

  function section(games, label){
    if(!games.length) return "";
    var s='<div class="scores-section-label">'+label+' &middot; '+games.length+'</div>';
    s+='<div class="scores-strip">';
    games.forEach(function(ev){s+=card(ev);});
    s+='</div>';
    return s;
  }

  var ago=_scLastFetch?Math.round((Date.now()-_scLastFetch)/1000):0;
  var h='<div class="scores-date-header">'+
    '<span>⚾ College Baseball &middot; '+dateLabel+'</span>'+
    '<button class="scores-refresh" onclick="fetchScoreboard()">↻ Refresh</button>'+
    '</div>';
  if(live.length) h+=section(live,"🔴 In Progress");
  h+=section(pre,"🕐 Upcoming");
  h+=section(done,"✓ Final");
  h+='<div style="text-align:center;padding:10px 0 4px;font-size:7px;color:var(--dim)">Updated '+ago+'s ago &middot; pull to refresh &middot; via ESPN</div>';
  el.innerHTML=h;
}

function startScoreRefresh(){
  clearInterval(_scTimer);
  // Only fetch if no recent data
  if(!_scData||Date.now()-_scLastFetch>300000) fetchScoreboard();
  else renderScoreboard();
}

function tsHTML(name, seed, rec, gid, canPick){
  if(!name) return '<div class="ts-tbd">TBD</div>';
  var w=getR(gid), myPick=getP(gid);
  var isW=w&&w===name, isL=w&&w!==name, isMP=myPick===name;
  var elim=!isW&&isTeamEliminated(name);
  var wrongPick=(isL&&isMP)||(elim&&isMP&&!isW);
  var cls="ts"+(isW?" winner":wrongPick?" wrong-pick":(isL||elim)?" loser":isMP?" mypick":"")+(canPick&&!elim?" clickable":"");
  var icon=isW?"✓":wrongPick?"✕":isMP&&!w?"★":"";
  var icol=isW?"color:#6ee7b7":wrongPick?"color:#ef4444":"color:var(--gold)";
  return '<div class="'+cls+'" data-gid="'+x(gid)+'" data-tid="'+x(name)+'">'+
    '<div class="ts-seed">'+seed+'</div>'+
    '<div class="ts-dot" style="background:'+tc(name)+';opacity:'+((isL||elim)&&!isMP?'.3':'1')+'"></div>'+
    '<div class="ts-name" style="'+(wrongPick?'text-decoration:line-through;color:#ef4444':'')+'">'+x(name)+'</div>'+
    (rec&&!wrongPick?'<div class="ts-rec">'+x(rec)+'</div>':'')+
    '<div class="ts-icon" style="'+icol+'">'+icon+'</div>'+
    '</div>';
}

function gcHTML(gid, label, pts, t1n, t1s, t1r, t2n, t2s, t2r, canPick){
  var w=getR(gid), myPick=getP(gid);

// Find which regional a team belongs to
function findRegional(teamName){
  var found=null;
  REG_PAIRS.forEach(function(pair){
    [pair.left,pair.right].forEach(function(r){
      if(r.teams.some(function(t){return t.n===teamName;})) found=r;
    });
  });
  return found;
}
// Find which SR pair a team belongs to (by scanning all 4 teams in both regionals)
function findSRPair(teamName){
  var found=null;
  REG_PAIRS.forEach(function(pair){
    var inLeft=pair.left.teams.some(function(t){return t.n===teamName;});
    var inRight=pair.right.teams.some(function(t){return t.n===teamName;});
    if(inLeft||inRight) found=pair;
  });
  return found;
}
// Find which CWS pod a team belongs to (by sr result or slot)
function findPod(teamName){
  var found=null;
  CWS_PODS.forEach(function(pod){
    pod.srs.forEach(function(srid){
      if(getR(srid)===teamName||getP(srid)===teamName) found=pod;
    });
  });
  return found;
}

// Returns true if team has been eliminated at any completed round
function isTeamEliminated(teamName){
  // Lost their regional?
  var reg=findRegional(teamName);
  if(reg){var res=getR(reg.id);if(res&&res!==teamName)return true;}
  // Lost their super regional? (team must have won their regional first to be in SR)
  var srPair=findSRPair(teamName);
  if(srPair){
    // Only check SR result if the team actually won their regional
    var regRes=reg?getR(reg.id):null;
    if(regRes&&regRes===teamName){
      var srRes=getR(srPair.sr_id);
      if(srRes&&srRes!==teamName)return true;
    }
  }
  // Lost their pod?
  var pod=findPod(teamName);
  if(pod){var podRes=getR(pod.pick_id);if(podRes&&podRes!==teamName)return true;}
  return false;
}

function isPickStillPossible(gid, teamName){
  // Lost their regional?
  var reg=findRegional(teamName);
  if(reg){var regRes=getR(reg.id);if(regRes&&regRes!==teamName)return false;}
  // Lost their super regional?
  var srPair=findSRPair(teamName);
  if(srPair){
    var regRes2=reg?getR(reg.id):null;
    if(regRes2&&regRes2===teamName){
      var srRes=getR(srPair.sr_id);
      if(srRes&&srRes!==teamName)return false;
    }
  }
  // Lost their pod? (only relevant for champ pick)
  if(gid===CHAMP_PICK_ID){
    var pod=findPod(teamName);
    if(pod){var podRes=getR(pod.pick_id);if(podRes&&podRes!==teamName)return false;}
  }
  return true;
}

function calcMaxPossible(user){
  var picks=(ST.picks||{})[ukey(user)]||{};
  var extra=0;
  ALL_IDS.forEach(function(gid){
    var r=getR(gid);
    if(r) return; // already decided
    var pick=picks[gid];
    if(!pick) return; // no pick
    // Check if the picked team is still alive
    if(!isPickStillPossible(gid, pick)) return;
    extra+=(GAME_PTS[gid]||0);
  });
  return calcScore(user)+extra;
}

// ── LEADERBOARD ──────────────────────────────────────────
function renderLB(){
  var sorted=PARTS.slice().sort(function(a,b){return calcScore(b)-calcScore(a);});
  var maxPossibles=sorted.map(function(p){return calcMaxPossible(p);});
  var overallMax=Math.max.apply(null,maxPossibles.concat([1]));
  var medals=["🥇","🥈","🥉"];
  var h='<div class="lb-wrap">';
  h+='<div class="lb-note">Regionals 2 pts · Super Regionals 4 pts · Omaha Pod Winner 8 pts · National Champion 15 pts</div>';
  sorted.forEach(function(p,i){
    var score=calcScore(p);
    var maxPoss=calcMaxPossible(p);
    var remaining=maxPoss-score;
    var picks=(ST.picks||{})[ukey(p)]||{};
    var cls="lb-row"+(i===0?" first":i===1?" second":i===2?" third":"");
    h+='<div class="'+cls+'"><div class="lb-medal">'+(medals[i]||'<span style="font-size:12px;color:var(--dim)">'+(i+1)+'</span>')+'</div>';
    h+='<div class="lb-body">';
    h+='<div class="lb-top">';
    h+='<div class="lb-name">'+pem(p)+x(p)+'</div>';
    h+='<div style="display:flex;align-items:baseline;gap:5px;flex-shrink:0">';
    h+='<div class="lb-pts"><b>'+score+'</b> pts</div>';
    if(remaining>0) h+='<div style="font-size:8px;color:var(--muted)">+'+remaining+' possible</div>';
    h+='</div>';
    h+='</div>';
    // Stacked progress bars: earned (red) + remaining (gold)
    var earnedPct=Math.round((score/overallMax)*100);
    var remainPct=Math.min(Math.round((remaining/overallMax)*100), 100-earnedPct);
    h+='<div class="progress">';
    h+='<div style="position:absolute;left:0;top:0;height:100%;width:'+earnedPct+'%;background:linear-gradient(90deg,var(--red),var(--red2));border-radius:3px;transition:width .6s"></div>';
    if(remaining>0) h+='<div style="position:absolute;left:'+earnedPct+'%;top:0;height:100%;width:'+remainPct+'%;background:rgba(251,191,36,.35);border-radius:3px;transition:all .6s"></div>';
    h+='</div>';
    h+='<div class="lb-chips">';
    ALL_IDS.forEach(function(gid){
      var tid=picks[gid];if(!tid)return;
      var r=getR(gid);
      var correct=r&&r===tid,wrong=r&&r!==tid;
      var pts=GAME_PTS[gid]||0;
      var cls2="lpc"+(correct?" correct":wrong?" wrong":" pending");
      var short=tid.replace("Mississippi State","Miss St").replace("North Carolina","UNC").replace("West Virginia","WVU").replace("Georgia Tech","GTech").replace("Florida State","FSU").replace("South Dakota State","SDSU").replace("UC Santa Barbara","UCSB").replace("Arizona State","ASU").replace("Washington St.","WSU");
      short=short.length>8?short.substring(0,8):short;
      h+='<div class="'+cls2+'" title="'+x(tid)+'">'+x(short)+(correct?" +"+pts:"")+'</div>';
    });
    h+='</div></div></div>';
  });
  h+='</div>';
  return h;
}

      h+='</div>';
    });
    if(pi<REG_PAIRS.length-1) h+='<div style="height:4px;border-bottom:1px dashed #1e2a3a;margin-bottom:4px"></div>';
  });
  h+='</div>';

  h+='<div class="bcol-divider"></div>';

  // ── Super Regionals ──
  h+='<div class="bcol bcol-sr">';
  h+='<div class="bcol-header">Super Regionals <span class="pts-hint">Results</span></div>';
  REG_PAIRS.forEach(function(pair){
    var t1=getR(pair.left.id), t2=getR(pair.right.id), w=getR(pair.sr_id);
    var ns1=pair.left.teams[0].s, ns2=pair.right.teams[0].s;
    var host=t1&&t2?(ns1<ns2?pair.left.label:pair.right.label):"";
    h+='<div class="gc" style="margin-bottom:6px">';
    h+='<div class="gc-head"><div class="gc-label">'+(host?x(host)+" SR":"Super Regional")+'</div><div class="gc-pts'+(w?" earned":"")+'">'+( w?"✓":"–")+'</div></div>';
    h+=rrow(t1, ns1, w&&w===t1, !w);
    h+=rrow(t2, ns2, w&&w===t2, !w);
    h+='</div>';
  });
  h+='</div>';

  h+='<div class="bcol-divider"></div>';

  // ── Omaha Pods ──
  h+='<div class="bcol bcol-cws">';
  h+='<div class="bcol-header">Omaha Pods <span class="pts-hint">Results</span></div>';
  CWS_PODS.forEach(function(pod){
    var w=getR(pod.pick_id);
    h+='<div class="gc" style="margin-bottom:10px">';
    h+='<div class="gc-head"><div class="gc-label" style="color:'+(pod.cls==="b1"?"#6aabf7":"#f97316")+'">'+pod.label+'</div><div class="gc-pts'+(w?" earned":"")+'">'+( w?"✓":"–")+'</div></div>';
    pod.srs.forEach(function(srid,i){
      var team=getR(srid);
      var pair=REG_PAIRS.find(function(p){return p.sr_id===srid;});
      var seed=pair?pair.left.teams[0].s:"";
      h+=rrow(team, seed, w&&w===team, !w||w===team);
    });
    h+='</div>';
  });
  h+='</div>';

  h+='<div class="bcol-divider"></div>';

  // ── National Champion ──
  h+='<div class="bcol bcol-champ">';
  h+='<div class="bcol-header">Champion <span class="pts-hint">Result</span></div>';
  var champ=getR(CHAMP_PICK_ID);
  var b1=getR("pod_b1"), b2=getR("pod_b2");
  h+='<div class="gc">';
  h+='<div class="gc-head"><div class="gc-label" style="color:var(--gold)">🏆 National Champion</div><div class="gc-pts'+(champ?" earned":"")+'">'+( champ?"✓":"–")+'</div></div>';
  if(!b1&&!b2){
    h+='<div class="ts-tbd" style="padding:10px 8px">Pod winners TBD</div>';
  } else {
    h+='<div style="font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:4px 8px 2px;color:#6aabf7">Bracket 1</div>';
    h+=rrow(b1,"",champ&&champ===b1,!champ);
    h+='<div style="font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:4px 8px 2px;color:#f97316;border-top:1px solid var(--border2)">Bracket 2</div>';
    h+=rrow(b2,"",champ&&champ===b2,!champ);
  }
  h+='</div>';
  if(champ){
    h+='<div style="margin-top:10px;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.3);border-radius:9px;padding:12px;text-align:center">';
    h+='<div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">🏆 2026 Champions</div>';
    h+='<div style="display:flex;align-items:center;justify-content:center;gap:8px">';
    h+='<div style="width:20px;height:20px;border-radius:50%;background:'+tc(champ)+'"></div>';
    h+='<div style="font-size:14px;font-weight:800;color:var(--gold)">'+x(champ)+'</div>';
    h+='</div></div>';
  }
  h+='</div>';

  h+='</div></div>'; // end bracket-scroll, bracket-canvas
  return h;
}

// ── MAIN DRAW ────────────────────────────────────────────
function draw(){
  var locked=isLocked();
  var viewer=activeViewer();
  var userPicks=viewer?(ST.picks||{})[ukey(viewer)]||{}:{};
  var score=viewer?calcScore(viewer):0;
  var myPickCount=Object.keys((ST.user?(ST.picks||{})[ukey(ST.user)]||{}:{})).length;
  var isViewingOther=!!(ST.viewUser&&ST.user&&ST.viewUser!==ST.user);
  var canPick=!!(ST.user&&!locked&&!isViewingOther);
  var h='';
  if(PUBLIC_VIEW)h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--blue-bg);border-bottom:2px solid var(--border);font-size:10px;font-weight:800;color:var(--blue)">&#128065; Public View &mdash; read only</div>';

  // Topbar
  h+='<div class="topbar">';
  h+='<div class="topbar-left">';
  h+='<a href="index.html" style="display:flex;align-items:center;gap:3px;text-decoration:none;color:var(--muted);font-size:9px;font-weight:600;padding:4px 8px;border:1px solid var(--border);border-radius:6px;white-space:nowrap">&#8592; Hub</a>';
  h+='</div>';
  h+='<div class="topbar-center">';
  h+='<div class="app-name"><span class="scorecery-logo">SCORECERY</span></div>';
  h+='<div class="app-sub">2026 MCWS &middot; Charles Schwab Field &middot; Omaha</div>';
  h+='</div>';
  h+='<div class="topbar-right">';
  if(ST.user){
    h+='<span class="tag'+(locked?" locked":"")+'">'+pem(ST.user)+x(ST.user)+(locked?"&nbsp;&#128274;":"")+'</span>';
    if(!URL_USER)h+='<button class="btn btn-ghost" id="b-switch">&#8646;</button>';
  }
  if(!PUBLIC_VIEW){
    h+='<button class="btn '+(ST.admin?"btn-gold":"btn-ghost")+'" id="b-admin">'+(ST.admin?"&#9889;":"&#9881;")+'</button>';
    if(ST.admin)h+='<button class="btn btn-red" id="b-reset">&#8635;</button>';
  }
  h+='</div></div>';

  // Tabs
  var tabs=[{id:"bracket",lbl:"⚾ Bracket"},{id:"results",lbl:"📋 Results"},{id:"scores",lbl:"🔴 Scores"},{id:"leaderboard",lbl:"Leaderboard"}];
  if(ST.admin)tabs.push({id:"admin",lbl:"Admin"});
  h+='<div class="page-bar">';
  tabs.forEach(function(t){h+='<button class="ptab'+(ST.page===t.id?" active":"")+'" data-page="'+t.id+'">'+t.lbl+'</button>';});
  h+='</div>';

  // User select — only block bracket page when no user and not admin
  if(!ST.user&&!ST.admin&&!PUBLIC_VIEW&&(ST.page==="bracket"||ST.page==="scores"||ST.page==="leaderboard")){
    h+='<div class="user-screen"><h2>Who are you?</h2><div class="user-grid">';
    PARTS.forEach(function(p){
      var lk=ST.locked[ukey(p)],tp=totalPicks(p);
      h+='<button class="user-btn'+(lk?" locked-state":"")+'" data-user="'+x(p)+'">';
      h+='<div>'+pem(p)+x(p)+'</div>';
      h+='<div class="user-btn-sub">'+(lk?"&#128274; Locked in":tp+"/"+ALL_IDS.length+" picks made")+'</div>';
      h+='</button>';
    });
    h+='</div></div>';
    document.getElementById("root").innerHTML=h;
    stopScoreRefresh();
    bind();return;
  }

  // Score banner
  if(viewer&&Object.keys(ST.results||{}).length>0){
    var cor=0,wr=0,pend=0;
    ALL_IDS.forEach(function(gid){var p=userPicks[gid],r=getR(gid);if(p&&r){if(p===r)cor++;else wr++;}else if(p&&!r)pend++;});
    h+='<div class="score-banner">';
    if(isViewingOther) h+='<div class="sb-item" style="border-color:rgba(99,102,241,.3)"><div class="sl">Viewing</div><div class="sv" style="color:#a5b4fc;font-size:10px">'+x(ST.viewUser)+'</div></div>';
    h+='<div class="sb-item"><div class="sl">Correct</div><div class="sv" style="color:var(--green)">'+cor+'</div></div>';
    h+='<div class="sb-item"><div class="sl">Wrong</div><div class="sv" style="color:var(--red2)">'+wr+'</div></div>';
    h+='<div class="sb-item"><div class="sl">Pending</div><div class="sv">'+pend+'</div></div>';
    h+='<div class="sb-item total"><div class="sl">Score</div><div class="sv">'+score+'</div></div>';
    h+='</div>';
  }

  // Lock bar — shows viewer switcher chips on bracket page
  if(ST.user&&ST.page==="bracket"){
    h+='<div class="lock-bar">';
    if(isViewingOther){
      h+='<div class="lock-info" style="color:#a5b4fc">👁 '+x(ST.viewUser)+'\'s picks &mdash; read only</div>';
    } else {
      h+='<div class="lock-info">'+(locked?"&#128274; Picks locked":"&#9998; "+myPickCount+"/"+ALL_IDS.length+" made")+'</div>';
    }
    h+='<div class="lock-chips">';
    PARTS.forEach(function(p){
      var isActive=(viewer===p);
      var lk=ST.locked[ukey(p)];
      var chipStyle=isActive?"border-color:rgba(99,102,241,.5);color:#a5b4fc;background:rgba(99,102,241,.1)":lk?"":"";
      h+='<div class="lchip '+(isActive?"":lk?"done":"pend")+'" data-view="'+x(p)+'" style="cursor:pointer;'+chipStyle+'">'+x(p)+'</div>';
    });
    h+='</div>';
    if(isViewingOther) h+='<button class="btn btn-ghost" id="b-viewself" style="margin-left:5px;font-size:9px">My Picks</button>';
    if(canPick&&myPickCount>0) h+='<button class="btn btn-gold" id="b-lock" style="margin-left:5px">&#128274; Lock</button>';
    h+='</div>';
  }

  // Main content
  if(ST.page==="bracket"){
    h+='<div class="bracket-canvas" id="bcanvas">';
    h+=renderBracketCols(canPick);
    h+='</div>';
  } else if(ST.page==="results"){
    h+=renderResults();
  } else if(ST.page==="scores"){
    h+='<div class="scores-wrap" id="scores-wrap"><div class="scores-loading">Loading scores…</div></div>';
  } else if(ST.page==="leaderboard"){
    h+=renderLB();
  } else if(ST.page==="admin"&&ST.admin){
    h+=renderAdmin();
  }

  document.getElementById("root").innerHTML=h;
  bind();
  if(ST.page==="scores"){
    // If we already have data render it, otherwise fetch
    if(_scData) renderScoresInto(); else startScoreRefresh();
  } else {
    stopScoreRefresh();
  }
}

// ── Scroll save/restore — exact rwc pattern ───────────
var _savedScroll=null;
function _restoreScroll(){
  if(!_savedScroll)return;
  var saved=_savedScroll;
  function apply(){
    var bs=document.getElementById("bscroll");
    if(bs) bs.scrollLeft=saved.sx;
    window.scrollTo(0,saved.sy);
  }
  requestAnimationFrame(function(){apply();requestAnimationFrame(function(){apply();_savedScroll=null;});});
}
function _saveScroll(){
  var bs=document.getElementById("bscroll");
  var sx=bs?bs.scrollLeft:0;
  var sy=window.pageYOffset||window.scrollY||0;
  _savedScroll={sx:sx,sy:sy};
}

function pickTeam(gid,tid){
  if(!ST.user){toast("Select your name first");return;}
  if(isLocked()){toast("&#128274; Picks are locked");return;}
  var uk=ukey(ST.user);
  if(!ST.picks[uk]) ST.picks[uk]={};
  _saveScroll();
  if(ST.picks[uk][gid]===tid){
    delete ST.picks[uk][gid];
    draw();_restoreScroll();
    if(DB) DB.ref(BASE+"/picks/"+uk+"/"+gid).remove();
    toast("Pick removed");
  } else {
    ST.picks[uk][gid]=tid;
    draw();_restoreScroll();
    if(DB) DB.ref(BASE+"/picks/"+uk+"/"+gid).set(tid);
    toast("&#9733; "+tid);
  }
}

function setResult(gid,tid){
  if(!ST.results) ST.results={};
  _saveScroll();
  if(tid==="CLEAR"){
    delete ST.results[gid];
    draw();_restoreScroll();
    if(DB) DB.ref(BASE+"/results/"+gid).remove();
    toast("Cleared");
  } else {
    ST.results[gid]=tid;
    draw();_restoreScroll();
    if(DB) DB.ref(BASE+"/results/"+gid).set(tid);
    toast("&#9989; "+tid+" wins");launchConfetti();
  }
}

function bind(){
  var els,i,el;
  els=document.querySelectorAll(".ptab");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ST.page=this.getAttribute("data-page");draw();});
  els=document.querySelectorAll(".user-btn");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ST.user=this.getAttribute("data-user");ST.viewUser=null;draw();});
  els=document.querySelectorAll(".lchip[data-view]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var p=this.getAttribute("data-view");
    if(ST.user===p){ ST.viewUser=null; }
    else { ST.viewUser=p; }
    _saveScroll(); draw(); _restoreScroll();
  });
  el=document.getElementById("b-viewself"); if(el) el.addEventListener("click",function(){ ST.viewUser=null; _saveScroll(); draw(); _restoreScroll(); });
  el=document.getElementById("b-switch"); if(el) el.addEventListener("click",function(){ST.user=null;ST.viewUser=null;draw();});
  el=document.getElementById("b-admin");  if(el) el.addEventListener("click",function(){
    if(ST.admin){ST.admin=false;if(ST.page==="admin")ST.page="bracket";draw();return;}
    var pw=prompt("Admin password:"); if(pw===null)return;
    if(pw===MASTER_PW||(GROUP_ADMIN_PW&&pw===GROUP_ADMIN_PW)){
      ST.admin=true;
      ST.page="admin";
      draw();
      toast("&#9889; Admin mode on");
    } else {
      toast("Wrong password");
    }
  });
  el=document.getElementById("b-reset"); if(el) el.addEventListener("click",function(){
    if(!confirm("Reset all CWS picks and results?"))return;
    if(DB){DB.ref(BASE).remove();toast("Reset done");}
  });
  el=document.getElementById("b-lock");  if(el) el.addEventListener("click",function(){
    if(!ST.user||!DB)return;
    if(!confirm("Lock in your picks?"))return;
    DB.ref(BASE+"/locked/"+ukey(ST.user)).set(true);
    toast("&#128274; Picks locked!");launchConfetti();
  });
  // Pick clicks — using data attributes, same as rwc
  els=document.querySelectorAll(".ts.clickable");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    pickTeam(this.getAttribute("data-gid"),this.getAttribute("data-tid"));
  });
  // Admin result buttons
  els=document.querySelectorAll(".adm-btn[data-gid]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    setResult(this.getAttribute("data-gid"),this.getAttribute("data-tid"));
  });
  el=document.getElementById("b-pub-on"); if(el) el.addEventListener("click",function(){ setGroupPublic(true); });
  el=document.getElementById("b-pub-off"); if(el) el.addEventListener("click",function(){ setGroupPublic(false); });
}

function setGroupPublic(val){
  if(!GROUP_ID||!DB) return;
  DB.ref("groups/"+GROUP_ID+"/public").set(val, function(err){
    if(err){ toast("Failed to save"); return; }
    ST.groupPublic=val;
    toast(val?"Leaderboard is now public":"Leaderboard is now private");
    draw();
  });
}

loadData();
// Pull-to-refresh for scores tab
(function(){
  var _ptrStartY=0,_ptrActive=false;
  document.addEventListener("touchstart",function(e){
    _ptrStartY=e.touches[0].clientY;
    _ptrActive=(window.scrollY===0&&ST.page==="scores");
  },{passive:true});
  document.addEventListener("touchend",function(e){
    if(!_ptrActive)return;
    var dy=e.changedTouches[0].clientY-_ptrStartY;
    if(dy>60) fetchScoreboard();
    _ptrActive=false;
  },{passive:true});
})();

</script>
