<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="dark"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PoolPlay – 2026 MCWS</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090f;--card:#0d1117;--card2:#090d14;--border:#1e2a3a;--border2:#0f1923;--text:#e2e8f0;--muted:#475569;--dim:#334155;--red:#c0392b;--red2:#ef4444;--gold:#fbbf24;--green:#10b981;--blue:#6aabf7}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:13px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none;touch-action:manipulation}
a{color:inherit;text-decoration:none;touch-action:manipulation}

/* ── TOPBAR ── */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 10px;display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:50;overflow:hidden}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;overflow:hidden}
.app-name{font-size:14px;font-weight:700;white-space:nowrap}
.app-sub{font-size:7px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--card2);border:1px solid #2d3f52;border-radius:20px;padding:3px 9px;font-size:9px;color:#94a3b8}
.tag.locked{border-color:rgba(251,191,36,.4);color:var(--gold);background:rgba(251,191,36,.08)}
.btn{border-radius:6px;padding:4px 10px;font-size:9px;font-weight:600;border:1px solid;transition:opacity .15s}
.btn:active{opacity:.65}
.btn-ghost{background:var(--card);border-color:var(--border);color:#64748b}
.btn-gold{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.35);color:var(--gold)}
.btn-red{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#fca5a5}
.btn-green{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.35);color:#6ee7b7}

/* ── PAGE TABS ── */
.page-bar{background:var(--card);border-bottom:1px solid var(--border);display:flex;padding:0 8px;gap:1px;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:7px 11px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:2px solid transparent;background:none;transition:color .15s;white-space:nowrap;flex-shrink:0}
.ptab.active{color:#fca5a5;border-bottom-color:var(--red2)}

/* ── TOAST / CONFETTI ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--card);border:1px solid rgba(239,68,68,.4);color:#fca5a5;border-radius:8px;padding:7px 16px;font-size:10px;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:900;display:none}

/* ── USER SELECT ── */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:44px 20px;gap:18px;overflow-y:auto;flex:1}
.user-screen h2{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:9px;background:var(--card);border:1px solid var(--border);font-size:14px;font-weight:700;color:var(--text);text-align:left;min-width:130px}
.user-btn:active{border-color:var(--red2);background:rgba(239,68,68,.08)}
.user-btn.locked-state{border-color:rgba(16,185,129,.4);color:#6ee7b7}
.user-btn-sub{font-size:8px;color:var(--muted);font-weight:400;margin-top:3px}

/* ── LOCK BAR ── */
.lock-bar{display:flex;align-items:center;gap:7px;padding:5px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--card2);flex-shrink:0}
.lock-info{font-size:9px;color:var(--muted)}
.lock-chips{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.lchip{padding:1px 7px;border-radius:20px;font-size:8px;border:1px solid}
.lchip.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.lchip.pend{background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.18);color:var(--muted)}

/* ── SCORE BANNER ── */
.score-banner{display:flex;gap:6px;padding:5px 12px;border-bottom:1px solid var(--border);overflow-x:auto;align-items:center;flex-shrink:0}
.score-banner::-webkit-scrollbar{display:none}
.sb-item{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:8px;white-space:nowrap;text-align:center;flex-shrink:0}
.sb-item .sl{color:var(--muted);font-size:7px}
.sb-item .sv{color:var(--text);font-weight:700;font-size:12px}
.sb-item.total{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)}
.sb-item.total .sv{color:var(--gold)}

/* ══════════════════════════════════════════════════
   BRACKET SCROLL CANVAS
   ══════════════════════════════════════════════════ */
.bracket-canvas{overflow:auto;position:relative;min-height:0}

/* Horizontal scroll wrapper */
.bracket-scroll{width:100%;display:flex;align-items:flex-start;overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#1e2a3a transparent}
.bracket-scroll::-webkit-scrollbar{height:4px}
.bracket-scroll::-webkit-scrollbar-track{background:transparent}
.bracket-scroll::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:2px}

/* Each column - NO overflow-y, let page scroll naturally */
.bcol{flex-shrink:0;display:flex;flex-direction:column;padding:8px 6px;}

/* Column widths */
.bcol-reg{width:240px}
.bcol-sr{width:220px}
.bcol-cws{width:220px}
.bcol-champ{width:200px}

/* Column header */
.bcol-header{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:2px 4px 6px;border-bottom:1px solid var(--border);margin-bottom:6px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.bcol-header .pts-hint{font-size:7px;color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0}

/* Divider between columns */
.bcol-divider{flex-shrink:0;width:1px;background:var(--border);margin:8px 0;align-self:stretch}

/* ── GAME CARD ── */
.gc{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:6px;flex-shrink:0;transition:border-color .15s}
.gc-head{padding:3px 8px;background:var(--card2);border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;gap:4px}
.gc-label{font-size:7px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.gc-pts{font-size:7px;color:var(--gold);font-weight:700;flex-shrink:0}
.gc-pts.earned{color:var(--green)}

/* Team slot */
.ts{padding:6px 8px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:32px}
.ts:not(:last-child){border-bottom:1px solid var(--border2)}
.ts:hover{background:rgba(255,255,255,.025)}
.ts.winner{background:rgba(16,185,129,.09)}
.ts.winner .ts-name{color:#6ee7b7}
.ts.loser{opacity:.38}
.ts.mypick:not(.winner):not(.loser){background:rgba(251,191,36,.07)}
.ts.mypick:not(.winner):not(.loser) .ts-name{color:var(--gold)}
.ts-seed{font-size:8px;color:var(--dim);width:12px;text-align:center;flex-shrink:0}
.ts-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ts-name{font-size:10px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.ts-rec{font-size:7px;color:var(--dim);flex-shrink:0}
.ts-icon{font-size:9px;flex-shrink:0;width:12px;text-align:center}
.ts-tbd{padding:6px 8px;font-size:9px;color:var(--dim);font-style:italic;min-height:32px;display:flex;align-items:center}
.ts.projected{opacity:.7;border-left:2px solid rgba(251,191,36,.3)}

/* Connector line between regional pairs */
.pair-connector{width:12px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;align-self:stretch;position:relative}
.pair-connector::after{content:"›";color:var(--dim);font-size:12px;position:absolute;top:50%;transform:translateY(-50%)}

/* SR group label */
.group-sep{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:8px 4px 4px;color:var(--muted);flex-shrink:0;border-top:1px solid var(--border);margin-top:6px}
.group-sep:first-child{border-top:none;margin-top:0}

/* CWS pod label */
.pod-label{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:0 4px 4px;flex-shrink:0}
.pod-label.b1{color:#6aabf7}
.pod-label.b2{color:#f97316}

/* Champion card */
.champ-card{background:var(--card);border:1px solid rgba(251,191,36,.3);border-radius:10px;padding:12px;margin:0 4px;flex-shrink:0}
.champ-card-label{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.champ-winner-display{text-align:center;padding:10px 0 6px}

/* Progress indicator at bottom of bracket */
.bracket-progress{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border);pointer-events:none}
.bracket-progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));transition:width .3s}

/* Round scroll hint arrows */
.scroll-hint{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:rgba(13,17,23,.85);border:1px solid var(--border);border-radius:20px;padding:6px 10px;font-size:11px;color:var(--muted);pointer-events:none;transition:opacity .3s;z-index:10}

/* ══════════════════════════════════════════════════
   LIVE SCOREBOARD
   ══════════════════════════════════════════════════ */
.scores-wrap{padding:10px;min-height:60vh}
.scores-date-header{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:4px 2px 8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.scores-refresh{font-size:8px;cursor:pointer;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--muted);font-family:inherit;flex-shrink:0}
.scores-refresh:active{opacity:.6}
.scores-section-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:10px 2px 5px;border-top:1px solid var(--border);margin-top:4px}
.scores-section-label:first-child{border-top:none;margin-top:0;padding-top:0}
.scores-strip{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;margin-bottom:2px}
.scores-strip::-webkit-scrollbar{height:3px}
.scores-strip::-webkit-scrollbar-track{background:transparent}
.scores-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.score-card{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;width:154px}
.score-card.live{border-color:rgba(239,68,68,.45)}
.score-card.final{opacity:.75}
.sc-head{padding:3px 8px;background:var(--card2);border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;gap:4px}
.sc-status{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.sc-status.live{color:var(--red2);animation:sc-pulse 1.4s ease-in-out infinite}
.sc-status.final{color:#818cf8}
.sc-status.pre{color:var(--dim)}
@keyframes sc-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sc-detail{font-size:7px;color:var(--dim);text-align:right;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-team{display:flex;align-items:center;gap:5px;padding:5px 8px;min-height:30px}
.sc-team:not(:last-child){border-bottom:1px solid var(--border2)}
.sc-team.winner .sc-name{color:var(--text);font-weight:700}
.sc-team.loser{opacity:.48}
.sc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--muted)}
.sc-name{font-size:10px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.sc-rec{font-size:7px;color:var(--dim);flex-shrink:0}
.sc-score{font-size:14px;font-weight:800;color:var(--text);flex-shrink:0;min-width:20px;text-align:right;line-height:1}
.sc-score.pre{font-size:9px;color:var(--dim);font-weight:400}
.sc-bases{font-size:8px;flex-shrink:0;width:16px;text-align:center;color:var(--dim)}
.scores-empty{text-align:center;padding:40px 16px;color:var(--dim);font-size:11px;line-height:2}
.scores-loading{text-align:center;padding:40px 16px;color:var(--dim);font-size:11px}

/* ══════════════════════════════════════════════════
   LEADERBOARD
   ══════════════════════════════════════════════════ */
.lb-wrap{padding:12px;min-height:60vh}
.lb-note{font-size:8px;color:var(--muted);margin-bottom:12px;line-height:1.8;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 10px}
.lb-row{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:7px;display:flex;gap:9px;align-items:center}
.lb-row.first{border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.025)}
.lb-row.second{border-color:rgba(148,163,184,.2)}
.lb-row.third{border-color:rgba(205,127,50,.2)}
.lb-medal{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;gap:5px}
.lb-name{font-size:13px;font-weight:700}
.lb-pts{font-size:10px;color:var(--muted);flex-shrink:0}
.lb-pts b{color:#f1f5f9;font-weight:700}
.progress{background:#0f1923;border-radius:3px;height:3px;position:relative;overflow:hidden;margin-bottom:3px}
.progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;transition:width .6s;background:linear-gradient(90deg,var(--red),var(--red2))}
.lb-chips{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.lpc{font-size:7px;padding:1px 5px;border-radius:8px;border:1px solid var(--border);color:var(--dim)}
.lpc.correct{color:var(--green);border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.05)}
.lpc.wrong{color:#fca5a5;border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04);text-decoration:line-through;opacity:.7}
.lpc.pending{color:var(--gold);border-color:rgba(251,191,36,.2);background:rgba(251,191,36,.04)}

/* ══════════════════════════════════════════════════
   ADMIN
   ══════════════════════════════════════════════════ */
.adm-wrap{padding:10px;min-height:60vh}
.adm-sec-label{font-size:8px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;margin-top:14px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.adm-sec-label:first-child{margin-top:0}
.adm-game{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 10px;margin-bottom:5px}
.adm-game-title{font-size:9px;color:var(--muted);margin-bottom:6px}
.adm-btns{display:flex;gap:5px;flex-wrap:wrap}
.adm-btn{padding:4px 10px;border-radius:5px;font-size:9px;font-weight:600;border:1px solid var(--border);background:#07090f;color:#94a3b8;cursor:pointer;font-family:inherit;transition:all .12s}
.adm-btn.sel{border-color:rgba(16,185,129,.5);background:rgba(16,185,129,.1);color:#6ee7b7}
.adm-btn.tbd{opacity:.3;cursor:default}
.adm-btn.clr{color:#ef4444;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.05)}
</style>
</head>

<div id="toast"></div>

function cwsTeam(g, isTop){
  if(isTop){
    if(g.s1) return getSlot(g.s1);
    if(g.f1){var w=getSlot(g.f1);if(!w)return null;return g.lose1?cwsLoser(g.f1):w;}
  } else {
    if(g.s2) return getSlot(g.s2);
    if(g.f2){var w2=getSlot(g.f2);if(!w2)return null;return g.lose2?cwsLoser(g.f2):w2;}
  }
  return null;
}
function cwsLoser(gid){
  var all=allCwsGames(); var g=all[gid];if(!g)return null;

  var w=getR(gid);if(!w)return null;
  var t1=cwsTeam(g,true),t2=cwsTeam(g,false);
  return w===t1?t2:t1;
}

  var ctx=cv.getContext("2d"),pp=[],cols=["#c0392b","#ef4444","#e8b84b","#fbbf24","#fff","#10b981","#6aabf7"];
  for(var i=0;i<140;i++)pp.push({x:Math.random()*cv.width,y:-10-Math.random()*200,w:6+Math.random()*7,h:8+Math.random()*9,color:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*4,vy:2+Math.random()*4,angle:Math.random()*Math.PI*2,va:(Math.random()-.5)*.2});

  requestAnimationFrame(tick);
}

// ── ESPN LIVE SCOREBOARD ──────────────────────────
var _scTimer=null, _scData=null, _scLoading=false, _scLastFetch=0;

function espnColor(name, colorStr){
  if(colorStr&&colorStr.length===6&&colorStr!=="000000") return "#"+colorStr;
  return tc(name)||"#475569";
}

function fetchScoreboard(){
  if(_scLoading) return;
  _scLoading=true;
  var d=new Date();
  var ds=d.getFullYear()+""+("0"+(d.getMonth()+1)).slice(-2)+""+("0"+d.getDate()).slice(-2);
  fetch("https://site.api.espn.com/apis/site/v2/sports/baseball/college-baseball/scoreboard?dates="+ds+"&limit=200")
    .then(function(r){return r.json();})
    .then(function(data){
      _scLoading=false; _scLastFetch=Date.now(); _scData=data;
      if(ST.page==="scores") renderScoresInto();
    })
    .catch(function(){
      _scLoading=false;
      var el=document.getElementById("scores-wrap");
      if(el) el.innerHTML='<div class="scores-empty">⚾<br>Could not load scores.<br><br><button class="scores-refresh" onclick="fetchScoreboard()">↻ Retry</button></div>';
    });
}

function renderScoresInto(){
  var el=document.getElementById("scores-wrap");
  if(!el) return;
  if(!_scData||!_scData.events||!_scData.events.length){
    el.innerHTML='<div class="scores-empty">⚾<br>No games found for today.<br><span style="font-size:9px;color:var(--dim)">Check back when the tournament is live (Jun 12–22)</span></div>';
    return;
  }

  var events=_scData.events;
  var live=[],pre=[],done=[];
  events.forEach(function(ev){
    var comp=(ev.competitions||[])[0]; if(!comp) return;
    var state=(comp.status&&comp.status.type&&comp.status.type.state)||"pre";
    if(state==="in") live.push(ev);
    else if(state==="post") done.push(ev);
    else pre.push(ev);
  });

  var d=new Date();
  var dateLabel=d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});

  function card(ev){
    var comp=(ev.competitions||[])[0]; if(!comp) return "";
    var status=comp.status||{};
    var state=(status.type&&status.type.state)||"pre";
    var detail=(status.type&&status.type.shortDetail)||"";
    var isLive=state==="in", isFinal=state==="post";

    var comps=comp.competitors||[];
    var away=comps.find(function(c){return c.homeAway==="away";})||comps[0]||{};
    var home=comps.find(function(c){return c.homeAway==="home";})||comps[1]||{};

    function tname(c){return(c.team&&(c.team.shortDisplayName||c.team.displayName))||"?";}
    function tcolor(c){return espnColor(tname(c),(c.team&&c.team.color)||"");}

    var aName=tname(away), hName=tname(home);
    var aScore=away.score!=null?String(away.score):"";
    var hScore=home.score!=null?String(home.score):"";
    var aNum=parseInt(aScore)||0, hNum=parseInt(hScore)||0;

    var aWin=isFinal&&aNum>hNum, hWin=isFinal&&hNum>aNum;
    var aLead=isLive&&aNum>hNum, hLead=isLive&&hNum>aNum;

    function teamRow(name, color, score, wins, leads, tied){
      var cls="sc-team";
      if((wins||leads)) cls+=" winner";
      else if(isFinal&&!wins) cls+=" loser";
      else if(isLive&&!leads&&!tied&&score!="") cls+=" loser";
      return '<div class="'+cls+'">'+
        '<div class="sc-dot" style="background:'+color+'"></div>'+
        '<div class="sc-name">'+x(name)+'</div>'+
        '<div class="sc-score'+(state==="pre"?" pre":"")+'">'+x(state==="pre"?"":score)+'</div>'+
        '</div>';
    }

    var tied=isLive&&aNum===hNum&&aScore!="";
    return '<div class="score-card'+(isLive?" live":isFinal?" final":"")+'">'+
      '<div class="sc-head">'+
        '<span class="sc-status '+(isLive?"live":isFinal?"final":"pre")+'">'+(isLive?"● LIVE":isFinal?"Final":"Upcoming")+'</span>'+
        '<span class="sc-detail">'+x(isLive?detail:isFinal?"":detail)+'</span>'+
      '</div>'+
      teamRow(aName,tcolor(away),aScore,aWin,aLead,tied)+
      teamRow(hName,tcolor(home),hScore,hWin,hLead,tied)+
      '</div>';
  }

  function section(games, label){
    if(!games.length) return "";
    var s='<div class="scores-section-label">'+label+' &middot; '+games.length+'</div>';
    s+='<div class="scores-strip">';
    games.forEach(function(ev){s+=card(ev);});
    s+='</div>';
    return s;
  }

  var ago=_scLastFetch?Math.round((Date.now()-_scLastFetch)/1000):0;
  var h='<div class="scores-date-header">'+
    '<span>⚾ College Baseball &middot; '+dateLabel+'</span>'+
    '<button class="scores-refresh" onclick="fetchScoreboard()">↻ Refresh</button>'+
    '</div>';
  if(live.length) h+=section(live,"🔴 In Progress");
  h+=section(pre,"🕐 Upcoming");
  h+=section(done,"✓ Final");
  h+='<div style="text-align:center;padding:10px 0 4px;font-size:7px;color:var(--dim)">Updated '+ago+'s ago &middot; auto-refreshes every 60s &middot; via ESPN</div>';
  el.innerHTML=h;
}

  var icon=isW?"✓":isMP&&!w?"★":"";

    '<div class="ts-dot" style="background:'+tc(name)+'"></div>'+

      var icol=isW?"color:#6ee7b7":"color:var(--gold)";
      h+='<div class="'+cls+'" data-gid="'+x(pair.sr_id)+'" data-tid="'+x(t1)+'">'+
        '<div class="ts-seed">'+t1s+'</div>'+
        '<div class="ts-dot" style="background:'+tc(t1)+'"></div>'+
        '<div class="ts-name">'+x(t1)+'</div>'+
        '<div class="ts-rec" style="'+(t1official?"":'color:#475569;font-style:italic')+'">'+(t1official?"Reg. winner":"projected")+'</div>'+
        '<div class="ts-icon" style="'+icol+'">'+icon+'</div>'+
        '</div>';
    } else {
      h+='<div class="ts-tbd">TBD · '+x(pair.left.label)+' winner</div>';
    }
    // Slot 2
    if(t2){
      var w2=srResult, myPick2=srPick;
      var isW2=w2&&w2===t2, isL2=w2&&w2!==t2, isMP2=myPick2===t2;
      var cls2="ts"+(isW2?" winner":isL2?" loser":isMP2?" mypick":"")+((!t2official&&!isW2&&!isL2)?" projected":"")+(canPick&&t1&&t2?" clickable":"");
      var icon2=isW2?"✓":isMP2&&!w2?"★":"";
      var icol2=isW2?"color:#6ee7b7":"color:var(--gold)";
      h+='<div class="'+cls2+'" data-gid="'+x(pair.sr_id)+'" data-tid="'+x(t2)+'">'+
        '<div class="ts-seed">'+t2s+'</div>'+
        '<div class="ts-dot" style="background:'+tc(t2)+'"></div>'+
        '<div class="ts-name">'+x(t2)+'</div>'+
        '<div class="ts-rec" style="'+(t2official?"":'color:#475569;font-style:italic')+'">'+(t2official?"Reg. winner":"projected")+'</div>'+
        '<div class="ts-icon" style="'+icol2+'">'+icon2+'</div>'+
        '</div>';
    } else {
      h+='<div class="ts-tbd">TBD · '+x(pair.right.label)+' winner</div>';
    }
    h+='</div>';
  });
  h+='</div>';

  // Divider
  h+='<div class="bcol-divider"></div>';

  // ── COL 3: CWS DOUBLE-ELIM ──
  h+='<div class="bcol bcol-cws">';
  h+='<div class="bcol-header">College World Series <span class="pts-hint">Jun 12–20 · 6–10 pts</span></div>';

  CWS_PODS.forEach(function(pod){
    h+='<div class="pod-label '+pod.cls+'">'+pod.label+'</div>';
    pod.games.forEach(function(g){
      if(g.optional){
        var t1o=cwsTeam(g,true),t2o=cwsTeam(g,false);
        if(!t1o&&!t2o&&!getSlot(g.id)) return;
      }
      var t1=cwsTeam(g,true), t2=cwsTeam(g,false);
      h+=gcHTML(g.id, g.label, g.pts, t1,"","", t2,"","", !!(canPick&&t1&&t2));
    });
    h+='<div style="height:8px"></div>';
  });
  h+='</div>';

  // Divider
  h+='<div class="bcol-divider"></div>';

  // ── COL 4: CHAMPIONSHIP ──
  h+='<div class="bcol bcol-champ">';
  h+='<div class="bcol-header">Championship Series <span class="pts-hint">Jun 22–24 · 12–15 pts</span></div>';

  var c1=podChamp("b1"), c2=podChamp("b2");

  CHAMP.forEach(function(g){
    if(g.optional){
      var cw1=getSlot(CHAMP[0].id),cw2=getSlot(CHAMP[1].id);
      if(!cw1||!cw2) return;
    }
    h+=gcHTML(g.id, g.label, g.pts, c1,"","Bracket 1 Champ", c2,"","Bracket 2 Champ", !!(canPick&&c1&&c2));
  });

  // National champion display
  var champ=null;
  var cw1=getR(CHAMP[0].id),cw2=getR(CHAMP[1].id),cw3=getR(CHAMP[2].id);
  if(cw1&&cw2&&cw1===cw2) champ=cw1; else if(cw3) champ=cw3;

  if(!c1&&!c2&&!champ){
    h+='<div style="padding:16px 6px;text-align:center;color:var(--dim);font-size:9px;line-height:1.8">Championship Series teams will appear once bracket finalists are determined</div>';
  }

  if(champ){
    h+='<div style="margin-top:10px;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.3);border-radius:9px;padding:12px;text-align:center">';
    h+='<div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">🏆 2026 National Champions</div>';
    h+='<div style="display:flex;align-items:center;justify-content:center;gap:8px">';
    h+='<div style="width:24px;height:24px;border-radius:50%;background:'+tc(champ)+';flex-shrink:0"></div>';
    h+='<div style="font-size:14px;font-weight:800;color:var(--gold)">'+x(champ)+'</div>';
    h+='</div></div>';
  }

  h+='</div>'; // end champ col

  h+='</div>'; // end bracket-scroll
  return h;
}

// ── LEADERBOARD ──────────────────────────────────────────
function renderLB(){
  var sorted=PARTS.slice().sort(function(a,b){return calcScore(b)-calcScore(a);});
  var maxScore=calcScore(sorted[0])||1;
  var medals=["🥇","🥈","🥉"];
  var h='<div class="lb-wrap">';
  h+='<div class="lb-note">Regionals 2 pts · Supers 4 pts · CWS games 6–10 pts · Championship Series 12–15 pts</div>';
  sorted.forEach(function(p,i){
    var score=calcScore(p);
    var picks=(ST.picks||{})[ukey(p)]||{};
    var cls="lb-row"+(i===0?" first":i===1?" second":i===2?" third":"");
    h+='<div class="'+cls+'"><div class="lb-medal">'+(medals[i]||'<span style="font-size:12px;color:var(--dim)">'+(i+1)+'</span>')+'</div>';
    h+='<div class="lb-body"><div class="lb-top"><div class="lb-name">'+pem(p)+x(p)+'</div><div class="lb-pts"><b>'+score+'</b> pts</div></div>';
    h+='<div class="progress"><div class="progress-fill" style="width:'+Math.round((score/maxScore)*100)+'%"></div></div>';
    h+='<div class="lb-chips">';
    ALL_IDS.forEach(function(gid){
      var tid=picks[gid];if(!tid)return;
      var r=getR(gid);
      var correct=r&&r===tid,wrong=r&&r!==tid;
      var pts=GAME_PTS[gid]||0;
      var cls2="lpc"+(correct?" correct":wrong?" wrong":" pending");
      var short=tid.replace("Mississippi State","Miss St").replace("North Carolina","UNC").replace("West Virginia","WVU").replace("Georgia Tech","GTech").replace("Florida State","FSU").replace("South Dakota State","SDSU").replace("UC Santa Barbara","UCSB").replace("Arizona State","ASU").replace("Washington St.","WSU");
      short=short.length>8?short.substring(0,8):short;
      h+='<div class="'+cls2+'" title="'+x(tid)+'">'+x(short)+(correct?" +"+pts:"")+'</div>';
    });
    h+='</div></div></div>';
  });
  h+='</div>';
  return h;
}

  h+='<div class="adm-sec-label">Regionals</div>';
  REG_PAIRS.forEach(function(pair){
    [pair.left,pair.right].forEach(function(reg){
      var w=getR(reg.id);
      h+='<div class="adm-game"><div class="adm-game-title">'+x(reg.label)+' Regional</div><div class="adm-btns">';
      reg.teams.forEach(function(t){
        h+='<button class="adm-btn'+(w===t.n?" sel":"")+'" data-gid="'+x(reg.id)+'" data-tid="'+x(t.n)+'">'+x(t.n)+'</button>';
      });
      if(w)h+='<button class="adm-btn clr" data-gid="'+x(reg.id)+'" data-tid="CLEAR">✕</button>';

  h+='<div class="adm-sec-label">Super Regionals</div>';

    h+='<div class="adm-game"><div class="adm-game-title">'+x(pair.left.label)+' vs '+x(pair.right.label)+'</div><div class="adm-btns">';
    if(!t1)h+='<button class="adm-btn tbd" disabled>TBD</button>';
    else h+='<button class="adm-btn'+(w===t1?" sel":"")+'" data-gid="'+x(pair.sr_id)+'" data-tid="'+x(t1)+'">'+x(t1)+'</button>';
    if(!t2)h+='<button class="adm-btn tbd" disabled>TBD</button>';
    else h+='<button class="adm-btn'+(w===t2?" sel":"")+'" data-gid="'+x(pair.sr_id)+'" data-tid="'+x(t2)+'">'+x(t2)+'</button>';
    if(w)h+='<button class="adm-btn clr" data-gid="'+x(pair.sr_id)+'" data-tid="CLEAR">✕</button>';
    h+='</div></div>';
  });

  CWS_PODS.forEach(function(pod){
    h+='<div class="adm-sec-label">CWS '+pod.label+'</div>';
    pod.games.forEach(function(g){
      var t1=cwsTeam(g,true),t2=cwsTeam(g,false),w=getR(g.id);
      if(g.optional&&!t1&&!t2&&!w)return;
      h+='<div class="adm-game"><div class="adm-game-title">'+x(g.label)+'</div><div class="adm-btns">';
      if(!t1)h+='<button class="adm-btn tbd" disabled>TBD</button>';
      else h+='<button class="adm-btn'+(w===t1?" sel":"")+'" data-gid="'+x(g.id)+'" data-tid="'+x(t1)+'">'+x(t1)+'</button>';
      if(!t2)h+='<button class="adm-btn tbd" disabled>TBD</button>';
      else h+='<button class="adm-btn'+(w===t2?" sel":"")+'" data-gid="'+x(g.id)+'" data-tid="'+x(t2)+'">'+x(t2)+'</button>';
      if(w)h+='<button class="adm-btn clr" data-gid="'+x(g.id)+'" data-tid="CLEAR">✕</button>';
      h+='</div></div>';
    });

  h+='<div class="adm-sec-label">Championship Series</div>';
  var c1=podChamp("b1"),c2=podChamp("b2");
  CHAMP.forEach(function(g){
    var w=getR(g.id);
    if(g.optional){var cw1=getR(CHAMP[0].id),cw2=getR(CHAMP[1].id);if(!cw1||!cw2)return;}
    h+='<div class="adm-game"><div class="adm-game-title">'+x(g.label)+'</div><div class="adm-btns">';
    if(!c1)h+='<button class="adm-btn tbd" disabled>TBD</button>';
    else h+='<button class="adm-btn'+(w===c1?" sel":"")+'" data-gid="'+x(g.id)+'" data-tid="'+x(c1)+'">'+x(c1)+'</button>';
    if(!c2)h+='<button class="adm-btn tbd" disabled>TBD</button>';
    else h+='<button class="adm-btn'+(w===c2?" sel":"")+'" data-gid="'+x(g.id)+'" data-tid="'+x(c2)+'">'+x(c2)+'</button>';
    if(w)h+='<button class="adm-btn clr" data-gid="'+x(g.id)+'" data-tid="CLEAR">✕</button>';
    h+='</div></div>';

  h+='</div>';
  return h;
}

// ── MAIN DRAW ────────────────────────────────────────────
function draw(){
  var locked=isLocked();
  var userPicks=ST.user?(ST.picks||{})[ukey(ST.user)]||{}:{};
  var score=ST.user?calcScore(ST.user):0;
  var myPickCount=Object.keys(userPicks).length;
  var canPick=!!(ST.user&&!locked);
  var h='';

  // Topbar
  h+='<div class="topbar">';
  h+='<div class="topbar-left">';
  h+='<a href="index.html" style="display:flex;align-items:center;gap:3px;text-decoration:none;color:var(--muted);font-size:9px;font-weight:600;padding:4px 8px;border:1px solid var(--border);border-radius:6px;white-space:nowrap">&#8592; Hub</a>';
  h+='</div>';
  h+='<div class="topbar-center">';
  h+='<div class="app-name">PoolPlay</div>';
  h+='<div class="app-sub">2026 MCWS &middot; Charles Schwab Field &middot; Omaha</div>';
  h+='</div>';
  h+='<div class="topbar-right">';
  if(ST.user){
    h+='<span class="tag'+(locked?" locked":"")+'">'+pem(ST.user)+x(ST.user)+(locked?"&nbsp;&#128274;":"")+'</span>';
    if(!URL_USER)h+='<button class="btn btn-ghost" id="b-switch">&#8646;</button>';
  }
  h+='<button class="btn '+(ST.admin?"btn-gold":"btn-ghost")+'" id="b-admin">'+(ST.admin?"&#9889;":"&#9881;")+'</button>';
  if(ST.admin)h+='<button class="btn btn-red" id="b-reset">&#8635;</button>';
  h+='</div></div>';

  // Tabs
  var tabs=[{id:"bracket",lbl:"⚾ Bracket"},{id:"scores",lbl:"🔴 Scores"},{id:"leaderboard",lbl:"Leaderboard"}];
  if(ST.admin)tabs.push({id:"admin",lbl:"Admin"});
  h+='<div class="page-bar">';
  tabs.forEach(function(t){h+='<button class="ptab'+(ST.page===t.id?" active":"")+'" data-page="'+t.id+'">'+t.lbl+'</button>';});
  h+='</div>';

  // User select
  if(!ST.user&&!ST.admin&&ST.page==="bracket"){
    h+='<div class="user-screen"><h2>Who are you?</h2><div class="user-grid">';
    PARTS.forEach(function(p){
      var lk=ST.locked[ukey(p)],tp=totalPicks(p);
      h+='<button class="user-btn'+(lk?" locked-state":"")+'" data-user="'+x(p)+'">';
      h+='<div>'+pem(p)+x(p)+'</div>';
      h+='<div class="user-btn-sub">'+(lk?"&#128274; Locked in":tp+"/"+ALL_IDS.length+" picks made")+'</div>';
      h+='</button>';
    });
    h+='</div></div>';
    document.getElementById("root").innerHTML=h;
    stopScoreRefresh();
    bind();return;
  }

  // Score banner
  if(ST.user&&Object.keys(ST.results||{}).length>0){
    var cor=0,wr=0,pend=0;
    ALL_IDS.forEach(function(gid){var p=userPicks[gid],r=getR(gid);if(p&&r){if(p===r)cor++;else wr++;}else if(p&&!r)pend++;});
    h+='<div class="score-banner">';
    h+='<div class="sb-item"><div class="sl">Correct</div><div class="sv" style="color:var(--green)">'+cor+'</div></div>';
    h+='<div class="sb-item"><div class="sl">Wrong</div><div class="sv" style="color:var(--red2)">'+wr+'</div></div>';
    h+='<div class="sb-item"><div class="sl">Pending</div><div class="sv">'+pend+'</div></div>';
    h+='<div class="sb-item total"><div class="sl">Score</div><div class="sv">'+score+'</div></div>';
    h+='</div>';
  }

  // Lock bar (bracket page only)
  if(ST.user&&ST.page==="bracket"){
    h+='<div class="lock-bar">';
    h+='<div class="lock-info">'+(locked?"&#128274; Picks locked":"&#9998; Scroll right to advance picks &middot; "+myPickCount+" made")+'</div>';
    h+='<div class="lock-chips">';
    PARTS.forEach(function(p){var lk=ST.locked[ukey(p)];h+='<div class="lchip '+(lk?"done":"pend")+'">'+(lk?"&#128274; ":"")+x(p)+'</div>';});
    h+='</div>';
    if(canPick&&myPickCount>0)h+='<button class="btn btn-gold" id="b-lock" style="margin-left:5px">&#128274; Lock</button>';
    h+='</div>';
  }

  // Main content
  if(ST.page==="bracket"){
    h+='<div class="bracket-canvas" id="bcanvas">';
    h+=renderBracketCols(canPick);
    h+='</div>';
  } else if(ST.page==="scores"){
    h+='<div class="scores-wrap" id="scores-wrap"><div class="scores-loading">Loading scores…</div></div>';
  } else if(ST.page==="leaderboard"){
    h+=renderLB();
  } else if(ST.page==="admin"&&ST.admin){
    h+=renderAdmin();
  }

  document.getElementById("root").innerHTML=h;
  bind();
  if(ST.page==="scores"){
    // If we already have data render it, otherwise fetch
    if(_scData) renderScoresInto(); else startScoreRefresh();
  } else {
    stopScoreRefresh();
  }
}

// ── Scroll save/restore — exact rwc pattern ───────────
var _savedScroll=null;
function _restoreScroll(){
  if(!_savedScroll)return;
  var saved=_savedScroll;
  function apply(){
    var bs=document.getElementById("bscroll");
    if(bs) bs.scrollLeft=saved.sx;
    window.scrollTo(0,saved.sy);
  }
  requestAnimationFrame(function(){apply();requestAnimationFrame(function(){apply();_savedScroll=null;});});
}
function _saveScroll(){
  var bs=document.getElementById("bscroll");
  var sx=bs?bs.scrollLeft:0;
  var sy=window.pageYOffset||window.scrollY||0;
  _savedScroll={sx:sx,sy:sy};
}

function pickTeam(gid,tid){
  if(!ST.user){toast("Select your name first");return;}
  if(isLocked()){toast("&#128274; Picks are locked");return;}
  var uk=ukey(ST.user);
  if(!ST.picks[uk]) ST.picks[uk]={};
  _saveScroll();
  if(ST.picks[uk][gid]===tid){
    delete ST.picks[uk][gid];
    draw();_restoreScroll();
    if(DB) DB.ref(BASE+"/picks/"+uk+"/"+gid).remove();
    toast("Pick removed");
  } else {
    ST.picks[uk][gid]=tid;
    draw();_restoreScroll();
    if(DB) DB.ref(BASE+"/picks/"+uk+"/"+gid).set(tid);
    toast("&#9733; "+tid);
  }
}

function setResult(gid,tid){
  if(!ST.results) ST.results={};
  _saveScroll();
  if(tid==="CLEAR"){
    delete ST.results[gid];
    draw();_restoreScroll();
    if(DB) DB.ref(BASE+"/results/"+gid).remove();
    toast("Cleared");
  } else {
    ST.results[gid]=tid;
    draw();_restoreScroll();
    if(DB) DB.ref(BASE+"/results/"+gid).set(tid);
    toast("&#9989; "+tid+" wins");launchConfetti();
  }
}

function bind(){
  var els,i,el;
  els=document.querySelectorAll(".ptab");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ST.page=this.getAttribute("data-page");draw();});
  els=document.querySelectorAll(".user-btn");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ST.user=this.getAttribute("data-user");draw();});
  el=document.getElementById("b-switch"); if(el) el.addEventListener("click",function(){ST.user=null;draw();});
  el=document.getElementById("b-admin");  if(el) el.addEventListener("click",function(){
    if(ST.admin){ST.admin=false;if(ST.page==="admin")ST.page="bracket";draw();return;}
    var pw=prompt("Admin password:"); if(pw===null)return;
    if(pw===MASTER_PW||(GROUP_ADMIN_PW&&pw===GROUP_ADMIN_PW)){ST.admin=true;draw();}
    else toast("Wrong password");
  });
  el=document.getElementById("b-reset"); if(el) el.addEventListener("click",function(){
    if(!confirm("Reset all CWS picks and results?"))return;
    if(DB){DB.ref(BASE).remove();toast("Reset done");}
  });
  el=document.getElementById("b-lock");  if(el) el.addEventListener("click",function(){
    if(!ST.user||!DB)return;
    if(!confirm("Lock in your picks?"))return;
    DB.ref(BASE+"/locked/"+ukey(ST.user)).set(true);
    toast("&#128274; Picks locked!");launchConfetti();
  });
  // Pick clicks — using data attributes, same as rwc
  els=document.querySelectorAll(".ts.clickable");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    pickTeam(this.getAttribute("data-gid"),this.getAttribute("data-tid"));
  });
  // Admin result buttons
  els=document.querySelectorAll(".adm-btn[data-gid]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    setResult(this.getAttribute("data-gid"),this.getAttribute("data-tid"));
  });
}

loadData();
</script>
