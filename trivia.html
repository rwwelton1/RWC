<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PoolPlay Trivia</title>
<link rel="icon" href="/poolplay-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none;background:none}
a{text-decoration:none;color:inherit}

/* Topbar */
.bar{background:#0d1117;border-bottom:1px solid #1e2a3a;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.logo{font-family:‘Bebas Neue’,cursive;font-size:22px;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.back{border:1px solid #2d3f52;border-radius:6px;color:#64748b;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer}

.wrap{max-width:500px;margin:0 auto;padding:20px 16px 60px}

/* Home screen */
.hero{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(168,85,247,.07));border:1px solid rgba(99,102,241,.28);border-radius:16px;padding:28px 20px 24px;text-align:center;margin-bottom:16px}
.hero-tag{font-size:9px;color:#818cf8;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.hero-title{font-family:‘Bebas Neue’,cursive;font-size:42px;letter-spacing:.05em;color:#fff;margin-bottom:4px}
.hero-date{font-size:12px;color:#475569;margin-bottom:20px}
.start-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:700;padding:14px 48px;border-radius:12px}
.done-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:16px}
.done-label{font-size:11px;font-weight:700;color:#6ee7b7;margin-bottom:8px}
.done-bugs{font-size:24px;letter-spacing:3px;margin-bottom:6px;line-height:1.6}
.done-score{font-size:12px;color:#64748b;margin-bottom:12px}
.share-btn{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;font-size:12px;font-weight:700;padding:9px 24px;border-radius:8px}

/* Difficulty legend */
.diff-row{display:flex;gap:6px;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
.diff-pill{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid}

/* Progress */
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-label{font-size:10px;color:#475569}
.prog-pts{font-size:11px;font-weight:700;color:#a5b4fc}
.pbar{height:4px;background:#0f1923;border-radius:2px;margin-bottom:14px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width .3s}
.dots{display:flex;gap:4px;justify-content:center;margin-bottom:18px}
.dot{width:11px;height:11px;border-radius:50%;background:#1a2535;flex-shrink:0}

/* Question */
.diff-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid;margin-bottom:10px}
.qcard{background:#0d1117;border:1px solid #1a2535;border-radius:14px;padding:18px 18px 16px;margin-bottom:14px}
.qtext{font-size:16px;font-weight:700;color:#f1f5f9;line-height:1.45}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.choice{border:1px solid #1a2535;border-radius:10px;padding:12px 15px;font-size:13px;font-weight:500;color:#94a3b8;display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#0d1117;transition:border-color .15s}
.choice.correct{border-color:rgba(16,185,129,.6)!important;background:rgba(16,185,129,.07)!important;color:#6ee7b7!important}
.choice.wrong{border-color:rgba(239,68,68,.5)!important;background:rgba(239,68,68,.05)!important;color:#fca5a5!important}
.choice.dim{opacity:.2}
.cltr{width:22px;height:22px;flex-shrink:0;border-radius:5px;background:#07090f;border:1px solid #1a2535;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#334155}
.feedback{border-radius:10px;padding:11px 13px;font-size:12px;font-weight:600;display:flex;align-items:flex-start;gap:9px;margin-bottom:12px;line-height:1.4}
.feedback.ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
.feedback.no{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.18);color:#fca5a5}
.fb-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.fb-fact{font-size:10px;color:#475569;font-weight:400;margin-top:3px;line-height:1.5}
.nxt-btn{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}

/* Results */
.res-wrap{text-align:center;padding:8px 0 20px}
.res-trophy{font-size:64px;display:block;margin-bottom:10px}
.res-score{font-size:64px;font-weight:900;color:#fff;line-height:1;margin-bottom:2px}
.res-sub{font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.res-msg{font-size:13px;color:#64748b;margin-bottom:20px}
.share-card{background:#0d1117;border:1px solid rgba(99,102,241,.22);border-radius:14px;padding:18px;margin-bottom:10px}
.share-title{font-size:9px;color:#6366f1;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-weight:700}
.share-bugs{font-size:22px;letter-spacing:3px;margin-bottom:6px;line-height:1.6}
.share-score{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:14px}
.share-btns{display:flex;gap:8px}
.sms-btn{flex:1;padding:12px;border-radius:9px;font-size:13px;font-weight:700;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.copy-btn{flex:1;padding:12px;border-radius:9px;font-size:13px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.home-btn{width:100%;padding:12px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid #1e2a3a;color:#475569;margin-top:6px}
.breakdown{background:#0d1117;border:1px solid #1a2535;border-radius:12px;overflow:hidden;margin-bottom:10px}
.breakdown-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #07090f}
.breakdown-row:last-child{border-bottom:none}
.breakdown-num{font-size:9px;color:#334155;font-weight:700;width:16px;flex-shrink:0;text-align:center}
.breakdown-q{font-size:11px;color:#64748b;flex:1;line-height:1.3}
.breakdown-ic{font-size:14px;flex-shrink:0}
</style>

</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#475569;font-family:sans-serif">Loading...</div></div>
<script>
var Q = [{"q":"How many points is a touchdown worth in the NFL?","c":["3","6","7","2"],"a":1,"d":"Easy","f":"A touchdown is worth 6 points. The extra point kick or 2-point conversion comes after."},{"q":"Which NBA team has won the most championships?","c":["Lakers","Bulls","Celtics","Warriors"],"a":2,"d":"Easy","f":"The Boston Celtics have won 17 NBA championships, the most in league history."},{"q":"How many strikes does it take to strike out in baseball?","c":["2","3","4","1"],"a":1,"d":"Easy","f":"Three strikes and you're out — one of baseball's most fundamental rules."},{"q":"Which country has won the most FIFA World Cups?","c":["Germany","Argentina","Italy","Brazil"],"a":3,"d":"Medium","f":"Brazil has won 5 World Cups: 1958, 1962, 1970, 1994, and 2002 — more than any other nation."},{"q":"What is the distance of a marathon in miles?","c":["24.2","25.5","26.2","27.1"],"a":2,"d":"Medium","f":"A marathon is exactly 26.2 miles (42.195 km), a distance set officially at the 1908 London Olympics."},{"q":"In what year did Michael Jordan win his first NBA championship?","c":["1989","1990","1991","1992"],"a":2,"d":"Medium","f":"Jordan won his first ring in 1991 with the Chicago Bulls, defeating the LA Lakers in the Finals."},{"q":"Which NFL quarterback has thrown the most career touchdown passes?","c":["Peyton Manning","Tom Brady","Brett Favre","Drew Brees"],"a":1,"d":"Hard","f":"Tom Brady retired with 649 career TD passes, surpassing Drew Brees to claim the all-time record."},{"q":"Who holds the NHL record for most career goals?","c":["Mario Lemieux","Gordie Howe","Jaromir Jagr","Wayne Gretzky"],"a":3,"d":"Hard","f":"Wayne Gretzky scored 894 career goals — a record so dominant it's considered unbreakable."},{"q":"In which year did Tiger Woods win his first Masters Tournament?","c":["1995","1996","1997","1998"],"a":2,"d":"Hard","f":"Tiger Woods won the 1997 Masters at age 21 by a record 12 strokes, shooting 18-under par."},{"q":"What is the most points ever scored by a single player in an NBA game?","c":["81","92","100","63"],"a":2,"d":"Expert","f":"Wilt Chamberlain scored 100 points for the Philadelphia Warriors against the New York Knicks on March 2, 1962."}];
var DC = {"Easy":{"bg":"rgba(16,185,129,.08)","border":"rgba(16,185,129,.25)","text":"#6ee7b7"},"Medium":{"bg":"rgba(251,191,36,.07)","border":"rgba(251,191,36,.25)","text":"#fbbf24"},"Hard":{"bg":"rgba(239,68,68,.07)","border":"rgba(239,68,68,.25)","text":"#fca5a5"},"Expert":{"bg":"rgba(168,85,247,.1)","border":"rgba(168,85,247,.35)","text":"#c4b5fd"}};
var S = {cur:0,answered:false,score:0,history:[],qs:[]};

function ge(id){return document.getElementById(id);}
function R(h){ge(‘root’).innerHTML=h;}
function xe(s){return String(s||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’);}
function key(){var d=new Date();return ‘pp_trivia_’+d.getFullYear()+’*’+(d.getMonth()+1)+’*’+d.getDate();}
function load(){try{var v=localStorage.getItem(key());return v?JSON.parse(v):null;}catch(e){return null;}}
function save(r){try{localStorage.setItem(key(),JSON.stringify({r:r}));}catch(e){}}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i–){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function bugs(r){var s=’’;for(var i=0;i<r.length;i++)s+=r[i]?’\u2705’:’\u274C’;return s;}
function scoreMsg(n){if(n>=9)return’Legendary’;if(n>=7)return’Great game’;if(n>=5)return’Not bad’;if(n>=3)return’Keep practicing’;return’Rough one’;}
function trophy(n){if(n>=9)return’\uD83C\uDFC6’;if(n>=7)return’\uD83E\uDD47’;if(n>=5)return’\uD83E\uDD48’;return’\uD83E\uDD49’;}

function bar(showBack){
var b=’<div class="bar"><div><div class="logo">POOLPLAY</div><div class="sub">Daily Trivia</div></div>’;
if(showBack) b+=’<button class="back" id="bback">\u2190 Home</button>’;
else b+=’<a href="index.html" class="back">\u2190 Profile</a>’;
b+=’</div>’;
return b;
}

function shareText(r){
var cor=r.filter(function(v){return v;}).length;
var d=new Date();
var ds=d.toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’});
return ‘PoolPlay Trivia (’+ds+’)\n’+bugs(r)+’ ‘+cor+’/10\npool-play.vercel.app/trivia.html’;
}

function doShare(r){
var t=shareText(r);
if(navigator.share){navigator.share({text:t}).catch(function(){});}
else if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){alert(‘Copied!’);}).catch(function(){prompt(‘Copy:’,t);});}
else prompt(‘Copy:’,t);
}

function doSMS(r){
var t=shareText(r);
window.open(‘sms:?&body=’+encodeURIComponent(t),’_blank’);
}

function doCopy(r,btnId){
var t=shareText(r);
var btn=ge(btnId);
if(navigator.clipboard){
navigator.clipboard.writeText(t).then(function(){
if(btn){btn.textContent=‘Copied!’;setTimeout(function(){btn.textContent=‘Copy’;},2000);}
}).catch(function(){prompt(‘Copy:’,t);});
} else { prompt(‘Copy:’,t); }
}

function showHome(){
var saved=load();
var d=new Date();
var ds=d.toLocaleDateString(‘en-US’,{weekday:‘long’,month:‘long’,day:‘numeric’});
var o=bar(false)+’<div class="wrap">’;
o+=’<div class="hero">’;
o+=’<div class="hero-tag">Day 1 · Daily Sports Trivia</div>’;
o+=’<div class="hero-title">TRIVIA</div>’;
o+=’<div class="hero-date">’+ds+’</div>’;
if(saved){
var cor=saved.r.filter(function(v){return v;}).length;
o+=’<div class="done-box">’;
o+=’<div class="done-label">\u2705 Completed today</div>’;
o+=’<div class="done-bugs">’+bugs(saved.r)+’</div>’;
o+=’<div class="done-score">’+cor+’/10 correct — ‘+scoreMsg(cor)+’</div>’;
o+=’<button class="share-btn" id="bsh">Text a Friend</button>’;
o+=’</div>’;
} else {
o+=’<button class="start-btn" id="bst">Start Quiz</button>’;
}
o+=’</div>’;
// Difficulty legend
o+=’<div class="diff-row">’;
var levels=[[‘Easy’,’#6ee7b7’,‘rgba(16,185,129,.25)’],[‘Medium’,’#fbbf24’,‘rgba(251,191,36,.3)’],[‘Hard’,’#fca5a5’,‘rgba(239,68,68,.3)’],[‘Expert’,’#c4b5fd’,‘rgba(168,85,247,.4)’]];
levels.forEach(function(l){o+=’<div class="diff-pill" style="color:'+l[1]+';border-color:'+l[2]+';background:'+l[2].replace('.3',',.06').replace('.25',',.05').replace('.4',',.08')+'">’+l[0]+’</div>’;});
o+=’</div>’;
o+=’<div style="font-size:11px;color:#334155;text-align:center">10 questions · escalating difficulty · NFL · NBA · MLB · NHL · Golf</div>’;
o+=’</div>’;
R(o);
var bst=ge(‘bst’);if(bst)bst.onclick=startQuiz;
var bsh=ge(‘bsh’);if(bsh)bsh.onclick=function(){if(saved)doSMS(saved.r);};
}

function startQuiz(){
S.qs=Q.map(function(raw){
var c=raw.c.slice(),ans=c[raw.a];
c=shuffle(c);
return{q:raw.q,c:c,a:c.indexOf(ans),d:raw.d,f:raw.f};
});
S.cur=0;S.answered=false;S.score=0;S.history=[];
showQ();
}

function showQ(){
var q=S.qs[S.cur];
var total=S.qs.length;
var pct=Math.round(S.cur/total*100);
var L=[‘A’,‘B’,‘C’,‘D’];
var dc=DC[q.d]||DC[‘Easy’];
var o=bar(true)+’<div class="wrap">’;
o+=’<div class="prog-header"><span class="prog-label">Q’+(S.cur+1)+’ of ‘+total+’</span><span class="prog-pts">’+S.score+’ pts</span></div>’;
o+=’<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>’;
o+=’<div class="dots">’;
for(var i=0;i<total;i++){
var bg=i<S.history.length?(S.history[i].c?’#10b981’:’#ef4444’):’#1a2535’;
o+=’<div class="dot" style="background:'+bg+'"></div>’;
}
o+=’</div>’;
o+=’<div class="diff-badge" style="background:'+dc.bg+';border-color:'+dc.border+';color:'+dc.text+'">’+xe(q.d)+’</div>’;
o+=’<div class="qcard"><div class="qtext">’+xe(q.q)+’</div></div>’;
o+=’<div class="choices">’;
for(var ci=0;ci<q.c.length;ci++){
var cls=‘choice’;
if(S.answered){
if(ci===q.a)cls+=’ correct’;
else if(S.history.length&&S.history[S.history.length-1].chosen===ci)cls+=’ wrong’;
else cls+=’ dim’;
}
o+=’<button class="'+cls+'" id="ch'+ci+'"><div class="cltr">’+L[ci]+’</div>’+xe(q.c[ci])+’</button>’;
}
o+=’</div>’;
if(S.answered){
var last=S.history[S.history.length-1];
o+=’<div class="feedback '+(last.c?'ok':'no')+'">’;
o+=’<div class="fb-icon">’+(last.c?’\u2705’:’\u274C’)+’</div>’;
o+=’<div><strong>’+(last.c?‘Correct!’:‘Wrong \u2014 ‘+xe(q.c[q.a]))+’</strong><div class="fb-fact">’+xe(q.f)+’</div></div>’;
o+=’</div>’;
}
var isLast=S.cur===total-1;
o+=’<button id="bnxt" class="nxt-btn" style="'+(S.answered?'':'display:none')+'">’+(isLast?‘See Results’:‘Next \u2192’)+’</button>’;
o+=’</div>’;
R(o);
var bback=ge(‘bback’);if(bback)bback.onclick=showHome;
if(!S.answered){
for(var bi=0;bi<q.c.length;bi++){
(function(idx){
var btn=ge(‘ch’+idx);
if(!btn)return;
btn.onclick=function(){
if(S.answered)return;
var correct=(idx===S.qs[S.cur].a);
if(correct)S.score+=10;
S.history.push({c:correct,chosen:idx});
S.answered=true;
showQ();
};
})(bi);
}
}
var bnxt=ge(‘bnxt’);
if(bnxt)bnxt.onclick=function(){
if(S.cur<S.qs.length-1){S.cur++;S.answered=false;showQ();}
else{save(S.history.map(function(h){return h.c;}));showResults();}
};
}

function showResults(){
var r=S.history.map(function(h){return h.c;});
var cor=r.filter(function(v){return v;}).length;
var o=bar(false)+’<div class="wrap">’;
o+=’<div class="res-wrap">’;
o+=’<span class="res-trophy">’+trophy(cor)+’</span>’;
o+=’<div class="res-score">’+cor+’/10</div>’;
o+=’<div class="res-sub">Daily Trivia</div>’;
o+=’<div class="res-msg">’+scoreMsg(cor)+’</div>’;
o+=’</div>’;
o+=’<div class="share-card">’;
o+=’<div class="share-title">Share Your Score</div>’;
o+=’<div class="share-bugs">’+bugs(r)+’</div>’;
o+=’<div class="share-score">’+cor+’/10 correct</div>’;
o+=’<div class="share-btns">’;
o+=’<button class="sms-btn" id="bsms">\uD83D\uDCF1 Text a Friend</button>’;
o+=’<button class="copy-btn" id="bcpy">Copy</button>’;
o+=’</div></div>’;
// Breakdown
o+=’<div class="breakdown">’;
S.qs.forEach(function(q,i){
var got=S.history[i]?S.history[i].c:false;
o+=’<div class="breakdown-row">’;
o+=’<div class="breakdown-num">’+(i+1)+’</div>’;
o+=’<div class="breakdown-q">’+xe(q.q)+’</div>’;
o+=’<div class="breakdown-ic">’+(got?’\u2705’:’\u274C’)+’</div>’;
o+=’</div>’;
});
o+=’</div>’;
o+=’<button class="home-btn" id="bhome">Back to Home</button>’;
o+=’</div>’;
R(o);
ge(‘bsms’).onclick=function(){doSMS(r);};
ge(‘bcpy’).onclick=function(){doCopy(r,‘bcpy’);};
ge(‘bhome’).onclick=showHome;
}

showHome();
</script>

</body>
</html>
