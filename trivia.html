<!DOCTYPE html>

<html lang="en">
<head>

<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PoolPlay Trivia</title>

<link rel="icon" type="image/png" href="/poolplay-icon.png">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:"DM Sans",sans-serif;min-height:100vh}
button{font-family:"DM Sans",sans-serif;cursor:pointer;border:none;outline:none}
a{text-decoration:none;color:inherit}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:40px 40px}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(99,102,241,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,9,15,.95);border-bottom:1px solid #1e2a3a;backdrop-filter:blur(12px);padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:"Bebas Neue",cursive;font-size:22px;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-top:-2px}
.back-btn{background:transparent;border:1px solid #2d3f52;border-radius:6px;color:#64748b;padding:6px 14px;font-size:11px;font-weight:600}
.streak-chip{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:#fbbf24;display:none}
.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:20px 16px 80px}
.daily-hero{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(168,85,247,.08));border:1px solid rgba(99,102,241,.25);border-radius:16px;padding:24px 20px;margin-bottom:20px;text-align:center}
.day-label{font-size:9px;color:#6366f1;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.hero-title{font-family:"Bebas Neue",cursive;font-size:42px;background:linear-gradient(135deg,#fff 30%,#fbbf24 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px}
.hero-date{font-size:11px;color:#475569;margin-bottom:16px}
.pill-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pill{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid #1e2a3a;color:#475569}
.start-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;padding:13px 40px;font-size:14px;font-weight:700;color:#fff;border:none;cursor:pointer}
.done-box{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:12px;padding:16px;text-align:center}
.done-title{font-size:12px;font-weight:700;color:#6ee7b7;margin-bottom:8px}
.done-bug{font-size:20px;letter-spacing:3px;display:block;margin-bottom:6px;line-height:1.6}
.done-score{font-size:11px;color:#475569;margin-bottom:12px}
.share-btn{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.35);border-radius:8px;padding:9px 24px;font-size:12px;font-weight:700;color:#6ee7b7;cursor:pointer}
.sec-label{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:"";flex:1;height:1px;background:#1e2a3a}
.cal-wrap{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;padding:16px;margin-bottom:20px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:12px;font-weight:700;color:#f1f5f9}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1px solid #0f1923;color:#1e2a3a}
.cal-day.great{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.cal-day.ok{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:#fbbf24}
.cal-day.poor{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#fca5a5}
.cal-day.today{border-color:#6366f1;color:#a5b4fc}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.cat-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer}
.cat-card.nfl{border-color:rgba(16,185,129,.2)}
.cat-card.nba{border-color:rgba(251,146,60,.2)}
.cat-card.mlb{border-color:rgba(96,165,250,.2)}
.cat-card.nhl{border-color:rgba(167,139,250,.2)}
.cat-card.ncaa{border-color:rgba(251,191,36,.2)}
.cat-card.mix{border-color:rgba(244,114,182,.2)}
.cat-icon{font-size:28px;margin-bottom:8px}
.cat-name{font-size:12px;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.cat-sub{font-size:9px;color:#475569}
.daily-badge{font-size:9px;color:#6366f1;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;display:inline-block;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:20px;padding:3px 10px}
.quiz-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.quiz-icon{font-size:20px}
.prog-wrap{flex:1}
.prog-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.prog-bar{height:4px;background:#0f1923;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a5b4fc);transition:width .4s}
.prog-count{font-size:9px;color:#334155;text-align:right;margin-top:3px}
.pts-badge{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;color:#fbbf24;white-space:nowrap}
.dots-row{display:flex;gap:4px;justify-content:center;margin-bottom:14px}
.dot{width:11px;height:11px;border-radius:50%;background:#1e2a3a}
.dot.c{background:#10b981}
.dot.w{background:#ef4444}
.q-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;padding:20px;margin-bottom:14px}
.diff-tag{font-size:8px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:10px;display:block}
.diff-tag.warm-up,.diff-tag.easy{color:#6ee7b7}
.diff-tag.fan,.diff-tag.medium{color:#fbbf24}
.diff-tag.diehards-only,.diff-tag.hard{color:#f97316}
.q-text{font-size:15px;font-weight:600;color:#f1f5f9;line-height:1.5}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.choice{background:#0d1117;border:1px solid #1e2a3a;border-radius:10px;padding:13px 16px;text-align:left;font-size:13px;font-weight:500;color:#94a3b8;display:flex;align-items:center;gap:10px;width:100%;cursor:pointer}
.choice.locked{cursor:default}
.choice.correct{border-color:rgba(16,185,129,.6);background:rgba(16,185,129,.1);color:#6ee7b7}
.choice.wrong{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.08);color:#fca5a5}
.choice.dim{opacity:.3}
.cletter{width:22px;height:22px;border-radius:5px;background:#07090f;border:1px solid #1e2a3a;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#334155;flex-shrink:0}
.choice.correct .cletter{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.5);color:#6ee7b7}
.choice.wrong .cletter{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#fca5a5}
.feedback{border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:12px;font-weight:600;align-items:center;gap:10px;display:none}
.feedback.show{display:flex}
.feedback.correct{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.feedback.wrong{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.fb-icon{font-size:18px}
.fact{font-size:10px;color:#475569;font-weight:400;margin-top:3px}
.next-btn{width:100%;padding:13px;border-radius:10px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.4);color:#a5b4fc;font-size:14px;font-weight:700;display:none;cursor:pointer}
.next-btn.show{display:block}
.results{text-align:center;padding:8px 0}
.r-trophy{font-size:64px;display:block;margin-bottom:12px}
.r-score{font-family:"Bebas Neue",cursive;font-size:60px;background:linear-gradient(135deg,#fff 30%,#fbbf24 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px}
.r-label{font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:.12em;margin-bottom:16px}
.r-grade{font-size:13px;font-weight:700;padding:5px 18px;border-radius:20px;display:inline-block;margin-bottom:18px}
.bug-card{background:#0d1117;border:1px solid rgba(99,102,241,.3);border-radius:14px;padding:18px;margin-bottom:14px}
.bug-label{font-size:9px;color:#6366f1;text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.bug-emojis{font-size:22px;letter-spacing:3px;margin-bottom:6px;line-height:1.5;word-break:break-all}
.bug-score{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:14px}
.bug-btns{display:flex;gap:8px}
.bug-btn{flex:1;padding:11px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer}
.bug-btn.green{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.35);color:#6ee7b7}
.bug-btn.indigo{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.35);color:#a5b4fc}
.breakdown{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;padding:14px;margin-bottom:14px;text-align:left}
.bd-title{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.bd-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-top:1px solid #0f1923;font-size:10px;gap:8px}
.bd-q{color:#64748b;flex:1;line-height:1.4}
.bd-a{font-size:9px;font-weight:700;white-space:nowrap;flex-shrink:0}
.bd-a.c{color:#6ee7b7}
.bd-a.w{color:#fca5a5}
.r-btns{display:flex;gap:8px}
.r-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;background:none;cursor:pointer}
.r-btn.primary{border:1px solid rgba(99,102,241,.4);color:#a5b4fc}
.r-btn.ghost{border:1px solid #2d3f52;color:#64748b}
</style>
</head>

<script>
var DAILY=[[{"q": "The New York Yankees won the first World Series of the 1950s. What year?", "c": ["1950", "1951", "1952", "1953"], "a": 0, "d": "warm-up", "f": "The Yankees beat the Phillies 4-0 in the 1950 World Series, starting a dynasty run of 5 straight titles."}, {"q": "Joe Namath guaranteed a victory before Super Bowl III. What year was that game?", "c": ["1967", "1969", "1971", "1973"], "a": 1, "d": "warm-up", "f": "Super Bowl III was played January 12, 1969. The Jets beat the heavily favored Colts 16-7."}, {"q": "Deion Sanders is the only athlete to play in both a Super Bowl and a World Series. Which MLB team did he play for in the Series?", "c": ["Atlanta Braves", "San Francisco Giants", "Cincinnati Reds", "New York Yankees"], "a": 0, "d": "fan", "f": "Sanders played for the Braves in the 1992 World Series and for the 49ers and Cowboys in Super Bowls."}, {"q": "Wayne Gretzky scored more assists than any other player scored total points. How many career assists did he record?", "c": ["1049", "1249", "1449", "1963"], "a": 2, "d": "fan", "f": "Gretzky had 1,963 total points. His 1,449 assists alone would be the all-time points record."}, {"q": "Cal Ripken Jr. played 2,632 consecutive games. What year did the streak begin?", "c": ["1980", "1982", "1983", "1985"], "a": 1, "d": "fan", "f": "The streak started May 30, 1982 and ended September 19, 1998."}, {"q": "Bo Jackson was drafted #1 overall in the 1986 NFL Draft. Which team picked him?", "c": ["Los Angeles Raiders", "Tampa Bay Buccaneers", "Kansas City Chiefs", "Seattle Seahawks"], "a": 1, "d": "fan", "f": "Tampa Bay drafted Bo #1 but he refused to sign, choosing baseball instead. He later joined the Raiders as a hobby."}, {"q": "Michael Jordan was famously cut from his high school varsity team. What year did this happen?", "c": ["1978", "1980", "1981", "1979"], "a": 1, "d": "fan", "f": "Jordan was cut as a sophomore in 1980 at Laney High School. He went on to win 6 NBA championships."}, {"q": "The NBA added the 8-second backcourt rule in 2001. What was the time limit before that?", "c": ["8 seconds", "10 seconds", "12 seconds", "No limit"], "a": 1, "d": "fan", "f": "The NBA used a 10-second backcourt rule before reducing it to 8 seconds to speed up play."}, {"q": "Don Larsen threw the only perfect game in World Series history. Who was the catcher?", "c": ["Yogi Berra", "Elston Howard", "Bill Dickey", "Thurman Munson"], "a": 0, "d": "diehards only", "f": "Yogi Berra leaped into Larsen's arms after the final out on October 8, 1956 - one of baseball's most iconic images."}, {"q": "Four current Division I college athletic programs are named after colors. Navy and Brown are two - name one of the other two.", "c": ["Auburn", "Siena", "Marist", "Crimson"], "a": 0, "d": "diehards only", "f": "Navy (Midshipmen), Brown (Bears), Auburn (Tigers), and Siena (Saints) are the four D1 schools named after colors."}], [{"q": "How many rings did Michael Jordan win with the Chicago Bulls?", "c": ["4", "5", "6", "7"], "a": 2, "d": "easy", "f": "Jordan won 6 championships with the Bulls: 1991-93 and 1996-98."}, {"q": "Who holds the NBA record for most points scored in a single game?", "c": ["Michael Jordan", "LeBron James", "Kobe Bryant", "Wilt Chamberlain"], "a": 3, "d": "easy", "f": "Wilt Chamberlain scored 100 points on March 2, 1962 against the New York Knicks."}, {"q": "What team did LeBron James play for when he won his first NBA championship?", "c": ["Cleveland Cavaliers", "Miami Heat", "Los Angeles Lakers", "Boston Celtics"], "a": 1, "d": "easy", "f": "LeBron won his first ring with the Miami Heat in 2012, alongside Dwyane Wade and Chris Bosh."}, {"q": "Which player has won the most NBA MVP awards?", "c": ["LeBron James", "Michael Jordan", "Kareem Abdul-Jabbar", "Bill Russell"], "a": 2, "d": "medium", "f": "Kareem Abdul-Jabbar won 6 MVP awards (1971-72, 1973-74, 1975-76, 1976-77, 1979-80)."}, {"q": "What year did the Golden State Warriors win their first NBA championship in 40 years?", "c": ["2013", "2014", "2015", "2016"], "a": 2, "d": "medium", "f": "The Warriors ended a 40-year title drought in 2015 led by Steph Curry and Klay Thompson."}, {"q": "Which team did the Boston Celtics defeat to win the 2024 NBA championship?", "c": ["Miami Heat", "Dallas Mavericks", "Golden State Warriors", "Denver Nuggets"], "a": 1, "d": "medium", "f": "The Celtics beat the Mavericks 4-1 in the 2024 Finals for their 18th championship."}, {"q": "Larry Bird played his entire career for which team?", "c": ["Indiana Pacers", "Boston Celtics", "Detroit Pistons", "Chicago Bulls"], "a": 1, "d": "medium", "f": "Bird played 13 seasons entirely with the Boston Celtics, winning 3 championships."}, {"q": "Which NBA team has the most championship titles?", "c": ["Los Angeles Lakers", "Chicago Bulls", "Boston Celtics", "Golden State Warriors"], "a": 2, "d": "medium", "f": "The Boston Celtics have 18 championships, one more than the Lakers' 17."}, {"q": "What was the name of the ABA team that merged into the NBA and won a title in their first season?", "c": ["Denver Nuggets", "Indiana Pacers", "San Antonio Spurs", "New Jersey Nets"], "a": 2, "d": "hard", "f": "The San Antonio Spurs, formerly the ABA's Dallas Chaparrals/Virginia Squires lineage, won in 1999."}, {"q": "Kareem Abdul-Jabbar played college basketball under a different name. What was it?", "c": ["Lew Alcindor", "Roy Jabbar", "Abdul Kareem", "Lewis Robinson"], "a": 0, "d": "hard", "f": "Born Ferdinand Lewis Alcindor Jr., he changed his name after converting to Islam in 1971."}], [{"q": "How many points is a field goal worth in the NFL?", "c": ["1", "2", "3", "4"], "a": 2, "d": "easy", "f": "A field goal is worth 3 points. A successful extra point kick after a touchdown is worth 1 point."}, {"q": "Which team has won the most Super Bowls?", "c": ["New England Patriots", "Pittsburgh Steelers", "Dallas Cowboys", "San Francisco 49ers"], "a": 0, "d": "easy", "f": "The New England Patriots have won 6 Super Bowls (XXXVI, eld'?", "c": ["The Hail Mary", "The Stanford band play from 1982", "The Hook and Lateral", "The Music City Miracle"], "a": 1, "d": "hard", "f": "In the 1982 Big Game, Cal returned the kickoff through the Stanford band for a TD as the band had prematurely stormed the field."}], [{"q": "Which player was known as 'Magic'?", "c": ["Julius Erving", "Earvin Johnson", "Oscar Robertson", "Jerry West"], "a": 1, "d": "easy", "f": "Earvin 'Magic' Johnson earned his nickname in high school for his dazzling playmaking ability."}, {"q": "Larry Bird played for which team his entire career?", "c": ["Indiana Pacers", "Detroit Pistons", "Boston Celtics", "Chicago Bulls"], "a": 2, "d": "easy", "f": "Bird played all 13 seasons with the Boston Celtics, winning 3 championships."}, {"q": "What year did the NBA add the 3-point line?", "c": ["1976", "1979", "1982", "1985"], "a": 1, "d": "medium", "f": "The NBA adopted the 3-point line for the 1979-80 season. Chris Ford made the first 3-pointer."}, {"q": "Shaquille O'Neal never won a championship without which teammate?", "c": ["Kobe Bryant", "Dwyane Wade", "Tracy McGrady", "Gary Payton"], "a": 3, "d": "hard", "f": "Shaq won 3 titles with Kobe and 1 with Dwyane Wade. He never won with Gary Payton despite teaming up."}, {"q": "Which NBA team plays at Madison Square Garden?", "c": ["Brooklyn Nets", "New York Knicks", "New Jersey Nets", "Long Island Nets"], "a": 1, "d": "easy", "f": "The New York Knicks have played at Madison Square Garden since 1968."}, {"q": "What is a 'triple-double' in basketball?", "c": ["Scoring 30+ points", "Three players each scoring 20+", "10+ in three statistical categories", "Winning three games in a row"], "a": 2, "d": "medium", "f": "A triple-double means reaching double digits in three categories: typically points, rebounds, and assists."}, {"q": "The 1992 US Olympic basketball team was called what?", "c": ["Team USA", "All-Stars", "Dream Team", "Gold Team"], "a": 2, "d": "easy", "f": "The 1992 US Olympic basketball team was nicknamed the Dream Team and is widely considered the greatest team ever assembled."}, {"q": "Dirk Nowitzki won his only NBA championship in what year?", "c": ["2009", "2011", "2013", "2015"], "a": 1, "d": "medium", "f": "Nowitzki won the 2011 NBA title with the Dallas Mavericks, defeating the Miami Heat."}, {"q": "How high is an NBA basketball hoop?", "c": ["9 feet", "10 feet", "11 feet", "12 feet"], "a": 1, "d": "easy", "f": "The regulation height of an NBA basket is 10 feet (3.05 meters) from the floor."}, {"q": "Russell Westbrook set the all-time NBA record for career triple-doubles. How many did he get?", "c": ["181", "198", "212", "228"], "a": 2, "d": "hard", "f": "Westbrook recorded 212 career triple-doubles, surpassing Oscar Robertson's record of 181."}]];

var CATS=[
{id:“nfl”,  name:“NFL Football”,   icon:”\uD83C\uDFC8”, cls:“nfl”},
{id:“nba”,  name:“NBA Basketball”, icon:”\uD83C\uDFC0”, cls:“nba”},
{id:“mlb”,  name:“MLB Baseball”,   icon:”\u26BE”,        cls:“mlb”},
{id:“nhl”,  name:“NHL Hockey”,     icon:”\uD83C\uDFD2”, cls:“nhl”},
{id:“ncaa”, name:“NCAA Hoops”,     icon:”\uD83C\uDF93”, cls:“ncaa”},
{id:“mix”,  name:“Mix It Up”,      icon:”\uD83C\uDFB2”, cls:“mix”}
];
var POOLS={nfl:[],nba:[],mlb:[],nhl:[],ncaa:[],mix:[]};
var S={mode:null,dayNum:0,questions:[],current:0,answered:false,score:0,history:[],freeCat:null};

function getEl(id){return document.getElementById(id);}
function esc(s){return String(s||””).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”);}
function setHTML(h){var a=getEl(“app”);if(a)a.innerHTML=h;}

function shuffle(arr){
var a=arr.slice();
for(var i=a.length-1;i>0;i–){
var j=Math.floor(Math.random()*(i+1));
var t=a[i];a[i]=a[j];a[j]=t;
}
return a;
}

function prepQ(raw){
var c=raw.c.slice(),ans=c[raw.a];
c=shuffle(c);
return {q:raw.q,choices:c,a:c.indexOf(ans),d:raw.d,f:raw.f};
}

function todayKey(){
var d=new Date();
return “pp_trivia_”+d.getFullYear()+”*”+(d.getMonth()+1)+”*”+d.getDate();
}

function getTodayNum(){
var start=new Date(2026,2,7),now=new Date();
now.setHours(0,0,0,0);
return Math.max(0,Math.min(30,Math.floor((now-start)/86400000)));
}

function loadToday(){
try{var v=localStorage.getItem(todayKey());return v?JSON.parse(v):null;}
catch(e){return null;}
}

function saveToday(results){
try{localStorage.setItem(todayKey(),JSON.stringify({results:results,ts:Date.now()}));}
catch(e){}
}

function getStreak(){
var s=0;
for(var i=0;i<31;i++){
var d=new Date();d.setDate(d.getDate()-i);d.setHours(0,0,0,0);
var k=“pp_trivia_”+d.getFullYear()+”*”+(d.getMonth()+1)+”*”+d.getDate();
try{if(!localStorage.getItem(k))break;s++;}catch(e){break;}
}
return s;
}

function buildBug(results){
return results.map(function(r){return r?”\uD83D\uDFE9”:”\uD83D\uDFE5”;}).join(””);
}

function buildPools(){
var cd={nfl:[0,6,10,14,19,24],nba:[1,7,11,16,20,25],mlb:[2,8,12,17,21,26],nhl:[3,9,13,22,27],ncaa:[4,15,18,23,28]};
var keys=[“nfl”,“nba”,“mlb”,“nhl”,“ncaa”];
for(var k=0;k<keys.length;k++){
var cat=keys[k];
for(var d=0;d<cd[cat].length;d++){
var di=cd[cat][d];
if(DAILY[di])POOLS[cat]=POOLS[cat].concat(DAILY[di]);
}
}
var all=[];
for(var c=0;c<keys.length;c++){all=all.concat(POOLS[keys[c]]);}
POOLS.mix=shuffle(all).slice(0,60);
}

function updateStreakChip(){
var streak=getStreak(),chip=getEl(“streak-chip”);
if(!chip)return;
if(streak>0){
chip.style.display=“flex”;
var sn=getEl(“streak-num”);
if(sn)sn.textContent=”\uD83D\uDD25”+streak;
} else {
chip.style.display=“none”;
}
}

function drawHome(){
S.screen=“home”;
var dn=getTodayNum();S.dayNum=dn;
var saved=loadToday();
var streak=getStreak();
updateStreakChip();

var today=new Date();
var dateStr=today.toLocaleDateString(“en-US”,{weekday:“long”,month:“long”,day:“numeric”});
var monthStr=today.toLocaleDateString(“en-US”,{month:“long”,year:“numeric”});
var dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
var h=””;

h+=”<div class='daily-hero'>”;
h+=”<div class='day-label'>Day “+(dn+1)+” of “+DAILY.length+”</div>”;
h+=”<div class='hero-title'>DAILY TRIVIA</div>”;
h+=”<div class='hero-date'>”+dateStr+”</div>”;
h+=”<div class='pill-row'>”;
h+=”<span class='pill'>\uD83C\uDFC8 NFL</span>”;
h+=”<span class='pill'>\uD83C\uDFC0 NBA</span>”;
h+=”<span class='pill'>\u26BE MLB</span>”;
h+=”<span class='pill'>\uD83C\uDFD2 NHL</span>”;
h+=”<span class='pill'>\uD83C\uDF93 NCAA</span>”;
h+=”</div>”;

if(saved){
var bug=buildBug(saved.results);
var cor=saved.results.filter(function(r){return r;}).length;
h+=”<div class='done-box'>”;
h+=”<div class='done-title'>Already played today!</div>”;
h+=”<div class='done-bug'>”+bug+”</div>”;
h+=”<div class='done-score'>”+cor+”/10 correct”;
if(streak>=2)h+=” - \uD83D\uDD25”+streak+” day streak”;
h+=”</div>”;
h+=”<button class='share-btn' id='bsh'>\uD83D\uDCF2 Share Score</button>”;
h+=”</div>”;
} else {
h+=”<button class='start-btn' id='bst'>Start Today Quiz</button>”;
}
h+=”</div>”;

h+=”<div class='sec-label'>This Month</div>”;
h+=”<div class='cal-wrap'>”;
h+=”<div class='cal-header'><span>”+monthStr+”</span>”;
h+=”<span>”+(streak>=3?”\uD83D\uDD25”:”\uD83D\uDCC5”)+”</span></div>”;
h+=”<div class='cal-grid'>”;
for(var d=1;d<=dim;d++){
var k=“pp_trivia_”+today.getFullYear()+”*”+(today.getMonth()+1)+”*”+d;
var cls=“cal-day”;
if(d<today.getDate()){
try{
var pr=localStorage.getItem(k);
if(pr){var sc=JSON.parse(pr).results.filter(function(r){return r;}).length;cls+=sc>=8?” great”:sc>=5?” ok”:” poor”;}
}catch(e){}
} else if(d===today.getDate()){
if(saved){var sc2=saved.results.filter(function(r){return r;}).length;cls+=sc2>=8?” great”:sc2>=5?” ok”:” poor”;}
else cls+=” today”;
}
h+=”<div class='"+cls+"'>”+d+”</div>”;
}
h+=”</div></div>”;

h+=”<div class='sec-label'>Free Play</div>”;
h+=”<div class='cat-grid'>”;
for(var ci=0;ci<CATS.length;ci++){
var ct=CATS[ci];
h+=”<div class='cat-card "+ct.cls+"' data-cat='"+ct.id+"'>”;
h+=”<div class='cat-icon'>”+ct.icon+”</div>”;
h+=”<div class='cat-name'>”+ct.name+”</div>”;
h+=”<div class='cat-sub'>10 questions</div></div>”;
}
h+=”</div>”;

setHTML(h);

var bst=getEl(“bst”);
if(bst)bst.onclick=function(){
S.mode=“daily”;S.questions=DAILY[S.dayNum].map(prepQ);
S.current=0;S.answered=false;S.score=0;S.history=[];
drawQuiz();
};

var bsh=getEl(“bsh”);
if(bsh)bsh.onclick=function(){if(saved)doShare(saved.results,S.dayNum);};

var cards=document.querySelectorAll(”.cat-card”);
for(var i=0;i<cards.length;i++){
(function(el){
el.onclick=function(){
var id=el.getAttribute(“data-cat”);
S.mode=“free”;S.freeCat=id;
S.questions=shuffle(POOLS[id]).slice(0,10).map(prepQ);
S.current=0;S.answered=false;S.score=0;S.history=[];
drawQuiz();
};
})(cards[i]);
}
}

function drawQuiz(){
S.screen=“quiz”;
var q=S.questions[S.current];
var total=S.questions.length;
var pct=Math.round(S.current/total*100);
var cat=null;
for(var ci=0;ci<CATS.length;ci++){if(CATS[ci].id===S.freeCat){cat=CATS[ci];break;}}
if(!cat)cat={icon:”\uD83D\uDCC5”,name:“Daily Trivia”};
var L=[“A”,“B”,“C”,“D”];
var h=””;

if(S.mode===“daily”){
h+=”<div class='daily-badge'>\uD83D\uDCC5 Day “+(S.dayNum+1)+” - Daily Quiz</div>”;
}
h+=”<div class='quiz-top'>”;
h+=”<span class='quiz-icon'>”+(S.mode===“daily”?”\uD83D\uDCC5”:cat.icon)+”</span>”;
h+=”<div class='prog-wrap'>”;
h+=”<div class='prog-label'>”+(S.mode===“daily”?“Daily Trivia”:cat.name)+”</div>”;
h+=”<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>”;
h+=”<div class='prog-count'>”+S.current+” / “+total+”</div>”;
h+=”</div>”;
h+=”<div class='pts-badge'>”+S.score+” pts</div>”;
h+=”</div>”;

h+=”<div class='dots-row'>”;
for(var i=0;i<total;i++){
var dc=i<S.history.length?(S.history[i].correct?“c”:“w”):””;
h+=”<div class='dot "+dc+"'></div>”;
}
h+=”</div>”;

var diffCls=String(q.d||””).replace(/[^a-zA-Z0-9]/g,”-”);
h+=”<div class='q-card'>”;
h+=”<div class='diff-tag "+diffCls+"'>”+esc(q.d)+”</div>”;
h+=”<div class='q-text'>”+esc(q.q)+”</div>”;
h+=”</div>”;

h+=”<div class='choices'>”;
for(var ci2=0;ci2<q.choices.length;ci2++){
var cls2=“choice”;
if(S.answered){
cls2+=” locked”;
if(ci2===q.a)cls2+=” correct”;
else if(S.history.length&&S.history[S.history.length-1].chosen===ci2)cls2+=” wrong”;
else cls2+=” dim”;
}
h+=”<button class='"+cls2+"' data-i='"+ci2+"'>”;
h+=”<div class='cletter'>”+L[ci2]+”</div>”+esc(q.choices[ci2]);
h+=”</button>”;
}
h+=”</div>”;

if(S.answered){
var last=S.history[S.history.length-1];
h+=”<div class='feedback show "+(last.correct?"correct":"wrong")+"'>”;
h+=”<span class='fb-icon'>”+(last.correct?”\u2705”:”\u274C”)+”</span>”;
h+=”<div>”+(last.correct?“Correct!”:“Wrong - “+esc(q.choices[q.a]));
h+=”<div class='fact'>”+esc(q.f)+”</div></div></div>”;
} else {
h+=”<div class='feedback'></div>”;
}

var isLast=S.current===total-1;
h+=”<button class='next-btn"+(S.answered?" show":"")+"' id='bnxt'>”;
h+=(isLast?“See Results”:“Next Question”)+”</button>”;

setHTML(h);

if(!S.answered){
var btns=document.querySelectorAll(”.choice”);
for(var bi=0;bi<btns.length;bi++){
(function(btn){
btn.onclick=function(){
if(S.answered)return;
var idx=parseInt(btn.getAttribute(“data-i”));
var correct=(idx===S.questions[S.current].a);
if(correct)S.score+=10;
S.history.push({correct:correct,chosen:idx});
S.answered=true;
drawQuiz();
};
})(btns[bi]);
}
}

var bnxt=getEl(“bnxt”);
if(bnxt)bnxt.onclick=function(){
if(S.current<S.questions.length-1){
S.current++;S.answered=false;drawQuiz();
} else {
if(S.mode===“daily”)saveToday(S.history.map(function(h){return h.correct;}));
drawResults();
}
};
}

function drawResults(){
S.screen=“results”;
var total=S.questions.length;
var correct=S.history.filter(function(h){return h.correct;}).length;
var pct=Math.round(correct/total*100);
var results=S.history.map(function(h){return h.correct;});
var bug=buildBug(results);
var streak=getStreak();

var trophy=pct>=90?”\uD83C\uDFC6”:pct>=70?”\uD83E\uDD47”:pct>=50?”\uD83E\uDD48”:”\uD83E\uDD49”;
var gl,gb,gbc,gc;
if(pct>=90){gl=”\uD83D\uDD25 Elite”;gb=“rgba(251,191,36,.12)”;gbc=“rgba(251,191,36,.4)”;gc=”#fbbf24”;}
else if(pct>=70){gl=”\uD83D\uDCAA Solid”;gb=“rgba(16,185,129,.1)”;gbc=“rgba(16,185,129,.35)”;gc=”#6ee7b7”;}
else if(pct>=50){gl=“Average”;gb=“rgba(99,102,241,.1)”;gbc=“rgba(99,102,241,.35)”;gc=”#a5b4fc”;}
else{gl=“Rough”;gb=“rgba(239,68,68,.08)”;gbc=“rgba(239,68,68,.3)”;gc=”#fca5a5”;}

var today=new Date();
var dateStr=today.toLocaleDateString(“en-US”,{month:“short”,day:“numeric”});
var line1=“PoolPlay Trivia”;
if(S.mode===“daily”)line1+=” - Day “+(S.dayNum+1)+” (”+dateStr+”)”;
if(streak>=2)line1+=” \uD83D\uDD25”+streak;
var shareText=line1+”\n”+bug+” “+correct+”/”+total+”\nhttps://pool-play.vercel.app/trivia.html”;

var h=”<div class='results'>”;
h+=”<span class='r-trophy'>”+trophy+”</span>”;
h+=”<div class='r-score'>”+correct+”/”+total+”</div>”;
h+=”<div class='r-label'>”+(S.mode===“daily”?“Daily Trivia - Day “+(S.dayNum+1):“Free Play”)+”</div>”;
h+=”<div class='r-grade' style='background:"+gb+";border:1px solid "+gbc+";color:"+gc+"'>”+gl+”</div>”;

h+=”<div class='bug-card'>”;
h+=”<div class='bug-label'>Share Your Score</div>”;
h+=”<div class='bug-emojis'>”+bug+”</div>”;
h+=”<div class='bug-score'>”+correct+”/”+total;
if(streak>=2)h+=” - \uD83D\uDD25”+streak+” day streak”;
h+=”</div>”;
h+=”<div class='bug-btns'>”;
h+=”<button class='bug-btn green' id='bsms'>\uD83D\uDCF1 Text</button>”;
h+=”<button class='bug-btn indigo' id='bcpy'>\uD83D\uDCCB Copy</button>”;
h+=”</div></div>”;

h+=”<div class='breakdown'><div class='bd-title'>Breakdown</div>”;
for(var i=0;i<S.history.length;i++){
var item=S.history[i];
var qq=S.questions[i];
var qshort=qq.q.length>55?qq.q.substring(0,55)+”…”:qq.q;
h+=”<div class='bd-row'>”;
h+=”<div class='bd-q'>”+(i+1)+”. “+esc(qshort)+”</div>”;
h+=”<div class='bd-a "+(item.correct?"c":"w")+"'>”+(item.correct?“Correct”:esc(qq.choices[qq.a]))+”</div>”;
h+=”</div>”;
}
h+=”</div>”;

h+=”<div class='r-btns'>”;
if(S.mode!==“daily”)h+=”<button class='r-btn primary' id='baga'>Play Again</button>”;
h+=”<button class='r-btn ghost' id='bhome'>Home</button>”;
h+=”</div></div>”;

setHTML(h);

var st=shareText;
getEl(“bsms”).onclick=function(){
if(navigator.share){navigator.share({text:st}).catch(function(){});}
else{window.open(“sms:?&body=”+encodeURIComponent(st),”_blank”);}
};
getEl(“bcpy”).onclick=function(){
var btn=getEl(“bcpy”);
if(navigator.clipboard){
navigator.clipboard.writeText(st).then(function(){
btn.textContent=“Copied!”;
setTimeout(function(){btn.textContent=”\uD83D\uDCCB Copy”;},2000);
}).catch(function(){prompt(“Copy:”,st);});
} else {prompt(“Copy:”,st);}
};
var baga=getEl(“baga”);
if(baga)baga.onclick=function(){
S.questions=shuffle(POOLS[S.freeCat]).slice(0,10).map(prepQ);
S.current=0;S.answered=false;S.score=0;S.history=[];drawQuiz();
};
getEl(“bhome”).onclick=drawHome;
}

function doShare(results,dayNum){
var bug=buildBug(results);
var correct=results.filter(function(r){return r;}).length;
var streak=getStreak();
var today=new Date();
var dateStr=today.toLocaleDateString(“en-US”,{month:“short”,day:“numeric”});
var line1=“PoolPlay Trivia - Day “+(dayNum+1)+” (”+dateStr+”)”;
if(streak>=2)line1+=” \uD83D\uDD25”+streak;
var text=line1+”\n”+bug+” “+correct+”/10\nhttps://pool-play.vercel.app/trivia.html”;
if(navigator.share){navigator.share({text:text}).catch(function(){});}
else if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){alert(“Copied!”);}).catch(function(){prompt(“Copy:”,text);});}
else{prompt(“Copy:”,text);}
}

buildPools();
drawHome();
</script>

</body>
</html>
