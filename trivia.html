// ── DATE HELPERS ──────────────────────────────────────────────────────────────
function getEasternNow() {
  var now = new Date();
  var jan = new Date(now.getFullYear(),0,1);
  var jul = new Date(now.getFullYear(),6,1);
  var isDST = now.getTimezoneOffset() < Math.max(jan.getTimezoneOffset(), jul.getTimezoneOffset());
  var utc = now.getTime() + now.getTimezoneOffset()*60000;
  return new Date(utc + (isDST ? -4 : -5)*3600000);
}

function getDateKey() {
  var e = getEasternNow();
  return e.getFullYear()+"_"+(e.getMonth()+1)+"_"+e.getDate();
}

    { q: "What was the name of the horse that won the Triple Crown in 1977, breaking Secretariat's mystique?", c: ["Affirmed", "Seattle Slew", "Spectacular Bid", "Alydar"], a: 1, d: "Medium", f: "Seattle Slew won the 1977 Triple Crown undefeated — the only horse to ever accomplish that feat. The following year, Affirmed won the Triple Crown in 1978, making back-to-back Triple Crown winners. No horse would win another Triple Crown until American Pharoah in 2015." },

    { q: "In 1988, Ben Johnson won Olympic gold in the 100m but was disqualified. Which drug did he test positive for?", c: ["HGH", "EPO", "Stanozolol", "Testosterone"], a: 2, d: "Hard", f: "Johnson tested positive for stanozolol, an anabolic steroid, after running a world-record 9.79 seconds. His gold was awarded to Carl Lewis, who had finished second. A Canadian inquiry later revealed widespread doping in track and field at the time." },

    { q: "The 'Shot Heard 'Round the World' in baseball refers to which historic home run?", c: ["Ted Williams's 1941 walk-off All-Star homer", "Bobby Thomson's 1951 Giants pennant winner", "Bill Mazeroski's 1960 World Series walk-off", "Carlton Fisk's 1975 World Series homer"], a: 1, d: "Hard", f: "Bobby Thomson's three-run homer off Ralph Branca on October 3, 1951 gave the Giants the NL pennant over the Dodgers. The radio call by Russ Hodges — 'The Giants win the pennant!' — is among the most famous in broadcasting history. It was later revealed the Giants had been stealing catchers' signs using a telescope all season." },

    { q: "In tennis, what is the term for when a player wins a game without their opponent scoring a single point?", c: ["Shutout", "Blank", "Bagel", "Love game"], a: 3, d: "Easy", f: "A 'love game' means winning a game at love (zero). 'Love' in tennis comes from the French 'l'oeuf' meaning 'the egg,' representing a zero on the scoreboard. A set won 6-0 is called a 'bagel' (because a bagel looks like a zero). A double bagel — winning a match 6-0, 6-0 — is considered the most crushing possible defeat." },
    { q: "O.J. Simpson set the NFL record for rushing yards in a season in 1973. How many yards did he rush for?", c: ["2,003", "2,105", "1,863", "1,934"], a: 0, d: "Easy", f: "Simpson rushed for 2,003 yards with the Buffalo Bills — becoming the first player to eclipse 2,000 yards in a season. His offensive line, nicknamed 'The Electric Company,' was instrumental. Simpson's football legacy is permanently overshadowed by his 1994 murder trial, which became one of the most watched events in television history." },
    { q: "Which country won the first ever FIFA World Cup in 1930?", c: ["Brazil", "Argentina", "Uruguay", "Italy"], a: 2, d: "Easy", f: "Uruguay won the inaugural World Cup on home soil, defeating Argentina 4-2 in the final in Montevideo. The tournament had only 13 teams, and several European nations refused to make the long boat voyage. Uruguay remains the smallest country ever to win a World Cup." },
    { q: "What is the name of the Indianapolis Colts' quarterback who engineered their historic comeback from 28-3 down in Super Bowl LI?", c: ["Andrew Luck", "Matt Ryan", "Philip Rivers", "Tom Brady"], a: 3, d: "Medium", f: "Tom Brady's New England Patriots came back from 28-3 down to defeat the Atlanta Falcons (whose quarterback was Matt Ryan) 34-28 in overtime — the largest comeback in Super Bowl history. Brady was named Super Bowl MVP. The 28-3 deficit has since become a cultural shorthand for squandering a seemingly insurmountable lead." },
    { q: "Martina Navratilova dominated women's tennis in the 1980s. How many Wimbledon singles titles did she win?", c: ["7", "8", "9", "6"], a: 2, d: "Medium", f: "Navratilova won nine Wimbledon singles titles, including six consecutive from 1982 to 1987. She is also considered the greatest doubles player in history. Born in Czechoslovakia, she defected to the United States in 1975 and became a naturalized citizen in 1981." },
    { q: "Rocky Marciano retired as the only undefeated heavyweight boxing champion. What was his record?", c: ["48-0", "49-0", "50-0", "47-0"], a: 1, d: "Medium", f: "Marciano finished 49-0 with 43 knockouts, retiring in 1956. He is the only heavyweight champion to retire undefeated. He knocked out former champions Joe Louis and Jersey Joe Walcott in title bouts. Marciano died in a plane crash the day before his 46th birthday in 1969." },
    { q: "Mark Spitz won seven gold medals at the 1972 Munich Olympics — all in swimming. Which events did he win?", c: ["4 individual, 3 relays", "5 individual, 2 relays", "3 individual, 4 relays", "All 7 individual"], a: 0, d: "Medium", f: "Spitz won the 100m and 200m freestyle, 100m and 200m butterfly — four individual events — plus three relays. He set world records in all seven events. The Games are also remembered for the tragic killing of 11 Israeli athletes. Spitz, who is Jewish, was evacuated from Munich for his own safety before the hostage crisis concluded." },
    { q: "The NBA's three-point line was introduced in which season?", c: ["1976-77", "1979-80", "1982-83", "1984-85"], a: 1, d: "Hard", f: "The three-point line was introduced for the 1979-80 season, borrowed from the defunct ABA. Early players largely ignored it — Larry Bird won the first three three-point contests at All-Star Weekend. It wasn't until the late 1980s that teams began designing offenses around the three-pointer." },
    { q: "What American city hosted the very first modern Olympic Games held in the United States?", c: ["Chicago", "Los Angeles", "New York", "St. Louis"], a: 3, d: "Hard", f: "St. Louis hosted the 1904 Summer Olympics, chaotically combined with the World's Fair. The marathon was one of the most bizarre events in sports history — the winner was disqualified for riding part of the race in a car, and another runner was given strychnine as a stimulant by his handlers. Only 651 athletes competed, mostly American." },
    { q: "In 1968, Bob Beamon shattered the long jump world record at the Mexico City Olympics. By how much?", c: ["By 21 centimeters", "By 55 centimeters", "By 33 centimeters", "By 71 centimeters"], a: 1, d: "Expert", f: "Beamon jumped 8.90 meters — 55 centimeters beyond the existing world record. The jump was so far it exceeded the capacity of the optical measuring device being used, and officials had to resort to a steel tape measure. The record stood for 23 years, and Jesse Owens declared it 'a lifetime of an entire sport in one jump.'" }
  ],

  [
    { q: "In basketball, how many players from each team are on the court at one time?", c: ["4", "5", "6", "7"], a: 1, d: "Easy", f: "Five players per team play at once in basketball. The original game invented by Naismith didn't specify team sizes — early games were played with nine per side. The five-player format was standardized by the early 1900s. FIBA (international basketball) uses the same rules as the NBA for team size but differs in other areas like game length." },
    { q: "Which swimmer won four gold medals at the 2012 London Olympics at age 15, making her the youngest American Olympic gold medalist in 92 years?", c: ["Missy Franklin", "Katie Ledecky", "Rebecca Soni", "Dana Vollmer"], a: 1, d: "Easy", f: "Katie Ledecky won her first gold at 15 in the 800m freestyle, going on to become perhaps the greatest female swimmer in history. She later won six gold medals across the 2016 and 2020 Olympics. Her 1500m freestyle world record set in 2016 was so fast that many male Olympic swimmers from past decades couldn't have qualified for her heat." },
    { q: "The 'Flu Game' in the 1997 NBA Finals saw Michael Jordan score 38 points despite illness. Who were the Bulls playing?", c: ["Seattle SuperSonics", "Phoenix Suns", "Utah Jazz", "Indiana Pacers"], a: 2, d: "Easy", f: "Jordan scored 38 points against Utah in Game 5 of the 1997 Finals, including a go-ahead three-pointer late in the game. He was barely able to stand at times and had to be supported by Scottie Pippen afterward. Years later, reports emerged suggesting it may have been food poisoning from a pizza delivery rather than the flu." },
    { q: "The 1986 World Series had the Mets and Red Sox. What happened in Game 6 involving Mookie Wilson's grounder?", c: ["It skipped over first baseman's glove for a walk-off single", "It went through Bill Buckner's legs at first base", "It hit the foul pole for a game-winning home run", "It was misplayed by third baseman for an error"], a: 1, d: "Medium", f: "Mookie Wilson's slow roller went through Bill Buckner's legs at first base in the 10th inning, allowing the Mets to score the winning run. Buckner's error extended the game the Mets went on to win Game 7. Despite being a fine player for 22 years, Buckner's career is defined almost entirely by those few seconds." },
    { q: "Which country has won the most Rugby World Cup titles?", c: ["Australia", "England", "New Zealand", "South Africa"], a: 2, d: "Medium", f: "New Zealand's All Blacks have won four Rugby World Cups (1987, 2011, 2015, and 2023), more than any other nation. South Africa and Australia have each won two. New Zealand's pre-match Haka dance has become one of the most recognized rituals in all of sport." },
    { q: "Pele scored over 1,000 career goals. How many official career goals did FIFA recognize?", c: ["767", "1,283", "1,007", "897"], a: 0, d: "Medium", f: "FIFA officially credits Pelé with 767 goals in 831 appearances. The '1,000 goals' figure Pelé often cited includes unofficial matches, exhibitions, and youth games. Regardless of the exact number, he remains arguably the most prolific scorer in history and the only player to win three World Cups." },
    { q: "At the 1988 Calgary Winter Olympics, the Jamaican bobsled team competed for the first time. What movie was later made about them?", c: ["Going for Gold", "Cool Runnings", "Ice Storm", "The Bobsled Run"], a: 1, d: "Medium", f: "The 1993 Disney film 'Cool Runnings' dramatized the Jamaican team's debut. The actual team recruited sprinters who had been competing for Jamaica's Olympic track team. Their sled crashed in the final run but they carried it across the finish line to a standing ovation that became one of the Games' defining moments." },
    { q: "Which NFL quarterback holds the record for most career passing yards?", c: ["Brett Favre", "Peyton Manning", "Drew Brees", "Tom Brady"], a: 3, d: "Hard", f: "Tom Brady surpassed Drew Brees's record during the 2021 season and finished his career with over 89,000 passing yards. Brees had previously broken Favre's record. Brady's longevity — playing until age 45 — is unprecedented in the modern NFL, where most quarterbacks decline significantly after 38." },
    { q: "Who was the first athlete to be named Sports Illustrated Sportsperson of the Year twice in a row?", c: ["Tiger Woods", "Michael Jordan", "Muhammad Ali", "LeBron James"], a: 0, d: "Hard", f: "Tiger Woods won back-to-back Sports Illustrated Sportsman of the Year awards in 1996 and 1997 (the first as an amateur, then as a professional). He also won the award again in 2000. No other athlete has won it three times. His 1997 Masters win by 12 strokes immediately after turning pro is still considered the sport's most dominant single performance." },
    { q: "The 1994 MLB season was ended early by a players' strike. The World Series was cancelled for the first time since which year?", c: ["1905", "1904", "1918", "1921"], a: 1, d: "Expert", f: "The 1904 World Series was cancelled due to a dispute between team owners — the American League champion New York Highlanders (later Yankees) were refused a series by the NL champion New York Giants. The 1994 cancellation was the result of a labor dispute over salary caps that alienated an entire generation of baseball fans and contributed to the sport's declining popularity relative to football." }
  ],

  // ── DAY 13 ───────────────────────────────────────
  [
    { q: "What is the name of the trophy awarded to the NHL's playoff champion?", c: ["Presidents' Trophy", "Conn Smythe Trophy", "Stanley Cup", "Hart Memorial Trophy"], a: 2, d: "Easy", f: "The Stanley Cup is the oldest professional sports trophy in North America, first awarded in 1893 by Governor General Lord Stanley of Preston. Unlike other trophies, players get individual days with the Cup to celebrate however they choose. Various teams have had players bathe babies in it, eat cereal from it, and take it to very unusual locations around the world." },
    { q: "Florence Griffith-Joyner (Flo-Jo) set the women's 100m world record in 1988. What was her time?", c: ["10.49 seconds", "10.61 seconds", "10.54 seconds", "10.76 seconds"], a: 0, d: "Easy", f: "Flo-Jo ran 10.49 seconds in Indianapolis — a record that has stood for over 35 years and is still considered one of the most suspicious records in athletics due to its margin over competitors. She was known as much for her fashion — elaborate fingernails and one-legged running suits — as for her speed. She died at 38 from an epileptic seizure in 1998." },
    { q: "The 'Steel Curtain' was the nickname for which NFL team's defense in the 1970s?", c: ["Oakland Raiders", "Dallas Cowboys", "Miami Dolphins", "Pittsburgh Steelers"], a: 3, d: "Easy", f: "Pittsburgh's Steel Curtain was anchored by 'Mean' Joe Greene, Jack Ham, Jack Lambert, and Mel Blount. The Steelers won four Super Bowls in six years (1975, 1976, 1979, 1980). The defense routinely held opponents under 10 points. Greene's ferocious play style helped reshape how the NFL perceived defensive linemen." },
    { q: "In boxing, what is the difference between a 'TKO' and a regular 'KO'?", c: ["TKO is called by the referee; KO means fighter is unconscious", "TKO requires a standing count; KO does not", "KO is called by the fighter's corner; TKO is a referee decision", "There is no difference — both terms are interchangeable"], a: 0, d: "Medium", f: "A KO (knockout) means a fighter is knocked down and cannot rise before the referee counts to ten. A TKO (technical knockout) is when the referee, doctor, or the fighter's corner stops the fight because a fighter is too injured to safely continue, even if still standing. Most stoppages in modern boxing are TKOs, as referees intervene to protect fighters." },
    { q: "Which sprinter was the first person to run the 100m in under 10 seconds in an official IAAF-sanctioned race?", c: ["Bob Hayes", "Jim Hines", "Carl Lewis", "Armin Hary"], a: 1, d: "Medium", f: "Jim Hines ran 9.95 seconds at the 1968 Mexico City Olympics to become the first officially sub-10 man. Bob Hayes had technically run faster in relay legs, and manual-timed performances were faster, but Hines's was the first with fully automatic timing. He later played wide receiver for four NFL teams." },
    { q: "Who was the head coach when the U.S. men's basketball team suffered its first Olympic loss in 1972 against the Soviet Union?", c: ["Dean Smith", "Larry Brown", "Bob Knight", "Henry Iba"], a: 3, d: "Medium", f: "Henry Iba coached Team USA to their controversial 50-51 loss to the Soviet Union in the gold medal game in Munich. The game ended in chaos with the clock being reset multiple times. The U.S. team voted unanimously to refuse their silver medals in protest — those medals remain unclaimed in a vault in Lausanne, Switzerland." },
    { q: "Which horse won the 2015 Triple Crown — the first in 37 years?", c: ["Justify", "California Chrome", "American Pharoah", "I'll Have Another"], a: 2, d: "Medium", f: "American Pharoah, trained by Bob Baffert and ridden by Victor Espinoza, ended the 37-year Triple Crown drought. He was so beloved that fans misspelled 'Pharaoh' on social media, and connections embraced the error — officially spelling his name 'Pharoah.' He later won the Breeders' Cup Classic to become the first horse to win the 'Grand Slam' of American racing." },
    { q: "In 1951, Willie Mays made 'The Catch' in the 1954 World Series. Whose fly ball did he catch?", c: ["Larry Doby", "Vic Wertz", "Al Rosen", "Bobby Avila"], a: 1, d: "Hard", f: "Vic Wertz of the Cleveland Indians hit a 420-foot blast to dead center that Mays caught over his shoulder while sprinting away from the plate. He then spun and threw a perfect strike to hold the runners. Many baseball scholars call it the greatest play in baseball history. The Giants swept the heavily favored Indians in four games." },
    { q: "Who was the first female jockey to compete in the Kentucky Derby?", c: ["Diane Crump", "Barbara Jo Rubin", "Julie Krone", "Robyn Smith"], a: 0, d: "Hard", f: "Diane Crump became the first female jockey in the Kentucky Derby in 1970, finishing 15th on Fathom. She had already broken barriers the previous year as the first woman to ride in a pari-mutuel race in North America. Julie Krone later became the first woman to win a Triple Crown race, taking the 1993 Belmont Stakes." },
    { q: "Don Bradman's career Test cricket batting average is considered statistically the greatest achievement in sport. What is it?", c: ["96.96", "95.14", "99.94", "101.32"], a: 2, d: "Expert", f: "Bradman averaged 99.94 across 80 Test innings — nearly double the next best modern average of approximately 50. In his final Test in 1948, he needed just four runs to average 100 for his career but was bowled for a duck (zero). Many statisticians argue it is the single most dominant individual statistical achievement in any major team sport." }
  ],

  [
    { q: "What sport uses a 'birdie' and an 'eagle' to describe scoring?", c: ["Cricket", "Golf", "Badminton", "Tennis"], a: 1, d: "Easy", f: "In golf, a 'birdie' is one stroke under par and an 'eagle' is two under par. The term 'birdie' originated around 1899 at Atlantic City Country Club when Ab Smith hit what he called a 'bird of a shot.' An 'albatross' (three under par) is even rarer — it occurs less than once in every 10 million rounds played." },
    { q: "The New York Yankees have the most World Series titles. How many have they won?", c: ["26", "27", "28", "29"], a: 1, d: "Easy", f: "The Yankees have won 27 World Series titles — nearly three times more than the next closest team (the Cardinals with 11). Their dynasty from 1949-1953 produced five consecutive championships. The Yankees also hold records for most pennants, most postseason wins, and most games played in the postseason by a wide margin." },
    { q: "Which event at the Olympics requires athletes to compete in swimming, fencing, shooting, equestrian, and running?", c: ["Decathlon", "Biathlon", "Heptathlon", "Modern Pentathlon"], a: 3, d: "Easy", f: "The Modern Pentathlon was invented by Pierre de Coubertin, founder of the modern Olympics, to simulate the challenges faced by a 19th-century cavalry soldier. It has been an Olympic event since 1912. In 2024, equestrian was replaced by obstacle course running, marking the most significant change to the event since its creation." },
    { q: "In which year did the WNBA begin play?", c: ["1994", "1996", "1997", "1999"], a: 2, d: "Medium", f: "The WNBA's inaugural season was 1997 with eight teams. The Houston Comets won the first four championships. The league was partly inspired by the popularity of the 1996 U.S. Women's Olympic basketball team, which had gone undefeated. The WNBA has faced decades of financial challenges but continues to grow, with record attendance set in the early 2020s." },
    { q: "Tiger Woods won the 2000 U.S. Open at Pebble Beach by the largest margin in major championship history. By how many strokes?", c: ["10 strokes", "12 strokes", "15 strokes", "8 strokes"], a: 2, d: "Medium", f: "Woods won by 15 strokes with a score of 12-under par — while the field average was well over par for the difficult Pebble Beach conditions. He also won the 2000 British Open by 8 strokes that year. In 2000, Woods won three of the four majors and all four of the Grand Slams he entered, completing his 'Tiger Slam' in 2001 at the Masters." },
    { q: "The 2004 'Malice at the Palace' brawl involved players from which two NBA teams?", c: ["Pistons vs. Heat", "Pacers vs. Pistons", "Knicks vs. Pacers", "Lakers vs. Pistons"], a: 1, d: "Medium", f: "Ron Artest (later Metta World Peace) and other Indiana Pacers players went into the stands to fight Detroit Pistons fans after a cup of liquid was thrown. Nine players were suspended for a combined 146 games. Artest received the longest suspension in NBA history for a player — 73 games. Commissioner David Stern called it the lowest moment in his tenure." },
    { q: "Which European country won the 2016 UEFA European Championship, upsetting Portugal in the final?", c: ["Iceland", "Wales", "France", "Portugal"], a: 3, d: "Medium", f: "Portugal defeated the host nation France 1-0 in extra time to win their first major international trophy. Cristiano Ronaldo left the final early due to injury but returned to coach from the sideline. The winning goal was scored by Eder — a largely unknown substitute. Portugal's unexpected run included a draw with Iceland and a loss to Hungary in the group stage." },
    { q: "Kareem Abdul-Jabbar's signature shot was the 'skyhook.' Against which team did he debut it as a professional?", c: ["New York Knicks", "Baltimore Bullets", "San Francisco Warriors", "Chicago Bulls"], a: 1, d: "Hard", f: "Kareem — then still named Lew Alcindor — debuted the skyhook against the Baltimore Bullets in his first NBA season with Milwaukee in 1969. He had developed the shot in high school because his coach banned the dunk. The shot is considered essentially unstoppable because it is released at the peak of a fully extended 7-foot-2 arm." },
    { q: "Which team won the first ever March Madness NCAA Tournament in 1939?", c: ["Kansas Jayhawks", "Utah Utes", "Oregon Ducks", "Ohio State Buckeyes"], a: 2, d: "Hard", f: "The Oregon Ducks won the first NCAA Tournament, defeating Ohio State 46-33 in Evanston, Illinois. The tournament had only eight teams. Ironically, the more prestigious tournament at the time was the NIT — the NCAA Tournament was considered secondary until the 1950s and 60s when it grew in scope and prestige." },
    { q: "Wayne Gretzky scored 92 goals in the 1981-82 NHL season. Who held the previous single-season goal record he broke?", c: ["Phil Esposito", "Mario Lemieux", "Mike Bossy", "Gordie Howe"], a: 0, d: "Expert", f: "Phil Esposito had set the record with 76 goals in 1970-71. Gretzky scored 92 in 80 games — a rate that has never been approached. Remarkably, Gretzky's assist total in 1985-86 (163) would have been enough to win the scoring title by itself over any other player in NHL history, as no one has ever scored more than 152 points in a season." }
  ],

// ── QUESTION LOADER ──────────────────────────────────────────────────────────
function getTodaysQ() {
  try {
    if (!QUESTION_BANK || !QUESTION_BANK.length) return null;
    var now   = new Date();
    var jan   = new Date(now.getFullYear(),0,1);
    var jul   = new Date(now.getFullYear(),6,1);
    var isDST = now.getTimezoneOffset() < Math.max(jan.getTimezoneOffset(), jul.getTimezoneOffset());
    var utc   = now.getTime() + now.getTimezoneOffset()*60000;
    var et    = new Date(utc + (isDST ? -4 : -5)*3600000);
    var launch    = Date.UTC(2026,2,8);
    var eMidnight = Date.UTC(et.getFullYear(), et.getMonth(), et.getDate());
    var diff  = Math.floor((eMidnight - launch) / 86400000);
    var idx   = ((diff % QUESTION_BANK.length) + QUESTION_BANK.length) % QUESTION_BANK.length;
    var questions = QUESTION_BANK[idx];
    // Skip empty placeholder days — find next populated day
    var attempts = 0;
    while ((!questions || !questions.length || !questions[0].q || questions[0].q.indexOf("ADD 10 QUESTIONS") !== -1) && attempts < QUESTION_BANK.length) {
      idx = (idx + 1) % QUESTION_BANK.length;
      questions = QUESTION_BANK[idx];
      attempts++;
    }
    if (!questions || !questions.length) return null;
    return questions;
  } catch(e) { return null; }
}

// ── SESSION SCORE ─────────────────────────────────────────────────────────────
function getScore()   { try { return parseInt(sessionStorage.getItem("tScore")||"0"); }  catch(e){ return 0; } }
function setScore(n)  { try { sessionStorage.setItem("tScore",  String(n)); } catch(e){} }
function getPoints()  { try { return parseInt(sessionStorage.getItem("tPoints")||"0"); } catch(e){ return 0; } }
function setPoints(n) { try { sessionStorage.setItem("tPoints", String(n)); } catch(e){} }
function getResults() { try { var v=sessionStorage.getItem("tResults"); return v?JSON.parse(v):[]; } catch(e){ return []; } }
function setResults(r){ try { sessionStorage.setItem("tResults", JSON.stringify(r)); } catch(e){} }

// ── HELPERS ───────────────────────────────────────────────────────────────────
function x(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function pts(d) {
  return d==="Easy"?100:d==="Medium"?200:d==="Hard"?300:d==="Expert"?400:100;
}

function diffStyle(d) {
  if(d==="Easy")   return "background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7";
  if(d==="Medium") return "background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.3);color:#fbbf24";
  if(d==="Hard")   return "background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);color:#fca5a5";
  return "background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.4);color:#c4b5fd";
}

function diffEmoji(q, correct) {
  if(!correct) return "⬛";
  if(!q) return "🟩";
  return q.d==="Easy"?"🟩":q.d==="Medium"?"🟨":q.d==="Hard"?"🟥":"🟪";
}

function render(html) {
  document.getElementById("root").innerHTML = html;
}

function goBack() {
  // Return to index.html — go back in history or fallback to root
  if (document.referrer && document.referrer.includes(location.hostname)) {
    history.back();
  } else {
    window.location.href = "/";
  }
}

function topbar(showBack) {
  var h = '<div class="topbar">';
  if (showBack) {
    h += '<button class="btn btn-ghost" id="tv-topback">&#8592;</button>';
  } else {
    h += '<button class="btn btn-ghost" id="tv-topback">&#8592;</button>';
  }
  h += '<div class="logo">PoolPlay</div>';
  h += '<div style="width:60px"></div>';
  h += '</div>';
  return h;
}

function bindTopbar() {
  var btn = document.getElementById("tv-topback");
  if (btn) btn.onclick = function() {
    if (TV.view === "q" || TV.view === "result") {
      // mid-quiz — go to home screen not back to app
      TV.view = "home"; draw();
    } else {
      goBack();
    }
  };
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  if      (TV.view === "q")      drawQuestion();
  else if (TV.view === "result") drawResult();
  else if (TV.view === "done")   drawDone();
  else                           drawHome();
}

      var todayScore = todayData.r.filter(function(v){return v;}).length;
      var row1="", row2="";
      for(var i=0;i<5;i++)  row1 += diffEmoji(Q[i], todayData.r[i]);
      for(var i=5;i<10;i++) row2 += diffEmoji(Q[i], todayData.r[i]);
      o += '<div class="tv-res-score" style="font-size:40px;margin:8px 0">'+todayScore+'/10</div>';
      o += '<div style="font-size:13px;font-weight:700;color:#fbbf24;letter-spacing:.05em;margin-bottom:4px">'+(todayData.pts||0)+' pts</div>';
      o += '<div style="font-size:18px;letter-spacing:3px;margin-bottom:8px">'+row1+'</div>';
      o += '<div style="font-size:18px;letter-spacing:3px;margin-bottom:16px">'+row2+'</div>';
      o += '<div style="font-size:12px;color:#475569;margin-top:8px;letter-spacing:.05em">Come back tomorrow for a new quiz</div>';
      o += buildCalendarHTML(_fbMonthScores);
      _homeshareMsg = "PoolPlay Trivia \uD83C\uDFC6\n"+ds+"\n"+todayScore+"/10\n\n"+row1+"\n"+row2+"\nhttps://pool-play.vercel.app";
      o += '<button class="tv-btn-share" id="tv-home-share" style="margin-top:14px;width:100%">Share Today\'s Results</button>';
    } else {
      o += '<button class="tv-hero-btn" id="tv-start">Start Quiz</button>';
    }
    o += '</div>';
    o += '<div class="tv-diff-row">';
    o += '<div class="pill" style="color:#6ee7b7;border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07)">Easy</div>';
    o += '<div class="pill" style="color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)">Medium</div>';
    o += '<div class="pill" style="color:#fca5a5;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)">Hard</div>';
    o += '<div class="pill" style="color:#c4b5fd;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.08)">Expert</div>';
    o += '</div>';
    o += '<p style="font-size:11px;color:#334155;text-align:center">10 questions &middot; escalating difficulty &middot; NFL &middot; NBA &middot; MLB &middot; NHL</p>';
    o += '</div>';

    bindTopbar();
    var btn = document.getElementById("tv-start");
    if (btn) btn.onclick = function(){ TV.view="q"; TV.qIdx=0; draw(); };

    if (shareBtn) shareBtn.onclick = function(){ window.open("sms:?&body="+encodeURIComponent(_homeshareMsg),"_blank"); };

  // Check Firebase: reset flag + sync today's result if missing from localStorage
  if (username && DB) {
    var tKey2 = "pp_trivia_" + getDateKey();
    var done = false;
    var t = setTimeout(function(){ if(!done){ done=true; renderHome(); } }, 3000);
    // Check reset flag first
    DB.ref("triviaResets/"+username+"/"+tKey2).once("value", function(sn){
      if (sn.val()) {
        try { localStorage.removeItem(tKey2); todayData = null; } catch(e){}
        DB.ref("triviaResets/"+username+"/"+tKey2).remove();
      }
      // If still no local result, check Firebase for a saved score from another browser
      if (!todayData) {
        DB.ref("triviaScores/"+username+"/"+getDateKey()).once("value", function(sn2){
          clearTimeout(t);
          if (!done) {
            done = true;
            if (sn2.val()) {
              todayData = sn2.val();

        clearTimeout(t);

          DB.ref("triviaScores/"+username).once("value",function(sn3){if(sn3.val())_fbMonthScores=sn3.val();renderHome();},function(){renderHome();});
        }
      }
    }, function(){ clearTimeout(t); if(!done){ done=true; renderHome(); } });
  } else {
    renderHome();
  }
}

// ── QUESTION ──────────────────────────────────────────────────────────────────
function drawQuestion() {
  var Q = getTodaysQ();
  if (!Q || !Q[TV.qIdx]) {
    render(topbar(true) + '<div class="main"><div class="tv-hero" style="margin-top:40px">'
      + '<div style="font-size:32px;margin-bottom:12px">⚠️</div>'
      + '<div style="color:#fca5a5;font-size:15px;margin-bottom:8px">Questions failed to load.</div>'
      + '<div style="font-size:12px;color:#475569;margin-bottom:20px">Please refresh and try again.</div>'
      + '<button class="tv-hero-btn" id="tv-err-back">Back</button>'
      + '</div></div>');
    bindTopbar();
    document.getElementById("tv-err-back").onclick = function(){ TV.view="home"; draw(); };
    return;
  }

  var q = Q[TV.qIdx];
  var o = topbar(true);
  o += '<div class="main">';
  o += '<div class="tv-prog-hdr"><span class="tv-prog-lbl">Question '+(TV.qIdx+1)+' of '+Q.length+'</span><span class="tv-prog-pts">'+getPoints()+' pts</span></div>';
  o += '<div class="tv-pbar"><div class="tv-pfill" style="width:'+Math.round(TV.qIdx/Q.length*100)+'%"></div></div>';
  o += '<div class="tv-diff-badge" style="'+diffStyle(q.d)+'">'+q.d+' &middot; '+pts(q.d)+' pts</div>';
  o += '<div class="tv-card">';
  o += '<div class="tv-qtext">'+q.q+'</div>';
  for(var i=0;i<4;i++) o += '<button class="tv-choice" id="tv-c'+i+'">'+q.c[i]+'</button>';
  o += '</div></div>';
  render(o);
  bindTopbar();

  for(var i=0;i<4;i++) {
    (function(chosen){
      var btn = document.getElementById("tv-c"+chosen);
      if(btn) btn.onclick = function(){
        var correct = (chosen === q.a);
        setScore(getScore() + (correct?1:0));
        setPoints(getPoints() + (correct?pts(q.d):0));
        var r = getResults(); r.push(correct); setResults(r);
        TV.view="result"; TV.chosen=chosen; draw();
      };
    })(i);
  }
}

// ── RESULT ────────────────────────────────────────────────────────────────────
function drawResult() {
  var Q = getTodaysQ();
  if (!Q || !Q[TV.qIdx]) { TV.view="home"; draw(); return; }
  var q = Q[TV.qIdx];
  var correct = (TV.chosen === q.a);
  var next = TV.qIdx + 1;

  var o = topbar(false);
  o += '<div class="main">';
  o += '<div class="tv-prog-hdr"><span class="tv-prog-lbl">Question '+(TV.qIdx+1)+' of '+Q.length+'</span><span class="tv-prog-pts">'+getPoints()+' pts</span></div>';
  o += '<div class="tv-pbar"><div class="tv-pfill" style="width:'+Math.round(next/Q.length*100)+'%"></div></div>';
  o += '<div class="tv-diff-badge" style="'+diffStyle(q.d)+'">'+q.d+' &middot; '+(correct?"+"+pts(q.d)+" pts":"0 pts")+'</div>';
  o += '<div class="tv-card">';
  o += '<div class="tv-qtext">'+q.q+'</div>';
  o += '<div class="tv-fb-card '+(correct?"tv-fb-ok":"tv-fb-no")+'">';

  o += '<button class="tv-btn-next" id="tv-next">'+(next<Q.length?"Next &#8594;":"See Results")+'</button>';

  render(o);

    if(next < Q.length){ TV.view="q"; TV.qIdx=next; draw(); }

  };
}

function buildCalendarHTML(fbScores) {
  var now = getEasternNow();
  var tKey = "pp_trivia_" + getDateKey();
  var scoreMap = {};

  // Merge in Firebase scores first (localStorage takes precedence)
  if (fbScores) {
    Object.keys(fbScores).forEach(function(dk){
      var parts = dk.split("_");
      var yr = parseInt(parts[0]), mo = parseInt(parts[1]), dy = parseInt(parts[2]);
      if(yr === now.getFullYear() && mo === now.getMonth()+1){
        var d = fbScores[dk];
        if(d && d.r) scoreMap[dy] = d.r.filter(function(v){return v;}).length;
      }
    });
  }

  // Scan localStorage for all trivia scores this month (overwrites fb if present)
  try {
    for(var ki=0; ki<localStorage.length; ki++){
      var k = localStorage.key(ki);
      if(k && k.indexOf("pp_trivia_") === 0){
        var kv = JSON.parse(localStorage.getItem(k));
        if(kv && kv.r){
          var parts = k.replace("pp_trivia_","").split("_");
          var yr = parseInt(parts[0]), mo = parseInt(parts[1]), dy = parseInt(parts[2]);
          if(yr === now.getFullYear() && mo === now.getMonth()+1){
            scoreMap[dy] = kv.r.filter(function(v){return v;}).length;
          }
        }
      }
    }
  } catch(e){}

  var year = now.getFullYear(), month = now.getMonth();
  var monthName = now.toLocaleDateString("en-US",{month:"long"});
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var firstDow = new Date(year, month, 1).getDay();
  var todayDate = now.getDate();

  var ch = '<div style="margin-top:16px;text-align:left">';
  ch += '<div style="font-size:9px;font-weight:700;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">' + monthName + ' ' + year + '</div>';
  ch += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">';
  ["S","M","T","W","T","F","S"].forEach(function(d){
    ch += '<div style="text-align:center;font-size:7px;color:#334155;font-weight:700;padding:1px 0">' + d + '</div>';
  });
  ch += '</div>';
  ch += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  for(var bi=0; bi<firstDow; bi++) ch += '<div></div>';
  for(var di=1; di<=daysInMonth; di++){
    var ds2 = scoreMap[di];
    var isToday = di === todayDate;
    var isFuture = di > todayDate;
    var cs, ns, ss;
    if(ds2 !== undefined){
      if(ds2 >= 8)      { cs="background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.4)";  ns="color:#6ee7b7"; ss="color:#6ee7b7"; }
      else if(ds2 >= 5) { cs="background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3)";  ns="color:#fbbf24"; ss="color:#fbbf24"; }
      else              { cs="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25)";    ns="color:#fca5a5"; ss="color:#fca5a5"; }
    } else if(isToday) {
      cs="background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.5)"; ns="color:#a5b4fc"; ss="";
    } else if(isFuture){
      cs="background:transparent;border:1px solid #0f1923"; ns="color:#1e2a3a"; ss="";
    } else {
      cs="background:#07090f;border:1px solid #0f1923"; ns="color:#334155"; ss="";
    }
    ch += '<div style="' + cs + ';border-radius:5px;padding:3px 1px;text-align:center;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">';
    ch += '<div style="font-size:8px;font-weight:700;' + ns + '">' + di + '</div>';
    if(ds2 !== undefined) ch += '<div style="font-size:7px;font-weight:700;' + ss + '">' + ds2 + '/10</div>';
    ch += '</div>';
  }
  ch += '</div></div>';
  return ch;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
draw();
</script>
