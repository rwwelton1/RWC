<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="dark"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
<link rel="apple-touch-icon" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:"DM Sans",sans-serif;min-height:100vh}
button{font-family:"DM Sans",sans-serif;cursor:pointer;border:none;outline:none}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:40px 40px}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(99,102,241,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,9,15,.95);border-bottom:1px solid #1e2a3a;backdrop-filter:blur(12px);padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:"Bebas Neue",cursive;font-size:22px;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-top:-2px}
.back-btn{background:transparent;border:1px solid #2d3f52;border-radius:6px;color:#64748b;padding:6px 14px;font-size:11px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.streak-chip{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:#fbbf24;display:none}
/* LAYOUT */
.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:20px 16px 80px}
/* HOME HERO */
.daily-hero{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(168,85,247,.08));border:1px solid rgba(99,102,241,.25);border-radius:16px;padding:24px 20px;margin-bottom:20px;text-align:center}
.day-label{font-size:9px;color:#6366f1;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.hero-title{font-family:"Bebas Neue",cursive;font-size:42px;background:linear-gradient(135deg,#fff 30%,#fbbf24 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px}
.hero-date{font-size:11px;color:#475569;margin-bottom:16px}
.pill-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pill{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid #1e2a3a;color:#475569}
.start-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;padding:13px 40px;font-size:14px;font-weight:700;color:#fff;border:none}
.start-btn:active{transform:scale(.97)}
.done-box{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:12px;padding:16px;text-align:center}
.done-title{font-size:12px;font-weight:700;color:#6ee7b7;margin-bottom:8px}
.done-bug{font-size:20px;letter-spacing:3px;display:block;margin-bottom:6px;line-height:1.6}
.done-score{font-size:11px;color:#475569;margin-bottom:12px}
.share-btn{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.35);border-radius:8px;padding:9px 24px;font-size:12px;font-weight:700;color:#6ee7b7;border:1px solid rgba(16,185,129,.35)}
/* SECTION LABEL */
.sec-label{font-size:9px;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:"";flex:1;height:1px;background:#1e2a3a}
/* CALENDAR */
.cal-wrap{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;padding:16px;margin-bottom:20px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:12px;font-weight:700;color:#f1f5f9}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1px solid #0f1923;color:#1e2a3a}
.cal-day.great{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.cal-day.ok{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:#fbbf24}
.cal-day.poor{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#fca5a5}
.cal-day.today{border-color:#6366f1;color:#a5b4fc}
/* FREE PLAY GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.cat-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;transition:transform .15s}
.cat-card:active{transform:scale(.97)}
.cat-card.nfl{border-color:rgba(16,185,129,.2)}
.cat-card.nba{border-color:rgba(251,146,60,.2)}
.cat-card.mlb{border-color:rgba(96,165,250,.2)}
.cat-card.nhl{border-color:rgba(167,139,250,.2)}
.cat-card.ncaa{border-color:rgba(251,191,36,.2)}
.cat-card.mix{border-color:rgba(244,114,182,.2)}
.cat-icon{font-size:28px;margin-bottom:8px}
.cat-name{font-size:12px;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.cat-sub{font-size:9px;color:#475569}
/* QUIZ */
.quiz-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.prog-wrap{flex:1}
.prog-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.prog-bar{height:4px;background:#0f1923;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a5b4fc);transition:width .4s}
.prog-count{font-size:9px;color:#334155;text-align:right;margin-top:3px}
.pts-badge{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;color:#fbbf24;white-space:nowrap}
.dots-row{display:flex;gap:4px;justify-content:center;margin-bottom:14px}
.dot{width:11px;height:11px;border-radius:50%;background:#1e2a3a}
.dot.c{background:#10b981}
.dot.w{background:#ef4444}
.q-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;padding:20px;margin-bottom:14px}
.diff-tag{font-size:8px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:10px}
.diff-tag.warm-up{color:#6ee7b7}
.diff-tag.fan{color:#fbbf24}
.diff-tag.diehards{color:#f97316}
.diff-tag.easy{color:#6ee7b7}
.diff-tag.medium{color:#fbbf24}
.diff-tag.hard{color:#f97316}
.q-text{font-size:15px;font-weight:600;color:#f1f5f9;line-height:1.5}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.choice{background:#0d1117;border:1px solid #1e2a3a;border-radius:10px;padding:13px 16px;text-align:left;font-size:13px;font-weight:500;color:#94a3b8;display:flex;align-items:center;gap:10px;width:100%;transition:all .15s}
.choice:not(.locked):hover{border-color:#2d3f52;color:#e2e8f0}
.choice.locked{cursor:default}
.choice.correct{border-color:rgba(16,185,129,.6);background:rgba(16,185,129,.1);color:#6ee7b7}
.choice.wrong{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.08);color:#fca5a5}
.choice.dim{opacity:.3}
.cletter{width:22px;height:22px;border-radius:5px;background:#07090f;border:1px solid #1e2a3a;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#334155;flex-shrink:0}
.choice.correct .cletter{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.5);color:#6ee7b7}
.choice.wrong .cletter{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#fca5a5}
.feedback{border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:12px;font-weight:600;align-items:center;gap:10px;display:none}
.feedback.show{display:flex}
.feedback.correct{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.feedback.wrong{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.fact{font-size:10px;color:#475569;font-weight:400;margin-top:3px}
.next-btn{width:100%;padding:13px;border-radius:10px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.4);color:#a5b4fc;font-size:14px;font-weight:700;display:none}
.next-btn.show{display:block}
/* RESULTS */
.results{text-align:center;padding:8px 0}
.r-trophy{font-size:64px;display:block;margin-bottom:12px}
.r-score{font-family:"Bebas Neue",cursive;font-size:60px;background:linear-gradient(135deg,#fff 30%,#fbbf24 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px}
.r-label{font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:.12em;margin-bottom:16px}
.r-grade{font-size:13px;font-weight:700;padding:5px 18px;border-radius:20px;display:inline-block;margin-bottom:18px}
.bug-card{background:#0d1117;border:1px solid rgba(99,102,241,.3);border-radius:14px;padding:18px;margin-bottom:14px}
.bug-label{font-size:9px;color:#6366f1;text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.bug-emojis{font-size:22px;letter-spacing:3px;margin-bottom:6px;line-height:1.5;word-break:break-all}
.bug-score{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:14px}
.bug-btns{display:flex;gap:8px}
.bug-btn{flex:1;padding:11px;border-radius:9px;font-size:12px;font-weight:700;border:1px solid}
.bug-btn.green{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.35);color:#6ee7b7}
.bug-btn.indigo{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.35);color:#a5b4fc}
.breakdown{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;padding:14px;margin-bottom:14px;text-align:left}
.bd-title{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.bd-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-top:1px solid #0f1923;font-size:10px;gap:8px}
.bd-row:first-of-type{border-top:none}
.bd-q{color:#64748b;flex:1;line-height:1.4}
.bd-a{font-size:9px;font-weight:700;white-space:nowrap;flex-shrink:0}
.bd-a.c{color:#6ee7b7}
.bd-a.w{color:#fca5a5}
.r-btns{display:flex;gap:8px}
.r-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;background:none;border:1px solid}
.r-btn.primary{border-color:rgba(99,102,241,.4);color:#a5b4fc}
.r-btn.ghost{border-color:#2d3f52;color:#64748b}
</style>
</head>

for (var i=0; i<31; i++) {
var d=new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
var k=“pp_trivia_”+d.getFullYear()+”*”+(d.getMonth()+1)+”*”+d.getDate();
try { if (!localStorage.getItem(k)) break; s++; } catch(e) { break; }
}
return s;
}
function buildBug(results) {
return results.map(function(r){return r?“🟩”:“🟥”;}).join(””);
}
function prepQ(raw) {
var choices = raw.c.slice();
var answer = choices[raw.a];
choices = shuffle(choices);
return {q:raw.q, choices:choices, a:choices.indexOf(answer), d:raw.d, f:raw.f};
}
function setHTML(h) { $(“app”).innerHTML = h; }

// ── HOME ──────────────────────────────────────────────────────
function drawHome() {
S.screen = “home”;
var dn = getTodayNum(); S.dayNum = dn;
var saved = loadToday();
var streak = getStreak();
var chip = $(“streak-chip”);
if (chip) { if (streak>0){chip.style.display=“flex”;$(“streak-num”).textContent=streak;}else{chip.style.display=“none”;} }

var today = new Date();
var dateStr = today.toLocaleDateString(“en-US”,{weekday:“long”,month:“long”,day:“numeric”});
var monthStr = today.toLocaleDateString(“en-US”,{month:“long”,year:“numeric”});
var dim = new Date(today.getFullYear(),today.getMonth()+1,0).getDate();

var h = “”;

// Daily hero card
h += “<div class='daily-hero'>”;
h += “<div class='day-label'>Day “+(dn+1)+” of “+DAILY.length+”</div>”;
h += “<div class='hero-title'>DAILY TRIVIA</div>”;
h += “<div class='hero-date'>”+dateStr+”</div>”;
h += “<div class='pill-row'><span class='pill'>🏈 NFL</span><span class='pill'>🏀 NBA</span><span class='pill'>⚾ MLB</span><span class='pill'>🏒 NHL</span><span class='pill'>🎓 NCAA</span></div>”;
if (saved) {
var bug = buildBug(saved.results);
var cor = saved.results.filter(Boolean).length;
h += “<div class='done-box'>”;
h += “<div class='done-title'>✓ Already played today!</div>”;
h += “<div class='done-bug'>”+bug+”</div>”;
h += “<div class='done-score'>”+cor+”/10 correct”+(streak>=2?” · 🔥”+streak+” day streak”:””)+”</div>”;
h += “<button class='share-btn' id='btn-share-home'>📲 Share Score</button>”;
h += “</div>”;
} else {
h += “<button class='start-btn' id='btn-start-daily'>Start Today’s Quiz →</button>”;
}
h += “</div>”;

// Calendar
h += “<div class='sec-label'>This Month</div>”;
h += “<div class='cal-wrap'>”;
h += “<div class='cal-header'><span>”+monthStr+”</span><span>”+(streak>=3?“🔥”:“📅”)+”</span></div>”;
h += “<div class='cal-grid'>”;
for (var d=1; d<=dim; d++) {
var k=“pp_trivia_”+today.getFullYear()+”*”+(today.getMonth()+1)+”*”+d;
var cls=“cal-day”;
if (d > today.getDate()) {
cls += “”; // future — empty
} else if (d === today.getDate()) {
if (saved) {
var sc=saved.results.filter(Boolean).length;
cls += sc>=8?” great”:sc>=5?” ok”:” poor”;
} else {
cls += “ today”;
}
} else {
try {
var pr=localStorage.getItem(k);
if (pr) { var pp=JSON.parse(pr); var sc2=pp.results.filter(Boolean).length; cls+=sc2>=8?” great”:sc2>=5?” ok”:” poor”; }
} catch(e) {}
}
h += “<div class='"+cls+"'>”+d+”</div>”;
}
h += “</div></div>”;

// Free play
h += “<div class='sec-label'>Free Play</div>”;
h += “<div class='cat-grid'>”;
CATS.forEach(function(cat) {
h += “<div class='cat-card "+cat.cls+"' data-cat='"+cat.id+"'>”;
h += “<div class='cat-icon'>”+cat.icon+”</div>”;
h += “<div class='cat-name'>”+cat.name+”</div>”;
h += “<div class='cat-sub'>10 questions</div>”;
h += “</div>”;
});
h += “</div>”;

setHTML(h);

// Events
var btnStart = $(“btn-start-daily”);
if (btnStart) btnStart.addEventListener(“click”, function() {
S.mode=“daily”; S.questions=DAILY[dn].map(prepQ); S.current=0; S.answered=false; S.score=0; S.history=[];
drawQuiz();
});
var btnShare = $(“btn-share-home”);
if (btnShare) btnShare.addEventListener(“click”, function() { if(saved) doShare(saved.results, dn); });
document.querySelectorAll(”.cat-card”).forEach(function(el) {
el.addEventListener(“click”, function() {
var id = this.getAttribute(“data-cat”);
S.mode=“free”; S.freeCat=id;
S.questions=shuffle(POOLS[id]).slice(0,10).map(prepQ);
S.current=0; S.answered=false; S.score=0; S.history=[];
drawQuiz();
});
});
}

// ── QUIZ ──────────────────────────────────────────────────────
function drawQuiz() {
S.screen = “quiz”;
var q = S.questions[S.current];
var total = S.questions.length;
var pct = Math.round(S.current / total * 100);
var cat = CATS.filter(function(c){return c.id===S.freeCat;})[0] || {icon:“📅”,name:“Daily Trivia”};
var letters = [“A”,“B”,“C”,“D”];

var h = “”;
if (S.mode===“daily”) h += “<div style='font-size:9px;color:#6366f1;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;display:inline-block;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:20px;padding:3px 10px'>📅 Day “+(S.dayNum+1)+” · Daily Quiz</div>”;

// Progress header
h += “<div class='quiz-top'>”;
h += “<span style='font-size:20px'>”+(S.mode===“daily”?“📅”:cat.icon)+”</span>”;
h += “<div class='prog-wrap'>”;
h += “<div class='prog-label'>”+(S.mode===“daily”?“Daily Trivia”:cat.name)+”</div>”;
h += “<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>”;
h += “<div class='prog-count'>”+S.current+” / “+total+”</div>”;
h += “</div>”;
h += “<div class='pts-badge'>”+S.score+” pts</div>”;
h += “</div>”;

// Dots
h += “<div class='dots-row'>”;
for (var i=0; i<total; i++) {
var dc = i<S.history.length ? (S.history[i].correct?“c”:“w”) : “”;
h += “<div class='dot "+dc+"'></div>”;
}
h += “</div>”;

// Question
var diffCls = q.d.replace(/\s+/g,”-”).replace(/’/g,””);
h += “<div class='q-card'><div class='diff-tag "+diffCls+"'>”+q.d+”</div><div class='q-text'>”+esc(q.q)+”</div></div>”;

// Choices
h += “<div class='choices'>”;
q.choices.forEach(function(ch, i) {
var cls = “choice”;
if (S.answered) {
cls += “ locked”;
if (i===q.a) cls += “ correct”;
else if (S.history.length && i===S.history[S.history.length-1].chosen && i!==q.a) cls += “ wrong”;
else cls += “ dim”;
}
h += “<button class='"+cls+"' data-i='"+i+"'>”;
h += “<div class='cletter'>”+letters[i]+”</div>”+esc(ch);
h += “</button>”;
});
h += “</div>”;

// Feedback
if (S.answered) {
var last = S.history[S.history.length-1];
h += “<div class='feedback show "+(last.correct?"correct":"wrong")+"'>”;
h += “<span style='font-size:18px'>”+(last.correct?“✅”:“❌”)+”</span>”;
h += “<div>”+(last.correct?“Correct!”:“Wrong — “+esc(q.choices[q.a]))+”<div class='fact'>”+esc(q.f)+”</div></div>”;
h += “</div>”;
} else {
h += “<div class='feedback'></div>”;
}

var isLast = S.current === total-1;
h += “<button class='next-btn"+(S.answered?" show":"")+"' id='btn-next'>”+(isLast?“See Results ✓”:“Next Question →”)+”</button>”;

setHTML(h);

if (!S.answered) {
document.querySelectorAll(”.choice”).forEach(function(btn) {
btn.addEventListener(“click”, function() {
if (S.answered) return;
var idx = parseInt(this.getAttribute(“data-i”));
var correct = idx===q.a;
if (correct) S.score += 10;
S.history.push({correct:correct, chosen:idx});
S.answered = true;
drawQuiz();
});
});
}
var btnNext = $(“btn-next”);
if (btnNext) btnNext.addEventListener(“click”, function() {
if (S.current < S.questions.length-1) {
S.current++; S.answered=false; drawQuiz();
} else {
if (S.mode===“daily”) saveToday(S.history.map(function(h){return h.correct;}));
drawResults();
}
});
}

// ── RESULTS ───────────────────────────────────────────────────
function drawResults() {
S.screen = “results”;
var total = S.questions.length;
var correct = S.history.filter(function(h){return h.correct;}).length;
var pct = Math.round(correct/total*100);
var results = S.history.map(function(h){return h.correct;});
var bug = buildBug(results);
var streak = getStreak();

var trophy = pct>=90?“🏆”:pct>=70?“🥇”:pct>=50?“🥈”:“🥉”;
var gradeInfo;
if (pct>=90) gradeInfo={label:“🔥 Elite”,bg:“rgba(251,191,36,.12)”,bc:“rgba(251,191,36,.4)”,col:”#fbbf24”};
else if (pct>=70) gradeInfo={label:“💪 Solid”,bg:“rgba(16,185,129,.1)”,bc:“rgba(16,185,129,.35)”,col:”#6ee7b7”};
else if (pct>=50) gradeInfo={label:“📚 Average”,bg:“rgba(99,102,241,.1)”,bc:“rgba(99,102,241,.35)”,col:”#a5b4fc”};
else gradeInfo={label:“😬 Rough”,bg:“rgba(239,68,68,.08)”,bc:“rgba(239,68,68,.3)”,col:”#fca5a5”};

var today = new Date();
var dateStr = today.toLocaleDateString(“en-US”,{month:“short”,day:“numeric”});
var shareText = “PoolPlay Trivia”+(S.mode===“daily”?” — Day “+(S.dayNum+1)+” (”+dateStr+”)”:””)+(streak>=2?” 🔥”+streak:””)+”\n”+bug+” “+correct+”/”+total+”\nhttps://pool-play.vercel.app/trivia.html”;

var h = “<div class='results'>”;
h += “<span class='r-trophy'>”+trophy+”</span>”;
h += “<div class='r-score'>”+correct+”/”+total+”</div>”;
h += “<div class='r-label'>”+(S.mode===“daily”?“Daily Trivia · Day “+(S.dayNum+1):“Free Play”)+”</div>”;
h += “<div class='r-grade' style='background:"+gradeInfo.bg+";border:1px solid "+gradeInfo.bc+";color:"+gradeInfo.col+"'>”+gradeInfo.label+”</div>”;

// Score bug share card
h += “<div class='bug-card'>”;
h += “<div class='bug-label'>📲 Share Your Score</div>”;
h += “<div class='bug-emojis'>”+bug+”</div>”;
h += “<div class='bug-score'>”+correct+”/”+total+(streak>=2?” · 🔥”+streak+” day streak”:””)+”</div>”;
h += “<div class='bug-btns'>”;
h += “<button class='bug-btn green' id='btn-share-sms'>📱 Text</button>”;
h += “<button class='bug-btn indigo' id='btn-share-copy'>📋 Copy</button>”;
h += “</div></div>”;

// Breakdown
h += “<div class='breakdown'><div class='bd-title'>Breakdown</div>”;
S.history.forEach(function(item, i) {
var q = S.questions[i];
var qshort = q.q.length>60 ? q.q.substring(0,60)+”…” : q.q;
h += “<div class='bd-row'>”;
h += “<div class='bd-q'>”+(i+1)+”. “+esc(qshort)+”</div>”;
h += “<div class='bd-a "+(item.correct?"c":"w")+"'>”+(item.correct?“✓”:esc(q.choices[q.a]))+”</div>”;
h += “</div>”;
});
h += “</div>”;

h += “<div class='r-btns'>”;
if (S.mode!==“daily”) h += “<button class='r-btn primary' id='btn-play-again'>Play Again</button>”;
h += “<button class='r-btn ghost' id='btn-home'>← Home</button>”;
h += “</div></div>”;

setHTML(h);

$(“btn-share-sms”).addEventListener(“click”, function() {
if (navigator.share) { navigator.share({text:shareText}).catch(function(){}); }
else { window.open(“sms:?&body=”+encodeURIComponent(shareText),”_blank”); }
});
$(“btn-share-copy”).addEventListener(“click”, function() {
var btn = $(“btn-share-copy”);
if (navigator.clipboard) {
navigator.clipboard.writeText(shareText).then(function(){
btn.textContent=“✓ Copied!”;
setTimeout(function(){btn.textContent=“📋 Copy”;},2000);
}).catch(function(){prompt(“Copy your score:”,shareText);});
} else { prompt(“Copy your score:”,shareText); }
});
var btnAgain = $(“btn-play-again”);
if (btnAgain) btnAgain.addEventListener(“click”, function() {
S.questions=shuffle(POOLS[S.freeCat]).slice(0,10).map(prepQ);
S.current=0; S.answered=false; S.score=0; S.history=[]; drawQuiz();
});
$(“btn-home”).addEventListener(“click”, drawHome);
}

// ── SHARE ─────────────────────────────────────────────────────
function doShare(results, dayNum) {
var bug = buildBug(results);
var correct = results.filter(Boolean).length;
var streak = getStreak();
var today = new Date();
var dateStr = today.toLocaleDateString(“en-US”,{month:“short”,day:“numeric”});
var text = “PoolPlay Trivia — Day “+(dayNum+1)+” (”+dateStr+”)”+(streak>=2?” 🔥”+streak:””)+”\n”+bug+” “+correct+”/10\nhttps://pool-play.vercel.app/trivia.html”;
if (navigator.share) { navigator.share({text:text}).catch(function(){}); }
else if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function(){alert(“Score copied!”);}).catch(function(){prompt(“Copy:”,text);}); }
else { prompt(“Copy:”,text); }
}

// ── INIT ──────────────────────────────────────────────────────
drawHome();
</script>

</body>
</html>
