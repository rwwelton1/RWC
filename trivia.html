<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PoolPlay Trivia</title>
<link rel="icon" href="/poolplay-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none}
a{text-decoration:none;color:inherit}
.topbar{background:rgba(7,9,15,.97);border-bottom:1px solid #1a2535;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.08em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:9px;color:#475569;letter-spacing:.12em;text-transform:uppercase}
.back{border:1px solid #2d3f52;border-radius:6px;color:#64748b;padding:7px 14px;font-size:11px;font-weight:600;display:inline-block}
#app{max-width:500px;margin:0 auto;padding:20px 16px 60px}
.hero{background:linear-gradient(135deg,rgba(99,102,241,.13),rgba(168,85,247,.07));border:1px solid rgba(99,102,241,.3);border-radius:16px;padding:28px 20px 24px;text-align:center;margin-bottom:20px}
.day-tag{font-size:9px;color:#818cf8;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.hero-title{font-family:'Bebas Neue',cursive;font-size:48px;color:#fff;line-height:1;margin-bottom:6px}
.hero-date{font-size:12px;color:#475569;margin-bottom:20px}
.start-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:700;padding:14px 48px;border-radius:12px;cursor:pointer}
.done-wrap{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:16px}
.done-label{font-size:11px;font-weight:700;color:#6ee7b7;margin-bottom:8px}
.bug{font-size:22px;letter-spacing:2px;margin-bottom:6px;line-height:1.5}
.done-score{font-size:12px;color:#64748b;margin-bottom:12px}
.share-btn{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;font-size:12px;font-weight:700;padding:9px 24px;border-radius:8px;cursor:pointer}
.cal{background:#0d1117;border:1px solid #1a2535;border-radius:14px;padding:16px;margin-top:20px}
.cal-hdr{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#f1f5f9;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cd{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#1e2a3a;border:1px solid #0f1923}
.cd.great{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.cd.ok{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:#fbbf24}
.cd.miss{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:#fca5a5}
.cd.today{border-color:#6366f1;color:#a5b4fc}
.qbadge{display:inline-block;font-size:9px;font-weight:700;color:#818cf8;letter-spacing:.1em;text-transform:uppercase;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);border-radius:20px;padding:3px 12px;margin-bottom:14px}
.pbar-wrap{margin-bottom:16px}
.pbar-top{display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-bottom:5px}
.pbar{height:5px;background:#0f1923;border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#6366f1,#a5b4fc);border-radius:3px;transition:width .3s}
.dots{display:flex;gap:5px;justify-content:center;margin-bottom:18px}
.dot{width:12px;height:12px;border-radius:50%;background:#1a2535}
.dot.c{background:#10b981}.dot.w{background:#ef4444}
.qcard{background:#0d1117;border:1px solid #1a2535;border-radius:14px;padding:20px;margin-bottom:16px}
.dlabel{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:block}
.dlabel.warm-up,.dlabel.easy{color:#6ee7b7}
.dlabel.fan,.dlabel.medium{color:#fbbf24}
.dlabel.hard,.dlabel.diehards-only{color:#f97316}
.qtext{font-size:15px;font-weight:600;color:#f1f5f9;line-height:1.5}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.choice{border:1px solid #1a2535;border-radius:10px;padding:13px 16px;font-size:13px;font-weight:500;color:#94a3b8;display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#0d1117;cursor:pointer}
.choice.correct{border-color:rgba(16,185,129,.6);background:rgba(16,185,129,.08);color:#6ee7b7}
.choice.wrong{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.06);color:#fca5a5}
.choice.dim{opacity:.25}
.cltr{width:24px;height:24px;flex-shrink:0;border-radius:5px;background:#07090f;border:1px solid #1a2535;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#334155}
.choice.correct .cltr{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.choice.wrong .cltr{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#fca5a5}
.fb{border-radius:10px;padding:12px 14px;font-size:12px;font-weight:600;display:none;align-items:flex-start;gap:10px;margin-bottom:14px}
.fb.show{display:flex}
.fb.correct{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.fb.wrong{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.fbi{font-size:18px;flex-shrink:0;margin-top:1px}
.fact{font-size:10px;color:#475569;font-weight:400;margin-top:4px;line-height:1.5}
.nxt{width:100%;padding:14px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.35);color:#a5b4fc;display:none;cursor:pointer}
.nxt.show{display:block}
.res{text-align:center;padding:10px 0}
.rtrophy{font-size:64px;display:block;margin-bottom:10px}
.rscore{font-family:'Bebas Neue',cursive;font-size:64px;color:#fff;line-height:1;margin-bottom:4px}
.rlabel{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
.rgrade{font-size:13px;font-weight:700;padding:5px 18px;border-radius:20px;display:inline-block;margin-bottom:20px}
.share-card{background:#0d1117;border:1px solid rgba(99,102,241,.25);border-radius:14px;padding:18px;margin-bottom:16px}
.share-ttl{font-size:9px;color:#6366f1;text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.share-bug{font-size:22px;letter-spacing:3px;margin-bottom:6px;line-height:1.6;word-break:break-all}
.share-sc{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:14px}
.share-btns{display:flex;gap:8px}
.sbtn{flex:1;padding:11px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer}
.sbtn.g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.sbtn.i{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.bkdn{background:#0d1117;border:1px solid #1a2535;border-radius:12px;padding:14px;margin-bottom:16px;text-align:left}
.bkdn-ttl{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.brow{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-top:1px solid #0f1923;font-size:10px;gap:8px}
.brow:first-of-type{border-top:none}
.bq{color:#64748b;flex:1;line-height:1.4}
.ba{font-size:9px;font-weight:700;flex-shrink:0}
.ba.c{color:#6ee7b7}.ba.w{color:#fca5a5}
.home-btn{width:100%;padding:13px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid #2d3f52;color:#64748b;cursor:pointer;margin-top:4px}
</style>
</head>

<script>
var Q=[[{"q": "The New York Yankees won the first World Series of the 1950s. What year?", "c": ["1950", "1951", "1952", "1953"], "a": 0, "d": "warm-up", "f": "The Yankees beat the Phillies 4-0 in the 1950 World Series, starting a dynasty run of 5 straight titles."}, {"q": "Joe Namath guaranteed a victory before Super Bowl III. What year was that game?", "c": ["1967", "1969", "1971", "1973"], "a": 1, "d": "warm-up", "f": "Super Bowl III was played January 12, 1969. The Jets beat the heavily favored Colts 16-7."}, {"q": "Deion Sanders is the only athlete to play in both a Super Bowl and a World Series. Which MLB team did he play for in the Series?", "c": ["Atlanta Braves", "San Francisco Giants", "Cincinnati Reds", "New York Yankees"], "a": 0, "d": "fan", "f": "Sanders played for the Braves in the 1992 World Series and for the 49ers and Cowboys in Super Bowls."}, {"q": "Wayne Gretzky scored more assists than any other player scored total points. How many career assists did he record?", "c": ["1049", "1249", "1449", "1963"], "a": 2, "d": "fan", "f": "Gretzky had 1,963 total points. His 1,449 assists alone would be the all-time points record."}, {"q": "Cal Ripken Jr. played 2,632 consecutive games. What year did the streak begin?", "c": ["1980", "1982", "1983", "1985"], "a": 1, "d": "fan", "f": "The streak started May 30, 1982 and ended September 19, 1998."}, {"q": "Bo Jackson was drafted #1 overall in the 1986 NFL Draft. Which team picked him?", "c": ["Los Angeles Raiders", "Tampa Bay Buccaneers", "Kansas City Chiefs", "Seattle Seahawks"], "a": 1, "d": "fan", "f": "Tampa Bay drafted Bo #1 but he refused to sign, choosing baseball instead. He later joined the Raiders as a hobby."}, {"q": "Michael Jordan was famously cut from his high school varsity team. What year did this happen?", "c": ["1978", "1980", "1981", "1979"], "a": 1, "d": "fan", "f": "Jordan was cut as a sophomore in 1980 at Laney High School. He went on to win 6 NBA championships."}, {"q": "The NBA added the 8-second backcourt rule in 2001. What was the time limit before that?", "c": ["8 seconds", "10 seconds", "12 seconds", "No limit"], "a": 1, "d": "fan", "f": "The NBA used a 10-second backcourt rule before reducing it to 8 seconds to speed up play."}, {"q": "Don Larsen threw the only perfect game in World Series history. Who was the catcher?", "c": ["Yogi Berra", "Elston Howard", "Bill Dickey", "Thurman Munson"], "a": 0, "d": "diehards only", "f": "Yogi Berra leaped into Larsen's arms after the final out on October 8, 1956 - one of baseball's most iconic images."}, {"q": "Four current Division I college athletic programs are named after colors. Navy and Brown are two - name one of the other two.", "c": ["Auburn", "Siena", "Marist", "Crimson"], "a": 0, "d": "diehards only", "f": "Navy (Midshipmen), Brown (Bears), Auburn (Tigers), and Siena (Saints) are the four D1 schools named after colors."}], [{"q": "How many rings did Michael Jordan win with the Chicago Bulls?", "c": ["4", "5", "6", "7"], "a": 2, "d": "easy", "f": "Jordan won 6 championships with the Bulls: 1991-93 and 1996-98."}, {"q": "Who holds the NBA record for most points scored in a single game?", "c": ["Michael Jordan", "LeBron James", "Kobe Bryant", "Wilt Chamberlain"], "a": 3, "d": "easy", "f": "Wilt Chamberlain scored 100 points on March 2, 1962 against the New York Knicks."}, {"q": "What team did LeBron James play for when he won his first NBA championship?", "c": ["Cleveland Cavaliers", "Miami Heat", "Los Angeles Lakers", "Boston Celtics"], "a": 1, "d": "easy", "f": "LeBron won his first ring with the Miami Heat in 2012, alongside Dwyane Wade and Chris Bosh."}, {"q": "Which player has won the most NBA MVP awards?", "c": ["LeBron James", "Michael Jordan", "Kareem Abdul-Jabbar", "Bill Russell"], "a": 2, "d": "medium", "f": "Kareem Abdul-Jabbar won 6 MVP awards (1971-72, 1973-74, 1975-76, 1976-77, 1979-80)."}, {"q": "What year did the Golden State Warriors win their first NBA championship in 40 years?", "c": ["2013", "2014", "2015", "2016"], "a": 2, "d": "medium", "f": "The Warriors ended a 40-year title drought in 2015 led by Steph Curry and Klay Thompson."}, {"q": "Which team did the Boston Celtics defeat to win the 2024 NBA championship?", "c": ["Miami Heat", "Dallas Mavericks", "Golden State Warriors", "Denver Nuggets"], "a": 1, "d": "medium", "f": "The Celtics beat the Mavericks 4-1 in the 2024 Finals for their 18th championship."}, {"q": "Larry Bird played his entire career for which team?", "c": ["Indiana Pacers", "Boston Celtics", "Detroit Pistons", "Chicago Bulls"], "a": 1, "d": "medium", "f": "Bird played 13 seasons entirely with the Boston Celtics, winning 3 championships."}, {"q": "Which NBA team has the most championship titles?", "c": ["Los Angeles Lakers", "Chicago Bulls", "Boston Celtics", "Golden State Warriors"], "a": 2, "d": "medium", "f": "The Boston Celtics have 18 championships, one more than the Lakers' 17."}, {"q": "What was the name of the ABA team that merged into the NBA and won a title in their first season?", "c": ["Denver Nuggets", "Indiana Pacers", "San Antonio Spurs", "New Jersey Nets"], "a": 2, "d": "hard", "f": "The San Antonio Spurs, formerly the ABA's Dallas Chaparrals/Virginia Squires lineage, won in 1999."}, {"q": "Kareem Abdul-Jabbar played college basketball under a different name. What was it?", "c": ["Lew Alcindor", "Roy Jabbar", "Abdul Kareem", "Lewis Robinson"], "a": 0, "d": "hard", "f": "Born Ferdinand Lewis Alcindor Jr., he changed his name after converting to Islam in 1971."}], [{"q": "How many points is a field goal worth in the NFL?", "c": ["1", "2", "3", "4"], "a": 2, "d": "easy", "f": "A field goal is worth 3 points. A successful extra point kick after a touchdown is worth 1 point."}, {"q": "Which team has won the most Super Bowls?", "c": ["New England Patriots", "Pittsburgh Steelers", "Dallas Cowboys", "San Francisco 49ers"], "a": 0, "d": "easy", "f": "The New England Patriots have won 6 Super Bowls (XXXVI, XXXVIII, XXXIX, XLIX, LI, LIII)."}, {"q": "Who holds the NFL record for most career touchdown passes?", "c": ["Tom Brady", "Peyton Manning", "Brett Favre", "Drew Brees"], "a": 0, "d": "medium", "f": "Tom Brady threw 649 career touchdown passes, surpassing Drew Brees' previous record of 571."}, {"q": "What year did the NFL introduce the two-point conversion?", "c": ["1985", "1990", "1994", "1999"], "a": 2, "d": "medium", "f": "The NFL adopted the two-point conversion in 1994, following the college and CFL model."}, {"q": "Which player holds the NFL record for most career rushing yards?", "c": ["Barry Sanders", "Emmitt Smith", "Walter Payton", "Eric Dickerson"], "a": 1, "d": "medium", "f": "Emmitt Smith rushed for 18,355 career yards with the Cowboys and Cardinals."}, {"q": "Who was the first quarterback to throw for 5,000 yards in a single NFL season?", "c": ["Dan Marino", "Drew Brees", "Peyton Manning", "Tom Brady"], "a": 0, "d": "medium", "f": "Dan Marino threw for 5,084 yards in 1984, a record that stood for 27 years."}, {"q": "What NFL team plays their home games at Lambeau Field?", "c": ["Chicago Bears", "Minnesota Vikings", "Green Bay Packers", "Detroit Lions"], "a": 2, "d": "easy", "f": "Lambeau Field has been the home of the Green Bay Packers since 1957, named after coach Curly Lambeau."}, {"q": "The 1972 Miami Dolphins are the only NFL team to finish a season undefeated. What was their record?", "c": ["14-0", "16-0", "17-0", "15-0"], "a": 2, "d": "medium", "f": "The 1972 Dolphins went 17-0 including the Super Bowl, coached by Don Shula."}, {"q": "Which player was selected #1 overall in the 1998 NFL Draft?", "c": ["Peyton Manning", "Ryan Leaf", "Charles Woodson", "Randy Moss"], "a": 0, "d": "hard", "f": "Peyton Manning was the #1 pick by Indianapolis. Ryan Leaf went #2 and became one of the biggest busts in draft history."}, {"q": "How many times has a #1 seed lost to a #4 seed in a single-elimination NFL playoff round since the current format began?", "c": ["Never", "Twice", "5 times", "More than 10"], "a": 3, "d": "hard", "f": "Upsets have occurred more than 10 times across the wild card and divisional rounds in NFL history."}], [{"q": "How many strikes does it take to strike out in baseball?", "c": ["2", "3", "4", "5"], "a": 1, "d": "easy", "f": "Three strikes and you're out - one of baseball's most fundamental rules."}, {"q": "Which team has won the most World Series titles?", "c": ["Boston Red Sox", "New York Yankees", "St. Louis Cardinals", "Los Angeles Dodgers"], "a": 1, "d": "easy", "f": "The Yankees have won 27 World Series championships."}, {"q": "Who holds the record for most career home runs in MLB history?", "c": ["Babe Ruth", "Hank Aaron", "Barry Bonds", "Willie Mays"], "a": 2, "d": "medium", "f": "Barry Bonds hit 762 career home runs, though his record is overshadowed by PED allegations."}, {"q": "What is the distance from home plate to first base in MLB?", "c": ["80 feet", "90 feet", "100 feet", "95 feet"], "a": 1, "d": "easy", "f": "All bases are 90 feet apart in Major League Baseball."}, {"q": "Who was the last player to hit .400 in a single MLB season?", "c": ["Joe DiMaggio", "Willie Mays", "Ted Williams", "Mickey Mantle"], "a": 2, "d": "medium", "f": "Ted Williams hit .406 in 1941, the last player to bat .400 over a full season."}, {"q": "What team did Babe Ruth play for before the Yankees?", "c": ["Detroit Tigers", "Boston Red Sox", "Philadelphia Athletics", "Chicago White Sox"], "a": 1, "d": "medium", "f": "Ruth was sold by the Red Sox to the Yankees in 1920 for $100,000 - the so-called Curse of the Bambino."}, {"q": "How many innings are in a regulation MLB game?", "c": ["7", "8", "9", "10"], "a": 2, "d": "easy", "f": "A standard MLB game is 9 innings. Extra innings are played if tied after 9."}, {"q": "Which pitcher holds the MLB record for most career strikeouts?", "c": ["Roger Clemens", "Randy Johnson", "Nolan Ryan", "Bob Gibson"], "a": 2, "d": "medium", "f": "Nolan Ryan struck out 5,714 batters over his 27-year career."}, {"q": "What year did Jackie Robinson break the MLB color barrier?", "c": ["1945", "1947", "1949", "1951"], "a": 1, "d": "medium", "f": "Jackie Robinson debuted with the Brooklyn Dodgers on April 15, 1947 - now celebrated as Jackie Robinson Day."}, {"q": "How many perfect games have been thrown in MLB postseason history?", "c": ["0", "1", "2", "3"], "a": 1, "d": "hard", "f": "Don Larsen's perfect game in the 1956 World Series remains the only perfect game in postseason history."}], [{"q": "How many players are on the court per team in NCAA basketball?", "c": ["4", "5", "6", "7"], "a": 1, "d": "easy", "f": "Five players per team are on the court at a time in basketball at all levels."}, {"q": "Which school has won the most NCAA Men's Basketball championships?", "c": ["Duke", "North Carolina", "Kansas", "UCLA"], "a": 3, "d": "medium", "f": "UCLA has won 11 national championships, including 10 under legendary coach John Wooden."}, {"q": "What is the shot clock duration in NCAA men's basketball?", "c": ["24 seconds", "30 seconds", "35 seconds", "45 seconds"], "a": 1, "d": "medium", "f": "The NCAA reduced the shot clock from 35 to 30 seconds in 2015-16."}, {"q": "What is March Madness officially called?", "c": ["NCAA Basketball Invitational", "NCAA Final Four Tournament", "NCAA Division I Men's Basketball Tournament", "College Basketball Championship"], "a": 2, "d": "easy", "f": "The official name is the NCAA Division I Men's Basketball Tournament. CBS coined 'March Madness' in 1982."}, {"q": "Which college football conference is known as the SEC?", "c": ["Southeast Conference", "Southeastern Conference", "Southern Elite Conference", "Southern Expansion Conference"], "a": 1, "d": "easy", "f": "The Southeastern Conference (SEC) was founded in 1932 and includes schools like Alabama, Georgia, and LSU."}, {"q": "Who holds the NCAA record for most career points in Division I men's basketball?", "c": ["Pete Maravich", "Kareem Abdul-Jabbar", "Oscar Robe for(var i=0;i<31;i++){
var d=new Date();d.setDate(d.getDate()-i);d.setHours(0,0,0,0);
var k=‘pp_’+d.getFullYear()+’*’+(d.getMonth()+1)+’*’+d.getDate();
try{if(!localStorage.getItem(k))break;s++;}catch(e){break;}
}
return s;
}
function bug(r){
var s=’’;
for(var i=0;i<r.length;i++)s+=r[i]?’\uD83D\uDFE9’:’\uD83D\uDFE5’;
return s;
}
function shuffle(a){
var arr=a.slice();
for(var i=arr.length-1;i>0;i–){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
return arr;
}
function prepQ(raw){
var c=raw.c.slice(),ans=c[raw.a];
c=shuffle(c);
return {q:raw.q,c:c,a:c.indexOf(ans),d:raw.d,f:raw.f};
}

function showHome(){
var dn=dayNum();
state.dayIdx=dn;
var saved=loadSaved();
var streak=getStreak();
var today=new Date();
var ds=today.toLocaleDateString(‘en-US’,{weekday:‘long’,month:‘long’,day:‘numeric’});
var ms=today.toLocaleDateString(‘en-US’,{month:‘long’,year:‘numeric’});
var dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
var o=’’;

o+=’<div class="hero">’;
o+=’<div class="day-tag">Day ‘+(dn+1)+’ of ‘+Q.length+’</div>’;
o+=’<div class="hero-title">DAILY TRIVIA</div>’;
o+=’<div class="hero-date">’+ds+’</div>’;

if(saved){
var b=bug(saved.r);
var cor=saved.r.filter(function(v){return v;}).length;
o+=’<div class="done-wrap">’;
o+=’<div class="done-label">Already played today!</div>’;
o+=’<div class="bug">’+b+’</div>’;
o+=’<div class="done-score">’+cor+’/10 correct’;
if(streak>=2)o+=’ \u2022 \uD83D\uDD25’+streak+’ day streak’;
o+=’</div>’;
o+=’<button class="share-btn" id="bsh">\uD83D\uDCF2 Share Score</button>’;
o+=’</div>’;
} else {
o+=’<button class="start-btn" id="bst">Start Today's Quiz</button>’;
}
o+=’</div>’;

o+=’<div class="cal">’;
o+=’<div class="cal-hdr"><span>’+ms+’</span>’;
o+=’<span>’+(streak>=3?’\uD83D\uDD25’:’\uD83D\uDCC5’)+’</span></div>’;
o+=’<div class="cal-grid">’;
for(var d=1;d<=dim;d++){
var k=‘pp_’+today.getFullYear()+’*’+(today.getMonth()+1)+’*’+d;
var cls=‘cd’;
if(d<today.getDate()){
try{var pr=localStorage.getItem(k);if(pr){var sc=JSON.parse(pr).r.filter(function(v){return v;}).length;cls+=’ ‘+(sc>=8?‘great’:sc>=5?‘ok’:‘miss’);}}catch(e){}
} else if(d===today.getDate()){
if(saved){var sc2=saved.r.filter(function(v){return v;}).length;cls+=’ ‘+(sc2>=8?‘great’:sc2>=5?‘ok’:‘miss’);}
else cls+=’ today’;
}
o+=’<div class="'+cls+'">’+d+’</div>’;
}
o+=’</div></div>’;

sh(o);
var bst=ge(‘bst’);
if(bst)bst.onclick=startQuiz;
var bsh=ge(‘bsh’);
if(bsh)bsh.onclick=function(){if(saved)doShare(saved.r,dn);};
}

function startQuiz(){
state.questions=Q[state.dayIdx].map(prepQ);
state.cur=0;state.answered=false;state.score=0;state.history=[];
showQ();
}

function showQ(){
var q=state.questions[state.cur];
var total=state.questions.length;
var pct=Math.round(state.cur/total*100);
var L=[‘A’,‘B’,‘C’,‘D’];
var dc=String(q.d||’’).replace(/[^a-zA-Z0-9]/g,’-’).toLowerCase();
var o=’’;

o+=’<div class="qbadge">Day ‘+(state.dayIdx+1)+’ \u2022 Daily Quiz</div>’;
o+=’<div class="pbar-wrap">’;
o+=’<div class="pbar-top"><span>Question ‘+(state.cur+1)+’ of ‘+total+’</span><span>’+state.score+’ pts</span></div>’;
o+=’<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>’;
o+=’</div>’;
o+=’<div class="dots">’;
for(var i=0;i<total;i++){
var dc2=i<state.history.length?(state.history[i].c?‘c’:‘w’):’’;
o+=’<div class="dot '+dc2+'"></div>’;
}
o+=’</div>’;
o+=’<div class="qcard">’;
o+=’<span class="dlabel '+dc+'">’+xe(q.d)+’</span>’;
o+=’<div class="qtext">’+xe(q.q)+’</div>’;
o+=’</div>’;
o+=’<div class="choices">’;
for(var ci=0;ci<q.c.length;ci++){
var cls=‘choice’;
if(state.answered){
if(ci===q.a)cls+=’ correct’;
else if(state.history.length&&state.history[state.history.length-1].chosen===ci)cls+=’ wrong’;
else cls+=’ dim’;
}
o+=’<button class="'+cls+'" id="ch'+ci+'">’;
o+=’<div class="cltr">’+L[ci]+’</div>’+xe(q.c[ci]);
o+=’</button>’;
}
o+=’</div>’;
if(state.answered){
var last=state.history[state.history.length-1];
o+=’<div class="fb show '+(last.c?'correct':'wrong')+'">’;
o+=’<span class="fbi">’+(last.c?’\u2705’:’\u274C’)+’</span>’;
o+=’<div>’+(last.c?‘Correct!’:‘Wrong \u2014 ‘+xe(q.c[q.a]));
o+=’<div class="fact">’+xe(q.f)+’</div></div></div>’;
} else {
o+=’<div class="fb"></div>’;
}
var isLast=state.cur===total-1;
o+=’<button class="nxt'+(state.answered?' show':'')+'" id="bnxt">’+(isLast?‘See Results’:‘Next \u2192’)+’</button>’;

sh(o);

if(!state.answered){
for(var bi=0;bi<q.c.length;bi++){
(function(idx){
var btn=ge(‘ch’+idx);
if(!btn)return;
btn.onclick=function(){
if(state.answered)return;
var correct=(idx===state.questions[state.cur].a);
if(correct)state.score+=10;
state.history.push({c:correct,chosen:idx});
state.answered=true;
showQ();
};
})(bi);
}
}
var bnxt=ge(‘bnxt’);
if(bnxt)bnxt.onclick=function(){
if(state.cur<state.questions.length-1){
state.cur++;state.answered=false;showQ();
} else {
saveDone(state.history.map(function(h){return h.c;}));
showResults();
}
};
}

function showResults(){
var total=state.questions.length;
var correct=state.history.filter(function(h){return h.c;}).length;
var pct=Math.round(correct/total*100);
var b=bug(state.history.map(function(h){return h.c;}));
var streak=getStreak();
var trophy=pct>=90?’\uD83C\uDFC6’:pct>=70?’\uD83E\uDD47’:pct>=50?’\uD83E\uDD48’:’\uD83E\uDD49’;
var gl,gb,gbc,gc;
if(pct>=90){gl=’\uD83D\uDD25 Elite’;gb=‘rgba(251,191,36,.1)’;gbc=‘rgba(251,191,36,.35)’;gc=’#fbbf24’;}
else if(pct>=70){gl=’\uD83D\uDCAA Solid’;gb=‘rgba(16,185,129,.08)’;gbc=‘rgba(16,185,129,.3)’;gc=’#6ee7b7’;}
else if(pct>=50){gl=‘Average’;gb=‘rgba(99,102,241,.08)’;gbc=‘rgba(99,102,241,.3)’;gc=’#a5b4fc’;}
else{gl=‘Rough’;gb=‘rgba(239,68,68,.06)’;gbc=‘rgba(239,68,68,.25)’;gc=’#fca5a5’;}
var today=new Date();
var ds=today.toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’});
var line1=‘PoolPlay Trivia \u2014 Day ‘+(state.dayIdx+1)+’ (’+ds+’)’+(streak>=2?’ \uD83D\uDD25’+streak:’’);
var st=line1+’\n’+b+’ ‘+correct+’/10\npool-play.vercel.app/trivia.html’;

var o=’<div class="res">’;
o+=’<span class="rtrophy">’+trophy+’</span>’;
o+=’<div class="rscore">’+correct+’/’+total+’</div>’;
o+=’<div class="rlabel">Day ‘+(state.dayIdx+1)+’ \u2014 Daily Trivia</div>’;
o+=’<div class="rgrade" style="background:'+gb+';border:1px solid '+gbc+';color:'+gc+'">’+gl+’</div>’;
o+=’<div class="share-card">’;
o+=’<div class="share-ttl">Share Your Score</div>’;
o+=’<div class="share-bug">’+b+’</div>’;
o+=’<div class="share-sc">’+correct+’/10’+(streak>=2?’ \u2022 \uD83D\uDD25’+streak+’ day streak’:’’)+’</div>’;
o+=’<div class="share-btns">’;
o+=’<button class="sbtn g" id="bsms">\uD83D\uDCF1 Text</button>’;
o+=’<button class="sbtn i" id="bcpy">\uD83D\uDCCB Copy</button>’;
o+=’</div></div>’;
o+=’<div class="bkdn"><div class="bkdn-ttl">Breakdown</div>’;
for(var i=0;i<state.history.length;i++){
var item=state.history[i];
var qq=state.questions[i];
var qs=qq.q.length>55?qq.q.substring(0,55)+’…’:qq.q;
o+=’<div class="brow"><div class="bq">’+(i+1)+’. ‘+xe(qs)+’</div>’;
o+=’<div class="ba '+(item.c?'c':'w')+'">’+(item.c?’\u2713’:xe(qq.c[qq.a]))+’</div></div>’;
}
o+=’</div>’;
o+=’<button class="home-btn" id="bhome">Back to Home</button>’;
o+=’</div>’;

sh(o);
ge(‘bsms’).onclick=function(){
if(navigator.share){navigator.share({text:st}).catch(function(){});}
else window.open(‘sms:?&body=’+encodeURIComponent(st),’_blank’);
};
ge(‘bcpy’).onclick=function(){
var btn=ge(‘bcpy’);
if(navigator.clipboard){
navigator.clipboard.writeText(st).then(function(){btn.textContent=‘Copied!’;setTimeout(function(){btn.textContent=‘Copy’;},2000);}).catch(function(){prompt(‘Copy:’,st);});
} else prompt(‘Copy:’,st);
};
ge(‘bhome’).onclick=showHome;
}

function doShare(r,dn){
var b=bug(r);
var cor=r.filter(function(v){return v;}).length;
var streak=getStreak();
var today=new Date();
var ds=today.toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’});
var t=‘PoolPlay Trivia \u2014 Day ‘+(dn+1)+’ (’+ds+’)’+(streak>=2?’ \uD83D\uDD25’+streak:’’)+’\n’+b+’ ‘+cor+’/10\npool-play.vercel.app/trivia.html’;
if(navigator.share)navigator.share({text:t}).catch(function(){});
else if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){alert(‘Copied!’);}).catch(function(){prompt(‘Copy:’,t);});
else prompt(‘Copy:’,t);
}

showHome();
</script>
