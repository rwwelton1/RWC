<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PoolPlay Trivia</title>
<link rel="icon" href="/poolplay-icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
a{text-decoration:none;color:inherit}
.bar{background:#0d1117;border-bottom:1px solid #1e2a3a;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:20px;font-weight:900;color:#fff}
.logo b{color:#fbbf24}
.sub{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.back{border:1px solid #2d3f52;border-radius:6px;color:#64748b;padding:7px 14px;font-size:11px;font-weight:600}
.wrap{max-width:500px;margin:0 auto;padding:20px 16px 60px}
.hero{background:linear-gradient(135deg,rgba(99,102,241,.13),rgba(168,85,247,.07));border:1px solid rgba(99,102,241,.3);border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:20px}
.htag{font-size:9px;color:#818cf8;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.htitle{font-size:40px;font-weight:900;color:#fff;margin-bottom:6px}
.hdate{font-size:12px;color:#475569;margin-bottom:20px}
.start{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:700;padding:14px 48px;border-radius:12px;cursor:pointer}
.done{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:16px}
.done-lbl{font-size:11px;font-weight:700;color:#6ee7b7;margin-bottom:8px}
.done-bug{font-size:22px;letter-spacing:2px;margin-bottom:6px;line-height:1.5}
.done-sc{font-size:12px;color:#64748b;margin-bottom:12px}
.done-share{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;font-size:12px;font-weight:700;padding:9px 24px;border-radius:8px;cursor:pointer}
.prog-lbl{font-size:10px;color:#475569;margin-bottom:5px;display:flex;justify-content:space-between}
.pbar{height:4px;background:#0f1923;border-radius:2px;margin-bottom:16px;overflow:hidden}
.pfill{height:100%;background:#6366f1;transition:width .3s}
.dots{display:flex;gap:5px;justify-content:center;margin-bottom:18px}
.dot{width:12px;height:12px;border-radius:50%;background:#1a2535}
.qcard{background:#0d1117;border:1px solid #1a2535;border-radius:14px;padding:20px;margin-bottom:16px}
.qlbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6ee7b7;margin-bottom:10px}
.qtext{font-size:15px;font-weight:600;color:#f1f5f9;line-height:1.5}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.choice{border:1px solid #1a2535;border-radius:10px;padding:13px 16px;font-size:13px;font-weight:500;color:#94a3b8;display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#0d1117;cursor:pointer}
.correct{border-color:rgba(16,185,129,.6)!important;background:rgba(16,185,129,.08)!important;color:#6ee7b7!important}
.wrong{border-color:rgba(239,68,68,.5)!important;background:rgba(239,68,68,.06)!important;color:#fca5a5!important}
.dim{opacity:.25}
.cltr{width:24px;height:24px;flex-shrink:0;border-radius:5px;background:#07090f;border:1px solid #1a2535;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#334155}
.fb{border-radius:10px;padding:12px 14px;font-size:12px;font-weight:600;display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.fb-ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.fb-no{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.fact{font-size:10px;color:#475569;font-weight:400;margin-top:4px;line-height:1.5}
.nxt{width:100%;padding:14px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.35);color:#a5b4fc;cursor:pointer}
.res-wrap{text-align:center;padding:10px 0}
.res-trophy{font-size:60px;display:block;margin-bottom:10px}
.res-score{font-size:60px;font-weight:900;color:#fff;line-height:1;margin-bottom:4px}
.res-lbl{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:20px}
.scard{background:#0d1117;border:1px solid rgba(99,102,241,.25);border-radius:14px;padding:18px;margin-bottom:16px}
.sttl{font-size:9px;color:#6366f1;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.sbug{font-size:22px;letter-spacing:3px;margin-bottom:6px;line-height:1.6}
.ssc{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:14px}
.sbtns{display:flex;gap:8px}
.sbtn-g{flex:1;padding:11px;border-radius:9px;font-size:12px;font-weight:700;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;cursor:pointer}
.sbtn-i{flex:1;padding:11px;border-radius:9px;font-size:12px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;cursor:pointer}
.home-btn{width:100%;padding:13px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid #2d3f52;color:#64748b;cursor:pointer;background:none;margin-top:4px}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#475569">Loading...</div></div>
<script>
var Q = [{"q":"How many points is a touchdown worth?","c":["3","6","7","2"],"a":1,"d":"easy","f":"A touchdown scores 6 points."},{"q":"Which team has won the most Super Bowls?","c":["Patriots","Cowboys","Steelers","49ers"],"a":0,"d":"easy","f":"The New England Patriots have won 6 Super Bowls."},{"q":"How many strikes to strike out in baseball?","c":["2","3","4","1"],"a":1,"d":"easy","f":"Three strikes and you are out."},{"q":"How many players on a basketball team on court?","c":["4","5","6","7"],"a":1,"d":"easy","f":"Five players per team on the court."},{"q":"Which country has won the most FIFA World Cups?","c":["Germany","Argentina","Italy","Brazil"],"a":3,"d":"easy","f":"Brazil has won 5 World Cups: 1958, 1962, 1970, 1994, 2002."},{"q":"How many holes in a standard round of golf?","c":["9","12","18","24"],"a":2,"d":"easy","f":"A standard round is 18 holes."},{"q":"What is a hat trick in hockey or soccer?","c":["2 goals","3 goals","4 goals","5 goals"],"a":1,"d":"easy","f":"Three goals by one player in a single game."},{"q":"How long is an NFL field from goal line to goal line?","c":["80 yards","90 yards","100 yards","110 yards"],"a":2,"d":"easy","f":"100 yards from goal line to goal line, with 10-yard end zones on each side."},{"q":"Who holds the NBA single game scoring record with 100 points?","c":["Michael Jordan","Kobe Bryant","Wilt Chamberlain","LeBron James"],"a":2,"d":"medium","f":"Wilt Chamberlain scored 100 points against the New York Knicks on March 2, 1962."},{"q":"How many Grand Slam tennis tournaments are held each year?","c":["2","3","4","5"],"a":2,"d":"easy","f":"Australian Open, French Open, Wimbledon, and the US Open."}];
var S = {cur:0, answered:false, score:0, history:[], qs:[]};

function ge(id) { return document.getElementById(id); }
function R(h) { ge(‘root’).innerHTML = h; }
function xe(s) { return String(s||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’); }

function key() {
var d = new Date();
return ‘pp_’ + d.getFullYear() + ‘*’ + (d.getMonth()+1) + ’*’ + d.getDate();
}
function load() { try { var v = localStorage.getItem(key()); return v ? JSON.parse(v) : null; } catch(e) { return null; } }
function save(r) { try { localStorage.setItem(key(), JSON.stringify({r:r})); } catch(e) {} }

function shuffle(a) {
var arr = a.slice();
for (var i = arr.length-1; i > 0; i–) { var j = Math.floor(Math.random()*(i+1)); var t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
return arr;
}

function bugLine(r) {
var s = ‘’;
for (var i = 0; i < r.length; i++) s += r[i] ? ‘\u2705’ : ‘\u274C’;
return s;
}

function bar() {
return ‘<div class="bar"><div><div class="logo">POOL<b>PLAY</b></div><div class="sub">Trivia</div></div><a href="index.html" class="back">← Profile</a></div>’;
}

function showHome() {
var saved = load();
var today = new Date();
var ds = today.toLocaleDateString(‘en-US’, {weekday:‘long’, month:‘long’, day:‘numeric’});
var o = bar() + ‘<div class="wrap"><div class="hero">’;
o += ‘<div class="htag">Daily Trivia</div>’;
o += ‘<div class="htitle">SPORTS TRIVIA</div>’;
o += ‘<div class="hdate">’ + ds + ‘</div>’;
if (saved) {
var cor = saved.r.filter(function(v){return v;}).length;
o += ‘<div class="done">’;
o += ‘<div class="done-lbl">Already played today!</div>’;
o += ‘<div class="done-bug">’ + bugLine(saved.r) + ‘</div>’;
o += ‘<div class="done-sc">’ + cor + ‘/10 correct</div>’;
o += ‘<button id="bsh" class="done-share">Share Score</button>’;
o += ‘</div>’;
} else {
o += ‘<button id="bst" class="start">Start Quiz</button>’;
}
o += ‘</div></div>’;
R(o);
var bst = ge(‘bst’); if (bst) bst.onclick = startQuiz;
var bsh = ge(‘bsh’); if (bsh) bsh.onclick = function() { doShare(saved.r); };
}

function startQuiz() {
S.qs = Q.map(function(raw) {
var c = raw.c.slice(), ans = c[raw.a];
c = shuffle(c);
return {q:raw.q, c:c, a:c.indexOf(ans), d:raw.d, f:raw.f};
});
S.cur = 0; S.answered = false; S.score = 0; S.history = [];
showQ();
}

function showQ() {
var q = S.qs[S.cur];
var total = S.qs.length;
var pct = Math.round(S.cur / total * 100);
var L = [‘A’,‘B’,‘C’,‘D’];
var o = bar() + ‘<div class="wrap">’;
o += ‘<div class="prog-lbl"><span>Q’ + (S.cur+1) + ’ of ’ + total + ‘</span><span>’ + S.score + ’ pts</span></div>’;
o += ‘<div class="pbar"><div class="pfill" style="width:' + pct + '%"></div></div>’;
o += ‘<div class="dots">’;
for (var i = 0; i < total; i++) {
var col = i < S.history.length ? (S.history[i].c ? ‘#10b981’ : ‘#ef4444’) : ‘#1a2535’;
o += ‘<div class="dot" style="background:' + col + '"></div>’;
}
o += ‘</div>’;
o += ‘<div class="qcard"><div class="qlbl">’ + xe(q.d) + ‘</div><div class="qtext">’ + xe(q.q) + ‘</div></div>’;
o += ‘<div class="choices">’;
for (var ci = 0; ci < q.c.length; ci++) {
var cls = ‘choice’;
if (S.answered) {
if (ci === q.a) cls += ’ correct’;
else if (S.history.length && S.history[S.history.length-1].chosen === ci) cls += ’ wrong’;
else cls += ’ dim’;
}
o += ‘<button class="' + cls + '" id="ch' + ci + '"><div class="cltr">’ + L[ci] + ‘</div>’ + xe(q.c[ci]) + ‘</button>’;
}
o += ‘</div>’;
if (S.answered) {
var last = S.history[S.history.length-1];
o += ‘<div class="fb ' + (last.c ? 'fb-ok' : 'fb-no') + '">’;
o += ‘<span style="font-size:18px;flex-shrink:0">’ + (last.c ? ‘\u2705’ : ‘\u274C’) + ‘</span>’;
o += ‘<div>’ + (last.c ? ‘Correct!’ : ’Wrong \u2014 ’ + xe(q.c[q.a])) + ‘<div class="fact">’ + xe(q.f) + ‘</div></div></div>’;
}
var isLast = S.cur === total - 1;
o += ‘<button id="bnxt" class="nxt" style="' + (S.answered ? '' : 'display:none') + '">’ + (isLast ? ‘See Results’ : ‘Next \u2192’) + ‘</button>’;
o += ‘</div>’;
R(o);
if (!S.answered) {
for (var bi = 0; bi < q.c.length; bi++) {
(function(idx) {
var btn = ge(‘ch’ + idx);
if (!btn) return;
btn.onclick = function() {
if (S.answered) return;
var correct = (idx === S.qs[S.cur].a);
if (correct) S.score += 10;
S.history.push({c:correct, chosen:idx});
S.answered = true;
showQ();
};
})(bi);
}
}
var bnxt = ge(‘bnxt’);
if (bnxt) bnxt.onclick = function() {
if (S.cur < S.qs.length - 1) { S.cur++; S.answered = false; showQ(); }
else { save(S.history.map(function(h){return h.c;})); showResults(); }
};
}

function showResults() {
var correct = S.history.filter(function(h){return h.c;}).length;
var pct = Math.round(correct / S.qs.length * 100);
var b = bugLine(S.history.map(function(h){return h.c;}));
var today = new Date();
var ds = today.toLocaleDateString(‘en-US’, {month:‘short’, day:‘numeric’});
var st = ‘PoolPlay Trivia (’ + ds + ‘)\n’ + b + ’ ’ + correct + ‘/10\npool-play.vercel.app/trivia.html’;
var trophy = pct >= 90 ? ‘\uD83C\uDFC6’ : pct >= 70 ? ‘\uD83E\uDD47’ : pct >= 50 ? ‘\uD83E\uDD48’ : ‘\uD83E\uDD49’;
var o = bar() + ‘<div class="wrap"><div class="res-wrap">’;
o += ‘<span class="res-trophy">’ + trophy + ‘</span>’;
o += ‘<div class="res-score">’ + correct + ‘/10</div>’;
o += ‘<div class="res-lbl">Daily Trivia</div>’;
o += ‘<div class="scard"><div class="sttl">Share Your Score</div>’;
o += ‘<div class="sbug">’ + b + ‘</div>’;
o += ‘<div class="ssc">’ + correct + ‘/10</div>’;
o += ‘<div class="sbtns"><button id="bsms" class="sbtn-g">Text</button><button id="bcpy" class="sbtn-i">Copy</button></div>’;
o += ‘</div>’;
o += ‘<button id="bhome" class="home-btn">Back to Home</button>’;
o += ‘</div></div>’;
R(o);
ge(‘bsms’).onclick = function() {
if (navigator.share) navigator.share({text:st}).catch(function(){});
else window.open(‘sms:?&body=’ + encodeURIComponent(st), ‘_blank’);
};
ge(‘bcpy’).onclick = function() {
var btn = ge(‘bcpy’);
if (navigator.clipboard) navigator.clipboard.writeText(st).then(function(){btn.textContent=‘Copied!’;setTimeout(function(){btn.textContent=‘Copy’;},2000);}).catch(function(){prompt(‘Copy:’,st);});
else prompt(‘Copy:’, st);
};
ge(‘bhome’).onclick = showHome;
}

function doShare(r) {
var b = bugLine(r), cor = r.filter(function(v){return v;}).length;
var today = new Date(), ds = today.toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’});
var t = ‘PoolPlay Trivia (’ + ds + ‘)\n’ + b + ’ ’ + cor + ‘/10\npool-play.vercel.app/trivia.html’;
if (navigator.share) navigator.share({text:t}).catch(function(){});
else if (navigator.clipboard) navigator.clipboard.writeText(t).then(function(){alert(‘Copied!’);}).catch(function(){prompt(‘Copy:’,t);});
else prompt(‘Copy:’, t);
}

showHome();
</script>

</body>
</html>
