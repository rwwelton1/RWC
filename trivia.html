<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>PoolPlay Trivia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0f1e;color:#f1f5f9;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
#root{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;position:relative}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);background:#0a0f1e;position:sticky;top:0;z-index:10;min-height:52px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em;color:#f8fafc}
.btn{border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.7}
.btn-ghost{background:transparent;color:#94a3b8;font-size:14px;padding:6px 10px}
.main{flex:1;padding:16px;display:flex;flex-direction:column;align-items:center}

/* ── TRIVIA STYLES ── */
.tv-hero{width:100%;max-width:380px;background:linear-gradient(145deg,rgba(99,102,241,.12),rgba(168,85,247,.08));border:1px solid rgba(99,102,241,.2);border-radius:20px;padding:28px 20px 24px;text-align:center;margin:12px 0 16px}
.tv-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:.15em;color:#6366f1;text-transform:uppercase;margin-bottom:6px}
.tv-hero-title{font-family:‘Bebas Neue’,sans-serif;font-size:52px;letter-spacing:.06em;color:#f8fafc;line-height:1}
.tv-hero-date{font-size:12px;color:#475569;margin-top:4px;letter-spacing:.04em}
.tv-hero-btn{margin-top:20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-family:‘DM Sans’,sans-serif;font-weight:700;font-size:15px;padding:13px 40px;border:none;border-radius:14px;cursor:pointer;letter-spacing:.04em;transition:opacity .15s}
.tv-hero-btn:active{opacity:.8}
.tv-diff-row{display:flex;gap:8px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid;letter-spacing:.04em}
.tv-prog-hdr{display:flex;justify-content:space-between;width:100%;max-width:380px;margin-bottom:6px;font-size:12px;font-weight:600}
.tv-prog-lbl{color:#64748b}
.tv-prog-pts{color:#fbbf24}
.tv-pbar{width:100%;max-width:380px;height:4px;background:rgba(255,255,255,.08);border-radius:4px;margin-bottom:14px;overflow:hidden}
.tv-pfill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .4s ease}
.tv-diff-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid;letter-spacing:.05em;margin-bottom:12px;align-self:flex-start}
.tv-card{width:100%;max-width:380px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:10px}
.tv-qtext{font-size:16px;font-weight:600;line-height:1.45;color:#f1f5f9;margin-bottom:4px}
.tv-choice{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#e2e8f0;font-family:‘DM Sans’,sans-serif;font-weight:500;font-size:14px;padding:12px 14px;text-align:left;cursor:pointer;transition:background .15s,border-color .15s;line-height:1.35}
.tv-choice:active{background:rgba(99,102,241,.25);border-color:#6366f1}
.tv-fb-card{border-radius:12px;padding:14px;font-size:13px;font-weight:600;line-height:1.4}
.tv-fb-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.tv-fb-no{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.tv-fb-fact{font-size:12px;font-weight:400;color:#94a3b8;margin-top:8px;line-height:1.5}
.tv-btn-next{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-family:‘DM Sans’,sans-serif;font-weight:700;font-size:14px;padding:13px;border:none;border-radius:12px;cursor:pointer;margin-top:4px;transition:opacity .15s}
.tv-btn-next:active{opacity:.8}
.tv-res-card{width:100%;max-width:380px;background:linear-gradient(145deg,rgba(99,102,241,.1),rgba(168,85,247,.07));border:1px solid rgba(99,102,241,.2);border-radius:20px;padding:28px 20px;text-align:center;margin-top:12px;display:flex;flex-direction:column;align-items:center;gap:6px}
.tv-res-avatar{font-size:42px;margin-bottom:4px}
.tv-res-name{font-size:18px;font-weight:700;color:#f1f5f9}
.tv-res-date{font-size:11px;color:#475569;letter-spacing:.04em}
.tv-res-score{font-size:52px;font-family:‘Bebas Neue’,sans-serif;letter-spacing:.04em;color:#f8fafc;line-height:1;margin:8px 0 2px}
.tv-res-grid{font-size:20px;letter-spacing:4px;margin:2px 0}
.tv-btn-share{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;font-family:‘DM Sans’,sans-serif;font-weight:700;font-size:14px;padding:12px 28px;border-radius:12px;cursor:pointer;margin-top:12px;transition:opacity .15s;width:100%}
.tv-btn-share:active{opacity:.7}
.tv-btn-hub{background:transparent;border:1px solid rgba(255,255,255,.1);color:#64748b;font-family:‘DM Sans’,sans-serif;font-weight:600;font-size:13px;padding:10px 24px;border-radius:12px;cursor:pointer;margin-top:6px;transition:opacity .15s;width:100%}
.tv-btn-hub:active{opacity:.7}
</style>

</head>
<body>
<div id="root"></div>

<!-- Firebase (read-only: just for trivia reset checks) -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── USER STATE (passed from index.html via localStorage) ──────────────────────
var DB = null;
try {
  firebase.initializeApp({
    apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",
    authDomain:"rwc-picks.firebaseapp.com",
    databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",
    projectId:"rwc-picks",
    appId:"1:965978379243:web:35f9db9a664f9170e27fae"
  });
  DB = firebase.database();
} catch(e) {}

function getUser() {
  try { var v = localStorage.getItem("pp_user_obj"); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}

// ── TRIVIA STATE ──────────────────────────────────────────────────────────────
var TV = {
  view: "home",   // "home" | "q" | "result" | "done"
  qIdx: 0,
  chosen: null
};

// ── DATE HELPERS ──────────────────────────────────────────────────────────────
function getEasternNow() {
  var now = new Date();
  var jan = new Date(now.getFullYear(),0,1);
  var jul = new Date(now.getFullYear(),6,1);
  var isDST = now.getTimezoneOffset() < Math.max(jan.getTimezoneOffset(), jul.getTimezoneOffset());
  var utc = now.getTime() + now.getTimezoneOffset()*60000;
  return new Date(utc + (isDST ? -4 : -5)*3600000);
}

function getDateKey() {
  var e = getEasternNow();
  return e.getFullYear()+"_"+(e.getMonth()+1)+"_"+e.getDate();
}

// =============================================================
// QUESTION BANK — edit this section to add/update questions
// • Each DAY block = 10 questions shown on that day
// • Days cycle: Day 1 repeats after Day 365
// • Fields: q=question, c=[4 choices], a=correct index (0-3),
//           d=difficulty (Easy/Medium/Hard/Expert), f=fun fact
// • To add a new day: copy a DAY block, paste below the last one
// • To remove a day: delete the entire DAY block including commas
// =============================================================

// ── QUESTION LOADER ──────────────────────────────────────────────────────────
function getTodaysQ() {
  try {
    if (!QUESTION_BANK || !QUESTION_BANK.length) return null;
    var now   = new Date();
    var jan   = new Date(now.getFullYear(),0,1);
    var jul   = new Date(now.getFullYear(),6,1);
    var isDST = now.getTimezoneOffset() < Math.max(jan.getTimezoneOffset(), jul.getTimezoneOffset());
    var utc   = now.getTime() + now.getTimezoneOffset()*60000;
    var et    = new Date(utc + (isDST ? -4 : -5)*3600000);
    var launch    = Date.UTC(2026,2,8);
    var eMidnight = Date.UTC(et.getFullYear(), et.getMonth(), et.getDate());
    var diff  = Math.floor((eMidnight - launch) / 86400000);
    var idx   = ((diff % QUESTION_BANK.length) + QUESTION_BANK.length) % QUESTION_BANK.length;
    var questions = QUESTION_BANK[idx];
    // Skip empty placeholder days — find next populated day
    var attempts = 0;
    while ((!questions || !questions.length || !questions[0].q || questions[0].q.indexOf("ADD 10 QUESTIONS") !== -1) && attempts < QUESTION_BANK.length) {
      idx = (idx + 1) % QUESTION_BANK.length;
      questions = QUESTION_BANK[idx];
      attempts++;
    }
    if (!questions || !questions.length) return null;
    return questions;
  } catch(e) { return null; }
}

// ── SESSION SCORE ─────────────────────────────────────────────────────────────
function getScore()   { try { return parseInt(sessionStorage.getItem("tScore")||"0"); }  catch(e){ return 0; } }
function setScore(n)  { try { sessionStorage.setItem("tScore",  String(n)); } catch(e){} }
function getPoints()  { try { return parseInt(sessionStorage.getItem("tPoints")||"0"); } catch(e){ return 0; } }
function setPoints(n) { try { sessionStorage.setItem("tPoints", String(n)); } catch(e){} }
function getResults() { try { var v=sessionStorage.getItem("tResults"); return v?JSON.parse(v):[]; } catch(e){ return []; } }
function setResults(r){ try { sessionStorage.setItem("tResults", JSON.stringify(r)); } catch(e){} }

// ── HELPERS ───────────────────────────────────────────────────────────────────
function x(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function pts(d) {
  return d==="Easy"?100:d==="Medium"?200:d==="Hard"?300:d==="Expert"?400:100;
}

function diffStyle(d) {
  if(d==="Easy")   return "background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7";
  if(d==="Medium") return "background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.3);color:#fbbf24";
  if(d==="Hard")   return "background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);color:#fca5a5";
  return "background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.4);color:#c4b5fd";
}

function diffEmoji(q, correct) {
  if(!correct) return "⬛";
  if(!q) return "🟩";
  return q.d==="Easy"?"🟩":q.d==="Medium"?"🟨":q.d==="Hard"?"🟥":"🟪";
}

function render(html) {
  document.getElementById("root").innerHTML = html;
}

function goBack() {
  // Return to index.html — go back in history or fallback to root
  if (document.referrer && document.referrer.includes(location.hostname)) {
    history.back();
  } else {
    window.location.href = "/";
  }
}

function topbar(showBack) {
  var h = '<div class="topbar">';
  if (showBack) {
    h += '<button class="btn btn-ghost" id="tv-topback">&#8592;</button>';
  } else {
    h += '<button class="btn btn-ghost" id="tv-topback">&#8592;</button>';
  }
  h += '<div class="logo">PoolPlay</div>';
  h += '<div style="width:60px"></div>';
  h += '</div>';
  return h;
}

function bindTopbar() {
  var btn = document.getElementById("tv-topback");
  if (btn) btn.onclick = function() {
    if (TV.view === "q" || TV.view === "result") {
      // mid-quiz — go to home screen not back to app
      TV.view = "home"; draw();
    } else {
      goBack();
    }
  };
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  if      (TV.view === "q")      drawQuestion();
  else if (TV.view === "result") drawResult();
  else if (TV.view === "done")   drawDone();
  else                           drawHome();
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function drawHome() {
  setScore(0); setPoints(0); setResults([]);

  var et  = getEasternNow();
  var ds  = et.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  var tKey = "pp_trivia_" + getDateKey();
  var todayData = null;
  try { var tv = localStorage.getItem(tKey); if(tv) todayData = JSON.parse(tv); } catch(e) {}

  // Check Firebase for reset flag
  var user = getUser();
  var username = (user && user.username && !user.guest)
    ? user.username.toLowerCase().replace(/[^a-z0-9_]/g,"") : "";

  function renderHome() {
    var Q = getTodaysQ() || [];
    var o = topbar(false);
    o += '<div class="main">';
    o += '<div class="tv-hero">';
    o += '<div class="tv-hero-eyebrow">Daily Sports Trivia</div>';
    o += '<div class="tv-hero-title">TRIVIA</div>';
    o += '<div class="tv-hero-date">'+ds+'</div>';

    var _homeshareMsg = "";
    if (todayData && todayData.r && todayData.r.length === 10) {
      var todayScore = todayData.r.filter(function(v){return v;}).length;
      var row1="", row2="";
      for(var i=0;i<5;i++)  row1 += diffEmoji(Q[i], todayData.r[i]);
      for(var i=5;i<10;i++) row2 += diffEmoji(Q[i], todayData.r[i]);
      o += '<div class="tv-res-score" style="font-size:40px;margin:8px 0">'+todayScore+'/10</div>';
      o += '<div style="font-size:13px;font-weight:700;color:#fbbf24;letter-spacing:.05em;margin-bottom:4px">'+(todayData.pts||0)+' pts</div>';
      o += '<div style="font-size:18px;letter-spacing:3px;margin-bottom:8px">'+row1+'</div>';
      o += '<div style="font-size:18px;letter-spacing:3px;margin-bottom:16px">'+row2+'</div>';
      o += '<div style="font-size:12px;color:#475569;margin-top:8px;letter-spacing:.05em">Come back tomorrow for a new quiz</div>';
      o += buildCalendarHTML();
      _homeshareMsg = "PoolPlay Trivia \uD83C\uDFC6\n"+ds+"\n"+todayScore+"/10\n\n"+row1+"\n"+row2+"\n\nhttps://pool-play.vercel.app/";
      o += '<button class="tv-btn-share" id="tv-home-share" style="margin-top:14px;width:100%">Share Today\'s Results</button>';
    } else {
      o += '<button class="tv-hero-btn" id="tv-start">Start Quiz</button>';
    }
    o += '</div>';
    o += '<div class="tv-diff-row">';
    o += '<div class="pill" style="color:#6ee7b7;border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07)">Easy</div>';
    o += '<div class="pill" style="color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)">Medium</div>';
    o += '<div class="pill" style="color:#fca5a5;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)">Hard</div>';
    o += '<div class="pill" style="color:#c4b5fd;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.08)">Expert</div>';
    o += '</div>';
    o += '<p style="font-size:11px;color:#334155;text-align:center">10 questions &middot; escalating difficulty &middot; NFL &middot; NBA &middot; MLB &middot; NHL</p>';
    o += '</div>';
    render(o);
    bindTopbar();
    var btn = document.getElementById("tv-start");
    if (btn) btn.onclick = function(){ TV.view="q"; TV.qIdx=0; draw(); };
    var shareBtn = document.getElementById("tv-home-share");
    if (shareBtn) shareBtn.onclick = function(){ window.open("sms:?&body="+encodeURIComponent(_homeshareMsg),"_blank"); };
  }

  // Check Firebase reset flag before rendering
  if (username && DB) {
    var tKey2 = "pp_trivia_" + getDateKey();
    var done = false;
    var t = setTimeout(function(){ if(!done){ done=true; renderHome(); } }, 3000);
    DB.ref("triviaResets/"+username+"/"+tKey2).once("value", function(sn){
      clearTimeout(t);
      if (!done) {
        done = true;
        if (sn.val()) {
          try { localStorage.removeItem(tKey2); todayData = null; } catch(e){}
          DB.ref("triviaResets/"+username+"/"+tKey2).remove();
        }
        renderHome();
      }
    }, function(){ clearTimeout(t); if(!done){ done=true; renderHome(); } });
  } else {
    renderHome();
  }
}

// ── QUESTION ──────────────────────────────────────────────────────────────────
function drawQuestion() {
  var Q = getTodaysQ();
  if (!Q || !Q[TV.qIdx]) {
    render(topbar(true) + '<div class="main"><div class="tv-hero" style="margin-top:40px">'
      + '<div style="font-size:32px;margin-bottom:12px">⚠️</div>'
      + '<div style="color:#fca5a5;font-size:15px;margin-bottom:8px">Questions failed to load.</div>'
      + '<div style="font-size:12px;color:#475569;margin-bottom:20px">Please refresh and try again.</div>'
      + '<button class="tv-hero-btn" id="tv-err-back">Back</button>'
      + '</div></div>');
    bindTopbar();
    document.getElementById("tv-err-back").onclick = function(){ TV.view="home"; draw(); };
    return;
  }

  var q = Q[TV.qIdx];
  var o = topbar(true);
  o += '<div class="main">';
  o += '<div class="tv-prog-hdr"><span class="tv-prog-lbl">Question '+(TV.qIdx+1)+' of '+Q.length+'</span><span class="tv-prog-pts">'+getPoints()+' pts</span></div>';
  o += '<div class="tv-pbar"><div class="tv-pfill" style="width:'+Math.round(TV.qIdx/Q.length*100)+'%"></div></div>';
  o += '<div class="tv-diff-badge" style="'+diffStyle(q.d)+'">'+q.d+' &middot; '+pts(q.d)+' pts</div>';
  o += '<div class="tv-card">';
  o += '<div class="tv-qtext">'+q.q+'</div>';
  for(var i=0;i<4;i++) o += '<button class="tv-choice" id="tv-c'+i+'">'+q.c[i]+'</button>';
  o += '</div></div>';
  render(o);
  bindTopbar();

  for(var i=0;i<4;i++) {
    (function(chosen){
      var btn = document.getElementById("tv-c"+chosen);
      if(btn) btn.onclick = function(){
        var correct = (chosen === q.a);
        setScore(getScore() + (correct?1:0));
        setPoints(getPoints() + (correct?pts(q.d):0));
        var r = getResults(); r.push(correct); setResults(r);
        TV.view="result"; TV.chosen=chosen; draw();
      };
    })(i);
  }
}

// ── RESULT ────────────────────────────────────────────────────────────────────
function drawResult() {
  var Q = getTodaysQ();
  if (!Q || !Q[TV.qIdx]) { TV.view="home"; draw(); return; }
  var q = Q[TV.qIdx];
  var correct = (TV.chosen === q.a);
  var next = TV.qIdx + 1;

  var o = topbar(false);
  o += '<div class="main">';
  o += '<div class="tv-prog-hdr"><span class="tv-prog-lbl">Question '+(TV.qIdx+1)+' of '+Q.length+'</span><span class="tv-prog-pts">'+getPoints()+' pts</span></div>';
  o += '<div class="tv-pbar"><div class="tv-pfill" style="width:'+Math.round(next/Q.length*100)+'%"></div></div>';
  o += '<div class="tv-diff-badge" style="'+diffStyle(q.d)+'">'+q.d+' &middot; '+(correct?"+"+pts(q.d)+" pts":"0 pts")+'</div>';
  o += '<div class="tv-card">';
  o += '<div class="tv-qtext">'+q.q+'</div>';
  o += '<div class="tv-fb-card '+(correct?"tv-fb-ok":"tv-fb-no")+'">';
  o += (correct?"✅ Correct!":"❌ Wrong — "+q.c[q.a]);
  o += '<div class="tv-fb-fact">'+q.f+'</div></div>';
  o += '<button class="tv-btn-next" id="tv-next">'+(next<Q.length?"Next &#8594;":"See Results")+'</button>';
  o += '</div></div>';
  render(o);
  bindTopbar();
  document.getElementById("tv-next").onclick = function(){
    if(next < Q.length){ TV.view="q"; TV.qIdx=next; draw(); }
    else { TV.view="done"; draw(); }
  };
}

// ── DONE ──────────────────────────────────────────────────────────────────────
function drawDone() {
  var score   = getScore();
  var results = getResults();
  var totalPts = getPoints();
  var user     = getUser();
  var username = (user && user.username) ? user.username : "Player";
  var emoji    = (user && user.emoji)    ? user.emoji    : "🎯";

  // Save to localStorage so index.html can read it
  try {
    var tKey = "pp_trivia_" + getDateKey();
    localStorage.setItem(tKey, JSON.stringify({s:score, r:results, u:username, ts:Date.now(), pts:totalPts}));
  } catch(e) {}

  var Q = getTodaysQ() || [];
  var row1="", row2="";
  for(var i=0;i<5;i++)  row1 += diffEmoji(Q[i], results[i]);
  for(var i=5;i<10;i++) row2 += diffEmoji(Q[i], results[i]);

  var ds = getEasternNow().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  var shareMsg = "PoolPlay Trivia 🏆\n"+ds+"\n"+score+"/10\n\n"+row1+"\n"+row2+"\n\nhttps://pool-play.vercel.app/";

  var o = topbar(false);
  o += '<div class="main">';
  o += '<div class="tv-res-card">';
  o += '<div class="tv-res-avatar">'+x(emoji)+'</div>';
  o += '<div class="tv-res-name">'+x(username)+'</div>';
  o += '<div class="tv-res-date">'+ds+'</div>';
  o += '<div class="tv-res-score">'+score+'/10</div>';
  o += '<div style="font-size:13px;font-weight:700;color:#fbbf24;letter-spacing:.05em;margin-bottom:4px">'+totalPts+' pts</div>';
  o += '<div class="tv-res-grid">'+row1+'</div>';
  o += '<div class="tv-res-grid">'+row2+'</div>';
  o += buildCalendarHTML();
  o += '<button class="tv-btn-share" id="tv-share">Share Results</button>';
  o += '<button class="tv-btn-hub" id="tv-back">Back to PoolPlay</button>';
  o += '</div></div>';
  render(o);
  bindTopbar();
  document.getElementById("tv-share").onclick = function(){

function buildCalendarHTML() {
  var now = getEasternNow();
  var tKey = "pp_trivia_" + getDateKey();
  var scoreMap = {};

  // Scan localStorage for all trivia scores this month
  try {
    for(var ki=0; ki<localStorage.length; ki++){
      var k = localStorage.key(ki);
      if(k && k.indexOf("pp_trivia_") === 0){
        var kv = JSON.parse(localStorage.getItem(k));
        if(kv && kv.r){
          var parts = k.replace("pp_trivia_","").split("_");
          var yr = parseInt(parts[0]), mo = parseInt(parts[1]), dy = parseInt(parts[2]);
          if(yr === now.getFullYear() && mo === now.getMonth()+1){
            scoreMap[dy] = kv.r.filter(function(v){return v;}).length;
          }
        }
      }
    }
  } catch(e){}

  var year = now.getFullYear(), month = now.getMonth();
  var monthName = now.toLocaleDateString("en-US",{month:"long"});
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var firstDow = new Date(year, month, 1).getDay();
  var todayDate = now.getDate();

  var ch = '<div style="margin-top:16px;text-align:left">';
  ch += '<div style="font-size:9px;font-weight:700;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">' + monthName + ' ' + year + '</div>';
  ch += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">';
  ["S","M","T","W","T","F","S"].forEach(function(d){
    ch += '<div style="text-align:center;font-size:7px;color:#334155;font-weight:700;padding:1px 0">' + d + '</div>';
  });
  ch += '</div>';
  ch += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  for(var bi=0; bi<firstDow; bi++) ch += '<div></div>';
  for(var di=1; di<=daysInMonth; di++){
    var ds2 = scoreMap[di];
    var isToday = di === todayDate;
    var isFuture = di > todayDate;
    var cs, ns, ss;
    if(ds2 !== undefined){
      if(ds2 >= 8)      { cs="background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.4)";  ns="color:#6ee7b7"; ss="color:#6ee7b7"; }
      else if(ds2 >= 5) { cs="background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3)";  ns="color:#fbbf24"; ss="color:#fbbf24"; }
      else              { cs="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25)";    ns="color:#fca5a5"; ss="color:#fca5a5"; }
    } else if(isToday) {
      cs="background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.5)"; ns="color:#a5b4fc"; ss="";
    } else if(isFuture){
      cs="background:transparent;border:1px solid #0f1923"; ns="color:#1e2a3a"; ss="";
    } else {
      cs="background:#07090f;border:1px solid #0f1923"; ns="color:#334155"; ss="";
    }
    ch += '<div style="' + cs + ';border-radius:5px;padding:3px 1px;text-align:center;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">';
    ch += '<div style="font-size:8px;font-weight:700;' + ns + '">' + di + '</div>';
    if(ds2 !== undefined) ch += '<div style="font-size:7px;font-weight:700;' + ss + '">' + ds2 + '/10</div>';
    ch += '</div>';
  }
  ch += '</div></div>';
  return ch;
}
