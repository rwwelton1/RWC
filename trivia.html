<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#475569;font-size:14px">Loading...</div></div>
<script>
var ROOT = document.getElementById("root");

var Q = [
{q:“How many points is a touchdown worth in the NFL?”, c:[“3”,“6”,“7”,“2”], a:1}
];

function showHome() {
ROOT.innerHTML = ‘<h1 style="color:#fff;padding:40px">Trivia Home</h1><button id="bst" style="margin:20px;padding:14px 32px;background:#6366f1;color:#fff;border-radius:12px;font-size:15px;font-weight:700">Start Quiz</button>’;
document.getElementById(“bst”).onclick = startQuiz;
}

function startQuiz() {
var q = Q[0];
var html = ‘<div style="padding:20px"><h2 style="color:#f1f5f9;margin-bottom:20px">’+q.q+’</h2>’;
for (var i = 0; i < q.c.length; i++) {
html += ‘<button id="ch'+i+'" style="display:block;width:100%;margin-bottom:10px;padding:12px;background:#0d1117;border:1px solid #1a2535;border-radius:10px;color:#94a3b8;text-align:left;font-size:13px">’+q.c[i]+’</button>’;
}
html += ‘</div>’;
ROOT.innerHTML = html;
for (var j = 0; j < q.c.length; j++) {
(function(idx) {
document.getElementById(“ch”+idx).onclick = function() {
alert(idx === q.a ? “Correct!” : “Wrong! Answer: “ + q.c[q.a]);
};
})(j);
}
}

showHome();
</script>

</body>
</html>
