<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay Trivia</title>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:-apple-system,sans-serif;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
a{text-decoration:none;color:inherit}
.topbar{background:#0d1117;border-bottom:1px solid #1e2a3a;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.logo{font-size:17px;font-weight:900;color:#fff}.logo b{color:#fbbf24}
.sub{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.back{border:1px solid #2d3f52;border-radius:6px;color:#64748b;padding:6px 12px;font-size:11px;font-weight:600}
.wrap{max-width:500px;margin:0 auto;padding:20px 16px 60px}
.hero{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(168,85,247,.07));border:1px solid rgba(99,102,241,.28);border-radius:16px;padding:28px 20px 24px;text-align:center;margin-bottom:16px}
.hero-tag{font-size:9px;color:#818cf8;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.hero-title{font-size:40px;font-weight:900;color:#fff;margin-bottom:4px}
.hero-date{font-size:12px;color:#475569;margin-bottom:20px}
.start-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:700;padding:14px 48px;border-radius:12px}
.done-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:16px}
.done-label{font-size:11px;font-weight:700;color:#6ee7b7;margin-bottom:8px}
.done-bugs{font-size:22px;letter-spacing:3px;margin-bottom:6px;line-height:1.6}
.done-score{font-size:12px;color:#64748b;margin-bottom:12px}
.text-btn{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;font-size:12px;font-weight:700;padding:9px 24px;border-radius:8px}
.diff-row{display:flex;gap:6px;margin-bottom:14px;justify-content:center}
.pill{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid}
.prog-hdr{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-lbl{font-size:10px;color:#475569}
.prog-pts{font-size:11px;font-weight:700;color:#a5b4fc}
.pbar{height:4px;background:#0f1923;border-radius:2px;margin-bottom:14px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.dots{display:flex;gap:4px;justify-content:center;margin-bottom:18px}
.dot{width:11px;height:11px;border-radius:50%;background:#1a2535}
.badge{display:inline-flex;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid;margin-bottom:10px}
.qcard{background:#0d1117;border:1px solid #1a2535;border-radius:14px;padding:18px;margin-bottom:14px}
.qtext{font-size:16px;font-weight:700;color:#f1f5f9;line-height:1.45}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.choice{border:1px solid #1a2535;border-radius:10px;padding:12px 15px;font-size:13px;font-weight:500;color:#94a3b8;display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#0d1117}
.choice.correct{border-color:rgba(16,185,129,.6);background:rgba(16,185,129,.07);color:#6ee7b7}
.choice.wrong{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.05);color:#fca5a5}
.choice.dim{opacity:.2}
.cltr{width:22px;height:22px;flex-shrink:0;border-radius:5px;background:#07090f;border:1px solid #1a2535;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#334155}
.fb{border-radius:10px;padding:11px 13px;font-size:12px;font-weight:600;display:flex;align-items:flex-start;gap:9px;margin-bottom:12px;line-height:1.4}
.fb.ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
.fb.no{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.18);color:#fca5a5}
.fb-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.fb-fact{font-size:10px;color:#475569;font-weight:400;margin-top:3px;line-height:1.5}
.nxt{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.res-wrap{text-align:center;padding:8px 0 20px}
.res-trophy{font-size:64px;display:block;margin-bottom:10px}
.res-score{font-size:64px;font-weight:900;color:#fff;line-height:1;margin-bottom:2px}
.res-sub{font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.res-msg{font-size:13px;color:#64748b;margin-bottom:20px}
.scard{background:#0d1117;border:1px solid rgba(99,102,241,.22);border-radius:14px;padding:18px;margin-bottom:10px}
.scard-ttl{font-size:9px;color:#6366f1;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-weight:700}
.scard-bugs{font-size:22px;letter-spacing:3px;margin-bottom:6px;line-height:1.6}
.scard-sc{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:14px}
.scard-btns{display:flex;gap:8px}
.sms-btn{flex:1;padding:12px;border-radius:9px;font-size:13px;font-weight:700;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.copy-btn{flex:1;padding:12px;border-radius:9px;font-size:13px;font-weight:700;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.bkdn{background:#0d1117;border:1px solid #1a2535;border-radius:12px;overflow:hidden;margin-bottom:10px}
.brow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #07090f}
.brow:last-child{border-bottom:none}
.bnum{font-size:9px;color:#334155;font-weight:700;width:16px;flex-shrink:0;text-align:center}
.bq{font-size:11px;color:#64748b;flex:1;line-height:1.3}
.bic{font-size:14px;flex-shrink:0}
.home-btn{width:100%;padding:12px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid #1e2a3a;color:#475569;margin-top:6px}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#475569;font-size:14px">Loading...</div></div>
<script>
var Q=[
  {q:"How many points is a touchdown worth in the NFL?",c:["3","6","7","2"],a:1,d:"Easy",f:"A touchdown is worth 6 points. The extra point or 2-point conversion comes after."},
  {q:"Which NBA team has won the most championships?",c:["Lakers","Bulls","Celtics","Warriors"],a:2,d:"Easy",f:"The Boston Celtics have won 17 NBA championships, the most in league history."},
  {q:"How many strikes does it take to strike out in baseball?",c:["2","3","4","1"],a:1,d:"Easy",f:"Three strikes and you are out."},
  {q:"Which country has won the most FIFA World Cups?",c:["Germany","Argentina","Italy","Brazil"],a:3,d:"Medium",f:"Brazil has won 5 World Cups: 1958, 1962, 1970, 1994, and 2002."},
  {q:"How long is a marathon in miles?",c:["24.2","25.5","26.2","27.1"],a:2,d:"Medium",f:"A marathon is exactly 26.2 miles, set at the 1908 London Olympics."},
  {q:"What year did Michael Jordan win his first NBA championship?",c:["1989","1990","1991","1992"],a:2,d:"Medium",f:"Jordan won his first ring in 1991 with the Chicago Bulls."},
  {q:"Which NFL QB has thrown the most career touchdown passes?",c:["Peyton Manning","Tom Brady","Brett Favre","Drew Brees"],a:1,d:"Hard",f:"Tom Brady retired with 649 career TD passes, the all-time record."},
  {q:"Who holds the NHL record for most career goals?",c:["Mario Lemieux","Gordie Howe","Jaromir Jagr","Wayne Gretzky"],a:3,d:"Hard",f:"Wayne Gretzky scored 894 career goals."},
  {q:"What year did Tiger Woods win his first Masters?",c:["1995","1996","1997","1998"],a:2,d:"Hard",f:"Tiger Woods won the 1997 Masters at age 21 by a record 12 strokes."},
  {q:"Most points scored by one player in a single NBA game?",c:["81","92","100","63"],a:2,d:"Expert",f:"Wilt Chamberlain scored 100 points on March 2, 1962."}
];
var S={cur:0,answered:false,score:0,history:[],qs:[]};
var ROOT=document.getElementById("root");

function R(h){ROOT.innerHTML=h;}
function ge(id){return document.getElementById(id);}
function skey(){var d=new Date();return ‚Äúpp_trivia_‚Äù+d.getFullYear()+‚Äù*‚Äù+(d.getMonth()+1)+‚Äù*‚Äù+d.getDate();}
function load(){try{var v=localStorage.getItem(skey());return v?JSON.parse(v):null;}catch(e){return null;}}
function save(r){try{localStorage.setItem(skey(),JSON.stringify({r:r}));}catch(e){}}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i‚Äì){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function bugs(r){var s=‚Äù‚Äù;for(var i=0;i<r.length;i++)s+=r[i]?‚Äù\u2705‚Äù:‚Äù\u274C‚Äù;return s;}
function msg(n){if(n>=9)return‚ÄùLegendary‚Äù;if(n>=7)return‚ÄùGreat game‚Äù;if(n>=5)return‚ÄùNot bad‚Äù;if(n>=3)return‚ÄùKeep practicing‚Äù;return‚ÄùRough one‚Äù;}
function troph(n){if(n>=9)return‚Äù\uD83C\uDFC6‚Äù;if(n>=7)return‚Äù\uD83E\uDD47‚Äù;if(n>=5)return‚Äù\uD83E\uDD48‚Äù;return‚Äù\uD83E\uDD49‚Äù;}
function shareT(r){var c=r.filter(function(v){return v;}).length,d=new Date(),ds=d.toLocaleDateString(‚Äúen-US‚Äù,{month:‚Äúshort‚Äù,day:‚Äúnumeric‚Äù});return ‚ÄúPoolPlay Trivia (‚Äù+ds+‚Äù)\n‚Äù+bugs(r)+‚Äù ‚Äú+c+‚Äù/10\npool-play.vercel.app/trivia.html‚Äù;}
function doSMS(r){window.open(‚Äúsms:?&body=‚Äù+encodeURIComponent(shareT(r)),‚Äù_blank‚Äù);}
function doCopy(r,id){var btn=ge(id),t=shareT(r);if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){if(btn){var o=btn.textContent;btn.textContent=‚ÄúCopied!‚Äù;setTimeout(function(){btn.textContent=o;},2000);}});}else{prompt(‚ÄúCopy:‚Äù,t);}}
function dstyle(d){if(d===‚ÄúEasy‚Äù)return‚Äùbackground:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7‚Äù;if(d===‚ÄúMedium‚Äù)return‚Äùbackground:rgba(251,191,36,.07);border-color:rgba(251,191,36,.3);color:#fbbf24‚Äù;if(d===‚ÄúHard‚Äù)return‚Äùbackground:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);color:#fca5a5‚Äù;return‚Äùbackground:rgba(168,85,247,.1);border-color:rgba(168,85,247,.4);color:#c4b5fd‚Äù;}
function bar(back){var b=‚Äô<div class="topbar"><div><div class="logo">POOL<b>PLAY</b></div><div class="sub">Daily Trivia</div></div>‚Äô;b+=back?‚Äô<button class="back" id="bback">\u2190 Home</button>‚Äô:‚Äô<a href="index.html" class="back">\u2190 Profile</a>‚Äô;return b+‚Äù</div>‚Äù;}

function showHome(){
var sv=load();
var d=new Date(),ds=d.toLocaleDateString(‚Äúen-US‚Äù,{weekday:‚Äúlong‚Äù,month:‚Äúlong‚Äù,day:‚Äúnumeric‚Äù});
var o=bar(false)+‚Äô<div class="wrap"><div class="hero"><div class="hero-tag">Daily Sports Trivia</div><div class="hero-title">TRIVIA</div><div class="hero-date">‚Äô+ds+‚Äù</div>‚Äù;
if(sv){var c=sv.r.filter(function(v){return v;}).length;o+=‚Äô<div class="done-box"><div class="done-label">\u2705 Completed today</div><div class="done-bugs">‚Äô+bugs(sv.r)+‚Äô</div><div class="done-score">‚Äô+c+‚Äô/10 \u2014 ‚Äò+msg(c)+‚Äô</div><button class="text-btn" id="bsh">\uD83D\uDCF1 Text a Friend</button></div>‚Äô;}
else{o+=‚Äô<button class="start-btn" id="bst">Start Quiz</button>‚Äô;}
o+=‚Äô</div><div class="diff-row"><div class="pill" style="color:#6ee7b7;border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07)">Easy</div><div class="pill" style="color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)">Medium</div><div class="pill" style="color:#fca5a5;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)">Hard</div><div class="pill" style="color:#c4b5fd;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.08)">Expert</div></div>‚Äô;
o+=‚Äô<div style="font-size:11px;color:#334155;text-align:center">10 questions \u00b7 escalating difficulty \u00b7 NFL \u00b7 NBA \u00b7 MLB \u00b7 NHL</div></div>‚Äô;
R(o);
var bst=ge(‚Äúbst‚Äù);if(bst)bst.onclick=startQuiz;
var bsh=ge(‚Äúbsh‚Äù);if(bsh)bsh.onclick=function(){doSMS(sv.r);};
}

function startQuiz(){
S.qs=Q.map(function(q){var c=q.c.slice(),a=c[q.a];c=shuffle(c);return{q:q.q,c:c,a:c.indexOf(a),d:q.d,f:q.f};});
S.cur=0;S.answered=false;S.score=0;S.history=[];
showQ();
}

function showQ(){
var q=S.qs[S.cur],tot=S.qs.length,L=[‚ÄúA‚Äù,‚ÄúB‚Äù,‚ÄúC‚Äù,‚ÄúD‚Äù];
var o=bar(true)+‚Äô<div class="wrap"><div class="prog-hdr"><span class="prog-lbl">Q‚Äô+(S.cur+1)+‚Äù of ‚Äú+tot+‚Äô</span><span class="prog-pts">‚Äô+S.score+‚Äô pts</span></div><div class="pbar"><div class="pfill" style="width:'+Math.round(S.cur/tot*100)+'%"></div></div><div class="dots">‚Äô;
for(var i=0;i<tot;i++){var bg=i<S.history.length?(S.history[i].c?‚Äù#10b981‚Äù:‚Äù#ef4444‚Äù):‚Äù#1a2535‚Äù;o+=‚Äô<div class="dot" style="background:'+bg+'"></div>‚Äô;}
o+=‚Äô</div><div class="badge" style="'+dstyle(q.d)+'">‚Äô+q.d+‚Äô</div><div class="qcard"><div class="qtext">‚Äô+q.q+‚Äô</div></div><div class="choices">‚Äô;
for(var ci=0;ci<q.c.length;ci++){var cls=‚Äúchoice‚Äù;if(S.answered){if(ci===q.a)cls+=‚Äù correct‚Äù;else if(S.history.length&&S.history[S.history.length-1].chosen===ci)cls+=‚Äù wrong‚Äù;else cls+=‚Äù dim‚Äù;}o+=‚Äô<button class="'+cls+'" id="ch'+ci+'"><div class="cltr">‚Äô+L[ci]+‚Äù</div>‚Äù+q.c[ci]+‚Äù</button>‚Äù;}
o+=‚Äô</div>‚Äô;
if(S.answered){var last=S.history[S.history.length-1];o+=‚Äô<div class=‚Äúfb ‚Äò+(last.c?‚Äúok‚Äù:‚Äúno‚Äù)+‚Äô‚Äù><div class="fb-icon">‚Äô+(last.c?‚Äù\u2705‚Äù:‚Äù\u274C‚Äù)+‚Äô</div><div><strong>‚Äô+(last.c?‚ÄúCorrect!‚Äù:‚ÄúWrong \u2014 ‚Äú+q.c[q.a])+‚Äô</strong><div class="fb-fact">‚Äô+q.f+‚Äù</div></div></div>‚Äù;}
o+=‚Äô<button id=‚Äúbnxt‚Äù class=‚Äúnxt‚Äù style=‚Äù‚Äô+(S.answered?‚Äù‚Äù:‚Äúdisplay:none‚Äù)+‚Äô‚Äù>‚Äô+(S.cur===tot-1?‚ÄúSee Results‚Äù:‚ÄúNext \u2192‚Äù)+‚Äù</button></div>‚Äù;
R(o);
ge(‚Äúbback‚Äù).onclick=showHome;
if(!S.answered){
for(var bi=0;bi<q.c.length;bi++){(function(idx){var btn=ge(‚Äúch‚Äù+idx);if(btn)btn.onclick=function(){if(S.answered)return;var ok=(idx===S.qs[S.cur].a);if(ok)S.score+=10;S.history.push({c:ok,chosen:idx});S.answered=true;showQ();};})(bi);}
}
var bnxt=ge(‚Äúbnxt‚Äù);
if(bnxt)bnxt.onclick=function(){if(S.cur<S.qs.length-1){S.cur++;S.answered=false;showQ();}else{save(S.history.map(function(h){return h.c;}));showResults();}};
}

function showResults(){
var r=S.history.map(function(h){return h.c;}),c=r.filter(function(v){return v;}).length;
var o=bar(false)+‚Äô<div class="wrap"><div class="res-wrap"><span class="res-trophy">‚Äô+troph(c)+‚Äô</span><div class="res-score">‚Äô+c+‚Äô/10</div><div class="res-sub">Daily Trivia</div><div class="res-msg">‚Äô+msg(c)+‚Äô</div></div>‚Äô;
o+=‚Äô<div class="scard"><div class="scard-ttl">Share Your Score</div><div class="scard-bugs">‚Äô+bugs(r)+‚Äô</div><div class="scard-sc">‚Äô+c+‚Äô/10 correct</div><div class="scard-btns"><button class="sms-btn" id="bsms">\uD83D\uDCF1 Text a Friend</button><button class="copy-btn" id="bcpy">Copy</button></div></div>‚Äô;
o+=‚Äô<div class="bkdn">‚Äô;
for(var i=0;i<S.qs.length;i++){var ok=S.history[i]&&S.history[i].c;o+=‚Äô<div class="brow"><div class="bnum">‚Äô+(i+1)+‚Äô</div><div class="bq">‚Äô+S.qs[i].q+‚Äô</div><div class="bic">‚Äô+(ok?‚Äù\u2705‚Äù:‚Äù\u274C‚Äù)+‚Äù</div></div>‚Äù;}
o+=‚Äô</div><button class="home-btn" id="bhome">Back to Home</button></div>‚Äô;
R(o);
ge(‚Äúbsms‚Äù).onclick=function(){doSMS(r);};
ge(‚Äúbcpy‚Äù).onclick=function(){doCopy(r,‚Äúbcpy‚Äù);};
ge(‚Äúbhome‚Äù).onclick=showHome;
}

showHome();
</script>

</body>
</html>
