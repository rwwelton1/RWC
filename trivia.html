<!DOCTYPE html>

<html>
<head>

<title>PoolPlay Trivia</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh}

.sub{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.back{border:1px solid #2d3f52;border-radius:6px;color:#64748b;padding:7px 14px;font-size:11px;font-weight:600}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 57px);padding:20px;text-align:center}
.icon{font-size:64px;margin-bottom:20px}
.title{font-size:24px;font-weight:900;color:#fff;margin-bottom:8px}
.msg{font-size:14px;color:#475569}

</head>
<body>
<div class="bar">
