<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – CFB Dynasty</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#fff;--card2:#fdf8ee;--border:#111;--border2:#ddd;
  --text:#111;--muted:#777;--dim:#aaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#c0392b;--red2:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none}

.topbar{background:#fff;border-bottom:3px solid var(--border);padding:13px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-center{flex:1;min-width:0;overflow:hidden;text-align:center}
.app-name{font-size:15px;font-weight:900;white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:9px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.05em;margin-top:5px;display:block}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;box-shadow:2px 2px 0 var(--border)}
.top-actions{display:flex;align-items:center;gap:4px}
.top-btn{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;background:#fff;border:2px solid var(--border);border-radius:8px;box-shadow:2px 2px 0 var(--border);cursor:pointer;padding:0;line-height:1}
/* ── Top-bar menu ──────────────────────────────────────
   Five icons plus a tag doesn't fit a phone. One button, one sheet, with LABELS — so you don't
   have to remember what 👔 versus 🌳 versus 🏆 meant. */
.menu-wrap{position:relative}
.menu-dot{position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:var(--red2);border:1.5px solid #fff}
.menu-sheet{position:absolute;top:34px;right:0;z-index:60;min-width:196px;background:#fff;border:2.5px solid var(--border);
  border-radius:12px;box-shadow:4px 5px 0 var(--border);overflow:hidden}
.menu-item{display:flex;align-items:center;gap:9px;width:100%;padding:10px 12px;background:#fff;border:none;
  border-bottom:1.5px solid var(--border2);font-size:12px;font-weight:800;color:var(--text);text-align:left;cursor:pointer}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:var(--gold-bg)}
.menu-item.on{background:var(--gold-bg);color:var(--gold-dark)}
.menu-item .mi-ico{font-size:15px;width:20px;text-align:center;flex:none}
.menu-item .mi-badge{margin-left:auto;background:var(--red2);color:#fff;font-size:9px;font-weight:900;
  padding:2px 6px;border-radius:8px}
.menu-item.danger{color:var(--red2)}
.menu-scrim{position:fixed;inset:0;z-index:55}
.top-btn:active{transform:translate(2px,2px);box-shadow:none}
.top-btn.active{background:var(--gold);border-color:var(--gold-dark)}
.setup-row{display:flex;align-items:center;gap:11px;background:#fff;border:2px solid var(--border);border-radius:12px;box-shadow:2px 2px 0 var(--border);padding:11px 13px;margin-bottom:8px;cursor:pointer}
.setup-row:active{transform:translate(2px,2px);box-shadow:none}
.su-ico{font-size:19px;flex-shrink:0}
.su-main{flex:1;min-width:0}
.su-main b{font-size:13px;font-weight:900;display:block}
.su-sub{font-size:9.5px;font-weight:700;color:var(--muted);margin-top:2px;display:block;line-height:1.35}
.su-go{flex-shrink:0;font-size:22px;font-weight:900;color:var(--muted);line-height:1}
@media(max-width:360px){.top-actions .tag{display:none}}
.scorecery-logo{font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111;text-shadow:1px 1px 0 #111,2px 2px 0 #111,3px 3px 0 #c9082a,4px 4px 0 #17408b,5px 5px 0 #0d2a5c;paint-order:stroke fill}

.btn{border-radius:8px;padding:5px 12px;font-size:10px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#fff;color:var(--text)}
.btn-gold{background:var(--gold-bg);color:var(--gold-dark)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-red{background:var(--red-bg);color:var(--red2)}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#fff;border:2px solid var(--border);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.wrap{padding:14px}
.hero{background:#fff;border:2px solid var(--border);border-radius:14px;padding:16px;box-shadow:5px 5px 0 var(--border);margin-bottom:14px;text-align:center}
.hero h1{font-size:20px;font-weight:900;margin-bottom:4px}
.hero p{font-size:11px;font-weight:700;color:var(--muted);line-height:1.6}

.sec-title{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:0 2px 8px;display:flex;align-items:center;gap:8px}
.sec-title .pill{margin-left:auto;font-size:9px;background:#fff;border:2px solid var(--border);border-radius:20px;padding:2px 9px;box-shadow:1px 1px 0 var(--border);color:var(--text)}

/* setup: conference + team pick */
/* Tab strip scrolls horizontally. FCS has 14 conferences, so it overflows on a phone.
   No fade overlay or mask here on purpose: every attempt at one caused more trouble than
   the affordance was worth. Plain horizontal scroll, as in the original. */
.conf-tabs-wrap{position:relative;margin-bottom:6px}
.conf-tabs{display:flex;gap:5px;overflow-x:auto;padding:0 2px 8px 0;margin-bottom:0;-webkit-overflow-scrolling:touch}
.conf-tabs::-webkit-scrollbar{display:none}
.conf-tab{flex-shrink:0;padding:6px 12px;font-size:10px;font-weight:800;border:2px solid var(--border);background:#fff;color:var(--muted);border-radius:8px;box-shadow:2px 2px 0 var(--border);white-space:nowrap}
.conf-tab.active{background:var(--gold);color:var(--text)}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
/* min-width:0 on BOTH the grid cell and the flex child — without it a long name like
   "Mississippi Valley State" refuses to shrink and shoves the stars past the card edge. */
.team-btn{min-width:0;padding:10px;border-radius:10px;background:#fff;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);text-align:left;display:flex;justify-content:space-between;align-items:center;gap:5px;overflow:hidden}
.team-btn:active{transform:translate(2px,2px);box-shadow:none}
.team-btn.sel{background:var(--gold-bg);border-color:var(--gold-dark)}
.team-name{min-width:0;flex:1 1 auto;font-size:13px;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stars{font-size:9px;letter-spacing:-.5px;color:var(--gold-dark);font-weight:900;flex-shrink:0;white-space:nowrap}
/* Long FCS names need a little more room than a 13px face allows on a 2-up grid. */
.team-grid.dense .team-name{font-size:12px}
.team-grid.dense .stars{font-size:8.5px}
.role-row{display:flex;gap:8px;margin:10px 0}
.role-card{flex:1;padding:12px;border-radius:12px;background:#fff;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border);text-align:center}
.role-card.sel{background:var(--blue-bg);border-color:var(--blue)}
.role-card.disabled{opacity:.45}
.role-card h3{font-size:14px;font-weight:900}
.role-card p{font-size:9px;font-weight:700;color:var(--muted);margin-top:3px;line-height:1.4}
.arch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.arch-card{padding:10px 11px;border-radius:12px;background:#fff;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border);cursor:pointer;display:flex;flex-direction:column}
.arch-card.sel{background:var(--gold-bg);border-color:var(--gold-dark)}
.arch-card:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--border)}
.arch-top{display:flex;align-items:center;gap:7px}
.arch-icon{font-size:16px;flex-shrink:0}
.arch-name{font-size:13px;font-weight:900;line-height:1.15}
.arch-desc{font-size:9.5px;font-weight:700;color:var(--muted);margin-top:5px;line-height:1.4}
.arch-perks{display:flex;flex-direction:column;gap:2px;margin-top:7px}
.arch-perk{font-size:9px;font-weight:800;color:var(--green);line-height:1.3}

/* recruiting */
.budget-bar{background:#fff;border:2px solid var(--border);border-radius:12px;padding:10px 12px;box-shadow:3px 3px 0 var(--border);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.budget-bar .bnum{font-size:22px;font-weight:900}
.budget-bar .blbl{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.needs{margin-left:auto;font-size:9px;font-weight:800;color:var(--muted);text-align:right;line-height:1.5}
.recruit{background:#fff;border:2px solid var(--border);border-radius:11px;padding:10px 12px;box-shadow:3px 3px 0 var(--border);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.recruit.signed{background:var(--green-bg);border-color:var(--green)}
.recruit.tooexp{opacity:.5}
.rec-pos{width:34px;height:34px;border-radius:8px;background:var(--cream);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.rec-star-row{display:flex;align-items:center;gap:7px;margin:0 2px 10px}
.rec-star-lbl{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.rec-star-select{font-size:12px;font-weight:800;color:var(--ink,#111);background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:5px 8px;box-shadow:2px 2px 0 var(--border);cursor:pointer}
.rec-star-select:focus{outline:none;border-color:var(--gold-dark)}
.rec-sort-wrap{display:flex;align-items:center;gap:5px;margin-left:auto}
.rec-sort-btn{font-size:11px;font-weight:800;color:var(--muted);background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:4px 9px;box-shadow:2px 2px 0 var(--border);cursor:pointer}
.rec-sort-btn.on{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:2px 2px 0 var(--border)}
.rec-body{flex:1;min-width:0}
.rec-name{font-size:14px;font-weight:900}
.rec-meta{font-size:9px;font-weight:700;color:var(--muted);margin-top:2px}
.rec-stars{color:var(--gold-dark);font-weight:900}
.rec-cost{font-size:14px;font-weight:900;flex-shrink:0;text-align:right}
.rec-cost .cl{font-size:8px;font-weight:800;color:var(--muted);display:block;text-transform:uppercase}
.rec-btn{flex-shrink:0;padding:6px 11px;border-radius:8px;font-size:10px;font-weight:900;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);background:var(--gold);color:var(--text)}
.rec-btn:active{transform:translate(2px,2px);box-shadow:none}
.rec-btn.signed{background:var(--green);color:#fff}

/* schedule / season */
.game-row{background:#fff;border:2px solid var(--border);border-radius:10px;padding:9px 12px;box-shadow:2px 2px 0 var(--border);margin-bottom:7px;display:flex;align-items:center;gap:9px}
.game-row.editable{cursor:pointer}
.game-row.win{background:var(--green-bg);border-color:var(--green)}
.edit-cur{background:var(--cream);border:2px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.edit-cur-l{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.edit-cur-r{font-size:14px;font-weight:900;margin-top:3px}
.edit-ha{display:flex;gap:8px}
.ha-btn{flex:1;padding:9px;font-size:12px;font-weight:900;background:#fff;border:2px solid var(--border);border-radius:9px;box-shadow:2px 2px 0 var(--border);cursor:pointer}
.ha-btn.active{background:var(--gold);color:var(--text)}
.edit-tier-lbl{font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:8px 2px 4px}
.edit-opp{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border:2px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:5px;box-shadow:1px 1px 0 var(--border);cursor:pointer;font-size:12px;font-weight:800}
.edit-opp.sel{background:var(--gold-bg);border-color:var(--gold-dark)}
.edit-opp:active{transform:translate(1px,1px)}
/* recruiting tab */
.rec-hdr{display:flex;align-items:center;justify-content:space-between;background:var(--cream);border:2px solid var(--border);border-radius:11px;padding:10px 14px;box-shadow:3px 3px 0 var(--border);margin-bottom:10px}
.rec-hdr-num{font-size:22px;font-weight:900;line-height:1}
.rec-hdr-lbl{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.rec-card{background:#fff;border:2px solid var(--border);border-radius:11px;padding:10px 12px;margin-bottom:8px;box-shadow:2px 2px 0 var(--border)}
.rec-card.committed{background:var(--green-bg);border-color:var(--green)}
.rec-card.lost{opacity:.5}
.rec-card-top{display:flex;align-items:center;gap:9px}
.rec-card[style*="border-left"] .rec-card-top[data-recexpand]{cursor:pointer}
.rec-card.expanded{box-shadow:2px 2px 0 var(--border),0 0 0 2px var(--purple)}
.rec-chev{font-size:12px;font-weight:900;color:var(--muted);flex-shrink:0;width:12px;text-align:center}
.rec-detail{margin-top:2px}
.rec-card-name{flex:1;font-size:13px;font-weight:900;min-width:0;line-height:1.1}
.rec-card-meta{font-size:9.5px;font-weight:700;color:var(--muted);margin-top:3px;line-height:1.5}
.rec-recruit-btn{flex-shrink:0;font-size:11px;font-weight:900;background:var(--purple);color:#fff;border:2px solid var(--border);border-radius:8px;box-shadow:2px 2px 0 var(--border);padding:6px 10px;cursor:pointer}
.rec-recruit-btn:active{transform:translate(2px,2px);box-shadow:none}
.rec-recruit-btn.maxed{background:var(--cream);color:var(--muted);border-color:var(--border2)}
.rec-wk{font-size:8.5px;font-weight:900;opacity:.8}
.rec-actions{display:flex;gap:6px;margin-top:9px}
.rec-actions .rec-recruit-btn{flex:1;text-align:center}
.rec-scout-btn{flex:1;font-size:11px;font-weight:900;background:#fff;color:var(--text);border:2px solid var(--border);border-radius:8px;box-shadow:2px 2px 0 var(--border);padding:6px 10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.rec-scout-btn:active{transform:translate(2px,2px);box-shadow:none}
.rec-scout-tier{font-size:8px;font-weight:900;background:var(--cream);border-radius:8px;padding:0 5px}
.rec-scouted{flex:1;font-size:10px;font-weight:800;color:var(--green);display:flex;align-items:center;justify-content:center;border:2px dashed var(--green);border-radius:8px}
.fuzzy{color:var(--muted);font-weight:900}
.fuzzy-q{display:inline-block;font-weight:900;color:var(--purple);background:var(--purple-bg);border-radius:4px;padding:0 4px;font-size:9px}
.fit-dot{font-size:8px;font-weight:900;border-radius:5px;padding:1px 5px;border:1.5px solid;white-space:nowrap;display:inline-block}
.fit-dot.great{color:var(--green);border-color:var(--green)}
.fit-dot.ok{color:var(--gold-dark);border-color:var(--gold-dark)}
.fit-dot.poor{color:var(--red2);border-color:var(--red2)}
.rec-trait.gem{color:var(--blue);border-color:var(--blue);background:var(--blue-bg)}
.rec-trait.elite{color:var(--gold-dark);border-color:var(--gold-dark);background:var(--gold-bg)}
.rec-trait.pro{color:var(--green);border-color:var(--green);background:var(--green-bg)}
.rec-trait.bust{color:var(--red2);border-color:var(--red2)}
.scheme-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.scheme-chip{font-size:10px;font-weight:900;border:2px solid var(--border);border-radius:9px;box-shadow:2px 2px 0 var(--border);background:#fff;padding:6px 10px;cursor:pointer}
.scheme-chip:active{transform:translate(2px,2px);box-shadow:none}
.scheme-chip.sel{background:var(--gold-bg);border-color:var(--gold-dark);color:var(--gold-dark)}
.scheme-desc{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:8px;line-height:1.4}
.scheme-wants{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.sw-row{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:800}
.sw-pos{flex-shrink:0;width:26px;font-weight:900;color:var(--muted)}
.sw-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sw-arch{flex-shrink:0;font-size:9px;font-weight:900;border-radius:5px;padding:1px 7px;border:1.5px solid}
.sw-arch.ok{color:var(--green);border-color:var(--green);background:var(--green-bg)}
.sw-arch.no{color:var(--red2);border-color:var(--red2);background:var(--red-bg)}
.sw-arch.neutral{color:var(--muted);border-color:var(--border2);background:var(--cream)}
.scheme-wants-note{font-size:8.5px;font-weight:700;color:var(--muted);line-height:1.5;border-top:1.5px dashed var(--border2);padding-top:7px}
.scheme-best{font-size:9.5px;font-weight:800;color:var(--gold-dark);margin-top:6px}
.rec-badge{flex-shrink:0;font-size:9px;font-weight:900;border:2px solid var(--border);border-radius:6px;padding:3px 7px}
.rec-watch-btn{flex-shrink:0;font-size:17px;line-height:1;background:none;border:none;cursor:pointer;padding:2px 3px;opacity:.5}
.rec-watch-btn.on{opacity:1}
.rec-watch-btn:active{transform:scale(.85)}
.rec-badge.green{background:var(--green);color:#fff}
.rec-badge.red{background:var(--red-bg);color:var(--red2)}
.rec-bars{margin-top:9px;display:flex;flex-direction:column;gap:4px}
.rec-bar-row{display:flex;align-items:center;gap:6px}
/* Two rival names now share this column, so give it a little more room. Long school names
   (Mississippi Valley State) still ellipsize; the full name is in the title attribute. */
.rec-bar-lbl{font-size:9px;font-weight:800;color:var(--muted);width:78px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-bar{flex:1;height:8px;background:var(--cream);border:1.5px solid var(--border);border-radius:5px;overflow:hidden;position:relative}
.rec-thresh{position:absolute;left:70%;top:-1px;bottom:-1px;width:2px;background:var(--green);opacity:.55;z-index:1}
.rec-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.battle{font-size:8.5px;font-weight:900;border-radius:6px;padding:2px 7px;white-space:nowrap}
.battle.lead{background:var(--green-bg);color:var(--green)}
.battle.ready{background:var(--gold-bg);color:var(--gold-dark)}
.battle.behind{background:var(--red-bg);color:var(--red2)}
.battle.contested{background:var(--cream);color:var(--muted);border:1.5px solid var(--border2)}
.rec-bar-fill{height:100%;border-radius:3px}
.rec-bar-fill.you{background:var(--purple)}
.rec-bar-fill.rival{background:#c9a24a}
/* Runner-up rivals: same hue, dialled back so the actual threat stays visually dominant. */
.rec-bar-fill.rival2{background:#c9a24a;opacity:.52}
.rec-bar-row.dim .rec-bar-lbl,.rec-bar-row.dim .rec-bar-val{opacity:.68}
.rec-bar-val{font-size:9px;font-weight:900;width:20px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.rec-rivals{font-size:9px;font-weight:700;color:var(--muted);margin-top:5px}
/* recruiting position filter wheel */
.pos-wheel{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 8px;margin-bottom:4px;-webkit-overflow-scrolling:touch}
.pos-wheel::-webkit-scrollbar{display:none}
.pos-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:900;background:#fff;border:2px solid var(--border);border-radius:20px;box-shadow:2px 2px 0 var(--border);padding:6px 12px;cursor:pointer;white-space:nowrap}
.pos-chip.active{background:var(--purple);color:#fff;border-color:var(--border)}
.pos-chip:active{transform:translate(2px,2px);box-shadow:none}
.pos-chip-n{font-size:9px;font-weight:900;background:var(--cream);color:var(--text);border-radius:10px;padding:0 6px;min-width:16px;text-align:center}
.pos-chip.active .pos-chip-n{background:rgba(255,255,255,.85);color:var(--purple)}
/* coaching tree */
.xp-hdr{background:var(--gold-bg);border:2px solid var(--gold-dark);border-radius:12px;padding:14px;text-align:center;box-shadow:3px 3px 0 var(--border);margin-bottom:14px}
.xp-num{font-size:34px;font-weight:900;color:var(--gold-dark);line-height:1}
.xp-lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-top:2px}
.xp-hint{font-size:10px;font-weight:700;color:var(--muted);margin-top:7px;line-height:1.45}
.tree-branch{margin-bottom:14px}
.tree-branch-h{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tree-ico{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid;border-radius:8px}
.tree-branch-name{font-size:14px;font-weight:900}
.tree-chain{display:flex;align-items:stretch;gap:0}
.tree-link{width:14px;flex-shrink:0;align-self:center;height:3px;background:var(--border2)}
.tree-link.lit{background:var(--gold-dark)}
.tree-chain{display:flex;flex-direction:row;align-items:stretch;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 6px}
.tree-chain::-webkit-scrollbar{height:0;display:none}
.tree-link{width:10px;height:3px;flex-shrink:0;align-self:center;background:var(--border2)}
.tree-link.lit{background:var(--gold-dark)}
.tree-node{flex:0 0 auto;width:140px;background:#fff;border:2px solid var(--border);border-radius:10px;box-shadow:2px 2px 0 var(--border);padding:9px 10px;display:flex;flex-direction:column}
.tree-node.avail{cursor:pointer;border-color:var(--purple)}
.tree-node.avail:active{transform:translate(2px,2px);box-shadow:none}
.tree-node.locked{opacity:.45}
.tree-node.tooexp{opacity:.7}
.tn-name{font-size:11px;font-weight:900;line-height:1.15}
.tn-desc{font-size:8.5px;font-weight:700;color:var(--muted);margin-top:3px;line-height:1.3;flex:1}
.tn-cost{font-size:9px;font-weight:900;color:var(--purple);margin-top:6px}
.tn-owned{color:var(--green)}
.tree-branch.legend .tree-branch-name{color:var(--gold-dark)}
.tree-legend-note{font-size:9.5px;font-weight:800;color:var(--muted);background:var(--cream);border:2px dashed var(--border2);border-radius:9px;padding:8px 10px;margin-bottom:8px;line-height:1.4}
.legacy-line{font-size:11px;font-weight:800;color:var(--gold-dark);margin-top:8px;line-height:1.4}
.fac-note{font-size:9.5px;font-weight:800;color:var(--muted);margin:0 2px 8px;line-height:1.4}
.fac-card{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--border);border-radius:11px;box-shadow:2px 2px 0 var(--border);padding:9px 11px;margin-bottom:8px}
.fac-ico{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;border:2px solid;border-radius:9px}
.fac-main{flex:1;min-width:0}
.fac-name{font-size:12px;font-weight:900}
.fac-lvl{font-size:9px;font-weight:900;color:var(--gold-dark);background:var(--gold-bg);border:1.5px solid var(--gold-dark);border-radius:6px;padding:1px 6px;margin-left:4px}
.fac-eff{font-size:9px;font-weight:700;color:var(--muted);margin-top:3px;line-height:1.3}
.fac-buy{flex-shrink:0;font-size:9px;font-weight:900;text-align:center;background:var(--purple-bg);color:var(--purple);border:2px solid var(--purple);border-radius:9px;box-shadow:2px 2px 0 var(--border);padding:6px 9px;cursor:pointer;line-height:1.3}
.fac-buy:active{transform:translate(2px,2px);box-shadow:none}
.fac-buy.broke{opacity:.5}
/* league champions history */
.hist-card{background:#fff;border:2px solid var(--border);border-radius:12px;box-shadow:3px 3px 0 var(--border);padding:12px 13px;margin-bottom:12px}
.hist-yr{font-size:20px;font-weight:900;color:var(--gold-dark);line-height:1}
.hist-natl{font-size:12px;font-weight:800;margin-top:6px;line-height:1.35}
.hist-natl.you{color:var(--gold-dark)}
.hist-tag{font-size:8px;font-weight:900;background:var(--gold);color:#fff;border-radius:5px;padding:1px 5px;margin-left:3px;vertical-align:middle}
.hist-conf-h{font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:10px 0 5px}
.hist-confs{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.hist-conf{font-size:9.5px;font-weight:700;background:var(--cream);border:1.5px solid var(--border2);border-radius:7px;padding:4px 7px;line-height:1.25;min-width:0}
.hist-conf .hcc-name{font-weight:900;color:var(--muted)}
.hist-conf.mine{background:var(--gold-bg);border-color:var(--gold-dark);color:var(--gold-dark)}
.hist-conf.mine .hcc-name{color:var(--gold-dark)}
/* preseason */
.tabbar-5 .tab-btn{font-size:10px;padding:8px 2px}
.game-row.loss{background:var(--red-bg);border-color:var(--red2)}
.game-wk{font-size:9px;font-weight:900;color:var(--muted);width:28px;flex-shrink:0}
.game-opp{flex:1;font-size:12px;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.game-opp .oc{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase}
.game-res{font-size:13px;font-weight:900;flex-shrink:0}
.game-res.w{color:var(--green)}
.game-res.l{color:var(--red2)}

.gameplan{background:var(--cream);border:2px solid var(--border);border-radius:12px;padding:12px;box-shadow:3px 3px 0 var(--border);margin-bottom:12px}
.gp-opt.sel{background:var(--purple-bg);border-color:var(--purple)}
.gp-opt h4{font-size:12px;font-weight:900}
.gp-opt p{font-size:8px;font-weight:700;color:var(--muted);margin-top:2px;line-height:1.3}

.result-card{background:#fff;border:3px solid var(--border);border-radius:14px;padding:18px;box-shadow:5px 5px 0 var(--border);text-align:center;margin-bottom:12px}
.result-card .score{font-size:30px;font-weight:900;letter-spacing:-.02em}
.result-card .vs{font-size:12px;font-weight:800;color:var(--muted);margin:5px 0}
.result-card.win{background:var(--green-bg)}
.result-card.loss{background:var(--red-bg)}

.stat-grid{display:flex;gap:7px;margin:12px 0}
.stat{flex:1;background:#fff;border:2px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;box-shadow:2px 2px 0 var(--border)}
.stat-v{font-size:18px;font-weight:900;line-height:1}
.stat-l{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:3px}

.bigbtn{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:900;border:2px solid var(--border);box-shadow:4px 4px 0 var(--border);font-family:'Nunito',sans-serif;margin-top:6px}
.bigbtn:active{transform:translate(4px,4px);box-shadow:none}

.roster-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff;border:2px solid var(--border2);border-radius:8px;margin-bottom:5px}
.roster-row .rr-pos{font-size:10px;font-weight:900;width:28px;color:var(--muted)}
.roster-row .rr-name{flex:1;font-size:12px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.roster-row .rr-yr{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;background:var(--cream);border:1.5px solid var(--border2);border-radius:5px;padding:1px 5px}
.roster-row .rr-ovr{font-size:14px;font-weight:900;width:30px;text-align:right}
.roster-row.grad{opacity:.5}
.roster-row.cut{opacity:.5;background:var(--red-bg);border-color:var(--red2)}
.rr-cut{flex-shrink:0;font-size:9px;font-weight:900;border:2px solid var(--border2);border-radius:6px;padding:4px 8px;cursor:pointer;background:var(--red-bg);color:var(--red2);text-transform:uppercase;letter-spacing:.3px}
.rr-cut.undo{background:var(--cream);color:var(--muted)}
.rr-cut:active{transform:translate(1px,1px)}

/* live broadcast scoreboard */
.scoreboard{display:flex;align-items:stretch;gap:6px;background:#14202e;border:3px solid var(--border);border-radius:14px;padding:9px 8px;box-shadow:5px 5px 0 var(--border)}
.sb-team{flex:1;text-align:center;color:#fff;min-width:0}
.sb-name{font-size:11px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#f5f0e8}
.sb-score{font-size:36px;font-weight:900;line-height:1.05;color:#fff;font-variant-numeric:tabular-nums;transition:transform .18s}
.sb-score.bump{transform:scale(1.25);color:var(--gold)}
.sb-tag{font-size:8px;font-weight:800;color:#8aa;letter-spacing:.08em}
.sb-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 2px}
.sb-q{font-size:9px;font-weight:900;color:var(--gold);background:#0c1620;border:1.5px solid #2a3a4a;border-radius:6px;padding:3px 6px;white-space:nowrap}
.sb-vs{font-size:10px;font-weight:900;color:#5a6a7a;margin-top:4px}
.sb-rtg{font-size:8px;font-weight:800;color:#8aa;margin-top:4px;letter-spacing:.02em}
/* opponent ratings (pre-game card) */
.opp-rtg{display:flex;justify-content:center;gap:8px;margin-top:9px}
.opp-rtg .ort{background:var(--cream);border:2px solid var(--border2);border-radius:8px;padding:4px 12px;min-width:52px;text-align:center}
.opp-rtg .ort b{display:block;font-size:16px;font-weight:900;line-height:1}
.opp-rtg .ort span{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.pbp-feed{display:flex;flex-direction:column;gap:5px;min-height:60px}
.pbp-row{display:flex;align-items:center;gap:7px;background:#fff;border:2px solid var(--border2);border-radius:8px;padding:6px 9px;animation:pbpIn .3s ease}
.pbp-row.mine{background:var(--gold-bg);border-color:var(--gold-dark)}
.pbp-row.score{border-color:var(--border);box-shadow:2px 2px 0 var(--border)}
.pbp-row.score .pbp-desc{font-weight:900}
.pbp-row.turn .pbp-badge{color:var(--red2)}
.ls-wrap{background:#fff;border:2px solid var(--border);border-radius:11px;box-shadow:3px 3px 0 var(--border);padding:8px 10px;margin-bottom:10px}
.ls-hd{display:flex;align-items:center;justify-content:space-between;padding-bottom:6px;margin-bottom:4px;border-bottom:2px solid var(--border2)}
.ls-team{flex:0 0 58px;font-size:10px;font-weight:900;text-align:center}
.ls-mid{flex:1;text-align:center;font-size:8px;font-weight:900;color:var(--muted);letter-spacing:.08em}
.ls-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.ls-v{flex:0 0 58px;text-align:center;font-size:12px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--muted)}
.ls-v.win{color:var(--text)}
.ls-l{flex:1;text-align:center;font-size:8.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.ls-sec{font-size:8.5px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:8px 2px 4px}
.ls-tbl{background:#fff;border:2px solid var(--border);border-radius:9px;box-shadow:2px 2px 0 var(--border);overflow:hidden;margin-bottom:6px}
.ls-prow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 9px;border-bottom:1.5px solid var(--border2)}
.ls-prow:last-child{border-bottom:none}
.ls-pn{font-size:11px;font-weight:800;display:flex;align-items:center;gap:5px;min-width:0}
.ls-pp{font-size:7.5px;font-weight:900;color:var(--muted);background:var(--border2);border-radius:4px;padding:1px 4px}
.ls-ps{flex-shrink:0;font-size:9px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.ls-empty{font-size:10px;font-weight:700;color:var(--muted);text-align:center;padding:18px 8px}
.tactics{background:#fff;border:2px solid var(--border);border-radius:0 0 11px 11px;box-shadow:3px 3px 0 var(--border);padding:9px;margin:0 2px}
.tac-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.tac-lbl{flex-shrink:0;width:52px;font-size:8.5px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.tac-pick{flex:1;display:flex;gap:0;border:2px solid var(--border);border-radius:8px;overflow:hidden}
.tac-btn{flex:1;font-size:8.5px;font-weight:900;padding:6px 2px;background:#fff;border:none;cursor:pointer;color:var(--muted);white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:3px}
.tac-btn.on{background:var(--purple);color:#fff}
.tac-ico{font-size:10px}
.tac-desc{font-size:8.5px;font-weight:700;color:var(--muted);line-height:1.6;margin-top:3px;padding-top:6px;border-top:1.5px solid var(--border2)}
.qbreak{background:var(--gold-bg);border:2px solid var(--gold-dark);border-radius:11px;box-shadow:3px 3px 0 var(--border);padding:10px;margin:10px 2px 0;text-align:center}
.qbreak-lbl{font-size:11px;font-weight:900;color:var(--gold-dark);letter-spacing:.06em}
.qbreak-sc{font-size:15px;font-weight:900;margin-top:2px}
.qbreak-note{font-size:9px;font-weight:700;color:var(--muted);margin-top:4px;line-height:1.5}
.live-lbl{font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 2px 5px}
.ctrl-bar{display:flex;align-items:center;gap:7px;margin:9px 2px 0}
.speed-pick{flex:1;display:flex;border:2px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:2px 2px 0 var(--border)}
.sp-btn{flex:1;font-size:9.5px;font-weight:900;padding:7px 4px;background:#fff;border:none;cursor:pointer;color:var(--muted);white-space:nowrap}
.sp-btn.on{background:var(--purple);color:#fff}
.ctrl-bench{flex:none;padding:8px 10px;border:2px solid var(--border);border-radius:9px;background:#fff;
  box-shadow:2px 2px 0 var(--border);font-size:11px;font-weight:900;color:var(--text);white-space:nowrap;cursor:pointer}
.ctrl-bench.on{background:var(--purple);color:#fff}
.ctrl-final{flex-shrink:0;font-size:9.5px;font-weight:900;padding:7px 11px;background:#fff;color:var(--muted);border:2px solid var(--border);border-radius:9px;box-shadow:2px 2px 0 var(--border);cursor:pointer;white-space:nowrap}
.ctrl-final:active{transform:translate(2px,2px);box-shadow:none}
/* collapsed tactics bar */
.tac-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border:2px solid var(--border);border-radius:11px;box-shadow:3px 3px 0 var(--border);padding:7px 9px;margin:9px 2px 0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tac-bar.open{border-radius:11px 11px 0 0;box-shadow:none;margin-bottom:0;border-bottom-width:0}
.tac-bar:active{transform:translate(1px,1px)}
.tac-chips{flex:1;display:flex;gap:5px;min-width:0;overflow:hidden}
.tac-chip{font-size:8.5px;font-weight:900;color:var(--muted);background:var(--border2);border-radius:6px;padding:3px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tac-chip.set{background:var(--purple);color:#fff}
.tac-caret{flex-shrink:0;font-size:9px;font-weight:900;color:var(--dim)}
.feed-hd{display:flex;align-items:center;justify-content:space-between;margin:10px 2px 5px;gap:8px}
.feed-toggle{display:flex;gap:0;border:2px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:2px 2px 0 var(--border)}
.ft-btn{font-size:9.5px;font-weight:900;padding:5px 10px;background:#fff;border:none;cursor:pointer;color:var(--muted);white-space:nowrap}
.ft-btn.on{background:var(--gold);color:var(--text)}
.pbp-row.miss{opacity:.6}
.pbp-row.miss .pbp-desc{color:var(--muted)}
.pbp-q{font-size:8px;font-weight:900;color:var(--muted);width:16px;flex-shrink:0}
.pbp-badge{font-size:9px;font-weight:900;flex-shrink:0;width:44px}
.pbp-desc{flex:1;font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.pbp-sc{font-size:11px;font-weight:900;flex-shrink:0;font-variant-numeric:tabular-nums}
@keyframes pbpIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.result-tag{text-align:center;font-size:12px;font-weight:900;padding:8px;border-radius:10px;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border)}
.result-tag.win{background:var(--green-bg);color:var(--green)}
.result-tag.loss{background:var(--red-bg);color:var(--red2)}
/* season expectations bar */
/* The expectation card wraps the header AND the goal rows, so the whole thing reads as one
   object. The border/shadow live on the card; the header button inside is flat and fills it. */
.expect-card{background:var(--cream);border:2px solid var(--border);border-radius:12px;
  box-shadow:3px 3px 0 var(--border);margin-bottom:12px;overflow:hidden}
.expect-bar{display:flex;gap:10px;align-items:center;width:100%;background:transparent;border:none;
  border-radius:0;padding:10px 12px;box-shadow:none;margin:0;text-align:left;cursor:pointer}
.expect-bar:active{background:rgba(0,0,0,.04)}
/* Count + chevron on the far edge: the state stays legible while collapsed. */
.exp-toggle{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding-left:9px;margin-left:2px;border-left:2px solid var(--border2)}
.exp-cnt{font-size:11px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;line-height:1}
.exp-chev{font-size:10px;font-weight:900;color:var(--muted);line-height:1}
.exp-left{flex:1;min-width:0;display:block}
.exp-lbl{display:block;font-size:8px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.exp-goal{display:block;font-size:14px;font-weight:900;line-height:1.15;margin-top:1px}
.exp-sub{display:block;font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:2px}
.exp-right{flex-shrink:0;text-align:right;min-width:82px;display:block}
.exp-sec{display:block;font-size:12px;font-weight:900}
.exp-secbar{display:block;height:6px;background:#e4ddd0;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;margin:3px 0 0}
.goal-list{display:flex;flex-direction:column;gap:4px}
/* Inside the expectation card: separated by a rule, flush with the header's padding. */
.expect-card .goal-list{margin:0;padding:0 12px 11px;border-top:2px solid var(--border2);padding-top:9px}
.expect-card .goal-row{box-shadow:none;border-width:1.5px}
/* Standalone (the season recap): keep the original spacing. */
.result-card .goal-list{margin:8px 0 2px}
.goal-row{display:flex;align-items:center;gap:7px;padding:6px 9px;border:2px solid var(--border);border-radius:9px;background:#fff;box-shadow:2px 2px 0 var(--border)}
.goal-row.met{background:var(--gold-bg);border-color:var(--gold-dark)}
.goal-box{width:15px;height:15px;flex-shrink:0;border:2px solid var(--border);border-radius:4px;background:#fff;font-size:10px;font-weight:900;line-height:12px;text-align:center;color:var(--green)}
.goal-row.met .goal-box{background:var(--green);color:#fff;border-color:var(--border)}
.goal-txt{flex:1;min-width:0;font-size:10.5px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.goal-detail{font-size:9px;font-weight:900;color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums}
.exp-secfill{display:block;height:100%;border-radius:4px;transition:width .3s}
/* job offers */
.job-offer{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--border);border-radius:11px;padding:10px 12px;box-shadow:3px 3px 0 var(--border);margin-bottom:8px}
.job-body{flex:1;min-width:0}
.job-name{font-size:14px;font-weight:900}
.job-meta{font-size:10px;font-weight:800;color:var(--gold-dark);margin-top:2px}
.job-up{font-size:8px;font-weight:900;color:#fff;background:var(--green);border:1.5px solid var(--border);border-radius:5px;padding:1px 5px;vertical-align:middle;margin-left:4px}
.role-tag{font-size:8px;font-weight:900;border-radius:4px;padding:1px 5px;border:1.5px solid var(--border)}
.role-tag.hc{background:var(--purple-bg);color:var(--purple)}
.role-tag.oc{background:var(--blue-bg);color:var(--blue)}
/* playoff bracket */
.bracket{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.brk-col{flex:0 0 118px;min-width:0;display:flex;flex-direction:column;justify-content:space-around}
.brk-h{font-size:8px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;text-align:center}
.brk-pair{margin:5px 0;border-left:2px solid var(--border2);padding-left:5px}
.brk-team{display:flex;align-items:center;gap:5px;background:#fff;border:2px solid var(--border);border-radius:7px;padding:5px 7px;margin-bottom:4px;box-shadow:1px 1px 0 var(--border)}
.brk-team.me{background:var(--gold-bg);border-color:var(--gold-dark)}
.brk-team.won{background:var(--green-bg);border-color:var(--green)}
.brk-team.lost{opacity:.4}
.brk-team.tbd{opacity:.35;border-style:dashed;box-shadow:none}
.brk-seed{font-size:9px;font-weight:900;color:var(--muted);width:14px;flex-shrink:0}
.brk-name{font-size:10px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brk-champ{margin-top:8px;text-align:center;font-size:10px;font-weight:900;color:var(--gold-dark);background:var(--gold-bg);border:2px solid var(--gold-dark);border-radius:8px;padding:6px 4px;box-shadow:2px 2px 0 var(--border)}
/* conference standings */
.conf-table{background:#fff;border:2px solid var(--border);border-radius:11px;box-shadow:3px 3px 0 var(--border);overflow:hidden}
/* ── Career record book (Wikipedia-style head coaching record) ── */
.rec-tbl{background:#fff;border:2px solid var(--border);border-radius:11px;box-shadow:3px 3px 0 var(--border);overflow:hidden;margin-bottom:12px}
.rec-schoolhd{display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:8px 11px;background:var(--gold);color:var(--text);border-bottom:2px solid var(--border);font-weight:900;font-size:12px}
.rec-schoolhd .rec-lvl{font-size:9px;font-weight:900;letter-spacing:.08em;color:var(--gold-dark)}
.rec-head,.rec-row,.rec-sub,.rec-total{display:flex;align-items:center;gap:6px;padding:6px 11px;border-bottom:1.5px solid var(--border2);font-size:11px}
.rec-head{background:var(--cream);font-weight:900;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.rec-sub{background:var(--gold-bg);font-weight:900}
.rec-total{background:var(--gold-bg);border-top:2px solid var(--gold-dark);color:var(--gold-dark);font-weight:900;border-bottom:none}
.rec-row.title-yr{background:var(--gold-bg)}
.rec-yr{width:38px;flex:none;font-weight:800}
.rec-ov{width:46px;flex:none;font-weight:800}
.rec-cf{width:46px;flex:none;color:var(--muted);font-weight:700}
.rec-st{width:42px;flex:none;color:var(--muted);font-weight:700}
.rec-po{flex:1;min-width:0;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-ring{color:var(--gold-dark)}
.riv-row{display:flex;align-items:center;gap:8px;padding:7px 11px;border-bottom:1.5px solid var(--border2);font-size:11px}
.riv-opp{flex:1;font-weight:800}
.riv-rec{font-weight:900;width:52px;text-align:right}
.riv-stk{width:56px;text-align:right;font-weight:800;font-size:10px}
.riv-w{color:#1a7f37}.riv-l{color:#b42318}
.rec-empty{padding:14px 11px;font-size:11px;font-weight:700;color:var(--muted);text-align:center}
.drf-rd{width:26px;flex:none;font-weight:900;font-size:10px;color:var(--gold-dark)}
.drf-cat{width:112px;flex:none;font-weight:900;font-size:10px;color:var(--muted)}
.drf-early{color:var(--gold-dark)}
/* The staff button nags you when an assistant has an outside offer on the table. */
.top-btn.alert{background:var(--red-bg);border-color:var(--red2);animation:staffPulse 1.4s ease-in-out infinite}
@keyframes staffPulse{0%,100%{box-shadow:2px 2px 0 var(--border)}50%{box-shadow:2px 2px 0 var(--red2)}}
/* ── Player cards: chip system ──────────────────────────
   The old rows crammed year, archetype, personality, career delta, games played and NIL into a
   single dot-separated run-on sentence. Chips let the eye pick out one fact at a time. */
.pl-row{display:flex;align-items:stretch;gap:8px;padding:8px 10px;border-bottom:1.5px solid var(--border2);background:#fff}
.pl-row:last-child{border-bottom:none}
.pl-row.starter{background:var(--gold-bg)}
.pl-row.picked{background:#efe7ff;box-shadow:inset 0 0 0 2px var(--purple)}
.pl-row.swappable{background:#f5f0ff}
.pl-row.rs-held{background:var(--red-bg);opacity:.8}
.pl-pos{flex:none;width:30px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:7px;color:#fff;font-size:10px;font-weight:900}
.pl-main{flex:1;min-width:0}
.pl-top{display:flex;align-items:center;gap:5px}
.pl-nm{font-weight:900;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-ovr{margin-left:auto;flex:none;font-weight:900;font-size:15px;display:flex;align-items:center;gap:3px}
.chips{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-top:4px}
/* THIN. A pill is for the one or two things worth flagging — not for every fact about a player.
   Year, archetype and games played are plain text now; only dev trait and personality get a pill. */
.chip{font-size:9.5px;font-weight:800;padding:1.5px 6px;border-radius:6px;background:var(--cream);
      border:1.5px solid var(--border2);color:var(--muted);white-space:nowrap;line-height:1.4}
.pl-meta{font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── Needs-attention strip ── */
.attn{display:flex;flex-direction:column;gap:6px;margin:0 0 12px}
.attn-item{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;text-align:left;cursor:pointer;
  background:#fff;border:2px solid var(--border2);border-radius:11px;box-shadow:2px 2px 0 var(--border2)}
.attn-item.hi{border-color:var(--red2);box-shadow:2px 2px 0 var(--red2);background:var(--red-bg)}
.attn-item.md{border-color:var(--gold-dark);box-shadow:2px 2px 0 var(--gold-dark);background:var(--gold-bg)}
.attn-item:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--border2)}
.attn-ico{font-size:16px;flex:none}
.attn-txt{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.3}
.attn-txt b{font-size:12px;font-weight:900;color:var(--text)}
.attn-txt span{font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attn-item.hi .attn-txt b{color:var(--red2)}
.attn-go{flex:none;font-size:17px;font-weight:900;color:var(--muted)}
/* ── Explainer sheet ── */
.info-scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90}
.info-sheet{position:fixed;left:12px;right:12px;bottom:14px;z-index:91;background:#fff;
  border:3px solid var(--border);border-radius:16px;box-shadow:5px 6px 0 var(--border);padding:14px;
  max-height:70vh;overflow:auto}
.info-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.info-hd b{font-size:16px;font-weight:900;flex:1}
.info-x{flex:none;width:30px;height:30px;border:2px solid var(--border);border-radius:9px;background:#fff;
  font-size:14px;font-weight:900;cursor:pointer;box-shadow:2px 2px 0 var(--border)}
.info-bd{font-size:12.5px;font-weight:700;color:var(--text);line-height:1.55;margin-bottom:12px}
[data-info-t]{cursor:help}
/* ── Player card ── */
.info-sheet.pcard{max-height:82vh}
.pc-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.pc-ovr{font-size:26px;font-weight:900}
.pc-sub{font-size:11px;font-weight:700;color:var(--muted);line-height:1.45}
.pc-sub b{color:var(--text)}
.pc-note{font-size:11px;font-weight:700;color:var(--gold-dark);background:var(--gold-bg);
  border:1.5px solid var(--gold-dark);border-radius:8px;padding:6px 8px;margin:6px 0 8px;line-height:1.45}
.pc-grid{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.pc-cell{display:flex;flex-direction:column;background:var(--cream);border:1.5px solid var(--border2);
  border-radius:9px;padding:7px 9px}
.pc-cell span{font-size:9px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.pc-cell b{font-size:12px;font-weight:800;color:var(--text);line-height:1.5}
[data-pcard]{cursor:pointer}
/* ── The board pledge ── */
.pledge{display:flex;align-items:center;gap:10px;width:100%;padding:10px 11px;text-align:left;cursor:pointer;
  background:#fff;border:none;border-bottom:1.5px solid var(--border2)}
.pledge:last-child{border-bottom:none}
.pledge.on{background:var(--gold-bg);box-shadow:inset 4px 0 0 var(--gold-dark)}
.pledge.dim{opacity:.42}
.pl-l{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.35}
.pl-l b{font-size:12.5px;font-weight:900;color:var(--text)}
.pl-l span{font-size:10px;font-weight:700;color:var(--muted)}
.pl-terms{font-size:9px;font-weight:800;color:var(--gold-dark);margin-top:2px}
.pl-r{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.pl-nil{font-size:14px;font-weight:900;color:var(--gold-dark)}
.pl-sec{font-size:9px;font-weight:800;color:var(--muted)}
.pl-sec.hot{color:var(--red2)}
/* The money lives in the banner now — it moves the instant you change your promise. */
.exp-nil{font-size:17px;font-weight:900;color:var(--gold-dark);line-height:1.1}
.pledge-pick{border-top:2px solid var(--border2)}
.pledge-pick .pledge{padding:9px 11px}
.pledge-pick .pl-l b{font-size:12px}
.pledge-foot{font-size:10px;font-weight:700;color:var(--muted);padding:7px 11px 9px;line-height:1.45;
  border-top:1.5px solid var(--border2);background:var(--cream)}
.pledge-foot b{color:var(--text)}
/* Three swappable goal slots */
.slot{border-top:1.5px solid var(--border2);padding:8px 11px}
.slot-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.slot-h span:first-child{font-size:9px;font-weight:900;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.slot-amb{font-size:9px;font-weight:900;color:var(--gold-dark)}
.slot-opts{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.slot-opts::-webkit-scrollbar{display:none}
.slot-opt{flex:none;display:flex;flex-direction:column;align-items:flex-start;gap:1px;padding:6px 9px;
  border-radius:9px;background:#fff;border:2px solid var(--border2);cursor:pointer;white-space:nowrap}
.slot-opt.on{background:var(--gold-bg);border-color:var(--gold-dark);box-shadow:2px 2px 0 var(--gold-dark)}
.slot-opt b{font-size:11px;font-weight:900;color:var(--text)}
.slot-opt span{font-size:8.5px;font-weight:800;color:var(--muted)}
.slot-opt span.hot{color:var(--red2)}
.slot-opt.barred{opacity:.38;border-style:dashed}
.goal-row.dead{opacity:.55}
.goal-row.dead .goal-box{color:var(--red2);border-color:var(--red2)}
.goal-row.dead .goal-detail{color:var(--red2)}
.trust-row{display:flex;align-items:center;gap:10px;padding:8px 11px;background:var(--cream)}
.trust-l{flex:1;display:flex;flex-direction:column;gap:4px;font-size:9px;font-weight:900;
  letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.trust-bar{height:6px;background:var(--border2);border-radius:4px;overflow:hidden}
.trust-fill{display:block;height:100%;border-radius:4px}
.trust-r{flex:none;display:flex;flex-direction:column;align-items:flex-end;line-height:1.3}
.trust-r b{font-size:11.5px;font-weight:900}
.trust-r span{font-size:9px;font-weight:700;color:var(--muted)}
.fund-all{display:flex;align-items:center;gap:10px;width:100%;text-align:left;cursor:pointer;margin:0 0 10px;
  padding:10px 12px;border-radius:11px;background:var(--gold-bg);border:2px solid var(--gold-dark);
  box-shadow:2px 2px 0 var(--gold-dark)}
.fund-all.partial{background:var(--red-bg);border-color:var(--red2);box-shadow:2px 2px 0 var(--red2)}
.fund-all:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--gold-dark)}
.fa-l{flex:1;display:flex;flex-direction:column;line-height:1.4}
.fa-l b{font-size:12.5px;font-weight:900;color:var(--text)}
.fa-l span{font-size:10px;font-weight:700;color:var(--muted)}
.fa-r{flex:none;font-size:15px;font-weight:900;color:var(--gold-dark)}
/* ── Dismissible helper notes ── */
.note{display:flex;align-items:flex-start;gap:8px;background:var(--cream);border:1.5px solid var(--border2);
  border-radius:10px;padding:8px 9px;margin:0 2px 10px}
.note-b{flex:1;font-size:10.5px;font-weight:700;color:var(--muted);line-height:1.5}
.note-b b{color:var(--text)}
.note-x{flex:none;width:22px;height:22px;border:1.5px solid var(--border2);border-radius:6px;background:#fff;
  font-size:10px;font-weight:900;color:var(--muted);cursor:pointer;line-height:1}
.note-i{display:inline-flex;align-items:center;gap:4px;background:none;border:1.5px dashed var(--border2);
  border-radius:8px;padding:3px 8px;margin:0 2px 8px;font-size:9.5px;font-weight:800;color:var(--muted);cursor:pointer}
/* ── Offseason hub tabs ── */
.os-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
.os-tabs::-webkit-scrollbar{display:none}
.os-tabs .tab-btn{flex:none;white-space:nowrap;position:relative}
.os-tabs .tab-btn.locked{opacity:.45}
.tb-badge{display:inline-block;margin-left:5px;background:var(--red2);color:#fff;font-size:9px;font-weight:900;
  padding:1px 5px;border-radius:7px}
/* ── Offseason jump-nav ── */
.jump-nav::-webkit-scrollbar{display:none}
/* ── Roster filters ── */
.ros-filters{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 8px;-webkit-overflow-scrolling:touch}
.ros-filters::-webkit-scrollbar{display:none}
.ros-filt{flex:none;display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:9px;
  background:#fff;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);
  font-size:11px;font-weight:800;color:var(--text);white-space:nowrap;cursor:pointer}
.ros-filt.on{background:var(--purple);border-color:var(--border);color:#fff}
.ros-filt .rf-n{font-size:9.5px;font-weight:900;background:var(--cream);color:var(--muted);
  padding:1px 5px;border-radius:6px}
.ros-filt.on .rf-n{background:rgba(255,255,255,.28);color:#fff}
.ros-filt-note{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:800;color:var(--muted);margin:0 2px 8px}
.ros-filt-clear{font-size:10px;font-weight:900;color:var(--purple);background:none;border:none;cursor:pointer;padding:0}
.pl-meta b{color:var(--text);font-weight:800}
.chip.yr{background:#fff;color:var(--text);border-color:var(--border)}
.chip.pers{background:var(--gold-bg);border-color:var(--gold-dark);color:var(--gold-dark)}
.chip.good{color:#1a7f37;border-color:#8fd6a6;background:#eefaf1}
.chip.bad{color:var(--red2);border-color:var(--red2);background:var(--red-bg)}
.chip.st{background:var(--gold);border-color:var(--border);color:var(--text)}
.chip.bk{background:#fff;border-color:var(--border2);color:var(--muted)}
.chip.res{background:#f3f0e6;border-color:var(--border2);color:var(--muted)}
.chip.unk{background:#f3f0f8;border-color:var(--purple);color:var(--purple);border-style:dashed}
.chip.dev-elite{color:var(--gold-dark);border-color:var(--gold-dark);background:var(--gold-bg)}
.chip.dev-pro{color:var(--green);border-color:var(--green);background:var(--green-bg)}
.chip.dev-slow{color:var(--red2);border-color:var(--red2);background:var(--red-bg)}
/* NIL funding as a bar, not a wall of numbers */
.pl-nil{display:flex;align-items:center;gap:5px;margin-top:5px}
.pl-nil-bar{flex:1;height:6px;background:var(--border2);border-radius:4px;overflow:hidden;min-width:40px}
.pl-nil-fill{height:100%;background:var(--gold-dark);border-radius:4px}
.pl-nil-fill.ok{background:#1a7f37}
.pl-nil-fill.hi{background:var(--red2)}
.pl-nil-txt{font-size:9px;font-weight:800;color:var(--muted);white-space:nowrap}
.pl-nil-btn{flex:none;font-size:9px;font-weight:900;padding:2px 6px;border-radius:5px;border:1.5px solid var(--gold-dark);background:#fff;color:var(--gold-dark)}
.pl-nil-btn.match{border-color:#1a7f37;color:#1a7f37}
.pl-nil-btn.broke{opacity:.4}
.pl-act{flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.rs-btn{flex:none;width:26px;height:22px;border:2px solid var(--border2);background:#fff;color:var(--muted);border-radius:6px;font-size:9px;font-weight:900}
.rs-btn.on{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.ros-st.rs{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.riv-row.aw-you{background:var(--gold-bg)}
.conf-row{display:flex;align-items:center;gap:8px;padding:7px 11px;border-bottom:1.5px solid var(--border2)}
.conf-row:last-child{border-bottom:none}
.conf-row.top2{background:var(--gold-bg)}
.conf-row.me{background:var(--blue-bg)}
.conf-row.me.top2{background:linear-gradient(90deg,var(--gold-bg),var(--blue-bg))}
.conf-rank{font-size:10px;font-weight:900;color:var(--muted);width:16px;flex-shrink:0}
.conf-name{flex:1;font-size:12px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conf-star{color:var(--gold-dark);font-size:10px}
.conf-rec{font-size:12px;font-weight:900;flex-shrink:0;font-variant-numeric:tabular-nums}
/* season tabs + compact layout */
.season-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;font-size:12px;font-weight:800}
.shd-l{color:var(--text)}
.shd-r{display:flex;gap:5px}
.shd-r .pill{font-size:9px}
/* STICKY. The tab bar used to scroll away, so switching from the bottom of the roster back to
   Week meant thumbing all the way up. It now pins under the header. */
.tabbar{display:flex;gap:5px;background:var(--cream);border:2px solid var(--border);border-radius:11px;padding:4px;box-shadow:3px 3px 0 var(--border);margin-bottom:12px;
  position:sticky;top:6px;z-index:40}
/* the cream page colour bleeds behind it so rows don't show through the rounded corners */
.tabbar::before{content:"";position:absolute;left:-14px;right:-14px;top:-10px;bottom:-6px;background:var(--bg);z-index:-1}
.tab-btn{flex:1;padding:8px 2px;font-size:10.5px;font-weight:900;border:none;background:transparent;color:var(--muted);border-radius:8px;transition:background .12s,color .12s;white-space:nowrap}
.tab-btn.active{background:var(--gold);color:var(--text);box-shadow:1px 1px 0 var(--border)}
.tab-body{min-height:60px}
.scroll-list{max-height:56vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* recruit board flows with the page (no nested scroll) so the last card never gets cut off */
.rec-scroll{max-height:none;overflow:visible;padding-bottom:12px}
/* roster & schedule flow with the page too — no capped inner scroll box */
.flow-list{max-height:none;overflow:visible;padding-bottom:14px}
.scroll-list::-webkit-scrollbar{width:0;display:none}
/* committed-recruits position tracker */
.commit-track{display:flex;flex-wrap:wrap;gap:6px;margin:0 2px 10px}
.ct-pill{font-size:10px;font-weight:800;border:2px solid var(--border);border-radius:8px;padding:4px 9px;background:#fff;box-shadow:1px 1px 0 var(--border)}
.ct-pill .ctp-pos{font-weight:900;margin-right:2px}
.ct-pill.need{background:var(--red-bg);border-color:var(--red2);color:var(--red2)}
.ct-pill.filled{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.t25-conf{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.cfp-cutline{font-size:9px;font-weight:900;color:var(--gold-dark,#b8860b);text-align:center;text-transform:uppercase;letter-spacing:.08em;padding:6px 0 4px;border-top:2px dashed var(--gold-dark,#b8860b);margin:2px 6px}
.cfp-champ{color:var(--gold-dark,#b8860b);font-size:10px}
/* roster view */
.ros-row.starter{background:var(--gold-bg)}
.ros-st.bk{color:var(--muted);border-color:var(--muted)}

function initLeague(){

  // FCS teams first — lower rating band, flagged with div:"FCS"
  FCS_TEAMS.forEach(function(t){
    var r=FCS_TEAM_RATINGS[t.n], off, def, ovr;
    if(r){ off=r.o; def=r.d; ovr=r.v; }
    else { var b=44+t.p*6; off=Math.max(44,Math.min(78,b+rnd(-4,4))); def=Math.max(44,Math.min(78,b+rnd(-4,4))); ovr=Math.round((off+def)/2); }
    teams[t.n]={off:off, def:def, ovr:ovr, p:t.p, c:t.c, div:"FCS", w:0, l:0, cw:0, cl:0, _playedWeek:-1};
  });
  FBS_TEAMS.forEach(function(t){
    var r=TEAM_RATINGS[t.n], off, def, ovr;
    if(r){ off=r.o; def=r.d; ovr=r.v; }                       // real 2026 rating
    else { var base=58+t.p*6; off=Math.max(50,Math.min(99,base+rnd(-5,5))); def=Math.max(50,Math.min(99,base+rnd(-5,5))); ovr=Math.round((off+def)/2); }
    teams[t.n]={off:off, def:def, ovr:ovr, p:t.p, c:t.c, div:"FBS", w:0, l:0, cw:0, cl:0, _playedWeek:-1};
  });

}

function openNIL(kind, id){
  var s=ST.save;
  var maxA;
  if(kind==="recruit"){ var b=(s.board||[]).filter(function(x){return x.id===id;})[0]; if(!b)return; var cap=nilRecruitCap(); maxA=Math.max(0,Math.min(s.nilLeft, cap.per, cap.total-(b.nil||0))); }
  else { var p=(s.roster||[]).filter(function(x){return x.id===id;})[0]; if(!p)return; var dem=nilDemand(p); maxA=Math.max(0,Math.min(s.nilLeft, Math.max(dem*1.5,1)-(p.nilFund||0))); }
  if(maxA<=0){ toast(kind==="recruit"?"NIL offer maxed for this recruit":"Fully funded"); return; }
  ST.nilPick={kind:kind, id:id};
  ST.nilPickVal=0; // always start at $0
  draw();
}

function pickRivalsFor(st, exclude){
  var L=ST.save.league;
  var cand=rivalCandidates(st, exclude);
  // A blue-chip's list is short and elite; a low-star has a long, scattered field.
  var nRivals=1+Math.floor(Math.random()*3);
  var rivals=[];
  for(var r=0; r<nRivals && cand.length; r++){
    var total=0, i;
    for(i=0;i<cand.length;i++) total+=cand[i].w;
    var roll=Math.random()*total, acc=0, hit=cand.length-1;
    for(i=0;i<cand.length;i++){ acc+=cand[i].w; if(roll<=acc){ hit=i; break; } }
    var rv=cand.splice(hit,1)[0].t;          // no duplicates
    var rt=L&&L.teams?L.teams[rv.n]:null;
    var rPull = rivalPull(rv.n, rt, rv.p) * starFitMult(st, rv.p, rv.c);
    // A 5-star's suitors have been at this for a year already — they start ahead of you.
    var head = headStartFor(st);
    rivals.push({name:rv.n, p:rv.p, interest: Math.max(3, Math.min(80, Math.round(rPull*0.62 + rnd(-6,6) + head))) });
  }
  return rivals;
}

function rivalsOf(name){ return RIVALS[name] || []; }

// series, so leaving a job doesn't drag its rivalry history along with you.
function rivalryKey(school,opp){ return school+"@@"+opp; }
function rivalryRecord(school,opp){
  var s=ST.save; s.rivalRec=s.rivalRec||{};
  return s.rivalRec[rivalryKey(school,opp)] || {w:0,l:0,streak:0};
}
function noteRivalryResult(school, opp, won){
  var s=ST.save; s.rivalRec=s.rivalRec||{};
  var k=rivalryKey(school,opp), r=s.rivalRec[k]||{w:0,l:0,streak:0};
  if(won){ r.w++; r.streak = r.streak>0 ? r.streak+1 : 1; }
  else   { r.l++; r.streak = r.streak<0 ? r.streak-1 : -1; }
  s.rivalRec[k]=r;
}
// Every rivalry series you've ever played, grouped for the record book.
function allRivalrySeries(){
  var s=ST.save, out=[]; s.rivalRec=s.rivalRec||{};
  Object.keys(s.rivalRec).forEach(function(k){
    var parts=k.split("@@"); if(parts.length!==2) return;   // ignore any legacy key shape
    var r=s.rivalRec[k];
    out.push({school:parts[0], opp:parts[1], w:r.w||0, l:r.l||0, streak:r.streak||0});
  });
  out.sort(function(a,b){
    if(a.school!==b.school) return a.school<b.school?-1:1;
    return (b.w+b.l)-(a.w+a.l);
  });
  return out;
}

function rosterCounts(mode){
  var s=ST.save, out={}, total=0;
  var future=(mode==="future");
  myPositions().forEach(function(pos){ out[pos]={have:0, min:rosterMinAt(pos), cap:rosterSizeAt(pos)}; });

    // signed already holds one. Without this the ledger showed holes you'd just filled.
    if(future && (p.yr==="SR" || p.cut || p._declared || p._leaving)) return;

  }

}

// Which subdivision am I coaching in? Everything postseason branches off this.
function myDivision(){ return teamDivision(ST.save.conf); }
function leagueTeam(name){
  var L=ST.save&&ST.save.league; if(!L)return null;
  return L.teams[name]||null;
}
// Opponent's offense/defense/overall for display (falls back to prestige if league missing)
function oppRatings(name, prestige){
  var t=leagueTeam(name);
  if(t) return {off:t.off, def:t.def, ovr:t.ovr};
  var r=TEAM_RATINGS[name]||FCS_TEAM_RATINGS[name]; if(r) return {off:r.o, def:r.d, ovr:r.v};
  var base=58+(prestige||3)*6;
  return {off:base, def:base, ovr:base};
}
// Roster-anchor targets for a team's units, using the SAME rating logic as the league:
// an explicit rating if we have one, else a subdivision-aware prestige fallback (FBS sits
// a full tier above FCS). This guarantees every generated roster matches the team's real
// overall — no FBS-scale inflation on an FCS squad, and no mismatched fallback on an FBS
// team that lacks an explicit rating.
function teamTargets(team){
  var fcs = (teamDivision(team.c)==="FCS");
  var r = fcs ? FCS_TEAM_RATINGS[team.n] : TEAM_RATINGS[team.n];
  if(r) return {off:r.o, def:r.d};
  var base = fcs ? (44+team.p*6) : (58+team.p*6);
  return {off:base, def:base};
}
// Simulate one game between two league teams by name → returns {w:winnerName, l:loserName}
function simLeagueGame(aName,bName,neutralHome){
  var A=ST.save.league.teams[aName], B=ST.save.league.teams[bName];
  if(!A||!B){ return {w:aName,l:bName}; }
  var aStr=A.ovr + rnd(-10,10) + (neutralHome?0:3);   // slight home edge to A
  var bStr=B.ovr + rnd(-10,10);
  var aWon=aStr>=bStr;
  // Their stars played a game too — bank it. Stats now ACCUMULATE across a season and a
  // career, exactly like your own players', instead of being conjured at year's end.
  accrueStarGame(A); accrueStarGame(B);
  return {w:aWon?aName:bName, l:aWon?bName:aName};
}
// Add one game to every star on a team. Season totals build week by week; career totals
// carry across years, so a CPU star can leave with a real body of work behind him.
function accrueStarGame(t){
  if(!t || !t.stars) return;
  t.stars.forEach(function(st){
    var g=genStarStats(st, 1, true);      // a single game's line, kept fractional
    st.s=st.s||{}; st.c=st.c||{};
    for(var k in g){
      if(k==="g") continue;
      st.s[k]=(st.s[k]||0)+g[k];
      st.c[k]=(st.c[k]||0)+g[k];
    }
    st.s.g=(st.s.g||0)+1; st.c.g=(st.c.g||0)+1;
  });
}
// The league sim only plays CONFERENCE games, so CPU stars finish the year several games
// short of your full slate — which would quietly hand you every statistical title. Top them
// up to a full season's worth of games (their non-conference schedule, in effect).
function topUpStarSeasons(fullGames){
  var L=ST.save.league; if(!L||!L.teams) return;
  Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n];
    if(t.div!==myDivision() || !t.stars) return;
    t.stars.forEach(function(st){
      st.s=st.s||{};
      var played=st.s.g||0;
      for(var i=played; i<fullGames; i++){
        var g=genStarStats(st, 1, true);
        st.c=st.c||{};
        for(var k in g){
          if(k==="g") continue;
          st.s[k]=(st.s[k]||0)+g[k];
          st.c[k]=(st.c[k]||0)+g[k];
        }
        st.s.g=(st.s.g||0)+1; st.c.g=(st.c.g||0)+1;
      }
    });
  });
}
// Wipe star season stats when a new year kicks off (careers persist).
function resetStarSeasons(){
  var L=ST.save.league; if(!L||!L.teams) return;
  Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n]; if(!t.stars) return;
    t.stars.forEach(function(st){ st.s={}; st.form = 0.84 + Math.random()*0.32; });
  });
}
// Advance the league by one week: pair up all non-user teams and play them.
// The user's team result is recorded separately (from their real game).
// Build each conference's round-robin-ish schedule: every team plays up to 9 conference
// games, capped at (conference size - 1) for smaller leagues like the 8-team Pac-12.
// Independents play 0 conference games. Called once at season start.
function buildLeagueConfSchedule(){
  var L=ST.save.league; if(!L)return;
  var teamsByConf={};
  Object.keys(L.teams).forEach(function(n){
    var c=L.teams[n].c;
    (teamsByConf[c]=teamsByConf[c]||[]).push(n);
  });
  L.confSched={};
  Object.keys(L.teams).forEach(function(n){ L.confSched[n]=[]; });
  Object.keys(teamsByConf).forEach(function(c){
    if(c==="Independent" || c==="FCS Independent") return;   // independents have no conference slate
    var members=teamsByConf[c].slice();
    var N=members.length;
    if(N<2) return;
    // FBS runs a 9-game conference slate; FCS leagues run 8.
    var CONF_GAMES = isFCSConf(c) ? 8 : 9;
    var target=Math.min(CONF_GAMES, N-1);  // can't exceed N-1 unique opponents
    // Round-robin via the circle method: fix team 0, rotate the rest. Take `target` rounds.
    // Build the full round-robin ordering of opponents for each team, then keep the first `target`.
    var arr=members.slice();
    var pad=false;
    if(arr.length%2===1){ arr.push("__BYE__"); pad=true; } // odd → add a bye slot
    var rounds=arr.length-1;
    var half=arr.length/2;
    var oppLists={}; members.forEach(function(m){ oppLists[m]=[]; });
    var rot=arr.slice();
    for(var r=0;r<rounds;r++){
      for(var i=0;i<half;i++){
        var a=rot[i], b=rot[rot.length-1-i];
        if(a!=="__BYE__" && b!=="__BYE__"){
          oppLists[a].push(b); oppLists[b].push(a);
        }
      }
      // rotate: keep first fixed, move the rest clockwise
      var fixed=rot[0];
      var rest=rot.slice(1);
      rest.unshift(rest.pop());
      rot=[fixed].concat(rest);
    }
    // assign each team its first `target` opponents from the round-robin ordering
    members.forEach(function(m){
      L.confSched[m]=oppLists[m].slice(0, target);
    });
    // ensure symmetry: if A has B but B dropped A (from slicing), trim A too
    members.forEach(function(m){
      L.confSched[m]=L.confSched[m].filter(function(o){ return L.confSched[o] && L.confSched[o].indexOf(m)>=0; });
    });
    // top up any team left short (odd-sized conferences give some teams a bye) by adding
    // a mutually-available opponent that's also short and not already scheduled
    for(var tries=0; tries<N*3; tries++){
      var short=members.filter(function(m){ return L.confSched[m].length<target; });
      if(short.length<2) break;
      var progressed=false;
      for(var x=0;x<short.length;x++){
        var a=short[x];
        if(L.confSched[a].length>=target)continue;
        var partner=short.filter(function(b){
          return b!==a && L.confSched[b].length<target && L.confSched[a].indexOf(b)<0;
        })[0];
        if(partner){ L.confSched[a].push(partner); L.confSched[partner].push(a); progressed=true; }
      }
      if(!progressed) break;
    }
    // last resort for stubborn odd-conference leftovers: pair any two still-short teams,
    // allowing a rematch, so every team reaches its target game count
    for(var lr=0; lr<N; lr++){
      var stillShort=members.filter(function(m){ return L.confSched[m].length<target; });
      if(stillShort.length<2) break;
      var a2=stillShort[0], b2=stillShort[1];
      L.confSched[a2].push(b2); L.confSched[b2].push(a2);
    }
  });
}
// Complete any conference games that weren't played during the week-by-week sim, so every
// non-independent team finishes its full conference slate before standings are final.
function finalizeLeagueSeason(excludeName){
  var L=ST.save.league; if(!L||!L.confRemain)return;
  // Complete ALL remaining conference games (including the user's league-side games) so every
  // team finishes its 9-game slate. The user's DISPLAYED record comes from their real schedule
  // in computeConfStandings, so simulating the user's league-side games here is harmless.
  var guard=0;
  var anyLeft=function(){ return Object.keys(L.confRemain).some(function(n){ return L.confRemain[n].length>0; }); };
  while(anyLeft() && guard<80){
    guard++;
    Object.keys(L.confRemain).forEach(function(n){
      var rem=L.confRemain[n]; if(!rem.length)return;
      var oppName=rem[0];
      var r=simLeagueGame(n,oppName,false);
      var loser=(r.w===n)?oppName:n;
      L.teams[r.w].w++; L.teams[loser].l++;
      L.teams[r.w].cw++; L.teams[loser].cl++;
      var i1=L.confRemain[n].indexOf(oppName); if(i1>=0)L.confRemain[n].splice(i1,1);
      if(L.confRemain[oppName]){ var i2=L.confRemain[oppName].indexOf(n); if(i2>=0)L.confRemain[oppName].splice(i2,1); }
    });
  }
}
function simLeagueWeek(excludeName){
  var L=ST.save.league; if(!L)return;
  if(!L.confSched){ buildLeagueConfSchedule(); }
  if(!L.confRemain){
    // mutable copy of each team's remaining conference opponents for this season
    L.confRemain={};
    Object.keys(L.confSched).forEach(function(n){ L.confRemain[n]=(L.confSched[n]||[]).slice(); });
  }
  var wk=L.week||0;
  var busy={}; // teams that have already played this week
  if(excludeName) busy[excludeName]=1; // user plays their own game separately
  var names=Object.keys(L.teams);
  // shuffle processing order for variety
  for(var i=names.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=names[i];names[i]=names[j];names[j]=tmp; }

  // Pass 1: play conference games — pair teams that still have each other remaining
  names.forEach(function(n){
    if(busy[n])return;
    var rem=L.confRemain[n]||[];
    var oppName=null;
    for(var k=0;k<rem.length;k++){
      var cand=rem[k];
      if(!busy[cand] && L.confRemain[cand] && L.confRemain[cand].indexOf(n)>=0){ oppName=cand; break; }
    }
    if(!oppName)return;
    var r=simLeagueGame(n,oppName,false);
    var loser=(r.w===n)?oppName:n;
    L.teams[r.w].w++; L.teams[loser].l++;
    L.teams[r.w].cw++; L.teams[loser].cl++;
    var si1=L.confRemain[n].indexOf(oppName); if(si1>=0)L.confRemain[n].splice(si1,1);
    var si2=L.confRemain[oppName].indexOf(n); if(si2>=0)L.confRemain[oppName].splice(si2,1);
    busy[n]=1; busy[oppName]=1;
  });

  // Pass 2: teams that have NO conference games left this season fill with a non-conference game.
  // (Teams that still owe conference games simply sit this week — they'll get paired a later week,
  // which keeps everyone on track to finish their full 9-game conference slate.)
  names.forEach(function(n){
    if(busy[n])return;
    var rem=L.confRemain[n]||[];
    if(rem.length>0) return;               // still owes conference games → wait, don't burn the week
    var others=names.filter(function(m){ return !busy[m] && m!==n && (L.confRemain[m]||[]).length===0; });
    if(!others.length)return;
    var oppName=others[Math.floor(Math.random()*others.length)];
    var r=simLeagueGame(n,oppName,false);
    var loser=(r.w===n)?oppName:n;
    L.teams[r.w].w++; L.teams[loser].l++;   // overall only, not a conference game
    busy[n]=1; busy[oppName]=1;
  });

  L.week=wk+1;
}
// Record the USER team's game result into the league standings.
function recordUserLeagueResult(won, isConfGame){
  var t=leagueTeam(ST.save.school); if(!t)return;
  if(won)t.w++; else t.l++;
  if(isConfGame){ if(won)t.cw++; else t.cl++; }
}
// End-of-season rating drift: teams that beat their rating-expected record improve; others decline.
// End-of-season league update: categorize each team by how last season went vs what their
// rating expected, nudge their overall (and off/def) up or down by tier, then WIPE all records.
// This is the core "living league" mechanic — records never accumulate because they reset here.
function seasonTier(winPct, expPct){
  var d = winPct - expPct;           // how far above/below expectation
  if(d >=  0.22) return 3;           // great season
  if(d >=  0.08) return 1;           // good season
  if(d <= -0.22) return -3;          // bad season
  if(d <= -0.08) return -1;          // poor season
  return 0;                          // about as expected
}
function tierMove(tier){
  // convert a tier into an overall-rating change, with a little randomness
  if(tier=== 3) return rnd(2,3);
  if(tier=== 1) return rnd(0,2);
  if(tier===-1) return rnd(-2,0);
  if(tier===-3) return rnd(-3,-2);
  return rnd(-1,1);                  // as expected: hold, tiny noise
}
function driftLeagueRatings(){
  var L=ST.save.league; if(!L)return;
  Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n];
    var games=t.w+t.l;
    if(games){
      var winPct=t.w/games;
      var expPct=Math.max(0.1,Math.min(0.9,(t.ovr-52)/45)); // what this rating "should" win
      var tier=seasonTier(winPct, expPct);
      var move=tierMove(tier);
      // gentle pull toward the middle (74) so ratings don't runaway to the extremes over many seasons
      if(t.ovr>86 && move>0) move=Math.max(0,move-1);
      if(t.ovr<62 && move<0) move=Math.min(0,move+1);
      t.off=Math.max(48,Math.min(99,t.off+move));
      t.def=Math.max(48,Math.min(99,t.def+move));
      t.ovr=Math.round((t.off+t.def)/2);
      t.lastTier=tier; // remembered for flavor/labels if needed
    }
    // wipe last season's records — every team starts the new season 0-0
    t.w=0; t.l=0; t.cw=0; t.cl=0; t._playedWeek=-1;
  });
  L.week=0; L.confSched=null; L.confRemain=null; // force a fresh conference schedule next season
}
// Two-way portal traffic across the league: blue bloods net-gain talent, smaller programs
// net-lose it, with noise. Keeps the world churning (and opponents' difficulty shifting).
function simLeaguePortal(){
  var L=ST.save.league; if(!L||!L.teams) return;
  Object.keys(L.teams).forEach(function(n){
    if(n===ST.save.school) return; // your own roster is handled by the real portal
    var t=L.teams[n];
    var swing=Math.round((t.p-3)*0.6 + rnd(-2,2)); // prestige tilts who wins the portal
    t.off=Math.max(46,Math.min(99,(t.off||70)+swing));
    t.def=Math.max(46,Math.min(99,(t.def||70)+swing));
    t.ovr=Math.round((t.off+t.def)/2);
  });
}

function coachXP(){ return (ST.save&&ST.save.coachXP)||0; }
function hasAbility(id){ return (ST.save&&ST.save.abilities||[]).indexOf(id)>=0; }
// Which tier index is a skill within its branch?
function skillTier(branchKey, id){
  var sk=COACH_TREE[branchKey].skills; for(var i=0;i<sk.length;i++){ if(sk[i].id===id)return i; } return 0;
}
// Has every non-Legend skill been unlocked? (gates the Legend capstone branch)
function allBranchesMaxed(){
  var ok=true;
  Object.keys(COACH_TREE).forEach(function(k){
    if(COACH_TREE[k].legend) return;
    COACH_TREE[k].skills.forEach(function(sk){ if(!hasAbility(sk.id)) ok=false; });
  });
  return ok;
}
// A skill is unlockable if tier 0 (or, for Legend, full mastery), else the prior tier is owned.
function skillUnlockable(branchKey, id){
  var t=skillTier(branchKey,id);
  if(COACH_TREE[branchKey].legend && !allBranchesMaxed()) return false;
  if(t===0) return true;
  return hasAbility(COACH_TREE[branchKey].skills[t-1].id);
}
// Spend Coach XP to buy a skill.
function buyCoachSkill(branchKey, id){
  var s=ST.save; if(!s) return;
  if(hasAbility(id)){ return; }
  var skill=COACH_TREE[branchKey].skills[skillTier(branchKey,id)];
  if(!skillUnlockable(branchKey,id)){ toast("Unlock the previous skill first"); return; }
  if(coachXP() < skill.cost){ toast("Not enough Coach XP"); return; }
  s.coachXP=coachXP()-skill.cost;
  s.abilities=(s.abilities||[]); s.abilities.push(id);
  toast("✓ Unlocked "+skill.name);
  persist(); draw();
}
// Award Coach XP for a season's accomplishments.
function awardCoachXP(n, reason){
  var s=ST.save; if(!s) return;
  s.coachXP=(s.coachXP||0)+n;
  s.legacyXP=(s.legacyXP||0)+n;        // lifetime total — never spent down; drives your Legacy rank
  s._xpGainedThisYear=(s._xpGainedThisYear||0)+n;
}
