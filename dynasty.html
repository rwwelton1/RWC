// ── Recruiting board order ───────────────────────────────
// The board order SETTLES only when you change tabs/filters (refreshRecOrder), never
// mid-scout — so scouting a prospect never makes cards jump. When it settles, fully-
// scouted prospects sort by their revealed OVR (best first) within their star tier —
// OVR is revealed at scout tier 2 — while everyone still unknown keeps a stable,
// OVR-blind seed order.
function recSeed(b){
  if(b._seed!=null) return b._seed;
  var s=String(b.id||""), h=0; for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; }
  return ((h>>>0)%100000)/100000;   // stable fallback for boards made before _seed existed
}
function recRankCompare(a,b){
  var order={open:0,committed:1,lost:2};
  if(order[a.status]!==order[b.status]) return order[a.status]-order[b.status];
  if((ST.recSort||"overall")==="interest"){
    if((b.interest||0)!==(a.interest||0)) return (b.interest||0)-(a.interest||0); // your standing: warmest first
    if(b.st!==a.st) return b.st-a.st;
    return recSeed(a)-recSeed(b);
  }
  if(b.st!==a.st) return b.st-a.st;                       // star tier still leads
  var ot=Math.min(2, maxScoutTier()), af=a.scout>=ot, bf=b.scout>=ot; // OVR is revealed at scout tier 2 (or full scout, if that comes sooner)
  if(af&&bf) return b.ovr-a.ovr;                          // both OVR-known → best OVR first
  if(af!==bf) return af?-1:1;                             // OVR-known rise above the unknown
  return recSeed(a)-recSeed(b);                           // both unknown → blind stable order
}
function refreshRecOrder(){
  var s=ST.save; if(!s||!s.board){ ST.recRank=null; return; }
  var m={}; s.board.slice().sort(recRankCompare).forEach(function(b,i){ m[b.id]=i; });
  ST.recRank=m;
}

// Move a player up or down their position's depth chart by one slot.
// Tap one player, then tap another in the SAME position group to swap their
// depth slots. Tapping the selected player again cancels.
function tapDepth(id){
  var s=ST.save, p=s.roster.filter(function(x){return x.id===id;})[0];
  if(!p) return;
  if(ST.swapPick===id){ ST.swapPick=null; redrawKeepScroll(); return; }   // tapped self → cancel
  var sel=ST.swapPick && s.roster.filter(function(x){return x.id===ST.swapPick;})[0];
  if(!sel || sel.pos!==p.pos){
    // nothing picked yet, or the pick was a different position — start a new selection
    ST.swapPick=id; redrawKeepScroll(); return;
  }
  swapDepth(sel.id, p.id);
}
// Exchange two players' depth slots. Ranks may not exist yet (depthOrder falls
// back to OVR), so materialize the current order before swapping.
function swapDepth(idA, idB){
  var s=ST.save;
  var a=s.roster.filter(function(x){return x.id===idA;})[0];
  var b=s.roster.filter(function(x){return x.id===idB;})[0];
  if(!a || !b || a.pos!==b.pos || a.id===b.id) return;
  var order=depthOrder(s.roster, a.pos);
  var ia=-1, ib=-1;
  for(var i=0;i<order.length;i++){ if(order[i].id===idA)ia=i; if(order[i].id===idB)ib=i; }
  if(ia<0 || ib<0) return;
  var tmp=order[ia]; order[ia]=order[ib]; order[ib]=tmp;
  order.forEach(function(pl,i){ pl.depthRank=i; });
  ST.swapPick=null;
  persist(); redrawKeepScroll();
}
// Redraw without yanking the user back to the top of a long roster.
function redrawKeepScroll(){
  var sy=window.scrollY||window.pageYOffset||0;
  draw();
  window.scrollTo(0, sy);
  if(window.requestAnimationFrame){ window.requestAnimationFrame(function(){ window.scrollTo(0, sy); }); }
}


// =====================================================
// DRIVE ENGINE — possession-first football sim
// Nobody decides the final score. We simulate plays; each mutates
// {down, dist, yl, clock, poss}. The score is whatever falls out.
// yl = yards from the OFFENSE's own goal line; yl>=100 is a touchdown.
// =====================================================
var XP_RATE=0.95, TWO_RATE=0.45;
// TUNING: this scales rating DIFFERENCES only, so an even matchup is untouched at any value —
// it controls how much separation a talent gap buys, not the baseline.
//
// It has now been set twice, and the second time is a consequence of the first. It began at 30,
// which was far too compressed: an 89 defense conceded 15.3 pts to a 75 offense and the whole
// 75->92 offensive range moved scoring under 9 points, so every game collapsed toward .500 and
// no roster ever felt built. Dropping it to 18 fixed that. But the dPass half-normal fix (see
// below) then removed ~4.8 yds from every completion, lowering the scoring baseline league-wide
// — and a smaller baseline means the SAME divided edge buys proportionally more separation. At
// 18 on the new baseline, an 8-point talent gap was worth +16.7 and an 89% win rate. Back to 32
// restores the intended curve on the corrected yardage model: gap 0 ~ -1.6, gap 4 ~63% wins,
// gap 8 ~ +11.5 and 78% wins.
//
// Lower = talent matters more; raise it to make coaching (fit + reads + calls) loom larger.
var EDGE_DIV=32;
var PACE=1.00;     // >1 = fewer plays per drive (tune points-per-drive here)
                   // Back to neutral. It was 0.78 to buy back scoring after the dPass fix, but
                   // that was treating a symptom: the real problem was dClock burning half the
                   // real game clock, so games ran 205 snaps instead of ~140. With dClock fixed
                   // this is a genuine tempo dial again rather than a fudge factor.

// Box-Muller: yardage is normal-ish with a fat right tail.
function gauss(){ var u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function clampN(v,a,b){ return Math.max(a,Math.min(b,v)); }

// `rblk` = the run-blocking tilt of the line doing the blocking (see olBlock). It's the
// single biggest reason a system can't just flip on a whim: an Air Raid five is +5 in pass
// pro and MINUS five in the run game, which is over a yard a carry.
var BLK_RUN_YDS=0.15;   // yards per carry, per point of run-block tilt. Kept below what a real
                        // talent gap is worth per carry — your line identity shapes the run
                        // game, but it can't out-muscle a defense that's simply better.
function dRun(edge, dm, rblk){
  dm=dm||defMods("standard"); rblk=rblk||0;
  var e=edge/EDGE_DIV;
  var y=(5.5+e*2.0+dm.runYds+rblk*BLK_RUN_YDS)+gauss()*4.7;   // soft fronts concede the run; a real talent edge shows up here
  // `runExpl` shapes how often a run breaks — Spread springs QB keepers and space; Ground &
  // Pound trades the home-run for a steady, high-floor grind.
  if(Math.random()<clampN(0.058+e*0.02+rblk*0.004+(dm.runExpl||0),0.02,0.16)) y+=Math.abs(gauss())*16;
  y=Math.round(y); if(y<-6)y=-6;
  // `fumble` is ball security — mesh/pitch schemes put it on the ground more; grind schemes less.
  return {yards:y, turnover:Math.random()<clampN(0.011-e*0.003+(dm.fumble||0),0.003,0.05), kind:"run", incomplete:false};
}
// `obvious` = 3rd/4th & long: the defense knows a throw is coming and defends the sticks.
// `pblk` = pass-protection tilt: it buys the QB time (fewer sacks, cleaner throws).
function dPass(edge, obvious, dm, aggro, pblk){
  dm=dm||defMods("standard"); aggro=aggro||0; pblk=pblk||0;
  var e=edge/EDGE_DIV;
  if(Math.random()<clampN(0.062-e*0.02+(obvious?0.030:0)+dm.sack-pblk*0.005,0.02,0.20))
    return {yards:-rnd(4,9), turnover:false, kind:"sack", incomplete:false};
  // "Air it out" means deeper throws: fewer completions, bigger when they land.
  var compP=clampN(0.625+e*0.10-(obvious?0.075:0)+dm.comp-aggro*0.045+pblk*0.004,0.28,0.88);
  var intP =clampN(0.026-e*0.010+(obvious?0.012:0)+dm.int+aggro*0.008,0.006,0.070);
  if(Math.random()<intP)   return {yards:0, turnover:true,  kind:"int",  incomplete:true};
  if(Math.random()>=compP) return {yards:0, turnover:false, kind:"pass", incomplete:true};
  // YARDS AFTER THE CATCH IS SIGNED. This was Math.abs(gauss())*6.0 — a half-normal, which is
  // always positive and averages +4.8. That made a completion 6.8+4.8 = 11.6 yards on average
  // and, worse, meant literally 0% of completions gained under 5 yards; real football is ~35-40%.
  // There was no such thing as a short catch. Compare dRun, which uses a SIGNED gauss()*4.7 and
  // so varies both ways around 4.5.
  //
  // The consequence was systemic, not cosmetic: passing ran +1.41 ypp over running before any
  // counter was applied — 4.4x the value of the LARGEST counter in OFF_COUNTER. That made the
  // entire call-vs-formation web unable to matter (passing beat running against all five
  // defensive formations, including the two the table says should stuff it), and it's the real
  // engine behind the pass ratchet: throwing was simply always right.
  // The floor below (`if(y<1) y=rnd(1,3)`) already handles the negative tail — a caught ball
  // never loses ground.
  // Tuned so the DISTRIBUTION is right, not just the mean. Base 10.4 with sd 9.0 gives ~7.0
  // yards per ATTEMPT (real ~7.0) and a realistic short-catch rate.
  //
  // An earlier pass at this set the base to 7.6 on the reasoning that per-play EV should be
  // LEVEL with the run, since passing carries more than double the turnover rate and stops the
  // clock. That was wrong: real football runs ~7.0 per pass attempt against ~4.5 per carry.
  // Passing IS more efficient per play — the clock is what pays for it, and once dClock stopped
  // burning half the real time, that cost is priced properly and the yardage can sit where it
  // belongs. At 7.6 the offense couldn't finish drives: 1.66 TDs a game against a real 3.2.
  var y=(obvious?9.0:10.4)-(dm.shorten||0)+e*1.9+aggro*2.4+gauss()*(obvious?8.2:9.0);
  // The explosive term stays absolute: a broken tackle is a bonus, never a penalty.
  if(Math.random()<clampN(0.05+dm.explosive+aggro*0.03,0.005,0.20)) y+=Math.abs(gauss())*20;
  y=Math.round(y);
  if(y<1) y=rnd(1,3);   // a caught ball never loses ground; that's a sack, not a completion
  return {yards:y, turnover:false, kind:"pass", incomplete:false};
}
// ── TACTICS ──────────────────────────────────────────────
// Toggled any time during a live game; they take effect on the very next snap.
// Each one buys something and costs something — no free wins.
// TACTICS ARE LENSES, NOT PRESETS. The player sets their own run/pass balance on the slider —
// that's their percentage, a real number they own. A tactic is then a LENS laid over it: it
// shifts the balance and changes HOW the offense plays at that balance, rather than yanking the
// percentage to a fixed value. "Air It Out" at a 60% pass balance is aggressive downfield
// passing; the same lens at a 40% balance is a run-first team that takes its shots. The lens
// modulates; the slider decides.
//
//   leanShift : nudge to the player's balance (+ = more run). Deliberately smaller than the old
//               presets (which hard-set −32/+30) — the slider is the main dial now.
//   aggro     : downfield aggression. Feeds deeper throws AND more risk (comp down, INT up),
//               the same knob the sim already reads from an all-pass posture.
//   pace      : tempo multiplier, folded together with the tempo lens.
// AGGRESSION, kept separate from the run/pass slider because it's orthogonal: a pass-heavy plan
// can be dink-and-dunk (West Coast) or vertical (Air Raid), and a run-heavy plan can still take
// play-action shots. The slider owns the run/pass SHARE; this owns how far downfield you attack.
// The old version also carried a leanShift that duplicated the slider — that's removed, so this
// is now purely the downfield dial and no longer fights the slider for the same job.
var OFF_TACTICS={
  run:     {label:"Ball Control", icon:"🎯", leanShift:0, aggro:-0.5, desc:"Short, safe throws. Protect the ball, move the chains."},
  balanced:{label:"Balanced",     icon:"⚖️", leanShift:0, aggro:0,    desc:"Take what the defense gives you."},
  pass:    {label:"Air It Out",   icon:"🚀", leanShift:0, aggro:+1.0, desc:"Push the ball downfield. Chunk plays and quick scores — and more risk."}
};
// The downfield dial is a CONTINUOUS 0..100 now (0 = high-percentage, short & safe; 100 = big
// plays, deep & risky), stored on gameplan.aggro. It maps to the same aggro channel the three
// buttons used to hit — Ball Control's -0.5 at the low end, Air It Out's +1.0 at the top, with
// Balanced (0) at the midpoint — so nothing in the sim's downfield math changed, only the
// resolution the player controls it at.
function aggroFromDial(v){
  v=clampN(v,0,100);
  if(v<=50) return -0.5 + (v/50)*0.5;     // 0 -> -0.5 (safe)  ..  50 -> 0 (neutral)
  return ((v-50)/50)*1.0;                  // 50 -> 0            .. 100 -> +1.0 (deep shots)
}
// A word for where the downfield dial sits, so the slider reads as something at every point.
function aggroDialLabel(v){
  if(v<15)  return "Dink & Dunk";
  if(v<40)  return "Ball Control";
  if(v<=60) return "Balanced";
  if(v<85)  return "Take Shots";
  return "Air It Out";
}
// Tempo is its own lens now, independent of the run/pass call — you can run hurry-up out of a
// run-heavy set, or milk the clock while throwing. pace: >1 = fewer plays.
var TEMPO_TACTICS={
  burn:    {label:"Burn Clock",   icon:"🐢", pace:1.34, desc:"Milk the play clock. Fewer possessions for everyone."},
  normal:  {label:"Normal",       icon:"⏱️", pace:1.00, desc:"Standard tempo."},
  hurry:   {label:"Hurry Up",     icon:"⚡", pace:0.62, desc:"Snap fast. More plays — but your defense stays on the field."}
};
// Tempo is a CONTINUOUS axis now, 0..100: 0 = grind the clock, 50 = standard, 100 = full
// hurry-up. It interpolates the same pace multiplier the three named tempos used (burn 1.34 at
// the slow end, normal 1.00 at the middle, hurry 0.62 at the top), so the slider is a smooth
// surface over the exact machinery dClock already reads — no change to what any given pace does,
// only to how finely the player can pick it. Waypoints along the way give the dial real labels,
// including a no-huddle setting that sits between standard and full hurry-up.
var _TEMPO_ANCHOR={ burn:1.34, normal:1.00, hurry:0.62 };
function _tempoPaceAt(v){
  v=clampN(v,0,100);
  if(v<=50) return _TEMPO_ANCHOR.burn + (_TEMPO_ANCHOR.normal-_TEMPO_ANCHOR.burn)*(v/50);
  return _TEMPO_ANCHOR.normal + (_TEMPO_ANCHOR.hurry-_TEMPO_ANCHOR.normal)*((v-50)/50);
}
// The pace multiplier for a tempo value, whether it's a number (slider) or a named tempo (CPU).
function tempoPace(tempo){
  if(typeof tempo==="number") return _tempoPaceAt(tempo);
  return (_TEMPO_ANCHOR[tempo]!=null)?_TEMPO_ANCHOR[tempo]:1.00;
}
// Which discrete tempo a slider value reads as — for the fatigue table, 4th-down bias, and the
// CPU logic, which still think in named tempos.
function tempoCallOf(v){
  if(typeof v!=="number") return v;
  if(v<34) return "burn";
  if(v>66) return "hurry";
  return "normal";
}
// Is the tempo dial away from neutral (for the "set" chip highlight)?
function tempoIsSet(v){ return (typeof v==="number") ? (v<45||v>55) : (v!=="normal"); }
// A word for where the tempo dial sits — finer than the three anchors, with no-huddle between
// standard and full hurry-up.
function tempoDialLabel(v){
  if(typeof v!=="number") return (TEMPO_TACTICS[v]||TEMPO_TACTICS.normal).label;
  if(v<20)  return "Chew Clock";
  if(v<40)  return "Grind It Out";
  if(v<=60) return "Standard";
  if(v<80)  return "No-Huddle";
  return "Hurry-Up";
}
function tempoDialIcon(v){
  if(typeof v!=="number") return (TEMPO_TACTICS[v]||TEMPO_TACTICS.normal).icon;
  if(v<38)  return "🐢";
  if(v<=62) return "⏱️";
  if(v<80)  return "🏈";
  return "⚡";
}
// ── COVERAGE: the defense's second axis ──────────────────
// Aggression (blitz..prevent) says how hard you rush and how deep you sit. It says nothing about
// HOW you cover, which in real football is the other half of the call — and the half your
// personnel decides. A press-man corner and a zone corner are different players (the game already
// models them as separate archetypes and skills); this lets a DC actually play to whichever he
// has, instead of both being cosmetic.
//
// 0 = press man, 50 = balanced/match, 100 = zone.
//   MAN  tightens the completion window (harder to complete) but gives up chunk plays when it
//        breaks — you're isolated with no help behind.
//   ZONE concedes the underneath throw but keeps everything in front, so explosives die and
//        the ball gets tipped more often.
// The magnitude is scaled by PERSONNEL FIT: run man with zone corners and you get a fraction of

function autoTempo(G, pref){

function userIQ(){ return cpuIQ((ST.save && ST.save.prestige) || 3); }

  if(typeof pref==="number") return pref;

function tacticsOf(G, side){

function defMods(def){

var _DEF_ANCHOR={
  blitz:    {sack:+0.040, comp:-0.034, explosive:+0.042, runYds:+0.30, int:+0.005, shorten:-0.2},

function _blendMods(a, b, t){

// aggression 0..100: 0 = full blitz, 50 = standard, 100 = full prevent.
function _defModsAt(v){
  v=clampN(v,0,100);

// How much game clock a snap consumes, including the huddle and play clock that follow it.
//
// CALIBRATED FROM THE TARGET, not from broadcast times. A real game is 3600 seconds and ~140
// snaps, so the weighted average burn has to be ~26s. That is much less than the ~40s you'd
// clock between two running plays on TV, because the real clock stops constantly — every
// incompletion, every first down, out of bounds, timeouts, the two-minute warning. Those
// stoppages are not modelled individually here, so they have to be priced into the averages.
//

// real — which produced 205 snaps a game and inflated everything counted per attempt (~19 INTs
// a season off ~612 pass attempts). I then "fixed" it to broadcast-accurate 36-44s, which
// overshot the other way: 128 snaps, and the run game withered to 25 carries against a real 37.
//
// Solving from the target: with a ~55% pass share and a ~37% incompletion rate, the weighted

function dClock(res, tempo){

  if(res.kind==="run") return Math.max(6, Math.round(rnd(31,39)*t));

  // defense — the CPU expresses its identity through its scheme instead. Scaled by how well the
  // secondary's personnel fits the call (see coverMods).
  if(def===0 && G.userGame && ST.save && ST.save.gameplan && ST.save.gameplan.cover!=null){
    dm=mergeMods(dm, coverMods(ST.save.gameplan.cover));
  }
  // GROUP MATCHUP — the offense's skill/line groups against the defense's front and secondary.
  // This is a fact about the two rosters, not a coaching read, so it applies to BOTH teams on
  // every snap including skipped games. It's what makes a lopsided roster exploitable: their
  // 71 secondary is a real, findable weakness rather than an averaged-away detail.
  if(G.groups && G.groups[poss] && G.groups[def]){
    dm = addMods(dm, groupMatchup(G.groups[poss], G.groups[def]));
  }
  // SKILL SIGNATURE. Only your roster has real players to read (CPU teams are derived scalars),
  // so this applies to your side of the ball: your offense's ball security and hands when you
  // have it, your defense's rush and ball-hawks when they do. Both are deviations from each
  // player's own overall, so nothing here double-counts the talent already in `edge`.
  if(G.userGame){
    if(poss===0) dm = addMods(dm, offSkillMods());   // your offense on the field
    else         dm = addMods(dm, defSkillMods());   // your defense on the field
  }
  // The user's downfield dial (gameplan.aggro, 0..100) drives aggression on their own snaps; the
  // CPU still expresses it through its named call. Both land on the same aggro channel.
  var aggro;
  if(poss===0 && G.userGame && ST.save && ST.save.gameplan && ST.save.gameplan.aggro!=null){
    aggro=aggroFromDial(ST.save.gameplan.aggro);
  } else {
    aggro=(OFF_TACTICS[oT.off]||OFF_TACTICS.balanced).aggro||0;
  }
  var lean=clampN(tacticLean(teams[poss].lean, oT.off) + offShade, 5, 95);
  // Three things ride on the call you make, and they can pull against each other:
  //   traits   — do the PLAYERS who run this call fit it (offTraitEdge/defTraitEdge)
  //   identity — is your SYSTEM built for it, or are you off-script (identityCost)
  //   counter  — does it beat THIS opponent's system (counterMods), which is the read
  // Only the user's coached unit is affected; CPU-vs-CPU league games never touch it.
  if(G.userGame){
    if(!G.userHist) G.userHist={off:[],def:[]};
    if(G._autoSim){
      // Skipped game: identity/texture only, applied to BOTH teams evenly. No counters, keying,
      // or identity cost — those need a coach making live reads, and in a skip nobody is. But
      // roster quality (how well your players' archetypes fit the call) is TEAM quality, not a
      // read, so it still counts — mirroring the CPU's fit, which stays baked into its rating.
      if(poss===0){ edge += offTraitEdge("balanced"); dm = addMods(dm, offSchemeSig()); }
      else dm = addMods(dm, OFF_SIG[G.teams[1].offId]||{});
      if(def===0){ edge -= defTraitEdge("standard"); dm = addMods(dm, defSchemeSig()); }
      else dm = addMods(dm, DEF_SIG[G.teams[1].defId]||{});
    } else {
    // ── OFFENSE side (whoever has the ball) gets its scheme texture and its read of the D ──
    if(poss===0){
      G.userHist.off.push(oT.off); if(G.userHist.off.length>12) G.userHist.off.shift();
      edge += offTraitEdge(oT.off) - identityCost("off", oT);
      dm = addMods(dm, offSchemeSig());
      dm = addMods(dm, counterMods(counterBonus(OFF_COUNTER, oT.off, G.teams[1].defId), +1));
      dm = addMods(dm, keyingMods(keyingPenalty(G.userHist.off, oT.off), oT.off, +1));
    } else {
      // CPU offense: its own play-style, and it reads YOUR defensive formation.
      dm = addMods(dm, OFF_SIG[G.teams[1].offId]||{});
      dm = addMods(dm, counterMods(counterBonus(OFF_COUNTER, oT.off, G.teams[0].defId), +1));
    }
    // ── DEFENSE side (whoever's defending) reshapes the offense above ──
    if(def===0){
      G.userHist.def.push(defCall); if(G.userHist.def.length>12) G.userHist.def.shift();
      edge -= defTraitEdge(defCall) - identityCost("def", {def:defCall});
      dm = addMods(dm, defSchemeSig());
      dm = addMods(dm, counterMods(counterBonus(DEF_COUNTER, defCall, G.teams[1].offId), -1));
      dm = addMods(dm, keyingMods(keyingPenalty(G.userHist.def, defCall), defCall, +1));
    } else {
      // CPU defense: its own texture, and it reads YOUR offensive formation (hurts your O).
      dm = addMods(dm, DEF_SIG[G.teams[1].defId]||{});
      dm = addMods(dm, counterMods(counterBonus(DEF_COUNTER, defCall, G.teams[0].offId), -1));
    }
    }
  }
  var blk=blkOf(G, poss);

  if(G.down===4){
    var dec=fourthDown(G.yl,G.dist,G.clock,q,margin,tacticFourthBias(oT.tempo));
    if(dec==="punt"){
      stats[poss].punts++;
      plays.push({t:poss,q:q,clock:qc,down:4,dist:G.dist,yl:G.yl,kind:"punt",yards:0,pts:0,snap:true});
      var net=clampN(Math.round(42+gauss()*8),25,62);
      var ny=(G.yl+net>=100)?20:(100-(G.yl+net));
      G.clock-=rnd(12,20);
      G.poss=def; G.yl=clampN(ny,1,99); G.down=1; G.dist=10; return "played";
    }
    if(dec==="fg"){
      var fd=fgDist(G.yl); stats[poss].fga++; G.clock-=rnd(6,12);
      plays.push({t:poss,q:q,clock:qc,down:4,dist:G.dist,yl:G.yl,kind:"fgatt",yards:0,pts:0,snap:true,d:fd});
      if(Math.random()<fgProb(fd)){
        stats[poss].fgm++; S[poss]+=3;
        plays.push({t:poss,kind:"FG",pts:3,q:q,clock:qc,d:fd});
        G.poss=def; G.yl=25; G.clock-=rnd(4,8);
      } else {
        plays.push({t:poss,kind:"FGMISS",pts:0,q:q,clock:qc,d:fd});
        G.poss=def; G.yl=clampN(100-G.yl,1,99);
      }
      G.down=1; G.dist=10; return "played";
    }
    // "go" falls through to a live play
  }

  var call=callPlay(G.down,G.dist,G.yl,G.clock,q,margin,lean);
  var obvious=(G.down>=3 && G.dist>=6);
  var res=(call==="run")?dRun(edge,dm,blk.runAdj):dPass(edge,obvious,dm,aggro,blk.passAdj);
  stats[poss].plays++;
  var snap={t:poss, q:q, clock:qc, down:G.down, dist:G.dist, yl:G.yl,
            kind:res.kind, yards:res.yards, incomplete:res.incomplete,
            turnover:res.turnover, fourth:(G.down===4), pts:0, snap:true};
  plays.push(snap);
  if(res.kind==="run"){ stats[poss].rushYds+=res.yards; }
  else if(res.kind==="sack"){ stats[poss].sacks++; stats[poss].passYds+=res.yards; }
  else { stats[poss].att++; if(!res.incomplete){ stats[poss].comp++; stats[poss].passYds+=res.yards; } }
  if(G.down===3) stats[poss].thirdAtt++;
  G.clock-=dClock(res, oT.tempo);

  if(res.turnover){
    stats[poss].to++;
    if(res.kind==="int") stats[poss].ints++; else stats[poss].fums++;
    var spot=clampN(G.yl+res.yards,1,99);
    G.poss=def; G.yl=clampN(100-spot,1,99); G.down=1; G.dist=10; return "played";
  }
  var gained=res.yards; G.yl+=gained;

  if(G.yl<=0){                                  // safety
    S[def]+=2; plays.push({t:def,kind:"SFTY",pts:2,q:q,clock:qc});
    G.poss=def; G.yl=25; G.down=1; G.dist=10; return "played";
  }
  if(G.yl>=100){                                // touchdown
    S[poss]+=6;
    if(G.down===3) stats[poss].thirdConv++;
    plays.push({t:poss,kind:"TD",pts:6,q:q,clock:qc});
    var deficit=S[def]-(S[poss]-6);
    if(goesForTwo(deficit,q)){
      var ok=Math.random()<TWO_RATE; if(ok)S[poss]+=2;
      plays.push({t:poss,kind:"2PT",pts:ok?2:0,good:ok,q:q,clock:qc});
    } else {
      var ok2=Math.random()<XP_RATE; if(ok2)S[poss]+=1;
      plays.push({t:poss,kind:"XP",pts:ok2?1:0,good:ok2,q:q,clock:qc});
    }
    G.clock-=rnd(4,8);
    G.poss=def; G.yl=25; G.down=1; G.dist=10; return "played";
  }
  if(gained>=G.dist){                           // first down
    if(G.down===3) stats[poss].thirdConv++;
    G.down=1; G.dist=Math.min(10,100-G.yl);
  } else {
    G.down++; G.dist-=gained;
    if(G.down>4){ G.poss=def; G.yl=clampN(100-G.yl,1,99); G.down=1; G.dist=10; }
  }
  return "played";
}
// Run the game forward until the end of quarter `stopQ` (1..4), or to the final
// whistle when stopQ is falsy. Batch driver — used for CPU games and "Sim to Final".
function simUntil(G, stopQ){
  if(G.done) return G;
  var st;
  do { st=simSnap(G, stopQ); } while(st==="played");
  return G;
}
// Game time (seconds, 0..3600) the engine has actually simulated so far.
function engineElapsed(G){ return (G.half*1800) + (1800 - Math.max(0,G.clock)); }
// Generate snaps until the engine has simulated up to game-time `upto`, or hits the
// stop boundary for this stretch, or the game ends. Returns how many raw plays were
// added. Tactics are read inside simSnap, so a change made a moment ago lands here.
function simLiveTo(G, stopQ, upto){
  var added=0, guard=0;
  while(!G.done && guard++<900){
    if(engineElapsed(G)>=upto && G.clock>0) break;   // caught up (no pending clock flip)
    var before=G.plays.length;
    var st=simSnap(G, stopQ);
    added += (G.plays.length-before);
    if(st==="stop"||st==="done") break;
  }
  return added;
}
// Overtime — no ties. OT scores are emitted as plays so the feed matches the final.
function finishRegulation(G){
  var S=G.S, teams=G.teams, plays=G.plays, ot=0;
  while(S[0]===S[1] && ot++<6){
    for(var t=0;t<2;t++){
      var r=Math.random()+(teams[t].off-teams[1-t].def)/200;
      if(r>0.72){ S[t]+=7; plays.push({t:t,kind:"TD",pts:6,q:4,clock:0,ot:ot});
                  plays.push({t:t,kind:"XP",pts:1,good:true,q:4,clock:0,ot:ot}); }
      else if(r>0.42){ S[t]+=3; plays.push({t:t,kind:"FG",pts:3,q:4,clock:0,d:rnd(28,45),ot:ot}); }
    }
  }
  if(S[0]===S[1]){ var w=Math.random()<0.5?0:1; S[w]+=3;
    plays.push({t:w,kind:"FG",pts:3,q:4,clock:0,d:rnd(28,45),ot:ot}); }
  G.done=true;
}
function gameResult(G){ return {a:G.S[0], b:G.S[1], plays:G.plays, stats:G.stats}; }


// The offense/defense your team actually fields, resolved by role: you coach one
// unit, the other is CPU-run. Scheme fit is baked in because it's what takes the
// field; home-field advantage is not, since it's situational, not a team rating.
// gameSetup() and the scoreboard both read this, so they can never drift apart.
// Exact (unrounded) values — scheme fit carries a decimal and the drive engine
// is sensitive to it. Round only at the point of display.
function myRatings(){
  var role=ST.save.role;
  var offFit=offSchemeFit(), defFit=defSchemeFit();
  var off, def;
  if(role==="HC"){     off=offenseRating()+offFit;  def=defenseRating()+defFit; }
  else if(role==="DC"){ off=cpuUnitRating("off");    def=defenseRating()+defFit; }
  else {                off=offenseRating()+offFit; def=cpuUnitRating("def"); }
  return {off:off, def:def, ovr:(off+def)/2};
}
// Raw team strength for the scoreboard — NO scheme fit, so it sits on the same
// scale as oppRatings() and the "OFF 82" in the season header. Fit is surfaced
// separately as "Great fit +6.3"; folding it in here would show two different
// numbers for the same unit on the same screen.
function myRatingsDisplay(){
  var role=ST.save.role;
  var off = (role==="DC") ? cpuUnitRating("off") : offenseRating();
  var def = (role==="OC") ? cpuUnitRating("def") : defenseRating();
  return {off:Math.round(off), def:Math.round(def), ovr:Math.round((off+def)/2)};
}

// A CPU team's identity — stable per school, derived from its name, and REAL: it's one of
// the same five systems you can run, not a number. That's what makes it scoutable. The
// lean the sim actually plays with now falls out of the system (±3 of house style), so a
// Ground & Pound opponent genuinely runs it and a blitz call genuinely gets gashed.
function nameHash(name, salt){
  var h=salt||0;
  for(var i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0xffff;
  return h;
}
// ── POSITION GROUPS ──────────────────────────────────────
// A CPU team is stored as {off, def, ovr, p} — four numbers. That's enough to sim a score but
// not enough to have an IDENTITY: every opponent was an undifferentiated blob, its scheme picked
// by hashing its NAME (oppOffScheme = nameHash % 5) with no relationship to its personnel, and
// its "scheme fit" a flat prestige bonus that was identical whether the system suited the roster
// or not. You couldn't scout a weakness because there were no weaknesses to find.
//
// These give every team eight group ratings — QB/RB/WR/TE/OL on offense, DL/LB/CB/S on defense —
// derived from its off/def and prestige. Three properties matter:
//
//   1. THEY RECONCILE. The weighted average of the offensive groups, using the SAME POS_WEIGHT
//      the real offenseRating() uses, returns the team's off rating (and likewise def). Groups
//      are a decomposition of the rating, not a second opinion about it — so nothing downstream
//      that already reads off/def goes out of sync.
//   2. THEY'RE DETERMINISTIC. Keyed off nameHash, so a team has the same strengths every time
//      you look, across sessions and reloads, with no storage. Scouting means something only if
//      the thing you scouted stays scouted.
//   3. THEY'RE LOPSIDED. Real rosters aren't flat: a team is 82 overall because its line is 90
//      and its secondary is 71, and THAT is the exploitable fact. Spread scales with prestige —
//      a blue blood is strong everywhere (little variance), a bottom program is jagged (lots).
//      That's also why upsets happen: a p1 team with one elite group can take a game.
var OFF_GROUPS=["QB","RB","WR","TE","OL"];
var DEF_GROUPS=["DL","LB","CB","S"];
// Deterministic signed spread in [-1,1] for a team+position, stable forever.
function _groupNoise(name, pos, salt){
  var h=nameHash(name+"|"+pos, salt||17);
  return ((h%1000)/500)-1;    // -1..+1
}
// Decompose a unit rating into per-position groups whose POS_WEIGHT-weighted mean is the rating.
function _decompose(name, unitRating, weights, salt, spread){
  var keys=Object.keys(weights), raw={}, wsum=0, acc=0;
  keys.forEach(function(pos){
    var d=_groupNoise(name,pos,salt)*spread;
    raw[pos]=unitRating+d;
    wsum+=weights[pos]; acc+=raw[pos]*weights[pos];
  });
  // Re-center so the weighted mean lands exactly on unitRating — the noise must redistribute
  // talent, never create or destroy it, or groups would drift away from the team's real rating.
  var mean=acc/wsum, corr=unitRating-mean, out={};
  keys.forEach(function(pos){ out[pos]=clampN(Math.round(raw[pos]+corr), 40, 99); });
  return out;
}
// How jagged a roster is, by prestige. A blue blood recruits every position; a bottom program
// lands one gem and starts walk-ons next to him.
function _groupSpread(prestige){ return clampN(9.5 - (prestige||3)*1.1, 4.0, 9.0); }
// The eight group ratings for any league team. Cached per team per season on the league object.
//
// Two sources, in order of honesty:
//   1. t.stars — every team in your subdivision already carries ONE REAL PLAYER per position
//      (genStars), with an ovr and now an archetype. That man is the group's headliner, so his
//      JOB rating is read the same way yours is: skillOf(star, "run") for the line's run
//      blocking, skillOf(star, "stuff") for the front's run defence. This is what makes "our run
//      blocking vs their run stuffing" a real comparison rather than two overalls passing in the
//      night — and it means a CPU team with a Run Stuffer at DL genuinely defends the run better
//      than one with a Pass Rusher, at identical team ratings.
//   2. Derived decomposition — for teams outside your subdivision, which have no stars. Falls
//      back to the old behaviour so nothing breaks.
//
// The star is one man and a group is several, so his job rating is blended toward the unit's
// level rather than used raw: he sets the group's CHARACTER, the team rating sets its FLOOR.
function teamGroups(name){
  var L=ST.save && ST.save.league;
  var t=(L && L.teams && L.teams[name]) || null;
  if(!t) return null;
  var key=(t.off+"/"+t.def+"/"+((t.stars&&t.stars.length)?"s":"n"));
  if(t._grp && t._grpKey===key) return t._grp;
  var sp=_groupSpread(t.p);
  var g=_decompose(name, t.off, POS_WEIGHT, 17, sp);
  var d=_decompose(name, t.def, DEF_POS_WEIGHT, 91, sp);
  Object.keys(d).forEach(function(k){ g[k]=d[k]; });
  // Overlay the real star's job rating where we have one.
  if(t.stars && t.stars.length){
    var JOB={QB:"acc", RB:"power", WR:"hands", TE:"block", OL:"run",
             DL:"stuff", LB:"thump", CB:"press", S:"box"};
    t.stars.forEach(function(st){
      var job=JOB[st.pos]; if(!job || g[st.pos]==null) return;
      var v=skillOf(st, job);
      g[st.pos]=clampN(Math.round(g[st.pos]*0.45 + v*0.55), 40, 99);
    });
  }
  t._grp=g; t._grpKey=key;
  return g;
}
// YOUR groups come from your actual roster — no derivation needed, the players are right there.
// Same shape as teamGroups, so every consumer below works for both sides.
//
// A group's rating is JOB-SPECIFIC, not a position average, because the matchup that reads it
// asks a specific question: our run blocking against their run stuffing, our receivers' hands
// against their coverage. posDepthOvr would answer a different question — "how good is this
// position group in general" — and that's already priced into the team's off/def rating via
// offenseRating(). Feeding overalls here would compare talent to talent a second time and say
// nothing about the matchup. Measured before this fix: two 85-rated lines, one all Run Blockers
// and one all Pass Protectors, reported the identical OL group of 83.
//
// `_grpSkill` averages the starters' rating at one job, weighted toward the weak link on the
// jobs where a weak link actually hurts (protection, coverage) — same reasoning as olBlock.
function _grpSkill(pos, skill, weakLink){
  var r=ST.save.roster, st=depthOrder(r,pos).slice(0, startersAt(pos));
  if(!st.length) return null;
  var v=st.map(function(p){ return skillOf(p,skill); });
  var mean=v.reduce(function(a,b){return a+b;},0)/v.length;
  if(!weakLink) return mean;
  return mean*0.80 + Math.min.apply(null,v)*0.20;
}
function myGroups(){
  var r=ST.save.roster, g={};
  function pick(pos, skill, weakLink){
    var v=_grpSkill(pos, skill, weakLink);
    return v!=null ? Math.round(v) : null;
  }
  // Offense: the jobs the run and pass matchups actually ask about.
  g.QB = pick("QB","acc");
  g.RB = pick("RB","power");
  g.WR = pick("WR","hands");
  g.TE = pick("TE","block");
  g.OL = pick("OL","run");
  // Defense: run stuffing up front, coverage on the back end. Coverage is a weak-link job —
  // one corner who can't cover gets attacked every snap — so it's weighted toward the worst.
  g.DL = pick("DL","stuff");
  g.LB = pick("LB","thump");
  g.CB = pick("CB","press", true);
  g.S  = pick("S","box");
  // THE UNMANNED UNIT. A coordinator only has players on his own side of the ball, so an OC's
  // DL/LB/CB/S are empty and posDepthOvr returns a flat 58 for all four. That happens to cancel
  // inside groupMatchup (identical values deviate to zero), so it doesn't corrupt the sim — but
  // it's a lie anywhere it's displayed, and it throws away the fact that your counterpart's unit
  // has a real character. Decompose it the same way a CPU team's is, off the rating myRatings()
  // already substitutes for that side.
  var need=[];
  ["QB","RB","WR","TE","OL"].forEach(function(p){ if(g[p]==null) need.push(p); });
  if(need.length){
    var o=_decompose(ST.save.school, myRatings().off, POS_WEIGHT, 17, _groupSpread(ST.save.prestige));
    need.forEach(function(p){ g[p]=o[p]; });
  }
  need=[];
  ["DL","LB","CB","S"].forEach(function(p){ if(g[p]==null) need.push(p); });
  if(need.length){
    var d=_decompose(ST.save.school, myRatings().def, DEF_POS_WEIGHT, 91, _groupSpread(ST.save.prestige));
    need.forEach(function(p){ g[p]=d[p]; });
  }
  return g;
}
// Groups for either side of a matchup: yours from the roster, theirs derived.
function groupsFor(name){
  return (name===ST.save.school) ? myGroups() : teamGroups(name);
}
// Which scheme a CPU program runs. This used to be OFF_SCHEMES[nameHash(name)%5] — the team's
// LETTERS picked its system, so a program with a 94 QB and a 71 line might be handed Ground &
// Pound and a roster full of maulers might sling it. Now a program runs what its personnel is
// built for: score every scheme against its groups and take the best. Deterministic (the groups
// are), so it's still stable across sessions, but now it's a fact ABOUT the team.
function _schemeScoreFor(sc, g, side){
  // Score on SHAPE, for the same reason groupMatchup does: absolute ratings would just rank
  // schemes by whichever happens to name the most positions, and every team would converge on
  // one answer. (It did: 196 of 261 teams ran Spread and Air Raid went extinct.) What matters
  // is whether a scheme leans on the positions THIS team is relatively good at.
  var keys=(side==="off")?OFF_GROUPS:DEF_GROUPS;
  var weights=(side==="off")?POS_WEIGHT:DEF_POS_WEIGHT;
  var dev=_dev(g, keys, weights);
  var wants=Object.keys(sc.wants||{}).filter(function(p){ return dev[p]!=null; });
  var tot=0; wants.forEach(function(p){ tot+=dev[p]; });
  var demandFit = wants.length ? tot/wants.length : 0;   // +ve = system leans on our strengths
  // ...and does the system's run/pass (or blitz/cover) tilt match where the talent actually is?
  var ideal = (side==="off")
    ? clampN(50 + ((dev.OL*1.1 + dev.RB*1.3)/2.4 - (dev.QB*1.4 + dev.WR*1.1)/2.5)*2.2, 0, 100)
    : clampN(50 + ((dev.DL*1.3 + dev.LB)/2.3 - (dev.CB*1.2 + dev.S)/2.2)*2.2, 0, 100);
  var tend = Math.max(0, 1 - Math.abs(sc.lean-ideal)/55);
  return demandFit*0.35 + tend*1.0;
}
function oppOffScheme(name){
  var g=groupsFor(name);
  if(!g) return OFF_SCHEMES[nameHash(name,3)%OFF_SCHEMES.length];   // unknown team: old behavior
  var best=OFF_SCHEMES[0], bs=-1;
  OFF_SCHEMES.forEach(function(sc){ var s=_schemeScoreFor(sc,g,"off"); if(s>bs){bs=s;best=sc;} });
  return best;
}
function oppDefScheme(name){
  var g=groupsFor(name);
  if(!g) return DEF_SCHEMES[nameHash(name,11)%DEF_SCHEMES.length];
  var best=DEF_SCHEMES[0], bs=-1;
  DEF_SCHEMES.forEach(function(sc){ var s=_schemeScoreFor(sc,g,"def"); if(s>bs){bs=s;best=sc;} });
  return best;
}
function oppLean(name){
  return clampN(oppOffScheme(name).lean + (nameHash(name,5)%7) - 3, 5, 95);
}

// ── THE CPU COACH ────────────────────────────────────────
// Until now the opponent was talent-only: no fit, no signature, no calls. These give it a real
// sideline, scaled by program prestige — a blue blood is genuinely better coached than a
// cupcake. cpuFit puts its rating on the SAME scale as yours (you bake in scheme fit, so must
// it), and cpuIQ is how often it makes the smart call instead of playing it straight.
// cpuFit is a flat bonus to BOTH opponent units on every snap, so it's the single biggest
// dial on how hard the game feels — and unlike a talent gap it never goes away, which is what
// made grinding a rebuild feel like running in sand. Measured over full autopilot seasons at
// the old 1.4+p*0.42, it was worth roughly a win a year to every program, and it hit the
// BOTTOM hardest (Purdue 4.9 wins, Stanford 4.8) because a weak roster has no margin to eat a
// permanent +3.5 on the other side. Halved, every program gains ~1 win, the floor rises more
// than the ceiling (Purdue 5.6, Stanford 5.4, Ohio State 9.7->9.9), and the prestige scaling
// survives so a blue blood is still genuinely better coached than a cupcake. This is a
// difficulty choice, not a correctness fix: raise the coefficients to make the league meaner.
function cpuFit(prestige){ return clampN(0.7 + (prestige||3)*0.21, 0.7, 2.4); }
function cpuIQ(prestige){ return clampN(0.32 + (prestige||3)*0.07, 0.32, 0.81); }
// Pick the call that best answers the formation across from it.
function cpuBestCounter(table, calls, oppSchemeId){
  var best=calls[0], bv=-99;
  for(var i=0;i<calls.length;i++){ var v=counterBonus(table, calls[i], oppSchemeId); if(v>bv){bv=v; best=calls[i];} }
  return best;
}
// The CPU's OFFENSIVE call. It reads your defense AND respects its own identity — a Ground &
// Pound team keeps pounding even when a pass would counter you, because it isn't built to sling
// it. (Same identity discipline you play under.) Situational football overrides both.
function cpuOffCall(G){
  var iq=(G.teams[1].iq!=null?G.teams[1].iq:0.5), userDefId=G.teams[0].defId;
  var sc=schemeById("off", G.teams[1].offId), c=(sc&&sc.comfort)||{run:0.7,pass:0.7};
  var margin=G.S[1]-G.S[0], late=(G.clock<600);
  // Down-and-distance is callPlay()'s job — it already makes 3rd & 7+ a ~92% passing down all
  // by itself. Returning "pass" here too stacked lean:-32 on top of that (~95%) for BOTH
  // sidelines, and because a failed pass creates the next long down, it compounded: the CPU
  // was throwing 41-44 times a game off a neutral lean of 50. Only the score is added here.
  if(late && margin>0)  return "run";                  // protect the lead, drain clock
  if(late && margin<-8) return "pass";                 // two scores down, air it out
  // a smart CPU will shade to the call that counters you — but only if its system can run it.
  // Like the user's autoOff, this is a SHADE, not a commitment: it returns "balanced" so the
  // aggro and lean stay near neutral, and expresses the read as G._cpuShade, a small lean nudge
  // the snap loop folds in. Returning the full call here (e.g. "pass") used to over-commit and,
  // now that the user shades gently instead, left the CPU with a systematically bigger swing —
  // enough to tilt an even matchup by a point.
  G._cpuShade=0;
  if(Math.random()<iq*0.6){
    var cc=cpuBestCounter(OFF_COUNTER, ["run","balanced","pass"], userDefId);
    var comf = cc==="run"?c.run:(cc==="pass"?c.pass:(c.run+c.pass)/2);
    if(comf>=0.62 && cc!=="balanced"){ G._cpuShade=(cc==="pass"?-13:+13); return "balanced"; }
  }
  // otherwise play to identity: run-first, pass-first, or genuinely balanced
  if(c.run > c.pass+0.12) return "run";
  if(c.pass > c.run+0.12) return "pass";
  return "balanced";
}
// The CPU's DEFENSIVE call. Pressure fronts tee off (especially on obvious downs); coverage
// fronts sit back and protect leads. It'll take a counter only if its identity allows it —
// a Bend-Don't-Break defense won't suddenly bring the house.
function cpuDefCall(G){
  var iq=(G.teams[1].iq!=null?G.teams[1].iq:0.5), userOffId=G.teams[0].offId;
  var sc=schemeById("def", G.teams[1].defId), c=(sc&&sc.comfort)||{blitz:0.7,cover:0.7};
  var canBlitz=(c.blitz>=0.75), canCover=(c.cover>=0.8), margin=G.S[1]-G.S[0];
  // Identity and down-and-distance say what you'd LIKE to call; the counter table says what
  // the offense across from you punishes. A coordinator who blitzes on 3rd-and-long without
  // looking at who he's blitzing isn't smart, he's loud — and a Ground & Pound team eats it
  // (DEF_COUNTER.blitz vs pound is -1.2, strictly worse than just playing standard). So a
  // call that the table says is negative gets vetoed back to standard, in proportion to IQ:
  // a blue blood almost never walks into it, a cupcake still does.
  function vetoed(call){
    if(counterBonus(DEF_COUNTER, call, userOffId) >= 0) return false;
    return Math.random() < iq;      // the smarter he is, the likelier he sees it coming
  }
  function pick(call){ return vetoed(call) ? "standard" : call; }
  if(G.down>=3 && G.dist>=7 && canBlitz && Math.random()<iq*0.8) return pick("blitz");
  if(G.clock<420 && margin>8 && canCover) return pick("prevent");
  if(Math.random()<iq*0.55){
    var cc=cpuBestCounter(DEF_COUNTER, ["blitz","standard","prevent"], userOffId);
    if(cc==="blitz" && !canBlitz) cc="standard";     // don't blitz if you're not built for it
    if(cc==="prevent" && !canCover) cc="standard";
    return cc;
  }
  return (c.blitz>=0.9) ? pick("blitz") : "standard";  // identity base, still has to look
}
function cpuTempo(G){
  var margin=G.S[1]-G.S[0];
  if(G.clock<300 && margin<0) return "hurry";   // behind late — speed up
  if(G.clock<420 && margin>0) return "burn";    // ahead late — milk it
  return "normal";
}

// Break a final score into a believable sequence of scoring plays across 4 quarters.
// Returns [{q, clock, team:'us'|'them', kind, pts, usTot, themTot, desc}]
// ── Conversion logic ────────────────────────────────────
// A touchdown is 6. The scoring team then kicks the extra point (~95%) or, when the
// math calls for it, goes for two from the 2-yard line (~45%).
// (XP_RATE / TWO_RATE are declared with the drive engine above.)
// `down` = the scoring team's deficit BEFORE the touchdown's 6 points (negative = leading).
// `after` = down - 6 = the deficit once the TD is on the board, before the conversion.
// The classic chart calls, all of which a kick cannot resolve:
//   trail by 8 -> after  2 : two-point conversion TIES the game
//   trail by 5 -> after -1 : leading by 1; two makes it a field-goal game (3)
//   trail by 2 -> after -4 : leading by 4; two makes it a touchdown game (6)
//   trail by 1 -> after -5 : leading by 5; two makes it a two-score game (7)
// Late in the game these are near-automatic; early on, coaches take the point.
function goesForTwo(down, q){
  var after = down - 6;
  var chartCall = (after===2 || after===-1 || after===-4 || after===-5);
  if(!chartCall) return Math.random()<0.04;  // rare gamble / analytics call
  if(q>=4) return Math.random()<0.85;        // 4th quarter: take the points that matter
  if(q===3) return Math.random()<0.35;
  return Math.random()<0.10;                 // too early to chase points
}

// ── Play attribution ─────────────────────────────────────
// Pick a real player from your depth chart, weighted toward starters.
var DEPTH_W=[0.55,0.28,0.12,0.05];
// ═════════════════════════════════════════════════════════
// PLAY THE BACKUPS ("garbage time")
// When a game is decided there's no reason to keep your starters out there. Pull them, and the
// bench gets real snaps: games played, and — because development gives a starter a FOUR TIMES
// better breakout chance — a genuine shot at improving. The catch is real: your team gets worse
// on the spot, and any RESERVE who takes a snap BURNS HIS REDSHIRT. Free development it is not.
// ═════════════════════════════════════════════════════════
function gtActive(){ return !!(ST.live && ST.live.backups); }
// How much worse you are with the ones-and-twos on the sideline.
function benchPenalty(){
  var s=ST.save, drop=0, n=0;
  ALL_POS.forEach(function(pos){
    var d=depthOrder(s.roster,pos), ns=startersAt(pos);
    for(var i=0;i<ns && i<d.length;i++){
      var starter=d[i], sub=d[ns+i] || d[d.length-1];
      if(!sub) continue;
      drop += Math.max(0, starter.ovr - sub.ovr);
      n++;
    }
  });
  return n ? Math.round(drop/n) : 0;
}
// Who's about to lose a redshirt if you do this.
function benchRedshirtRisk(){
  var s=ST.save, out=[];
  ALL_POS.forEach(function(pos){
    depthOrder(s.roster,pos).slice(startersAt(pos), rotationAt(pos)+2).forEach(function(p){
      if(canRedshirt(p) && gamesPlayed(p) >= RS_GAME_LIMIT-1) out.push(p);
    });
  });
  return out;
}
function toggleBackups(){
  var G=ST.G, li=ST.live;
  if(!G || !li || li.done) return;
  li.backups=!li.backups;
  if(li.backups) li.backupsUsed=true;   // they played — they get the game, and the reps
  // The team on the field genuinely changes. G.teams[0] is YOUR side, live.
  var pen=benchPenalty();
  if(li.backups){
    li._benchPen=pen;
    G.teams[0].off=Math.max(35, G.teams[0].off-pen);
    G.teams[0].def=Math.max(35, G.teams[0].def-pen);
    var risk=benchRedshirtRisk();
    toast("🔄 Backups in — get 'em some reps."+(risk.length?" ⚠️ "+risk.length+" redshirt"+(risk.length>1?"s":"")+" on the line.":""));
  } else {
    var back=li._benchPen||0;
    G.teams[0].off=Math.min(99, G.teams[0].off+back);
    G.teams[0].def=Math.min(99, G.teams[0].def+back);
    li._benchPen=0;
    toast("🔙 Starters back in.");
  }
  renderLiveScore();
  draw();
}
function pickDepth(pos){
  // Only the ROTATION touches the ball. Previously this ran four deep at every position, so a
  // third-string RB who was supposed to be redshirting quietly rushed for 180 yards.
  var all=depthOrder(ST.save.roster,pos);
  // Garbage time: the starters sit. Everyone behind them plays.
  var d = gtActive() ? (all.slice(startersAt(pos)).length ? all.slice(startersAt(pos)) : all)
                     : all;
  d = d.slice(0, rotationAt(pos));
  if(!d.length) return null;
  var w=(ROTATION_W[pos]||DEPTH_W).slice(0, d.length);
  var tot=0; w.forEach(function(x){ tot+=x; });
  var r=Math.random()*tot, acc=0;
  for(var i=0;i<d.length;i++){ acc+=w[i]; if(r<acc) return d[i]; }
  return d[0];
}
// Who touched the ball? Only our own roster is named; opponents get a generated
// name since we don't model their rosters.
// A game's named cast. The starting QB takes nearly every snap, so he is fixed
// for the game rather than re-rolled per play; the opponent gets one QB name too.
function newCast(oppName){
  // The backup QB actually plays now — a share of snaps in relief. He used to be charged a full
  // season of games while never once touching the ball, which quietly burned his redshirt.
  var qb=pickDepth("QB") || depthOrder(ST.save.roster,"QB")[0];
  // The opponent has a REAL cast now: their actual star QB and skill players, pulled from the
  // league. (This used to invent a fresh random name on literally every snap.)
  var stars=starsOf(oppName);
  var at=function(pos){ return stars.filter(function(s){return s.pos===pos;})[0] || null; };
  var oQB=at("QB");
  return {
    usQB: qb?qb.n:genName(), usQBp: qb||null,
    oppQB: oQB?oQB.n:genName(),
    oppRB: at("RB"), oppWR: at("WR"), oppTE: at("TE")
  };
}
// A team's star players, if we have them (your own team uses your real roster instead).
function starsOf(name){
  var L=ST.save.league;
  var t=(L&&L.teams)?L.teams[name]:null;
  return (t&&t.stars)?t.stars:[];
}
// Returns display names AND the actual roster objects (ours only), so the
// play-by-play and the box score describe the SAME events.
function attribute(p, cast){
  if(p.t!==0){
    // The opponent's real stars carry the ball — their names show up in the feed, so you're
    // beating (or losing to) an actual player from an actual program.
    var b=null;
    if(p.kind==="run"){ b=cast.oppRB; }
    else if(p.kind==="pass"){
      var r=Math.random();
      b = r<0.60 ? cast.oppWR : (r<0.82 ? cast.oppTE : cast.oppRB);
    }
    var bn = b?b.n:genName(), guard=0;
    while(bn===cast.oppQB && guard++<6) bn=genName();  // never throw to yourself
    return {ball:bn, qb:cast.oppQB, ballP:null, qbP:null};
  }
  var qbP=cast.usQBp, qn=cast.usQB;
  if(p.kind==="run"){
    var keeper=(qbP && Math.random()<0.14);           // QB keepers happen
    var carrier= keeper ? qbP : pickDepth("RB");
    return {ball:carrier?carrier.n:genName(), qb:qn, ballP:carrier||null, qbP:qbP};
  }
  if(p.kind==="pass"){
    var r=Math.random();
    var tgt = r<0.62 ? pickDepth("WR") : (r<0.84 ? pickDepth("TE") : pickDepth("RB"));
    if(tgt && qbP && tgt.id===qbP.id) tgt=null;       // never throw to yourself
    return {ball:tgt?tgt.n:genName(), qb:qn, ballP:tgt||null, qbP:qbP};
  }
  return {ball:qn, qb:qn, ballP:qbP, qbP:qbP};
}
// "OKLA 34" / "UNT 41" — field position in broadcast form.
function fieldPos(yl, usAb, themAb){
  if(yl===50) return "50";
  return (yl<50 ? usAb : themAb)+" "+(yl<50 ? yl : 100-yl);
}
function ordDown(d){ return ["","1st","2nd","3rd","4th"][d]||String(d); }

// Dress the drive engine's real plays as a play-by-play feed.
// The score is NOT reconstructed here — these events already produced it.
// Every row carries `scoring:true|false` so the UI can filter to scoring plays.
//
// ATTRIBUTION IS STICKY. This runs on EVERY live tick over the WHOLE play list, so anything
// random in here gets re-rolled per rebuild: the same snap would draw a different QB and a
// different receiver each time. The box score's high-water cache (which only ever climbs)
// then unions every one of those re-rolls together — that's how you get two QBs who each
// "threw" the whole game, player yardage above the team total, and TDs that scatter off
// whoever was drawn last. So the cast is memoized per game, and each play's attribution is
// stamped onto the play object the first time it's seen and reused forever after.
function buildPlayByPlay(drivePlays, usName, themName){
  var usAb=abbr(usName), themAb=abbr(themName);
  var G=ST.G;
  if(G){ if(!G._cast) G._cast=newCast(themName); }
  var cast=(G && G._cast) ? G._cast : newCast(themName);
  var out=[], ut=0, tt=0;
  drivePlays.forEach(function(p){
    var team=(p.t===0)?"us":"them";
    var off=(p.t===0)?usAb:themAb, def=(p.t===0)?themAb:usAb;
    if(team==="us") ut+=p.pts; else tt+=p.pts;
    var elapsed=(p.q-1)*900 + (900-p.clock);
    var mm=Math.floor(p.clock/60), ss=p.clock%60;
    var desc, kind=p.kind, scoring=false, at=null;

    if(p.snap){
      // ── a normal snap: down, distance, field position, result ──
      // Stamp once, reuse forever: attribute() rolls pickDepth(), so calling it again on the
      // next rebuild would hand this same snap to a different player.
      if(!p._at) p._at=attribute(p,cast);
      at=p._at;
      var spot=fieldPos(p.yl, off, def);
      var sit=ordDown(p.down)+" & "+((p.yl+p.dist>=100)?"Goal":p.dist)+" at "+spot;
      // a gain is capped at the goal line only when the play actually scored
      var scored=(!p.turnover && p.yl+p.yards>=100);
      var gain=scored?(100-p.yl):p.yards;
      if(p.kind==="punt"){ desc=sit+" — punt away"; kind="PUNT"; }
      else if(p.kind==="fgatt"){ desc=sit+" — "+p.d+"-yard field goal attempt"; kind="FGA"; }
      else if(p.kind==="sack"){ desc=sit+" — "+at.qb+" SACKED for "+p.yards; kind="SACK"; }
      else if(p.kind==="int"){ desc=sit+" — INTERCEPTED, "+at.qb+" picked off"; kind="INT"; }
      else if(p.kind==="run"){
        var v=p.turnover?" — FUMBLE, "+at.ball+" loses it":
              " — "+at.ball+" "+(gain<0?"stuffed for "+gain:gain+" yard rush")+(scored?", TOUCHDOWN":"");
        desc=sit+v; kind=p.turnover?"FUM":"RUN";
      }
      else if(p.incomplete){ desc=sit+" — "+at.qb+" incomplete to "+at.ball; kind="INC"; }
      else { desc=sit+" — "+at.qb+" to "+at.ball+" for "+gain+(scored?", TOUCHDOWN":""); kind="PASS"; }
    } else {
      // ── a scoring event ──
      scoring=true;
      if(p.kind==="TD")          desc="TOUCHDOWN "+off;
      else if(p.kind==="FG")     desc=p.d+"-yard field goal is GOOD";
      else if(p.kind==="FGMISS") desc=p.d+"-yard field goal is no good";
      else if(p.kind==="XP")     desc=p.good?"extra point is good":"extra point is NO GOOD";
      else if(p.kind==="2PT")    desc=p.good?"two-point conversion is GOOD":"two-point try is stuffed";
      else                       desc="SAFETY";
      if(p.ot) desc="OT"+p.ot+" — "+desc;
    }
    out.push({q:p.q, clock:mm+":"+(ss<10?"0"+ss:ss), elapsed:elapsed, team:team,
              kind:kind, pts:p.pts, good:p.good, scoring:scoring,
              usTot:ut, themTot:tt, desc:desc,
              // raw event data the box score is derived from.
              // Yardage is capped at the goal line only when the play actually scored;
              // a fumble at the 1 gained what it gained.
              yards:(p.snap?((!p.turnover && p.yl+p.yards>=100)?(100-p.yl):p.yards):0),
              scored:(p.snap?(!p.turnover && p.yl+p.yards>=100):false),
              // down-and-distance, so the stats tab can derive third-down conversions
              down:(p.snap?p.down:0), dist:(p.snap?p.dist:0),
              firstDown:(p.snap && !p.turnover && p.kind!=="punt" && p.kind!=="fgatt" &&
                         (p.yl+p.yards>=100 || p.yards>=p.dist)),
              ballP:(at?at.ballP:null), qbP:(at?at.qbP:null)});
  });
  // stable sort by clock; snap rows precede the score they produced
  out.forEach(function(p,i){ p._i=i; });
  out.sort(function(a,b){ return (a.elapsed-b.elapsed) || (a._i-b._i); });
  var u2=0,t2=0;
  out.forEach(function(p){ if(p.team==="us")u2+=p.pts; else t2+=p.pts; p.usTot=u2; p.themTot=t2; });
  return out;
}

function draw(){
  applyTeamTheme();   // paint the active team's colors onto the accent variables
  renderTop();
  var app=document.getElementById("app");
  if(ST.screen==="loading"){ app.innerHTML='<div class="wrap"><div class="lb-note" style="text-align:center;padding:30px;color:var(--muted);font-weight:700">Loading dynasty…</div></div>'; return; }
  if(ST.screen==="setup")      app.innerHTML=setupScreen();
  else if(ST.screen==="recruit")app.innerHTML=recruitScreen();
  else if(ST.screen==="preseason")app.innerHTML=preseasonScreen();
  else if(ST.screen==="coachtree")app.innerHTML=coachTreeScreen();
  else if(ST.screen==="staff")    app.innerHTML=staffScreen();
  else if(ST.screen==="history")  app.innerHTML=champHistoryScreen();
  else if(ST.screen==="portal")   app.innerHTML=offseasonScreen();   // portal is a TAB in the hub now
  else if(ST.screen==="season") app.innerHTML=seasonScreen();
  else if(ST.screen==="live"){ if(!ST.G && !(ST.live&&ST.live.done)){ ST.screen="season"; ST.weekResult=null; ST.live=null; draw(); return; } app.innerHTML=liveScreen(); if(ST.live)ST.live._tacKey=null; bindLiveControls(); renderLiveScore(); }
  else if(ST.screen==="leaguemeeting")app.innerHTML=leagueMeetingScreen();
  else if(ST.screen==="offseason")app.innerHTML=offseasonScreen();
  // legacy screen names — postseason now lives inside the season screen's Week tab
  else if(ST.screen==="bracket"||ST.screen==="confchamp"||ST.screen==="bowl"){ ST.seasonTab=ST.seasonTab||"week"; app.innerHTML=seasonScreen(); }
  else if(ST.screen==="carousel") app.innerHTML=carouselScreen();
  else if(ST.screen==="fired")    app.innerHTML=firedScreen();
  else app.innerHTML=setupScreen();
  // NEVER do `app.innerHTML += ...` here. That re-serialises and re-parses the ENTIRE app DOM,
  // which destroys every existing node and silently strips their event listeners — including the
  // live-game controls, which are bound once when a game starts and not on every draw. That's how
  // the "Sim to Final" button quietly went dead. Overlays get their own container.
  var ov=document.getElementById("info-overlay");
  if(ov) ov.innerHTML = infoSheet() + playerCardSheet();
  bind();
  renderNilOverlay();
}
// Bottom-sheet slider for giving any dollar amount of NIL to a recruit or player.
function renderNilOverlay(){
  var el=document.getElementById("nil-overlay"); if(!el) return;
  var np=ST.nilPick, s=ST.save;
  if(!np || !s){ el.innerHTML=""; el.className=""; return; }
  var kind=np.kind, item, name, sub, maxA;
  if(kind==="recruit"){ item=(s.board||[]).filter(function(b){return b.id===np.id;})[0]; if(!item){ST.nilPick=null;el.innerHTML="";return;} name=item.n;
    // Show what the cheque is actually worth to THIS kid right now — money closes a recruitment,
    // it doesn't open one, and this is where you feel it.
    var _cc=nilCloseCost(item);
    sub=item.pos+" · "+item.ovr+" OVR est · "+(item.arch||"")+
        (_cc>0 && _cc<900 ? " · ~"+fmtMoney(_cc)+" to close" : "");
    var rcap=nilRecruitCap(); maxA=Math.max(0,Math.min(s.nilLeft,rcap.per,rcap.total-(item.nil||0))); }
  else { item=(s.roster||[]).filter(function(p){return p.id===np.id;})[0]; if(!item){ST.nilPick=null;el.innerHTML="";return;} name=item.n; sub=item.pos+" · "+item.yr+" · "+item.ovr+" OVR · wants "+fmtMoney(nilDemand(item)); maxA=Math.max(0,Math.min(s.nilLeft,Math.max(nilDemand(item)*1.5,1)-(item.nilFund||0))); }
  var val=Math.min(ST.nilPickVal!=null?ST.nilPickVal:0, maxA);
  var step=(kind==="recruit" && item)?(1/nilRate(item.st)):0.01; // recruit: each notch = +1 interest
  if(kind==="recruit"){ val=Math.round(val*nilRate(item.st))/nilRate(item.st); } // snap default to a notch
  el.innerHTML='<div class="nil-backdrop" id="nil-backdrop"></div><div class="nil-sheet">'+
    '<div class="nil-sheet-h">'+(kind==="recruit"?"💰 NIL Offer":"💰 Retention Fund")+'</div>'+
    '<div class="nil-sheet-nm">'+x(name)+'<span>'+x(sub)+'</span></div>'+
    '<div class="nil-sheet-amt" id="nil-amt">'+fmtMoney(val)+'</div>'+
    '<div class="nil-sheet-eff" id="nil-eff">'+nilPreview(kind,item,val)+'</div>'+
    '<input type="range" min="0" max="'+maxA+'" step="'+step+'" value="'+val+'" id="nil-slider" class="nil-range">'+
    '<div class="nil-sheet-scale"><span>$0</span><span>'+fmtMoney(maxA)+' available</span></div>'+
    '<div class="nil-sheet-btns"><button class="nil-cancel" id="nil-cancel">Cancel</button><button class="nil-commit" id="nil-commit">Commit '+fmtMoney(val)+'</button></div>'+
    '</div>';
  el.className="show";
  var sl=document.getElementById("nil-slider");
  sl.oninput=function(){ ST.nilPickVal=parseFloat(sl.value); document.getElementById("nil-amt").textContent=fmtMoney(ST.nilPickVal); document.getElementById("nil-eff").innerHTML=nilPreview(kind,item,ST.nilPickVal); document.getElementById("nil-commit").textContent="Commit "+fmtMoney(ST.nilPickVal); };

  var scrim=document.getElementById("menu-scrim");

  // wire the ribbon + menu action buttons (renderTop runs on every draw)
  document.querySelectorAll("[data-menu]").forEach(function(b){
    b.onclick=function(e){
      e.stopPropagation();
