// Rating used to sort the board: exact OVR once scouted (tier 2+), else a star-based estimate.
function estOvr(b){ if(b.scout>=2) return b.ovr; return ({5:82,4:76,3:70,2:63,1:54}[b.st])||65; }
// Dev-trait reveal at the final scout tier.
function recruitTraitDisplay(b){
  if(b.scout<maxScoutTier()) return "";
  if(b.dev==="elite") return '<span class="rec-trait elite">⭐ Elite</span>';
  if(b.dev==="pro")   return '<span class="rec-trait pro">🔥 Pro</span>';
  if(b.dev==="slow")  return '<span class="rec-trait bust">🐢 Slow</span>';
  if(b.dev==="bust")  return '<span class="rec-trait bust">⚠ Bust</span>';
  return '<span class="rec-trait">Steady</span>';
}
// Points you get to spend each week on recruiting
function weeklyRecruitPoints(){
  var s=ST.save;
  return 8 + s.prestige*2 + (s.role==="HC"?10:0) + (hasAbility("rec1")?3:0) + (hasAbility("rec4")?2:0) + (hasAbility("leg2")?3:0) + facLvl("nil"); // HC works the whole board, so more points; Recruiter starts with rec1 (+3)
}
// Spend a point of recruiting effort on a prospect this week (raises your interest).
var MAX_WEEKLY_RECRUIT=3; // most "+ Recruit" pushes you can make on one prospect in a single week
function recruitProspect(id){
  var s=ST.save, b=(s.board||[]).filter(function(x){return x.id===id;})[0];
  if(!b || b.status!=="open"){ return; }
  if((b.wkRec||0)>=MAX_WEEKLY_RECRUIT){ toast("Max "+MAX_WEEKLY_RECRUIT+" pushes on "+x(b.n)+" this week — come back next week"); return; }
  if((s.recruitPtsLeft||0)<=0){ toast("No recruiting points left this week"); return; }
  s.recruitPtsLeft--;
  b.wkRec=(b.wkRec||0)+1;
  // each point adds interest, with diminishing returns as it gets high; a 5★ is harder to sway.
  // Tuned so closing a recruit takes ~7-9 clicks — you can seriously pursue ~10 targets a year.
  var gain = Math.max(3, 8 - Math.floor(b.st*0.7) - Math.floor(b.interest/22));
  b.interest = Math.min(100, b.interest + gain);
  if(b.interest>=100){ b.status="committed"; b.committedTo=s.school; toast("🎉 "+x(b.n)+" committed to you!"); }
  persist(); draw();
}
// Add/remove a prospect from your watchlist (the ⭐ Watch filter). Free — costs no points.
function toggleWatch(id){
  var s=ST.save, b=(s.board||[]).filter(function(x){return x.id===id;})[0];
  if(!b || b.status!=="open"){ return; }
  b.watch=!b.watch;
  toast(b.watch ? ("⭐ "+x(b.n)+" added to watchlist") : (x(b.n)+" removed from watchlist"));
  persist(); draw();
}
// Advance recruiting one week: rivals push their prospects, and prospects may commit.
function advanceRecruitingWeek(){
  var s=ST.save; if(!s.board) return;
  s.board.forEach(function(b){
    if(b.status!=="open") return;
    b.wkRec=0; // reset this player's weekly recruiting-push allowance
    // rivals gain interest each week (higher-prestige rivals push harder; blue-chip gems draw a frenzy)
    b.rivals.forEach(function(rv){
      var push = Math.max(1, Math.round(rv.p*1.0) + rnd(0,2));
      if(b.dev==="elite"||b.dev==="pro") push += rnd(3,5); // every program covets a high-ceiling prospect — poached fast
      rv.interest = Math.min(100, rv.interest + push);
    });
    // COMMITMENT: the leader gets more likely to land the recruit as interest climbs toward 100
    var topRival = b.rivals.reduce(function(m,rv){ return (!m||rv.interest>m.interest)?rv:m; }, null);
    var rivalLead = topRival ? topRival.interest : 0;
    var youLead = b.interest >= rivalLead;
    var leaderInt = Math.max(b.interest, rivalLead);
    var margin = Math.abs(b.interest - rivalLead);
    var commitToLeader=function(){
      if(youLead){ b.status="committed"; b.committedTo=s.school; }
      else {
        b.status="lost"; b.committedTo=topRival.name;
        // he signed elsewhere — the NIL you pledged him never gets paid, so it returns to the pot
        if(b.nil>0){ s.nilLeft=money2((s.nilLeft||0)+b.nil); toast("↩️ "+fmtMoney(b.nil)+" NIL freed up — "+x(b.n)+" chose "+x(topRival.name)); }
      }
    };
    if(leaderInt>=100){ commitToLeader(); } // maxed interest → instant commit
    else if(leaderInt>=66){
      var base=(leaderInt-64)/36;                        // 0 at 64 → ~1 near 100
      var marg=Math.max(0.2, Math.min(1,(margin+3)/14)); // a clear lead lands them; a dead heat lingers
      var p=Math.max(0, Math.min(0.95, base*marg));      // weekly commit chance
      if(Math.random()<p) commitToLeader();
    }
  });
  // refresh weekly points
  s.recruitPtsLeft = weeklyRecruitPoints(); s._usedFreeScout=false;
  persist();
}
function committedRecruits(){ return (ST.save.board||[]).filter(function(b){return b.status==="committed";}); }
function budgetFor(prestige, role){
  var b = 30 + prestige*14;          // prestige scales budget
  if(role==="OC"||role==="DC") b = Math.round(b*0.62); // coordinators control one unit => smaller pot
  return b;
}
function genSchedule(team){
  // FBS: 12 games = ~3 non-conference + 9 conference.
  // FCS: 11 games = ~3 non-conference + 8 conference — and one of those non-con slots
  //      is usually a "money game": a road trip to an FBS program for a fat paycheck.
  var div = teamDivision(team.c);
  var isFCS = (div==="FCS");
  var indep = isIndependentConf(team.c);
  var total = isFCS ? 11 : 12;
  var myDivPool = divTeams(div).filter(function(t){return t.n!==team.n;});
  // Independents have no league, so no opponent is ever "in conference" — every game
  // is a non-conference game and every game stays editable.
  var conf = indep ? [] : myDivPool.filter(function(t){return t.c===team.c;});
  var others = indep ? myDivPool : myDivPool.filter(function(t){return t.c!==team.c;});
  var games=[]; var used={};
  function add(list,n,isConf,flags){
    var avail=list.filter(function(t){return !used[t.n];});
    var c=0;
    while(c<n && avail.length){
      var idx=Math.floor(Math.random()*avail.length);
      var t=avail.splice(idx,1)[0];
      used[t.n]=1;
      var g={opp:t.n, oc:t.c, op:t.p, home:Math.random()<0.55, conf:isConf};
      if(flags) for(var k in flags) g[k]=flags[k];
      games.push(g);
      c++;
    }
  }
  // An independent builds its whole slate from scratch — fill every week with an
  // editable non-conference game and stop. No money game is forced on them either;
  // they're free to schedule up or down however they like.
  if(indep){
    add(others,total,false);
    return games.slice(0,total);
  }
  var nonConfSlots = 3;
  if(isFCS){
    // Money game: always on the road at a real FBS school. Big payday, long odds.
    var fbsPool = FBS_TEAMS.filter(function(t){ return t.p>=2; });
    var mg = fbsPool[Math.floor(Math.random()*fbsPool.length)];
    used[mg.n]=1;
    games.push({opp:mg.n, oc:mg.c, op:mg.p, home:false, conf:false, moneyGame:true, div:"FBS"});
    nonConfSlots = 2;
  }
  add(others,nonConfSlots,false);        // non-conference games (weeks 1-3, editable)
  add(conf,total-games.length,true);     // conference games fill the rest (locked)
  // Small leagues (SoCon, Patriot, NEC, Ivy...) can't supply a full conference slate.
  // Backfill the remainder with additional non-conference games in the same subdivision
  // so every team plays a full schedule.
  if(games.length<total) add(others,total-games.length,false);
  return games.slice(0,total);
}

// ── Ratings & sim ────────────────────────────────────────
// Players at a position in DEPTH-CHART order. If the user has set a manual order
// (depthRank), that wins; otherwise fall back to overall rating. This lets you start
// a promising young player over a higher-rated veteran.
function depthOrder(roster, pos){
  return roster.filter(function(p){return p.pos===pos;}).sort(function(a,b){
    var da=(a.depthRank==null?999:a.depthRank), db=(b.depthRank==null?999:b.depthRank);
    if(da!==db) return da-db;         // manual order first
    return b.ovr-a.ovr;               // then by rating
  });
}
// Effective rating at a position = the average of its STARTERS (per the depth chart),
// nudged slightly by the quality of the next player (depth). Thin positions are a liability.
function posDepthOvr(roster, pos){
  var atPos=depthOrder(roster, pos);
  if(!atPos.length) return 58;
  var need=startersAt(pos);
  var starters=atPos.slice(0, need);
  // if not enough bodies to fill the starting slots, the empty slots count as weak (55)
  var sum=0;
  for(var i=0;i<need;i++){ sum += starters[i]?starters[i].ovr:55; }
  var starterAvg=sum/need;
  var backup=atPos[need]?atPos[need].ovr:Math.max(50,starterAvg-16); // depth behind the starters
  return starterAvg*0.9 + backup*0.1;
}
function offenseRating(){
  var r=ST.save.roster;
  var tot=0,wsum=0;
  Object.keys(POS_WEIGHT).forEach(function(pos){ var w=POS_WEIGHT[pos]; tot+=posDepthOvr(r,pos)*w; wsum+=w; });
  var abil = (hasAbility("off1")?2:0) + (hasAbility("off3")?3:0) + (hasAbility("off4")?3:0) + (hasAbility("leg1")?3:0) + (hasAbility("leg3")?2:0); // Play Caller + Air Raid + Mastermind + Legend
  return Math.round(tot/wsum) + abil;
}
// Defense rating from your recruited defensive players (DC's unit)
function defenseRating(){
  var r=ST.save.roster;
  var tot=0,wsum=0;
  Object.keys(DEF_POS_WEIGHT).forEach(function(pos){ var w=DEF_POS_WEIGHT[pos]; tot+=posDepthOvr(r,pos)*w; wsum+=w; });
  var abil = (hasAbility("def1")?2:0) + (hasAbility("def3")?3:0) + (hasAbility("def4")?3:0) + (hasAbility("leg1")?3:0) + (hasAbility("leg3")?2:0); // Coordinator + Lockdown + Mastermind + Legend
  return Math.round(tot/wsum) + abil;
}
// The rating of the unit YOU coach (offense if OC, defense if DC; HC = team avg)
function myUnitRating(){
  if(ST.save.role==="DC")return defenseRating();
  if(ST.save.role==="HC")return Math.round((offenseRating()+defenseRating())/2);
  return offenseRating();
}
function cpuDefenseRating(oppPrestige){ return 58 + oppPrestige*6 + rnd(-4,4); }
// The unit the CPU runs at your school (defense if you're OC, offense if you're DC), scales with prestige
// The rating of the unit you DON'T coach. It has to come from the same place the
// opponent's rating does — the league table, seeded from TEAM_RATINGS and drifting
// with results. The old `56 + prestige*6` was a crude stand-in that ran ~12 points
// light for a prestige-1 program and ~9 light for a prestige-2 one, so an OC at
// Wake Forest fielded a fictional 68 defense instead of its real 80.
// `side` is "off" or "def".
function cpuUnitRating(side){
  var s=ST.save;
  var t=leagueTeam(s.school);
  if(t){ var v=(side==="def")?t.def:t.off; if(v!=null) return v; }
  var r=TEAM_RATINGS[s.school];
  if(r) return (side==="def")?r.d:r.o;
  return 56 + s.prestige*6;   // unknown school (custom/legacy save)
}

// offBalance: 0 = all pass, 100 = all run.   defBalance: 0 = all coverage, 100 = all blitz.

// ── Named schemes (Phase 2) ─────────────────────────────
// Each system has a Pass/Run (or Coverage/Blitz) lean and a set of archetype "wants" at
// key positions. Your scheme-fit bonus rewards STARTERS whose archetype matches the system.
var OFF_SCHEMES=[
  {id:"airraid",  name:"Air Raid",      lean:22, desc:"Spread wide and sling it — tempo and vertical shots.",
   wants:{QB:["Pocket Passer"], WR:["Vertical Threat","Slot"], TE:["Receiving TE"], OL:["Pass Protector"]}},

   wants:{QB:["Dual-Threat"], RB:["Elusive"], WR:["Slot","Vertical Threat"], OL:["Run Blocker"]}},
  {id:"prostyle", name:"Pro-Style",     lean:53, desc:"Balanced and physical, multiple looks.",
   wants:{QB:["Pocket Passer"], RB:["Power Back","Receiving Back"], WR:["Possession"], TE:["Receiving TE"]}},

];
var DEF_SCHEMES=[
  {id:"nickel",   name:"Nickel",          lean:32, desc:"Extra DB on the field — built to smother the pass.",
   wants:{DL:["Pass Rusher"], LB:["Coverage LB"], CB:["Press-Man CB"], S:["Ball-Hawk"]}},
  {id:"zone",     name:"Bend-Don't-Break",lean:37, desc:"Zone coverage, gang tackle, force field goals.",
   wants:{DL:["Run Stuffer"], LB:["Coverage LB"], CB:["Zone CB"], S:["Ball-Hawk"]}},
  {id:"base43",   name:"4-3 Base",        lean:50, desc:"Sound, gap-disciplined front seven.",
   wants:{DL:["Run Stuffer"], LB:["Thumper"], S:["Box Safety"]}},
  {id:"multiple34",name:"3-4 Multiple",   lean:58, desc:"Disguise pressure out of a two-gap front.",
   wants:{DL:["Pass Rusher"], LB:["Blitzer","Coverage LB"], CB:["Zone CB"]}},
  {id:"blitz",    name:"Blitz-Heavy",     lean:76, desc:"Bring the house and live on the edge.",
   wants:{DL:["Pass Rusher"], LB:["Blitzer"], CB:["Press-Man CB"], S:["Box Safety"]}}
];
function offScheme(){ var id=ST.save&&ST.save.offScheme; return OFF_SCHEMES.filter(function(x){return x.id===id;})[0]||OFF_SCHEMES[3]; }
function defScheme(){ var id=ST.save&&ST.save.defScheme; return DEF_SCHEMES.filter(function(x){return x.id===id;})[0]||DEF_SCHEMES[2]; }
// Fraction (0..1) of a scheme's key STARTERS whose archetype matches what it wants.
function schemeArchMatch(scheme){
  var s=ST.save, matched=0, total=0;
  Object.keys(scheme.wants).forEach(function(pos){
    var want=scheme.wants[pos];
    depthOrder(s.roster,pos).slice(0, startersAt(pos)).forEach(function(p){
      total++; if(want.indexOf(p.arch)>=0) matched++;
    });
  });
  return total? matched/total : 0;
}
// Which scheme in a list best fits your current roster (for the "best fit" hint).
function bestScheme(side){
  var list=side==="off"?OFF_SCHEMES:DEF_SCHEMES;
  var ideal=side==="off"?idealOffBalance():idealDefBalance();
  var best=list[0], bestScore=-1;
  list.forEach(function(sc){
    var tend=Math.max(0,1-Math.abs(sc.lean-ideal)/55);
    var sco=schemeArchMatch(sc)*0.6 + tend*0.4;
    if(sco>bestScore){ bestScore=sco; best=sc; }
  });
  return best;
}
function setScheme(side, id){
  var s=ST.save; if(!s) return;
  if(side==="off"){ s.offScheme=id; s.gameplan.offBalance=offScheme().lean; }
  else { s.defScheme=id; s.gameplan.defBalance=defScheme().lean; }
  persist(); draw();
}
// best OVR at a position group
function bestAt(positions){
  var r=ST.save.roster, best={};
  r.forEach(function(p){ if(positions.indexOf(p.pos)>=0){ if(!best[p.pos]||p.ovr>best[p.pos])best[p.pos]=p.ovr; } });
  var vals=positions.map(function(p){return best[p]||60;});
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
// Offensive scheme fit → the same 0..cap bonus the sim expects, now driven by how well
// your starters' archetypes fit your system, plus whether the system suits your roster.
function offSchemeFit(){
  var sc=offScheme();
  var tendency=Math.max(0, 1 - Math.abs(sc.lean - idealOffBalance())/55); // does the system suit your talent?
  var archScore=schemeArchMatch(sc);                                      // do your starters fit the system?
  var fit01=archScore*0.6 + tendency*0.4;
  var cap = hasAbility("off5")?11:((hasArch("offensive")||hasAbility("off2"))?8:5); // Peak Offense > Scheme Guru/Offensive Mind
  return Math.round(fit01*cap*10)/10;
}
function defSchemeFit(){
  var sc=defScheme();
  var tendency=Math.max(0, 1 - Math.abs(sc.lean - idealDefBalance())/55);
  var archScore=schemeArchMatch(sc);
  var fit01=archScore*0.6 + tendency*0.4;
  var cap = hasAbility("def5")?11:((hasArch("defensive")||hasAbility("def2"))?8:5); // Peak Defense > Disguise/Defensive Mind
  return Math.round(fit01*cap*10)/10;
}
// The scheme-fit bonus applied to a unit you control this game
function schemeFitFor(side){ return side==="off" ? offSchemeFit() : defSchemeFit(); }
// Suggest the ideal slider values (for UI hints)
function idealOffBalance(){
  var passStrength=(bestAt(["QB"])*1.3 + bestAt(["WR","TE"]))/2.3;
  var runStrength =(bestAt(["RB"]) + bestAt(["OL"])*1.2)/2.2;
  return Math.max(0,Math.min(100, Math.round(50 + (runStrength-passStrength)*2.2)));
}
function idealDefBalance(){
  var blitzStrength=(bestAt(["DL"])*1.3 + bestAt(["LB"]))/2.3;
  var coverStrength=(bestAt(["CB"])*1.2 + bestAt(["S"]))/2.2;
  return Math.max(0,Math.min(100, Math.round(50 + (blitzStrength-coverStrength)*2.2)));
}

// In-season development: players make small gains during the year (younger + gems grow faster).
// Development also gradually "reveals" a player's hidden dev trait.
function developInSeason(){
  var s=ST.save; if(!s||!s.roster)return;
  var dev2 = hasArch("developer") || hasAbility("dev1"); // faster growth (archetype or Teacher skill)
  var revealFast = hasArch("developer") || hasAbility("dev2"); // Eye for Talent reveals sooner
  s.roster.forEach(function(p){
    var pot = Math.max(p.pot!=null?p.pot:99, p.ovr); // never below current (safety for old saves)
    var head = pot - p.ovr;
    if(head>0){
      // chance of a bump each week, weighted by youth; gems develop ~2x, busts ~half
      var youthBoost = p.yr==="FR"?0.30:(p.yr==="SO"?0.22:(p.yr==="JR"?0.14:0.08));
      if(dev2) youthBoost += 0.12; // developer grows players faster
      if(hasAbility("dev4")) youthBoost += 0.10; // Master Motivator: faster still
      if(facLvl("training")>0) youthBoost += 0.04*facLvl("training"); // Training Facilities
      var dmult = devMult(p.dev); // Elite 1.8 → Bust 0.5
      var nearCap = Math.min(1, head/6); // taper the final points so nobody snaps to their ceiling
      if(Math.random() < youthBoost*dmult*nearCap){
        var gain = 1;
        if(dev2) gain += 1;
        if(hasAbility("dev4")) gain += 1;
        p.ovr=Math.min(pot, p.ovr+gain);
      }
    }
    // breakout: a small weekly chance to jump up a dev tier — much higher for players who start a lot
    if(p.dev!=="elite"){
      var starting=isStarterPlayer(p);
      var upC=(starting?0.014:0.003) + (facLvl("training")>0?0.002:0); // starters break out ~5x as often
      if(p.yr==="FR"||p.yr==="SO") upC*=1.3; // young players have more runway to pop
      if(Math.random()<upC){
        p.dev=nextTrait(p.dev);
        p.pot=Math.max(p.pot||0, rollPotential(p.startOvr!=null?p.startOvr:p.ovr, p.dev));
        if(!devInfo(p.dev).hidden) p.revealed=true;
        if(starting) toast("📈 "+x(p.n)+" is turning into a "+traitName(p.dev)+" developer!");
      }
    }
    // reveal the hidden trait once a player has developed enough evidence (sooner with Eye for Talent)
    var revealThresh = revealFast?2:3;
    if(!p.revealed && (Math.abs(p.ovr-p.startOvr)>=revealThresh || p.yr==="JR" || p.yr==="SR")){
      if(!devInfo(p.dev).hidden) p.revealed=true;
    }
  });
}

// ── Gameplan panel (standing sliders) ────────────────────
function sliderRow(id, leftLbl, rightLbl, val, ideal, tip){
  var h='<div class="gp-slider">';
  h+='<div class="gps-top"><span>'+leftLbl+'</span><span class="gps-val">'+val+'</span><span>'+rightLbl+'</span></div>';
  h+='<input type="range" min="0" max="100" value="'+val+'" class="gps-range" data-slider="'+id+'">';
  // Marker sits at the slider thumb's true center: origin 15px (2px border + 13px half-thumb),
  // travel = full width minus 30px. translateX(-50%) centers the ▲ exactly on that point.

// ── Season-long recruiting tab ───────────────────────────
// ── NIL (real football $, anchored to public NIL trackers) ─────────────────
// Football-only NIL budget in $millions, by program prestige, +facilities +last wins.
// Anchors: elite ≈ $40M (Texas), solid P4 ≈ $11M (Wake), top G5 ≈ $11M (USF), G5 ≈ $4M (Tulsa).
// Annual NIL collective pool, in $M, by prestige. FBS and FCS are entirely different
// markets: an elite FCS collective (Montana, South Dakota State) runs ~$2M, while the
// smallest ones scrape together ~$250K. A blue-blood FBS program clears $30M+. Prestige
// is scaled WITHIN a subdivision, so an FCS 5-star must never draw an FBS 5-star's pool.
var NIL_BASE={1:4, 2:8, 3:12, 4:22, 5:36};                      // FBS: $4M → $36M
var NIL_BASE_FCS={1:0.25, 2:0.5, 3:0.75, 4:1.4, 5:2.2};         // FCS: $250K → $2.2M
function nilBaseFor(prestige, conf){
  var tbl = isFCSConf(conf) ? NIL_BASE_FCS : NIL_BASE;
  return tbl[prestige] || (isFCSConf(conf) ? 0.5 : 8);
}
// Everything downstream (facility bonuses, win bonuses, per-recruit caps, player demands)
// is expressed as a FRACTION of the elite pool for that subdivision, so the whole economy
// rescales together instead of a maxed facility dwarfing an FCS budget.
function nilElitePool(){ return isFCSConf(ST.save.conf) ? NIL_BASE_FCS[5] : NIL_BASE[5]; }
// Position value weights — the NIL market pays QBs the most, then premium skill/pass-rush/corner.
var NIL_POS_W={QB:1.9, WR:1.2, CB:1.15, DL:1.15, RB:1.05, S:0.95, LB:0.95, OL:0.9, TE:0.85};
// Per-position annual pay bands ($M) at a P4-elite scale: [starterLo, starterHi, depthLo, depthHi].
// Everything scales down by program NIL pool (a G6 pays a fraction of these).
var POS_PAY={
  QB:[1.5,3.5,0.05,0.10], WR:[0.8,2.0,0.025,0.05], DL:[0.7,1.7,0.02,0.04],
  OL:[0.4,1.0,0.015,0.03], RB:[0.4,1.0,0.015,0.03], CB:[0.4,1.0,0.015,0.03],
  S:[0.3,1.0,0.015,0.03], TE:[0.3,0.8,0.015,0.03], LB:[0.3,0.7,0.015,0.03]
};
function fmtMoney(m){ m=m||0; if(m>=1) return "$"+(Math.round(m*10)/10)+"M"; if(m>0.0001) return "$"+Math.round(m*1000)+"K"; return "$0"; }
function money2(m){ return Math.round((m||0)*100)/100; } // avoid float drift
// Season NIL budget multiplier from the NIL coaching branch (stacks).
function nilPerkBudgetMult(){
  var m=1;
  if(hasAbility("nil1")) m+=0.20;   // Booster Club
  if(hasAbility("nil4")) m+=0.35;   // Blank Check
  if(hasAbility("nil5")) m+=0.50;   // Collective Empire
  return m;
}
// Per-recruit NIL offer caps — Blank Check lets you go much bigger on one target.
// Caps on what you may commit to ONE recruit, and to the recruiting class overall.
// These were flat ($8M / $15M), which is larger than an entire FCS collective — the cap
// would never bind and an FCS coach could offer a recruit 4x his whole budget. Expressing
// them as a share of your own pool keeps the constraint meaningful at every level.
//
// The percentages are reverse-engineered from the old flat caps at the case they were tuned
// for (a head coach at an elite FBS program: $8M/$36M = 22%, $15M/$36M = 42%), so that
// scenario is unchanged. Everywhere else the flat cap was simply non-binding.
function nilRecruitCap(){
  var pool=Math.max(0.01, nilBudgetFor());
  var big=hasAbility("nil4");                       // Blank Check
  return { per:   money2(pool * (big?0.34:0.23)),   // one recruit: ~23% of the pool (34% w/ perk)
           total: money2(pool * (big?0.67:0.42)) }; // whole class: ~42% (67% w/ perk)
}
function nilBudgetFor(){
  var s=ST.save;
  var base=nilBaseFor(s.prestige, s.conf);
  // Facility and win bonuses used to be flat $M, which is meaningless at FCS scale — a maxed
  // NIL facility (+$6M) was 3x Montana's entire collective. Express them as a share of the
  // elite pool instead: the same upgrade is worth the same PROPORTION in either subdivision.
  var elite=nilElitePool();
  var bonus=(facLvl("nil")*0.0555 + facLvl("stadium")*0.0278 + (s._lastWins||0)*0.0111) * elite;
  var pool=(base + bonus) * nilPerkBudgetMult();
  return money2(pool * (s.role==="HC"?1:0.5)); // OC/DC control only their unit's share of the collective
}
// A rough "production" score from a player's season stats — productive players get noticed.
function prodScore(p){
  var st=(p.stats&&p.stats.season)||{}, v=0;
  v+=(st.py||0)/320 + (st.ptd||0)*0.7;                      // passing
  v+=(st.ry||0)/230 + (st.rtd||0)*0.9;                      // rushing
  v+=(st.recy||0)/230 + (st.rectd||0)*0.9;                  // receiving
  v+=(st.tkl||0)/20 + (st.sack||0)*1.0 + (st.dint||0)*1.4;  // defense
  return v;
}
// What a player is worth to keep, in $M — anchored to the position pay bands, scaled by your
// program's NIL pool. A P4 starting QB lands in the $1.5–3.5M band; the same player at a G6
// (much smaller pool) commands a fraction, matching public NIL trackers.
function nilDemand(p){
  if(!p || p.ovr<66) return 0;
  var pay=POS_PAY[p.pos]||POS_PAY.LB;
  // TWO separate scalings, which were previously conflated:
  //   poolF       — how rich YOU are relative to the best program in YOUR subdivision.
  //                 A 1-star FCS program pays less than Montana, just as UMass pays less
  //                 than Alabama. Ranges ~0.1 → 1.15.
  //   marketScale — how big your subdivision's market is at all. POS_PAY is denominated in
  //                 FBS dollars (a starting QB commands $1.5M–$3.5M); the FCS market is
  //                 ~16x smaller, so the same player asks for ~$150K, not $2.5M.
  var elite=nilElitePool();
  var roleShare=(ST.save.role==="HC"?1:0.5);
  var poolF=Math.max(0.1, Math.min(1.15, nilBudgetFor()/(elite*roleShare)));
  var marketScale=elite/NIL_BASE[5];                            // FBS = 1.0, FCS ≈ 0.061
  var d;
  if(isStarterPlayer(p)){
    var tT=Math.max(0,Math.min(1,(p.ovr-70)/23));               // 70→band floor, 93→band ceiling
    d=(pay[0]+(pay[1]-pay[0])*tT)*poolF;
  } else {
    var bT=Math.max(0,Math.min(1,(p.ovr-62)/20));
    d=(pay[2]+(pay[3]-pay[2])*bT)*(0.5+poolF*0.5);              // depth deals are less pool-sensitive
  }
  if(p.dev==="elite") d*=1.15; else if(p.dev==="pro") d*=1.08;  // ascending stars cost more
  d+=Math.min(0.5, prodScore(p)*0.05);                          // production nudges toward the top of the band
  d*=marketScale;                                               // convert FBS dollars to this subdivision's market
  if(hasAbility("nil3")) d*=0.85;                               // Loyalty Culture: players ask for less
  return money2(d);
}
function isStarterPlayer(p){
  var atPos=depthOrder(ST.save.roster,p.pos), idx=-1;
  for(var i=0;i<atPos.length;i++){ if(atPos[i].id===p.id){ idx=i; break; } }
  return idx>=0 && idx<startersAt(p.pos);
}
// Portal-departure risk %; pass fundOverride to preview a hypothetical funding level.
function retentionRisk(p, fundOverride){
  var dem=nilDemand(p); if(dem<=0) return null;
  if(p.yr==="SR") return 0; // seniors graduate rather than transfer, in our model
  var fund=(fundOverride!=null?fundOverride:(p.nilFund||0));
  var base=(Math.max(0,dem-fund)/dem)*66;      // the funding gap is most of it
  if(!isStarterPlayer(p)){ base+=16; if(p.ovr>=78) base+=14; } // a buried blue-chip really wants to play
  if(p.yr==="SO"||p.yr==="JR") base+=6;        // underclassmen are more mobile
  if(hasAbility("nil3")) base*=0.8;            // Loyalty Culture: a stickier roster
  return Math.max(0,Math.min(94,Math.round(base)));
}
// Cost to pull a departing player back out of the portal. Their unmet demand, plus a
// premium for the mess — stars and buried blue-chips cost the most to talk down.
function retainPrice(p){
  var dem=nilDemand(p), gap=Math.max(0.2, dem-(p.nilFund||0));
  var mult=1.5 + Math.max(0,(p.ovr-72))*0.035;              // an 85 OVR runs ~1.95x the gap
  if(!isStarterPlayer(p)) mult+=0.35;                        // he wants snaps, not just money
  if(p.dev==="elite") mult+=0.25; else if(p.dev==="pro") mult+=0.12;
  return Math.max(0.25, money2(gap*mult));
}
// Interest a recruit gains from an NIL offer of $amt (M) — strong, but diminishing as they warm.
// Interest per $1M by star rating — blue-chips are expensive to buy, low-stars are cheap.
// 5★ ≈ +1 per $250K; a 1★ moves far more per dollar.
// Interest points gained per $1M offered to a recruit. A blue-chip is unmoved by small
// money; a 1-star is swayed easily. These numbers are denominated in FBS dollars, so they
// must be divided by the subdivision's market scale — otherwise Montana maxing out its
// entire per-recruit cap ($510K) would move a 3-star by 6 points out of 100, and NIL would
// be a dead button at FCS. Scaled, $510K of FCS money buys the same persuasion as the
// equivalent share of an FBS budget.
function nilRate(st){
  var base={5:4,4:7,3:11,2:16,1:22}[Math.max(1,Math.min(5,st||3))];
  var marketScale = (ST.save && isFCSConf(ST.save.conf)) ? (NIL_BASE_FCS[5]/NIL_BASE[5]) : 1;
  return base / marketScale;
}
function nilInterestGain(b, amt){ var g=amt * nilRate(b.st); if(hasAbility("nil2")||hasArch("nil")) g*=1.4; return Math.round(g); }
function riskLabel(pct){ return pct>=60?"High":(pct>=30?"Medium":"Low"); }
// Open the NIL slider sheet for a recruit ("recruit") or a roster player ("retain").
function openNIL(kind, id){
  var s=ST.save;
  var maxA;
  if(kind==="recruit"){ var b=(s.board||[]).filter(function(x){return x.id===id;})[0]; if(!b)return; var cap=nilRecruitCap(); maxA=Math.max(0,Math.min(s.nilLeft, cap.per, cap.total-(b.nil||0))); }
  else { var p=(s.roster||[]).filter(function(x){return x.id===id;})[0]; if(!p)return; var dem=nilDemand(p); maxA=Math.max(0,Math.min(s.nilLeft, Math.max(dem*1.5,1)-(p.nilFund||0))); }
  if(maxA<=0){ toast(kind==="recruit"?"NIL offer maxed for this recruit":"Fully funded"); return; }
  ST.nilPick={kind:kind, id:id};
  ST.nilPickVal=0; // always start at $0
  draw();
}
function nilPreview(kind,item,amt){
  if(kind==="recruit"){ var g=nilInterestGain(item,amt); return "Interest "+item.interest+" → <b>"+Math.min(100,item.interest+g)+"</b> (+"+g+")"; }
  var dem=nilDemand(item), nf=money2((item.nilFund||0)+amt), risk=retentionRisk(item, nf);
  return "Funded "+fmtMoney(nf)+" / "+fmtMoney(dem)+" · portal risk → <b>"+risk+"%</b>";
}
function commitNIL(){
  var np=ST.nilPick, s=ST.save, amt=Math.min(ST.nilPickVal||0, s.nilLeft||0);
  if(!np || amt<=0){ ST.nilPick=null; ST.nilPickVal=null; draw(); return; }
  if(np.kind==="recruit"){
    var b=(s.board||[]).filter(function(x){return x.id===np.id;})[0];
    if(b){ var g=nilInterestGain(b,amt); b.interest=Math.min(100,b.interest+g); b.nil=money2((b.nil||0)+amt); s.nilLeft=money2(s.nilLeft-amt); toast("💰 Offered "+fmtMoney(amt)+" to "+x(b.n)+" · +"+g+" interest"); if(b.interest>=100){ b.status="committed"; b.committedTo=s.school; toast("🎉 "+x(b.n)+" committed to you!"); } }
  } else {
    var p=(s.roster||[]).filter(function(x){return x.id===np.id;})[0];
    if(p){ p.nilFund=money2((p.nilFund||0)+amt); s.nilLeft=money2(s.nilLeft-amt); toast("💰 Funded "+x(p.n)+" · "+fmtMoney(p.nilFund)); }
  }
  ST.nilPick=null; ST.nilPickVal=null; persist(); draw();
}
// One-tap: top a player up to exactly what he's asking for. Same accounting as
// commitNIL(), just with the amount computed instead of chosen on a slider.
function matchNIL(id){
  var s=ST.save, p=(s.roster||[]).filter(function(x){return x.id===id;})[0];
  if(!p) return;
  var gap=money2(nilDemand(p)-(p.nilFund||0));
  if(gap<=0){ toast("Already funded"); return; }
  if((s.nilLeft||0)+1e-9 < gap){
    // partial funding wouldn't be a "match" — say so rather than quietly underpay
    toast("Need "+fmtMoney(gap)+" to match "+x(p.n)+" · only "+fmtMoney(s.nilLeft)+" left");
    return;
  }
  p.nilFund=money2((p.nilFund||0)+gap);
  s.nilLeft=money2(s.nilLeft-gap);
  toast("🤝 Matched "+x(p.n)+" · "+fmtMoney(gap));
  persist(); redrawKeepScroll();
}
// A compact NIL budget bar shown on the Recruit & Roster tabs.
function nilBar(){
  var s=ST.save;

}
// NIL header for the Roster tab. The per-player funding and Give buttons live on
// each roster row now, so this only carries what a row can't: the budget you have

function retentionPanel(){

function recruitTab(){

  var watchCount=s.board.filter(function(b){ return b.status==="open" && b.watch; }).length;

  h+='<div class="pos-wheel">';

  h+='<button class="pos-chip committed'+(activePos==="COMMITTED"?" active":"")+'" data-recpos="COMMITTED">✓ Commits <span class="pos-chip-n">'+committedCount+'</span></button>';
  h+='<button class="pos-chip watch'+(activePos==="WATCH"?" active":"")+'" data-recpos="WATCH">⭐ Watch <span class="pos-chip-n">'+watchCount+'</span></button>';

    .filter(matchesFilter)

  h+='</div>';
  return h;
}

function rosterTable(){

// Move a player up or down their position's depth chart by one slot.
// Tap one player, then tap another in the SAME position group to swap their
// depth slots. Tapping the selected player again cancels.
function tapDepth(id){
  var s=ST.save, p=s.roster.filter(function(x){return x.id===id;})[0];
  if(!p) return;
  if(ST.swapPick===id){ ST.swapPick=null; redrawKeepScroll(); return; }   // tapped self → cancel
  var sel=ST.swapPick && s.roster.filter(function(x){return x.id===ST.swapPick;})[0];
  if(!sel || sel.pos!==p.pos){
    // nothing picked yet, or the pick was a different position — start a new selection
    ST.swapPick=id; redrawKeepScroll(); return;
  }
  swapDepth(sel.id, p.id);
}
// Exchange two players' depth slots. Ranks may not exist yet (depthOrder falls
// back to OVR), so materialize the current order before swapping.
function swapDepth(idA, idB){
  var s=ST.save;
  var a=s.roster.filter(function(x){return x.id===idA;})[0];
  var b=s.roster.filter(function(x){return x.id===idB;})[0];
  if(!a || !b || a.pos!==b.pos || a.id===b.id) return;
  var order=depthOrder(s.roster, a.pos);
  var ia=-1, ib=-1;
  for(var i=0;i<order.length;i++){ if(order[i].id===idA)ia=i; if(order[i].id===idB)ib=i; }
  if(ia<0 || ib<0) return;
  var tmp=order[ia]; order[ia]=order[ib]; order[ib]=tmp;
  order.forEach(function(pl,i){ pl.depthRank=i; });
  ST.swapPick=null;
  persist(); redrawKeepScroll();
}
// Redraw without yanking the user back to the top of a long roster.
function redrawKeepScroll(){
  var sy=window.scrollY||window.pageYOffset||0;
  draw();
  window.scrollTo(0, sy);
  if(window.requestAnimationFrame){ window.requestAnimationFrame(function(){ window.scrollTo(0, sy); }); }
}


// =====================================================
// DRIVE ENGINE — possession-first football sim
// Nobody decides the final score. We simulate plays; each mutates
// {down, dist, yl, clock, poss}. The score is whatever falls out.
// yl = yards from the OFFENSE's own goal line; yl>=100 is a touchdown.
// =====================================================
var XP_RATE=0.95, TWO_RATE=0.45;
var EDGE_DIV=42;   // how sharply a rating advantage bends play outcomes (tune me)
var PACE=1.00;     // >1 = fewer plays per drive (tune points-per-drive here)

// Box-Muller: yardage is normal-ish with a fat right tail.
function gauss(){ var u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function clampN(v,a,b){ return Math.max(a,Math.min(b,v)); }

function dRun(edge, dm){
  dm=dm||defMods("standard");
  var e=edge/EDGE_DIV;
  var y=(4.75+e*1.6+dm.runYds)+gauss()*4.7;   // soft fronts concede the run
  if(Math.random()<0.058+e*0.02) y+=Math.abs(gauss())*16;   // breakaway
  y=Math.round(y); if(y<-6)y=-6;
  return {yards:y, turnover:Math.random()<(0.011-e*0.003), kind:"run", incomplete:false};
}
// `obvious` = 3rd/4th & long: the defense knows a throw is coming and defends the sticks.
function dPass(edge, obvious, dm, aggro){
  dm=dm||defMods("standard"); aggro=aggro||0;
  var e=edge/EDGE_DIV;
  if(Math.random()<clampN(0.062-e*0.02+(obvious?0.030:0)+dm.sack,0.02,0.20))
    return {yards:-rnd(4,9), turnover:false, kind:"sack", incomplete:false};
  // "Air it out" means deeper throws: fewer completions, bigger when they land.
  var compP=clampN(0.625+e*0.10-(obvious?0.075:0)+dm.comp-aggro*0.055,0.28,0.88);
  var intP =clampN(0.026-e*0.010+(obvious?0.012:0)+dm.int+aggro*0.011,0.006,0.070);
  if(Math.random()<intP)   return {yards:0, turnover:true,  kind:"int",  incomplete:true};
  if(Math.random()>=compP) return {yards:0, turnover:false, kind:"pass", incomplete:true};
  var y=(obvious?5.4:6.8)-(dm.shorten||0)+e*1.9+aggro*2.4+Math.abs(gauss())*(obvious?5.2:6.0);
  if(Math.random()<clampN(0.05+dm.explosive+aggro*0.03,0.005,0.20)) y+=Math.abs(gauss())*20;
  y=Math.round(y);
  if(y<1) y=rnd(1,3);   // a caught ball never loses ground; that's a sack, not a completion
  return {yards:y, turnover:false, kind:"pass", incomplete:false};
}
// ── TACTICS ──────────────────────────────────────────────
// Toggled any time during a live game; they take effect on the very next snap.
// Each one buys something and costs something — no free wins.
var OFF_TACTICS={
  run:     {label:"Run the Ball", icon:"🏃", lean:+30, desc:"Ground game. Burns clock, but predictable on 3rd & long."},
  balanced:{label:"Balanced",     icon:"⚖️", lean:0,   desc:"Take what the defense gives you."},
  pass:    {label:"Air It Out",   icon:"🎯", lean:-32, desc:"Chunk plays and quick scores — and more interceptions."}
};
var TEMPO_TACTICS={
  burn:    {label:"Burn Clock",   icon:"🐢", pace:1.34, desc:"Milk the play clock. Fewer possessions for everyone."},
  normal:  {label:"Normal",       icon:"⏱️", pace:1.00, desc:"Standard tempo."},
  hurry:   {label:"Hurry Up",     icon:"⚡", pace:0.62, desc:"Snap fast. More plays, but your defense stays on the field."}
};
var DEF_TACTICS={
  blitz:   {label:"Blitz",        icon:"💥", desc:"Pressure the QB. More sacks, but big plays behind you."},
  standard:{label:"Standard",     icon:"🛡️", desc:"Sound, balanced coverage."},
  prevent: {label:"Prevent",      icon:"🚧", desc:"Guard the sticks. Gives up the short stuff, kills the deep ball."}
};
function tacticsOf(G, side){
  // side 0 is the user's team; the CPU always plays it straight
  if(side!==0 || !G || !G.tactics) return {off:"balanced", tempo:"normal", def:"standard"};
  return G.tactics;
}
// Offensive tactics bend the run/pass lean. Defensive tactics belong to the team
// NOT holding the ball, so they're looked up from the defender's side.
function tacticLean(baseLean, off){
  return clampN(baseLean + (OFF_TACTICS[off]||OFF_TACTICS.balanced).lean, 2, 98);
}
// How a defensive call reshapes the offense's outcome distribution.
// Blitz trades coverage for pressure; prevent trades the short game for the deep
// ball. Neither is free: the harness showed blitz strictly dominant and prevent
// unplayable until the explosive/short-yardage costs were made to bite.
function defMods(def){
  // `shorten` clips the length of completed passes — the defining trait of a
  // prevent look. It concedes the catch but not the yardage behind it.
  if(def==="blitz")   return {sack:+0.040, comp:-0.034, explosive:+0.042, runYds:+0.90, int:+0.005, shorten:-0.2};
  if(def==="prevent") return {sack:-0.020, comp:+0.040, explosive:-0.075, runYds:+0.60, int:-0.002, shorten:2.6};
  return {sack:0, comp:0, explosive:0, runYds:0, int:0, shorten:0};
}
// Tempo has a defensive price. Hurry-up puts your defense back on the field with
// no rest; burning clock keeps them fresh. Applied to the OPPOSING offense.
function tempoFatigue(tempo){
  if(tempo==="hurry") return {comp:+0.011, runYds:+0.30, explosive:+0.007};  // gassed defense
  if(tempo==="burn")  return {comp:-0.010, runYds:-0.30, explosive:-0.008};  // rested defense
  return {comp:0, runYds:0, explosive:0};
}
function mergeMods(a,b){
  return {sack:(a.sack||0), comp:(a.comp||0)+(b.comp||0), explosive:(a.explosive||0)+(b.explosive||0),
          runYds:(a.runYds||0)+(b.runYds||0), int:(a.int||0), shorten:(a.shorten||0)};
}
// Aggression on 4th down: hurry-up teams chasing the game go for it more often.
function tacticFourthBias(tempo){ return tempo==="hurry"?0.22:(tempo==="burn"?-0.08:0); }

// ── Scheme fit reacts to your tactics ────────────────────
// offSchemeFit()/defSchemeFit() are frozen into your rating at kickoff. Half of
// that fit is `tendency` — how close your scheme's lean sits to what your
// PERSONNEL wants. Tactics move your effective lean, so calling against your own
// roster has to cost you, and calling toward it has to pay. We recompute only the
// tendency half and hand back the DELTA from the frozen value.
var DEF_TAC_LEAN={blitz:+26, standard:0, prevent:-24};
function tendencyAt(lean, ideal){ return Math.max(0, 1 - Math.abs(lean-ideal)/55); }
// `cap` is the same ceiling offSchemeFit() used, so the delta lives on that scale.
// SCHEME_TACTIC_W scales it: at 1.0 the swing is ~1 OVR and barely registers
// against EDGE_DIV=42. At 2.0 the worst mismatch costs ~2.2 OVR — felt, but still
// only a third of what a 10-point rating edge is worth.
var SCHEME_TACTIC_W=2.0;
function schemeFitDelta(side, tactics){
  var s=ST.save; if(!s) return 0;
  if(side==="off"){
    if(s.role==="DC") return 0;              // you don't coach this unit
    var sc=offScheme(), ideal=idealOffBalance();
    var eff=tacticLean(sc.lean, tactics.off);
    var cap = hasAbility("off5")?11:((hasArch("offensive")||hasAbility("off2"))?8:5);
    return (tendencyAt(eff,ideal)-tendencyAt(sc.lean,ideal))*0.4*cap*SCHEME_TACTIC_W;
  }
  if(s.role==="OC") return 0;
  var dsc=defScheme(), dideal=idealDefBalance();
  var deff=clampN(dsc.lean+(DEF_TAC_LEAN[tactics.def]||0), 2, 98);
  var dcap = hasAbility("def5")?11:((hasArch("defensive")||hasAbility("def2"))?8:5);
  return (tendencyAt(deff,dideal)-tendencyAt(dsc.lean,dideal))*0.4*dcap*SCHEME_TACTIC_W;
}

function dClock(res, tempo){
  var t=PACE*((TEMPO_TACTICS[tempo]||TEMPO_TACTICS.normal).pace);
  if(res.incomplete) return Math.max(3, Math.round(rnd(5,8)*t));
  if(res.kind==="run") return Math.max(6, Math.round(rnd(24,36)*t));
  return Math.max(5, Math.round(rnd(18,32)*t));
}
function fgDist(yl){ return (100-yl)+17; }
function fgProb(d){ return d<=29?0.96:d<=39?0.88:d<=46?0.76:d<=52?0.60:d<=57?0.42:0.22; }

function fourthDown(yl,dist,clock,q,margin,bias){
  bias=bias||0;   // hurry-up teams go for it more; clock-burners less
  var d=fgDist(yl);
  var desperate=(q>=4 && margin<0 && clock<300);
  var mustGo   =(q>=4 && margin<-8 && clock<240);
  if(mustGo && yl>40) return "go";
  if(yl>=60 && dist<=2 && !desperate) return Math.random()<clampN(0.62+bias,0.05,0.95)?"go":(d<=52?"fg":"punt");
  if(d<=52 && yl>=55){
    if(desperate && dist<=4 && yl>=70) return Math.random()<0.5?"go":"fg";
    return "fg";
  }
  if(yl>=65 && dist<=4 && Math.random()<clampN(0.35+bias,0.02,0.90)) return "go";
  if(desperate && dist<=6) return "go";
  if(yl<35) return "punt";
  return (dist<=1 && Math.random()<0.45)?"go":"punt";
}
// `lean` 0..100 (low = pass-heavy), matching OFF_SCHEMES / gameplan.offBalance.
function callPlay(down,dist,yl,clock,q,margin,lean){
  var runP=lean/100;
  if(down===3 && dist>=7) runP-=0.42; else if(down===3 && dist<=2) runP+=0.22;
  if(down===2 && dist>=9) runP-=0.12;
  if(yl>=95) runP+=0.18;                                   // goal line
  if(q>=4 && margin>7  && clock<420) runP+=0.35;           // milk the clock
  if(q>=4 && margin<-7 && clock<420) runP-=0.40;           // must throw
  if(clock<90 && margin<=0) runP-=0.35;
  return Math.random()<clampN(runP,0.05,0.92)?"run":"pass";
}
function blankSide(){ return {plays:0,rushYds:0,passYds:0,comp:0,att:0,to:0,ints:0,fums:0,punts:0,sacks:0,
  fga:0,fgm:0,thirdAtt:0,thirdConv:0}; }

// A resumable game. `G` holds everything the loop used to keep in locals, so the
// sim can stop at a quarter break, let the user change tactics, and pick up
// exactly where it left off. teams: [{off,def,lean}] — index 0 is the user.
function newGameState(teamA, teamB){
  var poss=Math.random()<0.5?0:1;
  return {
    S:[0,0], teams:[teamA,teamB], plays:[], stats:[blankSide(),blankSide()],
    poss:poss, half2:1-poss, half:0,
    clock:1800, yl:25, down:1, dist:10,
    done:false, guard:0,
    userGame:false,   // set true only for games the user actually coaches
    tactics:{off:"balanced", tempo:"normal", def:"standard"}
  };
}
// Advance the game by exactly ONE snap and return where that left us:
//   "stop"   — the next snap belongs to a later quarter than stopQ (hand control back)
//   "done"   — regulation (and any OT) is over
//   "played" — a snap was run; call again to continue
// Because the tactics are re-read here on every single snap (tacticsOf → G.tactics,
// the very object the tactic buttons mutate), driving this one snap at a time makes
// mid-quarter tactic changes take effect on the very next play.
function simSnap(G, stopQ){
  if(G.done) return "done";
  if(G.clock<=0){                    // half over
    if(G.half===0){ G.half=1; G.poss=G.half2; G.clock=1800; G.yl=25; G.down=1; G.dist=10; G.guard=0; }
    else { finishRegulation(G); return "done"; }
  }
  if(G.guard++>900){ finishRegulation(G); return "done"; }

  var q=(G.half===0)?(G.clock>900?1:2):(G.clock>900?3:4);
  if(stopQ && q>stopQ) return "stop";   // rolled into the next quarter — hand control back

  var qc=G.clock>900?G.clock-900:G.clock;
  var poss=G.poss, def=1-poss;
  var S=G.S, plays=G.plays, stats=G.stats, teams=G.teams;
  var edge=teams[poss].off-teams[def].def;
  var margin=S[poss]-S[def];

  // whose tactics apply: the ball-carrier's offense, the other side's defense.
  // The DEFENDER'S OWN tempo choice fatigues him — hurry-up means his offense
  // kept giving the ball back, so he never got off the field.
  var oT=tacticsOf(G,poss), dT=tacticsOf(G,def);
  var dm=mergeMods(defMods(dT.def), tempoFatigue(dT.tempo));
  var aggro=(oT.off==="pass")?1:(oT.off==="run"?-0.35:0);
  var lean=tacticLean(teams[poss].lean, oT.off);
  // Calling against your own personnel erodes your scheme fit for that snap;
  // calling toward it earns some back. Only the user's coached unit is affected.
  // CPU-vs-CPU league games never touch the user's roster or schemes.
  if(G.userGame){
    if(poss===0) edge += schemeFitDelta("off", oT);
    if(def===0)  edge -= schemeFitDelta("def", dT);  // a better-fit defense lowers the offense's edge
  }

  if(G.down===4){
    var dec=fourthDown(G.yl,G.dist,G.clock,q,margin,tacticFourthBias(oT.tempo));
    if(dec==="punt"){
      stats[poss].punts++;
      plays.push({t:poss,q:q,clock:qc,down:4,dist:G.dist,yl:G.yl,kind:"punt",yards:0,pts:0,snap:true});
      var net=clampN(Math.round(42+gauss()*8),25,62);
      var ny=(G.yl+net>=100)?20:(100-(G.yl+net));
      G.clock-=rnd(12,20);
      G.poss=def; G.yl=clampN(ny,1,99); G.down=1; G.dist=10; return "played";
    }
    if(dec==="fg"){
      var fd=fgDist(G.yl); stats[poss].fga++; G.clock-=rnd(6,12);
      plays.push({t:poss,q:q,clock:qc,down:4,dist:G.dist,yl:G.yl,kind:"fgatt",yards:0,pts:0,snap:true,d:fd});
      if(Math.random()<fgProb(fd)){
        stats[poss].fgm++; S[poss]+=3;
        plays.push({t:poss,kind:"FG",pts:3,q:q,clock:qc,d:fd});
        G.poss=def; G.yl=25; G.clock-=rnd(4,8);
      } else {
        plays.push({t:poss,kind:"FGMISS",pts:0,q:q,clock:qc,d:fd});
        G.poss=def; G.yl=clampN(100-G.yl,1,99);
      }
      G.down=1; G.dist=10; return "played";
    }
    // "go" falls through to a live play
  }

  var call=callPlay(G.down,G.dist,G.yl,G.clock,q,margin,lean);
  var obvious=(G.down>=3 && G.dist>=6);
  var res=(call==="run")?dRun(edge,dm):dPass(edge,obvious,dm,aggro);
  stats[poss].plays++;
  var snap={t:poss, q:q, clock:qc, down:G.down, dist:G.dist, yl:G.yl,
            kind:res.kind, yards:res.yards, incomplete:res.incomplete,
            turnover:res.turnover, fourth:(G.down===4), pts:0, snap:true};
  plays.push(snap);
  if(res.kind==="run"){ stats[poss].rushYds+=res.yards; }
  else if(res.kind==="sack"){ stats[poss].sacks++; stats[poss].passYds+=res.yards; }
  else { stats[poss].att++; if(!res.incomplete){ stats[poss].comp++; stats[poss].passYds+=res.yards; } }
  if(G.down===3) stats[poss].thirdAtt++;
  G.clock-=dClock(res, oT.tempo);

  if(res.turnover){
    stats[poss].to++;
    if(res.kind==="int") stats[poss].ints++; else stats[poss].fums++;
    var spot=clampN(G.yl+res.yards,1,99);
    G.poss=def; G.yl=clampN(100-spot,1,99); G.down=1; G.dist=10; return "played";
  }
  var gained=res.yards; G.yl+=gained;

  if(G.yl<=0){                                  // safety
    S[def]+=2; plays.push({t:def,kind:"SFTY",pts:2,q:q,clock:qc});
    G.poss=def; G.yl=25; G.down=1; G.dist=10; return "played";
  }
  if(G.yl>=100){                                // touchdown
    S[poss]+=6;
    if(G.down===3) stats[poss].thirdConv++;
    plays.push({t:poss,kind:"TD",pts:6,q:q,clock:qc});
    var deficit=S[def]-(S[poss]-6);
    if(goesForTwo(deficit,q)){
      var ok=Math.random()<TWO_RATE; if(ok)S[poss]+=2;
      plays.push({t:poss,kind:"2PT",pts:ok?2:0,good:ok,q:q,clock:qc});
    } else {
      var ok2=Math.random()<XP_RATE; if(ok2)S[poss]+=1;
      plays.push({t:poss,kind:"XP",pts:ok2?1:0,good:ok2,q:q,clock:qc});
    }
    G.clock-=rnd(4,8);
    G.poss=def; G.yl=25; G.down=1; G.dist=10; return "played";
  }
  if(gained>=G.dist){                           // first down
    if(G.down===3) stats[poss].thirdConv++;
    G.down=1; G.dist=Math.min(10,100-G.yl);
  } else {
    G.down++; G.dist-=gained;
    if(G.down>4){ G.poss=def; G.yl=clampN(100-G.yl,1,99); G.down=1; G.dist=10; }
  }
  return "played";
}
// Run the game forward until the end of quarter `stopQ` (1..4), or to the final
// whistle when stopQ is falsy. Batch driver — used for CPU games and "Sim to Final".
function simUntil(G, stopQ){
  if(G.done) return G;
  var st;
  do { st=simSnap(G, stopQ); } while(st==="played");
  return G;
}
// Game time (seconds, 0..3600) the engine has actually simulated so far.
function engineElapsed(G){ return (G.half*1800) + (1800 - Math.max(0,G.clock)); }
// Generate snaps until the engine has simulated up to game-time `upto`, or hits the
// stop boundary for this stretch, or the game ends. Returns how many raw plays were
// added. Tactics are read inside simSnap, so a change made a moment ago lands here.
function simLiveTo(G, stopQ, upto){
  var added=0, guard=0;
  while(!G.done && guard++<900){
    if(engineElapsed(G)>=upto && G.clock>0) break;   // caught up (no pending clock flip)
    var before=G.plays.length;
    var st=simSnap(G, stopQ);
    added += (G.plays.length-before);
    if(st==="stop"||st==="done") break;
  }
  return added;
}
// Overtime — no ties. OT scores are emitted as plays so the feed matches the final.
function finishRegulation(G){
  var S=G.S, teams=G.teams, plays=G.plays, ot=0;
  while(S[0]===S[1] && ot++<6){
    for(var t=0;t<2;t++){
      var r=Math.random()+(teams[t].off-teams[1-t].def)/200;
      if(r>0.72){ S[t]+=7; plays.push({t:t,kind:"TD",pts:6,q:4,clock:0,ot:ot});
                  plays.push({t:t,kind:"XP",pts:1,good:true,q:4,clock:0,ot:ot}); }
      else if(r>0.42){ S[t]+=3; plays.push({t:t,kind:"FG",pts:3,q:4,clock:0,d:rnd(28,45),ot:ot}); }
    }
  }
  if(S[0]===S[1]){ var w=Math.random()<0.5?0:1; S[w]+=3;
    plays.push({t:w,kind:"FG",pts:3,q:4,clock:0,d:rnd(28,45),ot:ot}); }
  G.done=true;
}
function gameResult(G){ return {a:G.S[0], b:G.S[1], plays:G.plays, stats:G.stats}; }

// One-shot sim: used for CPU-vs-CPU league games, which have no tactics.
function simDrives(teamA, teamB){
  var G=newGameState(teamA, teamB);
  simUntil(G, 0);
  return gameResult(G);
}

// The offense/defense your team actually fields, resolved by role: you coach one
// unit, the other is CPU-run. Scheme fit is baked in because it's what takes the
// field; home-field advantage is not, since it's situational, not a team rating.
// gameSetup() and the scoreboard both read this, so they can never drift apart.
// Exact (unrounded) values — scheme fit carries a decimal and the drive engine
// is sensitive to it. Round only at the point of display.
function myRatings(){
  var role=ST.save.role;
  var offFit=offSchemeFit(), defFit=defSchemeFit();
  var off, def;
  if(role==="HC"){     off=offenseRating()+offFit;  def=defenseRating()+defFit; }
  else if(role==="DC"){ off=cpuUnitRating("off");    def=defenseRating()+defFit; }
  else {                off=offenseRating()+offFit; def=cpuUnitRating("def"); }
  return {off:off, def:def, ovr:(off+def)/2};
}
// Raw team strength for the scoreboard — NO scheme fit, so it sits on the same
// scale as oppRatings() and the "OFF 82" in the season header. Fit is surfaced
// separately as "Great fit +6.3"; folding it in here would show two different
// numbers for the same unit on the same screen.
function myRatingsDisplay(){
  var role=ST.save.role;
  var off = (role==="DC") ? cpuUnitRating("off") : offenseRating();
  var def = (role==="OC") ? cpuUnitRating("def") : defenseRating();
  return {off:Math.round(off), def:Math.round(def), ovr:Math.round((off+def)/2)};
}

// A CPU team's run/pass identity — stable per school, derived from its name.
function oppLean(name){
  var h=0; for(var i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0xffff;
  return 32 + (h%37);   // 32..68, a believable spread of offensive identities
}

// Break a final score into a believable sequence of scoring plays across 4 quarters.
// Returns [{q, clock, team:'us'|'them', kind, pts, usTot, themTot, desc}]
// ── Conversion logic ────────────────────────────────────
// A touchdown is 6. The scoring team then kicks the extra point (~95%) or, when the
// math calls for it, goes for two from the 2-yard line (~45%).
// (XP_RATE / TWO_RATE are declared with the drive engine above.)
// `down` = the scoring team's deficit BEFORE the touchdown's 6 points (negative = leading).
// `after` = down - 6 = the deficit once the TD is on the board, before the conversion.
// The classic chart calls, all of which a kick cannot resolve:
//   trail by 8 -> after  2 : two-point conversion TIES the game
//   trail by 5 -> after -1 : leading by 1; two makes it a field-goal game (3)
//   trail by 2 -> after -4 : leading by 4; two makes it a touchdown game (6)
//   trail by 1 -> after -5 : leading by 5; two makes it a two-score game (7)
// Late in the game these are near-automatic; early on, coaches take the point.
function goesForTwo(down, q){
  var after = down - 6;
  var chartCall = (after===2 || after===-1 || after===-4 || after===-5);
  if(!chartCall) return Math.random()<0.04;  // rare gamble / analytics call
  if(q>=4) return Math.random()<0.85;        // 4th quarter: take the points that matter
  if(q===3) return Math.random()<0.35;
  return Math.random()<0.10;                 // too early to chase points
}

// ── Play attribution ─────────────────────────────────────
// Pick a real player from your depth chart, weighted toward starters.
var DEPTH_W=[0.55,0.28,0.12,0.05];
function pickDepth(pos){
  var d=depthOrder(ST.save.roster,pos);
  if(!d.length) return null;
  var r=Math.random(), acc=0;
  for(var i=0;i<d.length && i<DEPTH_W.length;i++){ acc+=DEPTH_W[i]; if(r<acc) return d[i]; }
  return d[0];
}
// Who touched the ball? Only our own roster is named; opponents get a generated
// name since we don't model their rosters.
// A game's named cast. The starting QB takes nearly every snap, so he is fixed
// for the game rather than re-rolled per play; the opponent gets one QB name too.
function newCast(){
  var qb=depthOrder(ST.save.roster,"QB")[0];
  return {usQB: qb?qb.n:genName(), usQBp: qb||null, oppQB: genName()};
}
// Returns display names AND the actual roster objects (ours only), so the
// play-by-play and the box score describe the SAME events.
function attribute(p, cast){
  if(p.t!==0){
    // we don't model opposing rosters — one QB, generated skill players
    var b=genName(), guard=0;
    while(b===cast.oppQB && guard++<6) b=genName();   // never throw to yourself
    return {ball:b, qb:cast.oppQB, ballP:null, qbP:null};
  }
  var qbP=cast.usQBp, qn=cast.usQB;
  if(p.kind==="run"){
    var keeper=(qbP && Math.random()<0.14);           // QB keepers happen
    var carrier= keeper ? qbP : pickDepth("RB");
    return {ball:carrier?carrier.n:genName(), qb:qn, ballP:carrier||null, qbP:qbP};
  }
  if(p.kind==="pass"){
    var r=Math.random();
    var tgt = r<0.62 ? pickDepth("WR") : (r<0.84 ? pickDepth("TE") : pickDepth("RB"));
    if(tgt && qbP && tgt.id===qbP.id) tgt=null;       // never throw to yourself
    return {ball:tgt?tgt.n:genName(), qb:qn, ballP:tgt||null, qbP:qbP};
  }
  return {ball:qn, qb:qn, ballP:qbP, qbP:qbP};
}
// "OKLA 34" / "UNT 41" — field position in broadcast form.
function fieldPos(yl, usAb, themAb){
  if(yl===50) return "50";
  return (yl<50 ? usAb : themAb)+" "+(yl<50 ? yl : 100-yl);
}
function ordDown(d){ return ["","1st","2nd","3rd","4th"][d]||String(d); }

// Dress the drive engine's real plays as a play-by-play feed.
// The score is NOT reconstructed here — these events already produced it.
// Every row carries `scoring:true|false` so the UI can filter to scoring plays.
function buildPlayByPlay(drivePlays, usName, themName){
  var usAb=abbr(usName), themAb=abbr(themName);
  var cast=newCast();
  var out=[], ut=0, tt=0;
  drivePlays.forEach(function(p){
    var team=(p.t===0)?"us":"them";
    var off=(p.t===0)?usAb:themAb, def=(p.t===0)?themAb:usAb;
    if(team==="us") ut+=p.pts; else tt+=p.pts;
    var elapsed=(p.q-1)*900 + (900-p.clock);
    var mm=Math.floor(p.clock/60), ss=p.clock%60;
    var desc, kind=p.kind, scoring=false, at=null;

    if(p.snap){
      // ── a normal snap: down, distance, field position, result ──
      at=attribute(p,cast);
      var spot=fieldPos(p.yl, off, def);
      var sit=ordDown(p.down)+" & "+((p.yl+p.dist>=100)?"Goal":p.dist)+" at "+spot;
      // a gain is capped at the goal line only when the play actually scored
      var scored=(!p.turnover && p.yl+p.yards>=100);
      var gain=scored?(100-p.yl):p.yards;
      if(p.kind==="punt"){ desc=sit+" — punt away"; kind="PUNT"; }
      else if(p.kind==="fgatt"){ desc=sit+" — "+p.d+"-yard field goal attempt"; kind="FGA"; }
      else if(p.kind==="sack"){ desc=sit+" — "+at.qb+" SACKED for "+p.yards; kind="SACK"; }
      else if(p.kind==="int"){ desc=sit+" — INTERCEPTED, "+at.qb+" picked off"; kind="INT"; }
      else if(p.kind==="run"){
        var v=p.turnover?" — FUMBLE, "+at.ball+" loses it":
              " — "+at.ball+" "+(gain<0?"stuffed for "+gain:gain+" yard rush")+(scored?", TOUCHDOWN":"");
        desc=sit+v; kind=p.turnover?"FUM":"RUN";
      }
      else if(p.incomplete){ desc=sit+" — "+at.qb+" incomplete to "+at.ball; kind="INC"; }
      else { desc=sit+" — "+at.qb+" to "+at.ball+" for "+gain+(scored?", TOUCHDOWN":""); kind="PASS"; }
    } else {
      // ── a scoring event ──
      scoring=true;
      if(p.kind==="TD")          desc="TOUCHDOWN "+off;
      else if(p.kind==="FG")     desc=p.d+"-yard field goal is GOOD";
      else if(p.kind==="FGMISS") desc=p.d+"-yard field goal is no good";
      else if(p.kind==="XP")     desc=p.good?"extra point is good":"extra point is NO GOOD";
      else if(p.kind==="2PT")    desc=p.good?"two-point conversion is GOOD":"two-point try is stuffed";
      else                       desc="SAFETY";
      if(p.ot) desc="OT"+p.ot+" — "+desc;
    }
    out.push({q:p.q, clock:mm+":"+(ss<10?"0"+ss:ss), elapsed:elapsed, team:team,
              kind:kind, pts:p.pts, good:p.good, scoring:scoring,
              usTot:ut, themTot:tt, desc:desc,
              // raw event data the box score is derived from.
              // Yardage is capped at the goal line only when the play actually scored;
              // a fumble at the 1 gained what it gained.
              yards:(p.snap?((!p.turnover && p.yl+p.yards>=100)?(100-p.yl):p.yards):0),
              scored:(p.snap?(!p.turnover && p.yl+p.yards>=100):false),
              // down-and-distance, so the stats tab can derive third-down conversions
              down:(p.snap?p.down:0), dist:(p.snap?p.dist:0),
              firstDown:(p.snap && !p.turnover && p.kind!=="punt" && p.kind!=="fgatt" &&
                         (p.yl+p.yards>=100 || p.yards>=p.dist)),
              ballP:(at?at.ballP:null), qbP:(at?at.qbP:null)});
  });
  // stable sort by clock; snap rows precede the score they produced
  out.forEach(function(p,i){ p._i=i; });
  out.sort(function(a,b){ return (a.elapsed-b.elapsed) || (a._i-b._i); });
  var u2=0,t2=0;
  out.forEach(function(p){ if(p.team==="us")u2+=p.pts; else t2+=p.pts; p.usTot=u2; p.themTot=t2; });
  return out;
}

// Bowl names for flavor (New Year's Six + a few others)
var NY6=["Rose Bowl","Sugar Bowl","Orange Bowl","Cotton Bowl","Fiesta Bowl","Peach Bowl"];
var BOWLS=["Gator Bowl","Citrus Bowl","Alamo Bowl","Holiday Bowl","Sun Bowl","Liberty Bowl","Music City Bowl","Duke's Mayo Bowl","Las Vegas Bowl","Pinstripe Bowl"];

// Decide postseason fate from record + prestige.
// ═════════════════════════════════════════════════════════
// CONFERENCE STANDINGS + CHAMPIONSHIP GAME
// ═════════════════════════════════════════════════════════
// Build conference standings: YOUR real conf record + simulated conf-mates (stable for the season).
function rankedTeams(){
  var s=ST.save, L=s.league;
  var myDiv=myDivision();
  var rows=[];
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if((t.div||"FBS")!==myDiv) return;   // rankings never mix subdivisions
      var isYou=(n===s.school);
      var w=isYou?s.wins:t.w, l=isYou?s.losses:t.l;
      var sc = (myDiv==="FCS")
        ? fcsResumeScore(w, t.p, isYou&&s._wonConfThisYear, t.ovr, isYou&&s._beatFBSThisYear)
        : resumeScore(w, t.p, t.c, isYou&&s._wonConfThisYear, isYou?myUnitRating():t.off) + t.ovr*0.5;
      rows.push({name:n, conf:t.c, p:t.p, you:isYou, w:w, l:l, ovr:t.ovr, g5:!isPowerConf(t.c), score:sc});
    });
  }
  rows.sort(function(a,b){ if(b.score!==a.score)return b.score-a.score; return b.ovr-a.ovr; });
  return rows;
}
function computeTop25(){ return rankedTeams().slice(0,25); }
// Your real conference record, straight from your played games.
function userConfRecord(){
  var s=ST.save, cw=0, cl=0;
  s.schedule.forEach(function(g){ if(g.oc===s.conf && g.result){ if(g.result.us>g.result.them)cw++; else cl++; } });
  return {cw:cw, cl:cl};
}
// The champion of a conference by best conference record (tiebreak overall). Used for
// CPU conferences in the league history; your own conference uses the real title-game result.
function bestConfChampion(conf){
  var s=ST.save, L=s.league; if(!L) return null;
  var best=null, bestKey=-1;
  Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n]; if(t.c!==conf) return;
    var isYou=(n===s.school), cw,cl;
    if(isYou){ var r=userConfRecord(); cw=r.cw; cl=r.cl; } else { cw=t.cw||0; cl=t.cl||0; }
    var g=cw+cl, pct=g?cw/g:0, key=pct*1000 + (t.ovr||60)*0.1;
    if(key>bestKey){ bestKey=key; best=n; }
  });
  return best;
}
// Record this season's national + conference champions into the league history.
function recordChampions(){
  var s=ST.save; if(!s.league) return;
  s.champHistory=s.champHistory||[];
  var year=2026+((s.seasonsPlayed||1)-1); // seasonsPlayed was just incremented for the finished season
  var natl = s._wonNatlThisYear ? s.school : (s._natlChampName || (rankedTeams()[0]||{name:"—"}).name);
  // The Celebration Bowl is its own title, tracked apart from the playoff championship.
  var celeb = null;
  if(myDivision()==="FCS"){
    if(ST.post && ST.post.mode==="celebration" && ST.post.done){
      celeb = (ST.post.result.us>ST.post.result.them) ? s.school : ST.post.opp;
    } else {
      var sw=bestTeamInConf("SWAC"), me=bestTeamInConf("MEAC");
      celeb = (sw.score>=me.score) ? sw.name : me.name;
    }
  }
  var myDiv=myDivision();
  var confSet={};
  Object.keys(s.league.teams).forEach(function(n){
    var t=s.league.teams[n];
    if((t.div||"FBS")!==myDiv) return;                    // only your subdivision's leagues
    var c=t.c; if(c && c!=="Independent" && c!=="FCS Independent") confSet[c]=1;
  });
  var confs={};
  Object.keys(confSet).sort().forEach(function(c){
    confs[c] = (c===s.conf && s._userConfChampName) ? s._userConfChampName : bestConfChampion(c);
  });
  var rec={year:year, season:s.season, school:s.school, natl:natl, confs:confs};
  if(celeb) rec.celebration=celeb;
  s.champHistory.push(rec);
  s._natlChampName=null; s._userConfChampName=null; // clear the season's stashed results
}
function top25Table(){
  var rows=computeTop25();
  var myRank=0; rows.forEach(function(r,i){ if(r.you)myRank=i+1; });
  var h='<div class="sec-title" style="margin:2px 2px 8px">AP Top 25'+(myRank?' <span class="pill">You: #'+myRank+'</span>':' <span class="pill">You: NR</span>')+'</div>';
  h+='<div class="conf-table scroll-list">';
  rows.forEach(function(r,i){
    h+='<div class="conf-row'+(r.you?" me":"")+(i<4?" top2":"")+'">'+
       '<span class="conf-rank">'+(i+1)+'</span>'+
       '<span class="conf-name">'+x(r.name)+' <span class="t25-conf">'+x(r.conf)+' · '+r.ovr+' OVR</span></span>'+
       '<span class="conf-rec">'+r.w+'-'+r.l+'</span></div>';
  });
  h+='</div>';
  return h;
}
function computeConfStandings(){
  var s=ST.save, L=s.league;
  var table=[];
  // your REAL conference record straight from your played games (never out of sync)
  var myCW=0, myCL=0;
  s.schedule.forEach(function(g){
    if(g.oc===s.conf && g.result){ if(g.result.us>g.result.them)myCW++; else myCL++; }
  });
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(t.c!==s.conf) return;
      var isYou=(n===s.school);
      var cw=isYou?myCW:t.cw, cl=isYou?myCL:t.cl;
      table.push({name:n, p:t.p, you:isYou, cw:cw, cl:cl, ovr:t.ovr});
    });
  }
  table.sort(function(a,b){
    var ga=a.cw+a.cl, gb=b.cw+b.cl;
    var pa=ga?a.cw/ga:0.5, pb=gb?b.cw/gb:0.5;
    if(pb!==pa)return pb-pa;
    return b.ovr-a.ovr;
  });
  return table;
}
// Called when the regular season ends → set up conference championship
function enterConfChampionship(){
  var s=ST.save;
  finalizeLeagueSeason(s.school); // ensure every team completed its conference slate
  // Independents have no conference, so no conference championship — go straight to the postseason.
  if(s.conf==="Independent" || s.conf==="FCS Independent"){
    ST.confchamp=null; s._confchamp=null;
    enterPostseason(); return;
  }
  // Most FCS leagues crown their champion on regular-season record alone — there is no
  // title game. The SWAC and MEAC are the exceptions (and the SWAC's winner goes on to
  // the Celebration Bowl). So for everyone else, award the title outright and move on.
  if(myDivision()==="FCS" && !isCelebrationConf(s.conf)){
    var t=computeConfStandings();
    var winner=t.length?t[0]:null;
    ST.confchamp=null; s._confchamp=null;
    if(winner){
      s._userConfChampName=winner.name;
      if(winner.you){
        s._wonConfThisYear=true;
        s.titles=(s.titles||0)+1;
        toast("🏆 "+x(s.conf)+" regular-season champions!");
      }
    }
    enterPostseason(); return;
  }
  var table=computeConfStandings();
  var top2=table.slice(0,2);
  var youIn = top2.some(function(t){return t.you;});
  var champ={
    standings:table,
    top2:[{name:top2[0].name,p:top2[0].p},{name:top2[1].name,p:top2[1].p}],
    youIn:youIn, done:false, result:null, wonTitle:false
  };
  if(!youIn){
    // auto-resolve who wins the conference (flavor), then continue to postseason
    var a=top2[0], b=top2[1];
    var aStr=a.p*10+rnd(0,25), bStr=b.p*10+rnd(0,25);
    champ.result={winner:(aStr>=bStr?a.name:b.name), auto:true};
    champ.done=true;
    s._userConfChampName=champ.result.winner; // remember your conference's champion for league history
  }
  ST.confchamp=champ; s._confchamp=champ;
  ST.screen="season"; ST.seasonTab="week"; persist(); draw();
}
// You play the conference title game (live sim) — opponent is the other top-2 team
function playConfChampGame(){
  var s=ST.save, C=ST.confchamp;
  var opp = C.top2[0].name===s.school ? C.top2[1] : C.top2[0];

                 live:true, gameKey:"confchamp", postseason:true, confchamp:true, roundName:s.conf+" Championship"};

function finishConfChampGame(){
