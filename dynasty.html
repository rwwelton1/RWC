function nationalLeaders(key, n){
  var s=ST.save, L=s.league, out=[];
  (s.roster||[]).forEach(function(p){
    var v=(p.stats&&p.stats.season&&p.stats.season[key])||0;

// ── Player stat rendering ────────────────────────────────
function _n(v){ return v||0; }
function _rate(a,b,dp){ if(!b) return "—"; var v=a/b; return v.toFixed(dp==null?1:dp); }
function _pct(a,b){ if(!b) return "—"; return Math.round(100*a/b)+"%"; }
// Passer rating (NCAA formula) — the one number that summarizes a QB's season.
function passerRating(st){
  var a=_n(st.pa); if(!a) return null;
  var v=(8.4*_n(st.py) + 330*_n(st.ptd) - 200*_n(st.pint) + 100*_n(st.pc))/a;
  return Math.round(v*10)/10;

// The 3-4 numbers that define this player's line, shown as big cards.
function statHeadline(st){
  var cards=[];

    cards.push([_n(st.py), "Pass Yds"]);
    cards.push([_n(st.ptd)+"/"+_n(st.pint), "TD / INT"]);
    cards.push([_pct(_n(st.pc),_n(st.pa)), "Comp %"]);
    var rt=passerRating(st); if(rt!=null) cards.push([rt, "Rating"]);

    cards.push([_n(st.ry), "Rush Yds"]);

    cards.push([_rate(_n(st.ry),_n(st.rc)), "Yds / Car"]);

    cards.push([_n(st.recy), "Rec Yds"]);
    cards.push([_n(st.rec), "Catches"]);
    cards.push([_n(st.rectd), "TD"]);
    cards.push([_rate(_n(st.recy),_n(st.rec)), "Yds / Rec"]);
  } else if(_n(st.tkl)){
    cards.push([_n(st.tkl), "Tackles"]);
    cards.push([_n(st.sack), "Sacks"]);
    cards.push([_n(st.tfl), "TFL"]);

// Build the live game but DON'T sim it. The score isn't known until the fourth

function advanceWeek(){

  // that didn't land — a failure falls through to the same "Save failed — <reason>" toast the

  // the player doesn't get two toasts stacked on top of each other.
  persist(atSeasonEnd ? null : function(ok){ if(ok) toast("✓ Game saved"); });

// Play the current quarter LIVE. Plays are NOT pre-simulated — they're generated one

// every snap re-reads your tactics, a call you change mid-quarter takes effect on the
// very next play. The quarter (or, for Q4, the game) ends only when the clock runs out.
function runQuarter(){

// Rebuild the play-by-play feed from whatever the engine has generated so far.

// Skip straight to the final whistle, tactics locked as they are.
function simToFinal(){

  simUntil(G, 0);

  ST.weekResult.us=G.S[0]; ST.weekResult.them=G.S[1];

// The whistle blows: NOW we record the result, stats, and advance the league.
function finishGameSim(){
  var G=ST.G, s=ST.save, r=ST.weekResult;
  if(!G || r._recorded) return;
  r._recorded=true;
  var res={us:G.S[0], them:G.S[1], edge:r.edge, oppDefType:"", off:r.off,
           drivePlays:G.plays, driveStats:G.stats};
  if(r.gameKey==="week"){
    var g=s.schedule[s.week];
    g.result={us:res.us, them:res.them};
    var won=res.us>res.them;
    if(won){ s.wins++; s.careerWins++; } else { s.losses++; s.careerLosses++; }
    // Money game: an FCS team knocking off an FBS host is the biggest win on the schedule.
    if(won && g.moneyGame){
      s._beatFBSThisYear=true;
      s.fbsUpsets=(s.fbsUpsets||0)+1;
      s.jobSecurity=Math.min(100,(s.jobSecurity||50)+6);
      toast("🚨 Upset! You beat an FBS team on the road.");
    }
    // ── Rivalry result: nothing moves the fanbase like this. ──
    // Beating your rival buys you goodwill; losing to them burns it. The series record
    // carries across seasons, so a rivalry builds its own history over a dynasty.
    if(isLiveRival(s.school, g.opp)){
      noteRivalryResult(s.school, g.opp, won);
      var rr=rivalryRecord(s.school, g.opp);
      if(won){
        s.rivalryWins=(s.rivalryWins||0)+1;
        s._beatRivalThisYear=true;
        s.jobSecurity=Math.min(100,(s.jobSecurity||50)+7);

      } else {
        s.jobSecurity=Math.max(0,(s.jobSecurity||50)-6);
        toast("💔 Lost the rivalry game to "+g.opp+". ("+rr.w+"-"+rr.l+" all-time)");
      }
    }
    recordUserLeagueResult(won, g.oc===s.conf);
    recordUserBond(g.opp, g.oc===s.conf);
    // Every meeting feeds the rivalry index — close games between good teams build the most.
    (function(){
      var margin=Math.abs((res.us||0)-(res.them||0));
      var stakes=0;
      if(g.oc===s.conf) stakes+=0.4;                       // conference games carry weight
      if(s.week>=10) stakes+=0.3;                          // late-season meetings matter more
      feedRivalry(s.school, g.opp, margin, stakes, won ? s.school : g.opp);
    })();
    recordGameStats(res, g.opp, r.pbp);
    markAppearances();   // regular season only — postseason games are exempt from the 4-game cap
    // NOTE: everything above is bookkeeping. finishGameSim() sets r._recorded BEFORE doing any
    // of it, so if a step ever throws, the caller (simToFinal / onLiveStretchEnd) aborts before
    // repainting — the game looks frozen mid-quarter, and only a SECOND button press finishes
    // it (the retry skips this block). The callers now guard against that; see simToFinal.
    // The rest of the week — the other league games, player development, rivals pushing on
    // the recruiting trail, and the week counter itself — now resolves when you click
    // "Advance to Next Week" (see advanceWeek). That lets you play your game and THEN keep
    // recruiting or managing before moving on.
  } else {
    // conf title / bowl / playoff: the win still counts, the bracket resolves later
    var won=res.us>res.them;
    if(won){ s.wins++; s.careerWins++; } else { s.losses++; s.careerLosses++; }
    recordGameStats(res, r.oppName, r.pbp);
    if(r.gameKey==="confchamp") ST._confWon=won; else ST._postWon=won;
  }

}
// Resolve the roles/ratings a game is played with (extracted from simGame).
function gameSetup(game){
  var oppT=leagueTeam(game.opp);
  var oppOff = oppT ? oppT.off : (58+game.op*6+rnd(-4,4));
  var oppDef = oppT ? oppT.def : cpuDefenseRating(game.op);
  var homeAdj = game.home?(3+facLvl("stadium")):-1;
  var offFit = offSchemeFit(), defFit = defSchemeFit();
  var mine=myRatings();
  var myUnit, usedFit;
  if(ST.save.role==="HC"){ myUnit=Math.round((offenseRating()+defenseRating())/2); usedFit=Math.round((offFit+defFit)/2*10)/10; }
  else if(ST.save.role==="DC"){ myUnit=defenseRating(); usedFit=defFit; }
  else { myUnit=offenseRating(); usedFit=offFit; }
  var usOff=mine.off+homeAdj, usDef=mine.def+homeAdj;
  // ── Rivalry intensity: throw out the record book. ──
  // In a rivalry the UNDERDOG plays up — the favorite never gets a comfortable night.
  // This narrows the gap rather than picking a winner: upsets get likelier, but the
  // better team is still the better team.
  // Personality shows up on game day: the big-game player rises for a rivalry, the streaky one
  // is a coin flip, and a locker-room problem drags the whole huddle down.
  var persAdj = personalityGameAdj(game);
  usOff += persAdj; usDef += persAdj;
  var rivalry = !!game.rivalry || isRival(ST.save.school, game.opp);
  if(rivalry){
    var LIFT=3;
    if((usOff+usDef) >= (oppOff+oppDef)){ oppOff+=LIFT; oppDef+=LIFT; }   // we're favored → they rise
    else { usOff+=LIFT; usDef+=LIFT; }                                    // we're the dog → we rise
  }
  // Both teams take the field with a system and a line built for it. The opponent's is
  // scoutable (it's on the pre-game card); yours is whatever you've been recruiting toward.
  // The CPU now carries its own scheme fit (so its rating sits on your scale, not below it)
  // and an IQ that scales with prestige — a blue blood coaches circles around a cupcake.
  var theirOff=oppOffScheme(game.opp), theirDef=oppDefScheme(game.opp);
  var cFit=cpuFit(game.op);
  return {
    // `iq` scales the unit you DON'T coach: your CPU counterpart is a coordinator at
    // YOUR program's prestige, so a blue blood's other side of the ball is well-run even
    // though you never touch it. Without this it defaulted to 0.5 and under-coached you.
    us:  {off:usOff, def:usDef, lean:getGameplan().offBalance,
          blk:olBlock(), offId:offScheme().id, defId:defScheme().id,
          iq:cpuIQ((ST.save && ST.save.prestige) || 3)},
    them:{off:oppOff+cFit, def:oppDef+cFit, lean:oppLean(game.opp),
          blk:cpuBlock(game.opp), offId:theirOff.id, defId:theirDef.id, iq:cpuIQ(game.op)},
    // Both sides' position groups, so every snap can pit our line/skill against their front and
    // secondary rather than against an averaged team rating. Index matches teams[]: 0 = you.
    groups:[groupsFor(ST.save.school), groupsFor(game.opp)],
    edge:usedFit>=3, off:myUnit, rivalry:rivalry
  };
}
// Continuous game-clock sim: clock runs smoothly 0->3600s; plays reveal as the clock passes them.
// ── Sim speed ────────────────────────────────────────────
// fast/normal advance the GAME CLOCK at a fixed rate, so plays surface as fast as
// they happened — a 5-second incompletion flies by, a long run lingers.
// slow advances PER PLAY, giving every snap the same reading time regardless of
// how much clock it burned. That's the only way each play is truly readable.
var LIVE_TICK_MS=40;     // frame rate
var SIM_SPEEDS={
  fast:   {label:"Fast",   gameMs:14000},
  normal: {label:"Normal", gameMs:34000},
  // slow holds each play long enough to read. In Full Log that's ~1.9min for ~155
  // plays. In Scoring there are only ~10 stops, so we stretch the hold rather than
  // finish before Fast does.
  slow:   {label:"Slow",   holdMs:720, minTotalMs:26000, maxHoldMs:4000}
};
function simSpeed(){ return SIM_SPEEDS[ST.simSpeed] || SIM_SPEEDS.normal; }
function startLiveSim(){

  // reveal ceiling for this stretch: the end of the quarter being played, or the final
  li.target = li.finalStretch ? 3600 : (li.quarter*900);
  // Reduced motion: skip the animation, but still generate this stretch live so the
  // tactics set at the break apply as its snaps are produced, then reveal it at once.
  var reduce=false;
  try{ reduce = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches); }catch(e){}
  if(reduce){
    if(ST.G && !ST.G.done) simLiveTo(ST.G, li.stopQ, li.target);
    rebuildLivePbp();
    li.elapsed=li.target; onLiveStretchEnd(); return;
  }
  resumeLiveSim();
}
// Start (or restart) the ticker at the CURRENT speed, from the CURRENT clock.
// Called on kickoff and again whenever the user changes speed mid-game.
function resumeLiveSim(){
  stopLiveSim();
  var r=ST.weekResult, li=ST.live;
  if(!r || !li) return;
  var target=li.target||3600;
  if(li.elapsed>=target) return;   // this stretch is fully revealed
  var sp=simSpeed();
  if(sp.holdMs){ startSlowSim(r, sp); return; }
  var perTick=3600/(sp.gameMs/LIVE_TICK_MS); // game-seconds advanced per frame
  li.timer=setInterval(function(){
    li.elapsed+=perTick;
    if(li.elapsed>=target) li.elapsed=target;
    // Generate the game up to where the clock now sits. Tactics are read as each snap
    // is produced HERE — so a call the user just changed lands on the next play.
    if(ST.G && !ST.G.done){
      if(simLiveTo(ST.G, li.stopQ, li.elapsed)) rebuildLivePbp();
    }
    if(li.elapsed>=target){ stopLiveSim(); onLiveStretchEnd(); return; }
    renderLiveScore();
  }, LIVE_TICK_MS);

// Slow mode: jump the clock straight to the next play the user can actually SEE,
// then hold. Plays sharing an instant (a TD and its extra point) reveal together.
// Hidden rows are skipped, so "Scoring" doesn't crawl through 150 invisible snaps.
function startSlowSim(r, sp){
  var li=ST.live, target=li.target||3600;
  // In the Scoring feed only score events are shown, so slow mode holds on those and
  // sims straight through the invisible snaps between them. Elsewhere every snap holds.
  function rawVisible(rp){ return ST.feedMode!=="scoring" || !rp.snap; }
  var hold=sp.holdMs;
  li.timer=setInterval(function(){
    var G=ST.G;
    if(!G || li.elapsed>=target){ stopLiveSim(); li.elapsed=target; onLiveStretchEnd(); return; }
    // Advance the sim until a play the user can actually see is produced (or the
    // stretch/game ends). Tactics are read as these snaps generate.
    var stampElapsed=null, produced=false, guard=0;
    while(!G.done && guard++<900){
      if(engineElapsed(G)>=target && G.clock>0) break;
      var before=G.plays.length;
      var st=simSnap(G, li.stopQ);
      if(G.plays.length>before){
        produced=true;
        for(var k=before;k<G.plays.length;k++){
          var rp=G.plays[k];
          if(rawVisible(rp)) stampElapsed=(rp.q-1)*900+(900-rp.clock);
        }
      }
      if(st==="stop"||st==="done") break;
      if(stampElapsed!=null) break;   // reached a visible play — hold on it
    }
    if(produced) rebuildLivePbp();
    if(stampElapsed!=null) li.elapsed=Math.min(target, Math.max(li.elapsed, stampElapsed));
    else li.elapsed=target;           // nothing left to show → run out the stretch
    if(li.elapsed>=target){ stopLiveSim(); onLiveStretchEnd(); return; }
    renderLiveScore();
  }, hold);
}
function stopLiveSim(){ if(ST.live&&ST.live.timer){ clearInterval(ST.live.timer); ST.live.timer=null; } }
// A reveal stretch just reached its clock ceiling. On the FINAL stretch the game is
// now over: make sure it's fully simulated, record it, flip into the done state, and
// let renderLiveScore paint VICTORY/DEFEAT + the Continue button. Otherwise it's just
// a quarter break — repaint and the break panel (with the tactics pickers) surfaces.
function onLiveStretchEnd(){
  var li=ST.live; if(!li) return;
  if(li.finalStretch && ST.G && !ST.G.done){ simUntil(ST.G, 0); rebuildLivePbp(); }  // belt & suspenders
  if(ST.G && ST.G.done && !li.done){
    li.done=true; li.paused=false;
    rebuildLivePbp();
    try{ finishGameSim(); }
    catch(e){ console.error("finishGameSim failed at final whistle:", e); }
  }
  renderLiveScore();
}
// Skip the animation for THIS stretch — sim the rest of it at once (tactics locked as
// they are), then jump to the quarter break, or the final whistle.
function skipLive(){
  stopLiveSim();
  var li=ST.live;
  if(ST.G && !ST.G.done) simLiveTo(ST.G, li.stopQ, li.target||3600);
  rebuildLivePbp();
  li.elapsed=li.target||3600;

function finishLive(){
  stopLiveSim();

  if(ST.weekResult && ST.weekResult.confchamp){ finishConfChampGame(); return; }
  if(ST.weekResult && ST.weekResult.postseason){ finishPostGame(); return; }
  ST.weekResult=null; ST.live=null; ST.planPick=null;
  // Back to the week hub — the game is recorded but the week hasn't advanced yet, so the
  // hub now offers "Advance to Next Week" (and you can recruit/manage first).
  ST.seasonTab="week"; ST.editGame=null; ST.screen="season"; draw();
}
// Format absolute elapsed seconds into "Qn · MM:SS" (clock counts down within each quarter)
function fmtGameClock(elapsed){
  if(elapsed>=3600) return "FINAL";
  var q=Math.min(4,Math.floor(elapsed/900)+1);
  var into=elapsed-(q-1)*900;      // seconds into this quarter
  var left=Math.max(0,900-into);   // seconds left in quarter
  var mm=Math.floor(left/60), ss=Math.floor(left%60);

// Update just the live DOM (avoid full redraw so the feed animates smoothly)
var PBP_BADGE={TD:"🏈 TD",FG:"🥅 FG",FGMISS:"❌ FG",FGA:"🥅 ATT",SFTY:"＋ SFTY",
  RUN:"🏃 RUN",PASS:"🎯 PASS",INC:"· INC",SACK:"💥 SACK",INT:"🔄 INT",FUM:"🔄 FUM",PUNT:"🦶 PUNT"};
function renderLiveScore(){
  var r=ST.weekResult, li=ST.live;
  // plays revealed so far = those whose elapsed <= current game clock
  var revealed=[]; for(var i=0;i<r.pbp.length;i++){ if(r.pbp[i].elapsed<=li.elapsed) revealed.push(r.pbp[i]); }
  if(li.done) revealed=r.pbp.slice();
  var last=revealed.length?revealed[revealed.length-1]:null;
  var us=last?last.usTot:0, them=last?last.themTot:0;
  var usEl=document.getElementById("live-us"), themEl=document.getElementById("live-them"),
      qEl=document.getElementById("live-q"), feedEl=document.getElementById("live-feed"),
      btnEl=document.getElementById("live-btn");
  if(usEl){ if(usEl.textContent!=String(us)){ usEl.classList.add("bump"); setTimeout(function(){usEl.classList.remove("bump");},220); } usEl.textContent=us; }
  if(themEl){ if(themEl.textContent!=String(them)){ themEl.classList.add("bump"); setTimeout(function(){themEl.classList.remove("bump");},220); } themEl.textContent=them; }
  if(qEl)qEl.textContent = fmtGameClock(li.elapsed);
  // filter to the active feed mode, then cap: a full log is ~145 plays and
  // rebuilding all of them every tick janks the animation.
  // Stats mode reads the SAME revealed slice, so it can never show a stat from a
  // play you haven't watched yet.
  if(ST.feedMode==="stats"){
    if(feedEl && (revealed.length!==li.shownCount || li.shownMode!==ST.feedMode)){
      li.shownCount=revealed.length; li.shownMode=ST.feedMode;
      feedEl.className="";                       // not a pbp feed
      feedEl.innerHTML=liveStatsPanel(revealed);
    }
  } else {
  if(feedEl) feedEl.className="pbp-feed";
  var scoringOnly=(ST.feedMode==="scoring");
  var shown=scoringOnly?revealed.filter(function(p){return p.scoring;}):revealed;
  var MAX_ROWS=60;
  var slice=shown.slice(Math.max(0,shown.length-MAX_ROWS));
  // rebuild when a new play appears OR the mode changed
  if(feedEl && (shown.length!==li.shownCount || li.shownMode!==ST.feedMode)){
    li.shownCount=shown.length; li.shownMode=ST.feedMode;
    var rows="";
    for(var j=slice.length-1;j>=0;j--){
      var p=slice[j];
      var mine=p.team==="us";
      var badge=PBP_BADGE[p.kind]||"·";
      if(p.kind==="XP")  badge=p.good?"🦵 XP":"❌ XP";
      if(p.kind==="2PT") badge=p.good?"➋ 2PT":"❌ 2PT";
      var miss=(p.kind==="XP"||p.kind==="2PT"||p.kind==="FGMISS") && !p.good;
      var big=p.scoring;
      var turn=(p.kind==="INT"||p.kind==="FUM");
      var teamLbl = mine ? abbr(ST.save.school) : abbr(ST.weekResult.oppName);
      rows+='<div class="pbp-row'+(mine?" mine":"")+(miss?" miss":"")+(big?" score":"")+(turn?" turn":"")+'">'+
            '<span class="pbp-q">Q'+p.q+'</span>'+
            '<span class="pbp-badge">'+badge+'</span>'+
            '<span class="pbp-desc"><b>'+x(teamLbl)+'</b> · '+x(p.desc)+'</span>'+
            '<span class="pbp-sc">'+p.usTot+'-'+p.themTot+'</span></div>';
    }
    if(!rows) rows='<div class="pbp-row" style="justify-content:center;color:var(--muted)">Kickoff…</div>';
    feedEl.innerHTML=rows;
  }
  }   // end pbp branch
  var endEl=document.getElementById("live-endstat");
  if(endEl){
    if(li.done){
      var win=r.us>r.them;
      endEl.innerHTML='<div class="result-tag '+(win?"win":"loss")+'">'+(win?"VICTORY":"DEFEAT")+'</div>'+
        '<div class="stat-grid" style="margin:10px 0 0">'+
        '<div class="stat"><div class="stat-v">'+ST.save.wins+'-'+ST.save.losses+'</div><div class="stat-l">Record</div></div>'+
        '<div class="stat"><div class="stat-v">'+r.off+'</div><div class="stat-l">Offense</div></div>'+
        '<div class="stat"><div class="stat-v">'+(ST.save.week<ST.save.schedule.length?"W"+(ST.save.week+1):"Bowl")+'</div><div class="stat-l">Next</div></div>'+
        '</div>';
    } else endEl.innerHTML="";
  }
  // once the game's over there's nothing to pace and nothing to skip — drop the whole bar
  var spEl=document.getElementById("live-speed");
  if(spEl) spEl.style.display = li.done ? "none" : "";
  // Three states: still animating this quarter, paused at the break, or final.
  var atBreak = (!li.done && li.elapsed>=(li.target||3600));
  if(btnEl){
    if(li.done){
      btnEl.textContent=(ST.weekResult&&ST.weekResult.postseason?"See Result →":(ST.save.week<ST.save.schedule.length?"Continue →":"Finish Season →"));
      btnEl.className="bigbtn btn-gold"; btnEl.onclick=finishLive;
    } else if(atBreak){
      btnEl.textContent=(li.quarter===2?"Start 2nd Half →":"Play Q"+(li.quarter+1)+" →");
      btnEl.className="bigbtn btn-purple"; btnEl.style.background="var(--purple)"; btnEl.style.color="#fff";
      btnEl.onclick=nextQuarter;
    } else {
      btnEl.textContent="Skip to Q"+li.quarter+" End ⏩"; btnEl.className="bigbtn btn-ghost";
      btnEl.style.background=""; btnEl.style.color="";
      btnEl.onclick=skipLive;
    }
  }
  // ("Sim to Final" lives inside #live-speed, so it hides with the control bar)
  var brkEl=document.getElementById("live-break");
  if(brkEl) brkEl.innerHTML = atBreak ? quarterBreakPanel() : "";
  // The tactics panel stays in whatever state you left it — it no longer springs open at every
  // break. The banner is right there if you want to adjust; otherwise the play-by-play keeps
  // the screen.
  // Only rebuild the tactics DOM when something about it actually changed.
  // renderLiveScore runs every 40ms in Fast mode; blowing this away each frame
  // meant taps landed on nodes that were replaced mid-gesture.
  var tacEl=document.getElementById("live-tactics");
  if(tacEl){
    var t=(ST.G&&ST.G.tactics)||{};
    var key=li.done ? "done" : (ST.tacticsOpen?"1":"0")+t.off+t.tempo+t.def;
    if(li._tacKey!==key){
      li._tacKey=key;
      tacEl.innerHTML = li.done ? "" : tacticsPanel();
      bindTactics();
    }
  }
}
// Advance to the next quarter with whatever tactics are currently set.
function nextQuarter(){
  if(!ST.G || ST.G.done) return;
  ST.live.quarter++;
  ST.live.paused=false;
  ST.tacticsOpen=false;   // give the play-by-play the screen back
  runQuarter();
  draw();
}
// The three tactic sliders — run/pass balance, tempo, defensive aggression — as shared markup so
// they render identically in the live in-game panel AND on the pre-game gameplan screen. The
// controls and their bindings (bindTactics) are the same in both places, so a player sets the
// same dials the same way before kickoff or on the sideline.
function tacRow(title, map, keys, cur, attr){
  var o='<div class="tac-row"><div class="tac-lbl">'+title+'</div><div class="tac-pick">';
  keys.forEach(function(k){
    o+='<button class="tac-btn'+(cur===k?" on":"")+'" '+attr+'="'+k+'">'+
       '<span class="tac-ico">'+map[k].icon+'</span>'+map[k].label+'</button>';
  });
  return o+'</div></div>';
}
function tacticSliders(t, cOff, cDef){
  var h="";
  if(cOff){
    var baseLean = (ST.save.gameplan && ST.save.gameplan.offBalance!=null)
                     ? ST.save.gameplan.offBalance : offScheme().lean;
    var passPct = Math.round(100 - baseLean), runPct = 100 - passPct;
    h+='<div class="tac-bal">'+
       '<div class="tac-bal-head">'+
         '<span class="tac-bal-lbl">Run / Pass Balance</span>'+
         '<span class="tac-bal-val"><span class="run">'+runPct+'% run</span> · <span class="pass">'+passPct+'% pass</span></span>'+
       '</div>'+
       '<input type="range" min="2" max="98" value="'+(100-baseLean)+'" data-tacbalance>'+
       '<div class="tac-bal-ends"><span>🏃 All Run</span><span>All Pass 🎯</span></div>'+
     '</div>';
    var av = (ST.save.gameplan && ST.save.gameplan.aggro!=null) ? ST.save.gameplan.aggro : 50;
    h+='<div class="tac-spec tac-spec-aggro">'+
       '<div class="tac-spec-head"><span class="tac-spec-lbl">Downfield Attack</span>'+
         '<span class="tac-spec-val">'+x(aggroDialLabel(av))+'</span></div>'+
       '<input type="range" min="0" max="100" value="'+Math.round(av)+'" data-tacaggro-slider>'+
       '<div class="tac-spec-ends"><span>🎯 High %</span><span>Big Plays 🚀</span></div>'+
     '</div>';
    var tv=(typeof t.tempo==="number")?t.tempo:(t.tempo==="hurry"?100:(t.tempo==="burn"?0:50));
    h+='<div class="tac-spec tac-spec-tempo">'+
       '<div class="tac-spec-head"><span class="tac-spec-lbl">Tempo</span>'+
         '<span class="tac-spec-val">'+tempoDialIcon(t.tempo)+' '+x(tempoDialLabel(t.tempo))+'</span></div>'+
       '<input type="range" min="0" max="100" value="'+Math.round(tv)+'" data-tactempo-slider>'+
       '<div class="tac-spec-ends"><span>🐢 Chew Clock</span><span>Hurry-Up ⚡</span></div>'+
     '</div>';
  }
  if(cDef){
    var dv = (typeof t.def==="number") ? t.def : (t.def==="blitz"?0:(t.def==="prevent"?100:50));
    h+='<div class="tac-spec tac-spec-def">'+
       '<div class="tac-spec-head"><span class="tac-spec-lbl">Defensive Aggression</span>'+
         '<span class="tac-spec-val">'+defChipIcon(t.def)+' '+x(defDialLabel(dv))+'</span></div>'+
       '<input type="range" min="0" max="100" value="'+Math.round(dv)+'" data-tacdef-slider>'+
       '<div class="tac-spec-ends"><span>💥 Blitz</span><span>Prevent 🚧</span></div>'+
     '</div>';
    // Coverage — the second defensive axis. The fit note tells you whether your corners
    // actually suit the call, which is what decides how much of the upside you get.
    var cv = (ST.save.gameplan && ST.save.gameplan.cover!=null) ? ST.save.gameplan.cover : 50;
    var fit = coverageFit(cv);
    var fitTxt = fit>=0.66 ? '<b style="color:#1a7f37">corners fit this</b>'
               : fit<=0.34 ? '<b style="color:var(--red2)">wrong corners for it</b>'
               : 'neutral personnel';
    h+='<div class="tac-spec tac-spec-cov">'+
       '<div class="tac-spec-head"><span class="tac-spec-lbl">Coverage</span>'+
         '<span class="tac-spec-val">'+coverIcon(cv)+' '+x(coverLabel(cv))+'</span></div>'+
       '<input type="range" min="0" max="100" value="'+Math.round(cv)+'" data-taccover-slider>'+
       '<div class="tac-spec-ends"><span>🤛 Press Man</span><span>Zone 🕸️</span></div>'+
       '<div style="font-size:9px;font-weight:800;color:var(--muted);text-align:center;margin-top:3px">'+fitTxt+'</div>'+
     '</div>';
  }
  return h;
}
// Tactics can be toggled at ANY time — mid-quarter or at a break. They apply to
// the next snap the engine runs, never retroactively.
// Tactics are a control surface, not content. Collapsed they're a single chip row
// showing what's set; tapping expands the pickers. The full panel cost 234px of a
// 740px viewport for something you touch a handful of times a game.
function tacticsPanel(){
  var t=(ST.G&&ST.G.tactics)||{off:"balanced",tempo:"normal",def:"standard"};
  var open=!!ST.tacticsOpen;
  var cOff=coachesOff(), cDef=coachesDef();
  // Your counterpart runs the other unit and plays it straight — so it isn't yours to call,
  // and a chip for a call you can't make is just a lie on the screen.
  var role=(ST.save&&ST.save.role)||"HC";

  // ── collapsed: the chips for the calls that are yours ──
  // Read whatever is stored, whether it's a named look or a slider number.
  var t0=(ST.save&&ST.save.gameplan&&ST.save.gameplan.offBalance!=null)?ST.save.gameplan.offBalance:offScheme().lean;
  var chips="";
  if(cOff){
    chips+='<span class="tac-chip set">🎚️ '+(100-Math.round(t0))+'% pass</span>'+
           '<span class="tac-chip'+(t.off!=="balanced"?" set":"")+'">'+OFF_TACTICS[t.off].icon+' '+x(OFF_TACTICS[t.off].label)+'</span>'+
           '<span class="tac-chip'+(tempoIsSet(t.tempo)?" set":"")+'">'+tempoDialIcon(t.tempo)+' '+x(tempoDialLabel(t.tempo))+'</span>';
  }
  if(cDef){
    chips+='<span class="tac-chip'+(defChipSet(t.def)?" set":"")+'">'+defChipIcon(t.def)+' '+x(defChipLabel(t.def))+'</span>';
  }
  if(!cOff) chips+='<span class="tac-chip locked">🔒 OC calls the offense</span>';
  if(!cDef) chips+='<span class="tac-chip locked">🔒 DC calls the defense</span>';
  var h='<div class="tac-bar'+(open?" open":"")+'" id="tac-toggle">'+
    '<div class="tac-chips">'+chips+'</div>'+
    '<span class="tac-caret">'+(open?"▲":"▼")+'</span></div>';
  if(!open) return h;

  // ── expanded: the pickers ──
  h+='<div class="tactics">';
  // Who you're playing, kept on screen: the read is worthless if you can't remember it.
  var them=(ST.G&&ST.G.teams&&ST.G.teams[1])||null;
  var theirOff=them?schemeById("off",them.offId):null;
  var theirDef=them?schemeById("def",them.defId):null;
  if(theirOff&&theirDef){
    h+='<div class="tac-opp">Facing <b>'+x(theirOff.name)+'</b> offense · <b>'+x(theirDef.name)+'</b> defense</div>';
  }
  h+=tacticSliders(t, cOff, cDef);
  if(!cOff || !cDef){
    h+='<div class="tac-locked">🔒 You\u2019re the <b>'+x(role)+'</b> — your counterpart runs the '+
       (cOff?"defense":"offense")+' and plays it straight. Win a head-coaching job to call both.</div>';
  }

  // NO in-game tells. You scouted them before kickoff; from here you're a coach on the sideline,
  // reading the drive log to figure out what's working and what they've taken away. The panel
  // shows only what each call DOES (playbook knowledge), never how it's grading against this
  // opponent, never whether they've keyed on you. Those are the reads you have to make yourself.
  var lines=[];
  if(t.off!=="balanced")  lines.push(x(OFF_TACTICS[t.off].desc));
  if(tempoIsSet(t.tempo)) lines.push(x((TEMPO_TACTICS[tempoCallOf(t.tempo)]||TEMPO_TACTICS.normal).desc));
  if(defChipSet(t.def))   lines.push(x(DEF_TACTICS[defCallOf(t.def)].desc));
  h+='<div class="tac-desc">'+(lines.length?lines.join("<br>")
      :"Playing it straight. Watch the drive log to see what's working — then adjust.")+'</div>';
  return h+'</div>';
}
function setTactic(kind, val){
  // Guard the unit you don't coach, whether a game is live or not.
  if((kind==="off"||kind==="tempo") && !coachesOff()) return;
  if(kind==="def" && !coachesDef()) return;
  // Always remember the call on the save — that's what the next game (or a pre-game set) reads.
  if(!ST.save.tactics) ST.save.tactics={off:"balanced",tempo:"normal",def:"standard"};
  ST.save.tactics[kind]=val;
  // If a game is live, apply it there too so it takes effect on the next snap.
  if(ST.G){
    ST.G.tactics[kind]=val;
    if(ST.live) ST.live._tacKey=null;
  }
  persist();
  // Re-render whichever surface is showing the controls.
  var el=document.getElementById("live-tactics");
  if(el){ el.innerHTML=tacticsPanel(); bindTactics(); return; }
  if(ST.showScheme) draw();   // pre-game panel: full redraw keeps labels and chips in sync
}
// The player's run/pass balance from the slider. passPct is what the slider reports; the engine
// stores lean (high = run), so they're inverses. Live if a game's running, and remembered on the
// gameplan for the next one either way.
function setBalance(passPct){
  if(!coachesOff()) return;
  var lean=clampN(Math.round(100-passPct), 2, 98);
  if(!ST.save.gameplan) ST.save.gameplan={offBalance:lean, defBalance:50};
  ST.save.gameplan.offBalance=lean;
  if(ST.G && ST.G.teams && ST.G.teams[0]) ST.G.teams[0].lean=lean;   // this game, right now
  persist();
}
// The downfield dial, 0..100 (high-percentage .. big plays), stored on the gameplan and read by
// the snap loop's aggro channel. Persists for the next game and applies live if one's running.
function setAggro(v){
  if(!coachesOff()) return;
  v=clampN(Math.round(v),0,100);
  if(!ST.save.gameplan) ST.save.gameplan={offBalance:50, defBalance:50};
  ST.save.gameplan.aggro=v;
  persist();
}
// The coverage dial, 0..100 (press man .. zone). A defensive call, so it's gated on coachesDef.
function setCover(v){
  if(!coachesDef()) return;
  v=clampN(Math.round(v),0,100);
  if(!ST.save.gameplan) ST.save.gameplan={offBalance:50, defBalance:50};
  ST.save.gameplan.cover=v;
  persist();
}
// Binds only the tactics DOM, which gets rebuilt when a call changes.
function bindTactics(){
  var tt=document.getElementById("tac-toggle");
  if(tt) tt.onclick=function(){
    ST.tacticsOpen=!ST.tacticsOpen;
    if(ST.live) ST.live._tacKey=null;   // force the next render to rebuild
    var el=document.getElementById("live-tactics");
    if(el){ el.innerHTML=tacticsPanel(); bindTactics(); }
  };
  document.querySelectorAll("[data-tacoff]").forEach(function(b){b.onclick=function(){setTactic("off",b.getAttribute("data-tacoff"));};});
  // Tempo slider: continuous 0..100 (burn .. hurry-up). Live label on drag, commit on release.
  document.querySelectorAll("[data-tactempo-slider]").forEach(function(sl){
    sl.oninput=function(){
      var v=parseInt(sl.value,10);
      var host=sl.parentNode.querySelector(".tac-spec-val");
      if(host) host.innerHTML=tempoDialIcon(v)+' '+tempoDialLabel(v);
    };
    sl.onchange=function(){ setTactic("tempo",parseInt(sl.value,10)); };
  });
  // Defense slider: continuous aggression 0..100. Live label on drag, commit on release.
  document.querySelectorAll("[data-tacdef-slider]").forEach(function(sl){
    sl.oninput=function(){
      var v=parseInt(sl.value,10);
      var host=sl.parentNode.querySelector(".tac-spec-val");
      if(host) host.innerHTML=defChipIcon(v)+' '+defDialLabel(v);
    };
    sl.onchange=function(){ setTactic("def",parseInt(sl.value,10)); };
  });
  // Coverage slider: 0..100 (press man .. zone). Updates both the label and the personnel-fit
  // note live, since the fit is what tells you whether the call suits your corners.
  document.querySelectorAll("[data-taccover-slider]").forEach(function(sl){
    sl.oninput=function(){
      var v=parseInt(sl.value,10);
      var host=sl.parentNode.querySelector(".tac-spec-val");
      if(host) host.innerHTML=coverIcon(v)+' '+coverLabel(v);
      var note=sl.parentNode.querySelector(".tac-spec-cov > div:last-child") || sl.parentNode.lastElementChild;
      if(note && note!==host){
        var f=coverageFit(v);
        note.innerHTML = f>=0.66 ? '<b style="color:#1a7f37">corners fit this</b>'
                       : f<=0.34 ? '<b style="color:var(--red2)">wrong corners for it</b>'
                       : 'neutral personnel';
      }
    };
    sl.onchange=function(){ setCover(parseInt(sl.value,10)); };
  });
  // Downfield Attack slider: continuous 0..100 (high-% .. big plays). Live label, commit on release.
  document.querySelectorAll("[data-tacaggro-slider]").forEach(function(sl){
    sl.oninput=function(){
      var v=parseInt(sl.value,10);
      var host=sl.parentNode.querySelector(".tac-spec-val");
      if(host) host.innerHTML=aggroDialLabel(v);
    };
    sl.onchange=function(){ setAggro(parseInt(sl.value,10)); };
  });
  // The balance slider updates its live read on every drag, and commits on release. Rebinding
  // the whole panel mid-drag would kill the drag, so only the label updates during input.
  document.querySelectorAll("[data-tacbalance]").forEach(function(sl){
    sl.oninput=function(){
      var pass=parseInt(sl.value,10), run=100-pass;
      var host=sl.parentNode.querySelector(".tac-bal-val");
      if(host) host.innerHTML='<span class="run">'+run+'% run</span> · <span class="pass">'+pass+'% pass</span>';
    };
    sl.onchange=function(){ setBalance(parseInt(sl.value,10)); };
  });
}
// "Sim to Final" is in liveScreen's static markup — bound once, never rebuilt.
function bindLiveControls(){
  var sf=document.getElementById("live-sim-final"); if(sf)sf.onclick=simToFinal;
  var bb=document.getElementById("live-backups"); if(bb)bb.onclick=toggleBackups;

function quarterBreakPanel(){
  var li=ST.live, G=ST.G;
  var lbl = li.quarter===2 ? "HALFTIME" : "END OF Q"+li.quarter;
  var m=G.S[0]-G.S[1];
  var state = m>0 ? ("Leading by "+m) : (m<0 ? ("Trailing by "+(-m)) : "Tied");
  return '<div class="qbreak"><div class="qbreak-lbl">'+lbl+'</div>'+
         '<div class="qbreak-sc">'+state+'</div>'+
         '<div class="qbreak-note">Set your tactics, then play on. They take effect on the next snap.</div></div>';
}
function advanceSeason(){
  var s=ST.save;
  if(s._evaluated){
    if(s._pendingFired){ ST.fired=ST.fired||{school:s.school,seasons:s.seasonsPlayed}; ST.carousel=ST.carousel||genCarousel(true); ST.screen="fired"; draw(); return; }
    // regenerate offers if they were lost (e.g. page reload — carousel isn't persisted)
    if(!ST.carousel||!ST.carousel.length){ ST.carousel=genCarousel(false); }
    if(ST.carousel&&ST.carousel.length){ ST.screen="carousel"; draw(); return; }
    startNextSeason(); return;
  }
  s.seasonsPlayed=(s.seasonsPlayed||0)+1;
  s._evaluated=true;
  if(!s._goals || !s._goals.length) snapshotSeasonGoals();  // defensive: some paths skip the postseason screen
  // defensive: ensure fields exist on older saves so nothing below crashes
  if(!s.history) s.history=[];
  if(!s.abilities) s.abilities=[];
  if(s.coachXP==null) s.coachXP=0;
  if(!s.archetype) s.archetype="offensive";
  if(s.titles==null) s.titles=0;
  // Titles are awarded where they're actually won — finishConfChampGame() for the conference,
  // finishPostGame() for the natty. A big win total is not a championship.
  if(s._wonConfThisYear) toast("🏆 "+x(s.conf)+" title season!");
  // ── The season's line in the record book ──────────────────
  // Everything the career table needs, captured while it's still in scope: your record,
  // your conference record and finish, how the postseason ended, and the LEVEL you did it
  // at — an FCS national title and an FBS one are different achievements.
  var _cr = userConfRecord();
  var _tbl = computeConfStandings();
  var _place = 0;
  _tbl.forEach(function(t,i){ if(t.you) _place=i+1; });
  s.history.push({
    season:s.season, year:2026+((s.seasonsPlayed||1)-1),
    school:s.school, conf:s.conf, div:myDivision(), role:s.role,
    wins:s.wins, losses:s.losses, expect:s.expectWins,
    cw:_cr.cw, cl:_cr.cl,
    place:_place, confSize:_tbl.length,
    post:seasonPostLabel(),
    confTitle: !!s._wonConfThisYear,
    natlTitle: !!s._wonNatlThisYear
  });
  // (awards, the draft, redshirts and staff offers were all settled when the offseason OPENED —
  //  see prepareOffseason. This only applies what you decided.)
  ageStars();          // the rest of the country graduates and reloads too
  recordChampions(); // log this year's national & conference champions to the league history
  updatePrestige();  // sustained success (or failure) moves the program's standing

  // ── Coach XP: earn from wins, meeting expectations, and postseason success ──
  // Deliberately slow: a maxed ability tree is a career-long achievement, so a good season should
  // move the needle only a little. Roughly half the old rates — a good year now yields ~6 XP, a
  // championship year ~10, so the +8 offense branch (80 XP) is most of a coaching lifetime.
  s._xpGainedThisYear=0;
  awardCoachXP(Math.floor(s.wins/4), "wins");            // ~1 XP per 4 wins (farmable source — kept slow)
  // Each of the AD's three goals is worth XP on its own, and hitting all three is a bonus.
  var _g=resolvedGoals();
  _g.forEach(function(g){ if(g.met) awardCoachXP(1, g.key==="wins"?"met win total":(g.key==="post"?"postseason goal":"program goal")); });
  if(_g.length && _g.every(function(g){return g.met;})) awardCoachXP(1, "met every expectation");
  if(s._wonConfThisYear) awardCoachXP(2, "conference title");
  if(s._wonNatlThisYear) awardCoachXP(3, "national title");

  // ── evaluate season vs expectation → adjust job security ──
  var cult = hasAbility("pro4")?0.4:(hasAbility("pro1")?0.6:1); // Dynasty > Culture: security erodes more slowly
  var diff = s.wins - s.expectWins;
  if(diff>=2){ s.jobSecurity=Math.min(100,s.jobSecurity+20); s.missedYears=0; }
  else if(diff>=0){ s.jobSecurity=Math.min(100,s.jobSecurity+12); s.missedYears=0; }
  else if(diff>=-1){ s.jobSecurity=Math.max(0,s.jobSecurity-Math.round(8*cult)); s.missedYears=0; }
  else if(diff>=-3){ s.jobSecurity=Math.max(0,s.jobSecurity-Math.round(16*cult)); s.missedYears++; }
  else { s.jobSecurity=Math.max(0,s.jobSecurity-Math.round(26*cult)); s.missedYears++; }
  // The win total is the headline, but the AD set three goals. Clearing the postseason and
  // program bars buys goodwill a light win total alone wouldn't, and whiffing on all three is
  // worse than the record suggests. Sweeping all three also wipes a "missed year".
  var gm=(s._goalsMet!=null) ? s._goalsMet : goalsMetCount();
  if(gm>=3){ s.jobSecurity=Math.min(100,s.jobSecurity+8); s.missedYears=0; }
  else if(gm===2){ s.jobSecurity=Math.min(100,s.jobSecurity+3); }
  else if(gm===0){ s.jobSecurity=Math.max(0,s.jobSecurity-Math.round(8*cult)); }
  if(hasAbility("leg3")){ s.jobSecurity=Math.max(s.jobSecurity,45); s.missedYears=0; } // Immortal: never truly on the hot seat

  // prestige drift
  if(s.wins>=10&&s.prestige<5)s.prestige++;
  else if(s.wins<=3&&s.prestige>1)s.prestige--;

  // graduate seniors, age up, develop — and let underfunded/unhappy players hit the portal
  var YR_NEXT={FR:"SO",SO:"JR",JR:"SR"};
  // Departures were DECIDED when the offseason opened and you've had the whole portal window to
  // buy them back. This just applies the result — no fresh rolls, no surprises after the fact.
  var kept=[], departed=[];
  s.roster.forEach(function(p){
    // A transfer you signed during the portal window ARRIVES for next season — he must not be run
    // through graduation and aging. Left alone he'd age a second time, and a senior transfer would
    // graduate the instant you signed him.
    if(p._incoming){ delete p._incoming; p.gp=0; kept.push(p); return; }
    if(p.yr==="SR"||p.cut||p._declared)return; // seniors graduate; early entrants go pro; cuts are released
    if(p._leaving){                            // he entered the portal and you didn't keep him
      departed.push({n:p.n,pos:p.pos,ovr:p.ovr,arch:p.arch,dev:p.dev,yr:YR_NEXT[p.yr]||p.yr});
      return;
    }
    var wasYr=p.yr;
    // A redshirt season doesn't count against eligibility, so his class year holds.
    if(p._rsHold){ p._rsHold=false; }
    else { p.yr=YR_NEXT[p.yr]||p.yr; }
    p.gp=0;   // new season, fresh four-game allowance
    p.reps=0; // and last year's bench reps don't carry over

    // TUNING: late bloomers. Previously the ceiling (pot) was rolled once at signing and never
    // moved, so a player who reached it by his junior year was finished — the senior season
    // added ~1 point. Now an upperclassman who is near his ceiling has a modest chance to earn
    // a few more points of headroom, so a senior can still surprise. Keeps the curve alive to
    // the end of a career and rewards keeping players over chasing the portal.
    if((p.yr==="JR"||p.yr==="SR") && (p.pot-p.ovr)<=3 && p.dev!=="bust"){
      if(Math.random() < (p.dev==="elite"?0.55:p.dev==="pro"?0.42:p.dev==="standard"?0.30:0.18)){
        p.pot=Math.min(devInfo(p.dev).cap, p.pot + rnd(2,4));
      }
    }
    var pot = Math.max(p.pot!=null?p.pot:99, p.ovr); // ceiling (never below current, for old saves)
    var head = pot - p.ovr;
    var doff=devInfo(p.dev).off; var dv = rnd(doff[0],doff[1]); // Elite up to +4, Bust ~0-1
    // TUNING: seniors used to gain almost nothing because they were already at their ceiling.
    // With the late-bloom bump above they now have headroom; give upperclassmen a small floor of
    // growth so a returning senior is a real, visible upgrade rather than dead weight.
    if((wasYr==="JR"||wasYr==="SO") && head>0) dv=Math.max(dv, rnd(1,2));
    if(dv>0){
      if((hasArch("developer")||hasAbility("dev3")||hasAbility("pro3"))) dv += rnd(1,2); // stronger offseason growth
      if(hasAbility("dev5")) dv += rnd(1,2); // Dynasty Pipeline
      if(hasAbility("leg3")) dv += rnd(2,3); // Immortal
      if(facLvl("training")>0) dv += Math.min(3, Math.ceil(facLvl("training")/2)); // Training Facilities
      dv = Math.min(dv, head); // never grow past the ceiling
    }
    // TUNING: no single offseason should vault a player most of the way to his ceiling. Cap the
    // yearly leap so a 5-star climbs 81 -> ~86 -> ~90 -> ~93 instead of 81 -> 90 in one summer.
    // Freshmen (wasYr FR) are held tightest; the boosts above can still push a hair past.
    var yearCap = (wasYr==="FR") ? 5 : 6;
    dv = Math.min(dv, yearCap);
    var _beforeOff=p.ovr;
    p.ovr=Math.max(50,Math.min(99,p.ovr+dv));
    distributeSkillGains(p, p.ovr-_beforeOff);   // offseason jump scatters across skills too
    if(!devInfo(p.dev).hidden && (p.yr==="JR"||p.yr==="SR"||Math.abs(p.ovr-(p.startOvr||p.ovr))>=3)) p.revealed=true;
    kept.push(p);
  });
  s.roster=kept;
  s._departed=departed;          // for the record; the portal window has already closed
  // living league: teams' ratings drift based on how they performed vs their rating.
  // Prestige moves FIRST — it reads this season's W/L, which driftLeagueRatings then wipes.
  // Conference standing is computed from THIS season's playoff picture, so it must run before
  // driftLeagueRatings() wipes every team's W/L.
  updateConfPrestige();
  // With standings settled, conferences act: the strongest leagues pick off the best programs
  // they can persuade to move. Runs AFTER prestige so raids reflect this season's results.
  ST.save._realignMoves=runConferenceRaids();
  ST.save._breakawayNew=runBreakaways();   // regional clusters can walk out and found a league
  decayBonds();                            // series that lapse fade away
  decayRivalries();                        // and rivalries cool if you stop playing
  ST.save._pendingInvite=pendingInviteForUser();
  driftLeaguePrestige();
  driftLeagueRatings();
  // Realignment lands in the offseason, so the new map is in place before next year's schedule
  // is built. seasonsPlayed has already ticked, so this resolves to the SEASON ABOUT TO BEGIN.
  runRealignmentFor(2026+((ST.save.seasonsPlayed||1)-1));
  simLeaguePortal(); // rivals work the portal too — the league's balance shifts

  // ── firing check: hot seat + missed expectations two+ years, or rock-bottom security ──
  var fired = (s.jobSecurity<=0) || (s.jobSecurity<25 && s.missedYears>=2);
  if(fired){
    s._pendingFired=true;
    ST.fired={school:s.school, seasons:s.seasonsPlayed};
    ST.carousel=genCarousel(true);
    persist();
    ST.screen="fired"; draw(); return;
  }
  // (the job-security hit for losing key players was applied when the portal opened)

  // ── carousel: offers may appear if you're doing well ──
  ST.carousel=genCarousel(false);
  if(ST.carousel && ST.carousel.length){
    persist();
    ST.screen="carousel"; draw(); return;
  }

  // no offers, not fired → continue at current school
  startNextSeason();
}

// Begin the next season at the current school
function startNextSeason(){
  var s=ST.save;
  signCommittedRecruits(); // last season's commits become freshmen on the roster
  s.season++; s.wins=0; s.losses=0; s.week=0; s._recruited=false;
  s._evaluated=false; s._pendingFired=false;
  s.expectWins=expectWinsFor(s.prestige, s.conf);
  s._goals=null; s._goalsMet=0;   // last year's verdict doesn't carry over
  s._goalsCollapsed=false;        // new season, new goals — show them again
  s._pledgeLocked=false;          // a fresh promise each year — the board wants new terms
  s._pledgeSettled=false;         // this season's pledge hasn't been judged yet
  s._pledgeResult=null; s._pledgeTrust=null;
  ST.goalPick=null;               // no stale picker carried in
  s.schedule=genSchedule({n:s.school,c:s.conf,p:s.prestige});
  s.budget=budgetFor(s.prestige,s.role);
  if(s.league && s.league.teams){
    Object.keys(s.league.teams).forEach(function(n){ var t=s.league.teams[n]; t.w=0; t.l=0; t.cw=0; t.cl=0; t._playedWeek=-1; });
    s.league.week=0; s.league.confSched=null; s.league.confRemain=null;
    buildLeagueConfSchedule();
  }
  beginSeasonRecruiting();     // fresh recruiting board for the new season
  ST.carousel=null; s._carousel=null; ST.post=null; s._post=null; s._postDone=false;
  ST.confchamp=null; s._confchamp=null; s._wonConfThisYear=false; s._wonNatlThisYear=false; s._madePlayoffThisYear=false;
  s._beatFBSThisYear=false;
  s._beatRivalThisYear=false;
  s._recruited=false;
  stampSeasonStart();
  persist();
  // The portal window is closed — everything's applied. Walk-ons fill whatever's still empty.
  fillWalkOns();
  s._inPortal=false; s._osReady=false;
  s._portalOut=[]; s._portalPool=[]; s._portalSigned=[]; s._portalSecHit=0;
  ST.osTab=null;
  persist();
  enterPreseason();
}
// Add all committed recruits to the roster as freshmen (signing day)
function signCommittedRecruits(){
  var s=ST.save; if(!s.board) return;
  // roster cap per position = 4 deep at each starting slot (a full FR→SR pipeline)
  var capFor=function(pos){ return rosterSizeAt(pos); };
  // A walk-on is a placeholder, not a roster spot. A real signee displaces the
  // weakest one at his position rather than being told there's no room.
  var displaced=0;
  var have={};
  s.roster.forEach(function(p){ have[p.pos]=(have[p.pos]||0)+1; });
  var bumpWalkOn=function(pos){
    var pool=s.roster.filter(function(p){ return p.pos===pos && p.walkOn; });
    if(!pool.length) return false;
    pool.sort(function(a,b){ return a.ovr-b.ovr; });   // weakest goes first
    var id=pool[0].id;
    s.roster=s.roster.filter(function(p){ return p.id!==id; });
    have[pos]=(have[pos]||1)-1; displaced++;
    return true;
  };
  // sort commits best-first so, if a position is tight, the top prospects get the spots
  var commits=s.board.filter(function(b){return b.status==="committed";})
                     .sort(function(a,b){ return b.st-a.st || b.ovr-a.ovr; });
  var signed=0, cut=0;
  commits.forEach(function(b){
    var cap=capFor(b.pos), cur=have[b.pos]||0;
    if(cur>=cap) bumpWalkOn(b.pos);      // full only because a walk-on is holding the spot
    cur=have[b.pos]||0;
    if(cur<cap){
      // If you fully scouted them, you already know their dev trait — keep it revealed on the roster.
      s.roster.push({id:b.id,n:b.n,pos:b.pos,ovr:b.ovr,yr:"FR",dev:b.dev,arch:b.arch||rollArch(b.pos),pot:rollPotential(b.ovr,b.dev),st:b.st,startOvr:b.ovr,ssOvr:b.ovr,revealed:(b.scout>=maxScoutTier())});
      have[b.pos]=cur+1; signed++;
    } else {
      cut++; // over-recruited at this position — they sign elsewhere / grayshirt out
    }
  });
  s._signedThisYear=signed;
  s._cutThisYear=cut;
  s._displacedWalkOns=displaced;
}

// Generate coaching-carousel job openings.
// fired=true → only lateral/lower jobs. Otherwise: step-up/lateral offers PLUS a standing
// rebuild ladder (one HC job per tier below you) PLUS coordinator openings at every
// lower tier, so you can always drop down — rebuild as HC, or step back to run a unit.
function genCarousel(fired){
  var s=ST.save;
  var cur=s.prestige;
  var offers=[];
  var over = (s.wins - s.expectWins) + ((hasAbility("pro2")||hasArch("program"))?2:0) + (hasAbility("pro5")?4:0); // Program Builder / Reputation (non-stacking) + Living Legend: better offers appear
  var myDiv=myDivision();
  // Your own subdivision is always in play. A strong FCS season (or a title) opens the
  // door to LOW-END FBS jobs — the classic FCS-to-FBS jump. FBS coaches never drop to FCS
  // unless they were fired, and even then only after a truly disastrous year.
  var pool;
  if(myDiv==="FCS"){
    pool=FCS_TEAMS.filter(function(t){return t.n!==s.school;});
    var earnedJump = s._wonNatlThisYear || (s.celebrationTitles>0 && s._wonConfThisYear) || over>=2 || s.wins>=11;
    if(earnedJump){
      // move-up targets: bottom-tier FBS programs only
      FBS_TEAMS.forEach(function(t){ if(t.p<=2) pool.push(t); });
    }
  } else {
    pool=FBS_TEAMS.filter(function(t){return t.n!==s.school;});
    if(fired && over<=-4){ FCS_TEAMS.forEach(function(t){ if(t.p>=4) pool.push(t); }); } // fallback landing spot
  }
  function take(list){ if(!list.length)return null; var t=list.splice(Math.floor(Math.random()*list.length),1)[0]; pool=pool.filter(function(x){return x.n!==t.n;}); return t; }
  function cand(minP,maxP){ return pool.filter(function(t){return t.p>=minP&&t.p<=maxP;}); }
  function addOffer(t,role){ if(t) offers.push({n:t.n,c:t.c,p:t.p,role:role}); }
  var clamp=function(v){ return Math.max(1,Math.min(5,v)); };

  if(fired){
    // ── Rebound offers: always a fresh start somewhere, usually a step down ──
    // Worse you did, further you fall — but there is ALWAYS a landing spot.
    var drop = over<=-4 ? 2 : 1;              // brutal season = fall two tiers
    var hi=clamp(cur-drop), loP=clamp(cur-drop-1);
    var coordRole=(s.role==="DC")?"DC":"OC";
    addOffer(take(cand(loP,hi)),coordRole);
    addOffer(take(cand(loP,hi)),coordRole);
    // a rebuild HC job at a small program willing to gamble on you (always a stepping stone)
    addOffer(take(cand(1, Math.min(2, Math.max(1,cur-1)))),"HC");
    // guarantee at least 2 offers by widening if needed
    if(offers.length<2) addOffer(take(cand(1,cur)),coordRole);
    if(offers.length<2) addOffer(take(cand(1,5)),coordRole);
  } else if(s.role==="OC"||s.role==="DC"){
    var coord=s.role; // OC stays OC, DC stays DC when moving laterally
    // ── First-time Head Coach jobs are STEPPING STONES ──
    var hcCeil = over>=3 ? 3 : (over>=1 ? 2 : 1);   // great year tops out at a 3-star HC job
    hcCeil = Math.min(hcCeil, Math.max(1, cur-2));   // and always a real step down from your school
    var hcFloor = 1;
    addOffer(take(cand(hcFloor, hcCeil)), "HC");
    if(over>=2) addOffer(take(cand(hcFloor, hcCeil)), "HC"); // strong year → a second HC option
    // ── Lateral / step-up coordinator jobs, ceiling scales with results ──
    if(over>=2 && cur<5){ addOffer(take(cand(cur+1,clamp(cur+2))),coord); }
    else if(over>=0){ addOffer(take(cand(cur,clamp(cur+1))),coord); }
    else { addOffer(take(cand(clamp(cur-1),cur)),coord); }
    if(offers.length<2) addOffer(take(cand(clamp(cur-1),clamp(cur+1))),coord);
  } else {
    // ── Already a Head Coach: NOW you climb as a HC, one tier at a time ──
    // Proven HCs move up gradually — a good year at a 2-star gets you a 3-star job, not a 5-star.
    if(over>=2 && cur<5){ addOffer(take(cand(cur+1,clamp(cur+1))),"HC"); }  // one tier up, earned
    else if(over>=0){ addOffer(take(cand(cur,clamp(cur+1))),"HC"); }        // lateral or slight step up
    else { addOffer(take(cand(clamp(cur-1),cur)),"HC"); }                   // down year → lateral/step down
    addOffer(take(cand(clamp(cur-1),clamp(cur+1))),"HC");                   // a comparable second option
    // ── Rebuild projects: you can ALWAYS choose to step DOWN and take on a
    // reclamation job, even coming off a title — leave the blue blood to wake a
    // sleeping giant. One standing HC offer at every tier beneath you.
    for(var rp=cur-1; rp>=1; rp--){ addOffer(take(cand(rp,rp)),"HC"); }
  }
  // ── Coordinator openings at smaller programs: whatever your role, lower-tier
  // programs are always hiring coordinators. Drop down a level to run a unit on a
  // fresh project — one OC/DC opening per tier beneath you (an HC can step back to
  // either side of the ball).
  if(!fired){
    for(var lp=cur-1; lp>=1; lp--){
      if(s.role==="HC"){ addOffer(take(cand(lp,lp)),"OC"); addOffer(take(cand(lp,lp)),"DC"); }
      else { addOffer(take(cand(lp,lp)), s.role); }   // OC stays OC, DC stays DC
    }
  }
  // de-dupe by school name, keep up to 10
  var seen={}, uniq=[];
  offers.forEach(function(o){ if(o&&!seen[o.n]){seen[o.n]=1;uniq.push(o);} });
  // absolute safety net: never return an empty slate
  if(!uniq.length){ var anyT=take(cand(1,5)); if(anyT){ uniq.push({n:anyT.n,c:anyT.c,p:anyT.p,role:s.role==="HC"?"HC":"OC"}); } }
  return uniq.slice(0,10);
}
// Take a job from the carousel (or after being fired). Offer carries its own role.
function takeJob(offer){
  var s=ST.save;
  var newRole = offer.role || s.role;
  // What follows a coach to a new job is his CAREER — everything he earned, not the program he
  // left. Your board and roster stay behind (those belong to the school); your record book,
  // hardware, draft pipeline and rivalry ledgers come with you, because they're keyed by school
  // and are meant to span a whole career across several programs.
  var CARRY=["careerWins","careerLosses","titles","natlTitles","seasonsPlayed","abilities",
             "history","coachXP","archetype","coachAwards",
             "awards","draftHistory","recordBook","rivalRec",   // the whole Trophy Room
             "staff",                                           // his assistants come WITH him
             "rivalryWins","fbsUpsets","facilities","legacyPts","_rsInit"];
  var fresh=newSave({n:offer.n,c:offer.c,p:offer.p}, newRole);
  CARRY.forEach(function(k){ if(s[k]!==undefined) fresh[k]=s[k]; });
  fresh.jobsHeld=(s.jobsHeld||1)+1;
  fresh.jobSecurity=55; // fresh mandate at a new job
  if(s.league) fresh.league=s.league; // the world continues — keep the living league
  ST.save=fresh; ST.fired=null; ST.carousel=null;
  beginSeasonRecruiting();       // fresh recruiting board at the new school
  fresh._recruited=false; fresh.week=0;
  buildLeagueConfSchedule();
  stampSeasonStart();
  persist();
  if(newRole!==s.role && newRole==="HC") toast("🎉 Promoted to Head Coach!");
  enterPreseason();
}

// ── Boot ─────────────────────────────────────────────────
loadData();
draw();
</script>
