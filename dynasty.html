// ── Save / load ──────────────────────────────────────────
function newSave(team, role){
  // Anchor the starting roster to the team's REAL unit ratings (subdivision-aware), so an
  // FCS roster sits at its true, lower overall and every FBS roster matches its rating too.
  var roster=genStarterRoster(team.p, role, teamTargets(team));
  // Everyone already on campus above freshman year has burned his redshirt — that's what being
  // a sophomore, junior or senior on a real roster means. So on day one of a dynasty the ONLY
  // redshirt candidates are true freshmen, and the RS button doesn't appear on anyone else.
  roster.forEach(function(p){ if(p.yr!=="FR") p.rsUsed=true; });
  var s={
    school:team.n, conf:team.c, prestige:team.p, role:role,
    archetype:(ST.setup&&ST.setup.archetype)||"offensive",
    season:1, week:0, wins:0, losses:0,
    roster:roster, schedule:genSchedule(team), history:[],
    careerWins:0, careerLosses:0, titles:0, seasonsPlayed:0, jobsHeld:1,
    abilities:[], budget:budgetFor(team.p, role),
    coachXP:0, legacyXP:0, facilities:{}, champHistory:[],
    jobSecurity:60, missedYears:0,
    _rsInit:true   // starting roster is already stamped: only true freshmen hold a redshirt
  };
  // start with your archetype's matching tier-1 skill already unlocked
  var startSkill=archStartSkill(s.archetype);
  if(startSkill) s.abilities.push(startSkill);
  s.expectWins=expectWinsFor(team.p, team.c);
  s.league=initLeague();
  s.gameplan={offBalance:53, defBalance:50};
  s.offScheme="prostyle"; s.defScheme="base43";
  s._lastWins=0; s.nilTotal=NIL_BASE[team.p]||8; s.nilLeft=s.nilTotal;
  s._goalsCollapsed=false;   // the goal list opens on a new dynasty; the user can fold it away
  return s;
}
// Season win expectation by program prestige (of a 12-game schedule)
// ── Season expectations ──────────────────────────────────
// Three goals every year, judged independently. The AD wants a win total, a postseason
// result, and evidence you're building something. Prestige raises every bar; the postseason
// goal is expressed in the language of your OWN subdivision (an FCS coach is asked to reach
// the quarterfinals of a 24-team bracket, not "a bowl game").
function expectWinsFor(prestige, conf){
  // FCS plays 11 games, FBS 12, so the FCS bars sit one win lower at the top.
  if(conf!=null && isFCSConf(conf)) return [0,3,4,6,7,8][prestige];
  return [0,3,4,6,8,9][prestige];
}

// The postseason bar, by prestige. Keys are checked against furthestRoundReached().
// FBS: bowl → CFP → quarterfinal → title.  FCS: playoff → quarterfinal → semifinal → title.
// SWAC/MEAC have no bracket, so their bar is the Celebration Bowl; the Ivy has no postseason
// at all and is judged on the conference race instead.
var POST_GOAL_ORDER=["none","postseason","r2","qf","sf","champ"];
function postGoalFor(prestige, conf){
  // SWAC/MEAC never enter the bracket; their season peaks at the Celebration Bowl.
  if(isCelebrationConf(conf)){
    if(prestige>=4) return {key:"celebration", label:"Win the Celebration Bowl"};
    if(prestige>=2) return {key:"conf",        label:"Win the "+conf};
    return {key:"tophalf", label:"Finish in the top half of the "+conf};
  }
  // A league that declines all bids can only be judged on its own race.
  if(isNoPostseasonConf(conf)){
    return prestige>=3 ? {key:"conf", label:"Win the "+conf}
                       : {key:"tophalf", label:"Finish in the top half of the "+conf};
  }
  if(isFCSConf(conf)){
    if(prestige>=5) return {key:"sf",         label:"Reach the FCS semifinals"};
    if(prestige>=4) return {key:"qf",         label:"Reach the FCS quarterfinals"};
    if(prestige>=3) return {key:"postseason", label:"Make the 24-team FCS playoff"};
    if(prestige>=2) return {key:"tophalf",    label:"Finish in the top half of the "+conf};
    return {key:"none", label:"No postseason expectation"};
  }
  if(prestige>=5) return {key:"qf",         label:"Reach the CFP quarterfinals"};
  if(prestige>=4) return {key:"postseason", label:"Make the College Football Playoff"};
  if(prestige>=3) return {key:"postseason", label:"Reach a bowl game"};
  if(prestige>=2) return {key:"tophalf",    label:"Finish in the top half of the "+conf};
  return {key:"none", label:"No postseason expectation"};
}

// A program-building goal: proof the future is brighter than the present. The bar is anchored
// to the star this program ACTUALLY lands (expectedStarFor) rather than raw prestige, so it is
// always a stretch and never a fantasy — "sign 2 four-stars" is impossible at an FCS school
// that leads 9% of its 4-star battles.
function buildGoalFor(prestige, conf){
  var exp=expectedStarFor(prestige, conf);
  // How hard is a recruit one tier up? starFitMult answers directly. Anything under ~0.5 is a
  // battle you lose most of the time, so ask for ONE of those; a comfortable tier can be asked
  // for twice. This is what keeps "sign 2 4-stars" off Montana's list (its 4-star fit is 0.77
  // but its lead rate is 11%) while leaving it on Alabama's.
  // Ask for a HAUL at the tier you actually win, not a lottery ticket one tier up. Chasing a
  // star you lead 3% of the time isn't a goal, it's a coin flip; signing several of the star
  // you lead ~50% of the time is a real recruiting season and a real test of point management.
  var star=Math.min(5, Math.max(2, Math.round(exp)));
  var n=3;
  // The very top programs get asked for the tier above, because they genuinely land it.
  if(starFitMult(star+1, prestige, conf) >= 0.95 && star<5){ star+=1; n=2; }
  return {key:"recruit", star:star, n:n,
          label:(n>1?("Sign "+n+" "+star+"★ recruits"):("Sign a "+star+"★ recruit"))};
}

// How the season ENDED, in record-book shorthand ("W Military Bowl", "L Semifinal",
// "FCS Champion", "—"). Read at season's end while ST.post is still in scope; falls back
// to the season flags if the postseason state was lost (e.g. a page reload).
function seasonPostLabel(){
  var P=ST.post, s=ST.save;
  var FBS_R={r1:"First Round",qf:"Quarterfinal",sf:"Semifinal",champ:"National Championship"};
  var FCS_R={r1:"First Round",r2:"Round of 16",qf:"Quarterfinal",sf:"Semifinal",champ:"National Championship"};
  if(!P || P.mode==="none"){
    if(s._wonNatlThisYear) return "W National Championship";
    if(s._wonConfThisYear) return "—";
    return "—";
  }
  if(P.mode==="bowl"){
    if(!P.done || !P.result) return P.bowlName||"Bowl";
    return (P.result.us>P.result.them?"W ":"L ")+(P.bowlName||"Bowl");
  }
  if(P.mode==="celebration"){
    if(!P.done || !P.result) return "Celebration Bowl";
    return (P.result.us>P.result.them?"W ":"L ")+"Celebration Bowl";
  }
  if(P.mode==="playoff" || P.mode==="fcsPlayoff"){
    var tbl = P.mode==="fcsPlayoff" ? FCS_R : FBS_R;
    var seed = P.mySeed ? (" (#"+P.mySeed+" seed)") : "";
    if(P.champion!=null && P.champion===P.mySeed) return "W National Championship"+seed;
    var r = tbl[P.round] || "Playoff";
    return "L "+r+seed;   // the round you went out in is the round you reached
  }
  return "—";
}
// How far you actually got. "" if you never made a postseason field.
function furthestRoundReached(){
  var P=ST.post, s=ST.save;
  if(!P) return "none";
  if(P.mode==="celebration") return P.done && P.result && P.result.us>P.result.them ? "celebration" : "postseason";
  if(P.mode==="bowl") return "postseason";
  if(P.mode!=="playoff" && P.mode!=="fcsPlayoff") return "none";
  if(P.champion!=null && P.champion===P.mySeed) return "champ";
  // The round you were eliminated in IS the round you reached.
  return P.round || "postseason";
}
function postGoalMet(goal){
  var s=ST.save, P=ST.post;
  if(goal.key==="none") return true;
  if(goal.key==="conf") return !!s._wonConfThisYear;
  if(goal.key==="celebration") return furthestRoundReached()==="celebration";
  var reached=furthestRoundReached();
  if(reached==="none") return false;
  if(reached==="champ") return true;
  if(goal.key==="postseason") return true;   // you made a field at all
  var want=POST_GOAL_ORDER.indexOf(goal.key);
  var got =POST_GOAL_ORDER.indexOf(reached);
  return got>=0 && want>=0 && got>=want;
}
function buildGoalMet(goal){
  var s=ST.save;
  if(goal.key==="recruit"){
    var cls=(typeof committedRecruits==="function") ? committedRecruits() : [];
    var n=cls.filter(function(b){ return b.st>=goal.star; }).length;
    return n>=goal.n;
  }
  if(goal.key==="tophalf"){
    var t=computeConfStandings();
    if(!t.length) return false;
    var idx=-1;
    t.forEach(function(r,i){ if(r.you) idx=i; });
    return idx>=0 && idx < Math.ceil(t.length/2);
  }
  return false;
}
// The full set, evaluated. Used by the banner and the season recap alike.
// ONE SET OF EXPECTATIONS. There used to be two systems doing the same job on the same screen:
// the AD's three prestige-derived goals AND the board pledge — with different win totals and
// different postseason targets, neither referencing the other. The pledge is now the only promise
// in the game; these three checkboxes ARE that promise, so what you agreed to in August is exactly
// what you're judged on in December.
function seasonGoals(){
  var s=ST.save, pl=pledge();
  var games=(s.schedule||[]).length||12;
  var played=(s.wins||0)+(s.losses||0);
  var left=Math.max(0, games-played);
  var need=Math.max(0, pl.w.v-(s.wins||0));
  // Live progress on every goal, so the promise is a scoreboard all year — not a preseason menu
  // you forget about until December.
  var winsDetail = (s.wins||0)>=pl.w.v ? (s.wins||0)+"–"+(s.losses||0)+" ✓"
                 : need>left            ? (s.wins||0)+"–"+(s.losses||0)+" · out of reach"
                 : (s.wins||0)+"–"+(s.losses||0)+" · need "+need+" of "+left;
  var wins={key:"wins", label:pl.w.t, met:((s.wins||0)>=pl.w.v), detail:winsDetail,
            dead:(need>left)};

  var post;
  if(pl.p.v){
    var LAD=["\u2014","a bowl","the playoff","the quarterfinals","the semifinals","the title"];
    var got=pledgeLadder();
    post={key:"post", label:pl.p.t, met:(got >= (PLEDGE_RANK[pl.p.v]||0)),
          detail: got>0 ? "reached "+LAD[got] : (played<games ? "in progress" : "missed")};
  } else {
    post={key:"post", label:"Show clear progress", met:((s.wins||0) > (s._lastWins||0)),
          detail:(s.wins||0)+" vs "+(s._lastWins||0)+" last year"};
  }

  var prog;
  if(pl.g.v){
    var cls=(typeof committedRecruits==="function") ? committedRecruits() : [];
    var got2=cls.filter(function(b){ return b.st>=pl.g.v.star; }).length;
    prog={key:"build", label:pl.g.t, met:buildGoalMet(pl.g.v), goal:pl.g.v,
          detail:got2+" of "+pl.g.v.n+" signed"};
  } else {
    var lost=(s._portalOut||[]).filter(function(d){return d.status!=="retained";}).length;
    prog={key:"build", label:"Keep the roster together", met:(lost<=2), detail:lost+" lost to the portal"};
  }
  return [wins, post, prog];
}
function pledgeGoalLabel(k){
  var fcs=(myDivision()==="FCS");
  return {
    bowl:     "Reach a bowl game",
    playoff:  fcs ? "Make the FCS playoff" : "Make the Playoff (top 12)",
    quarters: "Reach the quarterfinals",
    semis:    "Reach the semifinals",
    title:    "Win the national title"

function personalityGameAdj(game){

  var sum=0, n=0;

function genPlayer(pos, prestige, year){

// Class year for a generated player. Starters skew experienced, depth skews young.

// team older (more seniors → bigger graduating class), <1 makes it younger. That's what
// gives one takeover a veteran roster and the next a young one, on top of per-position
// noise — so gaps differ both across positions AND across teams/years.
function pickYear(isStarter, srMult){
  srMult=srMult||1;
  var r=Math.random();
  if(isStarter){
    var pSR=Math.max(0.10, Math.min(0.70, 0.40*srMult));   // seniors among starters
    var rest=1-pSR;

    if(r<pSR+rest*0.66) return "JR";
    return "SO";                                            // the occasional young starter
  }
  var pSRd=Math.max(0.02, Math.min(0.28, 0.08*srMult));    // a few senior backups
  var rd=1-pSRd;                                            // split the rest JR:SO:FR ~ 18:34:40

function genStarterRoster(prestige, roleArg, targets){

  if(isFCSConf(conf)) p = Math.max(0, p - 2.6);   // FCS recruits ~2.6 tiers below FBS parity
  return p;
}
function weightedStars(prestige, conf){
  var p = recruitTierFor(prestige, (conf!=null?conf:(ST.save&&ST.save.conf)));
  var roll=Math.random()*10 + p*1.4;
  if(roll>13) return 5; if(roll>10) return 4; if(roll>6.5) return 3; if(roll>3) return 2; return 1;
}
function starCost(st){ return [0,4,8,15,26,40][st]; }
// Incoming freshman rating by stars — recruits arrive RAW and develop over their career.
// A 5★ comes in ~74-79 (high ceiling, not a finished product); a 2★ comes in ~58-63.
function recruitOvr(st){
  // Base arrival rating by star, per the recruit-package table (peak comes later via dev trait).
  var R={5:[80,85],4:[74,79],3:[68,73],2:[60,67],1:[50,59]}[Math.max(1,Math.min(5,st))]||[60,67];
  return rnd(R[0],R[1]);
}

// ── Season-long recruiting board (CFB-style) ─────────────
// Generate a board of prospects you pursue across the whole season. Each has an interest level
// in you, a set of rival schools also recruiting them, and commits over time.
function genRecruitBoard(prestige){
  // 25 prospects at every position you recruit — a deep board to sift through with the
  // position + star filters (HC covers all 9 positions → 225; OC 5 → 125; DC 4 → 100).
  var offPos=["QB","RB","WR","TE","OL"];
  var defPos=["DL","LB","CB","S"];
  var positions = (ST.save&&ST.save.role==="DC") ? defPos
                : (ST.save&&ST.save.role==="HC") ? offPos.concat(defPos)
                : offPos;
  var board=[];
  positions.forEach(function(pos){
    var count=25; // prospects per position
    for(var i=0;i<count;i++){
      board.push(makeProspect(pos, prestige));
    }
  });
  dedupeNames(board, rosterNameSet());   // unique across the board and vs. your roster
  board.sort(function(a,b){ return b.st-a.st || b.ovr-a.ovr; });
  return board;
}
// Conference appeal tier (recruits favor power leagues; the strongest most of all).
var CONF_TIER={"SEC":3,"Big Ten":3,"Big 12":2,"ACC":2,"Pac-12":1,"American":1,"Independent":1,"Mountain West":0,"Sun Belt":0,"MAC":0,"C-USA":0,
  // FCS leagues recruit below every FBS conference — tier -1 across the board,
  // with the perennial national powers a shade more attractive.
  "MVFC":0,"Big Sky":0,"CAA":-1,"SoCon":-1,"Southland":-1,"OVC":-1,"Patriot League":-1,
  "Ivy League":-1,"MEAC":-1,"SWAC":-1,"NEC":-1,"Pioneer":-1,"UAC":-1,"FCS Independent":-1};
// ── Program appeal ───────────────────────────────────────
// What a recruit thinks of your program, independent of who he is. Four inputs:
//   prestige  — the program's standing (scaled within its subdivision)
//   momentum  — recent success: how you've done against expectations lately
//   talent    — how good the roster actually is right now (team/unit overall)
//   league    — conference appeal
// Returns roughly 0-100. Used as the base of starting interest and of weekly progression.

// Recent success for the PLAYER: wins over expectation across the last 3 seasons, plus
// titles. A program on a run sells itself; one coming off 3-9 does not.
function playerMomentum(){
  var s=ST.save, h=(s.history||[]).slice(-3);
  if(!h.length) return 0;
  var m=0;
  h.forEach(function(y,i){
    var w=(i+1)/h.length;                       // most recent season weighted heaviest
    m += ((y.wins||0) - (y.expect||7)) * 1.6 * w;
  });
  m += (s.natlTitles||0)*3 + (s.titles||0)*1.2; // rings are the loudest recruiting pitch
  m += Math.min(5, (s.draftHistory||[]).length*0.4); // ...and a pipeline to the league is the next loudest
  return Math.max(-14, Math.min(16, m));
}
// Recent success for a CPU program: how far its rating has drifted above/below the static
// baseline it started from. simLeagueSeason/simLeaguePortal move t.ovr each offseason, so a
// program trending up reads as hot even though we never stored its win history.
function cpuMomentum(name, t){
  if(!t) return 0;
  var base=(TEAM_RATINGS[name]||FCS_TEAM_RATINGS[name]||{}).v;
  if(base==null) base = 44 + (t.p||3)*6;        // same fallback initLeague uses
  return Math.max(-14, Math.min(16, (t.ovr - base) * 1.5));
}
// How good the program is RIGHT NOW. For you, your unit's rating (an OC sells the offense).
// Anchored so ~70 ovr is neutral; elite rosters pull hard, bad ones repel.
function talentPull(ovr){ return Math.max(-12, Math.min(14, (ovr - 70) * 0.85)); }

// The full appeal score for YOUR program.
//
// Talent is read from the SAME source the CPU uses — the league's team rating — otherwise
// the two sides are measured on different scales. myUnitRating() is your side of the ball
// (typically several points off the team number), so using it here while rivals used t.ovr
// handed every CPU blue blood a systematic pull advantage over you. We blend the two: the
// program's overall standing dominates, but a coordinator's own unit still counts for
// something on the trail.
function myTalentOvr(){
  var s=ST.save, L=s.league;
  var team = (L&&L.teams&&L.teams[s.school]) ? L.teams[s.school].ovr : 70;
  var unit = myUnitRating();
  return (s.role==="HC") ? team : Math.round(team*0.6 + unit*0.4);
}
// A floor of goodwill every program enjoys with a recruit who fits it: even a 1-star program
// is somebody's dream school, and without this a p1/tier-0 team's pull collapses to ~4 and it
// loses its OWN tier three times out of four.
var PULL_BASE = 12;
// Prestige is scaled WITHIN a subdivision — an FCS 5 and an FBS 5 are both "the best in their
// world", but they are not equally attractive to a recruit. Feeding raw prestige into the pull
// formula gave North Dakota (FCS p5) more base pull than Iowa State (FBS p3), which is exactly
// how an FCS school ends up leading a 4-star. recruitTierFor() already maps both onto one
// common ladder; use it here so cross-subdivision battles are scored on the same axis.
function pullPrestige(prestige, conf){ return recruitTierFor(prestige, conf); }
function programPull(){
  var s=ST.save;
  var prestigePull = pullPrestige(s.prestige, s.conf) * 5;   // FBS 5→25, FCS 5→12
  var conf = (CONF_TIER[s.conf]||0) * 3.5;                   // -3.5 → +10.5
  return PULL_BASE + prestigePull + conf + playerMomentum() + talentPull(myTalentOvr());
}
// Appeal for a CPU rival, on the same scale, so head-to-head battles are apples-to-apples.
function rivalPull(name, t, prestige){
  var c=(t&&t.c)||"";
  var conf=(CONF_TIER[c]||0)*3.5;
  var ovr=(t&&t.ovr)||(44+(prestige||3)*6);
  return PULL_BASE + pullPrestige(prestige||3, c)*5 + conf + cpuMomentum(name,t) + talentPull(ovr);
}

// How badly a recruit outclasses (or is outclassed by) a program. A 5-star looking at a
// program that lands 2-stars is being asked to step down two full tiers; he is not
// interested, and no amount of prestige-adjacent noise should make him so. Conversely a
// 1-star at a blue blood knows he will never see the field.
//
// Returns a MULTIPLIER on the program's pull. Reaching up is punished far harder than
// reaching down, because talent flows downhill only under duress.
// The star a program TYPICALLY lands. Derived from the same distribution weightedStars()
// samples, so fit is self-consistent with the board by construction rather than a guess:
//   roll = U(0,10) + p*1.4, thresholds at 3 / 6.5 / 10 / 13
function expectedStarFor(prestige, conf){
  var p=recruitTierFor(prestige, conf), e=0;
  // P(roll > t) for each threshold, clamped to [0,1]; mean star = 1 + sum of tail probs
  [3,6.5,10,13].forEach(function(t){
    e += Math.max(0, Math.min(1, (p*1.4 + 10 - t) / 10));
  });
  return 1 + e;
}
// A recruit is "in range" anywhere from the program's typical star up to about one tier
// above it — Alabama's mean recruit is a 4.1, but a 5-star is squarely a target, not a
// reach. Only the gap BEYOND that comfort band is punished, and punished steeply: two full
// tiers above the band and the recruit simply isn't listening.
// The grace band above a program's mean recruit scales with the program. Alabama's board is
// 39% five-stars, so a 5-star is squarely a target and it earns a full band. A program whose
// mean recruit is a 3.06 (an elite FCS school) lands 4-stars rarely, so its band is small and
// a 4-star is already a genuine reach. A flat band handed North Dakota a 0.97 fit on 4-stars.
function starFitMult(st, prestige, conf){
  var exp=expectedStarFor(prestige, conf);
  var band = 0.02 + 0.22 * exp;            // exp 4.10 → 0.92; exp 3.06 → 0.69; exp 2.05 → 0.47
  var reach = st - (exp + band);
  if(reach > 0) return Math.max(0.03, 1 - reach*0.92);
  var below = st - exp;                    // stepping down is only mildly discouraged
  if(below < 0) return Math.max(0.62, 1 + below*0.14);
  return 1;
}

// Choose the schools competing for a recruit, weighted by how plausibly each would land him.
//
// starFitMult() already answers "does this recruit fit this program?" — it is 1.00 for a
// 5-star at Alabama and 0.05 at McNeese. Squaring it sharpens the contrast (400:1) so the
// blue-bloods dominate a blue-chip's list while still leaving room for the occasional
// surprise, and a hard floor drops programs with no business in the conversation at all.
//
// Candidates span BOTH subdivisions on purpose. A 5-star on Montana's board should be
// choosing between Georgia and Texas; the FCS school is the long shot, not the field.
var RIVAL_MIN_FIT = 0.22;   // below this a program simply isn't recruiting him
// starFitMult is deliberately forgiving about stepping DOWN — a recruit will still take a
// call from a program beneath him. For picking who actually COMPETES, that's wrong: Alabama
// does not offer 1-stars, because it has better options. So for rival selection we also
// penalize the program for slumming, symmetrically with how the recruit penalizes reaching.
function rivalOfferWeight(st, t){
  var fit = starFitMult(st, t.p, t.c);              // recruit's view of the program
  if(fit < RIVAL_MIN_FIT) return 0;                 // he isn't listening
  var exp = expectedStarFor(t.p, t.c);
  var below = exp - st;                             // how far the recruit is beneath them
  var offer = (below > 0.5) ? Math.max(0, 1 - (below-0.5)*1.15) : 1;  // program's view of him
  return fit*fit * offer;
}
function rivalCandidates(st, exclude){
  var out=[];
  ALL_TEAMS.forEach(function(t){
    if(t.n===exclude) return;
    var w=rivalOfferWeight(st, t);
    if(w<=0.01) return;
    out.push({t:t, w:w});
  });
  return out;
}
// ── THE RECRUITING CALENDAR ───────────────────────────────
// Blue-chips are not recruited on the same clock as everybody else. A 5-star has been courted
// since he was a sophomore in high school: the offers are already on the table in week one, and
// if you wait he is gone. A 2-star barely draws a look until late in the cycle, which is exactly
// why you can still steal him in the closing weeks.
//   heatWeek = the week the rest of the country starts pushing hard for him.
var RECRUIT_HEAT={5:0, 4:1, 3:3, 2:5, 1:6};
function heatWeekFor(st){ return RECRUIT_HEAT[st]!=null ? RECRUIT_HEAT[st] : 4; }
// How hard the country pushes for him once his recruitment IS live. Blue-chips draw a frenzy.
function heatPushFor(st){ return st>=5 ? rnd(4,7) : st>=4 ? rnd(2,4) : st>=3 ? rnd(0,2) : 0; }
// The head start the field already has on a blue-chip before you've made a single call.
function headStartFor(st){ return st>=5 ? rnd(12,22) : st>=4 ? rnd(5,12) : st>=3 ? rnd(0,4) : 0; }

// Build a single prospect at a given position.
function makeProspect(pos, prestige){
  var s=ST.save;
  var st=weightedStars(prestige, s.conf);
  var dev=rollDevByStars(st);
  var L=s.league;

  // Rivals are the programs that would REALISTICALLY chase this recruit — a 5-star is
  // fielding calls from Alabama, not McNeese. Candidates are drawn from BOTH subdivisions
  // (an FCS program chasing a blue-chip is losing him to an FBS school, not to a peer) and
  // sampled with probability proportional to how plausible they are for his star level.
  var rivals=pickRivalsFor(st, s.school);

  // ── Starting interest ──
  // Base is the program's appeal (prestige + conference + recent success + current talent),
  // scaled by how well the recruit fits the program's level. Coaching perks and facilities
  // add on top, but they are ADDITIVE — they cannot rescue a program a blue-chip has already
  // written off, which is the whole point of the multiplier.
  var pull = programPull();
  var fitM = starFitMult(st, prestige, s.conf);
  var coachBonus = ((hasArch("recruiter")||hasAbility("rec2"))?8:0) + (hasAbility("rec5")?10:0)
    + (hasAbility("leg2")?12:0) + (hasAbility("pro3")?4:0) + staffBonus("interest")
    + facLvl("academics")*3 + facLvl("stadium")*2;
  // A reach recruit discounts the coaching pitch too — a great recruiter at a 1-star program
  // still isn't landing a 5-star cold, he just gets a slightly better hearing.
  var startInterest = Math.max(3, Math.min(70,
    Math.round(pull*0.62*fitM + coachBonus*(0.35+0.65*fitM) + rnd(-5,5))));
  var lo=Math.max(1,st-1), hi=Math.min(5,st+1);
  return {
    id:"r"+Math.random().toString(36).slice(2,8),
    _seed:Math.random(),   // fixed board-order seed: keeps order stable & OVR-blind
    n:genName(), pos:pos, st:st, ovr:recruitOvr(st), dev:dev, arch:rollArch(pos), pers:rollPersonality(),
    // How many visits before you know what kind of man he is. It varies PER RECRUIT, not by
    // personality — some kids you read in one meeting, others keep it back for weeks. So you can't
    // infer "he's taking a while, must be a diva". Scouting tells you how GOOD he is; only contact
    // tells you WHO HE IS.
    persReveal: rnd(2,6),
    interest:startInterest,
    heatWk:heatWeekFor(st),  // the week the country starts pushing hard for him
    fitM:money2(fitM),      // how much this recruit is reaching; drives weekly progression too
    rivals:rivals,
    status:"open",
    committedTo:null,
    scout:0,
    fuzzLo:lo, fuzzHi:hi
  };
}
// How many scout visits fully scout a prospect. Eye for Talent cuts it to 2 — the
// dev trait then shows at the 2nd visit. (The Talent Developer archetype speeds up
// player DEVELOPMENT and roster gem reveals, but doesn't shortcut scouting itself.)
function maxScoutTier(){ return hasAbility("leg2") ? 1 : (hasAbility("dev2") ? 2 : 3); }
// Spend a point to scout a prospect — reveals more of their profile in tiers.
function scoutProspect(id){
  var s=ST.save, b=(s.board||[]).filter(function(x){return x.id===id;})[0];
  if(!b || b.status!=="open"){ return; }
  if(b.scout>=maxScoutTier()){ toast("Fully scouted"); return; }
  // Bird Dog skill: the first scout each week is free
  var freeScout = hasAbility("rec3") && !s._usedFreeScout;
  if(!freeScout && (s.recruitPtsLeft||0)<=0){ toast("No recruiting points left this week"); return; }
  if(freeScout){ s._usedFreeScout=true; } else { s.recruitPtsLeft--; }
  b.scout++;
  if(b.scout===1){ b.fuzzLo=b.st; b.fuzzHi=Math.min(5,b.st+ (Math.random()<0.5?0:1)); }
  persist(); draw();
}
// What the stars display looks like at the current scout tier.
function recruitStarsDisplay(b){
  if(b.scout>=1){ return stars(b.st); }                 // exact stars once scouted
  if(b.fuzzLo===b.fuzzHi){ return stars(b.fuzzLo); }
  return '<span class="fuzzy">'+b.fuzzLo+'-'+b.fuzzHi+'★ <span class="fuzzy-q">?</span></span>'; // fuzzy range
}
// What the OVR display looks like at the current scout tier.
function recruitOvrDisplay(b){
  if(b.scout>=2){ return b.ovr+' OVR'; }                 // exact OVR at tier 2
  if(b.scout>=1){ var lo=Math.max(50,b.ovr-4), hi=Math.min(82,b.ovr+4); return '~'+lo+'-'+hi+' OVR'; } // rough range
  return '<span class="fuzzy-q">OVR ?</span>';           // unknown
}
// Does this recruit fit your scheme? (revealed at scout tier 2+). Compares the position's
// natural scheme lean to your gameplan sliders.
function recruitFit(b){
  var s=ST.save;
  var offPos=["QB","RB","WR","TE","OL"], defPos=["DL","LB","CB","S"];
  var coachOff=(s.role==="OC"||s.role==="HC"), coachDef=(s.role==="DC"||s.role==="HC");
  var onOff=offPos.indexOf(b.pos)>=0, onDef=defPos.indexOf(b.pos)>=0;
  if(!((onOff&&coachOff)||(onDef&&coachDef))) return null; // not a unit you coach
  var sc = onOff ? offScheme() : defScheme();
  var want = sc.wants[b.pos];
  if(!want) return "ok";                                  // your scheme doesn't emphasize this spot
  return want.indexOf(b.arch)>=0 ? "great" : "poor";       // right archetype for the system?
}
// Quick read on a recruiting battle → the status chip on each open prospect card.
function battleStatus(you, rival){
  if(you>=70 && you>=rival+8) return {cls:"ready", label:"★ Locking in"};
  if(you>=rival+5) return {cls:"lead", label:"▲ Leading"};
  if(rival>=you+5) return {cls:"behind", label:"▼ Behind"};
  return {cls:"contested", label:"● Contested"};
}
// The development trait, rendered as a CHIP. It used to carry its own .rec-trait border, and
// wrapping that in a .chip drew a second border around it — a pill inside a pill.
function devChip(dev){
  var D={
    elite:["⭐ Elite","Elite development. He improves faster than anyone on your roster and will likely blow past his current rating \u2014 the most valuable thing a player can have."],
    pro:  ["🔥 Pro","Pro development. He grows quickly year over year \u2014 a good bet to outgrow the player you signed."],
    slow: ["🐢 Slow","Slow development. He'll improve, but grindingly. What you see is close to what you get."],
    bust: ["⚠ Bust","Bust. He may never develop at all, whatever his rating says today."],
    standard:["Steady","Standard development. He improves at a normal rate \u2014 no surprises either way."]
  };
  var d=D[dev]||D.standard;
  var cls = dev==="elite"?"dev-elite" : dev==="pro"?"dev-pro" : (dev==="slow"||dev==="bust")?"dev-slow" : "";
  return '<span class="chip '+cls+'"'+infoAttr(d[0], d[1])+'>'+d[0]+'</span>';
}
// Points you get to spend each week on recruiting
function weeklyRecruitPoints(){
  var s=ST.save;
  return 8 + s.prestige*2 + (s.role==="HC"?10:0) + (hasAbility("rec1")?3:0) + (hasAbility("rec4")?2:0) + (hasAbility("leg2")?3:0) + facLvl("nil")
       + staffBonus("recPts"); // ...plus whatever your recruiting coordinator adds
}
// Spend a point of recruiting effort on a prospect this week (raises your interest).
var MAX_WEEKLY_RECRUIT=3; // most "+ Recruit" pushes you can make on one prospect in a single week
// Points granted during the preseason, for scouting and opening relationships. Spent or not,
// they end at kickoff: week 1 gets its own weekly allowance.
var PRESEASON_RECRUIT_POINTS=34;
function recruitProspect(id){
  var s=ST.save, b=(s.board||[]).filter(function(x){return x.id===id;})[0];
  if(!b || b.status!=="open"){ return; }
  if((b.wkRec||0)>=MAX_WEEKLY_RECRUIT){ toast("Max "+MAX_WEEKLY_RECRUIT+" pushes on "+x(b.n)+" this week — come back next week"); return; }
  if((s.recruitPtsLeft||0)<=0){ toast("No recruiting points left this week"); return; }
  s.recruitPtsLeft--;
  b.wkRec=(b.wkRec||0)+1;
  var _knewHim=persKnown(b);
  b.myPush=(b.myPush||0)+1;   // how hard YOU chased him — this is what makes him "the one who got away"
  if(!_knewHim && persKnown(b)){
    // You've spent enough time with him to read him.
    if(hasPersonality(b)){
      var _pi=persInfo(b.pers);
      toast("👁️ You've got a read on "+x(b.n)+" — "+_pi.ico+" "+_pi.t);
    } else {
      toast("👁️ You've got a read on "+x(b.n)+" — no flags either way.");
    }
  }
  // Each point adds interest, with diminishing returns as it gets high; a 5★ is harder to sway.
  // Tuned so closing a recruit takes ~7-9 clicks at a program he actually fits.
  //
  // fitM scales the whole gain: chasing a recruit two tiers above your program is a grind
  // (0.06x), not merely slower. This is what stops an FCS coach from simply clicking a
  // blue-chip to 100 — he can lead early and still lose the battle to a rival who fits.
  var fitM = (b.fitM!=null) ? b.fitM : starFitMult(b.st, s.prestige, s.conf);
  var base = 8 - Math.floor(b.st*0.7) - Math.floor(b.interest/22);
  var gain = Math.max(1, Math.round(Math.max(3, base) * (0.30 + 0.70*fitM)));
  // WHO HE IS decides what actually moves him. Points are relationship-building — face time,
  // film, a coach who believes in him. Some kids are bought; some are coached.
  gain *= persRecruitMult(b, "points");
  gain = Math.max(1, Math.round(gain));
  b.interest = Math.min(100, b.interest + gain);
  if(b.interest>=100){ b.status="committed"; b.committedTo=s.school; toast("🎉 "+x(b.n)+" committed to you!"); }
  persist(); draw();
}
// Add/remove a prospect from your watchlist (the ⭐ Watch filter). Free — costs no points.
function toggleWatch(id){
  var s=ST.save, b=(s.board||[]).filter(function(x){return x.id===id;})[0];
  if(!b || b.status!=="open"){ return; }
  b.watch=!b.watch;
  toast(b.watch ? ("⭐ "+x(b.n)+" added to watchlist") : (x(b.n)+" removed from watchlist"));
  persist(); draw();
}
// Advance recruiting one week: rivals push their prospects, and prospects may commit.
// ── A recruit you LOSE doesn't vanish — he enrolls ────────
// He signs somewhere real, puts on weight, plays, develops, and shows up on that team's roster
// for the rest of his career. Which means two or three years from now he can walk into the
// transfer portal, and you get a second bite at the one who got away.
function enrollRecruitAt(b, teamName){
  var L=ST.save.league; if(!L||!L.teams) return;
  var t=L.teams[teamName]; if(!t) return;
  t.stars=t.stars||[];
  if(t.stars.length>=15) return;                 // keep a team's roster bounded
  // Only players worth remembering. NOTE: baseline interest can start as high as 70 for a good
  // fit, so "he had interest" means nothing — what counts is whether YOU actually worked him:
  // recruiting points spent, or real NIL pledged.
  var iWasInIt = (b.myPush||0) >= 3 || (b.nil||0) > 0;
  if(b.st < 5 && !iWasInIt) return;        // 5-stars are always worth tracking; the rest only if you chased them
  t.stars.push({
    n:b.n, pos:b.pos, yr:"FR",
    ovr: Math.max(48, Math.min(99, b.ovr||65)),
    s:{}, c:{}, form:0.84+Math.random()*0.32,
    fromHS:true,                                 // a real recruiting-class signee, not a generated star
    wasTarget:iWasInIt,                          // YOU chased this kid out of high school
    hsStars:b.st
  });
}
function advanceRecruitingWeek(){
  var s=ST.save; if(!s.board) return;
  s.board.forEach(function(b){
    if(b.status!=="open") return;
    b.wkRec=0; // reset this player's weekly recruiting-push allowance
    // Rivals push on the CALENDAR. Before a prospect's recruitment goes live the country is
    // barely looking at him — which is what gives you a quiet window to work a 2-star. A
    // 5-star has no such window: the phones are ringing from week one.
    var live = (s.week||0) >= (b.heatWk!=null ? b.heatWk : heatWeekFor(b.st));
    b.rivals.forEach(function(rv){
      var push;
      if(!live){
        push = (Math.random()<0.35) ? 1 : 0;             // the odd early sniff, nothing more
      } else {
        push = Math.max(1, Math.round(rv.p*1.0) + rnd(0,2));
        push += heatPushFor(b.st);                        // blue-chips draw a frenzy
        if(b.dev==="elite"||b.dev==="pro") push += rnd(2,4); // a high ceiling gets him poached fast
      }
      // How hard he is to flip. A LOYAL kid who likes you barely hears the other phones; a
      // TOXIC one takes the last call he gets, right up to signing day.
      push *= persRecruitMult(b, "hold");
      // ...and loyalty only kicks in once he actually likes you. Leading matters.
      if(b.pers==="loyal" && b.interest >= 55) push *= 0.55;
      push = Math.max(0, Math.round(push));
      rv.interest = Math.min(100, rv.interest + push);
    });
    // He can't commit before anybody has actually offered him.
    if(!live) return;
    // COMMITMENT: the leader gets more likely to land the recruit as interest climbs toward 100
    var topRival = b.rivals.reduce(function(m,rv){ return (!m||rv.interest>m.interest)?rv:m; }, null);
    var rivalLead = topRival ? topRival.interest : 0;
    var youLead = b.interest >= rivalLead;
    var leaderInt = Math.max(b.interest, rivalLead);
    var margin = Math.abs(b.interest - rivalLead);
    var commitToLeader=function(){
      if(youLead){ b.status="committed"; b.committedTo=s.school; }
      else {
        b.status="lost"; b.committedTo=topRival.name;
        enrollRecruitAt(b, topRival.name);   // he's real now — and he'll remember you
        // he signed elsewhere — the NIL you pledged him never gets paid, so it returns to the pot
        if(b.nil>0){ s.nilLeft=money2((s.nilLeft||0)+b.nil); toast("↩️ "+fmtMoney(b.nil)+" NIL freed up — "+x(b.n)+" chose "+x(topRival.name)); }
      }
    };
    if(leaderInt>=100){ commitToLeader(); } // maxed interest → instant commit
    else if(leaderInt>=66){
      var base=(leaderInt-64)/36;                        // 0 at 64 → ~1 near 100
      var marg=Math.max(0.2, Math.min(1,(margin+3)/14)); // a clear lead lands them; a dead heat lingers
      var p=Math.max(0, Math.min(0.95, base*marg));      // weekly commit chance
      if(Math.random()<p) commitToLeader();
    }
  });
  // refresh weekly points
  s.recruitPtsLeft = weeklyRecruitPoints(); s._usedFreeScout=false;
  persist();
}
function committedRecruits(){ return (ST.save.board||[]).filter(function(b){return b.status==="committed";}); }
function budgetFor(prestige, role){
  var b = 30 + prestige*14;          // prestige scales budget
  if(role==="OC"||role==="DC") b = Math.round(b*0.62); // coordinators control one unit => smaller pot
  return b;
}
function genSchedule(team){
  // FBS: 12 games = ~3 non-conference + 9 conference.
  // FCS: 11 games = ~3 non-conference + 8 conference — and one of those non-con slots
  //      is usually a "money game": a road trip to an FBS program for a fat paycheck.
  var div = teamDivision(team.c);
  var isFCS = (div==="FCS");
  var indep = isIndependentConf(team.c);
  var total = isFCS ? 11 : 12;
  var myDivPool = divTeams(div).filter(function(t){return t.n!==team.n;});
  // Independents have no league, so no opponent is ever "in conference" — every game
  // is a non-conference game and every game stays editable.
  var conf = indep ? [] : myDivPool.filter(function(t){return t.c===team.c;});
  var others = indep ? myDivPool : myDivPool.filter(function(t){return t.c!==team.c;});
  var games=[]; var used={};
  function add(list,n,isConf,flags){
    var avail=list.filter(function(t){return !used[t.n];});
    var c=0;
    while(c<n && avail.length){
      var idx=Math.floor(Math.random()*avail.length);
      var t=avail.splice(idx,1)[0];
      used[t.n]=1;
      var g={opp:t.n, oc:t.c, op:t.p, home:Math.random()<0.55, conf:isConf};
      if(flags) for(var k in flags) g[k]=flags[k];
      games.push(g);
      c++;
    }
  }
  // ── Rivalry games come first: you ALWAYS play your rivals. ──
  // A conference rival is just a conference game. A rival outside your league costs one
  // of your non-conference slots — exactly the trade real programs make to protect a
  // rivalry. Rivals are added before anything random so they can never get crowded out.
  // (Independents like Notre Dame have no league at all — rivalries ARE their season.)
  var myRivals = rivalsOf(team.n);
  function addRival(t,isConf){
    if(!t || used[t.n]) return false;
    used[t.n]=1;
    games.push({opp:t.n, oc:t.c, op:t.p, home:Math.random()<0.5, conf:isConf, rivalry:true});
    return true;
  }
  // ── Rivalry Week: the headline rivalry closes the regular season. ──
  // Swap the primary rival's game into the final slot so the year builds to it.
  function rivalryWeek(gs){
    var head = myRivals.length ? myRivals[0] : null;
    if(!head) return gs;
    var hi=-1;
    gs.forEach(function(g,i){ if(g.opp===head) hi=i; });
    if(hi<0 || hi===gs.length-1) return gs;
    if(gs[gs.length-1].moneyGame) return gs;
    // SPLICE and append — do NOT swap. Swapping dragged whatever was in the final week back into
    // the rival's old slot, so a school whose marquee rival is out-of-conference (South Carolina
    // → Clemson) got a CONFERENCE game dropped into week 1. Lifting him out and pushing him to
    // the end shifts everything else up and keeps the non-con block intact at the front.
    var rg=gs.splice(hi,1)[0];
    gs.push(rg);
    return gs;
  }
  // An independent builds its whole slate from scratch — rivals first, then editable
  // non-conference games. No money game is forced on them either; they're free to
  // schedule up or down however they like.
  if(indep){
    others.forEach(function(t){
      if(myRivals.indexOf(t.n)>=0 && games.length<total) addRival(t,false);
    });
    add(others,total-games.length,false);
    return rivalryWeek(games.slice(0,total));
  }
  // ── SLOT ORDER MATTERS ────────────────────────────────
  // Non-conference games open the season (weeks 1-3, editable); conference play follows.
  // Bug this fixes: in-conference rivals used to be pushed onto `games` BEFORE the
  // non-conference fill, so a team with two league rivals (Bowling Green: Toledo, Kent State)
  // had them land in weeks 1-2 and its non-con slid to weeks 3-5. Build the two blocks
  // separately, then concatenate, and the ordering can't drift again.
  var nonConf=[], confG=[];
  function push(arr,t,isConf,flags){
    if(!t || used[t.n]) return false;
    used[t.n]=1;
    var g={opp:t.n, oc:t.c, op:t.p, home:Math.random()<0.55, conf:isConf};
    if(flags) for(var k in flags) g[k]=flags[k];
    arr.push(g);
    return true;
  }
  function fill(arr,list,n,isConf){
    var avail=list.filter(function(t){return !used[t.n];});
    var c=0;
    while(c<n && avail.length){
      var t=avail.splice(Math.floor(Math.random()*avail.length),1)[0];
      push(arr,t,isConf);
      c++;
    }
  }
  // How many non-conference games do we actually need? A small league (Pac-12 remnant, SoCon,
  // Patriot, Ivy...) simply can't supply a full conference slate, so those teams play MORE than
  // three non-con. Work that out UP FRONT so the extras open the season with the others, instead
  // of being backfilled onto the end of the year.
  var confCapacity = conf.length;                          // each league opponent, once
  var confGoal = Math.max(0, Math.min(total-3, confCapacity));
  var nonConfSlots = total - confGoal;                     // usually 3; more for a short league
  if(isFCS){
    // Money game: always on the road at a real FBS school. Big payday, long odds.
    var fbsPool = FBS_TEAMS.filter(function(t){ return t.p>=2; });
    var mg = fbsPool[Math.floor(Math.random()*fbsPool.length)];
    used[mg.n]=1;
    nonConf.push({opp:mg.n, oc:mg.c, op:mg.p, home:false, conf:false, moneyGame:true, div:"FBS"});
    nonConfSlots -= 1;   // the money game spends one of them
  }
  // Out-of-conference rivals spend a non-conference slot, in PRIORITY order — the marquee
  // rivalry is protected first, and a program with more rivals than slots drops only its lesser ones.
  myRivals.forEach(function(rn){
    if(nonConfSlots<=0) return;
    var t=others.filter(function(o){return o.n===rn;})[0];
    if(t && push(nonConf,t,false,{rivalry:true})) nonConfSlots--;
  });
  fill(nonConf, others, nonConfSlots, false);          // the rest of the non-conference slate

  // Conference block: league rivals first (so they're never crowded out), then the rest.
  conf.forEach(function(t){
    if(myRivals.indexOf(t.n)>=0) push(confG,t,true,{rivalry:true});
  });
  fill(confG, conf, total-nonConf.length-confG.length, true);

  var games = nonConf.concat(confG);
  // Safety net: if anything still came up short, top up with non-conference games.
  if(games.length<total) fill(games, others, total-games.length, false);
  return rivalryWeek(games.slice(0,total));
}

// ── Ratings & sim ────────────────────────────────────────
// Players at a position in DEPTH-CHART order. If the user has set a manual order
// (depthRank), that wins; otherwise fall back to overall rating. This lets you start
// a promising young player over a higher-rated veteran.
// ═════════════════════════════════════════════════════════
// REDSHIRTS — current NCAA rules (the 2018 four-game rule, as amended in 2024):
//   • Five years to play four: ONE redshirt season per career.
//   • A player may appear in up to FOUR REGULAR-SEASON games and still keep the year.
//   • POSTSEASON games (conference title, bowl, CFP, FCS playoff) do NOT count at all.
//   • Anyone eligible who stays under the limit keeps the year — deep reserves who never
//     see the field redshirt naturally, exactly as they do in real programs.
// Holding a starter out costs you his snaps NOW to buy an extra year of him LATER. You can
// also pull the redshirt off for a four-game cameo and still preserve the season.
// ═════════════════════════════════════════════════════════
var RS_GAME_LIMIT=4;
function rsAvailable(p){ return !p.rsUsed && p.yr!=="SR"; }   // still OWNS a redshirt
// Can he still redshirt THIS season? Owning a redshirt isn't enough — once he's past the
// four-game cap the year is already gone, so holding him out buys nothing. He isn't
// "redshirting" at that point, he's just benched for free. (canRedshirt is defined after
// rsSafe below; both are function declarations, so the hoisting is safe.)
function canRedshirt(p){ return rsAvailable(p) && rsSafe(p); }
function isRedshirting(p){ return !!p.hold && canRedshirt(p); }
// Games played = games he actually APPEARED IN. The two-deep is only an approximation: the
// sim hands the ball to third-stringers too, and one of them rushed for 308 yards while his
// counter still read 0. So a game in the box score always counts as a game played — if a
// player has stats, he was on the field, full stop.
function gamesPlayed(p){
  var boxG = (p.stats && p.stats.season && p.stats.season.g) || 0;
  return Math.max(p.gp||0, boxG);
}
function rsSafe(p){ return gamesPlayed(p)<=RS_GAME_LIMIT; }   // still under the four-game cap
// A player's class designation. A redshirt year doesn't count against eligibility, so once he
// has taken his one redshirt he carries the RS- prefix for the rest of his career:
//   Fr → (redshirts) → RS-Fr → RS-So → RS-Jr → RS-Sr
// One redshirt per player, ever — rsUsed is set the moment he takes it and never cleared.
var YR_PRETTY={FR:"Fr", SO:"So", JR:"Jr", SR:"Sr"};
function yrLabel(p){
  var y=YR_PRETTY[p.yr]||p.yr;
  return (p.rs ? "RS-" : "") + y;
}
// Hold a player out (or send him back onto the field).
function toggleHold(id){
  var s=ST.save, p=(s.roster||[]).filter(function(r){return r.id===id;})[0];
  if(!p) return;
  if(!rsAvailable(p)){ toast("⚠️ "+p.n+" has no redshirt left to use."); return; }
  // Past the four-game cap the year is already burned — holding him out now preserves nothing.
  if(!p.hold && !rsSafe(p)){
    toast("⚠️ "+p.n+" has already played "+gamesPlayed(p)+" games — his redshirt is burned for this season.");
    return;
  }
  if(p.hold){
    p.hold=false;
    toast(rsSafe(p) ? ("▶️ "+p.n+" is active — "+gamesPlayed(p)+"/"+RS_GAME_LIMIT+" games used, redshirt still safe.")
                    : ("▶️ "+p.n+" is active. His redshirt is already burned."));
  } else {
    p.hold=true;
    toast("🔴 "+p.n+" is redshirting — held out to preserve the year.");
  }
  persist(); draw();
}
// Who actually takes the field: the two-deep at every position. Redshirts held out don't.
function markAppearances(){
  var s=ST.save;
  var gt=!!(ST.live && ST.live.backupsUsed);   // did the bench play meaningful snaps this game?
  ALL_POS.forEach(function(pos){
    // If you emptied the bench, the men who played are the ones BEHIND the starters — they get the
    // games (and burn any redshirt), and the starters who sat do not.
    if(gt){
      var all=depthOrder(s.roster,pos);
      all.slice(startersAt(pos), rotationAt(pos)+2).forEach(function(p){
        p.gp=(p.gp||0)+1;
        p.reps=(p.reps||0)+1;                  // real snaps — this is what drives a breakout
        if(rsAvailable(p) && p.gp===RS_GAME_LIMIT)
          toast("⚠️ "+p.n+" has hit "+RS_GAME_LIMIT+" games — one more burns his redshirt.");
      });
      return;
    }
    // QB is the exception: only ONE quarterback is on the field at a time, so a backup can go a
    // whole year without a snap. He is credited a game only if he actually shows up in the box
    // score (gamesPlayed reads that), never merely for being in the rotation.
    if(pos==="QB") return;
    depthOrder(s.roster,pos).slice(0, rotationAt(pos)).forEach(function(p){
      p.gp=(p.gp||0)+1;
      // warn the moment a redshirt is one game from burning the year
      if(rsAvailable(p) && p.gp===RS_GAME_LIMIT)
        toast("⚠️ "+p.n+" has hit "+RS_GAME_LIMIT+" games — one more burns his redshirt.");
    });
  });
}
// Season's end: anyone eligible who stayed under the four-game cap keeps the year.
function resolveRedshirts(){
  var s=ST.save, took=[];
  (s.roster||[]).forEach(function(p){
    if(p.cut || p._declared) return;      // cut or off to the draft — nothing to preserve
    if(!rsAvailable(p)) return;
    if(!rsSafe(p)) return;                // played too many games; the year is burned
    p.rsUsed=true; p.rs=true; p._rsHold=true;  // _rsHold: skip his class-year bump below
    p.hold=false;                          // the designation has done its job
    took.push(p.n);
  });
  if(took.length) toast("🔴 "+took.length+" player"+(took.length===1?"":"s")+" redshirted this season.");
}
function depthOrder(roster, pos){
  // A redshirt being held out is not in the two-deep and does not play, so he is invisible
  // to the depth chart, the ratings, and the sim — that's the cost of preserving his year.
  return roster.filter(function(p){return p.pos===pos && !isRedshirting(p);}).sort(function(a,b){
    var da=(a.depthRank==null?999:a.depthRank), db=(b.depthRank==null?999:b.depthRank);
    if(da!==db) return da-db;         // manual order first
    return b.ovr-a.ovr;               // then by rating
  });
}
// Effective rating at a position = the average of its STARTERS (per the depth chart),
// nudged slightly by the quality of the next player (depth). Thin positions are a liability.
function posDepthOvr(roster, pos){
  var atPos=depthOrder(roster, pos);
  if(!atPos.length) return 58;
  var need=startersAt(pos);
  var starters=atPos.slice(0, need);
  // if not enough bodies to fill the starting slots, the empty slots count as weak (55)
  var sum=0;
  for(var i=0;i<need;i++){ sum += starters[i]?starters[i].ovr:55; }
  var starterAvg=sum/need;
  var backup=atPos[need]?atPos[need].ovr:Math.max(50,starterAvg-16); // depth behind the starters
  return starterAvg*0.9 + backup*0.1;
}
function offenseRating(){
  var r=ST.save.roster;
  var tot=0,wsum=0;
  Object.keys(POS_WEIGHT).forEach(function(pos){ var w=POS_WEIGHT[pos]; tot+=posDepthOvr(r,pos)*w; wsum+=w; });
  var abil = (hasAbility("off1")?2:0) + (hasAbility("off3")?3:0) + (hasAbility("off4")?3:0) + (hasAbility("leg1")?3:0) + (hasAbility("leg3")?2:0); // Play Caller + Air Raid + Mastermind + Legend
  abil += staffBonus("off");   // ...and your OC's on top. A Play Caller with an elite OC is +5.
  return Math.round(tot/wsum) + abil;
}
// Defense rating from your recruited defensive players (DC's unit)
function defenseRating(){
  var r=ST.save.roster;
  var tot=0,wsum=0;
  Object.keys(DEF_POS_WEIGHT).forEach(function(pos){ var w=DEF_POS_WEIGHT[pos]; tot+=posDepthOvr(r,pos)*w; wsum+=w; });
  var abil = (hasAbility("def1")?2:0) + (hasAbility("def3")?3:0) + (hasAbility("def4")?3:0) + (hasAbility("leg1")?3:0) + (hasAbility("leg3")?2:0); // Coordinator + Lockdown + Mastermind + Legend
  abil += staffBonus("def");   // ...stacked with your DC
  return Math.round(tot/wsum) + abil;
}
// The rating of the unit YOU coach (offense if OC, defense if DC; HC = team avg)
function myUnitRating(){
  if(ST.save.role==="DC")return defenseRating();
  if(ST.save.role==="HC")return Math.round((offenseRating()+defenseRating())/2);
  return offenseRating();
}
function cpuDefenseRating(oppPrestige){ return 58 + oppPrestige*6 + rnd(-4,4); }
// The unit the CPU runs at your school (defense if you're OC, offense if you're DC), scales with prestige
// The rating of the unit you DON'T coach. It has to come from the same place the
// opponent's rating does — the league table, seeded from TEAM_RATINGS and drifting
// with results. The old `56 + prestige*6` was a crude stand-in that ran ~12 points
// light for a prestige-1 program and ~9 light for a prestige-2 one, so an OC at
// Wake Forest fielded a fictional 68 defense instead of its real 80.
// `side` is "off" or "def".
function cpuUnitRating(side){
  var s=ST.save;
  var t=leagueTeam(s.school);
  if(t){ var v=(side==="def")?t.def:t.off; if(v!=null) return v; }
  var r=TEAM_RATINGS[s.school];
  if(r) return (side==="def")?r.d:r.o;

// ── Gameplan sliders (standing scheme identity, set once) ─────────────
// offBalance: 0 = all pass, 100 = all run.   defBalance: 0 = all coverage, 100 = all blitz.
function getGameplan(){

}
// ── Named schemes (Phase 2) ─────────────────────────────
// Each system has a Pass/Run (or Coverage/Blitz) lean and a set of archetype "wants" at
// key positions. Your scheme-fit bonus rewards STARTERS whose archetype matches the system.
var OFF_SCHEMES=[
  {id:"airraid",  name:"Air Raid",      lean:22, desc:"Spread wide and sling it — tempo and vertical shots.",
   wants:{QB:["Pocket Passer"], WR:["Vertical Threat","Slot"], TE:["Receiving TE"], OL:["Pass Protector"]}},
  {id:"westcoast",name:"West Coast",    lean:40, desc:"Timing throws, short and quick, yards after the catch.",

  {id:"spread",   name:"Spread Option", lean:47, desc:"RPOs and QB runs put every defender in conflict.",
   wants:{QB:["Dual-Threat"], RB:["Elusive"], WR:["Slot","Vertical Threat"], OL:["Run Blocker"]}},
  {id:"prostyle", name:"Pro-Style",     lean:53, desc:"Balanced and physical, multiple looks.",
   wants:{QB:["Pocket Passer"], RB:["Power Back","Receiving Back"], WR:["Possession"], TE:["Receiving TE"]}},
  {id:"pound",    name:"Ground & Pound",lean:76, desc:"Line up and run it down their throats.",

];

  {id:"nickel",   name:"Nickel",          lean:32, desc:"Extra DB on the field — built to smother the pass.",
   wants:{DL:["Pass Rusher"], LB:["Coverage LB"], CB:["Press-Man CB"], S:["Ball-Hawk"]}},
  {id:"zone",     name:"Bend-Don't-Break",lean:37, desc:"Zone coverage, gang tackle, force field goals.",
   wants:{DL:["Run Stuffer"], LB:["Coverage LB"], CB:["Zone CB"], S:["Ball-Hawk"]}},
  {id:"base43",   name:"4-3 Base",        lean:50, desc:"Sound, gap-disciplined front seven.",
   wants:{DL:["Run Stuffer"], LB:["Thumper"], S:["Box Safety"]}},
  {id:"multiple34",name:"3-4 Multiple",   lean:58, desc:"Disguise pressure out of a two-gap front.",
   wants:{DL:["Pass Rusher"], LB:["Blitzer","Coverage LB"], CB:["Zone CB"]}},
  {id:"blitz",    name:"Blitz-Heavy",     lean:76, desc:"Bring the house and live on the edge.",
   wants:{DL:["Pass Rusher"], LB:["Blitzer"], CB:["Press-Man CB"], S:["Box Safety"]}}
];
function offScheme(){ var id=ST.save&&ST.save.offScheme; return OFF_SCHEMES.filter(function(x){return x.id===id;})[0]||OFF_SCHEMES[3]; }
function defScheme(){ var id=ST.save&&ST.save.defScheme; return DEF_SCHEMES.filter(function(x){return x.id===id;})[0]||DEF_SCHEMES[2]; }
// Fraction (0..1) of a scheme's key STARTERS whose archetype matches what it wants.
function schemeArchMatch(scheme){
  var s=ST.save, matched=0, total=0;
  Object.keys(scheme.wants).forEach(function(pos){
    var want=scheme.wants[pos];
    depthOrder(s.roster,pos).slice(0, startersAt(pos)).forEach(function(p){
      total++; if(want.indexOf(p.arch)>=0) matched++;
    });
  });
  return total? matched/total : 0;
}
// Which scheme in a list best fits your current roster (for the "best fit" hint).
function bestScheme(side){
  var list=side==="off"?OFF_SCHEMES:DEF_SCHEMES;
  var ideal=side==="off"?idealOffBalance():idealDefBalance();
  var best=list[0], bestScore=-1;
  list.forEach(function(sc){
    var tend=Math.max(0,1-Math.abs(sc.lean-ideal)/55);
    var sco=schemeArchMatch(sc)*0.6 + tend*0.4;
    if(sco>bestScore){ bestScore=sco; best=sc; }
  });
  return best;
}
function setScheme(side, id){
  var s=ST.save; if(!s) return;
  if(side==="off"){ s.offScheme=id; s.gameplan.offBalance=offScheme().lean; }
  else { s.defScheme=id; s.gameplan.defBalance=defScheme().lean; }
  persist(); draw();
}
// best OVR at a position group
function bestAt(positions){
  var r=ST.save.roster, best={};
  r.forEach(function(p){ if(positions.indexOf(p.pos)>=0){ if(!best[p.pos]||p.ovr>best[p.pos])best[p.pos]=p.ovr; } });
  var vals=positions.map(function(p){return best[p]||60;});
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
// Offensive scheme fit → the same 0..cap bonus the sim expects, now driven by how well
// your starters' archetypes fit your system, plus whether the system suits your roster.
function offSchemeFit(){
  var sc=offScheme();
  var tendency=Math.max(0, 1 - Math.abs(sc.lean - idealOffBalance())/55); // does the system suit your talent?
  var archScore=schemeArchMatch(sc);                                      // do your starters fit the system?
  var fit01=archScore*0.6 + tendency*0.4;
  var cap = hasAbility("off5")?11:((hasArch("offensive")||hasAbility("off2"))?8:5); // Peak Offense > Scheme Guru/Offensive Mind
  cap += staffBonus("offFit");   // a top OC raises the ceiling further
  return Math.round(fit01*cap*10)/10;
}
function defSchemeFit(){
  var sc=defScheme();
  var tendency=Math.max(0, 1 - Math.abs(sc.lean - idealDefBalance())/55);
  var archScore=schemeArchMatch(sc);
  var fit01=archScore*0.6 + tendency*0.4;
  var cap = hasAbility("def5")?11:((hasArch("defensive")||hasAbility("def2"))?8:5); // Peak Defense > Disguise/Defensive Mind
  cap += staffBonus("defFit");
  return Math.round(fit01*cap*10)/10;
}
function idealDefBalance(){
  var blitzStrength=(bestAt(["DL"])*1.3 + bestAt(["LB"]))/2.3;
  var coverStrength=(bestAt(["CB"])*1.2 + bestAt(["S"]))/2.2;
  return Math.max(0,Math.min(100, Math.round(50 + (blitzStrength-coverStrength)*2.2)));
}

// In-season development: players make small gains during the year (younger + gems grow faster).
// Development also gradually "reveals" a player's hidden dev trait.
function developInSeason(){
  var s=ST.save; if(!s||!s.roster)return;
  var dev2 = hasArch("developer") || hasAbility("dev1"); // faster growth (archetype or Teacher skill)
  var revealFast = hasArch("developer") || hasAbility("dev2"); // Eye for Talent reveals sooner
  s.roster.forEach(function(p){
    var pot = Math.max(p.pot!=null?p.pot:99, p.ovr); // never below current (safety for old saves)
    var head = pot - p.ovr;
    if(head>0){
      // chance of a bump each week, weighted by youth; gems develop ~2x, busts ~half
      var youthBoost = p.yr==="FR"?0.30:(p.yr==="SO"?0.22:(p.yr==="JR"?0.14:0.08));
      if(dev2) youthBoost += 0.12; // developer grows players faster
      if(hasAbility("dev4")) youthBoost += 0.10; // Master Motivator: faster still
      if(facLvl("training")>0) youthBoost += 0.04*facLvl("training"); // Training Facilities
      youthBoost += staffBonus("dev"); // ...and your Director of Player Development, stacked on top
      // Who he is decides how much of your coaching actually lands.
      if(p.pers==="gymrat")    youthBoost += 0.14;
      if(p.pers==="coachable") youthBoost += 0.10 + staffBonus("dev")*0.8 + (dev2?0.05:0); // he gets MORE out of good coaching
      if(p.pers==="problem")   youthBoost -= 0.08;
      if(p.pers==="diva")      youthBoost -= 0.04;
      youthBoost += leadershipMod();   // the room he practises in every day
      var dmult = devMult(p.dev); // Elite 1.8 → Bust 0.5
      var nearCap = Math.min(1, head/6); // taper the final points so nobody snaps to their ceiling
      // TUNING: SOFT per-season growth limit. A hard cap made ~93% of blue-chip freshmen land on
      // the exact same number — flat and lifeless. Instead, once a player has already grown a few
      // points THIS season (tracked vs ssOvr, his kickoff rating), each further bump gets steeply
      // less likely. This keeps a natural spread (some freshmen pop, most rise moderately, a few
      // stall) while still pulling in the extreme +9/+10 seasons that made the arc front-loaded.
      var SOFT = (p.yr==="FR"||p.yr==="SO") ? 4 : 3;   // point past which growth slows hard
      var grownThisYear = p.ovr - (p.ssOvr!=null?p.ssOvr:p.ovr);
      var softMult = grownThisYear < SOFT ? 1 : Math.pow(0.45, grownThisYear-SOFT+1); // 1, .45, .20, .09 ...
      if(Math.random() < youthBoost*dmult*nearCap*softMult){
        var gain = 1;
        if(dev2) gain += 1;
        if(hasAbility("dev4")) gain += 1;
        p.ovr=Math.min(pot, p.ovr+gain);
      }
    }
    // breakout: a small weekly chance to jump up a dev tier — much higher for players who start a lot
    if(p.dev!=="elite"){
      // Reps are what make a player. A starter breaks out ~4x as often — and a backup who gets real
      // snaps in a blowout is, for that week, a starter. This is the whole payoff for emptying the
      // bench: he isn't just running out the clock, he's developing.
      var starting=isStarterPlayer(p) || (p.reps||0)>0;
      var upC=(starting?0.008:0.002) + (facLvl("training")>0?0.0015:0); // starters break out ~4x as often
      if(p.yr==="FR"||p.yr==="SO") upC*=1.3; // young players have more runway to pop
      // ── PRODUCTION. A breakout should come from actually breaking out. ──
      // Nothing about a player's stats used to touch his development: a QB who threw for 4,200 and
      // 40 grew exactly like one who threw for 1,800 and 9. Now outplaying your rating is the
      // single biggest driver of a dev-tier jump — and underplaying it stalls you.
      var pi=prodIndex(p);
      upC *= clampN(0.35 + 0.85*pi, 0.4, 2.4);
      if(Math.random()<upC){
        p.dev=nextTrait(p.dev);
        p.pot=Math.max(p.pot||0, rollPotential(p.startOvr!=null?p.startOvr:p.ovr, p.dev));
        if(!devInfo(p.dev).hidden) p.revealed=true;
        if(starting){
          toast(pi>=1.35
            ? "📈 " + x(p.n) + " is playing out of his mind — he's turning into a " + traitName(p.dev) + " developer!"
            : "📈 " + x(p.n) + " is turning into a " + traitName(p.dev) + " developer!");
        }
      }
    }
    // reveal the hidden trait once a player has developed enough evidence (sooner with Eye for Talent)
    var revealThresh = revealFast?2:3;
    if(!p.revealed && (Math.abs(p.ovr-p.startOvr)>=revealThresh || p.yr==="JR" || p.yr==="SR")){
      if(!devInfo(p.dev).hidden) p.revealed=true;
    }
  });
}

     '<div class="edit-cur-r">'+(g.home?"vs ":"@ ")+x(g.opp)+' <span class="t25-conf">'+x(g.oc)+' &middot; '+stars(g.op)+'</span></div></div>';

     '<button class="ha-btn'+(!g.home?" active":"")+'" data-setha="away">Away</button></div>';

  var pool=divTeams(myDivision());

    if(!indep && t.c===s.conf) return false;   // conference games are fixed by the league
    return (!taken[t.n]||t.n===g.opp);
  });
  var tiers=[{lbl:"Marquee (5★)",p:5},{lbl:"Strong (4★)",p:4},{lbl:"Solid (3★)",p:3},{lbl:"Cupcake (1-2★)",p:2}];
  h+='<div class="scroll-list" style="max-height:40vh">';
  tiers.forEach(function(tier){
    var teams=avail.filter(function(t){ return tier.p===2 ? t.p<=2 : t.p===tier.p; });
    if(!teams.length)return;
    teams.sort(function(a,b){ return a.n<b.n?-1:1; });
    h+='<div class="edit-tier-lbl">'+tier.lbl+'</div>';
    teams.forEach(function(t){
      var sel=(t.n===g.opp);
      h+='<div class="edit-opp'+(sel?" sel":"")+'" data-pickopp="'+x(t.n)+'"><span>'+x(t.n)+'</span>'+
         '<span class="t25-conf">'+x(t.c)+' &middot; '+stars(t.p)+(sel?' &middot; current':'')+'</span></div>';
    });
  });
  h+='</div>';
  h+='<button class="bigbtn btn-gold" id="edit-done" style="margin-top:10px">Done →</button>';
  return h;
}
