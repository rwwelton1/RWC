}
// Move a player up or down their position's depth chart by one slot.
// Tap one player, then tap another in the SAME position group to swap their
// depth slots. Tapping the selected player again cancels.
function tapDepth(id){
  var s=ST.save, p=s.roster.filter(function(x){return x.id===id;})[0];
  if(!p) return;
  if(ST.swapPick===id){ ST.swapPick=null; redrawKeepScroll(); return; }   // tapped self → cancel
  var sel=ST.swapPick && s.roster.filter(function(x){return x.id===ST.swapPick;})[0];
  if(!sel || sel.pos!==p.pos){
    // nothing picked yet, or the pick was a different position — start a new selection
    ST.swapPick=id; redrawKeepScroll(); return;
  }
  swapDepth(sel.id, p.id);
}
// Exchange two players' depth slots. Ranks may not exist yet (depthOrder falls
// back to OVR), so materialize the current order before swapping.
function swapDepth(idA, idB){
  var s=ST.save;
  var a=s.roster.filter(function(x){return x.id===idA;})[0];
  var b=s.roster.filter(function(x){return x.id===idB;})[0];
  if(!a || !b || a.pos!==b.pos || a.id===b.id) return;
  var order=depthOrder(s.roster, a.pos);
  var ia=-1, ib=-1;
  for(var i=0;i<order.length;i++){ if(order[i].id===idA)ia=i; if(order[i].id===idB)ib=i; }
  if(ia<0 || ib<0) return;
  var tmp=order[ia]; order[ia]=order[ib]; order[ib]=tmp;
  order.forEach(function(pl,i){ pl.depthRank=i; });
  ST.swapPick=null;
  persist(); redrawKeepScroll();
}
// Redraw without yanking the user back to the top of a long roster.
function redrawKeepScroll(){
  var sy=window.scrollY||window.pageYOffset||0;
  draw();
  window.scrollTo(0, sy);
  if(window.requestAnimationFrame){ window.requestAnimationFrame(function(){ window.scrollTo(0, sy); }); }
}


// =====================================================
// DRIVE ENGINE — possession-first football sim
// Nobody decides the final score. We simulate plays; each mutates
// {down, dist, yl, clock, poss}. The score is whatever falls out.
// yl = yards from the OFFENSE's own goal line; yl>=100 is a touchdown.
// =====================================================
var XP_RATE=0.95, TWO_RATE=0.45;
var EDGE_DIV=42;   // how sharply a rating advantage bends play outcomes (tune me)
var PACE=1.00;     // >1 = fewer plays per drive (tune points-per-drive here)

// Box-Muller: yardage is normal-ish with a fat right tail.
function gauss(){ var u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function clampN(v,a,b){ return Math.max(a,Math.min(b,v)); }

function dRun(edge, dm){
  dm=dm||defMods("standard");
  var e=edge/EDGE_DIV;
  var y=(4.75+e*1.6+dm.runYds)+gauss()*4.7;   // soft fronts concede the run
  if(Math.random()<0.058+e*0.02) y+=Math.abs(gauss())*16;   // breakaway
  y=Math.round(y); if(y<-6)y=-6;
  return {yards:y, turnover:Math.random()<(0.011-e*0.003), kind:"run", incomplete:false};
}
// `obvious` = 3rd/4th & long: the defense knows a throw is coming and defends the sticks.
function dPass(edge, obvious, dm, aggro){
  dm=dm||defMods("standard"); aggro=aggro||0;
  var e=edge/EDGE_DIV;
  if(Math.random()<clampN(0.062-e*0.02+(obvious?0.030:0)+dm.sack,0.02,0.20))
    return {yards:-rnd(4,9), turnover:false, kind:"sack", incomplete:false};
  // "Air it out" means deeper throws: fewer completions, bigger when they land.
  var compP=clampN(0.625+e*0.10-(obvious?0.075:0)+dm.comp-aggro*0.055,0.28,0.88);
  var intP =clampN(0.026-e*0.010+(obvious?0.012:0)+dm.int+aggro*0.011,0.006,0.070);
  if(Math.random()<intP)   return {yards:0, turnover:true,  kind:"int",  incomplete:true};
  if(Math.random()>=compP) return {yards:0, turnover:false, kind:"pass", incomplete:true};
  var y=(obvious?5.4:6.8)-(dm.shorten||0)+e*1.9+aggro*2.4+Math.abs(gauss())*(obvious?5.2:6.0);
  if(Math.random()<clampN(0.05+dm.explosive+aggro*0.03,0.005,0.20)) y+=Math.abs(gauss())*20;
  y=Math.round(y);
  if(y<1) y=rnd(1,3);   // a caught ball never loses ground; that's a sack, not a completion
  return {yards:y, turnover:false, kind:"pass", incomplete:false};
}
// ── TACTICS ──────────────────────────────────────────────
// Toggled any time during a live game; they take effect on the very next snap.
// Each one buys something and costs something — no free wins.
var OFF_TACTICS={
  run:     {label:"Run the Ball", icon:"🏃", lean:+30, desc:"Ground game. Burns clock, but predictable on 3rd & long."},
  balanced:{label:"Balanced",     icon:"⚖️", lean:0,   desc:"Take what the defense gives you."},
  pass:    {label:"Air It Out",   icon:"🎯", lean:-32, desc:"Chunk plays and quick scores — and more interceptions."}
};
var TEMPO_TACTICS={
  burn:    {label:"Burn Clock",   icon:"🐢", pace:1.34, desc:"Milk the play clock. Fewer possessions for everyone."},
  normal:  {label:"Normal",       icon:"⏱️", pace:1.00, desc:"Standard tempo."},
  hurry:   {label:"Hurry Up",     icon:"⚡", pace:0.62, desc:"Snap fast. More plays, but your defense stays on the field."}
};
var DEF_TACTICS={
  blitz:   {label:"Blitz",        icon:"💥", desc:"Pressure the QB. More sacks, but big plays behind you."},
  standard:{label:"Standard",     icon:"🛡️", desc:"Sound, balanced coverage."},
  prevent: {label:"Prevent",      icon:"🚧", desc:"Guard the sticks. Gives up the short stuff, kills the deep ball."}
};
function tacticsOf(G, side){
  // side 0 is the user's team; the CPU always plays it straight
  if(side!==0 || !G || !G.tactics) return {off:"balanced", tempo:"normal", def:"standard"};
  return G.tactics;
}
// Offensive tactics bend the run/pass lean. Defensive tactics belong to the team
// NOT holding the ball, so they're looked up from the defender's side.
function tacticLean(baseLean, off){
  return clampN(baseLean + (OFF_TACTICS[off]||OFF_TACTICS.balanced).lean, 2, 98);
}
// How a defensive call reshapes the offense's outcome distribution.
// Blitz trades coverage for pressure; prevent trades the short game for the deep
// ball. Neither is free: the harness showed blitz strictly dominant and prevent
// unplayable until the explosive/short-yardage costs were made to bite.
function defMods(def){
  // `shorten` clips the length of completed passes — the defining trait of a
  // prevent look. It concedes the catch but not the yardage behind it.
  if(def==="blitz")   return {sack:+0.040, comp:-0.034, explosive:+0.042, runYds:+0.90, int:+0.005, shorten:-0.2};
  if(def==="prevent") return {sack:-0.020, comp:+0.040, explosive:-0.075, runYds:+0.60, int:-0.002, shorten:2.6};
  return {sack:0, comp:0, explosive:0, runYds:0, int:0, shorten:0};
}
// Tempo has a defensive price. Hurry-up puts your defense back on the field with
// no rest; burning clock keeps them fresh. Applied to the OPPOSING offense.
function tempoFatigue(tempo){
  if(tempo==="hurry") return {comp:+0.011, runYds:+0.30, explosive:+0.007};  // gassed defense
  if(tempo==="burn")  return {comp:-0.010, runYds:-0.30, explosive:-0.008};  // rested defense
  return {comp:0, runYds:0, explosive:0};
}
function mergeMods(a,b){
  return {sack:(a.sack||0), comp:(a.comp||0)+(b.comp||0), explosive:(a.explosive||0)+(b.explosive||0),
          runYds:(a.runYds||0)+(b.runYds||0), int:(a.int||0), shorten:(a.shorten||0)};
}
// Aggression on 4th down: hurry-up teams chasing the game go for it more often.
function tacticFourthBias(tempo){ return tempo==="hurry"?0.22:(tempo==="burn"?-0.08:0); }

// ── Scheme fit reacts to your tactics ────────────────────
// offSchemeFit()/defSchemeFit() are frozen into your rating at kickoff. Half of
// that fit is `tendency` — how close your scheme's lean sits to what your
// PERSONNEL wants. Tactics move your effective lean, so calling against your own
// roster has to cost you, and calling toward it has to pay. We recompute only the
// tendency half and hand back the DELTA from the frozen value.
var DEF_TAC_LEAN={blitz:+26, standard:0, prevent:-24};
function tendencyAt(lean, ideal){ return Math.max(0, 1 - Math.abs(lean-ideal)/55); }
// `cap` is the same ceiling offSchemeFit() used, so the delta lives on that scale.
// SCHEME_TACTIC_W scales it: at 1.0 the swing is ~1 OVR and barely registers
// against EDGE_DIV=42. At 2.0 the worst mismatch costs ~2.2 OVR — felt, but still
// only a third of what a 10-point rating edge is worth.
var SCHEME_TACTIC_W=2.0;
function schemeFitDelta(side, tactics){
  var s=ST.save; if(!s) return 0;
  if(side==="off"){
    if(s.role==="DC") return 0;              // you don't coach this unit
    var sc=offScheme(), ideal=idealOffBalance();
    var eff=tacticLean(sc.lean, tactics.off);
    var cap = hasAbility("off5")?11:((hasArch("offensive")||hasAbility("off2"))?8:5);
    return (tendencyAt(eff,ideal)-tendencyAt(sc.lean,ideal))*0.4*cap*SCHEME_TACTIC_W;
  }
  if(s.role==="OC") return 0;
  var dsc=defScheme(), dideal=idealDefBalance();
  var deff=clampN(dsc.lean+(DEF_TAC_LEAN[tactics.def]||0), 2, 98);
  var dcap = hasAbility("def5")?11:((hasArch("defensive")||hasAbility("def2"))?8:5);
  return (tendencyAt(deff,dideal)-tendencyAt(dsc.lean,dideal))*0.4*dcap*SCHEME_TACTIC_W;
}

function dClock(res, tempo){
  var t=PACE*((TEMPO_TACTICS[tempo]||TEMPO_TACTICS.normal).pace);
  if(res.incomplete) return Math.max(3, Math.round(rnd(5,8)*t));
  if(res.kind==="run") return Math.max(6, Math.round(rnd(24,36)*t));
  return Math.max(5, Math.round(rnd(18,32)*t));
}
function fgDist(yl){ return (100-yl)+17; }
function fgProb(d){ return d<=29?0.96:d<=39?0.88:d<=46?0.76:d<=52?0.60:d<=57?0.42:0.22; }

function fourthDown(yl,dist,clock,q,margin,bias){
  bias=bias||0;   // hurry-up teams go for it more; clock-burners less
  var d=fgDist(yl);
  var desperate=(q>=4 && margin<0 && clock<300);
  var mustGo   =(q>=4 && margin<-8 && clock<240);
  if(mustGo && yl>40) return "go";
  if(yl>=60 && dist<=2 && !desperate) return Math.random()<clampN(0.62+bias,0.05,0.95)?"go":(d<=52?"fg":"punt");
  if(d<=52 && yl>=55){
    if(desperate && dist<=4 && yl>=70) return Math.random()<0.5?"go":"fg";
    return "fg";
  }
  if(yl>=65 && dist<=4 && Math.random()<clampN(0.35+bias,0.02,0.90)) return "go";
  if(desperate && dist<=6) return "go";
  if(yl<35) return "punt";
  return (dist<=1 && Math.random()<0.45)?"go":"punt";
}
// `lean` 0..100 (low = pass-heavy), matching OFF_SCHEMES / gameplan.offBalance.
function callPlay(down,dist,yl,clock,q,margin,lean){
  var runP=lean/100;
  if(down===3 && dist>=7) runP-=0.42; else if(down===3 && dist<=2) runP+=0.22;
  if(down===2 && dist>=9) runP-=0.12;
  if(yl>=95) runP+=0.18;                                   // goal line
  if(q>=4 && margin>7  && clock<420) runP+=0.35;           // milk the clock
  if(q>=4 && margin<-7 && clock<420) runP-=0.40;           // must throw
  if(clock<90 && margin<=0) runP-=0.35;
  return Math.random()<clampN(runP,0.05,0.92)?"run":"pass";
}
function blankSide(){ return {plays:0,rushYds:0,passYds:0,comp:0,att:0,to:0,ints:0,fums:0,punts:0,sacks:0,
  fga:0,fgm:0,thirdAtt:0,thirdConv:0}; }

// A resumable game. `G` holds everything the loop used to keep in locals, so the
// sim can stop at a quarter break, let the user change tactics, and pick up
// exactly where it left off. teams: [{off,def,lean}] — index 0 is the user.
function newGameState(teamA, teamB){
  var poss=Math.random()<0.5?0:1;
  return {
    S:[0,0], teams:[teamA,teamB], plays:[], stats:[blankSide(),blankSide()],
    poss:poss, half2:1-poss, half:0,
    clock:1800, yl:25, down:1, dist:10,
    done:false, guard:0,
    userGame:false,   // set true only for games the user actually coaches
    tactics:{off:"balanced", tempo:"normal", def:"standard"}
  };
}
// Advance the game by exactly ONE snap and return where that left us:
//   "stop"   — the next snap belongs to a later quarter than stopQ (hand control back)
//   "done"   — regulation (and any OT) is over
//   "played" — a snap was run; call again to continue
// Because the tactics are re-read here on every single snap (tacticsOf → G.tactics,
// the very object the tactic buttons mutate), driving this one snap at a time makes
// mid-quarter tactic changes take effect on the very next play.
function simSnap(G, stopQ){
  if(G.done) return "done";
  if(G.clock<=0){                    // half over
    if(G.half===0){ G.half=1; G.poss=G.half2; G.clock=1800; G.yl=25; G.down=1; G.dist=10; G.guard=0; }
    else { finishRegulation(G); return "done"; }
  }
  if(G.guard++>900){ finishRegulation(G); return "done"; }

  var q=(G.half===0)?(G.clock>900?1:2):(G.clock>900?3:4);
  if(stopQ && q>stopQ) return "stop";   // rolled into the next quarter — hand control back

  var qc=G.clock>900?G.clock-900:G.clock;
  var poss=G.poss, def=1-poss;
  var S=G.S, plays=G.plays, stats=G.stats, teams=G.teams;
  var edge=teams[poss].off-teams[def].def;
  var margin=S[poss]-S[def];

  // whose tactics apply: the ball-carrier's offense, the other side's defense.
  // The DEFENDER'S OWN tempo choice fatigues him — hurry-up means his offense
  // kept giving the ball back, so he never got off the field.
  var oT=tacticsOf(G,poss), dT=tacticsOf(G,def);
  var dm=mergeMods(defMods(dT.def), tempoFatigue(dT.tempo));
  var aggro=(oT.off==="pass")?1:(oT.off==="run"?-0.35:0);
  var lean=tacticLean(teams[poss].lean, oT.off);
  // Calling against your own personnel erodes your scheme fit for that snap;
  // calling toward it earns some back. Only the user's coached unit is affected.
  // CPU-vs-CPU league games never touch the user's roster or schemes.
  if(G.userGame){
    if(poss===0) edge += schemeFitDelta("off", oT);
    if(def===0)  edge -= schemeFitDelta("def", dT);  // a better-fit defense lowers the offense's edge
  }

  if(G.down===4){
    var dec=fourthDown(G.yl,G.dist,G.clock,q,margin,tacticFourthBias(oT.tempo));
    if(dec==="punt"){
      stats[poss].punts++;
      plays.push({t:poss,q:q,clock:qc,down:4,dist:G.dist,yl:G.yl,kind:"punt",yards:0,pts:0,snap:true});
      var net=clampN(Math.round(42+gauss()*8),25,62);
      var ny=(G.yl+net>=100)?20:(100-(G.yl+net));
      G.clock-=rnd(12,20);
      G.poss=def; G.yl=clampN(ny,1,99); G.down=1; G.dist=10; return "played";
    }
    if(dec==="fg"){
      var fd=fgDist(G.yl); stats[poss].fga++; G.clock-=rnd(6,12);
      plays.push({t:poss,q:q,clock:qc,down:4,dist:G.dist,yl:G.yl,kind:"fgatt",yards:0,pts:0,snap:true,d:fd});
      if(Math.random()<fgProb(fd)){
        stats[poss].fgm++; S[poss]+=3;
        plays.push({t:poss,kind:"FG",pts:3,q:q,clock:qc,d:fd});
        G.poss=def; G.yl=25; G.clock-=rnd(4,8);
      } else {
        plays.push({t:poss,kind:"FGMISS",pts:0,q:q,clock:qc,d:fd});
        G.poss=def; G.yl=clampN(100-G.yl,1,99);
      }
      G.down=1; G.dist=10; return "played";
    }
    // "go" falls through to a live play
  }

  var call=callPlay(G.down,G.dist,G.yl,G.clock,q,margin,lean);
  var obvious=(G.down>=3 && G.dist>=6);
  var res=(call==="run")?dRun(edge,dm):dPass(edge,obvious,dm,aggro);
  stats[poss].plays++;
  var snap={t:poss, q:q, clock:qc, down:G.down, dist:G.dist, yl:G.yl,
            kind:res.kind, yards:res.yards, incomplete:res.incomplete,
            turnover:res.turnover, fourth:(G.down===4), pts:0, snap:true};
  plays.push(snap);
  if(res.kind==="run"){ stats[poss].rushYds+=res.yards; }
  else if(res.kind==="sack"){ stats[poss].sacks++; stats[poss].passYds+=res.yards; }
  else { stats[poss].att++; if(!res.incomplete){ stats[poss].comp++; stats[poss].passYds+=res.yards; } }
  if(G.down===3) stats[poss].thirdAtt++;
  G.clock-=dClock(res, oT.tempo);

  if(res.turnover){
    stats[poss].to++;
    if(res.kind==="int") stats[poss].ints++; else stats[poss].fums++;
    var spot=clampN(G.yl+res.yards,1,99);
    G.poss=def; G.yl=clampN(100-spot,1,99); G.down=1; G.dist=10; return "played";
  }
  var gained=res.yards; G.yl+=gained;

  if(G.yl<=0){                                  // safety
    S[def]+=2; plays.push({t:def,kind:"SFTY",pts:2,q:q,clock:qc});
    G.poss=def; G.yl=25; G.down=1; G.dist=10; return "played";
  }
  if(G.yl>=100){                                // touchdown
    S[poss]+=6;
    if(G.down===3) stats[poss].thirdConv++;
    plays.push({t:poss,kind:"TD",pts:6,q:q,clock:qc});
    var deficit=S[def]-(S[poss]-6);
    if(goesForTwo(deficit,q)){
      var ok=Math.random()<TWO_RATE; if(ok)S[poss]+=2;
      plays.push({t:poss,kind:"2PT",pts:ok?2:0,good:ok,q:q,clock:qc});
    } else {
      var ok2=Math.random()<XP_RATE; if(ok2)S[poss]+=1;
      plays.push({t:poss,kind:"XP",pts:ok2?1:0,good:ok2,q:q,clock:qc});
    }
    G.clock-=rnd(4,8);
    G.poss=def; G.yl=25; G.down=1; G.dist=10; return "played";
  }
  if(gained>=G.dist){                           // first down
    if(G.down===3) stats[poss].thirdConv++;
    G.down=1; G.dist=Math.min(10,100-G.yl);
  } else {
    G.down++; G.dist-=gained;
    if(G.down>4){ G.poss=def; G.yl=clampN(100-G.yl,1,99); G.down=1; G.dist=10; }
  }
  return "played";
}
// Run the game forward until the end of quarter `stopQ` (1..4), or to the final
// whistle when stopQ is falsy. Batch driver — used for CPU games and "Sim to Final".
function simUntil(G, stopQ){
  if(G.done) return G;
  var st;
  do { st=simSnap(G, stopQ); } while(st==="played");
  return G;
}
// Game time (seconds, 0..3600) the engine has actually simulated so far.
function engineElapsed(G){ return (G.half*1800) + (1800 - Math.max(0,G.clock)); }
// Generate snaps until the engine has simulated up to game-time `upto`, or hits the
// stop boundary for this stretch, or the game ends. Returns how many raw plays were
// added. Tactics are read inside simSnap, so a change made a moment ago lands here.
function simLiveTo(G, stopQ, upto){
  var added=0, guard=0;
  while(!G.done && guard++<900){
    if(engineElapsed(G)>=upto && G.clock>0) break;   // caught up (no pending clock flip)
    var before=G.plays.length;
    var st=simSnap(G, stopQ);
    added += (G.plays.length-before);
    if(st==="stop"||st==="done") break;
  }
  return added;
}
// Overtime — no ties. OT scores are emitted as plays so the feed matches the final.
function finishRegulation(G){
  var S=G.S, teams=G.teams, plays=G.plays, ot=0;
  while(S[0]===S[1] && ot++<6){
    for(var t=0;t<2;t++){
      var r=Math.random()+(teams[t].off-teams[1-t].def)/200;
      if(r>0.72){ S[t]+=7; plays.push({t:t,kind:"TD",pts:6,q:4,clock:0,ot:ot});
                  plays.push({t:t,kind:"XP",pts:1,good:true,q:4,clock:0,ot:ot}); }
      else if(r>0.42){ S[t]+=3; plays.push({t:t,kind:"FG",pts:3,q:4,clock:0,d:rnd(28,45),ot:ot}); }
    }
  }
  if(S[0]===S[1]){ var w=Math.random()<0.5?0:1; S[w]+=3;
    plays.push({t:w,kind:"FG",pts:3,q:4,clock:0,d:rnd(28,45),ot:ot}); }
  G.done=true;
}
function gameResult(G){ return {a:G.S[0], b:G.S[1], plays:G.plays, stats:G.stats}; }


// The offense/defense your team actually fields, resolved by role: you coach one
// unit, the other is CPU-run. Scheme fit is baked in because it's what takes the
// field; home-field advantage is not, since it's situational, not a team rating.
// gameSetup() and the scoreboard both read this, so they can never drift apart.
// Exact (unrounded) values — scheme fit carries a decimal and the drive engine
// is sensitive to it. Round only at the point of display.
function myRatings(){
  var role=ST.save.role;
  var offFit=offSchemeFit(), defFit=defSchemeFit();
  var off, def;
  if(role==="HC"){     off=offenseRating()+offFit;  def=defenseRating()+defFit; }
  else if(role==="DC"){ off=cpuUnitRating("off");    def=defenseRating()+defFit; }
  else {                off=offenseRating()+offFit; def=cpuUnitRating("def"); }
  return {off:off, def:def, ovr:(off+def)/2};
}
// Raw team strength for the scoreboard — NO scheme fit, so it sits on the same
// scale as oppRatings() and the "OFF 82" in the season header. Fit is surfaced
// separately as "Great fit +6.3"; folding it in here would show two different
// numbers for the same unit on the same screen.
function myRatingsDisplay(){
  var role=ST.save.role;
  var off = (role==="DC") ? cpuUnitRating("off") : offenseRating();
  var def = (role==="OC") ? cpuUnitRating("def") : defenseRating();
  return {off:Math.round(off), def:Math.round(def), ovr:Math.round((off+def)/2)};
}

// A CPU team's run/pass identity — stable per school, derived from its name.
function oppLean(name){
  var h=0; for(var i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0xffff;
  return 32 + (h%37);   // 32..68, a believable spread of offensive identities
}

// Break a final score into a believable sequence of scoring plays across 4 quarters.
// Returns [{q, clock, team:'us'|'them', kind, pts, usTot, themTot, desc}]
// ── Conversion logic ────────────────────────────────────
// A touchdown is 6. The scoring team then kicks the extra point (~95%) or, when the
// math calls for it, goes for two from the 2-yard line (~45%).
// (XP_RATE / TWO_RATE are declared with the drive engine above.)
// `down` = the scoring team's deficit BEFORE the touchdown's 6 points (negative = leading).
// `after` = down - 6 = the deficit once the TD is on the board, before the conversion.
// The classic chart calls, all of which a kick cannot resolve:
//   trail by 8 -> after  2 : two-point conversion TIES the game
//   trail by 5 -> after -1 : leading by 1; two makes it a field-goal game (3)
//   trail by 2 -> after -4 : leading by 4; two makes it a touchdown game (6)
//   trail by 1 -> after -5 : leading by 5; two makes it a two-score game (7)
// Late in the game these are near-automatic; early on, coaches take the point.
function goesForTwo(down, q){
  var after = down - 6;
  var chartCall = (after===2 || after===-1 || after===-4 || after===-5);
  if(!chartCall) return Math.random()<0.04;  // rare gamble / analytics call
  if(q>=4) return Math.random()<0.85;        // 4th quarter: take the points that matter
  if(q===3) return Math.random()<0.35;
  return Math.random()<0.10;                 // too early to chase points
}

// ── Play attribution ─────────────────────────────────────
// Pick a real player from your depth chart, weighted toward starters.
var DEPTH_W=[0.55,0.28,0.12,0.05];
// ═════════════════════════════════════════════════════════
// PLAY THE BACKUPS ("garbage time")
// When a game is decided there's no reason to keep your starters out there. Pull them, and the
// bench gets real snaps: games played, and — because development gives a starter a FOUR TIMES
// better breakout chance — a genuine shot at improving. The catch is real: your team gets worse
// on the spot, and any RESERVE who takes a snap BURNS HIS REDSHIRT. Free development it is not.
// ═════════════════════════════════════════════════════════
function gtActive(){ return !!(ST.live && ST.live.backups); }
// How much worse you are with the ones-and-twos on the sideline.
function benchPenalty(){
  var s=ST.save, drop=0, n=0;
  ALL_POS.forEach(function(pos){
    var d=depthOrder(s.roster,pos), ns=startersAt(pos);
    for(var i=0;i<ns && i<d.length;i++){
      var starter=d[i], sub=d[ns+i] || d[d.length-1];
      if(!sub) continue;
      drop += Math.max(0, starter.ovr - sub.ovr);
      n++;
    }
  });
  return n ? Math.round(drop/n) : 0;
}
// Who's about to lose a redshirt if you do this.
function benchRedshirtRisk(){
  var s=ST.save, out=[];
  ALL_POS.forEach(function(pos){
    depthOrder(s.roster,pos).slice(startersAt(pos), rotationAt(pos)+2).forEach(function(p){
      if(canRedshirt(p) && gamesPlayed(p) >= RS_GAME_LIMIT-1) out.push(p);
    });
  });
  return out;
}
function toggleBackups(){
  var G=ST.G, li=ST.live;
  if(!G || !li || li.done) return;
  li.backups=!li.backups;
  if(li.backups) li.backupsUsed=true;   // they played — they get the game, and the reps
  // The team on the field genuinely changes. G.teams[0] is YOUR side, live.
  var pen=benchPenalty();
  if(li.backups){
    li._benchPen=pen;
    G.teams[0].off=Math.max(35, G.teams[0].off-pen);
    G.teams[0].def=Math.max(35, G.teams[0].def-pen);
    var risk=benchRedshirtRisk();
    toast("🔄 Backups in — you're "+pen+" points worse."+(risk.length?" ⚠️ "+risk.length+" redshirt"+(risk.length>1?"s":"")+" on the line.":""));
  } else {
    var back=li._benchPen||0;
    G.teams[0].off=Math.min(99, G.teams[0].off+back);
    G.teams[0].def=Math.min(99, G.teams[0].def+back);
    li._benchPen=0;
    toast("🔙 Starters back in.");
  }
  renderLiveScore();
  draw();
}
function pickDepth(pos){
  // Only the ROTATION touches the ball. Previously this ran four deep at every position, so a
  // third-string RB who was supposed to be redshirting quietly rushed for 180 yards.
  var all=depthOrder(ST.save.roster,pos);
  // Garbage time: the starters sit. Everyone behind them plays.
  var d = gtActive() ? (all.slice(startersAt(pos)).length ? all.slice(startersAt(pos)) : all)
                     : all;
  d = d.slice(0, rotationAt(pos));
  if(!d.length) return null;
  var w=(ROTATION_W[pos]||DEPTH_W).slice(0, d.length);
  var tot=0; w.forEach(function(x){ tot+=x; });
  var r=Math.random()*tot, acc=0;
  for(var i=0;i<d.length;i++){ acc+=w[i]; if(r<acc) return d[i]; }
  return d[0];
}
// Who touched the ball? Only our own roster is named; opponents get a generated
// name since we don't model their rosters.
// A game's named cast. The starting QB takes nearly every snap, so he is fixed
// for the game rather than re-rolled per play; the opponent gets one QB name too.
function newCast(oppName){
  // The backup QB actually plays now — a share of snaps in relief. He used to be charged a full
  // season of games while never once touching the ball, which quietly burned his redshirt.
  var qb=pickDepth("QB") || depthOrder(ST.save.roster,"QB")[0];
  // The opponent has a REAL cast now: their actual star QB and skill players, pulled from the
  // league. (This used to invent a fresh random name on literally every snap.)
  var stars=starsOf(oppName);
  var at=function(pos){ return stars.filter(function(s){return s.pos===pos;})[0] || null; };
  var oQB=at("QB");
  return {
    usQB: qb?qb.n:genName(), usQBp: qb||null,
    oppQB: oQB?oQB.n:genName(),
    oppRB: at("RB"), oppWR: at("WR"), oppTE: at("TE")
  };
}
// A team's star players, if we have them (your own team uses your real roster instead).
function starsOf(name){
  var L=ST.save.league;
  var t=(L&&L.teams)?L.teams[name]:null;
  return (t&&t.stars)?t.stars:[];
}
// Returns display names AND the actual roster objects (ours only), so the
// play-by-play and the box score describe the SAME events.
function attribute(p, cast){
  if(p.t!==0){
    // The opponent's real stars carry the ball — their names show up in the feed, so you're
    // beating (or losing to) an actual player from an actual program.
    var b=null;
    if(p.kind==="run"){ b=cast.oppRB; }
    else if(p.kind==="pass"){
      var r=Math.random();
      b = r<0.60 ? cast.oppWR : (r<0.82 ? cast.oppTE : cast.oppRB);
    }
    var bn = b?b.n:genName(), guard=0;
    while(bn===cast.oppQB && guard++<6) bn=genName();  // never throw to yourself
    return {ball:bn, qb:cast.oppQB, ballP:null, qbP:null};
  }
  var qbP=cast.usQBp, qn=cast.usQB;
  if(p.kind==="run"){
    var keeper=(qbP && Math.random()<0.14);           // QB keepers happen
    var carrier= keeper ? qbP : pickDepth("RB");
    return {ball:carrier?carrier.n:genName(), qb:qn, ballP:carrier||null, qbP:qbP};
  }
  if(p.kind==="pass"){
    var r=Math.random();
    var tgt = r<0.62 ? pickDepth("WR") : (r<0.84 ? pickDepth("TE") : pickDepth("RB"));
    if(tgt && qbP && tgt.id===qbP.id) tgt=null;       // never throw to yourself
    return {ball:tgt?tgt.n:genName(), qb:qn, ballP:tgt||null, qbP:qbP};
  }
  return {ball:qn, qb:qn, ballP:qbP, qbP:qbP};
}
// "OKLA 34" / "UNT 41" — field position in broadcast form.
function fieldPos(yl, usAb, themAb){
  if(yl===50) return "50";
  return (yl<50 ? usAb : themAb)+" "+(yl<50 ? yl : 100-yl);
}
function ordDown(d){ return ["","1st","2nd","3rd","4th"][d]||String(d); }

// Dress the drive engine's real plays as a play-by-play feed.
// The score is NOT reconstructed here — these events already produced it.
// Every row carries `scoring:true|false` so the UI can filter to scoring plays.
function buildPlayByPlay(drivePlays, usName, themName){
  var usAb=abbr(usName), themAb=abbr(themName);
  var cast=newCast(themName);
  var out=[], ut=0, tt=0;
  drivePlays.forEach(function(p){
    var team=(p.t===0)?"us":"them";
    var off=(p.t===0)?usAb:themAb, def=(p.t===0)?themAb:usAb;
    if(team==="us") ut+=p.pts; else tt+=p.pts;
    var elapsed=(p.q-1)*900 + (900-p.clock);
    var mm=Math.floor(p.clock/60), ss=p.clock%60;
    var desc, kind=p.kind, scoring=false, at=null;

    if(p.snap){
      // ── a normal snap: down, distance, field position, result ──
      at=attribute(p,cast);
      var spot=fieldPos(p.yl, off, def);
      var sit=ordDown(p.down)+" & "+((p.yl+p.dist>=100)?"Goal":p.dist)+" at "+spot;
      // a gain is capped at the goal line only when the play actually scored
      var scored=(!p.turnover && p.yl+p.yards>=100);
      var gain=scored?(100-p.yl):p.yards;
      if(p.kind==="punt"){ desc=sit+" — punt away"; kind="PUNT"; }
      else if(p.kind==="fgatt"){ desc=sit+" — "+p.d+"-yard field goal attempt"; kind="FGA"; }
      else if(p.kind==="sack"){ desc=sit+" — "+at.qb+" SACKED for "+p.yards; kind="SACK"; }
      else if(p.kind==="int"){ desc=sit+" — INTERCEPTED, "+at.qb+" picked off"; kind="INT"; }
      else if(p.kind==="run"){
        var v=p.turnover?" — FUMBLE, "+at.ball+" loses it":
              " — "+at.ball+" "+(gain<0?"stuffed for "+gain:gain+" yard rush")+(scored?", TOUCHDOWN":"");
        desc=sit+v; kind=p.turnover?"FUM":"RUN";
      }
      else if(p.incomplete){ desc=sit+" — "+at.qb+" incomplete to "+at.ball; kind="INC"; }
      else { desc=sit+" — "+at.qb+" to "+at.ball+" for "+gain+(scored?", TOUCHDOWN":""); kind="PASS"; }
    } else {
      // ── a scoring event ──
      scoring=true;
      if(p.kind==="TD")          desc="TOUCHDOWN "+off;
      else if(p.kind==="FG")     desc=p.d+"-yard field goal is GOOD";
      else if(p.kind==="FGMISS") desc=p.d+"-yard field goal is no good";
      else if(p.kind==="XP")     desc=p.good?"extra point is good":"extra point is NO GOOD";
      else if(p.kind==="2PT")    desc=p.good?"two-point conversion is GOOD":"two-point try is stuffed";
      else                       desc="SAFETY";
      if(p.ot) desc="OT"+p.ot+" — "+desc;
    }
    out.push({q:p.q, clock:mm+":"+(ss<10?"0"+ss:ss), elapsed:elapsed, team:team,
              kind:kind, pts:p.pts, good:p.good, scoring:scoring,
              usTot:ut, themTot:tt, desc:desc,
              // raw event data the box score is derived from.
              // Yardage is capped at the goal line only when the play actually scored;
              // a fumble at the 1 gained what it gained.
              yards:(p.snap?((!p.turnover && p.yl+p.yards>=100)?(100-p.yl):p.yards):0),
              scored:(p.snap?(!p.turnover && p.yl+p.yards>=100):false),
              // down-and-distance, so the stats tab can derive third-down conversions
              down:(p.snap?p.down:0), dist:(p.snap?p.dist:0),
              firstDown:(p.snap && !p.turnover && p.kind!=="punt" && p.kind!=="fgatt" &&
                         (p.yl+p.yards>=100 || p.yards>=p.dist)),
              ballP:(at?at.ballP:null), qbP:(at?at.qbP:null)});
  });
  // stable sort by clock; snap rows precede the score they produced
  out.forEach(function(p,i){ p._i=i; });
  out.sort(function(a,b){ return (a.elapsed-b.elapsed) || (a._i-b._i); });
  var u2=0,t2=0;
  out.forEach(function(p){ if(p.team==="us")u2+=p.pts; else t2+=p.pts; p.usTot=u2; p.themTot=t2; });
  return out;
}

function draw(){
  renderTop();
  var app=document.getElementById("app");
  if(ST.screen==="loading"){ app.innerHTML='<div class="wrap"><div class="lb-note" style="text-align:center;padding:30px;color:var(--muted);font-weight:700">Loading dynasty…</div></div>'; return; }
  if(ST.screen==="setup")      app.innerHTML=setupScreen();
  else if(ST.screen==="recruit")app.innerHTML=recruitScreen();
  else if(ST.screen==="preseason")app.innerHTML=preseasonScreen();
  else if(ST.screen==="coachtree")app.innerHTML=coachTreeScreen();
  else if(ST.screen==="staff")    app.innerHTML=staffScreen();
  else if(ST.screen==="history")  app.innerHTML=champHistoryScreen();
  else if(ST.screen==="portal")   app.innerHTML=offseasonScreen();   // portal is a TAB in the hub now
  else if(ST.screen==="season") app.innerHTML=seasonScreen();
  else if(ST.screen==="live"){ if(!ST.G && !(ST.live&&ST.live.done)){ ST.screen="season"; ST.weekResult=null; ST.live=null; draw(); return; } app.innerHTML=liveScreen(); if(ST.live)ST.live._tacKey=null; bindLiveControls(); renderLiveScore(); }
  else if(ST.screen==="offseason")app.innerHTML=offseasonScreen();
  // legacy screen names — postseason now lives inside the season screen's Week tab
  else if(ST.screen==="bracket"||ST.screen==="confchamp"||ST.screen==="bowl"){ ST.seasonTab=ST.seasonTab||"week"; app.innerHTML=seasonScreen(); }
  else if(ST.screen==="carousel") app.innerHTML=carouselScreen();
  else if(ST.screen==="fired")    app.innerHTML=firedScreen();
  else app.innerHTML=setupScreen();
  // NEVER do `app.innerHTML += ...` here. That re-serialises and re-parses the ENTIRE app DOM,
  // which destroys every existing node and silently strips their event listeners — including the
  // live-game controls, which are bound once when a game starts and not on every draw. That's how
  // the "Sim to Final" button quietly went dead. Overlays get their own container.
  var ov=document.getElementById("info-overlay");
  if(ov) ov.innerHTML = infoSheet() + playerCardSheet();
  bind();
  renderNilOverlay();
}

      else { if(ST.screen!=="coachtree" && ST.screen!=="staff" && ST.screen!=="history"){ ST.menuFrom=ST.screen; ST.treeFrom=ST.screen; }
             ST.screen=k; }
      draw();
    };
  });
}
// Restart the whole dynasty from anywhere (with confirmation)
function restartDynasty(){
  if(!confirm("Restart your dynasty? This permanently erases your current save — career record, team, and league.")) return;
  if(DB)DB.ref(BASE()).remove();
  ST.save=null; ST.fired=null; ST.carousel=null; ST.post=null; ST.confchamp=null;
  ST.screen="setup"; ST.setup={div:"FBS",conf:"SEC",team:null,role:"OC",archetype:"offensive"}; ST.seasonTab="week"; ST.planPick=null;
  draw();
}

// ═════════════════════════════════════════════════════════
// COACHING STAFF (head coaches only)
// A head coach doesn't do it all himself — he hires people. Every assistant's perk STACKS on
// top of your own coaching tree at exactly the same place your abilities are applied, so a
// Play Caller (+2 offense) with an elite OC (+3) genuinely fields a +5 offense.
// Assistants grow, get poached by programs that can pay more, and cost real money out of a
// staff budget that has nothing to do with NIL. Building a staff is its own dynasty.
// ═════════════════════════════════════════════════════════
var STAFF_ROLES=[
  {k:"OC", t:"Offensive Coordinator", ico:"⚡", blurb:"Adds to your offense on game day, and lifts your offensive scheme-fit ceiling."},
  {k:"DC", t:"Defensive Coordinator", ico:"🛡️", blurb:"Adds to your defense on game day, and lifts your defensive scheme-fit ceiling."},
  {k:"RC", t:"Recruiting Coordinator", ico:"🎯", blurb:"More recruiting points every week, and prospects start warmer on you."},
  {k:"SC", t:"Director of Player Development", ico:"📈", blurb:"Every player on your roster develops faster in the offseason."}
];
// What he's actually worth to you. This is the number that stacks with your tree.
// An assistant's quality band. Grade drives both his perk and his price.
function staffTier(g){
  if(g>=92) return {t:"Elite",   c:"var(--gold-dark)"};
  if(g>=84) return {t:"Strong",  c:"#1a7f37"};
  if(g>=75) return {t:"Solid",   c:"var(--text)"};
  if(g>=66) return {t:"Average", c:"var(--muted)"};
  return {t:"Green", c:"var(--muted)"};
}
function staffPerk(a){
  if(!a) return null;
  var g=a.grade;
  if(a.role==="OC") return {key:"off",  val:Math.max(0,Math.floor((g-62)/10)), fit:(g>=86?1:0)};
  if(a.role==="DC") return {key:"def",  val:Math.max(0,Math.floor((g-62)/10)), fit:(g>=86?1:0)};
  if(a.role==="RC") return {key:"rec",  val:Math.max(0,Math.floor((g-66)/12)), interest:Math.max(0,Math.floor((g-62)/7))};
  if(a.role==="SC") return {key:"dev",  val:Math.max(0,(g-62)/220)};   // a growth multiplier bump
  return null;
}
function staffPerkText(a){
  var p=staffPerk(a); if(!p) return "";
  if(p.key==="off") return "+"+p.val+" offense"+(p.fit?" · +1 scheme-fit ceiling":"");
  if(p.key==="def") return "+"+p.val+" defense"+(p.fit?" · +1 scheme-fit ceiling":"");
  if(p.key==="rec") return "+"+p.val+" recruiting pts/wk · +"+p.interest+" prospect interest";
  if(p.key==="dev") return "+"+Math.round(p.val*1000)/10+"% faster player growth";
  return "";
}
// ── The stacking hook ─────────────────────────────────────
// Every perk site in the game calls this and ADDS it to whatever your own tree already gives.
function staffBonus(key){
  var s=ST.save;
  if(!s || s.role!=="HC" || !s.staff) return 0;   // only a head coach has a staff
  var tot=0;
  Object.keys(s.staff).forEach(function(k){
    var a=s.staff[k]; if(!a) return;
    var p=staffPerk(a); if(!p) return;
    if(key==="off"       && p.key==="off") tot+=p.val;
    if(key==="def"       && p.key==="def") tot+=p.val;
    if(key==="offFit"    && p.key==="off") tot+=(p.fit||0);
    if(key==="defFit"    && p.key==="def") tot+=(p.fit||0);
    if(key==="recPts"    && p.key==="rec") tot+=p.val;
    if(key==="interest"  && p.key==="rec") tot+=(p.interest||0);
    if(key==="dev"       && p.key==="dev") tot+=p.val;
  });
  return tot;
}
// ── Money ────────────────────────────────────────────────
// A staff budget, entirely separate from NIL. Bigger programs pay better assistants.
function staffBudgetFor(s){
  var base = 0.9 + (s.prestige||3)*0.55;               // $M per year
  if(myDivision()==="FCS") base *= 0.42;               // FCS staffs run lean
  base += Math.min(1.2, (s.careerWins||0)*0.01);       // a proven HC commands more from the AD
  return money2(base);
}
function staffSalaryFor(grade){
  return money2(Math.max(0.08, Math.pow(Math.max(0,grade-55)/40, 2.1) * 1.5 + 0.10));
}
function staffSpend(){
  var s=ST.save, t=0;
  Object.keys(s.staff||{}).forEach(function(k){ if(s.staff[k]) t+=s.staff[k].salary||0; });
  return money2(t);
}
function staffLeft(){ return money2((ST.save.staffBudget||0) - staffSpend()); }
// ── Candidates ───────────────────────────────────────────
// ── PERSONALITIES ────────────────────────────────────────
// An assistant is not just a number. His trait decides how he grows, how loyal he is, and how
// badly he wants your job — or somebody else's. This is what makes a staff a gamble: the cheap
// 62-grade kid might be a prodigy who becomes the best OC in the country, or a wildcard who
// swings ten points a year and gives you an ulcer.
var STAFF_TRAITS={
  rising:   {t:"Rising Star", ico:"🚀", amb:1.7, grow:[2,4],  desc:"Grows fast — and every program in the country knows it."},
  prodigy:  {t:"Prodigy",     ico:"💎", amb:1.2, grow:[1,4],  desc:"Raw and cheap, with a ceiling nobody can see yet.", hidden:true},
  guru:     {t:"Guru",        ico:"🧠", amb:0.9, grow:[0,2],  desc:"Already brilliant. Expensive, and he knows his worth."},
  lifer:    {t:"Lifer",       ico:"⚓", amb:0.25,grow:[0,2],  desc:"Wants to retire here. Almost never leaves."},
  grinder:  {t:"Grinder",     ico:"🔨", amb:0.42,grow:[1,2],  desc:"Slow, steady, loyal. Never spectacular, never a problem."},
  wildcard: {t:"Wildcard",    ico:"🎲", amb:1.1, grow:[-4,7], desc:"Brilliant one year, baffling the next."},
  retread:  {t:"Retread",     ico:"📉", amb:0.5, grow:[-3,1], desc:"A big name on the way down. Buy the reputation, not the future."}
};
function traitInfo(k){ return STAFF_TRAITS[k]||STAFF_TRAITS.grinder; }
function rollStaffTrait(){
  var r=Math.random();
  if(r<0.16) return "rising";
  if(r<0.28) return "prodigy";
  if(r<0.40) return "guru";
  if(r<0.55) return "lifer";
  if(r<0.74) return "grinder";
  if(r<0.88) return "wildcard";
  return "retread";
}
function genAssistant(role, prestige){
  var trait=rollStaffTrait(), ti=traitInfo(trait);
  var base = 58 + (prestige||3)*3 + rnd(-8, 14);
  if(trait==="prodigy") base -= rnd(6,12);     // he's cheap because nobody's noticed yet
  if(trait==="guru")    base += rnd(4,9);
  if(trait==="retread") base += rnd(3,8);      // the name still carries
  var g = clampN(Math.round(base), 52, 97);
  var pot = clampN(g + (trait==="prodigy" ? rnd(12,26) : trait==="rising" ? rnd(6,16) : rnd(0,8)), g, 99);
  return {
    id:"as"+Math.random().toString(36).slice(2,7),
    n:genName(), role:role, grade:g, pot:pot,
    trait:trait, amb:ti.amb,
    loyalty:rnd(35,60),          // rises the longer he stays, and if you pay him properly
    salary:staffSalaryFor(g),
    years:0
  };
}
// What the market says he's worth — pay above it and he stays; pay below and he listens to calls.
function marketRate(a){ return staffSalaryFor(a.grade); }
function paidRatio(a){ return (a.salary||0.1) / Math.max(0.05, marketRate(a)); }
// ── RETENTION: a raise ───────────────────────────────────
// The lever you were missing. Pay him above market and his loyalty climbs and the poachers
// struggle. It costs real budget, every year, forever.
function raiseAssistant(role){
  var s=ST.save, a=(s.staff||{})[role]; if(!a) return;
  var bump=money2(Math.max(0.06, marketRate(a)*0.22));
  if(bump > staffLeft()){ toast("Not enough staff budget for a raise."); return; }
  a.salary=money2(a.salary+bump);
  a.loyalty=clampN((a.loyalty||50)+rnd(14,22), 0, 100);
  toast("💰 Gave "+x(a.n)+" a raise — loyalty now "+a.loyalty+".");
  persist(); draw();
}
// ── RETENTION: match an outside offer ────────────────────
function matchStaffOffer(id){
  var s=ST.save, o=(s._staffOffers||[]).filter(function(x){return x.id===id;})[0];
  if(!o || o.done) return;
  var a=(s.staff||{})[o.role];
  if(!a){ o.done=true; return; }
  var extra=money2(o.newSalary - a.salary);
  if(extra > staffLeft()){ toast("You can't afford to match — "+x(a.n)+" is gone."); o.done=true; s.staff[o.role]=null; persist(); draw(); return; }
  a.salary=o.newSalary;
  a.loyalty=clampN((a.loyalty||50)+rnd(20,30), 0, 100);
  a.justMatched=true;      // he turned down a job to stay — he's not entertaining another next year
  o.done=true; o.matched=true;
  toast("🤝 Matched "+x(o.suitor)+"'s offer — "+x(a.n)+" stays.");
  persist(); draw();
}
function declineStaffOffer(id){
  var s=ST.save, o=(s._staffOffers||[]).filter(function(x){return x.id===id;})[0];
  if(!o || o.done) return;
  o.done=true;
  var a=(s.staff||{})[o.role];
  s.staff[o.role]=null;
  toast("👋 "+x(o.n)+" leaves for "+x(o.suitor)+".");
  persist(); draw();
}
function genStaffPool(){
  var s=ST.save, pool=[];
  STAFF_ROLES.forEach(function(r){
    var n=rnd(2,3);
    for(var i=0;i<n;i++) pool.push(genAssistant(r.k, s.prestige));
  });
  pool.sort(function(a,b){ return b.grade-a.grade; });
  return pool;
}
function hireAssistant(id){
  var s=ST.save;
  var a=(s.staffPool||[]).filter(function(x){return x.id===id;})[0];
  if(!a) return;
  var cur=(s.staff||{})[a.role];
  var freed = cur ? (cur.salary||0) : 0;
  if(a.salary > staffLeft()+freed){ toast("Not enough staff budget for "+x(a.n)); return; }
  s.staff=s.staff||{};
  if(cur) toast("👋 "+x(cur.n)+" is out as "+a.role);
  s.staff[a.role]=a;
  s.staffPool=(s.staffPool||[]).filter(function(x){return x.id!==id;});
  toast("✅ Hired "+x(a.n)+" — "+a.role+" · "+staffPerkText(a));
  persist(); draw();
}
function fireAssistant(role){
  var s=ST.save; if(!s.staff||!s.staff[role]) return;
  var a=s.staff[role];
  s.staff[role]=null;
  toast("👋 Let go of "+x(a.n)+" ("+role+")");
  persist(); draw();
}
// ── Offseason churn: they grow, and the good ones get poached ──
function advanceStaff(){
  var s=ST.save;
  if(s.role!=="HC"){ return; }
  s.staffBudget=staffBudgetFor(s);
  s.staff=s.staff||{};
  s._staffOffers=[];
  var won=((s.wins||0) >= (s.expectWins||6));
  Object.keys(s.staff).forEach(function(k){
    var a=s.staff[k]; if(!a) return;
    a.years=(a.years||0)+1;
    var ti=traitInfo(a.trait);
    // ── He develops (or doesn't) according to who he is ──
    var lo=ti.grow[0], hi=ti.grow[1];
    var growth = rnd(lo,hi) + (won?1:0);
    if(a.pot && a.grade>=a.pot) growth=Math.min(growth,0);   // he's hit his ceiling
    a.grade = clampN(a.grade + growth, 45, 99);
    if(a.trait==="prodigy" && a.years>=1) a.revealed=true;    // you can see what he really is now
    // ── Loyalty: time served and money paid ──
    var pr=paidRatio(a);
    // Ambition pulls him AWAY every single year. A Rising Star drifts unless you actively pay to
    // hold him; a Lifer settles in on his own. Without this, doing nothing was nearly as good as
    // managing your staff, which made the whole retention game pointless.
    var drift = (ti.amb - 0.8) * 9;              // Rising +1.7 → -8/yr · Lifer 0.25 → +5/yr
    a.loyalty = clampN((a.loyalty||50)
      + (a.years>=2 ? 5 : 0)
      + (pr>=1.25 ? 14 : pr>=1.10 ? 9 : pr>=1.0 ? 3 : -9)   // underpay him and he starts taking calls
      + (won ? 3 : -2)
      - drift, 0, 100);
    a.loyalty = Math.round(a.loyalty);   // keep it a clean integer for display
    // ── Does somebody come for him? ──
    // Ambition, quality and your success all raise the risk; loyalty and money hold him.
    var risk = Math.max(0, (a.grade-76)/110) * (ti.amb||1);
    if((s.wins||0)>=10) risk += 0.08;            // winning makes your assistants famous
    if(a.years>=3) risk += 0.04;
    // TUNED: loyalty is the whole retention lever, so it has to BITE. At the old divisor a coach
    // who matched every offer and handed out raises still lost 2.4 of 4 assistants over 8 years —
    // management barely mattered. A genuinely loyal, well-paid man now stays.
    risk *= Math.max(0.05, 1 - (a.loyalty||50)/105);
    if(a.justMatched){ risk *= 0.25; a.justMatched=false; }  // you just paid him; he's not leaving again
    risk = Math.min(0.55, risk);
    if(Math.random() < risk){
      // NOT a silent theft — it's an offer you get to answer.
      var mkt=marketRate(a);
      s._staffOffers.push({
        id:"so"+Math.random().toString(36).slice(2,6),
        role:k, n:a.n, grade:a.grade, trait:a.trait,
        suitor:staffSuitor(),
        newSalary:money2(Math.max(a.salary*1.35, mkt*1.30)),
        done:false
      });
    } else {
      a.salary=money2(Math.max(a.salary, marketRate(a)*0.92)); // the market drags his price up
    }
  });
  s.staffPool=genStaffPool();
  if(staffLeft() < 0) toast("⚠️ Your staff now costs more than your budget — trim the payroll.");
  if((s._staffOffers||[]).length) toast("📣 "+s._staffOffers.length+" of your assistants have outside offers — match them or lose them.");
}
// Who's trying to hire him away.
function staffSuitor(){
  var s=ST.save, L=s.league, cands=[];
  if(L&&L.teams) Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n];
    if(t.div!==myDivision() || n===s.school) return;
    if((t.p||3) >= (s.prestige||3)) cands.push(n);
  });
  return cands.length ? pick(cands) : "a bigger program";
}
// Any offer you never answered = he walks.
function resolveStaffOffers(){
  var s=ST.save;
  (s._staffOffers||[]).forEach(function(o){
    if(o.done) return;
    if(s.staff && s.staff[o.role]){ s.staff[o.role]=null; }
    o.done=true;
  });
  s._staffOffers=[];
}

// ═════════════════════════════════════════════════════════
// STAR PLAYERS ON CPU TEAMS + END-OF-SEASON AWARDS
// Awards need a FIELD. CPU teams are only ratings — they have no players — so without
// opponents every trophy would go to your guy by default. Each team in your subdivision
// therefore carries a small set of named stars (one per position) who age, graduate, and
// post a stat line every year. They are the field you have to beat.
//
// Their stat lines are calibrated against the real engine's output, measured by simming
// full seasons: an FBS QB throws for ~2,400–3,300; a lead back runs for ~1,100–1,400; a
// star LB makes ~80–110 tackles; FCS numbers run a bit lower on an 11-game slate. Note the
// engine's own stats track rating only loosely (scheme, tempo and game script matter more),
// so stars get real variance and the race stays honest.
// ═════════════════════════════════════════════════════════
function starOvrFor(t, pos){
  // CALIBRATED against real generated rosters. Star ratings REGRESS TOWARD THE MEAN: a
  // 90-rated Alabama's best QB comes out around 84 (offset -6), while a 70-rated Furman's best
  // is a 76 (offset +6). A single flat offset therefore can't serve both — it made CPU stars
  // too strong in FBS (you never won an award) and too weak in FCS (you won them all). This
  // line is the fitted curve through both, so the field is honest at every level.
  var base = 0.575*(t.ovr||70) + 34.25;
  return clampN(Math.round(base + rnd(-4,4) + (pos==="QB"?1:0)), 48, 99);
}
function genStars(t){
  return ALL_POS.map(function(pos){
    return {n:genName(), pos:pos, yr:pick(["FR","SO","JR","SR"]), ovr:starOvrFor(t,pos),
            s:{}, c:{}, form:0.84+Math.random()*0.32};
  });
}
// Give every team in YOUR subdivision a cast of stars (your own team has a real roster).
function ensureStars(){
  var s=ST.save, L=s.league; if(!L||!L.teams) return;
  var myDiv=myDivision();
  Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n];
    if(t.div!==myDiv || n===s.school) return;
    if(!t.stars || !t.stars.length) t.stars=genStars(t);
  });
}
// A star's season, in the same units the engine produces for your own players.
function genStarStats(st, games, raw){
  var q=(st.ovr-70), g=games||12;
  // SEASON FORM. Accruing a season game-by-game averages the per-game noise away (central
  // limit), so every CPU star finished within a few percent of the mean while your own engine
  // stats stayed volatile — and you won the Payton 5 years in 6. A form factor rolled ONCE per
  // season restores real season-to-season spread: some years a player is just on one.
  var form = st.form || 1;
  var nz=function(){ return (0.87 + Math.random()*0.26) * form; };   // ±13% game noise × season form
  // `raw` keeps fractions. Rounding EVERY GAME is a trap: a 0.63-sack-per-game lineman rounds
  // to 1 every single week and finishes with 11 sacks, and every DL in the country lands on the
  // same inflated number. Accrue fractions, round only when the number is shown.
  var sc=function(v){ var x=Math.max(0, v*nz()*g/12); return raw?x:Math.round(x); };
  // Touchdowns need the same treatment: a back scoring 0.97 TD/game rounds up to 1 every week.
  var td=function(v){ var x=Math.max(0, v*nz()); return raw?x:Math.round(x); };
  // TUNED against the engine's measured output. The key finding: the sim's box scores are
  // only WEAKLY tied to rating — a 72 OVR lineman still gets ~10 sacks, and a mid QB can
  // out-throw an elite one. An earlier version scaled these linearly with OVR, which starved
  // the (lower-rated) FCS field and handed you the Heisman 9 years in 10. Flat bases, gentle
  // slopes.
  var o={g:g};
  if(st.pos==="QB"){ o.py=sc(2600+q*25); o.ptd=td(o.py/150); }
  else if(st.pos==="RB"){ o.ry=sc(1050+q*20); o.rtd=td(o.ry/110); }
  else if(st.pos==="WR"){ o.recy=sc(850+q*18); o.rectd=td(o.recy/170); }
  else if(st.pos==="TE"){ o.recy=sc(430+q*12); o.rectd=td(o.recy/150); }
  else if(st.pos==="OL"){ /* no box score — a lineman is judged on how he plays */ }
  else if(st.pos==="DL"){ o.sack=sc(8+q*0.18); o.tkl=sc(45+q*1.0); }
  // Interceptions are matched to the ENGINE's own (generous) output — it hands a good LB
  // 8-15 picks a year. Starve the CPU here and you'd win Defensive POY literally every season;
  // the Heisman ballot is kept honest by the offensive weighting below, not by nerfing defenders.
  else if(st.pos==="LB"){ o.tkl=sc(80+q*1.6); o.sack=sc(3+q*0.15); o.dint=sc(4+q*0.30); }
  else { o.dint=sc(5+q*0.30); o.tkl=sc(48+q*0.9); }   // CB / S
  return o;
}
// One number for "how good was his year". Production leads; rating and team success matter,
// because voters never give the trophy to a great player on a losing team.
function awardScore(pos, st, ovr, teamWins){
  st=st||{};
  var v=0;
  v += (st.py||0)/300   + (st.ptd||0)*0.8;
  v += (st.ry||0)/190   + (st.rtd||0)*1.0;
  v += (st.recy||0)/190 + (st.rectd||0)*1.0;
  v += (st.tkl||0)/16   + (st.sack||0)*1.3 + (st.dint||0)*1.5;
  if(pos==="OL") v += (ovr-70)*1.10;    // no box score, so the eye test carries him
  v += (ovr-70)*0.55;                   // the tape matters: a great player is a great player
  v += (teamWins||0)*0.45;              // winning players win awards
  return v;
}
var OFF_AWARD_POS={QB:1,RB:1,WR:1,TE:1,OL:1};
// ── The real award slates ────────────────────────────────
// FBS and FCS hand out different hardware, and the FCS awards are NOT just renamed Heismans:
// the Walter Payton is the FCS OFFENSIVE player of the year, not an overall POY. (An earlier
// pass treated it as a Heisman equivalent and handed the same player both it and "Offensive
// POY" — the FCS simply has no overall-player award, so there's no top prize here at all.)
var AWARD_SLATE={
  FBS:{
    top:  "Heisman Trophy",                       // best player in the country
    off:  "Maxwell Award",                        // best offensive player (often the same man — as in life)
    def:  "Bednarik Award",                       // defensive player of the year
    frosh:"Shaun Alexander Freshman of the Year",
    coach:"AP Coach of the Year",
    pos:  {QB:"Davey O'Brien Award", RB:"Doak Walker Award", WR:"Biletnikoff Award",
           TE:"John Mackey Award",   OL:"Outland Trophy",    DL:"Ted Hendricks Award",
           LB:"Butkus Award",        DB:"Jim Thorpe Award"}
  },
  FCS:{
    top:  null,                                   // the FCS has no overall player of the year
    off:  "Walter Payton Award",                  // FCS offensive player of the year
    def:  "Buck Buchanan Award",                  // FCS defensive player of the year
    frosh:"Jerry Rice Award",                     // FCS freshman of the year
    coach:"Eddie Robinson Award",                 // FCS coach of the year
    pos:  null                                    // no positional national awards in the FCS
  }
};
function awardSlate(){ return AWARD_SLATE[myDivision()] || AWARD_SLATE.FBS; }
// Jim Thorpe covers the whole secondary, so corners and safeties compete for one trophy.
function awardPosGroup(pos){ return (pos==="CB"||pos==="S") ? "DB" : pos; }
// Coach of the Year goes to whoever most outran his expectations — you're eligible.
function runCoachAward(){
  var s=ST.save, L=s.league, best=null;
  var mine=(s.wins||0) - (s.expectWins||0);
  best={coach:"You", school:s.school, over:mine, wins:s.wins||0, you:true};
  if(L&&L.teams) Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n];
    if(t.div!==myDivision() || n===s.school) return;
    var over=(t.w||0) - expectWinsFor(t.p, t.c);
    if(over>best.over){ best={coach:n+" HC", school:n, over:over, wins:t.w||0, you:false}; }
  });
  return best;
}
// Build the whole national field: your real players + every CPU team's stars.
function awardField(){
  var s=ST.save, L=s.league, field=[];
  var myDiv=myDivision();
  var games=(s.schedule||[]).length||12;
  (s.roster||[]).forEach(function(p){
    if(p.cut) return;
    var st=(p.stats&&p.stats.season)||{};
    field.push({n:p.n, pos:p.pos, yr:yrLabel(p), ovr:p.ovr, school:s.school, conf:s.conf,
                you:true, id:p.id, st:st,
                score:awardScore(p.pos, st, p.ovr, s.wins||0)});
  });
  if(L&&L.teams) Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n];
    if(t.div!==myDiv || n===s.school || !t.stars) return;
    t.stars.forEach(function(stp){
      var st=stp.s||{};                  // REAL stats, accrued game by game all season
      field.push({n:stp.n, pos:stp.pos, yr:stp.yr, ovr:stp.ovr, school:n, conf:t.c,
                  you:false, st:st, star:stp,
                  score:awardScore(stp.pos, st, stp.ovr, t.w||0)});
    });
  });
  return field;
}
// Hand out the hardware.
function runAwards(){
  var s=ST.save, year=2026+((s.seasonsPlayed||1)-1);
  ensureStars();
  var field=awardField();
  if(!field.length) return;
  var SL=awardSlate();
  var best=function(list){ return list.slice().sort(function(a,b){return b.score-a.score;})[0]; };
  var off=field.filter(function(p){return OFF_AWARD_POS[p.pos];});
  var def=field.filter(function(p){return !OFF_AWARD_POS[p.pos];});
  var res={year:year, div:myDivision(), slate:SL, named:[]};

  // Overall player of the year (FBS only). The Heisman is an offensive award in practice,
  // so a defender needs a monster year to take it.
  if(SL.top){
    var ballot=field.map(function(p){
      var q={}; for(var k in p) q[k]=p[k];
      if(!OFF_AWARD_POS[p.pos]) q.score=p.score*0.88;
      return q;
    });
    res.top = best(ballot);
  }
  res.off = off.length?best(off):null;
  res.def = def.length?best(def):null;
  var frosh = field.filter(function(p){ return /FR$/.test(p.yr); });
  res.frosh = frosh.length?best(frosh):null;
  var myConf = field.filter(function(p){ return p.conf===s.conf; });
  res.confPOY = myConf.length?best(myConf):null;
  res.coach = runCoachAward();
  // Positional trophies (FBS only — the FCS has none).
  res.posAwards=[];
  if(SL.pos){
    Object.keys(SL.pos).forEach(function(grp){
      var pool=field.filter(function(p){ return awardPosGroup(p.pos)===grp; });
      if(!pool.length) return;
      var w=best(pool);
      res.posAwards.push({award:SL.pos[grp], w:w});
    });
  }
  res.allAmerica = ALL_POS.map(function(pos){
    return best(field.filter(function(p){return p.pos===pos;}));
  }).filter(Boolean);

  s._lastAwards=res;
  // Bank anything YOUR players won — that's the permanent trophy case.
  s.awards=s.awards||[];
  var mine=[];
  var add=function(w, label){
    if(!w || !w.you || !label) return;
    s.awards.push({year:year, award:label, n:w.n, pos:w.pos, school:s.school, div:res.div});
    mine.push(w.n);
    var pl=(s.roster||[]).filter(function(r){return r.id===w.id;})[0];
    if(pl){ pl.awards=pl.awards||[]; pl.awards.push(label+" ("+year+")"); }
  };
  add(res.top,   SL.top);
  add(res.off,   SL.off);
  add(res.def,   SL.def);
  add(res.frosh, SL.frosh);
  add(res.confPOY, s.conf+" Player of the Year");
  res.posAwards.forEach(function(pa){ add(pa.w, pa.award); });
  res.allAmerica.forEach(function(w){ add(w, "All-America ("+w.pos+")"); });
  // The coach award is yours, not a player's.
  if(res.coach && res.coach.you){
    s.awards.push({year:year, award:SL.coach, n:"You", pos:"HC", school:s.school, div:res.div});
    s.coachAwards=(s.coachAwards||0)+1;
    toast("🏆 You won the "+SL.coach+"!");
  }
  if(mine.length) toast("🏅 "+mine.length+" award"+(mine.length===1?"":"s")+" for your players!");
}
// Stars age with the calendar: seniors move on and a new face takes their place.
function ageStars(){
  var s=ST.save, L=s.league; if(!L||!L.teams) return;
  var YR_NEXT={FR:"SO",SO:"JR",JR:"SR"};
  Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n];
    if(!t.stars) return;
    t.stars=t.stars.map(function(st){
      // Seniors graduate, and juniors who declared for the draft are gone too — a fresh face
      // takes the job, with no stats to his name yet.
      if(st.yr==="SR" || st._declared)
        return {n:genName(), pos:st.pos, yr:pick(["FR","SO"]), ovr:starOvrFor(t,st.pos),
                s:{}, c:{}, form:0.84+Math.random()*0.32};
      st.yr=YR_NEXT[st.yr]||st.yr;
      // They develop — but against a CEILING tied to their program. Unbounded growth (+1.5 a
      // year) quietly inflated the whole country: the national draft class went 41 → 57 → 122
      // over three seasons as everyone drifted toward 99. A star can outgrow his program, but
      // only so far.
      // Ceiling sits just above the program's baseline. At +8 every star eventually maxed out,
      // and the FCS draft class inflated from 18 to 65 over a dynasty as the whole country
      // drifted into draftable range. A star can outgrow his program — but only a little.
      var ceil=Math.round(0.575*(t.ovr||70) + 34.25) + 4;
      st.ovr=clampN(st.ovr+rnd(-1,3), 48, Math.min(99, ceil));
      st.last=st.s;                               // keep the year he just played — the portal shows it
      st.s={};                                    // new season, fresh stat line (career carries)
      st.form=0.84+Math.random()*0.32;            // and a fresh roll of form
      return st;
    });
  });
}

// ═════════════════════════════════════════════════════════
// PLAYER RECORD BOOK + NFL DRAFT
// Two payoffs for developing players, both built on stats you already track.
//   RECORD BOOK — the best single-season and career marks ever posted by a player YOU
//                 coached, kept per program (and totalled across your career).
//   DRAFT NIGHT — seniors go pro, and juniors good enough to be early-round picks
//                 declare early and leave you a hole. Developing talent finally pays.
// ═════════════════════════════════════════════════════════
var REC_CATS=[
  {k:"py",   t:"Passing Yards"},   {k:"ptd",   t:"Passing TDs"},
  {k:"ry",   t:"Rushing Yards"},   {k:"rtd",   t:"Rushing TDs"},
  {k:"recy", t:"Receiving Yards"}, {k:"rectd", t:"Receiving TDs"},
  {k:"tkl",  t:"Tackles"},         {k:"sack",  t:"Sacks"},
  {k:"dint", t:"Interceptions"}
];
// Fold this season's roster into the record book. Called at season's end, while season
// stats are still live and before seniors graduate — so a senior's final year still counts.
function updateRecordBook(){
  var s=ST.save, year=2026+((s.seasonsPlayed||1)-1);
  s.recordBook=s.recordBook||{};
  var bk=s.recordBook[s.school]=s.recordBook[s.school]||{season:{},career:{}};
  (s.roster||[]).forEach(function(p){
    var ss=(p.stats&&p.stats.season)||{}, cc=(p.stats&&p.stats.career)||{};
    REC_CATS.forEach(function(c){
      var sv=ss[c.k]||0;
      if(sv>0 && (!bk.season[c.k] || sv>bk.season[c.k].val))
        bk.season[c.k]={n:p.n,pos:p.pos,yr:p.yr,year:year,val:sv};
      // career marks grow every year a player stays, so his final total is what sticks
      var cv=cc[c.k]||0;
      if(cv>0 && (!bk.career[c.k] || cv>bk.career[c.k].val))
        bk.career[c.k]={n:p.n,pos:p.pos,yr:p.yr,year:year,val:cv};
    });
  });
}

// ── Draft stock ──────────────────────────────────────────
// Anchored to OVR so it stays intuitive, then nudged by production, position value, and
// remaining upside. FCS players are scouted less, so they need a bigger year to get picked.
var DRAFT_POS_VAL={QB:3,OL:1,DL:1,WR:1,CB:1,TE:0,LB:0,S:0,RB:-1};
function draftStock(p){
  // TUNED: stock must track OVR closely, or the modifiers swamp it. An earlier version gave
  // every productive starter the full production bonus, which turned an ordinary 80 OVR WR
  // into a 2nd-round pick who left early. Talent leads; production and position only nudge.
  var st=p.ovr;
  st += Math.min(4, prodScore(p)*0.4);                 // production gets you on the board
  st += (DRAFT_POS_VAL[p.pos]||0);                     // premium positions get pushed up
  st += Math.min(1.5, Math.max(0,(p.pot-p.ovr))*0.25); // remaining upside
  return st;
}
// Where a prospect lands, accounting for his level. FCS players are scored on the same scale
// and then slide two rounds — good enough and you're still drafted; borderline and you're not.
function draftRoundFor(stock, div){
  var rd=draftRound(stock);
  if(div!=="FCS") return rd;
  if(!rd) return null;
  rd+=3;
  return rd>7 ? null : rd;
}
// Where that stock lands you. null = undrafted. Calibrated so a ~90 OVR star goes in the
// first round, 85–89 is a day-two pick, low 80s is a late flier, and below that you go UDFA.
function draftRound(stock){
  if(stock>=91) return 1;
  if(stock>=89) return 2;
  if(stock>=87) return 3;
  if(stock>=85) return 4;
  if(stock>=83) return 5;
  if(stock>=81) return 6;
  if(stock>=79) return 7;
  return null;
}
// A junior only leaves early if he projects as a TOP-3-ROUND pick — that's the real
// trade-off: your best players are exactly the ones you can lose a year early.
function willDeclareEarly(p){
  return p.yr==="JR" && !!draftRoundFor(draftStock(p), myDivision()) && draftStock(p)>=88;
}
// Run the draft. Seniors are all draft-eligible; juniors must declare. Marks early entrants
// so the graduation pass removes them from the roster.
function runDraft(){
  var s=ST.save, year=2026+((s.seasonsPlayed||1)-1);
  var picks=[], undrafted=[], national=[];
  // ── Your players ──
  (s.roster||[]).forEach(function(p){
    if(p.cut) return;
    var senior=(p.yr==="SR"), early=willDeclareEarly(p);
    if(!senior && !early) return;
    if(early) p._declared=true;                 // he's gone — the graduation pass drops him
    var stock=draftStock(p), rd=draftRoundFor(stock, myDivision());
    var entry={n:p.n, pos:p.pos, ovr:p.ovr, yr:p.yr, early:!!early, you:true,
               school:s.school, div:myDivision(), year:year, stock:stock,
               st:(p.stats&&p.stats.season)||{}};
    if(rd){ entry.round=rd; picks.push(entry); national.push(entry); }
    else if(senior) undrafted.push(entry);      // an undeclared junior simply stays
  });
  // ── The rest of the country: every other program's stars are draft-eligible too ──
  var L=s.league;
  if(L&&L.teams) Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n];
    if(t.div!==myDivision() || n===s.school || !t.stars) return;
    t.stars.forEach(function(stp){
      var senior=(stp.yr==="SR"), early=starWillDeclare(stp, t);
      if(!senior && !early) return;
      if(early) stp._declared=true;
      var stock=starDraftStock(stp, t), rd=draftRoundFor(stock, t.div);
      if(!rd) return;                           // undrafted CPU players aren't worth listing
      national.push({n:stp.n, pos:stp.pos, ovr:stp.ovr, yr:stp.yr, early:!!early, you:false,
                     school:n, div:t.div, year:year, round:rd, stock:stock, st:stp.s||{}});
    });
  });
  // ── Draft order: best prospect in the country goes first, round by round ──
  // A real draft is SEVEN ROUNDS OF THIRTY-TWO. Without that cap the board bulged absurdly
  // (46 players "in round 2"), so overflow slides down a round, and anyone past pick 224
  // goes undrafted — exactly how a hard-capped board behaves.
  var PICKS_PER_ROUND=32, MAX_ROUND=7;
  national.sort(function(a,b){ return (a.round-b.round) || (b.stock-a.stock); });
  var pickNo={}, board=[];
  national.forEach(function(e){
    var rd=e.round;
    while(rd<=MAX_ROUND && (pickNo[rd]||0)>=PICKS_PER_ROUND) rd++;   // this round is full — slide
    if(rd>MAX_ROUND) return;                                          // off the board entirely
    e.round=rd;
    pickNo[rd]=(pickNo[rd]||0)+1;
    e.pick=pickNo[rd];
    board.push(e);
  });
  var myPicks=board.filter(function(e){return e.you;});   // only those who actually got picked
  s.draftHistory=(s.draftHistory||[]).concat(myPicks.map(function(e){
    return {n:e.n,pos:e.pos,ovr:e.ovr,yr:e.yr,early:e.early,school:e.school,div:e.div,year:e.year,round:e.round,pick:e.pick};
  }));
  // Keep the top two rounds for the Draft Night board; the full class is summarised by count.
  s._lastDraft={year:year, picks:myPicks, undrafted:undrafted,
                board:board.slice(0,64), total:board.length,
                r1:board.filter(function(e){return e.round===1;}).length};
  if(myPicks.length){
    var r1=myPicks.filter(function(d){return d.round===1;}).length;
    toast("🏈 Draft: "+myPicks.length+" of your players selected"+(r1?" · "+r1+" in Round 1":""));
  }
}
// A CPU star's draft stock, on the same scale as yours (production + rating + level).
function starDraftStock(stp, t){
  var st=stp.s||{};
  var prod=0;
  prod += (st.py||0)/380 + (st.ptd||0)*0.30;
  prod += (st.ry||0)/230 + (st.rtd||0)*0.55;
  prod += (st.recy||0)/230 + (st.rectd||0)*0.55;
  prod += (st.sack||0)*0.55 + (st.dint||0)*0.55 + (st.tkl||0)/28;
  return stp.ovr + Math.min(4, prod*0.4) + (DRAFT_POS_VAL[stp.pos]||0);
}
function starWillDeclare(stp, t){
  return stp.yr==="JR" && !!draftRoundFor(starDraftStock(stp,t), t.div) && starDraftStock(stp,t)>=88;
}

  if(!hist.length){

  }

  // Group consecutive seasons into STINTS (one block per school, per spell there).
  // Rows saved before the record book existed lack some fields — fill in what we can
  // so an in-progress dynasty still renders a sane table.
  hist = hist.map(function(e){
    var o={}; for(var k in e) o[k]=e[k];

      cur={school:e.school, conf:e.conf||"", div:e.div||"FBS", rows:[]};
      stints.push(cur);
    }
    cur.rows.push(e);
  });

  var cW=0,cL=0,cCW=0,cCL=0,confRings=0,natlRings=0,natlFBS=0,natlFCS=0;
  stints.forEach(function(st){

       '<span class="rec-cf">Conf</span><span class="rec-st">Stand</span><span class="rec-po">Postseason</span></div>';
    st.rows.forEach(function(e){

      if(e.confTitle) confRings++;
      if(e.natlTitle){ natlRings++; if((e.div||"FBS")==="FCS") natlFCS++; else natlFBS++; }
      var rings=(e.natlTitle?' <span class="rec-ring">🏆</span>':'')+(e.confTitle?' <span class="rec-ring">◆</span>':'');

         '<span class="rec-yr">'+e.year+'</span>'+
         '<span class="rec-ov">'+e.wins+'–'+e.losses+'</span>'+
         '<span class="rec-cf">'+(e.cw!=null?(e.cw+'–'+e.cl):'—')+'</span>'+
         '<span class="rec-st">'+stand+'</span>'+
         '<span class="rec-po">'+x(e.post||"—")+rings+'</span></div>';
    });
    cW+=sw; cL+=sl; cCW+=scw; cCL+=scl;
    h+='<div class="rec-sub"><span class="rec-yr">'+x(st.school)+':</span>'+
       '<span class="rec-ov">'+sw+'–'+sl+'</span>'+
       '<span class="rec-cf">'+scw+'–'+scl+'</span>'+
       '<span class="rec-st"></span><span class="rec-po">'+pctLabel(sw,sl)+'</span></div>';
    h+='</div>';
  });

  h+='<div class="rec-tbl"><div class="rec-total"><span class="rec-yr">Total:</span>'+
     '<span class="rec-ov">'+cW+'–'+cL+'</span>'+
     '<span class="rec-cf">'+cCW+'–'+cCL+'</span>'+

    if(natlFBS) h+='<div class="riv-row"><span class="riv-opp">🏆 FBS National Championship</span><span class="riv-rec">×'+natlFBS+'</span></div>';

  var st=w.st||{}, R=function(v){ return Math.round(v||0); };

  if(st.ry)   return R(st.ry)+" yd · "+R(st.rtd)+" TD";

  return w.ovr+" OVR";

function rosterNeeds(){

function spent(){ var s=0; ST.recruitClass.forEach(function(r){ if(ST.signed[r.id]) s+=r.cost; }); return s; }
// One card: the season expectation, job security, and — folded inside it — the AD's three
// goals. The whole header is the toggle, so there's no separate "Season Goals" strip eating a
// row of its own. Opens at the start of each season, then remembers your choice.
function expectBanner(){
  var s=ST.save;
  var sec=securityLabel(s.jobSecurity);
  var gs=resolvedGoals();
  var nMet=0; gs.forEach(function(g){ if(g.met)nMet++; });
  var open = !s._goalsCollapsed;
  var locked=!!s._pledgeLocked;

  var h='<div class="expect-card'+(open?" open":"")+'">';
  // NB: <button> only accepts phrasing content — a <div> inside one is invalid and Safari can
  // collapse the flex layout. Spans with display:block give identical rendering, legally.
  h+='<button class="expect-bar" id="goal-toggle" aria-expanded="'+(open?"true":"false")+'">';
  h+='<span class="exp-left"><span class="exp-lbl">'+(locked?'You promised the board':'Your promise to the board')+'</span>'+
     '<span class="exp-goal">'+x(pledgeLabel())+'</span>'+
     '<span class="exp-sub">'+(locked ? x(s.school)+' &middot; '+x(s.conf)
                                      : '<b style="color:var(--purple)">Tap to change</b>')+'</span></span>';
  // Preseason the money is the decision, so show the budget you're bargaining for. In season the
  // money's already banked — what matters is how much is LEFT and how hot your seat is.
  h+='<span class="exp-right">'+
     '<span class="exp-nil">'+fmtMoney(locked ? (s.nilLeft||0) : (s.nilTotal||nilBudgetFor()))+'</span>'+
     '<span class="exp-secbar"><span class="exp-secfill" style="width:'+Math.max(4,Math.min(100,s.jobSecurity))+'%;background:'+sec.c+'"></span></span>'+
     '<span class="exp-sub" style="color:'+sec.c+'">'+sec.t+' &middot; NIL '+(locked?'left':'')+'</span></span>';
  h+='<span class="exp-toggle"><span class="exp-cnt">'+nMet+'/'+gs.length+'</span>'+
     '<span class="exp-chev">'+(open?"▾":"▸")+'</span></span>';
  h+='</button>';

  if(open){
    // Preseason: the expectation is a CHOICE. Pick it here, and everything below re-reads.
    if(!locked){
      // THREE SLOTS you swap independently. Ambition on any one of them buys money — and only
      // that goal's stake is at risk if you miss it.
      var pl=pledge();
      var SLOTS=[
        {k:"wins", t:"Wins",        opts:winsSlot(), cur:pl.w},
        {k:"post", t:"Postseason",  opts:postSlot(), cur:pl.p},
        {k:"prog", t:"Recruiting",  opts:progSlot(), cur:pl.g}
      ];
      h+='<div class="pledge-pick">';
      SLOTS.forEach(function(sl){
        h+='<div class="slot">';
        h+='<div class="slot-h"><span>'+sl.t+'</span>'+
           '<span class="slot-amb">'+(sl.cur.amb ? '★'.repeat(Math.min(5,sl.cur.amb)) : 'no promise')+'</span></div>';
        h+='<div class="slot-opts">';
        var others=pl.amb - sl.cur.amb;
        sl.opts.forEach(function(o,i){
          var on=(o.t===sl.cur.t);
          var stk=goalStakes(o.amb);
          var barred=(others + o.amb) > maxAmbAllowed();   // your word isn't worth this much
          h+='<button class="slot-opt'+(on?" on":"")+(barred?" barred":"")+'" data-goal="'+sl.k+':'+i+'">'+
             '<b>'+x(o.t)+'</b>'+
             '<span class="'+(o.amb>=4?'hot':'')+'">'+(barred?"won\u2019t hear it":('+'+stk.win+' / '+stk.miss))+'</span>'+
             '</button>';
        });
        h+='</div></div>';
      });
      h+='</div>';
      var tb=trustBand(), tf=trustFactor();
      h+='<div class="trust-row">'+
           '<span class="trust-l">Board trust'+
             '<span class="trust-bar"><span class="trust-fill" style="width:'+Math.max(3,boardTrust())+'%;background:'+tb.c+'"></span></span>'+
           '</span>'+
           '<span class="trust-r" style="color:'+tb.c+'"><b>'+x(tb.t)+'</b><span>'+x(tb.d)+'</span></span>'+
         '</div>';
      h+='<div class="pledge-foot">Each goal is judged on its own \u2014 <b>hit two of three and you\u2019re rewarded for two of three</b>.<br>'+
         'Ambition buys NIL, but only as far as they believe you'+
         (tf<0.95 ? ' \u2014 they\u2019re funding <b>'+Math.round(tf*100)+'%</b> of what you\u2019re asking for' : '')+
         '. <b>'+x(pledgeLabel())+'</b> \u2192 '+fmtMoney(nilBudgetFor())+'.</div>';
    }
    h+=goalChecklist(false);
    if(locked){
      // The promise is live all season, and so is what it's doing to your standing.
      var tb3=trustBand();
      var gsx=resolvedGoals(), hit=gsx.filter(function(g){return g.met;}).length;
      var dead=gsx.filter(function(g){return g.dead && !g.met;}).length;
      var pl3=pledge(), ambs=[pl3.w.amb, pl3.p.amb, pl3.g.amb];
      var swing=0;
      gsx.forEach(function(g,i){ var st=goalStakes(ambs[i]||0); swing += g.met ? st.win : st.miss; });
      h+='<div class="trust-row">'+
         '<span class="trust-l">Board trust'+
           '<span class="trust-bar"><span class="trust-fill" style="width:'+Math.max(3,boardTrust())+'%;background:'+tb3.c+'"></span></span>'+
         '</span>'+
         '<span class="trust-r" style="color:'+tb3.c+'"><b>'+x(tb3.t)+'</b>'+
           '<span>If the season ended now: <b style="color:'+(swing>=0?'#1a7f37':'var(--red2)')+'">'+
             (swing>=0?'+':'')+swing+' security</b></span></span></div>';
      if(dead) h+='<div class="pledge-foot" style="color:var(--red2)">'+
         '<b>'+dead+'</b> of your promises '+(dead===1?'is':'are')+' already out of reach. The board will still hold you to '+(dead===1?'it':'them')+'.</div>';
    }
  }
  h+='</div>';
  return h;
}
