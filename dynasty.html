// ═════════════════════════════════════════════════════════
// EXPLAINERS (tap-to-open, closeable)
// Everything in this game was explained through the HTML `title` attribute — which fires on
// desktop hover and NEVER fires on a phone. So every explanation I wrote (what a Diva does, what
// RES means, why a chip is red) was invisible to the person actually playing. Any element carrying
// data-info-t opens a real sheet instead, with a close button.
// ═════════════════════════════════════════════════════════
// ── DISMISSIBLE HELPER NOTES ──────────────────────────────
// The game explains itself in long grey paragraphs that you have to scroll past EVERY time you
// open a screen — forever, long after you've learned the rule. A note can now be dismissed with
// an ✕, and it stays dismissed. Nothing is lost: it collapses to a small ⓘ that reopens the full
// text in the explainer sheet, so a rule you half-remember is always one tap away.
function noteDismissed(key){
  var s=ST.save;
  return !!(s && s._notes && s._notes[key]);
}
function dismissNote(key){
  var s=ST.save; if(!s) return;
  s._notes=s._notes||{};
  s._notes[key]=1;
  persist(); draw();
}
function resetNotes(){
  var s=ST.save; if(!s) return;
  s._notes={};
  toast("Tips restored.");
  persist(); draw();
}
// title = what it's about (used by the ⓘ sheet). body may contain simple HTML.
function helpNote(key, title, body){
  if(noteDismissed(key)){
    return '<button class="note-i" data-noteopen="'+x(key)+'"'+infoAttr(title, stripTags(body))+'>ⓘ '+x(title)+'</button>';
  }
  return '<div class="note" id="note-'+x(key)+'">'+
           '<div class="note-b">'+body+'</div>'+
           '<button class="note-x" data-notedismiss="'+x(key)+'" title="Got it — don\u2019t show again">✕</button>'+
         '</div>';
}
function stripTags(s){ return String(s).replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim(); }
function infoAttr(title, body){
  return ' title="'+x(title)+' — '+x(body)+'" data-info-t="'+x(title)+'" data-info-b="'+x(body)+'"';
}
// ── PLAYER CARD (opens from anywhere) ─────────────────────
// Player names were dead text on the roster, the stat leaders and the national board. Any name
// carrying data-pcard now opens the same sheet: who he is, what he's done, and what he costs.
function pcardAttr(id){ return ' data-pcard="'+id+'"'; }
function playerCardSheet(){
  var s=ST.save;
  if(!ST.pcard || !s) return '';
  var p=(s.roster||[]).filter(function(x){return x.id===ST.pcard;})[0];
  if(!p){ ST.pcard=null; return ''; }
  var st=(p.stats&&p.stats.season)||{}, ca=(p.stats&&p.stats.career)||{};
  var tier=tierOf(p), TN={ST:"Starter",BK:"Backup",RES:"Reserve"};
  var pi=hasPersonality(p)?persInfo(p.pers):null;
  var dem=nilDemand(p), risk=retentionRisk(p), fund=money2(p.nilFund||0);
  var line=function(o){
    var out=[];
    if(o.py)   out.push(Math.round(o.py)+" pass yd · "+Math.round(o.ptd||0)+" TD"+(o.pint?" · "+Math.round(o.pint)+" INT":""));
    if(o.ry)   out.push(Math.round(o.ry)+" rush yd · "+Math.round(o.rtd||0)+" TD");
    if(o.recy) out.push(Math.round(o.rec||0)+" rec · "+Math.round(o.recy)+" yd · "+Math.round(o.rectd||0)+" TD");
    if(o.tkl)  out.push(Math.round(o.tkl)+" tkl"+(o.sack?" · "+Math.round(o.sack)+" sk":"")+(o.dint?" · "+Math.round(o.dint)+" INT":""));
    return out.length?out.join("<br>"):"—";
  };
  var h='<div class="info-scrim" id="pcard-scrim"></div><div class="info-sheet pcard">';
  h+='<div class="info-hd"><b>'+x(p.n)+'</b><button class="info-x" id="pcard-close">✕</button></div>';
  h+='<div class="pc-top"><span class="pl-pos" style="background:'+posColor(p.pos)+'">'+p.pos+'</span>'+
     '<span class="pc-ovr">'+p.ovr+'</span>'+
     '<span class="pc-sub">'+yrLabel(p)+' · '+x(p.arch||"")+'<br>'+
       '<b>'+(TN[tier]||tier)+'</b>'+(p.pot?' · '+ceilingBand(p):'')+'</span></div>';
  var chips='';
  if(p.revealed) chips+=devChip(p.dev);
  if(pi) chips+='<span class="chip pers">'+pi.ico+' '+x(pi.t)+'</span>';
  if(p.rs) chips+='<span class="chip">RS — redshirted</span>';
  if(isRedshirting(p)) chips+='<span class="chip bad">🔴 Redshirting now</span>';
  if(chips) h+='<div class="chips" style="margin:8px 0 4px">'+chips+'</div>';
  if(pi) h+='<div class="pc-note">'+x(pi.desc)+'</div>';

  h+='<div class="pc-grid">'+
     '<div class="pc-cell"><span>This season</span><b>'+line(st)+'</b></div>'+
     '<div class="pc-cell"><span>Career</span><b>'+line(ca)+'</b></div>'+
     '<div class="pc-cell"><span>Games played</span><b>'+gamesPlayed(p)+
       (rsAvailable(p)?' <span style="color:'+(rsSafe(p)?'var(--muted)':'var(--red2)')+'">of '+RS_GAME_LIMIT+' before his redshirt burns</span>':'')+'</b></div>';
  if(dem>0 && p.yr!=="SR"){
    h+='<div class="pc-cell"><span>NIL</span><b>'+fmtMoney(fund)+' of '+fmtMoney(dem)+
       ' · <span style="color:'+(risk>=60?'var(--red2)':'var(--muted)')+'">'+risk+'% portal risk</span></b></div>';
  }
  var growth=p.ovr-(p.startOvr!=null?p.startOvr:p.ovr);
  h+='<div class="pc-cell"><span>Growth under you</span><b>'+(growth>0?'+':'')+growth+' OVR</b></div>';
  h+='</div>';

  var gl=(p.gamelog||[]).slice(-6).reverse();
  if(gl.length){
    h+='<div class="sec-title" style="margin:10px 2px 5px">Recent games</div><div class="rec-tbl">';
    gl.forEach(function(g){
      h+='<div class="riv-row"><span class="drf-cat">Wk '+g.wk+'</span>'+
         '<span class="riv-opp">'+x(g.opp)+'</span>'+
         '<span class="riv-rec" style="width:auto;font-weight:800">'+x(g.line||"")+'</span></div>';
    });
    h+='</div>';
  }
  h+='<button class="bigbtn btn-gold" id="pcard-ok">Close</button>';
  return h+'</div>';
}

// NEEDS ATTENTION
// The game quietly generates a dozen things that EXPIRE if you don't act: unspent recruiting
// points, a starter at 90% portal risk with nothing funded, a staff offer that lapses at kickoff,
// a freshman one snap from burning his redshirt. None of it announced itself. This gathers every
// pending decision into one strip, and each item jumps you straight to the screen that fixes it.
// ═════════════════════════════════════════════════════════
function attentionItems(){
  var s=ST.save, out=[];
  if(!s) return out;
  var inSeason = (s.week||0) < (s.schedule||[]).length;

  // ── A staff offer lapses at kickoff and you lose the man for nothing ──
  var offers=(s._staffOffers||[]).filter(function(o){return !o.done;});
  if(offers.length) out.push({
    sev:"hi", ico:"📣",
    t:offers.length+" staff offer"+(offers.length>1?"s":""),
    sub:"Match or lose them at kickoff",
    go:function(){ ST.menuFrom=ST.screen; ST.screen="staff"; }
  });

  // ── A vacant coordinator seat is free ratings you're leaving on the table ──
  if(s.role==="HC"){
    var vac=STAFF_ROLES.filter(function(r){ return !(s.staff||{})[r.k]; });
    if(vac.length) out.push({
      sev:"md", ico:"👔",
      t:vac.length+" staff seat"+(vac.length>1?"s":"")+" vacant",
      sub:vac.map(function(r){return r.k;}).join(", ")+" — their perks stack on yours",
      go:function(){ ST.menuFrom=ST.screen; ST.screen="staff"; }
    });
  }

  // ── Players about to walk ──
  var risky=(s.roster||[]).filter(function(p){
    if(p.cut||p.yr==="SR") return false;
    var d=nilDemand(p); if(d<=0) return false;
    if(money2(p.nilFund||0)>=d) return false;
    return retentionRisk(p)>=60;
  });
  if(risky.length) out.push({
    sev:"hi", ico:"🚪",
    t:risky.length+" at high portal risk",
    sub:"Underfunded — "+risky.slice(0,2).map(function(p){return p.n;}).join(", ")+(risky.length>2?"…":""),
    go:function(){ ST.seasonTab="roster"; ST.rosFilter="risk"; }
  });

  // ── A redshirt one snap from being burned ──
  var burning=(s.roster||[]).filter(function(p){
    return canRedshirt(p) && gamesPlayed(p)===RS_GAME_LIMIT && !p.hold;
  });
  if(inSeason && burning.length) out.push({
    sev:"hi", ico:"🔴",
    t:burning.length+" redshirt"+(burning.length>1?"s":"")+" about to burn",
    sub:burning.slice(0,2).map(function(p){return p.n;}).join(", ")+" — "+RS_GAME_LIMIT+"/"+RS_GAME_LIMIT+" games used",
    go:function(){ ST.seasonTab="roster"; ST.rosFilter="rs"; }
  });

  // ── Recruiting points evaporate at the end of the week ──
  var pts=s.recruitPtsLeft||0;
  if(inSeason && pts>0) out.push({
    sev:pts>=8?"md":"lo", ico:"🎯",
    t:pts+" recruiting point"+(pts>1?"s":"")+" unspent",
    sub:"They don't carry over to next week",
    go:function(){ ST.seasonTab="recruit"; }
  });

  // ── NIL sitting idle while people are unfunded ──
  var unfunded=(s.roster||[]).filter(function(p){
    if(p.cut||p.yr==="SR") return false;
    var d=nilDemand(p);
    return d>0 && money2(p.nilFund||0)<d;
  }).length;
  if((s.nilLeft||0)>0 && unfunded>0) out.push({
    sev:"lo", ico:"💰",
    t:fmtMoney(s.nilLeft)+" NIL unspent",
    sub:unfunded+" player"+(unfunded>1?"s":"")+" still underfunded",
    go:function(){ ST.seasonTab="roster"; ST.rosFilter="nil"; }
  });

  var order={hi:0, md:1, lo:2};
  out.sort(function(a,b){ return order[a.sev]-order[b.sev]; });
  return out;
}
function attentionStrip(){
  var items=attentionItems();
  if(!items.length) return '';
  ST._attn=items;   // the click handler reads back from here
  var h='<div class="attn">';
  items.forEach(function(it,i){
    h+='<button class="attn-item '+it.sev+'" data-attn="'+i+'">'+
       '<span class="attn-ico">'+it.ico+'</span>'+
       '<span class="attn-txt"><b>'+x(it.t)+'</b><span>'+x(it.sub)+'</span></span>'+
       '<span class="attn-go">›</span></button>';
  });
  return h+'</div>';
}

  var wkLbl = PC ? '<b>'+PC.wk+'</b> · '+x(PC.label) : '<b>Wk '+Math.min(s.week+1,s.schedule.length)+'</b>';
  h+='<div class="season-hd"><div class="shd-l">'+wkLbl+' · Season '+s.season+' · '+(2026+(s.seasonsPlayed||0))+'</div>'+
     '<div class="shd-r"><span class="pill">'+s.wins+'-'+s.losses+'</span> <span class="pill">'+unitLbl+' '+unit+'</span></div></div>';

  // tab bar
  h+='<div class="tabbar tabbar-7">'+
     tabBtn("week","Week")+
     tabBtn("recruit","Recruit")+
     tabBtn("roster","Roster")+
     tabBtn("stats","Stats")+
     tabBtn("schedule","Sched")+
     tabBtn("standings","Stand")+
     tabBtn("top25","CFP")+
     '</div>';

    h+=expectBanner();     // your promise to the board, live, all season
    h+=attentionStrip();   // everything that expires if you ignore it
    if(PC){
      h+= PC.kind==="confchamp"   ? confChampBody()
        : PC.kind==="bowl"        ? bowlBody()
        : PC.kind==="celebration" ? celebrationBody()
        : PC.kind==="fcsPlayoff"  ? fcsBracketBody()
        : PC.kind==="noPost"      ? noPostseasonBody()
        : bracketBody();
    } else if(g && g.result){
      // this week's game is already played — show the result and let you advance when ready
      var rw=(g.result.us>g.result.them);
      h+='<div class="result-card" style="padding:14px;margin-bottom:10px">'+
         '<div class="vs" style="margin:0 0 4px">Week '+(s.week+1)+' · '+(g.home?'HOME':'AWAY')+(isRival(s.school,g.opp)?' · <b style="color:var(--gold-dark,#b8860b)">⚔️ RIVALRY WEEK</b>':'')+'</div>'+
         '<div class="score" style="font-size:26px;color:'+(rw?'var(--green)':'#c0392b')+'">'+(rw?'W':'L')+' '+g.result.us+'–'+g.result.them+'</div>'+
         '<div class="vs">vs '+x(g.opp)+' · '+x(g.oc)+'</div></div>';
      h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 10px;line-height:1.5">Game in the books. Recruit, work the roster, or check the standings — then advance the week whenever you\u2019re ready.</div>';
      var nextLbl = ((s.week+1)>=s.schedule.length) ? 'Postseason' : 'Week '+(s.week+2);
      h+='<button class="bigbtn btn-green" id="advance-week" style="margin-top:2px">Advance to '+nextLbl+' →</button>';
    } else if(g){
      h+='<div class="result-card" style="padding:13px;margin-bottom:10px"><div class="vs" style="margin:0 0 4px">Week '+(s.week+1)+(g.home?' · HOME':' · AWAY')+(isRival(s.school,g.opp)?' · <b style="color:var(--gold-dark,#b8860b)">⚔️ RIVALRY</b>':'')+'</div>';
      h+='<div class="score" style="font-size:20px">vs '+x(g.opp)+'</div>';
      h+='<div class="vs">'+x(g.oc)+' · '+stars(g.op)+'</div>';
      var og=oppRatings(g.opp,g.op);
      h+='<div class="opp-rtg"><div class="ort"><b>'+og.off+'</b><span>Off</span></div><div class="ort"><b>'+og.def+'</b><span>Def</span></div><div class="ort"><b>'+og.ovr+'</b><span>Overall</span></div></div>';
      h+='</div>';
      h+=schemeReadout();
      h+='<button class="bigbtn btn-purple" id="play-week" style="background:var(--purple);color:#fff;margin-top:2px">Play Week '+(s.week+1)+' →</button>';
      h+=schemeToggle();
    } else {
      h+='<div class="result-card" style="padding:16px;margin-bottom:10px"><div style="font-size:14px;font-weight:900">Regular Season Complete</div>'+
         '<p style="font-size:11px;font-weight:700;color:var(--muted);margin-top:5px">Final record: '+s.wins+'-'+s.losses+'. Time to see where you stand.</p></div>';
      h+='<button class="bigbtn btn-gold" id="to-postseason">Regular Season Done → Postseason</button>';
    }
  } else if(tab==="recruit"){
    h+=recruitTab();
  } else if(tab==="schedule"){
    if(ST.editGame!=null){ h+=scheduleEditor(ST.editGame); }
    else {
      h+= isIndependentConf(s.conf)
        ? '<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 8px;line-height:1.5">As an <b>independent</b>, any game you haven\u2019t played yet can still be changed \u2014 tap it to swap the opponent or flip home/away.</div>'

      h+='<div class="flow-list">';
      s.schedule.forEach(function(gm,i){
        var res=gm.result;
        var editable=(!gm.conf && !res && i>=s.week);
        var cls="game-row"+(res?(res.us>res.them?" win":" loss"):"")+(editable?" editable":"");
        h+='<div class="'+cls+'"'+(editable?' data-editgame="'+i+'"':'')+'><div class="game-wk">W'+(i+1)+'</div>';
        h+='<div class="game-opp">'+(isRival(s.school,gm.opp)?'⚔️ ':'')+(gm.home?"":"@ ")+x(gm.opp)+'<div class="oc">'+x(gm.oc)+(gm.conf?'':' · NON-CONF')+(isRival(s.school,gm.opp)?' · <b style="color:var(--gold-dark,#b8860b)">RIVALRY</b>':'')+'</div></div>';
        if(res)h+='<div class="game-res '+(res.us>res.them?"w":"l")+'">'+(res.us>res.them?"W":"L")+' '+res.us+'-'+res.them+'</div>';
        else if(i===s.week)h+='<div class="game-res" style="color:var(--purple)">▶ NEXT</div>';
        else if(editable)h+='<div class="game-res" style="color:var(--gold-dark);font-size:10px">✎ EDIT</div>';
        else h+='<div class="game-res" style="color:var(--dim)">—</div>';
        h+='</div>';
      });
      h+=postseasonScheduleRows();
      h+='</div>';
    }
  } else if(tab==="standings"){
    h+=liveStandingsTable();
  } else if(tab==="roster"){
    h+=retentionPanel();
    h+='<div class="flow-list">'+rosterTable()+'</div>';
  } else if(tab==="stats"){
    h+=statsTab();
  } else if(tab==="top25"){
    h+=top25Table();
  }
  h+='</div>'; // tab-body
  return h+'</div>';
}

// Extra schedule rows for the conf title game, bowl, or playoff run.
function postseasonScheduleRows(){
  var s=ST.save, h='';
  function row(tag,opp,sub,res,live){
    var cls="game-row"+(res?(res.us>res.them?" win":" loss"):"");
    var out='<div class="'+cls+'"><div class="game-wk" style="font-size:9px">'+tag+'</div>'+
      '<div class="game-opp">'+x(opp)+'<div class="oc">'+x(sub)+'</div></div>';
    out+= res ? '<div class="game-res '+(res.us>res.them?"w":"l")+'">'+(res.us>res.them?"W":"L")+' '+res.us+'-'+res.them+'</div>'
         : live ? '<div class="game-res" style="color:var(--purple)">▶ NEXT</div>'
         : '<div class="game-res" style="color:var(--dim)">—</div>';
    return out+'</div>';
  }
  var C=ST.confchamp;
  if(C && C.youIn){
    var copp=C.top2[0].name===s.school?C.top2[1]:C.top2[0];
    var cres=(C.done&&C.result&&C.result.us!=null)?{us:C.result.us,them:C.result.them}:null;
    h+=row("CONF",copp.name,s.conf+" Championship",cres,!C.done);
  }
  var P=ST.post;
  if(P && P.mode==="celebration"){ h+=row("CB",P.opp,"Celebration Bowl",P.done?P.result:null,!P.done); }
  if(P && P.mode==="fcsPlayoff"){
    (P.log||[]).forEach(function(e){ h+=row("FCS",e.opp,fcsRoundLabel(e.round),e.result,false); });
    if(!P.done){
      var fo=myFCSOpponent();
      var fb=fo.seed?P.bracket.bySeed[fo.seed]:null;
      h+=row("FCS",fb?fb.name:"TBD",fcsRoundLabel(P.round)+" · #"+P.mySeed+" seed",null,true);
    }
  }
  if(P && P.mode==="bowl"){ h+=row("BOWL",P.opp,P.bowlName,P.done?P.result:null,!P.done); }
  if(P && P.mode==="playoff"){
    (P.log||[]).forEach(function(e){ h+=row("CFP",e.opp,roundLabel(e.round),e.result,false); });
    if(!P.done){
      var opp=myNextOpponent();
      var on=opp.seed?P.bracket.bySeed[opp.seed].name:"TBD";
      h+=row("CFP",on,roundLabel(P.round)+" · #"+P.mySeed+" seed",null,true);
    }
  }
  return h;
}

       '<div class="speed-pick">';

    h+='<button class="sp-btn'+(ST.simSpeed===k?" on":"")+'" data-simspeed="'+k+'">'+SIM_SPEEDS[k].label+'</button>';
  });
  h+='</div>'+
       '<button class="ctrl-final" id="live-sim-final">⏭️ Final</button>'+

         (gtActive()?"🔙 Starters":"🔄 Backups")+'</button>'+
     '</div>';
  h+='<button class="bigbtn btn-ghost" id="live-btn" style="margin-top:8px">Skip Ahead ⏩</button>';
  if(ST.feedMode!=="scoring" && ST.feedMode!=="stats") ST.feedMode="all";
  h+='<div class="feed-hd"><div class="sec-title" id="feed-title" style="margin:0">'+(ST.feedMode==="stats"?"Box Score":"Play-by-Play")+'</div>'+
     '<div class="feed-toggle">'+
       '<button class="ft-btn'+(ST.feedMode==="all"?" on":"")+'" data-feedmode="all">Full Log</button>'+
       '<button class="ft-btn'+(ST.feedMode==="scoring"?" on":"")+'" data-feedmode="scoring">Scoring</button>'+
       '<button class="ft-btn'+(ST.feedMode==="stats"?" on":"")+'" data-feedmode="stats">Stats</button>'+
     '</div></div>';
  h+='<div id="live-feed" class="pbp-feed"><div class="pbp-row" style="justify-content:center;color:var(--muted)">Kickoff…</div></div>';
  return h+'</div>';
}

// Bowl names for flavor (New Year's Six + a few others)
var NY6=["Rose Bowl","Sugar Bowl","Orange Bowl","Cotton Bowl","Fiesta Bowl","Peach Bowl"];
var BOWLS=["Gator Bowl","Citrus Bowl","Alamo Bowl","Holiday Bowl","Sun Bowl","Liberty Bowl","Music City Bowl","Duke's Mayo Bowl","Las Vegas Bowl","Pinstripe Bowl"];

// Decide postseason fate from record + prestige.
// ═════════════════════════════════════════════════════════
// CONFERENCE STANDINGS + CHAMPIONSHIP GAME
// ═════════════════════════════════════════════════════════
// Build conference standings: YOUR real conf record + simulated conf-mates (stable for the season).
function rankedTeams(){
  var s=ST.save, L=s.league;
  var myDiv=myDivision();
  var rows=[];
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if((t.div||"FBS")!==myDiv) return;   // rankings never mix subdivisions
      var isYou=(n===s.school);
      var w=isYou?s.wins:t.w, l=isYou?s.losses:t.l;
      var sc = (myDiv==="FCS")
        ? fcsResumeScore(w, t.p, isYou ? s._wonConfThisYear : isConfChamp(n), t.ovr, isYou&&s._beatFBSThisYear)
        : cfpScore({w:w, l:l, p:t.p, conf:t.c, wonConf:isConfChamp(n), ovr:t.ovr, you:isYou});
      rows.push({name:n, conf:t.c, p:t.p, you:isYou, w:w, l:l, ovr:t.ovr, g5:!isPowerConf(t.c), score:sc});
    });
  }
  rows.sort(function(a,b){ if(b.score!==a.score)return b.score-a.score; return b.ovr-a.ovr; });
  return rows;
}
// The champion of a conference by best conference record (tiebreak overall). Used for
// CPU conferences in the league history; your own conference uses the real title-game
// result. Independents have no conference, so they can never be a champion (at-large only).
function bestConfChampion(conf){
  var s=ST.save, L=s.league; if(!L || isIndependentConf(conf)) return null;   // no champion for independents
  var best=null, bestKey=-1;
  Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n]; if(t.c!==conf) return;
    var isYou=(n===s.school), cw,cl;
    if(isYou){ var r=userConfRecord(); cw=r.cw; cl=r.cl; } else { cw=t.cw||0; cl=t.cl||0; }
    var g=cw+cl, pct=g?cw/g:0, key=pct*1000 + (t.ovr||60)*0.1;
    if(key>bestKey){ bestKey=key; best=n; }
  });
  return best;
}
// Record this season's national + conference champions into the league history.
function recordChampions(){
  var s=ST.save; if(!s.league) return;
  s.champHistory=s.champHistory||[];
  var year=2026+((s.seasonsPlayed||1)-1); // seasonsPlayed was just incremented for the finished season
  var natl = s._wonNatlThisYear ? s.school : (s._natlChampName || (rankedTeams()[0]||{name:"—"}).name);
  // The Celebration Bowl is its own title, tracked apart from the playoff championship.
  var celeb = null;
  if(myDivision()==="FCS"){
    if(ST.post && ST.post.mode==="celebration" && ST.post.done){
      celeb = (ST.post.result.us>ST.post.result.them) ? s.school : ST.post.opp;
    } else {
      var sw=bestTeamInConf("SWAC"), me=bestTeamInConf("MEAC");
      celeb = (sw.score>=me.score) ? sw.name : me.name;
    }
  }
  var myDiv=myDivision();
  var confSet={};
  Object.keys(s.league.teams).forEach(function(n){
    var t=s.league.teams[n];
    if((t.div||"FBS")!==myDiv) return;                    // only your subdivision's leagues
    var c=t.c; if(c && !isIndependentConf(c)) confSet[c]=1;
  });
  var confs={};
  Object.keys(confSet).sort().forEach(function(c){
    confs[c] = (c===s.conf && s._userConfChampName) ? s._userConfChampName : bestConfChampion(c);
  });
  var rec={year:year, season:s.season, school:s.school, natl:natl, confs:confs};
  if(celeb) rec.celebration=celeb;
  s.champHistory.push(rec);
  s._natlChampName=null; s._userConfChampName=null; // clear the season's stashed results
}
function top25Table(){
  var fcs = (myDivision()==="FCS");
  var fieldSize = fcs ? 24 : 12;   // playoff field size
  var byes      = fcs ? 8  : 4;    // seeds earning a first-round bye
  var showN     = fcs ? 30 : 25;   // how many ranked teams to list (a few past the cutline)
  var rows=rankedTeams().slice(0,showN);
  var myRank=0; rows.forEach(function(r,i){ if(r.you)myRank=i+1; });
  var h='<div class="sec-title" style="margin:2px 2px 8px">CFP Rankings'+(myRank?' <span class="pill">You: #'+myRank+'</span>':' <span class="pill">You: NR</span>')+'</div>';
  var desc = fcs
    ? 'Committee-style résumé rankings. The FCS playoff takes <b>24</b> teams — conference champions (◆) earn automatic bids and the strongest at-large résumés fill out the field. The top <b>8</b> seeds earn a first-round bye.'
    : 'Committee-style résumé rankings — wins over quality opponents and conference titles lift you, bad losses sink you. The top <b>12</b> make the Playoff; the top <b>4</b> seeds earn a first-round bye.';
  h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 9px;line-height:1.5">'+desc+'</div>';
  h+='<div class="conf-table scroll-list">';
  rows.forEach(function(r,i){
    var seed=i+1, champ=isConfChamp(r.name);
    h+='<div class="conf-row'+(r.you?" me":"")+(seed<=byes?" top2":"")+'">'+
       '<span class="conf-rank">'+seed+'</span>'+
       '<span class="conf-name">'+x(r.name)+(champ?' <span class="cfp-champ" title="Conference champion · auto-bid">◆</span>':'')+' <span class="t25-conf">'+x(r.conf)+' · '+r.ovr+' OVR'+(seed<=byes?' · BYE':'')+'</span></span>'+
       '<span class="conf-rec">'+r.w+'-'+r.l+'</span></div>';
    if(seed===fieldSize){ h+='<div class="cfp-cutline">— Playoff cutline · top '+fieldSize+' —</div>'; }
  });
  h+='</div>';
  return h;
}
function computeConfStandings(){
  var s=ST.save, L=s.league;
  var table=[];
  // your REAL conference record straight from your played games (never out of sync)
  var myCW=0, myCL=0;
  s.schedule.forEach(function(g){
    if(g.oc===s.conf && g.result){ if(g.result.us>g.result.them)myCW++; else myCL++; }
  });
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(t.c!==s.conf) return;
      var isYou=(n===s.school);
      var cw=isYou?myCW:t.cw, cl=isYou?myCL:t.cl;
      table.push({name:n, p:t.p, you:isYou, cw:cw, cl:cl, ovr:t.ovr});
    });
  }
  table.sort(function(a,b){
    var ga=a.cw+a.cl, gb=b.cw+b.cl;
    var pa=ga?a.cw/ga:0.5, pb=gb?b.cw/gb:0.5;
    if(pb!==pa)return pb-pa;
    return b.ovr-a.ovr;
  });
  return table;
}
// Called when the regular season ends → set up conference championship
function enterConfChampionship(){
  var s=ST.save;
  finalizeLeagueSeason(s.school); // ensure every team completed its conference slate
  // Independents have no conference, so no conference championship — go straight to the postseason.
  if(isIndependentConf(s.conf)){
    ST.confchamp=null; s._confchamp=null;
    enterPostseason(); return;
  }
  // Most FCS leagues crown their champion on regular-season record alone — there is no
  // title game. The SWAC and MEAC are the exceptions (and the SWAC's winner goes on to
  // the Celebration Bowl). So for everyone else, award the title outright and move on.
  if(myDivision()==="FCS" && !isCelebrationConf(s.conf)){
    var t=computeConfStandings();
    var winner=t.length?t[0]:null;
    ST.confchamp=null; s._confchamp=null;
    if(winner){
      s._userConfChampName=winner.name;
      if(winner.you){
        s._wonConfThisYear=true;
        s.titles=(s.titles||0)+1;
        toast("🏆 "+x(s.conf)+" regular-season champions!");
      }
    }
    enterPostseason(); return;
  }
  var table=computeConfStandings();
  var top2=table.slice(0,2);
  var youIn = top2.some(function(t){return t.you;});
  var champ={
    standings:table,
    top2:[{name:top2[0].name,p:top2[0].p},{name:top2[1].name,p:top2[1].p}],
    youIn:youIn, done:false, result:null, wonTitle:false
  };
  if(!youIn){
    // auto-resolve who wins the conference (flavor), then continue to postseason
    var a=top2[0], b=top2[1];
    var aStr=a.p*10+rnd(0,25), bStr=b.p*10+rnd(0,25);
    champ.result={winner:(aStr>=bStr?a.name:b.name), auto:true};
    champ.done=true;
    s._userConfChampName=champ.result.winner; // remember your conference's champion for league history
  }
  ST.confchamp=champ; s._confchamp=champ;
  ST.screen="season"; ST.seasonTab="week"; persist(); draw();
}
// You play the conference title game (live sim) — opponent is the other top-2 team
function playConfChampGame(){

  var game={opp:opp.name, oc:s.conf, op:opp.p, home:(Math.random()<0.5)};

                 live:true, gameKey:"confchamp", postseason:true, confchamp:true, roundName:s.conf+" Championship"};

}
function finishConfChampGame(){
  var s=ST.save, C=ST.confchamp, won=ST._confWon;
  C.done=true;
  C.result={winner: won?s.school:(C.top2[0].name===s.school?C.top2[1].name:C.top2[0].name), auto:false,

  s._confchamp=C;

function confStandingsTable(){

  var h='<div class="sec-title">'+x(s.conf)+' Standings</div><div class="conf-table">';
  C.standings.forEach(function(t,i){

  });
  h+='</div><div style="font-size:9px;font-weight:700;color:var(--muted);margin:6px 2px 0">★ = conference championship game</div>';
  return h;
}

// A team's "resume strength" — wins matter, but so does program/conference quality.
// Power-conference wins are worth more than Group-of-Five wins (strength of schedule).
var POWER_CONF={"SEC":1,"Big Ten":1,"Big 12":1,"ACC":1};
function isPowerConf(conf){ return !!POWER_CONF[conf]; }
// Committee-style résumé score (FBS) — emulates how the CFP selection committee weighs a
// team: results first (wins, scaled by strength of schedule), losses hurt (a touch less in
// a power league where every week's a grind), a conference title is a real plus, and the
// "eye test"/talent matters at the margins. For YOU we also read your actual schedule, so
// signature wins lift you and bad losses sink you — just like the real committee.
function cfpScore(t){
  var power=isPowerConf(t.conf);
  var wins=t.w||0, losses=t.l||0, games=wins+losses;
  var sos=(power?1.0:0.60)+(t.p||1)*0.05;         // strength-of-schedule proxy
  var winVal=wins*(6+sos*5);                      // wins worth more against a tougher slate
  var lossPen=losses*(power?7:9);                 // losses cost; power losses forgiven slightly
  var confTitle=t.wonConf?12:0;                   // conference championship
  var unbeaten=(losses===0&&games>=8)?7:0;        // undefeated résumé bonus
  var eye=(t.ovr||60)*0.35+(t.p||1)*3;            // committee eye-test / talent
  var s=winVal-lossPen+confTitle+unbeaten+eye;
  if(t.you) s+=userResumeAdj();                   // your real quality wins / bad losses
  return s;
}
// Your actual résumé from played games: signature wins lift you, bad losses sink you.
// (CPU teams have no per-game log, so their SOS is approximated inside cfpScore.)
function userResumeAdj(){
  var s=ST.save, adj=0;
  (s.schedule||[]).forEach(function(g){
    if(!g.result) return;
    var op=g.op||1, won=g.result.us>g.result.them;   // g.op = opponent prestige tier
    if(won){ adj += (op>=5?7:op>=4?4:op>=3?1.5:0); }         // quality wins
    else   { adj += (op<=1?-9:op<=2?-5:op<=3?-2:0); }        // bad losses (losing to a p4/p5 is ~ok)
  });
  return adj;
}
// Is this team its conference's champion? Uses the decided title once known, else the
// current conference leader as a projection (that's how in-season CFP rankings work).
function isConfChamp(name){
  var s=ST.save, L=s.league, t=L&&L.teams[name]; if(!t) return false;
  var conf=t.c; if(!conf || isIndependentConf(conf)) return false;   // independents are at-large only, never a conf champ
  if(conf===s.conf && s._userConfChampName) return name===s._userConfChampName;
  return bestConfChampion(conf)===name;
}
function enterPostseason(){
  var s=ST.save;
  if(myDivision()==="FCS"){ enterFCSPostseason(); return; }
  var w=s.wins;
  // You make the Playoff iff you are in the top 12 of the SAME résumé rankings shown on the
  // CFP tab. Previously this used a record heuristic (9 wins + prestige) that was blind to the
  // rankings, so a 9-3 team ranked ~30th would still be handed the #12 seed while showing
  // "NR" on the ranking page. One source of truth now: rankedTeams().
  var ranks=rankedTeams();
  var myRank=0; ranks.forEach(function(r,i){ if(r.you)myRank=i+1; });
  if(myRank>=1 && myRank<=12){
    setupPlayoff(ranks);
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  if(w>=6){
    // bowl game
    var pool = (w>=9?NY6:BOWLS);
    var oppP = Math.max(1, Math.min(5, s.prestige + rnd(-1,1)));
    var opp = pickOpponent(oppP);
    ST.post={mode:"bowl", bowlName:pick(pool), opp:opp.n, oc:opp.c, op:opp.p, done:false, result:null};
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  // no bowl (losing record)
  ST.post=null;
  s._postDone=true;
  ST.screen="offseason"; persist(); draw();
}
function pickOpponent(prestige){
  var pool=divTeams(myDivision());
  var cand=pool.filter(function(t){return t.n!==ST.save.school && Math.abs(t.p-prestige)<=1;});
  if(!cand.length)cand=pool.filter(function(t){return t.n!==ST.save.school;});
  return pick(cand);
}

// ═════════════════════════════════════════════════════════
// FCS POSTSEASON — deliberately separate from the FBS path.
//   PLAYOFF  : 24-team bracket, top 8 seeds get a first-round bye. Ends in the
//              FCS National Championship in Frisco.
//   CHAMPIONSHIP (Celebration Bowl): SWAC & MEAC do NOT enter the bracket. Their two
//              conference champions meet in a single title game instead.
//   IVY      : joined the FCS playoff in 2025 — champion auto-bids like any league.
// ═════════════════════════════════════════════════════════
function isFCSPlayoffConf(c){ return !!FCS_PLAYOFF_CONFS[c]; }
function isCelebrationConf(c){ return !!FCS_CELEBRATION_CONFS[c]; }
function isNoPostseasonConf(c){ return !!FCS_NO_POSTSEASON_CONFS[c]; }
function isNoAutobidConf(c){ return !!FCS_NO_AUTOBID_CONFS[c]; }
function divTeams(div){ return div==="FCS" ? FCS_TEAMS : FBS_TEAMS; }

// FCS resume score — no power-conference weighting, but a money-game win over an
// FBS opponent is the single most valuable line on an FCS resume.
function fcsResumeScore(wins, prestige, wonConf, ovr, fbsWin){
  var base = wins*9 + prestige*6 + (ovr||60)*0.5;
  if(wonConf) base += 12;
  if(fbsWin)  base += 14;   // beating an FBS team is a signature win
  return base;
}

function enterFCSPostseason(){
  var s=ST.save, w=s.wins, c=s.conf;

  // ── The Ivy League declines every postseason bid. Season's over. ──
  if(isNoPostseasonConf(c)){
    ST.post={mode:"none", reason:"ivy"};   // _postDone is set when they click Continue
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }

  // ── SWAC / MEAC: the Celebration Bowl track, NOT the playoff bracket. ──
  if(isCelebrationConf(c)){
    if(s._wonConfThisYear){
      // You won your league → you represent it in the Celebration Bowl.
      var otherConf = (c==="SWAC") ? "MEAC" : "SWAC";
      var foe = bestTeamInConf(otherConf);
      ST.post={mode:"celebration", opp:foe.name, oc:otherConf, op:foe.p, done:false, result:null};
    } else {
      ST.post={mode:"none", reason:"noCelebration"};
    }
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }

  // ── Everyone else: try to make the 24-team bracket. ──
  // Auto-bid = win your conference. Otherwise you need an at-large-worthy record.
  var autoBid = s._wonConfThisYear && isFCSPlayoffConf(c) ;
  var atLarge = (w>=8) || (w>=7 && s.prestige>=4);
  if(isNoAutobidConf(c)) autoBid=false;   // Pioneer / Independents: at-large only
  if(autoBid || atLarge){
    setupFCSPlayoff();
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }

  // FCS has no bowl system below the playoff — a losing-out season simply ends.
  ST.post={mode:"none", reason:"missed"};
  snapshotSeasonGoals();
  ST.screen="season"; ST.seasonTab="week"; persist(); draw();
}

// Strongest team in a given conference (used to pick the Celebration Bowl opponent).
function bestTeamInConf(conf){
  var L=ST.save.league, best=null;
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(t.c!==conf) return;
      var sc = fcsResumeScore(t.w, t.p, false, t.ovr, false);
      if(!best || sc>best.score) best={name:n, p:t.p, ovr:t.ovr, score:sc};
    });
  }
  if(!best){
    var pool=FCS_TEAMS.filter(function(t){return t.c===conf;});
    var t2=pick(pool)||{n:"TBD",p:3};
    best={name:t2.n, p:t2.p, ovr:60, score:0};
  }
  return best;
}

// ── Build the 24-team FCS bracket ────────────────────────
// Seeds 1-8 receive a first-round bye. Seeds 9-24 play the first round.
// Bracket flow: R1 (8 games) -> R2/Round of 16 (byes enter) -> QF -> SF -> Championship.
function setupFCSPlayoff(){
  var s=ST.save, L=s.league;
  var myScore = fcsResumeScore(s.wins, s.prestige, s._wonConfThisYear, (L?L.teams[s.school].ovr:60), !!s._beatFBSThisYear);
  var field=[{name:s.school, p:s.prestige, you:true, score:myScore}];
  var others=[];
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(n===s.school) return;
      if(t.div!=="FCS") return;                       // FBS teams are not eligible
      if(isNoPostseasonConf(t.c)) return;             // Ivy declines
      if(isCelebrationConf(t.c)) return;              // SWAC/MEAC are on the bowl track
      others.push({name:n, p:t.p, you:false, score: fcsResumeScore(t.w, t.p, isConfChamp(n), t.ovr, false)});
    });
  }
  others.sort(function(a,b){return b.score-a.score;});
  for(var i=0;i<23 && i<others.length;i++){ field.push(others[i]); }
  field.sort(function(a,b){return b.score-a.score;});
  field.forEach(function(f,idx){ f.seed=idx+1; });
  var mySeed=0; field.forEach(function(f){ if(f.you)mySeed=f.seed; });

  ST.post={
    mode:"fcsPlayoff", field:field, mySeed:mySeed,
    round: (mySeed<=8 ? "r2" : "r1"),   // top 8 seeds open in the Round of 16
    bracket: buildFCSBracketState(field),
    log:[], done:false, champion:null
  };
}
// R1 pairings: 9v24, 10v23, ... 16v17. Each winner meets a bye seed in R2.
// R2 pairing rule: bye seed k faces the winner of the (9..16 vs 17..24) game whose
// higher seed is (17-k)  ->  1 plays winner(16/17), 2 plays winner(15/18), etc.
function buildFCSBracketState(field){
  var bySeed={}; field.forEach(function(f){ bySeed[f.seed]=f; });
  var r1=[];
  for(var i=0;i<8;i++){ r1.push({a:9+i, b:24-i}); }   // idx0: 9v24 ... idx7: 16v17
  return { r1:r1, byeSeeds:[1,2,3,4,5,6,7,8], bySeed:bySeed, results:{}, rounds:{} };
}
// Which r1 pair index feeds bye seed k?  seed1 -> pair idx7 (16v17), seed8 -> pair idx0 (9v24)
function fcsFeederIdx(byeSeed){ return 8-byeSeed; }

function fcsCpuGame(seedA, seedB){
  var f=ST.post.bracket.bySeed, a=f[seedA], b=f[seedB];
  if(!a) return seedB; if(!b) return seedA;
  var aStr=(25-a.seed)*2.2 + a.p*3 + rnd(0,20);
  var bStr=(25-b.seed)*2.2 + b.p*3 + rnd(0,20);
  return aStr>=bStr ? seedA : seedB;
}
// Resolve every first-round game except one you might be playing in.
function fcsResolveR1(skipIdx){
  var B=ST.post.bracket;
  B.r1.forEach(function(pr,i){
    if(i===skipIdx) return;
    if(B.results["r1_"+i]==null) B.results["r1_"+i]=fcsCpuGame(pr.a,pr.b);
  });
}
// Build the Round-of-16 field: 8 bye seeds vs 8 first-round winners.
// Slots are laid out in true bracket order (1,8,4,5,2,7,3,6) so that adjacent pairs
// meet in the quarterfinals and the #1 and #2 seeds can only collide in the final.
var FCS_R2_SLOT_ORDER=[1,8,4,5,2,7,3,6];
function fcsRound16Pairs(){
  var B=ST.post.bracket, pairs=[];
  FCS_R2_SLOT_ORDER.forEach(function(k){
    var idx=fcsFeederIdx(k);
    pairs.push({a:k, b:B.results["r1_"+idx]});
  });
  return pairs;
}
// Generic: given this round's seed pairs, find my game, sim the rest, return next-round seeds.
function fcsAdvanceRound(pairs, myWinSeed, key){
  var B=ST.post.bracket, me=ST.post.mySeed, out=[];
  pairs.forEach(function(pr,i){
    var win;
    if(pr.a===me || pr.b===me){ win = (myWinSeed!=null ? myWinSeed : fcsCpuGame(pr.a,pr.b)); }
    else win = fcsCpuGame(pr.a, pr.b);
    B.results[key+"_"+i]=win;
    out.push(win);
  });
  B.rounds[key]=out;
  return out;
}
// Pair up an array of advancing seeds: [0]v[1], [2]v[3], ...
function fcsPairUp(seeds){
  var pairs=[];
  for(var i=0;i<seeds.length;i+=2){ pairs.push({a:seeds[i], b:seeds[i+1]}); }
  return pairs;
}
// Current round's pairings, whatever round we're in.
function fcsCurrentPairs(){
  var P=ST.post, B=P.bracket;
  if(P.round==="r1")  return B.r1;
  if(P.round==="r2"){ fcsResolveR1(myFCSR1Idx()); return fcsRound16Pairs(); }
  if(P.round==="qf")  return fcsPairUp(B.rounds.r2||[]);
  if(P.round==="sf")  return fcsPairUp(B.rounds.qf||[]);
  if(P.round==="champ") return fcsPairUp(B.rounds.sf||[]);
  return [];
}
function myFCSR1Idx(){
  var B=ST.post.bracket, me=ST.post.mySeed, idx=-1;
  B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me) idx=i; });
  return idx;
}
// My opponent seed in the current round.
function myFCSOpponent(){
  var P=ST.post, me=P.mySeed;
  var pairs=fcsCurrentPairs(), found=null, idx=-1;
  pairs.forEach(function(pr,i){ if(pr.a===me||pr.b===me){ found=pr; idx=i; } });
  if(!found) return {seed:null, idx:-1};
  return {seed: (found.a===me?found.b:found.a), idx: idx};
}
var FCS_ROUND_ORDER=["r1","r2","qf","sf","champ"];
function fcsRoundLabel(r){
  return {r1:"First Round", r2:"Second Round", qf:"Quarterfinal",
          sf:"Semifinal", champ:"FCS National Championship"}[r]||r;
}
// Advance the FCS bracket after YOUR game resolves.
function advanceFCSPlayoff(iWon){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  var pairs=fcsCurrentPairs();
  var opp=myFCSOpponent();
  var myWin = iWon ? me : opp.seed;

  if(P.round==="r1"){
    B.results["r1_"+opp.idx]=myWin;
    fcsResolveR1(-1);                       // fill in every other first-round game
    B.rounds.r1=B.r1.map(function(pr,i){ return B.results["r1_"+i]; });
    if(!iWon){ P.done=true; P.eliminated=true; fcsSimRest("r2"); return; }
    P.round="r2"; return;
  }
  var advancing = fcsAdvanceRound(pairs, myWin, P.round);
  // The championship is terminal in BOTH directions — there is no round after it.
  if(P.round==="champ"){
    P.done=true;
    P.champion = iWon ? me : opp.seed;
    if(iWon){
      ST.save._wonNatlThisYear=true;
      ST.save.natlTitles=(ST.save.natlTitles||0)+1;
    } else {
      P.eliminated=true;
      var cn=B.bySeed[P.champion];
      if(cn) ST.save._natlChampName=cn.name;
    }
    return;
  }
  if(!iWon){
    P.done=true; P.eliminated=true;
    fcsSimRest(FCS_ROUND_ORDER[FCS_ROUND_ORDER.indexOf(P.round)+1]);
    return;
  }
  P.round = FCS_ROUND_ORDER[FCS_ROUND_ORDER.indexOf(P.round)+1];
}
// You're out — sim the remainder of the bracket to crown a champion anyway.
function fcsSimRest(fromRound){
  var P=ST.post, B=P.bracket;
  var i=FCS_ROUND_ORDER.indexOf(fromRound);
  if(i<0){ return; }
  for(; i<FCS_ROUND_ORDER.length; i++){
    var key=FCS_ROUND_ORDER[i];
    var pairs;
    if(key==="r2") pairs=fcsRound16Pairs();
    else pairs=fcsPairUp(B.rounds[FCS_ROUND_ORDER[i-1]]||[]);
    if(!pairs.length || pairs[0].b==null) break;
    var out=[];
    pairs.forEach(function(pr,j){
      var w=fcsCpuGame(pr.a,pr.b);
      B.results[key+"_"+j]=w; out.push(w);
    });
    B.rounds[key]=out;
    if(key==="champ"){ P.champion=out[0]; break; }
  }
  if(P.champion && B.bySeed[P.champion]) ST.save._natlChampName=B.bySeed[P.champion].name;
}

// Build the 12-team bracket seeded by strength-weighted resume score.
function setupPlayoff(ranks){
  var s=ST.save, L=s.league;
  // The field IS the top 12 of the résumé rankings — the exact list the CFP tab shows, so the
  // bracket and the rankings can never disagree. You are in it only if you ranked top 12.
  ranks = ranks || rankedTeams();
  var top12 = ranks.slice(0, 12);
  var field = top12.map(function(r){
    return {name:r.name, p:r.p, you:!!r.you, score:r.score, g5:r.g5};
  });
  // Seed by résumé score (already the sort order of rankedTeams).
  field.forEach(function(f,idx){ f.seed=idx+1; });
  // Enforce realism: a Group-of-Five team can never be seeded higher than 9th (auto-bid caps).
  var you=null; field.forEach(function(f){ if(f.you)you=f; });
  if(you && you.g5 && you.seed<9){
    field = field.filter(function(f){return !f.you;});
    field.splice(8,0,you);           // insert at index 8 => seed 9
    field.forEach(function(f,idx){ f.seed=idx+1; });
  }
  var mySeed=0; field.forEach(function(f){ if(f.you)mySeed=f.seed; });
  ST.post={
    mode:"playoff", field:field, mySeed:mySeed,
    round: (mySeed<=4?"qf":"r1"),
    roundIdx:0,
    bracket: buildBracketState(field),
    done:false, champion:null
  };
}
// Bracket state: track winners by slot across rounds
function buildBracketState(field){
  var bySeed={}; field.forEach(function(f){ bySeed[f.seed]=f; });
  return {
    r1:[ {a:5,b:12}, {a:8,b:9}, {a:6,b:11}, {a:7,b:10} ], // pairs feeding QF
    byeSeeds:[1,2,3,4],
    bySeed:bySeed,
    results:{}, // key like "r1_0" -> winning seed
    qf:[], sf:[], champ:null
  };
}

// Resolve one CPU game between two seeds → returns winning seed
function cpuGame(seedA, seedB){
  var f=ST.post.bracket.bySeed;
  var a=f[seedA], b=f[seedB];
  // lower seed number = stronger; add variance for upsets
  var aStr=(13-a.seed)*4 + a.p*3 + rnd(0,20);
  var bStr=(13-b.seed)*4 + b.p*3 + rnd(0,20);
  return aStr>=bStr ? seedA : seedB;
}

// Figure out YOUR next opponent seed in the current round based on bracket flow
function myNextOpponent(){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  if(P.round==="r1"){
    // find my r1 pairing
    var pair=null,idx=-1;
    B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me){pair=pr;idx=i;} });
    var opp = pair.a===me?pair.b:pair.a;
    return {seed:opp, idx:idx};
  }
  if(P.round==="qf"){
    ensureR1Resolved();
    // QF: seed1 vs winner(8/9), seed4 vs winner(5/12), seed2 vs winner(7/10), seed3 vs winner(6/11)
    var map={1:1,4:0,2:3,3:2}; // my seed -> which r1 pair feeds me (if I'm a bye seed)
    if(me<=4){ var pi=map[me]; var wseed=B.results["r1_"+pi]; return {seed:wseed, idx:pi, qf:true, byeSlot:me}; }
    // I advanced from r1 — opponent is the corresponding bye seed
    var myPair=-1; B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me)myPair=i; });
    var byeMap={1:1,0:4,3:2,2:3}; // r1 pair index -> bye seed faced
    return {seed:byeMap[myPair], idx:myPair, qf:true};
  }
  if(P.round==="sf"){
    // semifinal opponent = winner of the other half
    return {seed:P._sfOpp||null, sf:true};
  }
  if(P.round==="champ"){
    return {seed:P._champOpp||null, champ:true};
  }
  return {seed:null};
}

// Advance the bracket after YOU win a round; auto-resolve CPU games
function advancePlayoff(iWon){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  if(!iWon){
    // you're eliminated — the team that just beat you advances in your place
    P.done=true; P.eliminated=true;
    var beat=myNextOpponent().seed;
    if(P.round==="r1"){ var oi=myNextOpponent().idx; B.results["r1_"+oi]=beat; }
    else if(P.round==="qf"){ resolveQuarterfinals(beat); }
    else if(P.round==="sf"){ resolveSemifinal(beat); }
    else if(P.round==="champ"){ B.champWinner=beat; }
    resolveRestOfBracket();
    return;
  }
  if(P.round==="r1"){
    var opp=myNextOpponent();
    B.results["r1_"+opp.idx]=me;
    // resolve the other 3 r1 games
    B.r1.forEach(function(pr,i){ if(i!==opp.idx && B.results["r1_"+i]==null) B.results["r1_"+i]=cpuGame(pr.a,pr.b); });
    P.round="qf"; P.roundIdx++;
    return;
  }
  if(P.round==="qf"){
    // record you winning your QF; resolve other QFs to form SF
    resolveQuarterfinals(me);
    P.round="sf"; P.roundIdx++;
    return;
  }
  if(P.round==="sf"){
    resolveSemifinal(me);
    P.round="champ"; P.roundIdx++;
    return;
  }
  if(P.round==="champ"){
    P.done=true; P.champion=me; B.champWinner=me; // you win it all
    ST.save._wonNatlThisYear=true; ST.save.natlTitles=(ST.save.natlTitles||0)+1;
    ST.save._natlChampName=ST.save.school;
    return;
  }
}
function ensureR1Resolved(){
  var B=ST.post.bracket, me=ST.post.mySeed;
  B.r1.forEach(function(pr,i){
    if(B.results["r1_"+i]==null){
      // if I'm in this pair and haven't played, leave it; otherwise CPU-resolve
      if(pr.a===me||pr.b===me) return;
      B.results["r1_"+i]=cpuGame(pr.a,pr.b);
    }
  });
}
function resolveQuarterfinals(myWinSeed){
  var P=ST.post,B=P.bracket;
  ensureR1Resolved(); // bye seeds skip R1 block, so make sure the field is filled
  // QF pairings by bye seed vs r1 winners: 1v w(8/9)[idx1], 4v w(5/12)[idx0], 2v w(7/10)[idx3], 3v w(6/11)[idx2]
  var qfPairs=[ {bye:1,from:1}, {bye:4,from:0}, {bye:2,from:3}, {bye:3,from:2} ];
  B.qfWinners={};
  qfPairs.forEach(function(p){
    var opp=B.results["r1_"+p.from];
    var involvesMe = (p.bye===myWinSeed) || (opp===myWinSeed);
    if(involvesMe){ B.qfWinners[p.bye]=myWinSeed; }
    else { B.qfWinners[p.bye]=cpuGame(p.bye,opp); }
  });
  // SF bracket: (QF from bye1 & bye4) vs (QF from bye2 & bye3) — standard 1/4 , 2/3 halves
  var w1=B.qfWinners[1], w4=B.qfWinners[4], w2=B.qfWinners[2], w3=B.qfWinners[3];
  B._sfPairs=[ {a:w1,b:w4}, {a:w2,b:w3} ];
  // find my SF opponent
  var mine = (B._sfPairs[0].a===myWinSeed||B._sfPairs[0].b===myWinSeed)?0:1;
  var pr=B._sfPairs[mine];
  P._sfOpp = pr.a===myWinSeed?pr.b:pr.a;
  P._sfHalf=mine;
}
function resolveSemifinal(myWinSeed){
  var P=ST.post,B=P.bracket;
  // resolve the other semifinal
  var otherHalf = P._sfHalf===0?1:0;
  var op=B._sfPairs[otherHalf];
  var otherWinner=cpuGame(op.a,op.b);
  B.sfWinners=[]; B.sfWinners[P._sfHalf]=myWinSeed; B.sfWinners[otherHalf]=otherWinner;
  P._champOpp=otherWinner;
}
function resolveRestOfBracket(){
  // best-effort fill so the bracket view shows a full, finished bracket even if you lost
  var P=ST.post,B=P.bracket;
  B.r1.forEach(function(pr,i){ if(B.results["r1_"+i]==null)B.results["r1_"+i]=cpuGame(pr.a,pr.b); });
  if(!B.qfWinners) resolveQuarterfinals(-99);
  var w1=B.qfWinners[1],w4=B.qfWinners[4],w2=B.qfWinners[2],w3=B.qfWinners[3];
  if(!B._sfPairs) B._sfPairs=[{a:w1,b:w4},{a:w2,b:w3}];
  // keep any semifinal already decided (you may have won yours before losing the final)
  if(!B.sfWinners) B.sfWinners=[];
  if(B.sfWinners[0]==null) B.sfWinners[0]=cpuGame(B._sfPairs[0].a,B._sfPairs[0].b);
  if(B.sfWinners[1]==null) B.sfWinners[1]=cpuGame(B._sfPairs[1].a,B._sfPairs[1].b);
  if(B.champWinner==null) B.champWinner=cpuGame(B.sfWinners[0],B.sfWinners[1]);
  P.champion=B.champWinner;
  P.finalChamp=B.champWinner; // legacy alias
  var cf=(P.field||[]).filter(function(x){return x.seed===P.champion;})[0];
  ST.save._natlChampName = cf?cf.name:(ST.save._natlChampName||null); // remember the champ for league history
}

// Play a postseason game through the SAME live-sim machinery
function playPostGame(){
  var s=ST.save, P=ST.post;
  var oppName, oppP, home=true, rName;
  if(P.mode==="bowl"){ oppName=P.opp; oppP=P.op; home=(Math.random()<0.5); rName=P.bowlName; }
  else if(P.mode==="celebration"){
    // Neutral-site title game in Atlanta — no home team.
    oppName=P.opp; oppP=P.op; home=false; rName="Celebration Bowl";
  }
  else if(P.mode==="fcsPlayoff"){
    var fo=myFCSOpponent();
    var fb=P.bracket.bySeed[fo.seed];
    oppName=fb?fb.name:"TBD"; oppP=fb?fb.p:3;
    // FCS playoff rounds are hosted on campus by the better seed; the final is neutral.
    home = (P.round==="champ") ? false : (P.mySeed < fo.seed);
    rName=fcsRoundLabel(P.round);
  }
  else { var o=myNextOpponent(); oppName=P.bracket.bySeed[o.seed].name; oppP=P.bracket.bySeed[o.seed].p; home=(P.round==="r1"&&P.mySeed<o.seed); rName=roundLabel(P.round); }
  var game={opp:oppName, oc:"", op:oppP, home:home};
  var setup=gameSetup(game);
  ST.G=newGameState(setup.us, setup.them);
  ST.G.userGame=true;
  var st=s.tactics||{};
  ST.G.tactics={off:st.off||"balanced", tempo:st.tempo||"normal", def:st.def||"standard"};
  ST.weekResult={us:0,them:0,oppName:oppName,edge:setup.edge,oppDefType:"",off:setup.off,home:home,pbp:[],
                 live:true, gameKey:"post", postseason:true, roundName:rName};
  ST.live={elapsed:0,shownCount:0,done:false,timer:null,quarter:1,paused:false};
  persist();
  ST.screen="live"; draw(); runQuarter();
}
// Called by finishLive when the game was a postseason game
function finishPostGame(){
  var P=ST.post, won=ST._postWon;
  // ── Celebration Bowl: a single title game, not a bracket. Winning it IS the championship
  //    for SWAC/MEAC teams — there is no further round to advance to. ──
  if(P.mode==="celebration"){
    P.done=true; P.result={us:ST.weekResult.us, them:ST.weekResult.them};
    if(won){
      P.champion=true;
      ST.save.titles=(ST.save.titles||0)+1;
      ST.save.celebrationTitles=(ST.save.celebrationTitles||0)+1;
      ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+12);
    }
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  // ── FCS 24-team bracket ──
  if(P.mode==="fcsPlayoff"){
    if(!P.log) P.log=[];
    P.log.push({round:P.round, opp:(ST.weekResult.oppName||"?"),
                result:{us:ST.weekResult.us, them:ST.weekResult.them}});
    advanceFCSPlayoff(won);
    if(P.done && P.champion===P.mySeed){
      ST.save.titles=(ST.save.titles||0)+1;
      ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+15);
    }
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  if(P.mode==="bowl"){
    P.done=true; P.result={us:ST.weekResult.us,them:ST.weekResult.them};
    if(won) ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+5);
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  // playoff — log the round you just played before the bracket advances
  if(!P.log) P.log=[];
  P.log.push({round:P.round, opp:(ST.weekResult.oppName||"?"),
              result:{us:ST.weekResult.us, them:ST.weekResult.them}});
  advancePlayoff(won);
  if(P.done && P.champion===P.mySeed){ ST.save.titles=(ST.save.titles||0)+1; ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+15); }
  ST.weekResult=null; ST.live=null; ST.planPick=null;
  ST.screen="season"; ST.seasonTab="week"; persist(); draw();
}

// A per-position ledger: how many you have, the minimum, and the cap.
// `mode` is "now" or "future" (excludes graduating seniors and cuts).
function rosterLedger(mode, opts){
  opts=opts||{};
  var counts=rosterCounts(mode);
  var short=rosterShortfall(counts);
  var h='<div class="ledger">';
  myPositions().forEach(function(pos){
    var c=counts[pos]; if(!c) return;
    // Big number = how many you HAVE. The sub-line names the bar you're measured
    // against, so "0" and "need 1" can't read as contradicting each other.
    // "thin" = you can start a lineup but have no backup — one injury from trouble.
    var state = c.have<c.min ? "short" : (c.have>=c.cap ? "full" : (c.have===c.min ? "thin" : "ok"));
    var tag = c.have<c.min ? ("need "+(c.min-c.have)+" more")
            : c.have>=c.cap ? "full"
            : c.have===c.min ? "no backup"
            : "+"+(c.cap-c.have)+" room";
    h+='<div class="ldg-cell '+state+'">'+
       '<div class="ldg-pos" style="background:'+posColor(pos)+'">'+pos+'</div>'+
       '<div class="ldg-n">'+c.have+'</div>'+
       '<div class="ldg-sub">'+c.min+' start<span class="ldg-dot">·</span>'+c.cap+' max</div>'+
       '<div class="ldg-tag">'+tag+'</div>'+
       '</div>';
  });
  h+='</div>';
  var open=rosterOpenings(counts);
  var note;
  if(short._total>0){
    note='<b style="color:var(--red2)">'+short._total+' player'+(short._total===1?'':'s')+' short of a full starting lineup.</b> ';
  } else if(open._total>0){
    note='Every position can field its starters. ';
  } else {
    note='<b>Roster is full.</b> Every spot is filled.';
  }
  if(open._total>0 && opts.walkOnNote!==false){
    note+='<b>'+open._total+' open spot'+(open._total===1?'':'s')+'</b> — walk-ons fill whatever is still empty when the portal closes.';
  }
  h+='<div class="ldg-note">'+(opts.prefix||'')+note+'</div>';
  return h;
}

// ═════════════════════════════════════════════════════════
// THE OFFSEASON HUB
// The offseason used to be one enormous scroll — awards, draft, staff offers, goals, roster
// outlook, cuts, class — and then the TRANSFER PORTAL was a completely separate screen you only
// reached AFTER advancing. So player management was split across two screens and a page of
// scrolling, and you couldn't hold "who's leaving / who's arriving / who can I sign" in your head
// at once. It's now ONE tabbed hub. The portal is a tab like everything else.
// ═════════════════════════════════════════════════════════
// The portal used to open AFTER you advanced — so you shopped with a roster that had already
// graduated, aged and been gutted (0 RB, 0 WR, 19 walk-ons on the way). You couldn't see what you
// were fixing. Departures are now decided when the OFFSEASON opens, the portal runs alongside your
// real roster, and NOTHING is applied until you hit Advance.
function prepareOffseason(){
  var s=ST.save;
  if(s._osReady) return;                    // once per offseason
  // ── The season you just played gets settled HERE, not during the rollover ──
  // These all used to run inside advanceSeason(), i.e. AFTER you'd clicked Advance. That meant the
  // awards, draft class and staff offers on the offseason screen belonged to the PREVIOUS year, and
  // — worse — juniors declared for the NFL after you'd already planned your roster, so a player you
  // were counting on next season could silently vanish.
  s._lastWins=s.wins;
  settlePledge();       // the board holds you to what you promised
  topUpStarSeasons((s.schedule||[]).length||12);
  updateRecordBook();   // this year's stat lines into the program record book
  runAwards();          // the hardware, decided by the season just played
  runDraft();           // seniors go pro — and juniors DECLARE, before you plan around them
  resolveRedshirts();   // anyone under the four-game cap keeps the year
  advanceStaff();       // assistants improve; the good ones get outside offers
  var YR_NEXT={FR:"SO",SO:"JR",JR:"SR"};
  var out=[];
  (s.roster||[]).forEach(function(p){
    if(p.yr==="SR" || p.cut || p._declared) return;   // graduating / cut / gone pro — not a portal case
    var risk=retentionRisk(p);
    if(risk!=null && risk>0 && Math.random()*100<risk){
      p._leaving=true;                      // marked, NOT removed — you can still buy him back
      out.push({id:p.id, n:p.n, pos:p.pos, ovr:p.ovr, arch:p.arch, dev:p.dev,
                yr:YR_NEXT[p.yr]||p.yr, retainPrice:retainPrice(p), status:"open"});
    }
  });
  s._portalOut=out;
  // The portal is drawn from other programs' real players — so they have to EXIST first, and they
  // need last season's stat line to show. ensureStars() used to run only inside runAwards() (i.e.
  // after Advance), so the pool came up empty every time.
  ensureStars();
  topUpStarSeasons((s.schedule||[]).length||12);
  s._portalPool=genPortalPool();
  s._portalSigned=[];
  var sigOut=out.filter(function(d){return d.ovr>=75;}).length;
  s._portalSecHit=Math.min(18, sigOut*4);
  if(s._portalSecHit>0) s.jobSecurity=Math.max(1,(s.jobSecurity||60)-s._portalSecHit);
  s._osReady=true;
  persist();
}
function osStage(){ return "review"; }   // one stage now — the portal is just a tab

  var stage=osStage();
  return [
    {k:"summary", t:"📋 Summary"},

  if(!ST.osTab) ST.osTab = (stage==="portal") ? "portal" : "summary";

  h+='<div class="season-hd"><div class="shd-l"><b>'+(stage==="portal"?"🔄 Portal Window":"🏁 Offseason")+'</b> · Season '+s.season+'</div>'+

function pledgeVerdictCard(){
  var s=ST.save, r=s._pledgeResult;

     'You promised <b>'+x(r.label)+'</b>. The board judged you on each goal separately \u2014 '+
     '<b style="color:'+(r.delta>=0?'#1a7f37':'var(--red2)')+'">'+(r.delta>=0?'+':'')+r.delta+' job security</b>.</p>';
  h+='<div class="goal-list">';
  (r.goals||[]).forEach(function(g){
    h+='<div class="goal-row'+(g.met?" met":"")+'">'+
       '<span class="goal-box">'+(g.met?"✓":"")+'</span>'+

  h+='</div>';
  var tr=s._pledgeTrust;

// ── Class: who committed, and who actually fits ──
function osClassTab(){
  var s=ST.save, h='';
  var commits=committedRecruits();
  if(!commits.length){
    return '<div class="rec-tbl"><div class="rec-empty">No commits landed this season. Spend recruiting points on the <b>Recruit</b> tab during the year to build a class.</div></div>';
  }
  var capFor=function(pos){ return rosterSizeAt(pos); };
  var have={}; s.roster.forEach(function(p){ if(p.yr==="SR"||p.cut||p.walkOn)return; have[p.pos]=(have[p.pos]||0)+1; });
  var sorted=commits.slice().sort(function(a,b){return b.st-a.st||b.ovr-a.ovr;});
  var willSign=0, willCut=0, flags={};
  sorted.forEach(function(b){
    var cap=capFor(b.pos), cur=have[b.pos]||0;
    if(cur<cap){ flags[b.id]="sign"; have[b.pos]=cur+1; willSign++; }
    else { flags[b.id]="cut"; willCut++; }
  });
  h+='<div class="sec-title">Signing <span class="pill">'+willSign+' of '+commits.length+'</span></div>';
  var note='These commits sign as freshmen when you advance.';
  if(willCut>0) note+=' <b>'+willCut+'</b> more committed but you\u2019re full at their position \u2014 cut someone on the <b>Roster</b> tab to open a spot.';
  h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 8px">'+note+'</div>';
  sorted.forEach(function(b){
    var cut=(flags[b.id]==="cut");
    var pi=hasPersonality(b)&&persKnown(b)?persInfo(b.pers):null;
    h+='<div class="roster-row"'+(cut?' style="opacity:.5"':'')+'><div class="rr-pos">'+b.pos+'</div>'+
       '<div class="rr-name">'+x(b.n)+(pi?' '+pi.ico:'')+'</div>'+
       '<div class="rr-yr">'+stars(b.st)+'</div><div class="rr-ovr">'+b.ovr+'</div>'+
       (cut?'<span class="rr-cut" style="background:var(--red-bg);color:var(--red2);border-color:var(--red2)">No room</span>':'')+
       '</div>';
  });
  return h;
}
// ── NEXT YEAR'S DEPTH CHART ───────────────────────────────
// The whole point of the offseason is deciding who to keep, cut, sign and chase — and you can't
// do that without seeing what the roster BECOMES. This projects next season's depth chart:
// everyone ages a year, the leavers are gone, your transfers and your class are slotted in, and
// walk-ons fill whatever's still empty. Sign a transfer and watch him land in the two-deep.
function projectedRoster(){
  var s=ST.save, YR_NEXT={FR:"SO",SO:"JR",JR:"SR"}, out=[];
  (s.roster||[]).forEach(function(p){
    if(p._incoming){                                  // a transfer you signed — arrives as listed
      out.push({n:p.n, pos:p.pos, ovr:p.ovr, yr:p.yr, rs:p.rs, dev:p.dev, pers:p.pers,
                depthRank:p.depthRank, src:"transfer", id:p.id});
      return;
    }
    if(p.yr==="SR" || p.cut || p._declared || p._leaving) return;   // gone
    out.push({n:p.n, pos:p.pos, ovr:p.ovr, yr:(p._rsHold?p.yr:(YR_NEXT[p.yr]||p.yr)),
              rs:(p.rs||p._rsHold), dev:p.dev, pers:p.pers, depthRank:p.depthRank,
              src:"returning", id:p.id});
  });
  // your class signs into whatever room is left, best first (same rule signing day uses)
  var have={}; out.forEach(function(p){ have[p.pos]=(have[p.pos]||0)+1; });
  committedRecruits().slice().sort(function(a,b){return b.st-a.st||b.ovr-a.ovr;}).forEach(function(b){
    var cap=rosterSizeAt(b.pos);
    if((have[b.pos]||0) >= cap) return;               // no room — he doesn't make the roster
    have[b.pos]=(have[b.pos]||0)+1;
    out.push({n:b.n, pos:b.pos, ovr:b.ovr, yr:"FR", dev:b.dev, pers:b.pers, src:"recruit", st:b.st});
  });
  return out;
}
function osDepthTab(){
  var s=ST.save;

    "What your depth chart looks like <b>next season</b> \u2014 everyone a year older, leavers gone, your transfers and class slotted in. "+
    "Anything still empty is filled by a <b>walk-on</b>, who will never develop. Sign someone on the <b>Portal</b> tab and watch him land here.");

  var groups = (s.role==="DC") ? [{t:"Defense",order:POS_ORDER_DEF}]
             : (s.role==="HC") ? [{t:"Offense",order:POS_ORDER_OFF},{t:"Defense",order:POS_ORDER_DEF}]
             : [{t:"Offense",order:POS_ORDER_OFF}];
  var totalHoles=0;
  groups.forEach(function(gr){
    h+='<div class="sec-title">'+gr.t+'</div>';
    gr.order.forEach(function(pos){
      var men=proj.filter(function(p){return p.pos===pos;}).sort(function(a,b){
        var da=(a.depthRank==null?999:a.depthRank), db=(b.depthRank==null?999:b.depthRank);
        if(da!==db) return da-db;
        return b.ovr-a.ovr;
      });
      var nStart=startersAt(pos), rot=rotationAt(pos), cap=rosterSizeAt(pos);
      var holes=Math.max(0, cap-men.length);

      var thin=(men.length < rot);                    // can't even field the rotation
      h+='<div class="rec-tbl" style="margin-bottom:8px">';
      h+='<div class="rec-schoolhd" style="background:'+posColor(pos)+';color:#fff;border-bottom-color:var(--border)">'+
         '<span>'+pos+'</span><span class="rec-lvl" style="color:#fff">'+men.length+' of '+cap+
         (thin?' · THIN':'')+'</span></div>';
      if(!men.length){
        h+='<div class="rec-empty" style="color:var(--red2)"><b>Nobody.</b> Walk-ons will fill all '+cap+' spots.</div>';
      } else {
        men.forEach(function(p,i){
          var tier=depthTier(pos,i);
          var tchip = tier==="ST" ? '<span class="chip st">'+(nStart>1?('ST'+(i+1)):'ST')+'</span>'
                    : tier==="BK" ? '<span class="chip bk">BK</span>'
                    : '<span class="chip res">RES</span>';
          var src = p.src==="transfer" ? '<span class="chip good">🔄 Transfer</span>'
                  : p.src==="recruit"  ? '<span class="chip good">🖊️ '+stars(p.st||3)+'</span>'
                  : '';
          var pi=hasPersonality(p)?persInfo(p.pers):null;
          h+='<div class="riv-row"'+(p.id?pcardAttr(p.id):'')+'>'+
             '<span style="width:44px;flex:none">'+tchip+'</span>'+
             '<span class="riv-opp">'+x(p.n)+
               '<span class="tp-sub">'+(YR_PRETTY[p.yr]||p.yr)+(p.rs?' (RS)':'')+
               (pi?' · '+pi.ico+' '+x(pi.t):'')+'</span></span>'+
             src+
             '<span class="riv-rec">'+p.ovr+'</span></div>';
        });
        if(holes>0){
          h+='<div class="riv-row" style="opacity:.65">'+
             '<span style="width:44px;flex:none"><span class="chip">🚶</span></span>'+
             '<span class="riv-opp" style="color:var(--red2)"><b>'+holes+' walk-on'+(holes===1?'':'s')+'</b>'+
               '<span class="tp-sub">No ceiling, no development</span></span></div>';
        }
      }
      h+='</div>';
    });
  });
  if(totalHoles>0){
    h+='<div style="font-size:10.5px;font-weight:800;color:var(--gold-dark);background:var(--gold-bg);'+
       'border:2px solid var(--gold-dark);border-radius:9px;padding:9px 11px;margin:4px 2px 10px;line-height:1.5">'+
       '🚶 <b>'+totalHoles+' walk-on'+(totalHoles===1?'':'s')+'</b> will fill the gaps when the portal closes. '+
       'Every one is a body you could have replaced with a real player.</div>';
  }
  return h;
}

// Toggle a roster player's "cut" flag in the offseason. Cut players are released
// when you advance, freeing their position spot so a better incoming signee can sign.
function cutPlayer(id){
  var s=ST.save; if(!s||!s.roster)return;
  var p=s.roster.filter(function(r){return r.id===id;})[0];
  if(!p)return;
  if(p.yr==="SR"){ toast("Seniors graduate on their own"); return; }
  if(!p.cut && !p.walkOn){
    // Warn before cutting a projected starter (top of the depth chart at their spot,
    // ignoring seniors/already-cut players who won't be here next year).
    // Walk-ons are exempt — cutting a placeholder never needs a confirmation.
    var pool=depthOrder(s.roster.filter(function(r){return r.yr!=="SR" && !r.cut;}), p.pos);
    var isStarter=pool.slice(0, startersAt(p.pos)).some(function(r){return r.id===p.id;});
    if(isStarter && !confirm("⚠️ "+p.n+" ("+p.pos+", "+p.ovr+" OVR) is a projected starter next season. Cut them anyway?")) return;
  }
  p.cut=!p.cut;
  toast(p.cut ? (x(p.n)+" will be cut") : (x(p.n)+" kept on roster"));
  persist();
  draw();
}
