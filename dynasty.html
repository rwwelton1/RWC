function schemeById(side,id){
  var list=(side==="off")?OFF_SCHEMES:DEF_SCHEMES;
  return list.filter(function(x){return x.id===id;})[0] || null;
}
function offScheme(){ var id=ST.save&&ST.save.offScheme; return OFF_SCHEMES.filter(function(x){return x.id===id;})[0]||OFF_SCHEMES[3]; }
function defScheme(){ var id=ST.save&&ST.save.defScheme; return DEF_SCHEMES.filter(function(x){return x.id===id;})[0]||DEF_SCHEMES[2]; }
// Fraction (0..1) of a scheme's key STARTERS whose archetype matches what it wants.
// What fraction of a scheme's key STARTERS fit what it wants.
//
// This was a binary string match: want.indexOf(p.arch)>=0. For most positions that's fine — a
// Dual-Threat either is or isn't what the Spread wants. But a LINEMAN now carries real pass/run
// block ratings, and the binary threw them away: a lineman elite at BOTH jobs has arch
// "Balanced", which appears in no scheme's wants list, so he matched NOTHING and graded out as
// the worst possible fit in every system. Measured: a line of five 90-rated Balanced linemen
// scored 1.0 fit in the Air Raid — identical to five Run Blockers, the worst case — while five
// Pass Protectors scored 2.5. A guy who can do both should be FINE everywhere, not useless
// everywhere.
//
// So linemen are scored on the rating the scheme actually cares about, normalized against the
// rest of the line. Everyone else keeps the archetype match, which is the right model for them.
function _olSchemeCredit(p, want){
  // Which job does this system ask its line to do?
  var wantsPass = (want.indexOf("Pass Protector")>=0);
  var wantsRun  = (want.indexOf("Run Blocker")>=0);
  if(!wantsPass && !wantsRun) return (want.indexOf(p.arch)>=0)?1:0;
  var rel = wantsPass ? passBlkOf(p) : runBlkOf(p);
  var off = wantsPass ? runBlkOf(p)  : passBlkOf(p);
  // Credit is how good he is at the job asked of him, relative to his own overall — so this
  // measures FIT, not talent (talent is already in the team's off rating; double-counting it
  // here would make good rosters doubly good). A specialist pointed the right way earns ~1;
  // pointed the wrong way, ~0; a man equally good at both lands in the middle, which is
  // exactly right — he's never a liability and never a perfect scheme fit either.
  var edge = rel - off;                       // +BLK_ARCH_SPLIT*2 if a perfect specialist
  return clampN(0.5 + edge/(BLK_ARCH_SPLIT*4), 0, 1);
}
// The OL model, generalized to every position: instead of a rigid "is his LABEL in the want
// list", grade a starter on whether the SKILLS that define the wanted archetype are the skills
// he's actually strong at. This is the "archetype as a lens, not a box" idea applied to scheme
// fit — a QB with a 99 arm fits Air Raid whether the label on his card says Pocket Passer or
// not, and a genuinely elite player (great at everything) fits everything, exactly as the sim
// already treats him.
//
// How it reads: for the archetype(s) the scheme wants at this position, collect the skills that
// define them (from SKILL_DEFS). Credit = how far the player's WANTED skills sit above his
// OTHER skills at the position. Pointed the right way → ~1; wrong way → ~0; evenly good at
// everything (the 99) → lands high because his wanted skills are still at the ceiling. Measured
// against his own spread, not his talent, so this stays a FIT signal and never double-counts
// the raw rating already priced into the team's offense/defense.
function _skillSchemeCredit(p, want, pos){
  var defs = SKILL_DEFS[pos];
  if(!defs) return (want.indexOf(p.arch)>=0)?1:0;   // no skill model for this position: fall back
  // Which skills belong to a WANTED archetype, and which don't.
  var wantSkills=[], otherSkills=[];
  Object.keys(defs).forEach(function(skill){
    var archesForSkill = defs[skill];
    var isWanted = archesForSkill.some(function(a){ return want.indexOf(a)>=0; });
    (isWanted ? wantSkills : otherSkills).push(skill);
  });
  if(!wantSkills.length) return (want.indexOf(p.arch)>=0)?1:0;   // scheme wants an arch this pos can't express in skills
  function avg(list){ if(!list.length) return skillOf(p, wantSkills[0]); var t=0; list.forEach(function(s){ t+=skillOf(p,s); }); return t/list.length; }
  var relStrength = avg(wantSkills);           // how good he is at the job asked of him
  var offStrength = otherSkills.length ? avg(otherSkills) : (p.ovr||70);
  // Two things make a good scheme fit, and an elite player should get credit for both:
  //   TILT  — is he pointed the right way (wanted skills above his other skills)? A specialist
  //           scores high here; a balanced player scores ~0.5. This is the OL model.
  //   LEVEL — how good is he at the wanted skill in absolute terms? A 99-everywhere QB has no
  //           tilt, but his wanted skill is still 99 — he genuinely runs any system well, which
  //           is the whole "lens, not box" point. Without this an elite do-everything player
  //           would read as a mediocre "~" fit for the exact schemes he'd dominate.
  // Blended so a pointed specialist and a maxed-out generalist both grade as fits, while a
  // middling player pointed the wrong way still grades poorly.
  var tilt  = clampN(0.5 + (relStrength-offStrength)/(SKILL_SPLIT*2.2), 0, 1);
  var level = clampN((relStrength-62)/33, 0, 1);   // 62 ~ replacement, 95+ ~ elite
  return clampN(tilt*0.62 + level*0.38, 0, 1);
}
function schemeArchMatch(scheme){
  var s=ST.save, matched=0, total=0;
  Object.keys(scheme.wants).forEach(function(pos){
    var want=scheme.wants[pos];
    depthOrder(s.roster,pos).slice(0, startersAt(pos)).forEach(function(p){
      total++;
      if(pos==="OL") matched += _olSchemeCredit(p, want);
      else           matched += _skillSchemeCredit(p, want, pos);
    });
  });
  return total? matched/total : 0;
}
// Which scheme in a list best fits your current roster (for the "best fit" hint).
function bestScheme(side){
  var list=side==="off"?OFF_SCHEMES:DEF_SCHEMES;
  var ideal=side==="off"?idealOffBalance():idealDefBalance();
  var best=list[0], bestScore=-1;
  list.forEach(function(sc){
    var tend=Math.max(0,1-Math.abs(sc.lean-ideal)/55);
    var sco=schemeArchMatch(sc)*0.6 + tend*0.4;
    if(sco>bestScore){ bestScore=sco; best=sc; }
  });
  return best;
}
function setScheme(side, id){
  var s=ST.save; if(!s) return;
  if(side==="off"){ s.offScheme=id; s.gameplan.offBalance=offScheme().lean; }
  else { s.defScheme=id; s.gameplan.defBalance=defScheme().lean; }
  persist(); draw();
}
// best OVR at a position group
function bestAt(positions){
  var r=ST.save.roster, best={};
  r.forEach(function(p){ if(positions.indexOf(p.pos)>=0){ if(!best[p.pos]||p.ovr>best[p.pos])best[p.pos]=p.ovr; } });
  var vals=positions.map(function(p){return best[p]||60;});
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
// Offensive scheme fit → the same 0..cap bonus the sim expects, now driven by how well
// your starters' archetypes fit your system, plus whether the system suits your roster.
function offSchemeFit(){
  var sc=offScheme();
  var tendency=Math.max(0, 1 - Math.abs(sc.lean - idealOffBalance())/55); // does the system suit your talent?
  var archScore=schemeArchMatch(sc);                                      // do your starters fit the system?
  var fit01=archScore*0.6 + tendency*0.4;
  var cap = hasAbility("off5")?7:((hasArch("offensive")||hasAbility("off2"))?5:3); // Peak Offense > Scheme Guru/Offensive Mind
  cap += staffBonus("offFit");   // a top OC raises the ceiling further
  return Math.round(fit01*cap*10)/10;
}
function defSchemeFit(){
  var sc=defScheme();
  var tendency=Math.max(0, 1 - Math.abs(sc.lean - idealDefBalance())/55);
  var archScore=schemeArchMatch(sc);
  var fit01=archScore*0.6 + tendency*0.4;
  var cap = hasAbility("def5")?7:((hasArch("defensive")||hasAbility("def2"))?5:3); // Peak Defense > Disguise/Defensive Mind
  cap += staffBonus("defFit");
  return Math.round(fit01*cap*10)/10;
}
function idealDefBalance(){
  var blitzStrength=(bestAt(["DL"])*1.3 + bestAt(["LB"]))/2.3;
  var coverStrength=(bestAt(["CB"])*1.2 + bestAt(["S"]))/2.2;
  return Math.max(0,Math.min(100, Math.round(50 + (blitzStrength-coverStrength)*2.2)));
}

// ── OFFENSIVE LINE: pass block vs run block ──────────────
// One line, two different jobs. A line is never equally good at both, and WHY it
// tilts is the whole point of scheme identity:
//   · who you recruited — Pass Protectors vs Run Blockers on the starting five
//   · what you rep — a pass-first system drills pass sets, a run-first system drills combo blocks
// The tilt is what the sim reads (see blkOf/dRun/dPass); `base` is only for display.
// A Blocking TE is a sixth run blocker, so he shows up on the run side only.
// ── PLAYER SKILLS: ARCHETYPES AS LENSES ──────────────────
// An archetype used to be a BOX. A player was a "Power Back" and that was the whole truth about
// him: offTraitEdge returned 0.24 for a Power Back whether he was rated 60 or 99 (ovr was
// literally not read), and Power Back vs Elusive returned the identical number, so the box
// didn't even distinguish what it named. Eliteness bought nothing and the label did nothing.
//
// Now the SKILLS are the truth and the archetype is a LENS onto them. Every player carries a
// rating at each of his position's jobs, derived from ovr + his archetype's tilt + a
// deterministic per-player wobble. A back who's genuinely good at power AND hands reads as both
// a Power Back and a Receiving Back, and gets rewarded through both — instead of being forced
// into one box and scoring zero in the other. This generalizes the passBlk/runBlk model that
// already works for the offensive line.
//
// SKILL_DEFS: for each position, the jobs, and which archetype pushes each one up.
var SKILL_DEFS={
  QB: {arm:  ["Pocket Passer"], acc: ["Pocket Passer","Game Manager"],
       mob:  ["Dual-Threat"],   poise:["Game Manager"]},
  RB: {power:["Power Back"],    speed:["Elusive"],  hands:["Receiving Back"], care:["Power Back"]},
  WR: {speed:["Vertical Threat"], hands:["Possession"], route:["Slot","Possession"]},
  TE: {hands:["Receiving TE"],  block:["Blocking TE"]},
  OL: {pass: ["Pass Protector"], run:  ["Run Blocker"]},
  DL: {rush: ["Pass Rusher"],   stuff:["Run Stuffer"]},
  LB: {cover:["Coverage LB"],   thump:["Thumper"],  blitz:["Blitzer"]},
  CB: {press:["Press-Man CB"],  zone: ["Zone CB"],  speed:["Press-Man CB"]},
  S:  {ball: ["Ball-Hawk"],     box:  ["Box Safety"]}
};
// Display names for the skill keys. Terse in code; these are what a coach would call them.
var SKILL_LABEL={
  arm:"Arm", acc:"Accuracy", mob:"Mobility", poise:"Poise",
  power:"Power", speed:"Speed", hands:"Hands", care:"Ball Security",
  route:"Routes", block:"Blocking",
  pass:"Pass Block", run:"Run Block",
  rush:"Pass Rush", stuff:"Run Stuff",
  cover:"Coverage", thump:"Run Stop", blitz:"Blitz",
  press:"Press", zone:"Zone",
  ball:"Ball Skills", box:"Run Support"
};
// A skill number only says something the OVR doesn't if it's graded against the player HIMSELF.
// A 90 on a 92 overall is a weakness; a 78 on a 70 overall is his calling card.
function skillTone(v, ovr){
  var d=v-(ovr||70);
  if(d>=4)  return "#1a7f37";        // a real strength
  if(d<=-4) return "var(--red2)";    // a real hole
  return "var(--muted)";
}
// SIZING, measured rather than guessed. Everything downstream reads (skill - ovr), so this pair
// of constants sets how much signal the whole system has to work with. At 4.0/3.0 a real roster
// produced deviations spanning only -6..+7 with means near zero, and once _groupSkillDev
// averaged 3-5 starters the signal collapsed to sd 2.3 — which at any sane weight is a quarter
// point of margin. The skills existed, were displayed, and did nothing.
//
// Widened so a starting group's deviation carries real information. The archetype tilt is what
// survives averaging (every Possession receiver shares it), so THAT is the number that has to
// be big; the wobble is per-player colour that mostly washes out in a group and shouldn't try
// to do the heavy lifting.
var SKILL_SPLIT=9.0;    // how far an archetype pulls a skill from the player's overall
var SKILL_WOBBLE=3.5;   // per-player spread, so two same-archetype players aren't clones
// The whole point: a player can be genuinely good at a job his archetype DOESN'T name. That's
// what lets a man read through multiple lenses instead of exactly one.
//
// The first version of this failed that test. It gave the archetype's skill +SPLIT and every
// other skill -SPLIT*0.75, which meant a non-archetype skill could NEVER exceed the player's
// own overall — at any rating. A Pocket Passer could not have poise above his ovr, ever, so
// "high arm AND high poise" was literally unbuildable. That is the archetype box rebuilt with
// extra steps.
//
// So the off-archetype penalty SHRINKS as a player gets better. A 62 is a specialist — he does
// one thing and the rest of his game is a hole. A 95 is elite precisely BECAUSE he has no real
// holes: his archetype says what he's best at, not what he's limited to. That's what makes
// eliteness worth paying for, and it's why a great player fits any scheme.
function skillOf(p, skill){
  if(!p) return 60;
  var defs=SKILL_DEFS[p.pos]; if(!defs || !defs[skill]) return p.ovr||60;
  var ovr=p.ovr||60;
  var owners=defs[skill];
  var tilt;
  if(owners.indexOf(p.arch)>=0){
    tilt = +SKILL_SPLIT;                       // his archetype names this job
  } else {
    // How much a man is defined by his specialism, by level. At 60 the off-skills sit ~4.5
    // below him (a true one-trick player); by 95 they're ~0.9 below (he can do everything).
    var elite = clampN((ovr-60)/35, 0, 1);     // 60 -> 0, 95 -> 1
    tilt = -SKILL_SPLIT*(1.15 - 0.9*elite);
  }
  var h=nameHash((p.id||p.n||"x")+"|"+skill, 61);
  var wob=((h%1000)/500-1)*SKILL_WOBBLE;
  // Per-skill growth banked over a career. The uniform ovr rise lifts every skill together; this
  // is the DIVERGENCE on top of it — as a player levels up, his gains land unevenly (leaning
  // toward what he's already good at), so a Pocket Passer's arm and accuracy pull away from his
  // legs over time instead of everything climbing in lockstep. Stored, not derived, because it's
  // history, not a function of his current number. (see distributeSkillGains)
  var xtra = (p.skillXtra && p.skillXtra[skill]) ? p.skillXtra[skill] : 0;
  return clampN(Math.round(ovr + tilt + wob + xtra), 40, 99);
}
// When a player gains overall points, turn each point into `skillCount` skill points scattered
// across his position's skills, leaning toward the ones he's already strongest at — so growth
// sharpens a player's identity rather than raising him uniformly. Net effect is layered ON TOP
// of the uniform ovr rise skillOf already applies, so the mean of skillXtra is kept near zero:
// strengths gain, weaknesses give a little back, and the player's spread widens with age.
function distributeSkillGains(p, ovrGain){
  if(!p || ovrGain<=0) return;
  var defs=SKILL_DEFS[p.pos]; if(!defs) return;
  var skills=Object.keys(defs); var n=skills.length;
  if(!p.skillXtra){ p.skillXtra={}; skills.forEach(function(s){ p.skillXtra[s]=0; }); }
  // Current standing of each skill relative to the player's mean — the lean weight. A skill he's
  // already good at is likelier to catch a point; a weakness still can, just less often.
  var vals={}, mean=0;
  skills.forEach(function(s){ var v=skillOf(p,s); vals[s]=v; mean+=v; });
  mean/=n;
  var totalPoints = ovrGain*n;   // "number of stats of that position" per overall point
  for(var i=0;i<totalPoints;i++){
    // weighted pick: base share + a lean toward above-mean skills
    var weights=skills.map(function(s){ return 1 + Math.max(0,(vals[s]-mean))*0.22; });
    var sum=weights.reduce(function(a,b){return a+b;},0);
    var r=Math.random()*sum, pick=skills[0];
    for(var j=0;j<skills.length;j++){ r-=weights[j]; if(r<=0){ pick=skills[j]; break; } }
    p.skillXtra[pick]=(p.skillXtra[pick]||0)+1;
    vals[pick]+=1;   // reflect the point so a single skill doesn't run away within one gain
  }
  // Keep the extra centered near zero: the uniform ovr rise is the "average" growth, this only
  // encodes DIVERGENCE from it. Subtract the mean of the points just added so we don't
  // double-count the overall bump (which skillOf already reflects through `ovr`).
  var addMean=totalPoints/n;
  skills.forEach(function(s){ p.skillXtra[s]-=addMean; });
}
// Every skill a player has, as a map. For UI and for scoring.
function skillsOf(p){
  var defs=SKILL_DEFS[p.pos]; if(!defs) return {};
  var out={};
  Object.keys(defs).forEach(function(k){ out[k]=skillOf(p,k); });
  return out;
}
// ARCHETYPES AS READINGS. Which lenses does this player actually fit? A player is "a Power Back"
// if his power is high relative to himself — and he can be several things at once. This is what
// gets displayed: not the box he was born in, but what he has actually become.
// Returns [{arch, skill, score}] sorted strongest first, only those he genuinely fits.
function archLenses(p){
  var defs=SKILL_DEFS[p.pos]; if(!defs) return [];
  var sk=skillsOf(p);
  var mean=0, n=0;
  Object.keys(sk).forEach(function(k){ mean+=sk[k]; n++; });
  mean = n?mean/n:60;
  // A skill owned by SEVERAL archetypes can't distinguish between them — if QB.acc belongs to
  // both Pocket Passer and Game Manager, then every accurate QB "is" both, which is an artifact
  // of the table rather than a fact about the player. Measured: shared skills produced 701 of
  // 715 dual labels, while genuinely versatile players (Elusive/Power Back, Dual-Threat/Pocket
  // Passer) made up 14. So a shared skill contributes only a FRACTION of its strength — enough
  // to support a reading, never enough to create one on its own. A real second lens has to come
  // from a skill only that archetype claims.
  var seen={};
  Object.keys(defs).forEach(function(skill){
    var owners=defs[skill];
    var exclusive=(owners.length===1);
    var v=sk[skill]-mean;                    // how much this job stands out FOR HIM
    if(v<=1.0) return;
    if(!exclusive) v*=0.45;                  // shared: supporting evidence, not proof
    owners.forEach(function(arch){
      if(seen[arch]==null || v>seen[arch]) seen[arch]=v;
    });
  });
  var out=[];
  Object.keys(seen).forEach(function(a){ if(seen[a]>1.0) out.push({arch:a, score:seen[a]}); });
  out.sort(function(a,b){ return b.score-a.score; });
  return out;
}
// The label(s) to show. His top lens always; a second if he genuinely fits it too.
function archLabel(p){
  var L=archLenses(p);
  if(!L.length) return p.arch||"Balanced";     // fits nothing strongly: he's a generalist
  if(L.length>1 && L[1].score>=L[0].score*0.6) return L[0].arch+" / "+L[1].arch;
  return L[0].arch;
}
// A lineman used to be a binary: "Pass Protector" or "Run Blocker", and olBlock() just COUNTED
// them ((pp-rb)/n). That meant every Pass Protector on earth was identical, a 92 and a 61 moved
// the tilt exactly the same amount, and there was no such thing as a lineman who was simply good
// at both — the thing every real line wants.
//
// Now each lineman carries two derived ratings. DERIVED, not stored: computed from ovr + arch +
// a per-player deterministic wobble, so every lineman in every existing save has them instantly
// with no migration, and they track ovr as he develops. `arch` still drives which way he leans
// (and still feeds scheme.wants / schemeArchMatch, which must keep working), but now it's a tilt
// on a real number instead of the whole story.
var BLK_SCHEME_TILT=3.0;  // the system you rep moves the line's tilt this far
// Calibrated so a UNIFORM line lands where the old archetype-counting code put it (an all-Pass-
// Protector five ~+3.3 tilt, an all-Run-Blocker five ~-4.7), which keeps dRun/dPass tuning
// intact. At 7.0 the swing nearly doubled and an all-Run-Blocker line pinned the -6.5 clamp.
// The new value is in the SPECTRUM, not a bigger swing: a mixed line of good and bad players
// now reads differently from a mixed line of equals, which archetype-counting could never see.
var BLK_ARCH_SPLIT=4.0;   // how far an archetype pulls a lineman from his own overall
function _blkWobble(p, salt){
  // Deterministic per-player, so a lineman's strengths don't shuffle every time he's looked at.
  var h=nameHash((p.id||p.n||"x"), salt);
  return ((h%1000)/500-1)*2.2;    // ±2.2
}
function passBlkOf(p){
  if(!p) return 60;
  var tilt = (p.arch==="Pass Protector") ? +BLK_ARCH_SPLIT : (p.arch==="Run Blocker" ? -BLK_ARCH_SPLIT : 0);
  return clampN(Math.round(p.ovr + tilt + _blkWobble(p,23)), 40, 99);
}
function runBlkOf(p){
  if(!p) return 60;
  var tilt = (p.arch==="Run Blocker") ? +BLK_ARCH_SPLIT : (p.arch==="Pass Protector" ? -BLK_ARCH_SPLIT : 0);
  return clampN(Math.round(p.ovr + tilt + _blkWobble(p,47)), 40, 99);
}
function olBlock(){
  var r=(ST.save&&ST.save.roster)||[];
  var base=posDepthOvr(r,"OL");
  var st=depthOrder(r,"OL").slice(0, startersAt("OL"));
  // Averaging alone CANNOT see this: avg(ovr + archTilt) separates into avg(ovr) + avg(tilt),
  // so a line of elite protectors + weak maulers averages out identical to the reverse. The
  // pairing of WHO is good with WHICH job is exactly the thing worth modelling, so:
  //   · pass protection is a WEAK-LINK phase — one turnstile gets the quarterback killed
  //     regardless of how good the other four are, so the worst protector is weighted heavily.
  //   · run blocking is closer to a SUM — you run behind your best, and a mauler can pull to
  //     cover for a weak man next to him, so it leans toward the best.
  var pv=[], rv=[];
  st.forEach(function(p){ pv.push(passBlkOf(p)); rv.push(runBlkOf(p)); });
  var passR, runR;
  if(pv.length){
    pv.sort(function(a,b){return a-b;});   // ascending: pv[0] is the turnstile
    rv.sort(function(a,b){return b-a;});   // descending: rv[0] is the mauler
    var pMean=pv.reduce(function(a,b){return a+b;},0)/pv.length;
    var rMean=rv.reduce(function(a,b){return a+b;},0)/rv.length;
    // Weights tuned so a UNIFORM line reproduces the old archetype-counting tilt exactly
    // (5x80 Pass Protectors -> +3.32, 5x80 Run Blockers -> -4.68), keeping dRun/dPass tuning
    // intact. At 0.45 the worst man dominated and a line of three 92 protectors read as
    // run-heavy, which is nonsense. What these buy is the NON-uniform case: four studs and a
    // turnstile now grade +0.28 where five solid men grade +3.32 — the same average, a worse
    // pass-protecting line, which averaging alone can never see.
    passR = pMean*0.80 + pv[0]*0.20;                 // the weak link drags protection down
    runR  = rMean*0.85 + rv[0]*0.15;                 // the best blocker lifts the run game
  } else { passR=base; runR=base; }
  // The system you rep still moves the needle — a pass-first offense drills pass sets.
  var schemeTilt = ((50-offScheme().lean)/50)*BLK_SCHEME_TILT;
  passR += schemeTilt; runR -= schemeTilt;
  // A Blocking TE is a sixth run blocker.
  var teRun=0;
  depthOrder(r,"TE").slice(0, startersAt("TE")).forEach(function(p){ if(p.arch==="Blocking TE") teRun+=1.2; });
  runR += teRun;
  // The sim reads a TILT (how much better this line is at one than the other), not the level —
  // level is already priced into the team's off rating via posDepthOvr. Keep the same contract
  // and the same clamp the old tilt had, so dRun/dPass are unchanged.
  var tilt = clampN((passR-runR)/2, -6.5, 6.5);
  return {pass: base+tilt, run: base-tilt, base: base, tilt: tilt,
          passAdj: tilt, runAdj: -tilt,
          // the raw group ratings, for the roster/scouting UI
          passR: Math.round(passR), runR: Math.round(runR)};
}
// A CPU line tilts with its system, same as yours. No roster to read, so the system is all of it.
function cpuBlock(name){
  var tilt = clampN(((50-oppOffScheme(name).lean)/50)*(BLK_SCHEME_TILT+1.5), -6.5, 6.5);
  return {passAdj: tilt, runAdj: -tilt};
}
// Whoever has the ball brings his line with him. Falls back to a neutral line for any
// game state built without one (CPU-vs-CPU, old saves).
function blkOf(G, side){
  var t=G.teams[side];
  return (t && t.blk) || {passAdj:0, runAdj:0};
}

// ── PLAYER TRAITS DRIVE THE CALL, ON BOTH SIDES ──────────
// The whole point: what you're GOOD at on a given snap is decided by the archetypes of the
// players who actually execute that call — not by your scheme label. Run the ball and it's
// your backs and blockers; air it out and it's your QB and receivers. Blitz and it's your
// edge rushers; sit back and it's your secondary. So a roster of Power Backs and maulers is
// a running team no matter what's painted on the wall, and recruiting decides your identity
// as much as the scheme you pick. Returns an OVR-scale swing centred near zero: a group with
// none of the right traits is a slight drag, a fully-fitted group is a real edge.
function traitFrac(wants){   // wants: {pos:[archetypes]} → fraction of those starters who fit
  var s=ST.save; if(!s||!s.roster) return 0.4;
  var matched=0, total=0;
  Object.keys(wants).forEach(function(pos){
    depthOrder(s.roster,pos).slice(0, startersAt(pos)).forEach(function(p){
      total++; if(wants[pos].indexOf(p.arch)>=0) matched++;
    });
  });
  return total? matched/total : 0.4;
}
// Which SKILLS each call leans on. This replaces the old archetype headcount: the question is
// no longer "how many men wear the right label" but "how good are the men at the job".
var TRAIT_SKILLS={
  run:   {RB:["power","speed"],           TE:["block"]},
  pass:  {QB:["arm","acc"],               WR:["speed","hands","route"], TE:["hands"]},
  rush:  {DL:["rush"],                    LB:["blitz"]},
  cover: {CB:["press","zone"],            S:["ball"],                   LB:["cover"]}
};
// A 0..1 read of how well your STARTERS are equipped for a call.
//
// This used to be traitFrac(): a headcount of matching archetype labels. It ignored ovr
// entirely — offTraitEdge returned exactly 0.24 for a Power Back whether he was a 60 or a 99 —
// and it couldn't tell Power Back from Elusive, since both were merely "in the list". Eliteness
// bought nothing and the label bought everything.
//
// Now it reads the actual skills. 0.40 is the neutral point (an average roster), matching the
// old baseline so TRAIT_W and everything tuned against it still holds. A 75 is average, so it
// lands at 0.40; a group of 95s pushes toward 1.0; a group of 55s toward 0.
function traitSkillFrac(call){
  var s=ST.save; if(!s||!s.roster) return 0.40;
  var want=TRAIT_SKILLS[call]; if(!want) return 0.40;
  var tot=0, n=0;
  Object.keys(want).forEach(function(pos){
    depthOrder(s.roster,pos).slice(0, startersAt(pos)).forEach(function(p){
      want[pos].forEach(function(sk){ tot+=skillOf(p,sk); n++; });
    });
  });
  if(!n) return 0.40;
  var avg=tot/n;
  // Map skill 55..95 onto 0..1 with 75 (average) sitting at the old 0.40 neutral point, so a
  // roster that was "40% fitted" before and one that's plain average now agree.
  return clampN(0.40 + (avg-75)/50, 0, 1);
}
var TRAIT_W=2.4;   // a fully-fitted skill group is worth ~+1.4 on that call; an unfitted one ~-1
function traitEdgeFrom(call){ return (traitSkillFrac(call)-0.40)*TRAIT_W; }
// The four things you can be built to do. OL is deliberately absent here — the run/pass line
// tilt is already its own system (olBlock → dRun/dPass), so folding it in would double-count.
function runTraitEdge(){  return traitEdgeFrom("run"); }
function passTraitEdge(){ return traitEdgeFrom("pass"); }
function rushTraitEdge(){ return traitEdgeFrom("rush"); }
function coverTraitEdge(){return traitEdgeFrom("cover"); }
// The trait edge for the call you actually made. `balanced`/`standard` blends the two, so a
// team lopsided toward one side of the ball is quietly telling you which call to lean on.
function offTraitEdge(off){
  if(off==="run")  return runTraitEdge();
  if(off==="pass") return passTraitEdge();
  return (runTraitEdge()+passTraitEdge())/2;
}
function defTraitEdge(def){
  if(def==="blitz")   return rushTraitEdge();
  if(def==="prevent") return coverTraitEdge();
  return (rushTraitEdge()+coverTraitEdge())/2;
}
// What your roster is BUILT to do, in words — the personnel read shown on the scheme card so
// you can see your identity forming as you recruit, independent of the scheme you've picked.
function personnelLean(side){
  var a = side==="off" ? runTraitEdge()  : rushTraitEdge();
  var b = side==="off" ? passTraitEdge() : coverTraitEdge();
  var gap=a-b;
  if(side==="off"){
    if(gap>=1.0)  return {lbl:"Built to run",        note:"Your backs and blockers are your strength — lean on the ground game."};
    if(gap<=-1.0) return {lbl:"Built to throw",      note:"Your QB and receivers are your strength — this roster wants to air it out."};
    return {lbl:"Balanced personnel", note:"No strong tilt either way — you can win on the ground or through the air."};
  }
  if(gap>=1.0)  return {lbl:"Built to rush the passer", note:"Your front can get home — pressure is your best weapon."};
  if(gap<=-1.0) return {lbl:"Built to cover",           note:"Your back end is your strength — make them earn it underneath."};
  return {lbl:"Balanced personnel", note:"No strong tilt either way — you can bring pressure or drop into coverage."};
}

// ── Scheme identity: the cost of asking your system to do what it isn't built for ──
// NOT drift from a lean point (that punished balanced schemes for being balanced). Instead:
// every scheme has a "home" — the call it's built for — and the cost is how far BELOW home
// the call you made sits on the comfort scale. A multiple scheme is home everywhere, so it
// pays nothing to run or throw. A specialist pays to leave its lane.
var IDENTITY_W=4.0;   // the worst off-script call a specialist can make costs ~4 OVR
function offComfortOf(sc, off){
  var c=sc.comfort||{run:0.7, pass:0.7};
  if(off==="run")  return c.run;
  if(off==="pass") return c.pass;
  return (c.run+c.pass)/2;
}
function defComfortOf(sc, def){
  var c=sc.comfort||{blitz:0.7, cover:0.7};
  if(def==="blitz")   return c.blitz;
  if(def==="prevent") return c.cover;
  return (c.blitz+c.cover)/2;
}
function identityCost(side, tactics){
  var s=ST.save; if(!s) return 0;
  if(side==="off"){
    if(s.role==="DC") return 0;                       // you don't coach this unit
    var sc=offScheme(), c=sc.comfort||{run:0.7,pass:0.7};
    var home=Math.max(c.run, c.pass);                 // the call it's built for
    return Math.max(0, home - offComfortOf(sc, tactics.off)) * IDENTITY_W;
  }
  if(s.role==="OC") return 0;
  var dsc=defScheme(), dc=dsc.comfort||{blitz:0.7,cover:0.7};
  var dhome=Math.max(dc.blitz, dc.cover);
  return Math.max(0, dhome - defComfortOf(dsc, tactics.def)) * IDENTITY_W;
}

// ── Counters: reading the other guy ──────────────────────
// Every team in the league runs a real system, and it's on the pre-game card. Call INTO
// what a system gives up and you're rewarded; call into its strength and you're not.
// Nothing here is free — "Air It Out" against a Blitz-Heavy defense is the biggest payoff
// on the board and also the surest way to throw a pick, because dPass's aggro term doesn't
// care how clever the read was.
// BALANCED WEB: every call-row sums to ~0, so no call is a free default — each one beats some
// formations and loses to others, and the only way to gain is to match your call to the
// formation across from you. Run attacks light boxes and vacated gaps (Nickel, Blitz-Heavy)
// and dies on stout fronts (4-3, 3-4). Pass attacks the base fronts and dies against coverage
// (Nickel, Bend-Don't-Break) and against pressure (Blitz-Heavy).
//
// CORRECTED: pass used to be listed at +2.0 vs blitz — rated the single best counter in the
// table — on the theory that a blitz "takes nothing away reliably". The sim says otherwise and
// always did: blitz carries sack +0.040 and comp -0.034, which costs a passing play far more
// than +2.0 buys it. Measured head-to-head against a blitz, running gained 5.50 ypp and passing
// 5.10 even after the run's own bonus was zeroed out — the pass CANNOT win that matchup at any
// sane counter value. So cpuBestCounter was confidently calling the play the engine punished,
// for both sidelines, every time it saw pressure. Blitz is now what a blitz actually is: it
// vacates gaps (the run gets the reward) and it hunts the quarterback (the pass pays for it).
var OFF_COUNTER={   // your offensive call  →  vs THEIR defensive formation   (rows sum to 0)
  run:      {nickel:+2.0, zone:-0.8, base43:-1.4, multiple34:-1.4, blitz:+2.2},
  balanced: {},
  pass:     {nickel:-1.8, zone:-2.0, base43:+1.2, multiple34:+0.6, blitz:-2.2}
};
var DEF_COUNTER={   // your defensive call  →  vs THEIR offensive formation   (rows sum to 0)
  blitz:    {airraid:+2.4, westcoast:-0.8, spread:-1.0, prostyle:+0.6, pound:-1.2},
  standard: {},
  prevent:  {airraid:+1.8, westcoast:+1.0, spread:-0.8, prostyle:-0.6, pound:-1.4}
};
// ── GROUP MATCHUPS ───────────────────────────────────────
// The exploit layer. A play doesn't happen against a team's OVERALL rating — a pass happens
// against their corners and safeties, a run happens against their line and backers. Two teams
// rated 82 play completely differently if one is 90-at-the-line/71-in-the-secondary. This is
// what makes scouting worth doing: find the soft group and attack it.
//
// Deliberately modest. `edge` (talent) and the counter web are the primary forces; this is a
// third, smaller one that rewards ATTENTION. Returns yardage-channel mods in the same shape
// everything else in the sim uses, so it composes through addMods like any other modifier.
//
// Run:  our OL+RB      vs their DL+LB   → yards on the ground
// Pass: our QB+WR+TE   vs their CB+S    → completions and yards through the air
// The pass rush (their DL) shows up as sacks either way — you cannot scheme around a real one.
// MEASURED, not guessed. runEdge on real matchups has sd ~4.1 and reaches ±13. At the original
// 0.055 that made the whole group layer worth sd 0.23 yds/carry, and the ±1.2 clamp needed an
// edge of ±22 — so the clamp NEVER bound and the layer was near-silent on real rosters. The
// scouting report reads this same number, so it was honest about DIRECTION (verified monotonic)
// while overselling MAGNITUDE: it said "STRONG" about an effect worth a fifth of a yard.
//
// At 0.09 the spread between attacking a soft front (DL 60) and a stout one (DL 96) is
// ~1.4 yds/carry — a difference you can feel, and one that makes a scouting read worth acting
// on, without letting roster shape overrun the talent gap it sits alongside.
var GRP_W=0.09;    // per point of group SHAPE advantage.
// Groups must measure SHAPE, not LEVEL. `edge` (teams[poss].off - teams[def].def) already prices
// how much better one team is than the other; if this layer also read absolute group ratings it
// would charge for the same talent twice. Measured, that doubled the talent curve — an 8-point
// gap went from +11.8 to +25.2 margin and a 95% win rate.
// So each group is expressed as a DEVIATION from its own unit's average, and the matchup compares
// deviations. Two evenly-rated teams with different shapes get a real edge; two teams with the
// same shape get nothing no matter how far apart their ratings are. Level is edge's job.
function _dev(g, keys, weights){
  var tot=0,w=0; keys.forEach(function(p){ tot+=g[p]*weights[p]; w+=weights[p]; });
  var mean=tot/w, out={};
  keys.forEach(function(p){ out[p]=g[p]-mean; });
  return out;
}
function groupMatchup(ourG, theirG){
  if(!ourG || !theirG) return {runYds:0, comp:0, explosive:0, sack:0, shorten:0};
  var o=_dev(ourG, OFF_GROUPS, POS_WEIGHT);        // our offense, relative to our own offense
  var d=_dev(theirG, DEF_GROUPS, DEF_POS_WEIGHT);  // their defense, relative to their own defense
  var ourRun   = (o.OL*1.5 + o.RB*1.0)/2.5;
  var theirRun = (d.DL*1.5 + d.LB*1.0)/2.5;
  var ourPass  = (o.QB*1.6 + o.WR*1.2 + o.TE*0.5)/3.3;
  var theirPass= (d.CB*1.4 + d.S*1.0)/2.4;
  var runEdge  = ourRun - theirRun;    // is our run STRENGTH aimed at their run WEAKNESS?
  var passEdge = ourPass - theirPass;
  var rushEdge = d.DL - o.OL;          // their front's emphasis vs our protection's
  // NOTE: pass YARDAGE rides on `shorten` (subtracted from completion length, so negative
  // lengthens). There is no passYds channel — addMods doesn't carry one, and a mod it doesn't
  // carry is silently dropped rather than erroring.
  return {
    runYds:    clampN(runEdge*GRP_W,        -1.2, 1.2),
    comp:      clampN(passEdge*0.0030,      -0.07, 0.07),
    explosive: clampN(passEdge*0.0015,      -0.03, 0.03),
    sack:      clampN(rushEdge*0.0022,      -0.05, 0.05),
    shorten:   clampN(-passEdge*GRP_W*0.9,  -1.1, 1.1)
  };
}
// The single most exploitable group on a defense, for the scouting card.
function softestGroup(g){
  if(!g) return null;
  var d=[["DL",g.DL],["LB",g.LB],["CB",g.CB],["S",g.S]];
  d.sort(function(a,b){ return a[1]-b[1]; });
  return {pos:d[0][0], ovr:d[0][1], best:d[3][0], bestOvr:d[3][1]};
}
// ── SKILLS SHAPE THE PLAY ────────────────────────────────
// traitSkillFrac already prices how GOOD your players are — it feeds `edge`, the level channel.
// This is different: it's how your players' specific strengths change the SHAPE of what happens.
// Two 85-rated quarterbacks move `edge` identically, but the one with Poise 94 shouldn't throw
// the same number of interceptions as the one with Poise 71. Before this, they did — `int` and
// `fumble` were flat constants with no player input whatsoever, so a Game Manager and a
// gunslinger were mechanically the same man.
//
// EVERYTHING HERE IS RELATIVE TO THE PLAYER'S OWN OVERALL, for the same reason groupMatchup is:
// absolute skill would double-count talent that `edge` already charges for, and the measured
// consequence of that mistake (when I made it with position groups) was doubling the talent
// curve. A 95-overall QB with Poise 95 is exactly average at protecting the ball FOR A 95 — his
// eliteness is already in the rating. What this reads is the man who is unusually careful, or
// unusually careless, FOR HIS LEVEL.
//
// Returns mods in the standard shape, so it composes through addMods like anything else.
function _starterSkill(pos, skill){
  var s=ST.save; if(!s||!s.roster) return 0;
  var p=depthOrder(s.roster,pos)[0];
  if(!p) return 0;
  return skillOf(p,skill)-(p.ovr||70);        // deviation from his own level
}
// Averaged across the men who actually do the job (a receiving corps, not one man).
function _groupSkillDev(pos, skill, n){
  var s=ST.save; if(!s||!s.roster) return 0;
  var g=depthOrder(s.roster,pos).slice(0, n||startersAt(pos));
  if(!g.length) return 0;
  var tot=0;
  g.forEach(function(p){ tot += skillOf(p,skill)-(p.ovr||70); });
  return tot/g.length;
}
// Weights chosen by MEASURING what each channel is worth in game margin, not by intuition.
// Forcing a fixed mod on one channel and simming 4000 games each:
//   comp +0.05   -> +3.75 pts    <- by far the biggest lever in the sim
//   shorten -1.0 -> +2.80
//   runYds +0.5  -> +2.14
//   sack -0.03   -> +1.95
//   int -0.01    -> +1.84
//   runExpl +0.03-> +1.59
//   explosive+.03-> +1.35
//   fumble -.005 -> +0.52        <- nearly worthless
// The first cut of this fed int and fumble at ~full strength and comp at a third, i.e. it put
// the most skill signal into the least important channels. Now the allocation follows the
// leverage: accuracy and hands drive completions (the thing that decides games), poise still
// owns interceptions (it should — that's the Game Manager's whole identity), and ball security
// stays small because fumbles genuinely don't swing much.
var SK_COMP_QB=0.0022;  // per point of QB accuracy deviation — THE lever
var SK_COMP_WR=0.0016;  // per point of receiver hands deviation
var SK_INT=0.0016;      // per point of QB poise deviation. +/-8 poise ≈ +/-1.3% INT rate.
var SK_FUM=0.0009;      // per point of RB ball-security deviation
var SK_EXPL=0.0011;     // per point of receiver speed deviation
var SK_SHORT=0.055;     // per point of QB arm deviation — a big arm throws it further downfield
// Your offense's skill signature — applied to YOUR offensive snaps only.
function offSkillMods(){
  var poise=_starterSkill("QB","poise");
  var acc  =_starterSkill("QB","acc");
  var arm  =_starterSkill("QB","arm");
  var care =_groupSkillDev("RB","care");
  var hands=_groupSkillDev("WR","hands");
  var speed=_groupSkillDev("WR","speed");
  return {
    // Completions are the game's biggest lever, and they're a QB-and-receivers stat. An
    // accurate quarterback throwing to reliable hands is the most valuable thing an offense
    // can have, and before this neither of them touched it.
    comp:      clampN(acc*SK_COMP_QB + hands*SK_COMP_WR, -0.055, 0.055),
    int:       clampN(-poise*SK_INT,  -0.014, 0.014),   // poise protects the ball
    fumble:    clampN(-care*SK_FUM,   -0.008, 0.008),
    explosive: clampN(speed*SK_EXPL,  -0.018, 0.018),   // speed turns catches into scores
    shorten:   clampN(-arm*SK_SHORT,  -0.9, 0.9),       // arm strength = the ball travels
    sack:0, runYds:0, runExpl:0
  };
}
// Your defense's skill signature — applied to the OPPOSING offense, so the signs flip: your
// ball-hawks raise THEIR interception rate, your pass rush raises THEIR sack rate.
function defSkillMods(){
  var ball =_groupSkillDev("S","ball");
  var rush =_groupSkillDev("DL","rush");
  var cover=_groupSkillDev("CB","press");
  return {
    int:       clampN(ball*SK_INT,    -0.014, 0.014),
    sack:      clampN(rush*0.0020,    -0.020, 0.020),
    comp:      clampN(-cover*0.0024,  -0.038, 0.038),   // press corners suppress completions
    fumble:0, explosive:0, runYds:0, shorten:0, runExpl:0
  };
}
// ── CPU ADJUSTMENT: the defense keys on your tendencies ──
// A balanced web still gets solved if the opponent never reacts — you'd read the scouting
// card once and camp the right counter all game. So the defense ADJUSTS: lean on one call and
// they start sitting on it, and its edge bleeds away until you make them defend the whole
// field again. Not a full play-calling AI — just the "they've keyed on your run" adjustment a
// real coordinator makes. It's what turns the read into a running conversation instead of a
// lookup: the right answer keeps moving. Committal calls only — you can't key on "balanced".
var KEY_W=6.0;   // a fully predictable call (same thing 8+ snaps running) bleeds ~2.7 off its edge
function keyingPenalty(hist, call){
  if(call!=="run" && call!=="pass" && call!=="blitz" && call!=="prevent") return 0;
  var recent=hist.slice(-8);
  if(recent.length<4) return 0;                       // give it a few snaps before they read you
  var n=0; for(var i=0;i<recent.length;i++) if(recent[i]===call) n++;
  var freq=n/recent.length;
  return clampN(freq-0.55, 0, 0.45) * KEY_W;          // mix freely up to ~55%, then it bites
}
// True when the unit you coach is currently getting keyed on the tactic you've selected — used
// to warn you in the live panel so the adjustment is legible, not a silent nerf.
// Only warns for a unit YOU call: sideHist now also records your CPU counterpart's calls
// (he's keyable too — that's the point), but he doesn't need a panel warning, and his calls
// don't live in G.tactics, so the role gates below are what keep the two sources aligned.
function beingKeyed(G, side){
  if(!G||!G.userHist) return false;
  var s=ST.save; if(!s) return false;
  if(side==="off"){
    if(s.role==="DC") return false;
    return keyingPenalty(G.userHist.off, (G.tactics||{}).off)>0.6;
  }
  if(side==="def"){
    if(s.role==="OC") return false;
    return keyingPenalty(G.userHist.def, (G.tactics||{}).def)>0.6;
  }
  return false;
}
// Keying is applied to the SAME direct channel as the counter (dm), not the divided edge —
// otherwise it's a rounding error next to the counter it's meant to claw back. A keyed run
// gets stuffed; a keyed pass gets blanketed. When you spam the correct counter, this grows
// until it swallows the counter whole; mix, and it stays small.
function keyingMods(penalty, call, sign){
  var p=(penalty||0)*(sign||1);
  if(call==="run")     return {runYds:-p*0.30};
  if(call==="pass")    return {comp:-p*0.020, sack:+p*0.004};
  if(call==="blitz")   return {runYds:p*0.30, explosive:p*0.006};   // sign flips for D (helps opp offense)
  if(call==="prevent") return {comp:p*0.020, explosive:p*0.004};
  return {};
}
function counterBonus(table, call, oppSchemeId){
  if(!oppSchemeId) return 0;
  var row=table[call]; if(!row) return 0;
  return row[oppSchemeId] || 0;
}
// A read has to land where you can SEE it — in the yards, not in an abstract edge number.
// (Routed through the same outcome channels defMods uses, so a good call feels like a soft
// front conceding the run, because that's exactly what it is.) `sign` is +1 when the user
// has the ball and the counter helps him, −1 when he's defending and it hurts the offense.
// TUNING: at runYds 0.30 the harness had a perfect read swinging ~10 points a game, which
// made the matchup — not the roster — the game. At 0.16 the best call on the board is worth
// roughly a third of a yard a carry: enough to steal one you shouldn't win, never to carry a
// bad team. The int term is deliberately strong: a good read attacks the space the defense
// vacated (throwing hot into a blitz), which de-risks the throw enough to offset the pick-
// proneness of airing it out — so the aggressive "great call" the panel names actually earns
// it, instead of quietly losing EV to a safe run.
function counterMods(v, sign){
  var k=(v||0)*sign;
  return {sack:-k*0.004, comp:k*0.008, explosive:k*0.004, runYds:k*0.16, int:-k*0.0042, shorten:0};
}
// mergeMods deliberately drops the second operand's sack/int (tempo has neither). Counters
// have both, so they need a merge that actually adds everything.
function addMods(a,b){
  return {sack:(a.sack||0)+(b.sack||0), comp:(a.comp||0)+(b.comp||0),
          explosive:(a.explosive||0)+(b.explosive||0), runYds:(a.runYds||0)+(b.runYds||0),
          int:(a.int||0)+(b.int||0), shorten:(a.shorten||0)+(b.shorten||0),
          runExpl:(a.runExpl||0)+(b.runExpl||0), fumble:(a.fumble||0)+(b.fumble||0)};
}
// ── SCHEME PLAY-STYLE SIGNATURE ──────────────────────────
// Comfort says what a scheme is BUILT for; traits say what your PLAYERS are good at. This is
// the third leg: the TEXTURE of the plays themselves. It's why a West Coast pass and an Air
// Raid pass don't roll the same dice even at identical talent — one dinks and dunks the
// chains, the other takes deep shots. Always on for the unit you coach; it's your identity,
// not a toggle. Tuned near EV-neutral on purpose — a scheme isn't better, it's DIFFERENT, so
// which one fits depends on your roster and the game in front of you (down late? boom-or-bust;
// protecting a lead? move the chains). Fields are the same dm channels dRun/dPass already read.
var OFF_SIG={
  airraid:  {comp:-0.050, explosive:+0.060, int:+0.009, sack:+0.007, shorten:-0.9},
  westcoast:{comp:+0.075, explosive:-0.040, int:-0.008, sack:-0.013, shorten:+0.8},
  spread:   {comp:+0.020, explosive:+0.020, int:+0.006, sack:-0.010, runExpl:+0.030, fumble:+0.006, runYds:+0.05},
  prostyle: {},
  pound:    {runExpl:-0.024, fumble:-0.004, runYds:+0.18}
};
var DEF_SIG={
  nickel:    {comp:-0.028, explosive:-0.020, runYds:+0.55},
  zone:      {comp:+0.030, explosive:-0.055, int:+0.005, runYds:+0.20},
  base43:    {},
  multiple34:{comp:-0.016, sack:+0.020, int:+0.005},
  blitz:     {comp:-0.020, sack:+0.026, explosive:+0.030, runYds:+0.40, int:+0.004}
};
function offSchemeSig(){ if(ST.save&&ST.save.role==="DC") return {}; return OFF_SIG[offScheme().id]||{}; }
function defSchemeSig(){ if(ST.save&&ST.save.role==="OC") return {}; return DEF_SIG[defScheme().id]||{}; }
var OFF_SIG_TXT={
  airraid:  "Boom-or-bust deep shots — big plays, more picks.",
  westcoast:"Short, safe timing throws and YAC — moves the chains, few explosives.",
  spread:   "Tempo and QB runs — explosive on the ground, a bit turnover-prone.",
  prostyle: "No tendencies to key on — takes what the defense gives.",
  pound:    "A steady, grinding run game that eats clock."
};
var DEF_SIG_TXT={
  nickel:    "Takes away the pass, concedes a little on the ground.",
  zone:      "No big plays over the top — but the short stuff is there.",
  base43:    "Sound and gap-disciplined — no glaring hole to attack.",
  multiple34:"Disguised pressure that muddies the QB's reads.",
  blitz:     "Pressure and takeaways — at the risk of the shot behind it."
};
// Plain-language read on a call you've made, for the tactics panel.
function counterVerdict(v){
  if(v>=1.5)  return {mark:"✓✓", lbl:"Great call",  col:"var(--green)"};
  if(v>=0.5)  return {mark:"✓",  lbl:"Good call",   col:"var(--green)"};
  if(v<=-1.5) return {mark:"✗✗", lbl:"Playing into their hands", col:"var(--red2)"};
  if(v<=-0.5) return {mark:"✗",  lbl:"They're built for this",   col:"var(--red2)"};
  return {mark:"–", lbl:"Neutral", col:"var(--muted)"};
}

// In-season development: players make small gains during the year (younger + gems grow faster).
// Development also gradually "reveals" a player's hidden dev trait.
function developInSeason(){
  var s=ST.save; if(!s||!s.roster)return;
  var dev2 = hasArch("developer") || hasAbility("dev1"); // faster growth (archetype or Teacher skill)
  var revealFast = hasArch("developer") || hasAbility("dev2"); // Eye for Talent reveals sooner
  s.roster.forEach(function(p){
    var pot = Math.max(p.pot!=null?p.pot:99, p.ovr); // never below current (safety for old saves)
    var head = pot - p.ovr;
    if(head>0){
      // chance of a bump each week, weighted by youth; gems develop ~2x, busts ~half
      var youthBoost = p.yr==="FR"?0.30:(p.yr==="SO"?0.22:(p.yr==="JR"?0.14:0.08));
      if(dev2) youthBoost += 0.12; // developer grows players faster
      if(hasAbility("dev4")) youthBoost += 0.10; // Master Motivator: faster still
      if(facLvl("training")>0) youthBoost += 0.04*facLvl("training"); // Training Facilities
      youthBoost += staffBonus("dev"); // ...and your Director of Player Development, stacked on top
      // Who he is decides how much of your coaching actually lands.
      if(p.pers==="gymrat")    youthBoost += 0.14;
      if(p.pers==="coachable") youthBoost += 0.10 + staffBonus("dev")*0.8 + (dev2?0.05:0); // he gets MORE out of good coaching
      if(p.pers==="problem")   youthBoost -= 0.08;
      if(p.pers==="diva")      youthBoost -= 0.04;
      youthBoost += leadershipMod();   // the room he practises in every day
      var dmult = devMult(p.dev); // Elite 1.8 → Bust 0.5
      var nearCap = Math.min(1, head/6); // taper the final points so nobody snaps to their ceiling
      // TUNING: SOFT per-season growth limit. A hard cap made ~93% of blue-chip freshmen land on
      // the exact same number — flat and lifeless. Instead, once a player has already grown a few
      // points THIS season (tracked vs ssOvr, his kickoff rating), each further bump gets steeply
      // less likely. This keeps a natural spread (some freshmen pop, most rise moderately, a few
      // stall) while still pulling in the extreme +9/+10 seasons that made the arc front-loaded.
      var SOFT = (p.yr==="FR"||p.yr==="SO") ? 4 : 3;   // point past which growth slows hard
      var grownThisYear = p.ovr - (p.ssOvr!=null?p.ssOvr:p.ovr);
      var softMult = grownThisYear < SOFT ? 1 : Math.pow(0.45, grownThisYear-SOFT+1); // 1, .45, .20, .09 ...
      if(Math.random() < youthBoost*dmult*nearCap*softMult){
        var gain = 1;
        if(dev2) gain += 1;
        if(hasAbility("dev4")) gain += 1;
        var before=p.ovr;
        p.ovr=Math.min(pot, p.ovr+gain);
        distributeSkillGains(p, p.ovr-before);   // scatter the level's points across his skills
      }
    }
    // breakout: a small weekly chance to jump up a dev tier — much higher for players who start a lot
    if(p.dev!=="elite"){
      // Reps are what make a player. A starter breaks out ~4x as often — and a backup who gets real
      // snaps in a blowout is, for that week, a starter. This is the whole payoff for emptying the
      // bench: he isn't just running out the clock, he's developing.
      var starting=isStarterPlayer(p) || (p.reps||0)>0;
      var upC=(starting?0.008:0.002) + (facLvl("training")>0?0.0015:0); // starters break out ~4x as often
      if(p.yr==="FR"||p.yr==="SO") upC*=1.3; // young players have more runway to pop
      // ── PRODUCTION. A breakout should come from actually breaking out. ──
      // Nothing about a player's stats used to touch his development: a QB who threw for 4,200 and
      // 40 grew exactly like one who threw for 1,800 and 9. Now outplaying your rating is the
      // single biggest driver of a dev-tier jump — and underplaying it stalls you.
      var pi=prodIndex(p);
      upC *= clampN(0.35 + 0.85*pi, 0.4, 2.4);
      if(Math.random()<upC){
        p.dev=nextTrait(p.dev);
        p.pot=Math.max(p.pot||0, rollPotential(p.startOvr!=null?p.startOvr:p.ovr, p.dev));
        if(!devInfo(p.dev).hidden) p.revealed=true;
        if(starting){
          toast(pi>=1.35
            ? "📈 " + x(p.n) + " is playing out of his mind — he's turning into a " + traitName(p.dev) + " developer!"
            : "📈 " + x(p.n) + " is turning into a " + traitName(p.dev) + " developer!");
        }
      }
    }
    // reveal the hidden trait once a player has developed enough evidence (sooner with Eye for Talent)
    var revealThresh = revealFast?2:3;
    if(!p.revealed && (Math.abs(p.ovr-p.startOvr)>=revealThresh || p.yr==="JR" || p.yr==="SR")){
      if(!devInfo(p.dev).hidden) p.revealed=true;
    }
  });
}

         '<span class="t25-conf">'+x(t.c)+' &middot; '+stars(t.p)+(sel?' &middot; current':'')+'</span></div>';
    });
  });
  h+='</div>';
  h+='<button class="bigbtn btn-gold" id="edit-done" style="margin-top:10px">Done →</button>';

function schemePickerCard(side, list, current, fit, compact){
  var s=ST.save;
  var h='<div class="gp-card"><div class="gp-card-h">'+(side==="off"?"Offense":"Defense")+' '+fitPill(fit)+'</div>';
  h+='<div class="scheme-chips" data-scheme-strip="'+side+'">';

    h+='<button class="scheme-chip'+(sc.id===current.id?" sel":"")+'" data-scheme="'+side+':'+sc.id+'">'+x(sc.name)+'</button>';
  });
  h+='</div>';
  h+='<div class="scheme-desc">'+x(current.desc)+'</div>';
  // What this system is built to do — its home, and what it pays to leave. Read straight off
  // the comfort profile so the words can never drift from the sim.
  var c=current.comfort||{};
  var builtLbl, builtNote;
  if(side==="off"){
    var dr=(c.run||0)-(c.pass||0);
    if(Math.abs(dr)<0.12){ builtLbl="Multiple"; builtNote="Built to run and throw with equal ease — call either at no cost."; }
    else if(dr>0){ builtLbl="Run-first"; builtNote=(c.pass<0.5?"Built to pound it. Airing it out means leaving what you rep.":"Leans on the ground game, but can throw when it needs to."); }
    else { builtLbl="Pass-first"; builtNote=(c.run<0.5?"Built to sling it. Lining up to pound the rock fights your own reps.":"Leans on the pass, but has a real change-up in the run game."); }
  } else {
    var dd=(c.blitz||0)-(c.cover||0);
    if(Math.abs(dd)<0.12){ builtLbl="Multiple"; builtNote="Built to bring pressure or drop into coverage — call either at no cost."; }
    else if(dd>0){ builtLbl="Pressure"; builtNote=(c.cover<0.5?"Built to bring the house. Sitting back gives up what makes it work.":"Leans on pressure, but can play it safe when it has to."); }
    else { builtLbl="Coverage"; builtNote=(c.blitz<0.5?"Built to blanket receivers. Sending the house isn't what it reps.":"Leans on coverage, but can dial up pressure as a change-up."); }
  }
  h+='<div class="scheme-flex">🎯 <b>'+builtLbl+'</b> · '+x(builtNote)+'</div>';
  // The play-style signature — how this scheme's snaps actually FEEL, which is what makes the
  // two "in-between" systems (Spread, West Coast) distinct from the specialists and each other.
  var sigTxt=(side==="off")?(OFF_SIG_TXT[current.id]||""):(DEF_SIG_TXT[current.id]||"");
  if(sigTxt) h+='<div class="scheme-style">🎬 '+x(sigTxt)+'</div>';
  // ...and your PERSONNEL — what your players are built to do, which may not match the scheme

    // and whether your roster fits it. The per-starter archetype list is behind a tap so it's
    // available for recruiting decisions without making this pane tower over the others.
    var bfc=bestScheme(side);
    if(bfc.id!==current.id) h+='<div class="scheme-best">💡 Your roster best fits <b>'+x(bfc.name)+'</b> right now.</div>';
    // The full per-starter breakdown, collapsed. `spWantRows` builds the same rows the full card

    h+='<details class="sw-details"><summary>See how your starters fit</summary>'+
       (side==="off"?blockRow():"")+
       spWantRows(side, current)+
       '</details>';

  if(side==="off") h+=blockRow();

  h+=spWantRows(side, current);
  var bf=bestScheme(side);
  if(bf.id!==current.id) h+='<div class="scheme-best">💡 Your roster best fits <b>'+x(bf.name)+'</b> right now.</div>';
  h+='</div>';

    });
  });
  if(!anyRow) h+='<div style="font-size:9.5px;font-weight:700;color:var(--muted)">No starters yet on this unit.</div>';
  h+='</div>';
  h+='<div class="scheme-wants-note">Keys: '+Object.keys(current.wants).map(function(pos){return '<b>'+pos+'</b> '+current.wants[pos].join("/");}).join(" · ")+' · <span style="color:var(--muted)">other spots flexible (–)</span></div>';
  return h;
}
// ── THE MISMATCH REPORT ──────────────────────────────────
// The group system knows, for every game, which of our units out-matches which of theirs. That
// is the single most actionable thing in the app and until now it was invisible: the scouting
// block named their two schemes and stopped. A coach doesn't walk in knowing only "they run a
// 4-3" — he knows their corners can't run and his slot receiver is going to eat.
//
// Every number here comes from the same groups the sim uses, so the report cannot drift from
// what happens on the field. A mismatch has TWO parts and the report needs both:
//   LEVEL — our unit's raw rating minus theirs. This is "are we simply better here." A 74 team
//           against a much weaker one is better everywhere, and the report has to SAY so.
//   SHAPE — each group against its own unit's mean, our advantage minus theirs. This is "where
//           are they soft relative to themselves" — the spot to attack even against a peer.
// An earlier version read SHAPE only. That's correct for finding the soft spot, but it threw
// level away entirely, so a strong team facing a weak one — every unit better, none standing
// out — read "even" across the board. Which is exactly backwards: that team has an edge
// everywhere. Now level carries most of the weight and shape tilts it.
function mismatches(oppName){
  var ourG=groupsFor(ST.save.school), theirG=groupsFor(oppName);
  if(!ourG || !theirG) return null;
  function dev(g, keys, w){
    var tot=0, sw=0;
    keys.forEach(function(p){ tot+=g[p]*w[p]; sw+=w[p]; });
    var mean=tot/sw, o={};
    keys.forEach(function(p){ o[p]=g[p]-mean; });
    return o;
  }
  // Weighted unit rating for a specific battle — the LEVEL half.
  function lvl(g, spec){
    var tot=0, sw=0;
    Object.keys(spec).forEach(function(p){ tot+=g[p]*spec[p]; sw+=spec[p]; });
    return tot/sw;
  }
  var o=dev(ourG, OFF_GROUPS, POS_WEIGHT),   od=dev(ourG, DEF_GROUPS, DEF_POS_WEIGHT);
  var t=dev(theirG, OFF_GROUPS, POS_WEIGHT), td=dev(theirG, DEF_GROUPS, DEF_POS_WEIGHT);
  // Each battle: LEVEL gap (our unit minus theirs) plus a fraction of the SHAPE tilt. Level is
  // the dominant term — being better matters more than being differently-shaped — but shape can
  // still swing an otherwise even matchup, and against a peer it's the whole story.
  var SHAPE=0.55;
  function edge(ourLvlSpec, theirLvlSpec, ourShape, theirShape){
    return (lvl(ourG,ourLvlSpec) - lvl(theirG,theirLvlSpec)) + SHAPE*(ourShape - theirShape);
  }
  var m=[];
  m.push({key:"run",
          edge: edge({OL:1.5,RB:1}, {DL:1.5,LB:1}, (o.OL*1.5+o.RB)/2.5, (td.DL*1.5+td.LB)/2.5),
          us:"our run game", them:"their front",
          win:"Run it. Their front is the soft spot.",
          lose:"Don't test their front — throw it."});
  m.push({key:"pass",
          edge: edge({QB:1.6,WR:1.2,TE:0.5}, {CB:1.4,S:1}, (o.QB*1.6+o.WR*1.2+o.TE*0.5)/3.3, (td.CB*1.4+td.S)/2.4),
          us:"our passing game", them:"their secondary",
          win:"Throw it. Their secondary can't hang.",
          lose:"Their coverage is the strength — stay on the ground."});
  m.push({key:"prot",
          edge: edge({OL:1}, {DL:1}, o.OL, td.DL),
          us:"our protection", them:"their rush",
          win:"Your line handles their rush — you'll have time.",
          lose:"Their rush beats your line. Get the ball out."});
  // ...and the same three from the other side of the ball, so a DC has something to read.
  m.push({key:"drun",
          edge: edge({DL:1.5,LB:1}, {OL:1.5,RB:1}, (od.DL*1.5+od.LB)/2.5, (t.OL*1.5+t.RB)/2.5),
          us:"our front", them:"their run game",
          win:"Your front should stuff their run.",
          lose:"They'll run on you. Load the box."});
  m.push({key:"dpass",
          edge: edge({CB:1.4,S:1}, {QB:1.6,WR:1.2,TE:0.5}, (od.CB*1.4+od.S)/2.4, (t.QB*1.6+t.WR*1.2+t.TE*0.5)/3.3),
          us:"our coverage", them:"their passing game",
          win:"Your coverage matches up well.",
          lose:"They'll throw on you. Pressure the quarterback."});
  m.sort(function(a,b){ return Math.abs(b.edge)-Math.abs(a.edge); });
  return m;
}
// How loud an edge is. The thresholds are in rating points now that level is folded in — a
// couple of points is noise, ~5+ is a real gap you can lean on.
function mmTier(e){
  var a=Math.abs(e);
  if(a>=8) return 2;      // a decisive edge
  if(a>=3) return 1;      // worth knowing
  return 0;               // even
}
function scoutingReport(oppName){
  var m=mismatches(oppName);
  if(!m) return '';
  var off=m.filter(function(x){ return x.key==="run"||x.key==="pass"||x.key==="prot"; });
  var def=m.filter(function(x){ return x.key==="drun"||x.key==="dpass"; });
  var s=ST.save, h='';
  function bar(e){
    var t=mmTier(e);
    if(!t) return '<span style="color:var(--muted);font-weight:800">even</span>';
    var good=(e>0), c=good?'var(--green)':'var(--red2)';
    var mark=(t===2)?(good?'▲▲':'▼▼'):(good?'▲':'▼');
    return '<span style="color:'+c+';font-weight:900">'+mark+'</span>';
  }
  function rows(list){
    var out='';
    list.forEach(function(x){
      out+='<div class="sr-scout-row"><span>'+x.us+' <span style="color:var(--muted)">vs</span> '+x.them+'</span>'+bar(x.edge)+'</div>';
    });
    return out;
  }
  if(s.role!=="DC"){ h+=rows(off); }
  if(s.role!=="OC"){ h+=rows(def); }
  // The headline: the loudest mismatch on the unit you actually coach, phrased as an order.
  var mine=(s.role==="DC")?def:off;
  var top=mine[0];
  if(top && mmTier(top.edge)){
    h+='<div class="sr-scout-note" style="color:'+(top.edge>0?'var(--green)':'var(--red2)')+
       ';font-weight:900">'+x(top.edge>0?top.win:top.lose)+'</div>';
  } else {
    h+='<div class="sr-scout-note">No clear edge either way — this one comes down to execution.</div>';
  }
  return h;
}
function schemeReadout(oppName){

  var tabs='', body='';

// Your line, described the way a coach would see it on tape: not two numbers, but which
// job it's built for and how far it leans. The tilt is the whole story — a line that mauls
// in the run game is, by the same token, softer in pass pro, and vice versa.
function blockRow(){
  var b=olBlock();
  var tl=b.tilt;
  var lean, note;
  if(tl>=5){        lean="Elite pass-pro wall";  note="A pocket that holds all day — but they'll get moved off the ball in the run game."; }
  else if(tl>=3.5){ lean="Pass-protecting line"; note="Keeps the pocket clean — built to throw. Gives ground when asked to maul."; }
  else if(tl>=1.2){ lean="Leans pass-pro";       note="More comfortable in pass sets than run-blocking."; }
  else if(tl>-1.2){ lean="Balanced line";        note="No real weakness either way — blocks both jobs evenly."; }
  else if(tl>-3.5){ lean="Leans run-blocking";   note="More comfortable moving people than holding the edge in pass pro."; }
  else if(tl>-5){   lean="Mauling run line";      note="Blows open running lanes — built to pound. Softer against the pass rush."; }
  else {            lean="Road-grading run line"; note="Buries people off the ball — but the pass rush gets home if you hold it."; }
  return '<div class="sr-blk-row"><div class="sr-blk-lean"><span class="sr-blk-ico">🧱</span><b>'+lean+'</b></div>'+
         '<div class="sr-blk-note">'+x(note)+'</div></div>';
}

// ── Season-long recruiting tab ───────────────────────────
// ── NIL (real football $, anchored to public NIL trackers) ─────────────────
// Football-only NIL budget in $millions, by program prestige, +facilities +last wins.
// Anchors: elite ≈ $40M (Texas), solid P4 ≈ $11M (Wake), top G5 ≈ $11M (USF), G5 ≈ $4M (Tulsa).
// Annual NIL collective pool, in $M, by prestige. FBS and FCS are entirely different
// markets: an elite FCS collective (Montana, South Dakota State) runs ~$2M, while the
// smallest ones scrape together ~$250K. A blue-blood FBS program clears $30M+. Prestige
// is scaled WITHIN a subdivision, so an FCS 5-star must never draw an FBS 5-star's pool.
var NIL_BASE={1:4, 2:8, 3:12, 4:22, 5:36};                      // FBS: $4M → $36M
var NIL_BASE_FCS={1:0.25, 2:0.5, 3:0.75, 4:1.4, 5:2.2};         // FCS: $250K → $2.2M
function nilBaseFor(prestige, conf){
  var tbl = isFCSConf(conf) ? NIL_BASE_FCS : NIL_BASE;
  return tbl[prestige] || (isFCSConf(conf) ? 0.5 : 8);
}
// Everything downstream (facility bonuses, win bonuses, per-recruit caps, player demands)
// is expressed as a FRACTION of the elite pool for that subdivision, so the whole economy
// rescales together instead of a maxed facility dwarfing an FCS budget.
function nilElitePool(){ return isFCSConf(ST.save.conf) ? NIL_BASE_FCS[5] : NIL_BASE[5]; }
// Position value weights — the NIL market pays QBs the most, then premium skill/pass-rush/corner.
var NIL_POS_W={QB:1.9, WR:1.2, CB:1.15, DL:1.15, RB:1.05, S:0.95, LB:0.95, OL:0.9, TE:0.85};
// Per-position annual pay bands ($M) at a P4-elite scale: [starterLo, starterHi, depthLo, depthHi].
// Everything scales down by program NIL pool (a G6 pays a fraction of these).
var POS_PAY={
  QB:[1.5,3.5,0.05,0.10], WR:[0.8,2.0,0.025,0.05], DL:[0.7,1.7,0.02,0.04],
  OL:[0.4,1.0,0.015,0.03], RB:[0.4,1.0,0.015,0.03], CB:[0.4,1.0,0.015,0.03],
  S:[0.3,1.0,0.015,0.03], TE:[0.3,0.8,0.015,0.03], LB:[0.3,0.7,0.015,0.03]
};
function fmtMoney(m){ m=m||0; if(m>=1) return "$"+(Math.round(m*10)/10)+"M"; if(m>0.0001) return "$"+Math.round(m*1000)+"K"; return "$0"; }
function money2(m){ return Math.round((m||0)*100)/100; } // avoid float drift
// Season NIL budget multiplier from the NIL coaching branch (stacks).
function nilPerkBudgetMult(){
  var m=1;
  if(hasAbility("nil1")) m+=0.20;   // Booster Club
  if(hasAbility("nil4")) m+=0.35;   // Blank Check
  if(hasAbility("nil5")) m+=0.50;   // Collective Empire
  return m;
}
// Per-recruit NIL offer caps — Blank Check lets you go much bigger on one target.
// Caps on what you may commit to ONE recruit, and to the recruiting class overall.
// These were flat ($8M / $15M), which is larger than an entire FCS collective — the cap
// would never bind and an FCS coach could offer a recruit 4x his whole budget. Expressing
// them as a share of your own pool keeps the constraint meaningful at every level.
//
// The percentages are reverse-engineered from the old flat caps at the case they were tuned
// for (a head coach at an elite FBS program: $8M/$36M = 22%, $15M/$36M = 42%), so that
// scenario is unchanged. Everywhere else the flat cap was simply non-binding.
function nilRecruitCap(){
  var pool=Math.max(0.01, nilBudgetFor());
  var big=hasAbility("nil4");                       // Blank Check
  return { per:   money2(pool * (big?0.34:0.23)),   // one recruit: ~23% of the pool (34% w/ perk)
           total: money2(pool * (big?0.67:0.42)) }; // whole class: ~42% (67% w/ perk)
}
// ═════════════════════════════════════════════════════════
// THE BOARD PLEDGE
// Before the season you sit down with the board and tell them what you're going to do. Promise
// little and they'll fund you like it. Promise the moon and the collective opens up — but if you
// miss, they remember exactly what you said. Ambition is bought with your job.
// ═════════════════════════════════════════════════════════
// ── COMPOSE YOUR OWN PROMISE ──────────────────────────────
// A fixed ladder of five bundles was the wrong shape: "Contend" forced 11 wins AND the playoff AND
// a big class, take it or leave it. You now build the promise yourself, one goal at a time. Each
// goal carries an AMBITION cost; the total decides your NIL budget. And because each goal is
// separate, the board judges you on each of them separately — hit two of three and you're fine.
// THE FLOOR. You cannot promise the board less than it already expects. Six wins at Alabama isn't
// "playing it safe" — it's a firing. The lowest rung of every slot IS the baseline expectation for
// the job you took, and hitting it earns you almost nothing, because it's the least they'll accept.
function winsSlot(){
  var s=ST.save, floor=expectWinsFor(s.prestige, s.conf);
  var games=(s.schedule||[]).length||12;
  var opts=[];
  [0,1,2,3,4].forEach(function(step){
    var w=Math.max(2, Math.min(games, floor+step));
    opts.push({v:w, amb:step, t:w+"+ wins"});
  });
  var seen={}, out=[];
  opts.forEach(function(o){ if(!seen[o.v]){ seen[o.v]=1; out.push(o); } });
  return out;
}
function postSlot(){
  var s=ST.save, fcs=(myDivision()==="FCS");
  var all=[
    {v:null,       amb:0, t:"No postseason promise"},
    {v:"bowl",     amb:1, t:fcs?"Make the FCS playoff":"Reach a bowl game"},
    {v:"playoff",  amb:2, t:fcs?"Reach the quarterfinals":"Make the Playoff (top 12)"},
    {v:"semis",    amb:3, t:"Reach the semifinals"},
    {v:"title",    amb:5, t:"Win the national title"}
  ];
  // At a program with real expectations, "we might not play in January" isn't on the table.
  var floorIdx = (s.prestige>=5) ? 2 : (s.prestige>=4) ? 1 : 0;
  // ...but never slice out a goal you've ALREADY pledged this season. If prestige rose after you
  // made the promise, the floor would drop your option and pledge() would silently fall back to a
  // HARDER goal (P[1]) — so your "Make the FCS playoff" box could never be checked. Keep your own
  // pledged tier in range.
  if(s.pl && s.pl.post!=null){
    var pledgedIdx=-1;
    all.forEach(function(o,i){ if(o.v===s.pl.post) pledgedIdx=i; });
    if(pledgedIdx>=0 && pledgedIdx<floorIdx) floorIdx=pledgedIdx;
  }
  return all.slice(floorIdx).map(function(o,i){ return {v:o.v, amb:i, t:o.t}; });
}
function progSlot(){
  var s=ST.save, bg=buildGoalFor(s.prestige, s.conf);
  var star=bg.star||3, n=bg.n||2;
  var mk=function(st,cnt,amb){ return {v:{key:"recruit",star:st,n:cnt}, amb:amb,
    t:(cnt>1?("Sign "+cnt+" "+st+"★ recruits"):("Sign a "+st+"★ recruit"))}; };
  // The ladder must MONOTONICALLY escalate. Raise the star tier until it caps at 5★, then start
  // asking for more of them. (It previously offered "a 5★" as MORE ambitious than "2 5★", and
  // repeated itself — a ladder that went sideways and then backwards.)
  var out=[{v:null, amb:0, t:"No recruiting promise"}];
  var rungs=[[Math.max(2,star-1), n], [star, n], [Math.min(5,star+1), n], [Math.min(5,star+1), n+1]];
  var seen={}, amb=1;
  rungs.forEach(function(r){
    var st=r[0], cnt=r[1], key=st+"x"+cnt;
    if(seen[key]){ cnt=cnt+1; key=st+"x"+cnt; }   // star tier is capped — ask for one more instead
    if(seen[key]) return;
    seen[key]=1;
    out.push(mk(st,cnt,amb++));
  });
  return out;
}
// Your promise = one pick from each slot. Defaults to something reasonable.
function pledge(){
  var s=ST.save;
  s.pl=s.pl||{};
  var W=winsSlot(), P=postSlot(), G=progSlot();
  var w = W.filter(function(o){return o.v===s.pl.wins;})[0] || W[1] || W[0];
  var p = P.filter(function(o){return o.v===s.pl.post;})[0] || P[1];
  var g = G.filter(function(o){return o.t===s.pl.prog;})[0] || G[2];
  // THE CAP HAS TO BITE. Blocking new selections wasn't enough: a coach who'd already promised the
  // moon simply KEPT that promise year after year while his credibility collapsed. If your word is
  // no longer worth what you're claiming, the board walks the promise back for you — the biggest
  // claims go first (a title run from a man who's never won one), then the class, then the wins.
  if(!s._pledgeLocked){
    var cap=maxAmbAllowed();
    var guard=0;
    while(w.amb+p.amb+g.amb > cap && guard++ < 20){
      if(p.amb>0 && p.amb>=g.amb && p.amb>=w.amb){ p=P[Math.max(0, P.indexOf(p)-1)]; continue; }
      if(g.amb>0 && g.amb>=w.amb){ g=G[Math.max(0, G.indexOf(g)-1)]; continue; }
      if(w.amb>0){ w=W[Math.max(0, W.indexOf(w)-1)]; continue; }
      break;
    }
    s.pl.wins=w.v; s.pl.post=p.v; s.pl.prog=g.t;
  }
  return {w:w, p:p, g:g, amb:(w.amb+p.amb+g.amb)};
}
// ── BOARD TRUST ───────────────────────────────────────────
// Without this you could promise the moon EVERY year, take the money, fail, and promise it again.
// The board remembers. Trust is your credibility: deliver and they'll bankroll whatever you say
// next; keep over-promising and they stop writing the cheque, no matter what you claim you'll do.
// Crucially it discounts the AMBITION PREMIUM, not your base budget — so a liar still gets funded
// like the coach he actually is, he just can't sell the moon twice.
function boardTrust(){
  // Board trust and job security are ONE standing with the board — the same bar. We keep it in
  // jobSecurity (which every result already moves: wins, titles, portal losses, the season verdict)
  // and read it here so the "trust" that gates NIL ambition is exactly your security on the seat.
  var s=ST.save;
  var t=(s && s.jobSecurity!=null) ? s.jobSecurity : (s && s.boardTrust);
  return (t==null) ? 55 : Math.max(0, Math.min(100, t));
}
function trustBand(){
  var t=boardTrust();
  if(t>=80) return {t:"Total faith",  s:"SECURE",   c:"#1a7f37", d:"They'll bankroll anything you say. Your seat is rock-solid."};
  if(t>=60) return {t:"Trusted",      s:"TRUSTED",  c:"var(--gold-dark)", d:"Your word carries weight and your job is safe."};
  if(t>=40) return {t:"Wary",         s:"WARM SEAT",c:"var(--gold-dark)", d:"They've been burned before — the seat's getting warm."};
  if(t>=20) return {t:"Sceptical",    s:"HOT SEAT", c:"#e8944a", d:"They've heard this from you already. Hot seat."};
  return {t:"They don't believe you", s:"HOT SEAT", c:"var(--red2)", d:"The money isn't coming and the seat is on fire."};
}
// How much of the ambition premium the board is actually willing to fund.
function trustFactor(){ return 0.25 + (boardTrust()/100)*1.15; }   // 0.25x at zero, 1.4x at full faith
// Somebody who's never delivered can't sell a title run.
function maxAmbAllowed(){
  var t=boardTrust();
  if(t>=60) return 99;
  if(t>=40) return 9;
  if(t>=20) return 6;
  return 3;                      // they'll fund a rebuild and nothing more
}
// Ambition (0–13) buys money. Promise nothing and they fund you like it.
function pledgeNilMult(){ return 0.70 + pledge().amb*0.12*trustFactor(); }
// What each goal is worth, and what it costs you to miss it.
// Hitting the floor at a blue-blood earns almost nothing — it's the least they'll accept. Missing
// it is a different matter entirely: the bigger the job, the further the fall.
function goalStakes(amb){
  var pres=(ST.save && ST.save.prestige) || 3;
  var weight=(pres-1)*3;                    // the price of the chair you sit in
  return {win: 2+amb*2, miss: -(2 + amb*4 + weight)};
}
function pledgeLabel(){
  var a=pledge().amb;
  if(a<=2)  return "Play it safe";
  if(a<=5)  return "Compete";
  if(a<=8)  return "Contend";
  if(a<=11) return "Go for it";
  return "Promise the moon";
}
function setGoal(slot, idx){
  var s=ST.save;
  if(s._pledgeLocked){ toast("The season's under way — the board has your word."); return; }
  s.pl=s.pl||{};
  // Try it and see: if it pushes you past what your credibility can carry, they won't hear it.
  var trial={wins:s.pl.wins, post:s.pl.post, prog:s.pl.prog};
  if(slot==="wins") trial.wins=winsSlot()[idx].v;
  if(slot==="post") trial.post=postSlot()[idx].v;
  if(slot==="prog") trial.prog=progSlot()[idx].t;
  var W=winsSlot(), P=postSlot(), G=progSlot();
  var tw=(W.filter(function(o){return o.v===trial.wins;})[0]||W[1]||W[0]).amb;

function pledgeLadder(){

function nilBudgetFor(){

function nilDemand(p){

// with a Math.max(0.2, gap) floor. Three things were wrong with that, and they compounded:
//   1. The 0.2 floor is FBS dollars and was never scaled, so at FCS (market scale ~0.06) it was

//   2. Because the floor always won, a FULLY FUNDED player cost exactly the same to keep as one

  } else {
    var p=(s.roster||[]).filter(function(x){return x.id===np.id;})[0];
    if(p){ p.nilFund=money2((p.nilFund||0)+amt); s.nilLeft=money2(s.nilLeft-amt); toast("💰 Funded "+x(p.n)+" · "+fmtMoney(p.nilFund)); }
  }

// One-tap: top a player up to exactly what he's asking for. Same accounting as
// commitNIL(), just with the amount computed instead of chosen on a slider.
function matchNIL(id){
  var s=ST.save, p=(s.roster||[]).filter(function(x){return x.id===id;})[0];
  if(!p) return;
  var gap=money2(nilDemand(p)-(p.nilFund||0));
  if(gap<=0){ toast("Already funded"); return; }
  if((s.nilLeft||0)+1e-9 < gap){
    // partial funding wouldn't be a "match" — say so rather than quietly underpay
    toast("Need "+fmtMoney(gap)+" to match "+x(p.n)+" · only "+fmtMoney(s.nilLeft)+" left");
    return;
  }
  p.nilFund=money2((p.nilFund||0)+gap);
  s.nilLeft=money2(s.nilLeft-gap);
  toast("🤝 Matched "+x(p.n)+" · "+fmtMoney(gap));
  persist(); redrawKeepScroll();
}
