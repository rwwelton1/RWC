};
// ── Realignment: who moves, and why ──────────────────────
// A school's conference is worth something to it, and that worth is what a rival league has to
// beat. The two inputs that matter are the league's STANDING (tier — money, exposure, recruiting
// pull) and the school's PLACE in it (a blue blood in a tier-3 league has enormous sunk value; a
// bottom-feeder in the same league has much less). Add stability: a conference that's losing
// members is worth less than an intact one, because you're buying into its future, not its past.
//
// This is what stops the silly outcomes. Texas never leaves the SEC — a 5-star in a stable tier-3
// league scores near the ceiling and nothing can outbid it. But South Carolina, a middling
// program in that same league, has far less to lose, so a strong enough offer can move it.
function confValueFor(teamName, confName){
  var s=ST.save, L=s.league; if(!L) return 0;
  var t=L.teams[teamName]; if(!t) return 0;
  var tier=(s.confTier&&s.confTier[confName]!=null) ? s.confTier[confName] : (CONF_TIER[confName]||0);
  var p=(teamName===s.school) ? (s.prestige||3) : (t.p||3);
  // Tier dominates. Money and exposure are why programs move, and the gap between a tier-3 league
  // and a tier-2 one is enormous — an early cut of this weighted tier at 2.4 and being a big fish
  // at 0.8, which made Clemson score HIGHER in the ACC than in the Big Ten. That inverts the whole
  // premise of realignment: nobody would ever leave, and only dregs like a MAC school moved.
  var v = tier*4.2;
  // Where you sit inside the league still matters, but as a modifier, not a rival to the money.
  // A blue blood has more to lose by leaving (rivalries, guaranteed relevance) and a bottom-feeder
  // in a big league has little holding it — this is what keeps Texas home while a middling SEC
  // program is at least reachable.
  var peers=[], mine=0;
  Object.keys(L.teams).forEach(function(n){
    var o=L.teams[n];
    if(o.c!==confName) return;
    var op=(n===s.school)?(s.prestige||3):(o.p||3);
    peers.push(op); if(n===teamName) mine=op;
  });
  if(peers.length && mine){
    var avg=peers.reduce(function(a,b){return a+b;},0)/peers.length;
    v += (mine-avg)*0.55;
  }
  // A shrinking league is a worse bet than a stable one.
  var churn=(s._confChurn&&s._confChurn[confName])||0;
  v -= churn*0.7;
  return v;
}
// What a school would be worth TO a conference — used to pick raid targets. Prestige first,
// recent form as the tiebreaker, so a program on a run beats a stale one at the same star level.
function raidAppeal(teamName){
  var s=ST.save, L=s.league; var t=L.teams[teamName]; if(!t) return 0;
  var p=(teamName===s.school)?(s.prestige||3):(t.p||3);
  var form=(teamName===s.school) ? ((s._presMomentum||0)*0.12) : ((t._pm||0)*0.06);
  return p*2 + form + (t.ovr||70)*0.03;
}
// Would this school accept an invitation from `toConf`? Compares what it has against what it's
// being offered, with a real switching cost so only a clear upgrade moves anyone.
function wouldAccept(teamName, toConf){
  var have=confValueFor(teamName, ST.save.league.teams[teamName].c);
  var offered=confValueFor(teamName, toConf);
  // Leaving is disruptive: rivalries, travel, the unknown. The offer has to clear the bar by a
  // margin, not just tie it.
  return (offered-have) >= 1.5;
}
// Power conferences look to add the best available programs. Raids only happen when a league has
// something to gain (it's at the top and can afford to expand) and there's a target worth taking.
function runConferenceRaids(){
  var s=ST.save, L=s.league; if(!L) return [];
  s._confChurn=s._confChurn||{};
  var moves=[];
  // Only the strongest leagues raid, and only if they're not already bloated.
  var raiders=Object.keys(POWER_CONF).filter(function(c){
    var tier=(s.confTier&&s.confTier[c]!=null)?s.confTier[c]:(CONF_TIER[c]||0);
    var size=0; Object.keys(L.teams).forEach(function(n){ if(L.teams[n].c===c) size++; });
    return tier>=3 && size<20;
  });
  raiders.forEach(function(raider){
    // Candidates: anyone outside this league, in a lesser league, who'd say yes.
    var cands=[];
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(t.c===raider || isIndependentConf(t.c)) return;
      if((t.div||"FBS")!=="FBS") return;
      var theirTier=(s.confTier&&s.confTier[t.c]!=null)?s.confTier[t.c]:(CONF_TIER[t.c]||0);
      var myTier=(s.confTier&&s.confTier[raider]!=null)?s.confTier[raider]:(CONF_TIER[raider]||0);
      if(theirTier>=myTier) return;                    // nobody moves sideways or down
      if(!wouldAccept(n, raider)) return;
      cands.push({n:n, appeal:raidAppeal(n)});
    });
    if(!cands.length) return;
    cands.sort(function(a,b){ return b.appeal-a.appeal; });
    // A raid takes 1-2 schools in a year — enough to matter, not enough to gut a league at once.
    var take=cands.slice(0, 1+(Math.random()<0.4?1:0));
    take.forEach(function(cd){
      if(cd.n===s.school) return;                      // the user gets an INVITE, not a transfer
      var t=L.teams[cd.n], from=t.c;
      t.c=raider;
      var at=ALL_TEAMS.filter(function(x){return x.n===cd.n;})[0];
      if(at) at.c=raider;
      s._confChurn[from]=(s._confChurn[from]||0)+1;
      moves.push({team:cd.n, from:from, to:raider});
    });
  });
  if(moves.length){ L.confSched=null; L.confRemain=null; }   // schedules must be rebuilt
  return moves;
}
// Does any power conference want the USER's program this offseason? Returns the best offer, which
// the league meeting then presents as a choice rather than moving them silently.
function pendingInviteForUser(){
  var s=ST.save, L=s.league; if(!L) return null;
  if(!L.teams[s.school]) return null;
  var best=null;
  Object.keys(POWER_CONF).forEach(function(c){
    if(c===s.conf) return;
    var tier=(s.confTier&&s.confTier[c]!=null)?s.confTier[c]:(CONF_TIER[c]||0);
    var myTier=(s.confTier&&s.confTier[s.conf]!=null)?s.confTier[s.conf]:(CONF_TIER[s.conf]||0);
    if(tier<=myTier) return;
    var size=0; Object.keys(L.teams).forEach(function(n){ if(L.teams[n].c===c) size++; });
    if(size>=20) return;
    // Are you good enough for them to want you? Compare against who they'd otherwise take.
    var mine=raidAppeal(s.school);
    if(mine < 7.0) return;                       // roughly: a 3-star on a run, or any 4-star+
    var gain=confValueFor(s.school,c)-confValueFor(s.school,s.conf);
    if(gain<1.0) return;
    if(!best || gain>best.gain) best={conf:c, gain:gain, tier:tier};
  });
  return best;
}
function isPowerConf(conf){ return !!POWER_CONF[conf]; }
// Committee-style résumé score (FBS) — emulates how the CFP selection committee weighs a
// team: results first (wins, scaled by strength of schedule), losses hurt (a touch less in
// a power league where every week's a grind), a conference title is a real plus, and the
// "eye test"/talent matters at the margins. For YOU we also read your actual schedule, so
// signature wins lift you and bad losses sink you — just like the real committee.
function cfpScore(t){
  var power=isPowerConf(t.conf);
  var wins=t.w||0, losses=t.l||0, games=wins+losses;
  var sos=(power?1.0:0.60)+(t.p||1)*0.05;         // strength-of-schedule proxy
  var winVal=wins*(6+sos*5);                      // wins worth more against a tougher slate
  var lossPen=losses*(power?7:9);                 // losses cost; power losses forgiven slightly
  var confTitle=t.wonConf?12:0;                   // conference championship
  var unbeaten=(losses===0&&games>=8)?7:0;        // undefeated résumé bonus
  var eye=(t.ovr||60)*0.35+(t.p||1)*3;            // committee eye-test / talent
  var s=winVal-lossPen+confTitle+unbeaten+eye;
  if(t.you) s+=userResumeAdj();                   // your real quality wins / bad losses
  return s;
}
// Your actual résumé from played games: signature wins lift you, bad losses sink you.
// (CPU teams have no per-game log, so their SOS is approximated inside cfpScore.)
function userResumeAdj(){
  var s=ST.save, adj=0;
  (s.schedule||[]).forEach(function(g){
    if(!g.result) return;
    var op=g.op||1, won=g.result.us>g.result.them;   // g.op = opponent prestige tier
    if(won){ adj += (op>=5?7:op>=4?4:op>=3?1.5:0); }         // quality wins
    else   { adj += (op<=1?-9:op<=2?-5:op<=3?-2:0); }        // bad losses (losing to a p4/p5 is ~ok)
  });
  return adj;
}
// Is this team its conference's champion? Uses the decided title once known, else the
// current conference leader as a projection (that's how in-season CFP rankings work).
function isConfChamp(name){
  var s=ST.save, L=s.league, t=L&&L.teams[name]; if(!t) return false;
  var conf=t.c; if(!conf || isIndependentConf(conf)) return false;   // independents are at-large only, never a conf champ
  if(conf===s.conf && s._userConfChampName) return name===s._userConfChampName;
  return bestConfChampion(conf)===name;
}
function enterPostseason(){
  var s=ST.save;
  if(myDivision()==="FCS"){ enterFCSPostseason(); return; }
  var w=s.wins;
  // You make the Playoff iff you are in the top 12 of the SAME résumé rankings shown on the
  // CFP tab. Previously this used a record heuristic (9 wins + prestige) that was blind to the
  // rankings, so a 9-3 team ranked ~30th would still be handed the #12 seed while showing
  // "NR" on the ranking page. One source of truth now: rankedTeams().
  var ranks=rankedTeams();
  var myRank=0; ranks.forEach(function(r,i){ if(r.you)myRank=i+1; });
  if(myRank>=1 && myRank<=12){
    setupPlayoff(ranks);
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  if(w>=6){
    // bowl game
    var pool = (w>=9?NY6:BOWLS);
    var oppP = Math.max(1, Math.min(5, s.prestige + rnd(-1,1)));
    var opp = pickOpponent(oppP);
    ST.post={mode:"bowl", bowlName:pick(pool), opp:opp.n, oc:opp.c, op:opp.p, done:false, result:null};
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  // no bowl (losing record)
  ST.post=null;
  s._postDone=true;
  ST.screen="offseason"; persist(); draw();
}
function pickOpponent(prestige){
  var pool=divTeams(myDivision());
  var cand=pool.filter(function(t){return t.n!==ST.save.school && Math.abs(t.p-prestige)<=1;});
  if(!cand.length)cand=pool.filter(function(t){return t.n!==ST.save.school;});
  return pick(cand);
}

// ═════════════════════════════════════════════════════════
// FCS POSTSEASON — deliberately separate from the FBS path.
//   PLAYOFF  : 24-team bracket, top 8 seeds get a first-round bye. Ends in the
//              FCS National Championship in Frisco.
//   CHAMPIONSHIP (Celebration Bowl): SWAC & MEAC do NOT enter the bracket. Their two
//              conference champions meet in a single title game instead.
//   IVY      : joined the FCS playoff in 2025 — champion auto-bids like any league.
// ═════════════════════════════════════════════════════════
function isFCSPlayoffConf(c){ return !!FCS_PLAYOFF_CONFS[c]; }
function isCelebrationConf(c){ return !!FCS_CELEBRATION_CONFS[c]; }
function isNoPostseasonConf(c){ return !!FCS_NO_POSTSEASON_CONFS[c]; }
function isNoAutobidConf(c){ return !!FCS_NO_AUTOBID_CONFS[c]; }
function divTeams(div){ return div==="FCS" ? FCS_TEAMS : FBS_TEAMS; }

// FCS resume score — no power-conference weighting, but a money-game win over an
// FBS opponent is the single most valuable line on an FCS resume.
function fcsResumeScore(wins, prestige, wonConf, ovr, fbsWin){
  var base = wins*9 + prestige*6 + (ovr||60)*0.5;
  if(wonConf) base += 12;
  if(fbsWin)  base += 14;   // beating an FBS team is a signature win
  return base;
}

function enterFCSPostseason(){
  var s=ST.save, w=s.wins, c=s.conf;

  // ── The Ivy League declines every postseason bid. Season's over. ──
  if(isNoPostseasonConf(c)){
    ST.post={mode:"none", reason:"ivy"};   // _postDone is set when they click Continue
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }

  // ── SWAC / MEAC: the Celebration Bowl track, NOT the playoff bracket. ──
  if(isCelebrationConf(c)){
    if(s._wonConfThisYear){
      // You won your league → you represent it in the Celebration Bowl.
      var otherConf = (c==="SWAC") ? "MEAC" : "SWAC";
      var foe = bestTeamInConf(otherConf);
      ST.post={mode:"celebration", opp:foe.name, oc:otherConf, op:foe.p, done:false, result:null};
    } else {
      ST.post={mode:"none", reason:"noCelebration"};
    }
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }

  // ── Everyone else: try to make the 24-team bracket. ──
  // Auto-bid = win your conference. Otherwise you need an at-large-worthy record.
  var autoBid = s._wonConfThisYear && isFCSPlayoffConf(c) ;
  var atLarge = (w>=8) || (w>=7 && s.prestige>=4);
  if(isNoAutobidConf(c)) autoBid=false;   // Pioneer / Independents: at-large only
  if(autoBid || atLarge){
    setupFCSPlayoff();
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }

  // FCS has no bowl system below the playoff — a losing-out season simply ends.
  ST.post={mode:"none", reason:"missed"};
  snapshotSeasonGoals();
  ST.screen="season"; ST.seasonTab="week"; persist(); draw();
}

// Strongest team in a given conference (used to pick the Celebration Bowl opponent).
function bestTeamInConf(conf){
  var L=ST.save.league, best=null;
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(t.c!==conf) return;
      var sc = fcsResumeScore(t.w, t.p, false, t.ovr, false);
      if(!best || sc>best.score) best={name:n, p:t.p, ovr:t.ovr, score:sc};
    });
  }
  if(!best){
    var pool=FCS_TEAMS.filter(function(t){return t.c===conf;});
    var t2=pick(pool)||{n:"TBD",p:3};
    best={name:t2.n, p:t2.p, ovr:60, score:0};
  }
  return best;
}

// ── Build the 24-team FCS bracket ────────────────────────
// Seeds 1-8 receive a first-round bye. Seeds 9-24 play the first round.
// Bracket flow: R1 (8 games) -> R2/Round of 16 (byes enter) -> QF -> SF -> Championship.
function setupFCSPlayoff(){
  var s=ST.save, L=s.league;
  s._madePlayoffThisYear=true;   // remembered even if ST.post is later cleared — making the field always counts
  var myScore = fcsResumeScore(s.wins, s.prestige, s._wonConfThisYear, (L?L.teams[s.school].ovr:60), !!s._beatFBSThisYear);
  var field=[{name:s.school, p:s.prestige, you:true, score:myScore}];
  var others=[];
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(n===s.school) return;
      if(t.div!=="FCS") return;                       // FBS teams are not eligible
      if(isNoPostseasonConf(t.c)) return;             // Ivy declines
      if(isCelebrationConf(t.c)) return;              // SWAC/MEAC are on the bowl track
      others.push({name:n, p:t.p, you:false, score: fcsResumeScore(t.w, t.p, isConfChamp(n), t.ovr, false)});
    });
  }
  others.sort(function(a,b){return b.score-a.score;});
  for(var i=0;i<23 && i<others.length;i++){ field.push(others[i]); }
  field.sort(function(a,b){return b.score-a.score;});
  field.forEach(function(f,idx){ f.seed=idx+1; });
  var mySeed=0; field.forEach(function(f){ if(f.you)mySeed=f.seed; });

  ST.post={
    mode:"fcsPlayoff", field:field, mySeed:mySeed,
    round: (mySeed<=8 ? "r2" : "r1"),   // top 8 seeds open in the Round of 16
    startRound: (mySeed<=8 ? "r2" : "r1"),   // where you entered — so we can count games actually won
    bracket: buildFCSBracketState(field),
    log:[], done:false, champion:null
  };
}
// R1 pairings: 9v24, 10v23, ... 16v17. Each winner meets a bye seed in R2.
// R2 pairing rule: bye seed k faces the winner of the (9..16 vs 17..24) game whose
// higher seed is (17-k)  ->  1 plays winner(16/17), 2 plays winner(15/18), etc.
function buildFCSBracketState(field){
  var bySeed={}; field.forEach(function(f){ bySeed[f.seed]=f; });
  var r1=[];
  for(var i=0;i<8;i++){ r1.push({a:9+i, b:24-i}); }   // idx0: 9v24 ... idx7: 16v17
  return { r1:r1, byeSeeds:[1,2,3,4,5,6,7,8], bySeed:bySeed, results:{}, rounds:{} };
}
// Which r1 pair index feeds bye seed k?  seed1 -> pair idx7 (16v17), seed8 -> pair idx0 (9v24)
function fcsFeederIdx(byeSeed){ return 8-byeSeed; }

function fcsCpuGame(seedA, seedB){
  var f=ST.post.bracket.bySeed, a=f[seedA], b=f[seedB];
  if(!a) return seedB; if(!b) return seedA;
  var aStr=(25-a.seed)*2.2 + a.p*3 + rnd(0,20);
  var bStr=(25-b.seed)*2.2 + b.p*3 + rnd(0,20);
  return aStr>=bStr ? seedA : seedB;
}
// Resolve every first-round game except one you might be playing in.
function fcsResolveR1(skipIdx){
  var B=ST.post.bracket;
  B.r1.forEach(function(pr,i){
    if(i===skipIdx) return;
    if(B.results["r1_"+i]==null) B.results["r1_"+i]=fcsCpuGame(pr.a,pr.b);
  });
}
// Build the Round-of-16 field: 8 bye seeds vs 8 first-round winners.
// Slots are laid out in true bracket order (1,8,4,5,2,7,3,6) so that adjacent pairs
// meet in the quarterfinals and the #1 and #2 seeds can only collide in the final.
var FCS_R2_SLOT_ORDER=[1,8,4,5,2,7,3,6];
function fcsRound16Pairs(){
  var B=ST.post.bracket, pairs=[];
  FCS_R2_SLOT_ORDER.forEach(function(k){
    var idx=fcsFeederIdx(k);
    pairs.push({a:k, b:B.results["r1_"+idx]});
  });
  return pairs;
}
// Generic: given this round's seed pairs, find my game, sim the rest, return next-round seeds.
function fcsAdvanceRound(pairs, myWinSeed, key){
  var B=ST.post.bracket, me=ST.post.mySeed, out=[];
  pairs.forEach(function(pr,i){
    var win;
    if(pr.a===me || pr.b===me){ win = (myWinSeed!=null ? myWinSeed : fcsCpuGame(pr.a,pr.b)); }
    else win = fcsCpuGame(pr.a, pr.b);
    B.results[key+"_"+i]=win;
    out.push(win);
  });
  B.rounds[key]=out;
  return out;
}
// Pair up an array of advancing seeds: [0]v[1], [2]v[3], ...
function fcsPairUp(seeds){
  var pairs=[];
  for(var i=0;i<seeds.length;i+=2){ pairs.push({a:seeds[i], b:seeds[i+1]}); }
  return pairs;
}
// Current round's pairings, whatever round we're in.
function fcsCurrentPairs(){
  var P=ST.post, B=P.bracket;
  if(P.round==="r1")  return B.r1;
  if(P.round==="r2"){ fcsResolveR1(myFCSR1Idx()); return fcsRound16Pairs(); }
  if(P.round==="qf")  return fcsPairUp(B.rounds.r2||[]);
  if(P.round==="sf")  return fcsPairUp(B.rounds.qf||[]);
  if(P.round==="champ") return fcsPairUp(B.rounds.sf||[]);
  return [];
}
function myFCSR1Idx(){
  var B=ST.post.bracket, me=ST.post.mySeed, idx=-1;
  B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me) idx=i; });
  return idx;
}
// My opponent seed in the current round.
function myFCSOpponent(){
  var P=ST.post, me=P.mySeed;
  var pairs=fcsCurrentPairs(), found=null, idx=-1;
  pairs.forEach(function(pr,i){ if(pr.a===me||pr.b===me){ found=pr; idx=i; } });
  if(!found) return {seed:null, idx:-1};
  return {seed: (found.a===me?found.b:found.a), idx: idx};
}
var FCS_ROUND_ORDER=["r1","r2","qf","sf","champ"];
function fcsRoundLabel(r){
  return {r1:"First Round", r2:"Second Round", qf:"Quarterfinal",
          sf:"Semifinal", champ:"FCS National Championship"}[r]||r;
}
// Advance the FCS bracket after YOUR game resolves.
function advanceFCSPlayoff(iWon){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  var pairs=fcsCurrentPairs();
  var opp=myFCSOpponent();
  var myWin = iWon ? me : opp.seed;

  if(P.round==="r1"){
    B.results["r1_"+opp.idx]=myWin;
    fcsResolveR1(-1);                       // fill in every other first-round game
    B.rounds.r1=B.r1.map(function(pr,i){ return B.results["r1_"+i]; });
    if(!iWon){ P.done=true; P.eliminated=true; fcsSimRest("r2"); return; }
    P.round="r2"; return;
  }
  var advancing = fcsAdvanceRound(pairs, myWin, P.round);
  // The championship is terminal in BOTH directions — there is no round after it.
  if(P.round==="champ"){
    P.done=true;
    P.champion = iWon ? me : opp.seed;
    if(iWon){
      ST.save._wonNatlThisYear=true;
      ST.save.natlTitles=(ST.save.natlTitles||0)+1;
    } else {
      P.eliminated=true;
      var cn=B.bySeed[P.champion];
      if(cn) ST.save._natlChampName=cn.name;
    }
    return;
  }
  if(!iWon){
    P.done=true; P.eliminated=true;
    fcsSimRest(FCS_ROUND_ORDER[FCS_ROUND_ORDER.indexOf(P.round)+1]);
    return;
  }
  P.round = FCS_ROUND_ORDER[FCS_ROUND_ORDER.indexOf(P.round)+1];
}
// You're out — sim the remainder of the bracket to crown a champion anyway.
function fcsSimRest(fromRound){
  var P=ST.post, B=P.bracket;
  var i=FCS_ROUND_ORDER.indexOf(fromRound);
  if(i<0){ return; }
  for(; i<FCS_ROUND_ORDER.length; i++){
    var key=FCS_ROUND_ORDER[i];
    var pairs;
    if(key==="r2") pairs=fcsRound16Pairs();
    else pairs=fcsPairUp(B.rounds[FCS_ROUND_ORDER[i-1]]||[]);
    if(!pairs.length || pairs[0].b==null) break;
    var out=[];
    pairs.forEach(function(pr,j){
      var w=fcsCpuGame(pr.a,pr.b);
      B.results[key+"_"+j]=w; out.push(w);
    });
    B.rounds[key]=out;
    if(key==="champ"){ P.champion=out[0]; break; }
  }
  if(P.champion && B.bySeed[P.champion]) ST.save._natlChampName=B.bySeed[P.champion].name;
}

// Build the 12-team bracket seeded by strength-weighted resume score.
function setupPlayoff(ranks){
  var s=ST.save, L=s.league;
  s._madePlayoffThisYear=true;   // making the field always counts, even if postseason state is later cleared
  // The field IS the top 12 of the résumé rankings — the exact list the CFP tab shows, so the
  // bracket and the rankings can never disagree. You are in it only if you ranked top 12.
  ranks = ranks || rankedTeams();
  var top12 = ranks.slice(0, 12);
  var field = top12.map(function(r){
    return {name:r.name, p:r.p, you:!!r.you, score:r.score, g5:r.g5};
  });
  // Seed by résumé score (already the sort order of rankedTeams).
  field.forEach(function(f,idx){ f.seed=idx+1; });
  // Enforce realism: a Group-of-Five team can never be seeded higher than 9th (auto-bid caps).
  var you=null; field.forEach(function(f){ if(f.you)you=f; });
  if(you && you.g5 && you.seed<9){
    field = field.filter(function(f){return !f.you;});
    field.splice(8,0,you);           // insert at index 8 => seed 9
    field.forEach(function(f,idx){ f.seed=idx+1; });
  }
  var mySeed=0; field.forEach(function(f){ if(f.you)mySeed=f.seed; });
  ST.post={
    mode:"playoff", field:field, mySeed:mySeed,
    round: (mySeed<=4?"qf":"r1"),
    startRound: (mySeed<=4?"qf":"r1"),   // byes (seeds 1-4) open in the quarterfinals
    roundIdx:0,
    bracket: buildBracketState(field),
    done:false, champion:null
  };
}
// Bracket state: track winners by slot across rounds
function buildBracketState(field){
  var bySeed={}; field.forEach(function(f){ bySeed[f.seed]=f; });
  return {
    r1:[ {a:5,b:12}, {a:8,b:9}, {a:6,b:11}, {a:7,b:10} ], // pairs feeding QF
    byeSeeds:[1,2,3,4],
    bySeed:bySeed,
    results:{}, // key like "r1_0" -> winning seed
    qf:[], sf:[], champ:null
  };
}

// Resolve one CPU game between two seeds → returns winning seed
function cpuGame(seedA, seedB){
  var f=ST.post.bracket.bySeed;
  var a=f[seedA], b=f[seedB];
  // lower seed number = stronger; add variance for upsets
  var aStr=(13-a.seed)*4 + a.p*3 + rnd(0,20);
  var bStr=(13-b.seed)*4 + b.p*3 + rnd(0,20);
  return aStr>=bStr ? seedA : seedB;
}

// Figure out YOUR next opponent seed in the current round based on bracket flow
function myNextOpponent(){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  if(P.round==="r1"){
    // find my r1 pairing
    var pair=null,idx=-1;
    B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me){pair=pr;idx=i;} });
    var opp = pair.a===me?pair.b:pair.a;
    return {seed:opp, idx:idx};
  }
  if(P.round==="qf"){
    ensureR1Resolved();
    // QF: seed1 vs winner(8/9), seed4 vs winner(5/12), seed2 vs winner(7/10), seed3 vs winner(6/11)
    var map={1:1,4:0,2:3,3:2}; // my seed -> which r1 pair feeds me (if I'm a bye seed)
    if(me<=4){ var pi=map[me]; var wseed=B.results["r1_"+pi]; return {seed:wseed, idx:pi, qf:true, byeSlot:me}; }
    // I advanced from r1 — opponent is the corresponding bye seed
    var myPair=-1; B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me)myPair=i; });
    var byeMap={1:1,0:4,3:2,2:3}; // r1 pair index -> bye seed faced
    return {seed:byeMap[myPair], idx:myPair, qf:true};
  }
  if(P.round==="sf"){
    // semifinal opponent = winner of the other half
    return {seed:P._sfOpp||null, sf:true};
  }
  if(P.round==="champ"){
    return {seed:P._champOpp||null, champ:true};
  }
  return {seed:null};
}

// Advance the bracket after YOU win a round; auto-resolve CPU games
function advancePlayoff(iWon){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  if(!iWon){
    // you're eliminated — the team that just beat you advances in your place
    P.done=true; P.eliminated=true;
    var beat=myNextOpponent().seed;
    if(P.round==="r1"){ var oi=myNextOpponent().idx; B.results["r1_"+oi]=beat; }
    else if(P.round==="qf"){ resolveQuarterfinals(beat); }
    else if(P.round==="sf"){ resolveSemifinal(beat); }
    else if(P.round==="champ"){ B.champWinner=beat; }
    resolveRestOfBracket();
    return;
  }
  if(P.round==="r1"){
    var opp=myNextOpponent();
    B.results["r1_"+opp.idx]=me;
    // resolve the other 3 r1 games
    B.r1.forEach(function(pr,i){ if(i!==opp.idx && B.results["r1_"+i]==null) B.results["r1_"+i]=cpuGame(pr.a,pr.b); });
    P.round="qf"; P.roundIdx++;
    return;
  }
  if(P.round==="qf"){
    // record you winning your QF; resolve other QFs to form SF
    resolveQuarterfinals(me);
    P.round="sf"; P.roundIdx++;
    return;
  }
  if(P.round==="sf"){
    resolveSemifinal(me);
    P.round="champ"; P.roundIdx++;
    return;
  }
  if(P.round==="champ"){
    P.done=true; P.champion=me; B.champWinner=me; // you win it all
    ST.save._wonNatlThisYear=true; ST.save.natlTitles=(ST.save.natlTitles||0)+1;
    ST.save._natlChampName=ST.save.school;
    return;
  }
}
function ensureR1Resolved(){
  var B=ST.post.bracket, me=ST.post.mySeed;
  B.r1.forEach(function(pr,i){
    if(B.results["r1_"+i]==null){
      // if I'm in this pair and haven't played, leave it; otherwise CPU-resolve
      if(pr.a===me||pr.b===me) return;
      B.results["r1_"+i]=cpuGame(pr.a,pr.b);
    }
  });
}
function resolveQuarterfinals(myWinSeed){
  var P=ST.post,B=P.bracket;
  ensureR1Resolved(); // bye seeds skip R1 block, so make sure the field is filled
  // QF pairings by bye seed vs r1 winners: 1v w(8/9)[idx1], 4v w(5/12)[idx0], 2v w(7/10)[idx3], 3v w(6/11)[idx2]
  var qfPairs=[ {bye:1,from:1}, {bye:4,from:0}, {bye:2,from:3}, {bye:3,from:2} ];
  B.qfWinners={};
  qfPairs.forEach(function(p){
    var opp=B.results["r1_"+p.from];
    var involvesMe = (p.bye===myWinSeed) || (opp===myWinSeed);
    if(involvesMe){ B.qfWinners[p.bye]=myWinSeed; }
    else { B.qfWinners[p.bye]=cpuGame(p.bye,opp); }
  });
  // SF bracket: (QF from bye1 & bye4) vs (QF from bye2 & bye3) — standard 1/4 , 2/3 halves
  var w1=B.qfWinners[1], w4=B.qfWinners[4], w2=B.qfWinners[2], w3=B.qfWinners[3];
  B._sfPairs=[ {a:w1,b:w4}, {a:w2,b:w3} ];
  // find my SF opponent
  var mine = (B._sfPairs[0].a===myWinSeed||B._sfPairs[0].b===myWinSeed)?0:1;
  var pr=B._sfPairs[mine];
  P._sfOpp = pr.a===myWinSeed?pr.b:pr.a;
  P._sfHalf=mine;
}
function resolveSemifinal(myWinSeed){
  var P=ST.post,B=P.bracket;
  // resolve the other semifinal
  var otherHalf = P._sfHalf===0?1:0;
  var op=B._sfPairs[otherHalf];
  var otherWinner=cpuGame(op.a,op.b);
  B.sfWinners=[]; B.sfWinners[P._sfHalf]=myWinSeed; B.sfWinners[otherHalf]=otherWinner;
  P._champOpp=otherWinner;
}
function resolveRestOfBracket(){
  // best-effort fill so the bracket view shows a full, finished bracket even if you lost
  var P=ST.post,B=P.bracket;
  B.r1.forEach(function(pr,i){ if(B.results["r1_"+i]==null)B.results["r1_"+i]=cpuGame(pr.a,pr.b); });
  if(!B.qfWinners) resolveQuarterfinals(-99);
  var w1=B.qfWinners[1],w4=B.qfWinners[4],w2=B.qfWinners[2],w3=B.qfWinners[3];
  if(!B._sfPairs) B._sfPairs=[{a:w1,b:w4},{a:w2,b:w3}];
  // keep any semifinal already decided (you may have won yours before losing the final)
  if(!B.sfWinners) B.sfWinners=[];
  if(B.sfWinners[0]==null) B.sfWinners[0]=cpuGame(B._sfPairs[0].a,B._sfPairs[0].b);
  if(B.sfWinners[1]==null) B.sfWinners[1]=cpuGame(B._sfPairs[1].a,B._sfPairs[1].b);
  if(B.champWinner==null) B.champWinner=cpuGame(B.sfWinners[0],B.sfWinners[1]);
  P.champion=B.champWinner;
  P.finalChamp=B.champWinner; // legacy alias
  var cf=(P.field||[]).filter(function(x){return x.seed===P.champion;})[0];
  ST.save._natlChampName = cf?cf.name:(ST.save._natlChampName||null); // remember the champ for league history
}

// Full 12-team bracket: First Round → Quarterfinals → Semifinals → Championship.
// Renders whatever is known so far; undecided slots show as TBD.
function bracketVisual(){
  var P=ST.post,B=P.bracket;
  // QF pairings: bye seed vs the r1 winner that feeds it
  var qfPairs=[ {bye:1,from:1}, {bye:4,from:0}, {bye:2,from:3}, {bye:3,from:2} ];
  var h='<div class="sec-title">The Bracket</div><div class="bracket">';

  // ── First Round (seeds 5-12) ──
  h+='<div class="brk-col"><div class="brk-h">First Rd</div>';
  B.r1.forEach(function(pr,i){
    var w=B.results["r1_"+i];
    h+='<div class="brk-pair">'+brkTeam(pr.a,w)+brkTeam(pr.b,w)+'</div>';
  });
  h+='</div>';

  // ── Quarterfinals (byes 1-4 enter here) ──
  h+='<div class="brk-col"><div class="brk-h">Quarters</div>';
  qfPairs.forEach(function(p){
    var opp=B.results["r1_"+p.from];
    var w=B.qfWinners?B.qfWinners[p.bye]:null;
    h+='<div class="brk-pair">'+brkTeam(p.bye,w)+brkTeam(opp,w)+'</div>';
  });
  h+='</div>';

  // ── Semifinals ──
  var sp=B._sfPairs||[];
  h+='<div class="brk-col"><div class="brk-h">Semis</div>';
  [0,1].forEach(function(i){
    var pr=sp[i]||{a:null,b:null};
    var w=B.sfWinners?B.sfWinners[i]:null;
    h+='<div class="brk-pair">'+brkTeam(pr.a,w)+brkTeam(pr.b,w)+'</div>';
  });
  h+='</div>';

  // ── Championship ──
  h+='<div class="brk-col"><div class="brk-h">Final</div>';
  var f=B.sfWinners||[];
  h+='<div class="brk-pair">'+brkTeam(f[0],B.champWinner)+brkTeam(f[1],B.champWinner)+'</div>';
  if(B.champWinner!=null){
    var cn=B.bySeed[B.champWinner];
    h+='<div class="brk-champ">🏆 '+x(cn?cn.name:"?")+'</div>';
  }
  h+='</div>';

  h+='</div>';
  return h;
}
function brkTeam(seed,winnerSeed){
  var P=ST.post,B=P.bracket;
  if(seed==null) return '<div class="brk-team tbd"><span class="brk-seed">·</span><span class="brk-name">TBD</span></div>';
  var f=B.bySeed[seed];
  var me=(seed===P.mySeed);
  var won=(winnerSeed!=null && winnerSeed===seed);
  var lost=(winnerSeed!=null && winnerSeed!==seed);
  return '<div class="brk-team'+(me?" me":"")+(won?" won":"")+(lost?" lost":"")+'">'+
    '<span class="brk-seed">'+seed+'</span><span class="brk-name">'+x(f?f.name:"?")+'</span></div>';
}

// Compact 24-team bracket readout: your path, round by round.
function fcsBracketVisual(){
  var P=ST.post, B=P.bracket, s=ST.save;
  var h='<div class="sec-title" style="margin:14px 2px 8px">FCS Playoff Bracket · 24 Teams</div>';
  h+='<div class="conf-table scroll-list" style="max-height:none">';
  h+='<div class="conf-row" style="background:var(--border);color:#fff;font-weight:800">'+
     '<span class="conf-rank">#</span><span class="conf-name">Seed</span><span class="conf-rec">Status</span></div>';
  var reached={};
  FCS_ROUND_ORDER.forEach(function(k){ (B.rounds[k]||[]).forEach(function(sd){ reached[sd]=k; }); });
  for(var seed=1;seed<=24;seed++){
    var t=B.bySeed[seed]; if(!t) continue;
    var me=(t.name===s.school);
    var status;
    if(P.champion===seed) status="🏆 CHAMPION";
    else if(reached[seed]) status=fcsRoundLabel(FCS_ROUND_ORDER[Math.min(FCS_ROUND_ORDER.indexOf(reached[seed])+1,4)]);
    else if(seed<=8) status="Bye → R2";
    else status="First Round";
    h+='<div class="conf-row'+(me?" me":"")+(seed<=8?" top2":"")+'">'+
       '<span class="conf-rank">'+seed+'</span>'+
       '<span class="conf-name">'+x(t.name)+' <span class="t25-conf">'+stars(t.p)+'</span></span>'+
       '<span class="conf-rec" style="font-size:9px">'+x(status)+'</span></div>';
  }
  h+='</div><div style="font-size:9px;font-weight:700;color:var(--muted);margin:6px 2px 0">Seeds 1–8 receive a first-round bye · Final in Frisco, TX</div>';
  return h;
}

// Play a postseason game through the SAME live-sim machinery
function playPostGame(){
  var s=ST.save, P=ST.post;
  var oppName, oppP, home=true, rName;
  if(P.mode==="bowl"){ oppName=P.opp; oppP=P.op; home=(Math.random()<0.5); rName=P.bowlName; }
  else if(P.mode==="celebration"){
    // Neutral-site title game in Atlanta — no home team.
    oppName=P.opp; oppP=P.op; home=false; rName="Celebration Bowl";
  }
  else if(P.mode==="fcsPlayoff"){
    var fo=myFCSOpponent();
    var fb=P.bracket.bySeed[fo.seed];
    oppName=fb?fb.name:"TBD"; oppP=fb?fb.p:3;
    // FCS playoff rounds are hosted on campus by the better seed; the final is neutral.
    home = (P.round==="champ") ? false : (P.mySeed < fo.seed);
    rName=fcsRoundLabel(P.round);
  }
  else { var o=myNextOpponent(); oppName=P.bracket.bySeed[o.seed].name; oppP=P.bracket.bySeed[o.seed].p; home=(P.round==="r1"&&P.mySeed<o.seed); rName=roundLabel(P.round); }
  var game={opp:oppName, oc:"", op:oppP, home:home};
  var setup=gameSetup(game);
  ST.G=newGameState(setup.us, setup.them, setup.groups);
  ST.G.userGame=true;
  var st=s.tactics||{};
  ST.G.tactics={off:st.off||"balanced", tempo:(st.tempo!=null?st.tempo:"normal"), def:(st.def!=null?st.def:"standard")};
  ST.weekResult={us:0,them:0,oppName:oppName,edge:setup.edge,oppDefType:"",off:setup.off,home:home,pbp:[],
                 live:true, gameKey:"post", postseason:true, roundName:rName};
  ST.live={elapsed:0,shownCount:0,done:false,timer:null,quarter:1,paused:false};
  ST.feedMode="stats";   // sims open on the box score by default
  persist();
  ST.screen="live"; draw(); runQuarter();
}
// Called by finishLive when the game was a postseason game
function finishPostGame(){
  var P=ST.post;
  // Read the WIN OFF THE SCOREBOARD, not off ST._postWon. That global is written only by
  // finishGameSim(), which early-returns on `!G || r._recorded` — so any path that finishes a
  // game without it (a restored save, a repaint, a retry after a throw) leaves _postWon holding
  // whatever the LAST postseason game set, and nothing ever clears it. A #2 seed opening in R2
  // off a first-round bye would then inherit last season's elimination and get told its 42-13
  // win was a loss: "Your run ended in the Second Round."
  // ST.weekResult is this game's own scoreline, so it cannot be stale.
  var wr=ST.weekResult||{};
  var won=(wr.us>wr.them);
  ST._postWon=won;   // keep in sync for anything downstream that still reads it
  // ── Celebration Bowl: a single title game, not a bracket. Winning it IS the championship
  //    for SWAC/MEAC teams — there is no further round to advance to. ──
  if(P.mode==="celebration"){
    P.done=true; P.result={us:ST.weekResult.us, them:ST.weekResult.them};
    if(won){
      P.champion=true;
      ST.save.titles=(ST.save.titles||0)+1;
      ST.save.celebrationTitles=(ST.save.celebrationTitles||0)+1;
      ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+12);
    }
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  // ── FCS 24-team bracket ──
  if(P.mode==="fcsPlayoff"){
    if(!P.log) P.log=[];
    P.log.push({round:P.round, opp:(ST.weekResult.oppName||"?"),
                result:{us:ST.weekResult.us, them:ST.weekResult.them}});
    advanceFCSPlayoff(won);
    if(P.done && P.champion===P.mySeed){
      ST.save.titles=(ST.save.titles||0)+1;
      ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+15);
    }
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  if(P.mode==="bowl"){
    P.done=true; P.result={us:ST.weekResult.us,them:ST.weekResult.them};
    if(won) ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+5);
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  // playoff — log the round you just played before the bracket advances
  if(!P.log) P.log=[];
  P.log.push({round:P.round, opp:(ST.weekResult.oppName||"?"),
              result:{us:ST.weekResult.us, them:ST.weekResult.them}});
  advancePlayoff(won);
  if(P.done && P.champion===P.mySeed){ ST.save.titles=(ST.save.titles||0)+1; ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+15); }
  ST.weekResult=null; ST.live=null; ST.planPick=null;
  ST.screen="season"; ST.seasonTab="week"; persist(); draw();
}

// A per-position ledger: how many you have, the minimum, and the cap.
// `mode` is "now" or "future" (excludes graduating seniors and cuts).
function rosterLedger(mode, opts){
  opts=opts||{};
  var counts=rosterCounts(mode);
  var short=rosterShortfall(counts);
  var h='<div class="ledger">';
  myPositions().forEach(function(pos){
    var c=counts[pos]; if(!c) return;
    // Big number = how many you HAVE. The sub-line names the bar you're measured
    // against, so "0" and "need 1" can't read as contradicting each other.
    // "thin" = you can start a lineup but have no backup — one injury from trouble.
    var state = c.have<c.min ? "short" : (c.have>=c.cap ? "full" : (c.have===c.min ? "thin" : "ok"));
    var tag = c.have<c.min ? ("need "+(c.min-c.have)+" more")
            : c.have>=c.cap ? "full"
            : c.have===c.min ? "no backup"
            : "+"+(c.cap-c.have)+" room";
    h+='<div class="ldg-cell '+state+'">'+
       '<div class="ldg-pos" style="background:'+posColor(pos)+'">'+pos+'</div>'+
       '<div class="ldg-n">'+c.have+'</div>'+
       '<div class="ldg-sub">'+c.min+' start<span class="ldg-dot">·</span>'+c.cap+' max</div>'+
       '<div class="ldg-tag">'+tag+'</div>'+
       '</div>';
  });
  h+='</div>';
  var open=rosterOpenings(counts);
  var note;
  if(short._total>0){
    note='<b style="color:var(--red2)">'+short._total+' player'+(short._total===1?'':'s')+' short of a full starting lineup.</b> ';
  } else if(open._total>0){
    note='Every position can field its starters. ';
  } else {
    note='<b>Roster is full.</b> Every spot is filled.';
  }
  if(open._total>0 && opts.walkOnNote!==false){
    note+='<b>'+open._total+' open spot'+(open._total===1?'':'s')+'</b> — walk-ons fill whatever is still empty when the portal closes.';
  }
  h+='<div class="ldg-note">'+(opts.prefix||'')+note+'</div>';
  return h;
}

// ═════════════════════════════════════════════════════════
// THE OFFSEASON HUB
// The offseason used to be one enormous scroll — awards, draft, staff offers, goals, roster
// outlook, cuts, class — and then the TRANSFER PORTAL was a completely separate screen you only
// reached AFTER advancing. So player management was split across two screens and a page of
// scrolling, and you couldn't hold "who's leaving / who's arriving / who can I sign" in your head
// at once. It's now ONE tabbed hub. The portal is a tab like everything else.
// ═════════════════════════════════════════════════════════
// The portal used to open AFTER you advanced — so you shopped with a roster that had already
// graduated, aged and been gutted (0 RB, 0 WR, 19 walk-ons on the way). You couldn't see what you
// were fixing. Departures are now decided when the OFFSEASON opens, the portal runs alongside your
// real roster, and NOTHING is applied until you hit Advance.
function prepareOffseason(){
  var s=ST.save;
  if(s._osReady) return;                    // once per offseason
  // ── The season you just played gets settled HERE, not during the rollover ──
  // These all used to run inside advanceSeason(), i.e. AFTER you'd clicked Advance. That meant the
  // awards, draft class and staff offers on the offseason screen belonged to the PREVIOUS year, and
  // — worse — juniors declared for the NFL after you'd already planned your roster, so a player you
  // were counting on next season could silently vanish.
  s._lastWins=s.wins;
  settlePledge();       // the board holds you to what you promised
  topUpStarSeasons((s.schedule||[]).length||12);
  updateRecordBook();   // this year's stat lines into the program record book
  runAwards();          // the hardware, decided by the season just played
  runDraft();           // seniors go pro — and juniors DECLARE, before you plan around them
  resolveRedshirts();   // anyone under the four-game cap keeps the year
  advanceStaff();       // assistants improve; the good ones get outside offers
  var YR_NEXT={FR:"SO",SO:"JR",JR:"SR"};
  var out=[];
  (s.roster||[]).forEach(function(p){
    if(p.yr==="SR" || p.cut || p._declared) return;   // graduating / cut / gone pro — not a portal case
    var risk=retentionRisk(p);
    if(risk!=null && risk>0 && Math.random()*100<risk){
      p._leaving=true;                      // marked, NOT removed — you can still buy him back
      out.push({id:p.id, n:p.n, pos:p.pos, ovr:p.ovr, arch:p.arch, dev:p.dev,
                yr:YR_NEXT[p.yr]||p.yr, retainPrice:retainPrice(p), status:"open"});
    }
  });
  s._portalOut=out;
  // The portal is drawn from other programs' real players — so they have to EXIST first, and they
  // need last season's stat line to show. ensureStars() used to run only inside runAwards() (i.e.
  // after Advance), so the pool came up empty every time.
  ensureStars();
  topUpStarSeasons((s.schedule||[]).length||12);
  s._portalPool=genPortalPool();
  s._portalSigned=[];
  var sigOut=out.filter(function(d){return d.ovr>=75;}).length;
  s._portalSecHit=Math.min(18, sigOut*4);
  if(s._portalSecHit>0) s.jobSecurity=Math.max(1,(s.jobSecurity||60)-s._portalSecHit);
  s._osReady=true;
  persist();
}

// ── The annual league meeting ────────────────────────────
// Once a year the sport's politics land on your desk. Right now this reports the landscape —
// where every conference stands, how yours is trending, and who's rising. It's built as the frame
// that realignment, defection and expansion votes will hang on, so the player sees the whole
// system through one consistent lens instead of scattered toasts.
// The meeting as its own moment in the offseason, before roster work begins. Realignment politics
// and depth-chart management are different kinds of thinking; mixing them into one tab bar made
// the meeting feel like an afterthought.
// Is there anything to actually discuss? The meeting convenes for a decision, real news, or a
// shift in your own league's standing — not to show you an unchanged table.
function meetingWorthHolding(){
  var s=ST.save;
  if(s._pendingInvite) return true;                       // a decision on the table
  if(s._breakawayNew) return true;                        // a league was founded
  if((s._realignMoves||[]).length) return true;           // schools moved
  if(!s._meetingEverHeld) return true;                    // the first one, to introduce it
  // The scheduling market is a real decision most years, so it's worth convening for.
  if(schedMarketOffers().length) return true;
  var mom=(s.confMomentum&&s.confMomentum[s.conf])||0;
  if(Math.abs(mom)>=3) return true;                       // your conference is genuinely moving
  return false;
}

      var pips=""; for(var i=0;i<5;i++) pips+= (i<dots?"\u25cf":"\u25cb");
      var note = (t && t.c===s.conf) ? "in your league"
               : (b.v>=3.0 ? "a real series now" : b.v>=1.8 ? "building" : "occasional");
      h+='<div class="riv-row"><span class="riv-opp">'+x(b.n)+
         ' <span style="color:var(--muted);font-size:9px">'+(t?x(t.c):"")+'</span></span>'+
         '<span class="riv-rec" style="width:auto;color:var(--gold-dark);letter-spacing:1px">'+pips+
         ' <span style="color:var(--muted);font-weight:700;font-size:9px;letter-spacing:0">'+note+'</span></span></div>';
    });

    h+='<div style="font-size:9px;font-weight:700;color:var(--muted);margin:0 2px 10px;line-height:1.5">'+
       'Non-conference games against nearby schools build these. Strong ties with GOOD programs are what make a breakaway possible \u2014 playing a weak neighbour builds familiarity, not leverage.</div>';
  }

  // ── your standing scheduling policy ──

  // the whole regional system, so letting you set an intent here gives the early meetings real
  // stakes instead of being a landscape readout you click past for a decade.
  var pol=s.schedPolicy||"balanced";
  var POLS=[
    {k:"regional", ico:"\uD83E\uDD1D", t:"Play the neighbours",
     d:"Fill open dates with nearby schools. Builds regional ties fastest \u2014 the raw material for a breakaway."},
    {k:"balanced", ico:"\u2696\uFE0F", t:"No preference",
     d:"Take whatever games come. Ties build slowly, if at all."},
    {k:"marquee",  ico:"\uD83C\uDFDF\uFE0F", t:"Chase marquee games",

  ];
  h+='<div class="sec-title">Scheduling Policy</div>';
  h+='<div class="rec-tbl" style="margin-bottom:12px">';
  POLS.forEach(function(p){
    var on=(pol===p.k);
    h+='<div class="riv-row'+(on?'" style="background:var(--gold-bg)':'')+'" data-schedpol="'+p.k+'" style="cursor:pointer'+(on?';background:var(--gold-bg)':'')+'">'+
       '<span class="riv-opp">'+p.ico+' '+(on?'<b>':'')+x(p.t)+(on?'</b>':'')+
       '<br><span style="font-size:9px;font-weight:700;color:var(--muted);line-height:1.4">'+x(p.d)+'</span></span>'+
       '<span class="riv-rec" style="width:auto;color:var(--gold-dark);font-weight:900">'+(on?"\u2713":"")+'</span></div>';
  });
  h+='</div>';

  // ── your rivalries, as they actually stand ──
  var rivs=rivalriesFor(s.school).slice(0,6);
  if(rivs.length){
    h+='<div class="sec-title">Rivalries</div>';
    h+='<div class="rec-tbl" style="margin-bottom:12px">';
    rivs.forEach(function(r){
      var tier=rivalryTier(r.v);
      var inherited=isRival(s.school, r.n);
      var rec=(typeof rivalryRecord==="function") ? rivalryRecord(s.school, r.n) : null;
      var recTxt=(rec&&(rec.w+rec.l)) ? (rec.w+"\u2013"+rec.l) : "";
      h+='<div class="riv-row"><span class="riv-opp">\u2694\uFE0F '+x(r.n)+
         (inherited?'':' <span style="font-size:8.5px;color:var(--gold-dark);font-weight:900">BUILT</span>')+
         '</span>'+
         '<span class="riv-rec" style="width:auto"><span style="color:'+tier.c+';font-weight:900">'+tier.t+'</span>'+
         (recTxt?' <span style="color:var(--muted);font-weight:700;font-size:9px">'+recTxt+'</span>':'')+'</span></div>';
    });
    h+='</div>';
    h+='<div style="font-size:9px;font-weight:700;color:var(--muted);margin:0 2px 10px;line-height:1.5">'+
       'Rivalries are made, not declared \u2014 close games between good teams build them fastest, and a series that lapses cools off. Ones you\u2019ve built yourself are marked BUILT.</div>';
  }

  // ── the scheduling market ──
  var offers=schedMarketOffers();
  if(offers.length){
    h+='<div class="sec-title">Scheduling Market</div>';
    h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 8px;line-height:1.5">'+

       'You have <b>'+fmtMoney(s.nilLeft||0)+'</b> in NIL.</div>';

                : '<span style="color:var(--muted);font-weight:800">no fee</span>';

  }

  // ── the national picture ──
  h+='<div class="sec-title">The Landscape</div>';
  h+='<div class="rec-tbl" style="margin-bottom:12px">';
  rep.rows.forEach(function(r){
    if(r.members<4) return;                       // skip vestigial leagues

  h+='<div style="font-size:9px;font-weight:700;color:var(--muted);margin:0 2px 10px;line-height:1.5">'+
     'Tier drives recruiting appeal. A league that stops producing playoff teams will slide \u2014 and a league that starts producing them can climb, no matter where it began.</div>';
  return h;
}
function offseasonScreen(){
  var s=ST.save;
  prepareOffseason();            // decide who's leaving; open the portal
  // The league meeting happens FIRST, once per offseason — but only when it's WORTH convening.
  // Every year regardless made the early dynasty a decade of clicking past a landscape table, so
  // it's called when there's a decision to make, news to report, or the map is in motion. A quiet
  // era simply doesn't hold one.
  var yr=2026+((s.seasonsPlayed||1)-1);
  if(s._meetingSeen!==yr && meetingWorthHolding()){ ST.screen="leaguemeeting"; return leagueMeetingScreen(); }
  s._meetingSeen=yr;   // nothing to discuss this year; don't ask again
  var stage=osStage();

  // let it show you WHY it's locked rather than silently bouncing you back to Summary.

     '<div class="shd-r">'+x(s.school)+' · '+x(s.role)+'</div></div>';

  h+='<button class="bigbtn btn-green" id="advance-season">Advance to Season '+(s.season+1)+' →</button>';
  return h+'</div>';
}

         '🚪 <b>'+leaving.length+'</b> in the transfer portal \u2014 you can still buy them back on the <b>Portal</b> tab.</div>';
      leaving.forEach(function(p){ h+=row(p,"PORTAL","cut"); });
    }
    grads.forEach(function(p){ h+=row(p,"GRADUATING","grad"); });
    pros.forEach(function(p){ h+=row(p,"NFL DRAFT","grad"); });

  h+='<div class="sec-title">📥 Incoming <span class="pill">'+(inbound.length+commits.length)+'</span></div>';

  } else {

  h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 6px"><b>Cut</b> a player to open a roster spot for a signee.</div>';

    h+=row(p, yrLabel(p), "", '<button class="rr-cut" data-cut="'+p.id+'">Cut</button>');
  });

}

// ── Class: who committed, and who actually fits ──
function osClassTab(){
  var s=ST.save, h='';
  var commits=committedRecruits();
  if(!commits.length){
    return '<div class="rec-tbl"><div class="rec-empty">No commits landed this season. Spend recruiting points on the <b>Recruit</b> tab during the year to build a class.</div></div>';
  }
  var capFor=function(pos){ return rosterSizeAt(pos); };
  var have={}; s.roster.forEach(function(p){ if(p.yr==="SR"||p.cut||p.walkOn)return; have[p.pos]=(have[p.pos]||0)+1; });
  var sorted=commits.slice().sort(function(a,b){return b.st-a.st||b.ovr-a.ovr;});
  var willSign=0, willCut=0, flags={};
  sorted.forEach(function(b){
    var cap=capFor(b.pos), cur=have[b.pos]||0;
    if(cur<cap){ flags[b.id]="sign"; have[b.pos]=cur+1; willSign++; }
    else { flags[b.id]="cut"; willCut++; }
  });
  h+='<div class="sec-title">Signing <span class="pill">'+willSign+' of '+commits.length+'</span></div>';
  var note='These commits sign as freshmen when you advance.';
  if(willCut>0) note+=' <b>'+willCut+'</b> more committed but you\u2019re full at their position \u2014 cut someone on the <b>Roster</b> tab to open a spot.';
  h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 8px">'+note+'</div>';
  sorted.forEach(function(b){
    var cut=(flags[b.id]==="cut");
    var pi=hasPersonality(b)&&persKnown(b)?persInfo(b.pers):null;
    h+='<div class="roster-row"'+(cut?' style="opacity:.5"':'')+'><div class="rr-pos">'+b.pos+'</div>'+
       '<div class="rr-name">'+x(b.n)+(pi?' '+pi.ico:'')+'</div>'+
       '<div class="rr-yr">'+stars(b.st)+'</div><div class="rr-ovr">'+b.ovr+'</div>'+
       (cut?'<span class="rr-cut" style="background:var(--red-bg);color:var(--red2);border-color:var(--red2)">No room</span>':'')+
       '</div>';
  });
  return h;
}
// ── NEXT YEAR'S DEPTH CHART ───────────────────────────────
// The whole point of the offseason is deciding who to keep, cut, sign and chase — and you can't
// do that without seeing what the roster BECOMES. This projects next season's depth chart:
// everyone ages a year, the leavers are gone, your transfers and your class are slotted in, and
// walk-ons fill whatever's still empty. Sign a transfer and watch him land in the two-deep.
function projectedRoster(){
  var s=ST.save, YR_NEXT={FR:"SO",SO:"JR",JR:"SR"}, out=[];
  (s.roster||[]).forEach(function(p){
    if(p._incoming){                                  // a transfer you signed — arrives as listed
      out.push({n:p.n, pos:p.pos, ovr:p.ovr, yr:p.yr, rs:p.rs, dev:p.dev, pers:p.pers,
                depthRank:p.depthRank, src:"transfer", id:p.id});
      return;
    }
    if(p.yr==="SR" || p.cut || p._declared || p._leaving) return;   // gone
    out.push({n:p.n, pos:p.pos, ovr:p.ovr, yr:(p._rsHold?p.yr:(YR_NEXT[p.yr]||p.yr)),
              rs:(p.rs||p._rsHold), dev:p.dev, pers:p.pers, depthRank:p.depthRank,
              src:"returning", id:p.id});
  });
  // your class signs into whatever room is left, best first (same rule signing day uses)
  var have={}; out.forEach(function(p){ have[p.pos]=(have[p.pos]||0)+1; });
  committedRecruits().slice().sort(function(a,b){return b.st-a.st||b.ovr-a.ovr;}).forEach(function(b){
    var cap=rosterSizeAt(b.pos);
    if((have[b.pos]||0) >= cap) return;               // no room — he doesn't make the roster
    have[b.pos]=(have[b.pos]||0)+1;
    out.push({n:b.n, pos:b.pos, ovr:b.ovr, yr:"FR", dev:b.dev, pers:b.pers, src:"recruit", st:b.st});
  });
  return out;
}

                    : '<span class="chip res">RES</span>';
          var src = p.src==="transfer" ? '<span class="chip good">🔄 Transfer</span>'
                  : p.src==="recruit"  ? '<span class="chip good">🖊️ '+stars(p.st||3)+'</span>'
                  : '';
          var pi=hasPersonality(p)?persInfo(p.pers):null;
          h+='<div class="riv-row"'+(p.id?pcardAttr(p.id):'')+'>'+
             '<span style="width:44px;flex:none">'+tchip+'</span>'+
             '<span class="riv-opp">'+x(p.n)+
               '<span class="tp-sub">'+(YR_PRETTY[p.yr]||p.yr)+(p.rs?' (RS)':'')+
               (pi?' · '+pi.ico+' '+x(pi.t):'')+'</span></span>'+
             src+
             '<span class="riv-rec">'+p.ovr+'</span></div>';
        });
        if(holes>0){
          h+='<div class="riv-row" style="opacity:.65">'+
             '<span style="width:44px;flex:none"><span class="chip">🚶</span></span>'+
             '<span class="riv-opp" style="color:var(--red2)"><b>'+holes+' walk-on'+(holes===1?'':'s')+'</b>'+
               '<span class="tp-sub">No ceiling, no development</span></span></div>';
        }
      }
      h+='</div>';
    });
  });
  if(totalHoles>0){
    h+='<div style="font-size:10.5px;font-weight:800;color:var(--gold-dark);background:var(--gold-bg);'+
       'border:2px solid var(--gold-dark);border-radius:9px;padding:9px 11px;margin:4px 2px 10px;line-height:1.5">'+
       '🚶 <b>'+totalHoles+' walk-on'+(totalHoles===1?'':'s')+'</b> will fill the gaps when the portal closes. '+
       'Every one is a body you could have replaced with a real player.</div>';
  }
  return h;
}

// Toggle a roster player's "cut" flag in the offseason. Cut players are released
// when you advance, freeing their position spot so a better incoming signee can sign.
function cutPlayer(id){
  var s=ST.save; if(!s||!s.roster)return;
  var p=s.roster.filter(function(r){return r.id===id;})[0];
  if(!p)return;
  if(p.yr==="SR"){ toast("Seniors graduate on their own"); return; }
  if(!p.cut && !p.walkOn){
    // Warn before cutting a projected starter (top of the depth chart at their spot,
    // ignoring seniors/already-cut players who won't be here next year).
    // Walk-ons are exempt — cutting a placeholder never needs a confirmation.
    var pool=depthOrder(s.roster.filter(function(r){return r.yr!=="SR" && !r.cut;}), p.pos);
    var isStarter=pool.slice(0, startersAt(p.pos)).some(function(r){return r.id===p.id;});
    if(isStarter && !confirm("⚠️ "+p.n+" ("+p.pos+", "+p.ovr+" OVR) is a projected starter next season. Cut them anyway?")) return;
  }
  p.cut=!p.cut;
  toast(p.cut ? (x(p.n)+" will be cut") : (x(p.n)+" kept on roster"));
  persist();
  draw();
}

function startDynasty(){
  if(!ST.setup.team){toast("Pick a team");return;}
  var role=ST.setup.role||"OC";
  var carry = ST.save ? {careerWins:ST.save.careerWins,careerLosses:ST.save.careerLosses,titles:ST.save.titles,seasonsPlayed:ST.save.seasonsPlayed,abilities:ST.save.abilities} : null;
  ST.save=newSave(ST.setup.team, role);
  if(carry){ ST.save.careerWins=carry.careerWins; ST.save.careerLosses=carry.careerLosses; ST.save.titles=carry.titles; ST.save.seasonsPlayed=carry.seasonsPlayed; ST.save.abilities=carry.abilities; }
  // make sure the chosen archetype's tier-1 skill is unlocked (carry may have replaced abilities)
  var _ss=archStartSkill(ST.save.archetype);
  if(_ss && ST.save.abilities.indexOf(_ss)<0) ST.save.abilities.push(_ss);
  beginSeasonRecruiting();
  ST.save._recruited=false; ST.save.week=0;
  stampSeasonStart();

}
// Initialize a fresh recruiting board + weekly points for a new season
function beginSeasonRecruiting(){
  resolveStaffOffers();   // any offer you never answered: he's gone
  var s=ST.save;
  s.board=genRecruitBoard(s.prestige);
  // A standalone preseason allotment for scouting and building the board. It does NOT roll into
  // week 1 — kickoffSeason() hands you a fresh weekly allowance when the season starts.
  s.recruitPtsLeft=PRESEASON_RECRUIT_POINTS; s._usedFreeScout=false;
  s._signedThisYear=null;
  resetSeasonStats(); // clear last year's per-season stats (career totals persist)
  resetStarSeasons(); // ...and the rest of the country starts from zero too
  var nilRoll = hasAbility("nil5") ? money2(Math.max(0,(s.nilLeft||0))*0.5) : 0; // Collective Empire: carry half of unused NIL
  s.nilTotal=money2(nilBudgetFor()+nilRoll); s.nilLeft=s.nilTotal; // refill the annual NIL budget
  s.roster.forEach(function(p){ p.nilFund=0; }); // retention funding resets each year
  ST.recruitPos="ALL"; // reset the board's position filter
  ST.recruitStars="ALL"; // reset the board's star filter
  ST.recRank=null;       // re-settle order for the new class on first paint
}
// Enter the preseason setup hub before Week 1
function enterPreseason(){

}
// ── Transfer portal (Phase 2) ───────────────────────────
// Generate a pool of incoming transfers — instant-impact upperclassmen with an NIL price.
// ── THE TRANSFER PORTAL, WITH REAL PLAYERS ────────────────
// The portal used to be entirely invented: random names, random ratings, and a "previous school"
// drawn from FBS_TEAMS even in an FCS save. Every other program now carries real, named stars
// with real accumulated stats — so the portal is drawn from THEM. The man you sign is the man
// who torched you in week 6, he leaves an actual hole at an actual program, and his old team is
// measurably worse for losing him.
function starDevFrom(ovr){
  var st = ovr>=90 ? 5 : ovr>=85 ? 4 : ovr>=78 ? 3 : 2;
  return rollDevByStars(st);
}
// A one-line résumé from the season he just played — the reason you want him.
function starProdLine(st){
  // Prefer the season he just finished. By the time the portal opens, ageStars has already
  // rolled the calendar over and cleared st.s — so without this every transfer showed "no stats".
  var x=(st.last && Object.keys(st.last).length) ? st.last : (st.s||{});
  var R=function(v){return Math.round(v||0);};
  if(x.py)   return R(x.py)+" pass yd · "+R(x.ptd)+" TD";
  if(x.ry)   return R(x.ry)+" rush yd · "+R(x.rtd)+" TD";
  if(x.recy) return R(x.recy)+" rec yd · "+R(x.rectd)+" TD";
  if(x.sack) return R(x.sack)+" sacks · "+R(x.tkl)+" tkl";
  if(x.dint) return R(x.dint)+" INT · "+R(x.tkl)+" tkl";
  if(x.tkl)  return R(x.tkl)+" tackles";
  return null;
}
function genPortalPool(){
  var s=ST.save, pool=[], poslist=rolePositions(), L=s.league;
  var myDiv=myDivision(), myP=s.prestige||3;
  if(!L || !L.teams) return pool;

  // ── Who is actually IN a transfer portal? ──────────────
  // Not a wall of All-Americans. The overwhelming majority are BACKUPS chasing playing time —
  // buried behind somebody, out of patience. A handful of real starters move. A genuine star
  // moving is news. The old pool drew exclusively from each program's nine best players, so every
  // single entrant was a starter and a small school was staring at a market it had no business in.
  var STARS=[], DEPTH=[];
  Object.keys(L.teams).forEach(function(tn){
    var t=L.teams[tn];
    if(t.div!==myDiv || tn===s.school) return;
    var gap = (t.p||3) - myP;                     // + = they're a bigger program than you

    // (a) STARS — real names, real stats. A star at a big program rarely drops to a small one:
    //     he has better offers. When he does move down, it's because he wants the snaps.
    if(t.stars) t.stars.forEach(function(stp, idx){
      if(poslist.indexOf(stp.pos)<0 || stp.yr==="FR") return;
      var w=1;
      w += Math.max(0, 3-(t.p||3))*0.9;           // small programs can't hold their best
      if((t.l||0)>=7) w += 1.2;                   // a bad year empties a locker room
      if(stp.ovr>=88) w *= 0.55;                  // a true blue-chip usually stays put
      if(stp.wasTarget) w += 1.6;                 // the one who got away
      // ...and he won't drop two tiers to come to you unless there's a real reason.
      if(gap>0) w *= Math.max(0.12, 1 - gap*0.42);
      if(w>0.05) STARS.push({team:tn, t:t, idx:idx, st:stp, w:w});
    });

    // (b) DEPTH — the bulk of any portal. Backups you've never heard of, rated below the
    //     program's starters, looking for a place to play. THIS is who a small school shops.
    var n=rnd(1,2);
    for(var i=0;i<n;i++){
      var pos=pick(poslist);
      var base=starOvrFor(t,pos) - rnd(6,17);      // he's not the star — he's behind the star
      var ovr=clampN(Math.round(base), 48, 88);
      var w2=1.6;
      w2 += Math.max(0, 3-(t.p||3))*0.5;
      if((t.l||0)>=7) w2 += 0.8;
      if(gap>0) w2 *= Math.max(0.35, 1 - gap*0.18); // depth moves around far more freely
      DEPTH.push({team:tn, t:t, pos:pos, ovr:ovr, w:w2, depth:true});
    }
  });

  // ── Compose the market: mostly depth, some starters, the odd star ──
  var take=function(list){
    if(!list.length) return null;
    var tot=0; list.forEach(function(c){ tot+=c.w; });
    var roll=Math.random()*tot, acc=0, hit=list.length-1;
    for(var j=0;j<list.length;j++){ acc+=list[j].w; if(roll<=acc){ hit=j; break; } }
    return list.splice(hit,1)[0];
  };
  var total=rnd(10,15);
  for(var k=0;k<total;k++){
    // ~30% of a real portal is starter-quality; the rest is depth.
    var wantStar = (Math.random() < 0.30) && STARS.length;
    var c = wantStar ? take(STARS) : (take(DEPTH) || take(STARS));
    if(!c) break;
    var e = c.depth ? makeDepthTransfer(c) : makeStarTransfer(c);
    if(e) pool.push(e);
  }
  pool.sort(function(a,b){return b.ovr-a.ovr;});
  return pool;
}
// What a portal player costs to sign.
//
// This used to open with `var pay=POS_PAY.LB` and then never use it — dead code that froze
// every position at linebacker money. POS_PAY says a WR is worth $0.8-2.0M and an LB $0.3-0.7M,
// so a 91 OVR WR was being priced as if he were the cheapest position on the field, ~2.7x under.
// It also used a flat `*0.45` for FCS while nilDemand scales by the real market ratio (~0.061),
// so the two systems disagreed about what money even means.
//
// Now it's built on the SAME POS_PAY band and the SAME market scale as nilDemand, so a player's
// salary demand and his market price are denominated in the same currency and can be compared.
// `pos` is optional for back-compat with older call sites; it falls back to the LB band.
function transferPrice(ovr, dev, pos){
  var pay=POS_PAY[pos]||POS_PAY.LB;
  var tT=Math.max(0,Math.min(1,(ovr-70)/23));            // 70 → band floor, 93 → band ceiling
  // Same curve shape as before (a depth guy is cheap, a star is not), but expressed as a
  // fraction of the position's real pay band rather than an absolute number.
  var band = pay[0] + (pay[1]-pay[0])*Math.pow(tT,1.9);
  var base = band*0.55;                                   // a one-year portal deal, not a career
  if(dev==="elite"||dev==="pro") base*=1.15;
  var marketScale = nilElitePool()/NIL_BASE[5];           // FBS = 1.0, FCS ≈ 0.061
  base *= marketScale;
  return Math.max(0.02, money2(base));
}
function makeStarTransfer(c){
  var st=c.st, dev=starDevFrom(st.ovr);
  return {
    id:"tp"+Math.random().toString(36).slice(2,7),
    n:st.n, pos:st.pos, yr:st.yr, ovr:st.ovr,
    arch:rollArch(st.pos), dev:dev, pers:rollPersonality(), pot:rollPotential(st.ovr,dev),
    price:transferPrice(st.ovr, dev, st.pos),
    rival:c.team,
    prod:starProdLine(st),
    wasTarget:!!st.wasTarget, hsStars:st.hsStars||0,
    _from:{team:c.team, idx:c.idx},
    status:"open"
  };
}
function makeDepthTransfer(c){
  var dev=starDevFrom(c.ovr);
  return {
    id:"tp"+Math.random().toString(36).slice(2,7),
    n:genName(), pos:c.pos, yr:pick(["SO","JR","SR"]), ovr:c.ovr,
    arch:rollArch(c.pos), dev:dev, pers:rollPersonality(), pot:rollPotential(c.ovr,dev),
    price:transferPrice(c.ovr, dev, c.pos),
    rival:c.team,
    prod:null,                       // a backup has no headline stat line — that's WHY he's leaving
    depth:true,
    _from:null,                      // he isn't one of their nine stars, so nobody loses a starter
    status:"open"

}
// He's gone: strike him from his old team and hand them a lesser replacement. Losing a starter
// genuinely hurts them, which is what makes a portal raid mean something.
// Which program beat you to him. Never his old school (he's leaving), never yours.
function portalSuitor(t){
  var s=ST.save, L=s.league, myDiv=myDivision(), cands=[];
  if(L&&L.teams) Object.keys(L.teams).forEach(function(n){
    var tm=L.teams[n];
    if(tm.div!==myDiv || n===s.school || n===t.rival) return;
    if((tm.p||3) >= (s.prestige||3)-1) cands.push(n);   // a program that could plausibly outbid you
  });
  return cands.length ? pick(cands) : "another program";
}
function poachFromTeam(from){
  if(!from) return;
  var L=ST.save.league; if(!L||!L.teams) return;
  var t=L.teams[from.team]; if(!t||!t.stars||!t.stars[from.idx]) return;
  var gone=t.stars[from.idx];

                     ovr:Math.max(48, starOvrFor(t,gone.pos)-3), s:{}, c:{},
                     form:0.84+Math.random()*0.32};
  var ding=(gone.ovr>=85)?2:1;                     // they're worse for it

function signTransfer(id){
  var s=ST.save, t=(s._portalPool||[]).filter(function(x){return x.id===id;})[0];
  if(!t||t.status!=="open") return;

  // Count only players who'll still be here next season — graduating seniors, cuts and portal
  // departures don't hold a spot. Previously this counted the CURRENT roster, so you couldn't sign
  // a replacement for a man who was already walking out the door.
  var atPos=s.roster.filter(function(p){
    return p.pos===t.pos && p.yr!=="SR" && !p.cut && !p._declared && !p._leaving;
  });

    var worst=atPos.slice().sort(function(a,b){return a.ovr-b.ovr;})[0];
    if(worst && worst.ovr < t.ovr){ s.roster=s.roster.filter(function(p){return p.id!==worst.id;}); toast("Cut "+x(worst.n)+" ("+worst.ovr+") to make room"); }
    else { toast("Roster full at "+t.pos+" — and this isn\u2019t an upgrade. Cut someone first."); return; }
  }

          startOvr:t.ovr,ssOvr:t.ovr,revealed:(!devInfo(t.dev).hidden),nilFund:0,_incoming:true};

  s.jobSecurity=Math.min(100,(s.jobSecurity||60)+2); // a portal splash excites the fanbase

// Pull one of your own out of the portal before he's gone for good.

// Scholarship players leave; somebody still has to line up. Any position below its
// minimum gets walk-ons — bottom-of-the-roster bodies with no ceiling. They keep
// you from fielding four offensive linemen, and nothing more.
// Scholarship players leave; somebody still has to line up — and somebody has to

// development, so a roster full of them is a roster in trouble.

    var need=open[pos]||0;

    for(var i=0;i<need;i++){

      // bodies at the very bottom of the two-deep

// ── Player stats (Phase 3) ───────────────────────────────

function ensureStats(p){ if(!p.stats)p.stats={season:{},career:{}}; if(!p.gamelog)p.gamelog=[]; }
function addStat(p, obj){

function _apportion(total, fracs){ var o=fracs.map(function(f){return Math.max(0,Math.round(total*f));}); var d=total-o.reduce(function(a,b){return a+b;},0); if(o.length)o[0]=Math.max(0,o[0]+d); return o; }
// Turn points allowed into a defensive box score across your starters.
// `oppStats` is the opposing offense's real per-play totals from the drive engine:
// the sacks they took are ours, the passes they threw away are our takeaways.
function genDefenseBox(ptsAllowed, opp, driveStats){
  var s=ST.save, sc=defScheme();
  var top=function(pos,n){ return depthOrder(s.roster,pos).slice(0,n); };
  var o=(driveStats && driveStats[1]) ? driveStats[1] : null;
  var perf=Math.max(0,Math.min(1,(30-ptsAllowed)/30));
  // Real counts where the engine has them; estimates only where it doesn't model the event.
  var totTkl = o ? Math.max(30, Math.round(o.plays*0.78)) : rnd(52,66);
  var sacks  = o ? o.sacks : Math.max(0,Math.round(1+perf*3+(sc.lean>60?1:0)+(Math.random()<0.5?1:0)));
  var ints   = o ? o.ints  : ((Math.random()<(0.22+perf*0.5))?rnd(1,2):0);
  var fums   = o ? o.fums  : 0;
  // TFLs and PBUs aren't modelled play-by-play; scale them to real activity.
  var tfls = sacks + (o ? Math.round(o.plays*0.05) : rnd(3,7));
  var pbus = o ? Math.max(1, Math.round((o.att-o.comp)*0.35)) : rnd(2,6);
  var groups=[
    {pos:"LB",tkl:1.5,sack:sc.lean>55?0.8:0.4,int:0.4,tfl:1.0,pbu:0.4},
    {pos:"S", tkl:1.1,sack:0.1,int:1.0,tfl:0.3,pbu:0.9},
    {pos:"CB",tkl:0.7,sack:0.1,int:1.2,tfl:0.2,pbu:1.6},
    {pos:"DL",tkl:0.9,sack:2.2,int:0.05,tfl:1.6,pbu:0.2}
  ];
  var players=[],tW=[],sW=[],iW=[],fW=[],pW=[];
  groups.forEach(function(gr){
    // Starters AND the rotation backups. A backup takes a smaller share of the snaps, so he
    // gets a smaller share of the box score — but he does get one, instead of being charged a
    // full season of games with nothing to show for it.
    top(gr.pos, rotationAt(gr.pos)).forEach(function(p,i){
      players.push(p);
      var share=(i < startersAt(gr.pos)) ? 1 : 0.30;   // rotation backup: ~30% of a starter's snaps
      var am=(p.arch==="Pass Rusher")?1.6:1, bh=(p.arch==="Ball-Hawk")?1.7:1, th=(p.arch==="Thumper")?1.4:1, bz=(p.arch==="Blitzer")?1.5:1;
      tW.push(gr.tkl*th*share); sW.push(gr.sack*am*bz*share); iW.push(gr.int*bh*share);
      fW.push(gr.tfl*am*share); pW.push(gr.pbu*share);
    });
  });
  if(!players.length) return;
  var tA=_apportion(totTkl,_norm(tW)),sA=_apportion(sacks,_norm(sW)),fA=_apportion(tfls,_norm(fW)),iA=_apportion(ints,_norm(iW)),pA=_apportion(pbus,_norm(pW)),uA=_apportion(fums,_norm(fW));
  players.forEach(function(p,i){
    addStat(p,{tkl:tA[i],sack:sA[i],tfl:fA[i],dint:iA[i],pbu:pA[i],ff:uA[i],g:1});
    var parts=[tA[i]+" tkl"]; if(sA[i])parts.push(sA[i]+" sack"); if(fA[i])parts.push(fA[i]+" TFL"); if(iA[i])parts.push(iA[i]+" INT"); if(uA[i])parts.push(uA[i]+" FF"); if(pA[i])parts.push(pA[i]+" PBU");
    logGame(p,opp,parts.join(", "));
  });
}
// Generate + record a game's box score for the unit(s) you coach.
// Build the box score from the plays that actually happened.
// The play-by-play and the stat line are now two views of one event stream.
function recordGameStats(res, opp, pbp){
  var s=ST.save;
  if(s.role==="OC"||s.role==="HC") boxFromPlays(pbp, opp);
  if(s.role==="DC"||s.role==="HC") genDefenseBox(res.them, opp, res.driveStats);
}
// Accumulate per-player offensive stats by walking our own snaps.
// Tally per-player offensive stats from a play-by-play. PURE — mutates nothing.
// Used both for the final box score and for the live stats tab, which passes only
// the plays revealed so far so it never spoils what hasn't been shown.
function tallyFromPlays(pbp){
  var acc={}, order=[];
  function bucket(pl){
    if(!pl) return null;
    if(!acc[pl.id]){ acc[pl.id]={p:pl, pa:0,pc:0,py:0,ptd:0,pint:0, rc:0,ry:0,rtd:0, rec:0,recy:0,rectd:0}; order.push(pl.id); }
    return acc[pl.id];
  }
  (pbp||[]).forEach(function(e){
    if(e.team!=="us" || e.scoring) return;   // scoring rows carry no snap data
    // Only bucket a player a branch will actually credit. Bucketing up front used
    // to create empty entries on SACK rows (no branch handles them), which then
    // credited a "game played" to a receiver who never touched the ball.
    if(e.kind==="RUN" || e.kind==="FUM"){
      var ball=bucket(e.ballP);
      if(ball){ ball.rc++; ball.ry+=e.yards; if(e.scored && e.kind==="RUN") ball.rtd++; }
    } else if(e.kind==="PASS"){
      var qb=bucket(e.qbP), tgt=bucket(e.ballP);
      if(qb){ qb.pa++; qb.pc++; qb.py+=e.yards; if(e.scored) qb.ptd++; }
      if(tgt && tgt!==qb){ tgt.rec++; tgt.recy+=e.yards; if(e.scored) tgt.rectd++; }
    } else if(e.kind==="INC"){
      var q2=bucket(e.qbP); if(q2) q2.pa++;
    } else if(e.kind==="INT"){
      var q3=bucket(e.qbP); if(q3){ q3.pa++; q3.pint++; }
    }
    // SACK / PUNT / FGA: nobody is credited, so nobody is bucketed
  });
  return {acc:acc, order:order};
}
// Team stats derived from the plays REVEALED so far, for both sides. G.stats holds
// the finished game, so using it live would spoil a score you haven't watched yet.
function teamStatsFromPlays(pbp){
  function blank(){ return {plays:0,rushYds:0,passYds:0,comp:0,att:0,sacks:0,
    ints:0,fums:0,punts:0,fga:0,fgm:0,thirdAtt:0,thirdConv:0,pts:0}; }
  var t={us:blank(), them:blank()};
  (pbp||[]).forEach(function(e){
    var s=t[e.team];
    if(e.scoring){ s.pts+=e.pts; if(e.kind==="FG")s.fgm++; return; }
    if(e.kind==="FGA"){ s.fga++; return; }
    if(e.kind==="PUNT"){ s.punts++; return; }
    s.plays++;
    if(e.down===3){ s.thirdAtt++; if(e.firstDown) s.thirdConv++; }
    if(e.kind==="RUN"||e.kind==="FUM"){ s.rushYds+=e.yards; if(e.kind==="FUM")s.fums++; }
    else if(e.kind==="SACK"){ s.sacks++; s.passYds+=e.yards; }   // sacks are not attempts
    else if(e.kind==="INT"){ s.att++; s.ints++; }
    else if(e.kind==="INC"){ s.att++; }
    else if(e.kind==="PASS"){ s.att++; s.comp++; s.passYds+=e.yards; }
  });
  return t;
}
// The Stats tab: a team comparison, then your own players' box score. Everything
// is derived from `revealed` — the plays actually shown — so a live box score
// never gets ahead of the play-by-play.
function liveStatsPanel(revealed){
  var T=teamStatsFromPlays(revealed);
  var usName=abbr(ST.save.school), themName=abbr(ST.weekResult.oppName);
  if(!revealed || !revealed.length){
    return '<div class="ls-empty">No plays yet — stats appear as the game unfolds.</div>';
  }
  // Team totals are all cumulative counts, so clamp them to a per-game high-water. Without
  // this, a rebuilt play-by-play could momentarily drop the last play back over the clock
  // and the whole box score would tick backward for a frame.
  var _li=ST.live || {};
  if(!_li._team){ _li._team={us:{},them:{}}; }
  ["us","them"].forEach(function(side){
    var cur=T[side], hi=_li._team[side];
    Object.keys(cur).forEach(function(k){
      if(typeof cur[k]==="number"){ if(hi[k]==null || cur[k]>hi[k]) hi[k]=cur[k]; cur[k]=hi[k]; }
    });
  });
  function yds(s){ return s.rushYds+s.passYds; }
  function third(s){ return s.thirdAtt ? (s.thirdConv+"/"+s.thirdAtt) : "0/0"; }
  function cmp(s){ return s.att ? (s.comp+"/"+s.att) : "0/0"; }
  // higher is better for all of these except turnovers
  var rows=[
    ["Points",      T.us.pts,        T.them.pts,       1],
    ["Total Yards", yds(T.us),       yds(T.them),      1],
    ["Rushing",     T.us.rushYds,    T.them.rushYds,   1],
    ["Passing",     T.us.passYds,    T.them.passYds,   1],
    ["Passing C/A", cmp(T.us),       cmp(T.them),      0],
    ["Plays",       T.us.plays,      T.them.plays,     0],
    ["3rd Down",    third(T.us),     third(T.them),    0],
    ["Sacks Taken", T.us.sacks,      T.them.sacks,    -1],
    ["Turnovers",   T.us.ints+T.us.fums, T.them.ints+T.them.fums, -1],
    ["Punts",       T.us.punts,      T.them.punts,     0]
  ];
  var h='<div class="ls-wrap">';
  h+='<div class="ls-hd"><span class="ls-team">'+x(usName)+'</span>'+
     '<span class="ls-mid">TEAM</span><span class="ls-team">'+x(themName)+'</span></div>';
  rows.forEach(function(r){
    var a=r[1], b=r[2], dir=r[3];
    var lead="", trail="";
    if(dir!==0 && typeof a==="number"){
      if(a!==b){ var usBetter=(dir>0)?(a>b):(a<b); if(usBetter)lead="win"; else trail="win"; }
    }
    h+='<div class="ls-row"><span class="ls-v '+lead+'">'+a+'</span>'+
       '<span class="ls-l">'+r[0]+'</span>'+
       '<span class="ls-v '+trail+'">'+b+'</span></div>';
  });
  h+='</div>';

  // your players
  var t=tallyFromPlays(revealed), acc=t.acc, order=t.order;
  // ── Monotonic, stable box score ──────────────────────────────────
  // The revealed slice can wobble by a play when the play-by-play is rebuilt (a snap's
  // clock stamp shifts across the current game clock), which used to make players and
  // their lines flicker in and out. We keep a per-game high-water cache: a player, once
  // shown, stays; every counting stat only ever climbs. Display order is locked to the
  // order players first appeared, so nobody jumps around as yardage changes.
  // Attribution is now stamped per play (see buildPlayByPlay), so a rebuild re-derives the
  // SAME numbers and there's nothing to flicker. The old high-water cache here took a max
  // per stat per player across rebuilds — which, when attribution was still being re-rolled,
  // silently unioned every re-roll into one box score (two QBs each credited with the whole
  // game, player yards exceeding the team line). Keep display ORDER stable; trust the tally.
  var li=ST.live || {};
  if(!li._box) li._box={order:[]};
  var box=li._box;
  order.forEach(function(id){ if(box.order.indexOf(id)<0) box.order.push(id); });
  order=box.order.filter(function(id){ return acc[id]; });
  var pass=[], rush=[], recv=[];
  order.forEach(function(id){
    var a=acc[id];
    if(a.pa)  pass.push(a);
    if(a.rc)  rush.push(a);
    if(a.rec) recv.push(a);
  });
  // Sort ONCE by production, breaking ties by first-appearance order so the list is
  // stable tick-to-tick (no swapping when two players share a yardage total).
  var ord={}; order.forEach(function(id,i){ ord[id]=i; });
  pass.sort(function(a,b){return b.py-a.py || ord[a.p.id]-ord[b.p.id];});
  rush.sort(function(a,b){return b.ry-a.ry || ord[a.p.id]-ord[b.p.id];});
  recv.sort(function(a,b){return b.recy-a.recy || ord[a.p.id]-ord[b.p.id];});
  function section(title, list, fmt){
    if(!list.length) return "";
    var o='<div class="ls-sec">'+title+'</div><div class="ls-tbl">';
    list.forEach(function(a){
      o+='<div class="ls-prow"><span class="ls-pn">'+x(a.p.n)+'<span class="ls-pp">'+a.p.pos+'</span></span>'+
         '<span class="ls-ps">'+fmt(a)+'</span></div>';
    });
    return o+'</div>';
  }
  // A QB's passing yards are gross; the team line above is net of sack losses.
  h+=section("Passing", pass, function(a){
    return a.pc+"/"+a.pa+" · "+a.py+" yd · "+a.ptd+" TD"+(a.pint?" · "+a.pint+" INT":"");
  });
  h+=section("Rushing", rush, function(a){
    return a.rc+" car · "+a.ry+" yd"+(a.rtd?" · "+a.rtd+" TD":"");
  });
  h+=section("Receiving", recv, function(a){
    return a.rec+" rec · "+a.recy+" yd"+(a.rectd?" · "+a.rectd+" TD":"");
  });
  if(!pass.length && !rush.length && !recv.length){
    h+='<div class="ls-empty">Your offense hasn\u2019t taken a snap yet.</div>';
  }
  return h;
}
function boxFromPlays(pbp, opp){
  if(!pbp || !pbp.length) return;
  var t=tallyFromPlays(pbp), acc=t.acc, order=t.order;
  order.forEach(function(id){
    var a=acc[id];
    var st={g:1};
    if(a.pa){ st.pa=a.pa; st.pc=a.pc; st.py=a.py; st.ptd=a.ptd; st.pint=a.pint; }
    if(a.rc){ st.rc=a.rc; st.ry=a.ry; st.rtd=a.rtd; }
    if(a.rec){ st.rec=a.rec; st.recy=a.recy; st.rectd=a.rectd; }
    addStat(a.p, st);
    var parts=[];
    if(a.pa)  parts.push("PASS "+a.pc+"/"+a.pa+" "+a.py+"yd"+(a.ptd?" "+a.ptd+"TD":"")+(a.pint?" "+a.pint+"INT":""));
    if(a.rc)  parts.push("RUSH "+a.rc+"car "+a.ry+"yd"+(a.rtd?" "+a.rtd+"TD":""));
    if(a.rec) parts.push("REC "+a.rec+" "+a.recy+"yd"+(a.rectd?" "+a.rectd+"TD":""));
    if(parts.length) logGame(a.p, opp, parts.join(" · "));
  });
}
