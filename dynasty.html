<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – CFB Dynasty</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#fff;--card2:#fdf8ee;--border:#111;--border2:#ddd;
  --text:#111;--muted:#777;--dim:#aaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#c0392b;--red2:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none}

.topbar{background:#fff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-center{flex:1;min-width:0;overflow:hidden;text-align:center}
.app-name{font-size:15px;font-weight:900;white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:9px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;display:block}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;box-shadow:2px 2px 0 var(--border)}
.top-actions{display:flex;align-items:center;gap:5px}
.top-btn{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;background:#fff;border:2px solid var(--border);border-radius:8px;box-shadow:2px 2px 0 var(--border);cursor:pointer;padding:0;line-height:1}
.top-btn:active{transform:translate(2px,2px);box-shadow:none}
.top-restart{color:var(--red2);font-size:16px;font-weight:900}
@media(max-width:380px){.top-actions .tag{display:none}}
.scorecery-logo{font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111;text-shadow:1px 1px 0 #111,2px 2px 0 #111,3px 3px 0 #111,5px 5px 0 #c9082a,7px 7px 0 #17408b,8px 8px 0 #0d2a5c;paint-order:stroke fill}

.btn{border-radius:8px;padding:5px 12px;font-size:10px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#fff;color:var(--text)}
.btn-gold{background:var(--gold-bg);color:var(--gold-dark)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-red{background:var(--red-bg);color:var(--red2)}
.btn-blue{background:var(--blue-bg);color:var(--blue)}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#fff;border:2px solid var(--border);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.wrap{padding:14px}
.hero{background:#fff;border:2px solid var(--border);border-radius:14px;padding:16px;box-shadow:5px 5px 0 var(--border);margin-bottom:14px;text-align:center}
.hero h1{font-size:20px;font-weight:900;margin-bottom:4px}
.hero p{font-size:11px;font-weight:700;color:var(--muted);line-height:1.6}

.sec-title{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:0 2px 8px;display:flex;align-items:center;gap:8px}
.sec-title .pill{margin-left:auto;font-size:9px;background:#fff;border:2px solid var(--border);border-radius:20px;padding:2px 9px;box-shadow:1px 1px 0 var(--border);color:var(--text)}

/* setup: conference + team pick */
.conf-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px}
.conf-tabs::-webkit-scrollbar{display:none}
.conf-tab{flex-shrink:0;padding:6px 12px;font-size:10px;font-weight:800;border:2px solid var(--border);background:#fff;color:var(--muted);border-radius:8px;box-shadow:2px 2px 0 var(--border);white-space:nowrap}
.conf-tab.active{background:var(--gold);color:var(--text)}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.team-btn{padding:10px;border-radius:10px;background:#fff;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);text-align:left;display:flex;justify-content:space-between;align-items:center;gap:6px}
.team-btn:active{transform:translate(2px,2px);box-shadow:none}
.team-btn.sel{background:var(--gold-bg);border-color:var(--gold-dark)}
.team-name{font-size:13px;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stars{font-size:10px;color:var(--gold-dark);font-weight:900;flex-shrink:0}
.role-row{display:flex;gap:8px;margin:10px 0}
.role-card{flex:1;padding:12px;border-radius:12px;background:#fff;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border);text-align:center}
.role-card.sel{background:var(--blue-bg);border-color:var(--blue)}
.role-card.disabled{opacity:.45}
.role-card h3{font-size:14px;font-weight:900}
.role-card p{font-size:9px;font-weight:700;color:var(--muted);margin-top:3px;line-height:1.4}

/* recruiting */
.budget-bar{background:#fff;border:2px solid var(--border);border-radius:12px;padding:10px 12px;box-shadow:3px 3px 0 var(--border);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.budget-bar .bnum{font-size:22px;font-weight:900}
.budget-bar .blbl{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.needs{margin-left:auto;font-size:9px;font-weight:800;color:var(--muted);text-align:right;line-height:1.5}
.recruit{background:#fff;border:2px solid var(--border);border-radius:11px;padding:10px 12px;box-shadow:3px 3px 0 var(--border);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.recruit.signed{background:var(--green-bg);border-color:var(--green)}
.recruit.tooexp{opacity:.5}
.rec-pos{width:34px;height:34px;border-radius:8px;background:var(--cream);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.rec-body{flex:1;min-width:0}
.rec-name{font-size:14px;font-weight:900}
.rec-meta{font-size:9px;font-weight:700;color:var(--muted);margin-top:2px}
.rec-stars{color:var(--gold-dark);font-weight:900}
.rec-cost{font-size:14px;font-weight:900;flex-shrink:0;text-align:right}
.rec-cost .cl{font-size:8px;font-weight:800;color:var(--muted);display:block;text-transform:uppercase}
.rec-btn{flex-shrink:0;padding:6px 11px;border-radius:8px;font-size:10px;font-weight:900;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);background:var(--gold);color:var(--text)}
.rec-btn:active{transform:translate(2px,2px);box-shadow:none}
.rec-btn.signed{background:var(--green);color:#fff}

/* schedule / season */
.game-row{background:#fff;border:2px solid var(--border);border-radius:10px;padding:9px 12px;box-shadow:2px 2px 0 var(--border);margin-bottom:7px;display:flex;align-items:center;gap:9px}
.game-row.win{background:var(--green-bg);border-color:var(--green)}
.game-row.loss{background:var(--red-bg);border-color:var(--red2)}
.game-wk{font-size:9px;font-weight:900;color:var(--muted);width:28px;flex-shrink:0}
.game-opp{flex:1;font-size:12px;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.game-opp .oc{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase}
.game-res{font-size:13px;font-weight:900;flex-shrink:0}
.game-res.w{color:var(--green)}
.game-res.l{color:var(--red2)}

.gameplan{background:var(--cream);border:2px solid var(--border);border-radius:12px;padding:12px;box-shadow:3px 3px 0 var(--border);margin-bottom:12px}
.gp-title{font-size:12px;font-weight:900;margin-bottom:3px}
.gp-sub{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:9px;line-height:1.4}
.gp-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.gp-opt{padding:9px;border-radius:9px;background:#fff;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);text-align:center}
.gp-opt:active{transform:translate(2px,2px);box-shadow:none}
.gp-opt.sel{background:var(--purple-bg);border-color:var(--purple)}
.gp-opt h4{font-size:12px;font-weight:900}
.gp-opt p{font-size:8px;font-weight:700;color:var(--muted);margin-top:2px;line-height:1.3}

.result-card{background:#fff;border:3px solid var(--border);border-radius:14px;padding:18px;box-shadow:5px 5px 0 var(--border);text-align:center;margin-bottom:12px}
.result-card .score{font-size:30px;font-weight:900;letter-spacing:-.02em}
.result-card .vs{font-size:12px;font-weight:800;color:var(--muted);margin:5px 0}
.result-card.win{background:var(--green-bg)}
.result-card.loss{background:var(--red-bg)}

.stat-grid{display:flex;gap:7px;margin:12px 0}
.stat{flex:1;background:#fff;border:2px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;box-shadow:2px 2px 0 var(--border)}
.stat-v{font-size:18px;font-weight:900;line-height:1}
.stat-l{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:3px}

.bigbtn{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:900;border:2px solid var(--border);box-shadow:4px 4px 0 var(--border);font-family:'Nunito',sans-serif;margin-top:6px}
.bigbtn:active{transform:translate(4px,4px);box-shadow:none}

.roster-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff;border:2px solid var(--border2);border-radius:8px;margin-bottom:5px}
.roster-row .rr-pos{font-size:10px;font-weight:900;width:28px;color:var(--muted)}
.roster-row .rr-name{flex:1;font-size:12px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.roster-row .rr-yr{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;background:var(--cream);border:1.5px solid var(--border2);border-radius:5px;padding:1px 5px}
.roster-row .rr-ovr{font-size:14px;font-weight:900;width:30px;text-align:right}
.roster-row.grad{opacity:.5}

/* live broadcast scoreboard */
.scoreboard{display:flex;align-items:stretch;gap:6px;background:#14202e;border:3px solid var(--border);border-radius:14px;padding:12px 8px;box-shadow:5px 5px 0 var(--border)}
.sb-team{flex:1;text-align:center;color:#fff;min-width:0}
.sb-name{font-size:11px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#f5f0e8}
.sb-score{font-size:40px;font-weight:900;line-height:1.05;color:#fff;font-variant-numeric:tabular-nums;transition:transform .18s}
.sb-score.bump{transform:scale(1.25);color:var(--gold)}
.sb-tag{font-size:8px;font-weight:800;color:#8aa;letter-spacing:.08em}
.sb-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 2px}
.sb-q{font-size:9px;font-weight:900;color:var(--gold);background:#0c1620;border:1.5px solid #2a3a4a;border-radius:6px;padding:3px 6px;white-space:nowrap}
.sb-vs{font-size:10px;font-weight:900;color:#5a6a7a;margin-top:4px}
.pbp-feed{display:flex;flex-direction:column;gap:5px;min-height:60px}
.pbp-row{display:flex;align-items:center;gap:7px;background:#fff;border:2px solid var(--border2);border-radius:8px;padding:6px 9px;animation:pbpIn .3s ease}
.pbp-row.mine{background:var(--gold-bg);border-color:var(--gold-dark)}
.pbp-q{font-size:8px;font-weight:900;color:var(--muted);width:16px;flex-shrink:0}
.pbp-badge{font-size:9px;font-weight:900;flex-shrink:0;width:44px}
.pbp-desc{flex:1;font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.pbp-sc{font-size:11px;font-weight:900;flex-shrink:0;font-variant-numeric:tabular-nums}
@keyframes pbpIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.result-tag{text-align:center;font-size:12px;font-weight:900;padding:8px;border-radius:10px;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border)}
.result-tag.win{background:var(--green-bg);color:var(--green)}
.result-tag.loss{background:var(--red-bg);color:var(--red2)}
/* season expectations bar */
.expect-bar{display:flex;gap:10px;background:var(--cream);border:2px solid var(--border);border-radius:12px;padding:10px 12px;box-shadow:3px 3px 0 var(--border);margin-bottom:12px}
.exp-left{flex:1;min-width:0}
.exp-lbl{font-size:8px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.exp-goal{font-size:14px;font-weight:900;line-height:1.15;margin-top:1px}
.exp-sub{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:2px}
.exp-right{flex-shrink:0;text-align:right;min-width:82px}
.exp-sec{font-size:12px;font-weight:900}
.exp-secbar{height:6px;background:#e4ddd0;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;margin:3px 0 0}
.exp-secfill{height:100%;border-radius:4px;transition:width .3s}
/* job offers */
.job-offer{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--border);border-radius:11px;padding:10px 12px;box-shadow:3px 3px 0 var(--border);margin-bottom:8px}
.job-body{flex:1;min-width:0}
.job-name{font-size:14px;font-weight:900}
.job-meta{font-size:10px;font-weight:800;color:var(--gold-dark);margin-top:2px}
.job-up{font-size:8px;font-weight:900;color:#fff;background:var(--green);border:1.5px solid var(--border);border-radius:5px;padding:1px 5px;vertical-align:middle;margin-left:4px}
.role-tag{font-size:8px;font-weight:900;border-radius:4px;padding:1px 5px;border:1.5px solid var(--border)}
.role-tag.hc{background:var(--purple-bg);color:var(--purple)}
.role-tag.oc{background:var(--blue-bg);color:var(--blue)}
/* playoff bracket */
.bracket{display:flex;gap:8px;margin-bottom:12px}
.brk-col{flex:1;min-width:0}
.brk-h{font-size:8px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.brk-pair{margin-bottom:7px;border-left:2px solid var(--border2);padding-left:5px}
.brk-team{display:flex;align-items:center;gap:5px;background:#fff;border:2px solid var(--border);border-radius:7px;padding:5px 7px;margin-bottom:4px;box-shadow:1px 1px 0 var(--border)}
.brk-team.me{background:var(--gold-bg);border-color:var(--gold-dark)}
.brk-team.won{background:var(--green-bg);border-color:var(--green)}
.brk-team.lost{opacity:.4}
.brk-seed{font-size:9px;font-weight:900;color:var(--muted);width:14px;flex-shrink:0}
.brk-name{font-size:10px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* conference standings */
.conf-table{background:#fff;border:2px solid var(--border);border-radius:11px;box-shadow:3px 3px 0 var(--border);overflow:hidden}
.conf-row{display:flex;align-items:center;gap:8px;padding:7px 11px;border-bottom:1.5px solid var(--border2)}
.conf-row:last-child{border-bottom:none}
.conf-row.top2{background:var(--gold-bg)}
.conf-row.me{background:var(--blue-bg)}
.conf-row.me.top2{background:linear-gradient(90deg,var(--gold-bg),var(--blue-bg))}
.conf-rank{font-size:10px;font-weight:900;color:var(--muted);width:16px;flex-shrink:0}
.conf-name{flex:1;font-size:12px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conf-star{color:var(--gold-dark);font-size:10px}
.conf-rec{font-size:12px;font-weight:900;flex-shrink:0;font-variant-numeric:tabular-nums}
/* season tabs + compact layout */
.season-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;font-size:12px;font-weight:800}
.shd-l{color:var(--text)}
.shd-r{display:flex;gap:5px}
.shd-r .pill{font-size:9px}
.tabbar{display:flex;gap:5px;background:var(--cream);border:2px solid var(--border);border-radius:11px;padding:4px;box-shadow:3px 3px 0 var(--border);margin-bottom:12px}
.tab-btn{flex:1;padding:8px 2px;font-size:10.5px;font-weight:900;border:none;background:transparent;color:var(--muted);border-radius:8px;transition:background .12s,color .12s;white-space:nowrap}
.tab-btn.active{background:var(--gold);color:var(--text);box-shadow:1px 1px 0 var(--border)}
.tab-body{min-height:60px}
.scroll-list{max-height:56vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll-list::-webkit-scrollbar{width:0;display:none}
.t25-conf{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
/* roster view */
.ros-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1.5px solid var(--border2)}
.ros-row:last-child{border-bottom:none}
.ros-row.starter{background:var(--gold-bg)}
.ros-pos{font-size:9px;font-weight:900;color:var(--muted);width:26px;flex-shrink:0}
.ros-name{flex:1;font-size:12px;font-weight:800;min-width:0;overflow:hidden}
.ros-sub{display:block;font-size:8.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;margin-top:1px}
.ros-st{font-size:7px;font-weight:900;color:var(--gold-dark);border:1px solid var(--gold-dark);border-radius:3px;padding:0 3px;vertical-align:middle}
.ros-ovr{font-size:13px;font-weight:900;flex-shrink:0;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:4px}
.ros-empty{font-size:11px;font-weight:700;color:var(--muted);padding:4px}
.dev-badge{font-size:8px;font-weight:900;border-radius:4px;padding:0 4px;vertical-align:middle}
.dev-badge.gem{background:var(--blue-bg);color:var(--blue)}
.dev-badge.bust{opacity:.7}
.prog{font-size:9px;font-weight:900}
.prog.up{color:var(--green)}
.prog.dn{color:var(--red2)}
.prog.flat{color:var(--dim)}
/* gameplan panel */
.tabbar-6 .tab-btn{font-size:9.5px;padding:8px 1px}
.gp-card{background:#fff;border:2px solid var(--border);border-radius:12px;box-shadow:3px 3px 0 var(--border);padding:12px;margin-bottom:12px}
.gp-card-h{font-size:13px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.fit-pill{font-size:9px;font-weight:900;border:1.5px solid;border-radius:6px;padding:2px 7px;white-space:nowrap}
.gp-slider{margin-top:4px}
.gps-top{display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:900;color:var(--muted);margin-bottom:6px}
.gps-val{font-size:13px;font-weight:900;color:var(--purple);background:var(--purple-bg);border-radius:6px;padding:1px 8px}
.gps-range{width:100%;-webkit-appearance:none;appearance:none;height:8px;border-radius:6px;background:linear-gradient(90deg,var(--blue-bg),var(--gold-bg));border:2px solid var(--border);outline:none}
.gps-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:26px;height:26px;border-radius:50%;background:var(--purple);border:2px solid var(--border);box-shadow:1px 1px 0 var(--border);cursor:pointer}
.gps-range::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--purple);border:2px solid var(--border);cursor:pointer}
.gps-ideal-track{position:relative;height:14px;margin-top:2px}
.gps-ideal{position:absolute;font-size:8px;font-weight:900;color:var(--green);white-space:nowrap}
.gps-tip{font-size:9px;font-weight:700;color:var(--muted);line-height:1.4;margin-top:6px}
.scheme-readout{background:var(--cream);border:2px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px}

// Loop: pick school+role -> recruit offense -> weekly gameplan+sim -> offseason

var GROUP_ID=(function(){var m=location.search.match(/[?&]group=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();

function x(s){var t=String(s||"");return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");}
var _tt;function toast(m){var el=document.getElementById("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove("show");},2200);}
function ukey(n){return String(n||"guest").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\./g,"");}
function stars(p){var s="";for(var i=0;i<5;i++)s+=i<p?"★":"☆";return s;}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function abbr(name){
  var n=String(name||"");
  // common short codes; fall back to first letters of each word (max 4 chars)
  var map={"Alabama":"ALA","Georgia":"UGA","Ohio State":"OSU","Michigan":"MICH","Texas":"TEX","Oklahoma":"OU","LSU":"LSU","Notre Dame":"ND","Southern California":"USC","Washington":"WASH","Oregon":"ORE","Penn State":"PSU","Clemson":"CLEM","Florida State":"FSU","Miami":"MIA","Tennessee":"TENN","Auburn":"AUB","Florida":"FLA","Wisconsin":"WIS","Nebraska":"NEB","Cincinnati":"CIN","Kansas State":"KSU"};
  if(map[n])return map[n];
  var words=n.replace(/[^A-Za-z0-9 ]/g,"").split(/\s+/);
  if(words.length===1)return words[0].slice(0,4).toUpperCase();
  return words.map(function(w){return w.charAt(0);}).join("").slice(0,4).toUpperCase();
}

var POSITIONS=["QB","RB","WR","WR","TE","OL","OL"]; // offensive roster shape (weights)
var DEF_POSITIONS=["DL","DL","LB","LB","CB","CB","S"]; // defensive roster shape
var DEF_POS_WEIGHT={DL:1.6,LB:1.3,CB:1.3,S:1.0}; // impact on defense rating

}

var FIRST=["Jalen","Marcus","DeShawn","Tyler","Cade","Jaylen","Bo","Quinn","Xavier","Trey","Malik","Cooper","Deion","Rashad","Brock","Jordan","Amari","Kobe","Isaiah","Devon","Cam","Zion","Kai","Tank","Blaze"];

  {id:"air",  name:"Air Raid",       vs:"Ground & Pound", desc:"Sling it. Great vs stout run defenses."},

];

// Defensive gameplans for the DC role — each counters an offensive style
var DEF_GAMEPLANS=[
  {id:"blitz", name:"Blitz Heavy",     vs:"Air Raid",        desc:"Bring pressure. Rattles pass-happy offenses."},
  {id:"press", name:"Press Coverage",  vs:"Spread Option",   desc:"Jam receivers. Beats spread & tempo."},

];
function roleGameplans(){ return (ST.save&&ST.save.role==="DC")?DEF_GAMEPLANS:GAMEPLANS; }

// ═════════════════════════════════════════════════════════
// LIVING LEAGUE — every team has off/def/ovr ratings that drift with results
// ═════════════════════════════════════════════════════════
// Initialize a league state: ratings for all 136 teams derived from prestige + variance.
function initLeague(){
  var teams={};
  FBS_TEAMS.forEach(function(t){
    var base=58+t.p*6;                 // 1★≈64, 5★≈88
    var off=Math.max(50,Math.min(99, base+rnd(-5,5)));
    var def=Math.max(50,Math.min(99, base+rnd(-5,5)));
    teams[t.n]={off:off, def:def, ovr:Math.round((off+def)/2), p:t.p, c:t.c, w:0, l:0, cw:0, cl:0};
  });
  return {teams:teams, week:0};
}
function leagueTeam(name){
  var L=ST.save&&ST.save.league; if(!L)return null;
  return L.teams[name]||null;
}
// Overall rating for any team (falls back to prestige-derived if league missing)
function teamOvr(name, prestige){
  var t=leagueTeam(name);
  if(t)return t.ovr;
  return 58+(prestige||3)*6;
}
// Simulate one game between two league teams by name → returns {w:winnerName, l:loserName}
function simLeagueGame(aName,bName,neutralHome){
  var A=ST.save.league.teams[aName], B=ST.save.league.teams[bName];
  if(!A||!B){ return {w:aName,l:bName}; }
  var aStr=A.ovr + rnd(-10,10) + (neutralHome?0:3);   // slight home edge to A
  var bStr=B.ovr + rnd(-10,10);
  var aWon=aStr>=bStr;
  return {w:aWon?aName:bName, l:aWon?bName:aName};
}
// Advance the league by one week: pair up all non-user teams and play them.
// The user's team result is recorded separately (from their real game).
function simLeagueWeek(excludeName){
  var L=ST.save.league; if(!L)return;
  // Group non-user teams by conference and pair WITHIN each conference so everyone
  // builds a realistic conference record (random global pairing produced 0-0 teams and noise).
  var byConf={};
  Object.keys(L.teams).forEach(function(n){
    if(n===excludeName)return;
    var c=L.teams[n].c;
    (byConf[c]=byConf[c]||[]).push(n);
  });
  Object.keys(byConf).forEach(function(c){
    var names=byConf[c];
    // shuffle within conference
    for(var i=names.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=names[i];names[i]=names[j];names[j]=tmp; }
    for(var k=0;k+1<names.length;k+=2){
      var a=names[k], b=names[k+1];
      var r=simLeagueGame(a,b,false);
      var loser=(r.w===a)?b:a;
      L.teams[r.w].w++; L.teams[loser].l++;
      L.teams[r.w].cw++; L.teams[loser].cl++;   // in-conference game
    }
    // if odd team out this week, give it a non-conference game (counts to overall, not conf)
    if(names.length%2===1){
      var odd=names[names.length-1];
      // pick a random opponent from another conference
      var others=Object.keys(L.teams).filter(function(n){return n!==excludeName&&n!==odd&&L.teams[n].c!==c;});
      if(others.length){
        var opp=others[Math.floor(Math.random()*others.length)];
        var r2=simLeagueGame(odd,opp,false);
        var los=(r2.w===odd)?opp:odd;
        L.teams[r2.w].w++; L.teams[los].l++;   // overall only, no conf
      }
    }
  });
  L.week++;
}
// Record the USER team's game result into the league standings.
function recordUserLeagueResult(won, isConfGame){
  var t=leagueTeam(ST.save.school); if(!t)return;
  if(won)t.w++; else t.l++;
  if(isConfGame){ if(won)t.cw++; else t.cl++; }
}
// End-of-season rating drift: teams that beat their rating-expected record improve; others decline.
function driftLeagueRatings(){
  var L=ST.save.league; if(!L)return;
  Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n];
    var games=t.w+t.l;
    if(games){
      var winPct=t.w/games;
      var expPct=Math.max(0.1,Math.min(0.9,(t.ovr-52)/45));
      var delta=winPct-expPct;   // + = overperformed
      var move=Math.round(delta*8 + rnd(-1,1));
      t.off=Math.max(48,Math.min(99,t.off+move));
      t.def=Math.max(48,Math.min(99,t.def+move));
      t.ovr=Math.round((t.off+t.def)/2);
    }
    // ALWAYS reset season records (previously zero-game teams were skipped)
    t.w=0; t.l=0; t.cw=0; t.cl=0;
  });
  L.week=0;
}

// ── Save / load ──────────────────────────────────────────
function newSave(team, role){
  var roster=genStarterRoster(team.p, role);
  var s={
    school:team.n, conf:team.c, prestige:team.p, role:role,
    season:1, week:0, wins:0, losses:0,
    roster:roster, schedule:genSchedule(team), history:[],
    careerWins:0, careerLosses:0, titles:0, seasonsPlayed:0, jobsHeld:1,
    abilities:[], budget:budgetFor(team.p, role),
    jobSecurity:60, missedYears:0
  };
  s.expectWins=expectWinsFor(team.p);
  s.league=initLeague();
  s.gameplan={offBalance:50, defBalance:50};
  return s;
}
// Season win expectation by program prestige (of a 12-game schedule)
function expectWinsFor(prestige){ return [0,3,4,6,8,9][prestige]; }
function expectLabel(prestige){
  return ["","Compete & develop","Show clear progress","Reach a bowl game","New Year's Six push","Championship contender"][prestige];
}
function securityLabel(js){
  if(js>=75)return {t:"Secure",c:"var(--green)"};
  if(js>=45)return {t:"Stable",c:"var(--gold-dark)"};
  if(js>=25)return {t:"Warm Seat",c:"#e8944a"};
  return {t:"HOT SEAT",c:"var(--red2)"};
}
function loadData(){
  if(!DB){ ST.screen="setup"; draw(); return; }
  DB.ref(BASE()).once("value",function(sn){
    var v=sn.val();
    if(v&&v.school){
      ST.save=v;
      if(!ST.save.league) ST.save.league=initLeague(); // migrate pre-league saves
      if(!ST.save.gameplan) ST.save.gameplan={offBalance:50, defBalance:50}; // migrate pre-gameplan saves
      // repair bug: if the league recorded more games for your team than you've actually played
      // this season, the per-season reset failed in an older build — resync all league records now.
      if(ST.save.league && ST.save.league.teams[ST.save.school]){
        var _mt=ST.save.league.teams[ST.save.school];
        var _played=(ST.save.schedule||[]).filter(function(g){return g.result;}).length;
        if((_mt.w+_mt.l) > _played+1){
          Object.keys(ST.save.league.teams).forEach(function(n){
            var t=ST.save.league.teams[n]; t.w=0;t.l=0;t.cw=0;t.cl=0;
          });
          // re-run league weeks up to the current week so standings reflect the season so far
          var _wk=ST.save.week||0;
          for(var _i=0;_i<_wk;_i++){ simLeagueWeek(ST.save.school); }
        }
      }
      // migrate rosters to have progression baselines
      if(ST.save.roster) ST.save.roster.forEach(function(p){
        if(p.startOvr==null)p.startOvr=p.ovr;
        if(p.ssOvr==null)p.ssOvr=p.ovr;
        if(p.revealed==null)p.revealed=(p.dev!=="normal"&&(p.yr==="JR"||p.yr==="SR"));
      });
      ST.post = v._post || null;
      ST.confchamp = v._confchamp || null;
      if(ST.confchamp && !ST.confchamp.done){ ST.screen="confchamp"; }
      else if(ST.post && !ST.post.done){ ST.screen = ST.post.mode==="bowl" ? "bowl" : "bracket"; }
      else if(v.week>=v.schedule.length && !v._postDone){ draw(); if(ST.confchamp&&ST.confchamp.done){ enterPostseason(); } else { enterConfChampionship(); } return; }
      else ST.screen = v.week>=v.schedule.length ? "offseason" : (v.week===0&&!v._recruited ? "recruit" : "season");
    }
    else ST.screen="setup";
    draw();
  },function(){ ST.screen="setup"; draw(); });
}
function persist(){ if(DB&&ST.save){ ST.save._post = ST.post || null; ST.save._confchamp = ST.confchamp || null; DB.ref(BASE()).set(ST.save); } }

// ── Generators ───────────────────────────────────────────
function genName(){ return pick(FIRST)+" "+pick(LAST); }
function genOvr(base){ return Math.max(55,Math.min(99, base+rnd(-6,6))); }
function genPlayer(pos, prestige, year){
  var base=58+prestige*5;
  // hidden dev: gem (+) or bust (-) revealed over seasons
  var dev = Math.random()<0.15 ? "gem" : (Math.random()<0.15 ? "bust" : "normal");
  var ovr=genOvr(base);
  return {id:"p"+Math.random().toString(36).slice(2,8), n:genName(), pos:pos, ovr:ovr, yr:year||pick(["FR","SO","JR","SR"]), dev:dev, startOvr:ovr, ssOvr:ovr, revealed:false};
}
function genStarterRoster(prestige, roleArg){
  var r=[];
  var poslist = (roleArg==="DC") ? DEF_POSITIONS
              : (roleArg==="HC") ? POSITIONS.concat(DEF_POSITIONS)
              : (roleArg==="OC") ? POSITIONS
              : rolePositions();
  poslist.forEach(function(pos){ r.push(genPlayer(pos,prestige)); r.push(genPlayer(pos,prestige,"FR")); });
  return r;
}
function genRecruitClass(prestige, count){
  var cls=[];
  if(!count) count = (ST.save&&ST.save.role==="HC") ? 16 : 10; // HC recruits both units
  var poslist=rolePositions();
  for(var i=0;i<count;i++){
    var pos=pick(poslist);
    var st=weightedStars(prestige);
    var base=52+st*7;
    var dev=Math.random()<0.18?"gem":(Math.random()<0.18?"bust":"normal");
    cls.push({id:"r"+Math.random().toString(36).slice(2,8), n:genName(), pos:pos, st:st, ovr:genOvr(base), dev:dev, cost:starCost(st)});
  }
  return cls;
}
function weightedStars(prestige){
  // higher prestige => more high-star recruits available
  var roll=Math.random()*10 + prestige*1.4;
  if(roll>13) return 5; if(roll>10) return 4; if(roll>6.5) return 3; if(roll>3) return 2; return 1;
}
function starCost(st){ return [0,4,8,15,26,40][st]; }
function budgetFor(prestige, role){
  var b = 30 + prestige*14;          // prestige scales budget
  if(role==="OC"||role==="DC") b = Math.round(b*0.62); // coordinators control one unit => smaller pot
  return b;
}
function genSchedule(team){
  // 12 opponents: mostly conference peers + a couple cross-conf, sorted difficulty-ish
  var pool=FBS_TEAMS.filter(function(t){return t.n!==team.n;});
  var conf=pool.filter(function(t){return t.c===team.c;});
  var others=pool.filter(function(t){return t.c!==team.c;});
  var games=[]; var used={};
  // Pull up to n unique teams from a list by removing as we go (no infinite loop if list is short).
  function add(list,n){
    var avail=list.filter(function(t){return !used[t.n];});
    var c=0;
    while(c<n && avail.length){
      var idx=Math.floor(Math.random()*avail.length);
      var t=avail.splice(idx,1)[0];
      used[t.n]=1;
      games.push({opp:t.n, oc:t.c, op:t.p, home:Math.random()<0.55});
      c++;
    }
  }
  add(conf,9);           // conference games first
  add(others,12-games.length); // fill the rest from everyone else to guarantee ~12 games
  return games.slice(0,12);
}

function offenseRating(){
  var r=ST.save.roster, byPos={};
  r.forEach(function(p){ if(!byPos[p.pos]||p.ovr>byPos[p.pos]) byPos[p.pos]=p.ovr; }); // starter = best at pos
  var tot=0,wsum=0;
  Object.keys(POS_WEIGHT).forEach(function(pos){ var w=POS_WEIGHT[pos]; tot+=(byPos[pos]||60)*w; wsum+=w; });
  var abil = hasAbility("qbguru")?2:0;
  return Math.round(tot/wsum) + abil;
}
// Defense rating from your recruited defensive players (DC's unit)
function defenseRating(){
  var r=ST.save.roster, byPos={};
  r.forEach(function(p){ if(!byPos[p.pos]||p.ovr>byPos[p.pos]) byPos[p.pos]=p.ovr; });
  var tot=0,wsum=0;
  Object.keys(DEF_POS_WEIGHT).forEach(function(pos){ var w=DEF_POS_WEIGHT[pos]; tot+=(byPos[pos]||60)*w; wsum+=w; });
  return Math.round(tot/wsum);
}
// The rating of the unit YOU coach (offense if OC, defense if DC; HC = team avg)
function myUnitRating(){
  if(ST.save.role==="DC")return defenseRating();
  if(ST.save.role==="HC")return Math.round((offenseRating()+defenseRating())/2);
  return offenseRating();
}
function cpuDefenseRating(oppPrestige){ return 58 + oppPrestige*6 + rnd(-4,4); }
// The unit the CPU runs at your school (defense if you're OC, offense if you're DC), scales with prestige
function cpuUnitRating(){ return 56 + ST.save.prestige*6; }

// ── Gameplan sliders (standing scheme identity, set once) ─────────────
// offBalance: 0 = all pass, 100 = all run.   defBalance: 0 = all coverage, 100 = all blitz.
function getGameplan(){
  var s=ST.save;
  if(!s.gameplan) s.gameplan={offBalance:50, defBalance:50};
  return s.gameplan;
}
// best OVR at a position group
function bestAt(positions){
  var r=ST.save.roster, best={};
  r.forEach(function(p){ if(positions.indexOf(p.pos)>=0){ if(!best[p.pos]||p.ovr>best[p.pos])best[p.pos]=p.ovr; } });
  var vals=positions.map(function(p){return best[p]||60;});
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
// How well the offensive slider fits the roster → small rating bonus (0..~5)
function offSchemeFit(){
  var gp=getGameplan();
  var passStrength=(bestAt(["QB"])*1.3 + bestAt(["WR","TE"]))/2.3; // passing needs QB + receivers
  var runStrength =(bestAt(["RB"]) + bestAt(["OL"])*1.2)/2.2;       // running needs RB + OL
  // ideal slider: lean toward your stronger side. 0=pass,100=run
  var idealRun = 50 + (runStrength-passStrength)*2.2;               // >50 if run is stronger
  idealRun=Math.max(0,Math.min(100,idealRun));
  var miss=Math.abs(gp.offBalance - idealRun);                      // 0 = perfect fit
  return Math.max(0, 5 - miss/12);                                  // up to +5, fades with mismatch
}
// How well the defensive slider fits the roster
function defSchemeFit(){
  var gp=getGameplan();
  var blitzStrength=(bestAt(["DL"])*1.3 + bestAt(["LB"]))/2.3;      // pressure needs DL + LB
  var coverStrength=(bestAt(["CB"])*1.2 + bestAt(["S"]))/2.2;       // coverage needs CB + S
  var idealBlitz=50 + (blitzStrength-coverStrength)*2.2;            // >50 if pass rush is stronger
  idealBlitz=Math.max(0,Math.min(100,idealBlitz));
  var miss=Math.abs(gp.defBalance - idealBlitz);
  return Math.max(0, 5 - miss/12);
}
// The scheme-fit bonus applied to a unit you control this game
function schemeFitFor(side){ return side==="off" ? offSchemeFit() : defSchemeFit(); }
// Suggest the ideal slider values (for UI hints)
function idealOffBalance(){
  var passStrength=(bestAt(["QB"])*1.3 + bestAt(["WR","TE"]))/2.3;
  var runStrength =(bestAt(["RB"]) + bestAt(["OL"])*1.2)/2.2;
  return Math.max(0,Math.min(100, Math.round(50 + (runStrength-passStrength)*2.2)));
}
function idealDefBalance(){
  var blitzStrength=(bestAt(["DL"])*1.3 + bestAt(["LB"]))/2.3;
  var coverStrength=(bestAt(["CB"])*1.2 + bestAt(["S"]))/2.2;
  return Math.max(0,Math.min(100, Math.round(50 + (blitzStrength-coverStrength)*2.2)));
}

// In-season development: players make small gains during the year (younger + gems grow faster).
// Development also gradually "reveals" a player's hidden dev trait.
function developInSeason(){
  var s=ST.save; if(!s||!s.roster)return;
  s.roster.forEach(function(p){
    // chance of a bump each week, weighted by youth and dev trait
    var youthBoost = p.yr==="FR"?0.30:(p.yr==="SO"?0.22:(p.yr==="JR"?0.14:0.08));
    var devBoost = p.dev==="gem"?0.15:(p.dev==="bust"?-0.05:0);
    if(Math.random() < youthBoost+devBoost){
      var gain = p.dev==="gem"?rnd(1,2):(p.dev==="bust"?0:rnd(0,1));
      if(gain>0){ p.ovr=Math.min(99, p.ovr+gain); }
    }
    // reveal the hidden trait once a player has developed enough evidence
    if(!p.revealed && (Math.abs(p.ovr-p.startOvr)>=3 || p.yr==="JR" || p.yr==="SR")){
      if(p.dev!=="normal") p.revealed=true;
    }
  });
}
// Stamp season-start OVR so we can show "this year" progression
function stampSeasonStart(){
  var s=ST.save; if(!s||!s.roster)return;
  s.roster.forEach(function(p){ p.ssOvr=p.ovr; });
}

function devBadge(p){

function simGame(game, plan){
  var oppT=leagueTeam(game.opp);
  var oppOff = oppT ? oppT.off : (58+game.op*6+rnd(-4,4));
  var oppDef = oppT ? oppT.def : cpuDefenseRating(game.op);
  var homeAdj = game.home?3:-1;
  // scheme-fit bonuses come from your STANDING gameplan sliders matching your roster (not per-game guessing)
  var offFit = offSchemeFit();  // 0..~5, helps you score
  var defFit = defSchemeFit();  // 0..~5, helps you stop them

  var ourPts, oppPts, myUnit, usedFit;
  if(ST.save.role==="HC"){
    // YOU control BOTH units → offense drives your points (offFit), defense limits theirs (defFit)
    var hcOff=offenseRating(), hcDef=defenseRating();
    myUnit=Math.round((hcOff+hcDef)/2);
    usedFit=Math.round((offFit+defFit)/2*10)/10;
    ourPts=Math.max(3, Math.round((hcOff - oppDef + offFit + homeAdj)/3 + 21 + rnd(-7,7)));
    oppPts=Math.max(3, Math.round((oppOff - hcDef - defFit - (game.home?2:0))/3 + 21 + rnd(-7,7)));
  } else if(ST.save.role==="DC"){
    // YOU control defense → defFit limits the opponent's points; your offense is CPU
    myUnit=defenseRating(); usedFit=defFit;
    var ourOff=cpuUnitRating();
    oppPts=Math.max(3, Math.round((oppOff - myUnit - defFit - (game.home?2:0))/3 + 21 + rnd(-7,7)));
    ourPts=Math.max(3, Math.round((ourOff - oppDef + homeAdj)/3 + 21 + rnd(-7,7)));
  } else {
    // YOU control offense → offFit drives your points; your defense is CPU
    myUnit=offenseRating(); usedFit=offFit;
    var ourDef=cpuUnitRating();
    ourPts=Math.max(3, Math.round((myUnit - oppDef + offFit + homeAdj)/3 + 21 + rnd(-7,7)));
    oppPts=Math.max(3, Math.round((oppOff - ourDef - (game.home?2:0))/3 + 21 + rnd(-7,7)));
  }
  // no ties — overtime decides
  if(ourPts===oppPts){
    var favUs = (myUnit + usedFit + homeAdj) >= (ST.save.role==="DC"?oppOff:oppDef)+20;
    if(favUs) ourPts += pick([3,3,7]); else oppPts += pick([3,3,7]);
  }
  return {us:ourPts, them:oppPts, edge:usedFit>=3, oppDefType:"", off:myUnit, fit:usedFit};
}

// Break a final score into a believable sequence of scoring plays across 4 quarters.
// Returns [{q, clock, team:'us'|'them', kind, pts, usTot, themTot, desc}]
function buildPlayByPlay(usFinal, themFinal, usName, themName){
  function toScores(total){
    // decompose points into TDs(7), FGs(3), 2pt(2) — summing EXACTLY to total (never overshoot)
    var plays=[], left=total;
    while(left>0){
      if(left>=7 && Math.random()<0.7){ plays.push(7); left-=7; }
      else if(left>=6 && Math.random()<0.5){ plays.push(6); left-=6; } // TD, missed XP
      else if(left>=3 && (left===3 || left>=6 ? Math.random()<0.6 : true)){ plays.push(3); left-=3; }
      else if(left>=7){ plays.push(7); left-=7; }
      else if(left>=6){ plays.push(6); left-=6; }
      else if(left>=3){ plays.push(3); left-=3; }
      else if(left===2){ plays.push(2); left-=2; }
      else { plays.push(left); left=0; } // 1 leftover -> safety, keeps sum exact
    }
    return plays;
  }
  var TD_DESC=["%P punches it in","%P breaks free for a TD","%P finds the end zone","deep strike — TOUCHDOWN %P","%P walks in untouched","QB keeper, %P scores","%P takes the screen to the house"];
  var FG_DESC=["%P drills the field goal","%P's field goal is good","%P splits the uprights"];
  var usPlayers=(ST.save?ST.save.roster:[]).filter(function(p){return p.pos!=="OL";});
  function nm(team){
    if(team==="us"&&usPlayers.length)return pick(usPlayers).n;
    return genName();
  }
  function fill(t,team){ return t.replace("%P", nm(team)); }

  var usPlays=toScores(usFinal).map(function(p){return {team:"us",pts:p};});
  var themPlays=toScores(themFinal).map(function(p){return {team:"them",pts:p};});
  // interleave possessions somewhat randomly but fairly
  var all=[]; var a=usPlays, b=themPlays, ai=0, bi=0;
  while(ai<a.length||bi<b.length){
    if(ai>=a.length){all.push(b[bi++]);continue;}
    if(bi>=b.length){all.push(a[ai++]);continue;}
    if(Math.random()<0.5)all.push(a[ai++]); else all.push(b[bi++]);
  }
  // assign each play to a quarter + descending clock, build running totals
  var n=all.length, ut=0, tt=0, out=[];
  var qCount={1:0,2:0,3:0,4:0};
  all.forEach(function(pl,i){ var qq=Math.min(4,Math.floor(i/Math.max(1,n)*4)+1); qCount[qq]++; });
  var qSeen={1:0,2:0,3:0,4:0};
  all.forEach(function(pl,i){
    var q=Math.min(4, Math.floor(i/Math.max(1,n)*4)+1);
    qSeen[q]++;
    // clock descends from ~15:00 to ~0:00 across the plays in this quarter
    var frac=qSeen[q]/(qCount[q]+1);
    var totalSec=Math.round(900*(1-frac)) - rnd(0,25);
    if(totalSec<0)totalSec=rnd(0,40);
    var mm=Math.floor(totalSec/60), ss=totalSec%60;
    var clock=mm+":"+(ss<10?"0"+ss:ss);
    var elapsed=(q-1)*900 + (900-totalSec); // absolute seconds from kickoff (0..3600)
    if(pl.team==="us")ut+=pl.pts; else tt+=pl.pts;
    var kind = pl.pts>=6?"TD":(pl.pts===3?"FG":(pl.pts===2?"2PT":"SFTY"));
    var desc = pl.pts>=6? fill(pick(TD_DESC),pl.team) : (pl.pts===3? fill(pick(FG_DESC),pl.team) : "two-point conversion");
    out.push({q:q,clock:clock,elapsed:elapsed,team:pl.team,kind:kind,pts:pl.pts,usTot:ut,themTot:tt,desc:desc});
  });
  // ensure timeline is strictly increasing (interleave randomness can invert)
  out.sort(function(a,b){return a.elapsed-b.elapsed;});
  // recompute running totals in timeline order
  var u2=0,t2=0;
  out.forEach(function(p){ if(p.team==="us")u2+=p.pts; else t2+=p.pts; p.usTot=u2; p.themTot=t2; });
  return out;
}

var NY6=["Rose Bowl","Sugar Bowl","Orange Bowl","Cotton Bowl","Fiesta Bowl","Peach Bowl"];
var BOWLS=["Gator Bowl","Citrus Bowl","Alamo Bowl","Holiday Bowl","Sun Bowl","Liberty Bowl","Music City Bowl","Duke's Mayo Bowl","Las Vegas Bowl","Pinstripe Bowl"];

// Build conference standings: YOUR real conf record + simulated conf-mates (stable for the season).
function computeTop25(){
  var s=ST.save, L=s.league;
  var rows=[];
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      var isYou=(n===s.school);
      var w=isYou?s.wins:t.w, l=isYou?s.losses:t.l;
      rows.push({name:n, conf:t.c, p:t.p, you:isYou, w:w, l:l, ovr:t.ovr,
                 score: resumeScore(w, t.p, t.c, isYou&&s._wonConfThisYear, isYou?myUnitRating():t.off) + t.ovr*0.5});
    });
  }
  rows.sort(function(a,b){ if(b.score!==a.score)return b.score-a.score; return b.ovr-a.ovr; });
  return rows.slice(0,25);
}
function top25Table(){
  var rows=computeTop25();
  var myRank=0; rows.forEach(function(r,i){ if(r.you)myRank=i+1; });
  var h='<div class="sec-title" style="margin:2px 2px 8px">AP Top 25'+(myRank?' <span class="pill">You: #'+myRank+'</span>':' <span class="pill">You: NR</span>')+'</div>';
  h+='<div class="conf-table scroll-list">';
  rows.forEach(function(r,i){
    h+='<div class="conf-row'+(r.you?" me":"")+(i<4?" top2":"")+'">'+
       '<span class="conf-rank">'+(i+1)+'</span>'+
       '<span class="conf-name">'+x(r.name)+' <span class="t25-conf">'+x(r.conf)+' · '+r.ovr+' OVR</span></span>'+
       '<span class="conf-rec">'+r.w+'-'+r.l+'</span></div>';
  });
  h+='</div>';
  return h;
}
function computeConfStandings(){
  var s=ST.save, L=s.league;
  var table=[];
  // your REAL conference record straight from your played games (never out of sync)
  var myCW=0, myCL=0;
  s.schedule.forEach(function(g){
    if(g.oc===s.conf && g.result){ if(g.result.us>g.result.them)myCW++; else myCL++; }
  });
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(t.c!==s.conf) return;
      var isYou=(n===s.school);
      var cw=isYou?myCW:t.cw, cl=isYou?myCL:t.cl;
      table.push({name:n, p:t.p, you:isYou, cw:cw, cl:cl, ovr:t.ovr});
    });
  }
  table.sort(function(a,b){
    var ga=a.cw+a.cl, gb=b.cw+b.cl;
    var pa=ga?a.cw/ga:0.5, pb=gb?b.cw/gb:0.5;
    if(pb!==pa)return pb-pa;
    return b.ovr-a.ovr;
  });
  return table;
}
// Called when the regular season ends → set up conference championship

// A team's "resume strength" — wins matter, but so does program/conference quality.
// Power-conference wins are worth more than Group-of-Five wins (strength of schedule).
var POWER_CONF={"SEC":1,"Big Ten":1,"Big 12":1,"ACC":1};
function isPowerConf(conf){ return !!POWER_CONF[conf]; }
function resumeScore(wins, prestige, conf, wonConf, off){
  var confWeight = isPowerConf(conf) ? 1.0 : 0.62;   // G5 wins are discounted (weaker schedule)
  var base = wins*8*confWeight + prestige*7;
  if(wonConf) base += 10;
  if(off) base += off/12;
  return base;
}
function enterPostseason(){
  var s=ST.save;
  var w=s.wins;
  var power=isPowerConf(s.conf);
  // Power programs make it on record. Group-of-Five teams essentially need to win their
  // conference (auto-bid) AND have a strong record — mirroring the real G5-gets-one-bid rule.
  var makePlayoff = power
    ? ( w>=10 || (w>=9 && s.prestige>=3) || (w>=8 && s.prestige>=5) )
    : ( w>=11 && s._wonConfThisYear );   // G5: only the conf champ with a great record sneaks in
  if(makePlayoff){
    setupPlayoff();
    ST.screen="bracket"; persist(); draw(); return;
  }
  if(w>=6){
    // bowl game
    var pool = (w>=9?NY6:BOWLS);
    var oppP = Math.max(1, Math.min(5, s.prestige + rnd(-1,1)));
    var opp = pickOpponent(oppP);
    ST.post={mode:"bowl", bowlName:pick(pool), opp:opp.n, oc:opp.c, op:opp.p, done:false, result:null};
    ST.screen="bowl"; persist(); draw(); return;
  }
  // no bowl (losing record)
  ST.post=null;
  s._postDone=true;
  ST.screen="offseason"; persist(); draw();
}
function pickOpponent(prestige){
  var cand=FBS_TEAMS.filter(function(t){return t.n!==ST.save.school && Math.abs(t.p-prestige)<=1;});
  if(!cand.length)cand=FBS_TEAMS.filter(function(t){return t.n!==ST.save.school;});
  return pick(cand);
}

// Build a 12-team bracket seeded by strength-weighted resume score.
function setupPlayoff(){
  var s=ST.save, L=s.league;
  var myScore = resumeScore(s.wins, s.prestige, s.conf, s._wonConfThisYear, myUnitRating()) + (L?L.teams[s.school].ovr*0.5:0);
  var iAmG5 = !isPowerConf(s.conf);
  var field=[{name:s.school, p:s.prestige, you:true, score:myScore, g5:iAmG5}];
  // pull the actual best 11 teams from the living league by resume score
  var others=[];
  if(L){
    Object.keys(L.teams).forEach(function(n){
      if(n===s.school)return;
      var t=L.teams[n];
      others.push({name:n, p:t.p, you:false, g5:!isPowerConf(t.c),
                   score: resumeScore(t.w, t.p, t.c, false, t.off) + t.ovr*0.5});
    });
  }
  others.sort(function(a,b){return b.score-a.score;});
  for(var i=0;i<11 && i<others.length;i++){ field.push(others[i]); }
  // seed by resume score
  field.sort(function(a,b){return b.score-a.score;});
  // Enforce realism: a Group-of-Five team can never be seeded higher than 9th.
  var you=null; field.forEach(function(f){ if(f.you)you=f; });
  field.forEach(function(f,idx){ f.seed=idx+1; });
  if(you && you.g5 && you.seed<9){
    field = field.filter(function(f){return !f.you;});
    field.splice(8,0,you);           // insert at index 8 => seed 9
    field.forEach(function(f,idx){ f.seed=idx+1; });
  }
  var mySeed=0; field.forEach(function(f){ if(f.you)mySeed=f.seed; });
  ST.post={
    mode:"playoff", field:field, mySeed:mySeed,
    round: (mySeed<=4?"qf":"r1"),
    roundIdx:0,
    bracket: buildBracketState(field),
    done:false, champion:null
  };
}
// Bracket state: track winners by slot across rounds
function buildBracketState(field){
  var bySeed={}; field.forEach(function(f){ bySeed[f.seed]=f; });
  return {
    r1:[ {a:5,b:12}, {a:8,b:9}, {a:6,b:11}, {a:7,b:10} ], // pairs feeding QF
    byeSeeds:[1,2,3,4],
    bySeed:bySeed,
    results:{}, // key like "r1_0" -> winning seed
    qf:[], sf:[], champ:null
  };
}

// Resolve one CPU game between two seeds → returns winning seed
function cpuGame(seedA, seedB){
  var f=ST.post.bracket.bySeed;
  var a=f[seedA], b=f[seedB];
  // lower seed number = stronger; add variance for upsets
  var aStr=(13-a.seed)*4 + a.p*3 + rnd(0,20);
  var bStr=(13-b.seed)*4 + b.p*3 + rnd(0,20);
  return aStr>=bStr ? seedA : seedB;
}

// Figure out YOUR next opponent seed in the current round based on bracket flow
function myNextOpponent(){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  if(P.round==="r1"){
    // find my r1 pairing
    var pair=null,idx=-1;
    B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me){pair=pr;idx=i;} });
    var opp = pair.a===me?pair.b:pair.a;
    return {seed:opp, idx:idx};
  }
  if(P.round==="qf"){
    ensureR1Resolved();
    // QF: seed1 vs winner(8/9), seed4 vs winner(5/12), seed2 vs winner(7/10), seed3 vs winner(6/11)
    var map={1:1,4:0,2:3,3:2}; // my seed -> which r1 pair feeds me (if I'm a bye seed)
    if(me<=4){ var pi=map[me]; var wseed=B.results["r1_"+pi]; return {seed:wseed, idx:pi, qf:true, byeSlot:me}; }
    // I advanced from r1 — opponent is the corresponding bye seed
    var myPair=-1; B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me)myPair=i; });
    var byeMap={1:1,0:4,3:2,2:3}; // r1 pair index -> bye seed faced
    return {seed:byeMap[myPair], idx:myPair, qf:true};
  }
  if(P.round==="sf"){
    // semifinal opponent = winner of the other half
    return {seed:P._sfOpp||null, sf:true};
  }
  if(P.round==="champ"){
    return {seed:P._champOpp||null, champ:true};
  }
  return {seed:null};
}

// Advance the bracket after YOU win a round; auto-resolve CPU games
function advancePlayoff(iWon){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  if(!iWon){
    // you're eliminated — resolve rest of bracket for flavor, then bowl-less offseason
    P.done=true; P.eliminated=true;
    resolveRestOfBracket();
    return;
  }
  if(P.round==="r1"){
    var opp=myNextOpponent();
    B.results["r1_"+opp.idx]=me;
    // resolve the other 3 r1 games
    B.r1.forEach(function(pr,i){ if(i!==opp.idx && B.results["r1_"+i]==null) B.results["r1_"+i]=cpuGame(pr.a,pr.b); });
    P.round="qf"; P.roundIdx++;
    return;
  }
  if(P.round==="qf"){
    // record you winning your QF; resolve other QFs to form SF
    resolveQuarterfinals(me);
    P.round="sf"; P.roundIdx++;
    return;
  }
  if(P.round==="sf"){
    resolveSemifinal(me);
    P.round="champ"; P.roundIdx++;
    return;
  }
  if(P.round==="champ"){
    P.done=true; P.champion=me; // you win it all
    return;
  }
}
function ensureR1Resolved(){
  var B=ST.post.bracket, me=ST.post.mySeed;
  B.r1.forEach(function(pr,i){
    if(B.results["r1_"+i]==null){
      // if I'm in this pair and haven't played, leave it; otherwise CPU-resolve
      if(pr.a===me||pr.b===me) return;
      B.results["r1_"+i]=cpuGame(pr.a,pr.b);
    }
  });
}
function resolveQuarterfinals(myWinSeed){
  var P=ST.post,B=P.bracket;
  ensureR1Resolved(); // bye seeds skip R1 block, so make sure the field is filled
  // QF pairings by bye seed vs r1 winners: 1v w(8/9)[idx1], 4v w(5/12)[idx0], 2v w(7/10)[idx3], 3v w(6/11)[idx2]
  var qfPairs=[ {bye:1,from:1}, {bye:4,from:0}, {bye:2,from:3}, {bye:3,from:2} ];
  B.qfWinners={};
  qfPairs.forEach(function(p){
    var opp=B.results["r1_"+p.from];
    var involvesMe = (p.bye===myWinSeed) || (opp===myWinSeed);
    if(involvesMe){ B.qfWinners[p.bye]=myWinSeed; }
    else { B.qfWinners[p.bye]=cpuGame(p.bye,opp); }
  });
  // SF bracket: (QF from bye1 & bye4) vs (QF from bye2 & bye3) — standard 1/4 , 2/3 halves
  var w1=B.qfWinners[1], w4=B.qfWinners[4], w2=B.qfWinners[2], w3=B.qfWinners[3];
  B._sfPairs=[ {a:w1,b:w4}, {a:w2,b:w3} ];
  // find my SF opponent
  var mine = (B._sfPairs[0].a===myWinSeed||B._sfPairs[0].b===myWinSeed)?0:1;
  var pr=B._sfPairs[mine];
  P._sfOpp = pr.a===myWinSeed?pr.b:pr.a;
  P._sfHalf=mine;
}
function resolveSemifinal(myWinSeed){
  var P=ST.post,B=P.bracket;
  // resolve the other semifinal
  var otherHalf = P._sfHalf===0?1:0;
  var op=B._sfPairs[otherHalf];
  var otherWinner=cpuGame(op.a,op.b);
  B.sfWinners=[]; B.sfWinners[P._sfHalf]=myWinSeed; B.sfWinners[otherHalf]=otherWinner;
  P._champOpp=otherWinner;
}
function resolveRestOfBracket(){
  // best-effort fill so the bracket view shows a champion even if you lost
  var P=ST.post,B=P.bracket;
  B.r1.forEach(function(pr,i){ if(B.results["r1_"+i]==null)B.results["r1_"+i]=cpuGame(pr.a,pr.b); });
  if(!B.qfWinners) resolveQuarterfinals(-99);
  var w1=B.qfWinners[1],w4=B.qfWinners[4],w2=B.qfWinners[2],w3=B.qfWinners[3];
  var sf1=cpuGame(w1,w4), sf2=cpuGame(w2,w3);
  P.finalChamp=cpuGame(sf1,sf2);
}

function bracketVisual(){
  var P=ST.post,B=P.bracket;
  var h='<div class="sec-title">The Bracket</div><div class="bracket">';
  // byes
  h+='<div class="brk-col"><div class="brk-h">Byes (1-4)</div>';
  B.byeSeeds.forEach(function(sd){ h+=brkTeam(sd); });
  h+='</div>';
  // first round
  h+='<div class="brk-col"><div class="brk-h">First Round</div>';
  B.r1.forEach(function(pr,i){
    var wseed=B.results["r1_"+i];
    h+='<div class="brk-pair">'+brkTeam(pr.a,wseed)+brkTeam(pr.b,wseed)+'</div>';
  });
  h+='</div></div>';
  return h;
}
function brkTeam(seed,winnerSeed){
  var P=ST.post,B=P.bracket, f=B.bySeed[seed];
  var me=(seed===P.mySeed);
  var won=(winnerSeed!=null && winnerSeed===seed);
  var lost=(winnerSeed!=null && winnerSeed!==seed);
  return '<div class="brk-team'+(me?" me":"")+(won?" won":"")+(lost?" lost":"")+'">'+
    '<span class="brk-seed">'+seed+'</span><span class="brk-name">'+x(f?f.name:"?")+'</span></div>';
}
function bowlScreen(){
  var P=ST.post, s=ST.save;

    h+='<div class="hero" style="text-align:center;'+(w?'background:var(--green-bg);border-color:var(--green)':'')+'">'+

// Play a postseason game through the SAME live-sim machinery
function playPostGame(){
  var s=ST.save, P=ST.post;
  var oppName, oppP, home=true;
  if(P.mode==="bowl"){ oppName=P.opp; oppP=P.op; home=(Math.random()<0.5); }
  else { var o=myNextOpponent(); oppName=P.bracket.bySeed[o.seed].name; oppP=P.bracket.bySeed[o.seed].p; home=(P.round==="r1"&&P.mySeed<o.seed); }
  var game={opp:oppName, oc:"", op:oppP, home:home};
  var res=simGame(game, ST.planPick||"pro");
  var won=res.us>res.them;
  if(won){ s.wins++; s.careerWins++; } else { s.losses++; s.careerLosses++; }
  var pbp=buildPlayByPlay(res.us,res.them,s.school,oppName);
  ST.weekResult={us:res.us,them:res.them,oppName:oppName,edge:res.edge,oppDefType:res.oppDefType,off:res.off,home:home,pbp:pbp,
                 postseason:true, roundName:(P.mode==="bowl"?P.bowlName:roundLabel(P.round))};
  ST.live={elapsed:0,shownCount:0,done:false,timer:null};
  ST._postWon=won;
  persist();
  ST.screen="live"; draw(); startLiveSim();
}
// Called by finishLive when the game was a postseason game
function finishPostGame(){
  var P=ST.post, won=ST._postWon;
  if(P.mode==="bowl"){
    P.done=true; P.result={us:ST.weekResult.us,them:ST.weekResult.them};
    if(won) ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+5);
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="bowl"; persist(); draw(); return;
  }
  // playoff
  advancePlayoff(won);
  if(P.done && P.champion===P.mySeed){ ST.save.titles=(ST.save.titles||0)+1; ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+15); }
  ST.weekResult=null; ST.live=null; ST.planPick=null;
  ST.screen="bracket"; persist(); draw();
}

function offerRow(o,i){

    ? '<span class="role-tag hc">HEAD COACH</span>'
    : '<span class="role-tag oc">'+o.role+'</span>';

                   : (better ? '<span class="job-up">STEP UP</span>' : '');

    '<div class="job-name">'+x(o.n)+' '+flag+'</div>'+
    '<div class="job-meta">'+roleTag+' · '+x(o.c)+' · '+stars(o.p)+'</div></div>'+

// ACTIONS / BIND
// =====================================================
function bind(){
  var q=function(s){return document.querySelector(s);};
  // setup
  document.querySelectorAll("[data-conf]").forEach(function(b){b.onclick=function(){ST.setup.conf=b.getAttribute("data-conf");ST.setup.team=null;draw();};});
  document.querySelectorAll("[data-team]").forEach(function(b){b.onclick=function(){var n=b.getAttribute("data-team");ST.setup.team=FBS_TEAMS.filter(function(t){return t.n===n;})[0];draw();};});
  document.querySelectorAll("[data-role]").forEach(function(b){b.onclick=function(){ST.setup.role=b.getAttribute("data-role");draw();};});
  var sb=q("#start-btn"); if(sb)sb.onclick=startDynasty;
  // recruit
  document.querySelectorAll("[data-sign]").forEach(function(b){b.onclick=function(){toggleSign(b.getAttribute("data-sign"));};});
  var fr=q("#finish-recruit"); if(fr)fr.onclick=finishRecruiting;
  // season
  document.querySelectorAll("[data-plan]").forEach(function(b){b.onclick=function(){ST.planPick=b.getAttribute("data-plan");draw();};});
  document.querySelectorAll("[data-tab]").forEach(function(b){b.onclick=function(){ST.seasonTab=b.getAttribute("data-tab");draw();};});
  document.querySelectorAll("[data-slider]").forEach(function(sl){
    sl.oninput=function(){
      var gp=getGameplan(); var which=sl.getAttribute("data-slider");
      if(which==="off")gp.offBalance=parseInt(sl.value,10); else gp.defBalance=parseInt(sl.value,10);
      // live-update just the numeric label next to this slider (no full redraw = smooth drag)
      var top=sl.parentNode.querySelector(".gps-val"); if(top)top.textContent=sl.value;
    };
    sl.onchange=function(){ persist(); draw(); }; // on release: recompute fit pills + save
  });
  var pw=q("#play-week"); if(pw)pw.onclick=playWeek;
  var toff=q("#to-postseason"); if(toff)toff.onclick=function(){ enterPostseason(); };
  var pp=q("#play-playoff"); if(pp)pp.onclick=function(){ playPostGame(); };
  var pcc=q("#play-confchamp"); if(pcc)pcc.onclick=function(){ playConfChampGame(); };
  var ccc=q("#confchamp-continue"); if(ccc)ccc.onclick=function(){ ST.confchamp=null; ST.save._confchamp=null; enterPostseason(); };
  var pb=q("#play-bowl"); if(pb)pb.onclick=function(){ playPostGame(); };
  var pto=q("#post-to-offseason"); if(pto)pto.onclick=function(){ ST.post=null; ST.save._postDone=true; ST.screen="offseason"; persist(); draw(); };
  // offseason
  var adv=q("#advance-season"); if(adv)adv.onclick=advanceSeason;
  document.querySelectorAll("[data-takejob]").forEach(function(b){ b.onclick=function(){ var i=parseInt(b.getAttribute("data-takejob"),10); var t=(ST.carousel||[])[i]; if(t) takeJob(t); }; });
  var sj=q("#stay-job"); if(sj)sj.onclick=function(){ ST.carousel=null; startNextSeason(); };
  var rd=q("#reset-dynasty"); if(rd)rd.onclick=function(){ if(confirm("Reset everything? This erases your dynasty permanently.")){ if(DB)DB.ref(BASE()).remove(); ST.save=null; ST.fired=null; ST.carousel=null; ST.screen="setup"; ST.setup={conf:"SEC",team:null,role:"OC"}; draw(); } };
}

function startDynasty(){
  if(!ST.setup.team){toast("Pick a team");return;}
  var role=ST.setup.role||"OC";
  // if changing team mid-career, preserve career stats
  var carry = ST.save ? {careerWins:ST.save.careerWins,careerLosses:ST.save.careerLosses,titles:ST.save.titles,seasonsPlayed:ST.save.seasonsPlayed,abilities:ST.save.abilities} : null;
  ST.save=newSave(ST.setup.team, role);
  if(carry){ ST.save.careerWins=carry.careerWins; ST.save.careerLosses=carry.careerLosses; ST.save.titles=carry.titles; ST.save.seasonsPlayed=carry.seasonsPlayed; ST.save.abilities=carry.abilities; }
  ST.recruitClass=genRecruitClass(ST.save.prestige); ST.signed={};
  ST.screen="recruit"; persist(); draw();
}
function toggleSign(id){
  var r=ST.recruitClass.filter(function(x){return x.id===id;})[0]; if(!r)return;
  if(ST.signed[id]){ delete ST.signed[id]; }
  else { if(spent()+r.cost>ST.save.budget){ toast("Not enough points"); return; } ST.signed[id]=true; }
  draw();
}
function finishRecruiting(){
  // add signed recruits to roster as FR
  ST.recruitClass.forEach(function(r){ if(ST.signed[r.id]){ ST.save.roster.push({id:r.id,n:r.n,pos:r.pos,ovr:r.ovr,yr:"FR",dev:r.dev,st:r.st,startOvr:r.ovr,ssOvr:r.ovr,revealed:false}); } });
  ST.save._recruited=true; ST.save.week=0;
  stampSeasonStart();  // baseline for "this year" progression
  persist();
  ST.screen="season"; ST.planPick=null; draw();
}
function playWeek(){
  var s=ST.save, g=s.schedule[s.week];
  var res=simGame(g, null);
  g.result={us:res.us,them:res.them};
  var won=res.us>res.them;
  if(won){ s.wins++; s.careerWins++; } else { s.losses++; s.careerLosses++; }
  // living league: record your result + advance every other team one week
  recordUserLeagueResult(won, g.oc===s.conf);
  simLeagueWeek(s.school);
  developInSeason();
  var pbp=buildPlayByPlay(res.us,res.them,s.school,g.opp);
  ST.weekResult={us:res.us,them:res.them,oppName:g.opp,edge:res.edge,oppDefType:res.oppDefType,off:res.off,home:g.home,pbp:pbp};
  ST.live={elapsed:0, shownCount:0, done:false, timer:null};
  s.week++;
  persist();
  ST.screen="live"; draw();
  startLiveSim();
}
// Continuous game-clock sim: clock runs smoothly 0->3600s; plays reveal as the clock passes them.
var LIVE_GAME_MS=9000;   // whole game plays out in ~9 seconds
var LIVE_TICK_MS=40;     // frame rate
function startLiveSim(){
  stopLiveSim();
  var r=ST.weekResult;
  ST.live.elapsed=0; ST.live.shownCount=0; ST.live.done=false;
  if(!r.pbp||!r.pbp.length){ ST.live.elapsed=3600; ST.live.done=true; renderLiveScore(); return; }
  // reduced-motion: skip the ticking animation, show the final immediately
  try{ if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches){ ST.live.elapsed=3600; ST.live.done=true; renderLiveScore(); return; } }catch(e){}
  var perTick=3600/(LIVE_GAME_MS/LIVE_TICK_MS); // game-seconds advanced per frame
  ST.live.timer=setInterval(function(){
    ST.live.elapsed+=perTick;
    if(ST.live.elapsed>=3600){ ST.live.elapsed=3600; ST.live.done=true; stopLiveSim(); }
    renderLiveScore();
  }, LIVE_TICK_MS);
}
function stopLiveSim(){ if(ST.live&&ST.live.timer){ clearInterval(ST.live.timer); ST.live.timer=null; } }
function skipLive(){ stopLiveSim(); ST.live.elapsed=3600; ST.live.done=true; renderLiveScore(); }
function finishLive(){
  stopLiveSim();
  if(ST.weekResult && ST.weekResult.confchamp){ finishConfChampGame(); return; }
  if(ST.weekResult && ST.weekResult.postseason){ finishPostGame(); return; }
  ST.weekResult=null; ST.live=null; ST.planPick=null;
  if(ST.save.week>=ST.save.schedule.length){ enterConfChampionship(); return; } // regular season over → conf title game → postseason
  ST.seasonTab="week"; ST.screen="season"; draw();
}
// Format absolute elapsed seconds into "Qn · MM:SS" (clock counts down within each quarter)
function fmtGameClock(elapsed){
  if(elapsed>=3600) return "FINAL";
  var q=Math.min(4,Math.floor(elapsed/900)+1);
  var into=elapsed-(q-1)*900;      // seconds into this quarter
  var left=Math.max(0,900-into);   // seconds left in quarter
  var mm=Math.floor(left/60), ss=Math.floor(left%60);
  return "Q"+q+" · "+mm+":"+(ss<10?"0"+ss:ss);
}
// Update just the live DOM (avoid full redraw so the feed animates smoothly)
function renderLiveScore(){
  var r=ST.weekResult, li=ST.live;
  // plays revealed so far = those whose elapsed <= current game clock
  var revealed=[]; for(var i=0;i<r.pbp.length;i++){ if(r.pbp[i].elapsed<=li.elapsed) revealed.push(r.pbp[i]); }
  if(li.done) revealed=r.pbp.slice();
  var last=revealed.length?revealed[revealed.length-1]:null;
  var us=last?last.usTot:0, them=last?last.themTot:0;
  var usEl=document.getElementById("live-us"), themEl=document.getElementById("live-them"),
      qEl=document.getElementById("live-q"), feedEl=document.getElementById("live-feed"),
      btnEl=document.getElementById("live-btn");
  if(usEl){ if(usEl.textContent!=String(us)){ usEl.classList.add("bump"); setTimeout(function(){usEl.classList.remove("bump");},220); } usEl.textContent=us; }
  if(themEl){ if(themEl.textContent!=String(them)){ themEl.classList.add("bump"); setTimeout(function(){themEl.classList.remove("bump");},220); } themEl.textContent=them; }
  if(qEl)qEl.textContent = fmtGameClock(li.elapsed);
  // only rebuild feed when a new play has appeared (keeps animation cheap, no flicker)
  if(feedEl && revealed.length!==li.shownCount){
    li.shownCount=revealed.length;
    var rows="";
    for(var j=revealed.length-1;j>=0;j--){
      var p=revealed[j];
      var mine=p.team==="us";
      var badge=p.kind==="TD"?"🏈 TD":(p.kind==="FG"?"🥅 FG":(p.kind==="2PT"?"➋ 2PT":"＋ SFTY"));
      var teamLbl = mine ? abbr(ST.save.school) : abbr(ST.weekResult.oppName);
      rows+='<div class="pbp-row'+(mine?" mine":"")+'"><span class="pbp-q">Q'+p.q+'</span>'+
            '<span class="pbp-badge">'+badge+'</span>'+
            '<span class="pbp-desc"><b>'+x(teamLbl)+'</b> · '+x(p.desc)+'</span>'+
            '<span class="pbp-sc">'+p.usTot+'-'+p.themTot+'</span></div>';
    }
    if(rows) feedEl.innerHTML=rows;
  }
  var endEl=document.getElementById("live-endstat");
  if(endEl){
    if(li.done){
      var win=r.us>r.them;
      endEl.innerHTML='<div class="result-tag '+(win?"win":"loss")+'">'+(win?"VICTORY":"DEFEAT")+' · '+(r.edge?"gameplan edge paid off":"no gameplan edge")+'</div>'+
        '<div class="stat-grid" style="margin:10px 0 0">'+
        '<div class="stat"><div class="stat-v">'+ST.save.wins+'-'+ST.save.losses+'</div><div class="stat-l">Record</div></div>'+
        '<div class="stat"><div class="stat-v">'+r.off+'</div><div class="stat-l">Offense</div></div>'+
        '<div class="stat"><div class="stat-v">'+(ST.save.week<ST.save.schedule.length?"W"+(ST.save.week+1):"Bowl")+'</div><div class="stat-l">Next</div></div>'+
        '</div>';
    } else endEl.innerHTML="";
  }
  if(btnEl){
    if(li.done){ btnEl.textContent=(ST.weekResult&&ST.weekResult.postseason?"See Result →":(ST.save.week<ST.save.schedule.length?"Continue →":"Finish Season →")); btnEl.className="bigbtn btn-gold"; btnEl.onclick=finishLive; }
    else { btnEl.textContent="Skip to Final ⏩"; btnEl.className="bigbtn btn-ghost"; btnEl.onclick=skipLive; }
  }
}
function advanceSeason(){
  var s=ST.save;
  if(s._evaluated){
    if(s._pendingFired){ ST.fired=ST.fired||{school:s.school,seasons:s.seasonsPlayed}; ST.carousel=ST.carousel||genCarousel(true); ST.screen="fired"; draw(); return; }
    if(ST.carousel&&ST.carousel.length){ ST.screen="carousel"; draw(); return; }
    startNextSeason(); return;
  }
  s.seasonsPlayed++;
  s._evaluated=true;
  // record title
  if(s.wins>=11){ s.titles++; toast("🏆 Conference title season!"); }
  s.history.push({season:s.season,wins:s.wins,losses:s.losses,school:s.school,expect:s.expectWins});

  // ── evaluate season vs expectation → adjust job security ──
  var diff = s.wins - s.expectWins;
  if(diff>=2){ s.jobSecurity=Math.min(100,s.jobSecurity+20); s.missedYears=0; }
  else if(diff>=0){ s.jobSecurity=Math.min(100,s.jobSecurity+12); s.missedYears=0; }
  else if(diff>=-1){ s.jobSecurity=Math.max(0,s.jobSecurity-8); s.missedYears=0; } // just missed = minor ding, no strike
  else if(diff>=-3){ s.jobSecurity=Math.max(0,s.jobSecurity-16); s.missedYears++; }
  else { s.jobSecurity=Math.max(0,s.jobSecurity-26); s.missedYears++; }

  // prestige drift
  if(s.wins>=10&&s.prestige<5)s.prestige++;
  else if(s.wins<=3&&s.prestige>1)s.prestige--;

  // graduate seniors, age up, develop
  var YR_NEXT={FR:"SO",SO:"JR",JR:"SR"};
  var kept=[];
  s.roster.forEach(function(p){
    if(p.yr==="SR")return;
    p.yr=YR_NEXT[p.yr]||p.yr;
    var dv = p.dev==="gem"?rnd(2,5):(p.dev==="bust"?rnd(-3,0):rnd(0,2));
    p.ovr=Math.max(50,Math.min(99,p.ovr+dv));
    if(p.dev!=="normal" && (p.yr==="JR"||p.yr==="SR"||Math.abs(p.ovr-(p.startOvr||p.ovr))>=3)) p.revealed=true;
    kept.push(p);
  });
  s.roster=kept;
  // living league: teams' ratings drift based on how they performed vs their rating
  driftLeagueRatings();

  // ── firing check: hot seat + missed expectations two+ years, or rock-bottom security ──
  var fired = (s.jobSecurity<=0) || (s.jobSecurity<25 && s.missedYears>=2);
  if(fired){
    s._pendingFired=true;
    ST.fired={school:s.school, seasons:s.seasonsPlayed};
    ST.carousel=genCarousel(true);
    persist();
    ST.screen="fired"; draw(); return;
  }

  // ── carousel: offers may appear if you're doing well ──
  ST.carousel=genCarousel(false);
  if(ST.carousel && ST.carousel.length){
    persist();
    ST.screen="carousel"; draw(); return;
  }

  // no offers, not fired → continue at current school
  startNextSeason();
}

// Begin the next season at the current school
function startNextSeason(){
  var s=ST.save;
  s.season++; s.wins=0; s.losses=0; s.week=0; s._recruited=false;
  s._evaluated=false; s._pendingFired=false;
  s.expectWins=expectWinsFor(s.prestige);
  s.schedule=genSchedule({n:s.school,c:s.conf,p:s.prestige});
  s.budget=budgetFor(s.prestige,s.role);
  // ensure THIS team's league record is clean for the new season (belt-and-suspenders vs drift timing)
  if(s.league && s.league.teams[s.school]){ var mt=s.league.teams[s.school]; mt.w=0; mt.l=0; mt.cw=0; mt.cl=0; }
  ST.recruitClass=genRecruitClass(s.prestige); ST.signed={};
  ST.carousel=null; ST.post=null; s._post=null; s._postDone=false;
  ST.confchamp=null; s._confchamp=null; s._wonConfThisYear=false;
  persist();
  ST.screen="recruit"; draw();
}

// Generate coaching-carousel job openings.
// fired=true → only lateral/lower jobs; performing well → step-up jobs appear.
function genCarousel(fired){
  var s=ST.save;
  var cur=s.prestige;
  var offers=[];
  var over = s.wins - s.expectWins;          // how much you beat/missed expectations
  var pool=FBS_TEAMS.filter(function(t){return t.n!==s.school;});
  function take(list){ if(!list.length)return null; var t=list.splice(Math.floor(Math.random()*list.length),1)[0]; pool=pool.filter(function(x){return x.n!==t.n;}); return t; }
  function cand(minP,maxP){ return pool.filter(function(t){return t.p>=minP&&t.p<=maxP;}); }
  function addOffer(t,role){ if(t) offers.push({n:t.n,c:t.c,p:t.p,role:role}); }
  var clamp=function(v){ return Math.max(1,Math.min(5,v)); };

  if(fired){
    // ── Rebound offers: always a fresh start somewhere, usually a step down ──
    // Worse you did, further you fall — but there is ALWAYS a landing spot.
    var drop = over<=-4 ? 2 : 1;              // brutal season = fall two tiers
    var hi=clamp(cur-drop), loP=clamp(cur-drop-1);
    var coordRole=(s.role==="DC")?"DC":"OC";
    addOffer(take(cand(loP,hi)),coordRole);
    addOffer(take(cand(loP,hi)),coordRole);
    // a rebuild HC job at a small program willing to gamble on you (always a stepping stone)
    addOffer(take(cand(1, Math.min(2, Math.max(1,cur-1)))),"HC");
    // guarantee at least 2 offers by widening if needed
    if(offers.length<2) addOffer(take(cand(1,cur)),coordRole);
    if(offers.length<2) addOffer(take(cand(1,5)),coordRole);
  } else if(s.role==="OC"||s.role==="DC"){
    var coord=s.role; // OC stays OC, DC stays DC when moving laterally
    // ── First-time Head Coach jobs are STEPPING STONES ──
    var hcCeil = over>=3 ? 3 : (over>=1 ? 2 : 1);   // great year tops out at a 3-star HC job
    hcCeil = Math.min(hcCeil, Math.max(1, cur-2));   // and always a real step down from your school
    var hcFloor = 1;
    addOffer(take(cand(hcFloor, hcCeil)), "HC");
    if(over>=2) addOffer(take(cand(hcFloor, hcCeil)), "HC"); // strong year → a second HC option
    // ── Lateral / step-up coordinator jobs, ceiling scales with results ──
    if(over>=2 && cur<5){ addOffer(take(cand(cur+1,clamp(cur+2))),coord); }
    else if(over>=0){ addOffer(take(cand(cur,clamp(cur+1))),coord); }
    else { addOffer(take(cand(clamp(cur-1),cur)),coord); }
    if(offers.length<2) addOffer(take(cand(clamp(cur-1),clamp(cur+1))),coord);
  } else {
    // ── Already a Head Coach: NOW you climb as a HC, one tier at a time ──
    // Proven HCs move up gradually — a good year at a 2-star gets you a 3-star job, not a 5-star.
    if(over>=2 && cur<5){ addOffer(take(cand(cur+1,clamp(cur+1))),"HC"); }  // one tier up, earned
    else if(over>=0){ addOffer(take(cand(cur,clamp(cur+1))),"HC"); }        // lateral or slight step up
    else { addOffer(take(cand(clamp(cur-1),cur)),"HC"); }                   // down year → lateral/step down
    addOffer(take(cand(clamp(cur-1),clamp(cur+1))),"HC");                   // a comparable second option
  }
  // de-dupe by school name, keep up to 4
  var seen={}, uniq=[];
  offers.forEach(function(o){ if(o&&!seen[o.n]){seen[o.n]=1;uniq.push(o);} });
  // absolute safety net: never return an empty slate
  if(!uniq.length){ var anyT=take(cand(1,5)); if(anyT){ uniq.push({n:anyT.n,c:anyT.c,p:anyT.p,role:s.role==="HC"?"HC":"OC"}); } }
  return uniq.slice(0,4);
}
// Take a job from the carousel (or after being fired). Offer carries its own role.
function takeJob(offer){
  var s=ST.save;
  var newRole = offer.role || s.role;
  var carry={careerWins:s.careerWins,careerLosses:s.careerLosses,titles:s.titles,seasonsPlayed:s.seasonsPlayed,abilities:s.abilities,jobsHeld:(s.jobsHeld||1)+1,history:s.history};
  var fresh=newSave({n:offer.n,c:offer.c,p:offer.p}, newRole);
  fresh.careerWins=carry.careerWins; fresh.careerLosses=carry.careerLosses; fresh.titles=carry.titles;
  fresh.seasonsPlayed=carry.seasonsPlayed; fresh.abilities=carry.abilities; fresh.jobsHeld=carry.jobsHeld;
  fresh.history=carry.history; fresh.jobSecurity=55; // fresh mandate at a new job
  if(s.league) fresh.league=s.league; // the world continues — keep the living league
  ST.save=fresh; ST.fired=null; ST.carousel=null;
  ST.recruitClass=genRecruitClass(fresh.prestige); ST.signed={};
  persist();
  if(newRole!==s.role && newRole==="HC") toast("🎉 Promoted to Head Coach!");
  ST.screen="recruit"; draw();
}

// ── Boot ─────────────────────────────────────────────────
loadData();
draw();
</script>
