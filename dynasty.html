     '<h1>'+(iWon?"🏆 "+x(s.conf)+" CHAMPIONS!":x(s.conf)+" Championship")+'</h1>'+
     '<p>'+(iWon?("You won the "+x(s.conf)+"! On to the postseason with momentum."):
            ((C.result?x(C.result.winner):"?")+" won the "+x(s.conf)+" title."+(C.youIn?" Tough loss in the final.":" You didn\u2019t qualify this year.")))+'</p></div>';
  h+=confStandingsTable();
  h+='<button class="bigbtn btn-gold" id="confchamp-continue">Continue to Postseason →</button>';
  return h;
}
function confStandingsTable(){
  var s=ST.save, C=ST.confchamp;
  var h='<div class="sec-title">'+x(s.conf)+' Standings</div><div class="conf-table">';
  C.standings.forEach(function(t,i){
    var champLine = i<2;
    h+='<div class="conf-row'+(t.you?" me":"")+(champLine?" top2":"")+'">'+
       '<span class="conf-rank">'+(i+1)+'</span>'+
       '<span class="conf-name">'+x(t.name)+(champLine?' <span class="conf-star">★</span>':'')+'</span>'+
       '<span class="conf-rec">'+t.cw+'-'+t.cl+'</span></div>';
  });
  h+='</div><div style="font-size:9px;font-weight:700;color:var(--muted);margin:6px 2px 0">★ = conference championship game</div>';
  return h;
}

// A team's "resume strength" — wins matter, but so does program/conference quality.
// Power-conference wins are worth more than Group-of-Five wins (strength of schedule).
var POWER_CONF={"SEC":1,"Big Ten":1,"Big 12":1,"ACC":1};
function isPowerConf(conf){ return !!POWER_CONF[conf]; }
function resumeScore(wins, prestige, conf, wonConf, off){
  var confWeight = isPowerConf(conf) ? 1.0 : 0.62;   // G5 wins are discounted (weaker schedule)
  var base = wins*8*confWeight + prestige*7;
  if(wonConf) base += 10;
  if(off) base += off/12;
  return base;
}
function enterPostseason(){
  var s=ST.save;
  if(myDivision()==="FCS"){ enterFCSPostseason(); return; }
  var w=s.wins;
  var power=isPowerConf(s.conf);
  // Power programs make it on record. Group-of-Five teams essentially need to win their
  // conference (auto-bid) AND have a strong record — mirroring the real G5-gets-one-bid rule.
  var makePlayoff = power
    ? ( w>=10 || (w>=9 && s.prestige>=3) || (w>=8 && s.prestige>=5) )
    : ( w>=11 && s._wonConfThisYear );   // G5: only the conf champ with a great record sneaks in
  if(makePlayoff){
    setupPlayoff();
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  if(w>=6){
    // bowl game
    var pool = (w>=9?NY6:BOWLS);
    var oppP = Math.max(1, Math.min(5, s.prestige + rnd(-1,1)));
    var opp = pickOpponent(oppP);
    ST.post={mode:"bowl", bowlName:pick(pool), opp:opp.n, oc:opp.c, op:opp.p, done:false, result:null};
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  // no bowl (losing record)
  ST.post=null;
  s._postDone=true;
  ST.screen="offseason"; persist(); draw();
}
function pickOpponent(prestige){
  var pool=divTeams(myDivision());
  var cand=pool.filter(function(t){return t.n!==ST.save.school && Math.abs(t.p-prestige)<=1;});
  if(!cand.length)cand=pool.filter(function(t){return t.n!==ST.save.school;});
  return pick(cand);
}

// ═════════════════════════════════════════════════════════
// FCS POSTSEASON — deliberately separate from the FBS path.
//   PLAYOFF  : 24-team bracket, top 8 seeds get a first-round bye. Ends in the
//              FCS National Championship in Frisco.
//   CHAMPIONSHIP (Celebration Bowl): SWAC & MEAC do NOT enter the bracket. Their two
//              conference champions meet in a single title game instead.
//   IVY      : declines all postseason bids, full stop.
// ═════════════════════════════════════════════════════════
function isFCSPlayoffConf(c){ return !!FCS_PLAYOFF_CONFS[c]; }
function isCelebrationConf(c){ return !!FCS_CELEBRATION_CONFS[c]; }
function isNoPostseasonConf(c){ return !!FCS_NO_POSTSEASON_CONFS[c]; }
function isNoAutobidConf(c){ return !!FCS_NO_AUTOBID_CONFS[c]; }
function divTeams(div){ return div==="FCS" ? FCS_TEAMS : FBS_TEAMS; }

// FCS resume score — no power-conference weighting, but a money-game win over an
// FBS opponent is the single most valuable line on an FCS resume.
function fcsResumeScore(wins, prestige, wonConf, ovr, fbsWin){
  var base = wins*9 + prestige*6 + (ovr||60)*0.5;
  if(wonConf) base += 12;
  if(fbsWin)  base += 14;   // beating an FBS team is a signature win
  return base;
}

function enterFCSPostseason(){
  var s=ST.save, w=s.wins, c=s.conf;

  // ── The Ivy League declines every postseason bid. Season's over. ──
  if(isNoPostseasonConf(c)){
    ST.post={mode:"none", reason:"ivy"};   // _postDone is set when they click Continue
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }

  // ── SWAC / MEAC: the Celebration Bowl track, NOT the playoff bracket. ──
  if(isCelebrationConf(c)){
    if(s._wonConfThisYear){
      // You won your league → you represent it in the Celebration Bowl.
      var otherConf = (c==="SWAC") ? "MEAC" : "SWAC";
      var foe = bestTeamInConf(otherConf);
      ST.post={mode:"celebration", opp:foe.name, oc:otherConf, op:foe.p, done:false, result:null};
    } else {
      ST.post={mode:"none", reason:"noCelebration"};
    }
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }

  // ── Everyone else: try to make the 24-team bracket. ──
  // Auto-bid = win your conference. Otherwise you need an at-large-worthy record.
  var autoBid = s._wonConfThisYear && isFCSPlayoffConf(c) ;
  var atLarge = (w>=8) || (w>=7 && s.prestige>=4);
  if(isNoAutobidConf(c)) autoBid=false;   // Pioneer / Independents: at-large only
  if(autoBid || atLarge){
    setupFCSPlayoff();
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }

  // FCS has no bowl system below the playoff — a losing-out season simply ends.
  ST.post={mode:"none", reason:"missed"};
  ST.screen="season"; ST.seasonTab="week"; persist(); draw();
}

// Strongest team in a given conference (used to pick the Celebration Bowl opponent).
function bestTeamInConf(conf){
  var L=ST.save.league, best=null;
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(t.c!==conf) return;
      var sc = fcsResumeScore(t.w, t.p, false, t.ovr, false);
      if(!best || sc>best.score) best={name:n, p:t.p, ovr:t.ovr, score:sc};
    });
  }
  if(!best){
    var pool=FCS_TEAMS.filter(function(t){return t.c===conf;});
    var t2=pick(pool)||{n:"TBD",p:3};
    best={name:t2.n, p:t2.p, ovr:60, score:0};
  }
  return best;
}

// ── Build the 24-team FCS bracket ────────────────────────
// Seeds 1-8 receive a first-round bye. Seeds 9-24 play the first round.
// Bracket flow: R1 (8 games) -> R2/Round of 16 (byes enter) -> QF -> SF -> Championship.
function setupFCSPlayoff(){
  var s=ST.save, L=s.league;
  var myScore = fcsResumeScore(s.wins, s.prestige, s._wonConfThisYear, (L?L.teams[s.school].ovr:60), !!s._beatFBSThisYear);
  var field=[{name:s.school, p:s.prestige, you:true, score:myScore}];
  var others=[];
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(n===s.school) return;
      if(t.div!=="FCS") return;                       // FBS teams are not eligible
      if(isNoPostseasonConf(t.c)) return;             // Ivy declines
      if(isCelebrationConf(t.c)) return;              // SWAC/MEAC are on the bowl track
      others.push({name:n, p:t.p, you:false, score: fcsResumeScore(t.w, t.p, false, t.ovr, false)});
    });
  }
  others.sort(function(a,b){return b.score-a.score;});
  for(var i=0;i<23 && i<others.length;i++){ field.push(others[i]); }
  field.sort(function(a,b){return b.score-a.score;});
  field.forEach(function(f,idx){ f.seed=idx+1; });
  var mySeed=0; field.forEach(function(f){ if(f.you)mySeed=f.seed; });

  ST.post={
    mode:"fcsPlayoff", field:field, mySeed:mySeed,
    round: (mySeed<=8 ? "r2" : "r1"),   // top 8 seeds open in the Round of 16
    bracket: buildFCSBracketState(field),
    log:[], done:false, champion:null
  };
}
// R1 pairings: 9v24, 10v23, ... 16v17. Each winner meets a bye seed in R2.
// R2 pairing rule: bye seed k faces the winner of the (9..16 vs 17..24) game whose
// higher seed is (17-k)  ->  1 plays winner(16/17), 2 plays winner(15/18), etc.
function buildFCSBracketState(field){
  var bySeed={}; field.forEach(function(f){ bySeed[f.seed]=f; });
  var r1=[];
  for(var i=0;i<8;i++){ r1.push({a:9+i, b:24-i}); }   // idx0: 9v24 ... idx7: 16v17
  return { r1:r1, byeSeeds:[1,2,3,4,5,6,7,8], bySeed:bySeed, results:{}, rounds:{} };
}
// Which r1 pair index feeds bye seed k?  seed1 -> pair idx7 (16v17), seed8 -> pair idx0 (9v24)
function fcsFeederIdx(byeSeed){ return 8-byeSeed; }

function fcsCpuGame(seedA, seedB){
  var f=ST.post.bracket.bySeed, a=f[seedA], b=f[seedB];
  if(!a) return seedB; if(!b) return seedA;
  var aStr=(25-a.seed)*2.2 + a.p*3 + rnd(0,20);
  var bStr=(25-b.seed)*2.2 + b.p*3 + rnd(0,20);
  return aStr>=bStr ? seedA : seedB;
}
// Resolve every first-round game except one you might be playing in.
function fcsResolveR1(skipIdx){
  var B=ST.post.bracket;
  B.r1.forEach(function(pr,i){
    if(i===skipIdx) return;
    if(B.results["r1_"+i]==null) B.results["r1_"+i]=fcsCpuGame(pr.a,pr.b);
  });
}
// Build the Round-of-16 field: 8 bye seeds vs 8 first-round winners.
// Slots are laid out in true bracket order (1,8,4,5,2,7,3,6) so that adjacent pairs
// meet in the quarterfinals and the #1 and #2 seeds can only collide in the final.
var FCS_R2_SLOT_ORDER=[1,8,4,5,2,7,3,6];
function fcsRound16Pairs(){
  var B=ST.post.bracket, pairs=[];
  FCS_R2_SLOT_ORDER.forEach(function(k){
    var idx=fcsFeederIdx(k);
    pairs.push({a:k, b:B.results["r1_"+idx]});
  });
  return pairs;
}
// Generic: given this round's seed pairs, find my game, sim the rest, return next-round seeds.
function fcsAdvanceRound(pairs, myWinSeed, key){
  var B=ST.post.bracket, me=ST.post.mySeed, out=[];
  pairs.forEach(function(pr,i){
    var win;
    if(pr.a===me || pr.b===me){ win = (myWinSeed!=null ? myWinSeed : fcsCpuGame(pr.a,pr.b)); }
    else win = fcsCpuGame(pr.a, pr.b);
    B.results[key+"_"+i]=win;
    out.push(win);
  });
  B.rounds[key]=out;
  return out;
}
// Pair up an array of advancing seeds: [0]v[1], [2]v[3], ...
function fcsPairUp(seeds){
  var pairs=[];
  for(var i=0;i<seeds.length;i+=2){ pairs.push({a:seeds[i], b:seeds[i+1]}); }
  return pairs;
}
// Current round's pairings, whatever round we're in.
function fcsCurrentPairs(){
  var P=ST.post, B=P.bracket;
  if(P.round==="r1")  return B.r1;
  if(P.round==="r2"){ fcsResolveR1(myFCSR1Idx()); return fcsRound16Pairs(); }
  if(P.round==="qf")  return fcsPairUp(B.rounds.r2||[]);
  if(P.round==="sf")  return fcsPairUp(B.rounds.qf||[]);
  if(P.round==="champ") return fcsPairUp(B.rounds.sf||[]);
  return [];
}
function myFCSR1Idx(){
  var B=ST.post.bracket, me=ST.post.mySeed, idx=-1;
  B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me) idx=i; });
  return idx;
}
// My opponent seed in the current round.
function myFCSOpponent(){
  var P=ST.post, me=P.mySeed;
  var pairs=fcsCurrentPairs(), found=null, idx=-1;
  pairs.forEach(function(pr,i){ if(pr.a===me||pr.b===me){ found=pr; idx=i; } });
  if(!found) return {seed:null, idx:-1};
  return {seed: (found.a===me?found.b:found.a), idx: idx};
}
var FCS_ROUND_ORDER=["r1","r2","qf","sf","champ"];
function fcsRoundLabel(r){
  return {r1:"First Round", r2:"Second Round", qf:"Quarterfinal",
          sf:"Semifinal", champ:"FCS National Championship"}[r]||r;
}
// Advance the FCS bracket after YOUR game resolves.
function advanceFCSPlayoff(iWon){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  var pairs=fcsCurrentPairs();
  var opp=myFCSOpponent();
  var myWin = iWon ? me : opp.seed;

  if(P.round==="r1"){
    B.results["r1_"+opp.idx]=myWin;
    fcsResolveR1(-1);                       // fill in every other first-round game
    B.rounds.r1=B.r1.map(function(pr,i){ return B.results["r1_"+i]; });
    if(!iWon){ P.done=true; P.eliminated=true; fcsSimRest("r2"); return; }
    P.round="r2"; return;
  }
  var advancing = fcsAdvanceRound(pairs, myWin, P.round);
  // The championship is terminal in BOTH directions — there is no round after it.
  if(P.round==="champ"){
    P.done=true;
    P.champion = iWon ? me : opp.seed;
    if(iWon){
      ST.save._wonNatlThisYear=true;
      ST.save.natlTitles=(ST.save.natlTitles||0)+1;
    } else {
      P.eliminated=true;
      var cn=B.bySeed[P.champion];
      if(cn) ST.save._natlChampName=cn.name;
    }
    return;
  }
  if(!iWon){
    P.done=true; P.eliminated=true;
    fcsSimRest(FCS_ROUND_ORDER[FCS_ROUND_ORDER.indexOf(P.round)+1]);
    return;
  }
  P.round = FCS_ROUND_ORDER[FCS_ROUND_ORDER.indexOf(P.round)+1];
}
// You're out — sim the remainder of the bracket to crown a champion anyway.
function fcsSimRest(fromRound){
  var P=ST.post, B=P.bracket;
  var i=FCS_ROUND_ORDER.indexOf(fromRound);
  if(i<0){ return; }
  for(; i<FCS_ROUND_ORDER.length; i++){
    var key=FCS_ROUND_ORDER[i];
    var pairs;
    if(key==="r2") pairs=fcsRound16Pairs();
    else pairs=fcsPairUp(B.rounds[FCS_ROUND_ORDER[i-1]]||[]);
    if(!pairs.length || pairs[0].b==null) break;
    var out=[];
    pairs.forEach(function(pr,j){
      var w=fcsCpuGame(pr.a,pr.b);
      B.results[key+"_"+j]=w; out.push(w);
    });
    B.rounds[key]=out;
    if(key==="champ"){ P.champion=out[0]; break; }
  }
  if(P.champion && B.bySeed[P.champion]) ST.save._natlChampName=B.bySeed[P.champion].name;
}

// Build the 12-team bracket seeded by strength-weighted resume score.
function setupPlayoff(){
  var s=ST.save, L=s.league;
  var myScore = resumeScore(s.wins, s.prestige, s.conf, s._wonConfThisYear, myUnitRating()) + (L?L.teams[s.school].ovr*0.5:0);
  var iAmG5 = !isPowerConf(s.conf);
  var field=[{name:s.school, p:s.prestige, you:true, score:myScore, g5:iAmG5}];
  // pull the actual best 11 teams from the living league by resume score
  var others=[];
  if(L){
    Object.keys(L.teams).forEach(function(n){
      if(n===s.school)return;
      var t=L.teams[n];
      others.push({name:n, p:t.p, you:false, g5:!isPowerConf(t.c),
                   score: resumeScore(t.w, t.p, t.c, false, t.off) + t.ovr*0.5});
    });
  }
  others.sort(function(a,b){return b.score-a.score;});
  for(var i=0;i<11 && i<others.length;i++){ field.push(others[i]); }
  // seed by resume score
  field.sort(function(a,b){return b.score-a.score;});
  // Enforce realism: a Group-of-Five team can never be seeded higher than 9th.
  var you=null; field.forEach(function(f){ if(f.you)you=f; });
  field.forEach(function(f,idx){ f.seed=idx+1; });
  if(you && you.g5 && you.seed<9){
    field = field.filter(function(f){return !f.you;});
    field.splice(8,0,you);           // insert at index 8 => seed 9
    field.forEach(function(f,idx){ f.seed=idx+1; });
  }
  var mySeed=0; field.forEach(function(f){ if(f.you)mySeed=f.seed; });
  ST.post={
    mode:"playoff", field:field, mySeed:mySeed,
    round: (mySeed<=4?"qf":"r1"),
    roundIdx:0,
    bracket: buildBracketState(field),
    done:false, champion:null
  };
}
// Bracket state: track winners by slot across rounds
function buildBracketState(field){
  var bySeed={}; field.forEach(function(f){ bySeed[f.seed]=f; });
  return {
    r1:[ {a:5,b:12}, {a:8,b:9}, {a:6,b:11}, {a:7,b:10} ], // pairs feeding QF
    byeSeeds:[1,2,3,4],
    bySeed:bySeed,
    results:{}, // key like "r1_0" -> winning seed
    qf:[], sf:[], champ:null
  };
}

// Resolve one CPU game between two seeds → returns winning seed
function cpuGame(seedA, seedB){
  var f=ST.post.bracket.bySeed;
  var a=f[seedA], b=f[seedB];
  // lower seed number = stronger; add variance for upsets
  var aStr=(13-a.seed)*4 + a.p*3 + rnd(0,20);
  var bStr=(13-b.seed)*4 + b.p*3 + rnd(0,20);
  return aStr>=bStr ? seedA : seedB;
}

// Figure out YOUR next opponent seed in the current round based on bracket flow
function myNextOpponent(){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  if(P.round==="r1"){
    // find my r1 pairing
    var pair=null,idx=-1;
    B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me){pair=pr;idx=i;} });
    var opp = pair.a===me?pair.b:pair.a;
    return {seed:opp, idx:idx};
  }
  if(P.round==="qf"){
    ensureR1Resolved();
    // QF: seed1 vs winner(8/9), seed4 vs winner(5/12), seed2 vs winner(7/10), seed3 vs winner(6/11)
    var map={1:1,4:0,2:3,3:2}; // my seed -> which r1 pair feeds me (if I'm a bye seed)
    if(me<=4){ var pi=map[me]; var wseed=B.results["r1_"+pi]; return {seed:wseed, idx:pi, qf:true, byeSlot:me}; }
    // I advanced from r1 — opponent is the corresponding bye seed
    var myPair=-1; B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me)myPair=i; });
    var byeMap={1:1,0:4,3:2,2:3}; // r1 pair index -> bye seed faced
    return {seed:byeMap[myPair], idx:myPair, qf:true};
  }
  if(P.round==="sf"){
    // semifinal opponent = winner of the other half
    return {seed:P._sfOpp||null, sf:true};
  }
  if(P.round==="champ"){
    return {seed:P._champOpp||null, champ:true};
  }
  return {seed:null};
}

// Advance the bracket after YOU win a round; auto-resolve CPU games
function advancePlayoff(iWon){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  if(!iWon){
    // you're eliminated — the team that just beat you advances in your place
    P.done=true; P.eliminated=true;
    var beat=myNextOpponent().seed;
    if(P.round==="r1"){ var oi=myNextOpponent().idx; B.results["r1_"+oi]=beat; }
    else if(P.round==="qf"){ resolveQuarterfinals(beat); }
    else if(P.round==="sf"){ resolveSemifinal(beat); }
    else if(P.round==="champ"){ B.champWinner=beat; }
    resolveRestOfBracket();
    return;
  }
  if(P.round==="r1"){
    var opp=myNextOpponent();
    B.results["r1_"+opp.idx]=me;
    // resolve the other 3 r1 games
    B.r1.forEach(function(pr,i){ if(i!==opp.idx && B.results["r1_"+i]==null) B.results["r1_"+i]=cpuGame(pr.a,pr.b); });
    P.round="qf"; P.roundIdx++;
    return;
  }
  if(P.round==="qf"){
    // record you winning your QF; resolve other QFs to form SF
    resolveQuarterfinals(me);
    P.round="sf"; P.roundIdx++;
    return;
  }
  if(P.round==="sf"){
    resolveSemifinal(me);
    P.round="champ"; P.roundIdx++;
    return;
  }
  if(P.round==="champ"){
    P.done=true; P.champion=me; B.champWinner=me; // you win it all
    ST.save._wonNatlThisYear=true; ST.save.natlTitles=(ST.save.natlTitles||0)+1;
    ST.save._natlChampName=ST.save.school;
    return;
  }
}
function ensureR1Resolved(){
  var B=ST.post.bracket, me=ST.post.mySeed;
  B.r1.forEach(function(pr,i){
    if(B.results["r1_"+i]==null){
      // if I'm in this pair and haven't played, leave it; otherwise CPU-resolve
      if(pr.a===me||pr.b===me) return;
      B.results["r1_"+i]=cpuGame(pr.a,pr.b);
    }
  });
}
function resolveQuarterfinals(myWinSeed){
  var P=ST.post,B=P.bracket;
  ensureR1Resolved(); // bye seeds skip R1 block, so make sure the field is filled
  // QF pairings by bye seed vs r1 winners: 1v w(8/9)[idx1], 4v w(5/12)[idx0], 2v w(7/10)[idx3], 3v w(6/11)[idx2]
  var qfPairs=[ {bye:1,from:1}, {bye:4,from:0}, {bye:2,from:3}, {bye:3,from:2} ];
  B.qfWinners={};
  qfPairs.forEach(function(p){
    var opp=B.results["r1_"+p.from];
    var involvesMe = (p.bye===myWinSeed) || (opp===myWinSeed);
    if(involvesMe){ B.qfWinners[p.bye]=myWinSeed; }
    else { B.qfWinners[p.bye]=cpuGame(p.bye,opp); }
  });
  // SF bracket: (QF from bye1 & bye4) vs (QF from bye2 & bye3) — standard 1/4 , 2/3 halves
  var w1=B.qfWinners[1], w4=B.qfWinners[4], w2=B.qfWinners[2], w3=B.qfWinners[3];
  B._sfPairs=[ {a:w1,b:w4}, {a:w2,b:w3} ];
  // find my SF opponent
  var mine = (B._sfPairs[0].a===myWinSeed||B._sfPairs[0].b===myWinSeed)?0:1;
  var pr=B._sfPairs[mine];
  P._sfOpp = pr.a===myWinSeed?pr.b:pr.a;
  P._sfHalf=mine;
}
function resolveSemifinal(myWinSeed){
  var P=ST.post,B=P.bracket;
  // resolve the other semifinal
  var otherHalf = P._sfHalf===0?1:0;
  var op=B._sfPairs[otherHalf];
  var otherWinner=cpuGame(op.a,op.b);
  B.sfWinners=[]; B.sfWinners[P._sfHalf]=myWinSeed; B.sfWinners[otherHalf]=otherWinner;
  P._champOpp=otherWinner;
}
function resolveRestOfBracket(){
  // best-effort fill so the bracket view shows a full, finished bracket even if you lost
  var P=ST.post,B=P.bracket;
  B.r1.forEach(function(pr,i){ if(B.results["r1_"+i]==null)B.results["r1_"+i]=cpuGame(pr.a,pr.b); });
  if(!B.qfWinners) resolveQuarterfinals(-99);
  var w1=B.qfWinners[1],w4=B.qfWinners[4],w2=B.qfWinners[2],w3=B.qfWinners[3];
  if(!B._sfPairs) B._sfPairs=[{a:w1,b:w4},{a:w2,b:w3}];
  // keep any semifinal already decided (you may have won yours before losing the final)
  if(!B.sfWinners) B.sfWinners=[];
  if(B.sfWinners[0]==null) B.sfWinners[0]=cpuGame(B._sfPairs[0].a,B._sfPairs[0].b);
  if(B.sfWinners[1]==null) B.sfWinners[1]=cpuGame(B._sfPairs[1].a,B._sfPairs[1].b);
  if(B.champWinner==null) B.champWinner=cpuGame(B.sfWinners[0],B.sfWinners[1]);
  P.champion=B.champWinner;
  P.finalChamp=B.champWinner; // legacy alias
  var cf=(P.field||[]).filter(function(x){return x.seed===P.champion;})[0];
  ST.save._natlChampName = cf?cf.name:(ST.save._natlChampName||null); // remember the champ for league history
}

// Play a postseason game through the SAME live-sim machinery
function playPostGame(){
  var s=ST.save, P=ST.post;
  var oppName, oppP, home=true, rName;
  if(P.mode==="bowl"){ oppName=P.opp; oppP=P.op; home=(Math.random()<0.5); rName=P.bowlName; }
  else if(P.mode==="celebration"){
    // Neutral-site title game in Atlanta — no home team.
    oppName=P.opp; oppP=P.op; home=false; rName="Celebration Bowl";
  }
  else if(P.mode==="fcsPlayoff"){
    var fo=myFCSOpponent();
    var fb=P.bracket.bySeed[fo.seed];
    oppName=fb?fb.name:"TBD"; oppP=fb?fb.p:3;
    // FCS playoff rounds are hosted on campus by the better seed; the final is neutral.
    home = (P.round==="champ") ? false : (P.mySeed < fo.seed);
    rName=fcsRoundLabel(P.round);
  }
  else { var o=myNextOpponent(); oppName=P.bracket.bySeed[o.seed].name; oppP=P.bracket.bySeed[o.seed].p; home=(P.round==="r1"&&P.mySeed<o.seed); rName=roundLabel(P.round); }
  var game={opp:oppName, oc:"", op:oppP, home:home};
  var setup=gameSetup(game);
  ST.G=newGameState(setup.us, setup.them);
  ST.G.userGame=true;
  var st=s.tactics||{};
  ST.G.tactics={off:st.off||"balanced", tempo:st.tempo||"normal", def:st.def||"standard"};
  ST.weekResult={us:0,them:0,oppName:oppName,edge:setup.edge,oppDefType:"",off:setup.off,home:home,pbp:[],
                 live:true, gameKey:"post", postseason:true, roundName:rName};
  ST.live={elapsed:0,shownCount:0,done:false,timer:null,quarter:1,paused:false};
  persist();
  ST.screen="live"; draw(); runQuarter();
}
// Called by finishLive when the game was a postseason game
function finishPostGame(){
  var P=ST.post, won=ST._postWon;
  // ── Celebration Bowl: a single title game, not a bracket. Winning it IS the championship
  //    for SWAC/MEAC teams — there is no further round to advance to. ──
  if(P.mode==="celebration"){
    P.done=true; P.result={us:ST.weekResult.us, them:ST.weekResult.them};
    if(won){
      P.champion=true;
      ST.save.titles=(ST.save.titles||0)+1;
      ST.save.celebrationTitles=(ST.save.celebrationTitles||0)+1;
      ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+12);
    }
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  // ── FCS 24-team bracket ──
  if(P.mode==="fcsPlayoff"){
    if(!P.log) P.log=[];
    P.log.push({round:P.round, opp:(ST.weekResult.oppName||"?"),
                result:{us:ST.weekResult.us, them:ST.weekResult.them}});
    advanceFCSPlayoff(won);
    if(P.done && P.champion===P.mySeed){
      ST.save.titles=(ST.save.titles||0)+1;
      ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+15);
    }
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  if(P.mode==="bowl"){
    P.done=true; P.result={us:ST.weekResult.us,them:ST.weekResult.them};
    if(won) ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+5);
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="season"; ST.seasonTab="week"; persist(); draw(); return;
  }
  // playoff — log the round you just played before the bracket advances
  if(!P.log) P.log=[];
  P.log.push({round:P.round, opp:(ST.weekResult.oppName||"?"),
              result:{us:ST.weekResult.us, them:ST.weekResult.them}});
  advancePlayoff(won);
  if(P.done && P.champion===P.mySeed){ ST.save.titles=(ST.save.titles||0)+1; ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+15); }
  ST.weekResult=null; ST.live=null; ST.planPick=null;
  ST.screen="season"; ST.seasonTab="week"; persist(); draw();
}

// A per-position ledger: how many you have, the minimum, and the cap.
// `mode` is "now" or "future" (excludes graduating seniors and cuts).
function rosterLedger(mode, opts){
  opts=opts||{};
  var counts=rosterCounts(mode);
  var short=rosterShortfall(counts);
  var h='<div class="ledger">';
  myPositions().forEach(function(pos){
    var c=counts[pos]; if(!c) return;
    // Big number = how many you HAVE. The sub-line names the bar you're measured
    // against, so "0" and "need 1" can't read as contradicting each other.
    // "thin" = you can start a lineup but have no backup — one injury from trouble.
    var state = c.have<c.min ? "short" : (c.have>=c.cap ? "full" : (c.have===c.min ? "thin" : "ok"));
    var tag = c.have<c.min ? ("need "+(c.min-c.have)+" more")
            : c.have>=c.cap ? "full"
            : c.have===c.min ? "no backup"
            : "+"+(c.cap-c.have)+" room";
    h+='<div class="ldg-cell '+state+'">'+
       '<div class="ldg-pos" style="background:'+posColor(pos)+'">'+pos+'</div>'+
       '<div class="ldg-n">'+c.have+'</div>'+
       '<div class="ldg-sub">'+c.min+' start<span class="ldg-dot">·</span>'+c.cap+' max</div>'+
       '<div class="ldg-tag">'+tag+'</div>'+
       '</div>';
  });
  h+='</div>';
  var open=rosterOpenings(counts);
  var note;
  if(short._total>0){
    note='<b style="color:var(--red2)">'+short._total+' player'+(short._total===1?'':'s')+' short of a full starting lineup.</b> ';
  } else if(open._total>0){
    note='Every position can field its starters. ';
  } else {
    note='<b>Roster is full.</b> Every spot is filled.';
  }
  if(open._total>0 && opts.walkOnNote!==false){
    note+='<b>'+open._total+' open spot'+(open._total===1?'':'s')+'</b> — walk-ons fill whatever is still empty when the portal closes.';
  }
  h+='<div class="ldg-note">'+(opts.prefix||'')+note+'</div>';
  return h;
}

function offseasonScreen(){
  var s=ST.save;
  var win=s.wins, loss=s.losses;
  var bowlWin = win>=7;
  var h='<div class="wrap">';
  h+='<div class="hero" style="text-align:center"><h1>Season '+s.season+' Complete</h1>'+
     '<p><b style="font-size:16px;color:'+(win>loss?"var(--green)":"var(--red2)")+'">'+win+'–'+loss+'</b><br>'+
     (win>=10?"Elite season! 🏆":win>=7?"Bowl-worthy year. 🎉":win>=5?"Respectable campaign.":"Rebuilding year.")+'</p></div>';

  // expectation result
  var met = win>=s.expectWins;
  var diff = win - s.expectWins;
  var resTxt = diff>=2?"Exceeded expectations — the boosters are thrilled.":
               diff>=0?"Met the season's expectation.":
               diff>=-2?"Fell short of expectations. Seat's getting warm.":
               "Badly missed expectations. The AD is not happy.";
  h+='<div class="result-card '+(met?"win":"loss")+'" style="padding:14px">'+
     '<div style="font-size:13px;font-weight:900">'+(met?"✓ ":"✕ ")+win+' wins vs '+s.expectWins+' expected</div>'+
     '<p style="font-size:11px;font-weight:700;color:var(--muted);margin-top:5px">'+resTxt+'</p></div>';

  // ── Where the roster stands, and where it's going ──
  var grads=s.roster.filter(function(p){return p.yr==="SR";}).length;
  var cuts =s.roster.filter(function(p){return p.cut && p.yr!=="SR";}).length;
  var nowN =s.roster.length, futureN=nowN-grads-cuts;
  h+='<div class="sec-title">📋 Roster Outlook</div>';
  h+='<div class="flow-strip">'+
       '<div class="flow-box"><b>'+nowN+'</b><span>Now</span></div>'+
       '<div class="flow-op">−</div>'+
       '<div class="flow-box'+(grads?' out':'')+'"><b>'+grads+'</b><span>Graduating</span></div>'+
       '<div class="flow-op">−</div>'+
       '<div class="flow-box'+(cuts?' out':'')+'"><b>'+cuts+'</b><span>Cut</span></div>'+
       '<div class="flow-op">=</div>'+
       '<div class="flow-box res"><b>'+futureN+'</b><span>Returning</span></div>'+
     '</div>';
  h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 8px;line-height:1.5">Recruits sign on top of this, then the portal opens — players may still transfer out.</div>';
  // recruits sign into these spots BEFORE walk-ons ever arrive, so don't promise walk-ons here
  h+=rosterLedger("future", {walkOnNote:false, prefix:"Counts below exclude graduating seniors and anyone you cut. Your class signs into these spots. "});

  h+='<div class="sec-title">Roster · Manage Cuts</div>';
  h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 8px">Graduating seniors free up their spots automatically. <b>Cut</b> a player to open room for a better signee below.</div>';
  s.roster.slice().sort(function(a,b){return b.ovr-a.ovr;}).forEach(function(p){
    var grad=p.yr==="SR";
    var cut=!!p.cut;
    h+='<div class="roster-row'+(grad?" grad":(cut?" cut":""))+'"><div class="rr-pos">'+p.pos+'</div>'+
       '<div class="rr-name">'+x(p.n)+(p.dev==='elite'?' ⭐':(p.dev==='pro'?' 🔥':''))+'</div>'+
       '<div class="rr-yr">'+(grad?"GRADUATING":(cut?"CUT":p.yr))+'</div><div class="rr-ovr">'+p.ovr+'</div>'+
       (grad?'':'<button class="rr-cut'+(cut?' undo':'')+'" data-cut="'+p.id+'">'+(cut?"Undo":"Cut")+'</button>')+
       '</div>';
  });

  // Recruiting class recap — who committed, and who will actually make the roster (position caps)
  var commits=committedRecruits();
  if(commits.length){
    // simulate the position-cap signing to flag who fits and who's over the limit
    var capFor=function(pos){ return rosterSizeAt(pos); };
    // Only players who will actually still be here next year hold a spot:
    // graduating seniors leave, and anyone you've cut is gone too.
    // Walk-ons don't hold a real spot — a signee displaces one. Don't count them.
    var have={}; s.roster.forEach(function(p){ if(p.yr==="SR"||p.cut||p.walkOn)return; have[p.pos]=(have[p.pos]||0)+1; });
    var sorted=commits.slice().sort(function(a,b){return b.st-a.st||b.ovr-a.ovr;});
    var willSign=0, willCut=0;
    var flags={};
    sorted.forEach(function(b){
      var cap=capFor(b.pos), cur=have[b.pos]||0;
      if(cur<cap){ flags[b.id]="sign"; have[b.pos]=cur+1; willSign++; }
      else { flags[b.id]="cut"; willCut++; }
    });
    h+='<div class="sec-title">🖊️ Recruiting Class <span class="pill">'+willSign+' signing</span></div>';
    var note='These commits sign as freshmen when you advance.';
    if(willCut>0) note+=' <b>'+willCut+'</b> more committed but you\u2019re full at their position — cut a player above to open a spot for one.';
    h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 8px">'+note+'</div>';
    sorted.forEach(function(b){
      var cut=(flags[b.id]==="cut");
      h+='<div class="roster-row"'+(cut?' style="opacity:.5"':'')+'><div class="rr-pos">'+b.pos+'</div>'+
         '<div class="rr-name">'+x(b.n)+' <span class="rec-stars" style="font-size:10px">'+stars(b.st)+'</span></div>'+
         '<div class="rr-yr" style="color:'+(cut?"var(--red2)":"var(--green)")+'">'+(cut?"NO ROOM":"SIGNING")+'</div><div class="rr-ovr">'+b.ovr+'</div></div>';
    });
  } else {
    h+='<div class="sec-title">🖊️ Recruiting Class</div>';
    h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 10px">No commits landed this season. Spend more recruiting points on the <b>Recruit</b> tab during the year to build a class.</div>';
  }

  h+='<button class="btn" id="open-tree" style="width:100%;margin-bottom:8px;padding:11px;font-size:13px;font-weight:900;background:#fff;border:2px solid var(--border);border-radius:11px;box-shadow:3px 3px 0 var(--border)">🌳 Coaching Tree <span class="pill" style="margin-left:6px">'+coachXP()+' XP</span></button>';
  h+='<button class="bigbtn btn-green" id="advance-season">Advance to Season '+(s.season+1)+' →</button>';
  h+='<div style="font-size:10px;font-weight:700;color:var(--muted);text-align:center;margin:8px 2px 0;line-height:1.5">Job offers come every offseason — the better your season, the better the jobs (including <b>Head Coach</b> promotions).</div>';
  h+='<div style="display:flex;gap:8px;margin-top:10px">'+
     '<button class="btn btn-red" id="reset-dynasty" style="flex:1;padding:10px">Reset Dynasty</button>'+
     '</div>';
  return h+'</div>';
}

// Toggle a roster player's "cut" flag in the offseason. Cut players are released
// when you advance, freeing their position spot so a better incoming signee can sign.
function cutPlayer(id){
  var s=ST.save; if(!s||!s.roster)return;
  var p=s.roster.filter(function(r){return r.id===id;})[0];
  if(!p)return;
  if(p.yr==="SR"){ toast("Seniors graduate on their own"); return; }
  if(!p.cut && !p.walkOn){
    // Warn before cutting a projected starter (top of the depth chart at their spot,
    // ignoring seniors/already-cut players who won't be here next year).
    // Walk-ons are exempt — cutting a placeholder never needs a confirmation.
    var pool=depthOrder(s.roster.filter(function(r){return r.yr!=="SR" && !r.cut;}), p.pos);
    var isStarter=pool.slice(0, startersAt(p.pos)).some(function(r){return r.id===p.id;});
    if(isStarter && !confirm("⚠️ "+p.n+" ("+p.pos+", "+p.ovr+" OVR) is a projected starter next season. Cut them anyway?")) return;
  }
  p.cut=!p.cut;
  toast(p.cut ? (x(p.n)+" will be cut") : (x(p.n)+" kept on roster"));
  persist();
  draw();
}

function startDynasty(){
  if(!ST.setup.team){toast("Pick a team");return;}
  var role=ST.setup.role||"OC";
  var carry = ST.save ? {careerWins:ST.save.careerWins,careerLosses:ST.save.careerLosses,titles:ST.save.titles,seasonsPlayed:ST.save.seasonsPlayed,abilities:ST.save.abilities} : null;
  ST.save=newSave(ST.setup.team, role);
  if(carry){ ST.save.careerWins=carry.careerWins; ST.save.careerLosses=carry.careerLosses; ST.save.titles=carry.titles; ST.save.seasonsPlayed=carry.seasonsPlayed; ST.save.abilities=carry.abilities; }
  // make sure the chosen archetype's tier-1 skill is unlocked (carry may have replaced abilities)
  var _ss=archStartSkill(ST.save.archetype);
  if(_ss && ST.save.abilities.indexOf(_ss)<0) ST.save.abilities.push(_ss);
  beginSeasonRecruiting();
  ST.save._recruited=false; ST.save.week=0;
  stampSeasonStart();
  persist();
  enterPreseason();
}
// Initialize a fresh recruiting board + weekly points for a new season
function beginSeasonRecruiting(){
  var s=ST.save;
  s.board=genRecruitBoard(s.prestige);
  s.recruitPtsLeft=weeklyRecruitPoints()+16; s._usedFreeScout=false; // offseason gives a big head-start allotment to scout & build boards
  s._signedThisYear=null;
  resetSeasonStats(); // clear last year's per-season stats (career totals persist)
  var nilRoll = hasAbility("nil5") ? money2(Math.max(0,(s.nilLeft||0))*0.5) : 0; // Collective Empire: carry half of unused NIL
  s.nilTotal=money2(nilBudgetFor()+nilRoll); s.nilLeft=s.nilTotal; // refill the annual NIL budget
  s.roster.forEach(function(p){ p.nilFund=0; }); // retention funding resets each year
  ST.recruitPos="ALL"; // reset the board's position filter
}
// Enter the preseason setup hub before Week 1
function enterPreseason(){
  ST.save._recruited=false;

// Generate a pool of incoming transfers — instant-impact upperclassmen with an NIL price.
function genPortalPool(){
  var s=ST.save, n=rnd(9,14), pool=[];
  var poslist=rolePositions();
  for(var i=0;i<n;i++){
    var pos=pick(poslist);
    var yr=pick(["SO","JR","JR","SR"]);
    var st=weightedStars(s.prestige);
    var ovr=Math.max(64,Math.min(91, recruitOvr(st)+rnd(2,9))); // arrive ready to play, above HS level
    var dev=rollDevByStars(st);
    var pay=POS_PAY[pos]||POS_PAY.LB, tT=Math.max(0,Math.min(1,(ovr-70)/23));
    var price=Math.max(0.15, Math.min(pay[1], money2((pay[0]+(pay[1]-pay[0])*tT)*0.8 + ((dev==="elite"||dev==="pro")?0.3:0))));
    var pool2=FBS_TEAMS.filter(function(t){return t.n!==s.school;});
    pool.push({id:"tp"+Math.random().toString(36).slice(2,7), n:genName(), pos:pos, yr:yr, ovr:ovr, arch:rollArch(pos), dev:dev, pot:rollPotential(ovr,dev), price:price, rival:pick(pool2).n, status:"open"});
  }
  pool.sort(function(a,b){return b.ovr-a.ovr;});
  return pool;
}
function enterPortal(){
  var s=ST.save;
  s._portalPool=genPortalPool();
  s._inPortal=true;
  ST.screen="portal"; ST.editGame=null;
  persist(); draw();
}
function signTransfer(id){
  var s=ST.save, t=(s._portalPool||[]).filter(function(x){return x.id===id;})[0];
  if(!t||t.status!=="open") return;
  if((s.nilLeft||0)<t.price){ toast("Not enough NIL for "+x(t.n)); return; }
  var atPos=s.roster.filter(function(p){return p.pos===t.pos;});
  if(atPos.length>=rosterSizeAt(t.pos)){
    // roster full: replace your weakest at the position if this transfer is an upgrade
    var worst=atPos.slice().sort(function(a,b){return a.ovr-b.ovr;})[0];
    if(worst && worst.ovr < t.ovr){ s.roster=s.roster.filter(function(p){return p.id!==worst.id;}); toast("Cut "+x(worst.n)+" ("+worst.ovr+") to make room"); }
    else { toast("Roster full at "+t.pos+" — and this isn\u2019t an upgrade. Cut someone first."); return; }
  }
  s.nilLeft=money2(s.nilLeft-t.price);
  s.roster.push({id:t.id,n:t.n,pos:t.pos,ovr:t.ovr,yr:t.yr,dev:t.dev,arch:t.arch,pot:t.pot,startOvr:t.ovr,ssOvr:t.ovr,revealed:(!devInfo(t.dev).hidden),nilFund:0});
  t.status="signed";
  s.jobSecurity=Math.min(100,(s.jobSecurity||60)+2); // a portal splash excites the fanbase
  toast("✅ Signed "+x(t.n)+" · "+t.ovr+" OVR "+t.pos);
  // rivals are working the portal too — a top target may commit elsewhere
  var others=(s._portalPool||[]).filter(function(x){return x.status==="open";});
  if(others.length && Math.random()<0.4){ var snipe=others[rnd(0,Math.min(2,others.length-1))]; snipe.status="lost"; }
  persist(); draw();
}
// Pull one of your own out of the portal before he's gone for good.
function retainPlayer(id){
  var s=ST.save, out=s._portalOut||[];
  var d=out.filter(function(o){return (o._p&&o._p.id)===id;})[0];
  if(!d || d.status!=="open") return;
  var price=d.retainPrice||0;
  if((s.nilLeft||0)<price){ toast("Not enough NIL to keep "+x(d.n)); return; }
  if(s.roster.filter(function(p){return p.pos===d.pos;}).length>=rosterSizeAt(d.pos)){
    toast("Roster full at "+d.pos+" — cut someone first."); return;
  }
  s.nilLeft=money2(s.nilLeft-price);
  var p=d._p;
  p.nilFund=money2((p.nilFund||0)+price); // the money he wanted, finally
  s.roster.push(p);
  d.status="retained";
  // win back some of the fan-confidence you lost when he announced
  if(d.ovr>=75 && (s._portalSecHit||0)>0){
    var back=Math.min(s._portalSecHit,4);
    s._portalSecHit-=back; s.jobSecurity=Math.min(100,(s.jobSecurity||60)+back);
  }
  toast("🤝 Kept "+x(p.n)+" · "+p.ovr+" OVR "+p.pos);
  // word travels: another departure may lock in with a rival while you're negotiating
  var others=out.filter(function(o){return o.status==="open";});
  if(others.length && Math.random()<0.35){ others[rnd(0,others.length-1)].status="gone"; }
  persist(); draw();
}
// Scholarship players leave; somebody still has to line up. Any position below its
// minimum gets walk-ons — bottom-of-the-roster bodies with no ceiling. They keep
// you from fielding four offensive linemen, and nothing more.
// Scholarship players leave; somebody still has to line up — and somebody has to
// back them up. Walk-ons fill EVERY empty spot up to the roster cap, not just the
// starting slots: an empty bench is not a roster. They have no ceiling and no
// development, so a roster full of them is a roster in trouble.
function fillWalkOns(){
  var s=ST.save;
  var open=rosterOpenings(rosterCounts("now"));
  if(!open._total){ s._walkOns=null; return 0; }
  var added=[];
  myPositions().forEach(function(pos){
    var need=open[pos]||0;
    var starters=startersAt(pos);
    var have=(s.roster||[]).filter(function(p){return p.pos===pos;}).length;
    for(var i=0;i<need;i++){
      // the ones forced into the starting lineup are marginally better than the
      // bodies at the very bottom of the two-deep
      var slot=have+i;                    // 0-indexed depth this walk-on will occupy
      var ovr=(slot<starters)?rnd(55,62):rnd(50,57);
      var p=genPlayerAt(pos, ovr, pick(["FR","FR","SO"]));
      p.walkOn=true;
      p.dev="bust";                       // no development upside
      p.pot=Math.min(p.pot, p.ovr+rnd(1,4));
      p.revealed=true;                    // nothing to discover
      s.roster.push(p);
      added.push(p);
    }
  });
  var wseed={}; s.roster.forEach(function(p){ if(added.indexOf(p)<0) wseed[p.n]=1; });
  dedupeNames(added, wseed);   // walk-ons don't duplicate anyone already on the roster
  s._walkOns=added.map(function(p){ return {n:p.n, pos:p.pos, ovr:p.ovr}; });
  if(added.length) toast("🚶 "+added.length+" walk-on"+(added.length===1?"":"s")+" added to fill the roster");
  return added.length;
}
function finishPortal(){
  ST.save._inPortal=false;
  fillWalkOns();      // last stop before preseason — after every departure and signing
  persist();
  enterPreseason();
}

// ── Player stats (Phase 3) ───────────────────────────────
// Box scores are SYNTHESIZED from the final score + your scheme + starter archetypes +
// depth chart. They're internally consistent (TDs sum to the score) and feel right.
function ensureStats(p){ if(!p.stats)p.stats={season:{},career:{}}; if(!p.gamelog)p.gamelog=[]; }
function addStat(p, obj){
  ensureStats(p);
  Object.keys(obj).forEach(function(k){
    p.stats.season[k]=(p.stats.season[k]||0)+obj[k];
    p.stats.career[k]=(p.stats.career[k]||0)+obj[k];
  });
}
function logGame(p, opp, line){ ensureStats(p); p.gamelog.push({wk:ST.save.week+1, opp:opp, line:line}); }
function _norm(w){ var t=w.reduce(function(a,b){return a+b;},0)||1; return w.map(function(x){return x/t;}); }
function _apportion(total, fracs){ var o=fracs.map(function(f){return Math.max(0,Math.round(total*f));}); var d=total-o.reduce(function(a,b){return a+b;},0); if(o.length)o[0]=Math.max(0,o[0]+d); return o; }
// Turn points allowed into a defensive box score across your starters.
// `oppStats` is the opposing offense's real per-play totals from the drive engine:
// the sacks they took are ours, the passes they threw away are our takeaways.
function genDefenseBox(ptsAllowed, opp, driveStats){
  var s=ST.save, sc=defScheme();
  var top=function(pos,n){ return depthOrder(s.roster,pos).slice(0,n); };
  var o=(driveStats && driveStats[1]) ? driveStats[1] : null;
  var perf=Math.max(0,Math.min(1,(30-ptsAllowed)/30));
  // Real counts where the engine has them; estimates only where it doesn't model the event.
  var totTkl = o ? Math.max(30, Math.round(o.plays*0.78)) : rnd(52,66);
  var sacks  = o ? o.sacks : Math.max(0,Math.round(1+perf*3+(sc.lean>60?1:0)+(Math.random()<0.5?1:0)));
  var ints   = o ? o.ints  : ((Math.random()<(0.22+perf*0.5))?rnd(1,2):0);
  var fums   = o ? o.fums  : 0;
  // TFLs and PBUs aren't modelled play-by-play; scale them to real activity.
  var tfls = sacks + (o ? Math.round(o.plays*0.05) : rnd(3,7));
  var pbus = o ? Math.max(1, Math.round((o.att-o.comp)*0.35)) : rnd(2,6);
  var groups=[
    {pos:"LB",tkl:1.5,sack:sc.lean>55?0.8:0.4,int:0.4,tfl:1.0,pbu:0.4},
    {pos:"S", tkl:1.1,sack:0.1,int:1.0,tfl:0.3,pbu:0.9},
    {pos:"CB",tkl:0.7,sack:0.1,int:1.2,tfl:0.2,pbu:1.6},
    {pos:"DL",tkl:0.9,sack:2.2,int:0.05,tfl:1.6,pbu:0.2}
  ];
  var players=[],tW=[],sW=[],iW=[],fW=[],pW=[];
  groups.forEach(function(gr){
    top(gr.pos,startersAt(gr.pos)).forEach(function(p){
      players.push(p);
      var am=(p.arch==="Pass Rusher")?1.6:1, bh=(p.arch==="Ball-Hawk")?1.7:1, th=(p.arch==="Thumper")?1.4:1, bz=(p.arch==="Blitzer")?1.5:1;
      tW.push(gr.tkl*th); sW.push(gr.sack*am*bz); iW.push(gr.int*bh); fW.push(gr.tfl*am); pW.push(gr.pbu);
    });
  });
  if(!players.length) return;
  var tA=_apportion(totTkl,_norm(tW)),sA=_apportion(sacks,_norm(sW)),fA=_apportion(tfls,_norm(fW)),iA=_apportion(ints,_norm(iW)),pA=_apportion(pbus,_norm(pW)),uA=_apportion(fums,_norm(fW));
  players.forEach(function(p,i){
    addStat(p,{tkl:tA[i],sack:sA[i],tfl:fA[i],dint:iA[i],pbu:pA[i],ff:uA[i],g:1});
    var parts=[tA[i]+" tkl"]; if(sA[i])parts.push(sA[i]+" sack"); if(fA[i])parts.push(fA[i]+" TFL"); if(iA[i])parts.push(iA[i]+" INT"); if(uA[i])parts.push(uA[i]+" FF"); if(pA[i])parts.push(pA[i]+" PBU");
    logGame(p,opp,parts.join(", "));
  });
}
// Generate + record a game's box score for the unit(s) you coach.
// Build the box score from the plays that actually happened.
// The play-by-play and the stat line are now two views of one event stream.
function recordGameStats(res, opp, pbp){
  var s=ST.save;
  if(s.role==="OC"||s.role==="HC") boxFromPlays(pbp, opp);
  if(s.role==="DC"||s.role==="HC") genDefenseBox(res.them, opp, res.driveStats);
}
// Accumulate per-player offensive stats by walking our own snaps.
// Tally per-player offensive stats from a play-by-play. PURE — mutates nothing.
// Used both for the final box score and for the live stats tab, which passes only
// the plays revealed so far so it never spoils what hasn't been shown.
function tallyFromPlays(pbp){
  var acc={}, order=[];
  function bucket(pl){
    if(!pl) return null;
    if(!acc[pl.id]){ acc[pl.id]={p:pl, pa:0,pc:0,py:0,ptd:0,pint:0, rc:0,ry:0,rtd:0, rec:0,recy:0,rectd:0}; order.push(pl.id); }
    return acc[pl.id];
  }
  (pbp||[]).forEach(function(e){
    if(e.team!=="us" || e.scoring) return;   // scoring rows carry no snap data
    // Only bucket a player a branch will actually credit. Bucketing up front used
    // to create empty entries on SACK rows (no branch handles them), which then
    // credited a "game played" to a receiver who never touched the ball.
    if(e.kind==="RUN" || e.kind==="FUM"){
      var ball=bucket(e.ballP);
      if(ball){ ball.rc++; ball.ry+=e.yards; if(e.scored && e.kind==="RUN") ball.rtd++; }
    } else if(e.kind==="PASS"){
      var qb=bucket(e.qbP), tgt=bucket(e.ballP);
      if(qb){ qb.pa++; qb.pc++; qb.py+=e.yards; if(e.scored) qb.ptd++; }
      if(tgt && tgt!==qb){ tgt.rec++; tgt.recy+=e.yards; if(e.scored) tgt.rectd++; }
    } else if(e.kind==="INC"){
      var q2=bucket(e.qbP); if(q2) q2.pa++;
    } else if(e.kind==="INT"){
      var q3=bucket(e.qbP); if(q3){ q3.pa++; q3.pint++; }
    }
    // SACK / PUNT / FGA: nobody is credited, so nobody is bucketed
  });
  return {acc:acc, order:order};
}
// Team stats derived from the plays REVEALED so far, for both sides. G.stats holds
// the finished game, so using it live would spoil a score you haven't watched yet.
function teamStatsFromPlays(pbp){
  function blank(){ return {plays:0,rushYds:0,passYds:0,comp:0,att:0,sacks:0,
    ints:0,fums:0,punts:0,fga:0,fgm:0,thirdAtt:0,thirdConv:0,pts:0}; }
  var t={us:blank(), them:blank()};
  (pbp||[]).forEach(function(e){
    var s=t[e.team];
    if(e.scoring){ s.pts+=e.pts; if(e.kind==="FG")s.fgm++; return; }
    if(e.kind==="FGA"){ s.fga++; return; }
    if(e.kind==="PUNT"){ s.punts++; return; }
    s.plays++;
    if(e.down===3){ s.thirdAtt++; if(e.firstDown) s.thirdConv++; }
    if(e.kind==="RUN"||e.kind==="FUM"){ s.rushYds+=e.yards; if(e.kind==="FUM")s.fums++; }
    else if(e.kind==="SACK"){ s.sacks++; s.passYds+=e.yards; }   // sacks are not attempts
    else if(e.kind==="INT"){ s.att++; s.ints++; }
    else if(e.kind==="INC"){ s.att++; }
    else if(e.kind==="PASS"){ s.att++; s.comp++; s.passYds+=e.yards; }
  });
  return t;
}
// The Stats tab: a team comparison, then your own players' box score. Everything
// is derived from `revealed` — the plays actually shown — so a live box score
// never gets ahead of the play-by-play.
function liveStatsPanel(revealed){
  var T=teamStatsFromPlays(revealed);
  var usName=abbr(ST.save.school), themName=abbr(ST.weekResult.oppName);
  if(!revealed || !revealed.length){
    return '<div class="ls-empty">No plays yet — stats appear as the game unfolds.</div>';
  }
  function yds(s){ return s.rushYds+s.passYds; }
  function third(s){ return s.thirdAtt ? (s.thirdConv+"/"+s.thirdAtt) : "0/0"; }
  function cmp(s){ return s.att ? (s.comp+"/"+s.att) : "0/0"; }
  // higher is better for all of these except turnovers
  var rows=[
    ["Points",      T.us.pts,        T.them.pts,       1],
    ["Total Yards", yds(T.us),       yds(T.them),      1],
    ["Rushing",     T.us.rushYds,    T.them.rushYds,   1],
    ["Passing",     T.us.passYds,    T.them.passYds,   1],
    ["Passing C/A", cmp(T.us),       cmp(T.them),      0],
    ["Plays",       T.us.plays,      T.them.plays,     0],
    ["3rd Down",    third(T.us),     third(T.them),    0],
    ["Sacks Taken", T.us.sacks,      T.them.sacks,    -1],
    ["Turnovers",   T.us.ints+T.us.fums, T.them.ints+T.them.fums, -1],
    ["Punts",       T.us.punts,      T.them.punts,     0]
  ];
  var h='<div class="ls-wrap">';
  h+='<div class="ls-hd"><span class="ls-team">'+x(usName)+'</span>'+
     '<span class="ls-mid">TEAM</span><span class="ls-team">'+x(themName)+'</span></div>';
  rows.forEach(function(r){
    var a=r[1], b=r[2], dir=r[3];
    var lead="", trail="";
    if(dir!==0 && typeof a==="number"){
      if(a!==b){ var usBetter=(dir>0)?(a>b):(a<b); if(usBetter)lead="win"; else trail="win"; }
    }
    h+='<div class="ls-row"><span class="ls-v '+lead+'">'+a+'</span>'+
       '<span class="ls-l">'+r[0]+'</span>'+
       '<span class="ls-v '+trail+'">'+b+'</span></div>';
  });
  h+='</div>';

  // your players

function boxFromPlays(pbp, opp){

    if(a.rc){ st.rc=a.rc; st.ry=a.ry; st.rtd=a.rtd; }
    if(a.rec){ st.rec=a.rec; st.recy=a.recy; st.rectd=a.rectd; }

function _n(v){ return v||0; }
function _rate(a,b,dp){ if(!b) return "—"; var v=a/b; return v.toFixed(dp==null?1:dp); }
function _pct(a,b){ if(!b) return "—"; return Math.round(100*a/b)+"%"; }
// Passer rating (NCAA formula) — the one number that summarizes a QB's season.
function passerRating(st){
  var a=_n(st.pa); if(!a) return null;
  var v=(8.4*_n(st.py) + 330*_n(st.ptd) - 200*_n(st.pint) + 100*_n(st.pc))/a;
  return Math.round(v*10)/10;

// The 3-4 numbers that define this player's line, shown as big cards.
function statHeadline(st){

    cards.push([_pct(_n(st.pc),_n(st.pa)), "Comp %"]);
