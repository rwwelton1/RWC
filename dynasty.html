// ── Season-long recruiting tab ───────────────────────────
// ── NIL (real football $, anchored to public NIL trackers) ─────────────────
// Football-only NIL budget in $millions, by program prestige, +facilities +last wins.
// Anchors: elite ≈ $40M (Texas), solid P4 ≈ $11M (Wake), top G5 ≈ $11M (USF), G5 ≈ $4M (Tulsa).
// Annual NIL collective pool, in $M, by prestige. FBS and FCS are entirely different
// markets: an elite FCS collective (Montana, South Dakota State) runs ~$2M, while the
// smallest ones scrape together ~$250K. A blue-blood FBS program clears $30M+. Prestige
// is scaled WITHIN a subdivision, so an FCS 5-star must never draw an FBS 5-star's pool.
var NIL_BASE={1:4, 2:8, 3:12, 4:22, 5:36};                      // FBS: $4M → $36M
var NIL_BASE_FCS={1:0.25, 2:0.5, 3:0.75, 4:1.4, 5:2.2};         // FCS: $250K → $2.2M
function nilBaseFor(prestige, conf){
  var tbl = isFCSConf(conf) ? NIL_BASE_FCS : NIL_BASE;
  return tbl[prestige] || (isFCSConf(conf) ? 0.5 : 8);
}
// Everything downstream (facility bonuses, win bonuses, per-recruit caps, player demands)
// is expressed as a FRACTION of the elite pool for that subdivision, so the whole economy
// rescales together instead of a maxed facility dwarfing an FCS budget.
function nilElitePool(){ return isFCSConf(ST.save.conf) ? NIL_BASE_FCS[5] : NIL_BASE[5]; }
// Position value weights — the NIL market pays QBs the most, then premium skill/pass-rush/corner.
var NIL_POS_W={QB:1.9, WR:1.2, CB:1.15, DL:1.15, RB:1.05, S:0.95, LB:0.95, OL:0.9, TE:0.85};
// Per-position annual pay bands ($M) at a P4-elite scale: [starterLo, starterHi, depthLo, depthHi].
// Everything scales down by program NIL pool (a G6 pays a fraction of these).
var POS_PAY={
  QB:[1.5,3.5,0.05,0.10], WR:[0.8,2.0,0.025,0.05], DL:[0.7,1.7,0.02,0.04],
  OL:[0.4,1.0,0.015,0.03], RB:[0.4,1.0,0.015,0.03], CB:[0.4,1.0,0.015,0.03],
  S:[0.3,1.0,0.015,0.03], TE:[0.3,0.8,0.015,0.03], LB:[0.3,0.7,0.015,0.03]
};
function fmtMoney(m){ m=m||0; if(m>=1) return "$"+(Math.round(m*10)/10)+"M"; if(m>0.0001) return "$"+Math.round(m*1000)+"K"; return "$0"; }
function money2(m){ return Math.round((m||0)*100)/100; } // avoid float drift
// Season NIL budget multiplier from the NIL coaching branch (stacks).
function nilPerkBudgetMult(){
  var m=1;
  if(hasAbility("nil1")) m+=0.20;   // Booster Club
  if(hasAbility("nil4")) m+=0.35;   // Blank Check
  if(hasAbility("nil5")) m+=0.50;   // Collective Empire
  return m;
}
// Per-recruit NIL offer caps — Blank Check lets you go much bigger on one target.
// Caps on what you may commit to ONE recruit, and to the recruiting class overall.
// These were flat ($8M / $15M), which is larger than an entire FCS collective — the cap
// would never bind and an FCS coach could offer a recruit 4x his whole budget. Expressing
// them as a share of your own pool keeps the constraint meaningful at every level.
//
// The percentages are reverse-engineered from the old flat caps at the case they were tuned
// for (a head coach at an elite FBS program: $8M/$36M = 22%, $15M/$36M = 42%), so that
// scenario is unchanged. Everywhere else the flat cap was simply non-binding.
function nilRecruitCap(){
  var pool=Math.max(0.01, nilBudgetFor());
  var big=hasAbility("nil4");                       // Blank Check
  return { per:   money2(pool * (big?0.34:0.23)),   // one recruit: ~23% of the pool (34% w/ perk)
           total: money2(pool * (big?0.67:0.42)) }; // whole class: ~42% (67% w/ perk)
}
// ═════════════════════════════════════════════════════════
// THE BOARD PLEDGE
// Before the season you sit down with the board and tell them what you're going to do. Promise
// little and they'll fund you like it. Promise the moon and the collective opens up — but if you
// miss, they remember exactly what you said. Ambition is bought with your job.
// ═════════════════════════════════════════════════════════
// ── COMPOSE YOUR OWN PROMISE ──────────────────────────────
// A fixed ladder of five bundles was the wrong shape: "Contend" forced 11 wins AND the playoff AND
// a big class, take it or leave it. You now build the promise yourself, one goal at a time. Each
// goal carries an AMBITION cost; the total decides your NIL budget. And because each goal is
// separate, the board judges you on each of them separately — hit two of three and you're fine.
// THE FLOOR. You cannot promise the board less than it already expects. Six wins at Alabama isn't
// "playing it safe" — it's a firing. The lowest rung of every slot IS the baseline expectation for
// the job you took, and hitting it earns you almost nothing, because it's the least they'll accept.
function winsSlot(){
  var s=ST.save, floor=expectWinsFor(s.prestige, s.conf);
  var games=(s.schedule||[]).length||12;
  var opts=[];
  [0,1,2,3,4].forEach(function(step){
    var w=Math.max(2, Math.min(games, floor+step));
    opts.push({v:w, amb:step, t:w+"+ wins"});
  });
  var seen={}, out=[];
  opts.forEach(function(o){ if(!seen[o.v]){ seen[o.v]=1; out.push(o); } });
  return out;
}
function postSlot(){
  var s=ST.save, fcs=(myDivision()==="FCS");
  var all=[
    {v:null,       amb:0, t:"No postseason promise"},
    {v:"bowl",     amb:1, t:fcs?"Make the FCS playoff":"Reach a bowl game"},
    {v:"playoff",  amb:2, t:fcs?"Reach the quarterfinals":"Make the Playoff (top 12)"},
    {v:"semis",    amb:3, t:"Reach the semifinals"},
    {v:"title",    amb:5, t:"Win the national title"}
  ];
  // At a program with real expectations, "we might not play in January" isn't on the table.
  var floorIdx = (s.prestige>=5) ? 2 : (s.prestige>=4) ? 1 : 0;
  return all.slice(floorIdx).map(function(o,i){ return {v:o.v, amb:i, t:o.t}; });
}
function progSlot(){
  var s=ST.save, bg=buildGoalFor(s.prestige, s.conf);
  var star=bg.star||3, n=bg.n||2;
  var mk=function(st,cnt,amb){ return {v:{key:"recruit",star:st,n:cnt}, amb:amb,
    t:(cnt>1?("Sign "+cnt+" "+st+"★ recruits"):("Sign a "+st+"★ recruit"))}; };
  // The ladder must MONOTONICALLY escalate. Raise the star tier until it caps at 5★, then start
  // asking for more of them. (It previously offered "a 5★" as MORE ambitious than "2 5★", and
  // repeated itself — a ladder that went sideways and then backwards.)
  var out=[{v:null, amb:0, t:"No recruiting promise"}];
  var rungs=[[Math.max(2,star-1), n], [star, n], [Math.min(5,star+1), n], [Math.min(5,star+1), n+1]];
  var seen={}, amb=1;
  rungs.forEach(function(r){
    var st=r[0], cnt=r[1], key=st+"x"+cnt;
    if(seen[key]){ cnt=cnt+1; key=st+"x"+cnt; }   // star tier is capped — ask for one more instead
    if(seen[key]) return;
    seen[key]=1;
    out.push(mk(st,cnt,amb++));
  });
  return out;
}
// Your promise = one pick from each slot. Defaults to something reasonable.
function pledge(){
  var s=ST.save;
  s.pl=s.pl||{};
  var W=winsSlot(), P=postSlot(), G=progSlot();
  var w = W.filter(function(o){return o.v===s.pl.wins;})[0] || W[1] || W[0];
  var p = P.filter(function(o){return o.v===s.pl.post;})[0] || P[1];
  var g = G.filter(function(o){return o.t===s.pl.prog;})[0] || G[2];
  // THE CAP HAS TO BITE. Blocking new selections wasn't enough: a coach who'd already promised the
  // moon simply KEPT that promise year after year while his credibility collapsed. If your word is
  // no longer worth what you're claiming, the board walks the promise back for you — the biggest
  // claims go first (a title run from a man who's never won one), then the class, then the wins.
  if(!s._pledgeLocked){
    var cap=maxAmbAllowed();
    var guard=0;
    while(w.amb+p.amb+g.amb > cap && guard++ < 20){
      if(p.amb>0 && p.amb>=g.amb && p.amb>=w.amb){ p=P[Math.max(0, P.indexOf(p)-1)]; continue; }
      if(g.amb>0 && g.amb>=w.amb){ g=G[Math.max(0, G.indexOf(g)-1)]; continue; }
      if(w.amb>0){ w=W[Math.max(0, W.indexOf(w)-1)]; continue; }
      break;
    }
    s.pl.wins=w.v; s.pl.post=p.v; s.pl.prog=g.t;
  }
  return {w:w, p:p, g:g, amb:(w.amb+p.amb+g.amb)};
}
// ── BOARD TRUST ───────────────────────────────────────────
// Without this you could promise the moon EVERY year, take the money, fail, and promise it again.
// The board remembers. Trust is your credibility: deliver and they'll bankroll whatever you say
// next; keep over-promising and they stop writing the cheque, no matter what you claim you'll do.
// Crucially it discounts the AMBITION PREMIUM, not your base budget — so a liar still gets funded
// like the coach he actually is, he just can't sell the moon twice.
function boardTrust(){
  var t=ST.save && ST.save.boardTrust;
  return (t==null) ? 55 : Math.max(0, Math.min(100, t));
}
function trustBand(){
  var t=boardTrust();
  if(t>=80) return {t:"Total faith",  c:"#1a7f37", d:"They'll bankroll anything you say."};
  if(t>=60) return {t:"Trusted",      c:"var(--gold-dark)", d:"Your word carries weight."};
  if(t>=40) return {t:"Wary",         c:"var(--gold-dark)", d:"They've been burned before."};
  if(t>=20) return {t:"Sceptical",    c:"#e8944a", d:"They've heard this from you already."};
  return {t:"They don't believe you", c:"var(--red2)", d:"Promise what you like — the money isn't coming."};
}
// How much of the ambition premium the board is actually willing to fund.
function trustFactor(){ return 0.25 + (boardTrust()/100)*1.15; }   // 0.25x at zero, 1.4x at full faith
// Somebody who's never delivered can't sell a title run.
function maxAmbAllowed(){
  var t=boardTrust();
  if(t>=60) return 99;
  if(t>=40) return 9;
  if(t>=20) return 6;
  return 3;                      // they'll fund a rebuild and nothing more
}
// Ambition (0–13) buys money. Promise nothing and they fund you like it.
function pledgeNilMult(){ return 0.70 + pledge().amb*0.12*trustFactor(); }
// What each goal is worth, and what it costs you to miss it.
// Hitting the floor at a blue-blood earns almost nothing — it's the least they'll accept. Missing
// it is a different matter entirely: the bigger the job, the further the fall.
function goalStakes(amb){
  var pres=(ST.save && ST.save.prestige) || 3;
  var weight=(pres-1)*3;                    // the price of the chair you sit in
  return {win: 2+amb*2, miss: -(2 + amb*4 + weight)};
}
function pledgeLabel(){
  var a=pledge().amb;
  if(a<=2)  return "Play it safe";
  if(a<=5)  return "Compete";
  if(a<=8)  return "Contend";
  if(a<=11) return "Go for it";
  return "Promise the moon";
}
function setGoal(slot, idx){
  var s=ST.save;
  if(s._pledgeLocked){ toast("The season's under way — the board has your word."); return; }
  s.pl=s.pl||{};
  // Try it and see: if it pushes you past what your credibility can carry, they won't hear it.
  var trial={wins:s.pl.wins, post:s.pl.post, prog:s.pl.prog};
  if(slot==="wins") trial.wins=winsSlot()[idx].v;
  if(slot==="post") trial.post=postSlot()[idx].v;
  if(slot==="prog") trial.prog=progSlot()[idx].t;
  var W=winsSlot(), P=postSlot(), G=progSlot();
  var tw=(W.filter(function(o){return o.v===trial.wins;})[0]||W[1]||W[0]).amb;
  var tp=(P.filter(function(o){return o.v===trial.post;})[0]||P[1]).amb;
  var tg=(G.filter(function(o){return o.t===trial.prog;})[0]||G[2]).amb;
  if(tw+tp+tg > maxAmbAllowed()){
    toast("🧊 "+trustBand().t+" — the board won't hear a promise that big from you.");
    return;
  }
  if(slot==="wins") s.pl.wins=winsSlot()[idx].v;
  if(slot==="post") s.pl.post=postSlot()[idx].v;
  if(slot==="prog") s.pl.prog=progSlot()[idx].t;
  var pl=pledge();
  s.expectWins=pl.w.v;                 // ONE win target everything else reads
  s.nilTotal=nilBudgetFor();
  s.nilLeft=s.nilTotal;                // preseason — nothing spent yet
  persist(); draw();
}
// How far you ACTUALLY got, on the promise's own ladder.
var PLEDGE_RANK={bowl:1, playoff:2, semis:4, title:5};
function pledgeLadder(){
  var P=ST.post, s=ST.save;
  if(s._wonNatlThisYear) return 5;
  if(!P || P.mode==="none") return 0;
  if(P.mode==="bowl" || P.mode==="celebration") return 1;
  if(P.mode!=="playoff" && P.mode!=="fcsPlayoff") return 0;
  if(P.champion!=null && P.champion===P.mySeed) return 5;
  var R={r1:2, r2:2, qf:3, sf:4, champ:5};
  return Math.max(2, R[P.round]||2);
}
function pledgeMet(){
  var g=seasonGoals();
  return g.every(function(x){ return x.met; });
}
// Settle up — GOAL BY GOAL. Hit two of three and you're rewarded for two of three.
function settlePledge(){
  var s=ST.save;
  if(s._pledgeSettled) return;
  var pl=pledge(), gs=seasonGoals();
  var ambs=[pl.w.amb, pl.p.amb, pl.g.amb];
  var delta=0, xp=0, hit=0;
  gs.forEach(function(g,i){
    var st=goalStakes(ambs[i]||0);
    if(ambs[i]===0 && !g.label) return;
    if(g.met){ delta+=st.win; xp+=Math.max(1, Math.round(ambs[i]*1.2)); hit++; return; }
    var miss=st.miss;
    // HOW BADLY you missed matters. Falling one win short of your promise is a disappointment;
    // falling six short is a collapse — and they were being scored identically.
    if(g.key==="wins"){
      var shortBy=Math.max(0, pl.w.v - (s.wins||0));
      miss = Math.round(miss * (1 + Math.max(0, shortBy-1)*0.30));
    }
    delta+=miss;
  });
  s.jobSecurity=Math.max(0, Math.min(100,(s.jobSecurity||50)+delta));
  if(xp>0) awardCoachXP(xp, "delivered on the board's goals");
  // ── Your credibility with the board ──
  // Delivering on a BOLD promise is what earns real faith. Missing a bold one is what destroys it —
  // and a coach who promises little and delivers it barely moves the needle either way.
  var amb=pl.amb, share=(gs.length?hit/gs.length:0);
  var tDelta;
  if(share>=1)      tDelta = 6 + Math.round(amb*1.4);      // said it, did it
  else if(share>=0.67) tDelta = 2 + Math.round(amb*0.3);
  else if(share>=0.34) tDelta = -4 - Math.round(amb*0.8);
  else                 tDelta = -10 - Math.round(amb*1.6); // sold them a dream and delivered nothing
  var was=boardTrust();
  s.boardTrust=Math.max(0, Math.min(100, was + tDelta));
  s._pledgeTrust={was:was, now:s.boardTrust, d:tDelta};
  if(tDelta<=-10) toast("🧊 The board has heard it before. Trust "+was+" → "+s.boardTrust+".");
  else if(tDelta>=10) toast("🤝 You said it and you did it. Board trust "+was+" → "+s.boardTrust+".");
  var pts=[];
  gs.forEach(function(g,i){
    var st=goalStakes(ambs[i]||0);
    if(g.met){ pts.push(st.win); return; }
    var m=st.miss;
    if(g.key==="wins"){
      var sb=Math.max(0, pl.w.v-(s.wins||0));
      m=Math.round(m*(1+Math.max(0,sb-1)*0.30));
    }
    pts.push(m);
  });
  s._pledgeResult={label:pledgeLabel(), hit:hit, of:gs.length, delta:delta,
                   goals:gs.map(function(g,i){ return {label:g.label, met:g.met, amb:ambs[i]||0, pts:pts[i]}; })};
  toast(hit===gs.length ? ("🤝 You delivered on all "+gs.length+". +"+delta+" job security.")
      : hit===0         ? ("📉 You promised "+pledgeLabel().toLowerCase()+" and delivered nothing. "+delta+" job security.")
                        : ("🤝 "+hit+" of "+gs.length+" delivered. "+(delta>=0?"+":"")+delta+" job security."));
  s._pledgeSettled=true;
}
function nilBudgetFor(){
  var s=ST.save;
  var base=nilBaseFor(s.prestige, s.conf);
  // Facility and win bonuses used to be flat $M, which is meaningless at FCS scale — a maxed
  // NIL facility (+$6M) was 3x Montana's entire collective. Express them as a share of the
  // elite pool instead: the same upgrade is worth the same PROPORTION in either subdivision.
  var elite=nilElitePool();
  var bonus=(facLvl("nil")*0.0555 + facLvl("stadium")*0.0278 + (s._lastWins||0)*0.0111) * elite;
  var pool=(base + bonus) * nilPerkBudgetMult() * pledgeNilMult();   // ambition buys money
  return money2(pool * (s.role==="HC"?1:0.5)); // OC/DC control only their unit's share of the collective
}
// A rough "production" score from a player's season stats — productive players get noticed.
// ── PRODUCTION vs EXPECTATION ─────────────────────────────
// What SHOULD a player of his position and rating be putting up? Deterministic mirror of the
// numbers the engine actually produces (the same curve the CPU stars use), so we can ask the only
// question that matters for development: is he outplaying his rating?
function expectedSeason(pos, ovr, g){
  var q=(ovr||70)-70, sc=function(v){ return Math.max(0, v*(g||12)/12); };
  if(pos==="QB") return {py:sc(2600+q*25), ptd:sc((2600+q*25)/150)};
  if(pos==="RB") return {ry:sc(1050+q*20), rtd:sc((1050+q*20)/110)};
  if(pos==="WR") return {recy:sc(850+q*18)};
  if(pos==="TE") return {recy:sc(430+q*12)};
  if(pos==="DL") return {sack:sc(8+q*0.18), tkl:sc(45+q*1.0)};
  if(pos==="LB") return {tkl:sc(80+q*1.6), sack:sc(3+q*0.15)};
  if(pos==="CB"||pos==="S") return {dint:sc(5+q*0.30), tkl:sc(48+q*0.9)};
  return {};   // OL has no box score — he can't break out on production, only on snaps
}
// 1.0 = exactly what a player of his rating should do. 2.0 = he's twice the player the number says.
function prodIndex(p){
  var st=(p.stats&&p.stats.season)||{};
  var g=st.g||0;
  if(g<3) return 1;                       // too small a sample to mean anything
  var e=expectedSeason(p.pos, p.ovr, g);
  var keys=Object.keys(e);
  if(!keys.length) return 1;
  var act=0, exp=0;
  keys.forEach(function(k){
    if(!e[k] || e[k]<=0) return;
    act += (st[k]||0)/e[k];               // ratio per category, so yards and sacks weigh alike
    exp += 1;
  });
  if(!exp) return 1;
  return clampN(act/exp, 0.35, 2.6);
}
function prodScore(p){
  var st=(p.stats&&p.stats.season)||{}, v=0;
  v+=(st.py||0)/320 + (st.ptd||0)*0.7;                      // passing
  v+=(st.ry||0)/230 + (st.rtd||0)*0.9;                      // rushing
  v+=(st.recy||0)/230 + (st.rectd||0)*0.9;                  // receiving
  v+=(st.tkl||0)/20 + (st.sack||0)*1.0 + (st.dint||0)*1.4;  // defense
  return v;
}
// What a player is worth to keep, in $M — anchored to the position pay bands, scaled by your
// program's NIL pool. A P4 starting QB lands in the $1.5–3.5M band; the same player at a G6
// (much smaller pool) commands a fraction, matching public NIL trackers.
function nilDemand(p){
  if(!p || p.ovr<66) return 0;
  var pay=POS_PAY[p.pos]||POS_PAY.LB;
  // TWO separate scalings, which were previously conflated:
  //   poolF       — how rich YOU are relative to the best program in YOUR subdivision.
  //                 A 1-star FCS program pays less than Montana, just as UMass pays less
  //                 than Alabama. Ranges ~0.1 → 1.15.
  //   marketScale — how big your subdivision's market is at all. POS_PAY is denominated in
  //                 FBS dollars (a starting QB commands $1.5M–$3.5M); the FCS market is
  //                 ~16x smaller, so the same player asks for ~$150K, not $2.5M.
  var elite=nilElitePool();
  var roleShare=(ST.save.role==="HC"?1:0.5);
  var poolF=Math.max(0.1, Math.min(1.15, nilBudgetFor()/(elite*roleShare)));
  var marketScale=elite/NIL_BASE[5];                            // FBS = 1.0, FCS ≈ 0.061
  var d;
  if(isStarterPlayer(p)){
    var tT=Math.max(0,Math.min(1,(p.ovr-70)/23));               // 70→band floor, 93→band ceiling
    d=(pay[0]+(pay[1]-pay[0])*tT)*poolF;
  } else {
    var bT=Math.max(0,Math.min(1,(p.ovr-62)/20));
    d=(pay[2]+(pay[3]-pay[2])*bT)*(0.5+poolF*0.5);              // depth deals are less pool-sensitive
  }
  if(p.dev==="elite") d*=1.15; else if(p.dev==="pro") d*=1.08;  // ascending stars cost more
  // Who he IS changes the price as much as how good he is.
  if(p.pers==="diva")    d*=1.55;   // he knows exactly what he's worth, and then some
  if(p.pers==="loyal")   d*=0.62;   // he'd play here for nothing
  if(p.pers==="problem") d*=1.25;
  if(p.pers==="leader")  d*=0.90;
  d+=Math.min(0.5, prodScore(p)*0.05);                          // production nudges toward the top of the band
  d*=marketScale;                                               // convert FBS dollars to this subdivision's market
  if(hasAbility("nil3")) d*=0.85;                               // Loyalty Culture: players ask for less
  return money2(d);
}
function isStarterPlayer(p){
  var atPos=depthOrder(ST.save.roster,p.pos), idx=-1;
  for(var i=0;i<atPos.length;i++){ if(atPos[i].id===p.id){ idx=i; break; } }
  return idx>=0 && idx<startersAt(p.pos);
}
// Portal-departure risk %; pass fundOverride to preview a hypothetical funding level.
function retentionRisk(p, fundOverride){
  var dem=nilDemand(p); if(dem<=0) return null;
  if(p.yr==="SR") return 0; // seniors graduate rather than transfer, in our model
  var fund=(fundOverride!=null?fundOverride:(p.nilFund||0));
  var base=(Math.max(0,dem-fund)/dem)*66;      // the funding gap is most of it
  var funded=(fund>=dem);
  // Pay a man exactly what he asked for and he mostly stays. He'd previously sit at ~30% risk even
  // fully funded — so money never actually bought you security, which made the whole budget feel
  // pointless. Playing time still matters (a buried blue-chip wants the field), but paying him
  // halves that itch rather than ignoring it.
  if(!isStarterPlayer(p)){
    base += funded ? 8 : 16;
    if(p.ovr>=78) base += funded ? 7 : 14;
  }
  if(p.yr==="SO"||p.yr==="JR") base+=6;        // underclassmen are more mobile
  // Personality: the biggest single reason a player walks.
  if(p.pers==="diva")    base*=1.45;
  if(p.pers==="problem") base*=1.6;
  if(p.pers==="loyal")   base*=0.35;           // he isn't going anywhere
  if(p.pers==="leader")  base*=0.75;
  // A strong locker room keeps people; a toxic one empties it.
  base *= (1 - leadershipMod()*1.4);
  if(hasAbility("nil3")) base*=0.8;            // Loyalty Culture: a stickier roster
  return Math.max(0,Math.min(94,Math.round(base)));
}
// Cost to pull a departing player back out of the portal. Their unmet demand, plus a
// premium for the mess — stars and buried blue-chips cost the most to talk down.
function retainPrice(p){
  var dem=nilDemand(p), gap=Math.max(0.2, dem-(p.nilFund||0));
  var mult=1.5 + Math.max(0,(p.ovr-72))*0.035;              // an 85 OVR runs ~1.95x the gap
  if(!isStarterPlayer(p)) mult+=0.35;                        // he wants snaps, not just money
  if(p.dev==="elite") mult+=0.25; else if(p.dev==="pro") mult+=0.12;
  return Math.max(0.25, money2(gap*mult));
}
// Interest a recruit gains from an NIL offer of $amt (M) — strong, but diminishing as they warm.
// Interest per $1M by star rating — blue-chips are expensive to buy, low-stars are cheap.
// 5★ ≈ +1 per $250K; a 1★ moves far more per dollar.
// Interest points gained per $1M offered to a recruit. A blue-chip is unmoved by small
// money; a 1-star is swayed easily. These numbers are denominated in FBS dollars, so they
// must be divided by the subdivision's market scale — otherwise Montana maxing out its
// entire per-recruit cap ($510K) would move a 3-star by 6 points out of 100, and NIL would
// be a dead button at FCS. Scaled, $510K of FCS money buys the same persuasion as the
// equivalent share of an FBS budget.
function nilRate(st){
  var base={5:4,4:7,3:11,2:16,1:22}[Math.max(1,Math.min(5,st||3))];
  var marketScale = (ST.save && isFCSConf(ST.save.conf)) ? (NIL_BASE_FCS[5]/NIL_BASE[5]) : 1;
  return base / marketScale;
}
function nilInterestGain(b, amt){
  var g=amt * nilRate(b.st);
  // MONEY CLOSES; IT DOESN'T OPEN. A cheque to a kid who's never heard of you is a cheque in the
  // bin — he takes it and signs elsewhere. A cheque to a kid who already wants to come is the
  // thing that gets it done. So NIL scales hard with the relationship you've already built.
  // (Flat-rate NIL made money a dull, expensive slot machine: $12.5M to close ONE 5-star, no
  //  matter how you'd recruited him. Now the same $12.5M is wasted on a stranger and decisive on
  //  a kid at 70.)
  var rel = 0.25 + 1.35*((b.interest||0)/100);      // 0.25x cold → 1.6x if he's all-in
  g *= rel;
  if(hasAbility("nil2")||hasArch("nil")) g*=1.4;
  g *= persRecruitMult(b, "nil");
  return Math.max(1, Math.round(g));
}
// How close is he to signing on the money alone? Used by the NIL sheet so you can see it working.
// ── Fund the room in one action ───────────────────────────
// A big NIL budget was unusable in practice: securing 26 at-risk players meant opening 26 sheets.
// So the money sat there, which made the pledge you'd made for it feel hollow.
function atRiskPlayers(){
  return (ST.save.roster||[]).filter(function(p){
    if(p.cut || p.yr==="SR") return false;
    var d=nilDemand(p);
    return d>0 && money2(p.nilFund||0) < d;
  }).sort(function(a,b){ return retentionRisk(b)-retentionRisk(a); });
}
function fundAllCost(){
  var t=0;
  atRiskPlayers().forEach(function(p){ t += Math.max(0, nilDemand(p) - money2(p.nilFund||0)); });
  return money2(t);
}
function fundAll(){
  var s=ST.save, list=atRiskPlayers();
  if(!list.length){ toast("Everyone's funded."); return; }
  var spent=0, n=0, skipped=0;
  list.forEach(function(p){
    var gap=money2(nilDemand(p) - money2(p.nilFund||0));
    if(gap<=0) return;
    if(gap > money2(s.nilLeft||0)){ skipped++; return; }   // can't cover him — leave the money for someone you can
    s.nilLeft=money2(s.nilLeft-gap);
    p.nilFund=money2((p.nilFund||0)+gap);
    spent+=gap; n++;
  });
  toast(n ? ("💰 Funded "+n+" player"+(n===1?"":"s")+" for "+fmtMoney(spent)+
             (skipped?" — "+skipped+" you can't afford":""))
          : "Not enough NIL to fully fund anyone.");
  persist(); draw();
}
function nilCloseCost(b){
  var need=100-(b.interest||0);
  if(need<=0) return 0;
  var per=nilInterestGain(b, 1);
  return per>0 ? money2(need/per) : 999;
}
// ── Personality in the recruiting race ─────────────────────
// The chip on the board used to be pure information: it told you what he'd be like once you
// landed him, but did nothing to help or hinder you landing him. Now it shapes the chase.
//   points = coaching contact · nil = money · hold = how hard he is for a rival to flip
function persRecruitMult(b, kind){
  var k=b && b.pers;
  if(!k) return 1;
  if(kind==="points"){
    if(k==="coachable") return 1.35;   // he wants to be coached — face time works
    if(k==="loyal")     return 1.25;   // he wants to be somewhere, and you're courting him
    if(k==="leader")    return 1.10;
    if(k==="diva")      return 0.65;   // you cannot charm him. Bring money.
    if(k==="problem")   return 0.80;
  }
  if(kind==="nil"){
    if(k==="diva")      return 1.60;   // money is the only language he speaks
    if(k==="problem")   return 1.35;
    if(k==="coachable") return 0.80;
    if(k==="loyal")     return 0.55;   // he isn't for sale — he wants the right place
  }
  if(kind==="hold"){                    // resistance to a rival's weekly push
    if(k==="loyal")     return 0.45;   // once he likes you, nobody flips him
    if(k==="leader")    return 0.70;
    if(k==="coachable") return 0.90;
    if(k==="problem")   return 1.45;   // he'll take the last call he gets
    if(k==="diva")      return 1.25;   // always listening to a better offer
  }
  return 1;
}
function nilPreview(kind,item,amt){
  if(kind==="recruit"){ var g=nilInterestGain(item,amt); return "Interest "+item.interest+" → <b>"+Math.min(100,item.interest+g)+"</b> (+"+g+")"; }
  var dem=nilDemand(item), nf=money2((item.nilFund||0)+amt), risk=retentionRisk(item, nf);

}
function commitNIL(){

// One-tap: top a player up to exactly what he's asking for. Same accounting as

// A compact NIL budget bar shown on the Recruit & Roster tabs.

// ── Recruiting board order ───────────────────────────────
// The board order SETTLES only when you change tabs/filters (refreshRecOrder), never
// mid-scout — so scouting a prospect never makes cards jump. When it settles, fully-
// scouted prospects sort by their revealed OVR (best first) within their star tier —
// OVR is revealed at scout tier 2 — while everyone still unknown keeps a stable,
// OVR-blind seed order.
function recSeed(b){
  if(b._seed!=null) return b._seed;
  var s=String(b.id||""), h=0; for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; }
  return ((h>>>0)%100000)/100000;   // stable fallback for boards made before _seed existed
}
function recRankCompare(a,b){
  var order={open:0,committed:1,lost:2};
  if(order[a.status]!==order[b.status]) return order[a.status]-order[b.status];
  if((ST.recSort||"overall")==="interest"){
    if((b.interest||0)!==(a.interest||0)) return (b.interest||0)-(a.interest||0); // your standing: warmest first
    if(b.st!==a.st) return b.st-a.st;
    return recSeed(a)-recSeed(b);
  }
  if(b.st!==a.st) return b.st-a.st;                       // star tier still leads
  var ot=Math.min(2, maxScoutTier()), af=a.scout>=ot, bf=b.scout>=ot; // OVR is revealed at scout tier 2 (or full scout, if that comes sooner)
  if(af&&bf) return b.ovr-a.ovr;                          // both OVR-known → best OVR first
  if(af!==bf) return af?-1:1;                             // OVR-known rise above the unknown
  return recSeed(a)-recSeed(b);                           // both unknown → blind stable order
}
function refreshRecOrder(){
  var s=ST.save; if(!s||!s.board){ ST.recRank=null; return; }
  var m={}; s.board.slice().sort(recRankCompare).forEach(function(b,i){ m[b.id]=i; });
  ST.recRank=m;
}
function recruitTab(){
  var s=ST.save;

  var pts=s.recruitPtsLeft||0;
  var commits=committedRecruits().length;
  var need=rosterNeeds();
  var needStr=Object.keys(need).length?Object.keys(need).map(function(p){return need[p]+" "+p;}).join(" · "):"None graduating";
  var h='';
  h+='<div class="rec-hdr">'+
     '<div><div class="rec-hdr-num">'+pts+'</div><div class="rec-hdr-lbl">Points Left</div></div>'+
     '<div style="text-align:center"><div class="rec-hdr-num" style="color:var(--gold-dark)">'+fmtMoney(s.nilLeft)+'</div><div class="rec-hdr-lbl">💰 NIL Left</div></div>'+
     '<div style="text-align:right"><div class="rec-hdr-num" style="color:var(--green)">'+commits+'</div><div class="rec-hdr-lbl">Committed</div></div></div>';
  h+=helpNote("recruit","Working the board","Spend points on prospects to raise their interest. Rivals push back each week \u2014 land a commit by building a clear lead.")+'<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 10px;line-height:1.5"> Needs: <b>'+x(needStr)+'</b></div>';
  // position filter wheel — chips for All + each position present on the board (with counts)
  var posSet=[]; s.board.forEach(function(b){ if(posSet.indexOf(b.pos)<0)posSet.push(b.pos); });
  // order positions naturally (offense then defense)
  var POS_SEQ=["QB","RB","WR","TE","OL","DL","LB","CB","S"];
  posSet.sort(function(a,b){ return POS_SEQ.indexOf(a)-POS_SEQ.indexOf(b); });
  var activePos=ST.recruitPos||"ALL";
  var openCount=function(pos){ return s.board.filter(function(b){ return b.status==="open" && (pos==="ALL"||b.pos===pos); }).length; };
  var watchCount=s.board.filter(function(b){ return b.status==="open" && b.watch; }).length;
  var scoutedCount=s.board.filter(function(b){ return b.status==="open" && b.scout>0; }).length;
  var committedCount=committedRecruits().length;
  h+='<div class="pos-wheel">';
  h+='<button class="pos-chip'+(activePos==="ALL"?" active":"")+'" data-recpos="ALL">All <span class="pos-chip-n">'+openCount("ALL")+'</span></button>';
  h+='<button class="pos-chip committed'+(activePos==="COMMITTED"?" active":"")+'" data-recpos="COMMITTED">✓ Commits <span class="pos-chip-n">'+committedCount+'</span></button>';
  h+='<button class="pos-chip watch'+(activePos==="WATCH"?" active":"")+'" data-recpos="WATCH">⭐ Watch <span class="pos-chip-n">'+watchCount+'</span></button>';
  h+='<button class="pos-chip scouted'+(activePos==="SCOUTED"?" active":"")+'" data-recpos="SCOUTED">🔍 Scouted <span class="pos-chip-n">'+scoutedCount+'</span></button>';
  posSet.forEach(function(pos){
    h+='<button class="pos-chip'+(activePos===pos?" active":"")+'" data-recpos="'+pos+'">'+pos+' <span class="pos-chip-n">'+openCount(pos)+'</span></button>';
  });
  h+='</div>';
  // star-rating dropdown — respects the scouting fuzz: a scouted prospect matches its
  // exact star; an unscouted one matches any star inside its fuzzy range (could-be).
  var activeStars=ST.recruitStars||"ALL";
  var activeSort=ST.recSort||"overall";
  h+='<div class="rec-star-row"><span class="rec-star-lbl">Stars</span>'+
     '<select id="rec-star-filter" class="rec-star-select">';
  [["ALL","All ★"],["5","5 ★"],["4","4 ★"],["3","3 ★"],["2","2 ★"],["1","1 ★"]].forEach(function(o){
    h+='<option value="'+o[0]+'"'+(activeStars===o[0]?" selected":"")+'>'+o[1]+'</option>';
  });
  h+='</select>'+
     '<span class="rec-sort-wrap"><span class="rec-star-lbl">Sort</span>'+
       '<button class="rec-sort-btn'+(activeSort==="interest"?" on":"")+'" data-recsort="interest">Interest</button>'+
       '<button class="rec-sort-btn'+(activeSort==="overall"?" on":"")+'" data-recsort="overall">OVR</button>'+
     '</span></div>';
  var starMatch=function(b){
    if(activeStars==="ALL") return true;
    var want=+activeStars;
    if(b.scout>=1) return b.st===want;                                   // star is known
    return want>=(b.fuzzLo||b.st) && want<=(b.fuzzHi||b.st);             // unscouted: could be this star
  };
  // filter by the active chip: position, watchlist, or scouted
  var matchesFilter=function(b){
    if(!starMatch(b)) return false;
    if(activePos==="ALL") return true;
    if(activePos==="COMMITTED") return b.status==="committed";
    if(activePos==="WATCH") return b.status==="open" && !!b.watch;
    if(activePos==="SCOUTED") return b.scout>0;
    return b.pos===activePos;
  };
  // Sort by the SETTLED order (frozen until you change tabs/filters). Building it here
  // on first paint means a freshly opened board is already in a sensible order.
  if(!ST.recRank) refreshRecOrder();
  var rank=ST.recRank||{};
  var board=s.board.slice()
    .filter(matchesFilter)
    .sort(function(a,b){
      var ra=(rank[a.id]==null?1e9:rank[a.id]), rb=(rank[b.id]==null?1e9:rank[b.id]);
      return ra-rb;
    });
  // When viewing your commits, show a position tracker: committed vs. graduating need.
  if(activePos==="COMMITTED"){
    var commitByPos={}; committedRecruits().forEach(function(b){ commitByPos[b.pos]=(commitByPos[b.pos]||0)+1; });
    var trackPos=POS_SEQ.filter(function(p){ return (need[p]||0)>0 || (commitByPos[p]||0)>0; });
    h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 6px;line-height:1.5">Commits vs. graduating need by position — <b style="color:var(--red2)">red</b> = still a hole, <b style="color:var(--green)">green</b> = covered.</div>';
    if(!trackPos.length){
      h+='<div style="font-size:11px;font-weight:700;color:var(--muted);margin:0 2px 10px">No commits yet and no seniors graduating.</div>';
    } else {
      h+='<div class="commit-track">';
      trackPos.forEach(function(p){
        var c=commitByPos[p]||0, nd=need[p]||0;
        var cls = nd>0 ? (c>=nd?"filled":"need") : "";
        h+='<div class="ct-pill '+cls+'"><span class="ctp-pos">'+p+'</span>'+c+(nd>0?' / '+nd:'')+'</div>';
      });
      h+='</div>';
    }
  }
  h+='<div class="scroll-list rec-scroll">';
  if(!board.length){
    var starNote = (activeStars!=="ALL") ? " at "+activeStars+"★" : "";
    var emptyMsg = activePos==="COMMITTED" ? "No commits yet. Build a clear interest lead on open prospects to land commitments."
                 : activePos==="WATCH" ? "No prospects on your watchlist yet. Tap the ⭐ on a prospect to add them."
                 : activePos==="SCOUTED" ? "You haven\u2019t scouted anyone yet. Tap Scout on a prospect."
                 : "No "+(activePos==="ALL"?"":activePos+" ")+"prospects"+starNote+" on the board.";
    h+='<div style="padding:24px;text-align:center;font-weight:700;color:var(--muted);line-height:1.5">'+emptyMsg+'</div>';
  }
  board.forEach(function(b){
    var topRival=b.rivals.reduce(function(m,rv){return (!m||rv.interest>m.interest)?rv:m;},null);
    var rivalLead=topRival?topRival.interest:0;
    var open=(b.status==="open");
    var expanded=(ST.recExpand===b.id && open);
    var statusCls=b.status==="committed"?"committed":(b.status==="lost"?"lost":"");
    var col=posColor(b.pos);
    h+='<div class="rec-card '+statusCls+(expanded?" expanded":"")+'" style="border-left:5px solid '+col+'">';
    // ── collapsed summary row (tap to expand) ──
    h+='<div class="rec-card-top"'+(open?' data-recexpand="'+b.id+'"':'')+'>';
    h+='<div class="rec-pos" style="background:'+col+';color:#fff;border-color:'+col+'">'+b.pos+'</div>';
    var fit = recruitFit(b);
    var fitPill = fit ? ' <span class="fit-dot '+fit+'">'+(fit==="great"?"★ Fits":fit==="ok"?"~ Fit":"✕ Fit")+'</span>' : '';
    // Where he sits on the recruiting calendar — blue-chips are live from day one, and the
    // quiet ones give you a window nobody else is using yet.
    var heatPill = '';
    if(open){
      var hw = (b.heatWk!=null ? b.heatWk : heatWeekFor(b.st));
      heatPill = ((ST.save.week||0) >= hw)
        ? ' <span class="fit-dot bad">🔥 Live</span>'
        : ' <span class="fit-dot ok">🕓 Quiet · wk '+hw+'</span>';
    }
    // ── Recruit header: name and stars on top, then one fact per chip ──
    // Same rule as the roster: position and archetype are context (plain text); a pill is only
    // for what actually decides whether you chase him.
    var rmeta=x(b.pos)+(b.arch?' · '+x(b.arch):'');
    // Order: personality → scheme fit → dev trait. The dev trait reads last, to the RIGHT of fit.
    var rchips='';
    if(!persKnown(b)){
      rchips+='<span class="chip unk"'+infoAttr("? Character \u2014 unknown",
        "You don't know what kind of man he is yet. Scouting tells you how GOOD he is; only spending time with him tells you WHO HE IS. "+
        persVisitsLeft(b)+" more recruiting visit"+(persVisitsLeft(b)===1?"":"s")+" and you'll have a read on him. "+
        "Careful: his character is already helping or hurting your pitch \u2014 you just can't see it yet.")+'>? Character</span>';
    } else if(hasPersonality(b)){ var _rp=persInfo(b.pers);
      rchips+='<span class="chip pers"'+infoAttr(_rp.ico+' '+_rp.t, _rp.desc)+'>'+_rp.ico+' '+x(_rp.t)+'</span>';
    }
    // (if he's known and has no trait, no chip at all — you've learned there's nothing to learn)
    if(fit) rchips+='<span class="chip '+(fit==="great"?"good":(fit==="bad"?"bad":""))+'" title="Scheme fit">'+(fit==="great"?"★ Fit":fit==="ok"?"~ Fit":"✕ Fit")+'</span>';
    if(b.scout>=maxScoutTier()) rchips+=recruitTraitDisplay(b);   // already a chip — do NOT wrap it
    h+='<div class="rec-card-name">'+
         '<div class="pl-top"><span class="pl-nm">'+x(b.n)+'</span>'+
           '<span class="pl-ovr" style="font-size:13px">'+recruitOvrDisplay(b)+'</span></div>'+
         '<div class="rec-card-meta"><span class="rec-stars">'+recruitStarsDisplay(b)+'</span></div>'+
         '<div class="chips"><span class="pl-meta">'+rmeta+'</span>'+rchips+'</div>'+
       '</div>';
    h+='<div class="rec-right">';
    if(open){
      var bs=battleStatus(b.interest, rivalLead);
      h+='<span class="battle '+bs.cls+'">'+bs.label+'</span>';
      h+='<button class="rec-watch-btn'+(b.watch?" on":"")+'" data-watch="'+b.id+'" aria-label="Toggle watchlist">'+(b.watch?"⭐":"☆")+'</button>';
      h+='<span class="rec-chev">'+(expanded?"▾":"▸")+'</span>';
    } else if(b.status==="committed"){ h+='<div class="rec-badge green">✓ COMMITTED</div>'; }
    else { h+='<div class="rec-badge red">LOST · '+x(b.committedTo)+'</div>'; }
    h+='</div></div>';
    // ── expanded detail ──
    if(expanded){
      h+='<div class="rec-detail">';
      h+='<div class="rec-bars">';
      h+='<div class="rec-bar-row"><span class="rec-bar-lbl">You</span><div class="rec-bar"><div class="rec-thresh" title="commit threshold"></div><div class="rec-bar-fill you" style="width:'+b.interest+'%"></div></div><span class="rec-bar-val">'+b.interest+'</span></div>';
      // Show the top few rivals, strongest first, so you can see the whole battle rather than
      // a single opponent plus an opaque "+2 others". The leader is drawn at full strength;
      // the rest are dimmed so the real threat still reads at a glance.
      var SHOWN_RIVALS=2;
      var ranked=b.rivals.slice().sort(function(a,c){ return c.interest-a.interest; });
      ranked.slice(0,SHOWN_RIVALS).forEach(function(rv,i){
        var lead=(i===0);
        h+='<div class="rec-bar-row'+(lead?"":" dim")+'">'+
           '<span class="rec-bar-lbl" title="'+x(rv.name)+'">'+x(rv.name)+'</span>'+
           '<div class="rec-bar"><div class="rec-bar-fill '+(lead?"rival":"rival2")+'" style="width:'+rv.interest+'%"></div></div>'+
           '<span class="rec-bar-val">'+rv.interest+'</span></div>';
      });
      h+='</div>';
      var hidden=Math.max(0, ranked.length-SHOWN_RIVALS);
      if(hidden>0) h+='<div class="rec-rivals">+'+hidden+' other school'+(hidden>1?"s":"")+' pursuing</div>';
      h+='<div class="rec-actions">';
      if(b.scout<maxScoutTier()){
        var isLast=(b.scout===maxScoutTier()-1);
        var scoutLbl=b.scout===0?"🔍 Scout":(isLast?"🔍 Full report":"🔍 Scout more");
        h+='<button class="rec-scout-btn" data-scout="'+b.id+'">'+scoutLbl+' <span class="rec-scout-tier">'+b.scout+'/'+maxScoutTier()+'</span></button>';
      } else {
        h+='<div class="rec-scouted">✓ Fully scouted</div>';
      }
      var wk=b.wkRec||0, maxed=wk>=MAX_WEEKLY_RECRUIT;
      h+='<button class="rec-recruit-btn'+(maxed?" maxed":"")+'" data-recruit="'+b.id+'">'+(maxed?"Maxed this wk":"+ Recruit")+' <span class="rec-wk">'+wk+'/'+MAX_WEEKLY_RECRUIT+'</span></button>';
      h+='</div>';
      var ncommit=b.nil||0;
      h+='<button class="rec-nil-btn'+(ncommit>=15?" maxed":"")+'" data-nilopen="recruit:'+b.id+'">💰 '+(ncommit>=15?"NIL maxed":"Offer NIL")+(ncommit>0?' · '+fmtMoney(ncommit):'')+'</button>';
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}


// ── Roster view ──────────────────────────────────────────
var POS_ORDER_OFF=["QB","RB","WR","TE","OL"];
var POS_ORDER_DEF=["DL","LB","CB","S"];
function devBadge(p){
  if(p.walkOn) return ' <span class="dev-badge walkon">🚶 Walk-on</span>';  // not a bust, just a body
  if(!p.revealed) return "";
  if(p.dev==="elite") return ' <span class="dev-badge elite">⭐ Elite</span>';
  if(p.dev==="pro")   return ' <span class="dev-badge pro">🔥 Pro</span>';
  if(p.dev==="slow")  return ' <span class="dev-badge bust">🐢 Slow</span>';
  if(p.dev==="bust")  return ' <span class="dev-badge bust">⚠ Bust</span>';
  return "";
}
function progArrow(delta){
  if(delta>0) return '<span class="prog up">▲'+delta+'</span>';
  if(delta<0) return '<span class="prog dn">▼'+Math.abs(delta)+'</span>';
  return '<span class="prog flat">–</span>';
}
// Color per position group for the depth chart, so positions are easy to scan.
var POS_COLORS={
  QB:"#d64550", RB:"#e08a2b", WR:"#3a9d8f", TE:"#7a8b3a",
  OL:"#c9a227", DL:"#7d5bd6", LB:"#4a7dc1", CB:"#c14a8a", S:"#4aa3c1"
};
function posColor(pos){ return POS_COLORS[pos]||"#888"; }
// ── ROSTER FILTERS ────────────────────────────────────────
// Recruiting has filters, sorting and position tabs. The roster had NOTHING — 44 players in one
// long scroll, so "which of my guys can I still redshirt?" meant scanning by eye. These are the
// questions you actually ask of a roster, and the attention strip deep-links straight into them.
var ROSTER_FILTERS=[
  {k:"all",  t:"All",       f:function(p){ return true; }},
  {k:"risk", t:"🚪 Portal risk", f:function(p){ return p.yr!=="SR" && nilDemand(p)>0 && retentionRisk(p)>=60; }},
  {k:"nil",  t:"💰 Underfunded", f:function(p){ var d=nilDemand(p); return p.yr!=="SR" && d>0 && money2(p.nilFund||0)<d; }},
  {k:"rs",   t:"🔴 Redshirt",    f:function(p){ return canRedshirt(p) || isRedshirting(p); }},
  {k:"st",   t:"Starters",  f:function(p){ return tierOf(p)==="ST"; }},
  {k:"res",  t:"Reserves",  f:function(p){ return tierOf(p)==="RES"; }},
  {k:"young",t:"Underclass",f:function(p){ return p.yr==="FR"||p.yr==="SO"; }}
];
function rosterFilter(){ return ROSTER_FILTERS.filter(function(f){return f.k===(ST.rosFilter||"all");})[0] || ROSTER_FILTERS[0]; }
function rosterFilterBar(){
  var s=ST.save, cur=ST.rosFilter||"all";
  var h='<div class="ros-filters">';
  ROSTER_FILTERS.forEach(function(f){
    var n=(s.roster||[]).filter(function(p){ return !p.cut && f.f(p); }).length;
    if(f.k!=="all" && !n) return;                 // don't offer a filter that finds nobody
    h+='<button class="ros-filt'+(cur===f.k?" on":"")+'" data-rosfilt="'+f.k+'">'+x(f.t)+
       ' <span class="rf-n">'+n+'</span></button>';
  });
  return h+'</div>';
}
function rosterTable(){
  var s=ST.save;
  // which position group is mid-swap? derived from the roster so it can't drift
  var _pick=ST.swapPick ? s.roster.filter(function(x){return x.id===ST.swapPick;})[0] : null;
  if(ST.swapPick && !_pick) ST.swapPick=null;   // stale pick (player left the roster)
  var _pickPos=_pick?_pick.pos:null;
  var isDef=function(pos){ return POS_ORDER_DEF.indexOf(pos)>=0; };
  var groups=[];
  if(s.role==="DC"){ groups=[{t:"Defense",order:POS_ORDER_DEF}]; }
  else if(s.role==="HC"){ groups=[{t:"Offense",order:POS_ORDER_OFF},{t:"Defense",order:POS_ORDER_DEF}]; }
  else { groups=[{t:"Offense",order:POS_ORDER_OFF}]; }
  var h='';
  h+=helpNote("roster","Depth chart & redshirts",
     "Tap a player, then tap another at the same position to swap them.<br><br>"+
     "<b>ST</b> Starter \u2014 takes most of the snaps.<br>"+
     "<b>BK</b> Backup \u2014 rotates in and <i>will</i> get real snaps and stats.<br>"+
     "<b>RES</b> Reserve \u2014 doesn\u2019t play at all, so he\u2019s free to redshirt.<br><br>"+
     "Any snap burns a redshirt, so a backup can\u2019t quietly bank a year \u2014 only a reserve can.");
  // ── One tap to secure the room ──
  var _risk=atRiskPlayers(), _cost=fundAllCost();
  if(_risk.length){
    var _can=(s.nilLeft||0) >= _cost;
    h+='<button class="fund-all'+(_can?'':' partial')+'" id="fund-all">'+
       '<span class="fa-l"><b>💰 Fund all '+_risk.length+' at risk</b>'+
         '<span>'+(_can ? 'Secures the room. You have '+fmtMoney(s.nilLeft)+'.'
                        : 'Costs '+fmtMoney(_cost)+' — you have '+fmtMoney(s.nilLeft)+'. Funds who it can, worst risk first.')+'</span></span>'+
       '<span class="fa-r">'+fmtMoney(_cost)+'</span></button>';
  }
  h+=rosterFilterBar();
  var _fl=rosterFilter();
  if(_fl.k!=="all"){
    var _n=(s.roster||[]).filter(function(p){ return !p.cut && _fl.f(p); }).length;
    h+='<div class="ros-filt-note">Showing <b>'+_n+'</b> · '+x(_fl.t)+
       ' <button class="ros-filt-clear" data-rosfilt="all">✕ clear</button></div>';
  }
  groups.forEach(function(grp){
    h+='<div class="sec-title" style="margin:6px 2px 6px">'+grp.t+'</div>';
    h+='<div class="conf-table" style="margin-bottom:10px">';
    grp.order.forEach(function(pos){
      var atPos=depthOrder(s.roster, pos);
      if(!atPos.length) return;
      // Depth order is computed on the FULL room first, so ST/BK/RES stay truthful even when
      // you're only looking at a slice of it. Filter after, never before.
      var _flt=rosterFilter();
      var _shown=atPos.filter(function(p){ return _flt.f(p); });
      if(!_shown.length && !s.roster.some(function(p){ return p.pos===pos && isRedshirting(p) && _flt.f(p); })) return;
      var nStart=startersAt(pos);
      atPos.forEach(function(p,idx){
        if(!_flt.f(p)) return;                    // filtered out — but idx is still the true depth
        var tier=depthTier(pos, idx);
        var isStarter=(tier==="ST");
        var depthTag;
        var TIER_INFO={
          ST:["ST \u2014 Starter","He takes the bulk of the snaps at this position. Any snap burns a redshirt."],
          BK:["BK \u2014 Backup","He rotates in and WILL get real snaps and real stats \u2014 he isn't just insurance. So he cannot quietly bank a redshirt: playing burns it."],
          RES:["RES \u2014 Reserve","He does not play at all. He's your only redshirt candidate at this position \u2014 hold him out and he keeps the year."]
        };
        var _ti=TIER_INFO[tier];
        if(isStarter){ depthTag='<span class="chip st"'+infoAttr(_ti[0],_ti[1])+'>'+(nStart>1?('ST'+(idx+1)):'ST')+'</span>'; }
        else if(tier==="BK"){ depthTag='<span class="chip bk"'+infoAttr(_ti[0],_ti[1])+'>BK</span>'; }
        else { depthTag='<span class="chip res"'+infoAttr(_ti[0],_ti[1])+'>RES</span>'; }
        var yearDelta=p.ovr-(p.ssOvr!=null?p.ssOvr:p.ovr);
        var careerDelta=p.ovr-(p.startOvr!=null?p.startOvr:p.ovr);
        var col=posColor(pos);
        var picked=(ST.swapPick===p.id);
        var swappable=(!!_pickPos && !picked && _pickPos===p.pos);

        // ── Two lines, and only TWO pills ──────────────────────
        // Six pills per row was too much: year, archetype, games and career growth are context,
        // not alerts. They read fine as plain text. A PILL is reserved for the two things that
        // actually change a decision — what he'll become (dev) and who he is (personality).
        var _gp=gamesPlayed(p);
        var meta=yrLabel(p);
        if(p.arch) meta += ' · ' + x(p.arch);
        if(s.week>0 || _gp>0){
          meta += rsAvailable(p)
            ? ' · <b'+(rsSafe(p)?'':' style="color:var(--red2)"')+'>'+_gp+'/'+RS_GAME_LIMIT+'G</b>'
            : ' · '+_gp+'G';
        }
        if(careerDelta!==0) meta += ' · <b style="color:'+(careerDelta>0?'#1a7f37':'var(--red2)')+'">'+(careerDelta>0?'+':'')+careerDelta+'</b>';
        var chips='';
        if(hasPersonality(p)){ var _pi=persInfo(p.pers);
          chips+='<span class="chip pers"'+infoAttr(_pi.ico+' '+_pi.t, _pi.desc)+'>'+_pi.ico+' '+x(_pi.t)+'</span>'; }
        if(p.walkOn) chips+='<span class="chip" title="Walk-on">🚶 Walk-on</span>';
        else if(p.revealed) chips+=devChip(p.dev);   // dev trait reads last, same as the recruit card

        // ── NIL as a funding bar, not a wall of figures ──
        var _dem=nilDemand(p), _fund=money2(p.nilFund||0), _funded=(_dem>0 && _fund>=_dem), _risk=retentionRisk(p);
        var _gap=money2(_dem-_fund), _afford=((s.nilLeft||0)+1e-9>=_gap);
        var nilRow='';
        if(_dem>0 && p.yr!=="SR"){
          var pct=Math.max(0,Math.min(100, _dem>0 ? (_fund/_dem)*100 : 0));
          var cls=_funded?'ok':(_risk>=60?'hi':'');
          nilRow='<div class="pl-nil">'+
