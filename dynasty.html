var DEF_SCHEMES=[
  {id:"nickel",   name:"Nickel",          lean:32, desc:"Extra DB on the field — built to smother the pass.",
   wants:{DL:["Pass Rusher"], LB:["Coverage LB"], CB:["Press-Man CB"], S:["Ball-Hawk"]}},
  {id:"zone",     name:"Bend-Don't-Break",lean:37, desc:"Zone coverage, gang tackle, force field goals.",
   wants:{DL:["Run Stuffer"], LB:["Coverage LB"], CB:["Zone CB"], S:["Ball-Hawk"]}},
  {id:"base43",   name:"4-3 Base",        lean:50, desc:"Sound, gap-disciplined front seven.",
   wants:{DL:["Run Stuffer"], LB:["Thumper"], S:["Box Safety"]}},
  {id:"multiple34",name:"3-4 Multiple",   lean:58, desc:"Disguise pressure out of a two-gap front.",
   wants:{DL:["Pass Rusher"], LB:["Blitzer","Coverage LB"], CB:["Zone CB"]}},
  {id:"blitz",    name:"Blitz-Heavy",     lean:76, desc:"Bring the house and live on the edge.",
   wants:{DL:["Pass Rusher"], LB:["Blitzer"], CB:["Press-Man CB"], S:["Box Safety"]}}
];
function offScheme(){ var id=ST.save&&ST.save.offScheme; return OFF_SCHEMES.filter(function(x){return x.id===id;})[0]||OFF_SCHEMES[3]; }
function defScheme(){ var id=ST.save&&ST.save.defScheme; return DEF_SCHEMES.filter(function(x){return x.id===id;})[0]||DEF_SCHEMES[2]; }
// Fraction (0..1) of a scheme's key STARTERS whose archetype matches what it wants.
function schemeArchMatch(scheme){
  var s=ST.save, matched=0, total=0;
  Object.keys(scheme.wants).forEach(function(pos){
    var want=scheme.wants[pos];
    depthOrder(s.roster,pos).slice(0, startersAt(pos)).forEach(function(p){
      total++; if(want.indexOf(p.arch)>=0) matched++;
    });
  });
  return total? matched/total : 0;
}
// Which scheme in a list best fits your current roster (for the "best fit" hint).
function bestScheme(side){
  var list=side==="off"?OFF_SCHEMES:DEF_SCHEMES;
  var ideal=side==="off"?idealOffBalance():idealDefBalance();
  var best=list[0], bestScore=-1;
  list.forEach(function(sc){
    var tend=Math.max(0,1-Math.abs(sc.lean-ideal)/55);
    var sco=schemeArchMatch(sc)*0.6 + tend*0.4;
    if(sco>bestScore){ bestScore=sco; best=sc; }
  });
  return best;
}
function setScheme(side, id){
  var s=ST.save; if(!s) return;
  if(side==="off"){ s.offScheme=id; s.gameplan.offBalance=offScheme().lean; }
  else { s.defScheme=id; s.gameplan.defBalance=defScheme().lean; }
  persist(); draw();
}
// best OVR at a position group
function bestAt(positions){
  var r=ST.save.roster, best={};
  r.forEach(function(p){ if(positions.indexOf(p.pos)>=0){ if(!best[p.pos]||p.ovr>best[p.pos])best[p.pos]=p.ovr; } });
  var vals=positions.map(function(p){return best[p]||60;});
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
// Offensive scheme fit → the same 0..cap bonus the sim expects, now driven by how well
// your starters' archetypes fit your system, plus whether the system suits your roster.
function offSchemeFit(){
  var sc=offScheme();
  var tendency=Math.max(0, 1 - Math.abs(sc.lean - idealOffBalance())/55); // does the system suit your talent?
  var archScore=schemeArchMatch(sc);                                      // do your starters fit the system?
  var fit01=archScore*0.6 + tendency*0.4;
  var cap = hasAbility("off5")?11:((hasArch("offensive")||hasAbility("off2"))?8:5); // Peak Offense > Scheme Guru/Offensive Mind
  return Math.round(fit01*cap*10)/10;
}
function defSchemeFit(){
  var sc=defScheme();
  var tendency=Math.max(0, 1 - Math.abs(sc.lean - idealDefBalance())/55);
  var archScore=schemeArchMatch(sc);
  var fit01=archScore*0.6 + tendency*0.4;
  var cap = hasAbility("def5")?11:((hasArch("defensive")||hasAbility("def2"))?8:5); // Peak Defense > Disguise/Defensive Mind
  return Math.round(fit01*cap*10)/10;
}
// The scheme-fit bonus applied to a unit you control this game
function schemeFitFor(side){ return side==="off" ? offSchemeFit() : defSchemeFit(); }
// Suggest the ideal slider values (for UI hints)
function idealOffBalance(){
  var passStrength=(bestAt(["QB"])*1.3 + bestAt(["WR","TE"]))/2.3;
  var runStrength =(bestAt(["RB"]) + bestAt(["OL"])*1.2)/2.2;
  return Math.max(0,Math.min(100, Math.round(50 + (runStrength-passStrength)*2.2)));
}
function idealDefBalance(){
  var blitzStrength=(bestAt(["DL"])*1.3 + bestAt(["LB"]))/2.3;
  var coverStrength=(bestAt(["CB"])*1.2 + bestAt(["S"]))/2.2;
  return Math.max(0,Math.min(100, Math.round(50 + (blitzStrength-coverStrength)*2.2)));
}

// In-season development: players make small gains during the year (younger + gems grow faster).
// Development also gradually "reveals" a player's hidden dev trait.
function developInSeason(){
  var s=ST.save; if(!s||!s.roster)return;
  var dev2 = hasArch("developer") || hasAbility("dev1"); // faster growth (archetype or Teacher skill)
  var revealFast = hasArch("developer") || hasAbility("dev2"); // Eye for Talent reveals sooner
  s.roster.forEach(function(p){
    var pot = Math.max(p.pot!=null?p.pot:99, p.ovr); // never below current (safety for old saves)
    var head = pot - p.ovr;
    if(head>0){
      // chance of a bump each week, weighted by youth; gems develop ~2x, busts ~half
      var youthBoost = p.yr==="FR"?0.30:(p.yr==="SO"?0.22:(p.yr==="JR"?0.14:0.08));
      if(dev2) youthBoost += 0.12; // developer grows players faster
      if(hasAbility("dev4")) youthBoost += 0.10; // Master Motivator: faster still
      if(facLvl("training")>0) youthBoost += 0.04*facLvl("training"); // Training Facilities
      var dmult = devMult(p.dev); // Elite 1.8 → Bust 0.5
      var nearCap = Math.min(1, head/6); // taper the final points so nobody snaps to their ceiling
      if(Math.random() < youthBoost*dmult*nearCap){
        var gain = 1;
        if(dev2) gain += 1;
        if(hasAbility("dev4")) gain += 1;
        p.ovr=Math.min(pot, p.ovr+gain);
      }
    }
    // breakout: a small weekly chance to jump up a dev tier — much higher for players who start a lot
    if(p.dev!=="elite"){
      var starting=isStarterPlayer(p);
      var upC=(starting?0.014:0.003) + (facLvl("training")>0?0.002:0); // starters break out ~5x as often
      if(p.yr==="FR"||p.yr==="SO") upC*=1.3; // young players have more runway to pop
      if(Math.random()<upC){
        p.dev=nextTrait(p.dev);
        p.pot=Math.max(p.pot||0, rollPotential(p.startOvr!=null?p.startOvr:p.ovr, p.dev));
        if(!devInfo(p.dev).hidden) p.revealed=true;
        if(starting) toast("📈 "+x(p.n)+" is turning into a "+traitName(p.dev)+" developer!");
      }
    }
    // reveal the hidden trait once a player has developed enough evidence (sooner with Eye for Talent)
    var revealThresh = revealFast?2:3;
    if(!p.revealed && (Math.abs(p.ovr-p.startOvr)>=revealThresh || p.yr==="JR" || p.yr==="SR")){
      if(!devInfo(p.dev).hidden) p.revealed=true;
    }
  });
}

// ── Season-long recruiting tab ───────────────────────────
// ── NIL (real football $, anchored to public NIL trackers) ─────────────────
// Football-only NIL budget in $millions, by program prestige, +facilities +last wins.
// Anchors: elite ≈ $40M (Texas), solid P4 ≈ $11M (Wake), top G5 ≈ $11M (USF), G5 ≈ $4M (Tulsa).
var NIL_BASE={1:4, 2:8, 3:12, 4:22, 5:36};
// Position value weights — the NIL market pays QBs the most, then premium skill/pass-rush/corner.
var NIL_POS_W={QB:1.9, WR:1.2, CB:1.15, DL:1.15, RB:1.05, S:0.95, LB:0.95, OL:0.9, TE:0.85};
// Per-position annual pay bands ($M) at a P4-elite scale: [starterLo, starterHi, depthLo, depthHi].
// Everything scales down by program NIL pool (a G6 pays a fraction of these).
var POS_PAY={
  QB:[1.5,3.5,0.05,0.10], WR:[0.8,2.0,0.025,0.05], DL:[0.7,1.7,0.02,0.04],
  OL:[0.4,1.0,0.015,0.03], RB:[0.4,1.0,0.015,0.03], CB:[0.4,1.0,0.015,0.03],
  S:[0.3,1.0,0.015,0.03], TE:[0.3,0.8,0.015,0.03], LB:[0.3,0.7,0.015,0.03]
};
function fmtMoney(m){ m=m||0; if(m>=1) return "$"+(Math.round(m*10)/10)+"M"; if(m>0.0001) return "$"+Math.round(m*1000)+"K"; return "$0"; }
function money2(m){ return Math.round((m||0)*100)/100; } // avoid float drift
function nilBudgetFor(){ var s=ST.save; var base=NIL_BASE[s.prestige]||8; var pool=base + facLvl("nil")*2 + facLvl("stadium")*1 + (s._lastWins||0)*0.4; return money2(pool * (s.role==="HC"?1:0.5)); } // OC/DC control only their unit's share of the collective
// A rough "production" score from a player's season stats — productive players get noticed.
function prodScore(p){
  var st=(p.stats&&p.stats.season)||{}, v=0;
  v+=(st.py||0)/320 + (st.ptd||0)*0.7;                      // passing
  v+=(st.ry||0)/230 + (st.rtd||0)*0.9;                      // rushing
  v+=(st.recy||0)/230 + (st.rectd||0)*0.9;                  // receiving
  v+=(st.tkl||0)/20 + (st.sack||0)*1.0 + (st.dint||0)*1.4;  // defense
  return v;
}
// What a player is worth to keep, in $M — anchored to the position pay bands, scaled by your
// program's NIL pool. A P4 starting QB lands in the $1.5–3.5M band; the same player at a G6
// (much smaller pool) commands a fraction, matching public NIL trackers.
function nilDemand(p){
  if(!p || p.ovr<66) return 0;
  var pay=POS_PAY[p.pos]||POS_PAY.LB;
  var poolF=Math.max(0.1, Math.min(1.15, nilBudgetFor()/36));   // P4-elite pool ($36M) = 1.0
  var d;
  if(isStarterPlayer(p)){
    var tT=Math.max(0,Math.min(1,(p.ovr-70)/23));               // 70→band floor, 93→band ceiling
    d=(pay[0]+(pay[1]-pay[0])*tT)*poolF;
  } else {
    var bT=Math.max(0,Math.min(1,(p.ovr-62)/20));
    d=(pay[2]+(pay[3]-pay[2])*bT)*(0.5+poolF*0.5);              // depth deals are less pool-sensitive
  }
  if(p.dev==="elite") d*=1.15; else if(p.dev==="pro") d*=1.08;  // ascending stars cost more
  d+=Math.min(0.5, prodScore(p)*0.05);                          // production nudges toward the top of the band
  return money2(d);
}
function isStarterPlayer(p){
  var atPos=depthOrder(ST.save.roster,p.pos), idx=-1;
  for(var i=0;i<atPos.length;i++){ if(atPos[i].id===p.id){ idx=i; break; } }
  return idx>=0 && idx<startersAt(p.pos);
}
// Portal-departure risk %; pass fundOverride to preview a hypothetical funding level.
function retentionRisk(p, fundOverride){
  var dem=nilDemand(p); if(dem<=0) return null;
  if(p.yr==="SR") return 0; // seniors graduate rather than transfer, in our model
  var fund=(fundOverride!=null?fundOverride:(p.nilFund||0));
  var base=(Math.max(0,dem-fund)/dem)*66;      // the funding gap is most of it
  if(!isStarterPlayer(p)){ base+=16; if(p.ovr>=78) base+=14; } // a buried blue-chip really wants to play
  if(p.yr==="SO"||p.yr==="JR") base+=6;        // underclassmen are more mobile
  return Math.max(0,Math.min(94,Math.round(base)));
}
// Interest a recruit gains from an NIL offer of $amt (M) — strong, but diminishing as they warm.
function nilInterestGain(b, amt){ return Math.max(1, Math.round(amt*2.4*(1-(b.interest||0)/130))); }
function riskLabel(pct){ return pct>=60?"High":(pct>=30?"Medium":"Low"); }
// Open the NIL slider sheet for a recruit ("recruit") or a roster player ("retain").
function openNIL(kind, id){
  var s=ST.save;
  var maxA;
  if(kind==="recruit"){ var b=(s.board||[]).filter(function(x){return x.id===id;})[0]; if(!b)return; maxA=Math.max(0,Math.min(s.nilLeft, 15-(b.nil||0))); }
  else { var p=(s.roster||[]).filter(function(x){return x.id===id;})[0]; if(!p)return; var dem=nilDemand(p); maxA=Math.max(0,Math.min(s.nilLeft, Math.max(dem*1.5,1)-(p.nilFund||0))); }
  if(maxA<=0){ toast(kind==="recruit"?"NIL offer maxed for this recruit":"Fully funded"); return; }
  ST.nilPick={kind:kind, id:id};
  ST.nilPickVal=Math.min(maxA, kind==="recruit"?Math.min(2,maxA):Math.min(1,maxA));
  draw();
}
function nilPreview(kind,item,amt){
  if(kind==="recruit"){ var g=nilInterestGain(item,amt); return "Interest "+item.interest+" → <b>"+Math.min(100,item.interest+g)+"</b> (+"+g+")"; }
  var dem=nilDemand(item), nf=money2((item.nilFund||0)+amt), risk=retentionRisk(item, nf);
  return "Funded "+fmtMoney(nf)+" / "+fmtMoney(dem)+" · portal risk → <b>"+risk+"%</b>";
}
function commitNIL(){
  var np=ST.nilPick, s=ST.save, amt=Math.min(ST.nilPickVal||0, s.nilLeft||0);
  if(!np || amt<=0){ ST.nilPick=null; ST.nilPickVal=null; draw(); return; }
  if(np.kind==="recruit"){
    var b=(s.board||[]).filter(function(x){return x.id===np.id;})[0];
    if(b){ var g=nilInterestGain(b,amt); b.interest=Math.min(100,b.interest+g); b.nil=money2((b.nil||0)+amt); s.nilLeft=money2(s.nilLeft-amt); toast("💰 Offered "+fmtMoney(amt)+" to "+x(b.n)+" · +"+g+" interest"); }
  } else {
    var p=(s.roster||[]).filter(function(x){return x.id===np.id;})[0];
    if(p){ p.nilFund=money2((p.nilFund||0)+amt); s.nilLeft=money2(s.nilLeft-amt); toast("💰 Funded "+x(p.n)+" · "+fmtMoney(p.nilFund)); }
  }
  ST.nilPick=null; ST.nilPickVal=null; persist(); draw();
}
// A compact NIL budget bar shown on the Recruit & Roster tabs.
function nilBar(){

    '<span class="nil-lbl">of '+fmtMoney(s.nilTotal)+' NIL left this season</span></div>';

// Retention panel: your players who expect NIL, their funding, and portal risk.
function retentionPanel(){
  var s=ST.save;
  var atRisk=(s.roster||[]).filter(function(p){ return nilDemand(p)>=0.15 && p.yr!=="SR"; })
    .sort(function(a,b){ return (retentionRisk(b)||0)-(retentionRisk(a)||0); });
  var h='<div class="sec-title" style="margin:2px 2px 6px">💰 NIL &amp; Retention</div>';
  h+=nilBar();
  h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:6px 2px 8px;line-height:1.5">Give your key players the NIL they want to keep them. Underfunded stars — especially buried or young ones — risk hitting the portal after the season.</div>';
  if(!atRisk.length){ h+='<div style="font-size:11px;font-weight:700;color:var(--muted);padding:2px 2px 10px">No players are drawing NIL demand yet. Develop some talent and they\u2019ll show up here.</div>'; return h; }
  h+='<div class="conf-table" style="margin-bottom:12px">';
  atRisk.forEach(function(p){

// Move a player up or down their position's depth chart by one slot.
function moveDepth(id, dir){
  var s=ST.save; var p=s.roster.filter(function(x){return x.id===id;})[0];
  if(!p) return;
  var order=depthOrder(s.roster, p.pos);
  var idx=-1; for(var i=0;i<order.length;i++){ if(order[i].id===id){idx=i;break;} }
  var swapIdx=idx+dir;
  if(idx<0 || swapIdx<0 || swapIdx>=order.length) return;
  // reassign explicit depthRanks in the new order, then swap the two
  var tmp=order[idx]; order[idx]=order[swapIdx]; order[swapIdx]=tmp;
  order.forEach(function(pl,i){ pl.depthRank=i; });
  // keep the user's scroll position instead of jumping back to the top
  var sy=window.scrollY||window.pageYOffset||0;
  persist(); draw();
  window.scrollTo(0, sy);
  if(window.requestAnimationFrame){ window.requestAnimationFrame(function(){ window.scrollTo(0, sy); }); }
}

function simGame(game, plan){
  var oppT=leagueTeam(game.opp);
  var oppOff = oppT ? oppT.off : (58+game.op*6+rnd(-4,4));
  var oppDef = oppT ? oppT.def : cpuDefenseRating(game.op);
  var homeAdj = game.home?(3+facLvl("stadium")):-1;
  // scheme-fit bonuses come from your STANDING gameplan sliders matching your roster (not per-game guessing)
  var offFit = offSchemeFit();  // 0..~5, helps you score
  var defFit = defSchemeFit();  // 0..~5, helps you stop them
  // (Offensive/Defensive Mind's +2 game-day boost is baked into offenseRating/defenseRating via off1/def1)

  var ourPts, oppPts, myUnit, usedFit;
  if(ST.save.role==="HC"){
    // YOU control BOTH units → offense drives your points (offFit), defense limits theirs (defFit)
    var hcOff=offenseRating(), hcDef=defenseRating();
    myUnit=Math.round((hcOff+hcDef)/2);
    usedFit=Math.round((offFit+defFit)/2*10)/10;
    ourPts=Math.max(3, Math.round((hcOff - oppDef + offFit + homeAdj)/3 + 21 + rnd(-7,7)));
    oppPts=Math.max(3, Math.round((oppOff - hcDef - defFit - (game.home?2:0))/3 + 21 + rnd(-7,7)));
  } else if(ST.save.role==="DC"){
    // YOU control defense → defFit limits the opponent's points; your offense is CPU
    myUnit=defenseRating(); usedFit=defFit;
    var ourOff=cpuUnitRating();
    oppPts=Math.max(3, Math.round((oppOff - myUnit - defFit - (game.home?2:0))/3 + 21 + rnd(-7,7)));
    ourPts=Math.max(3, Math.round((ourOff - oppDef + homeAdj)/3 + 21 + rnd(-7,7)));
  } else {
    // YOU control offense → offFit drives your points; your defense is CPU
    myUnit=offenseRating(); usedFit=offFit;
    var ourDef=cpuUnitRating();
    ourPts=Math.max(3, Math.round((myUnit - oppDef + offFit + homeAdj)/3 + 21 + rnd(-7,7)));
    oppPts=Math.max(3, Math.round((oppOff - ourDef - (game.home?2:0))/3 + 21 + rnd(-7,7)));
  }
  // no ties — overtime decides
  if(ourPts===oppPts){
    var favUs = (myUnit + usedFit + homeAdj) >= (ST.save.role==="DC"?oppOff:oppDef)+20;
    if(favUs) ourPts += pick([3,3,7]); else oppPts += pick([3,3,7]);
  }
  return {us:ourPts, them:oppPts, edge:usedFit>=3, oppDefType:"", off:myUnit, fit:usedFit};
}

// Break a final score into a believable sequence of scoring plays across 4 quarters.
// Returns [{q, clock, team:'us'|'them', kind, pts, usTot, themTot, desc}]
function buildPlayByPlay(usFinal, themFinal, usName, themName){
  function toScores(total){
    // decompose points into TDs(7), FGs(3), 2pt(2) — summing EXACTLY to total (never overshoot)
    var plays=[], left=total;
    while(left>0){
      if(left>=7 && Math.random()<0.7){ plays.push(7); left-=7; }
      else if(left>=6 && Math.random()<0.5){ plays.push(6); left-=6; } // TD, missed XP
      else if(left>=3 && (left===3 || left>=6 ? Math.random()<0.6 : true)){ plays.push(3); left-=3; }
      else if(left>=7){ plays.push(7); left-=7; }
      else if(left>=6){ plays.push(6); left-=6; }
      else if(left>=3){ plays.push(3); left-=3; }
      else if(left===2){ plays.push(2); left-=2; }
      else { plays.push(left); left=0; } // 1 leftover -> safety, keeps sum exact
    }
    return plays;
  }
  var TD_DESC=["%P punches it in","%P breaks free for a TD","%P finds the end zone","deep strike — TOUCHDOWN %P","%P walks in untouched","QB keeper, %P scores","%P takes the screen to the house"];
  var FG_DESC=["%P drills the field goal","%P's field goal is good","%P splits the uprights"];
  var usPlayers=(ST.save?ST.save.roster:[]).filter(function(p){return p.pos!=="OL";});
  function nm(team){
    if(team==="us"&&usPlayers.length)return pick(usPlayers).n;
    return genName();
  }
  function fill(t,team){ return t.replace("%P", nm(team)); }

  var usPlays=toScores(usFinal).map(function(p){return {team:"us",pts:p};});
  var themPlays=toScores(themFinal).map(function(p){return {team:"them",pts:p};});
  // interleave possessions somewhat randomly but fairly
  var all=[]; var a=usPlays, b=themPlays, ai=0, bi=0;
  while(ai<a.length||bi<b.length){
    if(ai>=a.length){all.push(b[bi++]);continue;}
    if(bi>=b.length){all.push(a[ai++]);continue;}
    if(Math.random()<0.5)all.push(a[ai++]); else all.push(b[bi++]);
  }
  // assign each play to a quarter + descending clock, build running totals
  var n=all.length, ut=0, tt=0, out=[];
  var qCount={1:0,2:0,3:0,4:0};
  all.forEach(function(pl,i){ var qq=Math.min(4,Math.floor(i/Math.max(1,n)*4)+1); qCount[qq]++; });
  var qSeen={1:0,2:0,3:0,4:0};
  all.forEach(function(pl,i){
    var q=Math.min(4, Math.floor(i/Math.max(1,n)*4)+1);
    qSeen[q]++;
    // clock descends from ~15:00 to ~0:00 across the plays in this quarter
    var frac=qSeen[q]/(qCount[q]+1);
    var totalSec=Math.round(900*(1-frac)) - rnd(0,25);
    if(totalSec<0)totalSec=rnd(0,40);
    var mm=Math.floor(totalSec/60), ss=totalSec%60;
    var clock=mm+":"+(ss<10?"0"+ss:ss);
    var elapsed=(q-1)*900 + (900-totalSec); // absolute seconds from kickoff (0..3600)
    if(pl.team==="us")ut+=pl.pts; else tt+=pl.pts;
    var kind = pl.pts>=6?"TD":(pl.pts===3?"FG":(pl.pts===2?"2PT":"SFTY"));
    var desc = pl.pts>=6? fill(pick(TD_DESC),pl.team) : (pl.pts===3? fill(pick(FG_DESC),pl.team) : "two-point conversion");
    out.push({q:q,clock:clock,elapsed:elapsed,team:pl.team,kind:kind,pts:pl.pts,usTot:ut,themTot:tt,desc:desc});
  });
  // ensure timeline is strictly increasing (interleave randomness can invert)
  out.sort(function(a,b){return a.elapsed-b.elapsed;});
  // recompute running totals in timeline order
  var u2=0,t2=0;
  out.forEach(function(p){ if(p.team==="us")u2+=p.pts; else t2+=p.pts; p.usTot=u2; p.themTot=t2; });
  return out;
}

var NY6=["Rose Bowl","Sugar Bowl","Orange Bowl","Cotton Bowl","Fiesta Bowl","Peach Bowl"];
var BOWLS=["Gator Bowl","Citrus Bowl","Alamo Bowl","Holiday Bowl","Sun Bowl","Liberty Bowl","Music City Bowl","Duke's Mayo Bowl","Las Vegas Bowl","Pinstripe Bowl"];

// Build conference standings: YOUR real conf record + simulated conf-mates (stable for the season).
function rankedTeams(){
  var s=ST.save, L=s.league;
  var rows=[];
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      var isYou=(n===s.school);
      var w=isYou?s.wins:t.w, l=isYou?s.losses:t.l;
      rows.push({name:n, conf:t.c, p:t.p, you:isYou, w:w, l:l, ovr:t.ovr, g5:!isPowerConf(t.c),
                 score: resumeScore(w, t.p, t.c, isYou&&s._wonConfThisYear, isYou?myUnitRating():t.off) + t.ovr*0.5});
    });
  }
  rows.sort(function(a,b){ if(b.score!==a.score)return b.score-a.score; return b.ovr-a.ovr; });
  return rows;
}
function computeTop25(){ return rankedTeams().slice(0,25); }
// Your real conference record, straight from your played games.
function userConfRecord(){
  var s=ST.save, cw=0, cl=0;
  s.schedule.forEach(function(g){ if(g.oc===s.conf && g.result){ if(g.result.us>g.result.them)cw++; else cl++; } });
  return {cw:cw, cl:cl};
}
// The champion of a conference by best conference record (tiebreak overall). Used for
// CPU conferences in the league history; your own conference uses the real title-game result.
function bestConfChampion(conf){
  var s=ST.save, L=s.league; if(!L) return null;
  var best=null, bestKey=-1;
  Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n]; if(t.c!==conf) return;
    var isYou=(n===s.school), cw,cl;
    if(isYou){ var r=userConfRecord(); cw=r.cw; cl=r.cl; } else { cw=t.cw||0; cl=t.cl||0; }
    var g=cw+cl, pct=g?cw/g:0, key=pct*1000 + (t.ovr||60)*0.1;
    if(key>bestKey){ bestKey=key; best=n; }
  });
  return best;
}
// Record this season's national + conference champions into the league history.
function recordChampions(){
  var s=ST.save; if(!s.league) return;
  s.champHistory=s.champHistory||[];
  var year=2026+((s.seasonsPlayed||1)-1); // seasonsPlayed was just incremented for the finished season
  var natl = s._wonNatlThisYear ? s.school : (s._natlChampName || (rankedTeams()[0]||{name:"—"}).name);
  var confSet={};
  Object.keys(s.league.teams).forEach(function(n){ var c=s.league.teams[n].c; if(c && c!=="Independent") confSet[c]=1; });
  var confs={};
  Object.keys(confSet).sort().forEach(function(c){
    confs[c] = (c===s.conf && s._userConfChampName) ? s._userConfChampName : bestConfChampion(c);
  });
  s.champHistory.push({year:year, season:s.season, school:s.school, natl:natl, confs:confs});
  s._natlChampName=null; s._userConfChampName=null; // clear the season's stashed results
}
function top25Table(){

  var myRank=0; rows.forEach(function(r,i){ if(r.you)myRank=i+1; });
  var h='<div class="sec-title" style="margin:2px 2px 8px">AP Top 25'+(myRank?' <span class="pill">You: #'+myRank+'</span>':' <span class="pill">You: NR</span>')+'</div>';

  rows.forEach(function(r,i){

       '<span class="conf-rank">'+(i+1)+'</span>'+

       '<span class="conf-rec">'+r.w+'-'+r.l+'</span></div>';
  });
  h+='</div>';
  return h;
}
function computeConfStandings(){
  var s=ST.save, L=s.league;
  var table=[];
  // your REAL conference record straight from your played games (never out of sync)
  var myCW=0, myCL=0;
  s.schedule.forEach(function(g){
    if(g.oc===s.conf && g.result){ if(g.result.us>g.result.them)myCW++; else myCL++; }
  });
  if(L){
    Object.keys(L.teams).forEach(function(n){
      var t=L.teams[n];
      if(t.c!==s.conf) return;
      var isYou=(n===s.school);
      var cw=isYou?myCW:t.cw, cl=isYou?myCL:t.cl;
      table.push({name:n, p:t.p, you:isYou, cw:cw, cl:cl, ovr:t.ovr});
    });
  }
  table.sort(function(a,b){
    var ga=a.cw+a.cl, gb=b.cw+b.cl;
    var pa=ga?a.cw/ga:0.5, pb=gb?b.cw/gb:0.5;
    if(pb!==pa)return pb-pa;
    return b.ovr-a.ovr;
  });
  return table;
}
// Called when the regular season ends → set up conference championship
function enterConfChampionship(){
  var s=ST.save;
  finalizeLeagueSeason(s.school); // ensure every team completed its 9-game conference slate
  // Independents have no conference, so no conference championship — go straight to the postseason.
  if(s.conf==="Independent"){
    ST.confchamp=null; s._confchamp=null;
    enterPostseason(); return;
  }
  var table=computeConfStandings();
  var top2=table.slice(0,2);
  var youIn = top2.some(function(t){return t.you;});
  var champ={
    standings:table,
    top2:[{name:top2[0].name,p:top2[0].p},{name:top2[1].name,p:top2[1].p}],
    youIn:youIn, done:false, result:null, wonTitle:false
  };
  if(!youIn){
    // auto-resolve who wins the conference (flavor), then continue to postseason
    var a=top2[0], b=top2[1];
    var aStr=a.p*10+rnd(0,25), bStr=b.p*10+rnd(0,25);
    champ.result={winner:(aStr>=bStr?a.name:b.name), auto:true};
    champ.done=true;
    s._userConfChampName=champ.result.winner; // remember your conference's champion for league history
  }
  ST.confchamp=champ; s._confchamp=champ;
  ST.screen="confchamp"; persist(); draw();
}

                 postseason:true, confchamp:true, roundName:s.conf+" Championship"};

// A team's "resume strength" — wins matter, but so does program/conference quality.
// Power-conference wins are worth more than Group-of-Five wins (strength of schedule).
var POWER_CONF={"SEC":1,"Big Ten":1,"Big 12":1,"ACC":1};
function isPowerConf(conf){ return !!POWER_CONF[conf]; }
function resumeScore(wins, prestige, conf, wonConf, off){
  var confWeight = isPowerConf(conf) ? 1.0 : 0.62;   // G5 wins are discounted (weaker schedule)
  var base = wins*8*confWeight + prestige*7;
  if(wonConf) base += 10;
  if(off) base += off/12;
  return base;
}
function enterPostseason(){
  var s=ST.save;
  var w=s.wins;
  var power=isPowerConf(s.conf);
  // Power programs make it on record. Group-of-Five teams essentially need to win their
  // conference (auto-bid) AND have a strong record — mirroring the real G5-gets-one-bid rule.
  var makePlayoff = power
    ? ( w>=10 || (w>=9 && s.prestige>=3) || (w>=8 && s.prestige>=5) )
    : ( w>=11 && s._wonConfThisYear );   // G5: only the conf champ with a great record sneaks in
  if(makePlayoff){
    setupPlayoff();
    ST.screen="bracket"; persist(); draw(); return;
  }
  if(w>=6){
    // bowl game
    var pool = (w>=9?NY6:BOWLS);
    var oppP = Math.max(1, Math.min(5, s.prestige + rnd(-1,1)));
    var opp = pickOpponent(oppP);
    ST.post={mode:"bowl", bowlName:pick(pool), opp:opp.n, oc:opp.c, op:opp.p, done:false, result:null};
    ST.screen="bowl"; persist(); draw(); return;
  }
  // no bowl (losing record)
  ST.post=null;
  s._postDone=true;
  ST.screen="offseason"; persist(); draw();
}
function pickOpponent(prestige){
  var cand=FBS_TEAMS.filter(function(t){return t.n!==ST.save.school && Math.abs(t.p-prestige)<=1;});
  if(!cand.length)cand=FBS_TEAMS.filter(function(t){return t.n!==ST.save.school;});
  return pick(cand);
}

// Build a 12-team bracket seeded by strength-weighted resume score.
function setupPlayoff(){
  var s=ST.save, L=s.league;
  var myScore = resumeScore(s.wins, s.prestige, s.conf, s._wonConfThisYear, myUnitRating()) + (L?L.teams[s.school].ovr*0.5:0);
  var iAmG5 = !isPowerConf(s.conf);
  var field=[{name:s.school, p:s.prestige, you:true, score:myScore, g5:iAmG5}];
  // pull the actual best 11 teams from the living league by resume score
  var others=[];
  if(L){
    Object.keys(L.teams).forEach(function(n){
      if(n===s.school)return;
      var t=L.teams[n];
      others.push({name:n, p:t.p, you:false, g5:!isPowerConf(t.c),
                   score: resumeScore(t.w, t.p, t.c, false, t.off) + t.ovr*0.5});
    });
  }
  others.sort(function(a,b){return b.score-a.score;});
  for(var i=0;i<11 && i<others.length;i++){ field.push(others[i]); }
  // seed by resume score
  field.sort(function(a,b){return b.score-a.score;});
  // Enforce realism: a Group-of-Five team can never be seeded higher than 9th.
  var you=null; field.forEach(function(f){ if(f.you)you=f; });
  field.forEach(function(f,idx){ f.seed=idx+1; });
  if(you && you.g5 && you.seed<9){
    field = field.filter(function(f){return !f.you;});
    field.splice(8,0,you);           // insert at index 8 => seed 9
    field.forEach(function(f,idx){ f.seed=idx+1; });
  }
  var mySeed=0; field.forEach(function(f){ if(f.you)mySeed=f.seed; });
  ST.post={
    mode:"playoff", field:field, mySeed:mySeed,
    round: (mySeed<=4?"qf":"r1"),
    roundIdx:0,
    bracket: buildBracketState(field),
    done:false, champion:null
  };
}
// Bracket state: track winners by slot across rounds
function buildBracketState(field){
  var bySeed={}; field.forEach(function(f){ bySeed[f.seed]=f; });
  return {
    r1:[ {a:5,b:12}, {a:8,b:9}, {a:6,b:11}, {a:7,b:10} ], // pairs feeding QF
    byeSeeds:[1,2,3,4],
    bySeed:bySeed,
    results:{}, // key like "r1_0" -> winning seed
    qf:[], sf:[], champ:null
  };
}

// Resolve one CPU game between two seeds → returns winning seed
function cpuGame(seedA, seedB){
  var f=ST.post.bracket.bySeed;
  var a=f[seedA], b=f[seedB];
  // lower seed number = stronger; add variance for upsets
  var aStr=(13-a.seed)*4 + a.p*3 + rnd(0,20);
  var bStr=(13-b.seed)*4 + b.p*3 + rnd(0,20);
  return aStr>=bStr ? seedA : seedB;
}

// Figure out YOUR next opponent seed in the current round based on bracket flow
function myNextOpponent(){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  if(P.round==="r1"){
    // find my r1 pairing
    var pair=null,idx=-1;
    B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me){pair=pr;idx=i;} });
    var opp = pair.a===me?pair.b:pair.a;
    return {seed:opp, idx:idx};
  }
  if(P.round==="qf"){
    ensureR1Resolved();
    // QF: seed1 vs winner(8/9), seed4 vs winner(5/12), seed2 vs winner(7/10), seed3 vs winner(6/11)
    var map={1:1,4:0,2:3,3:2}; // my seed -> which r1 pair feeds me (if I'm a bye seed)
    if(me<=4){ var pi=map[me]; var wseed=B.results["r1_"+pi]; return {seed:wseed, idx:pi, qf:true, byeSlot:me}; }
    // I advanced from r1 — opponent is the corresponding bye seed
    var myPair=-1; B.r1.forEach(function(pr,i){ if(pr.a===me||pr.b===me)myPair=i; });
    var byeMap={1:1,0:4,3:2,2:3}; // r1 pair index -> bye seed faced
    return {seed:byeMap[myPair], idx:myPair, qf:true};
  }
  if(P.round==="sf"){
    // semifinal opponent = winner of the other half
    return {seed:P._sfOpp||null, sf:true};
  }
  if(P.round==="champ"){
    return {seed:P._champOpp||null, champ:true};
  }
  return {seed:null};
}

// Advance the bracket after YOU win a round; auto-resolve CPU games
function advancePlayoff(iWon){
  var P=ST.post, B=P.bracket, me=P.mySeed;
  if(!iWon){
    // you're eliminated — resolve rest of bracket for flavor, then bowl-less offseason
    P.done=true; P.eliminated=true;
    resolveRestOfBracket();
    return;
  }
  if(P.round==="r1"){
    var opp=myNextOpponent();
    B.results["r1_"+opp.idx]=me;
    // resolve the other 3 r1 games
    B.r1.forEach(function(pr,i){ if(i!==opp.idx && B.results["r1_"+i]==null) B.results["r1_"+i]=cpuGame(pr.a,pr.b); });
    P.round="qf"; P.roundIdx++;
    return;
  }
  if(P.round==="qf"){
    // record you winning your QF; resolve other QFs to form SF
    resolveQuarterfinals(me);
    P.round="sf"; P.roundIdx++;
    return;
  }
  if(P.round==="sf"){
    resolveSemifinal(me);
    P.round="champ"; P.roundIdx++;
    return;
  }
  if(P.round==="champ"){
    P.done=true; P.champion=me; // you win it all
    ST.save._wonNatlThisYear=true; ST.save.natlTitles=(ST.save.natlTitles||0)+1;
    ST.save._natlChampName=ST.save.school;
    return;
  }
}
function ensureR1Resolved(){
  var B=ST.post.bracket, me=ST.post.mySeed;
  B.r1.forEach(function(pr,i){
    if(B.results["r1_"+i]==null){
      // if I'm in this pair and haven't played, leave it; otherwise CPU-resolve
      if(pr.a===me||pr.b===me) return;
      B.results["r1_"+i]=cpuGame(pr.a,pr.b);
    }
  });
}
function resolveQuarterfinals(myWinSeed){
  var P=ST.post,B=P.bracket;
  ensureR1Resolved(); // bye seeds skip R1 block, so make sure the field is filled
  // QF pairings by bye seed vs r1 winners: 1v w(8/9)[idx1], 4v w(5/12)[idx0], 2v w(7/10)[idx3], 3v w(6/11)[idx2]
  var qfPairs=[ {bye:1,from:1}, {bye:4,from:0}, {bye:2,from:3}, {bye:3,from:2} ];
  B.qfWinners={};
  qfPairs.forEach(function(p){
    var opp=B.results["r1_"+p.from];
    var involvesMe = (p.bye===myWinSeed) || (opp===myWinSeed);
    if(involvesMe){ B.qfWinners[p.bye]=myWinSeed; }
    else { B.qfWinners[p.bye]=cpuGame(p.bye,opp); }
  });
  // SF bracket: (QF from bye1 & bye4) vs (QF from bye2 & bye3) — standard 1/4 , 2/3 halves
  var w1=B.qfWinners[1], w4=B.qfWinners[4], w2=B.qfWinners[2], w3=B.qfWinners[3];
  B._sfPairs=[ {a:w1,b:w4}, {a:w2,b:w3} ];
  // find my SF opponent
  var mine = (B._sfPairs[0].a===myWinSeed||B._sfPairs[0].b===myWinSeed)?0:1;
  var pr=B._sfPairs[mine];
  P._sfOpp = pr.a===myWinSeed?pr.b:pr.a;
  P._sfHalf=mine;
}
function resolveSemifinal(myWinSeed){
  var P=ST.post,B=P.bracket;
  // resolve the other semifinal
  var otherHalf = P._sfHalf===0?1:0;
  var op=B._sfPairs[otherHalf];
  var otherWinner=cpuGame(op.a,op.b);
  B.sfWinners=[]; B.sfWinners[P._sfHalf]=myWinSeed; B.sfWinners[otherHalf]=otherWinner;
  P._champOpp=otherWinner;
}
function resolveRestOfBracket(){
  // best-effort fill so the bracket view shows a champion even if you lost
  var P=ST.post,B=P.bracket;
  B.r1.forEach(function(pr,i){ if(B.results["r1_"+i]==null)B.results["r1_"+i]=cpuGame(pr.a,pr.b); });
  if(!B.qfWinners) resolveQuarterfinals(-99);
  var w1=B.qfWinners[1],w4=B.qfWinners[4],w2=B.qfWinners[2],w3=B.qfWinners[3];
  var sf1=cpuGame(w1,w4), sf2=cpuGame(w2,w3);
  P.finalChamp=cpuGame(sf1,sf2);
  var cf=(P.field||[]).filter(function(x){return x.seed===P.finalChamp;})[0];
  ST.save._natlChampName = cf?cf.name:(ST.save._natlChampName||null); // remember the champ for league history
}

// Play a postseason game through the SAME live-sim machinery
function playPostGame(){
  var s=ST.save, P=ST.post;
  var oppName, oppP, home=true;
  if(P.mode==="bowl"){ oppName=P.opp; oppP=P.op; home=(Math.random()<0.5); }
  else { var o=myNextOpponent(); oppName=P.bracket.bySeed[o.seed].name; oppP=P.bracket.bySeed[o.seed].p; home=(P.round==="r1"&&P.mySeed<o.seed); }
  var game={opp:oppName, oc:"", op:oppP, home:home};
  var res=simGame(game, ST.planPick||"pro");
  var won=res.us>res.them;
  if(won){ s.wins++; s.careerWins++; } else { s.losses++; s.careerLosses++; }
  var pbp=buildPlayByPlay(res.us,res.them,s.school,oppName);
  ST.weekResult={us:res.us,them:res.them,oppName:oppName,edge:res.edge,oppDefType:res.oppDefType,off:res.off,home:home,pbp:pbp,
                 postseason:true, roundName:(P.mode==="bowl"?P.bowlName:roundLabel(P.round))};
  ST.live={elapsed:0,shownCount:0,done:false,timer:null};
  ST._postWon=won;
  persist();
  ST.screen="live"; draw(); startLiveSim();
}
// Called by finishLive when the game was a postseason game
function finishPostGame(){
  var P=ST.post, won=ST._postWon;
  if(P.mode==="bowl"){
    P.done=true; P.result={us:ST.weekResult.us,them:ST.weekResult.them};
    if(won) ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+5);
    ST.weekResult=null; ST.live=null; ST.planPick=null;
    ST.screen="bowl"; persist(); draw(); return;
  }
  // playoff
  advancePlayoff(won);
  if(P.done && P.champion===P.mySeed){ ST.save.titles=(ST.save.titles||0)+1; ST.save.jobSecurity=Math.min(100,ST.save.jobSecurity+15); }
  ST.weekResult=null; ST.live=null; ST.planPick=null;
  ST.screen="bracket"; persist(); draw();
}

               diff>=0?"Met the season's expectation.":
               diff>=-2?"Fell short of expectations. Seat's getting warm.":

  s.roster.slice().sort(function(a,b){return b.ovr-a.ovr;}).forEach(function(p){

       (grad?'':'<button class="rr-cut'+(cut?' undo':'')+'" data-cut="'+p.id+'">'+(cut?"Undo":"Cut")+'</button>')+
       '</div>';
  });

  // Recruiting class recap — who committed, and who will actually make the roster (position caps)
  var commits=committedRecruits();
  if(commits.length){
    // simulate the position-cap signing to flag who fits and who's over the limit
    var capFor=function(pos){ return rosterSizeAt(pos); };
    // Only players who will actually still be here next year hold a spot:
    // graduating seniors leave, and anyone you've cut is gone too.
    var have={}; s.roster.forEach(function(p){ if(p.yr==="SR"||p.cut)return; have[p.pos]=(have[p.pos]||0)+1; });
    var sorted=commits.slice().sort(function(a,b){return b.st-a.st||b.ovr-a.ovr;});
    var willSign=0, willCut=0;
    var flags={};
    sorted.forEach(function(b){
      var cap=capFor(b.pos), cur=have[b.pos]||0;

    h+='<div class="sec-title">🖊️ Recruiting Class <span class="pill">'+willSign+' signing</span></div>';

    h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 8px">'+note+'</div>';
    sorted.forEach(function(b){
      var cut=(flags[b.id]==="cut");
      h+='<div class="roster-row"'+(cut?' style="opacity:.5"':'')+'><div class="rr-pos">'+b.pos+'</div>'+
         '<div class="rr-name">'+x(b.n)+' <span class="rec-stars" style="font-size:10px">'+stars(b.st)+'</span></div>'+

    });

    h+='<div style="font-size:10px;font-weight:700;color:var(--muted);margin:0 2px 10px">No commits landed this season. Spend more recruiting points on the <b>Recruit</b> tab during the year to build a class.</div>';
  }

  h+='<button class="btn" id="open-tree" style="width:100%;margin-bottom:8px;padding:11px;font-size:13px;font-weight:900;background:#fff;border:2px solid var(--border);border-radius:11px;box-shadow:3px 3px 0 var(--border)">🌳 Coaching Tree <span class="pill" style="margin-left:6px">'+coachXP()+' XP</span></button>';
  h+='<button class="bigbtn btn-green" id="advance-season">Advance to Season '+(s.season+1)+' →</button>';
  h+='<div style="font-size:10px;font-weight:700;color:var(--muted);text-align:center;margin:8px 2px 0;line-height:1.5">Job offers come every offseason — the better your season, the better the jobs (including <b>Head Coach</b> promotions).</div>';
  h+='<div style="display:flex;gap:8px;margin-top:10px">'+
     '<button class="btn btn-red" id="reset-dynasty" style="flex:1;padding:10px">Reset Dynasty</button>'+
     '</div>';
  return h+'</div>';
}

// Toggle a roster player's "cut" flag in the offseason. Cut players are released
// when you advance, freeing their position spot so a better incoming signee can sign.
function cutPlayer(id){
  var s=ST.save; if(!s||!s.roster)return;
  var p=s.roster.filter(function(r){return r.id===id;})[0];
  if(!p)return;
  if(p.yr==="SR"){ toast("Seniors graduate on their own"); return; }
  if(!p.cut){
    // Warn before cutting a projected starter (top of the depth chart at their spot,
    // ignoring seniors/already-cut players who won't be here next year).
    var pool=depthOrder(s.roster.filter(function(r){return r.yr!=="SR" && !r.cut;}), p.pos);
    var isStarter=pool.slice(0, startersAt(p.pos)).some(function(r){return r.id===p.id;});
    if(isStarter && !confirm("⚠️ "+p.n+" ("+p.pos+", "+p.ovr+" OVR) is a projected starter next season. Cut them anyway?")) return;
  }
  p.cut=!p.cut;
  toast(p.cut ? (x(p.n)+" will be cut") : (x(p.n)+" kept on roster"));
  persist();
  draw();
}

    // roster full: replace your weakest at the position if this transfer is an upgrade
    var worst=atPos.slice().sort(function(a,b){return a.ovr-b.ovr;})[0];

// ── Player stats (Phase 3) ───────────────────────────────
// Box scores are SYNTHESIZED from the final score + your scheme + starter archetypes +
// depth chart. They're internally consistent (TDs sum to the score) and feel right.
function ensureStats(p){ if(!p.stats)p.stats={season:{},career:{}}; if(!p.gamelog)p.gamelog=[]; }
function addStat(p, obj){
  ensureStats(p);
  Object.keys(obj).forEach(function(k){
    p.stats.season[k]=(p.stats.season[k]||0)+obj[k];
    p.stats.career[k]=(p.stats.career[k]||0)+obj[k];
  });
}
function logGame(p, opp, line){ ensureStats(p); p.gamelog.push({wk:ST.save.week+1, opp:opp, line:line}); }
function _norm(w){ var t=w.reduce(function(a,b){return a+b;},0)||1; return w.map(function(x){return x/t;}); }
function _apportion(total, fracs){ var o=fracs.map(function(f){return Math.max(0,Math.round(total*f));}); var d=total-o.reduce(function(a,b){return a+b;},0); if(o.length)o[0]=Math.max(0,o[0]+d); return o; }
// Turn your offense's points into a passing/rushing/receiving box score.
function genOffenseBox(pts, opp){
  var s=ST.save, sc=offScheme();
  var top=function(pos,n){ return depthOrder(s.roster,pos).slice(0,n||1); };
  var passShare=Math.max(0.28, Math.min(0.74,(100-sc.lean)/100));
  var totYds=Math.round(Math.max(170,Math.min(650, 250+(pts-24)*9+rnd(-40,40))));
  var passYds=Math.round(totYds*passShare), rushYds=totYds-passYds;
  var tds=Math.max(0,Math.round((pts-rnd(0,6))/7)); // offensive TDs (some points come from FGs)
  var passTD=Math.round(tds*passShare), rushTD=Math.max(0,tds-passTD);
  var comp=0;
  var qb=top("QB",1)[0];
  if(qb){
    comp=Math.max(8,Math.round(passYds/(11+Math.random()*3)));
    var att=Math.max(comp+2,Math.round(comp/(0.54+Math.random()*0.14)));
    var pint=Math.random()<0.32?rnd(1,2):0;
    var qbRush=0,qbCar=0,qbRuTD=0;
    if(qb.arch==="Dual-Threat" && rushYds>30){ qbRush=Math.round(rushYds*(0.30+Math.random()*0.15)); rushYds-=qbRush; qbCar=rnd(7,13); if(rushTD>0&&Math.random()<0.5){qbRuTD=1;rushTD--;} }
    addStat(qb,{pa:att,pc:comp,py:passYds,ptd:passTD,pint:pint,rc:qbCar,ry:qbRush,rtd:qbRuTD,g:1});
    logGame(qb,opp,"PASS "+comp+"/"+att+" "+passYds+"yd "+passTD+"TD"+(pint?" "+pint+"INT":"")+(qbRush?" · RUSH "+qbRush+"yd"+(qbRuTD?" "+qbRuTD+"TD":""):""));
  }
  var rbs=top("RB",2);
  if(rbs.length){
    var rw=rbs.map(function(p,i){ var b=i===0?0.7:0.3; if(p.arch==="Power Back")b*=1.12; if(p.arch==="Receiving Back")b*=0.88; return b; });
    var ryS=_apportion(rushYds,_norm(rw)), carS=_apportion(Math.max(rbs.length*6,Math.round(rushYds/4.4)),_norm(rw));
    rbs.forEach(function(p,i){
      var rtd=(i===0)?rushTD:0;
      addStat(p,{rc:carS[i],ry:ryS[i],rtd:rtd,g:1});
      logGame(p,opp,"RUSH "+carS[i]+"car "+ryS[i]+"yd"+(rtd?" "+rtd+"TD":""));
    });
  }
  var recvs=top("WR",3).concat(top("TE",1));
  if(recvs.length && comp>0){
    var cw=recvs.map(function(p,i){ var b=i===0?0.34:(i===1?0.26:(i===2?0.18:0.14)); if(p.arch==="Possession"||p.arch==="Slot"||p.arch==="Receiving TE")b*=1.15; if(p.arch==="Vertical Threat")b*=0.85; if(p.arch==="Blocking TE")b*=0.5; return b; });
    var recS=_apportion(comp,_norm(cw));
    var yw=recvs.map(function(p,i){ return cw[i]*(p.arch==="Vertical Threat"?1.5:1); });
    var yS=_apportion(passYds,_norm(yw));
    var tdLeft=passTD;
    recvs.forEach(function(p,i){
      if(recS[i]<=0 && yS[i]<=0) return;
      var rtd=0; if(tdLeft>0 && (i<2 || Math.random()<0.4)){ rtd=1; tdLeft--; }
      addStat(p,{rec:recS[i],recy:yS[i],rectd:rtd,g:1});
      logGame(p,opp,"REC "+recS[i]+" "+yS[i]+"yd"+(rtd?" "+rtd+"TD":""));
    });
  }
}
// Turn points allowed into a defensive box score across your starters.
function genDefenseBox(ptsAllowed, opp){
  var s=ST.save, sc=defScheme();
  var top=function(pos,n){ return depthOrder(s.roster,pos).slice(0,n); };
  var perf=Math.max(0,Math.min(1,(30-ptsAllowed)/30));
  var totTkl=rnd(52,66);
  var sacks=Math.max(0,Math.round(1+perf*3+(sc.lean>60?1:0)+(Math.random()<0.5?1:0)));
  var tfls=rnd(3,7), ints=(Math.random()<(0.22+perf*0.5))?rnd(1,2):0, pbus=rnd(2,6);
  var groups=[
    {pos:"LB",tkl:1.5,sack:sc.lean>55?0.8:0.4,int:0.4,tfl:1.0,pbu:0.4},
    {pos:"S", tkl:1.1,sack:0.1,int:1.0,tfl:0.3,pbu:0.9},
    {pos:"CB",tkl:0.7,sack:0.1,int:1.2,tfl:0.2,pbu:1.6},
    {pos:"DL",tkl:0.9,sack:2.2,int:0.05,tfl:1.6,pbu:0.2}
  ];
  var players=[],tW=[],sW=[],iW=[],fW=[],pW=[];
  groups.forEach(function(gr){
    top(gr.pos,startersAt(gr.pos)).forEach(function(p){
      players.push(p);
      var am=(p.arch==="Pass Rusher")?1.6:1, bh=(p.arch==="Ball-Hawk")?1.7:1, th=(p.arch==="Thumper")?1.4:1, bz=(p.arch==="Blitzer")?1.5:1;
      tW.push(gr.tkl*th); sW.push(gr.sack*am*bz); iW.push(gr.int*bh); fW.push(gr.tfl*am); pW.push(gr.pbu);
    });
  });
  if(!players.length) return;
  var tA=_apportion(totTkl,_norm(tW)),sA=_apportion(sacks,_norm(sW)),fA=_apportion(tfls,_norm(fW)),iA=_apportion(ints,_norm(iW)),pA=_apportion(pbus,_norm(pW));
  players.forEach(function(p,i){
    addStat(p,{tkl:tA[i],sack:sA[i],tfl:fA[i],dint:iA[i],pbu:pA[i],g:1});
    var parts=[tA[i]+" tkl"]; if(sA[i])parts.push(sA[i]+" sack"); if(fA[i])parts.push(fA[i]+" TFL"); if(iA[i])parts.push(iA[i]+" INT"); if(pA[i])parts.push(pA[i]+" PBU");
    logGame(p,opp,parts.join(", "));
  });
}

// Continuous game-clock sim: clock runs smoothly 0->3600s; plays reveal as the clock passes them.
var LIVE_GAME_MS=9000;   // whole game plays out in ~9 seconds
var LIVE_TICK_MS=40;     // frame rate
function startLiveSim(){
  stopLiveSim();
  var r=ST.weekResult;
  ST.live.elapsed=0; ST.live.shownCount=0; ST.live.done=false;
  if(!r.pbp||!r.pbp.length){ ST.live.elapsed=3600; ST.live.done=true; renderLiveScore(); return; }
  // reduced-motion: skip the ticking animation, show the final immediately
  try{ if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches){ ST.live.elapsed=3600; ST.live.done=true; renderLiveScore(); return; } }catch(e){}
  var perTick=3600/(LIVE_GAME_MS/LIVE_TICK_MS); // game-seconds advanced per frame
  ST.live.timer=setInterval(function(){
    ST.live.elapsed+=perTick;
    if(ST.live.elapsed>=3600){ ST.live.elapsed=3600; ST.live.done=true; stopLiveSim(); }
    renderLiveScore();
  }, LIVE_TICK_MS);
}
function stopLiveSim(){ if(ST.live&&ST.live.timer){ clearInterval(ST.live.timer); ST.live.timer=null; } }
function skipLive(){ stopLiveSim(); ST.live.elapsed=3600; ST.live.done=true; renderLiveScore(); }
function finishLive(){

// Format absolute elapsed seconds into "Qn · MM:SS" (clock counts down within each quarter)
function fmtGameClock(elapsed){
  if(elapsed>=3600) return "FINAL";
  var q=Math.min(4,Math.floor(elapsed/900)+1);
  var into=elapsed-(q-1)*900;      // seconds into this quarter
  var left=Math.max(0,900-into);   // seconds left in quarter
  var mm=Math.floor(left/60), ss=Math.floor(left%60);
  return "Q"+q+" · "+mm+":"+(ss<10?"0"+ss:ss);
}
// Update just the live DOM (avoid full redraw so the feed animates smoothly)

        '<div class="stat"><div class="stat-v">'+r.off+'</div><div class="stat-l">Offense</div></div>'+
        '<div class="stat"><div class="stat-v">'+(ST.save.week<ST.save.schedule.length?"W"+(ST.save.week+1):"Bowl")+'</div><div class="stat-l">Next</div></div>'+

function advanceSeason(){
  var s=ST.save;
  if(s._evaluated){
    if(s._pendingFired){ ST.fired=ST.fired||{school:s.school,seasons:s.seasonsPlayed}; ST.carousel=ST.carousel||genCarousel(true); ST.screen="fired"; draw(); return; }
    // regenerate offers if they were lost (e.g. page reload — carousel isn't persisted)
    if(!ST.carousel||!ST.carousel.length){ ST.carousel=genCarousel(false); }
    if(ST.carousel&&ST.carousel.length){ ST.screen="carousel"; draw(); return; }
    startNextSeason(); return;
  }
  s.seasonsPlayed=(s.seasonsPlayed||0)+1;
  s._evaluated=true;
  // defensive: ensure fields exist on older saves so nothing below crashes
  if(!s.history) s.history=[];
  if(!s.abilities) s.abilities=[];
  if(s.coachXP==null) s.coachXP=0;
  if(!s.archetype) s.archetype="offensive";
  if(s.titles==null) s.titles=0;
  // record title
  if(s.wins>=11){ s.titles++; toast("🏆 Conference title season!"); }
  s.history.push({season:s.season,wins:s.wins,losses:s.losses,school:s.school,expect:s.expectWins});
  s._lastWins=s.wins; // feeds next season's NIL budget
  recordChampions(); // log this year's national & conference champions to the league history

  // ── Coach XP: earn from wins, meeting expectations, and postseason success ──
  s._xpGainedThisYear=0;
  awardCoachXP(Math.floor(s.wins/2), "wins");            // ~1 XP per 2 wins
  if(s.wins>=s.expectWins) awardCoachXP(2, "met expectations");
  if(s.wins>=11) awardCoachXP(3, "title season");        // strong season / conference title
  if(s._wonNatlThisYear) awardCoachXP(5, "national title");

  // ── evaluate season vs expectation → adjust job security ──
  var cult = hasAbility("pro4")?0.4:(hasAbility("pro1")?0.6:1); // Dynasty > Culture: security erodes more slowly
  var diff = s.wins - s.expectWins;
  if(diff>=2){ s.jobSecurity=Math.min(100,s.jobSecurity+20); s.missedYears=0; }
  else if(diff>=0){ s.jobSecurity=Math.min(100,s.jobSecurity+12); s.missedYears=0; }
  else if(diff>=-1){ s.jobSecurity=Math.max(0,s.jobSecurity-Math.round(8*cult)); s.missedYears=0; }
  else if(diff>=-3){ s.jobSecurity=Math.max(0,s.jobSecurity-Math.round(16*cult)); s.missedYears++; }
  else { s.jobSecurity=Math.max(0,s.jobSecurity-Math.round(26*cult)); s.missedYears++; }
  if(hasAbility("leg3")){ s.jobSecurity=Math.max(s.jobSecurity,45); s.missedYears=0; } // Immortal: never truly on the hot seat

  // prestige drift
  if(s.wins>=10&&s.prestige<5)s.prestige++;
  else if(s.wins<=3&&s.prestige>1)s.prestige--;

  // graduate seniors, age up, develop — and let underfunded/unhappy players hit the portal
  var YR_NEXT={FR:"SO",SO:"JR",JR:"SR"};
  var kept=[], departed=[];
  s.roster.forEach(function(p){
    if(p.yr==="SR"||p.cut)return; // seniors graduate; anyone you cut is released
    var risk=retentionRisk(p);
    if(risk!=null && risk>0 && Math.random()*100<risk){ departed.push({n:p.n,pos:p.pos,ovr:p.ovr,arch:p.arch,yr:YR_NEXT[p.yr]||p.yr,dev:p.dev}); return; } // enters the transfer portal
    p.yr=YR_NEXT[p.yr]||p.yr;
    var pot = Math.max(p.pot!=null?p.pot:99, p.ovr); // ceiling (never below current, for old saves)
    var head = pot - p.ovr;
    var doff=devInfo(p.dev).off; var dv = rnd(doff[0],doff[1]); // Elite up to +4, Bust ~0-1
    if(dv>0){
      if((hasArch("developer")||hasAbility("dev3")||hasAbility("pro3"))) dv += rnd(1,2); // stronger offseason growth
      if(hasAbility("dev5")) dv += rnd(1,2); // Dynasty Pipeline
      if(hasAbility("leg3")) dv += rnd(2,3); // Immortal
      if(facLvl("training")>0) dv += Math.min(3, Math.ceil(facLvl("training")/2)); // Training Facilities
      dv = Math.min(dv, head); // never grow past the ceiling
    }
    p.ovr=Math.max(50,Math.min(99,p.ovr+dv));
    if(!devInfo(p.dev).hidden && (p.yr==="JR"||p.yr==="SR"||Math.abs(p.ovr-(p.startOvr||p.ovr))>=3)) p.revealed=true;
    kept.push(p);
  });
  s.roster=kept;
  s._portalOut=departed; // players who transferred out — shown in the portal window
  // living league: teams' ratings drift based on how they performed vs their rating
  driftLeagueRatings();
  simLeaguePortal(); // rivals work the portal too — the league's balance shifts

  // ── firing check: hot seat + missed expectations two+ years, or rock-bottom security ──
  var fired = (s.jobSecurity<=0) || (s.jobSecurity<25 && s.missedYears>=2);
  if(fired){
    s._pendingFired=true;
    ST.fired={school:s.school, seasons:s.seasonsPlayed};
    ST.carousel=genCarousel(true);
    persist();
    ST.screen="fired"; draw(); return;
  }
  // portal fallout: losing notable players dents fan confidence (applied after the firing check)
  var sigOut=departed.filter(function(d){return d.ovr>=75;}).length;
  s._portalSecHit=Math.min(18, sigOut*4);
  if(s._portalSecHit>0) s.jobSecurity=Math.max(1, s.jobSecurity - s._portalSecHit);

  // ── carousel: offers may appear if you're doing well ──
  ST.carousel=genCarousel(false);
  if(ST.carousel && ST.carousel.length){
    persist();
    ST.screen="carousel"; draw(); return;
  }

  // no offers, not fired → continue at current school
  startNextSeason();
}

// Begin the next season at the current school

// Add all committed recruits to the roster as freshmen (signing day)
function signCommittedRecruits(){
  var s=ST.save; if(!s.board) return;
  // roster cap per position = 4 deep at each starting slot (a full FR→SR pipeline)
  var capFor=function(pos){ return rosterSizeAt(pos); };
  var have={};
  s.roster.forEach(function(p){ have[p.pos]=(have[p.pos]||0)+1; });
  // sort commits best-first so, if a position is tight, the top prospects get the spots
  var commits=s.board.filter(function(b){return b.status==="committed";})
                     .sort(function(a,b){ return b.st-a.st || b.ovr-a.ovr; });
  var signed=0, cut=0;
  commits.forEach(function(b){
    var cap=capFor(b.pos), cur=have[b.pos]||0;
    if(cur<cap){
      // If you fully scouted them, you already know their dev trait — keep it revealed on the roster.
      s.roster.push({id:b.id,n:b.n,pos:b.pos,ovr:b.ovr,yr:"FR",dev:b.dev,arch:b.arch||rollArch(b.pos),pot:rollPotential(b.ovr,b.dev),st:b.st,startOvr:b.ovr,ssOvr:b.ovr,revealed:(b.scout>=maxScoutTier())});
      have[b.pos]=cur+1; signed++;
    } else {
      cut++; // over-recruited at this position — they sign elsewhere / grayshirt out
    }
  });
  s._signedThisYear=signed;
  s._cutThisYear=cut;
}

// Generate coaching-carousel job openings.
// fired=true → only lateral/lower jobs; performing well → step-up jobs appear.
function genCarousel(fired){
  var s=ST.save;
  var cur=s.prestige;
  var offers=[];
  var over = (s.wins - s.expectWins) + (hasAbility("pro2")?2:0) + (hasAbility("pro5")?4:0); // Reputation / Living Legend: better offers appear
  var pool=FBS_TEAMS.filter(function(t){return t.n!==s.school;});
  function take(list){ if(!list.length)return null; var t=list.splice(Math.floor(Math.random()*list.length),1)[0]; pool=pool.filter(function(x){return x.n!==t.n;}); return t; }
  function cand(minP,maxP){ return pool.filter(function(t){return t.p>=minP&&t.p<=maxP;}); }
  function addOffer(t,role){ if(t) offers.push({n:t.n,c:t.c,p:t.p,role:role}); }
  var clamp=function(v){ return Math.max(1,Math.min(5,v)); };

  if(fired){
    // ── Rebound offers: always a fresh start somewhere, usually a step down ──
    // Worse you did, further you fall — but there is ALWAYS a landing spot.
    var drop = over<=-4 ? 2 : 1;              // brutal season = fall two tiers
    var hi=clamp(cur-drop), loP=clamp(cur-drop-1);
    var coordRole=(s.role==="DC")?"DC":"OC";
    addOffer(take(cand(loP,hi)),coordRole);
    addOffer(take(cand(loP,hi)),coordRole);
    // a rebuild HC job at a small program willing to gamble on you (always a stepping stone)
    addOffer(take(cand(1, Math.min(2, Math.max(1,cur-1)))),"HC");
    // guarantee at least 2 offers by widening if needed
    if(offers.length<2) addOffer(take(cand(1,cur)),coordRole);
    if(offers.length<2) addOffer(take(cand(1,5)),coordRole);
  } else if(s.role==="OC"||s.role==="DC"){
    var coord=s.role; // OC stays OC, DC stays DC when moving laterally
    // ── First-time Head Coach jobs are STEPPING STONES ──
    var hcCeil = over>=3 ? 3 : (over>=1 ? 2 : 1);   // great year tops out at a 3-star HC job
    hcCeil = Math.min(hcCeil, Math.max(1, cur-2));   // and always a real step down from your school
    var hcFloor = 1;
    addOffer(take(cand(hcFloor, hcCeil)), "HC");
    if(over>=2) addOffer(take(cand(hcFloor, hcCeil)), "HC"); // strong year → a second HC option
    // ── Lateral / step-up coordinator jobs, ceiling scales with results ──
    if(over>=2 && cur<5){ addOffer(take(cand(cur+1,clamp(cur+2))),coord); }
    else if(over>=0){ addOffer(take(cand(cur,clamp(cur+1))),coord); }
    else { addOffer(take(cand(clamp(cur-1),cur)),coord); }
    if(offers.length<2) addOffer(take(cand(clamp(cur-1),clamp(cur+1))),coord);
  } else {
    // ── Already a Head Coach: NOW you climb as a HC, one tier at a time ──
    // Proven HCs move up gradually — a good year at a 2-star gets you a 3-star job, not a 5-star.
    if(over>=2 && cur<5){ addOffer(take(cand(cur+1,clamp(cur+1))),"HC"); }  // one tier up, earned
    else if(over>=0){ addOffer(take(cand(cur,clamp(cur+1))),"HC"); }        // lateral or slight step up
    else { addOffer(take(cand(clamp(cur-1),cur)),"HC"); }                   // down year → lateral/step down
    addOffer(take(cand(clamp(cur-1),clamp(cur+1))),"HC");                   // a comparable second option
  }
  // de-dupe by school name, keep up to 4
  var seen={}, uniq=[];
  offers.forEach(function(o){ if(o&&!seen[o.n]){seen[o.n]=1;uniq.push(o);} });
  // absolute safety net: never return an empty slate
  if(!uniq.length){ var anyT=take(cand(1,5)); if(anyT){ uniq.push({n:anyT.n,c:anyT.c,p:anyT.p,role:s.role==="HC"?"HC":"OC"}); } }
  return uniq.slice(0,4);
}
// Take a job from the carousel (or after being fired). Offer carries its own role.
function takeJob(offer){
  var s=ST.save;
  var newRole = offer.role || s.role;
  var carry={careerWins:s.careerWins,careerLosses:s.careerLosses,titles:s.titles,seasonsPlayed:s.seasonsPlayed,abilities:s.abilities,jobsHeld:(s.jobsHeld||1)+1,history:s.history,coachXP:s.coachXP,archetype:s.archetype};
  var fresh=newSave({n:offer.n,c:offer.c,p:offer.p}, newRole);
  fresh.careerWins=carry.careerWins; fresh.careerLosses=carry.careerLosses; fresh.titles=carry.titles;
  fresh.seasonsPlayed=carry.seasonsPlayed; fresh.abilities=carry.abilities; fresh.jobsHeld=carry.jobsHeld;
  fresh.coachXP=carry.coachXP||0; fresh.archetype=carry.archetype||fresh.archetype;
  fresh.history=carry.history; fresh.jobSecurity=55; // fresh mandate at a new job
  if(s.league) fresh.league=s.league; // the world continues — keep the living league
  ST.save=fresh; ST.fired=null; ST.carousel=null;
  beginSeasonRecruiting();       // fresh recruiting board at the new school
  fresh._recruited=false; fresh.week=0;
  buildLeagueConfSchedule();
  stampSeasonStart();
  persist();
  if(newRole!==s.role && newRole==="HC") toast("🎉 Promoted to Head Coach!");
  enterPreseason();
}

// ── Boot ─────────────────────────────────────────────────
loadData();
draw();
</script>
