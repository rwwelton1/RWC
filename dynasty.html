.mu-c{flex:0 0 78px;font-weight:900}
.mu-good{flex:1;color:var(--green)}
.mu-bad{flex:1;color:var(--red2)}
/* live: who you're facing + how your call grades against them */
.tac-opp{font-size:9.5px;font-weight:800;color:var(--muted);background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:5px 8px;margin-bottom:8px;text-align:center}
.tac-opp b{color:var(--text)}
.tac-read{font-size:9.5px;font-weight:800;line-height:1.6;color:var(--text);border-top:1.5px dashed var(--border2);padding-top:7px;margin-top:2px}
/* a unit you don't coach: shown, never callable */
.tac-chip.locked{opacity:.55;font-style:italic}
.tac-locked{font-size:9px;font-weight:700;color:var(--muted);line-height:1.5;background:var(--cream);border:2px dashed var(--border2);border-radius:8px;padding:6px 8px;margin-top:6px}
.sr-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:2px 0}
.sr-lbl{font-size:11px;font-weight:900}
.sr-hint{font-size:9px;font-weight:700;color:var(--muted);margin-top:5px;text-align:center}
.sr-swipe{position:relative}
.sr-pane{display:none;padding:0 2px;box-sizing:border-box;min-width:0}
.sr-pane.on{display:block}
.sr-tabs{display:flex;gap:6px;justify-content:center;margin-bottom:9px}
.sr-tab{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);background:transparent;border:none;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .12s}
.sr-tab.on{color:#fff;background:var(--accent,#7c5cff)}
.sr-gp-head{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:8px}
.sw-details{margin-top:8px;border-top:1.5px dashed var(--border2);padding-top:8px}
.sw-details>summary{font-size:10px;font-weight:900;color:var(--accent,#7c5cff);cursor:pointer;list-style:none;padding:2px 0}
.sw-details>summary::-webkit-details-marker{display:none}
.sw-details>summary::after{content:" ▾";color:var(--muted)}
.sw-details[open]>summary::after{content:" ▴"}

button:focus-visible,a:focus-visible,input:focus-visible{outline:3px solid var(--blue);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.001ms !important;animation-duration:.001ms !important}}

function initLeague(){
  var teams={};
  // FCS teams first — lower rating band, flagged with div:"FCS"
  FCS_TEAMS.forEach(function(t){
    var r=FCS_TEAM_RATINGS[t.n], off, def, ovr;
    if(r){ off=r.o; def=r.d; ovr=r.v; }
    else { var b=44+t.p*6; off=Math.max(44,Math.min(78,b+rnd(-4,4))); def=Math.max(44,Math.min(78,b+rnd(-4,4))); ovr=Math.round((off+def)/2); }
    teams[t.n]={off:off, def:def, ovr:ovr, p:t.p, c:t.c, div:"FCS", w:0, l:0, cw:0, cl:0, _playedWeek:-1};
  });
  FBS_TEAMS.forEach(function(t){
    var r=TEAM_RATINGS[t.n], off, def, ovr;
    if(r){ off=r.o; def=r.d; ovr=r.v; }                       // real 2026 rating
    else { var base=58+t.p*6; off=Math.max(50,Math.min(99,base+rnd(-5,5))); def=Math.max(50,Math.min(99,base+rnd(-5,5))); ovr=Math.round((off+def)/2); }
    teams[t.n]={off:off, def:def, ovr:ovr, p:t.p, c:t.c, div:"FBS", w:0, l:0, cw:0, cl:0, _playedWeek:-1};
  });
  return {teams:teams, week:0};
}

function openNIL(kind, id){
  var s=ST.save;
  var maxA;
  if(kind==="recruit"){ var b=(s.board||[]).filter(function(x){return x.id===id;})[0]; if(!b)return; var cap=nilRecruitCap(); maxA=Math.max(0,Math.min(s.nilLeft, cap.per, cap.total-(b.nil||0))); }
  else { var p=(s.roster||[]).filter(function(x){return x.id===id;})[0]; if(!p)return; var dem=nilDemand(p); maxA=Math.max(0,Math.min(s.nilLeft, Math.max(dem*1.5,1)-(p.nilFund||0))); }
  if(maxA<=0){ toast(kind==="recruit"?"NIL offer maxed for this recruit":"Fully funded"); return; }
  ST.nilPick={kind:kind, id:id};
  ST.nilPickVal=0; // always start at $0
  draw();
}

function pickRivalsFor(st, exclude){
  var L=ST.save.league;
  var cand=rivalCandidates(st, exclude);
  // A blue-chip's list is short and elite; a low-star has a long, scattered field.
  var nRivals=1+Math.floor(Math.random()*3);
  var rivals=[];
  for(var r=0; r<nRivals && cand.length; r++){
    var total=0, i;
    for(i=0;i<cand.length;i++) total+=cand[i].w;
    var roll=Math.random()*total, acc=0, hit=cand.length-1;
    for(i=0;i<cand.length;i++){ acc+=cand[i].w; if(roll<=acc){ hit=i; break; } }
    var rv=cand.splice(hit,1)[0].t;          // no duplicates
    var rt=L&&L.teams?L.teams[rv.n]:null;
    var rPull = rivalPull(rv.n, rt, rv.p) * starFitMult(st, rv.p, rv.c);
    // A 5-star's suitors have been at this for a year already — they start ahead of you.
    var head = headStartFor(st);
    rivals.push({name:rv.n, p:rv.p, interest: Math.max(3, Math.min(80, Math.round(rPull*0.62 + rnd(-6,6) + head))) });
  }
  return rivals;
}

function recruitTraitDisplay(b){
  if(b.scout<maxScoutTier()) return "";
  return devChip(b.dev);   // a chip, not the old .rec-trait pill (which double-bordered inside a chip)
}


function userConfRecord(){
  var s=ST.save, cw=0, cl=0;
  s.schedule.forEach(function(g){ if(g.oc===s.conf && g.result){ if(g.result.us>g.result.them)cw++; else cl++; } });
  return {cw:cw, cl:cl};
}

function confChampBody(){
  var s=ST.save, C=ST.confchamp, h='';
  if(!C.done && C.youIn){
    var opp=C.top2[0].name===s.school?C.top2[1]:C.top2[0];
    h+='<div class="hero" style="text-align:center"><h1>🏆 '+x(s.conf)+' Championship</h1>'+
       '<p>You finished top-2 in the '+x(s.conf)+'! Beat <b>'+x(opp.name)+'</b> ('+stars(opp.p)+') to win the conference — it boosts your playoff seeding and counts as a title.</p></div>';
    h+=schemeReadout(opp.name);   // the biggest game of the year was the one you couldn't scout
    h+='<button class="bigbtn btn-purple" id="play-confchamp" style="background:var(--purple);color:#fff">Play '+x(s.conf)+' Championship →</button>';
    h+=schemeToggle();
    h+=confStandingsTable();
    return h;
  }
  // done (either you played, or auto-resolved)
  var iWon=C.result&&C.result.winner===s.school;
  h+='<div class="hero" style="text-align:center;'+(iWon?'background:var(--gold-bg);border-color:var(--gold-dark)':'')+'">'+
     '<h1>'+(iWon?"🏆 "+x(s.conf)+" CHAMPIONS!":x(s.conf)+" Championship")+'</h1>'+
     '<p>'+(iWon?("You won the "+x(s.conf)+"! On to the postseason with momentum."):
            ((C.result?x(C.result.winner):"?")+" won the "+x(s.conf)+" title."+(C.youIn?" Tough loss in the final.":" You didn\u2019t qualify this year.")))+'</p></div>';
  h+=confStandingsTable();
  h+='<button class="bigbtn btn-gold" id="confchamp-continue">Continue to Postseason →</button>';
  return h;
}

function idealOffBalance(){
  var passStrength=(bestAt(["QB"])*1.3 + bestAt(["WR","TE"]))/2.3;
  var runStrength =(bestAt(["RB"]) + bestAt(["OL"])*1.2)/2.2;
  return Math.max(0,Math.min(100, Math.round(50 + (runStrength-passStrength)*2.2)));
}

// Non-conference games are bought and sold in real football: a power program pays a smaller
// school a guarantee to come take a beating, and a G5 program sells the trip because the cheque
// funds its athletic department. This turns that into a real decision — and gives NIL money a
// second use beyond recruiting.
//
// Deals are struck at the league meeting and honoured NEXT season, so scheduling becomes a thing
// you plan a year ahead. A signed deal locks that opponent onto your slate.
function schedMarketOffers(){
  var s=ST.save, L=s.league; if(!L) return [];
  if(s._schedOffers && s._schedOffersYear===(s.seasonsPlayed||1)) return s._schedOffers;
  var me=L.teams[s.school]; if(!me) return [];
  var myTier=(s.confTier&&s.confTier[s.conf]!=null)?s.confTier[s.conf]:(CONF_TIER[s.conf]||0);
  var myP=s.prestige||3;

  Object.keys(L.teams).forEach(function(n){
    if(n===s.school) return;
    var t=L.teams[n];
    if((t.div||"FBS")!=="FBS") return;
    if(t.c===s.conf) return;                     // league games aren't for sale
    var theirTier=(s.confTier&&s.confTier[t.c]!=null)?s.confTier[t.c]:(CONF_TIER[t.c]||0);
    var prox=proximity(s.school,n);
    var gap=myTier-theirTier;
    var entry=null;
    if(gap>=1){
      // You're the bigger program: pay them to come to your place.
      var fee=1.2 + (t.p||3)*0.45 + theirTier*0.6;
      entry={opp:n, kind:"buy", home:true, fee:Math.round(fee*10)/10,
             label:"Guarantee game \u2014 they visit you"};

      // They're bigger: take their money for a road trip.
      var pay=1.0 + (t.p||3)*0.5 + theirTier*0.7;
      entry={opp:n, kind:"sell", home:false, fee:Math.round(pay*10)/10,
             label:"Money game \u2014 you travel, they pay"};

      // Peers nearby: a home-and-home, no money either way.
      entry={opp:n, kind:"series", home:true, fee:0,
             label:"Home-and-home series"};
    }

  // shown four nearby home-and-homes while 91 money-game offers from power programs sat unseen —
  // the single most interesting thing on its board. Take the best of each kind first, then fill.
  var picked=[], seen={};

    }
  });

    if(!seen[cands[i].opp]){ picked.push(cands[i]); seen[cands[i].opp]=1; }

}

function signSchedDeal(idx){

  }

// RIVALS above is the sport's inherited map — the games that were rivalries in 2026. But rivalries
// are made, not declared: they're built by playing often, playing close, and playing when it
// matters. A dynasty that runs twenty years should be able to birth a rivalry that didn't exist
// and watch an inherited one go cold after realignment splits the schools up.
//
// Every meeting between two programs feeds an index (s.rivIdx). The index decays, so a series
// that lapses fades; it grows fastest when the games are close and both teams are good.
// Firebase RTDB forbids . # $ [ ] / in a KEY — and these keys are object properties in the save,
// so the separator itself must be legal. The first version used "##", which made every single
// write fail with "invalid key (Boston College##Syracuse)". "~" is safe and can't appear in a
// school name. School names themselves are also scrubbed, since "Miami (FL)"-style punctuation
// is fine but a stray period (St. John's) would break the same way.
function _rivSafe(n){ return String(n||"").replace(/[.#$\[\]\/]/g,""); }
function rivKey(a,b){
  var A=_rivSafe(a), B=_rivSafe(b);
  return (A<B) ? (A+"~"+B) : (B+"~"+A);
}
function rivIndexOf(a,b){ var s=ST.save; return (s && s.rivIdx && s.rivIdx[rivKey(a,b)])||0; }
// Record one meeting. `winner` is the school that won, which lets the index track the SERIES
// SPLIT — the thing that actually makes a rivalry. Twelve straight wins is a beatdown, not a
// feud; the index now reflects that no matter how close the individual games were.
function feedRivalry(a, b, margin, stakes, winner){
  var s=ST.save, L=s.league; if(!a||!b) return;
  // Don't create an entry for a matchup that can never be a rivalry. Two distant CPU schools
  // meeting once is not a story, and recording it anyway is what pushed the index past 5,000
  // entries. Anything involving YOUR program is always tracked; for everyone else, require a
  // reason: they're neighbours, or it's already an inherited rivalry.
  var involvesMe=(a===s.school||b===s.school);
  if(!involvesMe && !isRival(a,b) && proximity(a,b)<=0){
    var k0=rivKey(a,b);
    if(!(s.rivIdx&&s.rivIdx[k0])) return;
  }
  s.rivIdx=s.rivIdx||{};
  s.rivSplit=s.rivSplit||{};
  var k=rivKey(a,b);
  // Track the split from the alphabetically-first school's point of view (matching rivKey), so
  // both sides read the same series.
  var first=(a<b)?a:b;
  if(winner){
    var sp=s.rivSplit[k]||{w:0,l:0};
    if(winner===first) sp.w++; else sp.l++;
    s.rivSplit[k]=sp;
  }
  var gain=1.0;
  // A one-score game is what people remember; a blowout builds far less.
  if(margin!=null){
    if(margin<=3)      gain+=1.5;
    else if(margin<=8) gain+=1.0;
    else if(margin<=17)gain+=0.35;
    else               gain-=0.15;
  }
  // Two good programs make a bigger rivalry than two bad ones.
  function pOf(n){ if(n===s.school) return s.prestige||3; var t=L&&L.teams[n]; return (t&&t.p)||3; }
  gain *= 0.55 + ((pOf(a)+pOf(b))/2)/5;         // ~0.75 at 2-star avg, ~1.55 at 5-star
  // Neighbours feel it more.
  var prox=proximity(a,b);
  if(prox>=1)      gain*=1.35;
  else if(prox>0)  gain*=1.15;
  // Inherited rivalries start with a head of steam.
  if(isRival(a,b)) gain*=1.25;
  if(stakes) gain+=stakes;
  // ── COMPETITIVENESS ──
  // The series has to be contested. One side dominating isn't a rivalry however often they play,
  // so a lopsided ledger throttles what each new meeting is worth — and once it's truly one-sided
  // the games actively cool it off. A split series gets the full value.
  var sp2=s.rivSplit[k];
  if(sp2 && (sp2.w+sp2.l)>=4){
    var n=sp2.w+sp2.l;
    var share=Math.max(sp2.w,sp2.l)/n;          // 0.5 = dead even, 1.0 = total domination
    if(share>=0.85)      gain*=-0.35;           // a beatdown; the "rivalry" fades
    else if(share>=0.72) gain*=0.25;
    else if(share>=0.62) gain*=0.7;
    // below .62 is genuinely competitive — full value
  }
  s.rivIdx[k]=Math.max(0,(s.rivIdx[k]||0)+gain);
}
// Rivalries cool when you stop playing. Slower decay than scheduling bonds — a rivalry lingers in
// the memory long after the series lapses.
//
// This also PRUNES aggressively, and that matters: every meeting anywhere in the country creates
// an entry, and the country plays thousands of games a year. Left unchecked the index reached
// ~5,000 entries and 425 KB after ten seasons — on its own enough to fail the save write. Only
// matchups that are actually a rivalry (or on their way to being one) are worth persisting;
// everything else is noise that can be rebuilt by simply playing again.
function decayRivalries(){
  var s=ST.save; if(!s.rivIdx) return;
  s.rivSplit=s.rivSplit||{};
  var mine=s.school;
  Object.keys(s.rivIdx).forEach(function(k){
    s.rivIdx[k]*=0.93;
    // Anything involving YOUR program is kept at a low bar — that's your history. The sport's
    // inherited classics are kept too: Alabama–Auburn shouldn't vanish from the record just
    // because the schedule didn't pair them for a few years (an earlier cut pruned it to Cold
    // after 15 unplayed seasons). Two ordinary CPU teams need a real series to be worth storing.
    var p=k.split("~");
    var involvesMe = (p[0]===mine || p[1]===mine);
    var inherited = isRival(p[0], p[1]);
    // A classic that simply isn't on the schedule cools, but never below "Real" — the history is
    // still there, waiting for the series to resume. If it IS being played and one side is
    // running away with it, that's different: a beatdown is allowed to kill even a classic.
    if(inherited && s.rivIdx[k]<5.2){
      var sp=s.rivSplit[k];
      var lopsided = sp && (sp.w+sp.l)>=4 && (Math.max(sp.w,sp.l)/(sp.w+sp.l))>=0.72;
      if(!lopsided) s.rivIdx[k]=5.2;
    }
    var floor = (involvesMe||inherited) ? 0.4 : 3.0;
    if(s.rivIdx[k]<floor){ delete s.rivIdx[k]; delete s.rivSplit[k]; }
  });
  // Hard cap as a backstop, so an unusual league can never blow the save up. Keep your own
  // rivalries plus the hottest in the country.
  var keys=Object.keys(s.rivIdx);
  if(keys.length>900){
    var mineK=[], others=[];
    keys.forEach(function(k){
      if((k.indexOf(_rivSafe(mine)+"~")===0)||(k.indexOf("~"+_rivSafe(mine))>0)) mineK.push(k); else others.push(k);
    });
    others.sort(function(a,b){ return s.rivIdx[b]-s.rivIdx[a]; });
    var keep={}; 
    mineK.forEach(function(k){ keep[k]=1; });
    others.slice(0, Math.max(0, 900-mineK.length)).forEach(function(k){ keep[k]=1; });
    keys.forEach(function(k){ if(!keep[k]){ delete s.rivIdx[k]; delete s.rivSplit[k]; } });
  }
}
// The sport's inherited rivalries didn't start yesterday — the Iron Bowl arrives with ninety years
// behind it. Without seeding, Alabama–Auburn began at 0 ("Cold"), identical to two schools that
// have never met, and a rivalry you built over a decade would outrank it outright. Seed them at a
// level that reflects the history they already carry, so a new rivalry has to genuinely earn its
// way past one of the sport's classics.
function seedInheritedRivalries(sv){
  var s=sv||ST.save; if(!s || s._rivSeeded) return;
  s.rivIdx=s.rivIdx||{};
  var L=s.league;
  function pOf(n){ if(n===s.school) return s.prestige||3; var t=L&&L.teams[n]; return (t&&t.p)||3; }
  Object.keys(RIVALS).forEach(function(a){
    (RIVALS[a]||[]).forEach(function(b){
      var k=rivKey(a,b);
      if(s.rivIdx[k]) return;
      // A classic between two blue bloods reads hotter than one between two small programs, and
      // in-state meetings are the fiercest of all.
      var base=7.5;
      base += ((pOf(a)+pOf(b))/2 - 3)*1.6;      // -3.2 at 1-star avg, +3.2 at 5-star
      if(proximity(a,b)>=1) base+=2.2;          // same state
      else if(proximity(a,b)>0) base+=1.0;
      s.rivIdx[k]=clampN(base, 5.2, 15.5);      // "Real" at worst, "Blood Feud" at best
    });
  });
  s._rivSeeded=1;
}
// A word for how hot a rivalry is.
function rivalryTier(v){
  if(v>=14) return {t:"Blood Feud", c:"var(--red2)"};
  if(v>=9)  return {t:"Bitter",     c:"#c2410c"};
  if(v>=5)  return {t:"Real",       c:"var(--gold-dark)"};
  if(v>=2)  return {t:"Brewing",    c:"var(--muted)"};
  return {t:"Cold", c:"var(--dim)"};
}
// Everyone this school has an active rivalry with, hottest first.
function rivalriesFor(name){
  var s=ST.save; if(!s.rivIdx) return [];
  var out=[];
  Object.keys(s.rivIdx).forEach(function(k){
    var p=k.split("~");
    if(p[0]===name) out.push({n:p[1], v:s.rivIdx[k]});
    else if(p[1]===name) out.push({n:p[0], v:s.rivIdx[k]});
  });
  out.sort(function(a,b){ return b.v-a.v; });
  return out;
}
// The live rivalry test the game should use: an inherited rival OR one you've built.
function isLiveRival(a,b){ return isRival(a,b) || rivIndexOf(a,b)>=5; }
// All-time series records are kept PER SCHOOL \u2014 Furman\u2013Wofford and Alabama\u2013Auburn are different
// series, so leaving a job doesn't drag its rivalry history along with you.
function rivalryKey(school,opp){ return school+"@@"+opp; }
function rivalryRecord(school,opp){
  var s=ST.save; s.rivalRec=s.rivalRec||{};
  return s.rivalRec[rivalryKey(school,opp)] || {w:0,l:0,streak:0};
}
function noteRivalryResult(school, opp, won){
  var s=ST.save; s.rivalRec=s.rivalRec||{};
  var k=rivalryKey(school,opp), r=s.rivalRec[k]||{w:0,l:0,streak:0};
  if(won){ r.w++; r.streak = r.streak>0 ? r.streak+1 : 1; }
  else   { r.l++; r.streak = r.streak<0 ? r.streak-1 : -1; }
  s.rivalRec[k]=r;
}
// Every rivalry series you've ever played, grouped for the record book.
function allRivalrySeries(){
  var s=ST.save, out=[]; s.rivalRec=s.rivalRec||{};
  Object.keys(s.rivalRec).forEach(function(k){
    var parts=k.split("@@"); if(parts.length!==2) return;   // ignore any legacy key shape
    var r=s.rivalRec[k];
    out.push({school:parts[0], opp:parts[1], w:r.w||0, l:r.l||0, streak:r.streak||0});
  });
  out.sort(function(a,b){
    if(a.school!==b.school) return a.school<b.school?-1:1;
    return (b.w+b.l)-(a.w+a.l);
  });
  return out;
}

// Postseason routing by conference — this is what keeps playoff and championship separate.
var FCS_PLAYOFF_CONFS      = {"MVFC":1,"Big Sky":1,"CAA":1,"SoCon":1,"Southland":1,"OVC":1,"Patriot League":1,"NEC":1,"UAC":1,"Ivy League":1};

var FCS_CONF_SET = (function(){ var o={}; FCS_TEAMS.forEach(function(t){o[t.c]=1;}); return o; })();

var _BASE_CONF={};

// Scripted futures, not random shuffling. Each dynasty rolls ONE timeline at creation and lives
// with it, so different saves see different versions of the sport. A timeline is a list of years,
// each with a set of moves; `dissolve` scatters a league entirely.
//
// Each move: {to:"SEC", teams:["Clemson","Florida State"]}
// Each year: {year:2029, headline:"...", moves:[...], dissolve:["Pac-12"], tier:{"American":2}}
//   tier — optional CONF_TIER overrides, for when a league's recruiting pull genuinely shifts.
var REALIGNMENT_TIMELINES=[
  {

function realignTimeline(){
  var s=ST.save; if(!s) return null;

    if(REALIGNMENT_TIMELINES[i].id===id) return REALIGNMENT_TIMELINES[i];

// Replaying from scratch (rather than applying moves incrementally) means loading a save mid-
// dynasty always lands on exactly the right map, no matter how it was saved.
function applyRealignmentThrough(throughYear){
  ALL_TEAMS.forEach(function(t){ t.c=_BASE_CONF[t.n]; });
  var tl=realignTimeline(); if(!tl || !tl.years.length) return;
  var s=ST.save;
  s._realignDone=s._realignDone||{};
  tl.years.forEach(function(y){
    if(y.year>throughYear) return;
    (y.moves||[]).forEach(function(mv){
      (mv.teams||[]).forEach(function(nm){
        var t=ALL_TEAMS.filter(function(x){return x.n===nm;})[0];
        if(t) t.c=mv.to;
      });
    });

    // if it didn't say — never stranded in a conference that no longer exists.
    (y.dissolve||[]).forEach(function(cn){
      ALL_TEAMS.forEach(function(t){
        if(t.c===cn) t.c=(y.fallback||"Independent");
      });
    });
    if(y.tier){ Object.keys(y.tier).forEach(function(k){ CONF_TIER[k]=y.tier[k]; }); }
  });
}
// Fire this season's realignment news (called at the offseason once the year is known).
function runRealignmentFor(year){
  var s=ST.save; if(!s) return;
  var tl=realignTimeline(); if(!tl || !tl.years.length) return;
  s._realignDone=s._realignDone||{};
  tl.years.forEach(function(y){
    if(y.year!==year || s._realignDone[y.year]) return;
    s._realignDone[y.year]=1;
    applyRealignmentThrough(year);
    // If YOUR school moved, follow it — you coach the program, not the league.
    var mine=ALL_TEAMS.filter(function(x){return x.n===s.school;})[0];
    if(mine && mine.c!==s.conf){
      var was=s.conf; s.conf=mine.c;
      toast("🗞️ "+s.school+" is leaving the "+was+" for the "+mine.c+".");
    }
    if(y.headline) toast("🗞️ "+y.headline);
    // The league snapshot carries its own copy of each team's conference — keep it in step.
    if(s.league && s.league.teams){
      ALL_TEAMS.forEach(function(t){
        if(s.league.teams[t.n]) s.league.teams[t.n].c=t.c;
      });
      s.league.confSched=null; s.league.confRemain=null;  // schedules must be rebuilt
    }
  });
}

    // A 20-team superconference playing 9 league games can only meet nine of nineteen members,
    // and slicing the round-robin blindly means a team can go years without seeing its biggest
    // rival — the exact thing every real conference protects against. So: each team KEEPS its
    // two hottest rivals in-league every season, and the remaining slots rotate through everyone
    // else. The rotation is offset by season so the same faces don't recur forever.
    var yearOffset=((ST.save&&ST.save.seasonsPlayed)||1);
    members.forEach(function(m){
      var full=oppLists[m];
      if(full.length<=target){ L.confSched[m]=full.slice(); return; }
      // Two permanent opponents: the hottest live rivalries inside this league.
      var perm=full.slice().sort(function(a,b){
        return (rivIndexOf(m,b)||0)-(rivIndexOf(m,a)||0);
      }).slice(0,2).filter(function(o){ return rivIndexOf(m,o)>0 || isRival(m,o); });
      var rest=full.filter(function(o){ return perm.indexOf(o)<0; });
      // Rotate the pool so each season shows a different slice of the league.
      var off=(yearOffset*3)%Math.max(1,rest.length);
      rest=rest.slice(off).concat(rest.slice(0,off));
      L.confSched[m]=perm.concat(rest).slice(0, target);
    });
    // ensure symmetry: if A has B but B dropped A (from slicing), trim A too
    members.forEach(function(m){
      L.confSched[m]=L.confSched[m].filter(function(o){ return L.confSched[o] && L.confSched[o].indexOf(m)>=0; });
    });
    // top up any team left short (odd-sized conferences give some teams a bye) by adding
    // a mutually-available opponent that's also short and not already scheduled
    for(var tries=0; tries<N*3; tries++){
      var short=members.filter(function(m){ return L.confSched[m].length<target; });
      if(short.length<2) break;
      var progressed=false;
      for(var x=0;x<short.length;x++){
        var a=short[x];
        if(L.confSched[a].length>=target)continue;
        var partner=short.filter(function(b){
          return b!==a && L.confSched[b].length<target && L.confSched[a].indexOf(b)<0;
        })[0];
        if(partner){ L.confSched[a].push(partner); L.confSched[partner].push(a); progressed=true; }
      }
      if(!progressed) break;
    }
    // last resort for stubborn odd-conference leftovers: pair any two still-short teams,
    // allowing a rematch, so every team reaches its target game count
    for(var lr=0; lr<N; lr++){
      var stillShort=members.filter(function(m){ return L.confSched[m].length<target; });
      if(stillShort.length<2) break;
      var a2=stillShort[0], b2=stillShort[1];
      L.confSched[a2].push(b2); L.confSched[b2].push(a2);
    }
  });
}
// Complete any conference games that weren't played during the week-by-week sim, so every
// non-independent team finishes its full conference slate before standings are final.
function finalizeLeagueSeason(excludeName){
  var L=ST.save.league; if(!L||!L.confRemain)return;
  // Complete ALL remaining conference games (including the user's league-side games) so every
  // team finishes its 9-game slate. The user's DISPLAYED record comes from their real schedule
  // in computeConfStandings, so simulating the user's league-side games here is harmless.
  var guard=0;
  var anyLeft=function(){ return Object.keys(L.confRemain).some(function(n){ return L.confRemain[n].length>0; }); };
  while(anyLeft() && guard<80){
    guard++;
    Object.keys(L.confRemain).forEach(function(n){
      var rem=L.confRemain[n]; if(!rem.length)return;
      var oppName=rem[0];
      var r=simLeagueGame(n,oppName,false);
      var loser=(r.w===n)?oppName:n;
      L.teams[r.w].w++; L.teams[loser].l++;
      L.teams[r.w].cw++; L.teams[loser].cl++;
      var i1=L.confRemain[n].indexOf(oppName); if(i1>=0)L.confRemain[n].splice(i1,1);
      if(L.confRemain[oppName]){ var i2=L.confRemain[oppName].indexOf(n); if(i2>=0)L.confRemain[oppName].splice(i2,1); }
    });
  }
}
function simLeagueWeek(excludeName){
  var L=ST.save.league; if(!L)return;
  if(!L.confSched){ buildLeagueConfSchedule(); }
  if(!L.confRemain){
    // mutable copy of each team's remaining conference opponents for this season
    L.confRemain={};
    Object.keys(L.confSched).forEach(function(n){ L.confRemain[n]=(L.confSched[n]||[]).slice(); });
  }
  var wk=L.week||0;
  var busy={}; // teams that have already played this week
  if(excludeName) busy[excludeName]=1; // user plays their own game separately
  var names=Object.keys(L.teams);
  // shuffle processing order for variety
  for(var i=names.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=names[i];names[i]=names[j];names[j]=tmp; }

  // Pass 1: play conference games — pair teams that still have each other remaining
  names.forEach(function(n){
    if(busy[n])return;
    var rem=L.confRemain[n]||[];
    var oppName=null;
    for(var k=0;k<rem.length;k++){
      var cand=rem[k];
      if(!busy[cand] && L.confRemain[cand] && L.confRemain[cand].indexOf(n)>=0){ oppName=cand; break; }
    }
    if(!oppName)return;
    var r=simLeagueGame(n,oppName,false);
    var loser=(r.w===n)?oppName:n;
    L.teams[r.w].w++; L.teams[loser].l++;
    L.teams[r.w].cw++; L.teams[loser].cl++;
    feedRivalry(n, oppName, null, 0.4, r.w);  // conference meetings build rivalries
    var si1=L.confRemain[n].indexOf(oppName); if(si1>=0)L.confRemain[n].splice(si1,1);
    var si2=L.confRemain[oppName].indexOf(n); if(si2>=0)L.confRemain[oppName].splice(si2,1);
    busy[n]=1; busy[oppName]=1;
  });

  // Pass 2: teams that have NO conference games left this season fill with a non-conference game.
  // (Teams that still owe conference games simply sit this week — they'll get paired a later week,
  // which keeps everyone on track to finish their full 9-game conference slate.)
  names.forEach(function(n){
    if(busy[n])return;
    var rem=L.confRemain[n]||[];
    if(rem.length>0) return;               // still owes conference games → wait, don't burn the week
    var others=names.filter(function(m){ return !busy[m] && m!==n && (L.confRemain[m]||[]).length===0; });
    if(!others.length)return;
    // Teams prefer to fill non-conference dates close to home — travel is cheap and a regional
    // game sells tickets. This is what makes clusters form organically across the map instead of
    // the schedule being noise, and it's the raw material the breakaway system reads.
    var near=others.filter(function(m){ return proximity(n,m)>0; });
    var pool=(near.length && Math.random()<0.72) ? near : others;
    // Prefer an opponent you already have history with. Real non-conference schedules are built on
    // recurring series, not a fresh draw every year — and without this, bonds never compound past
    // the annual decay (measured: max bond 3.2 after 20 seasons, only 5 pairs in the whole country
    // clearing a cluster threshold, so no breakaway could ever form).
    var oppName;
    if(pool.length){
      var withHist=pool.filter(function(m){ return bondOf(n,m)>0.4; });
      var pick=(withHist.length && Math.random()<0.65) ? withHist : pool;
      oppName=pick[Math.floor(Math.random()*pick.length)];
    } else return;
    var r=simLeagueGame(n,oppName,false);
    var loser=(r.w===n)?oppName:n;
    L.teams[r.w].w++; L.teams[loser].l++;   // overall only, not a conference game
    addBond(n, oppName);                    // a regional series builds a relationship
    feedRivalry(n, oppName, null, 0, r.w);  // and the rest of the country builds rivalries too
    busy[n]=1; busy[oppName]=1;
  });

  L.week=wk+1;
}
// Record the USER team's game result into the league standings.
function recordUserLeagueResult(won, isConfGame){
  var t=leagueTeam(ST.save.school); if(!t)return;
  if(won)t.w++; else t.l++;
  if(isConfGame){ if(won)t.cw++; else t.cl++; }
}
// Your own non-conference dates build regional relationships exactly like everyone else's — which
// is what makes scheduling a nearby rival year after year a genuine long-game strategy.
function recordUserBond(oppName, isConfGame){
  if(isConfGame || !oppName) return;
  // Your standing scheduling policy decides how much a regional date is worth to you. Chasing
  // marquee games isn't wrong — it's a better résumé — but it doesn't build the local
  // relationships a breakaway is made of.
  var pol=(ST.save.schedPolicy||"balanced");
  var mult = pol==="regional" ? 1.6 : pol==="marquee" ? 0.45 : 1;
  var before=bondOf(ST.save.school, oppName);
  addBond(ST.save.school, oppName);
  var gained=bondOf(ST.save.school, oppName)-before;
  if(gained>0 && mult!==1){
    var s=ST.save, k=bondKey(s.school,oppName);
    s.bonds[k]=before+gained*mult;
  }
}
// End-of-season rating drift: teams that beat their rating-expected record improve; others decline.
// End-of-season league update: categorize each team by how last season went vs what their
// rating expected, nudge their overall (and off/def) up or down by tier, then WIPE all records.
// This is the core "living league" mechanic — records never accumulate because they reset here.
function seasonTier(winPct, expPct){
  var d = winPct - expPct;           // how far above/below expectation
  if(d >=  0.22) return 3;           // great season
  if(d >=  0.08) return 1;           // good season
  if(d <= -0.22) return -3;          // bad season
  if(d <= -0.08) return -1;          // poor season
  return 0;                          // about as expected
}
function tierMove(tier){
  // convert a tier into an overall-rating change, with a little randomness
  if(tier=== 3) return rnd(2,3);
  if(tier=== 1) return rnd(0,2);
  if(tier===-1) return rnd(-2,0);
  if(tier===-3) return rnd(-3,-2);
  return rnd(-1,1);                  // as expected: hold, tiny noise
}
// What this program IS, independent of last season: its real rating if we know it, else a
// division-aware prestige baseline. This is the anchor drift pulls toward — the thing a
// program regresses to when the coaching and the luck run out.
function teamBaseline(t, name){
  var fcs = (t.div==="FCS") || (t.c && teamDivision(t.c)==="FCS");
  var r = fcs ? (typeof FCS_TEAM_RATINGS!=="undefined" && FCS_TEAM_RATINGS[name]) : TEAM_RATINGS[name];
  if(r) return (r.o + r.d)/2;
  var p = (t.p!=null?t.p:3);
  return fcs ? (44+p*6) : (58+p*6);
}
function driftLeagueRatings(){
  var L=ST.save.league; if(!L)return;
  Object.keys(L.teams).forEach(function(n){
    var t=L.teams[n];
    var games=t.w+t.l;
    if(games){
      var winPct=t.w/games;
      // EXPECTATION IS ANCHORED TO THE PROGRAM, NOT TO LAST YEAR'S RATING.
      // This used to read expPct off t.ovr itself, which made the whole system a ratchet with
      // no equilibrium: win -> rating up -> but expectation rises WITH it, so the team keeps
      // "beating expectations" by winning again, and nothing ever pulls it back. Measured over
      // 20 simulated seasons, Southeast Missouri (an FCS p4) reached 99 while Purdue and
      // Cincinnati fell to the 46 floor, and the two divisions crossed over: FBS average fell
      // 78.2 -> 72.2 while FCS climbed 71.2 -> 72.6. Both tails simply ran until they hit the
      // hard clamps. Judging a team against its BASELINE means a 60-rated program overachieving
      // still gets a big year, but the bar it must clear next season doesn't move with it.
      var base=teamBaseline(t,n);
      var expPct=Math.max(0.1,Math.min(0.9,(base-52)/45));
      var tier=seasonTier(winPct, expPct);
      var move=tierMove(tier);
      // MEAN REVERSION toward the baseline. The further a team has drifted from what it is, the
      // harder it's pulled back — this is what gives the system an equilibrium instead of a
      // wall. A program can still sit well above its baseline for years on the back of real
      // seasons; it just has to keep earning it, and the climb gets steeper the higher it goes.
      var dev=t.ovr-base;                            // + = overrated vs the program's true level
      var pull=-dev*0.22;                            // ~1/5 of the gap closes each offseason
      move += pull;
      // Prestige is the hard ceiling: a 1-star program does not become a blue blood by winning
      // its league every year. It can exceed its baseline, but not without limit.
      var cap=base+ (t.p>=5?14:t.p>=4?11:t.p>=3?9:7);
      var floor=base-(t.p>=4?12:10);
      var next=t.ovr+move;
      if(next>cap)   move -= (next-cap)*0.75;
      if(next<floor) move += (floor-next)*0.75;
      move=Math.round(move);
      t.off=Math.max(48,Math.min(99,t.off+move));
      t.def=Math.max(48,Math.min(99,t.def+move));
      t.ovr=Math.round((t.off+t.def)/2);
      t.lastTier=tier; // remembered for flavor/labels if needed
    }
    // wipe last season's records — every team starts the new season 0-0
    t.w=0; t.l=0; t.cw=0; t.cl=0; t._playedWeek=-1;
  });
  L.week=0; L.confSched=null; L.confRemain=null; // force a fresh conference schedule next season
}
// Two-way portal traffic across the league: blue bloods net-gain talent, smaller programs
// net-lose it, with noise. Keeps the world churning (and opponents' difficulty shifting).
function simLeaguePortal(){
  var L=ST.save.league; if(!L||!L.teams) return;
  Object.keys(L.teams).forEach(function(n){
    if(n===ST.save.school) return; // your own roster is handled by the real portal
    var t=L.teams[n];
    var swing=Math.round((t.p-3)*0.6 + rnd(-2,2)); // prestige tilts who wins the portal
    // Don't let this compound off its own output. Applied blind, a p5 program gains ~+1.2/yr
    // forever and a p1 bleeds the same, on top of the win-drift — two unanchored ratchets
    // stacked. Damp the swing as a team gets far from what it actually is, so the portal moves
    // teams around their baseline rather than launching them away from it.
    var base=teamBaseline(t,n), dev=(t.ovr||70)-base;
    if(dev>0 && swing>0) swing=Math.round(swing*Math.max(0, 1-dev/12));   // already overrated: gains dry up
    if(dev<0 && swing<0) swing=Math.round(swing*Math.max(0, 1+dev/12));   // already underrated: losses ease
    t.off=Math.max(46,Math.min(99,(t.off||70)+swing));
    t.def=Math.max(46,Math.min(99,(t.def||70)+swing));
    t.ovr=Math.round((t.off+t.def)/2);
  });
}

// Award Coach XP for a season's accomplishments.
function awardCoachXP(n, reason){
  var s=ST.save; if(!s) return;
  s.coachXP=(s.coachXP||0)+n;
  s.legacyXP=(s.legacyXP||0)+n;        // lifetime total — never spent down; drives your Legacy rank
  s._xpGainedThisYear=(s._xpGainedThisYear||0)+n;
}

// ── Coaching Legacy rank (lifetime XP earned) ────────────
var LEGACY_RANKS=[
  {min:0,   t:"Rising Star"},   {min:30,  t:"Up-and-Comer"}, {min:70,  t:"Established"},
  {min:130, t:"Respected"},     {min:210, t:"Distinguished"},{min:320, t:"Program Legend"},
  {min:460, t:"Icon"},          {min:650, t:"Immortal"},     {min:900, t:"G.O.A.T."}
];
function legacyXP(){ return (ST.save&&ST.save.legacyXP)||0; }
function legacyRank(){ var xp=legacyXP(), r=LEGACY_RANKS[0]; for(var i=0;i<LEGACY_RANKS.length;i++){ if(xp>=LEGACY_RANKS[i].min) r=LEGACY_RANKS[i]; } return r; }
function nextLegacy(){ var xp=legacyXP(); for(var i=0;i<LEGACY_RANKS.length;i++){ if(xp<LEGACY_RANKS[i].min) return LEGACY_RANKS[i]; } return null; }

// ── Program facilities: a repeatable XP sink (upgrade forever) ────────────
// Each level is a permanent boost; cost climbs each level so surplus XP always has a home.
var FACILITIES=[
  {id:"stadium",  name:"Stadium Expansion",  icon:"🏟️", color:"#c14a4a", desc:"Bigger, louder crowds on game day.", effect:function(l){return "+"+l+" home-field edge · +"+(2*l)+" recruit interest";}},
  {id:"training", name:"Training Facilities", icon:"🏋️", color:"#4a9d6e", desc:"Elite weight room & practice fields.", effect:function(l){return "Faster player development, in-season and offseason";}},
  {id:"nil",      name:"NIL Collective",      icon:"💰", color:"#9955e8", desc:"Booster-funded recruiting muscle.", effect:function(l){return "+"+l+" recruiting point"+(l===1?"":"s")+" every week";}},
  {id:"academics",name:"Academic Center",     icon:"🎓", color:"#4a7dc1", desc:"Tutors, support & player trust.", effect:function(l){return "+"+(3*l)+" recruit interest with prospects";}}
];
function facLvl(id){ return (ST.save&&ST.save.facilities&&ST.save.facilities[id])||0; }
function facCost(id){ return 6 + facLvl(id)*5; } // 6, 11, 16, 21, ...
function buyFacility(id){
  var s=ST.save; if(!s) return;
  var cost=facCost(id);
  if(coachXP()<cost){ toast("Not enough Coach XP"); return; }
  s.coachXP=coachXP()-cost;
  s.facilities=s.facilities||{};
  s.facilities[id]=(s.facilities[id]||0)+1;
  var f=FACILITIES.filter(function(x){return x.id===id;})[0];
  toast("🏗️ "+(f?f.name:"Facility")+" → Lv "+s.facilities[id]);
  persist(); draw();
}

// Is a color too close to white or black to use as a visible logo shadow?
function _tooExtreme(hex){
  hex=(hex||"").replace("#","");
  if(hex.length<6) return true;
  var r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  var L=(0.2126*r+0.7152*g+0.0722*b)/255;
  return L>0.86 || L<0.07;   // near-white or near-black
}
// Darken a hex by a factor (0..1 of the way to black).
function _shade(hex, f){
  hex=hex.replace("#","");
  var r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  function d(c){ return Math.round(c*(1-f)).toString(16).padStart(2,"0"); }
  return "#"+d(r)+d(g)+d(b);
}
// The three drop-shadow colors for the logo, per team. The logo now sits ON the team-colored top
// bar (which is the primary), so the shadow must CONTRAST that bar, not match it — a primary
// shadow on a primary bar just vanishes. So the front, most-visible layer is the SECONDARY color
// when it's usable; the back layer is a deep shade for depth. When the secondary is white/black
// (no good), we build a contrasting shade of the primary instead (much lighter or much darker
// than the bar) so the logo still reads. Unlisted teams keep the original red/blue/navy shadow.
function logoColorsFor(school){
  if(!school || !TEAM_COLORS[school]) return ["#c9082a","#17408b","#0d2a5c"];
  var prim=TEAM_COLORS[school][0];
  var sec=TEAM_SECONDARY[school];
  var secOK = sec && !_tooExtreme(sec) && sec.toLowerCase()!==prim.toLowerCase();
  // Front layer: the usable secondary, or a strong contrast shade of the primary.
  var front = secOK ? sec : (_isDark(prim) ? _lighten(prim,0.55) : _shade(prim,0.55));
  // Middle: a step between, for a layered look.

function _isDark(hex){
  hex=hex.replace("#","");

  return (0.2126*r+0.7152*g+0.0722*b)/255 < 0.5;

function _lighten(hex, f){
  hex=hex.replace("#","");
  var r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  function u(c){ return Math.round(c+(255-c)*f).toString(16).padStart(2,"0"); }

// Paint the current team's colors onto the root variables. Called whenever a save is active or

function applyTeamTheme(){

  if(!root || !root.style || typeof root.style.setProperty!=="function") return;
  // Team color lives in the ACCENTS — buttons, sliders, links, the active tab — where a vivid
  // color pops against the clean cream without fighting every card. A full-screen backdrop of one

  // so the background stays cream; the color shows up where it reads as team pride, not mud.
  root.style.setProperty("--purple", c[0]);

// Black or white text, whichever reads on a given fill.
function _readableInk(hex){

// Season win expectation by program prestige (of a 12-game schedule)
// ── Season expectations ──────────────────────────────────
// Three goals every year, judged independently. The AD wants a win total, a postseason
// result, and evidence you're building something. Prestige raises every bar; the postseason
// goal is expressed in the language of your OWN subdivision (an FCS coach is asked to reach
// the quarterfinals of a 24-team bracket, not "a bowl game").
function expectWinsFor(prestige, conf){
  // FCS plays 11 games, FBS 12, so the FCS bars sit one win lower at the top.
  if(conf!=null && isFCSConf(conf)) return [0,3,4,6,7,8][prestige];
  return [0,3,4,6,8,9][prestige];
}

// The postseason bar, by prestige. Keys are checked against furthestRoundReached().
// FBS: bowl → CFP → quarterfinal → title.  FCS: playoff → quarterfinal → semifinal → title.
// SWAC/MEAC have no bracket, so their bar is the Celebration Bowl; the Ivy has no postseason
// at all and is judged on the conference race instead.
var POST_GOAL_ORDER=["none","postseason","r2","qf","sf","champ"];
function postGoalFor(prestige, conf){
  // SWAC/MEAC never enter the bracket; their season peaks at the Celebration Bowl.
  if(isCelebrationConf(conf)){
    if(prestige>=4) return {key:"celebration", label:"Win the Celebration Bowl"};
    if(prestige>=2) return {key:"conf",        label:"Win the "+conf};
    return {key:"tophalf", label:"Finish in the top half of the "+conf};
  }
  // A league that declines all bids can only be judged on its own race.
  if(isNoPostseasonConf(conf)){
    return prestige>=3 ? {key:"conf", label:"Win the "+conf}
                       : {key:"tophalf", label:"Finish in the top half of the "+conf};
  }
  if(isFCSConf(conf)){
    if(prestige>=5) return {key:"sf",         label:"Reach the FCS semifinals"};
    if(prestige>=4) return {key:"qf",         label:"Reach the FCS quarterfinals"};
    if(prestige>=3) return {key:"postseason", label:"Make the 24-team FCS playoff"};
    if(prestige>=2) return {key:"tophalf",    label:"Finish in the top half of the "+conf};
    return {key:"none", label:"No postseason expectation"};
  }
  if(prestige>=5) return {key:"qf",         label:"Reach the CFP quarterfinals"};
  if(prestige>=4) return {key:"postseason", label:"Make the College Football Playoff"};
  if(prestige>=3) return {key:"postseason", label:"Reach a bowl game"};
  if(prestige>=2) return {key:"tophalf",    label:"Finish in the top half of the "+conf};
  return {key:"none", label:"No postseason expectation"};
}

// A program-building goal: proof the future is brighter than the present. The bar is anchored
// to the star this program ACTUALLY lands (expectedStarFor) rather than raw prestige, so it is
// always a stretch and never a fantasy — "sign 2 four-stars" is impossible at an FCS school
// that leads 9% of its 4-star battles.
function buildGoalFor(prestige, conf){
  var exp=expectedStarFor(prestige, conf);
  // How hard is a recruit one tier up? starFitMult answers directly. Anything under ~0.5 is a
  // battle you lose most of the time, so ask for ONE of those; a comfortable tier can be asked
  // for twice. This is what keeps "sign 2 4-stars" off Montana's list (its 4-star fit is 0.77
  // but its lead rate is 11%) while leaving it on Alabama's.
  // Ask for a HAUL at the tier you actually win, not a lottery ticket one tier up. Chasing a
  // star you lead 3% of the time isn't a goal, it's a coin flip; signing several of the star
  // you lead ~50% of the time is a real recruiting season and a real test of point management.
  var star=Math.min(5, Math.max(2, Math.round(exp)));
  var n=3;
  // The very top programs get asked for the tier above, because they genuinely land it.
  if(starFitMult(star+1, prestige, conf) >= 0.95 && star<5){ star+=1; n=2; }
  return {key:"recruit", star:star, n:n,
          label:(n>1?("Sign "+n+" "+star+"★ recruits"):("Sign a "+star+"★ recruit"))};
}

// How the season ENDED, in record-book shorthand ("W Military Bowl", "L Semifinal",
// "FCS Champion", "—"). Read at season's end while ST.post is still in scope; falls back
// to the season flags if the postseason state was lost (e.g. a page reload).
function seasonPostLabel(){
  var P=ST.post, s=ST.save;
  var FBS_R={r1:"First Round",qf:"Quarterfinal",sf:"Semifinal",champ:"National Championship"};
  var FCS_R={r1:"First Round",r2:"Round of 16",qf:"Quarterfinal",sf:"Semifinal",champ:"National Championship"};
  if(!P || P.mode==="none"){
    if(s._wonNatlThisYear) return "W National Championship";
    if(s._wonConfThisYear) return "—";
    return "—";
  }
  if(P.mode==="bowl"){
    if(!P.done || !P.result) return P.bowlName||"Bowl";
    return (P.result.us>P.result.them?"W ":"L ")+(P.bowlName||"Bowl");
  }
  if(P.mode==="celebration"){
    if(!P.done || !P.result) return "Celebration Bowl";
    return (P.result.us>P.result.them?"W ":"L ")+"Celebration Bowl";
  }
  if(P.mode==="playoff" || P.mode==="fcsPlayoff"){
    var tbl = P.mode==="fcsPlayoff" ? FCS_R : FBS_R;
    var seed = P.mySeed ? (" (#"+P.mySeed+" seed)") : "";
    if(P.champion!=null && P.champion===P.mySeed) return "W National Championship"+seed;
    var r = tbl[P.round] || "Playoff";
    return "L "+r+seed;   // the round you went out in is the round you reached
  }
  return "—";
}
// How far you actually got. "" if you never made a postseason field.
function furthestRoundReached(){
  var P=ST.post, s=ST.save;
  if(!P) return "none";
  if(P.mode==="celebration") return P.done && P.result && P.result.us>P.result.them ? "celebration" : "postseason";
  if(P.mode==="bowl") return "postseason";
  if(P.mode!=="playoff" && P.mode!=="fcsPlayoff") return "none";
  if(P.champion!=null && P.champion===P.mySeed) return "champ";
  // The round you were eliminated in IS the round you reached.
  return P.round || "postseason";
}
function postGoalMet(goal){
  var s=ST.save, P=ST.post;
  if(goal.key==="none") return true;
  if(goal.key==="conf") return !!s._wonConfThisYear;
  if(goal.key==="celebration") return furthestRoundReached()==="celebration";
  var reached=furthestRoundReached();
  if(reached==="none") return false;
  if(reached==="champ") return true;
  if(goal.key==="postseason") return true;   // you made a field at all
  var want=POST_GOAL_ORDER.indexOf(goal.key);
  var got =POST_GOAL_ORDER.indexOf(reached);
  return got>=0 && want>=0 && got>=want;
}
function buildGoalMet(goal){

// The full set, evaluated. Used by the banner and the season recap alike.
// ONE SET OF EXPECTATIONS. There used to be two systems doing the same job on the same screen:
// the AD's three prestige-derived goals AND the board pledge — with different win totals and
// different postseason targets, neither referencing the other. The pledge is now the only promise
// in the game; these three checkboxes ARE that promise, so what you agreed to in August is exactly
// what you're judged on in December.
function seasonGoals(){
  var s=ST.save, pl=pledge();
  var games=(s.schedule||[]).length||12;
  var played=(s.wins||0)+(s.losses||0);
  var left=Math.max(0, games-played);
  var need=Math.max(0, pl.w.v-(s.wins||0));
  // Live progress on every goal, so the promise is a scoreboard all year — not a preseason menu
  // you forget about until December.
  var winsDetail = (s.wins||0)>=pl.w.v ? (s.wins||0)+"–"+(s.losses||0)+" ✓"
                 : need>left            ? (s.wins||0)+"–"+(s.losses||0)+" · out of reach"
                 : (s.wins||0)+"–"+(s.losses||0)+" · need "+need+" of "+left;
  var wins={key:"wins", label:pl.w.t, met:((s.wins||0)>=pl.w.v), detail:winsDetail,
            dead:(need>left)};

  var post;
  if(pl.p.v){
    var LAD=["\u2014","a bowl","the playoff","the quarterfinals","the semifinals","the title"];
    var got=pledgeLadder();
    post={key:"post", label:pl.p.t, met:(got >= pledgePostNeeded(pl.p.v)),
          detail: got>0 ? "reached "+LAD[got] : (played<games ? "in progress" : "missed")};
  } else {

          detail:(s.wins||0)+" vs "+(s._lastWins||0)+" last year"};
  }

  var prog;

          detail:got2+" of "+pl.g.v.n+" signed"};
  } else {
    var lost=(s._portalOut||[]).filter(function(d){return d.status!=="retained";}).length;
    prog={key:"build", label:"Keep the roster together", met:(lost<=2), detail:lost+" lost to the portal"};
  }
  return [wins, post, prog];
}

function loadData(){
  if(!DB){ ST.screen="setup"; draw(); return; }

      ST.save=v;

      if(!ST.save.gameplan) ST.save.gameplan={offBalance:50, defBalance:50}; // migrate pre-gameplan saves
      if(!ST.save.offScheme){ ST.save.offScheme="prostyle"; ST.save.gameplan.offBalance=53; } // migrate to named schemes
      if(!ST.save.defScheme){ ST.save.defScheme="base43"; ST.save.gameplan.defBalance=50; }
      // ── Redshirt migration ──
      // Anyone already on campus above freshman year has, by definition, burned his redshirt —
      // that's what being a sophomore/junior/senior on a real roster means. Saves made before
      // redshirts existed have no such flag, so their upperclassmen wrongly show an RS button.
      // Stamp them once. Freshmen (and anyone who arrives later as a freshman) keep theirs.
      // Migration: "quiet" used to be a stored personality meaning "no personality". Now absence
      // IS that state, so clear it — otherwise old saves carry a value the game no longer knows.
      (ST.save.roster||[]).forEach(function(p){ if(p.pers==="quiet") delete p.pers; });
      (ST.save.board||[]).forEach(function(b){ if(b.pers==="quiet") delete b.pers; });

        (ST.save.roster||[]).forEach(function(p){
          if(p.yr!=="FR" && p.rsUsed===undefined && !p.rs) p.rsUsed=true;

      // games-played exceeds what one season allows, then resync the whole league to this season.
      if(ST.save.league && ST.save.league.teams){
        var _teams=ST.save.league.teams;
        var _wkNow=ST.save.week||0;
        var _maxGames=0;
        Object.keys(_teams).forEach(function(n){ var t=_teams[n]; var g=t.w+t.l; if(g>_maxGames)_maxGames=g; });
        // a real season is ~12 games; anything beyond ~14 means cross-season accumulation
        if(_maxGames > 14){
          Object.keys(_teams).forEach(function(n){ var t=_teams[n]; t.w=0;t.l=0;t.cw=0;t.cl=0; });
          for(var _i=0;_i<_wkNow;_i++){ simLeagueWeek(ST.save.school); }
        }

        if(!DEV_TRAITS[p.dev]) p.dev="standard";

        if(p.ssOvr==null)p.ssOvr=p.ovr;
        if(p.revealed==null)p.revealed=(!devInfo(p.dev).hidden&&(p.yr==="JR"||p.yr==="SR"));
        if(p.pot==null)p.pot=Math.max(p.ovr, rollPotential(p.startOvr, p.dev)); // give existing players a ceiling (never below their current rating)
        if(!p.arch)p.arch=rollArch(p.pos); // give existing players a playstyle archetype
      });
      // migrate board & portal legacy traits too
      if(ST.save.board) ST.save.board.forEach(function(b){ if(_DEVMAP[b.dev]) b.dev=_DEVMAP[b.dev]; });
      // migrate to season-long recruiting board

      // migrate boards to have scouting fields
      if(ST.save.board) ST.save.board.forEach(function(b){
        if(b.scout==null){ b.scout=0; b.fuzzLo=Math.max(1,b.st-1); b.fuzzHi=Math.min(5,b.st+1); }
        if(!b.arch)b.arch=rollArch(b.pos); // give existing prospects a playstyle archetype
      });

      // the safe separator so the next write goes through.

        ST.save.champHistory=[];

        var byPos={};
        ST.save.roster.forEach(function(p){ (byPos[p.pos]=byPos[p.pos]||[]).push(p); });
        var newRoster=[];
        Object.keys(ROSTER_SIZE).forEach(function(pos){
          var roleUses = (ST.save.role==="HC") || (ST.save.role==="OC" && ["QB","RB","WR","TE","OL"].indexOf(pos)>=0) || (ST.save.role==="DC" && ["DL","LB","CB","S"].indexOf(pos)>=0);

        if(_homeN<=2){

        }

      ST.confchamp = v._confchamp || null;
      ST.carousel = v._carousel || null;
      if(ST.confchamp && !ST.confchamp.done){ ST.screen="season"; ST.seasonTab="week"; }
      else if(ST.post && !ST.post.done){ ST.screen="season"; ST.seasonTab="week"; }
      else if(ST.carousel && ST.carousel.length){ ST.screen="carousel"; } // pending job offers survive reload
      else if(v.week>=v.schedule.length && !v._postDone){ draw(); if(ST.confchamp&&ST.confchamp.done){ enterPostseason(); } else { enterConfChampionship(); } return; }

// Write the whole save. This is called after every meaningful state change (every week
// advance, every game, every portal move), so it's the only thing standing between a dynasty
// and an evening of lost progress.
//
// It used to be a one-liner whose every failure mode was silent:
//   • `if(DB&&ST.save)` — if the Firebase SDK failed to load, DB is null and this became a
//     permanent no-op. You'd play a whole season and save nothing, with no indication.
//   • `.set()` returns a Promise. A rejection (offline, permission denied, quota) went
//     unhandled, so a write could fail mid-dynasty and the game would look perfectly normal.
// Now every failure is recorded on ST._saveState and surfaced (see saveBadge). A save that
// silently doesn't happen is worse than one that loudly fails.
var _saveSeq=0;
function persist(cb){
  if(!ST.save) return;
  if(!DB){
    ST._saveState={ok:false, at:Date.now(), err:"offline — no database connection"};
    if(cb) cb(false);
    return;
  }
  ST.save._post = ST.post || null;
  ST.save._confchamp = ST.confchamp || null;
  ST.save._carousel = ST.carousel || null;
  var seq=++_saveSeq;
  ST._saveState={ok:null, at:Date.now(), pending:true};   // in flight
  try{
    // Firebase RTDB rejects the ENTIRE write if the payload contains undefined, NaN or Infinity
    // anywhere. One stray value fails every save from then on, so scrub before sending rather
    // than letting the SDK throw. JSON round-tripping drops undefined and turns NaN into null,
    // both of which RTDB accepts.
    var payload;
    try{
      payload=JSON.parse(JSON.stringify(ST.save, function(k,v){
        if(typeof v==="number" && !isFinite(v)) return null;   // NaN / Infinity
        return v;
      }));
      // Firebase also rejects the write if any KEY contains . # $ [ ] / — and a key here can be
      // generated from a school name (the rivalry index and bond maps are keyed by matchup), so
      // one bad name poisons every save from then on. This is exactly what happened with the
      // "##" separator: "Boston College##Syracuse" failed every write. Belt-and-braces: drop any
      // illegal key at the door rather than letting the SDK reject the whole payload.
      payload=(function scrubKeys(o,d){
        if(d>12 || !o || typeof o!=="object") return o;
        if(Array.isArray(o)) return o.map(function(v){ return scrubKeys(v,d+1); });
        var out={};
        Object.keys(o).forEach(function(k){
          var safe=k.replace(/[.#$\[\]\/]/g,"");
          if(!safe) return;                        // key was nothing but illegal characters
          out[safe]=scrubKeys(o[k],d+1);
        });
        return out;
      })(payload,0);
    }catch(ser){
      // A circular reference would land here — unwritable no matter what.
      ST._saveState={ok:false, at:Date.now(), err:"save data could not be serialized: "+((ser&&ser.message)||"")};
      if(cb) cb(false);
      try{ toast("⚠️ Save failed — data error, tell Ryan."); }catch(_){}
      return;
    }
    var p=DB.ref(BASE()).set(payload);
    if(p && typeof p.then==="function"){
      p.then(function(){
        // Only the LATEST write may claim success — an older, slower write landing after a
        // newer one shouldn't repaint the badge green over a failure that came after it.
        if(seq===_saveSeq) ST._saveState={ok:true, at:Date.now()};
        if(cb) cb(true);
      }).catch(function(e){
        var msg=(e&&e.message)||"write failed";
        if(seq===_saveSeq) ST._saveState={ok:false, at:Date.now(), err:msg};
        if(cb) cb(false);
        // Say WHY. "Save failed" alone gives nothing to act on — permission denied, offline and
        // payload-too-big all need different fixes, and the message is the only clue available
        // on a phone.
        try{ toast("⚠️ Save failed — "+x(String(msg).slice(0,90))); }catch(_){}
        try{ console.error("Dynasty save failed:", e, "path:", BASE(), "bytes:", JSON.stringify(ST.save).length); }catch(_){}
      });
    } else {
      // Older SDK with no Promise return: assume it went out.
      ST._saveState={ok:true, at:Date.now()};
      if(cb) cb(true);
    }
  }catch(e){
    var em=(e&&e.message)||"write threw";
    ST._saveState={ok:false, at:Date.now(), err:em};
    if(cb) cb(false);
    try{ toast("⚠️ Save failed — "+x(String(em).slice(0,90))); }catch(_){}
    try{ console.error("Dynasty save threw:", e, "path:", BASE()); }catch(_){}
  }
}

// ── Generators ───────────────────────────────────────────
function genName(){ return pick(FIRST)+" "+pick(LAST); }

// play-by-play flavor names never pass through here, so they can't burn the pool.
// Reassigns any full name that collides with `seed` (name->1 map of names already
// taken, e.g. the current roster) or an earlier entry in the list. With a 160k-name
// pool the middle-initial fallback is effectively never reached.
function dedupeNames(list, seed){
  var taken=seed||{};
  (list||[]).forEach(function(p){
    var nm=p.n, g=0;
    while(taken[nm]){
      nm=genName();
      if(++g>60){ nm=nm+" "+String.fromCharCode(65+Math.floor(Math.random()*26))+"."; break; }
    }
    p.n=nm; taken[nm]=1;

function rosterNameSet(){ var m={}; ((ST.save&&ST.save.roster)||[]).forEach(function(p){ m[p.n]=1; }); return m; }

var DEV_TRAITS={
  elite:   {name:"Elite",    mult:1.8, cap:99, head:[13,18], off:[2,4], badge:"⭐ Elite", cls:"elite", hidden:false},
  pro:     {name:"Pro",      mult:1.4, cap:96, head:[10,14], off:[1,3], badge:"🔥 Pro",   cls:"pro",   hidden:false},
  standard:{name:"Standard", mult:1.0, cap:91, head:[8,13],  off:[0,2], badge:"Steady",   cls:"std",   hidden:true},
  slow:    {name:"Slow",     mult:0.75,cap:84, head:[5,9],   off:[0,1], badge:"🐢 Slow",  cls:"slow",  hidden:false},
  bust:    {name:"Bust",     mult:0.5, cap:74, head:[2,6],   off:[0,1], badge:"⚠ Bust",   cls:"bust",  hidden:false}

  var d=devInfo(dev), head=rnd(d.head[0],d.head[1]);

// Star-weighted trait roll. Aggressive lean (5★ far likelier Elite/Pro), but low-star/G6

function rollDevByStars(st){
  var T={
    5:[["elite",15],["pro",30],["standard",45],["slow",8],["bust",2]],
    4:[["elite",7],["pro",20],["standard",55],["slow",15],["bust",3]],
    3:[["elite",3],["pro",10],["standard",57],["slow",25],["bust",5]],
    2:[["elite",1.5],["pro",6],["standard",50],["slow",33],["bust",9.5]],
    1:[["elite",1],["pro",4],["standard",42],["slow",40],["bust",13]]

// ── Player archetypes (Phase 1: identity tags; scheme-fit wiring comes later) ──

function hasPersonality(p){ return !!(p && p.pers && PERSONALITIES[p.pers]); }
// A RECRUIT's character stays hidden until you've actually spent time with him. A player already

function persKnown(b){ return (b.myPush||0) >= (b.persReveal!=null ? b.persReveal : 3); }

var PERSONALITIES={
  leader:   {t:"Leader",    ico:"\ud83e\udde2", desc:"Team-first. Makes everyone around him better, and harder to poach."},
  gymrat:   {t:"Gym Rat",   ico:"\ud83c\udfcb\ufe0f", desc:"First one in the building. Grows faster than anyone."},
  coachable:{t:"Coachable", ico:"\ud83d\udcd8", desc:"Soaks up everything you teach. Gets more out of your staff."},
  clutch:   {t:"Big-Game",  ico:"\ud83d\udd25", desc:"Rises for rivalries and ranked opponents. Sleepwalks the cupcakes."},
  streaky:  {t:"Streaky",   ico:"\ud83c\udfb2", desc:"Unpredictable week to week. Can win you a game on his own \u2014 or lose one."},
  diva:     {t:"Diva",      ico:"\ud83d\udc85", desc:"Knows his worth. Costs far more in NIL, and takes the portal call."},
  loyal:    {t:"Loyal",     ico:"\u2693", desc:"Commits and stays committed. Cheap to keep, and nobody flips him."},

// There is NO neutral personality object, on purpose: a player with nothing notable about him

function persInfo(k){ return PERSONALITIES[k] || null; }
// Nobody knows a kid's exact ceiling \u2014 "ceiling 84" is a number no coach has. Give a BAND, and
// widen it when you have less to go on.
function ceilingBand(p){
  if(!p || !p.pot) return "";
  var conf = (p.yr==="SR") ? 3 : (p.yr==="JR") ? 4 : (p.yr==="SO") ? 6 : 8;
  if(p.revealed) conf=Math.max(2, conf-2);
  var lo=Math.max(p.ovr, p.pot-conf), hi=Math.min(99, p.pot+Math.round(conf/2));
  var band = hi>=95 ? "elite" : hi>=90 ? "high" : hi>=84 ? "solid" : hi>=78 ? "modest" : "limited";

}
function rollPersonality(){
  var r=Math.random();
  if(r<0.10) return "leader";
  if(r<0.20) return "gymrat";
  if(r<0.31) return "coachable";
  if(r<0.41) return "clutch";
  if(r<0.52) return "streaky";
  if(r<0.61) return "diva";
  if(r<0.73) return "loyal";
  if(r<0.78) return "problem";
  return null;                      // no trait. Not a trait CALLED "none" — genuinely none.
}
// ── Roster-wide effects: a leader lifts everybody, a problem drags them down ──
function leadershipMod(){
  var s=ST.save, m=0;
  (s.roster||[]).forEach(function(p){
    if(p.cut) return;
    if(p.pers==="leader")  m += isStarterPlayer(p) ? 0.035 : 0.018;
    if(p.pers==="problem") m -= isStarterPlayer(p) ? 0.030 : 0.015;
  });
  return Math.max(-0.09, Math.min(0.10, m));   // capped: a locker room isn't infinitely good or bad

// ── Game day: who shows up when it matters ──
// Applied per GAME, so the same roster plays differently depending on the opponent.
function personalityGameAdj(game){
  var s=ST.save;
  var big = !!(game && (game.rivalry || (game.op||3) >= (s.prestige||3) || game.post));
  var sum=0, n=0;
  ALL_POS.forEach(function(pos){
    depthOrder(s.roster,pos).slice(0, startersAt(pos)).forEach(function(p){
      n++;
      if(p.pers==="clutch")  sum += big ? 1.8 : -0.35;   // he lives for these; the cupcakes bore him
      if(p.pers==="streaky") sum += rnd(-25,25)/10;      // pure variance, week to week
      if(p.pers==="leader")  sum += big ? 0.5 : 0.25;
      if(p.pers==="problem") sum -= 0.35;
    });

function genPlayer(pos, prestige, year){
  var yr = year||pick(["FR","SO","JR","SR"]);
  // freshmen arrive raw; upperclassmen have developed
  var base = (yr==="FR") ? (52+prestige*4) : (58+prestige*5);
  var ovr = (yr==="FR") ? Math.max(50,Math.min(80, base+rnd(-3,4))) : genOvr(base);
  var dev = rollDevGeneric(ovr);
  return {id:"p"+Math.random().toString(36).slice(2,8), n:genName(), pos:pos, ovr:ovr, yr:yr, dev:dev, arch:rollArch(pos), pers:rollPersonality(), pot:rollPotential(ovr,dev), startOvr:ovr, ssOvr:ovr, revealed:false};
}
// Generate a player at a target overall — used to seed a starting roster to a team's real rating.
function genPlayerAt(pos, ovr, yr){
  ovr=Math.max(50,Math.min(99,Math.round(ovr)));
  var dev=rollDevGeneric(ovr);
  return {id:"p"+Math.random().toString(36).slice(2,8), n:genName(), pos:pos, ovr:ovr, yr:yr||pick(["FR","SO","JR","SR"]), dev:dev, arch:rollArch(pos), pers:rollPersonality(), pot:rollPotential(ovr,dev), startOvr:ovr, ssOvr:ovr, revealed:false};

// Class year for a generated player. Starters skew experienced, depth skews young.
// `srMult` is a TEAM-level seniority roll (drawn once per roster): >1 makes the whole
// team older (more seniors → bigger graduating class), <1 makes it younger. That's what
// gives one takeover a veteran roster and the next a young one, on top of per-position
// noise — so gaps differ both across positions AND across teams/years.
function pickYear(isStarter, srMult){
  srMult=srMult||1;
  var r=Math.random();
  if(isStarter){
    var pSR=Math.max(0.10, Math.min(0.70, 0.40*srMult));   // seniors among starters
    var rest=1-pSR;
    if(r<pSR) return "SR";
    if(r<pSR+rest*0.66) return "JR";
    return "SO";                                            // the occasional young starter
  }
  var pSRd=Math.max(0.02, Math.min(0.28, 0.08*srMult));    // a few senior backups
  var rd=1-pSRd;                                            // split the rest JR:SO:FR ~ 18:34:40
  if(r<pSRd) return "SR";
  if(r<pSRd+rd*(18/92)) return "JR";
  if(r<pSRd+rd*(52/92)) return "SO";
  return "FR";
}
function genStarterRoster(prestige, roleArg, targets){
  var r=[];
  var offPos=["QB","RB","WR","TE","OL"];
  var defPos=["DL","LB","CB","S"];
  var uniquePos = (roleArg==="DC") ? defPos
                : (roleArg==="HC") ? offPos.concat(defPos)
                : offPos;
  var srMult = 0.6 + Math.random()*0.9;   // this team's seniority (~0.6 young … ~1.5 veteran)
  uniquePos.forEach(function(pos){
    var isDef=defPos.indexOf(pos)>=0;
    var total=rosterSizeAt(pos);
    var starters=startersAt(pos);
    for(var i=0;i<total;i++){
      var yr=pickYear(i<starters, srMult);
      if(targets){
        // anchor overalls to the team's real unit rating: starters near it, depth clearly below
        var t=isDef?targets.def:targets.off;
        var ovr=(i<starters) ? t+rnd(-3,3) : t-rnd(7,15);
        r.push(genPlayerAt(pos, ovr, yr));
      } else {
        r.push(genPlayer(pos,prestige,yr));
      }

// Which recruits even APPEAR on your board. Prestige is scaled within a subdivision, so a

function recruitTierFor(prestige, conf){

}
function weightedStars(prestige, conf){
  var p = recruitTierFor(prestige, (conf!=null?conf:(ST.save&&ST.save.conf)));
  var roll=Math.random()*10 + p*1.4;

function starCost(st){ return [0,4,8,15,26,40][st]; }
// Incoming freshman rating by stars — recruits arrive RAW and develop over their career.

function recruitOvr(st){

// ── Season-long recruiting board (CFB-style) ─────────────

function genRecruitBoard(prestige){

  var offPos=["QB","RB","WR","TE","OL"];
