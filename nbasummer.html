<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – NBA Summer League Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#fdf8ee;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#c0392b;--red2:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none;touch-action:manipulation}

/* ── TOPBAR ── */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;overflow:hidden;text-align:center}
.app-name{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:7px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;display:block}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--text);box-shadow:2px 2px 0 var(--border)}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold-bg);color:var(--gold-dark)}
.btn-red{background:var(--red-bg);color:var(--red2)}
.btn-green{background:var(--green-bg);color:var(--green)}

/* ── SCORECERY logo ── */
.scorecery-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:inherit;color:#ffffff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111111;text-shadow:1px 1px 0 #111111,2px 2px 0 #111111,3px 3px 0 #111111,5px 5px 0 #c9082a,7px 7px 0 #17408b,8px 8px 0 #0d2a5c;paint-order:stroke fill}

/* ── PAGE TABS ── */
.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;gap:0;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 12px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;flex:1;text-align:center}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── PUBLIC BANNER ── */
.public-banner{background:var(--blue-bg);border-bottom:2px solid var(--border);padding:6px 12px;font-size:9px;font-weight:800;color:var(--blue);text-align:center;text-transform:uppercase;letter-spacing:.05em}

/* ── USER SELECT ── */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:150px;box-shadow:3px 3px 0 var(--border)}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}

/* ── DAY BAR ── */
.week-bar{display:flex;gap:5px;padding:8px 10px;overflow-x:auto;border-bottom:2px solid var(--border2);background:var(--cream);flex-shrink:0}
.week-bar::-webkit-scrollbar{display:none}
.wtab{flex-shrink:0;padding:6px 13px;font-size:10px;font-weight:800;border:2px solid var(--border);background:#ffffff;color:var(--muted);border-radius:8px;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border);white-space:nowrap}
.wtab:active{transform:translate(2px,2px);box-shadow:none}
.wtab.active{background:var(--gold);color:var(--text)}
.wtab.add{background:var(--blue-bg);color:var(--blue)}
.wtab.danger{background:var(--red-bg);color:var(--red2)}

/* ── LOCK BAR ── */
.lock-bar{display:flex;align-items:center;gap:7px;padding:7px 12px;border-bottom:2px solid var(--border2);flex-wrap:wrap;background:var(--cream);flex-shrink:0}
.lock-info{font-size:10px;font-weight:800;color:var(--text)}
.lock-chips{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.lchip{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:1px 1px 0 var(--border);font-family:'Nunito',sans-serif;background:#ffffff;color:var(--muted)}
.lchip.done{background:var(--gold);color:var(--text)}
.lchip.live{background:var(--red-bg);color:var(--red2)}

/* ── GAME CARDS ── */
.games-wrap{padding:10px}
.lb-note{font-size:11px;font-weight:700;color:var(--muted);line-height:1.8;background:#ffffff;border:2px solid var(--border2);border-radius:10px;padding:16px;margin:12px;text-align:center}
.game-card{background:#ffffff;border:2px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:4px 4px 0 var(--border)}
.gc-head{padding:6px 10px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:center;min-height:16px}
.gc-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.gc-pts{font-size:10px;font-weight:900;color:var(--muted)}
.gc-pts.earned{color:var(--green)}
.gc-pts.miss{color:var(--red2)}
.team-pick{padding:11px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.team-pick:last-child{border-bottom:none}
.team-pick:active{background:var(--cream)}
.team-pick.sel{background:var(--gold-bg)}
.team-pick.locked{cursor:default;opacity:.9}
.team-pick.win{background:var(--green-bg)}
.team-pick.lose{opacity:.5}
.tp-left{display:flex;align-items:center;gap:9px;min-width:0}
.tp-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.team-pick.sel .tp-radio{background:var(--gold);border-color:var(--border)}
.team-pick.sel .tp-radio::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--text)}
.team-pick.win .tp-radio{background:var(--green);border-color:var(--border)}
.tp-name{font-size:13px;font-weight:900;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tp-seed{font-size:9px;font-weight:700;color:var(--muted);margin-left:4px}
.tp-score{font-size:15px;font-weight:900;color:var(--text);flex-shrink:0}
.gc-foot{padding:5px 10px;background:var(--cream);border-top:1px solid var(--border2);font-size:9px;font-weight:700;color:var(--muted);text-align:center}
.gc-foot .live{color:var(--red2);font-weight:900}

/* ── STANDINGS ── */
.lb-wrap{padding:12px;min-height:50vh}
.lb-row{background:#ffffff;border:2px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;gap:9px;align-items:center;box-shadow:4px 4px 0 var(--border)}
.lb-row.first{background:var(--gold-bg)}
.lb-row.second{background:#fafafa}
.lb-row.third{background:#fff8f0}
.lb-medal{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;gap:5px}
.lb-name{font-size:13px;font-weight:900}
.lb-pts{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.lb-pts b{color:var(--text);font-weight:900;font-size:16px}
.lb-bar-wrap{height:7px;background:var(--border2);border-radius:4px;margin-top:7px;overflow:hidden;border:1px solid var(--border)}
.lb-bar{height:100%;background:var(--green);border-radius:0}
.lb-stats{display:flex;gap:6px;margin-top:8px}
.lb-stat{flex:1;background:var(--cream);border:1.5px solid var(--border2);border-radius:7px;padding:5px 4px;text-align:center}
.lb-stat-v{font-size:14px;font-weight:900;color:var(--text);line-height:1}
.lb-stat-l{font-size:7px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}

/* ── ADMIN ── */
.adm-wrap{padding:0 0 16px;min-height:50vh}
.adm-sec-label{font-size:9px;font-weight:900;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:14px 12px 8px;padding-bottom:5px;border-bottom:2px solid var(--border2)}
.adm-sec-label:first-of-type{margin-top:0}
.adm-game{background:#ffffff;border:2px solid var(--border);border-radius:10px;padding:10px 12px;margin:0 10px 8px;box-shadow:3px 3px 0 var(--border)}
.adm-game-title{font-size:9px;font-weight:800;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.adm-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.adm-input{flex:1;border:2px solid var(--border);border-radius:6px;padding:7px 8px;font-size:11px;font-weight:700;font-family:'Nunito',sans-serif;background:var(--cream);box-shadow:2px 2px 0 var(--border);min-width:0}
.adm-input.sc{max-width:56px;flex:0 0 56px;text-align:center}
.adm-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.adm-btn{padding:5px 10px;border-radius:8px;font-size:9px;font-weight:800;border:2px solid var(--border);background:#ffffff;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.adm-btn:active{transform:translate(2px,2px);box-shadow:none}
.adm-btn.sel-away{background:var(--blue-bg);border-color:var(--border);color:var(--blue)}
.adm-btn.sel-home{background:var(--purple-bg);border-color:var(--border);color:var(--purple)}
.adm-btn.clr{background:var(--red-bg);color:var(--red2)}
.adm-head-row{display:flex;justify-content:space-between;align-items:center;gap:6px;margin:0 10px 10px;flex-wrap:wrap}
.adm-head-row .lb-name{font-size:12px;font-weight:900}
.adm-note{font-size:10px;font-weight:700;color:var(--muted);margin:0 12px 10px;line-height:1.6}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#ffffff;border:3px solid var(--border);border-radius:16px;width:100%;max-width:340px;padding:22px 18px;box-shadow:5px 5px 0 var(--border)}
.modal-title{font-size:14px;font-weight:900;margin-bottom:14px;text-align:center}
.modal-input{width:100%;background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-weight:700;outline:none;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border);margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:11px;border-radius:10px;font-size:12px;font-weight:800;border:2px solid var(--border);font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.modal-btn:active{transform:translate(3px,3px);box-shadow:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="app-name" style="font-size:16px">🏀</span>
  </div>
  <div class="topbar-center">
    <div class="app-name"><span class="scorecery-logo" style="font-size:15px">Scorecery</span></div>
    <span class="app-sub">NBA Summer League · Las Vegas</span>
  </div>
  <div class="topbar-right" id="topbar-right"></div>
</div>

<div id="public-banner"></div>
<div class="page-bar" id="page-bar"></div>
<div id="app"></div>
<div id="toast"></div>
<div id="modal-root"></div>

<script>
// =====================================================
// NBA SUMMER LEAGUE — DAILY GAME PICK'EM (STRAIGHT UP)
// =====================================================
var GROUP_ID=(function(){var m=location.search.match(/[?&]group=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var URL_USER=(function(){var m=location.search.match(/[?&]user=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var PUBLIC_VIEW=(function(){ return /[?&]public=1/.test(location.search); })();
var GROUP_ADMIN_PW=null;
var BASE=GROUP_ID?"groups/"+GROUP_ID+"/data/nbasummer":"nbasummer";
var MASTER_PW="Sloop";

var PARTS=["Player1","Player2","Player3","Player4"];
var _EM={};
var GAME_IDS=[];
for(var _gi=1;_gi<=16;_gi++) GAME_IDS.push("g"+_gi);

var ST={
  page:(PUBLIC_VIEW?"standings":"picks"),
  user:URL_USER||null,
  admin:false,
  dayIds:[],
  dayLabels:{},
  curDay:null,
  _dayInit:false,
  games:{},     // dayId -> {gid:{away,home,tip,court}}
  results:{},   // dayId -> {gid:{aScore,hScore}}  (winner derived)
  picks:{},     // dayId -> {ukey:{gid:side}}   side = "away"|"home"
  locked:{},    // dayId -> bool
  groupPublic:false
};

var DB=null;
try{
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks",appId:"1:965978379243:web:35f9db9a664f9170e27fae"});
  DB=firebase.database();
}catch(e){}

function x(s){var t=String(s||"");t=t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");return t;}
var _tt;
function toast(m){var el=document.getElementById("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove("show");},2500);}
function ukey(n){return String(n||"").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\./g,"");}
function pem(n){return _EM[n]?"<span style='margin-right:3px'>"+_EM[n]+"</span>":"";}

// ── Game helpers ─────────────────────────────────────────
function activeGames(dayId){
  var g=ST.games[dayId]||{};
  return GAME_IDS.filter(function(gid){var gm=g[gid];return gm&&gm.away&&gm.home;});
}
function gameWinner(dayId,gid){
  var r=(ST.results[dayId]||{})[gid];
  if(!r)return null;
  var a=r.aScore,h=r.hScore;
  if(a===undefined||a===null||a===""||h===undefined||h===null||h==="")return null;
  a=Number(a);h=Number(h);
  if(isNaN(a)||isNaN(h))return null;
  if(a===h)return null;
  return a>h?"away":"home";
}
function dayHasResults(dayId){
  var gs=activeGames(dayId);
  for(var i=0;i<gs.length;i++){ if(gameWinner(dayId,gs[i]))return true; }
  return false;
}

// ── Scoring ──────────────────────────────────────────────
function dayScore(dayId,user){
  var picks=((ST.picks[dayId]||{})[ukey(user)])||{};
  var correct=0,wrong=0,pending=0,made=0;
  activeGames(dayId).forEach(function(gid){
    var p=picks[gid];
    var w=gameWinner(dayId,gid);
    if(p)made++;
    if(!p){ if(w)wrong++; return; }   // no pick on a decided game = 0, counts against
    if(!w){pending++;return;}
    if(p===w)correct++; else wrong++;
  });
  return {correct:correct,wrong:wrong,pending:pending,made:made};
}
function totalScore(user){
  var c=0,w=0,p=0;
  ST.dayIds.forEach(function(d){var s=dayScore(d,user);c+=s.correct;w+=s.wrong;p+=s.pending;});
  return {correct:c,wrong:w,pending:p};
}

// ── Firebase load ────────────────────────────────────────
function loadData(){
  if(!DB){draw();return;}
  function s1(){
    if(!GROUP_ID){s2();return;}
    DB.ref("groups/"+GROUP_ID).once("value",function(sn){
      var g=sn.val()||{};
      if(g&&g.players&&g.players.length)PARTS=g.players;
      GROUP_ADMIN_PW=(g&&(g.adminPw||g.groupAdminPw))||null;
      ST.groupPublic=!!(g&&g.public);
      s2();
    },function(){s2();});
  }
  function s2(){
    var done=0,total=PARTS.length;
    if(!total){s3();return;}
    PARTS.forEach(function(p){
      DB.ref("users/"+ukey(p)+"/emoji").once("value",
        function(sn){if(sn.val())_EM[p]=sn.val();done++;if(done===total)s3();},
        function(){done++;if(done===total)s3();});
    });
  }
  function s3(){
    DB.ref("globalSettings/masterPw").on("value",function(sn){if(sn.val())MASTER_PW=sn.val();});
    DB.ref(BASE+"/meta").on("value",function(sn){
      var meta=sn.val()||{};
      ST.dayIds=meta.dayIds||[];
      ST.dayLabels=meta.dayLabels||{};
      ST.locked=meta.locked||{};
      if(!ST._dayInit&&ST.dayIds.length){ ST.curDay=defaultDay(); ST._dayInit=true; }
      else if(ST.curDay&&ST.dayIds.indexOf(ST.curDay)===-1){ ST.curDay=defaultDay(); }
      else if(!ST.curDay&&ST.dayIds.length){ ST.curDay=defaultDay(); }
      draw();
    });
    DB.ref(BASE+"/games").on("value",function(sn){ST.games=sn.val()||{};draw();});
    DB.ref(BASE+"/results").on("value",function(sn){ST.results=sn.val()||{};draw();});
    DB.ref(BASE+"/picks").on("value",function(sn){ST.picks=sn.val()||{};draw();});
  }
  s1();
}
function defaultDay(){
  // last day that still has no full results, else last day
  for(var i=0;i<ST.dayIds.length;i++){
    if(!ST.locked[ST.dayIds[i]]) return ST.dayIds[i];
  }
  return ST.dayIds.length?ST.dayIds[ST.dayIds.length-1]:null;
}

// ── Picks ────────────────────────────────────────────────
function pickGame(gid,side){
  if(PUBLIC_VIEW)return;
  if(!ST.user){toast("Pick a name first");return;}
  var day=ST.curDay;
  if(!day)return;
  if(ST.locked[day]){toast("🔒 Day locked");return;}
  var uk=ukey(ST.user);
  if(!ST.picks[day])ST.picks[day]={};
  if(!ST.picks[day][uk])ST.picks[day][uk]={};
  ST.picks[day][uk][gid]=side;
  draw();
  if(DB){DB.ref(BASE+"/picks/"+day+"/"+uk+"/"+gid).set(side,function(err){
    if(err)toast("Save failed");
  });}
}

// ── Admin: results & game entry ──────────────────────────
function setScore(gid,which,val){
  var day=ST.curDay;if(!day)return;
  if(!ST.results[day])ST.results[day]={};
  if(!ST.results[day][gid])ST.results[day][gid]={};
  ST.results[day][gid][which]=val;
  if(DB)DB.ref(BASE+"/results/"+day+"/"+gid+"/"+which).set(val);
}
function saveGameField(gid,field,val){
  var day=ST.curDay;if(!day)return;
  if(!ST.games[day])ST.games[day]={};
  if(!ST.games[day][gid])ST.games[day][gid]={};
  ST.games[day][gid][field]=val;
  if(DB)DB.ref(BASE+"/games/"+day+"/"+gid+"/"+field).set(val);
}
function toggleLock(day){
  var v=!ST.locked[day];
  ST.locked[day]=v;
  if(DB)DB.ref(BASE+"/meta/locked/"+day).set(v);
  draw();
}
function addDay(){
  var n=ST.dayIds.length+1;
  var id="d"+Date.now().toString(36);
  var lbl="Day "+n;
  ST.dayIds.push(id);ST.dayLabels[id]=lbl;
  ST.curDay=id;
  if(DB){
    DB.ref(BASE+"/meta/dayIds").set(ST.dayIds);
    DB.ref(BASE+"/meta/dayLabels/"+id).set(lbl);
  }
  draw();
}
function renameDay(day){
  var cur=ST.dayLabels[day]||day;
  var nn=prompt("Day label:",cur);
  if(nn===null)return;
  ST.dayLabels[day]=nn;
  if(DB)DB.ref(BASE+"/meta/dayLabels/"+day).set(nn);
  draw();
}
function deleteDay(day){
  if(!confirm("Delete this day and all its picks?"))return;
  ST.dayIds=ST.dayIds.filter(function(d){return d!==day;});
  delete ST.dayLabels[day];
  ST.curDay=ST.dayIds.length?ST.dayIds[0]:null;
  if(DB){
    DB.ref(BASE+"/meta/dayIds").set(ST.dayIds);
    DB.ref(BASE+"/meta/dayLabels/"+day).remove();
    DB.ref(BASE+"/games/"+day).remove();
    DB.ref(BASE+"/results/"+day).remove();
    DB.ref(BASE+"/picks/"+day).remove();
  }
  draw();
}
function setPublic(val){
  if(!GROUP_ID||!DB)return;
  DB.ref("groups/"+GROUP_ID+"/public").set(val,function(){
    ST.groupPublic=val;toast(val?"Public view on":"Public view off");draw();
  });
}

// ── Admin auth ───────────────────────────────────────────
function tryAdmin(){
  openModal("Admin password","password","",function(v){
    if(v===MASTER_PW||(GROUP_ADMIN_PW&&v===GROUP_ADMIN_PW)){
      ST.admin=true;ST.page="admin";closeModal();draw();
    } else toast("Wrong password");
  });
}

// ── Modal ────────────────────────────────────────────────
function openModal(title,type,val,cb){
  var r=document.getElementById("modal-root");
  r.innerHTML='<div class="modal-ov" id="mov"><div class="modal-box">'+
    '<div class="modal-title">'+x(title)+'</div>'+
    '<input class="modal-input" id="mi" type="'+(type||"text")+'" value="'+x(val||"")+'">'+
    '<div class="modal-btns"><button class="modal-btn btn-ghost" id="mcancel">Cancel</button>'+
    '<button class="modal-btn btn-gold" id="mok">OK</button></div></div></div>';
  var mi=document.getElementById("mi");mi.focus();
  document.getElementById("mok").onclick=function(){cb(mi.value);};
  document.getElementById("mcancel").onclick=closeModal;
  document.getElementById("mov").onclick=function(e){if(e.target.id==="mov")closeModal();};
  mi.onkeydown=function(e){if(e.key==="Enter")cb(mi.value);};
}
function closeModal(){document.getElementById("modal-root").innerHTML="";}

// ── Name select ──────────────────────────────────────────
function pickUser(n){ST.user=n;draw();}

// =====================================================
// RENDER
// =====================================================
function draw(){
  renderTopbar();
  renderPublicBanner();
  renderPageBar();
  var app=document.getElementById("app");

  if(!PUBLIC_VIEW && !ST.user){ app.innerHTML=userScreen(); bindUserScreen(); return; }

  if(ST.page==="picks") app.innerHTML=picksScreen();
  else if(ST.page==="standings") app.innerHTML=standingsScreen();
  else if(ST.page==="admin"&&ST.admin) app.innerHTML=adminScreen();
  else { ST.page="picks"; app.innerHTML=picksScreen(); }

  bindDayBar();
  if(ST.page==="picks") bindPicks();
  if(ST.page==="admin") bindAdmin();
}

function renderTopbar(){
  var r=document.getElementById("topbar-right");
  if(PUBLIC_VIEW){ r.innerHTML='<span class="tag">👁 Public</span>'; return; }
  var h="";
  if(ST.user){ h+='<span class="tag">'+pem(ST.user)+x(ST.user)+'</span>'; }
  if(ST.admin){ h+='<button class="btn btn-red" onclick="ST.admin=false;ST.page=\'picks\';draw()">Exit</button>'; }
  else { h+='<button class="btn btn-ghost" onclick="tryAdmin()">Admin</button>'; }
  r.innerHTML=h;
}
function renderPublicBanner(){
  var b=document.getElementById("public-banner");
  b.innerHTML=PUBLIC_VIEW?'<div class="public-banner">Read-only public standings</div>':"";
}
function renderPageBar(){
  var bar=document.getElementById("page-bar");
  var tabs=[["picks","My Picks"],["standings","Standings"]];
  if(PUBLIC_VIEW) tabs=[["standings","Standings"]];
  if(ST.admin) tabs.push(["admin","Admin"]);
  bar.innerHTML=tabs.map(function(t){
    return '<button class="ptab'+(ST.page===t[0]?" active":"")+'" onclick="ST.page=\''+t[0]+'\';draw()">'+t[1]+'</button>';
  }).join("");
}

function userScreen(){
  var h='<div class="user-screen"><h2>Who are you?</h2><div class="user-grid">';
  PARTS.forEach(function(p){ h+='<button class="user-btn" data-u="'+x(p)+'">'+pem(p)+x(p)+'</button>'; });
  h+='</div></div>';
  return h;
}
function bindUserScreen(){
  document.querySelectorAll(".user-btn").forEach(function(b){
    b.onclick=function(){pickUser(b.getAttribute("data-u"));};
  });
}

// ── Day bar (shared) ─────────────────────────────────────
function dayBarHTML(withAdmin){
  if(!ST.dayIds.length) return "";
  var h='<div class="week-bar" id="day-bar">';
  ST.dayIds.forEach(function(d){
    var cls="wtab"+(d===ST.curDay?" active":"");
    var lbl=ST.dayLabels[d]||d;
    h+='<button class="'+cls+'" data-day="'+x(d)+'">'+x(lbl)+(ST.locked[d]?" 🔒":"")+'</button>';
  });
  if(withAdmin) h+='<button class="wtab add" data-addday="1">+ Day</button>';
  h+='</div>';
  return h;
}
function bindDayBar(){
  document.querySelectorAll("#day-bar [data-day]").forEach(function(b){
    b.onclick=function(){ST.curDay=b.getAttribute("data-day");draw();};
  });
  var add=document.querySelector("#day-bar [data-addday]");
  if(add)add.onclick=addDay;
}

// ── Picks screen ─────────────────────────────────────────
function picksScreen(){
  if(!ST.dayIds.length) return '<div class="lb-note">No games posted yet.<br>Check back once the schedule is loaded.</div>';
  var day=ST.curDay;
  var gs=activeGames(day);
  var locked=!!ST.locked[day];
  var picks=((ST.picks[day]||{})[ukey(ST.user)])||{};
  var s=dayScore(day,ST.user);

  var h=dayBarHTML(false);
  h+='<div class="lock-bar"><span class="lock-info">'+x(ST.dayLabels[day]||day)+'</span>'+
     '<div class="lock-chips">';
  if(locked) h+='<span class="lchip done">🔒 Locked</span>';
  else h+='<span class="lchip">'+s.made+'/'+gs.length+' picked</span>';
  if(dayHasResults(day)) h+='<span class="lchip live">'+s.correct+' ✓ · '+s.wrong+' ✗</span>';
  h+='</div></div>';

  if(!gs.length) return h+'<div class="lb-note">No games on this day yet.</div>';

  h+='<div class="games-wrap">';
  gs.forEach(function(gid){
    var g=ST.games[day][gid];
    var w=gameWinner(day,gid);
    var r=(ST.results[day]||{})[gid]||{};
    var mine=picks[gid];
    var ptsCls="",ptsTxt="";
    if(w){
      if(mine===w){ptsCls="earned";ptsTxt="+1 ✓";}
      else if(mine){ptsCls="miss";ptsTxt="0 ✗";}
      else{ptsCls="miss";ptsTxt="—";}
    }
    h+='<div class="game-card">';
    h+='<div class="gc-head"><span class="gc-label">'+(g.tip?x(g.tip):"Game")+(g.court?" · "+x(g.court):"")+'</span>';
    if(w)h+='<span class="gc-pts '+ptsCls+'">'+ptsTxt+'</span>';
    h+='</div>';
    ["away","home"].forEach(function(side){
      var nm=g[side]||"";
      var isWin=w===side;
      var isLose=w&&w!==side;
      var isSel=mine===side&&!w;
      var cls="team-pick";
      if(locked||w)cls+=" locked";
      if(isSel)cls+=" sel";
      if(isWin)cls+=" win";
      if(isLose)cls+=" lose";
      if(!w&&mine===side)cls+=" sel";
      var sc=(side==="away")?r.aScore:r.hScore;
      h+='<div class="'+cls+'" data-gid="'+gid+'" data-side="'+side+'">';
      h+='<div class="tp-left"><div class="tp-radio"></div><span class="tp-name">'+x(nm)+'</span></div>';
      if(sc!==undefined&&sc!==null&&sc!=="")h+='<span class="tp-score">'+x(sc)+'</span>';
      h+='</div>';
    });
    if(mine&&!w){
      h+='<div class="gc-foot">Your pick: <b>'+x(g[mine])+'</b></div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}
function bindPicks(){
  document.querySelectorAll(".team-pick[data-gid]").forEach(function(el){
    if(el.classList.contains("locked"))return;
    el.onclick=function(){pickGame(el.getAttribute("data-gid"),el.getAttribute("data-side"));};
  });
}

// ── Standings screen ─────────────────────────────────────
function standingsScreen(){
  var rows=PARTS.map(function(p){
    var s=totalScore(p);
    var decided=s.correct+s.wrong;
    var pct=decided?Math.round(s.correct/decided*100):0;
    return {name:p,correct:s.correct,wrong:s.wrong,pending:s.pending,pct:pct};
  });
  rows.sort(function(a,b){ if(b.correct!==a.correct)return b.correct-a.correct; return a.wrong-b.wrong; });
  var maxC=rows.length?Math.max(1,rows[0].correct):1;

  var h=dayBarHTML(false);
  h+='<div class="lb-wrap">';
  if(!rows.length){h+='<div class="lb-note">No players yet.</div>';return h+'</div>';}
  rows.forEach(function(r,i){
    var medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1)+"";
    var rowCls="lb-row"+(i===0?" first":i===1?" second":i===2?" third":"");
    var barW=Math.round(r.correct/maxC*100);
    var isMe=!PUBLIC_VIEW&&ukey(r.name)===ukey(ST.user);
    h+='<div class="'+rowCls+'"'+(isMe?' style="outline:2px solid var(--gold-dark);outline-offset:1px"':'')+'>';
    h+='<div class="lb-medal">'+medal+'</div>';
    h+='<div class="lb-body">';
    h+='<div class="lb-top"><div class="lb-name">'+pem(r.name)+x(r.name)+'</div>'+
       '<div class="lb-pts"><b>'+r.correct+'</b> wins</div></div>';
    h+='<div class="lb-bar-wrap"><div class="lb-bar" style="width:'+barW+'%"></div></div>';
    h+='<div class="lb-stats">'+
       '<div class="lb-stat"><div class="lb-stat-v">'+r.correct+'</div><div class="lb-stat-l">Correct</div></div>'+
       '<div class="lb-stat"><div class="lb-stat-v">'+r.wrong+'</div><div class="lb-stat-l">Wrong</div></div>'+
       '<div class="lb-stat"><div class="lb-stat-v">'+r.pct+'%</div><div class="lb-stat-l">Win %</div></div>'+
       '<div class="lb-stat"><div class="lb-stat-v">'+r.pending+'</div><div class="lb-stat-l">Pending</div></div>'+
       '</div>';
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

// ── Admin screen ─────────────────────────────────────────
function adminScreen(){
  var day=ST.curDay;
  var h=dayBarHTML(true);
  if(!day) return h+'<div class="lb-note">Add a day to start entering games.</div>';

  h+='<div class="adm-wrap">';
  h+='<div class="adm-head-row"><span class="lb-name">'+x(ST.dayLabels[day]||day)+'</span>'+
     '<div style="display:flex;gap:5px;flex-wrap:wrap">'+
     '<button class="adm-btn" data-renameday="1">Rename</button>'+
     '<button class="adm-btn '+(ST.locked[day]?"sel-away":"")+'" data-lock="1">'+(ST.locked[day]?"🔒 Locked":"Lock Day")+'</button>'+
     '<button class="adm-btn clr" data-delday="1">Delete</button>'+
     '</div></div>';

  h+='<div class="adm-note">Enter matchups and final scores. Winner is set automatically from scores. Lock the day once tip-off passes so picks freeze.</div>';

  h+='<div class="adm-sec-label">Games &amp; Results</div>';
  GAME_IDS.forEach(function(gid){
    var g=(ST.games[day]||{})[gid]||{};
    var r=(ST.results[day]||{})[gid]||{};
    // show a game slot if it has teams OR it's the next empty slot
    h+='<div class="adm-game">';
    h+='<div class="adm-game-title">Game '+gid.replace("g","")+'</div>';
    h+='<div class="adm-row">'+
       '<input class="adm-input" data-g="'+gid+'" data-f="away" placeholder="Away team" value="'+x(g.away||"")+'">'+
       '<input class="adm-input sc" data-r="'+gid+'" data-w="aScore" placeholder="—" value="'+x(r.aScore!=null?r.aScore:"")+'">'+
       '</div>';
    h+='<div class="adm-row">'+
       '<input class="adm-input" data-g="'+gid+'" data-f="home" placeholder="Home team" value="'+x(g.home||"")+'">'+
       '<input class="adm-input sc" data-r="'+gid+'" data-w="hScore" placeholder="—" value="'+x(r.hScore!=null?r.hScore:"")+'">'+
       '</div>';
    h+='<div class="adm-row">'+
       '<input class="adm-input" data-g="'+gid+'" data-f="tip" placeholder="Tip (e.g. 4:00 PT)" value="'+x(g.tip||"")+'">'+
       '<input class="adm-input" data-g="'+gid+'" data-f="court" placeholder="Court" value="'+x(g.court||"")+'">'+
       '</div>';
    var w=gameWinner(day,gid);
    if(w)h+='<div style="font-size:9px;font-weight:800;color:var(--green);margin-top:3px">Winner: '+x(g[w]||w)+'</div>';
    h+='</div>';
  });

  h+='<div class="adm-sec-label">Group</div>';
  if(GROUP_ID){
    h+='<div style="margin:0 10px"><button class="adm-btn '+(ST.groupPublic?"sel-away":"")+'" data-pub="'+(ST.groupPublic?"0":"1")+'">'+
       (ST.groupPublic?"Public view: ON":"Enable public view")+'</button></div>';
  } else {
    h+='<div class="adm-note">No group loaded — running in standalone mode.</div>';
  }
  h+='</div>';
  return h;
}
function bindAdmin(){
  var rd=document.querySelector("[data-renameday]"); if(rd)rd.onclick=function(){renameDay(ST.curDay);};
  var lk=document.querySelector("[data-lock]"); if(lk)lk.onclick=function(){toggleLock(ST.curDay);};
  var dd=document.querySelector("[data-delday]"); if(dd)dd.onclick=function(){deleteDay(ST.curDay);};
  var pb=document.querySelector("[data-pub]"); if(pb)pb.onclick=function(){setPublic(pb.getAttribute("data-pub")==="1");};
  document.querySelectorAll("[data-g]").forEach(function(inp){
    inp.onchange=function(){saveGameField(inp.getAttribute("data-g"),inp.getAttribute("data-f"),inp.value.trim());draw();};
  });
  document.querySelectorAll("[data-r]").forEach(function(inp){
    inp.onchange=function(){setScore(inp.getAttribute("data-r"),inp.getAttribute("data-w"),inp.value.trim());draw();};
  });
}

// ── Boot ─────────────────────────────────────────────────
loadData();
draw();
</script>
</body>
