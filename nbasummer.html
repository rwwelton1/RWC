<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#fdf8ee;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#c0392b;--red2:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none;touch-action:manipulation}

.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;overflow:hidden;text-align:center}
.app-name{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:7px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;display:block}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--text);box-shadow:2px 2px 0 var(--border)}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold-bg);color:var(--gold-dark)}
.btn-red{background:var(--red-bg);color:var(--red2)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-blue{background:var(--blue-bg);color:var(--blue)}

.scorecery-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:inherit;color:#ffffff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111111;text-shadow:1px 1px 0 #111111,2px 2px 0 #111111,3px 3px 0 #111111,5px 5px 0 #c9082a,7px 7px 0 #17408b,8px 8px 0 #0d2a5c;paint-order:stroke fill}

.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;gap:0;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 12px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;flex:1;text-align:center}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.public-banner{background:var(--blue-bg);border-bottom:2px solid var(--border);padding:6px 12px;font-size:9px;font-weight:800;color:var(--blue);text-align:center;text-transform:uppercase;letter-spacing:.05em}

.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:150px;box-shadow:3px 3px 0 var(--border)}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}

.week-bar{display:flex;gap:5px;padding:8px 10px;overflow-x:auto;border-bottom:2px solid var(--border2);background:var(--cream);flex-shrink:0}
.week-bar::-webkit-scrollbar{display:none}
.wtab{flex-shrink:0;padding:6px 13px;font-size:10px;font-weight:800;border:2px solid var(--border);background:#ffffff;color:var(--muted);border-radius:8px;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border);white-space:nowrap}
.wtab:active{transform:translate(2px,2px);box-shadow:none}
.wtab.active{background:var(--gold);color:var(--text)}
.wtab.add{background:var(--blue-bg);color:var(--blue)}
.wtab.tourney{background:var(--purple-bg);color:var(--purple)}
.wtab.tourney.active{background:var(--purple);color:#fff}

.lock-bar{display:flex;align-items:center;gap:7px;padding:7px 12px;border-bottom:2px solid var(--border2);flex-wrap:wrap;background:var(--cream);flex-shrink:0}
.lock-info{font-size:10px;font-weight:800;color:var(--text)}
.lock-chips{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.lchip{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:1px 1px 0 var(--border);font-family:'Nunito',sans-serif;background:#ffffff;color:var(--muted)}
.lchip.done{background:var(--gold);color:var(--text)}
.lchip.live{background:var(--red-bg);color:var(--red2)}

.games-wrap{padding:10px}
.date-group{margin-bottom:12px}
.date-hdr{width:100%;display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--gold-bg);border:2px solid var(--border);border-radius:10px;box-shadow:3px 3px 0 var(--border);font-family:'Nunito',sans-serif;cursor:pointer;margin-bottom:8px}
.date-hdr:active{transform:translate(3px,3px);box-shadow:none}
.date-hdr.tourney{background:var(--purple-bg)}
.date-hdr-caret{font-size:12px;font-weight:900;color:var(--muted);flex-shrink:0;width:12px}
.date-hdr-title{font-size:12px;font-weight:900;color:var(--text);flex:1;text-align:left}
.date-hdr-meta{font-size:9px;font-weight:800;color:var(--muted);flex-shrink:0;background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:2px 9px}
.date-body{}
.lb-note{font-size:11px;font-weight:700;color:var(--muted);line-height:1.8;background:#ffffff;border:2px solid var(--border2);border-radius:10px;padding:16px;margin:12px;text-align:center}
.game-card{background:#ffffff;border:2px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:4px 4px 0 var(--border)}
.game-card.tourney{border-color:var(--purple);box-shadow:4px 4px 0 var(--purple)}
.gc-head{padding:6px 10px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:center;min-height:16px;gap:6px}
.gc-head.tourney{background:var(--purple-bg)}
.gc-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gc-badge{font-size:8px;font-weight:900;color:#fff;background:var(--purple);border-radius:20px;padding:2px 8px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.gc-pts{font-size:10px;font-weight:900;color:var(--muted);flex-shrink:0}
.gc-pts.earned{color:var(--green)}
.gc-pts.miss{color:var(--red2)}
.team-pick{padding:11px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.team-pick:last-child{border-bottom:none}
.team-pick:active{background:var(--cream)}
.team-pick.sel{background:var(--gold-bg)}
.team-pick.locked{cursor:default}
.team-pick.win{background:var(--green-bg)}
.team-pick.lose{opacity:.5}
.tp-left{display:flex;align-items:center;gap:9px;min-width:0}
.tp-logo{width:24px;height:24px;flex-shrink:0;object-fit:contain}
.tp-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.team-pick.sel .tp-radio{background:var(--gold);border-color:var(--border)}
.team-pick.sel .tp-radio::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--text)}
.team-pick.win .tp-radio{background:var(--green);border-color:var(--border)}
.tp-name{font-size:13px;font-weight:900;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tp-score{font-size:15px;font-weight:900;color:var(--text);flex-shrink:0}
.gc-foot{padding:5px 10px;background:var(--cream);border-top:1px solid var(--border2);font-size:9px;font-weight:700;color:var(--muted);text-align:center}

.lb-wrap{padding:12px;min-height:50vh}
.lb-row{background:#ffffff;border:2px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;gap:9px;align-items:center;box-shadow:4px 4px 0 var(--border)}
.lb-row.first{background:var(--gold-bg)}
.lb-row.second{background:#fafafa}
.lb-row.third{background:#fff8f0}
.lb-medal{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;gap:5px}
.lb-name{font-size:13px;font-weight:900}
.lb-pts{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.lb-pts b{color:var(--text);font-weight:900;font-size:16px}
.lb-bar-wrap{height:7px;background:var(--border2);border-radius:4px;margin-top:7px;overflow:hidden;border:1px solid var(--border)}
.lb-bar{height:100%;background:var(--green);border-radius:0}
.lb-stats{display:flex;gap:6px;margin-top:8px}
.lb-stat{flex:1;background:var(--cream);border:1.5px solid var(--border2);border-radius:7px;padding:5px 4px;text-align:center}
.lb-stat-v{font-size:14px;font-weight:900;color:var(--text);line-height:1}
.lb-stat-l{font-size:7px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}

.adm-wrap{padding:0 0 16px;min-height:50vh}
.adm-sec-label{font-size:9px;font-weight:900;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:14px 12px 8px;padding-bottom:5px;border-bottom:2px solid var(--border2)}
.adm-sec-label:first-of-type{margin-top:0}
.adm-game{background:#ffffff;border:2px solid var(--border);border-radius:10px;padding:10px 12px;margin:0 10px 8px;box-shadow:3px 3px 0 var(--border)}
.adm-game.tourney{border-color:var(--purple);box-shadow:3px 3px 0 var(--purple)}
.adm-game-title{font-size:9px;font-weight:800;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center;gap:6px}
.adm-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.adm-input{flex:1;border:2px solid var(--border);border-radius:6px;padding:7px 8px;font-size:11px;font-weight:700;font-family:'Nunito',sans-serif;background:var(--cream);box-shadow:2px 2px 0 var(--border);min-width:0}
.adm-input.sc{max-width:56px;flex:0 0 56px;text-align:center}
.adm-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.adm-btn{padding:5px 10px;border-radius:8px;font-size:9px;font-weight:800;border:2px solid var(--border);background:#ffffff;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.adm-btn:active{transform:translate(2px,2px);box-shadow:none}
.adm-btn.sel{background:var(--green-bg);border-color:var(--border);color:var(--green)}
.adm-btn.sel-p{background:var(--purple-bg);border-color:var(--border);color:var(--purple)}
.adm-btn.clr{background:var(--red-bg);color:var(--red2)}
.adm-head-row{display:flex;justify-content:space-between;align-items:center;gap:6px;margin:0 10px 10px;flex-wrap:wrap}
.adm-head-row .lb-name{font-size:12px;font-weight:900}
.adm-note{font-size:10px;font-weight:700;color:var(--muted);margin:0 12px 10px;line-height:1.6}
.phase-chip{font-size:8px;font-weight:900;padding:3px 8px;border-radius:20px;border:2px solid var(--border2);background:#fff;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif}
.phase-chip.on-l{background:var(--green-bg);border-color:var(--border);color:var(--green)}
.phase-chip.on-t{background:var(--purple-bg);border-color:var(--border);color:var(--purple)}

.imp-box{background:#fff;border:2px solid var(--border);border-radius:10px;margin:0 10px 10px;padding:12px;box-shadow:3px 3px 0 var(--border)}
.imp-date-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.imp-date{flex:1;border:2px solid var(--border);border-radius:6px;padding:8px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;background:var(--cream);box-shadow:2px 2px 0 var(--border)}
.imp-game{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--border2)}
.imp-game:last-child{border-bottom:none}
.imp-game input[type=checkbox]{width:18px;height:18px;flex-shrink:0}
.imp-teams{flex:1;font-size:12px;font-weight:800;min-width:0}
.imp-meta{font-size:8px;font-weight:700;color:var(--muted);margin-top:2px}
.imp-tourney-tag{font-size:7px;font-weight:900;color:var(--purple);background:var(--purple-bg);border-radius:10px;padding:1px 6px;margin-left:5px}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#ffffff;border:3px solid var(--border);border-radius:16px;width:100%;max-width:340px;padding:22px 18px;box-shadow:5px 5px 0 var(--border)}
.modal-title{font-size:14px;font-weight:900;margin-bottom:14px;text-align:center}
.modal-input{width:100%;background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-weight:700;outline:none;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border);margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:11px;border-radius:10px;font-size:12px;font-weight:800;border:2px solid var(--border);font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.modal-btn:active{transform:translate(3px,3px);box-shadow:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left"><span class="app-name" style="font-size:16px">🏀</span></div>
  <div class="topbar-center">
    <div class="app-name"><span class="scorecery-logo" style="font-size:15px">Scorecery</span></div>
    <span class="app-sub">NBA Summer League · Las Vegas</span>
  </div>
  <div class="topbar-right" id="topbar-right"></div>
</div>

<div id="public-banner"></div>
<div class="page-bar" id="page-bar"></div>
<div id="app"></div>
<div id="toast"></div>
<div id="modal-root"></div>

<script>
// =====================================================
// NBA SUMMER LEAGUE — LAS VEGAS PICK'EM
// League play = 1 pt · Semifinals = 2 pts · Championship = 3 pts
// =====================================================
var GROUP_ID=(function(){var m=location.search.match(/[?&]group=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var URL_USER=(function(){var m=location.search.match(/[?&]user=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var PUBLIC_VIEW=(function(){ return /[?&]public=1/.test(location.search); })();
var GROUP_ADMIN_PW=null;
var BASE=GROUP_ID?"groups/"+GROUP_ID+"/data/nbasummer":"nbasummer";
var MASTER_PW="Sloop";
var ESPN_LEAGUE="nba-summer-las-vegas";
var ESPN_URL="https://site.api.espn.com/apis/site/v2/sports/basketball/"+ESPN_LEAGUE+"/scoreboard";

function phasePoints(phase){ if(phase==="final")return 3; if(phase==="semi")return 2; return 1; }
function phaseLabel(phase){ if(phase==="final")return "Championship"; if(phase==="semi")return "Semifinal"; if(phase==="quarter")return "Quarterfinal"; return "League Play"; }
function phaseIsTourney(phase){ return phase==="semi"||phase==="final"||phase==="quarter"; }

var PARTS=["Player1","Player2","Player3","Player4"];
var _EM={};
var GAME_IDS=[];
for(var _gi=1;_gi<=16;_gi++) GAME_IDS.push("g"+_gi);

var ST={
  page:(PUBLIC_VIEW?"standings":"picks"),
  user:URL_USER||null,
  admin:false,
  dayIds:[],
  dayLabels:{},
  curDay:null,
  _dayInit:false,
  games:{},
  results:{},
  picks:{},
  locked:{},
  groupPublic:false,
  importDate:"",
  importGames:[],
  importSelected:{},
  importLoading:false,
  importError:"",
  collapsed:{}
};

var DB=null;
try{
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks",appId:"1:965978379243:web:35f9db9a664f9170e27fae"});
  DB=firebase.database();
}catch(e){}

function x(s){var t=String(s||"");t=t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");return t;}
var _tt;
function toast(m){var el=document.getElementById("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove("show");},2500);}
function ukey(n){return String(n||"").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\./g,"");}
function pem(n){return _EM[n]?"<span style='margin-right:3px'>"+_EM[n]+"</span>":"";}

function activeGames(dayId){
  var g=ST.games[dayId]||{};
  return GAME_IDS.filter(function(gid){var gm=g[gid];return gm&&gm.away&&gm.home;});
}
function gamePhase(dayId,gid){ var g=(ST.games[dayId]||{})[gid]||{}; return g.phase||"league"; }
// Per-game lock: locks at tip-off, once results exist, or if admin locked the day
function gameLocked(dayId,gid){
  if(ST.locked[dayId])return true;
  var g=(ST.games[dayId]||{})[gid]||{};
  if(gameWinner(dayId,gid))return true;
  if(g.tipTs&&Date.now()>=g.tipTs)return true;
  return false;
}
function gameDateKey(dayId,gid){
  var g=(ST.games[dayId]||{})[gid]||{};
  if(g.tipTs){var d=new Date(g.tipTs);return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);}
  return "z-"+(ST.dayLabels[dayId]||dayId); // fallback: group by admin day label
}
function dateKeyLabel(key){
  if(key.indexOf("z-")===0)return key.slice(2);
  var p=key.split("-");var d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));
  return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
}
// Flatten every game across all days into {dayId,gid,tipTs,dateKey}, sorted chronologically
function allGamesFlat(){
  var out=[];
  ST.dayIds.forEach(function(d){
    activeGames(d).forEach(function(gid){
      var g=ST.games[d][gid]||{};
      out.push({dayId:d,gid:gid,tipTs:g.tipTs||0,dateKey:gameDateKey(d,gid)});
    });
  });
  out.sort(function(a,b){ if(a.tipTs&&b.tipTs)return a.tipTs-b.tipTs; return a.dateKey<b.dateKey?-1:a.dateKey>b.dateKey?1:0; });
  return out;
}
function groupGamesByDate(){
  var flat=allGamesFlat(),groups=[],idx={};
  flat.forEach(function(item){
    if(!(item.dateKey in idx)){ idx[item.dateKey]=groups.length; groups.push({key:item.dateKey,items:[]}); }
    groups[idx[item.dateKey]].items.push(item);
  });
  return groups;
}
function gameWinner(dayId,gid){
  var r=(ST.results[dayId]||{})[gid];
  if(!r)return null;
  var a=r.aScore,h=r.hScore;
  if(a===undefined||a===null||a===""||h===undefined||h===null||h==="")return null;
  a=Number(a);h=Number(h);
  if(isNaN(a)||isNaN(h)||a===h)return null;
  return a>h?"away":"home";
}
function dayHasResults(dayId){
  var gs=activeGames(dayId);
  for(var i=0;i<gs.length;i++){ if(gameWinner(dayId,gs[i]))return true; }
  return false;
}

function dayScore(dayId,user){
  var picks=((ST.picks[dayId]||{})[ukey(user)])||{};
  var pts=0,correct=0,wrong=0,pending=0,made=0;
  activeGames(dayId).forEach(function(gid){
    var p=picks[gid], w=gameWinner(dayId,gid), val=phasePoints(gamePhase(dayId,gid));
    if(p)made++;
    if(!p){ if(w)wrong++; return; }
    if(!w){pending++;return;}
    if(p===w){correct++;pts+=val;} else wrong++;
  });
  return {pts:pts,correct:correct,wrong:wrong,pending:pending,made:made};
}
function totalScore(user){
  var pts=0,c=0,w=0,pn=0,tp=0;
  ST.dayIds.forEach(function(d){
    var s=dayScore(d,user);
    pts+=s.pts;c+=s.correct;w+=s.wrong;pn+=s.pending;
    activeGames(d).forEach(function(gid){
      var ph=gamePhase(d,gid);
      if(phaseIsTourney(ph)){
        var picks=((ST.picks[d]||{})[ukey(user)])||{};
        if(picks[gid]&&gameWinner(d,gid)===picks[gid]) tp+=(phasePoints(ph)-1);
      }
    });
  });
  return {pts:pts,correct:c,wrong:w,pending:pn,tourneyBonus:tp};
}

function detectPhase(ev,comp){
  var notes=((comp&&comp.notes)||[]).map(function(n){return String(n.headline||n.text||"").toLowerCase();}).join(" ");
  var typeTxt=((comp&&comp.type&&(comp.type.text||comp.type.abbreviation))||"").toLowerCase();
  var name=String(ev&&ev.name||"").toLowerCase();
  var blob=notes+" "+typeTxt+" "+name;
  if(/final|championship|title game/.test(blob)) return "final";
  if(/semifinal|semi-final|semi final/.test(blob)) return "semi";
  if(/quarterfinal|quarter-final|quarter final/.test(blob)) return "quarter";
  return "league";
}
function parseEspn(data){
  var events=(data&&data.events)||[];
  return events.map(function(ev){
    var comp=(ev.competitions||[])[0]||{};
    var comps=comp.competitors||[];
    var away=comps.find(function(c){return c.homeAway==="away";})||comps[0]||{};
    var home=comps.find(function(c){return c.homeAway==="home";})||comps[1]||{};
    function nm(c){return(c.team&&(c.team.shortDisplayName||c.team.displayName||c.team.name))||"TBD";}
    function logo(c){var t=c.team;if(!t)return"";if(t.logo)return t.logo;if(t.logos&&t.logos.length)return t.logos[0].href||"";return"";}
    var dt=ev.date?new Date(ev.date):null;
    var tip=dt?dt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"";
    var tipTs=dt?dt.getTime():0;
    var state=(comp.status&&comp.status.type&&comp.status.type.state)||"pre";
    var aSc=(away.score!=null&&away.score!=="")?String(away.score):"";
    var hSc=(home.score!=null&&home.score!=="")?String(home.score):"";
    return {
      away:nm(away),home:nm(home),awayLogo:logo(away),homeLogo:logo(home),
      tip:tip,tipTs:tipTs,court:(comp.venue&&comp.venue.fullName)||"",
      phase:detectPhase(ev,comp),espnId:ev.id||"",
      state:state,aScore:state==="pre"?"":aSc,hScore:state==="pre"?"":hSc
    };
  });
}
function fetchEspn(dateStr){
  var ds=String(dateStr||"").replace(/-/g,"");
  if(ds.length!==8){toast("Pick a date first");return;}
  ST.importLoading=true;ST.importError="";draw();
  fetch(ESPN_URL+"?dates="+ds+"&limit=100")
    .then(function(r){return r.json();})
    .then(function(data){
      ST.importLoading=false;
      ST.importGames=parseEspn(data);
      ST.importSelected={};
      ST.importGames.forEach(function(_,i){ST.importSelected[i]=true;});
      if(!ST.importGames.length)ST.importError="No Vegas Summer League games on that date.";
      draw();
    })
    .catch(function(){
      ST.importLoading=false;
      ST.importError="Could not reach ESPN. Check connection and retry.";
      draw();
    });
}
function addImportedGames(){
  var day=ST.curDay;if(!day){toast("Add a day first");return;}
  var sel=ST.importGames.filter(function(_,i){return ST.importSelected[i];});
  if(!sel.length){toast("Select at least one game");return;}
  if(!ST.games[day])ST.games[day]={};
  var used=activeGames(day).length;
  sel.forEach(function(g,i){
    var gid=GAME_IDS[used+i];
    if(!gid)return;
    var obj={away:g.away,home:g.home,awayLogo:g.awayLogo,homeLogo:g.homeLogo,tip:g.tip,tipTs:g.tipTs||0,court:g.court,phase:g.phase,espnId:g.espnId};
    ST.games[day][gid]=obj;
    if(DB)DB.ref(BASE+"/games/"+day+"/"+gid).set(obj);
    if(g.aScore!==""&&g.hScore!==""){
      if(!ST.results[day])ST.results[day]={};
      ST.results[day][gid]={aScore:g.aScore,hScore:g.hScore};
      if(DB)DB.ref(BASE+"/results/"+day+"/"+gid).set({aScore:g.aScore,hScore:g.hScore});
    }
  });
  ST.importGames=[];ST.importSelected={};
  toast("✓ "+sel.length+" game"+(sel.length>1?"s":"")+" added");
  draw();
}
function refreshScores(){
  var day=ST.curDay;if(!day)return;
  var espnIds={};
  activeGames(day).forEach(function(gid){
    var g=ST.games[day][gid];
    if(g&&g.espnId)espnIds[g.espnId]=gid;
  });
  if(!Object.keys(espnIds).length){toast("No ESPN-linked games");return;}
  var ds=(ST.importDate||"").replace(/-/g,"");
  if(ds.length!==8){toast("Set the import date to refresh");return;}
  toast("Refreshing…");
  fetch(ESPN_URL+"?dates="+ds+"&limit=100")
    .then(function(r){return r.json();})
    .then(function(data){
      var evs=(data&&data.events)||[];var n=0;
      evs.forEach(function(ev){
        var gid=espnIds[ev.id];if(!gid)return;
        var comp=(ev.competitions||[])[0]||{};
        var comps=comp.competitors||[];
        var away=comps.find(function(c){return c.homeAway==="away";})||{};
        var home=comps.find(function(c){return c.homeAway==="home";})||{};
        var state=(comp.status&&comp.status.type&&comp.status.type.state)||"pre";
        if(state==="pre")return;
        var a=away.score!=null?String(away.score):"",h=home.score!=null?String(home.score):"";
        if(a===""||h==="")return;
        if(!ST.results[day])ST.results[day]={};
        ST.results[day][gid]={aScore:a,hScore:h};
        if(DB)DB.ref(BASE+"/results/"+day+"/"+gid).set({aScore:a,hScore:h});
        n++;
      });
      toast(n?("✓ Updated "+n+" score"+(n>1?"s":"")):"No new finals");
      draw();
    })
    .catch(function(){toast("ESPN refresh failed");});
}

    h+='<div class="lb-stats">'+
       '<div class="lb-stat"><div class="lb-stat-v">'+r.correct+'</div><div class="lb-stat-l">Correct</div></div>'+
       '<div class="lb-stat"><div class="lb-stat-v">'+r.wrong+'</div><div class="lb-stat-l">Wrong</div></div>'+
       '<div class="lb-stat"><div class="lb-stat-v">'+r.pct+'%</div><div class="lb-stat-l">Win %</div></div>'+
       '<div class="lb-stat"><div class="lb-stat-v">+'+r.tb+'</div><div class="lb-stat-l">Tourney</div></div>'+
       '</div></div></div>';
  });
  return h+'</div>';
}

function adminScreen(){
  var day=ST.curDay,h=dayBarHTML(true);
  if(!day)return h+'<div class="adm-wrap"><div class="lb-note">Add a day, then import games from ESPN.</div>'+importBox()+'</div>';
  h+='<div class="adm-wrap">';
  h+='<div class="adm-head-row"><span class="lb-name">'+x(ST.dayLabels[day]||day)+'</span><div style="display:flex;gap:5px;flex-wrap:wrap">'+
     '<button class="adm-btn" data-renameday="1">Rename</button>'+
     '<button class="adm-btn '+(ST.locked[day]?"sel-p":"")+'" data-lock="1">'+(ST.locked[day]?"🔒 Locked":"Lock Day")+'</button>'+
     '<button class="adm-btn clr" data-delday="1">Delete</button></div></div>';
  h+='<div class="adm-note">Import a date from ESPN (Las Vegas), then correct scores as games go final — or hit Refresh Scores. Tap a game\u2019s phase chip to mark Semifinal (2×) or Championship (3×). League games are 1×.</div>';
  h+='<div class="adm-sec-label">Import from ESPN</div>'+importBox();
  var linked=activeGames(day).some(function(gid){return ST.games[day][gid].espnId;});
  if(linked)h+='<div style="margin:0 10px 10px"><button class="adm-btn btn-blue" data-refresh="1">↻ Refresh Scores from ESPN</button></div>';
  h+='<div class="adm-sec-label">Games &amp; Results</div>';
  var gs=activeGames(day);
  if(!gs.length)h+='<div class="lb-note">No games yet — import above.</div>';
  gs.forEach(function(gid){
    var g=ST.games[day][gid]||{},r=(ST.results[day]||{})[gid]||{},ph=gamePhase(day,gid),isT=phaseIsTourney(ph);
    h+='<div class="adm-game'+(isT?" tourney":"")+'">';
    h+='<div class="adm-game-title"><span>Game '+gid.replace("g","")+'</span>'+
       '<span class="phase-chip '+(ph==="league"?"":isT?"on-t":"on-l")+'" data-phase="'+gid+'">'+x(phaseLabel(ph))+' · '+phasePoints(ph)+'×</span></div>';
    h+='<div class="adm-row"><input class="adm-input" data-g="'+gid+'" data-f="away" placeholder="Away" value="'+x(g.away||"")+'"><input class="adm-input sc" data-r="'+gid+'" data-w="aScore" placeholder="—" value="'+x(r.aScore!=null?r.aScore:"")+'"></div>';
    h+='<div class="adm-row"><input class="adm-input" data-g="'+gid+'" data-f="home" placeholder="Home" value="'+x(g.home||"")+'"><input class="adm-input sc" data-r="'+gid+'" data-w="hScore" placeholder="—" value="'+x(r.hScore!=null?r.hScore:"")+'"></div>';
    h+='<div class="adm-row"><input class="adm-input" data-g="'+gid+'" data-f="tip" placeholder="Tip" value="'+x(g.tip||"")+'"><input class="adm-input" data-g="'+gid+'" data-f="court" placeholder="Court" value="'+x(g.court||"")+'"></div>';
    var w=gameWinner(day,gid);
    h+='<div class="adm-btns"><button class="adm-btn clr" data-clr="'+gid+'">Remove</button>';
    if(w)h+='<span style="font-size:9px;font-weight:800;color:var(--green);align-self:center">✓ '+x(g[w]||w)+'</span>';
    h+='</div></div>';
  });
  h+='<div class="adm-sec-label">Group</div>';
  if(GROUP_ID)h+='<div style="margin:0 10px"><button class="adm-btn '+(ST.groupPublic?"sel-p":"")+'" data-pub="'+(ST.groupPublic?"0":"1")+'">'+(ST.groupPublic?"Public view: ON":"Enable public view")+'</button></div>';
  else h+='<div class="adm-note">No group loaded — standalone mode.</div>';
  return h+'</div>';
}
function importBox(){
  var h='<div class="imp-box">';
  h+='<div class="imp-date-row"><input class="imp-date" type="date" id="imp-date" value="'+x(ST.importDate)+'"><button class="adm-btn btn-blue" id="imp-fetch">Load Games</button></div>';
  if(ST.importLoading)h+='<div style="text-align:center;padding:12px;font-size:11px;color:var(--muted);font-weight:700">Loading from ESPN…</div>';
  if(ST.importError)h+='<div style="text-align:center;padding:8px;font-size:10px;color:var(--red2);font-weight:800">'+x(ST.importError)+'</div>';
  if(ST.importGames.length){
    ST.importGames.forEach(function(g,i){
      var isT=phaseIsTourney(g.phase);
      h+='<label class="imp-game"><input type="checkbox" data-imp="'+i+'"'+(ST.importSelected[i]?" checked":"")+'>';
      h+='<span class="imp-teams">'+x(g.away)+' @ '+x(g.home)+(isT?'<span class="imp-tourney-tag">'+x(phaseLabel(g.phase))+'</span>':'')+
         '<div class="imp-meta">'+x(g.tip)+(g.court?" · "+x(g.court):"")+(g.aScore!==""?" · "+x(g.aScore)+"-"+x(g.hScore):"")+'</div></span></label>';
    });
    h+='<button class="adm-btn btn-green" id="imp-add" style="width:100%;margin-top:8px;padding:9px">Add Selected Games</button>';
  }
  return h+'</div>';
}
function bindAdmin(){
  var q=function(s){return document.querySelector(s);};
  var rd=q("[data-renameday]");if(rd)rd.onclick=function(){renameDay(ST.curDay);};
  var lk=q("[data-lock]");if(lk)lk.onclick=function(){toggleLock(ST.curDay);};
  var dd=q("[data-delday]");if(dd)dd.onclick=function(){deleteDay(ST.curDay);};
  var pb=q("[data-pub]");if(pb)pb.onclick=function(){setPublic(pb.getAttribute("data-pub")==="1");};
  var rf=q("[data-refresh]");if(rf)rf.onclick=refreshScores;
  var idate=q("#imp-date");if(idate)idate.onchange=function(){ST.importDate=idate.value;};
  var ifetch=q("#imp-fetch");if(ifetch)ifetch.onclick=function(){var dv=q("#imp-date");if(dv)ST.importDate=dv.value;fetchEspn(ST.importDate);};
  var iadd=q("#imp-add");if(iadd)iadd.onclick=addImportedGames;
  document.querySelectorAll("[data-imp]").forEach(function(cb){cb.onchange=function(){var i=cb.getAttribute("data-imp");if(cb.checked)ST.importSelected[i]=true;else delete ST.importSelected[i];};});
  document.querySelectorAll("[data-phase]").forEach(function(el){el.onclick=function(){cyclePhase(el.getAttribute("data-phase"));};});
  document.querySelectorAll("[data-clr]").forEach(function(el){el.onclick=function(){clearGame(el.getAttribute("data-clr"));};});
  document.querySelectorAll("[data-g]").forEach(function(inp){inp.onchange=function(){saveGameField(inp.getAttribute("data-g"),inp.getAttribute("data-f"),inp.value.trim());draw();};});
  document.querySelectorAll("[data-r]").forEach(function(inp){inp.onchange=function(){setScore(inp.getAttribute("data-r"),inp.getAttribute("data-w"),inp.value.trim());draw();};});
}

loadData();
draw();
// Re-render every 30s so games auto-lock at their tip-off time
setInterval(function(){ if(!PUBLIC_VIEW&&ST.user&&ST.page==="picks") draw(); else if(ST.page==="standings") draw(); },30000);
</script>
</body>
</html>
