  el=document.getElementById("b-add-imported"); if(el) el.addEventListener("click",function(){addImportedGames(ST.curWeek);});

  // Long-press on import game labels to set as tiebreaker
  els=document.querySelectorAll("label[data-imp-label]");
  for(i=0;i<els.length;i++)(function(label){
    var _lpt=null;
    function startPress(){
      _lpt=setTimeout(function(){
        _lpt=null;
        var idx=parseInt(label.getAttribute("data-imp-label"));
        var g=ST.importGames[idx];
        if(!g) return;
        setTiebreakerField(ST.curWeek,"away",g.away);

        if(g.homeLogo) setTiebreakerField(ST.curWeek,"homeLogo",g.homeLogo);
        toast("&#128081; Tiebreaker set: "+g.away+" @ "+g.home);
        draw();
      },600);
    }
    function cancelPress(){ clearTimeout(_lpt); _lpt=null; }
    label.addEventListener("touchstart",startPress,{passive:true});
    label.addEventListener("touchend",cancelPress);
    label.addEventListener("touchmove",cancelPress);
    label.addEventListener("mousedown",startPress);
    label.addEventListener("mouseup",cancelPress);
    label.addEventListener("mouseleave",cancelPress);
  })(els[i]);

  els=document.querySelectorAll(".adm-input[data-field]");
  for(i=0;i<els.length;i++) els[i].addEventListener("change",function(){
    var v=this.value;
    if(this.getAttribute("data-field")==="spread") v=Math.abs(parseFloat(v))||0;

  els=document.querySelectorAll(".adm-btn[data-fav]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    setGameField(this.getAttribute("data-week"),this.getAttribute("data-gid"),"favSide",this.getAttribute("data-fav"));
    draw();

  els=document.querySelectorAll(".adm-btn[data-result]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    setResult(this.getAttribute("data-week"),this.getAttribute("data-gid"),this.getAttribute("data-result"));
  });
}

// ── CFB Rankings ──────────────────────────────────────────
var RANKINGS = {}; // normalized team name → {rank, source}

function normalizeTeamName(n){
  return String(n||"").toLowerCase().replace(/[^a-z0-9]/g,"");
}

function fetchTiebreakerResult(weekId){
  var tb=ST.tiebreaker[weekId]||{};
  if(!tb.away||!tb.home){toast("No tiebreaker game set");return;}
  var btn=document.getElementById("b-tb-fetch-result");
  if(btn){btn.textContent="Loading…";btn.disabled=true;}
  var year=ST.importYear||new Date().getFullYear();
  var week=ST.importWeek||guessWeekNumber(ST.weekLabels[weekId]);
  var url="https://site.api.espn.com/apis/site/v2/sports/football/college-football/scoreboard?year="+year+"&week="+week+"&seasontype=2&groups=80&limit=300";
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      var events=(data&&data.events)||[];
      var normAway=normalizeTeamName(tb.away), normHome=normalizeTeamName(tb.home);
      var found=null;
      events.forEach(function(ev){
        var comp=(ev.competitions||[])[0]||{};
        var comps=comp.competitors||[];
        var away=comps.find(function(c){return c.homeAway==="away";})||{};
        var home=comps.find(function(c){return c.homeAway==="home";})||{};
        var an=normalizeTeamName((away.team&&(away.team.shortDisplayName||away.team.displayName))||"");
        var hn=normalizeTeamName((home.team&&(home.team.shortDisplayName||home.team.displayName))||"");
        if((an===normAway||an.indexOf(normAway)>=0||normAway.indexOf(an)>=0)&&
           (hn===normHome||hn.indexOf(normHome)>=0||normHome.indexOf(hn)>=0)){
          var state=(comp.status&&comp.status.type&&comp.status.type.state)||"";
          if(state==="post"){
            var aScore=parseInt(away.score)||0;
            var hScore=parseInt(home.score)||0;
            found=aScore+hScore;
          }
        }
      });
      if(found!==null){
        setTiebreakerField(weekId,"actual",found);
        var inp=document.getElementById("tb-actual");
        if(inp) inp.value=found;
        toast("&#10003; Total: "+found+" pts");
        draw();
      } else {
        toast("Game not found or not final yet");
      }
      if(btn){btn.textContent="&#128202; Fetch";btn.disabled=false;}
    })
    .catch(function(){
      toast("Could not reach ESPN");
      if(btn){btn.textContent="&#128202; Fetch";btn.disabled=false;}
    });
}

function fetchRankings(){
  fetch("https://site.api.espn.com/apis/site/v2/sports/football/college-football/rankings")
    .then(function(r){return r.json();})
    .then(function(data){
      var polls=(data&&data.rankings)||[];
      // Priority: CFP first, then AP Top 25
      var cfp=null, ap=null;
      polls.forEach(function(p){
        var n=String(p.name||p.shortName||"");
        if(!cfp&&n.indexOf("CFP")>=0) cfp=p;
        if(!ap&&n.indexOf("AP")>=0) ap=p;
      });
      var poll=cfp||ap;
      if(!poll||!poll.ranks) return;
      var source=cfp?"CFP":"AP";
      var map={};
      poll.ranks.forEach(function(entry){
        var team=entry.team&&(entry.team.shortDisplayName||entry.team.displayName||entry.team.name);
        if(team) map[normalizeTeamName(team)]={rank:entry.current||entry.rank,source:source};
      });
      RANKINGS=map;
      if(ST.page==="group") draw();
    })
    .catch(function(){}); // silently fail — rankings are optional
}
fetchRankings();
