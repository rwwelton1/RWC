  h+='</div>';
  if(ST.showImport) h+=renderImportPanel(weekId);

  GAME_IDS.forEach(function(gid,idx){
    var g=(ST.games[weekId]||{})[gid]||{away:"",home:"",favSide:"home",spread:0,kickoff:""};
    h+='<div class="adm-game">';
    h+='<div class="adm-game-title">Game '+(idx+1)+'</div>';

    h+='<input class="adm-input" placeholder="Away team" value="'+x(g.away)+'" data-week="'+weekId+'" data-gid="'+gid+'" data-field="away">';

    h+='<div class="adm-row" style="margin-bottom:4px">';
    h+='<button class="adm-btn'+(g.favSide==="away"?" sel":"")+'" style="flex:1" data-week="'+weekId+'" data-gid="'+gid+'" data-fav="away">'+x(g.away||"Away")+'</button>';
    h+='<button class="adm-btn'+(g.favSide==="home"?" sel":"")+'" style="flex:1" data-week="'+weekId+'" data-gid="'+gid+'" data-fav="home">'+x(g.home||"Home")+'</button>';

    if(g.away&&g.home){
      var r=(ST.results[weekId]||{})[gid];

        _scData.events.forEach(function(ev){
          var comp=(ev.competitions||[])[0]||{};

          var ac=comps.find(function(c){return c.homeAway==="away";})||{};

      h+='</div>';
    }
    h+='</div>';
  });
  // Tiebreaker section
  var tb=ST.tiebreaker[weekId]||{};
  h+='<div class="adm-sec-label">Tiebreaker Game</div>';
  h+='<div class="adm-game">';
  h+='<div class="adm-game-title">Hold any game in the ESPN import list to set it as the tiebreaker</div>';
  if(tb.away&&tb.home){
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px;background:var(--purple-bg);border-radius:8px;border:1px solid var(--purple)">';
    if(tb.awayLogo) h+='<img src="'+tb.awayLogo+'" style="width:22px;height:22px;object-fit:contain" onerror="this.style.display=\'none\'">';
    h+='<span style="font-size:12px;font-weight:800">'+x(tb.away)+'</span>';
    h+='<span style="color:var(--muted);font-weight:700">@</span>';
    if(tb.homeLogo) h+='<img src="'+tb.homeLogo+'" style="width:22px;height:22px;object-fit:contain" onerror="this.style.display=\'none\'">';
    h+='<span style="font-size:12px;font-weight:800">'+x(tb.home)+'</span>';
    if(tb.actual!=null) h+='<span style="margin-left:auto;font-size:12px;font-weight:900;color:var(--purple)">'+tb.actual+' pts</span>';
    h+='</div>';
    h+='<div class="adm-row">';
    h+='<input class="adm-input" id="tb-actual" type="number" placeholder="Total points scored" value="'+(tb.actual!=null?tb.actual:"")+'" style="flex:1">';
    h+='<button class="adm-btn" id="b-tb-fetch-result" style="white-space:nowrap">&#128202; Fetch</button>';
    h+='<button class="adm-btn sel" id="b-tb-save">Save</button>';
    h+='</div>';
  } else {
    h+='<div style="font-size:10px;color:var(--muted);padding:8px 0">No tiebreaker set yet. Import games above and hold one to set it.</div>';
  }
  h+='</div>';

  h+='</div>';
  return h;
}
function renderGroupPicks(){
  var h='';
  if(ST.weekIds.length===0){
    h+='<div class="lb-note">No weeks set up yet.</div>';
    return h;
  }

  // Week selector — dropdown with Compare button
  var weekId=ST.curWeek||currentWeekId();
  var compareBtnHtml='<button class="gp-compare-btn'+(ST.compareMode?" active":"")+'" id="b-compare-toggle">'+(ST.compareMode?'&#10005; Clear':'&#9878; Compare')+'</button>';
  h+=weekDropdown(weekId, compareBtnHtml);
  if(ST.compareMode){
    var selCount=Object.keys(ST.compareSelected).length;
    var hintTxt=selCount===0?'Tap rows to select players':selCount+' selected';
    h+='<div class="gp-compare-hint">';
    h+='<span>'+hintTxt+'</span>';
    if(selCount>0){
      h+='<button class="gp-isolate-btn'+(ST.compareIsolated?' active':'')+'" id="b-isolate-toggle">'+(ST.compareIsolated?'Unisolate':'Isolate')+'</button>';
    }
    h+='</div>';
  }

  if(!weekId){ h+='<div class="lb-note">No week selected.</div>'; return h; }

  var games=ST.games[weekId]||{};
  var results=ST.results[weekId]||{};
  var locked=!!ST.locked[weekId];
  var active=activeGames(weekId);

  if(!active.length){
    h+='<div class="lb-note">No games set up for this week yet.</div>';
    return h;
  }

  // Sort players by week score descending (if locked), else season score
  var players=PARTS.slice();
  if(locked){
    players.sort(function(a,b){ return weekScore(weekId,b).total - weekScore(weekId,a).total; });
  }

  h+='<div class="gp-wrap"><table class="gp-table"><thead><tr>';

  // Sticky name column header — tappable to sort alpha
  h+='<th class="gp-name" data-sort-name="1" style="min-width:90px;cursor:pointer">Players</th>';

  // Sticky Pts column — second column
  h+='<th class="gp-pts-cell" data-sort-pts="1" style="min-width:58px;cursor:pointer;left:90px">Pts</th>';

  // Game columns
  active.forEach(function(gid){
    var g=games[gid]||{};
    var awayLogo=g.awayLogo||"";
    var homeLogo=g.homeLogo||"";
    var gameIsLocked=isGameLocked(weekId,gid);
    h+='<th data-sort-gid="'+gid+'">';
    h+='<div class="gp-game-head">';
    h+='<div class="gp-logos">';
    h+=awayLogo?'<img class="gp-logo" src="'+awayLogo+'" onerror="this.style.display=\'none\'">'
               :'<span class="gp-logo-fallback"></span>';
    h+='<span class="gp-vs">'+(gameIsLocked?'&#128274;':'@')+'</span>';
    h+=homeLogo?'<img class="gp-logo" src="'+homeLogo+'" onerror="this.style.display=\'none\'">'
               :'<span class="gp-logo-fallback"></span>';
    h+='</div>';
    // Spread line with optional rank badge next to favorite name
    var favName="", favSpread="", favRank=null;
    if(g.favSide==="even"||!g.spread){
      favSpread="PK";
    } else {
      favName=g.favSide==="away"?(g.away||""):(g.home||"");
      favRank=RANKINGS[normalizeTeamName(favName)]||null;
      favSpread=x(favName)+(favRank?'<span style="font-size:7px;font-weight:900;color:var(--gold-dark);background:var(--gold-bg);border:1px solid var(--gold);border-radius:3px;padding:0 2px;margin-left:2px;line-height:1.4;vertical-align:middle">#'+favRank.rank+'</span>':'')+' -'+g.spread;
    }
    h+='<div style="font-size:8px;color:var(--muted);font-weight:800;white-space:nowrap">'+favSpread+'</div>';
    h+='</div>';
    h+='</th>';
  });

  // Points column header already added as 2nd sticky column above
  h+='</tr></thead><tbody>';

  // Player rows
  players.forEach(function(player){
    var uk=ukey(player);
    var picks=((ST.picks[weekId]||{})[uk])||{};
    var ws=weekScore(weekId,player);

    // Points still possible = sum of conf values on pending (unresolved) picks
    var stillPossible=0;
    active.forEach(function(gid){
      var p=picks[gid]||{};
      var r=results[gid];
      if(p.side&&p.conf&&!r) stillPossible+=Number(p.conf);
    });

    var isMe=ST.user&&player===ST.user;
    var isSelected=ST.compareMode&&ST.compareSelected[ukey(player)];
    var hasSelection=ST.compareMode&&Object.keys(ST.compareSelected).length>0;
    var isDimmed=ST.compareMode&&hasSelection&&!isSelected;
    var isHidden=ST.compareMode&&ST.compareIsolated&&hasSelection&&!isSelected;
    var rowCls=(ST.compareMode?"gp-row-selectable":"")+(isSelected?" gp-row-selected":isDimmed?" gp-row-dimmed":"")+(isHidden?" gp-row-hidden":"");
    var confAttrs='data-pts="'+stillPossible+'" data-pts-earned="'+ws.total+'"';
    active.forEach(function(gid){ var p=picks[gid]||{}; confAttrs+=' data-conf-'+gid+'="'+(Number(p.conf)||0)+'"'; });
    h+='<tr class="'+rowCls+'" '+confAttrs+' data-compare-player="'+x(ukey(player))+'"'+(isMe&&!isSelected?' style="background:var(--gold-bg)"':'')+'>'; 

    // Compute streak — consecutive correct picks across all resolved games (most recent first)
    var streak=0;
    var allResolved=[];
    ST.weekIds.forEach(function(w){
      var wGames=ST.games[w]||{};
      var wResults=ST.results[w]||{};
      var wPicks=((ST.picks[w]||{})[uk])||{};
      GAME_IDS.forEach(function(gid){
        var g=wGames[gid];
        if(!g||!g.away||!g.home) return;
        var r=wResults[gid];
        if(!r||r==="push") return; // only resolved non-push games
        var p=wPicks[gid]||{};
        if(!p.side) return; // must have picked
        var ts=parseKickoffTs(g)||0;
        allResolved.push({ts:ts,correct:p.side===r});
      });
    });
    allResolved.sort(function(a,b){return b.ts-a.ts;}); // most recent first
    for(var si=0;si<allResolved.length;si++){
      if(allResolved[si].correct) streak++;
      else break;
    }
    var onFire=streak>=3;

    // Name cell
    var nameBg=isSelected?'var(--blue-bg)':isMe?'var(--gold-bg)':'';
    h+='<td class="gp-name"'+(nameBg?' style="background:'+nameBg+'"':'')+'>'+x(player)+(onFire?' <span style="font-size:11px">&#128293;</span>':'')+(isSelected?' <span style="font-size:9px;color:var(--blue)">&#10003;</span>':'')+'</td>';

    // Points cell — second column (sticky)
    h+='<td class="gp-pts-cell">';
    if(locked&&stillPossible===0){
      h+='<div class="gp-pts-earned">'+ws.total+'</div>';
    } else if(ws.total>0||stillPossible>0){
      h+='<div class="gp-pts-earned">'+ws.total+'</div>';
      if(stillPossible>0) h+='<div class="gp-pts-possible">Pts Poss: '+stillPossible+'</div>';
    } else {
      h+='<span class="gp-nopick">–</span>';
    }
    h+='</td>';

    // Pick cells
    active.forEach(function(gid){
      var g=games[gid]||{};
      var p=picks[gid]||{};
      var r=results[gid];
      var gameLocked=isGameLocked(weekId,gid);
      var isMyRow=ST.user&&player===ST.user;
      // Hide picks for other players until the game kicks off
      var showPick=isMyRow||gameLocked;
      h+='<td>';
      if(!p.side){
        h+='<span class="gp-nopick">'+(showPick?'&ndash;':'')+'</span>';
      } else if(!showPick){
        // Game not yet kicked off — hide other players' picks
        h+='';
      } else {
        var pickedLogo=p.side==="away"?(g.awayLogo||""):(g.homeLogo||"");
        var pickedName=p.side==="away"?(g.away||""):(g.home||"");
        var outcome="pending";
        if(r){
          if(r==="push") outcome="push";
          else if(r===p.side) outcome="correct";
          else outcome="wrong";
        }
        h+='<div class="gp-pick'+(outcome!=="pending"?" "+outcome:"")+'">';
        if(pickedLogo){
          h+='<img class="gp-pick-logo" src="'+pickedLogo+'" title="'+x(pickedName)+'" onerror="this.outerHTML=\'<div class=gp-logo-fallback></div>\'">';
        } else {
          h+='<div style="font-size:9px;font-weight:800;color:var(--muted);max-width:52px;overflow:hidden;text-overflow:ellipsis">'+x(pickedName)+'</div>';
        }
        h+='<div class="gp-pick-conf"'+(outcome==="correct"?' style="color:var(--green)"':outcome==="wrong"?' style="color:var(--red2)"':'')+'>'+( p.conf||'–')+'</div>';
        h+='</div>';
      }
      h+='</td>';
    });

    h+='</tr>';
  });

  h+='</tbody></table></div>';
  return h;
}

var _drawPending=false;
function scheduleDraw(){if(_drawPending)return;_drawPending=true;setTimeout(function(){_drawPending=false;draw();},0);}

function draw(){
  var h='';
  if(PUBLIC_VIEW)h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--blue-bg);border-bottom:2px solid var(--border);font-size:10px;font-weight:800;color:var(--blue)">&#128065; Public View &mdash; read only</div>';
  h+='<div class="topbar">';
  h+='<div class="topbar-left"><a href="index.html" style="display:flex;align-items:center;gap:3px;text-decoration:none;color:var(--muted);font-size:9px;font-weight:600;padding:4px 8px;border:1px solid var(--border);border-radius:6px;white-space:nowrap">&#8592; Hub</a></div>';
  h+='<div class="topbar-center"><div class="app-name"><span class="scorecery-logo">SCORECERY</span></div><div class="app-sub">College Football &middot; Confidence Pool'+(SEASON_YEAR?' &middot; '+SEASON_YEAR:'')+'</div></div>';
  h+='<div class="topbar-right">';
  if(ST.user){
    h+='<span class="tag">'+pem(ST.user)+x(ST.user)+'</span>';
    if(!URL_USER) h+='<button class="btn btn-ghost" id="b-switch">&#8646;</button>';
  }
  if(!PUBLIC_VIEW) h+='<button class="btn '+(ST.admin?"btn-gold":"btn-ghost")+'" id="b-admin">'+(ST.admin?"&#9889;":"&#9881;")+'</button>';
  h+='</div></div>';

  var tabs=[{id:"picks",lbl:"&#127944; Picks"},{id:"group",lbl:"&#128101; Group"},{id:"scores",lbl:"&#128308; Scores"},{id:"standings",lbl:"&#128202; Standings"}];
  // Missing picks badge — only show to the current user if THEY haven't finished, within 4h of kickoff
  if(ST.weekIds.length&&ST.user){
    var _cw=currentWeekId();
    if(_cw&&!ST.locked[_cw]){
      var _firstKick=getFirstKickoff(_cw);
      var _hoursToKick=_firstKick?(_firstKick-Date.now())/(1000*60*60):null;
      if(_firstKick&&_hoursToKick!==null&&_hoursToKick<=4&&_hoursToKick>0){
        var _active=activeGames(_cw);
        var _myPk=((ST.picks[_cw]||{})[ukey(ST.user)])||{};
        var _made=_active.filter(function(gid){return _myPk[gid]&&_myPk[gid].side;}).length;
        if(_made<_active.length){
          var _left=_active.length-_made;
          tabs[1].lbl='&#128101; Group <span style="background:var(--red2);color:#fff;border-radius:8px;font-size:8px;padding:1px 5px;margin-left:3px;vertical-align:middle">'+_left+'</span>';
        }
      }
    }
  }
  if(ST.admin&&!PUBLIC_VIEW) tabs.push({id:"admin",lbl:"&#9881; Admin"});
  h+='<div class="page-bar">';
  tabs.forEach(function(t){h+='<button class="ptab'+(ST.page===t.id?" active":"")+'" data-page="'+t.id+'">'+t.lbl+'</button>';});
  h+='</div>';

  if(!ST.user&&!ST.admin&&!PUBLIC_VIEW&&ST.page!=="scores"&&ST.page!=="group"){
    h+=userSelectScreen();
    document.getElementById("root").innerHTML=h;
    stopScoreRefresh();
    bind();return;
  }

  if(ST.page==="picks") h+=renderPicks();
  else if(ST.page==="group") h+=renderGroupPicks();
  else if(ST.page==="scores") h+='<div class="scores-wrap" id="scores-wrap"><div class="scores-loading">Loading scores&hellip;</div></div>';
  else if(ST.page==="standings") h+=renderStandings();
  else if(ST.page==="admin"&&ST.admin) h+=renderAdmin();
  else { ST.page="picks"; h+=renderPicks(); }

  document.getElementById("root").innerHTML=h;
  bind();
  if(ST.page==="scores"){
    if(_scData) renderScoresInto(); else startScoreRefresh();
  } else {
    stopScoreRefresh();
  }
  // Start countdown if on picks tab, week is unlocked, and we have kickoff data
  if(ST.page==="picks"&&ST.curWeek&&!ST.locked[ST.curWeek]&&document.getElementById("countdown-display")){
    startCountdown(ST.curWeek);
  } else {
    stopCountdown();
  }
}

// ── Bindings ─────────────────────────────────────────────
function bind(){
  var els,i,el;
  els=document.querySelectorAll(".ptab");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    ST.page=this.getAttribute("data-page");
    if(ST.page==="admin") fetchRankings();
    draw();
  });

  els=document.querySelectorAll(".user-btn");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    ST.user=this.getAttribute("data-user");
    ST.viewUser=null;
    try{ localStorage.setItem("cfb_user_"+(GROUP_ID||"g"),ST.user); }catch(e){}
    draw();
  });

  el=document.getElementById("week-dropdown"); if(el) el.addEventListener("change",function(){
    var prev=ST.curWeek;
    ST.curWeek=this.value;
    _picksSorted=false; _picksOriginalOrder=null;
    // Re-subscribe picks for new week if not already loaded
    if(ST.curWeek!==prev&&ST._subscribePicksForWeek){
      if(!ST.picks[ST.curWeek]) ST._subscribePicksForWeek(ST.curWeek);
    }
    draw();
  });

  // Dismiss onboarding tip
  el=document.getElementById("b-dismiss-tip"); if(el) el.addEventListener("click",function(){
    var _tipKey="cfb_tip_seen_"+(GROUP_ID||"g");
    try{ localStorage.setItem(_tipKey,"1"); }catch(e){}
    var banner=document.getElementById("cfb-tip-banner");
    if(banner) banner.style.display="none";
  });

  // Sort picks by confidence (desc) — toggle between sorted and original order
  var _picksSorted=false, _picksOriginalOrder=null;
  el=document.getElementById("b-sort-picks"); if(el) el.addEventListener("click",function(){
    var wrap=document.getElementById("games-wrap");
    if(!wrap) return;
    if(_picksSorted){
      // Restore original order
      if(_picksOriginalOrder){
        _picksOriginalOrder.forEach(function(c){ wrap.appendChild(c); });
      }
      _picksSorted=false;
      this.innerHTML="&#8645; Sort";
      this.style.color="var(--muted)";
    } else {
      // Save original order before sorting
      _picksOriginalOrder=Array.prototype.slice.call(wrap.children);
      var cards=_picksOriginalOrder.slice();
      cards.sort(function(a,b){
        var aGid=a.getAttribute("data-gid")||"";
        var bGid=b.getAttribute("data-gid")||"";
        if(!aGid){ var aq=a.querySelector("[data-pick-gid]"); if(aq) aGid=aq.getAttribute("data-pick-gid"); }
        if(!bGid){ var bq=b.querySelector("[data-pick-gid]"); if(bq) bGid=bq.getAttribute("data-pick-gid"); }
        var weekId=ST.curWeek||currentWeekId();
        var uk=ukey(ST.user);
        var ap=((ST.picks[weekId]||{})[uk]||{})[aGid]||{};
        var bp=((ST.picks[weekId]||{})[uk]||{})[bGid]||{};
        var aConf=Number(ap.conf)||0, bConf=Number(bp.conf)||0;
        var aPicked=!!ap.side, bPicked=!!bp.side;
        if(!aPicked&&bPicked) return -1;
        if(aPicked&&!bPicked) return 1;
        return bConf-aConf;
      });
      cards.forEach(function(c){ wrap.appendChild(c); });
      _picksSorted=true;
      this.innerHTML="&#8645; Unsort";
      this.style.color="var(--green)";
    }
  });

  // Undo pick
  el=document.getElementById("undo-pick-btn"); if(el) el.addEventListener("click",function(){
    if(!_undoPick) return;
    clearTimeout(_undoTimer); _undoTimer=null;
    var u=_undoPick; _undoPick=null;
    if(!ST.picks[u.weekId]) ST.picks[u.weekId]={};
    if(!ST.picks[u.weekId][u.uk]) ST.picks[u.weekId][u.uk]={};
    var restored=ST.picks[u.weekId][u.uk][u.gid]||{};
    if(u.prevSide) restored.side=u.prevSide; else delete restored.side;
    ST.picks[u.weekId][u.uk][u.gid]=restored;
    _savePickCache(u.weekId, u.uk, restored);
    document.getElementById("toast").classList.remove("show");
    _updatePickDom(u.weekId, u.gid, restored.side||null);
    var _wrap=document.querySelector('.unpicked-wrap[data-gid="'+u.gid+'"]');
    if(_wrap) _wrap.style.borderLeftColor=restored.side?"transparent":"var(--border2)";
    _updateProgressBar(u.weekId);
    if(DB) DB.ref(BASE+"/picks/"+u.weekId+"/"+u.uk+"/"+u.gid).set(restored);
  });
  el=document.getElementById("b-switch2"); if(el) el.addEventListener("click",function(){
    ST.user=null; ST.viewUser=null;
    try{ localStorage.removeItem("cfb_user_"+(GROUP_ID||"g")); }catch(e){}
    draw();
  });
  el=document.getElementById("b-share-picks"); if(el) el.addEventListener("click",function(){ shareMyPicks(ST.curWeek||currentWeekId()); });
  el=document.getElementById("b-reset-conf"); if(el) el.addEventListener("click",function(){ if(confirm("Clear all confidence values for this week?")) resetAllConf(ST.curWeek); });

  // Tiebreaker guess input (picks tab)
  el=document.getElementById("tb-guess-input"); if(el) el.addEventListener("change",function(){
    setTiebreakerGuess(ST.curWeek, this.value);
  });

  // Tiebreaker admin
  el=document.getElementById("b-tb-fetch-result"); if(el) el.addEventListener("click",function(){ fetchTiebreakerResult(ST.curWeek); });
  el=document.getElementById("b-tb-save"); if(el) el.addEventListener("click",function(){
    var act=document.getElementById("tb-actual");
    if(act) setTiebreakerField(ST.curWeek,"actual",act.value!==''?Number(act.value):null);
    toast("&#10003; Tiebreaker saved");
    draw();
  });

  // Compare mode toggle
  el=document.getElementById("b-compare-toggle"); if(el) el.addEventListener("click",function(){
    ST.compareMode=!ST.compareMode;
    ST.compareSelected={};
    ST.compareIsolated=false;
    draw();
  });

  // Isolate/Unisolate toggle
  el=document.getElementById("b-isolate-toggle"); if(el) el.addEventListener("click",function(){
    ST.compareIsolated=!ST.compareIsolated;
    // Update row visibility instantly
    var allRows=document.querySelectorAll("tr[data-compare-player]");
    var hasSelection=Object.keys(ST.compareSelected).length>0;
    for(var j=0;j<allRows.length;j++){
      var rp=allRows[j].getAttribute("data-compare-player");
      var rSel=!!ST.compareSelected[rp];
      if(ST.compareIsolated&&hasSelection&&!rSel){
        allRows[j].classList.add("gp-row-hidden");
      } else {
        allRows[j].classList.remove("gp-row-hidden");
      }
    }
    this.textContent=ST.compareIsolated?'Unisolate':'Isolate';this.classList.toggle('active',ST.compareIsolated);
  });

  // Compare row tap — toggle selection without full redraw for instant feel
  els=document.querySelectorAll("tr[data-compare-player]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(e){
    if(!ST.compareMode) return;
    var pk=this.getAttribute("data-compare-player");
    if(ST.compareSelected[pk]) delete ST.compareSelected[pk];
    else ST.compareSelected[pk]=true;
    // Update all rows instantly without full redraw
    var allRows=document.querySelectorAll("tr[data-compare-player]");
    var hasSelection=Object.keys(ST.compareSelected).length>0;
    for(var j=0;j<allRows.length;j++){
      var rp=allRows[j].getAttribute("data-compare-player");
      var rSel=!!ST.compareSelected[rp];
      allRows[j].classList.remove("gp-row-selected","gp-row-dimmed");
      if(rSel) allRows[j].classList.add("gp-row-selected");
      else if(hasSelection) allRows[j].classList.add("gp-row-dimmed");
      // Update checkmark in name cell
      var nameCell=allRows[j].querySelector(".gp-name");
      if(nameCell){
        nameCell.style.background=rSel?"var(--blue-bg)":"";
        var tick=nameCell.querySelector(".gp-sel-tick");
        if(rSel&&!tick){
          var s=document.createElement("span");
          s.className="gp-sel-tick";
          s.style.cssText="font-size:9px;color:var(--blue)";
          s.textContent=" ✓";
          nameCell.appendChild(s);
        } else if(!rSel&&tick){
          tick.remove();
        }
      }
    }
    // Update hint text
    var hint=document.querySelector(".gp-compare-hint span");
    if(hint){
      var sc=Object.keys(ST.compareSelected).length;
      hint.textContent=sc===0?"Tap rows to select players":sc+" selected";
    }
    // Show/hide isolate button
    var isoBtn=document.getElementById("b-isolate-toggle");
    var sc2=Object.keys(ST.compareSelected).length;
    if(sc2>0&&!isoBtn){
      var hintEl=document.querySelector(".gp-compare-hint");
      if(hintEl){
        var nb=document.createElement("button");
        nb.id="b-isolate-toggle"; nb.className="gp-isolate-btn";
        nb.textContent=ST.compareIsolated?"Unisolate":"Isolate";nb.classList.toggle("active",ST.compareIsolated);
        hintEl.appendChild(nb);
        nb.addEventListener("click",function(){
          ST.compareIsolated=!ST.compareIsolated;
          var ar=document.querySelectorAll("tr[data-compare-player]");
          var hs=Object.keys(ST.compareSelected).length>0;
          for(var k=0;k<ar.length;k++){
            var rp2=ar[k].getAttribute("data-compare-player");
            var rs2=!!ST.compareSelected[rp2];
            if(ST.compareIsolated&&hs&&!rs2) ar[k].classList.add("gp-row-hidden");
            else ar[k].classList.remove("gp-row-hidden");
          }
          this.textContent=ST.compareIsolated?"Unisolate":"Isolate";this.classList.toggle("active",ST.compareIsolated);
        });
      }
    } else if(sc2===0&&isoBtn){
      isoBtn.remove();
      ST.compareIsolated=false;
    }
  });

  // ── Column sort (game confidence + pts) ─────────────────
  var _gpSortState={col:null,dir:1}; // dir: 1=desc, -1=asc
  function gpSortRows(attr,numeric){
    var tbody=document.querySelector(".gp-table tbody");
    if(!tbody) return;
    var rows=Array.prototype.slice.call(tbody.querySelectorAll("tr[data-compare-player]"));
    if(_gpSortState.col===attr){ _gpSortState.dir*=-1; }
    else{ _gpSortState.col=attr; _gpSortState.dir=1; }
    rows.sort(function(a,b){
      var av=numeric?Number(a.getAttribute(attr)||0):a.getAttribute(attr)||"";
      var bv=numeric?Number(b.getAttribute(attr)||0):b.getAttribute(attr)||"";
      return (av>bv?-1:av<bv?1:0)*_gpSortState.dir;
    });
    rows.forEach(function(r){ tbody.appendChild(r); });
  }
  els=document.querySelectorAll("th[data-sort-gid]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    gpSortRows("data-conf-"+this.getAttribute("data-sort-gid"),true);
  });
  el=document.querySelector("th[data-sort-name]");
  if(el) el.addEventListener("click",function(){
    var tbody=document.querySelector(".gp-table tbody");
    if(!tbody) return;
    var rows=Array.prototype.slice.call(tbody.querySelectorAll("tr[data-compare-player]"));
    if(_gpSortState.col==="name"){ _gpSortState.dir*=-1; }
    else{ _gpSortState.col="name"; _gpSortState.dir=1; }
    rows.sort(function(a,b){
      var an=a.getAttribute("data-compare-player")||"";
      var bn=b.getAttribute("data-compare-player")||"";
      return an.localeCompare(bn)*_gpSortState.dir;
    });
    rows.forEach(function(r){ tbody.appendChild(r); });
  });

  // Standings table sorts
  var stTbody=document.querySelector(".gp-table tbody");
  var _stSortState={col:null,dir:1};
  function stSortRows(attr){
    if(!stTbody) return;
    var rows=Array.prototype.slice.call(stTbody.querySelectorAll("tr[data-st-player]"));
    if(_stSortState.col===attr){ _stSortState.dir*=-1; } else { _stSortState.col=attr; _stSortState.dir=1; }
    rows.sort(function(a,b){
      var av=Number(a.getAttribute(attr)||0), bv=Number(b.getAttribute(attr)||0);
      return (av>bv?-1:av<bv?1:0)*_stSortState.dir;
    });
    rows.forEach(function(r){ stTbody.appendChild(r); });
  }
  el=document.getElementById("b-toggle-history"); if(el) el.addEventListener("click",function(){
    ST._standingsShowHistory=!ST._standingsShowHistory; draw();
  });
  el=document.querySelector("th[data-sort-possible]");
  if(el) el.addEventListener("click",function(){ stSortRows("data-possible"); });
  els=document.querySelectorAll("th[data-sort-week]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    stSortRows("data-week-"+this.getAttribute("data-sort-week"));
  });
  // Name sort for standings
  el=document.querySelector(".gp-table th[data-sort-name]");
  if(el&&stTbody) el.addEventListener("click",function(){
    var rows=Array.prototype.slice.call(stTbody.querySelectorAll("tr[data-st-player]"));
    if(_stSortState.col==="name"){ _stSortState.dir*=-1; } else { _stSortState.col="name"; _stSortState.dir=1; }
    rows.sort(function(a,b){
      var an=a.getAttribute("data-name")||"", bn=b.getAttribute("data-name")||"";
      return an.localeCompare(bn)*_stSortState.dir;
    });
    rows.forEach(function(r){ stTbody.appendChild(r); });
  });
  el=document.querySelector("th[data-sort-pts]");
  if(el) el.addEventListener("click",function(){
    // Sort by total possible (earned + possible), then by possible alone
    var tbody=document.querySelector(".gp-table tbody");
    if(!tbody) return;
    var rows=Array.prototype.slice.call(tbody.querySelectorAll("tr[data-compare-player]"));
    if(_gpSortState.col==="pts"){ _gpSortState.dir*=-1; }
    else{ _gpSortState.col="pts"; _gpSortState.dir=1; }
    rows.sort(function(a,b){
      var ae=Number(a.getAttribute("data-pts-earned")||0)+Number(a.getAttribute("data-pts")||0);
      var be=Number(b.getAttribute("data-pts-earned")||0)+Number(b.getAttribute("data-pts")||0);
      return (ae>be?-1:ae<be?1:0)*_gpSortState.dir;
    });
    rows.forEach(function(r){ tbody.appendChild(r); });
  });

  el=document.getElementById("b-admin"); if(el) el.addEventListener("click",function(){
    if(ST.admin){ST.admin=false;if(ST.page==="admin")ST.page="picks";draw();return;}
    var pw=prompt("Admin password:"); if(pw===null)return;
    if(pw===MASTER_PW||(GROUP_ADMIN_PW&&pw===GROUP_ADMIN_PW)){
      ST.admin=true;ST.page="admin";draw();toast("&#9889; Admin mode on");
    } else {
      toast("Wrong password");
    }
  });

  els=document.querySelectorAll(".team-pick.clickable");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    setPickSide(this.getAttribute("data-pick-week"),this.getAttribute("data-pick-gid"),this.getAttribute("data-pick-side"));
  });

  els=document.querySelectorAll(".conf-chip[data-conf-val]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var wk=this.getAttribute("data-conf-week");
    var gi=this.getAttribute("data-conf-gid");
    var val=this.getAttribute("data-conf-val");
    var cur=(((ST.picks[wk]||{})[ukey(ST.user)]||{})[gi]||{}).conf;
    setConf(wk,gi,Number(cur)===Number(val)?null:val);
  });

  els=document.querySelectorAll(".plyr-acc-head[data-acc]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var acc=document.getElementById("acc-"+this.getAttribute("data-acc"));
    if(acc) acc.classList.toggle("open");
  });

  el=document.getElementById("b-setup-season"); if(el) el.addEventListener("click",function(){
    var y=parseInt((document.getElementById("setup-season-year")||{}).value)||new Date().getFullYear();
    setupSeason(y);
  });
  el=document.getElementById("b-addweek"); if(el) el.addEventListener("click",addWeek);
  el=document.getElementById("b-delweek"); if(el) el.addEventListener("click",function(){removeWeek(ST.curWeek);});
  el=document.getElementById("b-lockweek"); if(el) el.addEventListener("click",function(){toggleLock(ST.curWeek);});
  el=document.getElementById("b-pub-on"); if(el) el.addEventListener("click",function(){ setGroupPublic(true); });
  el=document.getElementById("b-pub-off"); if(el) el.addEventListener("click",function(){ setGroupPublic(false); });
  el=document.getElementById("b-change-pw"); if(el) el.addEventListener("click",function(){
    var inp=document.getElementById("new-group-pw");
    var newPw=inp?inp.value.trim():"";
    if(!newPw){toast("Enter a new password");return;}
    if(!DB||!GROUP_ID){toast("Not connected");return;}
    DB.ref("groups/"+GROUP_ID+"/adminPw").set(newPw,function(err){

      toast("&#10003; Pool password updated");
    });
  });

  el=document.getElementById("b-rename-week"); if(el) el.addEventListener("click",function(){
    var inp=document.getElementById("rename-week-input");
    var v=inp?inp.value.trim():"";
    if(v&&v!==(ST.weekLabels[ST.curWeek]||ST.curWeek)) renameWeek(ST.curWeek, v);
  });
  el=document.getElementById("b-fetch-all-results"); if(el) el.addEventListener("click",function(){ fetchAllResults(ST.curWeek); });
  el=document.getElementById("b-copy-week"); if(el) el.addEventListener("change",function(){ if(this.value) copyWeekGames(this.value, ST.curWeek); this.value=""; });
  el=document.getElementById("b-import-toggle"); if(el) el.addEventListener("click",function(){
    ST.showImport=!ST.showImport; draw();
  });
  el=document.getElementById("imp-year"); if(el) el.addEventListener("change",function(){ST.importYear=parseInt(this.value)||new Date().getFullYear();});
  el=document.getElementById("imp-week-sel"); if(el) el.addEventListener("change",function(){
    var def=SEASON_WEEK_DEFS[parseInt(this.value)];
    if(def){ ST.importWeek=def.espnWeek; ST.importSeasontype=def.seasontype; }
  });
  el=document.getElementById("b-imp-top25"); if(el) el.addEventListener("click",function(){ ST.importTop25=!ST.importTop25; draw(); });
  els=document.querySelectorAll(".imp-conf-pill[data-conf]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var v=this.getAttribute("data-conf");
    ST.importConf=(ST.importConf===v)?null:v;
    draw();
  });
  el=document.getElementById("b-fetch-espn"); if(el) el.addEventListener("click",function(){
    var yEl=document.getElementById("imp-year");
    var wIdx=parseInt((document.getElementById("imp-week-sel")||{}).value)||0;
    var def=SEASON_WEEK_DEFS[wIdx]||SEASON_WEEK_DEFS[0];
    ST.importYear=parseInt((yEl&&yEl.value))||new Date().getFullYear();
    ST.importWeek=def.espnWeek;
    ST.importSeasontype=def.seasontype;
    // Save ESPN meta to this week so fetchAllResults always works
    if(ST.curWeek&&DB){
      if(!ST._weekMeta) ST._weekMeta={};
      ST._weekMeta[ST.curWeek]={espnWeek:def.espnWeek, espnYear:ST.importYear, seasontype:def.seasontype};
      DB.ref(BASE+"/meta/weekMeta/"+ST.curWeek).set(ST._weekMeta[ST.curWeek]);
    }
    fetchEspnSchedule(ST.importYear, ST.importWeek, def.seasontype);
  });
  els=document.querySelectorAll("[data-imp-idx]");
  for(i=0;i<els.length;i++) els[i].addEventListener("change",function(){
    var idx=this.getAttribute("data-imp-idx");
    if(this.checked) ST.importSelected[idx]=true; else delete ST.importSelected[idx];
    draw();
    if(Object.keys(ST.importSelected).length===10){
      var btn=document.getElementById("b-add-imported");
      if(btn) btn.scrollIntoView({behavior:"smooth",block:"center"});
    }
  });
  el=document.getElementById("b-add-imported"); if(el) el.addEventListener("click",function(){addImportedGames(ST.curWeek);});

  // Long-press on import game labels to set as tiebreaker
  els=document.querySelectorAll("label[data-imp-label]");
  for(i=0;i<els.length;i++)(function(label){
    var _lpt=null;
    function startPress(){
      _lpt=setTimeout(function(){
        _lpt=null;
        var idx=parseInt(label.getAttribute("data-imp-label"));
        var g=ST.importGames[idx];
        if(!g) return;
        setTiebreakerField(ST.curWeek,"away",g.away);
        setTiebreakerField(ST.curWeek,"home",g.home);
        if(g.awayLogo) setTiebreakerField(ST.curWeek,"awayLogo",g.awayLogo);
        if(g.homeLogo) setTiebreakerField(ST.curWeek,"homeLogo",g.homeLogo);
        toast("&#128081; Tiebreaker set: "+g.away+" @ "+g.home);
        draw();
      },600);
    }
    function cancelPress(){ clearTimeout(_lpt); _lpt=null; }
    label.addEventListener("touchstart",startPress,{passive:true});
    label.addEventListener("touchend",cancelPress);
    label.addEventListener("touchmove",cancelPress);
    label.addEventListener("mousedown",startPress);
    label.addEventListener("mouseup",cancelPress);
    label.addEventListener("mouseleave",cancelPress);
  })(els[i]);

var _fieldDebounce={};
  els=document.querySelectorAll(".adm-input[data-field]");
  for(i=0;i<els.length;i++) els[i].addEventListener("input",function(){
    var el=this;
    var key=el.getAttribute("data-week")+"_"+el.getAttribute("data-gid")+"_"+el.getAttribute("data-field");
    clearTimeout(_fieldDebounce[key]);
    _fieldDebounce[key]=setTimeout(function(){
      var v=el.value;
      if(el.getAttribute("data-field")==="spread") v=Math.abs(parseFloat(v))||0;
      setGameField(el.getAttribute("data-week"),el.getAttribute("data-gid"),el.getAttribute("data-field"),v);
    },800);
  });
  // Keep change handler for blur/enter confirmation
  for(i=0;i<els.length;i++) els[i].addEventListener("change",function(){
    var key=this.getAttribute("data-week")+"_"+this.getAttribute("data-gid")+"_"+this.getAttribute("data-field");
    clearTimeout(_fieldDebounce[key]);
    var v=this.value;
    if(this.getAttribute("data-field")==="spread") v=Math.abs(parseFloat(v))||0;
    setGameField(this.getAttribute("data-week"),this.getAttribute("data-gid"),this.getAttribute("data-field"),v);
  });

  els=document.querySelectorAll(".adm-btn[data-fav]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    setGameField(this.getAttribute("data-week"),this.getAttribute("data-gid"),"favSide",this.getAttribute("data-fav"));
    draw();
  });

  els=document.querySelectorAll(".adm-btn[data-result]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    setResult(this.getAttribute("data-week"),this.getAttribute("data-gid"),this.getAttribute("data-result"));
  });
}

loadData();

// ── CFB Rankings ──────────────────────────────────────────
var RANKINGS = {}; // normalized team name → {rank, source}

function normalizeTeamName(n){
  return String(n||"").toLowerCase().replace(/[^a-z0-9]/g,"");
}

function fetchTiebreakerResult(weekId){
  var tb=ST.tiebreaker[weekId]||{};
  if(!tb.away||!tb.home){toast("No tiebreaker game set");return;}
  var btn=document.getElementById("b-tb-fetch-result");
  if(btn){btn.textContent="Loading…";btn.disabled=true;}
  // Derive year/week from week label, fall back to import state or current year
  var weekLabel=ST.weekLabels[weekId]||"";
  var year=SEASON_YEAR||ST.importYear||new Date().getFullYear();
  var week=guessWeekNumber(weekLabel)||ST.importWeek||1;
  var url="https://site.api.espn.com/apis/site/v2/sports/football/college-football/scoreboard?year="+year+"&week="+week+"&seasontype=2&groups=80&limit=300";
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      var events=(data&&data.events)||[];
      var normAway=normalizeTeamName(tb.away), normHome=normalizeTeamName(tb.home);
      var found=null;
      events.forEach(function(ev){
        var comp=(ev.competitions||[])[0]||{};
        var comps=comp.competitors||[];
        var away=comps.find(function(c){return c.homeAway==="away";})||{};
        var home=comps.find(function(c){return c.homeAway==="home";})||{};
        var an=normalizeTeamName((away.team&&(away.team.shortDisplayName||away.team.displayName))||"");
        var hn=normalizeTeamName((home.team&&(home.team.shortDisplayName||home.team.displayName))||"");
        if((an===normAway||an.indexOf(normAway)>=0||normAway.indexOf(an)>=0)&&
           (hn===normHome||hn.indexOf(normHome)>=0||normHome.indexOf(hn)>=0)){
          var state=(comp.status&&comp.status.type&&comp.status.type.state)||"";
          if(state==="post"){
            var aScore=parseInt(away.score)||0;
            var hScore=parseInt(home.score)||0;
            found=aScore+hScore;
          }
        }
      });
      if(found!==null){
        setTiebreakerField(weekId,"actual",found);
        var inp=document.getElementById("tb-actual");
        if(inp) inp.value=found;
        toast("&#10003; Total: "+found+" pts");
        draw();
      } else {
        toast("Game not found or not final yet");
      }
      if(btn){btn.textContent="&#128202; Fetch";btn.disabled=false;}
    })
    .catch(function(){
      toast("Could not reach ESPN");
      if(btn){btn.textContent="&#128202; Fetch";btn.disabled=false;}
    });
}

function fetchRankings(){
  fetch("https://site.api.espn.com/apis/site/v2/sports/football/college-football/rankings")
    .then(function(r){return r.json();})
    .then(function(data){
      var polls=(data&&data.rankings)||[];
      // Priority: CFP first, then AP Top 25
      var cfp=null, ap=null;
      polls.forEach(function(p){
        var n=String(p.name||p.shortName||"");
        if(!cfp&&n.indexOf("CFP")>=0) cfp=p;
        if(!ap&&n.indexOf("AP")>=0) ap=p;
      });
      var poll=cfp||ap;
      if(!poll||!poll.ranks) return;
      var source=cfp?"CFP":"AP";
      var map={};
      poll.ranks.forEach(function(entry){
        var team=entry.team&&(entry.team.shortDisplayName||entry.team.displayName||entry.team.name);
        if(team) map[normalizeTeamName(team)]={rank:entry.current||entry.rank,source:source};
      });
      RANKINGS=map;
      if(ST.page==="group") draw();
    })
    .catch(function(){}); // silently fail — rankings are optional
}
fetchRankings();
