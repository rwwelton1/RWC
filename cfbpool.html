<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – CFB Confidence Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#fdf8ee;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#c0392b;--red2:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none;touch-action:manipulation}

/* ── TOPBAR ── */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;overflow:hidden;text-align:center}
.app-name{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:7px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;display:block}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--text);box-shadow:2px 2px 0 var(--border)}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold-bg);color:var(--gold-dark)}
.btn-red{background:var(--red-bg);color:var(--red2)}
.btn-green{background:var(--green-bg);color:var(--green)}

/* ── SCORECERY logo ── */
.scorecery-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:inherit;color:#ffffff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111111;text-shadow:1px 1px 0 #111111,2px 2px 0 #111111,3px 3px 0 #111111,5px 5px 0 #4c1d95,7px 7px 0 #2e1158,8px 8px 0 #1a0a33;paint-order:stroke fill}

/* ── PAGE TABS ── */
.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;gap:0;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 12px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;flex:1;text-align:center}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── USER SELECT ── */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:150px;box-shadow:3px 3px 0 var(--border)}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}
.user-btn-sub{font-size:8px;font-weight:700;color:var(--muted);margin-top:3px}

/* ── WEEK BAR ── */
.week-bar{display:flex;gap:5px;padding:8px 10px;overflow-x:auto;border-bottom:2px solid var(--border2);background:var(--cream);flex-shrink:0}
.week-bar::-webkit-scrollbar{display:none}
.wtab{flex-shrink:0;padding:6px 13px;font-size:10px;font-weight:800;border:2px solid var(--border);background:#ffffff;color:var(--muted);border-radius:8px;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border);white-space:nowrap}
.wtab:active{transform:translate(2px,2px);box-shadow:none}
.wtab.active{background:var(--gold);color:var(--text)}
.wtab.add{background:var(--blue-bg);color:var(--blue)}
.wtab.danger{background:var(--red-bg);color:var(--red2)}
.wtab-select{flex-shrink:0;padding:6px 10px;font-size:10px;font-weight:800;border:2px solid var(--border);background:var(--blue-bg);color:var(--blue);border-radius:8px;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}

/* ── LOCK BAR ── */
.lock-bar{display:flex;align-items:center;gap:7px;padding:7px 12px;border-bottom:2px solid var(--border2);flex-wrap:wrap;background:var(--cream);flex-shrink:0}
.lock-info{font-size:10px;font-weight:800;color:var(--text)}
.lock-chips{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.lchip{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:1px 1px 0 var(--border);font-family:'Nunito',sans-serif;background:#ffffff;color:var(--muted)}
.lchip.done{background:var(--gold);color:var(--text)}

/* ── GAME CARDS ── */
.games-wrap{padding:10px}
.lb-note{font-size:11px;font-weight:700;color:var(--muted);line-height:1.8;background:#ffffff;border:2px solid var(--border2);border-radius:10px;padding:16px;margin:12px;text-align:center}
.game-card{background:#ffffff;border:2px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:4px 4px 0 var(--border)}
.gc-head{padding:6px 10px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:center;min-height:16px}
.gc-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.gc-pts{font-size:10px;font-weight:900;color:var(--red2)}
.gc-pts.earned{color:var(--green)}
.gc-pts.push{color:var(--blue)}

.team-pick{padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border2)}
.team-pick.clickable{cursor:pointer;-webkit-tap-highlight-color:transparent}
.team-pick.clickable:active{background:var(--cream)}
.team-pick.mypick{background:var(--gold-bg)}
.team-pick.mypick .tp-name{color:var(--gold-dark)}
.team-pick.winner{background:var(--green-bg)}
.team-pick.winner .tp-name{color:var(--green);font-weight:900}
.team-pick.loser{opacity:.45}
.team-pick.push{background:var(--blue-bg)}
.tp-name{font-size:13px;font-weight:800;color:var(--text)}
.tp-spread{font-size:11px;font-weight:800;color:var(--muted);flex-shrink:0;padding-left:8px}

.conf-row{padding:8px 12px;font-size:10px;font-weight:800;color:var(--muted);display:flex;align-items:center;gap:8px;background:var(--cream);text-transform:uppercase;letter-spacing:.05em}
.conf-select{border:2px solid var(--border);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;background:#ffffff;box-shadow:2px 2px 0 var(--border)}
.conf-select:disabled{opacity:.6}

/* ── STANDINGS ── */
.lb-wrap{padding:12px;min-height:50vh}
.lb-row{background:#ffffff;border:2px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;gap:9px;align-items:center;box-shadow:4px 4px 0 var(--border)}
.lb-row.first{background:var(--gold-bg)}
.lb-row.second{background:#fafafa}
.lb-row.third{background:#fff8f0}
.lb-medal{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;gap:5px}
.lb-name{font-size:13px;font-weight:900}
.lb-pts{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.lb-pts b{color:var(--text);font-weight:900;font-size:14px}

.adm-sec-label{font-size:9px;font-weight:900;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:14px 12px 8px;padding-bottom:5px;border-bottom:2px solid var(--border2)}
.adm-sec-label:first-of-type{margin-top:0}

.stand-table{border-collapse:collapse;font-size:10px;width:100%;background:#ffffff}
.stand-table th,.stand-table td{border:1px solid var(--border2);padding:6px 9px;text-align:center;white-space:nowrap}
.stand-table th{background:var(--cream);font-weight:900;text-transform:uppercase;font-size:8px;letter-spacing:.05em;color:var(--muted)}
.stand-table td:first-child,.stand-table th:first-child{text-align:left;font-weight:800}
.stand-table td b{color:var(--gold-dark)}

/* ── ADMIN ── */
.adm-wrap{padding:0 0 16px;min-height:50vh}
.adm-game{background:#ffffff;border:2px solid var(--border);border-radius:10px;padding:10px 12px;margin:0 10px 8px;box-shadow:3px 3px 0 var(--border)}
.adm-game-title{font-size:9px;font-weight:800;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.adm-row{display:flex;gap:6px;margin-bottom:6px}
.adm-input{flex:1;border:2px solid var(--border);border-radius:6px;padding:7px 8px;font-size:11px;font-weight:700;font-family:'Nunito',sans-serif;background:var(--cream);box-shadow:2px 2px 0 var(--border);min-width:0}
.adm-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.adm-btn{padding:5px 10px;border-radius:8px;font-size:9px;font-weight:800;border:2px solid var(--border);background:#ffffff;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.adm-btn:active{transform:translate(2px,2px);box-shadow:none}
.adm-btn.sel{background:var(--green-bg);border-color:var(--border);color:var(--green)}
.adm-btn.clr{background:var(--red-bg);color:var(--red2)}
.adm-head-row{display:flex;justify-content:space-between;align-items:center;gap:6px;margin:0 10px 10px;flex-wrap:wrap}
.adm-head-row .lb-name{font-size:12px;font-weight:900}

/* ── LIVE SCORES ── */
.scores-wrap{padding:10px;min-height:50vh}
.scores-date-header{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:4px 2px 8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.scores-refresh{font-size:9px;font-weight:800;cursor:pointer;padding:4px 11px;border:2px solid var(--border);border-radius:8px;background:#ffffff;color:var(--text);font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.scores-refresh:active{transform:translate(2px,2px);box-shadow:none}
.scores-section-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:10px 2px 5px;border-top:2px solid var(--border2);margin-top:4px}
.scores-section-label:first-child{border-top:none;margin-top:0;padding-top:0}
.scores-strip{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;margin-bottom:2px}
.scores-strip::-webkit-scrollbar{height:3px}
.scores-strip::-webkit-scrollbar-track{background:transparent}
.scores-strip::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.score-card{flex-shrink:0;background:#ffffff;border:2px solid var(--border);border-radius:10px;overflow:hidden;width:168px;box-shadow:3px 3px 0 var(--border)}
.score-card.live{border-color:var(--red2)}
.score-card.final{opacity:.78}
.sc-head{padding:4px 8px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:center;gap:4px}
.sc-status{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.05em}
.sc-status.live{color:var(--red2);animation:sc-pulse 1.4s ease-in-out infinite}
.sc-status.final{color:var(--blue)}
.sc-status.pre{color:var(--dim)}
@keyframes sc-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sc-detail{font-size:8px;font-weight:700;color:var(--dim);text-align:right;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-team{display:flex;align-items:center;gap:6px;padding:6px 8px;min-height:30px}
.sc-team:not(:last-child){border-bottom:1px solid var(--border2)}
.sc-team.winner .sc-name{color:var(--text);font-weight:900}
.sc-team.loser{opacity:.5}
.sc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--muted);border:1px solid var(--border2)}
.sc-name{font-size:11px;font-weight:800;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.sc-score{font-size:15px;font-weight:900;color:var(--text);flex-shrink:0;min-width:20px;text-align:right;line-height:1}
.sc-score.pre{font-size:9px;font-weight:700;color:var(--dim)}
.scores-empty{text-align:center;padding:40px 16px;color:var(--dim);font-size:11px;font-weight:700;line-height:2}
.scores-loading{text-align:center;padding:40px 16px;color:var(--dim);font-size:11px;font-weight:700}

/* ── CONFIDENCE CHIPS ── */
.conf-row{padding:7px 10px;display:flex;align-items:center;gap:6px;background:var(--cream);flex-wrap:wrap}
.conf-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;margin-right:2px}
.conf-chips{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1}
.conf-chips::-webkit-scrollbar{display:none}
.conf-chip{flex-shrink:0;width:28px;height:28px;border-radius:7px;border:2px solid var(--border2);background:#ffffff;color:var(--muted);font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s;box-shadow:1px 1px 0 var(--border2)}
.conf-chip:active{transform:translate(1px,1px);box-shadow:none}
.conf-chip.sel{background:var(--gold);color:var(--text);border-color:var(--border);box-shadow:2px 2px 0 var(--border)}
.conf-chip.used{background:var(--cream);color:var(--border2);border-color:var(--border2);box-shadow:none;cursor:not-allowed;opacity:.45}
/* ── SAVE FLASH ── */
@keyframes saveFlash{0%{opacity:0;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(1)}}
.save-tick{font-size:10px;font-weight:900;color:var(--green);animation:saveFlash .9s ease forwards;pointer-events:none}
/* ── PLAYER ACCORDION ── */
.plyr-accordion{background:#ffffff;border:2px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:4px 4px 0 var(--border)}
.plyr-acc-head{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.plyr-acc-head:active{background:var(--cream)}
.plyr-acc-body{display:none;border-top:2px solid var(--border2);padding:8px 12px 10px}
.plyr-accordion.open .plyr-acc-body{display:block}
.plyr-accordion.open .plyr-acc-arrow{transform:rotate(90deg)}
.plyr-acc-arrow{font-size:12px;color:var(--dim);transition:transform .2s;flex-shrink:0}
.week-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2);font-size:11px}
.week-row:last-child{border-bottom:none}
.week-row-label{font-weight:700;color:var(--muted)}
.week-row-score{font-weight:900;color:var(--text)}
.week-row-detail{font-size:9px;font-weight:700;color:var(--muted)}
/* ── COUNTDOWN BAR ── */
.countdown-bar{background:linear-gradient(135deg,#1a1200,#2d1f00);border-bottom:2px solid var(--border);padding:7px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.countdown-label{font-size:9px;font-weight:800;color:#b89a00;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.countdown-timer{font-size:15px;font-weight:900;color:#fbbf24;letter-spacing:.03em;flex:1;font-variant-numeric:tabular-nums}
.countdown-sub{font-size:9px;font-weight:700;color:#64748b;flex-shrink:0}
.countdown-bar.expired{background:#0d1a0d}
.countdown-bar.expired .countdown-label{color:#4a7c59}
.countdown-bar.expired .countdown-timer{color:#6ee7b7;font-size:12px}
</style>
</head>
<body>
<div id="root" style="display:flex;flex-direction:column;height:100%"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted)">Loading…</div></div>
<div id="toast"></div>

<script>
// =====================================================
// COLLEGE FOOTBALL CONFIDENCE POOL — AGAINST THE SPREAD
// =====================================================
var GROUP_ID=(function(){var m=location.search.match(/[?&]group=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var URL_USER=(function(){var m=location.search.match(/[?&]user=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var PUBLIC_VIEW=(function(){ return /[?&]public=1/.test(location.search); })();
var GROUP_ADMIN_PW=null;
var BASE=GROUP_ID?"groups/"+GROUP_ID+"/data/cfbpool":"cfbpool";
var MASTER_PW="Sloop"; // default, overwritten by Firebase on load

var PARTS=["Player1","Player2","Player3","Player4"];
var _EM={};

var GAME_IDS=[];
for(var _gi=1;_gi<=10;_gi++) GAME_IDS.push("g"+_gi);

var ST={
  page:(PUBLIC_VIEW?"standings":"picks"),
  user:URL_USER||null,
  viewUser:null,
  admin:false,
  weekIds:[],
  weekLabels:{},
  curWeek:null,
  _weekInit:false,
  games:{},
  results:{},
  picks:{},
  locked:{},
  showImport:false,
  importYear:null,
  importWeek:null,
  importGames:[],
  importSelected:{},
  importLoading:false,
  importError:""
};

var DB=null;
try{
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks",appId:"1:965978379243:web:35f9db9a664f9170e27fae"});
  DB=firebase.database();
}catch(e){}

function x(s){var t=String(s||"");t=t.replace(/&/g,"&amp;");t=t.replace(/</g,"&lt;");t=t.replace(/>/g,"&gt;");t=t.replace(/'/g,"&#39;");return t;}
var _tt;
function toast(m){var el=document.getElementById("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove("show");},2500);}
function ukey(n){return String(n||"").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,"");}
function pem(n){return _EM[n]?"<span style='margin-right:3px'>"+_EM[n]+"</span>":"";}

// ── Helpers ──────────────────────────────────────────────
function currentWeekId(){
  for(var i=0;i<ST.weekIds.length;i++){ if(!ST.locked[ST.weekIds[i]]) return ST.weekIds[i]; }
  return ST.weekIds.length?ST.weekIds[ST.weekIds.length-1]:null;
}
function activeGames(weekId){
  var g=ST.games[weekId]||{};
  return GAME_IDS.filter(function(gid){var gm=g[gid];return gm&&gm.away&&gm.home;});
}
function spreadLabel(g,side){
  var sp=parseFloat(g.spread);
  if(!sp||isNaN(sp)||g.favSide==="even") return "PK";
  if(side===g.favSide) return "-"+sp;
  return "+"+sp;
}

// ── Scoring ──────────────────────────────────────────────
function weekScore(weekId,user){
  var picks=((ST.picks[weekId]||{})[ukey(user)])||{};
  var results=ST.results[weekId]||{};
  var total=0,correct=0,wrong=0,pending=0;
  GAME_IDS.forEach(function(gid){
    var p=picks[gid],r=results[gid];
    if(!p||!p.side)return;
    if(r==="push")return;
    if(r){
      if(p.side===r){total+=Number(p.conf)||0;correct++;}
      else wrong++;
    } else pending++;
  });
  return {total:total,correct:correct,wrong:wrong,pending:pending};
}
function seasonScore(user){
  var total=0;

// ── Firebase load ────────────────────────────────────────
function loadData(){
  if(!DB){draw();return;}
  function s1(){
    if(!GROUP_ID){s2();return;}
    DB.ref("groups/"+GROUP_ID).once("value",function(sn){
      var g=sn.val()||{};
      if(g&&g.players&&g.players.length)PARTS=g.players;
      GROUP_ADMIN_PW=(g&&g.groupAdminPw)||"password";
      ST.groupPublic=!!(g&&g.public);
      s2();
    },function(){s2();});
  }
  function s2(){
    var done=0,total=PARTS.length;
    if(!total){s3();return;}
    PARTS.forEach(function(p){
      DB.ref("users/"+ukey(p)+"/emoji").once("value",
        function(sn){if(sn.val())_EM[p]=sn.val();done++;if(done===total)s3();},
        function(){done++;if(done===total)s3();});
    });
  }
  function s3(){
    DB.ref("globalSettings/masterPw").on("value",function(sn){if(sn.val())MASTER_PW=sn.val();});
    DB.ref(BASE+"/locked").once("value",function(sn0){
      ST.locked=sn0.val()||{};
      DB.ref(BASE+"/meta").on("value",function(sn){
        var meta=sn.val()||{};
        ST.weekIds=meta.weekIds||[];
        ST.weekLabels=meta.weekLabels||{};
        if(!ST._weekInit&&ST.weekIds.length){ ST.curWeek=currentWeekId(); ST._weekInit=true; }
        else if(ST.curWeek&&ST.weekIds.indexOf(ST.curWeek)===-1){ ST.curWeek=currentWeekId(); }
        else if(!ST.curWeek&&ST.weekIds.length){ ST.curWeek=currentWeekId(); }
        draw();
      });
      DB.ref(BASE+"/games").on("value",function(sn){ST.games=sn.val()||{};draw();});
      DB.ref(BASE+"/results").on("value",function(sn){ST.results=sn.val()||{};draw();});
      DB.ref(BASE+"/picks").on("value",function(sn){ST.picks=sn.val()||{};draw();});
      DB.ref(BASE+"/locked").on("value",function(sn){ST.locked=sn.val()||{};draw();});
    });
  }
  s1();
}

// ── ESPN LIVE SCOREBOARD (College Football) ───────────────
var _scTimer=null, _scData=null, _scLoading=false, _scLastFetch=0;

function fetchScoreboard(){
  if(_scLoading) return;
  _scLoading=true;
  var d=new Date();
  var ds=d.getFullYear()+""+("0"+(d.getMonth()+1)).slice(-2)+""+("0"+d.getDate()).slice(-2);
  fetch("https://site.api.espn.com/apis/site/v2/sports/football/college-football/scoreboard?dates="+ds+"&limit=300&groups=80")
    .then(function(r){return r.json();})
    .then(function(data){
      _scLoading=false; _scLastFetch=Date.now(); _scData=data;
      if(ST.page==="scores") renderScoresInto();
    })
    .catch(function(){
      _scLoading=false;
      var el=document.getElementById("scores-wrap");
      if(el) el.innerHTML='<div class="scores-empty">&#127944;<br>Could not load scores.<br><br><button class="scores-refresh" onclick="fetchScoreboard()">&#8635; Retry</button></div>';
    });
}

function renderScoresInto(){
  var el=document.getElementById("scores-wrap");
  if(!el) return;
  if(!_scData||!_scData.events||!_scData.events.length){
    el.innerHTML='<div class="scores-empty">&#127944;<br>No games found for today.<br><span style="font-size:9px;color:var(--dim)">Check back on game day</span></div>';
    return;
  }

  var events=_scData.events;
  var live=[],pre=[],done=[];
  events.forEach(function(ev){
    var comp=(ev.competitions||[])[0]; if(!comp) return;
    var state=(comp.status&&comp.status.type&&comp.status.type.state)||"pre";
    if(state==="in") live.push(ev);
    else if(state==="post") done.push(ev);
    else pre.push(ev);
  });

  var d=new Date();
  var dateLabel=d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});

  function card(ev){
    var comp=(ev.competitions||[])[0]; if(!comp) return "";
    var status=comp.status||{};
    var state=(status.type&&status.type.state)||"pre";
    var detail=(status.type&&status.type.shortDetail)||"";
    var isLive=state==="in", isFinal=state==="post";

    var comps=comp.competitors||[];
    var away=comps.find(function(c){return c.homeAway==="away";})||comps[0]||{};
    var home=comps.find(function(c){return c.homeAway==="home";})||comps[1]||{};

    function tname(c){return(c.team&&(c.team.shortDisplayName||c.team.displayName))||"?";}
    function tcolor(c){var col=(c.team&&c.team.color)||"";return(col&&col.length===6&&col!=="000000")?"#"+col:"#475569";}

    var aName=tname(away), hName=tname(home);
    var aScore=away.score!=null?String(away.score):"";
    var hScore=home.score!=null?String(home.score):"";
    var aNum=parseInt(aScore)||0, hNum=parseInt(hScore)||0;

    var aWin=isFinal&&aNum>hNum, hWin=isFinal&&hNum>aNum;
    var aLead=isLive&&aNum>hNum, hLead=isLive&&hNum>aNum;
    var tied=isLive&&aNum===hNum&&aScore!=="";

    function teamRow(name,color,score,wins,leads){
      var cls="sc-team";
      if(wins||leads) cls+=" winner";
      else if(isFinal&&!wins) cls+=" loser";
      else if(isLive&&!leads&&!tied&&score!=="") cls+=" loser";
      return '<div class="'+cls+'">'+
        '<div class="sc-dot" style="background:'+color+'"></div>'+
        '<div class="sc-name">'+x(name)+'</div>'+
        '<div class="sc-score'+(state==="pre"?" pre":"")+'">'+x(state==="pre"?"":score)+'</div>'+
        '</div>';
    }

    return '<div class="score-card'+(isLive?" live":isFinal?" final":"")+'">'+
      '<div class="sc-head">'+
        '<span class="sc-status '+(isLive?"live":isFinal?"final":"pre")+'">'+(isLive?"&#9679; LIVE":isFinal?"Final":"Upcoming")+'</span>'+
        '<span class="sc-detail">'+x(isLive?detail:isFinal?"":detail)+'</span>'+
      '</div>'+
      teamRow(aName,tcolor(away),aScore,aWin,aLead)+
      teamRow(hName,tcolor(home),hScore,hWin,hLead)+
      '</div>';
  }

  function section(games,label){
    if(!games.length) return "";
    var s='<div class="scores-section-label">'+label+' &middot; '+games.length+'</div>';
    s+='<div class="scores-strip">';
    games.forEach(function(ev){s+=card(ev);});
    s+='</div>';
    return s;
  }

  var ago=_scLastFetch?Math.round((Date.now()-_scLastFetch)/1000):0;
  var h='<div class="scores-date-header">'+
    '<span>&#127944; College Football &middot; '+dateLabel+'</span>'+
    '<button class="scores-refresh" onclick="fetchScoreboard()">&#8635; Refresh</button>'+
    '</div>';
  if(live.length) h+=section(live,"&#128308; In Progress");
  h+=section(pre,"&#128336; Upcoming");
  h+=section(done,"&#10003; Final");
  h+='<div style="text-align:center;padding:10px 0 4px;font-size:7px;color:var(--dim)">Updated '+ago+'s ago &middot; auto-refreshes every 60s &middot; via ESPN</div>';
  el.innerHTML=h;
}

  fetchScoreboard();

// ── ESPN SCHEDULE IMPORT (Admin) ───────────────────────────────────────────
function fetchEspnSchedule(year,week){
  ST.importLoading=true; ST.importError=""; draw();
  var url="https://site.api.espn.com/apis/site/v2/sports/football/college-football/scoreboard?year="+year+"&week="+week+"&seasontype=2&groups=80&limit=300";
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      ST.importLoading=false;
      ST.importGames=parseEspnSchedule(data);
      ST.importSelected={};
      if(!ST.importGames.length) ST.importError="No games found for that week/year.";
      draw();
    })
    .catch(function(){
      ST.importLoading=false;
      ST.importError="Could not reach ESPN. Check your connection and try again.";
      draw();
    });
}
function parseEspnSchedule(data){
  var events=(data&&data.events)||[];
  return events.map(function(ev){
    var comp=(ev.competitions||[])[0]||{};
    var comps=comp.competitors||[];
    var away=comps.find(function(c){return c.homeAway==="away";})||{};
    var home=comps.find(function(c){return c.homeAway==="home";})||{};
    var awayName=(away.team&&(away.team.shortDisplayName||away.team.displayName))||"TBD";
    var homeName=(home.team&&(home.team.shortDisplayName||home.team.displayName))||"TBD";
    var dt=ev.date?new Date(ev.date):null;
    var kickoff=dt?dt.toLocaleString("en-US",{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"";
    var kickoffTs=dt?dt.getTime():null;
    var venue=(comp.venue&&comp.venue.fullName)||"";
    var spread=0,favSide="home";
    var odds=(comp.odds||[])[0];
    if(odds&&odds.details){
      var m=String(odds.details).match(/(-?\d+(\.\d+)?)/);
      if(m){
        spread=Math.abs(parseFloat(m[1]));
        var favText=String(odds.details).split(/-?\d/)[0].trim().toLowerCase();
        var awayAbbr=((away.team&&away.team.abbreviation)||"").toLowerCase();
        if(favText&&(awayName.toLowerCase().indexOf(favText)>=0||favText.indexOf(awayAbbr)>=0||awayAbbr===favText)) favSide="away";
        else favSide="home";
      }
    }
    return {away:awayName,home:homeName,kickoff:kickoff,kickoffTs:kickoffTs,venue:venue,spread:spread,favSide:favSide};
  });
}
function guessWeekNumber(label){
  var m=String(label||"").match(/(\d+)/);
  return m?parseInt(m[1]):1;
}

// ── Countdown helpers ─────────────────────────────────────
var _countdownTimer=null;

// Parse kickoff string like "Sat, Aug 29 at 12:00 PM" → timestamp (ms)
// Falls back to kickoffTs if stored, otherwise parses the display string
function parseKickoffTs(game){
  if(game.kickoffTs) return game.kickoffTs;
  var s=String(game.kickoff||"");
  if(!s) return null;
  // Try removing the weekday prefix: "Sat, Aug 29 at 12:00 PM" → "Aug 29 at 12:00 PM"
  s=s.replace(/^[A-Za-z]+,?\s*/,"");
  // Replace "at" with space: "Aug 29 12:00 PM"
  s=s.replace(/\s+at\s+/," ");
  // Append current year if missing
  var yr=new Date().getFullYear();
  var d=new Date(s+" "+yr);
  if(isNaN(d.getTime())) return null;
  return d.getTime();
}

function getFirstKickoff(weekId){
  var games=ST.games[weekId]||{};
  var earliest=null;
  GAME_IDS.forEach(function(gid){
    var g=games[gid];
    if(!g||!g.away||!g.home) return;
    var ts=parseKickoffTs(g);
    if(ts&&(earliest===null||ts<earliest)) earliest=ts;
  });
  return earliest;
}

function formatCountdownCfb(ms){
  if(ms<=0) return null;
  var s=Math.floor(ms/1000);
  var m=Math.floor(s/60); s=s%60;
  var h=Math.floor(m/60); m=m%60;
  var d=Math.floor(h/24); h=h%24;
  if(d>0) return d+'d '+(h>0?h+'h '+('0'+m).slice(-2)+'m':'');
  if(h>0) return h+'h '+('0'+m).slice(-2)+'m '+('0'+s).slice(-2)+'s';
  return ('0'+m).slice(-2)+'m '+('0'+s).slice(-2)+'s';
}

function startCountdown(weekId){
  stopCountdown();
  var firstKickoff=getFirstKickoff(weekId);
  if(!firstKickoff) return;
  function tick(){
    var el=document.getElementById("countdown-display");
    var sub=document.getElementById("countdown-sub");
    if(!el) { stopCountdown(); return; }
    var remaining=firstKickoff-Date.now();
    if(remaining<=0){
      el.parentElement.classList.add("expired");
      el.textContent="Picks are locked — first game kicked off";
      if(sub) sub.textContent="";
      stopCountdown();
    } else {
      el.textContent=formatCountdownCfb(remaining)+" until first kickoff";
    }
  }
  tick();
  _countdownTimer=setInterval(tick,1000);
}
function stopCountdown(){ clearInterval(_countdownTimer); _countdownTimer=null; }
function addImportedGames(weekId){
  var selected=ST.importGames.filter(function(g,i){return ST.importSelected[i];});
  if(!selected.length){toast("Select at least one game");return;}
  var slots=GAME_IDS.filter(function(gid){var g=(ST.games[weekId]||{})[gid];return !g||!g.away||!g.home;});
  if(!slots.length){toast("All 10 game slots are already filled");return;}
  var n=Math.min(slots.length,selected.length);
  for(var i=0;i<n;i++){
    var gid=slots[i],g=selected[i];
    setGameField(weekId,gid,"away",g.away);
    setGameField(weekId,gid,"home",g.home);
    setGameField(weekId,gid,"favSide",g.favSide);
    setGameField(weekId,gid,"spread",g.spread);
    setGameField(weekId,gid,"kickoff",g.kickoff);
    if(g.kickoffTs) setGameField(weekId,gid,"kickoffTs",g.kickoffTs);
  }
  ST.importSelected={};
  if(selected.length>n) toast("Added "+n+" games &mdash; "+(selected.length-n)+" more selected but no empty slots left");
  else toast("&#10003; Added "+n+" game"+(n!==1?"s":""));
  draw();
}

function setPickSide(weekId,gid,side){
  if(!ST.user){toast("Select your name first");return;}
  if(ST.locked[weekId]){toast("&#128274; Week is locked");return;}
  var uk=ukey(ST.user);
  if(!ST.picks[weekId])ST.picks[weekId]={};
  if(!ST.picks[weekId][uk])ST.picks[weekId][uk]={};
  var cur=ST.picks[weekId][uk][gid]||{};
  if(cur.side===side) delete cur.side;
  else cur.side=side;
  ST.picks[weekId][uk][gid]=cur;
  draw();
  if(DB)DB.ref(BASE+"/picks/"+weekId+"/"+uk+"/"+gid).set(cur,function(err){
    if(!err){ var t=document.getElementById("tick-"+gid); if(t){ t.innerHTML='<span class="save-tick">&#10003;</span>'; setTimeout(function(){t.innerHTML="";},1000); } }
  });
}
function resetAllConf(weekId){
  if(!ST.user){toast("Select your name first");return;}
  if(ST.locked[weekId]){toast("&#128274; Week is locked");return;}
  var uk=ukey(ST.user);
  var active=activeGames(weekId);
  if(!ST.picks[weekId]||!ST.picks[weekId][uk]) return;
  active.forEach(function(gid){
    if(ST.picks[weekId][uk][gid]){
      delete ST.picks[weekId][uk][gid].conf;
      if(DB) DB.ref(BASE+"/picks/"+weekId+"/"+uk+"/"+gid+"/conf").remove();
    }
  });
  draw();
  toast("Confidence reset");
}
function setConf(weekId,gid,confRaw){
  if(!ST.user){toast("Select your name first");return;}
  if(ST.locked[weekId]){toast("&#128274; Week is locked");return;}
  var uk=ukey(ST.user);
  if(!ST.picks[weekId])ST.picks[weekId]={};
  if(!ST.picks[weekId][uk])ST.picks[weekId][uk]={};
  var picks=ST.picks[weekId][uk];
  var conf=confRaw?Number(confRaw):null;
  if(conf){
    Object.keys(picks).forEach(function(otherGid){
      if(otherGid!==gid&&picks[otherGid]&&Number(picks[otherGid].conf)===conf){
        picks[otherGid].conf=null;
        if(DB)DB.ref(BASE+"/picks/"+weekId+"/"+uk+"/"+otherGid+"/conf").remove();
      }
    });
  }
  if(!picks[gid])picks[gid]={};
  if(conf)picks[gid].conf=conf; else delete picks[gid].conf;
  draw();
  if(DB){
    var _confCb=function(err){ if(!err){ var t=document.getElementById("tick-"+gid); if(t){ t.innerHTML='<span class="save-tick">&#10003;</span>'; setTimeout(function(){t.innerHTML="";},1000); } } };
    if(conf)DB.ref(BASE+"/picks/"+weekId+"/"+uk+"/"+gid+"/conf").set(conf,_confCb);
    else DB.ref(BASE+"/picks/"+weekId+"/"+uk+"/"+gid+"/conf").remove();
  }
}

function addWeek(){
  var label=prompt("Week label (e.g. 'Week 1' or 'Bowl Season'):");
  if(!label)return;
  var id="w"+Date.now();
  var emptyGames={};
  GAME_IDS.forEach(function(gid){emptyGames[gid]={away:"",home:"",favSide:"home",spread:0,kickoff:""};});
  var weekIds=ST.weekIds.concat([id]);
  var weekLabels={}; for(var k in ST.weekLabels) weekLabels[k]=ST.weekLabels[k];
  weekLabels[id]=label;
  ST.weekIds=weekIds; ST.weekLabels=weekLabels; ST.curWeek=id;
  if(DB){
    DB.ref(BASE+"/meta/weekIds").set(weekIds);
    DB.ref(BASE+"/meta/weekLabels").set(weekLabels);
    DB.ref(BASE+"/games/"+id).set(emptyGames);
  }
  draw();
  toast("Week added");
}
function removeWeek(weekId){
  if(!weekId)return;
  if(!confirm("Delete \""+(ST.weekLabels[weekId]||weekId)+"\" and all its games, picks, and results?"))return;
  var weekIds=ST.weekIds.filter(function(w){return w!==weekId;});
  ST.weekIds=weekIds;
  delete ST.weekLabels[weekId];
  ST.curWeek=weekIds.length?weekIds[weekIds.length-1]:null;
  if(DB){
    DB.ref(BASE+"/meta/weekIds").set(weekIds);
    DB.ref(BASE+"/meta/weekLabels/"+weekId).remove();
    DB.ref(BASE+"/games/"+weekId).remove();
    DB.ref(BASE+"/results/"+weekId).remove();
    DB.ref(BASE+"/picks/"+weekId).remove();
    DB.ref(BASE+"/locked/"+weekId).remove();
  }
  draw();
  toast("Week removed");
}
function setGameField(weekId,gid,field,value){
  if(!ST.games[weekId])ST.games[weekId]={};
  if(!ST.games[weekId][gid])ST.games[weekId][gid]={away:"",home:"",favSide:"home",spread:0,kickoff:""};
  ST.games[weekId][gid][field]=value;
  if(DB)DB.ref(BASE+"/games/"+weekId+"/"+gid+"/"+field).set(value);
}
function setResult(weekId,gid,val){
  if(!ST.results[weekId])ST.results[weekId]={};
  if(val==="CLEAR"){
    delete ST.results[weekId][gid];
    if(DB)DB.ref(BASE+"/results/"+weekId+"/"+gid).remove();
  } else {
    ST.results[weekId][gid]=val;
    if(DB)DB.ref(BASE+"/results/"+weekId+"/"+gid).set(val);
  }
  draw();
}
function toggleLock(weekId){
  var newVal=!ST.locked[weekId];
  ST.locked[weekId]=newVal;
  if(DB)DB.ref(BASE+"/locked/"+weekId).set(newVal);
  draw();
}

function setGroupPublic(val){

function confChips(selected,weekId,gid,N,canPick,usedConfs){
  var used=usedConfs||{};
  var h='<div class="conf-chips">';
  for(var i=1;i<=N;i++){
    var sel=Number(selected)===i;
    var takenByOther=!sel&&used[i];
    if(canPick){
      var cls='conf-chip'+(sel?' sel':takenByOther?' used':'');
      h+='<button class="'+cls+'"'+(takenByOther?' disabled':'')+(takenByOther?'':' data-conf-week="'+weekId+'" data-conf-gid="'+gid+'" data-conf-val="'+i+'"')+'>'+i+'</button>';
    } else {
      h+='<div class="conf-chip'+(sel?' sel':'')+'" style="cursor:default">'+i+'</div>';
    }
  }
  h+='</div>';
  return h;
}

function renderGameCard(weekId,gid,g,canPick,viewerPicks,locked,result,N,usedConfs){
  var pick=viewerPicks[gid]||{};
  var h='<div class="game-card">';
  h+='<div class="gc-head"><div class="gc-label">'+x(g.kickoff||"")+'</div><div id="tick-'+gid+'" style="min-width:20px"></div>';
  if(locked&&result){
    if(result==="push") h+='<div class="gc-pts push">PUSH</div>';
    else if(pick.side){
      var won=pick.side===result;
      h+='<div class="gc-pts'+(won?" earned":"")+'">'+(won?("&#10003; +"+(pick.conf||0)):"&#10007;")+'</div>';
    } else {
      h+='<div class="gc-pts">&ndash;</div>';
    }
  }
  h+='</div>';
  ["away","home"].forEach(function(side){
    var team=g[side]||"TBD";
    var sel=pick.side===side;
    var cls="team-pick";
    if(locked&&result){
      if(result==="push") cls+=" push";
      else if(result===side) cls+=" winner";
      else cls+=" loser";
      if(sel) cls+=" mypick";
    } else if(sel) cls+=" mypick";
    if(canPick) cls+=" clickable";
    h+='<div class="'+cls+'" data-pick-week="'+weekId+'" data-pick-gid="'+gid+'" data-pick-side="'+side+'">';
    h+='<div class="tp-name">'+x(team)+'</div><div class="tp-spread">'+spreadLabel(g,side)+'</div>';
    h+='</div>';
  });
  h+='<div class="conf-row"><span class="conf-label">Confidence</span>'+confChips(pick.conf,weekId,gid,N,canPick,usedConfs)+'</div>';
  h+='</div>';
  return h;
}

  }
  h+='</div>';

  var locked=!!ST.locked[weekId];
  var viewer=ST.viewUser||ST.user;
  var viewerPicks=((ST.picks[weekId]||{})[ukey(viewer)])||{};
  var isViewingOther=!!(ST.viewUser&&ST.viewUser!==ST.user);
  var canPick=!!(ST.user&&!locked&&!isViewingOther);
  var active=activeGames(weekId);
  var N=active.length;

  h+='<div class="lock-bar">';
  if(locked){
    if(isViewingOther){
      h+='<div class="lock-info">&#128065; Viewing '+x(ST.viewUser)+'\'s picks</div>';
    } else {
      var ws=weekScore(weekId,viewer);
      h+='<div class="lock-info">&#128274; Locked &middot; '+ws.correct+'-'+ws.wrong+' &middot; '+ws.total+' pts</div>';
    }
    h+='<div class="lock-chips">';
    PARTS.forEach(function(p){
      h+='<div class="lchip'+(viewer===p?" done":"")+'" data-view="'+x(p)+'" style="cursor:pointer">'+pem(p)+x(p)+'</div>';
    });
    h+='</div>';
    if(isViewingOther) h+='<button class="btn btn-ghost" id="b-viewself" style="margin-left:5px">My Picks</button>';
  } else {
    var made=0,confs={};
    active.forEach(function(gid){
      var p=viewerPicks[gid];
      if(p&&p.side)made++;
      if(p&&p.conf)confs[p.conf]=(confs[p.conf]||0)+1;
    });
    var dupes=Object.keys(confs).filter(function(k){return confs[k]>1;}).length;
    h+='<div class="lock-info">&#9998; '+made+'/'+N+' picked'+(dupes?' &middot; &#9888; duplicate confidence':'')+'</div>';
    if(ST.user) h+='<div class="lock-chips"><button class="btn btn-ghost" id="b-reset-conf" style="font-size:9px;padding:3px 9px">&#8635; Reset Conf</button></div>';
    if(!ST.user) h+='<div class="lock-chips"><button class="btn btn-ghost" id="b-switch2">Pick your name</button></div>';
  }
  h+='</div>';

  if(N===0){
    h+='<div class="lb-note">'+(ST.admin?'No games added for this week yet. Go to Admin to fill in the 10 matchups.':'Games for this week haven\'t been posted yet &mdash; check back soon.')+'</div>';
    return h;
  }

  // Countdown bar — only when week is unlocked and games have kickoff times
  if(!locked){
    var firstTs=getFirstKickoff(weekId);
    if(firstTs){
      var remaining=firstTs-Date.now();
      if(remaining>0){
        h+='<div class="countdown-bar"><span class="countdown-label">&#9200; Locks in</span><span class="countdown-timer" id="countdown-display">--</span></div>';
      } else {
        h+='<div class="countdown-bar expired"><span class="countdown-label">&#128274;</span><span class="countdown-timer" id="countdown-display">Picks are locked — first game kicked off</span></div>';
      }
    }
  }

  h+='<div class="games-wrap">';
  // Pre-compute which confidence values are already used by other games
  var allUsedConfs={};
  active.forEach(function(gid){
    var p=viewerPicks[gid]||{};
    if(p.conf) allUsedConfs[Number(p.conf)]=true;
  });
  active.forEach(function(gid){
    var g=ST.games[weekId][gid];
    var result=(ST.results[weekId]||{})[gid];
    // usedConfs for this game = all used EXCEPT this game's own pick
    var thisConf=Number((viewerPicks[gid]||{}).conf)||null;
    var usedConfs={};
    for(var k in allUsedConfs){ if(Number(k)!==thisConf) usedConfs[k]=true; }
    h+=renderGameCard(weekId,gid,g,canPick,viewerPicks,locked,result,N,usedConfs);
  });
  h+='</div>';
  return h;
}

function renderStandings(){
  var h='<div class="lb-wrap">';
  if(ST.weekIds.length===0){h+='<div class="lb-note">No weeks yet.</div></div>';return h;}
  var curWeekId=currentWeekId();
  var curLocked=!!(curWeekId&&ST.locked[curWeekId]);
  var rows=PARTS.map(function(p){return {name:p,total:seasonScore(p)};});
  rows.sort(function(a,b){return b.total-a.total;});

  rows.forEach(function(r,i){
    // Current week pick progress sub-line
    var progressLine="";
    if(curWeekId){
      var active=activeGames(curWeekId);
      var N=active.length;
      if(!curLocked&&N>0){
        var picks=((ST.picks[curWeekId]||{})[ukey(r.name)])||{};
        var made=0,confSet=0;
        active.forEach(function(gid){var p=picks[gid]||{};if(p.side)made++;if(p.conf)confSet++;});
        progressLine=made+'/'+N+' picked'+(confSet>0?' &middot; '+confSet+' conf set':'');
      } else if(curLocked){
        var ws=weekScore(curWeekId,r.name);
        progressLine=x(ST.weekLabels[curWeekId]||curWeekId)+': '+ws.correct+'-'+ws.wrong+' &middot; '+ws.total+'pts';
      }
    }

    var medal=i===0?"&#129351;":i===1?"&#129352;":i===2?"&#129353;":(i+1);
    h+='<div class="plyr-accordion'+(i===0?" open":"")+'" id="acc-'+ukey(r.name)+'">';
    h+='<div class="plyr-acc-head" data-acc="'+ukey(r.name)+'">';
    h+='<div style="font-size:18px;width:26px;text-align:center;flex-shrink:0">'+medal+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="display:flex;justify-content:space-between;align-items:baseline">';
    h+='<div class="lb-name">'+pem(r.name)+x(r.name)+'</div>';
    h+='<div class="lb-pts"><b>'+r.total+'</b> pts</div>';
    h+='</div>';
    if(progressLine) h+='<div style="font-size:9px;font-weight:700;color:var(--muted);margin-top:1px">'+progressLine+'</div>';
    h+='</div>';
    h+='<span class="plyr-acc-arrow">&#8250;</span>';
    h+='</div>';

    // Accordion body: week-by-week breakdown
    h+='<div class="plyr-acc-body">';
    var completedWeeks=ST.weekIds.filter(function(w){return ST.locked[w];});
    if(!completedWeeks.length){
      h+='<div style="font-size:10px;color:var(--muted);padding:4px 0">No completed weeks yet</div>';
    } else {
      completedWeeks.forEach(function(w){
        var ws=weekScore(w,r.name);
        var lbl=ST.weekLabels[w]||w;
        h+='<div class="week-row">';
        h+='<span class="week-row-label">'+x(lbl)+'</span>';
        h+='<span><span class="week-row-score">'+ws.total+'</span> <span class="week-row-detail">'+ws.correct+'-'+ws.wrong+(ws.pending>0?' &middot; '+ws.pending+' live':'')+'</span></span>';
        h+='</div>';
      });
    }
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

function renderImportPanel(weekId){
  var year=ST.importYear||2026;
  var week=ST.importWeek||guessWeekNumber(ST.weekLabels[weekId]);
  var h='<div class="adm-game">';
  h+='<div class="adm-game-title">College Football Schedule &mdash; FBS (via ESPN)</div>';
  h+='<div class="adm-row">';
  h+='<input class="adm-input" id="imp-year" type="number" placeholder="Year" value="'+year+'" style="max-width:90px">';
  h+='<input class="adm-input" id="imp-week" type="number" placeholder="ESPN Week #" value="'+week+'" style="max-width:120px">';
  h+='<button class="btn btn-gold" id="b-fetch-espn">'+(ST.importLoading?"Loading\u2026":"Fetch Games")+'</button>';
  h+='</div>';
  if(ST.importError) h+='<div style="font-size:10px;font-weight:700;color:var(--red2);margin-bottom:6px">'+x(ST.importError)+'</div>';
  if(ST.importGames&&ST.importGames.length){
    var selCount=Object.keys(ST.importSelected).length;
    h+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin:8px 0 4px">';
    h+='<div style="font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Tap up to 10 games, then add to '+x(ST.weekLabels[weekId]||weekId)+'</div>';
    h+='<div style="font-size:11px;font-weight:900;color:'+(selCount===10?"var(--green)":"var(--text)")+'">'+selCount+'/10</div>';
    h+='</div>';
    ST.importGames.forEach(function(g,i){
      var checked=!!ST.importSelected[i];
      var disable=!checked&&selCount>=10;
      h+='<label style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2);cursor:pointer'+(disable?";opacity:.4":"")+'">';
      h+='<input type="checkbox" data-imp-idx="'+i+'" '+(checked?"checked":"")+(disable?" disabled":"")+' style="width:16px;height:16px;flex-shrink:0;accent-color:var(--gold)">';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="font-size:11px;font-weight:800">'+x(g.away)+' @ '+x(g.home)+'</div>';
      var meta=x(g.kickoff);
      if(g.spread) meta+=' &middot; '+(g.favSide==="away"?x(g.away):x(g.home))+' -'+g.spread;
      if(g.venue) meta+=' &middot; '+x(g.venue);
      h+='<div style="font-size:9px;color:var(--muted)">'+meta+'</div>';
      h+='</div></label>';
    });
    h+='<button class="btn btn-green" id="b-add-imported" style="margin-top:10px;width:100%">Add Selected to '+x(ST.weekLabels[weekId]||weekId)+'</button>';
  }
  h+='</div>';
  return h;
}

function renderAdmin(){
  var h='<div class="adm-wrap">';
  if(GROUP_ID){
    h+='<div class="adm-sec-label">Group Settings</div>';
    h+='<div class="adm-game"><div class="adm-game-title">Public Leaderboard — anyone (even guests) can view a read-only leaderboard for this group</div><div class="adm-btns">';
    h+='<button class="adm-btn'+(ST.groupPublic?" sel":"")+'" id="b-pub-on">On</button>';
    h+='<button class="adm-btn'+(!ST.groupPublic?" sel":"")+'" id="b-pub-off">Off</button>';
    h+='</div></div>';
  }
  h+='<div class="adm-sec-label">Weeks</div>';
  h+='<div class="week-bar">';
  ST.weekIds.forEach(function(w){h+='<button class="wtab'+(ST.curWeek===w?" active":"")+'" data-week="'+w+'">'+x(ST.weekLabels[w]||w)+'</button>';});
  h+='<button class="wtab add" id="b-addweek">+ Add Week</button>';
  h+='</div>';

  if(!ST.curWeek){h+='<div class="lb-note">Add a week to start entering matchups.</div></div>';return h;}

  var weekId=ST.curWeek;
  var locked=!!ST.locked[weekId];
  h+='<div class="adm-head-row">';
  h+='<div class="lb-name">'+x(ST.weekLabels[weekId]||weekId)+'</div>';
  h+='<div style="display:flex;gap:5px;flex-wrap:wrap"><button class="btn '+(locked?"btn-red":"btn-green")+'" id="b-lockweek">'+(locked?"&#128274; Locked &mdash; Unlock":"&#128275; Unlocked &mdash; Lock")+'</button>';
  h+='<button class="btn btn-red" id="b-delweek">Delete Week</button></div>';
  h+='</div>';

  h+='<div class="adm-head-row" style="margin-top:0">';
  h+='<button class="btn btn-ghost" id="b-import-toggle">'+(ST.showImport?"&#128229; Hide ESPN Import":"&#128225; Import Games from ESPN")+'</button>';
  h+='</div>';
  if(ST.showImport) h+=renderImportPanel(weekId);

  GAME_IDS.forEach(function(gid,idx){
    var g=(ST.games[weekId]||{})[gid]||{away:"",home:"",favSide:"home",spread:0,kickoff:""};
    h+='<div class="adm-game">';
    h+='<div class="adm-game-title">Game '+(idx+1)+'</div>';
    h+='<div class="adm-row">';
    h+='<input class="adm-input" placeholder="Away team" value="'+x(g.away)+'" data-week="'+weekId+'" data-gid="'+gid+'" data-field="away">';
    h+='<input class="adm-input" placeholder="Home team" value="'+x(g.home)+'" data-week="'+weekId+'" data-gid="'+gid+'" data-field="home">';
    h+='</div>';
    h+='<div class="adm-row" style="margin-bottom:4px">';
    h+='<button class="adm-btn'+(g.favSide==="away"?" sel":"")+'" style="flex:1" data-week="'+weekId+'" data-gid="'+gid+'" data-fav="away">'+x(g.away||"Away")+'</button>';
    h+='<button class="adm-btn'+(g.favSide==="home"?" sel":"")+'" style="flex:1" data-week="'+weekId+'" data-gid="'+gid+'" data-fav="home">'+x(g.home||"Home")+'</button>';
    h+='<button class="adm-btn'+(g.favSide==="even"?" sel":"")+'" data-week="'+weekId+'" data-gid="'+gid+'" data-fav="even">Pick &#39;em</button>';
    h+='</div>';
    h+='<div class="adm-row">';
    h+='<input class="adm-input" type="number" step="0.5" placeholder="e.g. -12.5" value="'+(g.spread&&g.favSide!=="even"?"-"+g.spread:"")+'" data-week="'+weekId+'" data-gid="'+gid+'" data-field="spread" style="max-width:110px">';
    h+='<input class="adm-input" placeholder="Kickoff (e.g. Sat 3:30pm ET)" value="'+x(g.kickoff||"")+'" data-week="'+weekId+'" data-gid="'+gid+'" data-field="kickoff">';
    h+='</div>';
    if(g.away&&g.home){
      var r=(ST.results[weekId]||{})[gid];
      h+='<div class="adm-btns">';
      h+='<button class="adm-btn'+(r==="away"?" sel":"")+'" data-week="'+weekId+'" data-gid="'+gid+'" data-result="away">'+x(g.away)+' covers</button>';
      h+='<button class="adm-btn'+(r==="push"?" sel":"")+'" data-week="'+weekId+'" data-gid="'+gid+'" data-result="push">Push</button>';
      h+='<button class="adm-btn'+(r==="home"?" sel":"")+'" data-week="'+weekId+'" data-gid="'+gid+'" data-result="home">'+x(g.home)+' covers</button>';
      if(r) h+='<button class="adm-btn clr" data-week="'+weekId+'" data-gid="'+gid+'" data-result="CLEAR">Clear</button>';
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}

// ── Main draw ────────────────────────────────────────────
function draw(){
  var h='';
  if(PUBLIC_VIEW)h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--blue-bg);border-bottom:2px solid var(--border);font-size:10px;font-weight:800;color:var(--blue)">&#128065; Public View &mdash; read only</div>';
  h+='<div class="topbar">';
  h+='<div class="topbar-left"><a href="index.html" style="display:flex;align-items:center;gap:3px;text-decoration:none;color:var(--muted);font-size:9px;font-weight:600;padding:4px 8px;border:1px solid var(--border);border-radius:6px;white-space:nowrap">&#8592; Hub</a></div>';
  h+='<div class="topbar-center"><div class="app-name"><span class="scorecery-logo">SCORECERY</span></div><div class="app-sub">College Football &middot; Confidence Pool</div></div>';
  h+='<div class="topbar-right">';
  if(ST.user){
    h+='<span class="tag">'+pem(ST.user)+x(ST.user)+'</span>';
    if(!URL_USER) h+='<button class="btn btn-ghost" id="b-switch">&#8646;</button>';
  }
  if(!PUBLIC_VIEW) h+='<button class="btn '+(ST.admin?"btn-gold":"btn-ghost")+'" id="b-admin">'+(ST.admin?"&#9889;":"&#9881;")+'</button>';
  h+='</div></div>';

  var tabs=[{id:"picks",lbl:"&#127944; Picks"},{id:"scores",lbl:"&#128308; Scores"},{id:"standings",lbl:"&#128202; Standings"}];
  if(ST.admin) tabs.push({id:"admin",lbl:"&#9881; Admin"});
  h+='<div class="page-bar">';
  tabs.forEach(function(t){h+='<button class="ptab'+(ST.page===t.id?" active":"")+'" data-page="'+t.id+'">'+t.lbl+'</button>';});
  h+='</div>';

  if(!ST.user&&!ST.admin&&!PUBLIC_VIEW&&ST.page!=="scores"){
    h+=userSelectScreen();
    document.getElementById("root").innerHTML=h;
    stopScoreRefresh();
    bind();return;
  }

  if(ST.page==="picks") h+=renderPicks();
  else if(ST.page==="scores") h+='<div class="scores-wrap" id="scores-wrap"><div class="scores-loading">Loading scores&hellip;</div></div>';
  else if(ST.page==="standings") h+=renderStandings();
  else if(ST.page==="admin"&&ST.admin) h+=renderAdmin();
  else { ST.page="picks"; h+=renderPicks(); }

  document.getElementById("root").innerHTML=h;
  bind();
  if(ST.page==="scores"){
    if(_scData) renderScoresInto(); else startScoreRefresh();
  } else {
    stopScoreRefresh();
  }
  // Start countdown if on picks tab, week is unlocked, and we have kickoff data
  if(ST.page==="picks"&&ST.curWeek&&!ST.locked[ST.curWeek]&&document.getElementById("countdown-display")){
    startCountdown(ST.curWeek);
  } else {
    stopCountdown();
  }
}

// ── Bindings ─────────────────────────────────────────────
function bind(){
  var els,i,el;
  els=document.querySelectorAll(".ptab");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ST.page=this.getAttribute("data-page");draw();});

  els=document.querySelectorAll(".user-btn");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ST.user=this.getAttribute("data-user");ST.viewUser=null;draw();});

  els=document.querySelectorAll(".wtab[data-week]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ST.curWeek=this.getAttribute("data-week");ST.viewUser=null;draw();});

  els=document.querySelectorAll(".lchip[data-view]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var p=this.getAttribute("data-view");
    ST.viewUser=(ST.user===p)?null:p;
    draw();
  });

  el=document.getElementById("past-week-select"); if(el) el.addEventListener("change",function(){
    var v=this.value;
    ST.curWeek=v||currentWeekId();
    ST.viewUser=null;
    draw();
  });

  el=document.getElementById("b-viewself"); if(el) el.addEventListener("click",function(){ST.viewUser=null;draw();});
  el=document.getElementById("b-switch"); if(el) el.addEventListener("click",function(){ST.user=null;ST.viewUser=null;draw();});
  el=document.getElementById("b-switch2"); if(el) el.addEventListener("click",function(){ST.user=null;ST.viewUser=null;draw();});
  el=document.getElementById("b-reset-conf"); if(el) el.addEventListener("click",function(){ if(confirm("Clear all confidence values for this week?")) resetAllConf(ST.curWeek); });

  el=document.getElementById("b-admin"); if(el) el.addEventListener("click",function(){
    if(ST.admin){ST.admin=false;if(ST.page==="admin")ST.page="picks";draw();return;}
    var pw=prompt("Admin password:"); if(pw===null)return;
    if(pw===MASTER_PW||(GROUP_ADMIN_PW&&pw===GROUP_ADMIN_PW)){
      ST.admin=true;ST.page="admin";draw();toast("&#9889; Admin mode on");
    } else {
      toast("Wrong password");
    }
  });

  els=document.querySelectorAll(".team-pick.clickable");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    setPickSide(this.getAttribute("data-pick-week"),this.getAttribute("data-pick-gid"),this.getAttribute("data-pick-side"));
  });

  els=document.querySelectorAll(".conf-chip[data-conf-val]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var wk=this.getAttribute("data-conf-week");
    var gi=this.getAttribute("data-conf-gid");
    var val=this.getAttribute("data-conf-val");
    var cur=(((ST.picks[wk]||{})[ukey(ST.user)]||{})[gi]||{}).conf;
    setConf(wk,gi,Number(cur)===Number(val)?null:val);
  });

  els=document.querySelectorAll(".plyr-acc-head[data-acc]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var acc=document.getElementById("acc-"+this.getAttribute("data-acc"));
    if(acc) acc.classList.toggle("open");
  });

  el=document.getElementById("b-addweek"); if(el) el.addEventListener("click",addWeek);
  el=document.getElementById("b-delweek"); if(el) el.addEventListener("click",function(){removeWeek(ST.curWeek);});
  el=document.getElementById("b-lockweek"); if(el) el.addEventListener("click",function(){toggleLock(ST.curWeek);});
  el=document.getElementById("b-pub-on"); if(el) el.addEventListener("click",function(){ setGroupPublic(true); });
  el=document.getElementById("b-pub-off"); if(el) el.addEventListener("click",function(){ setGroupPublic(false); });

  el=document.getElementById("b-import-toggle"); if(el) el.addEventListener("click",function(){
    ST.showImport=!ST.showImport;
    if(ST.showImport&&!ST.importWeek) ST.importWeek=guessWeekNumber(ST.weekLabels[ST.curWeek]);
    if(ST.showImport&&!ST.importYear) ST.importYear=2026;
    draw();
  });
  el=document.getElementById("imp-year"); if(el) el.addEventListener("change",function(){ST.importYear=parseInt(this.value)||2026;});
  el=document.getElementById("imp-week"); if(el) el.addEventListener("change",function(){ST.importWeek=parseInt(this.value)||1;});
  el=document.getElementById("b-fetch-espn"); if(el) el.addEventListener("click",function(){
    var yEl=document.getElementById("imp-year"), wEl=document.getElementById("imp-week");
    ST.importYear=parseInt(yEl.value)||2026;
    ST.importWeek=parseInt(wEl.value)||1;
    fetchEspnSchedule(ST.importYear,ST.importWeek);
  });
  els=document.querySelectorAll("[data-imp-idx]");
  for(i=0;i<els.length;i++) els[i].addEventListener("change",function(){
    var idx=this.getAttribute("data-imp-idx");
    if(this.checked) ST.importSelected[idx]=true; else delete ST.importSelected[idx];
    draw();
    if(Object.keys(ST.importSelected).length===10){
      var btn=document.getElementById("b-add-imported");
      if(btn) btn.scrollIntoView({behavior:"smooth",block:"center"});
    }
  });
  el=document.getElementById("b-add-imported"); if(el) el.addEventListener("click",function(){addImportedGames(ST.curWeek);});

  els=document.querySelectorAll(".adm-input[data-field]");
  for(i=0;i<els.length;i++) els[i].addEventListener("change",function(){
    var v=this.value;
    if(this.getAttribute("data-field")==="spread") v=Math.abs(parseFloat(v))||0;
    setGameField(this.getAttribute("data-week"),this.getAttribute("data-gid"),this.getAttribute("data-field"),v);
  });

  els=document.querySelectorAll(".adm-btn[data-fav]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    setGameField(this.getAttribute("data-week"),this.getAttribute("data-gid"),"favSide",this.getAttribute("data-fav"));
    draw();
  });

  els=document.querySelectorAll(".adm-btn[data-result]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    setResult(this.getAttribute("data-week"),this.getAttribute("data-gid"),this.getAttribute("data-result"));
  });
}

loadData();
</script>
