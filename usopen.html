<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#fdf8ee;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select,a{font-family:'Nunito',sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none}

/* TOPBAR */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;overflow:hidden;text-align:center}
.app-name{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:7px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;display:block}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--text);box-shadow:2px 2px 0 var(--border);white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}

/* BUTTONS */
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s;background:#ffffff;color:var(--text);cursor:pointer}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold);color:var(--text)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-red{background:var(--red-bg);color:var(--red)}
.btn-blue{background:var(--blue-bg);color:var(--blue)}

/* SCORECERY logo */
.scorecery-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:inherit;color:#ffffff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111111;text-shadow:1px 1px 0 #111111,2px 2px 0 #111111,3px 3px 0 #111111,5px 5px 0 #065f46,7px 7px 0 #064e3b,8px 8px 0 #022c22;paint-order:stroke fill}

/* PAGE TABS */
.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 8px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex:1;text-align:center;font-family:'Nunito',sans-serif;cursor:pointer}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* USER SELECT */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:150px;box-shadow:3px 3px 0 var(--border);cursor:pointer}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}
.user-btn-sub{font-size:8px;font-weight:700;color:var(--muted);margin-top:3px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CONTENT WRAP */
.content{padding:10px 12px 80px;max-width:540px;margin:0 auto}

/* BARS */
.info-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--cream);border-bottom:2px solid var(--border2);font-size:9px;font-weight:700;color:var(--muted);flex-shrink:0}
.lb-note{font-size:11px;font-weight:700;color:var(--muted);background:#ffffff;border:2px solid var(--border2);border-radius:10px;padding:20px;margin:10px 0;text-align:center;line-height:1.8}

/* CAP SUMMARY CARD */
.cap-card{background:#ffffff;border:2px solid var(--border);border-radius:12px;padding:12px 14px;margin:10px 0;box-shadow:3px 3px 0 var(--border)}
.cap-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cap-left{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.cap-amount{font-size:16px;font-weight:900}
.cap-amount.over{color:var(--red)}
.cap-amount.ok{color:var(--green)}
.cap-remaining{font-size:10px;font-weight:800;color:var(--muted)}
.cap-track{height:8px;background:var(--border2);border-radius:4px;overflow:hidden;margin-bottom:10px}
.cap-fill{height:100%;border-radius:4px;transition:width .3s}

/* ROSTER CHIPS */
.roster-row{display:flex;gap:6px;flex-wrap:wrap}
.rchip{padding:5px 11px;border-radius:20px;border:2px solid var(--border2);background:var(--cream);font-size:9px;font-weight:800;color:var(--muted);cursor:pointer;white-space:nowrap}
.rchip:active{opacity:.7}
.rchip.filled{border-color:var(--border);background:#ffffff;color:var(--text)}
.rchip.active-slot{border-color:var(--gold-dark)!important;background:var(--gold-bg)!important;color:var(--gold-dark)!important}

/* TIER BADGES */
.tbadge{display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;white-space:nowrap}
.t1{background:#fef3c7;color:#92400e;border:1px solid #f59e0b}
.t2{background:#e0e7ff;color:#3730a3;border:1px solid #6366f1}
.t3{background:#dcfce7;color:#166534;border:1px solid #22c55e}
.t4{background:#f3f4f6;color:#374151;border:1px solid #9ca3af}

/* GOLFER PICK LIST */
.pick-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#ffffff;border:2px solid var(--border2);border-radius:10px;margin:4px 0;cursor:pointer}
.pick-row:active{background:var(--cream)}
.pick-row.selected{border-color:var(--blue);background:var(--blue-bg)}
.pick-row.over-cap{opacity:.4;cursor:default}
.pick-row.in-roster{border-color:var(--border2);background:var(--cream);opacity:.6}
.pr-name{flex:1;font-size:12px;font-weight:800;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr-salary{font-size:10px;font-weight:900;width:50px;text-align:right;flex-shrink:0}
.pr-score{font-size:11px;font-weight:900;width:32px;text-align:right;flex-shrink:0}
.pr-pos{font-size:10px;font-weight:700;color:var(--muted);width:26px;text-align:center;flex-shrink:0}

/* SEARCH + FILTER */
.search-box{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;background:var(--cream);box-shadow:2px 2px 0 var(--border);outline:none;margin-bottom:7px}
.search-box:focus{border-color:var(--blue);box-shadow:2px 2px 0 var(--blue)}
.filter-bar{display:flex;gap:5px;margin-bottom:8px;overflow-x:auto}
.filter-bar::-webkit-scrollbar{display:none}
.ftab{padding:4px 12px;font-size:9px;font-weight:800;border:2px solid var(--border2);border-radius:20px;background:#ffffff;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;flex-shrink:0}
.ftab.active{background:var(--border);color:#ffffff;border-color:var(--border)}
.ftab:active{opacity:.7}

/* GOLFER ROW (leaderboard) */
.g-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#ffffff;border:2px solid var(--border);border-radius:10px;margin:5px 0;box-shadow:3px 3px 0 var(--border)}
.g-row.cut{opacity:.5;border-color:var(--border2);box-shadow:none}
.g-row.mypick{border-color:var(--gold-dark);background:var(--gold-bg)}
.g-pos{font-size:13px;font-weight:900;color:var(--muted);width:26px;text-align:center;flex-shrink:0}
.g-name{flex:1;font-size:12px;font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.g-sub{font-size:9px;color:var(--muted);font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-thru{font-size:9px;font-weight:700;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.g-score{font-size:14px;font-weight:900;width:40px;text-align:right;flex-shrink:0}
.sc-under{color:var(--red)}
.sc-over{color:#666}
.sc-even{color:var(--text)}
.live-pip{font-size:7px;font-weight:900;background:var(--red);color:#fff;border-radius:4px;padding:1px 5px;text-transform:uppercase;flex-shrink:0}
.cut-pip{font-size:7px;font-weight:900;background:var(--border2);color:var(--muted);border-radius:4px;padding:1px 5px;text-transform:uppercase;flex-shrink:0}
.my-pip{font-size:7px;font-weight:900;background:var(--gold);color:var(--text);border-radius:4px;padding:1px 5px;flex-shrink:0}

/* POOL LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#ffffff;border:2px solid var(--border);border-radius:10px;margin:5px 0;box-shadow:3px 3px 0 var(--border)}
.lb-row.me{border-color:var(--blue);background:var(--blue-bg)}

/* SECTION LABEL */
.sec{font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:14px 0 7px}

/* ADMIN */
.adm-card{background:#ffffff;border:2px solid var(--border);border-radius:12px;padding:14px;margin:10px 0;box-shadow:3px 3px 0 var(--border)}
.adm-input{width:100%;padding:8px 10px;border:2px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;background:var(--cream);box-shadow:2px 2px 0 var(--border);outline:none}
.adm-row{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--border2)}
.adm-row:last-child{border-bottom:none}
.adm-name{flex:1;font-size:11px;font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);animation:livePulse 1.4s ease infinite;margin-right:4px;vertical-align:middle}
</style>
</head>
<body>
<div id="root" style="display:flex;flex-direction:column;min-height:100vh"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted);font-weight:700">Loading…</div></div>
<div id="toast"></div>
<script>
// ── URL PARAMS ──────────────────────────────────────────────────────────────
var GROUP_ID=(function(){var m=location.search.match(/[?&]group=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var URL_USER=(function(){var m=location.search.match(/[?&]user=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();

// ── FIREBASE ────────────────────────────────────────────────────────────────
var DB=null;
try{
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks"});
}catch(e){}
DB=firebase.database();

// ── CONSTANTS ───────────────────────────────────────────────────────────────
var BASE=GROUP_ID?"groups/"+GROUP_ID+"/data/usopen":"usopen2026";
var CAP=50000, SLOTS=6, YEAR=2026;
var TIERS=[
  {id:"t1",label:"Tier 1",salary:12000,cls:"t1"},
  {id:"t2",label:"Tier 2",salary:9000, cls:"t2"},
  {id:"t3",label:"Tier 3",salary:7000, cls:"t3"},
  {id:"t4",label:"Tier 4",salary:5000, cls:"t4"},
];
var TIER_ORDER={t1:0,t2:1,t3:2,t4:3};
// Scoring: points by finish position
var POS_PTS={1:50,2:40,3:35,4:30,5:25,6:22,7:20,8:18,9:16,10:14,11:13,12:12,13:11,14:10,15:9,16:8,17:7,18:6,19:5,20:4,21:3,22:3,23:3,24:2,25:2,26:2,27:2,28:2,29:1,30:1,31:1,32:1,33:1,34:1,35:1,36:1,37:1,38:1,39:1,40:1};
var MASTER_PW="Sloop";

// 2026 US Open DraftKings odds (Jun 17, 2026)
var HARDCODED_ODDS=[
  {name:"Scottie Scheffler",odds:450},{name:"Rory McIlroy",odds:930},
  {name:"Jon Rahm",odds:1175},{name:"Xander Schauffele",odds:1900},
  {name:"Cameron Young",odds:1900},{name:"Tommy Fleetwood",odds:2200},
  {name:"Matt Fitzpatrick",odds:2300},{name:"Ludvig Aberg",odds:2000},
  {name:"Bryson DeChambeau",odds:2000},{name:"Sam Burns",odds:3600},
  {name:"Si Woo Kim",odds:3600},{name:"Brooks Koepka",odds:2200},
  {name:"Tyrrell Hatton",odds:4400},{name:"Justin Thomas",odds:3500},
  {name:"Wyndham Clark",odds:3500},{name:"Collin Morikawa",odds:4000},
  {name:"Russell Henley",odds:4000},{name:"Patrick Cantlay",odds:5000},
  {name:"Viktor Hovland",odds:5000},{name:"Hideki Matsuyama",odds:5500},
  {name:"Joaquin Niemann",odds:5500},{name:"Jordan Spieth",odds:6000},
  {name:"Aaron Rai",odds:10500},{name:"Min Woo Lee",odds:6000},
  {name:"Robert MacIntyre",odds:6000},{name:"Cameron Smith",odds:6500},
  {name:"Ben Griffin",odds:6500},{name:"Kristoffer Reitan",odds:6500},
  {name:"Rasmus Neergaard-Petersen",odds:7000},{name:"Tony Finau",odds:7000},
  {name:"Jason Day",odds:7000},{name:"Will Zalatoris",odds:7000},
  {name:"Maverick McNealy",odds:7500},{name:"Jake Knapp",odds:8000},
  {name:"J.T. Poston",odds:8000},{name:"Sepp Straka",odds:8000},
  {name:"Rickie Fowler",odds:8000},{name:"Akshay Bhatia",odds:8000},
  {name:"Jacob Bridgeman",odds:8000},{name:"Kurt Kitayama",odds:8000},
  {name:"Alex Fitzpatrick",odds:8000},{name:"Sahith Theegala",odds:10000},
  {name:"Harris English",odds:10000},{name:"Corey Conners",odds:10000},
  {name:"Justin Rose",odds:3500},{name:"Shane Lowry",odds:4500},
  {name:"Chris Gotterup",odds:4500},{name:"Patrick Reed",odds:4000},
  {name:"J.J. Spaun",odds:4000},{name:"Nick Dunlap",odds:10000},
  {name:"Keegan Bradley",odds:12000},{name:"Tom Kim",odds:12000},
  {name:"Adam Scott",odds:12000},{name:"Billy Horschel",odds:12000},
  {name:"Denny McCarthy",odds:15000},{name:"Eric Cole",odds:15000},
  {name:"Adam Hadwin",odds:15000},{name:"Sungjae Im",odds:15000},
  {name:"Keith Mitchell",odds:15000},{name:"Davis Riley",odds:15000},
  {name:"Stephan Jaeger",odds:15000},{name:"Austin Eckroat",odds:15000},
  {name:"Lucas Glover",odds:15000},{name:"Bud Cauley",odds:20000},
  {name:"Emiliano Grillo",odds:20000},{name:"Mark Hubbard",odds:20000},
  {name:"Pierceson Coody",odds:20000},{name:"Danny Willett",odds:10000},
];

// ── STATE ───────────────────────────────────────────────────────────────────
var PARTS=[], _EM={};
var ST={
  page:"picks",
  user:URL_USER||null,
  admin:false,
  liveLoading:false,
  liveLastFetch:0,
  golfers:[],        // from ESPN
  field:{},          // from Firebase: id->{name,country}
  salaries:{},       // from Firebase: id->{name,salary,tier}
  picks:{},          // from Firebase: ukey->[id,...]
  locked:false,
  eventName:"US Open "+YEAR,
  eventStatus:"pre",
  // picks tab state
  activeSlot:null,
  search:"",
  filterTier:"all",
  // admin state
  admSearch:"",
};

// ── UTILS ───────────────────────────────────────────────────────────────────
function ukey(n){return(n||"").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,"");}
function x(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function pem(n){return _EM[n]?'<span style="margin-right:3px">'+_EM[n]+'</span>':""; }
function fmtSal(n){return "$"+(Number(n)||0).toLocaleString();}
function fmtOdds(n){return n>0?"+"+n:String(n);}

var _tt=null;
function toast(m){var t=document.getElementById("toast");if(!t)return;t.innerHTML=m;t.className="show";clearTimeout(_tt);_tt=setTimeout(function(){t.className="";},2400);}

function scColor(s){
  if(s===null||s===undefined)return"";
  if(s==="E"||s===0)return"sc-even";
  if(typeof s==="number")return s<0?"sc-under":"sc-over";
  if(typeof s==="string")return s.startsWith("-")?"sc-under":(s.startsWith("+")?"sc-over":"sc-even");
  return"";
}
function fmtScore(s){
  if(s===null||s===undefined)return"—";
  if(s==="E"||s===0)return"E";
  if(typeof s==="number")return s>0?"+"+s:String(s);
  return String(s);
}

// ── SALARY HELPERS ──────────────────────────────────────────────────────────
function salOf(id){return Number((ST.salaries[id]||{}).salary)||0;}
function tierOf(id){return(ST.salaries[id]||{}).tier||null;}
function tierMeta(tid){return TIERS.find(function(t){return t.id===tid;})||TIERS[3];}
function oddsToImplied(o){return o>0?100/(o+100):Math.abs(o)/(Math.abs(o)+100);}
function oddsToTier(o){var p=oddsToImplied(o);if(p>=0.12)return"t1";if(p>=0.05)return"t2";if(p>=0.02)return"t3";return"t4";}
function oddsToSalary(o){var p=oddsToImplied(o);var r=Math.round((5000+p*60000)/500)*500;return Math.min(15000,Math.max(5000,r));}

// ── ROSTER HELPERS ──────────────────────────────────────────────────────────
function myRoster(){return ST.picks[ukey(ST.user)]||[];}
function rosterSpend(r){return(r||[]).reduce(function(s,id){return s+salOf(id);},0);}
function inRoster(id,r){return(r||[]).indexOf(id)>=0;}

// ── SCORING ─────────────────────────────────────────────────────────────────
function golferPts(id){
  var g=mergedGolfers().find(function(g){return g.id===id;});
  if(!g||g.cut)return 0;
  return POS_PTS[parseInt(g.pos)||999]||0;
}
function rosterPts(r){return(r||[]).reduce(function(s,id){return s+golferPts(id);},0);}

// ── MERGED GOLFER LIST ──────────────────────────────────────────────────────
function mergedGolfers(){
  var seen={}, list=[];
  ST.golfers.forEach(function(g){seen[g.id]=true;list.push(g);});
  Object.keys(ST.field).forEach(function(id){
    if(seen[id])return;
    var f=ST.field[id];
    list.push({id:id,name:f.name||id,pos:"",score:null,thru:"",cut:false,country:f.country||""});
  });
  list.sort(function(a,b){
    var pa=parseInt(a.pos)||9999,pb=parseInt(b.pos)||9999;
    if(pa!==pb)return pa-pb;
    return(a.name||"").localeCompare(b.name||"");
  });
  return list;
}

// ── FIREBASE LOAD ────────────────────────────────────────────────────────────
function loadData(){
  function s1(){
    if(!GROUP_ID){s2();return;}
    DB.ref("groups/"+GROUP_ID).once("value",function(sn){
      var g=sn.val()||{};
      if(g.players&&g.players.length)PARTS=g.players;
      s2();
    },function(){s2();});
  }
  function s2(){
    var done=0,total=PARTS.length;
    if(!total){s3();return;}
    PARTS.forEach(function(p){
      DB.ref("users/"+ukey(p)+"/emoji").once("value",
        function(sn){if(sn.val())_EM[p]=sn.val();done++;if(done===total)s3();},
        function(){done++;if(done===total)s3();});
    });
  }
  function s3(){
    DB.ref("globalSettings/masterPw").once("value",function(sn){if(sn.val())MASTER_PW=sn.val();});
    DB.ref(BASE+"/field").on("value",function(sn){ST.field=sn.val()||{};draw();});
    DB.ref(BASE+"/salaries").on("value",function(sn){ST.salaries=sn.val()||{};draw();});
    DB.ref(BASE+"/picks").on("value",function(sn){ST.picks=sn.val()||{};draw();});
    DB.ref(BASE+"/locked").on("value",function(sn){ST.locked=!!sn.val();draw();});

}

// ── ESPN FETCH ───────────────────────────────────────────────────────────────
var _espnId=null;
function fetchLive(force){
  if(ST.liveLoading)return;
  if(!force&&(Date.now()-ST.liveLastFetch)<60000&&ST.golfers.length)return;
  ST.liveLoading=true; draw();
  fetch("https://site.api.espn.com/apis/site/v2/sports/golf/pga/schedule?dates="+YEAR)
    .then(function(r){return r.json();})
    .then(function(d){
      var evs=(d.seasons&&d.seasons[0]&&d.seasons[0].events)||d.events||[];
      for(var i=0;i<evs.length;i++){
        var nm=(evs[i].name||"").toLowerCase();
        if(nm.indexOf("u.s. open")>=0||nm.indexOf("us open")>=0){_espnId=evs[i].id||null;ST.eventName=evs[i].name||ST.eventName;break;}
      }
      var url=_espnId?"https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard/"+_espnId:"https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard";
      return fetch(url);
    })
    .catch(function(){return fetch("https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard");})
    .then(function(r){return r.json();})
    .then(function(d){ST.liveLoading=false;ST.liveLastFetch=Date.now();parseESPN(d);draw();})
    .catch(function(){ST.liveLoading=false;draw();});
}
function parseESPN(d){
  var ev=(d.events&&d.events[0])||d;
  var comp=(ev.competitions&&ev.competitions[0])||{};
  var comps=comp.competitors||ev.competitors||[];
  ST.eventStatus=((comp.status&&comp.status.type&&comp.status.type.state)||"pre");
  var golfers=[];
  comps.forEach(function(c){
    var ath=c.athlete||{};
    var name=ath.displayName||ath.fullName||c.displayName||"";
    if(!name)return;
    var pos=c.sortOrder||"";
    if(c.status&&c.status.position)pos=c.status.position.id||pos;
    var score=null;
    if(typeof c.score==="number")score=c.score;
    else if(c.score&&c.score.value!==undefined)score=c.score.value;
    var thru="";
    if(c.linescores&&c.linescores.length){
      var pl=c.linescores.filter(function(l){return l.value!==undefined;});
      thru=pl.length>=18?"F":pl.length>0?String(pl.length):"";
    } else if(c.status&&c.status.type){thru=c.status.type.shortDetail||"";}
    var cut=!!(c.status&&c.status.type&&(c.status.type.shortDetail||"").toLowerCase().indexOf("cut")>=0);
    var country=(ath.flag&&ath.flag.alt)||(ath.country&&(ath.country.abbreviation||ath.country.displayName))||"";
    golfers.push({id:String(ath.id||name),name:name,pos:String(pos),score:score,thru:thru,cut:cut,country:country});
  });
  golfers.sort(function(a,b){return(parseInt(a.pos)||9999)-(parseInt(b.pos)||9999);});
  ST.golfers=golfers;
}

function renderPicker(roster,spend){
  var h='<div class="sec">Slot '+(ST.activeSlot+1)+' — tap a golfer &nbsp;<button class="btn btn-ghost" id="b-close-picker" style="font-size:9px;padding:2px 8px">&#10005; Close</button></div>';
  h+='<input class="search-box" id="golfer-search" placeholder="Search golfer…" autocomplete="off" value="'+x(ST.search)+'">';
  h+='<div class="filter-bar">';
  [{id:"all",label:"All"}].concat(TIERS).forEach(function(t){
    h+='<button class="ftab'+(ST.filterTier===t.id?" active":"")+'" data-ftier="'+t.id+'">'+t.label+'</button>';
  });
  h+='</div>';

  var q=(ST.search||"").toLowerCase();
  var all=mergedGolfers().filter(function(g){
    if(!g.name||!ST.salaries[g.id])return false;
    if(q&&g.name.toLowerCase().indexOf(q)<0)return false;
    if(ST.filterTier!=="all"&&tierOf(g.id)!==ST.filterTier)return false;
    return true;
  });
  all.sort(function(a,b){
    var ta=TIER_ORDER[tierOf(a.id)||"t4"]||3,tb=TIER_ORDER[tierOf(b.id)||"t4"]||3;
    if(ta!==tb)return ta-tb;
    return salOf(b.id)-salOf(a.id);
  });

  if(!all.length){
    if(!Object.keys(ST.salaries).length)h+='<div class="lb-note">⏳ Loading salaries from Firebase…</div>';
    else h+='<div class="lb-note">No golfers match.</div>';
    return h;
  }

  var currentInSlot=roster[ST.activeSlot]||null;
  all.forEach(function(g){
    var sal=salOf(g.id);
    var tid=tierOf(g.id);
    var tm=tid?tierMeta(tid):null;
    var isCurrent=g.id===currentInSlot;
    var alreadyIn=!isCurrent&&inRoster(g.id,roster);
    var wouldOver=!isCurrent&&!alreadyIn&&(spend-salOf(currentInSlot||"")+sal>CAP);
    var cls="pick-row";
    if(isCurrent)cls+=" selected";
    else if(alreadyIn)cls+=" in-roster";
    else if(wouldOver)cls+=" over-cap";
    var canPick=!wouldOver&&!alreadyIn;
    h+='<div class="'+cls+'" '+(canPick||isCurrent?'data-pick="'+x(g.id)+'"':'')+' >';
    if(tm)h+='<span class="tbadge '+tm.cls+'">'+tm.label+'</span>';
    h+='<div class="pr-name">'+x(g.name)+'</div>';
    if(ST.eventStatus!=="pre"&&!g.cut&&g.pos){
      h+='<div class="pr-pos">'+x(g.pos)+'</div>';
      h+='<div class="pr-score '+scColor(g.score)+'">'+fmtScore(g.score)+'</div>';
    }
    if(g.cut)h+='<span class="cut-pip">CUT</span>';
    h+='<div class="pr-salary" style="color:'+(wouldOver?"var(--red)":"var(--text)")+'">'+fmtSal(sal)+'</div>';
    if(isCurrent)h+='<span style="font-size:12px;color:var(--green)">&#10003;</span>';
    else if(alreadyIn)h+='<span style="font-size:9px;color:var(--muted)">in roster</span>';

  });
  return h;
}

  // Odds import
  h+='<div class="adm-card">';
  h+='<div style="font-size:12px;font-weight:900;margin-bottom:6px">Import Field + Salaries</div>';
  h+='<div style="font-size:9px;color:var(--muted);font-weight:700;margin-bottom:10px">'+fieldCount+' golfers in field · '+salCount+' with salaries</div>';
  h+='<button class="btn btn-gold" id="b-import-odds" style="width:100%;padding:10px;font-size:11px;margin-bottom:6px">&#128203; Use 2026 US Open DK Odds ('+HARDCODED_ODDS.length+' golfers)</button>';
  h+='<div style="font-size:9px;color:var(--muted);font-weight:700;margin-bottom:10px">Writes all golfers + salaries based on DraftKings odds to Firebase. Do this once — survives deploys.</div>';
  // Paste import
  h+='<div style="font-size:10px;font-weight:800;margin-bottom:6px">Or paste names (one per line):</div>';
  h+='<textarea id="adm-paste" style="width:100%;height:80px;border:2px solid var(--border);border-radius:8px;padding:8px;font-size:11px;font-weight:700;font-family:\'Nunito\',sans-serif;background:var(--cream);resize:vertical;outline:none" placeholder="Scottie Scheffler&#10;Rory McIlroy&#10;..."></textarea>';
  h+='<button class="btn btn-blue" id="b-import-paste" style="margin-top:6px;font-size:10px;padding:7px 14px">&#8659; Import Names</button>';
  h+='<span id="paste-status" style="font-size:9px;color:var(--muted);font-weight:700;margin-left:8px"></span>';
  h+='</div>';

  // Add single golfer
  h+='<div class="adm-card">';
  h+='<div style="font-size:12px;font-weight:900;margin-bottom:8px">Add Golfer Manually</div>';
  h+='<div style="display:flex;gap:6px;margin-bottom:6px"><input class="adm-input" id="adm-name" placeholder="Full name" style="flex:1"><input class="adm-input" id="adm-country" placeholder="Country" style="width:80px"></div>';
  h+='<div style="display:flex;gap:5px;flex-wrap:wrap">';
  TIERS.forEach(function(t){h+='<button class="btn" data-add-tier="'+t.id+'" style="font-size:9px">'+t.label+' · '+fmtSal(t.salary)+'</button>';});
  h+='</div><div id="adm-add-err" style="font-size:9px;color:var(--red);min-height:14px;margin-top:4px;font-weight:700"></div>';
  h+='</div>';

  // Field list
  h+='<div class="adm-card">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
  h+='<div style="font-size:12px;font-weight:900">Field ('+all.length+')</div>';
  h+='<div style="display:flex;gap:5px"><button class="btn" id="b-autoseed" style="font-size:9px">&#9889; Auto-seed</button><button class="btn btn-gold" id="b-save-sal" style="font-size:9px">&#128190; Save</button><button class="btn btn-red" id="b-clear-field" style="font-size:9px">&#128465;</button></div>';
  h+='</div>';
  h+='<input class="adm-input" id="adm-search" placeholder="Search golfers…" value="'+x(ST.admSearch)+'" style="margin-bottom:8px">';

  if(!all.length){
    h+='<div style="text-align:center;padding:16px;color:var(--muted);font-size:11px;font-weight:700">No golfers yet. Use import above.</div>';
  } else {
    var q=ST.admSearch.toLowerCase();
    var filtered=all.filter(function(g){return !q||g.name.toLowerCase().indexOf(q)>=0;});
    filtered.forEach(function(g){
      var s=ST.salaries[g.id]||{};
      var tid=s.tier||"t4";
      var tm=tierMeta(tid);
      h+='<div class="adm-row">';
      h+='<span class="tbadge '+tm.cls+'" style="cursor:pointer" data-cycle="'+x(g.id)+'">'+tm.label+'</span>';
      h+='<div class="adm-name">'+x(g.name)+(g.country?' <span style="color:var(--dim);font-size:8px">'+x(g.country)+'</span>':'')+'</div>';
      h+='<select data-tier-for="'+x(g.id)+'" style="display:none"><option value="t1">T1</option><option value="t2">T2</option><option value="t3">T3</option><option value="t4"'+(tid==="t4"?" selected":"")+'>T4</option></select>';
      h+='<input data-sal-for="'+x(g.id)+'" type="number" step="500" min="500" max="20000" value="'+(s.salary||"")+'" style="width:72px;padding:4px 6px;border:2px solid var(--border2);border-radius:6px;font-size:11px;font-weight:800;font-family:inherit;background:var(--cream);outline:none" placeholder="$">';
      h+='<button data-del="'+x(g.id)+'" style="font-size:12px;color:var(--muted);background:none;padding:2px 4px;flex-shrink:0">&#10005;</button>';
      h+='</div>';
    });
    // Set initial tier select values
  }
  h+='</div>';
  return h;
}

// ── BIND ──────────────────────────────────────────────────────────────────────
function bind(){
  var els,i,el;

  // Tabs
  els=document.querySelectorAll(".ptab");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var pg=this.getAttribute("data-page");
    if(pg!=="admin")ST.admin=false;
    ST.page=pg; ST.activeSlot=null; ST.search="";
    if(pg==="live"||pg==="picks")fetchLive(false);
    draw();
  });

  // User select
  els=document.querySelectorAll(".user-btn");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ST.user=this.getAttribute("data-user");draw();});

  // Switch user
  el=document.getElementById("b-switch"); if(el)el.addEventListener("click",function(){ST.user=null;ST.activeRosterSlot=null;draw();});

  // Admin gear
  el=document.getElementById("b-admin-btn"); if(el)el.addEventListener("click",function(){
    var pw=prompt("Admin password:");
    if(!pw)return;
    if(pw===MASTER_PW){ST.admin=true;ST.page="admin";draw();}
    else toast("Wrong password");
  });

  // Refresh
  el=document.getElementById("b-refresh"); if(el)el.addEventListener("click",function(){fetchLive(true);toast("Refreshing…");});

  // Open picker from empty slot tap
  els=document.querySelectorAll("[data-edit-slot]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    if(ST.locked){toast("Picks are locked &#128274;");return;}
    ST.activeSlot=parseInt(this.getAttribute("data-edit-slot"));
    ST.search=""; draw();
  });

  // Close picker
  el=document.getElementById("b-close-picker"); if(el)el.addEventListener("click",function(){ST.activeSlot=null;ST.search="";draw();});

  // Search in picker
  el=document.getElementById("golfer-search");
  if(el){
    el.focus();
    el.addEventListener("input",function(){ST.search=this.value;draw();});
  }

  // Filter tier
  els=document.querySelectorAll("[data-ftier]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ST.filterTier=this.getAttribute("data-ftier");draw();});

  // Pick golfer
  els=document.querySelectorAll("[data-pick]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var gid=this.getAttribute("data-pick");
    if(!gid)return;
    var slot=ST.activeSlot; if(slot===null)return;
    var roster=myRoster().slice();
    while(roster.length<=slot)roster.push(null);
    var prev=roster.indexOf(gid);
    if(prev>=0&&prev!==slot)roster[prev]=null;
    roster[slot]=gid;
    // Find next empty slot
    var next=-1;
    for(var ni=0;ni<SLOTS;ni++){if(!roster[ni]){next=ni;break;}}
    ST.activeSlot=next<0?null:next;
    if(next<0)toast("&#10003; Roster complete!");
    saveRoster(roster.filter(function(_,ri){return ri<SLOTS;}));
    draw();
  });

  // Admin: exit
  el=document.getElementById("b-exit-admin"); if(el)el.addEventListener("click",function(){ST.admin=false;ST.page="picks";draw();});

  // Admin: lock toggle
  el=document.getElementById("b-toggle-lock"); if(el)el.addEventListener("click",function(){
    DB.ref(BASE+"/locked").set(!ST.locked);
    toast(!ST.locked?"&#128274; Picks locked":"&#128275; Picks unlocked");
  });

  // Admin: import hardcoded odds
  el=document.getElementById("b-import-odds"); if(el)el.addEventListener("click",function(){
    if(!confirm("Write "+HARDCODED_ODDS.length+" golfers + salaries to Firebase? This overwrites existing salary data."))return;
    var btn=this; btn.disabled=true; btn.textContent="Saving…";
    var updates={};
    HARDCODED_ODDS.forEach(function(od){
      var id=od.name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
      var tier=oddsToTier(od.odds), salary=oddsToSalary(od.odds);
      updates[BASE+"/field/"+id]={name:od.name,country:""};
      updates[BASE+"/salaries/"+id]={name:od.name,salary:salary,tier:tier,odds:od.odds};
    });
    DB.ref().update(updates,function(err){
      btn.disabled=false; btn.textContent="&#128203; Use 2026 US Open DK Odds ("+HARDCODED_ODDS.length+" golfers)";
      if(!err)toast("&#10003; Saved "+HARDCODED_ODDS.length+" golfers");
      else toast("Error saving");
    });
  });

  // Admin: paste import
  el=document.getElementById("b-import-paste"); if(el)el.addEventListener("click",function(){
    var ta=document.getElementById("adm-paste");
    var st=document.getElementById("paste-status");
    var raw=(ta?ta.value:"").trim();
    if(!raw){if(st)st.textContent="Nothing to import";return;}
    var lines=raw.split(/[\n,]+/).map(function(l){
      return l.replace(/^\s*\d+[\.\)]\s*/,"").replace(/\(a\)/gi,"").replace(/\s*\([^)]*\)$/,"").replace(/^\W+/,"").trim();
    }).filter(function(l){return l.length>2;});
    if(!lines.length){if(st)st.textContent="No names found";return;}
    var updates={},added=0,skipped=0;
    lines.forEach(function(name){
      var id=name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
      if(ST.field[id]){skipped++;return;}
      updates[BASE+"/field/"+id]={name:name,country:""};
      updates[BASE+"/salaries/"+id]={name:name,salary:tierMeta("t4").salary,tier:"t4"};
      added++;
    });
    if(!added){if(st)st.textContent="All already in field";return;}
    DB.ref().update(updates,function(err){
      if(!err){if(ta)ta.value="";if(st)st.textContent="&#10003; Added "+added+(skipped?" · "+skipped+" skipped":"");toast("Added "+added);}
      else{if(st)st.textContent="Error";}
    });
  });

  // Admin: add single golfer
  els=document.querySelectorAll("[data-add-tier]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var errEl=document.getElementById("adm-add-err");
    var nameInp=document.getElementById("adm-name");
    var countryInp=document.getElementById("adm-country");
    var name=(nameInp?nameInp.value:"").trim();
    if(!name){if(errEl)errEl.textContent="Enter a name";return;}
    var tid=this.getAttribute("data-add-tier");
    var id=name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
    var country=(countryInp?countryInp.value:"").trim();
    var updates={};
    updates[BASE+"/field/"+id]={name:name,country:country};
    updates[BASE+"/salaries/"+id]={name:name,salary:tierMeta(tid).salary,tier:tid};
    DB.ref().update(updates,function(err){
      if(!err){if(nameInp)nameInp.value="";if(errEl)errEl.textContent="";toast("&#10003; Added "+name);}
      else{if(errEl)errEl.textContent="Error saving";}
    });
  });

  // Admin: field search
  el=document.getElementById("adm-search"); if(el)el.addEventListener("input",function(){ST.admSearch=this.value;draw();});

  // Admin: cycle tier badge
  els=document.querySelectorAll("[data-cycle]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var gid=this.getAttribute("data-cycle");
    var sel=document.querySelector('[data-tier-for="'+gid+'"]');
    var inp=document.querySelector('[data-sal-for="'+gid+'"]');
    if(!sel)return;
    var order=["t1","t2","t3","t4"];
    var next=order[(order.indexOf(sel.value)+1)%order.length];
    sel.value=next;
    if(inp)inp.value=tierMeta(next).salary;
    var tm=tierMeta(next);
    this.className="tbadge "+tm.cls;
    this.textContent=tm.label;
  });

  // Admin: auto-seed
  el=document.getElementById("b-autoseed"); if(el)el.addEventListener("click",function(){
    var all=mergedGolfers();
    if(!all.length){toast("No golfers loaded");return;}
    all.forEach(function(g,idx){
      var tier=idx<10?"t1":idx<25?"t2":idx<50?"t3":"t4";
      var inp=document.querySelector('[data-sal-for="'+g.id+'"]');
      var sel=document.querySelector('[data-tier-for="'+g.id+'"]');
      if(inp)inp.value=tierMeta(tier).salary;
      if(sel)sel.value=tier;
    });
    toast("Auto-seeded — tap Save to commit");
  });

  // Admin: save salaries
  el=document.getElementById("b-save-sal"); if(el)el.addEventListener("click",function(){
    var all=mergedGolfers(), sal={};
    all.forEach(function(g){
      var inp=document.querySelector('[data-sal-for="'+g.id+'"]');
      var sel=document.querySelector('[data-tier-for="'+g.id+'"]');
      var salary=inp?parseInt(inp.value)||0:0;
      var tier=sel?sel.value:"t4";
      if(salary>0)sal[g.id]={name:g.name,salary:salary,tier:tier};
    });
    DB.ref(BASE+"/salaries").set(sal,function(err){
      if(!err)toast("&#10003; Salaries saved!");else toast("Error");
    });
  });

  // Admin: clear field
  el=document.getElementById("b-clear-field"); if(el)el.addEventListener("click",function(){
    if(!confirm("Clear ALL golfers and salaries?"))return;
    var u={}; u[BASE+"/field"]=null; u[BASE+"/salaries"]=null;
    DB.ref().update(u,function(){toast("Cleared");});
  });

  // Admin: delete single golfer
  els=document.querySelectorAll("[data-del]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var gid=this.getAttribute("data-del");
    if(!confirm("Remove this golfer?"))return;
    var u={}; u[BASE+"/field/"+gid]=null; u[BASE+"/salaries/"+gid]=null;
    DB.ref().update(u,function(){toast("Removed");});
  });

  // Set tier select values to match current data
  mergedGolfers().forEach(function(g){
    var sel=document.querySelector('[data-tier-for="'+g.id+'"]');
    if(sel)sel.value=tierOf(g.id)||"t4";
  });
}

// ── KICK OFF ─────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
