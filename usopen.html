<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – US Open Golf Pool</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#f8f5f0;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee;
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none}

/* SCORECERY logo */
.scorecery-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:inherit;color:#ffffff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111111;text-shadow:1px 1px 0 #111111,2px 2px 0 #111111,3px 3px 0 #111111,5px 5px 0 #065f46,7px 7px 0 #064e3b,8px 8px 0 #022c22;paint-order:stroke fill}

/* TOPBAR */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:9px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;text-align:center}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold);color:var(--text)}
.btn-green{background:var(--green-bg);color:var(--green)}

/* PAGE TABS */
.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 12px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;flex:1;text-align:center}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* TOAST */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(40px);background:#111111;color:#ffffff;font-size:10px;font-weight:800;font-family:'Nunito',sans-serif;padding:8px 16px;border-radius:40px;border:2px solid #333;box-shadow:3px 3px 0 rgba(0,0,0,.4);z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;max-width:300px;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MAIN */
.main{max-width:540px;margin:0 auto;padding:14px 12px 80px}

/* CARD */
.card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:3px 3px 0 var(--border)}

/* AUTH */
.auth-wrap{display:flex;flex-direction:column;align-items:center;padding:40px 20px 30px;gap:14px;text-align:center}
.auth-wrap h2{font-size:18px;font-weight:900}
.auth-wrap p{font-size:11px;color:var(--muted);font-weight:700;max-width:280px}
.auth-field{width:100%;max-width:320px;text-align:left}
.auth-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
.auth-input{width:100%;background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-weight:700;outline:none;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.auth-input:focus{border-color:var(--blue);box-shadow:2px 2px 0 var(--blue)}
.auth-btn{width:100%;max-width:320px;padding:11px;border-radius:10px;font-size:13px;font-weight:800;border:2px solid var(--border);cursor:pointer;background:var(--gold);color:var(--text);font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.auth-btn:active{transform:translate(3px,3px);box-shadow:none}
.auth-err{font-size:10px;color:var(--red);min-height:14px;font-weight:700;width:100%;max-width:320px;text-align:center}

/* LIVE DOT */
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);animation:livePulse 1.4s ease infinite;margin-right:4px;vertical-align:middle;flex-shrink:0}

/* BANNER */
.banner{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--green-bg);border-bottom:2px solid var(--border);font-size:10px;font-weight:800;color:var(--green)}

/* LEADERBOARD */
.golfer-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:2px solid var(--border);border-radius:10px;margin:5px 0;box-shadow:3px 3px 0 var(--border)}
.golfer-row.cut{opacity:.5;border-color:var(--border2);box-shadow:2px 2px 0 var(--border2)}
.golfer-pos{font-size:13px;font-weight:900;color:var(--muted);width:28px;text-align:center;flex-shrink:0}
.golfer-name{font-size:12px;font-weight:800;color:var(--text)}
.golfer-country{font-size:9px;color:var(--muted);font-weight:700}
.golfer-score{font-size:15px;font-weight:900;width:44px;text-align:right;flex-shrink:0}
.golfer-thru{font-size:9px;font-weight:700;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.score-under{color:#e85555}
.score-over{color:#666}
.score-even{color:var(--text)}
.live-label{font-size:7px;font-weight:900;background:var(--red);color:#fff;border-radius:4px;padding:1px 5px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.cut-label{font-size:7px;font-weight:900;background:var(--border2);color:var(--muted);border-radius:4px;padding:1px 5px;text-transform:uppercase;flex-shrink:0}

/* PICKS */
.golfer-pick-card{background:var(--card);border:2px solid var(--border);border-radius:12px;margin:8px 0;overflow:hidden;box-shadow:3px 3px 0 var(--border)}
.slot-header{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border2);background:var(--cream)}
.slot-num{font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;flex:1}
.slot-pts{font-size:9px;font-weight:800;color:var(--gold-dark);flex-shrink:0}
.slot-body{padding:10px 14px}
.slot-current{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:2px solid var(--border2);background:var(--cream);cursor:pointer;margin-bottom:4px}
.slot-current.has-pick{border-color:var(--blue);background:var(--blue-bg)}
.slot-current.correct{border-color:var(--green);background:var(--green-bg)}
.slot-current-name{flex:1;font-size:12px;font-weight:800;color:var(--text)}
.slot-search{width:100%;background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;outline:none;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border);margin-bottom:6px}
.slot-search:focus{border-color:var(--blue);box-shadow:2px 2px 0 var(--blue)}
.slot-options{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto}
.slot-option{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;border:2px solid var(--border2);background:#ffffff;cursor:pointer;font-family:'Nunito',sans-serif}
.slot-option:active{background:var(--blue-bg);border-color:var(--blue)}
.slot-option-name{flex:1;font-size:11px;font-weight:800;color:var(--text)}

/* POOL LB */
.lb-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border:2px solid var(--border);border-radius:10px;margin:5px 0;box-shadow:3px 3px 0 var(--border)}
.lb-row.me{border-color:var(--blue);background:var(--blue-bg)}
.lb-rank{font-size:14px;font-weight:900;color:var(--muted);width:24px;text-align:center;flex-shrink:0}
.lb-name{flex:1;font-size:12px;font-weight:800;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-pts{font-size:14px;font-weight:900;color:var(--text);width:40px;text-align:right;flex-shrink:0}

/* MISC */
.section-label{font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 8px;padding:0 2px}
.refresh-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:var(--cream);border-bottom:1px solid var(--border2);font-size:9px;font-weight:700;color:var(--muted)}
.refresh-btn{font-size:9px;font-weight:800;padding:4px 10px;border-radius:7px;border:2px solid var(--border);background:#ffffff;color:var(--text);box-shadow:2px 2px 0 var(--border)}
.refresh-btn:active{transform:translate(2px,2px);box-shadow:none}
.empty{text-align:center;padding:32px 20px;color:var(--muted);font-size:11px;font-weight:700}
.empty-icon{font-size:32px;margin-bottom:10px}
.lock-pill{display:inline-flex;align-items:center;gap:5px;font-size:8px;font-weight:800;padding:3px 9px;border-radius:20px;border:2px solid var(--border2);background:var(--cream);color:var(--muted)}
.lock-pill.open{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.lock-pill.locked{border-color:var(--red);background:var(--red-bg);color:var(--red)}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>

<script>
// ── FIREBASE ──────────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",
  authDomain:"rwc-picks.firebaseapp.com",
  databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",
  projectId:"rwc-picks"
});
var DB = firebase.database();

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
var BASE = "usopen2025";
var SLOTS = [
  {id:"winner", label:"Winner",  pts:5, topN:1},
  {id:"top5",   label:"Top 5",   pts:4, topN:5},
  {id:"top10",  label:"Top 10",  pts:3, topN:10},
  {id:"top20",  label:"Top 20",  pts:2, topN:20},
  {id:"top40",  label:"Top 40",  pts:1, topN:40},
];
var TOURNAMENT_YEAR = 2025;

// ── STATE ─────────────────────────────────────────────────────────────────────
var ST = {
  page: "leaderboard",
  user: null,
  uid: null,
  picks: {},
  liveLoading: false,
  liveLastFetch: 0,
  golfers: [],
  poolEntries: {},
  locked: false,
  activeSlot: null,
  slotSearch: "",
  eventName: "US Open "+TOURNAMENT_YEAR,
  eventStatus: "pre",
  authReady: false,       // true once we know auth state
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function ukey(n){ return (n||"").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,""); }
function x(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function el(id){ return document.getElementById(id); }

var _toastTimer=null;
function toast(msg,type){
  var t=el("toast"); if(!t) return;
  t.textContent=msg; t.className="show"+(type?" toast-"+type:"");
  clearTimeout(_toastTimer); _toastTimer=setTimeout(function(){t.className="";},2400);
}

function scoreColor(s){
  if(s===null||s===undefined) return "";
  if(s==="E"||s===0) return "score-even";
  if(typeof s==="number") return s<0?"score-under":"score-over";
  if(typeof s==="string") return s.startsWith("-")?"score-under":(s.startsWith("+")?"score-over":"score-even");
  return "";
}

function formatScore(s){
  if(s===null||s===undefined) return "—";
  if(s==="E"||s===0) return "E";
  if(typeof s==="number"){ return s>0?"+"+s:String(s); }
  return String(s);
}

// ── FIREBASE DATA ─────────────────────────────────────────────────────────────
function loadMyPicks(){
  if(!ST.uid) return;
  DB.ref(BASE+"/picks/"+ST.uid).on("value",function(sn){
    ST.picks=sn.val()||{};
    if(ST.authReady) draw();
  });
}

function savePick(slotId, golferId, golferName){
  if(!ST.uid){ toast("Sign in to save picks","err"); return; }
  var update={};
  update[slotId]={id:golferId,name:golferName};
  DB.ref(BASE+"/picks/"+ST.uid).update(update);
  ST.picks[slotId]={id:golferId,name:golferName};
  DB.ref(BASE+"/players/"+ST.uid).set({username:ST.user,uid:ST.uid,updatedAt:Date.now()});
  ST.activeSlot=null; ST.slotSearch="";
  toast("✓ Picked "+golferName);
  draw();
}

function loadPoolEntries(){
  DB.ref(BASE+"/players").on("value",function(sn){
    var players=sn.val()||{};
    var uids=Object.keys(players);
    if(!uids.length){ ST.poolEntries={}; draw(); return; }
    var done=0, entries={};
    uids.forEach(function(uid){
      DB.ref(BASE+"/picks/"+uid).once("value",function(psn){
        entries[uid]={username:players[uid].username, picks:psn.val()||{}};
        done++;
        if(done===uids.length){
          Object.keys(entries).forEach(function(u){ entries[u].pts=computePoints(entries[u].picks); });
          ST.poolEntries=entries;
          draw();
        }
      });
    });
  });
}

function watchLocked(){
  DB.ref(BASE+"/locked").on("value",function(sn){
    ST.locked=!!sn.val();
    if(ST.authReady) draw();
  });
}

function computePoints(picks){
  if(!ST.golfers||!ST.golfers.length) return 0;
  var pts=0;
  SLOTS.forEach(function(slot){
    var pick=picks[slot.id]; if(!pick) return;
    var g=ST.golfers.find(function(g){ return g.id===pick.id||g.name===pick.name; });
    if(!g) return;
    var pos=parseInt(g.pos)||999;
    if(pos<=slot.topN) pts+=slot.pts;
  });
  return pts;
}

// ── ESPN LIVE FETCH ───────────────────────────────────────────────────────────
function fetchLive(force){
  if(ST.liveLoading) return;
  var age=Date.now()-ST.liveLastFetch;
  if(!force&&age<60000&&ST.golfers.length) return;
  ST.liveLoading=true;
  if(ST.authReady) draw();

  // Try schedule first to find current US Open event ID
  fetch("https://site.api.espn.com/apis/site/v2/sports/golf/pga/schedule?dates="+TOURNAMENT_YEAR)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var events=[];
      if(data.seasons&&data.seasons[0]) events=data.seasons[0].events||[];
      else if(data.events) events=data.events;
      var usOpen=null;
      for(var i=0;i<events.length;i++){
        var nm=(events[i].name||"").toLowerCase();
        if(nm.indexOf("u.s. open")>=0||nm.indexOf("us open")>=0){ usOpen=events[i]; break; }
      }
      if(usOpen){ ST.eventName=usOpen.name||ST.eventName; }
      var lbUrl=usOpen&&usOpen.id
        ?"https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard/"+usOpen.id
        :"https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard";
      return fetch(lbUrl);
    })
    .catch(function(){
      return fetch("https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard");
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      ST.liveLoading=false; ST.liveLastFetch=Date.now();
      parseESPNGolfers(data);
      if(ST.authReady) draw();
    })
    .catch(function(){
      ST.liveLoading=false;
      ST.golfers=[];
      if(ST.authReady) draw();
    });
}

function parseESPNGolfers(data){
  var golfers=[];
  var event=(data.events&&data.events[0])||data;
  var comp=(event.competitions&&event.competitions[0])||{};
  var competitors=comp.competitors||[];
  if(!competitors.length&&event.competitors) competitors=event.competitors;

  var compStatus=comp.status||{};
  var statusType=compStatus.type||{};
  ST.eventStatus=statusType.state||"pre";

  competitors.forEach(function(c){
    var athlete=c.athlete||{};
    var name=athlete.displayName||athlete.fullName||c.displayName||"";
    if(!name) return;
    var pos=c.sortOrder||"";
    if(c.status&&c.status.position) pos=c.status.position.id||pos;
    var relScore=null;
    if(typeof c.score==="number") relScore=c.score;
    else if(c.score&&c.score.value!==undefined) relScore=c.score.value;
    else if(c.statistics){
      var tot=c.statistics.find(function(s){ return s.name==="totalScore"||s.abbreviation==="TOT"; });
      if(tot) relScore=parseInt(tot.value)||0;
    }
    var isCut=!!(c.status&&c.status.type&&((c.status.type.shortDetail||"").toLowerCase().indexOf("cut")>=0));
    var thru="";
    if(c.linescores&&c.linescores.length){
      var played=c.linescores.filter(function(l){ return l.value!==undefined&&l.value!==null; });
      thru=played.length>=18?"F":played.length>0?String(played.length):"";
    } else if(c.status&&c.status.type){
      thru=c.status.type.shortDetail||"";
    }
    var country=(athlete.flag&&athlete.flag.alt)||(athlete.country&&(athlete.country.abbreviation||athlete.country.displayName))||"";
    golfers.push({
      id:String(athlete.id||name),
      name:name,
      pos:String(pos),
      score:relScore,
      thru:thru,
      cut:isCut,
      country:country,
    });
  });

  golfers.sort(function(a,b){
    var pa=parseInt(a.pos)||999, pb=parseInt(b.pos)||999;
    return pa-pb;
  });
  ST.golfers=golfers;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function draw(){
  if(!ST.authReady) return;
  if(!ST.user){ renderAuth(); return; }
  renderApp();
}

function topbarHtml(){
  var h='<div class="topbar">';
  h+='<div class="topbar-left"><div style="font-size:20px">⛳</div></div>';
  h+='<div class="topbar-center">';
  h+='<div style="font-size:15px;font-weight:900;line-height:1"><span class="scorecery-logo" style="font-size:15px">SCORECERY</span></div>';
  h+='<span style="font-size:7px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">US Open '+TOURNAMENT_YEAR+' Pool</span>';
  h+='</div>';
  h+='<div class="topbar-right">';
  if(ST.user){
    h+='<span style="font-size:9px;font-weight:800;color:var(--muted);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+x(ST.user)+'</span>';
    h+='<button class="btn btn-ghost" id="btn-signout" style="font-size:9px;padding:3px 8px">↩</button>';
  }
  h+='</div></div>';
  return h;
}

function renderAuth(){
  var h=topbarHtml();
  h+='<div class="auth-wrap">';
  h+='<div style="font-size:40px">⛳</div>';
  h+='<h2>US Open Pool</h2>';
  h+='<p>Sign in with your Scorecery username and password to make picks.</p>';
  h+='<div class="auth-err" id="auth-err"></div>';
  h+='<div class="auth-field"><label class="auth-label">Username</label>';
  h+='<input class="auth-input" id="auth-user" placeholder="Your username" autocomplete="username" autocapitalize="none" spellcheck="false"></div>';
  h+='<div class="auth-field"><label class="auth-label">Password</label>';
  h+='<input class="auth-input" id="auth-pw" type="password" placeholder="Password"></div>';
  h+='<button class="auth-btn" id="auth-go">Sign In →</button>';
  h+='<div style="font-size:10px;color:var(--muted);font-weight:700">Use your Scorecery username &amp; password</div>';
  h+='</div>';
  el("root").innerHTML=h;

  function trySignIn(){
    var uname=(el("auth-user").value||"").trim();
    var pw=(el("auth-pw").value||"").trim();
    var errEl=el("auth-err");
    if(!uname||!pw){ errEl.textContent="Enter username and password"; return; }
    var btn=el("auth-go"); btn.textContent="Signing in…"; btn.disabled=true;
    var k=uname.toLowerCase().replace(/[^a-z0-9_]/g,"");
    DB.ref("users/"+k).once("value",function(sn){
      var u=sn.val();
      if(!u){ errEl.textContent="Username not found"; btn.textContent="Sign In →"; btn.disabled=false; return; }
      if(u.password&&u.password!==pw){ errEl.textContent="Wrong password"; btn.textContent="Sign In →"; btn.disabled=false; return; }
      ST.user=u.username||uname; ST.uid=k;
      loadMyPicks(); loadPoolEntries(); fetchLive(true);
      draw();
    });
  }

  el("auth-go").addEventListener("click",trySignIn);
  el("auth-pw").addEventListener("keydown",function(e){ if(e.key==="Enter") trySignIn(); });
  el("auth-user").addEventListener("keydown",function(e){ if(e.key==="Enter") el("auth-pw").focus(); });
  el("btn-signout").addEventListener("click",function(){ ST.user=null; ST.uid=null; ST.picks={}; draw(); });
}

function renderApp(){
  var h=topbarHtml();
  if(ST.eventStatus==="in"){
    h+='<div class="banner"><span class="live-dot"></span>Live Scoring · '+x(ST.eventName)+'</div>';
  }
  h+='<div class="page-bar">';
  [["leaderboard","⛳ Live Board"],["mypicks","📝 My Picks"],["pool","🏆 Pool"]].forEach(function(t){
    h+='<button class="ptab'+(ST.page===t[0]?" active":"")+'" data-tab="'+t[0]+'">'+t[1]+'</button>';
  });
  h+='</div>';
  h+='<div class="main">';
  if(ST.page==="leaderboard") h+=renderLeaderboard();
  else if(ST.page==="mypicks") h+=renderMyPicks();
  else if(ST.page==="pool")    h+=renderPool();
  h+='</div>';
  el("root").innerHTML=h;

  document.querySelectorAll(".ptab").forEach(function(btn){
    btn.addEventListener("click",function(){
      ST.page=this.getAttribute("data-tab");
      ST.activeSlot=null; ST.slotSearch="";
      if(ST.page==="pool"){ loadPoolEntries(); fetchLive(false); }
      else fetchLive(false);
      draw();
    });
  });

  var sob=el("btn-signout");
  if(sob) sob.addEventListener("click",function(){ ST.user=null; ST.uid=null; ST.picks={}; draw(); });

  var rb=el("btn-refresh");
  if(rb) rb.addEventListener("click",function(){ fetchLive(true); toast("Refreshing…","info"); });

  // Slot open/close
  document.querySelectorAll("[data-open-slot]").forEach(function(btn){
    btn.addEventListener("click",function(){
      if(ST.locked){ toast("Picks are locked ⛳"); return; }
      var sid=this.getAttribute("data-open-slot");
      ST.activeSlot=(ST.activeSlot===sid)?null:sid;
      ST.slotSearch="";
      draw();
    });
  });

  // Slot search
  var ss=el("slot-search-input");
  if(ss){
    ss.value=ST.slotSearch;
    ss.focus();
    ss.addEventListener("input",function(){ ST.slotSearch=this.value; renderSlotOptions(); });
  }
  if(ST.activeSlot) renderSlotOptions();

  // Slot picks (delegated — options rendered separately)
  document.querySelectorAll("[data-pick-golfer]").forEach(function(btn){
    btn.addEventListener("click",function(){
      savePick(ST.activeSlot,this.getAttribute("data-pick-golfer"),this.getAttribute("data-pick-name"));
    });
  });
}

// ── LEADERBOARD PAGE ──────────────────────────────────────────────────────────
function renderLeaderboard(){
  var h='';
  h+='<div class="refresh-bar">';
  var ago=ST.liveLastFetch?Math.round((Date.now()-ST.liveLastFetch)/1000):null;
  var agoStr=ago===null?"—":ago<5?"just now":ago+"s ago";
  h+='<span>';
  if(ST.liveLoading) h+='⏳ Fetching…';
  else if(ST.eventStatus==="in") h+='<span class="live-dot"></span>Live · '+agoStr;
  else if(ST.eventStatus==="post") h+='✅ Final · '+x(ST.eventName);
  else h+='⛳ '+x(ST.eventName);
  h+='</span>';
  h+='<button class="refresh-btn" id="btn-refresh">↻ Refresh</button>';
  h+='</div>';

  if(ST.liveLoading&&!ST.golfers.length){
    h+='<div class="empty"><div class="empty-icon">⛳</div>Loading golfers…</div>';
    return h;
  }
  if(!ST.golfers.length){
    h+='<div class="empty"><div class="empty-icon">⛳</div>';
    h+='No leaderboard data yet.<br><span style="font-size:10px;color:var(--dim)">Check back when the tournament begins — June 12, 2025.</span>';
    h+='</div>';
    return h;
  }

  var leader=ST.golfers[0];
  if(leader){
    h+='<div class="card" style="text-align:center;padding:14px;border-color:var(--gold-dark);background:var(--gold-bg);margin-bottom:14px">';
    h+='<div style="font-size:9px;font-weight:800;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">🏆 Leader</div>';
    h+='<div style="font-size:18px;font-weight:900">'+x(leader.name)+'</div>';
    var sc=formatScore(leader.score);
    h+='<div style="font-size:26px;font-weight:900;margin-top:4px" class="'+scoreColor(leader.score)+'">'+sc+'</div>';
    if(leader.thru) h+='<div style="font-size:9px;color:var(--muted);font-weight:700;margin-top:2px">Thru '+x(leader.thru)+'</div>';
    h+='</div>';
  }

  h+='<div class="section-label">Full Leaderboard</div>';
  var cutShown=false;
  ST.golfers.forEach(function(g){
    if(g.cut&&!cutShown){
      h+='<div style="text-align:center;padding:5px;font-size:9px;font-weight:800;color:var(--muted);border-top:2px dashed var(--border2);border-bottom:2px dashed var(--border2);background:var(--cream);margin:4px 0">✂ PROJECTED CUT</div>';
      cutShown=true;
    }
    h+='<div class="golfer-row'+(g.cut?" cut":"")+'">';
    h+='<div class="golfer-pos">'+x(g.pos||"—")+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div class="golfer-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+x(g.name)+'</div>';
    if(g.country) h+='<div class="golfer-country">'+x(g.country)+'</div>';
    h+='</div>';
    if(ST.eventStatus==="in"&&!g.cut) h+='<span class="live-label">Live</span>';
    if(g.cut) h+='<span class="cut-label">CUT</span>';
    h+='<div class="golfer-thru">'+x(g.thru||"")+'</div>';
    h+='<div class="golfer-score '+scoreColor(g.score)+'">'+formatScore(g.score)+'</div>';
    h+='</div>';
  });
  return h;
}

// ── MY PICKS PAGE ─────────────────────────────────────────────────────────────
function renderMyPicks(){
  var h='';
  h+='<div class="refresh-bar">';
  h+='<span>';
  if(ST.locked) h+='<span class="lock-pill locked">🔒 Picks Locked</span>';
  else h+='<span class="lock-pill open">🔓 Picks Open</span>';
  h+='</span>';
  h+='<button class="refresh-btn" id="btn-refresh">↻ Scores</button>';
  h+='</div>';

  h+='<div class="card" style="padding:10px 14px;margin-top:12px">';
  h+='<div style="font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Scoring</div>';
  SLOTS.forEach(function(slot){
    h+='<div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;padding:2px 0">';
    h+='<span>'+x(slot.label)+' — golfer finishes top '+slot.topN+'</span>';
    h+='<span style="color:var(--gold-dark);font-weight:900">'+slot.pts+' pt'+(slot.pts>1?"s":"")+'</span>';
    h+='</div>';
  });
  h+='</div>';

  var myPts=computePoints(ST.picks);
  var maxPts=SLOTS.reduce(function(a,s){return a+s.pts;},0);
  if(ST.golfers.length){
    h+='<div style="text-align:center;padding:6px 0 14px">';
    h+='<div style="font-size:30px;font-weight:900">'+myPts+'<span style="font-size:12px;color:var(--muted);font-weight:700"> / '+maxPts+' pts</span></div>';
    h+='</div>';
  }

  h+='<div class="section-label">Your 5 Picks</div>';
  SLOTS.forEach(function(slot){
    var pick=ST.picks[slot.id];
    var isOpen=ST.activeSlot===slot.id;
    var g=pick?ST.golfers.find(function(g){ return g.id===pick.id||g.name===pick.name; }):null;
    var earned=g&&(parseInt(g.pos)||999)<=slot.topN;

    h+='<div class="golfer-pick-card">';
    h+='<div class="slot-header">';
    h+='<div class="slot-num">'+x(slot.label)+' <span style="color:var(--dim);font-size:8px">top '+slot.topN+'</span></div>';
    h+='<div class="slot-pts">'+slot.pts+' pt'+(slot.pts>1?"s":"")+'</div>';
    if(earned) h+=' <span style="font-size:13px">✅</span>';
    h+='</div>';
    h+='<div class="slot-body">';

    if(isOpen&&!ST.locked){
      h+='<input class="slot-search" id="slot-search-input" placeholder="Search golfer name…" autocomplete="off">';
      h+='<div class="slot-options" id="slot-options-'+slot.id+'"></div>';
    } else {
      h+='<div class="slot-current'+(pick?(earned?" correct":" has-pick"):"")+'" data-open-slot="'+slot.id+'">';
      if(pick){
        h+='<div class="slot-current-name">'+x(pick.name)+'</div>';
        if(g){
          h+='<span style="font-size:9px;color:var(--muted);font-weight:700">#'+x(g.pos)+'</span>';
          h+='<span class="'+scoreColor(g.score)+'" style="font-size:13px;font-weight:900;margin-left:6px">'+formatScore(g.score)+'</span>';
        }
        if(!ST.locked) h+='<span style="font-size:9px;color:var(--blue);margin-left:auto;font-weight:800">change</span>';
      } else {
        h+='<div class="slot-current-name" style="color:var(--dim)">Tap to pick a golfer</div>';
        if(!ST.locked) h+='<span style="font-size:9px;color:var(--blue);font-weight:800">+ Pick</span>';
      }
      h+='</div>';
    }
    h+='</div></div>';
  });

  if(!ST.locked){
    h+='<div style="text-align:center;font-size:10px;color:var(--muted);font-weight:700;margin-top:10px">Picks lock at the first tee time on Thursday</div>';
  }
  return h;
}

function renderSlotOptions(){
  var sid=ST.activeSlot; if(!sid) return;
  var container=el("slot-options-"+sid); if(!container) return;
  var q=(ST.slotSearch||"").toLowerCase();
  var list=ST.golfers.filter(function(g){
    if(!g.name) return false;
    return !q||g.name.toLowerCase().indexOf(q)>=0||(g.country||"").toLowerCase().indexOf(q)>=0;
  }).slice(0,25);

  if(!list.length){
    container.innerHTML='<div style="padding:10px;text-align:center;font-size:11px;color:var(--muted);font-weight:700">No golfers found</div>';
    return;
  }
  var h="";
  list.forEach(function(g){
    h+='<div class="slot-option" data-pick-golfer="'+x(g.id)+'" data-pick-name="'+x(g.name)+'">';
    h+='<div class="slot-option-name">'+x(g.name)+'</div>';
    if(g.country) h+='<span style="font-size:9px;color:var(--muted);font-weight:700">'+x(g.country)+'</span>';
    if(g.pos) h+='<span style="font-size:9px;color:var(--muted);font-weight:700">#'+x(g.pos)+'</span>';
    h+='<span class="'+scoreColor(g.score)+'" style="font-size:12px;font-weight:900;min-width:28px;text-align:right">'+formatScore(g.score)+'</span>';
    h+='</div>';
  });
  container.innerHTML=h;
  container.querySelectorAll("[data-pick-golfer]").forEach(function(btn){
    btn.addEventListener("click",function(){
      savePick(ST.activeSlot,this.getAttribute("data-pick-golfer"),this.getAttribute("data-pick-name"));
    });
  });
}

// ── POOL LEADERBOARD ──────────────────────────────────────────────────────────
function renderPool(){
  var h='';
  h+='<div class="refresh-bar">';
  h+='<span style="font-size:9px;color:var(--muted)">Based on live ESPN data</span>';
  h+='<button class="refresh-btn" id="btn-refresh">↻ Refresh</button>';
  h+='</div>';

  var entries=Object.values(ST.poolEntries||{});
  entries.forEach(function(e){ e.pts=computePoints(e.picks); });
  entries.sort(function(a,b){ return b.pts-a.pts; });

  if(!entries.length){
    h+='<div class="empty"><div class="empty-icon">🏆</div>No players yet.<br><span style="font-size:10px;color:var(--dim)">Be the first to make picks!</span></div>';
    return h;
  }

  h+='<div style="display:flex;align-items:center;gap:10px;padding:5px 14px;font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">';
  h+='<div style="width:24px">#</div><div style="flex:1">Player</div><div style="width:40px;text-align:right">Pts</div>';
  h+='</div>';

  entries.forEach(function(e,i){
    var isMe=ST.user&&e.username===ST.user;
    var rankIcon=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);
    h+='<div class="lb-row'+(isMe?" me":"")+'">';
    h+='<div class="lb-rank">'+rankIcon+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div class="lb-name">'+x(e.username||"—")+(isMe?' <span style="font-size:9px;color:var(--blue);font-weight:700">(you)</span>':'')+'</div>';
    var pickLine=SLOTS.map(function(slot){
      var pick=e.picks[slot.id]; if(!pick) return null;
      var g=ST.golfers.find(function(g){ return g.id===pick.id||g.name===pick.name; });
      var ok=g&&(parseInt(g.pos)||999)<=slot.topN;
      var last=pick.name.split(" ").pop();
      return '<span style="color:'+(ok?"var(--green)":"var(--muted)")+'">'+x(last)+'</span>';
    }).filter(Boolean).join('<span style="color:var(--border2)"> · </span>');
    if(pickLine) h+='<div style="font-size:9px;margin-top:2px">'+pickLine+'</div>';
    h+='</div>';
    h+='<div class="lb-pts">'+e.pts+'</div>';
    h+='</div>';
  });
  return h;
}

// ── KICK OFF ──────────────────────────────────────────────────────────────────
(function(){
  var p=new URLSearchParams(window.location.search);
  var guser=p.get("user");

  watchLocked(); // start watching locked state (won't call draw until authReady)

  if(guser){
    // URL-based auth (from hub link) — skip Firebase Auth
    var k=guser.toLowerCase().replace(/[^a-z0-9_]/g,"");
    DB.ref("users/"+k).once("value",function(sn){
      var u=sn.val();
      if(u){ ST.user=u.username||guser; ST.uid=k; loadMyPicks(); loadPoolEntries(); }
      ST.authReady=true;
      fetchLive(true);
      draw();
    });
  } else {
    // No URL user — show auth screen immediately
    ST.authReady=true;
    fetchLive(true);
    loadPoolEntries();
    draw();
  }
})();
</script>
