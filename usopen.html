<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – US Open Golf Pool</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee;
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none}

/* SCORECERY logo */
.scorecery-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:inherit;color:#ffffff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111111;text-shadow:1px 1px 0 #111111,2px 2px 0 #111111,3px 3px 0 #111111,5px 5px 0 #065f46,7px 7px 0 #064e3b,8px 8px 0 #022c22;paint-order:stroke fill}

/* TOPBAR */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;text-align:center}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--text);box-shadow:2px 2px 0 var(--border);white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s;background:#ffffff;color:var(--text)}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-gold{background:var(--gold);color:var(--text)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-red{background:var(--red-bg);color:var(--red)}

/* PAGE TABS */
.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;overflow-x:auto}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 8px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;flex:1;text-align:center}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* USER SELECT */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px 30px;gap:20px;text-align:center}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:420px}
.user-btn{padding:12px 20px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:140px;box-shadow:3px 3px 0 var(--border);cursor:pointer}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}
.user-btn-sub{font-size:8px;font-weight:700;color:var(--muted);margin-top:3px}

/* TOAST */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(40px);background:#111111;color:#ffffff;font-size:10px;font-weight:800;font-family:'Nunito',sans-serif;padding:8px 16px;border-radius:40px;border:2px solid #333;box-shadow:3px 3px 0 rgba(0,0,0,.4);z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;max-width:300px;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MAIN */
.main{max-width:540px;margin:0 auto;padding:14px 12px 80px}

/* CARD */
.card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:3px 3px 0 var(--border)}

/* LIVE DOT */
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);animation:livePulse 1.4s ease infinite;margin-right:4px;vertical-align:middle;flex-shrink:0}

/* BANNER */
.banner{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--green-bg);border-bottom:2px solid var(--border);font-size:10px;font-weight:800;color:var(--green)}

/* SALARY CAP BAR */
.cap-bar{background:#ffffff;border-bottom:3px solid var(--border);padding:10px 14px;position:sticky;top:56px;z-index:40;box-shadow:0 3px 0 var(--border)}
.cap-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cap-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.cap-number{font-size:13px;font-weight:900}
.cap-number.over{color:var(--red)}
.cap-number.ok{color:var(--green)}
.cap-track{height:7px;background:var(--border2);border-radius:4px;overflow:hidden;border:1px solid var(--border2)}
.cap-fill{height:100%;border-radius:4px;transition:width .3s,background .3s}
.roster-slots{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.roster-chip{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;border:2px solid var(--border2);background:var(--cream);font-size:9px;font-weight:800;color:var(--muted);cursor:pointer;transition:border-color .15s}
.roster-chip.filled{border-color:var(--border);background:#ffffff;color:var(--text)}
.roster-chip.filled.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.roster-chip.empty.active{border-color:var(--gold-dark);background:var(--gold-bg);color:var(--gold-dark)}

/* TIER BADGES */
.tier-badge{display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;white-space:nowrap}
.tier-1{background:#fef3c7;color:#92400e;border:1px solid #f59e0b}
.tier-2{background:#e0e7ff;color:#3730a3;border:1px solid #6366f1}
.tier-3{background:#dcfce7;color:#166534;border:1px solid #22c55e}
.tier-4{background:#f3f4f6;color:#374151;border:1px solid #9ca3af}

/* GOLFER PICK LIST */
.golfer-pick-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--card);border:2px solid var(--border2);border-radius:10px;margin:4px 0;cursor:pointer;transition:border-color .15s,background .15s}
.golfer-pick-row:active{background:var(--cream)}
.golfer-pick-row.selected{border-color:var(--blue);background:var(--blue-bg)}
.golfer-pick-row.over-cap{opacity:.45;cursor:default}
.golfer-pick-row.cut{opacity:.45}
.gpr-name{flex:1;font-size:12px;font-weight:800;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gpr-salary{font-size:10px;font-weight:900;color:var(--text);width:52px;text-align:right;flex-shrink:0}
.gpr-score{font-size:12px;font-weight:900;width:36px;text-align:right;flex-shrink:0}
.gpr-pos{font-size:10px;font-weight:800;color:var(--muted);width:28px;text-align:center;flex-shrink:0}

/* LIVE LEADERBOARD */
.golfer-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:2px solid var(--border);border-radius:10px;margin:5px 0;box-shadow:3px 3px 0 var(--border)}
.golfer-row.cut{opacity:.5;border-color:var(--border2);box-shadow:none}
.golfer-row.my-pick{border-color:var(--gold-dark);background:var(--gold-bg)}
.golfer-pos{font-size:13px;font-weight:900;color:var(--muted);width:28px;text-align:center;flex-shrink:0}
.golfer-score{font-size:15px;font-weight:900;width:44px;text-align:right;flex-shrink:0}
.golfer-thru{font-size:9px;font-weight:700;color:var(--muted);width:30px;text-align:right;flex-shrink:0}
.score-under{color:#e85555}
.score-over{color:#666}
.score-even{color:var(--text)}
.live-label{font-size:7px;font-weight:900;background:var(--red);color:#fff;border-radius:4px;padding:1px 5px;text-transform:uppercase;flex-shrink:0}
.cut-label{font-size:7px;font-weight:900;background:var(--border2);color:var(--muted);border-radius:4px;padding:1px 5px;text-transform:uppercase;flex-shrink:0}

/* POOL LB */
.lb-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border:2px solid var(--border);border-radius:10px;margin:5px 0;box-shadow:3px 3px 0 var(--border)}
.lb-row.me{border-color:var(--blue);background:var(--blue-bg)}

/* SECTION LABEL */
.section-label{font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 8px;padding:0 2px}

/* MISC */
.refresh-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:var(--cream);border-bottom:1px solid var(--border2);font-size:9px;font-weight:700;color:var(--muted)}
.refresh-btn{font-size:9px;font-weight:800;padding:4px 10px;border-radius:7px;border:2px solid var(--border);background:#ffffff;color:var(--text);box-shadow:2px 2px 0 var(--border)}
.refresh-btn:active{transform:translate(2px,2px);box-shadow:none}
.empty{text-align:center;padding:32px 20px;color:var(--muted);font-size:11px;font-weight:700;line-height:1.8}
.lock-pill{display:inline-flex;align-items:center;gap:5px;font-size:8px;font-weight:800;padding:3px 9px;border-radius:20px;border:2px solid var(--border2);background:var(--cream);color:var(--muted)}
.lock-pill.open{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.lock-pill.locked{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.search-wrap{position:relative;margin-bottom:8px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);pointer-events:none}
.search-input{width:100%;background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:8px 12px 8px 30px;font-size:12px;font-weight:700;outline:none;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.search-input:focus{border-color:var(--blue);box-shadow:2px 2px 0 var(--blue)}
.filter-strip{display:flex;gap:5px;overflow-x:auto;margin-bottom:8px;padding-bottom:2px}
.filter-strip::-webkit-scrollbar{display:none}
.ftab{padding:4px 12px;font-size:9px;font-weight:800;border:2px solid var(--border2);border-radius:20px;background:#ffffff;color:var(--muted);font-family:'Nunito',sans-serif;white-space:nowrap;flex-shrink:0}
.ftab.active{background:var(--border);color:#ffffff;border-color:var(--border)}
.ftab:active{transform:translate(1px,1px)}

/* ADMIN */
.adm-input{width:100%;background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;outline:none;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.adm-golfer-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border2)}
.adm-golfer-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted);font-weight:700">Loading…</div></div>
<div id="toast"></div>

<script>
// ── URL PARAMS ────────────────────────────────────────────────────────────────
var GROUP_ID=(function(){var m=location.search.match(/[?&]group=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var URL_USER=(function(){var m=location.search.match(/[?&]user=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();

// ── FIREBASE ──────────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",
  authDomain:"rwc-picks.firebaseapp.com",
  databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",
  projectId:"rwc-picks"
});
var DB=firebase.database();

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
var BASE=GROUP_ID?"groups/"+GROUP_ID+"/data/usopen":"usopen2025";
var TOURNAMENT_YEAR=2026;
var CAP=50000;       // salary cap
var ROSTER_SIZE=6;   // picks per team

// Salary tiers — admin sets individual salaries, these are defaults/labels
var TIERS=[
  {id:"t1",label:"Tier 1",salary:12000,cls:"tier-1"},
  {id:"t2",label:"Tier 2",salary:9000, cls:"tier-2"},
  {id:"t3",label:"Tier 3",salary:7000, cls:"tier-3"},
  {id:"t4",label:"Tier 4",salary:5000, cls:"tier-4"},
];

// Scoring: points by finish position
var POS_POINTS={
  1:50,2:40,3:35,4:30,5:25,6:22,7:20,8:18,9:16,10:14,
  11:13,12:12,13:11,14:10,15:9,16:8,17:7,18:6,19:5,20:4,
  21:3,22:3,23:3,24:2,25:2,26:2,27:2,28:2,29:1,30:1,
  31:1,32:1,33:1,34:1,35:1,36:1,37:1,38:1,39:1,40:1,
};
// Made cut but outside 40 = 0 extra, missed cut = 0

// ── STATE ─────────────────────────────────────────────────────────────────────
var PARTS=[];
var _EM={};
var MASTER_PW="Sloop";

var ST={
  page:"roster",       // roster | leaderboard | pool | admin
  user:URL_USER||null,
  admin:false,
  liveLoading:false,
  liveLastFetch:0,
  golfers:[],          // from ESPN (live)
  manualGolfers:{},    // from Firebase field: id -> {name, country}
  salaries:{},         // golfer id -> {salary, tier, name}
  picks:{},            // ukey -> [golferId, ...]  (array of 6 ids)
  locked:false,
  filterTier:"all",
  search:"",
  activeRosterSlot:null, // 0-5, which slot is being filled
  eventName:"US Open "+TOURNAMENT_YEAR,
  eventStatus:"pre",
  adminFieldSearch:"",
  oddsApiKey:"",
  oddsData:null,  // [{name, odds}] from The Odds API or hardcoded
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function ukey(n){return(n||"").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,"");}
function x(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function pem(n){return _EM[n]?'<span style="margin-right:3px">'+_EM[n]+'</span>':""; }
function fmtSal(n){return "$"+(Number(n)||0).toLocaleString();}

var _tt=null;
function toast(msg){var t=document.getElementById("toast");if(!t)return;t.textContent=msg;t.className="show";clearTimeout(_tt);_tt=setTimeout(function(){t.className="";},2400);}

function scoreColor(s){
  if(s===null||s===undefined)return"";
  if(s==="E"||s===0)return"score-even";
  if(typeof s==="number")return s<0?"score-under":"score-over";
  if(typeof s==="string")return s.startsWith("-")?"score-under":(s.startsWith("+")?"score-over":"score-even");
  return"";
}
function formatScore(s){
  if(s===null||s===undefined)return"—";
  if(s==="E"||s===0)return"E";
  if(typeof s==="number"){return s>0?"+"+s:String(s);}
  return String(s);
}

// ── SALARY & ROSTER HELPERS ───────────────────────────────────────────────────
function salaryOf(gid){
  var s=ST.salaries[gid]; if(!s) return 0;
  return Number(s.salary)||0;
}
function tierOf(gid){
  var s=ST.salaries[gid]; if(!s) return null;
  return s.tier||null;
}
function tierMeta(tid){
  return TIERS.find(function(t){return t.id===tid;})||TIERS[3];
}
function myRoster(){
  if(!ST.user) return [];
  return ST.picks[ukey(ST.user)]||[];
}
function rosterSpend(roster){
  return (roster||[]).reduce(function(sum,gid){return sum+salaryOf(gid);},0);
}
function rosterFull(roster){ return (roster||[]).length>=ROSTER_SIZE; }
function inRoster(gid,roster){ return (roster||[]).indexOf(gid)>=0; }

// ── SCORING ───────────────────────────────────────────────────────────────────
function golferPts(gid){
  var g=ST.golfers.find(function(g){return g.id===gid;});
  if(!g||g.cut) return 0;
  var pos=parseInt(g.pos)||999;
  return POS_POINTS[pos]||0;
}
function rosterScore(roster){
  return (roster||[]).reduce(function(sum,gid){return sum+golferPts(gid);},0);
}
function computePoints(uk){
  var roster=ST.picks[uk]||[];
  return rosterScore(roster);
}

// ── FIREBASE LOAD ─────────────────────────────────────────────────────────────
function loadData(){
  function s1(){
    if(!GROUP_ID){s2();return;}
    DB.ref("groups/"+GROUP_ID).once("value",function(sn){
      var g=sn.val()||{};
      if(g.players&&g.players.length) PARTS=g.players;
      s2();
    },function(){s2();});
  }
  function s2(){
    var done=0,total=PARTS.length;
    if(!total){s3();return;}
    PARTS.forEach(function(p){
      DB.ref("users/"+ukey(p)+"/emoji").once("value",
        function(sn){if(sn.val())_EM[p]=sn.val();done++;if(done===total)s3();},
        function(){done++;if(done===total)s3();});
    });
  }
  function s3(){
    DB.ref("globalSettings/masterPw").once("value",function(sn){if(sn.val())MASTER_PW=sn.val();});
    DB.ref(BASE+"/field").on("value",function(sn){ST.manualGolfers=sn.val()||{};draw();});
    DB.ref(BASE+"/salaries").on("value",function(sn){ST.salaries=sn.val()||{};draw();});
    DB.ref(BASE+"/picks").on("value",function(sn){ST.picks=sn.val()||{};draw();});
    DB.ref(BASE+"/locked").on("value",function(sn){ST.locked=!!sn.val();draw();});
    fetchLive(true);
    draw();
  }
  s1();
}

function saveRoster(roster){
  if(!ST.user){toast("Select your name first");return;}
  var uk=ukey(ST.user);
  ST.picks[uk]=roster;
  DB.ref(BASE+"/picks/"+uk).set(roster);
}

// ── ESPN LIVE FETCH ───────────────────────────────────────────────────────────
var _espnEventId=null;

function fetchLive(force){
  if(ST.liveLoading)return;
  var age=Date.now()-ST.liveLastFetch;
  if(!force&&age<60000&&ST.golfers.length)return;
  ST.liveLoading=true; draw();

  fetch("https://site.api.espn.com/apis/site/v2/sports/golf/pga/schedule?dates="+TOURNAMENT_YEAR)
    .then(function(r){return r.json();})
    .then(function(data){
      var events=[];
      if(data.seasons&&data.seasons[0])events=data.seasons[0].events||[];
      else if(data.events)events=data.events;
      var usOpen=null;
      for(var i=0;i<events.length;i++){
        var nm=(events[i].name||"").toLowerCase();
        if(nm.indexOf("u.s. open")>=0||nm.indexOf("us open")>=0){usOpen=events[i];break;}
      }
      if(usOpen){ST.eventName=usOpen.name||ST.eventName; _espnEventId=usOpen.id||null;}
      var lbUrl=usOpen&&usOpen.id
        ?"https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard/"+usOpen.id
        :"https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard";
      return fetch(lbUrl);
    })
    .catch(function(){return fetch("https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard");})
    .then(function(r){return r.json();})
    .then(function(data){
      ST.liveLoading=false; ST.liveLastFetch=Date.now();
      parseESPN(data); draw();
    })
    .catch(function(){ST.liveLoading=false;ST.golfers=[];draw();});
}

// Fetch field — tries multiple ESPN endpoints, falls back gracefully
function fetchESPNField(cb){
  var found=false;

  function done(golfers){
    if(found)return;
    found=true;
    cb(golfers);
  }

  // Try 1: sports.core.api.espn.com competitors endpoint (works pre-tournament)
  function tryCoreApi(){
    // This endpoint has the field even before the tournament starts
    var coreUrl="https://sports.core.api.espn.com/v2/sports/golf/leagues/pga/events?limit=20&dates="+TOURNAMENT_YEAR;
    fetch(coreUrl)
      .then(function(r){return r.json();})
      .then(function(data){
        // Find the US Open event ref
        var items=data.items||[];
        var usOpenRef=null;
        // items are $ref URLs — we need to follow them
        if(!items.length){tryLeaderboard();return;}
        var checked=0;
        var total=Math.min(items.length,20);
        items.slice(0,total).forEach(function(item){
          var ref=item.$ref||"";
          fetch(ref)
            .then(function(r){return r.json();})
            .then(function(ev){
              checked++;
              var nm=(ev.name||ev.shortName||"").toLowerCase();
              if(!usOpenRef&&(nm.indexOf("u.s. open")>=0||nm.indexOf("us open")>=0)){
                usOpenRef=ev;
                ST.eventName=ev.name||ST.eventName;
                // Now fetch competitors
                var compRef=(ev.competitions&&ev.competitions[0]&&ev.competitions[0].$ref)||"";
                if(compRef){
                  fetch(compRef).then(function(r){return r.json();}).then(function(comp){
                    var competitorRefs=(comp.competitors&&comp.competitors.items)||[];
                    if(!competitorRefs.length){tryLeaderboard();return;}
                    var golfers=[],cdone=0,ctotal=competitorRefs.length;
                    competitorRefs.forEach(function(cr){
                      fetch(cr.$ref||cr).then(function(r){return r.json();}).then(function(c){
                        var ath=c.athlete||{};
                        var aref=ath.$ref||"";
                        // Athlete ref has name
                        if(aref){
                          fetch(aref).then(function(r){return r.json();}).then(function(a){
                            golfers.push({id:String(a.id||a.displayName||""),name:a.displayName||a.fullName||"",country:(a.flag&&a.flag.alt)||""});
                            cdone++;if(cdone===ctotal)done(golfers.filter(function(g){return g.name;}));
                          }).catch(function(){cdone++;if(cdone===ctotal)done(golfers.filter(function(g){return g.name;}));});
                        } else {
                          cdone++;if(cdone===ctotal)done(golfers.filter(function(g){return g.name;}));
                        }
                      }).catch(function(){cdone++;if(cdone===ctotal)done(golfers.filter(function(g){return g.name;}));});
                    });
                  }).catch(function(){tryLeaderboard();});
                } else {tryLeaderboard();}
              }
              if(checked===total&&!usOpenRef) tryLeaderboard();
            })
            .catch(function(){checked++;if(checked===total&&!usOpenRef)tryLeaderboard();});
        });
      })
      .catch(function(){tryLeaderboard();});
  }

  // Try 2: site.api.espn.com leaderboard (works once tournament starts)
  function tryLeaderboard(){
    if(found)return;
    var urls=[];
    if(_espnEventId) urls.push("https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard/"+_espnEventId);
    urls.push("https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard");
    // Also try scoreboard
    urls.push("https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard");

    var idx=0;
    function next(){
      if(found||idx>=urls.length){if(!found)done([]);return;}
      fetch(urls[idx++])
        .then(function(r){return r.json();})
        .then(function(data){
          var golfers=extractFieldFromESPN(data);
          if(golfers.length)done(golfers);
          else next();
        }).catch(next);
    }
    next();
  }

  // Start with schedule to get event ID, then try core API
  if(!_espnEventId){
    fetch("https://site.api.espn.com/apis/site/v2/sports/golf/pga/schedule?dates="+TOURNAMENT_YEAR)
      .then(function(r){return r.json();})
      .then(function(data){
        var events=[];
        if(data.seasons&&data.seasons[0])events=data.seasons[0].events||[];
        else if(data.events)events=data.events;
        for(var i=0;i<events.length;i++){
          var nm=(events[i].name||"").toLowerCase();
          if(nm.indexOf("u.s. open")>=0||nm.indexOf("us open")>=0){
            _espnEventId=events[i].id||null;
            ST.eventName=events[i].name||ST.eventName;
            break;
          }
        }
        tryLeaderboard();
      })
      .catch(function(){tryLeaderboard();});
  } else {
    tryLeaderboard();
  }
}

function extractFieldFromESPN(data){
  var golfers=[];
  var event=(data.events&&data.events[0])||data;
  var comp=(event.competitions&&event.competitions[0])||{};
  var competitors=comp.competitors||[];
  if(!competitors.length&&event.competitors)competitors=event.competitors;
  competitors.forEach(function(c){
    var athlete=c.athlete||{};
    var name=athlete.displayName||athlete.fullName||c.displayName||"";
    if(!name)return;
    var country=(athlete.flag&&athlete.flag.alt)||(athlete.country&&(athlete.country.abbreviation||athlete.country.displayName))||"";
    golfers.push({id:String(athlete.id||name),name:name,country:country});
  });
  return golfers;
}

function parseESPN(data){
  var golfers=[];
  var event=(data.events&&data.events[0])||data;
  var comp=(event.competitions&&event.competitions[0])||{};
  var competitors=comp.competitors||[];
  if(!competitors.length&&event.competitors)competitors=event.competitors;
  ST.eventStatus=((comp.status&&comp.status.type&&comp.status.type.state)||"pre");

  competitors.forEach(function(c){
    var athlete=c.athlete||{};
    var name=athlete.displayName||athlete.fullName||c.displayName||"";
    if(!name)return;
    var pos=c.sortOrder||"";
    if(c.status&&c.status.position)pos=c.status.position.id||pos;
    var relScore=null;
    if(typeof c.score==="number")relScore=c.score;
    else if(c.score&&c.score.value!==undefined)relScore=c.score.value;
    else if(c.statistics){
      var tot=c.statistics.find(function(s){return s.name==="totalScore"||s.abbreviation==="TOT";});
      if(tot)relScore=parseInt(tot.value)||0;
    }
    var isCut=!!(c.status&&c.status.type&&(c.status.type.shortDetail||"").toLowerCase().indexOf("cut")>=0);
    var thru="";
    if(c.linescores&&c.linescores.length){
      var played=c.linescores.filter(function(l){return l.value!==undefined&&l.value!==null;});
      thru=played.length>=18?"F":played.length>0?String(played.length):"";
    } else if(c.status&&c.status.type){thru=c.status.type.shortDetail||"";}
    var country=(athlete.flag&&athlete.flag.alt)||(athlete.country&&(athlete.country.abbreviation||athlete.country.displayName))||"";
    golfers.push({id:String(athlete.id||name),name:name,pos:String(pos),score:relScore,thru:thru,cut:isCut,country:country});
  });
  golfers.sort(function(a,b){return(parseInt(a.pos)||999)-(parseInt(b.pos)||999);});
  ST.golfers=golfers;

  // Auto-seed salaries if admin has never set them (give every golfer a default tier salary)
  autoSeedSalaries();
}

// Returns the unified golfer list: ESPN data takes priority, manual fills gaps
function mergedGolfers(){
  var list=[];
  var seen={};
  // ESPN golfers first
  ST.golfers.forEach(function(g){
    seen[g.id]=true;
    list.push(g);
  });
  // Manual golfers not yet in ESPN list
  Object.keys(ST.manualGolfers).forEach(function(id){
    if(seen[id])return;
    var m=ST.manualGolfers[id];
    list.push({id:id,name:m.name||id,pos:"",score:null,thru:"",cut:false,country:m.country||""});
  });
  // Sort: ESPN-sourced (have pos) first, then manual alphabetically
  list.sort(function(a,b){
    var ha=parseInt(a.pos)||9999, hb=parseInt(b.pos)||9999;
    if(ha!==hb)return ha-hb;
    return(a.name||"").localeCompare(b.name||"");
  });
  return list;
}

function autoSeedSalaries(){
  // Only auto-seed if no salaries set yet
  if(Object.keys(ST.salaries).length>0)return;
  var all=mergedGolfers();
  if(!all.length)return;
  var sal={};
  all.forEach(function(g,i){
    var tier=i<10?"t1":i<25?"t2":i<50?"t3":"t4";
    sal[g.id]={name:g.name,salary:tierMeta(tier).salary,tier:tier};
  });
  ST.salaries=sal;
}

function golferListHtml(roster,spend){
  var q=(ST.search||"").toLowerCase();
  var slot=ST.activeRosterSlot;
  var currentInSlot=roster[slot];

  var list=mergedGolfers().filter(function(g){
    if(!g.name)return false;
    if(!ST.salaries[g.id])return false; // only show golfers with assigned salaries
    if(q&&g.name.toLowerCase().indexOf(q)<0&&(g.country||"").toLowerCase().indexOf(q)<0)return false;
    if(ST.filterTier!=="all"&&tierOf(g.id)!==ST.filterTier)return false;
    return true;
  });

  if(!list.length){
    var hasSalaries=Object.keys(ST.salaries).length>0;
    var hasGolfers=mergedGolfers().length>0;
    if(!hasGolfers)return'<div class="empty">No golfers in the field yet.<br><span style="font-size:10px;color:var(--dim)">Admin adds golfers in the ⚙️ Admin tab.</span></div>';
    if(!hasSalaries)return'<div class="empty">Salaries not set yet.<br><span style="font-size:10px;color:var(--dim)">Admin sets salaries in the ⚙️ Admin tab.</span></div>';
    return'<div class="empty">No golfers match your search.</div>';
  }

  var tierOrder={t1:0,t2:1,t3:2,t4:3};
  list.sort(function(a,b){
    var ta=tierOrder[tierOf(a.id)||"t4"]||3;
    var tb=tierOrder[tierOf(b.id)||"t4"]||3;
    if(ta!==tb)return ta-tb;
    return salaryOf(b.id)-salaryOf(a.id);
  });

  var h='<div style="display:flex;flex-direction:column;gap:3px">';
  list.forEach(function(g){
    var sal=salaryOf(g.id);
    var tid=tierOf(g.id);
    var tm=tid?tierMeta(tid):null;
    var isInRoster=inRoster(g.id,roster);
    var isCurrentSlot=g.id===currentInSlot;
    var spendIfAdded=spend+(isCurrentSlot?0:sal)-(isCurrentSlot?sal:0);
    var wouldBeOver=!isCurrentSlot&&!isInRoster&&(spend+sal>CAP);

    var cls="golfer-pick-row";
    if(isCurrentSlot)cls+=" selected";
    else if(isInRoster)cls+=" selected";
    else if(wouldBeOver)cls+=" over-cap";
    if(g.cut)cls+=" cut";

    h+='<div class="'+cls+'" '+(wouldBeOver&&!isCurrentSlot?'':'data-pick-golfer="'+x(g.id)+'" data-pick-name="'+x(g.name)+'"')+'>';
    if(tm)h+='<span class="tier-badge '+tm.cls+'" style="flex-shrink:0">'+tm.label+'</span>';
    h+='<div class="gpr-name">'+x(g.name)+'</div>';
    if(ST.eventStatus!=="pre"&&!g.cut){
      h+='<div class="gpr-pos">'+x(g.pos||"—")+'</div>';
      h+='<div class="gpr-score '+scoreColor(g.score)+'">'+formatScore(g.score)+'</div>';
    }
    if(g.cut)h+='<span class="cut-label" style="margin-right:4px">CUT</span>';
    h+='<div class="gpr-salary" style="color:'+(wouldBeOver&&!isCurrentSlot?"var(--red)":"var(--text)")+'">'+fmtSal(sal)+'</div>';
    if(isCurrentSlot)h+='<span style="font-size:11px;margin-left:4px">✓</span>';
    else if(isInRoster)h+='<span style="font-size:9px;color:var(--muted);margin-left:4px">In roster</span>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

// ── ODDS HELPERS ──────────────────────────────────────────────────────────────
function parseOddsApiResponse(data){
  var results=[];
  if(!Array.isArray(data))return results;
  data.forEach(function(event){
    var bookmakers=event.bookmakers||[];
    var dk=bookmakers.find(function(b){return b.key==="draftkings";});
    if(!dk)return;
    var market=(dk.markets||[]).find(function(m){return m.key==="outrights";});
    if(!market)return;
    (market.outcomes||[]).forEach(function(o){
      results.push({name:o.name,odds:Math.round(o.price)});
    });
  });
  results.sort(function(a,b){
    return oddsToImplied(a.odds)-oddsToImplied(b.odds);
  });
  return results;
}

// American odds -> implied probability -> salary tier + salary
function oddsToImplied(american){
  if(american>0) return 100/(american+100);
  return Math.abs(american)/(Math.abs(american)+100);
}
function oddsToTier(american){
  var p=oddsToImplied(american);
  if(p>=0.12)  return "t1"; // roughly +700 and shorter
  if(p>=0.05)  return "t2"; // +700 to +1900
  if(p>=0.02)  return "t3"; // +1900 to +4900
  return "t4";               // +5000 and longer
}
function oddsToSalary(american){
  // Scale salary linearly within tier bands based on implied prob
  var p=oddsToImplied(american);
  // $5000 (longest shot) to $15000 (heavy favorite), scaled
  var raw=Math.round((5000+p*60000)/500)*500;
  return Math.min(15000,Math.max(5000,raw));
}
function fmtAmericanOdds(n){
  return n>0?"+"+n:String(n);
}

  // Admin password
  el=document.getElementById("b-admin-pw");
  if(el)el.addEventListener("click",function(){
    var pw=prompt("Admin password:");
    if(!pw)return;
    if(pw===MASTER_PW||pw==="Sloop"){ST.admin=true;ST.page="admin";draw();}
    else toast("Wrong password");
  });

  // Refresh
  el=document.getElementById("btn-refresh");
  if(el)el.addEventListener("click",function(){fetchLive(true);toast("Refreshing…");});

  // Roster slot chips
  els=document.querySelectorAll("[data-slot]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    if(ST.locked){toast("Picks are locked ⛳");return;}
    var si=parseInt(this.getAttribute("data-slot"));
    ST.activeRosterSlot=(ST.activeRosterSlot===si)?null:si;
    ST.search=""; draw();
  });

  // Edit slot from roster summary
  els=document.querySelectorAll("[data-edit-slot]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    if(ST.locked){toast("Picks are locked ⛳");return;}
    ST.activeRosterSlot=parseInt(this.getAttribute("data-edit-slot"));
    ST.search=""; draw();
  });

  // Pick golfer from list
  els=document.querySelectorAll("[data-pick-golfer]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var gid=this.getAttribute("data-pick-golfer");
    if(!gid)return;
    var slot=ST.activeRosterSlot;
    if(slot===null)return;
    var roster=myRoster().slice();
    // Ensure roster has enough slots
    while(roster.length<=slot) roster.push(null);
    // Remove from previous slot if already in roster
    var prevIdx=roster.indexOf(gid);
    if(prevIdx>=0&&prevIdx!==slot) roster[prevIdx]=null;
    roster[slot]=gid;
    // Clean nulls from end but keep structure
    // Move to next empty slot automatically
    var nextEmpty=-1;
    for(var ni=0;ni<ROSTER_SIZE;ni++){
      if(!roster[ni]){nextEmpty=ni;break;}
    }
    ST.activeRosterSlot=nextEmpty; // null if all filled
    saveRoster(roster.filter(function(r,ri){return ri<ROSTER_SIZE;}));
    if(nextEmpty===-1){toast("✓ Roster complete!");}
    draw();
  });

  // Golfer search
  el=document.getElementById("golfer-search");
  if(el){
    el.focus();
    el.addEventListener("input",function(){ST.search=this.value;draw();});
  }

  // Filter tier tabs
  els=document.querySelectorAll("[data-ftier]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    ST.filterTier=this.getAttribute("data-ftier"); draw();
  });

  // Admin: lock toggle
  el=document.getElementById("btn-toggle-lock");
  if(el)el.addEventListener("click",function(){
    var newVal=!ST.locked;
    DB.ref(BASE+"/locked").set(newVal);
    toast(newVal?"🔒 Picks locked":"🔓 Picks unlocked");
  });

  // Admin: pull DraftKings odds via The Odds API
  el=document.getElementById("btn-import-odds");
  if(el)el.addEventListener("click",function(){
    var keyInp=document.getElementById("odds-api-key");
    var key=(keyInp?keyInp.value:"").trim();
    ST.oddsApiKey=key;
    if(!key){
      var s=document.getElementById("odds-import-status");
      if(s)s.textContent="Enter your API key first — get one free at the-odds-api.com";
      return;
    }
    var statusEl=document.getElementById("odds-import-status");
    if(statusEl)statusEl.textContent="Fetching…";
    this.disabled=true;
    var btn=this;
    // The Odds API — golf outright winner market, DraftKings US
    var url="https://api.the-odds-api.com/v4/sports/golf_masters_tournament_winner/odds/?regions=us&markets=outrights&bookmakers=draftkings&oddsFormat=american&apiKey="+encodeURIComponent(key);
    // Try US Open specific market first, fall back to generic golf outrights
    var urls=[
      "https://api.the-odds-api.com/v4/sports/golf_us_open_winner/odds/?regions=us&markets=outrights&bookmakers=draftkings&oddsFormat=american&apiKey="+encodeURIComponent(key),
      "https://api.the-odds-api.com/v4/sports/golf_pga_championship_winner/odds/?regions=us&markets=outrights&bookmakers=draftkings&oddsFormat=american&apiKey="+encodeURIComponent(key),
    ];
    // First get available sports to find exact key
    fetch("https://api.the-odds-api.com/v4/sports/?apiKey="+encodeURIComponent(key))
      .then(function(r){return r.json();})
      .then(function(sports){
        // Find golf US Open
        var usOpenSport=null;
        if(Array.isArray(sports)){
          usOpenSport=sports.find(function(s){
            var k=(s.key||"").toLowerCase();
            return k.indexOf("us_open")>=0||k.indexOf("golf_us")>=0;
          });
          if(!usOpenSport){
            usOpenSport=sports.find(function(s){
              var k=(s.key||"").toLowerCase();
              return k.indexOf("golf")>=0&&k.indexOf("winner")>=0;
            });
          }
        }
        var sportKey=usOpenSport?usOpenSport.key:"golf_us_open_winner";
        return fetch("https://api.the-odds-api.com/v4/sports/"+sportKey+"/odds/?regions=us&markets=outrights&bookmakers=draftkings&oddsFormat=american&apiKey="+encodeURIComponent(key));
      })
      .then(function(r){return r.json();})
      .then(function(data){
        btn.disabled=false;
        var odds=parseOddsApiResponse(data);
        if(!odds.length){
          if(statusEl)statusEl.textContent="No DraftKings golf odds found — try the hardcoded button below";
          return;
        }
        ST.oddsData=odds;
        if(statusEl)statusEl.textContent="✓ Loaded "+odds.length+" golfers from DraftKings";
        draw();
      })
      .catch(function(err){
        btn.disabled=false;
        if(statusEl)statusEl.textContent="Error: "+(err.message||"check API key");
      });
  });

  // Admin: use hardcoded odds
  el=document.getElementById("btn-use-hardcoded-odds");
  if(el)el.addEventListener("click",function(){
    ST.oddsData=HARDCODED_ODDS.slice();
    toast("✓ Loaded "+ST.oddsData.length+" golfers from hardcoded odds");
    draw();
  });

  // Admin: apply odds -> salaries and field
  el=document.getElementById("btn-apply-odds-salaries");
  if(el)el.addEventListener("click",function(){
    if(!ST.oddsData||!ST.oddsData.length){toast("No odds data loaded");return;}
    var updates={};
    ST.oddsData.forEach(function(od){
      var id=od.name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
      var tier=oddsToTier(od.odds);
      var salary=oddsToSalary(od.odds);
      // Add to field if not already present
      if(!ST.manualGolfers[id]&&!ST.golfers.find(function(g){return g.id===id;})){
        updates[BASE+"/field/"+id]={name:od.name,country:""};
      }
      updates[BASE+"/salaries/"+id]={name:od.name,salary:salary,tier:tier,odds:od.odds};
    });
    DB.ref().update(updates,function(err){
      if(!err)toast("✓ Applied "+ST.oddsData.length+" salaries from odds");
      else toast("Error saving");
    });
  });

  // Admin: import from paste
  el=document.getElementById("btn-import-paste");
  if(el)el.addEventListener("click",function(){
    var ta=document.getElementById("adm-paste-field");
    var statusEl=document.getElementById("paste-import-status");
    if(!ta)return;
    var raw=ta.value||"";
    // Parse: split on newlines, strip numbers/bullets/parenthetical suffixes like "(a)"
    var lines=raw.split(/[\n,]+/).map(function(l){
      return l
        .replace(/^\s*\d+[\.\)]\s*/,"")   // "1. " or "1) "
        .replace(/\(a\)/gi,"")             // amateur designation
        .replace(/\s*\([^)]*\)\s*$/,"")    // trailing parens
        .replace(/^\W+/,"")                // leading non-word
        .trim();
    }).filter(function(l){return l.length>2;});

    if(!lines.length){if(statusEl)statusEl.textContent="No names found";return;}

    var updates={};
    var added=0,skipped=0;
    lines.forEach(function(name){
      var id=name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
      if(!id)return;
      // Check if already exists
      var exists=ST.manualGolfers[id]||Object.keys(ST.salaries).some(function(k){
        return (ST.salaries[k].name||"").toLowerCase()===name.toLowerCase();
      });
      if(exists){skipped++;return;}
      updates[BASE+"/field/"+id]={name:name,country:""};
      // Default T4 salary — admin can adjust after
      updates[BASE+"/salaries/"+id]={name:name,salary:tierMeta("t4").salary,tier:"t4"};
      added++;
    });

    if(!added){
      if(statusEl)statusEl.textContent="All "+lines.length+" already in field";
      toast("All names already imported");
      return;
    }

    DB.ref().update(updates,function(err){
      if(!err){
        ta.value="";
        var msg="✓ Added "+added+(skipped?" · "+skipped+" skipped":"");
        if(statusEl)statusEl.textContent=msg;
        toast(msg);
      } else {
        if(statusEl)statusEl.textContent="Error saving";
        toast("Error saving to Firebase");
      }
    });
  });
  if(el)el.addEventListener("click",function(){
    var statusEl=document.getElementById("espn-import-status");
    if(statusEl)statusEl.textContent="Fetching…";
    this.disabled=true;
    var btn=this;
    fetchESPNField(function(golfers){
      btn.disabled=false;
      if(!golfers.length){
        if(statusEl)statusEl.textContent="No field data yet from ESPN";
        toast("ESPN field not available yet");
        return;
      }
      // Merge into manualGolfers without overwriting existing entries
      var updates={};
      var added=0;
      golfers.forEach(function(g){
        if(!ST.manualGolfers[g.id]){
          updates[g.id]={name:g.name,country:g.country||""};
          added++;
        }
      });
      if(!added){
        if(statusEl)statusEl.textContent="All "+golfers.length+" already in field";
        toast("Field already up to date");
        return;
      }
      DB.ref(BASE+"/field").update(updates,function(err){
        if(!err){
          if(statusEl)statusEl.textContent="✓ Added "+added+" golfer"+(added!==1?"s":"")+" from ESPN";
          toast("✓ Imported "+added+" golfers");
        } else {
          if(statusEl)statusEl.textContent="Error saving";
          toast("Error saving to Firebase");
        }
      });
    });
  });

  // Admin: add golfer manually via tier button
  els=document.querySelectorAll("[data-add-tier]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var errEl=document.getElementById("adm-add-err");
    var nameInp=document.getElementById("adm-golfer-name");
    var countryInp=document.getElementById("adm-golfer-country");
    var name=(nameInp?nameInp.value:"").trim();
    if(!name){if(errEl)errEl.textContent="Enter a golfer name";return;}
    var tid=this.getAttribute("data-add-tier");
    var salary=tierMeta(tid).salary;
    var country=(countryInp?countryInp.value:"").trim();
    var id=name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
    // Save to field and salaries atomically
    var updates={};
    updates[BASE+"/field/"+id]={name:name,country:country};
    updates[BASE+"/salaries/"+id]={name:name,salary:salary,tier:tid};
    DB.ref().update(updates,function(err){
      if(!err){
        if(nameInp)nameInp.value="";
        if(countryInp)countryInp.value="";
        if(errEl)errEl.textContent="";
        toast("✓ Added "+name);
      } else {
        if(errEl)errEl.textContent="Error saving";
      }
    });
  });

  // Admin: field search
  el=document.getElementById("adm-field-search");
  if(el)el.addEventListener("input",function(){ST.adminFieldSearch=this.value;draw();});

  // Admin: remove golfer
  els=document.querySelectorAll("[data-remove-golfer]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var gid=this.getAttribute("data-remove-golfer");
    if(!confirm("Remove this golfer from the field?"))return;
    var updates={};
    updates[BASE+"/field/"+gid]=null;
    updates[BASE+"/salaries/"+gid]=null;
    DB.ref().update(updates,function(err){
      if(!err)toast("Removed");
    });
  });

  // Admin: cycle tier badge (tap to cycle T1→T2→T3→T4→T1)
  els=document.querySelectorAll("[data-cycle-tier]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var gid=this.getAttribute("data-cycle-tier");
    var tierSel=document.querySelector('[data-tier-for="'+gid+'"]');
    var salInp=document.querySelector('[data-sal-for="'+gid+'"]');
    if(!tierSel)return;
    var order=["t1","t2","t3","t4"];
    var cur=tierSel.value||"t4";
    var next=order[(order.indexOf(cur)+1)%order.length];
    tierSel.value=next;
    if(salInp)salInp.value=tierMeta(next).salary;
    // Update badge visually
    var tm=tierMeta(next);
    this.className="tier-badge "+tm.cls;
    this.textContent=tm.label;
  });

  // Admin: auto-seed salaries by order
  el=document.getElementById("btn-autoseed-salaries");
  if(el)el.addEventListener("click",function(){
    var all=mergedGolfers();
    if(!all.length){toast("No golfers in field");return;}
    all.forEach(function(g,idx){
      var tier=idx<10?"t1":idx<25?"t2":idx<50?"t3":"t4";
      var salary=tierMeta(tier).salary;
      var salInp=document.querySelector('[data-sal-for="'+g.id+'"]');
      var tierSel=document.querySelector('[data-tier-for="'+g.id+'"]');
      if(salInp)salInp.value=salary;
      if(tierSel)tierSel.value=tier;
    });
    toast("Auto-assigned — tap Save to commit");
  });

  // Admin: save salaries
  el=document.getElementById("btn-save-salaries");
  if(el)el.addEventListener("click",function(){
    var all=mergedGolfers();
    var sal={};
    all.forEach(function(g){
      var salInp=document.querySelector('[data-sal-for="'+g.id+'"]');
      var tierSel=document.querySelector('[data-tier-for="'+g.id+'"]');
      var salary=salInp?parseInt(salInp.value)||0:0;
      var tier=tierSel?tierSel.value:"t4";
      if(salary>0)sal[g.id]={name:g.name,salary:salary,tier:tier};
    });
    DB.ref(BASE+"/salaries").set(sal,function(err){
      if(!err)toast("✓ Salaries saved!");
      else toast("Error saving salaries");
    });
  });

  // Admin: clear entire field
  el=document.getElementById("btn-clear-field");
  if(el)el.addEventListener("click",function(){
    if(!confirm("Clear ALL golfers from the field? This also clears salaries."))return;
    var updates={};
    updates[BASE+"/field"]=null;
    updates[BASE+"/salaries"]=null;
    DB.ref().update(updates,function(err){
      if(!err)toast("Field cleared");
    });
  });
}

// ── KICK OFF ──────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
