<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#fdf8ee;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#c0392b;--red2:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none}

.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;text-align:center}
.app-name{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:7px;font-weight:700;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;display:block}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s;background:#fff;color:var(--text)}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-gold{background:var(--gold-bg);color:var(--gold-dark)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-red{background:var(--red-bg);color:var(--red2)}
.btn-blue{background:var(--blue-bg);color:var(--blue)}

.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;gap:0;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 12px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;flex:1;text-align:center}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.page{display:none}.page.active{display:block}
.wrap{max-width:600px;margin:0 auto;padding:14px 12px 60px}

/* PICK PAGE */
.cap-bar{background:#ffffff;border-bottom:2px solid var(--border2);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:40}
.cap-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.cap-amount{font-size:20px;font-weight:900;color:var(--text);line-height:1}
.cap-amount.over{color:var(--red2)}
.cap-amount.ok{color:var(--green)}
.cap-slots{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.cap-slot{width:26px;height:8px;border-radius:3px;border:2px solid var(--border2);background:var(--cream)}
.cap-slot.filled{background:var(--green);border-color:var(--green)}
.cap-slot.over{background:var(--red2);border-color:var(--red2)}
.cap-right{margin-left:auto;text-align:right}
.cap-remaining{font-size:16px;font-weight:900;color:var(--text)}
.cap-remaining.over{color:var(--red2)}

.search-bar{padding:8px 12px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;gap:6px;align-items:center}
.search-input{flex:1;background:#ffffff;border:2px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;color:var(--text);outline:none;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.search-input::placeholder{color:var(--dim)}
.filter-btn{padding:6px 10px;border-radius:8px;font-size:9px;font-weight:800;border:2px solid var(--border2);background:#ffffff;color:var(--muted);font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border2)}
.filter-btn.active{background:var(--gold-bg);border-color:var(--border);color:var(--gold-dark)}

.golfer-list{display:flex;flex-direction:column;gap:0}
.golfer-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border2);background:#ffffff;transition:background .1s}
.golfer-row:active{background:var(--cream)}
.golfer-row.selected{background:var(--green-bg)}
.golfer-row.over-budget{opacity:.45}
.golfer-rank-badge{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;border:2px solid var(--border2);background:var(--cream);color:var(--muted)}
.golfer-rank-badge.top5{background:var(--gold-bg);border-color:var(--border);color:var(--gold-dark)}
.golfer-rank-badge.top10{background:#fff5e8;border-color:var(--border2);color:#b45309}
.golfer-rank-badge.top25{background:var(--blue-bg);border-color:var(--border2);color:var(--blue)}
.golfer-info{flex:1;min-width:0}
.golfer-name{font-size:13px;font-weight:900;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.golfer-country{font-size:9px;font-weight:700;color:var(--muted)}
.golfer-salary{font-size:13px;font-weight:900;color:var(--text);flex-shrink:0}
.golfer-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:#ffffff;color:var(--dim)}
.golfer-row.selected .golfer-check{background:var(--green);border-color:var(--green);color:#ffffff}

.my-picks-section{padding:12px 14px;border-bottom:2px solid var(--border2);background:#ffffff}
.my-picks-title{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.my-picks-grid{display:flex;flex-direction:column;gap:6px}
.pick-chip{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--cream);border-radius:8px;border:2px solid var(--border2)}
.pick-chip.empty{border-style:dashed;background:none}
.pick-chip-num{font-size:9px;font-weight:900;color:var(--dim);width:14px}
.pick-chip-name{font-size:12px;font-weight:800;color:var(--text);flex:1}
.pick-chip-salary{font-size:11px;font-weight:900;color:var(--muted)}
.pick-chip-remove{width:20px;height:20px;border-radius:5px;background:var(--red-bg);border:none;color:var(--red2);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

.submit-bar{padding:10px 14px;border-top:2px solid var(--border);background:#ffffff;position:sticky;bottom:0;z-index:40}
.submit-btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:900;border:2px solid var(--border);cursor:pointer;background:var(--gold);color:var(--text);font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.submit-btn:active{transform:translate(3px,3px);box-shadow:none}
.submit-btn:disabled{background:var(--border2);color:var(--dim);box-shadow:none;cursor:default}

/* LEADERBOARD */
.lb-card{background:#ffffff;border:2px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:4px 4px 0 var(--border)}
.lb-head{padding:10px 14px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:center}
.lb-title{font-size:13px;font-weight:900;color:var(--text)}
.lb-sub{font-size:9px;font-weight:800;color:var(--muted)}
.lb-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border2)}
.lb-row:last-child{border-bottom:none}
.lb-row.me{background:var(--gold-bg)}
.lb-rank{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;border:2px solid var(--border2)}
.lb-rank.r1{background:var(--gold-bg);border-color:var(--border);color:var(--gold-dark)}
.lb-rank.r2{background:#f5f5f5;border-color:var(--border2);color:var(--muted)}
.lb-rank.r3{background:#fff5e8;border-color:var(--border2);color:#b45309}
.lb-rank.rn{background:#ffffff;border-color:var(--border2);color:var(--dim)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:900;color:var(--text)}
.lb-team{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.lb-chip{font-size:8px;font-weight:800;padding:2px 6px;border-radius:5px;border:1px solid var(--border2);background:var(--cream);color:var(--muted)}
.lb-chip.cut{text-decoration:line-through;opacity:.5}
.lb-right{text-align:right;flex-shrink:0}
.lb-score{font-size:18px;font-weight:900;color:var(--text);line-height:1}
.lb-score.under{color:var(--green)}
.lb-score.over{color:var(--red2)}
.lb-score-label{font-size:8px;font-weight:800;color:var(--muted)}
.lb-cap{font-size:9px;font-weight:800;color:var(--muted);margin-top:2px}

/* ADMIN */
.admin-section{background:#ffffff;border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:4px 4px 0 var(--border)}
.admin-title{font-size:12px;font-weight:900;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.score-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2)}
.score-row:last-child{border-bottom:none}
.score-name{font-size:12px;font-weight:800;flex:1}
.score-input{width:70px;padding:5px 8px;font-size:12px;font-weight:800;border:2px solid var(--border);border-radius:7px;background:var(--cream);color:var(--text);font-family:'Nunito',sans-serif;text-align:center}
.score-pos{width:40px;padding:5px 6px;font-size:11px;font-weight:800;border:2px solid var(--border2);border-radius:7px;background:#ffffff;color:var(--muted);font-family:'Nunito',sans-serif;text-align:center}
.cut-toggle{padding:4px 8px;font-size:9px;font-weight:800;border-radius:7px;border:2px solid var(--border2);background:#ffffff;color:var(--muted);font-family:'Nunito',sans-serif}
.cut-toggle.cut{background:var(--red-bg);border-color:var(--border);color:var(--red2)}

/* USER SCREEN */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:150px;box-shadow:3px 3px 0 var(--border)}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}
.user-btn-sub{font-size:8px;font-weight:700;color:var(--muted);margin-top:3px}
.add-user-btn{padding:10px 20px;border-radius:12px;background:var(--blue-bg);border:2px solid var(--border);font-size:13px;font-weight:800;color:var(--blue);box-shadow:3px 3px 0 var(--border)}

.section-label{font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;margin-top:16px}
.section-label:first-child{margin-top:0}
</style>
</head>

var CAP = 50000;
var MAX_PICKS = 6;

// ── State ───────────────────────────────────────────────────
var ST = {
  page: "picks",
  user: null,
  users: [],
  picks: {},       // ukey -> [golfer names]
  scores: {},      // golfer name -> {score, pos, cut}
  locked: false,
  isAdmin: false,
  filterAffordable: false,
  search: ""
};

function ukey(n){ return String(n).toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,""); }
function fmt(n){ return "$"+Number(n).toLocaleString(); }

// ── Toast ───────────────────────────────────────────────────
var _toastT;
function toast(msg){
  var el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(_toastT);
  _toastT=setTimeout(function(){el.classList.remove("show");},2200);
}

// ── Tab switching ───────────────────────────────────────────
var tabs=document.querySelectorAll(".ptab");
for(var i=0;i<tabs.length;i++){
  tabs[i].addEventListener("click",function(){
    var p=this.getAttribute("data-page");
    ST.page=p;
    var all=document.querySelectorAll(".ptab");
    for(var j=0;j<all.length;j++) all[j].classList.remove("active");
    this.classList.add("active");
    var pages=document.querySelectorAll(".page");
    for(var j=0;j<pages.length;j++) pages[j].classList.remove("active");
    document.getElementById("page-"+p).classList.add("active");
    if(p==="leaderboard") drawLeaderboard();
    if(p==="admin") drawAdmin();
  });
}

// ── My current picks (in progress, not yet saved) ──────────
var draftPicks = []; // array of golfer names

function myCapUsed(){
  var total=0;
  for(var i=0;i<draftPicks.length;i++){
    var g=golferByName(draftPicks[i]);
    if(g) total+=g.salary;
  }
  return total;
}

function golferByName(n){
  for(var i=0;i<GOLFERS.length;i++) if(GOLFERS[i].name===n) return GOLFERS[i];
  return null;
}

function drawCapBar(){
  var used=myCapUsed();
  var remaining=CAP-used;
  var over=used>CAP;
  var el=document.getElementById("cap-used");
  el.textContent=fmt(used);
  el.className="cap-amount"+(over?" over":used>0?" ok":"");
  var rem=document.getElementById("cap-remaining");
  rem.textContent=fmt(remaining);
  rem.className="cap-remaining"+(over?" over":"");
  var slots=document.getElementById("cap-slots");
  var sh="";
  for(var i=0;i<MAX_PICKS;i++){
    var cls="cap-slot"+(i<draftPicks.length?(over?" over":" filled"):"");
    sh+='<div class="'+cls+'"></div>';
  }
  slots.innerHTML=sh;
}

function drawMyPicks(){
  var g=document.getElementById("my-picks-grid");
  var h="";
  for(var i=0;i<MAX_PICKS;i++){
    var name=draftPicks[i]||"";
    if(name){
      var gol=golferByName(name);
      h+='<div class="pick-chip">'
        +'<span class="pick-chip-num">'+(i+1)+'</span>'
        +'<span class="pick-chip-name">'+name+'</span>'
        +'<span class="pick-chip-salary">'+(gol?fmt(gol.salary):"")+'</span>'
        +'<button class="pick-chip-remove" onclick="removePick(\''+name.replace(/'/g,"\\'")+'\')">&times;</button>'
        +'</div>';
    } else {
      h+='<div class="pick-chip empty">'
        +'<span class="pick-chip-num">'+(i+1)+'</span>'
        +'<span class="pick-chip-name" style="color:var(--dim);font-weight:700">Pick a golfer...</span>'
        +'</div>';
    }
  }
  g.innerHTML=h;
}

function removePick(name){
  var idx=draftPicks.indexOf(name);
  if(idx>=0){ draftPicks.splice(idx,1); draw(); }
}

function togglePick(name){
  if(!ST.user){toast("Select a player first"); showUserScreen(); return;}
  var idx=draftPicks.indexOf(name);
  if(idx>=0){
    draftPicks.splice(idx,1);
  } else {
    if(draftPicks.length>=MAX_PICKS){toast("Already have 6 golfers"); return;}
    var g=golferByName(name);
    if(!g) return;
    if(myCapUsed()+g.salary>CAP){toast("Over the $50K salary cap!"); return;}
    draftPicks.push(name);
  }
  draw();
}

function drawGolferList(){
  var used=myCapUsed();
  var list=document.getElementById("golfer-list");
  var h="";
  var q=ST.search.toLowerCase();
  for(var i=0;i<GOLFERS.length;i++){
    var g=GOLFERS[i];
    if(q && g.name.toLowerCase().indexOf(q)<0) continue;
    var isPicked=draftPicks.indexOf(g.name)>=0;
    var wouldExceed=(!isPicked)&&(used+g.salary>CAP);
    var over=wouldExceed&&draftPicks.length<MAX_PICKS;
    if(ST.filterAffordable && over && !isPicked) continue;
    var rankCls="golfer-rank-badge"+(g.rank<=5?" top5":g.rank<=10?" top10":g.rank<=25?" top25":"");
    var rowCls="golfer-row"+(isPicked?" selected":over?" over-budget":"");
    h+='<div class="'+rowCls+'" onclick="togglePick(\''+g.name.replace(/'/g,"\\'")+'\')">'
      +'<div class="'+rankCls+'">'+g.rank+'</div>'
      +'<div class="golfer-info">'
      +'<div class="golfer-name">'+g.name+'</div>'
      +'<div class="golfer-country">'+g.country+' &bull; World #'+g.rank+'</div>'
      +'</div>'
      +'<div class="golfer-salary">'+fmt(g.salary)+'</div>'
      +'<div class="golfer-check">'+(isPicked?'&#10003;':'')+'</div>'
      +'</div>';
  }
  list.innerHTML=h||'<div style="padding:20px;text-align:center;color:var(--dim);font-size:12px;font-weight:800">No golfers found</div>';
}

function drawSubmitBtn(){
  var btn=document.getElementById("submit-btn");
  var used=myCapUsed();
  var n=draftPicks.length;
  if(ST.locked){
    btn.disabled=true;
    btn.textContent="Picks are locked";
    return;
  }
  if(!ST.user){
    btn.disabled=true;
    btn.textContent="Select a player to save picks";
    return;
  }
  if(n<MAX_PICKS){
    btn.disabled=true;
    btn.textContent="Pick "+(MAX_PICKS-n)+" more golfer"+(MAX_PICKS-n>1?"s":"");
    return;
  }
  if(used>CAP){
    btn.disabled=true;
    btn.textContent="Over cap by "+fmt(used-CAP);
    return;
  }
  btn.disabled=false;
  btn.textContent="Save Picks  ("+fmt(used)+" / "+fmt(CAP)+")";
}

function draw(){
  drawCapBar();
  drawMyPicks();
  drawGolferList();
  drawSubmitBtn();
  drawTopbar();
}

function drawTopbar(){
  var el=document.getElementById("topbar-right");
  if(ST.user){
    el.innerHTML='<button class="btn btn-gold" onclick="showUserScreen()">'+ST.user+'</button>';
  } else {
    el.innerHTML='<button class="btn btn-gold" onclick="showUserScreen()">Select Player</button>';
  }
}

function toggleAffordable(){
  ST.filterAffordable=!ST.filterAffordable;
  var btn=document.getElementById("filter-affordable");
  btn.classList.toggle("active",ST.filterAffordable);
  drawGolferList();
}

document.getElementById("search-input").addEventListener("input",function(){
  ST.search=this.value;
  drawGolferList();
});

// ── Submit picks ────────────────────────────────────────────
function submitPicks(){
  if(!ST.user||draftPicks.length<MAX_PICKS) return;
  var uk=ukey(ST.user);
  db.ref("usopen/picks/"+uk).set({
    name:ST.user,
    picks:draftPicks,
    cap:myCapUsed(),
    ts:Date.now()
  },function(err){
    if(err){toast("Error saving"); return;}
    ST.picks[uk]={name:ST.user,picks:draftPicks.slice(),cap:myCapUsed()};
    toast("Picks saved!");
  });
}

// ── Leaderboard ─────────────────────────────────────────────
function totalScore(picks){
  var tot=0;
  var hasCut=false;
  for(var i=0;i<picks.length;i++){
    var sc=ST.scores[picks[i]]||{};
    if(sc.cut){hasCut=true; continue;}
    tot+=Number(sc.score||0);
  }
  return {total:tot,hasCut:hasCut};
}

function formatScore(n){
  if(n===0) return "E";
  if(n>0) return "+"+n;
  return ""+n;
}

function drawLeaderboard(){
  var wrap=document.getElementById("lb-wrap");
  var h='<div class="section-label">Leaderboard</div>';
  var entries=[];
  for(var uk in ST.picks){
    var p=ST.picks[uk];
    var sc=totalScore(p.picks||[]);
    entries.push({name:p.name,picks:p.picks||[],cap:p.cap||0,total:sc.total,hasCut:sc.hasCut,uk:uk});
  }
  entries.sort(function(a,b){return a.total-b.total;});

  if(!entries.length){
    h+='<div style="padding:40px 20px;text-align:center;color:var(--dim);font-weight:800;font-size:12px">No picks submitted yet</div>';
    wrap.innerHTML=h;
    return;
  }

  h+='<div class="lb-card"><div class="lb-head"><span class="lb-title">Standings</span><span class="lb-sub">'+entries.length+' entries</span></div>';
  for(var i=0;i<entries.length;i++){
    var e=entries[i];
    var rn=i+1;
    var rankCls=rn===1?"r1":rn===2?"r2":rn===3?"r3":"rn";
    var isMe=ST.user&&ukey(ST.user)===e.uk;
    var scoreStr=formatScore(e.total);
    var scoreCls=e.total<0?"under":e.total>0?"over":"";
    h+='<div class="lb-row'+(isMe?" me":"")+'">'
      +'<div class="lb-rank '+rankCls+'">'+rn+'</div>'
      +'<div class="lb-info">'
      +'<div class="lb-name">'+e.name+'</div>'
      +'<div class="lb-team">';
    for(var j=0;j<e.picks.length;j++){
      var pname=e.picks[j];
      var psc=ST.scores[pname]||{};
      var chipCls="lb-chip"+(psc.cut?" cut":"");
      var pscore=psc.cut?"CUT":(psc.score!==undefined?formatScore(Number(psc.score)):"--");
      h+='<span class="'+chipCls+'">'+pname+(pscore!=="--"?" ("+pscore+")":"")+'</span>';
    }
    h+='</div>'
      +'<div class="lb-cap">Cap: '+fmt(e.cap)+'</div>'
      +'</div>'
      +'<div class="lb-right">'
      +'<div class="lb-score '+scoreCls+'">'+scoreStr+'</div>'
      +'<div class="lb-score-label">Total</div>'
      +'</div>'
      +'</div>';
  }
  h+='</div>';
  wrap.innerHTML=h;
}

// ── Admin ────────────────────────────────────────────────────
function drawAdmin(){
  if(!ST.isAdmin){ document.getElementById("admin-wrap").innerHTML='<div style="padding:40px;text-align:center;color:var(--dim);font-weight:800">Admin only</div>'; return; }
  var wrap=document.getElementById("admin-wrap");
  var h='';

  // Lock toggle
  h+='<div class="section-label">Pool Controls</div>';
  h+='<div class="admin-section">';
  h+='<div class="admin-title">Settings</div>';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">';
  h+='<span style="font-size:12px;font-weight:800;flex:1">Picks Locked</span>';
  h+='<button class="btn '+(ST.locked?"btn-red":"btn-green")+'" onclick="toggleLock()">'+(ST.locked?"Locked":"Open")+'</button>';
  h+='</div></div>';

  // Scores entry
  h+='<div class="section-label">Enter Scores</div>';
  h+='<div class="admin-section">';
  h+='<div class="admin-title">Live Scores (to par)</div>';
  for(var i=0;i<GOLFERS.length;i++){
    var g=GOLFERS[i];
    var sc=ST.scores[g.name]||{};
    var scoreVal=sc.score!==undefined?sc.score:"";
    var posVal=sc.pos||"";
    var isCut=sc.cut||false;
    h+='<div class="score-row">'
      +'<span class="score-name">#'+g.rank+' '+g.name+'</span>'
      +'<input class="score-input" id="sc-'+ukey(g.name)+'" type="number" placeholder="E" value="'+scoreVal+'" onchange="saveScore(\''+g.name.replace(/'/g,"\\'")+'\')">'
      +'<input class="score-pos" id="pos-'+ukey(g.name)+'" type="text" placeholder="pos" value="'+posVal+'" onchange="saveScore(\''+g.name.replace(/'/g,"\\'")+'\')">'
      +'<button class="cut-toggle'+(isCut?" cut":"")+'" id="cut-'+ukey(g.name)+'" onclick="toggleCut(\''+g.name.replace(/'/g,"\\'")+'\')">'+( isCut?"CUT":"in")+'</button>'
      +'</div>';
  }
  h+='</div>';
  wrap.innerHTML=h;
}

function toggleLock(){
  ST.locked=!ST.locked;
  db.ref("usopen/meta/locked").set(ST.locked);
  toast(ST.locked?"Picks locked":"Picks opened");
  drawAdmin();
  draw();
}

function saveScore(name){
  var uk=ukey(name);
  var scoreEl=document.getElementById("sc-"+uk);
  var posEl=document.getElementById("pos-"+uk);
  var cutEl=document.getElementById("cut-"+uk);
  if(!scoreEl) return;
  var scoreVal=scoreEl.value===""?null:Number(scoreEl.value);
  var posVal=posEl?posEl.value:"";
  var isCut=cutEl&&cutEl.classList.contains("cut");
  var obj={};
  if(scoreVal!==null) obj.score=scoreVal;
  if(posVal) obj.pos=posVal;
  if(isCut) obj.cut=true;
  db.ref("usopen/scores/"+uk).set(obj);
  ST.scores[name]=obj;
}

function toggleCut(name){
  var uk=ukey(name);
  var btn=document.getElementById("cut-"+uk);
  if(!btn) return;
  var isCut=btn.classList.toggle("cut");
  btn.textContent=isCut?"CUT":"in";
  var sc=ST.scores[name]||{};
  if(isCut){ sc.cut=true; } else { delete sc.cut; sc.score=0; var inp=document.getElementById("sc-"+uk); if(inp) inp.value=""; }
  ST.scores[name]=sc;
  db.ref("usopen/scores/"+uk).set(sc);
}

// ── User screen ──────────────────────────────────────────────
function showUserScreen(){
  var overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px";
  var box=document.createElement("div");
  box.style.cssText="background:#ffffff;border:3px solid var(--border);border-radius:16px;width:100%;max-width:380px;padding:20px;box-shadow:5px 5px 0 var(--border);max-height:80vh;overflow-y:auto";
  var h='<div style="font-size:14px;font-weight:900;margin-bottom:16px">Who are you?</div>';
  h+='<div style="display:flex;flex-direction:column;gap:8px">';
  if(ST.users.length===0){
    h+='<div style="color:var(--dim);font-size:12px;font-weight:700;padding:10px 0">No players yet. Add one below.</div>';
  }
  for(var i=0;i<ST.users.length;i++){
    var u=ST.users[i];
    var pk=ST.picks[ukey(u)];
    var sub=pk?"Picks submitted":"No picks yet";
    h+='<button class="user-btn" onclick="selectUser(\''+u.replace(/'/g,"\\'")+'\',overlay)">'
      +u+'<div class="user-btn-sub">'+sub+'</div></button>';
  }
  h+='</div>';
  h+='<div style="margin-top:12px;display:flex;gap:6px">';
  h+='<input id="new-user-inp" type="text" placeholder="Add new player..." style="flex:1;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;font-weight:700;font-family:Nunito,sans-serif;background:var(--cream);outline:none">';
  h+='<button class="btn btn-blue" onclick="addNewUser()">Add</button>';
  h+='</div>';
  h+='<button style="width:100%;margin-top:10px;padding:8px;border-radius:8px;font-size:11px;font-weight:800;border:2px solid var(--border2);background:#ffffff;color:var(--muted);cursor:pointer;font-family:Nunito,sans-serif" onclick="document.body.removeChild(overlay)">Cancel</button>';
  box.innerHTML=h;
  overlay.appendChild(box);
  overlay.addEventListener("click",function(e){if(e.target===overlay) document.body.removeChild(overlay);});
  document.body.appendChild(overlay);
  window._userOverlay=overlay;
  // allow enter key
  setTimeout(function(){
    var inp=document.getElementById("new-user-inp");
    if(inp) inp.addEventListener("keydown",function(e){if(e.key==="Enter") addNewUser();});
  },50);
}

function selectUser(name,overlay){
  ST.user=name;
  if(overlay&&overlay.parentNode) overlay.parentNode.removeChild(overlay);
  // Load their existing picks into draft
  var uk=ukey(name);
  var saved=ST.picks[uk];
  if(saved&&saved.picks) draftPicks=saved.picks.slice();
  else draftPicks=[];
  draw();
  toast("Playing as "+name);
}

function addNewUser(){
  var inp=document.getElementById("new-user-inp");
  if(!inp) return;
  var name=inp.value.trim();
  if(!name) return;
  if(ST.users.indexOf(name)>=0){toast("Already exists");return;}
  ST.users.push(name);
  db.ref("usopen/players/"+ukey(name)).set({name:name,ts:Date.now()},function(err){
    if(err){toast("Error");return;}
  });
  var overlay=window._userOverlay;
  if(overlay&&overlay.parentNode) overlay.parentNode.removeChild(overlay);
  selectUser(name,null);
}

// ── Load from Firebase ───────────────────────────────────────
function loadData(){
  db.ref("usopen").on("value",function(snap){
    var d=snap.val()||{};
    // Players
    var pl=d.players||{};
    ST.users=[];
    for(var k in pl) ST.users.push(pl[k].name||k);
    ST.users.sort();
    // Picks
    ST.picks={};
    var pk=d.picks||{};
    for(var k in pk) ST.picks[k]=pk[k];
    // Scores
    ST.scores={};
    var sc=d.scores||{};
    for(var k in sc){
      // find golfer name by ukey
      for(var i=0;i<GOLFERS.length;i++){
        if(ukey(GOLFERS[i].name)===k){ ST.scores[GOLFERS[i].name]=sc[k]; break; }
      }
    }
    // Meta
    ST.locked=!!(d.meta&&d.meta.locked);
    // Admin check
    var adminUsers=d.meta&&d.meta.admins?d.meta.admins:{};
    if(ST.user) ST.isAdmin=!!(adminUsers[ukey(ST.user)]);
    // Show admin tab if admin
    var atab=document.getElementById("admin-tab");
    if(atab) atab.style.display=ST.isAdmin?"":"none";
    // Reload draft if user changed
    if(ST.user&&ST.picks[ukey(ST.user)]&&!draftPicks.length){
      draftPicks=(ST.picks[ukey(ST.user)].picks||[]).slice();
    }
    if(ST.page==="leaderboard") drawLeaderboard();
    if(ST.page==="admin") drawAdmin();
    draw();
  });
}

loadData();
draw();
</script>
</body>
</html>
