<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">

<title>SCORECERY – NHL Draft Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#fdf8ee;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#c0392b;--red2:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none;touch-action:manipulation}

/* ── TOPBAR ── */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;overflow:hidden;text-align:center}
.app-name{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:7px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;display:block}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--text);box-shadow:2px 2px 0 var(--border)}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold-bg);color:var(--gold-dark)}
.btn-red{background:var(--red-bg);color:var(--red2)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-blue{background:var(--blue-bg);color:var(--blue)}

/* ── SCORECERY logo ── */
.scorecery-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:inherit;color:#ffffff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111111;text-shadow:1px 1px 0 #111111,2px 2px 0 #111111,3px 3px 0 #111111,5px 5px 0 #4c1d95,7px 7px 0 #2e1158,8px 8px 0 #1a0a33;paint-order:stroke fill}

/* ── PAGE TABS ── */
.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;gap:0;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 12px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;flex:1;text-align:center}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── USER SELECT ── */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:150px;box-shadow:3px 3px 0 var(--border)}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}
.user-btn-sub{font-size:8px;font-weight:700;color:var(--muted);margin-top:3px}

/* ── SUBMIT BAR ── */
.submit-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px;border-top:2px solid var(--border);background:#ffffff;z-index:40;max-width:600px;margin:0 auto}
.submit-btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:900;border:2px solid var(--border);cursor:pointer;background:var(--gold);color:var(--text);font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.submit-btn:active{transform:translate(3px,3px);box-shadow:none}
.submit-btn:disabled{background:var(--border2);color:var(--dim);box-shadow:none;cursor:default}
.submit-btn:disabled:active{transform:none}

/* ── LOCK NOTE ── */
.lock-note{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--red-bg);border-bottom:2px solid var(--border);font-size:10px;font-weight:800;color:var(--red2);flex-shrink:0}

/* ── LEADERBOARD ── */
.lb-wrap{padding:14px 12px 80px;max-width:600px;margin:0 auto}
.lb-card{background:#ffffff;border:2px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:4px 4px 0 var(--border)}
.lb-head{padding:10px 14px;background:var(--cream);border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:center}
.lb-title{font-size:13px;font-weight:900;color:var(--text)}
.lb-sub{font-size:9px;font-weight:800;color:var(--muted)}
.lb-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border2);flex-wrap:wrap}
.lb-row:last-child{border-bottom:none}
.lb-row.me{background:var(--gold-bg)}
.lb-rank{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;border:2px solid var(--border2)}
.lb-rank.r1{background:var(--gold-bg);border-color:var(--border);color:var(--gold-dark)}
.lb-rank.r2{background:#f5f5f5;border-color:var(--border2);color:var(--muted)}
.lb-rank.r3{background:#fff5e8;border-color:var(--border2);color:#b45309}
.lb-rank.rn{background:#ffffff;border-color:var(--border2);color:var(--dim)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:900;color:var(--text)}
.lb-detail{font-size:9px;font-weight:700;color:var(--muted);margin-top:2px}
.lb-right{text-align:right;flex-shrink:0}
.lb-score{font-size:20px;font-weight:900;color:var(--text);line-height:1}
.lb-score-label{font-size:8px;font-weight:800;color:var(--muted)}

/* ── ADMIN ── */
.adm-wrap{padding:14px 12px 80px;max-width:600px;margin:0 auto}
.adm-card{background:#ffffff;border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:4px 4px 0 var(--border)}
.adm-title{font-size:12px;font-weight:900;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border2)}
.adm-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border2)}
.adm-row:last-child{border-bottom:none}
.adm-name{font-size:12px;font-weight:800;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-inp{width:68px;padding:5px 8px;font-size:12px;font-weight:800;border:2px solid var(--border);border-radius:7px;background:var(--cream);color:var(--text);font-family:'Nunito',sans-serif;text-align:center}
.score-inp:focus{border-color:var(--blue);outline:none}

/* ── PROSPECT ROWS ── */
.prospect-list{padding-bottom:100px}
.prospect-row{background:#ffffff;border-bottom:1px solid var(--border2);padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.prospect-row:active{background:var(--cream)}
.prospect-row.picked{background:var(--blue-bg)}
.pr-pos{min-width:34px;height:28px;padding:0 4px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;flex-shrink:0;border:2px solid var(--border2)}
.pos-c{background:var(--gold-bg);border-color:var(--border);color:var(--gold-dark)}
.pos-lw{background:var(--green-bg);border-color:var(--border2);color:var(--green)}
.pos-rw{background:var(--blue-bg);border-color:var(--border2);color:var(--blue)}
.pos-d{background:var(--red-bg);border-color:var(--border2);color:var(--red2)}
.pos-g{background:var(--purple-bg);border-color:var(--border2);color:var(--purple)}
.pos-f{background:#fff5e8;border-color:var(--border2);color:#b45309}
.pr-info{flex:1;min-width:0}
.pr-name{font-size:13px;font-weight:900;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-meta{font-size:9px;font-weight:700;color:var(--muted);margin-top:1px}
.pr-pick-badge{min-width:44px;text-align:right;flex-shrink:0}
.pr-pick-num{font-size:18px;font-weight:900;line-height:1;color:var(--blue)}
.pr-pick-label{font-size:8px;font-weight:700;color:var(--muted);margin-top:1px;text-align:center}
.pr-pick-empty{font-size:20px;font-weight:900;color:var(--dim)}
.pr-result-wrap{text-align:right;flex-shrink:0;min-width:56px}
.pr-actual-label{font-size:8px;font-weight:700;color:var(--muted)}
.pr-actual-num{font-size:16px;font-weight:900;line-height:1;color:var(--text)}
.pr-pts{font-size:9px;font-weight:900;margin-top:1px}
.pts-exact{color:var(--gold-dark)}
.pts-close{color:var(--green)}
.pts-near{color:var(--blue)}
.pts-far{color:var(--muted)}

/* ── PICK SHEET ── */
.pick-sheet{position:fixed;bottom:0;left:0;right:0;background:#ffffff;border-top:3px solid var(--border);z-index:100;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);max-height:85vh;overflow-y:auto;border-radius:16px 16px 0 0;box-shadow:0 -4px 0 var(--border)}
.pick-sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:5px;background:var(--border2);border-radius:3px;margin:12px auto 8px;display:block}
.sheet-title{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;padding:0 16px 12px;color:var(--text)}
.sheet-prospect{padding:12px 16px;border-bottom:1px solid var(--border2)}
.sp-name{font-size:17px;font-weight:900}
.sp-meta{font-size:10px;font-weight:700;color:var(--muted);margin-top:3px}
.pick-input-wrap{padding:16px}
.pick-input-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.pick-number-row{display:flex;align-items:center;gap:10px}
.pick-stepper{width:44px;height:44px;border-radius:10px;background:var(--cream);border:2px solid var(--border);font-size:22px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;box-shadow:2px 2px 0 var(--border);flex-shrink:0}
.pick-stepper:active{transform:translate(2px,2px);box-shadow:none}
.pick-num-display{flex:1;text-align:center;font-size:38px;font-weight:900;line-height:1;background:var(--gold-bg);border:3px solid var(--border);border-radius:12px;padding:10px;box-shadow:3px 3px 0 var(--border)}
.pick-num-display.unset{color:var(--dim)}
.sheet-actions{display:flex;gap:10px;padding:12px 16px 24px}
.sheet-btn{flex:1;padding:13px;border-radius:10px;font-size:12px;font-weight:900;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border);cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.sheet-btn:active{transform:translate(3px,3px);box-shadow:none}
.sheet-btn-cancel{background:#ffffff;color:var(--muted)}
.sheet-btn-save{background:var(--gold);color:var(--text)}
.sheet-btn-save:disabled{background:var(--border2);color:var(--dim);border-color:var(--border2);box-shadow:none;cursor:not-allowed}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99;display:none}
.sheet-overlay.visible{display:block}

/* ── SCORE BREAKDOWN ── */
.score-breakdown{width:100%;margin-top:8px;padding:0 2px 4px}
.breakdown-head{display:grid;grid-template-columns:1fr 46px 46px 36px;gap:6px;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:0 0 6px;border-bottom:1px solid var(--border2)}
.breakdown-row{display:grid;grid-template-columns:1fr 46px 46px 36px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2)}
.breakdown-row:last-child{border-bottom:none}
.br-name{font-size:10px;font-weight:800;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.br-cell{font-size:10px;font-weight:700;color:var(--muted);text-align:center}
.br-pts{font-size:10px;font-weight:900;text-align:right}

/* ── SCORING LEGEND ── */
.scoring-legend{background:var(--cream);border-bottom:2px solid var(--border2);padding:10px 14px}
.legend-title{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
.legend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:800;color:var(--text)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.picks-progress{font-size:9px;font-weight:700;color:var(--muted);text-align:center;margin-top:5px}

/* ── MISC ── */
.fade-up{animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted);font-size:13px;font-weight:800">Loading…</div></div>
<div id="sheet-overlay" class="sheet-overlay" onclick="closeSheet()"></div>
<div id="pick-sheet" class="pick-sheet">
  <span class="sheet-handle"></span>
  <div class="sheet-title">Guess the Pick</div>
  <div id="sheet-prospect-info" class="sheet-prospect"></div>
  <div class="pick-input-wrap">
    <div class="pick-input-label">Your Predicted Pick #</div>
    <div class="pick-number-row">
      <div class="pick-stepper" onclick="stepPick(-1)">&#8722;</div>
      <div class="pick-num-display unset" id="pick-num-display">&#8211;</div>
      <div class="pick-stepper" onclick="stepPick(1)">+</div>
    </div>
  </div>
  <div class="sheet-actions">
    <button class="sheet-btn sheet-btn-cancel" onclick="closeSheet()">Cancel</button>
    <button class="sheet-btn sheet-btn-save" id="sheet-save-btn" disabled onclick="saveSheetPick()">Save Pick</button>
  </div>
</div>
<div id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────
var FIREBASE_CONFIG = {
  apiKey:"AIzaSyC3vplPPMXETk4bVjCMp5HarJmrVuHXvBo",
  authDomain:"rwc-picks.firebaseapp.com",
  databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",
  projectId:"rwc-picks",
  storageBucket:"rwc-picks.appspot.com",
  messagingSenderId:"624357810541",
  appId:"1:624357810541:web:a1be2a234a1fcb5e7b4560"
};

var POOL_ID       = "nhldraft2026";
var TOTAL_PICKS   = 32;
var MASTER_PW     = "Sloop";

var SCORING = [
  { maxDiff:  0, pts: 20, label: "Exact",  cls: "pts-exact" },
  { maxDiff:  1, pts: 15, label: "\u00b11",     cls: "pts-close" },
  { maxDiff:  3, pts: 10, label: "\u00b12-3",   cls: "pts-close" },
  { maxDiff:  5, pts:  6, label: "\u00b14-5",   cls: "pts-near"  },
  { maxDiff: 10, pts:  3, label: "\u00b16-10",  cls: "pts-near"  },
  { maxDiff: 999,pts:  1, label: "\u00b111+",   cls: "pts-far"   }
];

// 2026 NHL Draft Top 32 Prospects (McKeen's / ESPN consensus)
var PROSPECTS = [
  {name:"Gavin McKenna",       pos:"C",  league:"WHL",   team:"Medicine Hat"},
  {name:"Ivar Stenberg",       pos:"C",  league:"SHL",   team:"Djurgarden"},
  {name:"Chase Reid",          pos:"D",  league:"OHL",   team:"Soo Greyhounds"},
  {name:"Caleb Malhotra",      pos:"C",  league:"OHL",   team:"Brantford"},
  {name:"Carson Carels",       pos:"C",  league:"WHL",   team:"Tri-City"},
  {name:"Alberts Smits",       pos:"D",  league:"SHL",   team:"Djurgarden"},
  {name:"Viggo Bjorck",        pos:"D",  league:"SHL",   team:"Frolunda"},
  {name:"Keaton Verhoeff",     pos:"D",  league:"NCAA",  team:"North Dakota"},
  {name:"Malte Gustafsson",    pos:"D",  league:"SHL",   team:"Farjestad"},
  {name:"Wyatt Cullen",        pos:"LW", league:"NTDP",  team:"USA U18"},
  {name:"Daxon Rudolph",       pos:"C",  league:"WHL",   team:"Saskatoon"},
  {name:"Ethan Belchetz",      pos:"LW", league:"OHL",   team:"Hamilton"},
  {name:"Tynan Lawrence",      pos:"LW", league:"QMJHL", team:"Halifax"},
  {name:"Elton Hermansson",    pos:"D",  league:"SHL",   team:"Modo"},
  {name:"Oscar Hemming",       pos:"RW", league:"SHL",   team:"Djurgarden"},
  {name:"Maddox Dagenais",     pos:"RW", league:"QMJHL", team:"Chicoutimi"},
  {name:"Ryan Lin",            pos:"D",  league:"NCAA",  team:"Michigan"},
  {name:"Alexander Command",   pos:"C",  league:"WHL",   team:"Prince George"},
  {name:"Oliver Suvanto",      pos:"C",  league:"Liiga", team:"Tappara"},
  {name:"Nikita Klepov",       pos:"LW", league:"KHL",   team:"CSKA"},
  {name:"Adam Novotny",        pos:"C",  league:"QMJHL", team:"Val-d'Or"},
  {name:"Ilia Morozov",        pos:"D",  league:"KHL",   team:"Metallurg"},
  {name:"Mathis Preston",      pos:"RW", league:"WHL",   team:"Swift Current"},
  {name:"JP Hurlbert",         pos:"C",  league:"NCAA",  team:"Boston College"},
  {name:"Xavier Villeneuve",   pos:"LW", league:"QMJHL", team:"Rimouski"},
  {name:"Dmitri Borichev",     pos:"G",  league:"KHL",   team:"Dynamo Moscow"},
  {name:"Tommy Bleyl",         pos:"D",  league:"WHL",   team:"Red Deer"},
  {name:"Adam Goljer",         pos:"C",  league:"Slovak",team:"HK Dukla"},
  {name:"Tobias Trejbal",      pos:"G",  league:"Czech", team:"HC Plzen"},
  {name:"Gleb Pugachyov",      pos:"RW", league:"MHL",   team:"Dynamo Moscow"},
  {name:"Juho Piiparinen",     pos:"LW", league:"Liiga", team:"KalPa"},
  {name:"Jakub Vanecek",       pos:"D",  league:"Czech", team:"HC Plzen"}
];

var PARTS = [];
var BASE = "pools/"+POOL_ID;
var DB = null;
try{ firebase.initializeApp(FIREBASE_CONFIG); DB=firebase.database(); }catch(e){}

var ST = {
  page:"picks",
  user:null,
  picks:{},
  results:{},
  admin:false,
  locked:false,
  expandedLb:null
};

var GROUP_ID       = (new URLSearchParams(location.search)).get("group") || null;
var URL_USER       = (new URLSearchParams(location.search)).get("user")  || null;
var GROUP_ADMIN_PW = null;

var sheetProspect = null;
var sheetPickNum  = null;

// ── HELPERS ────────────────────────────────────────────
function ukey(n){ return String(n||"").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,""); }
function x(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function pkey(p){ return ukey(p.name); }

function posClass(pos){
  if(!pos) return "pos-f";
  switch(pos.toUpperCase()){
    case "C":  return "pos-c";
    case "LW": return "pos-lw";
    case "RW": return "pos-rw";
    case "D":  return "pos-d";
    case "G":  return "pos-g";
    default:   return "pos-f";
  }
}

function scoreGuess(guess, actual){
  if(!guess||!actual) return null;
  var diff=Math.abs(Number(guess)-Number(actual));
  for(var i=0;i<SCORING.length;i++){
    if(diff<=SCORING[i].maxDiff) return {pts:SCORING[i].pts,diff:diff,label:SCORING[i].label,cls:SCORING[i].cls};
  }
  return {pts:0,diff:diff,label:"Miss",cls:"pts-far"};
}

function calcTotal(guesses){
  var total=0, hasResult=false;
  PROSPECTS.forEach(function(p){
    var actual=ST.results[pkey(p)], guess=guesses?guesses[pkey(p)]:null;
    if(actual&&guess){ hasResult=true; var s=scoreGuess(guess,actual); if(s) total+=s.pts; }
  });
  return hasResult?total:null;
}

function countGuesses(guesses){
  if(!guesses) return 0;
  var n=0; PROSPECTS.forEach(function(p){ if(guesses[pkey(p)]) n++; }); return n;
}

function myGuesses(){ if(!ST.user) return {}; var s=ST.picks[ukey(ST.user)]; return(s&&s.guesses)?s.guesses:{}; }

// ── TOAST ──────────────────────────────────────────────
var _tt;
function toast(m){ var el=document.getElementById("toast"); el.innerHTML=m; el.classList.add("show"); clearTimeout(_tt); _tt=setTimeout(function(){ el.classList.remove("show"); },2500); }

// ── TOPBAR ─────────────────────────────────────────────
function renderTopbar(){
  var h='<div class="topbar">';
  h+='<div class="topbar-left"><a href="index.html" style="display:flex;align-items:center;gap:3px;text-decoration:none;color:var(--muted);font-size:9px;font-weight:600;padding:4px 8px;border:1px solid var(--border);border-radius:6px;white-space:nowrap">&#8592; Hub</a></div>';
  h+='<div class="topbar-center"><div class="app-name"><span class="scorecery-logo">SCORECERY</span></div><div class="app-sub">2026 NHL Draft &bull; Round 1 &bull; June 26, Buffalo</div></div>';
  h+='<div class="topbar-right">';
  if(ST.user) h+='<span class="tag">'+x(ST.user)+'</span>';
  if(ST.user&&!URL_USER) h+='<button class="btn btn-ghost" id="b-switch">&#8646;</button>';
  h+='<button class="btn '+(ST.admin?"btn-gold":"btn-ghost")+'" id="b-admin">'+(ST.admin?"&#9889;":"&#9881;")+'</button>';
  h+='</div></div>';
  return h;
}

// ── DRAW ───────────────────────────────────────────────
function draw(){
  var root=document.getElementById("root");
  if(!root) return;
  var h=renderTopbar();

  h+='<div class="page-bar">';
  h+='<button class="ptab'+(ST.page==="picks"?" active":"")+'" data-page="picks">&#127944; Picks</button>';
  h+='<button class="ptab'+(ST.page==="leaderboard"?" active":"")+'" data-page="leaderboard">&#128202; Pool</button>';
  if(ST.admin) h+='<button class="ptab'+(ST.page==="results"?" active":"")+'" data-page="results">&#9881; Admin</button>';
  h+='</div>';

  if(!ST.user && ST.page==="picks"){
    h+=renderUserSelect();
    root.innerHTML=h; attachListeners(); return;
  }

  if(ST.page==="picks")            h+=renderPicks();
  else if(ST.page==="leaderboard") h+=renderLeaderboard();
  else if(ST.page==="results")     h+=renderResultsAdmin();

  root.innerHTML=h;
  attachListeners();
}

function renderUserSelect(){
  var h='<div class="user-screen fade-up"><h2>Who are you?</h2><div class="user-grid">';
  PARTS.forEach(function(name){
    var s=ST.picks[ukey(name)], n=s?countGuesses(s.guesses):0;
    h+='<div class="user-btn" data-user="'+x(name)+'">'+x(name)+'<div class="user-btn-sub">'+(n>0?n+" / "+PROSPECTS.length+" picked":"No picks yet")+'</div></div>';
  });
  h+='</div></div>';
  return h;
}

function renderPicks(){
  var guesses=myGuesses(), n=countGuesses(guesses);
  var h="";
  if(ST.locked) h+='<div class="lock-note">&#128274; Picks are locked</div>';

  h+='<div class="scoring-legend"><div class="legend-title">Scoring</div><div class="legend-grid">';
  SCORING.forEach(function(s){
    var col=s.cls==="pts-exact"?"#b89a00":s.cls==="pts-close"?"#5dba4a":s.cls==="pts-near"?"#5590e8":"#aaaaaa";
    h+='<div class="legend-item"><div class="legend-dot" style="background:'+col+'"></div>'+s.label+': '+s.pts+'pts</div>';
  });
  h+='</div></div>';

  h+='<div class="prospect-list">';
  PROSPECTS.forEach(function(p){
    var pk=pkey(p), guess=guesses[pk], actual=ST.results[pk];
    var sc=(guess&&actual)?scoreGuess(guess,actual):null;
    h+='<div class="prospect-row'+(guess?" picked":"")+'" data-prospect="'+pk+'">';
    h+='<div class="pr-pos '+posClass(p.pos)+'">'+x(p.pos)+'</div>';
    h+='<div class="pr-info"><div class="pr-name">'+x(p.name)+'</div><div class="pr-meta">'+x(p.league)+' &middot; '+x(p.team)+'</div></div>';
    if(actual){
      h+='<div class="pr-result-wrap"><div class="pr-actual-label">Actual</div><div class="pr-actual-num">#'+actual+'</div>';
      if(sc) h+='<div class="pr-pts '+sc.cls+'">+'+sc.pts+' pts</div>';
      h+='</div>';
    }
    h+='<div class="pr-pick-badge">';
    if(guess){ h+='<div class="pr-pick-num">#'+guess+'</div><div class="pr-pick-label">your pick</div>'; }
    else { h+='<div class="pr-pick-empty">+</div>'; }
    h+='</div></div>';
  });
  h+='</div>';

  h+='<div class="submit-bar">';
  h+='<button class="submit-btn"'+(ST.locked||n===0?" disabled":"")+' id="b-submit">Save Picks</button>';
  h+='<div class="picks-progress">'+n+' / '+PROSPECTS.length+' picks made</div>';
  h+='</div>';
  return h;
}

function renderLeaderboard(){
  var entries=[];
  PARTS.forEach(function(name){
    var uk=ukey(name), s=ST.picks[uk], guesses=s?(s.guesses||{}):{};
    entries.push({name:name,uk:uk,guesses:guesses,total:calcTotal(guesses),n:countGuesses(guesses)});
  });
  var hasResults=Object.keys(ST.results).length>0;
  if(hasResults) entries.sort(function(a,b){
    if(a.total===null&&b.total===null) return 0;
    if(a.total===null) return 1; if(b.total===null) return -1;
    return b.total-a.total;
  });

  var h='<div class="lb-wrap fade-up"><div class="lb-card">';
  h+='<div class="lb-head"><span class="lb-title">&#128202; Leaderboard</span><span class="lb-sub">'+entries.filter(function(e){return e.n>0;}).length+' entries &middot; '+(hasResults?"Results in":"Awaiting draft")+'</span></div>';
  if(!entries.length) h+='<div style="padding:40px 20px;text-align:center;color:var(--dim);font-size:12px;font-weight:800">No participants yet</div>';

  entries.forEach(function(e,i){
    var rn=i+1, rankCls=rn===1?"r1":rn===2?"r2":rn===3?"r3":"rn";
    var isMe=ST.user&&ukey(ST.user)===e.uk;
    var isExpanded=ST.expandedLb===e.uk;
    h+='<div class="lb-row'+(isMe?" me":"")+'" data-lb="'+e.uk+'" style="cursor:'+(e.n>0&&hasResults?"pointer":"default")+'">';
    h+='<div class="lb-rank '+rankCls+'">'+(hasResults?rn:"&#8211;")+'</div>';
    h+='<div class="lb-info"><div class="lb-name">'+x(e.name)+'</div><div class="lb-detail">'+e.n+' / '+PROSPECTS.length+' picks</div></div>';
    h+='<div class="lb-right">';
    if(e.total!==null){ h+='<div class="lb-score">'+e.total+'</div><div class="lb-score-label">pts</div>'; }
    else { h+='<div class="lb-score" style="color:var(--dim)">&#8211;</div><div class="lb-score-label">'+(e.n>0?"no results":"no picks")+'</div>'; }
    h+='</div>';
    if(isExpanded&&e.n>0&&hasResults){
      h+='<div class="score-breakdown">';
      h+='<div class="breakdown-head"><span>Prospect</span><span style="text-align:center">Guess</span><span style="text-align:center">Actual</span><span style="text-align:right">Pts</span></div>';
      PROSPECTS.forEach(function(p){
        var pk=pkey(p), guess=e.guesses[pk], actual=ST.results[pk];
        if(!guess&&!actual) return;
        var sc=(guess&&actual)?scoreGuess(guess,actual):null;
        h+='<div class="breakdown-row"><div class="br-name">'+x(p.name)+'</div><div class="br-cell">'+(guess?"#"+guess:"&#8211;")+'</div><div class="br-cell">'+(actual?"#"+actual:"&#8211;")+'</div><div class="br-pts '+(sc?sc.cls:'')+'">'+(sc?"+"+sc.pts:"&#8211;")+'</div></div>';
      });
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div></div>';
  return h;
}

function renderResultsAdmin(){
  var h='<div class="adm-wrap fade-up">';
  h+='<div class="adm-card"><div class="adm-title">Lock / Unlock Picks</div>';
  h+='<div style="display:flex;gap:8px;align-items:center"><button class="btn '+(ST.locked?"btn-green":"btn-red")+'" id="b-lock">'+(ST.locked?"&#128275; Unlock":"&#128274; Lock Picks")+'</button><span style="font-size:9px;font-weight:700;color:var(--muted)">Picks are currently '+(ST.locked?"LOCKED":"OPEN")+'</span></div></div>';
  h+='<div class="adm-card"><div class="adm-title">Enter Actual Draft Results</div>';
  PROSPECTS.forEach(function(p){
    var pk=pkey(p), val=ST.results[pk]||"";
    h+='<div class="adm-row">';
    h+='<div class="pr-pos '+posClass(p.pos)+'">'+x(p.pos)+'</div>';
    h+='<div class="adm-name">'+x(p.name)+'</div>';
    h+='<span style="font-size:9px;font-weight:800;color:var(--muted);white-space:nowrap">Pick #</span>';
    h+='<input class="score-inp" type="number" min="1" max="64" placeholder="&#8211;" value="'+x(val)+'" data-result-key="'+pk+'">';
    h+='<span style="font-size:14px;color:var(--green);font-weight:900;min-width:16px">'+(val?"&#10003;":"")+'</span>';
    h+='</div>';
  });
  h+='<div style="padding-top:14px"><button class="btn btn-green" id="b-save-results" style="width:100%;padding:12px;font-size:12px">Save All Results</button></div>';
  h+='</div></div>';
  return h;
}

// ── SHEET ──────────────────────────────────────────────
function openSheet(pk){
  if(ST.locked){ toast("&#128274; Picks are locked"); return; }
  if(!ST.user){ toast("Select your name first"); return; }
  var p=PROSPECTS.find(function(pr){ return pkey(pr)===pk; });
  if(!p) return;
  sheetProspect=p; sheetPickNum=myGuesses()[pk]?Number(myGuesses()[pk]):null;
  document.getElementById("sheet-prospect-info").innerHTML='<div class="sp-name">'+x(p.name)+'</div><div class="sp-meta">'+x(p.pos)+' &middot; '+x(p.league)+' &middot; '+x(p.team)+'</div>';
  updateSheetDisplay();
  document.getElementById("pick-sheet").classList.add("open");
  document.getElementById("sheet-overlay").classList.add("visible");
}

function closeSheet(){
  document.getElementById("pick-sheet").classList.remove("open");
  document.getElementById("sheet-overlay").classList.remove("visible");
  sheetProspect=null;
}

function updateSheetDisplay(){
  var d=document.getElementById("pick-num-display"), btn=document.getElementById("sheet-save-btn");
  if(sheetPickNum){ d.textContent="#"+sheetPickNum; d.classList.remove("unset"); btn.disabled=false; }
  else { d.innerHTML="&#8211;"; d.classList.add("unset"); btn.disabled=true; }
}

function stepPick(dir){
  var cur=sheetPickNum||0;
  if(!sheetPickNum&&dir>0) cur=0;
  if(!sheetPickNum&&dir<0) cur=TOTAL_PICKS+1;
  sheetPickNum=Math.max(1,Math.min(TOTAL_PICKS*2,cur+dir));
  updateSheetDisplay();
}

function saveSheetPick(){
  if(!sheetProspect||!sheetPickNum||!ST.user) return;
  var pk=pkey(sheetProspect), uk=ukey(ST.user);
  if(!ST.picks[uk]) ST.picks[uk]={name:ST.user,guesses:{}};
  if(!ST.picks[uk].guesses) ST.picks[uk].guesses={};
  ST.picks[uk].guesses[pk]=sheetPickNum;
  if(DB) DB.ref(BASE+"/picks/"+uk+"/guesses/"+pk).set(sheetPickNum);
  closeSheet(); draw(); toast("Pick saved &#10003;");
}

// ── SUBMIT ─────────────────────────────────────────────
function submitPicks(){
  if(!ST.user||ST.locked) return;
  var uk=ukey(ST.user), obj={name:ST.user,guesses:myGuesses(),ts:Date.now()};
  if(DB){ DB.ref(BASE+"/picks/"+uk).set(obj,function(err){ if(err){toast("Error saving");return;} ST.picks[uk]=obj; toast("&#10003; Picks saved!"); }); }
  else toast("No database connection");
}

// ── ADMIN ──────────────────────────────────────────────
function showAdminPrompt(){
  var pw=prompt("Admin password:");
  if(!pw) return;
  if(pw===MASTER_PW||(GROUP_ADMIN_PW&&pw===GROUP_ADMIN_PW)){
    ST.admin=true; ST.page="results"; draw(); toast("&#9889; Admin mode on");
  } else toast("Wrong password");
}

function toggleLock(){
  ST.locked=!ST.locked;
  if(DB) DB.ref(BASE+"/meta/locked").set(ST.locked);
  draw(); toast(ST.locked?"&#128274; Picks locked":"&#128275; Picks unlocked");
}

function saveResults(){
  var inputs=document.querySelectorAll(".score-inp[data-result-key]"), updates={};
  for(var i=0;i<inputs.length;i++){
    var inp=inputs[i], val=inp.value.trim(), pk=inp.getAttribute("data-result-key");
    if(val&&!isNaN(val)&&Number(val)>0){ updates[pk]=Number(val); ST.results[pk]=Number(val); }
    else delete ST.results[pk];
  }
  if(DB) DB.ref(BASE+"/results").set(Object.keys(updates).length?updates:null,function(){ toast("&#10003; Results saved"); draw(); });
  else { toast("No DB"); draw(); }
}

// ── LISTENERS ──────────────────────────────────────────
function attachListeners(){
  var els, i, el;

  // page tabs
  els=document.querySelectorAll(".ptab[data-page]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ ST.page=this.getAttribute("data-page"); draw(); });

  // user select
  els=document.querySelectorAll("[data-user]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ ST.user=this.getAttribute("data-user"); draw(); });

  // switch user
  el=document.getElementById("b-switch"); if(el) el.addEventListener("click",function(){ ST.user=null; ST.page="picks"; draw(); });

  // admin toggle
  el=document.getElementById("b-admin"); if(el) el.addEventListener("click",function(){ if(ST.admin){ ST.admin=false; if(ST.page==="results") ST.page="picks"; draw(); } else showAdminPrompt(); });

  // prospect rows
  els=document.querySelectorAll(".prospect-row[data-prospect]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ openSheet(this.getAttribute("data-prospect")); });

  // submit picks
  el=document.getElementById("b-submit"); if(el) el.addEventListener("click",submitPicks);

  // leaderboard expand
  els=document.querySelectorAll("[data-lb]");
  for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ var uk=this.getAttribute("data-lb"); ST.expandedLb=ST.expandedLb===uk?null:uk; draw(); });

  // admin results
  el=document.getElementById("b-lock"); if(el) el.addEventListener("click",toggleLock);
  el=document.getElementById("b-save-results"); if(el) el.addEventListener("click",saveResults);
}

// ── FIREBASE LOAD ──────────────────────────────────────
function loadData(){
  if(!DB){ draw(); return; }
  function loadGroup(){
    if(!GROUP_ID){ loadPool(); return; }
    DB.ref("groups/"+GROUP_ID).once("value",function(sn){
      var g=sn.val()||{};
      if(g.adminPw) GROUP_ADMIN_PW=g.adminPw;
      if(g.players&&g.players.length) PARTS=g.players;
      loadPool();
    },function(){ loadPool(); });
  }
  function loadPool(){
    DB.ref("globalSettings/masterPw").on("value",function(sn){ if(sn.val()) MASTER_PW=sn.val(); });
    DB.ref(BASE+"/meta/locked").on("value",function(sn){ ST.locked=!!sn.val(); draw(); });
    DB.ref(BASE+"/picks").on("value",function(sn){ ST.picks=sn.val()||{}; draw(); });
    DB.ref(BASE+"/results").on("value",function(sn){ ST.results=sn.val()||{}; draw(); });
    if(URL_USER&&PARTS.indexOf(URL_USER)>=0) ST.user=URL_USER;
    draw();
  }
  loadGroup();
}
loadData();
</script>
</body>
</html>
