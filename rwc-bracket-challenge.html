<!DOCTYPE html>

<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8"/>
<meta name="color-scheme" content="dark"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay - Conference Picks</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,9,15,.92);border-bottom:1px solid #1e2a3a;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.app-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-sub{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.topbar-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag{background:#1e2a3a;border:1px solid #2d3f52;border-radius:20px;padding:3px 10px;font-size:10px;color:#94a3b8}
.tag.green{border-color:#065f46;color:#6ee7b7;background:#022c20}
.sticky-nav{position:sticky;top:52px;z-index:40;background:#0d1117}
.conf-bar{display:flex;overflow-x:auto;border-bottom:1px solid #1e2a3a;-webkit-overflow-scrolling:touch;touch-action:pan-x}
.conf-bar::-webkit-scrollbar{display:none}
.ctab{padding:9px 13px;font-size:11px;font-weight:600;color:#475569;border-bottom:2px solid transparent;white-space:nowrap;background:none;transition:color .15s;position:relative}
.ctab.active{color:#a5b4fc;border-bottom-color:#6366f1}
.cdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.cprog{font-size:8px;color:#334155;margin-left:4px}
.ctab.active .cprog{color:#6366f1}
.page-bar{display:flex;padding:0 10px;border-bottom:1px solid #1e2a3a}
.ptab{padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#475569;border-bottom:2px solid transparent;background:none;transition:color .15s}
.ptab.active{color:#a5b4fc;border-bottom-color:#6366f1}
.btn{border-radius:6px;padding:5px 11px;font-size:10px;font-weight:600;border:1px solid;transition:opacity .15s}
.btn:active{opacity:.65}
.btn-ghost{background:#0d1117;border-color:#1e2a3a;color:#64748b}
.btn-green{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.btn-red{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#fca5a5}
.btn-gold{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.35);color:#fbbf24}
.btn-purple{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.conf-score-bar{display:flex;gap:8px;padding:7px 14px;border-bottom:1px solid #1e2a3a;overflow-x:auto;-webkit-overflow-scrolling:touch}
.conf-score-bar::-webkit-scrollbar{display:none}
.cscore{background:#0d1117;border:1px solid #1e2a3a;border-radius:6px;padding:4px 10px;font-size:9px;white-space:nowrap;text-align:center;flex-shrink:0}
.cscore .csl{color:#475569;font-size:8px}
.cscore .csv{color:#f1f5f9;font-weight:700;font-size:12px}
.cscore.active-conf{border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.08)}
.user-screen{display:flex;flex-direction:column;align-items:center;padding:44px 20px;gap:18px}
.user-screen h2{font-size:11px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:14px 26px;border-radius:10px;background:#0d1117;border:1px solid #1e2a3a;font-size:15px;font-weight:700;color:#e2e8f0;text-align:left;min-width:140px}
.user-btn:active{border-color:#6366f1;background:rgba(99,102,241,.08)}
.user-btn.locked{border-color:rgba(16,185,129,.4);color:#6ee7b7}
.user-btn-sub{font-size:9px;color:#475569;font-weight:400;margin-top:3px}
.lock-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid #1e2a3a;flex-wrap:wrap;background:#090d14}
.lock-chips{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.chip{padding:2px 8px;border-radius:20px;font-size:9px;border:1px solid}
.chip.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.chip.pend{background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.18);color:#475569}
.lock-info{font-size:10px;color:#475569}
.round-bar{display:flex;gap:5px;padding:7px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.round-bar::-webkit-scrollbar{display:none}
.rbtn{padding:3px 10px;border-radius:20px;font-size:9px;border:1px solid;white-space:nowrap;background:none;transition:all .12s}
.rbtn.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.rbtn.inactive{border-color:#1e2a3a;color:#475569}
.bracket-scroll{overflow-x:auto;padding:12px 14px 20px}
.bracket-row{display:flex;gap:14px;min-width:max-content}
.round-col{flex-shrink:0}
.round-label{font-size:9px;color:#6366f1;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.round-date{font-size:8px;color:#334155;margin-bottom:8px}
.games-stack{display:flex;flex-direction:column;gap:8px}
.gc{background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;overflow:hidden;width:170px;transition:border-color .15s}
.gc-head{padding:3px 8px;font-size:8px;color:#475569;border-bottom:1px solid #1e2a3a;display:flex;justify-content:space-between}
.gc-pts-badge{color:#334155;font-size:8px}
.gc-pts-badge.earned{color:#10b981;font-weight:700}
.gc-row{display:flex;align-items:center;gap:6px;padding:7px 8px;border-bottom:1px solid #0f1923;transition:background .1s;-webkit-tap-highlight-color:transparent}
.gc-row:last-child{border-bottom:none}
.gc-row.clickable{cursor:pointer}
.gc-row.picked{background:rgba(99,102,241,.18)}
.gc-row.correct{background:rgba(16,185,129,.18)}
.gc-row.wrong{background:rgba(239,68,68,.14)}
.gc-row.actual{background:rgba(16,185,129,.06)}
.seed{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
.team-name{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#64748b}
.team-name.bold{color:#f1f5f9;font-weight:600}
.team-name.dim{color:#1e3a5f;font-style:italic}
.gc-icon{font-size:10px;flex-shrink:0}
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:6px 14px 14px}
.leg{display:flex;align-items:center;gap:4px;font-size:8px;color:#475569}
.leg-sw{width:10px;height:7px;border-radius:2px}
.reveal-wrap{border-top:1px solid #1e2a3a;padding:14px}
.reveal-title{font-size:10px;color:#10b981;margin-bottom:12px}
.reveal-grid{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
.reveal-grid::-webkit-scrollbar{display:none}
.reveal-col{flex-shrink:0}
.reveal-name{font-size:10px;color:#475569;margin-bottom:6px;font-weight:600}
.reveal-name.me{color:#a5b4fc}
.reveal-col .gc{margin-bottom:6px}
.lb-wrap{padding:14px}
.lb-note{font-size:9px;color:#475569;margin-bottom:14px;line-height:1.8;background:#0d1117;border:1px solid #1e2a3a;border-radius:7px;padding:8px 12px}
.lb-row{background:#0d1117;border:1px solid #1e2a3a;border-radius:9px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center;transition:border-color .2s}
.lb-row.first{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.03)}
.lb-row.second{border-color:rgba(148,163,184,.2)}
.lb-row.third{border-color:rgba(205,127,50,.2)}
.lb-medal{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:6px}
.lb-name{font-size:14px;font-weight:700}
.lb-rank-change{font-size:9px;margin-left:4px}
.lb-rank-change.up{color:#10b981}
.lb-rank-change.down{color:#ef4444}
.lb-pts{font-size:11px;color:#475569;flex-shrink:0}
.lb-pts b{color:#f1f5f9;font-weight:700}
.lb-pts small{font-size:9px;color:#334155}
.progress{background:#0f1923;border-radius:3px;height:4px;position:relative;overflow:hidden;margin-bottom:4px}
.progress-max{position:absolute;left:0;top:0;height:100%;background:rgba(99,102,241,.1)}
.progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;transition:width .6s}
.lb-conf-scores{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.lb-cs{font-size:8px;padding:1px 6px;border-radius:10px;border:1px solid #1e2a3a;color:#334155}
.lb-cs.has-pts{color:#10b981;border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.05)}
.can-win{background:#0d1117;border:1px solid #1e3a2a;border-radius:8px;padding:10px 14px;margin-bottom:14px}
.can-win-title{font-size:9px;color:#10b981;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.can-win-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-top:1px solid #0f1923;font-size:11px}
.can-win-row:first-of-type{border-top:none}
.can-win-name{color:#94a3b8}
.can-win-gap{font-size:9px;color:#10b981}
.can-win-gap.behind{color:#ef4444}
.breakdown{margin-top:18px}
.breakdown-title{font-size:9px;color:#6366f1;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.breakdown table{width:100%;border-collapse:collapse;font-size:10px}
.breakdown th{color:#475569;padding:3px 6px;text-align:center;font-weight:500}
.breakdown th:first-child{text-align:left}
.breakdown td{padding:5px 6px;border-top:1px solid #0f1923;text-align:center}
.breakdown td:first-child{text-align:left;color:#64748b}
.breakdown .tot{color:#f1f5f9;font-weight:700}
.teams-wrap{padding:14px}
.teams-note{font-size:9px;color:#475569;margin-bottom:3px}
.teams-bye{font-size:8px;color:#334155;margin-bottom:10px}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.team-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:7px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.team-badge{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.team-info .tn{font-size:11px;font-weight:600}
.team-info .tr{font-size:8px;color:#475569}
.team-info .tb{font-size:8px;margin-top:1px}
.quick-entry{background:#0d1117;border:1px solid rgba(251,191,36,.25);border-radius:8px;margin:10px 14px;padding:12px 14px}
.qe-title{font-size:9px;color:#fbbf24;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.qe-games{display:flex;flex-direction:column;gap:6px}
.qe-game{display:flex;align-items:center;gap:8px;font-size:11px}
.qe-game-lbl{color:#475569;font-size:9px;width:80px;flex-shrink:0}
.qe-btns{display:flex;gap:4px;flex-wrap:wrap}
.qe-btn{padding:3px 8px;border-radius:5px;font-size:10px;border:1px solid #1e2a3a;background:#0d1117;color:#64748b;transition:all .12s}
.qe-btn.set{border-color:rgba(16,185,129,.4);color:#6ee7b7;background:rgba(16,185,129,.08)}
.qe-btn:active{opacity:.7}
#copy-modal{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:none;align-items:flex-end;justify-content:center}
#copy-modal.open{display:flex}
#pool-browser-modal{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:none;align-items:flex-end;justify-content:center}
#pool-browser-modal.open{display:flex}
.copy-sheet{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px 14px 0 0;width:100%;max-width:480px;padding:20px 16px 32px;max-height:85vh;overflow-y:auto}
.copy-handle{width:36px;height:4px;background:#1e2a3a;border-radius:2px;margin:0 auto 16px}
.copy-title{font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.copy-sub{font-size:10px;color:#475569;margin-bottom:16px}
.copy-step{display:none}.copy-step.active{display:block}
.copy-groups-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.copy-group-row{background:#07090f;border:1px solid #1e2a3a;border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .12s;display:flex;align-items:center;gap:10px}
.copy-group-row:hover{border-color:rgba(99,102,241,.4)}
.copy-group-name{font-size:12px;font-weight:600;color:#f1f5f9;flex:1}
.copy-group-code{font-size:11px;color:#fbbf24;letter-spacing:.12em}
.copy-user-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.copy-user-btn{padding:10px 16px;border-radius:8px;background:#07090f;border:1px solid #1e2a3a;font-size:13px;font-weight:600;color:#e2e8f0;cursor:pointer;transition:all .12s}
.copy-user-btn:hover{border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.06)}
.copy-pw-input{width:100%;background:#07090f;border:1px solid #1e2a3a;border-radius:8px;padding:11px 12px;color:#f1f5f9;font-size:14px;font-family:inherit;box-sizing:border-box;margin-bottom:6px}
.copy-pw-input:focus{outline:none;border-color:rgba(99,102,241,.4)}
.copy-error{font-size:10px;color:#fca5a5;min-height:14px;margin-bottom:8px}
.copy-btn-row{display:flex;gap:8px;margin-bottom:8px}
.copy-back-btn{padding:9px 14px;border-radius:8px;background:#07090f;border:1px solid #1e2a3a;color:#64748b;font-size:12px;font-family:inherit;cursor:pointer}
.copy-confirm-btn{flex:1;padding:9px;border-radius:8px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.35);color:#a5b4fc;font-size:12px;font-family:inherit;cursor:pointer}
.copy-cancel-btn{width:100%;padding:9px;border-radius:8px;background:none;border:none;color:#334155;font-size:11px;font-family:inherit;cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:#0d1117;border:1px solid rgba(99,102,241,.4);color:#a5b4fc;border-radius:8px;padding:8px 18px;font-size:11px;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes trophy{0%{transform:scale(1) rotate(0)}25%{transform:scale(1.4) rotate(-15deg)}50%{transform:scale(1.4) rotate(15deg)}75%{transform:scale(1.2) rotate(-8deg)}100%{transform:scale(1) rotate(0)}}
.trophy-anim{display:inline-block;animation:trophy .8s ease both}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:900;display:none}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#475569;font-size:14px">Loading...</div></div>
<div id="toast"></div>
<div id="tm" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:flex-end;justify-content:center">
  <div style="background:#0d1117;border:1px solid #1e2a3a;border-radius:14px 14px 0 0;width:100%;max-width:480px;padding:20px 16px 28px">
    <div style="width:36px;height:4px;background:#1e2a3a;border-radius:2px;margin:0 auto 16px"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div id="tm-badge" style="width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0"></div>
      <div><div id="tm-name" style="font-size:19px;font-weight:700;color:#f1f5f9"></div><div id="tm-conf" style="font-size:10px;color:#475569;margin-top:3px"></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div style="background:#07090f;border:1px solid #1e2a3a;border-radius:8px;padding:11px;text-align:center"><div id="tm-ap" style="font-size:22px;font-weight:700;color:#fbbf24;margin-bottom:3px">-</div><div style="font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:.06em">AP Poll</div></div>
      <div style="background:#07090f;border:1px solid #1e2a3a;border-radius:8px;padding:11px;text-align:center"><div id="tm-net" style="font-size:22px;font-weight:700;color:#6ee7b7;margin-bottom:3px">-</div><div style="font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:.06em">NET Rank</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:#07090f;border:1px solid #1e2a3a;border-radius:8px;padding:11px;text-align:center"><div id="tm-kenpom" style="font-size:22px;font-weight:700;color:#a5b4fc;margin-bottom:3px">-</div><div style="font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:.06em">KenPom</div></div>
      <div style="background:#07090f;border:1px solid #1e2a3a;border-radius:8px;padding:11px;text-align:center"><div id="tm-scorer" style="font-size:12px;font-weight:700;color:#f472b6;margin-bottom:3px;line-height:1.3">-</div><div style="font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:.06em">Top Scorer</div></div>
    </div>
    <div id="tm-src" style="font-size:8px;color:#334155;text-align:center;margin-bottom:14px"></div>
    <button id="tm-close" style="width:100%;padding:11px;border-radius:8px;background:#1e2a3a;border:none;color:#94a3b8;font-size:13px;font-family:inherit;cursor:pointer">Close</button>
  </div>
</div>
<div id="tm-edit" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:201;align-items:flex-end;justify-content:center">
  <div style="background:#0d1117;border:1px solid #fbbf24;border-radius:14px 14px 0 0;width:100%;max-width:480px;padding:20px 16px 28px">
    <div style="width:36px;height:4px;background:#2d2200;border-radius:2px;margin:0 auto 16px"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div id="tme-badge" style="width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0"></div>
      <div><div id="tme-name" style="font-size:19px;font-weight:700;color:#f1f5f9"></div><div style="font-size:10px;color:#fbbf24;margin-top:3px">&#9889; Admin Edit</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px">
      <div><label style="display:block;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Seed</label><input id="tme-seed" type="number" min="1" max="20" style="width:100%;background:#07090f;border:1px solid #1e2a3a;border-radius:8px;padding:10px;color:#f1f5f9;font-size:20px;font-weight:700;font-family:inherit;box-sizing:border-box;text-align:center"></div>

function saveEditTM(){var m=document.getElementById(“tm-edit”),name=m.getAttribute(“data-tname”);var newSeed=parseInt(document.getElementById(“tme-seed”).value)||1;var newRec=document.getElementById(“tme-rec”).value.trim();for(var cid in C){for(var i=0;i<C[cid].teams.length;i++)if(C[cid].teams[i].n===name){C[cid].teams[i].s=newSeed;C[cid].teams[i].r=newRec;break;}C[cid].teams.sort(function(a,b){return a.s-b.s;});}saveTeams();hideEditTM();draw();toast(“Saved: “+name);}

function openCopyModal(){_copyTarget=null;showCopyStep(1);document.getElementById(“copy-sub”).textContent=“Select a group to copy your picks into”;document.getElementById(“copy-modal”).classList.add(“open”);var list=document.getElementById(“copy-groups-list”);list.innerHTML=’<div style="color:#334155;font-size:11px;text-align:center;padding:12px">Loading…</div>’;if(!DB){list.innerHTML=’<div style="color:#334155;font-size:11px;text-align:center;padding:12px">Firebase unavailable</div>’;return;}DB.ref(“groups”).once(“value”,function(sn){var all=sn.val()||{};var eligible=Object.values(all).filter(function(g){return(g.pools||[]).indexOf(“rwc”)>=0&&g.id!==GROUP_ID;});if(!eligible.length){list.innerHTML=’<div style="color:#334155;font-size:11px;text-align:center;padding:12px">No other groups found.</div>’;return;}list.innerHTML=””;eligible.forEach(function(g){var row=document.createElement(“div”);row.className=“copy-group-row”;row.innerHTML=’<div class="copy-group-name">’+x(g.name||“Unnamed”)+’</div><div class="copy-group-code">’+x(g.id)+’</div><span style="color:#475569">›</span>’;row.addEventListener(“click”,function(){_copyTarget=g;document.getElementById(“copy-target-name”).textContent=g.name||g.id;document.getElementById(“copy-target-name-2”).textContent=g.name||g.id;document.getElementById(“copy-pw”).value=””;document.getElementById(“copy-pw-error”).textContent=””;showCopyStep(2);});list.appendChild(row);});});}
function showCopyStep(n){[1,2,3].forEach(function(i){var el=document.getElementById(“copy-step-”+i);if(el)el.classList.toggle(“active”,i===n);});}
function closeCopyModal(){document.getElementById(“copy-modal”).classList.remove(“open”);_copyTarget=null;}
function copyPicksToUser(targetUser){if(!_copyTarget||!ST.user||!DB)return;var myAllPicks=ST.picks[ST.user]||{},targetBase=“groups/”+_copyTarget.id+”/data/rwc”,updates={};CORD.forEach(function(cid){if(myAllPicks[cid]&&Object.keys(myAllPicks[cid]).length)updates[targetBase+”/picks/”+targetUser+”/”+cid]=myAllPicks[cid];});if(!Object.keys(updates).length){toast(“No picks to copy”);closeCopyModal();return;}DB.ref().update(updates,function(err){if(err)toast(“Copy failed”);else{toast(“Picks copied to “+_copyTarget.name+” ✓”);closeCopyModal();}});}
function bindCopyModal(){document.getElementById(“copy-cancel-1”).addEventListener(“click”,closeCopyModal);document.getElementById(“copy-cancel-2”).addEventListener(“click”,closeCopyModal);document.getElementById(“copy-cancel-3”).addEventListener(“click”,closeCopyModal);document.getElementById(“copy-back-2”).addEventListener(“click”,function(){showCopyStep(1);});document.getElementById(“copy-back-3”).addEventListener(“click”,function(){showCopyStep(2);});document.getElementById(“copy-pw-confirm”).addEventListener(“click”,function(){if(!_copyTarget)return;var pw=document.getElementById(“copy-pw”).value.trim();var errEl=document.getElementById(“copy-pw-error”);if(pw!==_copyTarget.adminPw&&pw!==MASTER_PW){errEl.textContent=“Wrong password”;return;}errEl.textContent=””;var grid=document.getElementById(“copy-user-grid”);grid.innerHTML=””;(_copyTarget.players||[]).forEach(function(p){var btn=document.createElement(“button”);btn.className=“copy-user-btn”;btn.textContent=p;btn.addEventListener(“click”,function(){copyPicksToUser(p);});grid.appendChild(btn);});showCopyStep(3);});}
bindCopyModal();
boot();
</script>
