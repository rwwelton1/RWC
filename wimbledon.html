<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – 2026 Wimbledon</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#f8f5f0;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee;--shadow:#111111
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,a{font-family:'Nunito',sans-serif;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button{border:none;outline:none}
a{color:inherit;text-decoration:none}

/* ── TOPBAR ── */
.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.header-center{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.header-sub{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.tag{background:var(--gold-bg);border:2px solid var(--border);border-radius:20px;padding:4px 10px;font-size:9px;color:var(--text);font-weight:800;box-shadow:3px 3px 0 var(--border);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag.locked{background:var(--red-bg);color:var(--red)}
.btn{border-radius:8px;padding:5px 12px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border);transition:transform .1s,box-shadow .1s;font-family:'Nunito',sans-serif}
.btn:active{transform:translate(3px,3px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold);color:var(--text)}
.btn-red{background:var(--red-bg);color:var(--red)}
.btn-green{background:var(--green-bg);color:var(--green)}

/* ── PAGE TABS ── */
.page-bar{background:#ffffff;border-bottom:3px solid var(--border);display:flex;padding:0;overflow-x:auto}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:10px 6px;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:4px solid transparent;background:none;white-space:nowrap;flex:1;text-align:center;font-family:'Nunito',sans-serif}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

/* ── LOCK BAR ── */
.lock-bar{display:flex;align-items:center;gap:7px;padding:6px 12px;border-bottom:2px solid var(--border2);flex-wrap:wrap;background:var(--cream)}
.lock-info{font-size:9px;color:var(--muted);font-weight:800}
.lock-chips{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.lchip{padding:2px 8px;border-radius:20px;font-size:8px;font-weight:800;border:2px solid var(--border);cursor:pointer;box-shadow:3px 3px 0 var(--border);font-family:'Nunito',sans-serif}
.lchip:active{transform:translate(3px,3px);box-shadow:none}
.lchip.done{background:var(--green-bg);color:var(--green)}
.lchip.pend{background:#ffffff;color:var(--muted)}
.lchip.viewing{background:var(--gold);color:var(--text)}

/* ── SCORE BANNER ── */
.score-banner{display:flex;gap:6px;padding:8px 12px;border-bottom:2px solid var(--border2);overflow-x:auto;align-items:center;background:var(--cream)}
.score-banner::-webkit-scrollbar{display:none}
.sb-item{background:#ffffff;border:2px solid var(--border);border-radius:10px;padding:5px 12px;font-size:8px;white-space:nowrap;text-align:center;flex-shrink:0;box-shadow:3px 3px 0 var(--border)}
.sb-item .sl{color:var(--muted);font-size:7px;font-weight:800;text-transform:uppercase}
.sb-item .sv{color:var(--text);font-weight:900;font-size:14px;display:block;margin-top:1px}
.sb-item.total{background:var(--gold-bg)}

/* ── LEADERBOARD ── */
.lb-wrap{padding:10px 12px}
.lb-note{font-size:9px;font-weight:700;color:var(--muted);margin-bottom:10px;background:var(--cream);border:2px solid var(--border2);border-radius:10px;padding:8px 12px}
.lb-player-card{animation:fadeSlideUp .25s ease both}
.lb-player-card:nth-child(1){animation-delay:.04s}
.lb-player-card:nth-child(2){animation-delay:.10s}
.lb-player-card:nth-child(3){animation-delay:.16s}
.lb-player-card:nth-child(4){animation-delay:.22s}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── BRACKET STACK ── */
.bracket-stack{padding:10px 12px 40px}
.bstack-round{margin-bottom:18px}
.bstack-header{display:flex;justify-content:space-between;align-items:center;padding:4px 2px 6px;border-bottom:2px solid var(--border);margin-bottom:8px}
.bstack-header span:first-child{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--text)}
.bstack-header .ph{font-size:9px;font-weight:800;color:var(--gold-dark)}
.bstack-cards{display:flex;flex-direction:column;gap:6px}
.mc{background:#ffffff;border:2px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:4px 4px 0 var(--border);flex-shrink:0}
.mc-head{padding:3px 7px;background:var(--cream);border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center}
.mc-lbl{font-size:7px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.mc-pts{font-size:7px;font-weight:900;color:var(--gold-dark)}
.mc-pts.earned{color:var(--green)}
.ts{display:flex;align-items:center;gap:5px;padding:6px 7px;cursor:pointer;min-height:28px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ts:not(:last-child){border-bottom:1px solid var(--border2)}
.ts:active{background:var(--cream)}
.ts.won{background:var(--green-bg)}.ts.won .ts-name{color:var(--green);font-weight:900}
.ts.lost{opacity:.28}
.ts.picked{background:var(--gold-bg)}.ts.picked .ts-name{color:var(--gold-dark);font-weight:900}
.ts.wrong{background:var(--red-bg);opacity:1}.ts.wrong .ts-name{color:var(--red);font-weight:900}
.ts-seed{font-size:7px;font-weight:800;color:var(--dim);width:12px;text-align:right;flex-shrink:0}
.ts-name{font-size:9px;font-weight:800;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.ts-icon{font-size:8px;flex-shrink:0}
.ts-tbd{padding:5px 7px;font-size:8px;font-weight:700;color:var(--dim);font-style:italic;min-height:28px;display:flex;align-items:center}

/* ── ROUND NAV ── */
.round-nav{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--cream);border-bottom:2px solid var(--border2);overflow-x:auto;-webkit-overflow-scrolling:touch}
.round-nav::-webkit-scrollbar{display:none}
.rnav-tab{padding:5px 12px;border-radius:20px;font-size:9px;font-weight:900;border:2px solid var(--border);background:#ffffff;color:var(--muted);white-space:nowrap;box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;flex-shrink:0}
.rnav-tab.active{background:var(--gold);color:var(--text);box-shadow:3px 3px 0 var(--border)}
.rnav-tab:active{transform:translate(2px,2px);box-shadow:none}
.bracket-swipe-wrap{overflow:hidden;position:relative}
.bracket-slide{transition:transform .22s cubic-bezier(.4,0,.2,1);will-change:transform}
.swipe-hint{text-align:center;font-size:8px;font-weight:800;color:var(--dim);padding:6px 0 0;letter-spacing:.05em}
.round-arrows{display:flex;justify-content:space-between;align-items:center;padding:6px 12px}
.rarrow{width:34px;height:34px;border-radius:8px;background:#fff;border:2px solid var(--border);font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif}
.rarrow:active{transform:translate(2px,2px);box-shadow:none}
.rarrow:disabled{opacity:.25;pointer-events:none}
.round-label-big{font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}

.adm-wrap{padding:10px 12px}
.adm-sec-label{font-size:9px;font-weight:900;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;margin-top:16px;padding-bottom:5px;border-bottom:2px solid var(--border2)}
.adm-sec-label:first-child{margin-top:0}
.adm-card{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:4px 4px 0 var(--border)}
.adm-game{background:#fff;border:2px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:6px;box-shadow:3px 3px 0 var(--border)}
.adm-game-title{font-size:8px;font-weight:900;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.adm-btns{display:flex;gap:4px;flex-wrap:wrap}
.adm-btn{padding:5px 11px;border-radius:8px;font-size:9px;font-weight:800;border:2px solid var(--border);background:#fff;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.adm-btn:active{transform:translate(3px,3px);box-shadow:none}
.adm-btn.sel{background:var(--green-bg);color:var(--green)}
.adm-btn.clr{background:var(--red-bg);color:var(--red)}
.adm-phase-btn{width:100%;padding:11px;border-radius:10px;font-size:12px;font-weight:800;border:2px solid var(--border);font-family:'Nunito',sans-serif;cursor:pointer;margin-bottom:6px;box-shadow:5px 5px 0 var(--border)}
.adm-phase-btn:active{transform:translate(5px,5px);box-shadow:none}
.adm-open{background:var(--green-bg);color:var(--green)}
.adm-close{background:var(--red-bg);color:var(--red)}

/* ── USER SELECT ── */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:36px 20px;gap:16px}
.user-screen h2{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:800}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 20px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:13px;font-weight:800;color:var(--text);text-align:left;min-width:130px;box-shadow:5px 5px 0 var(--border)}
.user-btn:active{transform:translate(5px,5px);box-shadow:none}
.user-btn-sub{font-size:8px;color:var(--muted);font-weight:700;margin-top:4px}

/* ── SCORECERY LOGO ── */
.scorecery-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:#ffffff;text-transform:uppercase;letter-spacing:.04em;display:inline-block;white-space:nowrap;-webkit-text-stroke:2.5px #111111;text-shadow:1px 1px 0 #111111,2px 2px 0 #111111,3px 3px 0 #111111,4px 4px 0 #1a4fd6,6px 6px 0 #0a2088,7px 7px 0 #060e44;paint-order:stroke fill}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:12px;padding:8px 18px;font-size:10px;font-weight:800;z-index:9998;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:5px 5px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>

<script>
var BASE = "wimbledon2026";
var MASTER_PW = "Sloop";
var PTS = {r32:2, r16:4, qf:8, sf:15, f:25, champ:40};
var MAX_PTS = 32*2 + 16*4 + 8*8 + 4*15 + 2*25 + 1*40; // 342
var ROUND_LABEL = {r32:"R64", r16:"R32", qf:"R16", sf:"QF", f:"SF", champ:"Final"};

var R32 = [
  {id:"m01",a:"Jannik Sinner",        sa:1,  b:"Nuno Borges",          sb:0},
  {id:"m02",a:"Aleksandar Vukic",     sa:0,  b:"Ignacio Buse",         sb:31},
  {id:"m03",a:"Rafael Jodar",         sa:23, b:"Denis Shapovalov",     sb:0},
  {id:"m04",a:"Shintaro Mochizuki",   sa:0,  b:"Luciano Darderi",      sb:14},
  {id:"m05",a:"Casper Ruud",          sa:11, b:"Hamad Medjedovic",     sb:0},
  {id:"m06",a:"Soonwoo Kwon",         sa:0,  b:"Tommy Paul",           sb:21},
  {id:"m07",a:"Brandon Nakashima",    sa:28, b:"Jan-Lennard Struff",   sb:0},
  {id:"m08",a:"Camilo Ugo Carabelli", sa:0,  b:"Daniil Medvedev",      sb:8},
  {id:"m09",a:"Felix Auger-Aliassime",sa:3,  b:"Adam Walton",          sb:0},
  {id:"m10",a:"Adolfo Daniel Vallejo",sa:0,  b:"Cameron Norrie",       sb:26},
  {id:"m11",a:"A. Davidovich Fokina", sa:22, b:"Thiago Tirante",       sb:0},
  {id:"m12",a:"Luca Van Assche",      sa:0,  b:"Learner Tien",         sb:16},
  {id:"m13",a:"Andrey Rublev",        sa:12, b:"Botic van de Zandschulp",sb:0},
  {id:"m14",a:"Jesper de Jong",       sa:0,  b:"Joao Fonseca",         sb:24},
  {id:"m15",a:"Arthur Rinderknech",   sa:25, b:"Marco Trungelliti",    sb:0},
  {id:"m16",a:"Hugo Gaston",          sa:0,  b:"Novak Djokovic",       sb:7},
  {id:"m17",a:"Alex de Minaur",       sa:5,  b:"Adrian Mannarino",     sb:0},
  {id:"m18",a:"Mattia Bellucci",      sa:0,  b:"Alejandro Tabilo",     sb:30},
  {id:"m19",a:"Karen Khachanov",      sa:19, b:"Yannick Hanfmann",     sb:0},
  {id:"m20",a:"Tallon Griekspoor",    sa:0,  b:"Flavio Cobolli",       sb:9},
  {id:"m21",a:"Jakub Mensik",         sa:15, b:"Dane Sweeny",          sb:0},
  {id:"m22",a:"Stan Wawrinka",        sa:0,  b:"Arthur Fils",          sb:20},
  {id:"m23",a:"Ugo Humbert",          sa:27, b:"Sho Shimabukuro",      sb:0},
  {id:"m24",a:"Damir Dzumhur",        sa:0,  b:"Ben Shelton",          sb:4},
  {id:"m25",a:"Taylor Fritz",         sa:6,  b:"Patrick Kypson",       sb:0},
  {id:"m26",a:"Benjamin Bonzi",       sa:0,  b:"Tomas Etcheverry",     sb:29},
  {id:"m27",a:"Frances Tiafoe",       sa:17, b:"Vit Kopriva",          sb:0},
  {id:"m28",a:"Kyrian Jacquet",       sa:0,  b:"Alexander Bublik",     sb:10},
  {id:"m29",a:"Jiri Lehecka",         sa:13, b:"Alex Molcan",          sb:0},
  {id:"m30",a:"Alex Michelsen",       sa:0,  b:"Francisco Cerundolo",  sb:18},
  {id:"m31",a:"Matteo Arnaldi",       sa:32, b:"Corentin Moutet",      sb:0},
  {id:"m32",a:"Valentin Royer",       sa:0,  b:"Alexander Zverev",     sb:2},
];

var TREE = {
  r16:[
    {id:"r16_0",from:["m01","m02"]},{id:"r16_1",from:["m03","m04"]},
    {id:"r16_2",from:["m05","m06"]},{id:"r16_3",from:["m07","m08"]},
    {id:"r16_4",from:["m09","m10"]},{id:"r16_5",from:["m11","m12"]},
    {id:"r16_6",from:["m13","m14"]},{id:"r16_7",from:["m15","m16"]},
    {id:"r16_8",from:["m17","m18"]},{id:"r16_9",from:["m19","m20"]},
    {id:"r16_10",from:["m21","m22"]},{id:"r16_11",from:["m23","m24"]},
    {id:"r16_12",from:["m25","m26"]},{id:"r16_13",from:["m27","m28"]},
    {id:"r16_14",from:["m29","m30"]},{id:"r16_15",from:["m31","m32"]},
  ],
  qf:[
    {id:"qf_0",from:["r16_0","r16_1"]},{id:"qf_1",from:["r16_2","r16_3"]},
    {id:"qf_2",from:["r16_4","r16_5"]},{id:"qf_3",from:["r16_6","r16_7"]},
    {id:"qf_4",from:["r16_8","r16_9"]},{id:"qf_5",from:["r16_10","r16_11"]},
    {id:"qf_6",from:["r16_12","r16_13"]},{id:"qf_7",from:["r16_14","r16_15"]},
  ],
  sf:[
    {id:"sf_0",from:["qf_0","qf_1"]},{id:"sf_1",from:["qf_2","qf_3"]},
    {id:"sf_2",from:["qf_4","qf_5"]},{id:"sf_3",from:["qf_6","qf_7"]},
  ],
  f:[{id:"f_0",from:["sf_0","sf_1"]},{id:"f_1",from:["sf_2","sf_3"]}],
  champ:[{id:"champ",from:["f_0","f_1"]}]
};

var MID_ROUND={};
R32.forEach(function(m){MID_ROUND[m.id]="r32";});
["r16","qf","sf","f","champ"].forEach(function(r){TREE[r].forEach(function(m){MID_ROUND[m.id]=r;});});
var ALL_IDS=R32.map(function(m){return m.id;});
["r16","qf","sf","f","champ"].forEach(function(r){TREE[r].forEach(function(m){ALL_IDS.push(m.id);});});

// ── URL PARAMS ────────────────────────────────────────────────────────────────
var _params=new URLSearchParams(window.location.search);
var GROUP_ID=_params.get("group")||null;
var URL_USER=_params.get("user")||null;

var ST={page:"leaderboard",user:URL_USER,viewUser:null,admin:false,picks:{},results:{},locked:{},bracketRound:0};
var PARTS=URL_USER?[URL_USER]:[];
var DB=null;
try{
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks",appId:"1:965978379243:web:35f9db9a664f9170e27fae"});
  DB=firebase.database();
}catch(e){}

function x(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");}
var _tt;
function toast(m){var el=document.getElementById("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove("show");},2400);}
function ukey(n){try{return n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"_").replace(/[&'.]/g,"");}catch(e){return n.toLowerCase().replace(/\s+/g,"_").replace(/[&'.]/g,"");}}
function activeViewer(){return ST.viewUser||ST.user||null;}
function isLocked(){return !!(ST.user&&ST.locked[ukey(ST.user)]);}
function isPlayerLocked(p){return !!(ST.locked[ukey(p)]);}
function getR(mid){return(ST.results||{})[mid]||null;}
function getP(mid){var u=activeViewer();if(!u)return null;return((ST.picks||{})[ukey(u)]||{})[mid]||null;}
function getSlot(mid){return getR(mid)||getP(mid)||null;}
function getTeams(mid){
  var r=R32.find(function(m){return m.id===mid;});if(r)return[r.a,r.b];
  var rnd=MID_ROUND[mid];if(!rnd)return[null,null];
  var node=TREE[rnd]&&TREE[rnd].find(function(m){return m.id===mid;});
  if(!node)return[null,null];
  return[getSlot(node.from[0]),getSlot(node.from[1])];
}
function saveP(mid,v){
  if(!ST.user||!DB)return;
  var uk=ukey(ST.user);
  if(!ST.picks[uk])ST.picks[uk]={};
  ST.picks[uk][mid]=v;
  DB.ref(BASE+"/picks/"+uk+"/"+mid).set(v);
  var bo=document.querySelector(".bracket-stack");var sy=bo?bo.scrollTop:0;
  draw();
  if(bo){var bo2=document.querySelector(".bracket-stack");if(bo2)bo2.scrollTop=sy;}
  window.scrollTo(0,0);
  toast("✓ "+v);
}
function removeP(mid){
  if(!ST.user||!DB)return;
  var uk=ukey(ST.user);
  if(ST.picks[uk])delete ST.picks[uk][mid];
  DB.ref(BASE+"/picks/"+uk+"/"+mid).remove();
  var bo=document.querySelector(".bracket-stack");var sy=bo?bo.scrollTop:0;
  draw();
  if(bo){var bo2=document.querySelector(".bracket-stack");if(bo2)bo2.scrollTop=sy;}
  window.scrollTo(0,0);
}
function saveR(mid,v){
  if(!DB)return;
  if(v){ST.results[mid]=v;DB.ref(BASE+"/results/"+mid).set(v);}
  else{delete ST.results[mid];DB.ref(BASE+"/results/"+mid).remove();}
  draw();
}
function calcScore(user){
  var pp=(ST.picks||{})[ukey(user)]||{},t=0;
  ALL_IDS.forEach(function(mid){var p=pp[mid],r=getR(mid);if(p&&r&&p===r)t+=PTS[MID_ROUND[mid]]||0;});
  return t;
}
function calcMax(user){
  var pp=(ST.picks||{})[ukey(user)]||{},t=0;
  ALL_IDS.forEach(function(mid){var p=pp[mid],r=getR(mid);if(r){if(p&&p===r)t+=PTS[MID_ROUND[mid]]||0;}else{if(p)t+=PTS[MID_ROUND[mid]]||0;}});
  return t;
}
function calcRoundScore(user,rnd){
  var pp=(ST.picks||{})[ukey(user)]||{},t=0;
  var ids=rnd==="r32"?R32.map(function(m){return m.id;}):TREE[rnd].map(function(m){return m.id;});
  ids.forEach(function(mid){var p=pp[mid],r=getR(mid);if(p&&r&&p===r)t+=PTS[rnd]||0;});
  return t;
}
function calcRoundCorrect(user,rnd){
  var pp=(ST.picks||{})[ukey(user)]||{},t=0;
  var ids=rnd==="r32"?R32.map(function(m){return m.id;}):TREE[rnd].map(function(m){return m.id;});
  ids.forEach(function(mid){var p=pp[mid],r=getR(mid);if(p&&r&&p===r)t++;});
  return t;
}
function pickCount(user){return Object.keys((ST.picks||{})[ukey(user)]||{}).length;}

var _lastDataHash = null;
function _dataHash(d){
  try{return JSON.stringify({p:d.picks||{},r:d.results||{},l:d.locked||{}});}catch(e){return "";}
}

function _onData(d){
  var hash = _dataHash(d);
  if(hash === _lastDataHash) return; // nothing changed — skip redraw
  _lastDataHash = hash;
  ST.picks=d.picks||{};ST.results=d.results||{};ST.locked=d.locked||{};
  draw();
}

var GROUP_ADMIN_PW = null;

function loadData(){
  if(!DB){draw();return;}
  if(GROUP_ID){
    DB.ref("groups/"+GROUP_ID).once("value",function(sn){
      var g=sn.val()||{};
      var players=g.players||[];
      if(players.length) PARTS=players;
      else if(URL_USER&&PARTS.indexOf(URL_USER)<0) PARTS=[URL_USER];
      GROUP_ADMIN_PW=g.adminPw||g.groupAdminPw||null;
      DB.ref(BASE).on("value",function(sn2){_onData(sn2.val()||{});});
    });
  } else {
    DB.ref(BASE).on("value",function(sn){_onData(sn.val()||{});});
  }
}

// ── BRACKET ───────────────────────────────────────────────────────────────────
var BRACKET_ROUNDS=[
  {rnd:"r32",  mids:null, label:"R64"},
  {rnd:"r16",  mids:null, label:"R32"},
  {rnd:"qf",   mids:null, label:"R16"},
  {rnd:"sf",   mids:null, label:"QF"},
  {rnd:"f",    mids:null, label:"SF"},
  {rnd:"champ",mids:null, label:"Final"},
];
function getBRMids(rnd){
  if(rnd==="r32") return R32.map(function(m){return m.id;});
  return TREE[rnd].map(function(m){return m.id;});
}

function renderBracket(){
  var lk=isLocked();
  var ri=Math.max(0,Math.min(ST.bracketRound, BRACKET_ROUNDS.length-1));
  // Show two rounds at a time; ri is the LEFT round index
  // Clamp so we don't go past the last round
  if(ri>BRACKET_ROUNDS.length-2) ri=Math.max(0,BRACKET_ROUNDS.length-2);

  var rA=BRACKET_ROUNDS[ri];
  var rB=BRACKET_ROUNDS[ri+1]||null;

  // Round nav tabs
  var h='<div class="round-nav" id="round-nav-bar">';
  BRACKET_ROUNDS.forEach(function(r,i){
    // Mark active if this round is one of the two currently shown

    h+='<button class="rnav-tab'+(isActive?" active":"")+'" data-bround="'+i+'">'+r.label+'</button>';
  });
  h+='</div>';

  // Arrows + label
  h+='<div class="round-arrows">';
  h+='<button class="rarrow" id="brnd-prev"'+(ri===0?' disabled':'')+'>&#8592;</button>';
  var labelTxt=rA.label+(rB?' & '+rB.label:'');
  h+='<span class="round-label-big">'+labelTxt+'</span>';
  h+='<button class="rarrow" id="brnd-next"'+(ri>=BRACKET_ROUNDS.length-2?' disabled':'')+'>&#8594;</button>';
  h+='</div>';

  // Two-column layout: each round is a scrollable column
  h+='<div class="bracket-swipe-wrap" id="bracket-swipe-wrap">';
  h+='<div class="bracket-slide" style="display:flex;gap:0">';

  function roundCol(r){
    var mids=getBRMids(r.rnd);
    var col='<div style="flex:1;min-width:0;padding:8px 6px 40px">';
    col+='<div style="font-size:8px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">';
    col+='<span>'+r.label+'</span><span style="color:var(--gold-dark)">+'+PTS[r.rnd]+'pt</span></div>';
    col+='<div class="bstack-cards">';
    mids.forEach(function(mid){ col+=renderCard(mid,r.rnd,lk); });
    col+='</div></div>';
    return col;
  }

  h+=roundCol(rA);
  if(rB) h+=roundCol(rB);

  h+='</div></div>';
  h+='<div class="swipe-hint">← swipe to change rounds →</div>';
  return h;
}

function renderCol(rnd,mids,lk){ return ''; } // unused

function renderCard(mid,rnd,lk){
  var teams=getTeams(mid),tA=teams[0],tB=teams[1];
  var result=getR(mid),pick=getP(mid);
  var earned=result&&pick&&pick===result;
  var canPick=!!ST.user&&!lk&&!isLocked()&&activeViewer()===ST.user;
  var sA=0,sB=0;
  if(rnd==="r32"){var rm=R32.find(function(m){return m.id===mid;});if(rm){sA=rm.sa;sB=rm.sb;tA=rm.a;tB=rm.b;}}
  var h='<div class="mc"><div class="mc-head"><span class="mc-lbl">'+ROUND_LABEL[rnd]+'</span><span class="mc-pts'+(earned?' earned':'')+'">'+PTS[rnd]+'pt'+(earned?' ✓':'')+'</span></div>';
  h+=slotHTML(mid,tA,sA,result,pick,canPick);
  h+=slotHTML(mid,tB,sB,result,pick,canPick);
  h+='</div>';
  return h;
}

// Returns the round a player was officially eliminated in, or null if still alive
function getPlayerEliminatedRound(name){
  var roundOrder=["r32","r16","qf","sf","f","champ"];
  var allMids=R32.map(function(m){return m.id;});
  ["r16","qf","sf","f","champ"].forEach(function(r){TREE[r].forEach(function(m){allMids.push(m.id);});});
  for(var ri=0;ri<roundOrder.length;ri++){
    var rnd=roundOrder[ri];
    var mids=rnd==="r32"?R32.map(function(m){return m.id;}):TREE[rnd].map(function(m){return m.id;});
    for(var mi=0;mi<mids.length;mi++){
      var res=getR(mids[mi]);
      if(!res) continue;
      var teams=getTeams(mids[mi]);
      if((teams[0]===name||teams[1]===name)&&res!==name) return rnd;
    }
  }
  return null;
}

function slotHTML(mid,name,seed,result,pick,canPick){
  if(!name)return'<div class="ts-tbd">TBD</div>';
  var roundOrder=["r32","r16","qf","sf","f","champ"];
  var thisRound=MID_ROUND[mid]||"r32";
  var thisRi=roundOrder.indexOf(thisRound);

  var isWon=!!(result&&result===name);
  var isLost=!!(result&&result!==name);
  var isPick=pick===name;
  var isCorrect=!!(isWon&&isPick); // official result matches pick → green ✓

  // Eliminated = officially lost in this round OR any earlier round
  var elimRnd=getPlayerEliminatedRound(name);
  var isElim=!!(elimRnd&&roundOrder.indexOf(elimRnd)<=thisRi);

  var cls="ts";
  if(isCorrect) cls+=" won";
  else if(isElim&&isPick) cls+=" wrong";   // picked them but they're out → red strikethrough
  else if(isElim) cls+=" lost";            // not picked, just eliminated → fade
  else if(isLost) cls+=" lost";            // lost this match, not eliminated yet
  else if(isPick) cls+=" picked";          // pick, no result yet → gold

  var icon=isCorrect?"✓":(isElim&&isPick?"✗":"");

  var oc="";
  if(canPick&&!result&&!isElim){
    if(isPick)oc=' data-remove="'+mid+'"';
    else oc=' data-pick="'+mid+'" data-team="'+x(name)+'"';
  }
  var disp=name.length>20?name.split(" ").slice(-1)[0]:name;
  var nameStyle=isElim&&isPick?" style=\"text-decoration:line-through\"":"";
  return'<div class="'+cls+'"'+oc+'><span class="ts-seed">'+(seed||'')+'</span><span class="ts-name"'+nameStyle+'>'+x(disp)+'</span>'+(icon?'<span class="ts-icon">'+icon+'</span>':'')+'</div>';
}

  h+='</div>';

  // R32 results
  var qLabels=["Q1 – Sinner","Q2 – Medvedev","Q3 – FAA","Q4 – Djokovic","Q5 – De Minaur","Q6 – Shelton","Q7 – Fritz","Q8 – Zverev"];
  h+='<div class="adm-sec-label">&#127931; R64 Results</div>';
  h+='<div style="font-size:9px;color:var(--muted);margin-bottom:8px;line-height:1.7">Tap the winner for each match. Results unlock the next round\'s picks for all players.</div>';
  for(var q=0;q<8;q++){
    h+='<div style="font-size:9px;font-weight:900;color:var(--blue);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.06em">'+qLabels[q]+'</div>';
    for(var mi=q*4;mi<q*4+4;mi++){
      var m=R32[mi],r=getR(m.id);
      h+='<div class="adm-game"><div class="adm-game-title">'+x(m.a)+' v '+x(m.b)+'</div><div class="adm-btns">';
      h+='<button class="adm-btn'+(r===m.a?' sel':'')+'" data-set-result="'+m.id+'" data-val="'+x(m.a)+'">'+x(m.a)+'</button>';
      h+='<button class="adm-btn'+(r===m.b?' sel':'')+'" data-set-result="'+m.id+'" data-val="'+x(m.b)+'">'+x(m.b)+'</button>';
      if(r)h+='<button class="adm-btn clr" data-set-result="'+m.id+'" data-val="">&#10005;</button>';
      h+='</div></div>';
    }
  }

  // Later rounds
  [["r16","R32"],["qf","R16"],["sf","Quarterfinals"],["f","Semifinals"],["champ","Final"]].forEach(function(rp){
    h+='<div class="adm-sec-label">'+rp[1]+'</div>';
    TREE[rp[0]].forEach(function(m){
      var teams=getTeams(m.id),r=getR(m.id);
      h+='<div class="adm-game">';
      if(teams[0]&&teams[1]){
        h+='<div class="adm-game-title">'+x(teams[0])+' v '+x(teams[1])+'</div><div class="adm-btns">';
        [teams[0],teams[1]].forEach(function(t){h+='<button class="adm-btn'+(r===t?' sel':'')+'" data-set-result="'+m.id+'" data-val="'+x(t)+'">'+x(t)+'</button>';});
        if(r)h+='<button class="adm-btn clr" data-set-result="'+m.id+'" data-val="">&#10005;</button>';
        h+='</div>';
      } else {
        h+='<div style="font-size:9px;color:var(--dim);font-style:italic">Waiting for prior results&#8230;</div>';
      }
      h+='</div>';
    });
  });

  // Reset
  h+='<div class="adm-sec-label">Reset</div>';
  h+='<button class="adm-phase-btn adm-close" id="adm-reset">&#8635; Reset All Data</button>';
  h+='</div>';
  return h;
}

// ── LOGO ──────────────────────────────────────────────────────────────────────
var LOGO_TEXT=[{fill:"#ffffff",stroke:"#111111"},{fill:"#e8c840",stroke:"#111111"},{fill:"#fdf8ee",stroke:"#0a2088"},{fill:"#ff8fb3",stroke:"#111111"},{fill:"#8ed1ff",stroke:"#111111"},{fill:"#9ef2c8",stroke:"#111111"},{fill:"#ffd166",stroke:"#3a2a00"},{fill:"#ffffff",stroke:"#4c1d95"}];
var LOGO_SHADOW=[{near:"#111111",trail:["#1a4fd6","#0a2088","#060e44"]},{near:"#111111",trail:["#d62839","#8b0000","#4a0000"]},{near:"#111111",trail:["#2d8a4e","#1a5c33","#0d2e1a"]},{near:"#1e1033",trail:["#7c3aed","#4c1d95","#2e1065"]},{near:"#3a1a00",trail:["#f97316","#c2410c","#7c2d12"]},{near:"#111111",trail:["#64748b","#334155","#1e293b"]},{near:"#111111",trail:["#e8c840","#b89a00","#5c4d00"]}];
var _logoStyle=(function(){var t=LOGO_TEXT[Math.floor(Math.random()*LOGO_TEXT.length)];var s=LOGO_SHADOW[Math.floor(Math.random()*LOGO_SHADOW.length)];var sh="1px 1px 0 "+s.near+",2px 2px 0 "+s.near+",3px 3px 0 "+s.near+",4px 4px 0 "+s.trail[0]+",6px 6px 0 "+s.trail[1]+",7px 7px 0 "+s.trail[2];return "color:"+t.fill+";-webkit-text-stroke:2.5px "+t.stroke+";text-shadow:"+sh;})();
function applyLogo(){var el=document.getElementById("sc-logo");if(el)el.style.cssText=_logoStyle;}

// ── BIND ──────────────────────────────────────────────────────────────────────
function bind(){
  var els,i,el;

  // Back to hub
  var backHub=document.getElementById("btn-back-hub");
  if(backHub){
    var hubHref=GROUP_ID?"index.html?group="+encodeURIComponent(GROUP_ID)+(URL_USER?"&user="+encodeURIComponent(URL_USER):""):"index.html";
    backHub.href=hubHref;
  }

  // Page tabs
  els=document.querySelectorAll(".ptab");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){ST.page=this.getAttribute("data-page");draw();});

  // User select
  els=document.querySelectorAll("[data-user]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){ST.user=this.getAttribute("data-user");ST.viewUser=null;draw();});

  // Switch user (tag click)
  el=document.getElementById("b-switch");
  if(el)el.addEventListener("click",function(){ST.user=null;ST.viewUser=null;draw();});

  // View player chips
  els=document.querySelectorAll("[data-view]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){var v=this.getAttribute("data-view");ST.viewUser=(ST.viewUser===v?null:v);draw();});

  // Lock
  el=document.getElementById("b-lock");
  if(el)el.addEventListener("click",function(){if(!ST.user||!DB)return;DB.ref(BASE+"/locked/"+ukey(ST.user)).set(true);ST.locked[ukey(ST.user)]=true;toast("&#128274; Picks locked!");draw();});

  // Admin toggle
  el=document.getElementById("b-admin");
  if(el)el.addEventListener("click",function(){
    if(ST.admin){ST.admin=false;if(ST.page==="admin")ST.page="leaderboard";draw();return;}
    var pw=prompt("Admin password:");if(pw===null)return;
    if(pw===MASTER_PW||(GROUP_ADMIN_PW&&pw===GROUP_ADMIN_PW)){ST.admin=true;draw();}else toast("Wrong password");
  });

  // Bracket picks
  els=document.querySelectorAll("[data-pick]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){saveP(this.getAttribute("data-pick"),this.getAttribute("data-team"));});

  // Remove picks
  els=document.querySelectorAll("[data-remove]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){removeP(this.getAttribute("data-remove"));});

  // View bracket from LB
  els=document.querySelectorAll("[data-lb-bracket]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){var p=this.getAttribute("data-lb-bracket");ST.user=p;ST.viewUser=null;ST.page="bracket";draw();});

  // Admin: set result
  els=document.querySelectorAll("[data-set-result]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){saveR(this.getAttribute("data-set-result"),this.getAttribute("data-val")||null);});

  // Admin: unlock player
  el=document.getElementById("b-fetch-espn");
  if(el)el.addEventListener("click",function(){window.open("https://www.espn.com/tennis/wimbledon/bracket/_/season/2026","_blank");});

  els=document.querySelectorAll("[data-unlock]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){var p=this.getAttribute("data-unlock");if(!DB)return;DB.ref(BASE+"/locked/"+ukey(p)).remove();delete ST.locked[ukey(p)];draw();toast("&#128275; Unlocked "+p);});

  // Bracket round nav tabs
  els=document.querySelectorAll("[data-bround]");
  for(i=0;i<els.length;i++)els[i].addEventListener("click",function(){
    ST.bracketRound=Math.min(parseInt(this.getAttribute("data-bround"),10), BRACKET_ROUNDS.length-2);
    draw();
    var nb=document.getElementById("round-nav-bar");if(nb){var at=nb.querySelector(".rnav-tab.active");if(at)at.scrollIntoView({inline:"center",behavior:"smooth"});}
  });

  // Bracket prev/next arrows
  el=document.getElementById("brnd-prev");
  if(el)el.addEventListener("click",function(){if(ST.bracketRound>0){ST.bracketRound--;draw();}});
  el=document.getElementById("brnd-next");
  if(el)el.addEventListener("click",function(){if(ST.bracketRound<BRACKET_ROUNDS.length-2){ST.bracketRound++;draw();}});

  // Swipe gesture on bracket
  (function(){
    var sw=document.getElementById("bracket-swipe-wrap");
    if(!sw)return;
    var sx=0,sy=0,tracking=false,moved=false;
    sw.addEventListener("touchstart",function(e){
      sx=e.touches[0].clientX;sy=e.touches[0].clientY;tracking=true;moved=false;
    },{passive:true});
    sw.addEventListener("touchmove",function(e){
      if(!tracking)return;
      var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
      if(!moved&&Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)*1.2){moved=true;}
      if(moved)e.preventDefault();
    },{passive:false});
    sw.addEventListener("touchend",function(e){
      if(!tracking)return;tracking=false;
      var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
      if(Math.abs(dx)<40||Math.abs(dy)>Math.abs(dx)*0.7)return;
      if(dx<0&&ST.bracketRound<BRACKET_ROUNDS.length-2){ST.bracketRound++;draw();}
      else if(dx>0&&ST.bracketRound>0){ST.bracketRound--;draw();}
    },{passive:true});
  })();


  el=document.getElementById("adm-reset");
  if(el)el.addEventListener("click",function(){if(!confirm("Reset ALL Wimbledon data?"))return;DB.ref(BASE).set(null);ST.picks={};ST.results={};ST.locked={};toast("Reset done");draw();});
}

loadData();
</script>
