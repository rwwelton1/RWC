<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – 2026 Wimbledon</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red2:#e85555;--red-bg:#ffe8e8;
  --cream:#fdf8ee;
  --wim:#1a5c2e
}
html,body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;outline:none;touch-action:manipulation}
a{color:inherit;text-decoration:none}

/* ── TOPBAR ── */
.topbar{background:#fff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.app-name{font-size:15px;font-weight:900;letter-spacing:-.02em;flex:1}
.app-sub{font-size:7px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;display:block}
.tag-live{background:#ffe8e8;border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--red2);animation:pulse 1.5s ease-in-out infinite;box-shadow:2px 2px 0 var(--border)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#fff;color:var(--text)}
.btn-green{background:var(--green-bg);color:var(--green)}

/* ── PAGE TABS ── */
.page-bar{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 14px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif}
.ptab.active{color:var(--text);border-bottom-color:var(--wim);background:var(--green-bg)}

/* ── LOCK BAR ── */
.lock-bar{display:flex;align-items:center;gap:7px;padding:6px 12px;border-bottom:2px solid var(--border2);background:var(--cream);flex-wrap:wrap}
.lock-info{font-size:9px;font-weight:700;color:var(--muted);flex:1}
.lchip{padding:2px 8px;border-radius:20px;font-size:8px;font-weight:800;border:2px solid var(--border);box-shadow:1px 1px 0 var(--border);font-family:'Nunito',sans-serif;cursor:pointer}
.lchip.on{background:var(--green-bg);color:var(--green)}
.lchip.off{background:#fff;color:var(--muted)}

/* ── SCORE BANNER ── */
.score-banner{display:flex;gap:6px;padding:6px 12px;border-bottom:2px solid var(--border2);overflow-x:auto;background:var(--cream)}
.score-banner::-webkit-scrollbar{display:none}
.sb{background:#fff;border:2px solid var(--border);border-radius:8px;padding:4px 10px;font-size:8px;white-space:nowrap;text-align:center;flex-shrink:0;box-shadow:2px 2px 0 var(--border)}
.sb .sl{color:var(--muted);font-size:7px;font-weight:800;text-transform:uppercase}
.sb .sv{font-weight:900;font-size:13px}
.sb.hi .sv{color:var(--wim)}

/* ── BRACKET ── */
/*
  Clean bracket: one column per round, flex column with justify-content:space-around.
  Cards are fixed width. Each round has half the cards of the previous,
  so space-around naturally centers each card between its two feeders.
*/
.b-scroll{overflow-x:auto;overflow-y:auto;padding:12px 16px 40px;-webkit-overflow-scrolling:touch}
.b-scroll::-webkit-scrollbar{height:4px;width:4px}
.b-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.b-row{display:flex;align-items:stretch;gap:0}

.b-col{display:flex;flex-direction:column;flex-shrink:0;width:160px}
.b-col-champ{width:152px}

.b-col-head{font-size:7px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 4px 6px;border-bottom:2px solid var(--border2);margin-bottom:0;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.b-col-head .ph{font-size:7px;font-weight:700;color:var(--wim);text-transform:none;letter-spacing:0}

.b-cards{flex:1;display:flex;flex-direction:column;justify-content:space-around;padding:6px 4px}

/* ── MATCH CARD ── */
.mc{background:#fff;border:2px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:3px 3px 0 var(--border);flex-shrink:0}
.mc-head{padding:3px 7px;background:var(--cream);border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center}
.mc-lbl{font-size:7px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.mc-pts{font-size:7px;font-weight:900;color:var(--gold-dark)}
.mc-pts.earned{color:var(--green)}

.ts{display:flex;align-items:center;gap:5px;padding:5px 7px;cursor:pointer;min-height:28px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ts:not(:last-child){border-bottom:1px solid var(--border2)}
.ts:active{background:var(--cream)}
.ts.won{background:var(--green-bg)}
.ts.won .ts-name{color:var(--wim);font-weight:900}
.ts.lost{opacity:.3}
.ts.picked{background:var(--gold-bg)}
.ts.picked .ts-name{color:var(--gold-dark);font-weight:900}
.ts.wrong{background:var(--red-bg);opacity:1}
.ts-seed{font-size:7px;font-weight:800;color:var(--dim);width:12px;text-align:right;flex-shrink:0}
.ts-name{font-size:10px;font-weight:800;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ts-icon{font-size:9px;flex-shrink:0}
.ts-tbd{padding:5px 7px;font-size:9px;font-weight:700;color:var(--dim);font-style:italic;min-height:28px;display:flex;align-items:center}

/* ── CONNECTOR lines ── */
.b-conn{width:16px;flex-shrink:0;display:flex;flex-direction:column;position:relative;margin-top:28px/* offset for header */}
.b-conn-line{flex:1;display:flex;flex-direction:column;justify-content:space-around}
.b-conn-pair{flex:1;position:relative;display:flex;align-items:center}
.b-conn-pair::before{content:'';position:absolute;right:0;top:50%;width:8px;height:1px;background:var(--border2)}
.b-conn-pair::after{content:'';position:absolute;right:8px;top:0;bottom:0;width:1px;background:var(--border2)}

/* ── CHAMPION ── */
.champ-card{background:#fff;border:3px solid var(--border);border-radius:12px;padding:12px;box-shadow:5px 5px 0 var(--border);text-align:center;width:144px}
.champ-trophy{font-size:28px;margin-bottom:6px}
.champ-name{font-size:11px;font-weight:900;color:var(--text);line-height:1.3;margin-bottom:4px}
.champ-pts{font-size:8px;font-weight:800;color:var(--wim)}
.champ-btn{width:100%;margin-top:6px;padding:5px;border-radius:7px;font-size:8px;font-weight:800;border:2px solid var(--border);background:#fff;color:var(--text);cursor:pointer;box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif}
.champ-btn:active{transform:translate(2px,2px);box-shadow:none}
.champ-col{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:0 0 auto;padding:0 6px}
.champ-col-head{font-size:7px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 4px 6px;border-bottom:2px solid var(--border2);margin-bottom:0;width:100%;display:flex;justify-content:space-between}
.champ-col-head .ph{font-size:7px;font-weight:700;color:var(--wim);text-transform:none;letter-spacing:0}

/* ── USER SELECT ── */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:12px;background:#fff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:130px;box-shadow:3px 3px 0 var(--border)}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}
.user-btn.has-picks{background:var(--green-bg)}
.user-btn-sub{font-size:8px;font-weight:700;color:var(--muted);margin-top:3px}

/* ── LEADERBOARD ── */
.lb-wrap{padding:12px}
.lb-note{font-size:8px;font-weight:700;color:var(--muted);margin-bottom:12px;line-height:1.8;background:var(--cream);border:2px solid var(--border2);border-radius:8px;padding:7px 10px}
.lb-row{background:#fff;border:2px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;gap:9px;align-items:center;box-shadow:4px 4px 0 var(--border)}
.lb-row.first{background:var(--gold-bg)}
.lb-medal{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;gap:5px}
.lb-name{font-size:13px;font-weight:900}
.lb-pts{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.lb-pts b{color:var(--text);font-weight:900}
.progress{background:var(--border2);border-radius:3px;height:5px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;border-radius:3px;transition:width .6s;background:var(--wim)}
.lb-sub{font-size:8px;font-weight:700;color:var(--muted)}

/* ── ADMIN ── */
.adm-wrap{padding:10px}
.adm-sec{font-size:8px;font-weight:900;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:12px 0 7px;padding-bottom:4px;border-bottom:2px solid var(--border2)}
.adm-sec:first-child{margin-top:0}
.adm-game{background:#fff;border:2px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:6px;box-shadow:3px 3px 0 var(--border)}
.adm-title{font-size:8px;font-weight:800;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.adm-btns{display:flex;gap:5px;flex-wrap:wrap}
.adm-btn{padding:5px 11px;border-radius:8px;font-size:9px;font-weight:800;border:2px solid var(--border);background:#fff;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.adm-btn:active{transform:translate(2px,2px);box-shadow:none}
.adm-btn.sel{background:var(--green-bg);color:var(--green)}
.adm-btn.clr{background:var(--red-bg);color:var(--red2)}
.adm-pw{display:flex;gap:6px;margin-bottom:12px}
.adm-pw input{flex:1;border:2px solid var(--border);border-radius:8px;padding:7px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;background:var(--cream);outline:none}
.adm-pw button{padding:7px 14px;border-radius:8px;font-size:10px;font-weight:800;border:2px solid var(--border);background:var(--gold);color:var(--text);cursor:pointer;box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#fff;border:2px solid var(--border);color:var(--text);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" style="font-size:18px;flex-shrink:0">🏠</a>
  <div style="flex:1;min-width:0">
    <div class="app-name">🎾 Wimbledon 2026</div>
    <span class="app-sub">Men's Singles Bracket Challenge</span>
  </div>
  <span class="tag-live">● LIVE</span>
</div>

<div class="page-bar" id="page-bar">
  <button class="ptab active" onclick="setPage('bracket')">Bracket</button>
  <button class="ptab" onclick="setPage('leaderboard')">Leaderboard</button>
  <button class="ptab" onclick="setPage('admin')">Admin</button>
</div>

<div id="app"></div>
<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var BASE = "wimbledon2026";
var MASTER_PW = "Sloop";
var PARTS = ["Player 1","Player 2","Player 3","Player 4"];

// Points per round
var PTS = {r32:2, r16:4, qf:8, sf:15, f:25, champ:40};

// ── R32 matchups (32 matches, 2 players each) ─────────────────────────────────
// Format: {id, a, sa (seed), b, sb (seed)}
var R32 = [
  // Quarter 1 – Sinner
  {id:"m01",a:"Jannik Sinner",      sa:1,  b:"Nuno Borges",          sb:0},
  {id:"m02",a:"Ignacio Buse",       sa:31, b:"Emilio Nava",          sb:0},
  {id:"m03",a:"Rafael Jodar",       sa:23, b:"Denis Shapovalov",     sb:0},
  {id:"m04",a:"Luciano Darderi",    sa:14, b:"Ethan Quinn",          sb:0},
  // Quarter 2 – Medvedev
  {id:"m05",a:"Casper Ruud",        sa:11, b:"Hubert Hurkacz",       sb:0},
  {id:"m06",a:"Tommy Paul",         sa:21, b:"Soonwoo Kwon",         sb:0},
  {id:"m07",a:"Brandon Nakashima",  sa:28, b:"Jan-Lennard Struff",   sb:0},
  {id:"m08",a:"Daniil Medvedev",    sa:8,  b:"Marin Cilic",          sb:0},
  // Quarter 3 – FAA
  {id:"m09",a:"Felix Auger-Aliassime",sa:3,b:"Adam Walton",          sb:0},
  {id:"m10",a:"Cameron Norrie",     sa:26, b:"Michael Zheng",        sb:0},
  {id:"m11",a:"A. Davidovich Fokina",sa:22,b:"Juan Manuel Cerundolo",sb:0},
  {id:"m12",a:"Learner Tien",       sa:16, b:"Dalibor Svrcina",      sb:0},
  // Quarter 4 – Djokovic
  {id:"m13",a:"Andrey Rublev",      sa:12, b:"A. Kovacevic",         sb:0},
  {id:"m14",a:"Joao Fonseca",       sa:24, b:"R. Bautista Agut",     sb:0},
  {id:"m15",a:"Arthur Rinderknech", sa:25, b:"Oliver Tarvet",        sb:0},
  {id:"m16",a:"Novak Djokovic",     sa:7,  b:"Yibing Wu",            sb:0},
  // Quarter 5 – De Minaur
  {id:"m17",a:"Alex de Minaur",     sa:5,  b:"Roman Burruchaga",     sb:0},
  {id:"m18",a:"Alejandro Tabilo",   sa:30, b:"Kamil Majchrzak",      sb:0},
  {id:"m19",a:"Karen Khachanov",    sa:19, b:"Billy Harris",         sb:0},
  {id:"m20",a:"Flavio Cobolli",     sa:9,  b:"Mariano Navone",       sb:0},
  // Quarter 6 – Shelton
  {id:"m21",a:"Jakub Mensik",       sa:15, b:"Grigor Dimitrov",      sb:0},
  {id:"m22",a:"Matteo Berrettini",  sa:0,  b:"Stan Wawrinka",        sb:0},
  {id:"m23",a:"Arthur Fils",        sa:20, b:"Raphael Collignon",    sb:0},
  {id:"m24",a:"Ben Shelton",        sa:4,  b:"Otto Virtanen",        sb:0},
  // Quarter 7 – Fritz
  {id:"m25",a:"Taylor Fritz",       sa:6,  b:"Jack Draper",          sb:0},
  {id:"m26",a:"Tomas Etcheverry",   sa:29, b:"Lorenzo Sonego",       sb:0},
  {id:"m27",a:"Frances Tiafoe",     sa:17, b:"Terence Atmane",       sb:0},
  {id:"m28",a:"Alexander Bublik",   sa:10, b:"Thanasi Kokkinakis",   sb:0},
  // Quarter 8 – Zverev
  {id:"m29",a:"Jiri Lehecka",       sa:13, b:"Alexei Popyrin",       sb:0},
  {id:"m30",a:"Francisco Cerundolo",sa:18, b:"Jaume Munar",          sb:0},
  {id:"m31",a:"Matteo Arnaldi",     sa:32, b:"Corentin Moutet",      sb:0},
  {id:"m32",a:"Alexander Zverev",   sa:2,  b:"Alexander Blockx",     sb:0},
];

// Each round lists match IDs in bracket order; each match feeds from pair of previous
// ROUNDS[round] = array of match node objects {id, from:[idA, idB]}
var TREE = {
  r16:[
    {id:"r16_0", from:["m01","m02"]},{id:"r16_1", from:["m03","m04"]},
    {id:"r16_2", from:["m05","m06"]},{id:"r16_3", from:["m07","m08"]},
    {id:"r16_4", from:["m09","m10"]},{id:"r16_5", from:["m11","m12"]},
    {id:"r16_6", from:["m13","m14"]},{id:"r16_7", from:["m15","m16"]},
    {id:"r16_8", from:["m17","m18"]},{id:"r16_9", from:["m19","m20"]},
    {id:"r16_10",from:["m21","m22"]},{id:"r16_11",from:["m23","m24"]},
    {id:"r16_12",from:["m25","m26"]},{id:"r16_13",from:["m27","m28"]},
    {id:"r16_14",from:["m29","m30"]},{id:"r16_15",from:["m31","m32"]},
  ],
  qf:[
    {id:"qf_0",from:["r16_0","r16_1"]},{id:"qf_1",from:["r16_2","r16_3"]},
    {id:"qf_2",from:["r16_4","r16_5"]},{id:"qf_3",from:["r16_6","r16_7"]},
    {id:"qf_4",from:["r16_8","r16_9"]},{id:"qf_5",from:["r16_10","r16_11"]},
    {id:"qf_6",from:["r16_12","r16_13"]},{id:"qf_7",from:["r16_14","r16_15"]},
  ],
  sf:[
    {id:"sf_0",from:["qf_0","qf_1"]},{id:"sf_1",from:["qf_2","qf_3"]},
    {id:"sf_2",from:["qf_4","qf_5"]},{id:"sf_3",from:["qf_6","qf_7"]},
  ],
  f:[
    {id:"f_0",from:["sf_0","sf_1"]},{id:"f_1",from:["sf_2","sf_3"]},
  ],
  champ:[{id:"champ",from:["f_0","f_1"]}]
};

var ROUND_ORDER = ["r32","r16","qf","sf","f","champ"];
var ROUND_LABEL = {r32:"R32",r16:"R16",qf:"Quarters",sf:"Semis",f:"Final",champ:"Champion"};

// Build flat lookup: id → round
var MID_ROUND = {};
R32.forEach(function(m){MID_ROUND[m.id]="r32";});
["r16","qf","sf","f","champ"].forEach(function(r){TREE[r].forEach(function(m){MID_ROUND[m.id]=r;});});

// All match IDs for scoring
var ALL_IDS = R32.map(function(m){return m.id;});
["r16","qf","sf","f","champ"].forEach(function(r){TREE[r].forEach(function(m){ALL_IDS.push(m.id);});});

// ── STATE ─────────────────────────────────────────────────────────────────────
var ST = {page:"bracket", user:null, viewUser:null, admin:false, picks:{}, results:{}, locked:{}};
var DB = null;

try{
  firebase.initializeApp({
    apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",
    authDomain:"rwc-picks.firebaseapp.com",
    databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",
    projectId:"rwc-picks",
    appId:"1:965978379243:web:35f9db9a664f9170e27fae"
  });
  DB = firebase.database();
}catch(e){}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function x(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");}
var _tt;
function toast(m){var el=document.getElementById("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove("show");},2400);}
function ukey(n){try{return n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"_").replace(/[&'.]/g,"");}catch(e){return n.toLowerCase().replace(/\s+/g,"_").replace(/[&'.]/g,"");}}
function viewer(){return ST.viewUser||ST.user||null;}
function locked(){return !!(ST.user && ST.locked[ukey(ST.user)]);}

function getR(mid){return (ST.results||{})[mid]||null;}
function getP(mid){var u=viewer();if(!u)return null;return ((ST.picks||{})[ukey(u)]||{})[mid]||null;}
function getSlot(mid){return getR(mid)||getP(mid)||null;}

function getTeams(mid){
  var r32m=R32.find(function(m){return m.id===mid;});
  if(r32m)return[r32m.a,r32m.b];
  var rnd=MID_ROUND[mid];if(!rnd)return[null,null];
  var node=TREE[rnd]&&TREE[rnd].find(function(m){return m.id===mid;});
  if(!node)return[null,null];
  return[getSlot(node.from[0]),getSlot(node.from[1])];
}

function saveP(mid,v){
  if(!ST.user||!DB)return;
  var uk=ukey(ST.user);
  if(!ST.picks[uk])ST.picks[uk]={};
  ST.picks[uk][mid]=v;
  DB.ref(BASE+"/picks/"+uk+"/"+mid).set(v);
  draw();toast("✓ "+v);
}
function removeP(mid){
  if(!ST.user||!DB)return;
  var uk=ukey(ST.user);
  if(ST.picks[uk])delete ST.picks[uk][mid];
  DB.ref(BASE+"/picks/"+uk+"/"+mid).remove();
  draw();
}
function saveR(mid,v){
  if(!DB)return;
  if(v){ST.results[mid]=v;DB.ref(BASE+"/results/"+mid).set(v);}
  else{delete ST.results[mid];DB.ref(BASE+"/results/"+mid).remove();}
  draw();
}

function calcScore(user){
  var pp=(ST.picks||{})[ukey(user)]||{},t=0;
  ALL_IDS.forEach(function(mid){var p=pp[mid],r=getR(mid);if(p&&r&&p===r)t+=PTS[MID_ROUND[mid]]||0;});
  return t;
}
function calcMax(user){
  var pp=(ST.picks||{})[ukey(user)]||{},t=0;
  ALL_IDS.forEach(function(mid){var p=pp[mid],r=getR(mid);if(r){if(p&&p===r)t+=PTS[MID_ROUND[mid]]||0;}else{if(p)t+=PTS[MID_ROUND[mid]]||0;}});
  return t;
}
function pickCount(user){return Object.keys((ST.picks||{})[ukey(user)]||{}).length;}

// ── FIREBASE ──────────────────────────────────────────────────────────────────
function loadData(){
  if(!DB){draw();return;}
  DB.ref(BASE).on("value",function(sn){
    var d=sn.val()||{};
    ST.picks=d.picks||{};
    ST.results=d.results||{};
    ST.locked=d.locked||{};
    draw();
  });
}

// ── PAGE ──────────────────────────────────────────────────────────────────────
function setPage(p){
  ST.page=p;
  document.querySelectorAll(".ptab").forEach(function(el,i){el.classList.toggle("active",i===(p==="bracket"?0:p==="leaderboard"?1:2));});
  draw();
}

function draw(){
  var app=document.getElementById("app");
  if(!ST.user){app.innerHTML=renderUserSelect();return;}
  if(ST.page==="bracket")app.innerHTML=renderBracket();
  else if(ST.page==="leaderboard")app.innerHTML=renderLeaderboard();
  else app.innerHTML=renderAdmin();
}

// ── USER SELECT ───────────────────────────────────────────────────────────────
function renderUserSelect(){
  var h='<div class="user-screen"><h2>Who\'s picking?</h2><div class="user-grid">';
  PARTS.forEach(function(name){
    var uk=ukey(name),lk=!!(ST.locked||{})[uk],sc=calcScore(name),pc=pickCount(name);
    h+='<button class="user-btn'+(pc>0?' has-picks':'')+'" onclick="ST.user=\''+x(name)+'\';ST.viewUser=null;draw()">';
    h+=x(name)+'<div class="user-btn-sub">'+(lk?'🔒 ':'')+(sc>0?sc+' pts':pc>0?pc+' picks':'No picks yet')+'</div>';
    h+='</button>';
  });
  h+='</div><p style="font-size:9px;color:var(--muted);margin-top:12px;font-weight:700;text-align:center">🎾 Pick R32 winners through to the Champion</p></div>';
  return h;
}

// ── BRACKET ───────────────────────────────────────────────────────────────────
function renderBracket(){
  var u=ST.user,lk=locked(),sc=calcScore(viewer()),mx=calcMax(viewer()),pc=pickCount(viewer());
  var h='';

  // Lock bar
  h+='<div class="lock-bar">';
  h+='<span class="lock-info">'+x(u)+(lk?' · 🔒 Locked':'')+'</span>';
  if(!lk){
    h+='<button class="btn btn-ghost" style="font-size:8px;padding:3px 8px" onclick="ST.user=null;ST.viewUser=null;draw()">Switch</button>';
    h+='<button class="btn btn-green" style="font-size:8px;padding:3px 10px" onclick="lockIn()">Lock In</button>';
  } else {
    h+='<button class="btn btn-ghost" style="font-size:8px;padding:3px 8px" onclick="ST.user=null;ST.viewUser=null;draw()">Switch</button>';
    PARTS.filter(function(p){return p!==u;}).forEach(function(p){
      var on=ST.viewUser===p;
      h+='<button class="lchip '+(on?'on':'off')+'" onclick="ST.viewUser=ST.viewUser===\''+x(p)+'\'?null:\''+x(p)+'\';draw()">'+(on?'👁 ':'')+x(p)+'</button>';
    });
  }
  h+='</div>';

  // Score banner
  h+='<div class="score-banner">';
  h+='<div class="sb hi"><div class="sl">Points</div><div class="sv">'+sc+'</div></div>';
  h+='<div class="sb"><div class="sl">Max</div><div class="sv">'+mx+'</div></div>';
  h+='<div class="sb"><div class="sl">Picks</div><div class="sv">'+pc+'/'+ALL_IDS.length+'</div></div>';
  h+='</div>';

  // Bracket
  h+='<div class="b-scroll"><div class="b-row">';
  h+=renderCol("r32", R32.map(function(m){return m.id;}), lk);
  h+=renderCol("r16", TREE.r16.map(function(m){return m.id;}), lk);
  h+=renderCol("qf",  TREE.qf.map(function(m){return m.id;}), lk);
  h+=renderCol("sf",  TREE.sf.map(function(m){return m.id;}), lk);
  h+=renderCol("f",   TREE.f.map(function(m){return m.id;}), lk);
  h+=renderChampCol(lk);
  h+='</div></div>';
  return h;
}

function lockIn(){
  if(!ST.user||!DB)return;
  DB.ref(BASE+"/locked/"+ukey(ST.user)).set(true);
  ST.locked[ukey(ST.user)]=true;
  toast("🔒 Locked in!");
  draw();
}

function renderCol(rnd, mids, lk){
  var h='<div class="b-col">';
  h+='<div class="b-col-head">'+ROUND_LABEL[rnd]+' <span class="ph">+'+PTS[rnd]+'pt</span></div>';
  h+='<div class="b-cards">';
  mids.forEach(function(mid){h+=renderCard(mid, rnd, lk);});
  h+='</div></div>';
  return h;
}

function renderCard(mid, rnd, lk){
  var teams=getTeams(mid);
  var tA=teams[0],tB=teams[1];
  var result=getR(mid),pick=getP(mid);
  var pts=PTS[rnd]||0;
  var earned=result&&pick&&pick===result;
  var canPick=!lk&&!locked();

  // seed lookup for R32
  var sA=0,sB=0;
  if(rnd==="r32"){
    var rm=R32.find(function(m){return m.id===mid;});
    if(rm){sA=rm.sa;sB=rm.sb;tA=rm.a;tB=rm.b;}
  }

  var h='<div class="mc">';
  h+='<div class="mc-head"><span class="mc-lbl">'+ROUND_LABEL[rnd]+'</span><span class="mc-pts'+(earned?' earned':'')+'">'+pts+'pt'+(earned?' ✓':'')+'</span></div>';
  h+=slotHtml(mid,tA,sA,result,pick,canPick);
  h+=slotHtml(mid,tB,sB,result,pick,canPick);
  h+='</div>';
  return h;
}

function slotHtml(mid,name,seed,result,pick,canPick){
  if(!name) return '<div class="ts-tbd">TBD</div>';

  var won  = result && result===name;
  var lost = result && result!==name;
  var isPick = pick===name;
  var isWrong = result && isPick && result!==name;

  var cls="ts";
  if(won)               cls+=" won";
  else if(isWrong)      cls+=" wrong";
  else if(lost)         cls+=" lost";
  else if(isPick)       cls+=" picked";

  // shorten long names to last name only
  var disp=name;
  if(name.length>17) disp=name.split(" ").slice(-1)[0];

  var icon = won&&isPick?"✓" : isWrong?"✗" : "";
  var onclick="";
  if(canPick&&!result){
    if(isPick) onclick=' onclick="removeP(\''+mid+'\')"';
    else       onclick=' onclick="saveP(\''+mid+'\',\''+name.replace(/'/g,"\\'")+'\')"';
  } else if(canPick&&result&&!won){
    // can't repick — already decided
  }

  return '<div class="'+cls+'"'+onclick+'>'
    +(seed?'<span class="ts-seed">'+seed+'</span>':'<span class="ts-seed"></span>')
    +'<span class="ts-name">'+x(disp)+'</span>'
    +(icon?'<span class="ts-icon">'+icon+'</span>':'')
    +'</div>';
}

function renderChampCol(lk){
  var cm=TREE.champ[0];
  var teams=getTeams(cm.id);
  var result=getR(cm.id),pick=getP(cm.id);
  var canPick=!lk&&!locked();

  var h='<div class="champ-col" style="width:156px">';
  h+='<div class="champ-col-head">Champion <span class="ph">+'+PTS.champ+'pt</span></div>';
  h+='<div style="flex:1;display:flex;align-items:center;justify-content:center">';
  h+='<div class="champ-card">';
  h+='<div class="champ-trophy">'+(result?'🏆':'🎾')+'</div>';

  if(result){
    h+='<div class="champ-name">'+x(result)+'</div>';
    if(pick&&pick===result) h+='<div class="champ-pts">✓ Correct! +'+PTS.champ+' pts</div>';
    else if(pick) h+='<div style="font-size:8px;font-weight:800;color:var(--red2)">✗ '+x(pick)+'</div>';
  } else if(pick){
    h+='<div class="champ-name" style="color:var(--gold-dark)">'+x(pick)+'</div>';
    h+='<div class="champ-pts">Your pick · +'+PTS.champ+'pt</div>';
    if(canPick) h+='<button class="champ-btn" style="background:var(--red-bg);color:var(--red2)" onclick="removeP(\''+cm.id+'\')">Clear</button>';
  } else {
    h+='<div style="font-size:9px;font-weight:700;color:var(--dim);font-style:italic;margin-bottom:6px">Pick champion</div>';
    if(canPick&&(teams[0]||teams[1])){
      [teams[0],teams[1]].forEach(function(t){
        if(t) h+='<button class="champ-btn" onclick="saveP(\''+cm.id+'\',\''+t.replace(/'/g,"\\'")+'\')">'+x(t)+'</button>';
      });
    }
  }
  h+='</div></div></div>';
  return h;
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function renderLeaderboard(){
  var scores=PARTS.map(function(p){return{name:p,score:calcScore(p),max:calcMax(p),locked:!!(ST.locked||{})[ukey(p)]};}).sort(function(a,b){return b.score-a.score;});
  var top=Math.max(scores[0].score,1);
  var medals=["🥇","🥈","🥉"];
  var h='<div class="lb-wrap">';
  h+='<div class="lb-note">R32=2 · R16=4 · QF=8 · SF=15 · Final=25 · Champion=40</div>';
  scores.forEach(function(p,i){
    h+='<div class="lb-row'+(i===0?' first':'')+'">';
    h+='<div class="lb-medal">'+(medals[i]||'')+'</div>';
    h+='<div class="lb-body">';
    h+='<div class="lb-top"><span class="lb-name">'+x(p.name)+(p.locked?' 🔒':'')+'</span><span class="lb-pts"><b>'+p.score+'</b> pts</span></div>';
    h+='<div class="progress"><div class="progress-fill" style="width:'+Math.round(p.score/top*100)+'%"></div></div>';
    h+='<div class="lb-sub">Max possible: '+p.max+' pts</div>';
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function renderAdmin(){
  var h='<div class="adm-wrap">';
  if(!ST.admin){
    h+='<div class="adm-sec">Admin Login</div>';
    h+='<div class="adm-pw"><input id="apw" type="password" placeholder="Password"/><button onclick="var pw=document.getElementById(\'apw\').value;if(pw===\''+MASTER_PW+'\'){ST.admin=true;draw();}else toast(\'Wrong password\')">Enter</button></div>';
    h+='</div>';return h;
  }

  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h+='<span style="font-size:11px;font-weight:800;color:var(--wim)">🔐 Admin</span>';
  h+='<button class="btn btn-ghost" onclick="ST.admin=false;draw()">Logout</button></div>';

  // Player locks
  h+='<div class="adm-sec">Player Locks</div>';
  PARTS.forEach(function(p){
    var lk=!!(ST.locked||{})[ukey(p)];
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
    h+='<span style="font-size:11px;font-weight:800;flex:1">'+x(p)+'</span>';
    if(lk) h+='<button class="adm-btn clr" onclick="DB.ref(\''+BASE+'/locked/'+ukey(p)+'\').remove();delete ST.locked[\''+ukey(p)+'\'];draw()">Unlock</button>';
    else   h+='<span style="font-size:9px;color:var(--muted)">Not locked</span>';
    h+='</div>';
  });

  // R32 results
  h+='<div class="adm-sec">R32 Results</div>';
  var qLabels=["Q1 – Sinner","Q2 – Medvedev","Q3 – FAA","Q4 – Djokovic","Q5 – De Minaur","Q6 – Shelton","Q7 – Fritz","Q8 – Zverev"];
  for(var q=0;q<8;q++){
    h+='<div style="font-size:8px;font-weight:900;color:var(--blue);margin:8px 0 4px;text-transform:uppercase;letter-spacing:.06em">'+qLabels[q]+'</div>';
    for(var mi=q*4;mi<q*4+4;mi++){
      var m=R32[mi],r=getR(m.id);
      h+='<div class="adm-game"><div class="adm-title">'+x(m.a)+' v '+x(m.b)+'</div><div class="adm-btns">';
      h+='<button class="adm-btn'+(r===m.a?' sel':'')+'" onclick="saveR(\''+m.id+'\',\''+m.a.replace(/'/g,"\\'")+'\')"">'+x(m.a)+'</button>';
      h+='<button class="adm-btn'+(r===m.b?' sel':'')+'" onclick="saveR(\''+m.id+'\',\''+m.b.replace(/'/g,"\\'")+'\')"">'+x(m.b)+'</button>';
      if(r) h+='<button class="adm-btn clr" onclick="saveR(\''+m.id+'\',null)">✕ Clear</button>';
      h+='</div></div>';
    }
  }

  // Later rounds
  [["r16","R16"],["qf","Quarterfinals"],["sf","Semifinals"],["f","Final"],["champ","Champion"]].forEach(function(rp){
    var rnd=rp[0],lbl=rp[1];
    h+='<div class="adm-sec">'+lbl+'</div>';
    TREE[rnd].forEach(function(m){
      var teams=getTeams(m.id),r=getR(m.id);
      h+='<div class="adm-game">';
      if(teams[0]&&teams[1]){
        h+='<div class="adm-title">'+x(teams[0])+' v '+x(teams[1])+'</div><div class="adm-btns">';
        [teams[0],teams[1]].forEach(function(t){
          h+='<button class="adm-btn'+(r===t?' sel':'')+'" onclick="saveR(\''+m.id+'\',\''+t.replace(/'/g,"\\'")+'\')">'+x(t)+'</button>';
        });
        if(r) h+='<button class="adm-btn clr" onclick="saveR(\''+m.id+'\',null)">✕</button>';
        h+='</div>';
      } else {
        h+='<div style="font-size:9px;color:var(--dim);font-style:italic">Waiting for prior results…</div>';
      }
      h+='</div>';
    });
  });

  h+='</div>';
  return h;
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
