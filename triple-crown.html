<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="dark"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoolPlay - Triple Crown</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── Reset & base ─── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --tc-gold:#c9a84c;
  --tc-gold-light:#fbbf24;
  --tc-rose:#e11d48;
  --tc-rose-light:#fb7185;
  --tc-blue:#1d4ed8;
  --tc-blue-light:#60a5fa;
}
body{background:#07090f;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none}

/* ─── Topbar ─── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,9,15,.92);border-bottom:1px solid #1e2a3a;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.app-name{font-family:‘Bebas Neue’,cursive;font-size:22px;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-sub{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.topbar-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag{background:#1e2a3a;border:1px solid #2d3f52;border-radius:20px;padding:3px 10px;font-size:10px;color:#94a3b8}
.tag.locked{border-color:rgba(251,191,36,.4);color:#fbbf24;background:rgba(251,191,36,.08)}
.btn{border-radius:6px;padding:5px 11px;font-size:10px;font-weight:600;border:1px solid;transition:opacity .15s}
.btn:active{opacity:.65}
.btn-ghost{background:#0d1117;border-color:#1e2a3a;color:#64748b}
.btn-green{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.btn-red{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#fca5a5}
.btn-gold{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.35);color:#fbbf24}

/* ─── Race nav bar ─── */
.race-bar{background:#090d14;border-bottom:1px solid #1e2a3a;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.race-bar::-webkit-scrollbar{display:none}
.rtab{padding:10px 16px;font-size:11px;font-weight:600;color:#475569;border-bottom:2px solid transparent;background:none;white-space:nowrap;transition:color .15s;flex-shrink:0}
.rtab.active{color:#fbbf24;border-bottom-color:#fbbf24}
.rtab.derby.active{color:#f43f5e;border-bottom-color:#f43f5e}
.rtab.preakness.active{color:#a855f7;border-bottom-color:#a855f7}
.rtab.belmont.active{color:#60a5fa;border-bottom-color:#60a5fa}
.rtab-sub{font-size:8px;color:#334155;display:block;margin-top:1px}
.rtab.active .rtab-sub{color:inherit;opacity:.6}

/* ─── Page tabs ─── */
.page-bar{background:#0d1117;border-bottom:1px solid #1e2a3a;display:flex;padding:0 10px;gap:2px}
.ptab{padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#475569;border-bottom:2px solid transparent;background:none;transition:color .15s}
.ptab.active{color:#a5b4fc;border-bottom-color:#6366f1}

/* ─── User select ─── */
.user-screen{display:flex;flex-direction:column;align-items:center;padding:44px 20px;gap:18px}
.user-screen h2{font-size:11px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:14px 26px;border-radius:10px;background:#0d1117;border:1px solid #1e2a3a;font-size:15px;font-weight:700;color:#e2e8f0;text-align:left;min-width:140px}
.user-btn:active{border-color:#6366f1;background:rgba(99,102,241,.08)}
.user-btn.locked-state{border-color:rgba(16,185,129,.4);color:#6ee7b7}
.user-btn-sub{font-size:9px;color:#475569;font-weight:400;margin-top:3px}

/* ─── Lock bar ─── */
.lock-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid #1e2a3a;flex-wrap:wrap;background:#090d14}
.lock-chips{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.chip{padding:2px 8px;border-radius:20px;font-size:9px;border:1px solid}
.chip.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.chip.pend{background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.18);color:#475569}
.lock-info{font-size:10px;color:#475569}

/* ─── Picks summary bar ─── */
.picks-summary{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid #1e2a3a;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#090d14}
.picks-summary::-webkit-scrollbar{display:none}
.pscard{flex-shrink:0;background:#0d1117;border:1px solid #1e2a3a;border-radius:7px;padding:5px 10px;font-size:9px;text-align:center;min-width:80px}
.pscard.filled{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.07)}
.pscard.correct{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.07)}
.pscard.wrong{border-color:rgba(224,80,80,.3);background:rgba(224,80,80,.05);opacity:.7}
.pscard-slot{font-size:8px;color:#475569;margin-bottom:3px}
.pscard-name{font-size:10px;font-weight:600;color:#fbbf24;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px}
.pscard-pts{font-size:9px;color:#10b981;font-weight:700}

/* ─── Score banner ─── */
.score-banner{display:flex;gap:8px;padding:7px 14px;border-bottom:1px solid #1e2a3a;overflow-x:auto;align-items:center}
.score-banner::-webkit-scrollbar{display:none}
.sb-item{background:#0d1117;border:1px solid #1e2a3a;border-radius:6px;padding:4px 10px;font-size:9px;white-space:nowrap;text-align:center;flex-shrink:0}
.sb-item .sl{color:#475569;font-size:8px}
.sb-item .sv{color:#e2e8f0;font-weight:700;font-size:13px}
.sb-item.total{border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.07)}
.sb-item.total .sv{color:#fbbf24}

/* ─── Race header ─── */
.race-section{padding:14px 14px 4px}
.race-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;border-radius:10px;border:1px solid #1e2a3a;background:#0d1117}
.race-icon{font-size:26px;flex-shrink:0}
.race-info{flex:1}
.race-title{font-size:14px;font-weight:700;color:#f1f5f9}
.race-meta{font-size:9px;color:#475569;margin-top:2px;letter-spacing:.04em}
.race-badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:12px;border:1px solid;flex-shrink:0}

/* ─── Win/Place/Show slot headers ─── */
.slot-header{font-size:9px;color:#475569;letter-spacing:.12em;text-transform:uppercase;padding:6px 14px 4px;display:flex;align-items:center;gap:6px}
.slot-header::after{content:’’;flex:1;height:1px;background:#1e2a3a}

/* ─── Horse cards ─── */
.horse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;padding:0 14px 10px}
.hcard{background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;padding:9px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s,background .12s;-webkit-tap-highlight-color:transparent;position:relative}
.hcard:hover{border-color:rgba(251,191,36,.3)}
.hcard.picked-win{background:rgba(244,63,94,.12);border-color:rgba(244,63,94,.5)}
.hcard.picked-place{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.45)}
.hcard.picked-show{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.45)}
.hcard.correct{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.5)}
.hcard.wrong{background:rgba(224,80,80,.08);border-color:rgba(224,80,80,.3);opacity:.65}
.hcard.result-set{border-color:rgba(34,197,94,.25)}
.hcard.disabled{opacity:.4;cursor:default;pointer-events:none}
.hnum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;background:#1e2a3a;color:#64748b}
.hcard-info{flex:1;min-width:0}
.hcard-name{font-size:11px;font-weight:600;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hcard-meta{font-size:8px;color:#475569;margin-top:1px}
.hcard-odds{font-size:9px;color:#c9a84c;font-weight:600;flex-shrink:0}
.hcard-badge{position:absolute;top:4px;right:5px;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px}
.badge-win{background:rgba(244,63,94,.2);color:#f43f5e;border:1px solid rgba(244,63,94,.35)}
.badge-place{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.badge-show{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}

/* ─── Leaderboard ─── */
.lb-wrap{padding:14px}
.lb-note{font-size:9px;color:#475569;margin-bottom:14px;line-height:1.9;background:#0d1117;border:1px solid #1e2a3a;border-radius:7px;padding:8px 12px}
.lb-row{background:#0d1117;border:1px solid #1e2a3a;border-radius:9px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center}
.lb-row.first{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.03)}
.lb-row.second{border-color:rgba(148,163,184,.2)}
.lb-row.third{border-color:rgba(205,127,50,.2)}
.lb-medal{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:6px}
.lb-name{font-size:14px;font-weight:700}
.lb-pts{font-size:11px;color:#475569;flex-shrink:0}
.lb-pts b{color:#f1f5f9;font-weight:700}
.lb-pts small{font-size:9px;color:#334155}
.progress{background:#0f1923;border-radius:3px;height:4px;position:relative;overflow:hidden;margin-bottom:6px}
.progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;transition:width .6s;background:linear-gradient(90deg,#4f46e5,#818cf8)}
.lb-races{display:flex;gap:5px;flex-wrap:wrap}
.lb-race-chip{font-size:8px;padding:2px 7px;border-radius:10px;border:1px solid #1e2a3a;color:#334155;white-space:nowrap}
.lb-race-chip.has-pts{color:#fbbf24;border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.05)}
.lb-rank-change{font-size:9px;margin-left:4px}
.lb-rank-change.up{color:#10b981}
.lb-rank-change.down{color:#ef4444}

/* ─── Horses / field page ─── */
.field-wrap{padding:14px}
.field-section{margin-bottom:16px}
.field-race-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #1e2a3a;font-weight:700}
.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:5px}
.field-row{background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px}
.field-num{width:22px;height:22px;border-radius:50%;background:#1e2a3a;color:#64748b;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.field-info{flex:1;min-width:0}
.field-name{font-size:11px;font-weight:600}
.field-meta{font-size:8px;color:#475569;margin-top:2px}
.field-odds{font-size:9px;font-weight:700;color:#fbbf24;flex-shrink:0}
.field-result{font-size:9px;font-weight:700;flex-shrink:0}
.field-pickers{font-size:8px;color:#fbbf24;margin-top:2px}

/* ─── Toast ─── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:#0d1117;border:1px solid rgba(99,102,241,.4);color:#a5b4fc;border-radius:8px;padding:8px 18px;font-size:11px;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Confetti ─── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:900;display:none}

/* ─── Admin result modal ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#0d1117;border:1px solid #1e2a3a;border-radius:14px 14px 0 0;width:100%;max-width:480px;padding:20px 16px 36px;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#1e2a3a;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.modal-sub{font-size:10px;color:#475569;margin-bottom:16px}
.modal-label{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.pos-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.pos-btn{padding:8px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid #1e2a3a;background:#07090f;color:#e2e8f0;cursor:pointer;transition:all .12s;font-family:inherit}
.pos-btn.sel-1{border-color:rgba(244,63,94,.5);background:rgba(244,63,94,.15);color:#f43f5e}
.pos-btn.sel-2{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.12);color:#c084fc}
.pos-btn.sel-3{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.12);color:#60a5fa}
.pos-btn.sel-other{border-color:#2d3f52;background:rgba(71,85,105,.15);color:#475569}
.modal-close-btn{width:100%;padding:11px;border-radius:8px;background:#1e2a3a;border:none;color:#94a3b8;font-size:13px;font-family:inherit;cursor:pointer;margin-top:8px}

@keyframes trophy{0%{transform:scale(1)}25%{transform:scale(1.4) rotate(-10deg)}50%{transform:scale(1.4) rotate(10deg)}100%{transform:scale(1)}}
.trophy-anim{display:inline-block;animation:trophy .8s ease both}
@media(max-width:400px){.horse-grid{grid-template-columns:1fr 1fr}}
</style>

</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#475569;font-size:14px">Loading...</div></div>
<div id="toast"></div>

<!-- Admin result modal -->

<div class="modal-overlay" id="admin-modal">
  <div class="modal-sheet" style="border-top:2px solid #fbbf24">

      <button class="modal-close-btn" id="adm-clear" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;flex:1">Clear</button>

<script>
// =========================================================
// TRIPLE CROWN POOL CONFIG
// =========================================================

// Scoring: Win=5pts, Place=3pts, Show=1pt per race
// Slot multipliers: odds number × multiplier = points scored
// e.g. +400 horse Win = 400 × 1.0 = 40pts, Place = 400 × 0.6 = 24pts, Show = 400 × 0.2 = 8pts
var SLOT_MULT = { win: 1.0, place: 0.6, show: 0.2 };

// Parse American odds string ("+400", "+1200") → numeric value (400, 1200)
function parseOdds(oddsStr){
  var n = parseInt(String(oddsStr).replace(/[^0-9]/g,""));
  return isNaN(n) ? 100 : n;
}
// Points for a correct pick = floor(odds × multiplier / 100) so numbers stay readable
function slotPts(horseId, slot){
  var horse = horseById(horseId);
  if(!horse) return 0;
  return Math.floor(parseOdds(horse.odds) * SLOT_MULT[slot] / 100);
}

var RACES = [
  { id:"derby",    name:"Kentucky Derby",   icon:"🌹", date:"May 2, 2026",    venue:"Churchill Downs",       color:"#f43f5e", colorDim:"rgba(244,63,94,.12)",  colorBorder:"rgba(244,63,94,.45)" },
  { id:"preakness",name:"Preakness Stakes", icon:"🌼", date:"May 17, 2026",   venue:"Pimlico Race Course",    color:"#a855f7", colorDim:"rgba(168,85,247,.1)",  colorBorder:"rgba(168,85,247,.4)" },
  { id:"belmont",  name:"Belmont Stakes",   icon:"🏇", date:"June 6, 2026",   venue:"Belmont Park",          color:"#60a5fa", colorDim:"rgba(96,165,250,.1)",   colorBorder:"rgba(96,165,250,.4)" },
];

// Pool players — overridden by Firebase group
var PARTS = ["Player1","Player2","Player3","Player4"];

// Firebase path
var GROUP_ID   = (function(){ var m=location.search.match(/[?&]group=([^&]+)/); return m?decodeURIComponent(m[1]):null; })();
var URL_USER   = (function(){ var m=location.search.match(/[?&]user=([^&]+)/);  return m?decodeURIComponent(m[1]):null; })();
var GROUP_ADMIN_PW = null;
var BASE       = GROUP_ID ? "groups/"+GROUP_ID+"/data/triplecrown2026" : "triplecrown2026";
var MASTER_PW  = "Sloop";

// ─── Horse field per race ───────────────────────────────────────────────────
// Fields: id, name, pp (post position), odds, jockey, trainer, race
// Admin enters results (pos: 1/2/3/etc or "SCR" for scratch)
var HORSES = [
  // ── Kentucky Derby ──
  {id:"d_fierceness",   name:"Fierceness",        pp:1,  odds:"+400",  jockey:"I. Ortiz Jr.",    trainer:"T. Pletcher",   race:"derby"},
  {id:"d_journalism",   name:"Journalism",         pp:2,  odds:"+600",  jockey:"U. Rispoli",      trainer:"M. O'Brien",    race:"derby"},
  {id:"d_flying_solo",  name:"Flying Solo",        pp:3,  odds:"+800",  jockey:"J. Castellano",   trainer:"B. Cox",        race:"derby"},
  {id:"d_american_promise",name:"American Promise",pp:4,  odds:"+900",  jockey:"F. Prat",         trainer:"C. Brown",      race:"derby"},
  {id:"d_sandman",      name:"Sandman",            pp:5,  odds:"+1000", jockey:"L. Saez",         trainer:"S. Asmussen",   race:"derby"},
  {id:"d_sovereignty",  name:"Sovereignty",        pp:6,  odds:"+1200", jockey:"J. Velazquez",    trainer:"T. Pletcher",   race:"derby"},
  {id:"d_coal_battle",  name:"Coal Battle",        pp:7,  odds:"+1400", jockey:"B. Hernandez",    trainer:"K. McPeek",     race:"derby"},
  {id:"d_tzu_school",   name:"Tzu School",         pp:8,  odds:"+1600", jockey:"T. Gaffalione",   trainer:"B. Cox",        race:"derby"},
  {id:"d_luxor_cafe",   name:"Luxor Cafe",         pp:9,  odds:"+2000", jockey:"M. Smith",        trainer:"B. Baffert",    race:"derby"},
  {id:"d_publisher",    name:"Publisher",          pp:10, odds:"+2000", jockey:"J. Rosario",      trainer:"C. Brown",      race:"derby"},
  {id:"d_es_que",       name:"Es Que Love",        pp:11, odds:"+2500", jockey:"R. Santana Jr.",  trainer:"S. Asmussen",   race:"derby"},
  {id:"d_heart_of_honor",name:"Heart of Honor",    pp:12, odds:"+2500", jockey:"D. Davis",        trainer:"M. Maker",      race:"derby"},
  {id:"d_patagonia",    name:"Patagonia",          pp:13, odds:"+3000", jockey:"C. Lanerie",      trainer:"D. Romans",     race:"derby"},
  {id:"d_strong_quality",name:"Strong Quality",    pp:14, odds:"+3000", jockey:"H. Diaz Jr.",     trainer:"W. Mott",       race:"derby"},
  {id:"d_grande_day",   name:"Grande Day",         pp:15, odds:"+5000", jockey:"A. Beschizza",    trainer:"B. Baffert",    race:"derby"},
  {id:"d_cc_lightning",  name:"CC Lightning",      pp:16, odds:"+5000", jockey:"J. Graham",       trainer:"V. Oliver",     race:"derby"},
  {id:"d_admire_daytona",name:"Admire Daytona",    pp:17, odds:"+6000", jockey:"C. Lemaire",      trainer:"M. Sakaguchi",  race:"derby"},
  {id:"d_citizen_bull",  name:"Citizen Bull",      pp:18, odds:"+8000", jockey:"E. Cancel",       trainer:"K. McPeek",     race:"derby"},
  {id:"d_neptune_s_storm",name:"Neptune's Storm",  pp:19, odds:"+10000",jockey:"P. Hanagan",      trainer:"A. Balding",    race:"derby"},

// ─── Helpers ────────────────────────────────────────────────
function ukey(u){ return (u||"").toLowerCase().replace(/[^a-z0-9_]/g,""); }
function pem(u){ var e=_EM[u]; return e?e+" ":""; }
function x(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;"); }
function horseById(id){ for(var i=0;i<HORSES.length;i++) if(HORSES[i].id===id) return HORSES[i]; return null; }
function horsesByRace(raceId){ return HORSES.filter(function(h){ return h.race===raceId; }).sort(function(a,b){ return a.pp-b.pp; }); }
function raceById(id){ for(var i=0;i<RACES.length;i++) if(RACES[i].id===id) return RACES[i]; return null; }
function allLocked(){ return PARTS.every(function(p){ return ST.locked[p]; }); }
function anyResults(){ return Object.keys(ST.results).length > 0; }

// ─── Scoring ────────────────────────────────────────────────
// A pick is correct if: result for that race+slot matches the picked horse
function pickCorrect(user, raceId, slot){
  var key = raceId+"_"+slot;
  var pickedId = (ST.picks[user]||{})[key];
  if (!pickedId) return false;
  var res = ST.results[raceId] || {};
  return res[slot] && res[slot] === pickedId;
}

function playerRaceScore(user, raceId){
  var s = 0;
  SLOTS.forEach(function(slot){
    if(pickCorrect(user, raceId, slot)){
      var hid = (ST.picks[user]||{})[raceId+"_"+slot];
      s += slotPts(hid, slot);
    }
  });
  return s;
}

function playerScore(user){
  var s = 0;
  RACES.forEach(function(race){ s += playerRaceScore(user, race.id); });
  return s;
}

function grandMax(){
  // Theoretical max: highest odds horse wins all three slots across all races
  var max = 0;
  RACES.forEach(function(race){
    var horses = horsesByRace(race.id);
    if(!horses.length) return;
    var topOdds = Math.max.apply(null, horses.map(function(h){ return parseOdds(h.odds); }));
    SLOTS.forEach(function(slot){ max += Math.floor(topOdds * SLOT_MULT[slot] / 100); });
  });
  return max;
}

function totalPicksMade(user){
  var pp = ST.picks[user] || {};
  return Object.keys(pp).length; // max = 9 (3 slots × 3 races)
}

function racePicksMade(user, raceId){
  var pp = ST.picks[user] || {};
  var c = 0;
  SLOTS.forEach(function(slot){ if(pp[raceId+"_"+slot]) c++; });
  return c;
}

// Check if a horse is already picked in another slot for this race
function pickedInSlot(user, raceId, horseId){
  var pp = ST.picks[user] || {};
  for(var i=0;i<SLOTS.length;i++){
    if(pp[raceId+"_"+SLOTS[i]] === horseId) return SLOTS[i];
  }
  return null;
}

// ─── Firebase ops ───────────────────────────────────────────
function savePick(user, raceId, slot, horseId){
  if (!ST.picks[user]) ST.picks[user] = {};
  var key = raceId+"_"+slot;
  if(horseId) ST.picks[user][key] = horseId;
  else delete ST.picks[user][key];
  draw();
  if(DB) DB.ref(BASE+"/picks/"+user).set(ST.picks[user]);
}

function saveResult(raceId, slot, horseId){
  if(!ST.results[raceId]) ST.results[raceId] = {};
  if(horseId) ST.results[raceId][slot] = horseId;
  else delete ST.results[raceId][slot];
  draw();
  if(DB) DB.ref(BASE+"/results/"+raceId).set(ST.results[raceId]||{});
}

function clearRaceResults(raceId){
  delete ST.results[raceId];
  draw();
  if(DB) DB.ref(BASE+"/results/"+raceId).remove();
}

function doLock(u){ if(DB) DB.ref(BASE+"/locked/"+u).set(true); ST.locked[u]=true; draw(); }
function doUnlock(u){ if(DB) DB.ref(BASE+"/locked/"+u).set(false); ST.locked[u]=false; draw(); }

}

// ─── Boot ───────────────────────────────────────────────────
function boot(){
  if(!DB){ draw(); return; }
  function step1(){
    if(!GROUP_ID){ step2(); return; }
    DB.ref("groups/"+GROUP_ID).once("value", function(sn){
      var g=sn.val();
      if(g&&g.players&&g.players.length) PARTS=g.players;
      if(g&&g.adminPw) GROUP_ADMIN_PW=g.adminPw;
      step2();
    }, function(){ step2(); });
  }
  function step2(){
    var done=0, total=PARTS.length;
    if(!total){ step3(); return; }
    PARTS.forEach(function(p){
      DB.ref("users/"+ukey(p)+"/emoji").once("value",
        function(sn){ if(sn.val()) _EM[p]=sn.val(); done++; if(done===total) step3(); },
        function(){ done++; if(done===total) step3(); });
    });
  }
  function step3(){
    DB.ref(BASE+"/picks").on("value",  function(sn){ ST.picks=sn.val()||{}; draw(); });
    DB.ref(BASE+"/locked").on("value", function(sn){ ST.locked=sn.val()||{}; draw(); });
    DB.ref(BASE+"/results").on("value", function(sn){
      ST.results=sn.val()||{};
      var sorted=PARTS.slice().sort(function(a,b){ return playerScore(b)-playerScore(a); });
      var nr={}; sorted.forEach(function(p,i){ nr[p]=i+1; });
      ST.prevRanks=nr;
      draw();
    });
  }
  step1();
}

function launchConfetti(){
  if(_confettiRunning) return; _confettiRunning=true;
  var cv=document.getElementById("confetti-canvas"); cv.style.display="block"; cv.width=window.innerWidth; cv.height=window.innerHeight;
  var ctx=cv.getContext("2d"), pieces=[], cols=["#f43f5e","#a855f7","#60a5fa","#fbbf24","#10b981","#f0d080","#ffffff"];
  for(var i=0;i<140;i++) pieces.push({x:Math.random()*cv.width,y:-10-Math.random()*200,w:6+Math.random()*7,h:8+Math.random()*9,color:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*4,vy:2+Math.random()*4,angle:Math.random()*Math.PI*2,va:(Math.random()-.5)*.2});
  var frames=0;
  function tick(){ ctx.clearRect(0,0,cv.width,cv.height); var alive=false; for(var i=0;i<pieces.length;i++){ var p=pieces[i]; p.x+=p.vx; p.y+=p.vy; p.angle+=p.va; p.vy+=.08; if(p.y<cv.height+20) alive=true; ctx.save(); ctx.translate(p.x+p.w/2,p.y+p.h/2); ctx.rotate(p.angle); ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,1-(frames/200)); ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore(); } frames++; if(alive&&frames<220) requestAnimationFrame(tick); else{ cv.style.display="none"; ctx.clearRect(0,0,cv.width,cv.height); _confettiRunning=false; } }
  requestAnimationFrame(tick);
}

        h += '<div class="hcard-name">'+x(horse.name)+'</div>';
        h += '<div class="hcard-meta">'+x(horse.jockey)+'</div>';
        h += '</div>';
        h += '<div class="hcard-odds" style="text-align:right"><div>'+horse.odds+'</div><div style="font-size:8px;color:#475569">'+slotPts(horse.id,slot)+'pt</div></div>';
        if(isPicked && !correct && !wrong)   h += '<div class="hcard-badge badge-'+slot+'">'+SLOT_LABELS[slot]+'</div>';
        if(correct)  h += '<div style="font-size:11px;color:#10b981;flex-shrink:0">✓</div>';
        else if(wrong) h += '<div style="font-size:11px;color:#ef4444;flex-shrink:0">✗</div>';
        else if(isInOtherSlot) h += '<div class="hcard-badge badge-'+isInOtherSlot+'">'+SLOT_LABELS[isInOtherSlot]+'</div>';
        if(isResHorse && !isPicked) h += '<div style="font-size:9px;color:#10b981;flex-shrink:0">'+(slot==="win"?"🏆":slot==="place"?"🥈":"🥉")+'</div>';
        h += '</div>';
      });
      h += '</div>';
    });

    // Full picks reveal when all locked
    if(allLocked() && anyResults()){
      h += '<div style="padding:8px 14px 20px">';
      h += '<div style="font-size:9px;color:#10b981;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">All picks locked — full comparison</div>';
      h += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="display:flex;gap:12px;min-width:max-content;padding-bottom:8px">';
      PARTS.forEach(function(p){
        var pp=ST.picks[p]||{};
        h += '<div style="flex-shrink:0;width:150px">';
        h += '<div style="font-size:10px;color:'+(p===ST.user?"#fbbf24":"#475569")+';font-weight:600;margin-bottom:7px">'+pem(p)+x(p)+(p===ST.user?" (you)":"")+'</div>';
        SLOTS.forEach(function(slot){
          var hid=pp[ST.race+"_"+slot];
          var horse=hid?horseById(hid):null;
          var correct=hid&&pickCorrect(p,ST.race,slot);
          var res=(ST.results[ST.race]||{})[slot];
          var wrong=res&&hid&&!correct;
          h += '<div style="background:'+(correct?"rgba(34,197,94,.1)":wrong?"rgba(224,80,80,.08)":"#0d1117")+';border:1px solid '+(correct?"rgba(34,197,94,.3)":wrong?"rgba(224,80,80,.25)":"#1e2a3a")+';border-radius:6px;padding:5px 8px;margin-bottom:4px;font-size:10px">';
          h += '<div style="font-size:8px;color:'+SLOT_COLORS[slot]+';margin-bottom:2px">'+SLOT_LABELS[slot]+'</div>';
          if(horse) h += '#'+horse.pp+" "+x(horse.name)+(correct?" ✓":wrong?" ✗":"");
          else h += '<span style="color:#475569">No pick</span>';
          h += '</div>';
        });
        h += '</div>';
      });
      h += '</div></div></div>';
    }

    h += '</div>'; // race-section
  }

  // ── LEADERBOARD page ──
  if(ST.page==="leaderboard"){
    var GMAX2 = grandMax();
    var rows = PARTS.map(function(p){ return { name:p, score:playerScore(p) }; }).sort(function(a,b){ return b.score-a.score; });
    var newLeader=rows[0]?rows[0].name:null;
    var showTrophy=anyResults()&&newLeader&&newLeader!==_prevLeader&&_prevLeader!==null;
    if(anyResults()&&newLeader) _prevLeader=newLeader;

    h += '<div class="lb-wrap">';
    h += '<div class="lb-note">';
    h += '🏆 Win = <b style="color:#f43f5e">odds × 1.0</b> &nbsp; 🥈 Place = <b style="color:#a855f7">odds × 0.6</b> &nbsp; 🥉 Show = <b style="color:#60a5fa">odds × 0.2</b>';
    h += '<br>Pick 1 Win, 1 Place, 1 Show per race &nbsp;·&nbsp; Pts = floor(odds ÷ 100 × multiplier)';
    h += '</div>';

    var medals=["🥇","🥈","🥉"];
    rows.forEach(function(row,i){
      var spct=GMAX2>0?Math.round(row.score/GMAX2*100):0;
      var prevRank=ST.prevRanks[row.name], rankChange="";
      if(prevRank&&anyResults()){ if(prevRank>i+1) rankChange='<span class="lb-rank-change up">▲</span>'; else if(prevRank<i+1) rankChange='<span class="lb-rank-change down">▼</span>'; }
      var rowCls="lb-row"+(i===0?" first":i===1?" second":i===2?" third":"");
      var medalHtml=(i===0&&showTrophy)?'<span class="trophy-anim">🥇</span>':(medals[i]||("#"+(i+1)));
      h += '<div class="'+rowCls+'"><div class="lb-medal">'+medalHtml+'</div><div class="lb-body">';
      h += '<div class="lb-top"><span class="lb-name">'+pem(row.name)+x(row.name)+rankChange+'</span>';
      h += '<span class="lb-pts"><b>'+row.score+'</b> / '+GMAX2+' pts</span></div>';
      h += '<div class="progress"><div class="progress-fill" style="width:'+spct+'%"></div></div>';
      h += '<div class="lb-races">';
      RACES.forEach(function(race){
        var sc = playerRaceScore(row.name, race.id);
        var pp = ST.picks[row.name]||{};
        var hasAny = SLOTS.some(function(s){ return pp[race.id+"_"+s]; });
        var cls = "lb-race-chip"+(sc>0?" has-pts":"");
        h += '<span class="'+cls+'">'+race.icon+" "+race.name.split(" ")[0]+": "+(sc>0?"+"+sc+"pt":hasAny?"—":"no picks")+'</span>';
      });
      h += '</div>';
      h += '</div></div>';
    });

    if(anyResults()&&rows.length&&rows[0].score>0) setTimeout(launchConfetti,300);
    h += '</div>';
  }

  // ── FIELD page ──
  if(ST.page==="field"){
    h += '<div class="field-wrap">';
    RACES.forEach(function(race){
      var res = ST.results[race.id]||{};
      h += '<div class="field-section">';
      h += '<div class="field-race-label" style="color:'+race.color+'">'+race.icon+' '+race.name+' · '+race.date+'</div>';
      if(res.win||res.place||res.show){
        h += '<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">';
        SLOTS.forEach(function(slot){
          var hid=res[slot]; var horse=hid?horseById(hid):null;
          h += '<div style="background:'+race.colorDim+';border:1px solid '+race.colorBorder+';border-radius:7px;padding:5px 10px;font-size:10px">';
          h += '<div style="font-size:8px;color:'+SLOT_COLORS[slot]+';margin-bottom:2px">'+SLOT_LABELS[slot]+'</div>';
          h += horse ? '#'+horse.pp+' <b>'+x(horse.name)+'</b>' : '<span style="color:#475569">TBD</span>';
          h += '</div>';
        });
        h += '</div>';
      }
      h += '<div class="field-grid">';
      horsesByRace(race.id).forEach(function(horse){
        var isWin   = res.win===horse.id;
        var isPlace = res.place===horse.id;
        var isShow  = res.show===horse.id;
        var pickers = PARTS.filter(function(p){
          return SLOTS.some(function(s){ return (ST.picks[p]||{})[race.id+"_"+s]===horse.id; });
        });
        h += '<div class="field-row" style="'+(isWin?"border-color:rgba(244,63,94,.4);background:rgba(244,63,94,.06)":isPlace?"border-color:rgba(168,85,247,.35);background:rgba(168,85,247,.05)":isShow?"border-color:rgba(96,165,250,.3);background:rgba(96,165,250,.05)":"")+'">'; 
        h += '<div class="field-num" style="'+(isWin||isPlace||isShow?"background:"+race.colorDim+";color:"+race.color:"")+'">'+horse.pp+'</div>';
        h += '<div class="field-info">';
        h += '<div class="field-name">'+x(horse.name)+'</div>';
        h += '<div class="field-meta">'+x(horse.jockey)+' / '+x(horse.trainer)+'</div>';
        if(pickers.length) h += '<div class="field-pickers">Picked by: '+pickers.map(function(p){ return pem(p)+x(p); }).join(", ")+'</div>';
        h += '</div>';
        h += '<div>';
        h += '<div class="field-odds">'+horse.odds+'</div>';
        if(isWin)   h += '<div class="field-result" style="color:#f43f5e">🏆 Win</div>';
        if(isPlace) h += '<div class="field-result" style="color:#a855f7">🥈 Place</div>';
        if(isShow)  h += '<div class="field-result" style="color:#60a5fa">🥉 Show</div>';
        h += '</div>';
        h += '</div>';
      });
      h += '</div></div>';
    });
    h += '</div>';
  }

  document.getElementById("root").innerHTML = h;
  bind();
  if(allLocked()&&anyResults()&&!_confettiRunning&&ST.page==="leaderboard") setTimeout(launchConfetti,400);
}

// ─── Bind ───────────────────────────────────────────────────
function bind(){
  var els, i, el;

  // Race tabs
  els=document.querySelectorAll("[data-race]"); for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ ST.race=this.getAttribute("data-race"); draw(); });

  // Page tabs
  els=document.querySelectorAll(".ptab"); for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ ST.page=this.getAttribute("data-page"); draw(); });

  // User select
  els=document.querySelectorAll(".user-btn"); for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){ ST.user=this.getAttribute("data-user"); draw(); });

  // Switch user
  el=document.getElementById("b-switch"); if(el) el.addEventListener("click",function(){ ST.user=null; draw(); });

  // Admin toggle
  el=document.getElementById("b-admin"); if(el) el.addEventListener("click",function(){
    if(ST.admin){ ST.admin=false; draw(); return; }
    var pw=prompt("Admin password:"); if(pw===null) return;
    if(pw===MASTER_PW||(GROUP_ADMIN_PW&&pw===GROUP_ADMIN_PW)){ ST.admin=true; draw(); } else toast("Wrong password");
  });

  // Reset
  el=document.getElementById("b-reset"); if(el) el.addEventListener("click",doReset);

  // Lock / unlock
  el=document.getElementById("b-lock"); if(el) el.addEventListener("click",function(){
    if(confirm("Lock picks for "+ST.user+"? You won't be able to change them.")){ doLock(ST.user); toast("Picks locked! 🔒"); }
  });
  el=document.getElementById("b-unlock"); if(el) el.addEventListener("click",function(){
    if(confirm("Unlock your picks?")){ doUnlock(ST.user); toast("Picks unlocked"); }
  });

  // Horse pick clicks
  els=document.querySelectorAll("[data-pick-hid]"); for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    var raceId=this.getAttribute("data-pick-race");
    var slot=this.getAttribute("data-pick-slot");
    var hid=this.getAttribute("data-pick-hid");
    if(!ST.user||ST.locked[ST.user]) return;
    var key=raceId+"_"+slot;
    var cur=(ST.picks[ST.user]||{})[key];
    var horse=horseById(hid);
    savePick(ST.user, raceId, slot, cur===hid?null:hid);
    if(cur!==hid && horse) toast((slot==="win"?"🏆":slot==="place"?"🥈":"🥉")+" "+SLOT_LABELS[slot]+": "+horse.name);
  });

  // Admin slot buttons
  els=document.querySelectorAll("[data-adm-slot]"); for(i=0;i<els.length;i++) els[i].addEventListener("click",function(){
    openAdminModal(this.getAttribute("data-adm-race"), this.getAttribute("data-adm-slot"));
  });

  // Admin modal close/clear
  el=document.getElementById("adm-close"); if(el) el.addEventListener("click",closeAdminModal);
  el=document.getElementById("adm-clear"); if(el) el.addEventListener("click",function(){
    if(_admRace&&_admSlot){ saveResult(_admRace,_admSlot,null); closeAdminModal(); toast("Result cleared"); }
  });
  el=document.getElementById("admin-modal"); if(el) el.addEventListener("click",function(e){ if(e.target===this) closeAdminModal(); });
}

boot();
</script>

</body>
