<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="apple-touch-icon" sizes="512x512" href="/poolplay-icon.png">
<link rel="icon" type="image/png" href="/poolplay-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scorecery – Home Run Derby</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card:#ffffff;--card2:#fdf8ee;--border:#111111;--border2:#dddddd;
  --text:#111111;--muted:#777777;--dim:#aaaaaa;
  --gold:#e8c840;--gold-bg:#fffbe8;--gold-dark:#b89a00;
  --green:#5dba4a;--green-bg:#edfae8;
  --blue:#5590e8;--blue-bg:#e8f0ff;
  --red:#c0392b;--red2:#e85555;--red-bg:#ffe8e8;
  --purple:#9955e8;--purple-bg:#f5e8ff;
  --cream:#fdf8ee
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select{font-family:'Nunito',sans-serif;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}
a{color:inherit;text-decoration:none;touch-action:manipulation}

.topbar{background:#ffffff;border-bottom:3px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 3px 0 var(--border)}
.topbar-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;overflow:hidden;text-align:center}
.app-name{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;letter-spacing:-.02em}
.app-sub{font-size:9px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;display:block}
.topbar-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{background:var(--cream);border:2px solid var(--border);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--text);box-shadow:2px 2px 0 var(--border)}
.btn{border-radius:8px;padding:4px 10px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);font-family:'Nunito',sans-serif;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn-ghost{background:#ffffff;color:var(--text)}
.btn-gold{background:var(--gold-bg);color:var(--gold-dark)}
.btn-red{background:var(--red-bg);color:var(--red2)}
.btn-green{background:var(--green-bg);color:var(--green)}
.btn-blue{background:var(--blue-bg);color:var(--blue)}
.btn-purple{background:var(--purple);color:#fff}

.scorecery-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:inherit;color:#ffffff;text-transform:uppercase;letter-spacing:.05em;-webkit-text-stroke:3px #111111;text-shadow:1px 1px 0 #111111,2px 2px 0 #111111,3px 3px 0 #111111,5px 5px 0 #c9082a,7px 7px 0 #17408b,8px 8px 0 #0d2a5c;paint-order:stroke fill}

.page-bar{background:#ffffff;border-bottom:2px solid var(--border);display:flex;padding:0;gap:0;overflow-x:auto;flex-shrink:0}
.page-bar::-webkit-scrollbar{display:none}
.ptab{padding:9px 12px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:3px solid transparent;background:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;flex:1;text-align:center}
.ptab.active{color:var(--text);border-bottom-color:var(--border);background:var(--gold-bg)}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:#ffffff;border:2px solid var(--border);color:var(--text);border-radius:10px;padding:7px 16px;font-size:10px;font-weight:800;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:3px 3px 0 var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.public-banner{background:var(--blue-bg);border-bottom:2px solid var(--border);padding:6px 12px;font-size:9px;font-weight:800;color:var(--blue);text-align:center;text-transform:uppercase;letter-spacing:.05em}

.user-screen{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px}
.user-screen h2{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.user-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.user-btn{padding:12px 22px;border-radius:12px;background:#ffffff;border:2px solid var(--border);font-size:14px;font-weight:800;color:var(--text);text-align:left;min-width:150px;box-shadow:3px 3px 0 var(--border)}
.user-btn:active{transform:translate(3px,3px);box-shadow:none}

.lock-bar{display:flex;align-items:center;gap:7px;padding:9px 12px;border-bottom:2px solid var(--border2);flex-wrap:wrap;background:var(--cream);flex-shrink:0}
.lock-info{font-size:11px;font-weight:900;color:var(--text)}
.lock-chips{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.lchip{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:800;border:2px solid var(--border);box-shadow:1px 1px 0 var(--border);font-family:'Nunito',sans-serif;background:#ffffff;color:var(--muted)}
.lchip.done{background:var(--gold);color:var(--text)}
.lchip.live{background:var(--red-bg);color:var(--red2)}

.wrap{padding:12px}
.lb-note{font-size:11px;font-weight:700;color:var(--muted);line-height:1.7;background:#ffffff;border:2px solid var(--border2);border-radius:10px;padding:16px;margin:12px;text-align:center}

/* section headers */
.sec{margin-bottom:16px}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sec-title{font-size:12px;font-weight:900;color:var(--text)}
.sec-pts{font-size:9px;font-weight:800;color:var(--muted);background:#fff;border:2px solid var(--border);border-radius:20px;padding:2px 9px;box-shadow:1px 1px 0 var(--border)}
.sec-sub{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:10px;line-height:1.5}

/* slugger cards */
.slug-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.slug{background:#fff;border:2px solid var(--border);border-radius:12px;padding:10px;box-shadow:3px 3px 0 var(--border);display:flex;flex-direction:column;gap:5px;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;min-height:66px;justify-content:center}
.slug:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--border)}
.slug.sel{background:var(--gold-bg);border-color:var(--gold-dark)}
.slug.locked{cursor:default}
.slug.correct{background:var(--green-bg);border-color:var(--green)}
.slug.wrong{opacity:.55}
.slug.tbd{opacity:.6;cursor:default;border-style:dashed}
.slug-name{font-size:13px;font-weight:900;color:var(--text);line-height:1.15}
.slug-team{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.slug-check{position:absolute;top:7px;right:8px;width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}
.slug.sel .slug-check{background:var(--gold);border-color:var(--border);color:var(--text)}
.slug.correct .slug-check{background:var(--green);border-color:var(--border);color:#fff}
.slug-r1{position:absolute;top:7px;right:8px;font-size:11px;font-weight:900;color:var(--muted)}

/* single-select rows (finalists/champion) */
.pick-row{display:flex;align-items:center;gap:9px;padding:11px 12px;background:#fff;border:2px solid var(--border);border-radius:11px;margin-bottom:7px;box-shadow:3px 3px 0 var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.pick-row:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--border)}
.pick-row.sel{background:var(--gold-bg);border-color:var(--gold-dark)}
.pick-row.locked{cursor:default}
.pick-row.correct{background:var(--green-bg);border-color:var(--green)}
.pick-row.wrong{opacity:.55}
.pick-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pick-row.sel .pick-radio{background:var(--gold);border-color:var(--border)}
.pick-row.sel .pick-radio::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--text)}
.pick-row.correct .pick-radio{background:var(--green);border-color:var(--border)}
.pick-row .pr-name{font-size:14px;font-weight:900;flex:1}
.pick-row .pr-team{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase}
.pick-row .pr-pts{font-size:10px;font-weight:900;flex-shrink:0}
.pick-row .pr-pts.earned{color:var(--green)}
.pick-row .pr-pts.miss{color:var(--red2)}

.champ-row{border-width:3px;box-shadow:4px 4px 0 var(--border)}
.champ-row.sel{background:var(--gold);border-color:var(--border)}
.champ-row.correct{background:var(--green);border-color:var(--border);color:#fff}
.champ-row.correct .pr-team{color:rgba(255,255,255,.8)}

.trophy{font-size:16px;flex-shrink:0}

/* standings */
.lb-row{background:#ffffff;border:2px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;gap:9px;align-items:center;box-shadow:4px 4px 0 var(--border)}
.lb-row.first{background:var(--gold-bg)}
.lb-row.second{background:#fafafa}
.lb-row.third{background:#fff8f0}
.lb-medal{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;gap:5px}
.lb-name{font-size:13px;font-weight:900}
.lb-pts{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.lb-pts b{color:var(--text);font-weight:900;font-size:16px}
.lb-bar-wrap{height:7px;background:var(--border2);border-radius:4px;margin-top:7px;overflow:hidden;border:1px solid var(--border)}
.lb-bar{height:100%;background:var(--green)}
.lb-stats{display:flex;gap:6px;margin-top:8px}
.lb-stat{flex:1;background:var(--cream);border:1.5px solid var(--border2);border-radius:7px;padding:5px 4px;text-align:center}
.lb-stat-v{font-size:14px;font-weight:900;color:var(--text);line-height:1}
.lb-stat-l{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:3px}

/* admin */
.adm-wrap{padding:0 0 16px}
.adm-sec-label{font-size:9px;font-weight:900;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:14px 12px 8px;padding-bottom:5px;border-bottom:2px solid var(--border2)}
.adm-sec-label:first-of-type{margin-top:0}
.adm-note{font-size:10px;font-weight:700;color:var(--muted);margin:0 12px 10px;line-height:1.6}
.adm-field{background:#fff;border:2px solid var(--border);border-radius:10px;padding:10px;margin:0 10px 8px;box-shadow:3px 3px 0 var(--border)}
.adm-field-title{font-size:9px;font-weight:800;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.adm-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.adm-input{flex:1;border:2px solid var(--border);border-radius:6px;padding:7px 8px;font-size:11px;font-weight:700;font-family:'Nunito',sans-serif;background:var(--cream);box-shadow:2px 2px 0 var(--border);min-width:0}
.adm-input.sm{max-width:70px;flex:0 0 70px;text-align:center}
.adm-input.r1{max-width:54px;flex:0 0 54px;text-align:center}
.adm-btn{padding:5px 10px;border-radius:8px;font-size:9px;font-weight:800;border:2px solid var(--border);background:#fff;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border)}
.adm-btn:active{transform:translate(2px,2px);box-shadow:none}
.adm-btn.on{background:var(--green-bg);color:var(--green)}
.adm-btn.sel-p{background:var(--purple-bg);color:var(--purple)}
.adm-slug-row{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#fff;border:2px solid var(--border);border-radius:9px;margin:0 10px 6px;box-shadow:2px 2px 0 var(--border)}
.adm-slug-idx{font-size:10px;font-weight:900;color:var(--dim);width:16px;flex-shrink:0}
.adm-pill-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.adm-pill{font-size:9px;font-weight:800;padding:4px 9px;border-radius:20px;border:2px solid var(--border2);background:#fff;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif}
.adm-pill.on-adv{background:var(--blue-bg);border-color:var(--border);color:var(--blue)}
.adm-pill.on-fin{background:var(--purple-bg);border-color:var(--border);color:var(--purple)}
.adm-pill.on-champ{background:var(--gold);border-color:var(--border);color:var(--text)}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#ffffff;border:3px solid var(--border);border-radius:16px;width:100%;max-width:340px;padding:22px 18px;box-shadow:5px 5px 0 var(--border)}
.modal-title{font-size:14px;font-weight:900;margin-bottom:14px;text-align:center}
.modal-input{width:100%;background:var(--cream);border:2px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-weight:700;outline:none;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--border);margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:11px;border-radius:10px;font-size:12px;font-weight:800;border:2px solid var(--border);font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--border)}
.modal-btn:active{transform:translate(3px,3px);box-shadow:none}

button:focus-visible,a:focus-visible,select:focus-visible,input:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:3px solid var(--blue);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms !important;transition-duration:.001ms !important}}
</style>
</head>

<div class="topbar">
  <div class="topbar-left"><a href="index.html" title="Back to Scorecery hub" style="display:flex;align-items:center;justify-content:center;text-decoration:none;background:#ffffff;border:2px solid var(--border);border-radius:8px;box-shadow:2px 2px 0 var(--border);padding:5px 10px;gap:3px;line-height:1"><span style="font-size:11px;font-weight:900;color:var(--muted)">&#8592;</span><span style="font-size:11px;font-weight:900;color:var(--text)">Hub</span></a></div>
  <div class="topbar-center">
    <div class="app-name"><span class="scorecery-logo" style="font-size:15px">Scorecery</span></div>

  </div>
  <div class="topbar-right" id="topbar-right"></div>
</div>

<div class="page-bar" id="page-bar"></div>
<div id="app"></div>
<div id="toast"></div>
<div id="modal-root"></div>

<script>
// =====================================================
// MLB HOME RUN DERBY — PREDICTION POOL
// Round 1 = 8 sluggers, top 4 advance. Then semis (top 4) -> final (top 2) -> champ.
// Players predict: 4 advancers (+2 each) · 2 finalists (+4 each) · champion (+8)
// =====================================================
var GROUP_ID=(function(){var m=location.search.match(/[?&]group=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var URL_USER=(function(){var m=location.search.match(/[?&]user=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();
var PUBLIC_VIEW=(function(){ return /[?&]public=1/.test(location.search); })();
var GROUP_ADMIN_PW=null;
var BASE=GROUP_ID?"groups/"+GROUP_ID+"/data/hrderby":"hrderby";
var MASTER_PW="Sloop";

// Derby locks at first pitch: July 13, 2026, 8:00 PM ET
var DERBY_LOCK=new Date("2026-07-13T20:00:00-04:00");

// Scoring
var PTS_ADVANCE=2;   // each correct R1 advancer (of 4)
var PTS_FINALIST=4;  // each correct finalist (of 2)
var PTS_CHAMP=8;     // correct champion

// Default field: Caminero confirmed; rest are predicted, admin-editable.
var DEFAULT_FIELD=[
  {n:"Junior Caminero", t:"Rays"},
  {n:"Kyle Schwarber",  t:"Phillies"},
  {n:"James Wood",      t:"Nationals"},
  {n:"Byron Buxton",    t:"Twins"},
  {n:"Nick Kurtz",      t:"Athletics"},
  {n:"Ben Rice",        t:"Yankees"},
  {n:"Hunter Goodman",  t:"Rockies"},
  {n:"Christian Walker", t:"Astros"}
];

var PARTS=["Player1","Player2","Player3","Player4"];
var _EM={};

var ST={
  page:(PUBLIC_VIEW?"standings":"picks"),
  user:URL_USER||null,
  admin:false,
  field:DEFAULT_FIELD.slice(),
  picks:{},        // ukey -> {advance:[names], finalists:[names], champion:name}
  results:{},      // {advance:[names], finalists:[names], champion:name, r1:{name:homers}}
  locked:false,    // admin hard-lock override
  groupPublic:false
};

var DB=null;
try{
  firebase.initializeApp({apiKey:"AIzaSyAL0ansyAjP9A0oh35lhUV7EcxE7iYSc5Y",authDomain:"rwc-picks.firebaseapp.com",databaseURL:"https://rwc-picks-default-rtdb.firebaseio.com",projectId:"rwc-picks",appId:"1:965978379243:web:35f9db9a664f9170e27fae"});
  DB=firebase.database();
}catch(e){}

function x(s){var t=String(s||"");t=t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");return t;}
var _tt;
function toast(m){var el=document.getElementById("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove("show");},2500);}
function ukey(n){return String(n||"").toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\./g,"");}
function pem(n){return _EM[n]?"<span style='margin-right:3px'>"+_EM[n]+"</span>":"";}

// ── Lock / field helpers ─────────────────────────────────
function isLocked(){ return ST.locked || (new Date() >= DERBY_LOCK); }
function fieldNames(){ return ST.field.map(function(s){return s.n;}).filter(Boolean); }
function teamFor(name){ for(var i=0;i<ST.field.length;i++){ if(ST.field[i].n===name) return ST.field[i].t||""; } return ""; }
function isTBD(name){ return !name || /^tbd/i.test(name); }

// ── Picks ────────────────────────────────────────────────
function myPicks(){ return (ST.picks[ukey(ST.user)])||{advance:[],finalists:[],champion:null}; }
function savePicks(p){
  var uk=ukey(ST.user);
  ST.picks[uk]=p;
  if(DB)DB.ref(BASE+"/picks/"+uk).set(p,function(err){if(err)toast("Save failed");});
}
function toggleAdvance(name){
  if(PUBLIC_VIEW||isTBD(name))return;
  if(!ST.user){toast("Pick a name first");return;}
  if(isLocked()){toast("🔒 Picks are locked");return;}
  var p=myPicks(); p.advance=(p.advance||[]).slice();
  var i=p.advance.indexOf(name);
  if(i>=0){ p.advance.splice(i,1); }
  else {
    if(p.advance.length>=4){ toast("Pick exactly 4 to advance"); return; }
    p.advance.push(name);
  }
  // If a removed advancer was also a finalist/champ, clear those
  p.finalists=(p.finalists||[]).filter(function(f){return p.advance.indexOf(f)>=0;});
  if(p.champion&&p.advance.indexOf(p.champion)<0)p.champion=null;
  savePicks(p); draw();
}
function toggleFinalist(name){
  if(PUBLIC_VIEW)return;
  if(!ST.user){toast("Pick a name first");return;}
  if(isLocked()){toast("🔒 Picks are locked");return;}
  var p=myPicks(); p.finalists=(p.finalists||[]).slice();
  var i=p.finalists.indexOf(name);
  if(i>=0){ p.finalists.splice(i,1); }
  else {
    if(p.finalists.length>=2){ toast("Pick exactly 2 finalists"); return; }
    p.finalists.push(name);
  }
  if(p.champion&&p.finalists.indexOf(p.champion)<0)p.champion=null;
  savePicks(p); draw();
}
function pickChampion(name){
  if(PUBLIC_VIEW)return;
  if(!ST.user){toast("Pick a name first");return;}
  if(isLocked()){toast("🔒 Picks are locked");return;}
  var p=myPicks();
  p.champion=(p.champion===name)?null:name;
  savePicks(p); draw();
}

// ── Scoring ──────────────────────────────────────────────
function scoreFor(user){
  var p=(ST.picks[ukey(user)])||{};
  var r=ST.results||{};
  var pts=0, advHits=0, finHits=0, champHit=0;
  var rAdv=r.advance||[], rFin=r.finalists||[], rChamp=r.champion||null;
  (p.advance||[]).forEach(function(n){ if(rAdv.indexOf(n)>=0){pts+=PTS_ADVANCE;advHits++;} });
  (p.finalists||[]).forEach(function(n){ if(rFin.indexOf(n)>=0){pts+=PTS_FINALIST;finHits++;} });
  if(p.champion&&rChamp&&p.champion===rChamp){pts+=PTS_CHAMP;champHit=1;}
  return {pts:pts, advHits:advHits, finHits:finHits, champHit:champHit,
          hasResults:(rAdv.length||rFin.length||rChamp)?true:false};
}
function maxPossible(){ return 4*PTS_ADVANCE + 2*PTS_FINALIST + PTS_CHAMP; } // 24

// ── Sync totals to the hub ───────────────────────────────
// index.html's calcStandings() reads groups/{id}/data/{poolId}/scores.
// Without this node the HR Derby contributes 0 pts to the hub standings.
// Written under every ukey variant the hub uses, so name normalization can't miss.
var _lastSync=null;
function hubKeys(name){
  var s=String(name||"");
  var out=[], seen={};
  [ s.toLowerCase().replace(/\s+/g,"_").replace(/[&']/g,""), // index.html ukey()
    s.toLowerCase().replace(/[^a-z0-9_]/g,""),               // index.html stats/badge key
    ukey(s)                                                  // this page's ukey()
  ].forEach(function(k){ if(k&&!seen[k]){seen[k]=1;out.push(k);} });
  return out;
}
function syncScores(){
  if(!DB) return;
  var r=ST.results||{};
  var hasResults=((r.advance||[]).length||(r.finalists||[]).length||r.champion)?true:false;
  // No results entered yet — clear the node so the hub falls back to globalSettings/results
  // instead of seeing a full set of zeroes and treating them as real scores.
  if(!hasResults){
    if(_lastSync!=="__none__"){ _lastSync="__none__"; DB.ref(BASE+"/scores").remove(); }
    return;
  }
  var out={};
  PARTS.forEach(function(p){
    var pts=scoreFor(p).pts;
    hubKeys(p).forEach(function(k){ out[k]=pts; });
  });
  var sig=JSON.stringify(out);
  if(sig===_lastSync) return;   // nothing changed, don't hammer the DB
  _lastSync=sig;
  DB.ref(BASE+"/scores").set(out);
}

// ── Firebase load ────────────────────────────────────────
function loadData(){
  if(!DB){draw();return;}
  function s1(){
    if(!GROUP_ID){s2();return;}
    DB.ref("groups/"+GROUP_ID).once("value",function(sn){
      var g=sn.val()||{};
      if(g&&g.players&&g.players.length)PARTS=g.players;
      GROUP_ADMIN_PW=(g&&(g.adminPw||g.groupAdminPw))||null;
      ST.groupPublic=!!(g&&g.public);
      s2();
    },function(){s2();});
  }
  function s2(){
    var done=0,total=PARTS.length;
    if(!total){s3();return;}
    PARTS.forEach(function(p){
      DB.ref("users/"+ukey(p)+"/emoji").once("value",
        function(sn){if(sn.val())_EM[p]=sn.val();done++;if(done===total)s3();},
        function(){done++;if(done===total)s3();});
    });
  }
  function s3(){
    DB.ref("globalSettings/masterPw").on("value",function(sn){if(sn.val())MASTER_PW=sn.val();});
    DB.ref(BASE+"/field").on("value",function(sn){var f=sn.val();if(f&&f.length)ST.field=f;draw();});
    DB.ref(BASE+"/results").on("value",function(sn){ST.results=sn.val()||{};draw();});
    DB.ref(BASE+"/picks").on("value",function(sn){ST.picks=sn.val()||{};draw();});
    DB.ref(BASE+"/locked").on("value",function(sn){ST.locked=!!sn.val();draw();});
  }
  s1();
}

// ── Admin ────────────────────────────────────────────────
function saveField(){ if(DB)DB.ref(BASE+"/field").set(ST.field); }
function setSlug(i,field,val){
  if(!ST.field[i])ST.field[i]={n:"",t:""};
  ST.field[i][field]=val;
  saveField();
}
function setResultAdvance(name){
  var r=ST.results||{}; r.advance=(r.advance||[]).slice();
  var i=r.advance.indexOf(name);
  if(i>=0)r.advance.splice(i,1);
  else { if(r.advance.length>=4){toast("4 advance max");return;} r.advance.push(name); }
  r.finalists=(r.finalists||[]).filter(function(f){return r.advance.indexOf(f)>=0;});
  if(r.champion&&r.advance.indexOf(r.champion)<0)r.champion=null;
  ST.results=r; if(DB)DB.ref(BASE+"/results").set(r); draw();
}
function setResultFinalist(name){
  var r=ST.results||{}; r.finalists=(r.finalists||[]).slice();
  var i=r.finalists.indexOf(name);
  if(i>=0)r.finalists.splice(i,1);
  else { if(r.finalists.length>=2){toast("2 finalists max");return;} r.finalists.push(name);
         if((r.advance||[]).indexOf(name)<0){r.advance=(r.advance||[]);r.advance.push(name);} }
  ST.results=r; if(DB)DB.ref(BASE+"/results").set(r); draw();
}
function setResultChampion(name){
  var r=ST.results||{};
  r.champion=(r.champion===name)?null:name;
  if(r.champion){
    if((r.finalists||[]).indexOf(name)<0){r.finalists=(r.finalists||[]);if(r.finalists.length<2)r.finalists.push(name);}
    if((r.advance||[]).indexOf(name)<0){r.advance=(r.advance||[]);r.advance.push(name);}
  }
  ST.results=r; if(DB)DB.ref(BASE+"/results").set(r); draw();
}
function setR1(name,val){
  var r=ST.results||{}; r.r1=r.r1||{};
  if(val==="")delete r.r1[name]; else r.r1[name]=Number(val)||0;
  ST.results=r; if(DB)DB.ref(BASE+"/results").set(r);
}
function toggleLock(){ ST.locked=!ST.locked; if(DB)DB.ref(BASE+"/locked").set(ST.locked); draw(); }
function setPublic(val){
  if(!GROUP_ID||!DB)return;
  DB.ref("groups/"+GROUP_ID+"/public").set(val,function(){ST.groupPublic=val;toast(val?"Public view on":"Public view off");draw();});
}
function resetResults(){
  if(!confirm("Clear all entered results?"))return;
  ST.results={}; if(DB)DB.ref(BASE+"/results").set({}); draw();
}

// ── Admin auth / modal ───────────────────────────────────
function tryAdmin(){
  openModal("Admin password","",function(v){
    if(v===MASTER_PW||(GROUP_ADMIN_PW&&v===GROUP_ADMIN_PW)){ST.admin=true;ST.page="admin";closeModal();draw();}
    else toast("Wrong password");
  },"password");
}
function openModal(title,val,cb,type){
  var r=document.getElementById("modal-root");
  r.innerHTML='<div class="modal-ov" id="mov"><div class="modal-box">'+
    '<div class="modal-title">'+x(title)+'</div>'+
    '<input class="modal-input" id="mi" type="'+(type||"text")+'" value="'+x(val||"")+'">'+
    '<div class="modal-btns"><button class="modal-btn btn-ghost" id="mcancel">Cancel</button>'+
    '<button class="modal-btn btn-gold" id="mok">OK</button></div></div></div>';
  var mi=document.getElementById("mi");mi.focus();
  document.getElementById("mok").onclick=function(){cb(mi.value);};
  document.getElementById("mcancel").onclick=closeModal;
  document.getElementById("mov").onclick=function(e){if(e.target.id==="mov")closeModal();};
  mi.onkeydown=function(e){if(e.key==="Enter")cb(mi.value);};
}
function closeModal(){document.getElementById("modal-root").innerHTML="";}
function pickUser(n){ST.user=n;draw();}

// =====================================================
// RENDER
// =====================================================
function draw(){
  syncScores();
  renderTopbar();renderPublicBanner();renderPageBar();
  var app=document.getElementById("app");
  if(!PUBLIC_VIEW && !ST.user){app.innerHTML=userScreen();bindUserScreen();return;}
  if(ST.page==="picks")app.innerHTML=picksScreen();
  else if(ST.page==="standings")app.innerHTML=standingsScreen();
  else if(ST.page==="admin"&&ST.admin)app.innerHTML=adminScreen();
  else {ST.page="picks";app.innerHTML=picksScreen();}
  if(ST.page==="picks")bindPicks();
  if(ST.page==="admin")bindAdmin();
}
function renderTopbar(){
  var r=document.getElementById("topbar-right");
  if(PUBLIC_VIEW){r.innerHTML='<span class="tag">👁 Public</span>';return;}
  var h="";
  if(ST.user)h+='<span class="tag">'+pem(ST.user)+x(ST.user)+'</span>';
  if(ST.admin)h+='<button class="btn btn-red" onclick="ST.admin=false;ST.page=\'picks\';draw()">Exit</button>';
  else h+='<button class="btn btn-ghost" onclick="tryAdmin()">Admin</button>';
  r.innerHTML=h;
}
function renderPublicBanner(){
  document.getElementById("public-banner").innerHTML=PUBLIC_VIEW?'<div class="public-banner">Read-only public standings</div>':"";
}
function renderPageBar(){
  var bar=document.getElementById("page-bar");
  var tabs=[["picks","My Bracket"],["standings","Standings"]];
  if(PUBLIC_VIEW)tabs=[["standings","Standings"]];
  if(ST.admin)tabs.push(["admin","Admin"]);
  bar.innerHTML=tabs.map(function(t){return '<button class="ptab'+(ST.page===t[0]?" active":"")+'" onclick="ST.page=\''+t[0]+'\';draw()">'+t[1]+'</button>';}).join("");
}
function userScreen(){
  var h='<div class="user-screen"><h2>Who are you?</h2><div class="user-grid">';
  PARTS.forEach(function(p){h+='<button class="user-btn" data-u="'+x(p)+'">'+pem(p)+x(p)+'</button>';});
  return h+'</div></div>';
}
function bindUserScreen(){document.querySelectorAll(".user-btn").forEach(function(b){b.onclick=function(){pickUser(b.getAttribute("data-u"));};});}

// countdown to lock
function lockCountdown(){
  var now=new Date(), diff=DERBY_LOCK-now;
  if(diff<=0)return null;
  var d=Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000), m=Math.floor(diff%3600000/60000);
  if(d>0)return d+"d "+h+"h";
  if(h>0)return h+"h "+m+"m";
  return m+"m";
}

// ── Picks / bracket screen ───────────────────────────────
function picksScreen(){
  var locked=isLocked();
  var p=myPicks();
  var r=ST.results||{};
  var names=fieldNames();
  var filled = (p.advance||[]).length===4 && (p.finalists||[]).length===2 && p.champion;
  var sc=scoreFor(ST.user);

  var h='<div class="lock-bar"><span class="lock-info">🏟️ Home Run Derby</span><div class="lock-chips">';
  if(locked)h+='<span class="lchip done">🔒 Locked</span>';
  else { var cd=lockCountdown(); h+='<span class="lchip">'+(filled?"✓ Complete":"In progress")+'</span>'; if(cd)h+='<span class="lchip live">Locks in '+cd+'</span>'; }
  if(sc.hasResults)h+='<span class="lchip live">'+sc.pts+' pts</span>';
  h+='</div></div>';

  h+='<div class="wrap">';

  // ── Round 1: pick 4 to advance ──
  h+='<div class="sec"><div class="sec-hd"><span class="sec-title">Round 1 — Who Advances?</span><span class="sec-pts">+'+PTS_ADVANCE+' each</span></div>';
  h+='<div class="sec-sub">Pick the <b>4 sluggers</b> you think make the semifinals ('+(p.advance||[]).length+'/4 selected).</div>';
  h+='<div class="slug-grid">';
  ST.field.forEach(function(s){
    var name=s.n;
    if(isTBD(name)){ h+='<div class="slug tbd"><div class="slug-name">TBD</div><div class="slug-team">Not yet announced</div></div>'; return; }
    var sel=(p.advance||[]).indexOf(name)>=0;
    var isAdv=(r.advance||[]).indexOf(name)>=0;
    var cls="slug";
    if(locked||sc.hasResults){ cls+=" locked"; if(sel&&isAdv)cls+=" correct"; else if(sel&&!isAdv&&(r.advance||[]).length)cls+=" wrong"; }
    else if(sel)cls+=" sel";
    var r1=(r.r1||{})[name];
    h+='<div class="'+cls+'" data-adv="'+x(name)+'">';
    if((r1!==undefined)&&(locked||sc.hasResults))h+='<span class="slug-r1">'+r1+' HR</span>';
    else h+='<span class="slug-check">'+((sel||isAdv)?"✓":"")+'</span>';
    h+='<div class="slug-name">'+x(name)+'</div><div class="slug-team">'+x(s.t||"")+'</div></div>';
  });
  h+='</div></div>';

  // ── Finalists: pick 2 (only from your advancers, pre-lock; from field otherwise) ──
  var finPool = (!locked && (p.advance||[]).length===4) ? p.advance : names.filter(function(n){return !isTBD(n);});
  h+='<div class="sec"><div class="sec-hd"><span class="sec-title">The Final — Pick 2 Finalists</span><span class="sec-pts">+'+PTS_FINALIST+' each</span></div>';
  h+='<div class="sec-sub">'+( (!locked && (p.advance||[]).length<4) ? "Pick your 4 advancers first, then choose 2 of them to reach the final." : "Which 2 reach the championship round? ("+(p.finalists||[]).length+"/2)")+'</div>';
  if(!locked && (p.advance||[]).length<4){
    h+='<div class="lb-note" style="margin:0">Select 4 advancers above to unlock this step.</div>';
  } else {
    finPool.forEach(function(name){
      if(isTBD(name))return;
      var sel=(p.finalists||[]).indexOf(name)>=0;
      var isFin=(r.finalists||[]).indexOf(name)>=0;
      var cls="pick-row";
      if(locked||sc.hasResults){ cls+=" locked"; if(sel&&isFin)cls+=" correct"; else if(sel&&!isFin&&(r.finalists||[]).length)cls+=" wrong"; }
      else if(sel)cls+=" sel";
      h+='<div class="'+cls+'" data-fin="'+x(name)+'"><div class="pick-radio"></div>'+
         '<span class="pr-name">'+x(name)+'</span><span class="pr-team">'+x(teamFor(name))+'</span></div>';
    });
  }
  h+='</div>';

  // ── Champion: pick 1 (from finalists pre-lock) ──
  var champPool = (!locked && (p.finalists||[]).length===2) ? p.finalists : names.filter(function(n){return !isTBD(n);});
  h+='<div class="sec"><div class="sec-hd"><span class="sec-title">🏆 The Champion</span><span class="sec-pts">+'+PTS_CHAMP+'</span></div>';
  if(!locked && (p.finalists||[]).length<2){
    h+='<div class="lb-note" style="margin:0">Pick your 2 finalists above to choose a champion.</div>';
  } else {
    champPool.forEach(function(name){
      if(isTBD(name))return;
      var sel=p.champion===name;
      var isChamp=r.champion===name;
      var cls="pick-row champ-row";
      if(locked||sc.hasResults){ cls+=" locked"; if(sel&&isChamp)cls+=" correct"; else if(sel&&!isChamp&&r.champion)cls+=" wrong"; }
      else if(sel)cls+=" sel";
      h+='<div class="'+cls+'" data-champ="'+x(name)+'"><span class="trophy">🏆</span>'+
         '<span class="pr-name">'+x(name)+'</span><span class="pr-team">'+x(teamFor(name))+'</span></div>';
    });
  }
  h+='</div>';

  if(sc.hasResults){
    h+='<div class="lb-note" style="margin:12px 0 0">You scored <b>'+sc.pts+'</b> of '+maxPossible()+' — '+sc.advHits+'/4 advancers, '+sc.finHits+'/2 finalists'+(sc.champHit?', champion ✓':'')+'.</div>';
  }

  h+='</div>';
  return h;
}
function bindPicks(){
  document.querySelectorAll("[data-adv]").forEach(function(el){ if(el.classList.contains("locked"))return; el.onclick=function(){toggleAdvance(el.getAttribute("data-adv"));}; });
  document.querySelectorAll("[data-fin]").forEach(function(el){ if(el.classList.contains("locked"))return; el.onclick=function(){toggleFinalist(el.getAttribute("data-fin"));}; });
  document.querySelectorAll("[data-champ]").forEach(function(el){ if(el.classList.contains("locked"))return; el.onclick=function(){pickChampion(el.getAttribute("data-champ"));}; });
}

// ── Standings ────────────────────────────────────────────
function standingsScreen(){
  var rows=PARTS.map(function(p){
    var s=scoreFor(p);
    return {name:p, pts:s.pts, adv:s.advHits, fin:s.finHits, champ:s.champHit};
  });
  rows.sort(function(a,b){return b.pts-a.pts;});
  var maxP=rows.length?Math.max(1,rows[0].pts):1;
  var anyResults=(ST.results&&(ST.results.advance||ST.results.finalists||ST.results.champion))?true:false;

  var h='<div class="wrap">';
  if(!anyResults){
    h+='<div class="lb-note">Standings light up once results are entered.<br>Everyone\'s at 0 for now — make your picks on the <b>My Bracket</b> tab.</div>';
  }
  rows.forEach(function(r,i){
    var medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1)+"";
    var rowCls="lb-row"+(i===0?" first":i===1?" second":i===2?" third":"");
    var barW=Math.round(r.pts/maxP*100),isMe=!PUBLIC_VIEW&&ukey(r.name)===ukey(ST.user);
    h+='<div class="'+rowCls+'"'+(isMe?' style="outline:2px solid var(--gold-dark);outline-offset:1px"':'')+'>';
    h+='<div class="lb-medal">'+medal+'</div><div class="lb-body">';
    h+='<div class="lb-top"><div class="lb-name">'+pem(r.name)+x(r.name)+'</div><div class="lb-pts"><b>'+r.pts+'</b> pts</div></div>';
    h+='<div class="lb-bar-wrap"><div class="lb-bar" style="width:'+barW+'%"></div></div>';
    h+='<div class="lb-stats">'+
       '<div class="lb-stat"><div class="lb-stat-v">'+r.adv+'/4</div><div class="lb-stat-l">Advancers</div></div>'+
       '<div class="lb-stat"><div class="lb-stat-v">'+r.fin+'/2</div><div class="lb-stat-l">Finalists</div></div>'+
       '<div class="lb-stat"><div class="lb-stat-v">'+(r.champ?"✓":"—")+'</div><div class="lb-stat-l">Champion</div></div>'+
       '</div></div></div>';
  });
  return h+'</div>';
}

// ── Admin ────────────────────────────────────────────────
function adminScreen(){
  var r=ST.results||{};
  var h='<div class="adm-wrap">';

  h+='<div class="adm-sec-label">The Field (8 sluggers)</div>';
  h+='<div class="adm-note">Only Caminero is officially confirmed. Edit names/teams as MLB announces the field. Leave a name blank or type "TBD" to show an open slot.</div>';
  for(var i=0;i<8;i++){
    var s=ST.field[i]||{n:"",t:""};
    h+='<div class="adm-slug-row"><span class="adm-slug-idx">'+(i+1)+'</span>'+
       '<input class="adm-input" data-slug="'+i+'" data-f="n" placeholder="Slugger name" value="'+x(s.n||"")+'">'+
       '<input class="adm-input sm" data-slug="'+i+'" data-f="t" placeholder="Team" value="'+x(s.t||"")+'"></div>';
  }

  h+='<div class="adm-sec-label">Enter Results</div>';
  h+='<div class="adm-note">Tap the pills as the Derby unfolds: mark the 4 who <b>Advance</b>, the 2 <b>Finalists</b>, and the <b>Champ</b>. (Choosing a finalist auto-marks them as advanced; the champ auto-marks finalist + advanced.) Optionally log Round 1 homer totals.</div>';
  ST.field.forEach(function(s){
    var name=s.n; if(isTBD(name))return;
    var isAdv=(r.advance||[]).indexOf(name)>=0;
    var isFin=(r.finalists||[]).indexOf(name)>=0;
    var isChamp=r.champion===name;
    var r1=(r.r1||{})[name];
    h+='<div class="adm-slug-row" style="flex-wrap:wrap">'+
       '<span style="font-size:12px;font-weight:900;flex:1;min-width:110px">'+x(name)+'</span>'+
       '<input class="adm-input r1" data-r1="'+x(name)+'" placeholder="HR" value="'+(r1!==undefined?r1:"")+'" inputmode="numeric">'+
       '<div class="adm-pill-row" style="width:100%">'+
       '<button class="adm-pill'+(isAdv?" on-adv":"")+'" data-radv="'+x(name)+'">Advance</button>'+
       '<button class="adm-pill'+(isFin?" on-fin":"")+'" data-rfin="'+x(name)+'">Finalist</button>'+
       '<button class="adm-pill'+(isChamp?" on-champ":"")+'" data-rchamp="'+x(name)+'">🏆 Champ</button>'+
       '</div></div>';
  });

  h+='<div class="adm-sec-label">Controls</div>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 10px 10px">'+
     '<button class="adm-btn '+(ST.locked?"sel-p":"")+'" data-lock="1">'+(ST.locked?"🔒 Locked":"Lock Picks")+'</button>'+
     '<button class="adm-btn" data-reset="1">Clear Results</button>';
  if(GROUP_ID)h+='<button class="adm-btn '+(ST.groupPublic?"sel-p":"")+'" data-pub="'+(ST.groupPublic?"0":"1")+'">'+(ST.groupPublic?"Public: ON":"Enable public")+'</button>';
  h+='</div>';
  h+='<div class="adm-note">Picks auto-lock at first pitch (Jul 13, 8:00 PM ET) regardless of the manual lock.</div>';

  return h+'</div>';
}
function bindAdmin(){
  document.querySelectorAll("[data-slug]").forEach(function(inp){
    inp.onchange=function(){ setSlug(Number(inp.getAttribute("data-slug")), inp.getAttribute("data-f"), inp.value.trim()); draw(); };
  });
  document.querySelectorAll("[data-r1]").forEach(function(inp){
    inp.onchange=function(){ setR1(inp.getAttribute("data-r1"), inp.value.trim()); };
  });
  document.querySelectorAll("[data-radv]").forEach(function(b){ b.onclick=function(){setResultAdvance(b.getAttribute("data-radv"));}; });
  document.querySelectorAll("[data-rfin]").forEach(function(b){ b.onclick=function(){setResultFinalist(b.getAttribute("data-rfin"));}; });
  document.querySelectorAll("[data-rchamp]").forEach(function(b){ b.onclick=function(){setResultChampion(b.getAttribute("data-rchamp"));}; });
  var lk=document.querySelector("[data-lock]"); if(lk)lk.onclick=toggleLock;
  var rs=document.querySelector("[data-reset]"); if(rs)rs.onclick=resetResults;
  var pb=document.querySelector("[data-pub]"); if(pb)pb.onclick=function(){setPublic(pb.getAttribute("data-pub")==="1");};
}

// ── Boot ─────────────────────────────────────────────────
loadData();
draw();
setInterval(function(){ if(ST.page==="picks"||ST.page==="standings")draw(); },30000);
